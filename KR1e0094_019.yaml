body:
  text: 欽定四庫全書欽定春秋傳説彚纂卷十七文公集説楊氏士勛曰魯世家文公名興僖公之子以襄王二十六年即位諡法慈惠愛民曰文乙襄王二未十六年元年晉襄二年齊昭七年衛成九年蔡莊二十年鄭穆二年曹共二十七年陳共六年把桓十一年宋成十一年秦穆三十四年楚成四十六年春王正月公即位穀梁繼正即位正也胡傳即位者告廟臨羣臣也國君嗣世定於初喪必逾年然後改元書即位者緣始終之義一年不二君緣民臣之心不可曠年無君集説杜氏預曰先君未葬而公即位不可曠年無君范氏寧曰繼正謂繼正卒也隱去即位以見讓桓書即位示安忍莊閔僖不言即位皆繼弒改孔氏穎達曰釋例曰遭喪繼立者每新年正月必元正位百官以序故國史書即位於策以表之文公成公先君之喪未葬而書即位因三正之始明繼嗣之正表朝儀以固百姓之心此乃國君明分制之大禮譬周康王麻冕黼裳以行事事畢然後反喪服也雖踰年行即位之禮名通於國內必須既葬卒哭乃免喪古之制也啖氏助曰嗣子為君明年正月朔就位南面改元踰高氏閌曰文成定即位於未葬之前皆稱公者既年也一年不可二君故終年稱子又不可曠年無君故踰年雖未葬稱公也吾朱子曰天子諸侯之禮與士庶人不同故孟子有未之學之語謂此類耳如伊訓元祀十有二月朔亦是新喪伊尹以奉嗣王祇見厥祖固不可用凶服矣漢唐新主即位皆行册禮君臣亦皆吉服追述先帝之命以告先君蓋易世傳授國之大事當嚴其禮而王侯以國為家雖先君之喪猶以為己私服也既黃氏翰曰人君即位之别有四始死正嗣子之位殯之後嗣君即繼體之位君踰年合正改元之位三年合正踐阼之位如春秋書元年即位則是踰年正改元之位也月正元日舜格于文祖伊尹以冕服奉嗣王歸于亳則是三年正踐阼之位也然崩薨之日或在嵗終則蓋有未殯而踰年者矣嵗家氏鉉翁曰即位必以嵗首改元亦必以嵗首若首不書即位而餘月書之則非元年正始之義得李氏廉曰魯自隱至文六君惟文公承國於先君書即位汪氏克寬曰文定及九峰蔡氏皆以即位之事冢宰攝告廟攝臨羣臣朱子則以他事可攝即位不可攝而又謂嗣君以先君之喪為己私服其意蓋欲權一時之冝如借吉之例以繼世正統而三年之服不可廢也案胡傳據髙宗諒陰之説援引虞商二書以為冢宰攝告廟臨羣臣而人主不親其事今以朱子之言考之則他事可攝即位不可攝乃不易之定論也曾子問緦服不祭則踰年告廟或使他人攝之若即位改元而臨羣臣萬無可攝之理故今不從胡傳二月癸亥日有食之公日上有朔字集説杜氏預曰癸亥月一日不書朔官失之趙氏鵬飛曰不書朔失其朔也天王使叔服來會葬左傳元年春王使內史叔服來會葬公孫敖聞其能相人也見其二子焉叔服曰穀也食子難也收子穀也豐下必有後於魯國公羊其言來會葬何會葬禮也穀梁葬曰會其志重天子之禮也胡傳凡崩薨卒葬人道始終之大變也不以得禮為常事而不書其或失禮而害於王法之甚者聖人則有削而不存以示義者矣集説周禮職喪掌諸侯之喪葬杜氏預曰叔氏服字諸侯喪天子使大夫會禮也孔氏穎達曰蘇氏云外卿來會葬不書此書者尊王使故特書之傳稱內史叔服內史於周禮為中大夫天子大夫例書字知叔氏服字也辭高氏閌曰葬者臣子之事會葬者諸侯相送終之也天王惟有弔贈含襚之禮今使叔服來會葬是自同於諸侯也子黃氏仲炎曰桓王崩七年而後葬見諸侯不恤天之喪也僖公以夏四月葬而王使叔服先二月至魯見天子急於奉諸侯之喪也冠屨倒置至此極矣家氏鉉翁曰天子所以厚諸侯是以無貶桓公之薨王使榮叔錫命王不稱天為追命篡賊而貶也成風之葬召伯來會王亦不稱天以其用夫人之禮於妾母而譏之也僖公魯之賢君書天王使叔服來會葬無貶也俞氏皋曰天王使會葬惟一見經其餘則知其不會也汪氏克寬曰諸侯五月而葬僖公薨至是三月而王臣來會葬者豈王室謹禮以懷諸侯惟恐失期而先至也歟僖公未嘗遣使會惠王之葬而襄王遣使會僖公之葬比事以觀得失見矣附録左傳於是閏三月非禮也先王之正時也履端於始舉正於中歸餘於終履端於始序則不愆舉正於中民則不惑歸餘於終事則不悖夏四月丁巳葬我君僖公左傳夏四月丁巳葬僖公穀梁薨稱公舉上也葬我君接上下也僖公葬而後舉諡諡所以成德也於卒事乎加之矣天王使毛伯來錫公命左傳王使毛伯衛來錫公命公羊錫者何賜也命者何加我服也穀梁禮有受命無來錫命錫命非正也胡傳諸侯終喪入見則有錫歲時來朝則有錫能敵王所愾則有錫黻冕圭璧因其終喪入見而錫之者也禮所謂喪畢以士服見天子已見賜之黻冕圭璧然後歸是已車馬袞黼因其歲時來朝而錫之者也詩所謂君子來朝何錫豫之雖無豫之路車乘馬又何豫之玄袞及黼是已彤弓玈矢因其敵愾獻功而錫之者也詩所謂彤弓弨兮受言藏之我有嘉賔中心貺之鐘鼓既設一朝享之是已今文公繼世喪制未畢非初見繼朝而獻功也何為來錫命乎故穀梁子曰禮有受命無來錫命來錫命非正也集説杜氏預曰毛國伯爵諸侯為王卿士者諸侯即位天子賜以命圭合瑞為信僖十一年王賜晉侯命亦其比也毛孔氏穎逹曰僖二十四年傳有原伯毛伯杜云原皆采邑此毛與彼計是一人而注不同者此毛當是文王之子封為畿外之國於時諸侯無復有毛或是世事王朝本是絶滅從此以後常稱毛伯國名尚存仍為伯爵必受得采邑為畿內諸侯故注彼云采邑此云國也封爵既存故云諸侯為王卿士者周禮大宗伯以玉作六瑞以等邦國王執鎮圭公執桓圭侯執信圭伯執躬圭子執穀璧男執蒲璧冬官玉人桓圭以下皆謂之命圭是用之以命諸侯也諸侯即位天子賜之以命圭魯是侯爵當賜之以信圭也玉人又云天子執冒四寸以朝諸侯其冒邪刻其下與圭頭相合諸侯執圭以朝天子天子執冒以冒之觀其相當以否所以合瑞為信也僖十一年晉惠公新立王賜之命此亦新立是其比也劉氏敞曰錫命者何命為諸侯也諸侯在喪稱子踰年即位終喪受命正也未畢喪命之非正也既畢喪不受命亦非正也伯程氏喘學曰文公在衰絰中安然受之而不辭毛不諫而從君之令皆非也李氏亷曰杜氏以為諸侯初即位天子錫以命圭如侯執信圭之類公羊以為賜以命服以晉惠初立王賜之命而晉侯受玉惰證之則杜氏得之晉武公以請命於王而詩人有子之衣安且吉之辭證之則公羊亦得之故胡氏取禮經黻冕圭璧之説然後其義始備汪氏克寬曰諸侯之嫡子必誓於王以為世子及其君薨必告於王王遣使省其終事遂命世子嗣為諸侯三年喪畢乃以士服入京師見天子於廟而受命焉未受命不敢服其服已見天子錫之黻冕之服與命圭合瑞於是服之以歸設奠於祖廟然後臨其臣民焉春秋諸侯立世子既不誓於王及其嗣位又不請命於京師王不能罪因而命之兩失之矣公羊以錫命為加服劉氏辨其非或者謂命為諸侯非賜命服並文定之説為疑夫黻冕圭璧乃所以命為諸侯也蓋天王之錫命有以始立而錫命者有以有功而錫命者有既沒而追命之者此年毛伯錫命及虢公命曲沃武公為晉侯召武公賜晉惠公命皆始立而賜命者也召伯廖賜齊桓公命尹氏王子虎內史叔興父䇿命晉文公皆以其有功而錫命者也榮叔錫桓公命及成簡公追命衛襄公皆既死而追命之者也若召伯之賜成公命則始立未賜命歷八年而後命之耳劉定公之賜齊靈公命雖非有功王將娶於齊故以私恩命之也春秋之書錫命莫非譏耳苟謂諸侯不往拜命為貶而天王之錫命無責則曷為不待其來見而命之哉晉侯伐衛左傳晉文公之季年諸侯朝晉衛成公不朝使孔達侵鄭伐綿訾及匡晉襄公既祥使告於諸侯而伐衛及南陽先且居曰效尤禍也請君朝王臣從師晉侯朝王於溫先且居胥臣伐衛五月辛酉朔晉師圍戚六月戊戌取之獲孫昭子匡杜注在潁川新汲縣東北今河南開封府扶溝縣西有匡城戚杜注衛邑在頓丘衛縣西今直隸大名府開州北七里有古戚城集説王氏沿曰衛成怨晉文執歸京師故季年不朝而且侵其鄰國示不從盟主也襄公嗣位欲修伯業先以衛侯之罪告於諸侯復聼且居之言朝於王所乃命大夫伐衛取其戚田諸侯於是畏威復歸於晉昔年齊桓公卒五公子爭立霸業遂廢今襄公克纘父功繼為盟主首能威服諸侯故春秋書曰晉侯伐衛貴之也書陳氏傳良曰春秋苟其君意雖卿帥不書故伐衛晉侯不書先且居成十三年伐秦書晉侯不書欒書襄十年滅逼陽書晉侯不書荀偃士丐哀元年伐晉書衛侯不書孔圉所謂深探其本也諸趙氏鵬飛曰襄公即位之初遽能伐叛討二以求侯聖人許而爵之衛不能屈尚有報怨之師聖人於衛伐晉則書人貶衛也貶衛所以豫晉也朝鄭氏玉曰晉侯為伐衛而行故書晉侯伐衛不為王故不書朝王雖汪氏克寬曰文宣以後大夫専政凡征伐會盟君在而大夫任其事故經書晉侯而傳言大夫也叔孫得臣如京師左傳叔孫得臣如周拜集説杜氏預曰謝賜命得臣叔牙之孫緩杜氏諤曰受王之寵命苟躬朝於京師猶曰也况不朝而使卿拜命乎故直書以示譏庸趙氏鵬飛曰拜錫命也錫固非所宜錫而拜錫者為是乎錫之在喪拜之在喪既拜則釋衰服韍矣釋衰服韍文公之心其安乎安則為之家氏鉉翁曰拜錫命也在喪不能躬往使臣可也除喪朝王然後於禮為盡而文公循習舊事不能往也汪氏克寬曰文公之立天子既使大夫會僖公之葬又使寰內諸侯來錫命不親往拜而僅使得臣焉襄王猶不之罪且使榮叔歸成風含賵繼使召伯會成風葬而文公在位十有八年歷襄頃匡王三世終其身不朝於京師觀春秋所書比事以考之其罪不可掩矣衛人伐晉左傳衛人使告於陳陳共公曰更伐之我辭之衛孔逹帥師伐晉集説劉氏敞曰左氏曰君子以為古古者越國而謀非也古者雖越國而謀所謀者必義事也今陳與衛何謀哉謀叛命侵小者也謀畔命侵小是非古矣何以謂之古吕氏本中曰嘗聞以小事大者未聞以小而謀大者也以小而謀大滅亡之道也罪張氏洽曰霸主聲罪致討不自反其不仁無禮之乃稱兵報伐故書人罪孔達也抑趙氏鵬飛曰春秋之時所宗者霸主爾聖人豈苟諸侯而私霸主哉存霸主所以使諸侯有所宗也今衛成抗霸主而伐之是亦犯上矣故聖人於晉伐衛書侯而衛伐晉書人均諸侯也貶衛而豫晉者存霸主也衛李氏廉曰春秋與國伐霸者三衛人伐晉齊侯伐遂伐晉齊侯衛侯伐晉皆有關於衛逹汪氏克寬曰春秋不書晉之取戚而人孔豫晉而罪衛也秋公孫敖會晉侯于戚此大夫専會諸侯之始左傳秋晉侯疆戚田故公孫敖會之集説孔氏穎逹曰僖二十九年翟泉之盟諸侯之卿為會魯侯故貶稱人則魯卿會他諸侯亦合貶而春秋魯大夫皆不貶者貶他國之卿以成體例體例已舉於魯不須加貶理足可明故據用魯史成文不復改易也見趙氏鵬飛曰三家之子孫雖自僖公而僖之世莫其橫蓋僖所不容也及文公之初則已専盟會矣孟氏自敖而專叔孫氏自得臣彭生而橫季孫氏自行父而侈敖慶父之子得臣彭生皆子牙之孫而行父季友之孫也程吳氏􅊹曰凡魯卿會外君直書不隱以見其非氏端學曰諸侯非王命自為會罪也况魯國有喪以大夫而會霸主乎晉襄居喪而下會大夫亦非禮也李氏廉曰內大夫特會外諸侯五敖會晉侯于戚行父會齊侯陽穀歸父會齊侯于穀歸父會楚子于宋叔弓會楚子于陳也此為大夫特會諸侯之始而胡氏特發傳於歸父之下不知所謂冬十月丁未楚世子商臣弒其君頵頵俱倫反公榖作髠左傳初楚子將以商臣為大子訪諸令尹子上子上曰君之齒未也而又多愛黜乃亂也楚國之舉恆在少者且是人也蜂目而豺聲忍人也不可立也弗聽既又欲立王子職而黜大子商臣商臣聞之而未察告其師潘崇曰若之何而察之潘崇曰享江芈而勿敬也從之江芈怒曰呼役夫宜君王之欲殺女而立職也告潘崇曰信矣潘崇曰能事諸乎曰不能能行乎曰不能能行大事乎曰能冬十月以宫甲圍成王王請食熊蹯而死弗聽丁未王縊諡之曰靈不瞑曰成乃瞑穆王立以其為大子之室與潘崇使為大師且掌環列之尹集説何氏休曰楚無大夫言世子者甚惡世子弒父之禍也不言其父言其君者君之於世子有父之親有君之尊言世子者所以明有父之親言君者所以明有君之尊又責臣子當討賊也啖氏助曰楚僭號已久世子必不誓於天子今以商臣之逆故特書世子以明其罪劉氏敞曰穀梁曰日髠之卒所以謹商臣之弒也非也即不日者乃不謹商臣之弒乎王氏葆曰頵亦弒其兄熊囏而得位者終不免商臣之禍天道好還豈不昭然以陳氏傅良曰楚國未志其志頵何世子弒君不可楚不志也家氏鉉翁曰子上之言忠矣楚成能用之豈有是乎有國家者可不知所戒耶王氏錫爵曰傳謂諡靈弗瞑改成乃瞑君薨舉諡常在葬時安得諡於未殯之日此左氏之鑿也案唐郭瑜對世子𢎞謂春秋義存褒貶以善惡為勸戒故商臣千載而惡名不滅此正合於聖人之旨所謂春秋成而亂臣賊子懼也𢎞天性仁愛故卒不忍讀耳非瑜誤陳經義以春秋為可廢也胡傳深貶其説謂身後惡名不足以繫亂賊之邪志而懲於為惡又曲引董子之論寬篡弒嚴首惡纍數楚成之罪而以商臣為不待貶是亂春秋之名分失輕重之權衡也故不録公孫敖如齊左傳穆伯如齊始聘焉禮也凡君即位卿出並聘踐修舊好要結外援好事鄰國以衛社稷忠信卑讓之道也忠德之正也信德之固也卑讓德之基也集説何氏休曰書者譏喪娶吉凶不相干齊髙氏閌曰會晉歸而復聘齊魯人於是兩事晉且圗婚於齊故也察汪氏克寬曰左氏於凡諸侯朝聘悉以為禮既不其不能謹天下之通喪又不考其尊周交鄰之疏數僖公三十年宰周公來聘而公子遂報聘於京師且初聘於晉此年毛伯錫命則得臣往拜而敖亦初聘於齊比事以觀不貶而惡自見案諸侯在喪惟不親與於會盟耳若使臣以往未為不可邦交有常期往來有定禮三年之久安能杜卦疆絶賔禮耶權衡駁左氏太過惟汪氏以尊周交鄰之疏數為言似亦有理故與左氏並存附録左傳殽之役晉人既歸秦帥秦大夫及左右皆言於秦伯曰是敗也孟明之罪也必殺之秦伯曰是孤之罪也周芮良夫之詩曰大風有隧貪人敗類聽言則對誦言如醉匪用其艮覆俾我悖是貪故也孤之謂矣孤實貪以禍夫子夫子何罪復使為政丙襄王二申十七年二年晉襄三年齊昭八年衛成十年蔡莊二十一年鄭穆三年曹共二十八年陳共七年把桓十二年宋成十二年秦穆三十五年楚穆王商臣元年春王二月甲子晉侯及秦師戰于彭衙秦師敗績彭衙杜注馮翊郃陽縣西北有彭衙城在今陜西西安府白水縣東北六十里漢於此置衙縣左傳二年春秦孟明視帥師伐晉以報殽之役二月晉侯禦之先且居將中軍趙衰佐之王官無地御戎狐鞫居為右甲子及秦師戰于彭衙秦師敗績晉人謂秦拜賜之師戰于殽也晉梁𢎞御戎萊駒為右戰之明日晉襄公縛秦囚使萊駒以戈斬之囚呼萊駒失戈狼瞫取戈以斬囚禽之以從公乘遂以為右箕之役先軫黜之而立續簡伯狼瞫怒其友曰盍死之瞫曰吾未獲死所其友曰吾與女為難瞫曰周志有之勇則害上不登於明堂死而不義非勇也共用之謂勇吾以勇求右無勇而黜亦其所也謂上不我知黜而宜乃知我矣子姑待之及彭衙既陳以其屬馳秦師死焉晉師從之大敗秦師君子謂狼瞫於是乎君子詩曰君子如怒亂庶遄沮又曰王赫斯怒爰整其旅怒不作亂而以從師可謂君子矣秦伯猶用孟明孟明增修國政重施於民趙成子言於諸大夫曰秦師又至將必辟之懼而增德不可當也詩曰毋念爾祖聿修厥德孟明念之矣念德不怠其可敵乎集説何氏休曰稱秦師者愍其衆惡其將前以不用賢者之言匹馬隻輪無反者今復重師敗績師敵君不正者賤之不嫌得敵君乎劉氏敞曰戰而言及者主之者也猶曰晉侯為志為此戰也程子曰越國襲人秦罪也忘親背惠晉惡也秦經人之國以襲人雖忿無以為辭矣故其來不稱伐晉不諭秦而與戰故書晉及忿以取敗故書敗績怨黃氏仲炎曰秦穆公反自殽陵悔過自誓未幾尋再致彭衙之衄是雖悔其非而未嘗改也悔而不改何取於悔哉晉襄得志於殽可以已矣當秦兵再至則修文告以郤之若展禽所以犒齊師者秦必愧而反矣不此之圗而逞志於再戰是則晉襄之罪也蓋秦穆憤於敗而不能平晉襄狃於勝而不能屈血氣用事而無理義以養其心終於稔怨結讎黷武殘民而已春秋書秦晉之戰所以為世之不能懲忿窒欲者之戒嚴矣哉趙氏鵬飛曰前日殽之役兵端實起於秦秦不入滑則晉不敗秦也殽之敗穆公歸而悔過自咎可謂賢矣然悔其敗而治戎練卒以圗再舉則是禍方深矣何悔之有其後三十年秦晉之戰無虛歲兵連禍結荼毒生民皆起於秦穆之悔不悔於德而悔於力其所以悔者非其道也復程氏端學曰秦穆邀利以取敗不自悔責而事報又取敗績其罪著矣晉襄公忘喪而主乎此戰雖勝無足道矣之汪氏克寬曰王氏云彭衙秦地而晉師在焉亦知晉欲戰矣案胡傳謂敵加於己己有罪焉則引咎責躬己無罪而不義見加則諭之以辭命猶不得免焉亦告之天子方伯若遽然興師與戰是謂以桀攻桀斯言也可謂濶於事情矣當時周室衰微雖告於天子豈能止侵伐之暴胡氏固嘗有言天子能治諸侯則春秋不復作矣若謂告於方伯則晉固霸主也自襄王彤弓之賜文固始霸襄實繼霸鄰國有相侵伐者晉猶當起而問之况敵加於己乎敵加於己必待告於天子方伯而後應焉則敵已造其國都而宗社墟矣胡氏之説今無取焉丁丑作僖公主左傳丁丑作僖公主書不時也公羊作僖公主者何為僖公作主也主者曷用虞主用桑練主用栗用栗者藏主也作僖公主何以書譏何譏爾不時也穀梁作為也為僖公主也立主喪主於虞吉主於練作僖公主譏其後也作主壞廟有時日於練焉壞廟壞廟之道易簷可也改塗可也胡傳作主者造木主也既葬而反虞虞主用桑期年而練祭練主用栗用栗者藏主也何以書僖公薨至是十有五月然後作主慢而不敬甚矣夫慢而不敬積惡之原也以為無傷而不去至於惡積而不可掩所以謹之也集説何氏休曰禮平明而葬日中而反虞以陽求隂謂之虞者親喪已下壙皇皇無所親求而虞事之虞猶安神也用桑者取其名所以副孝子之心期年練祭埋虞主於兩階之間易用栗也夏后氏以松殷人以柏周人以栗禮士虞記桑主不文吉主皆刻而諡之藏於廟室中常所當奉事也禮作練主當以十三月期劉氏敞曰譏不時也其不時奈何古者蓋葬而虞而練喪事即逺天下之達禮也過之者猶不及也又曰公羊曰刺欲久喪而後不能非也公自惰緩不作主爾何以知其欲久喪杜氏諤曰十二公作主祔廟未嘗書之今書作僖公主必有所譏也高氏閌曰周人卒哭而祔祔而易主是謂虞主既期而練練而易主是謂練主僖公薨十有五月非虞練之時而方作主猶未祔廟也猶未祔廟者欲躋之故也既張氏洽曰事亡如事存故作主以象神而祭之禮葬作主於墓不終日而虞祭不忍一日忘親也僖公元年四月葬今乃作主慢而違禮甚矣故家氏鉉翁曰逆祀有萌議論未定緩於作主以是也几汪氏克寬曰左氏云卒哭而祔服氏云造木主立筵焉特祀在寢三年喪畢遭蒸嘗乃於廟鄭氏又云惟祔與練祭在廟祭訖主反於寢其大祥與禫祭其主自然在寢祭之穀梁謂吉主於練於練焉壞廟則待練而始祔今考檀弓云殷既練而祔周卒哭而祔孔子善殷竊謂祔廟則當吉祭苟卒哭而遷廟遽用吉祭不近人情故文定取穀梁言練祭易栗主而後祔廟也三月乙巳及晉處父盟因朝而盟始此左傳晉人以公不朝來討公如晉夏四月己巳晉人使陽處父盟公以恥之書曰及晉處父盟以厭之也適晉不書諱之也公羊此晉陽處父也何以不氏諱與大夫盟也穀梁不言公處父伉也為公諱也何以不言公之如晉所恥也出不書反不致也胡傳及處父盟者公也其不北於晉也諱不書公者抑大夫之伉不使與公為敵正君臣之分也適晉不書反國不致為公諱恥存臣子之禮也凡此類筆削魯史之舊文衆矣集説杜氏預曰處父為晉正卿不能匡君以禮而親與公盟故貶其族族去則非卿故以微人常稱為耦以直厭不直不地者盟晉都之孔氏穎達曰春秋卿則書名氏賤者則稱人外卿貶例皆稱人魯卿之貶乃去其族去族與稱人相類即是不為卿也處父為晉正卿不能匡君以禮君使盟魯即從君命親與公盟故貶去其族然則不貶處父稱人者貶之稱人則惡名不見貶其族留其名所以惡處父也釋例曰隨此稱人則所罪之名不章故特書處父也翟泉澶淵亦會公侯所以稱人者以其衆卿非一依例總貶逼陸氏淳曰淳聞於師曰凡大夫與公盟若非彼強我而盟例但書人言非大夫之罪也今晉逼公令與大夫盟故特書其名以見其罪也劉氏敞曰穀梁曰何以知其與公盟以其日也非公盟不日者多矣何以能必之公而此主在處父也杜氏諤曰髙傒之盟主在於髙氏閌曰凡盟必書地惟他國大夫來魯盟及魯大夫往他國盟不地蓋各於國中故也陳氏傅良曰朝而遂盟之於是始凡諱國惡恥在公則但書其事不書公者恆辭也諱在其事則但書公不書其事公會晉侯於黑壤為公不與盟故不書盟公如晉為止公送葬故不書葬甚諱之也張氏洽曰盟於晉之都而君不出恥甚矣故諱之其趙氏孟何曰齊晉伯業盛時未嘗使諸侯受盟於國魯閔公襄公童子侯也桓公出盟閔于落姑悼公出盟襄于長樗不敢以非禮加於列國也魯君如伯國受盟自文公始而晉襄怒其不朝使其大夫盟公以恥之晉卑諸侯甚矣之家氏鉉翁曰魯喪未除晉責之以朝魯當以禮拒而冒喪而朝所以愈受欺於強國春秋去處父族非特為魯諱亦責晉也而李氏亷曰處父之伉與髙傒之伉一也處父去氏髙傒存族者彼於防而此於晉也何氏曰親就其國恥不得其君故使若得其君也又曰處父繫國而去氏荀庚良夫等繫氏而去國者此兼罪晉侯之失彼止罪大夫之専也汪氏克寬曰抑大夫之伉與及髙傒荀庚孫良夫郤犨孫林父向戌同晉時以處父辱公故又去氏夏六月公孫敖會宋公陳侯鄭伯晉士縠盟于垂隴縠户木反穀作榖垂隴公穀作垂斂東垂隴杜注鄭地滎陽縣東有隴城京相璠曰滎陽二十里今在河南開封府滎澤縣東北左傳公未至六月穆伯會諸侯及晉司空士穀盟于垂隴晉討衛故也陳侯為衛請成於晉執孔逹以説穀梁內大夫可以會外諸侯集説杜氏諤曰春秋盟會未有外大夫别會於諸侯者垂隴之會譏政在於大夫也桓文之霸或盟王人或致天子是天子受制於諸侯也春秋不與之故書王人以先諸侯晉襄紹霸致諸侯而大夫會之是諸侯受制於大夫也春秋亦不與之故序諸侯以先士縠許氏翰曰明年衛人會晉伐沈則知衛服於垂隴之會矣主陳氏傅良曰大夫而敵諸侯於是始晉遂以大夫諸侯也然士縠主盟曷為序諸侯之下春秋不以大夫主盟也故訖於宋不以大夫主盟翟泉貶此何以不貶貶不於甚則於其事端餘實録而已矣故書士縠自書士縠而後凡役書大夫桓文之伯會盟有大夫則但稱人會柳稱邾人會溫稱秦人必世子也則得次小國之君自垂隴主士縠新城主趙盾而後大夫與諸侯序戚之盟書齊國佐沙隨之會書宋華元甚者無伯而安甫之會君與大夫並列矣薛氏季宣曰垂隴之會士縠始専晉國之事也桓文沒大夫擅専諸侯之會盟自公孫敖士縠始也其臣固有罪也使之者亦非也黃氏仲炎曰晉士縠會盟諸侯晉政在大夫也後家氏鉉翁曰天子命上公董諸侯之成此東遷以之變禮非盛時所行晉襄使其臣盟公侯自是為例春秋書其僭君吳氏􅊹曰晉以士縠主盟魯以公孫敖伉三國之皆非禮也故書以譏之衛敢於伐盟主者孔達之罪也今陳侯為請而執孔逹衛服其罪故免於晉之伐也主程氏端學曰士縠以襄公之命盟諸侯則是大夫盟也禮樂征伐自大夫出矣又曰案伯者之大夫盟自僖二十九年翟泉之盟始至此則士縠主諸侯矣李氏亷曰內大夫出盟諸侯自柔始繼而公子結及齊宋又繼而公孫敖會三國矣論王氏錫爵曰既命之卿例皆書名奚堪與不堪之哉陳氏際泰曰翟泉以列國之大夫盟王臣大夫張也見諸侯之輕天子也垂隴以伯主之大夫盟諸侯大夫張也見伯主之輕諸侯也自十有二月不雨至于秋七月穀梁歷時而言不雨文不憂雨也不憂雨者無志乎民也胡傳書不雨至于秋七月而不曰至于秋七月不雨者蓋後言不雨則是冀雨之辭非文公之意也夫書不雨至于秋七月而止即八月嘗雨矣然而不書八月雨者見文公之無意於雨不以民事繫憂樂也其怠於政事可知而魯衰自此始矣集説趙氏鵬飛曰不雨者數月而文公不一念及其志荒矣僖公一月不雨必書見其有愛民之心也六月雨亦書知其有喜雨之志也今自十二月不雨至于秋七月文公蓋以為旱無與乎已也不雨至於秋七月則八月雨矣雨亦不書以見文無復喜雨為無益於我也以此觀之僖文父子之賢否抑亦判矣旨家氏鉉翁曰穀梁謂文不憂雨深得春秋垂訓之汪氏克寬曰禮稱至于八月不雨則君不舉今文公自十二月不雨至七月則陰陽之氣不和而恆㿩為災者八越月矣文公漫不之省雖禫制未終而屢行朝聘會盟祭祀之事其無恤民之心若是豈可以居民上乎公羊謂不書旱不雨之日長而無災范注亦云未為災誤矣蓋旱為災而不久則書旱旱為災而久則書某月不雨至某月綱目於漢獻之世書四月不雨至七月而分注人相食則為災可知矣八月丁卯大事于大廟躋僖公左傳秋八月丁卯大事于大廟躋僖公逆祀也於是夏父弗忌為宗伯尊僖公且明見曰吾見新鬼大故鬼小先大後小順也躋聖賢明也明順禮也君子以為失禮禮無不順祀國之大事也而逆之可謂禮乎子雖齊聖不先父食久矣故禹不先鯀湯不先契文武不先不窋宋祖帝乙鄭祖厲王猶上祖也是以魯頌曰春秋匪解享祀不忒皇皇后帝皇祖后稷君子曰禮謂其后稷親而先帝也詩曰問我諸姑遂及伯姊君子曰禮謂其姊親而先姑也仲尼曰臧文仲其不仁者三不知者三下展禽廢六關妾織蒲三不仁也作虛器縱逆祀祀爰居三不知也公羊大事者何大祫也大祫者何合祭也其合祭奈何毁廟之主陳於大祖未毁廟之主皆升合食於大祖五年而再殷祭躋者何升也何言乎升僖公譏何譏爾逆祀也穀梁大事者何大是事也著祫嘗祫祭者毁廟之主陳於大祖未毁廟之主皆升合祭於大祖躋升也先親而後祖也逆祀也君子不以親親害尊尊此春秋之義也胡傳有事者時祭大事祫也合羣廟之主食於大廟升僖於閔之上也閔僖二公親則兄弟分則君臣以為逆祀者兄弟之不先君臣禮也集説何氏休曰以言大與有事異又從僖八年禘數之知為大祫大祖周公之廟陳者陳列大祖前大祖東鄉昭南鄉穆北鄉其餘孫從王父父曰昭子曰穆昭取其鄉明穆取其北靣自外來曰升殷盛也謂三年祫五年禘禘所以異於祫者功臣皆祭也祫猶合也文公緣僖公於閔公為庶兄置僖公於閔公上失先後之義故譏之矣范氏寧曰僖公雖長已為臣矣閔公雖小已為君臣不可以先君猶子不可以先父故以昭穆父祖為喻事趙氏匡曰凡祭而失禮則書祭名祭非失禮為下張本則稱事劉氏敞曰大事于大廟春秋記嘗記蒸記禘記郊未有曰大事者此其曰大事何也曰是乃諸侯之大事也諸侯之事無大於此者矣祫之謂也奚以言之王者禘禘其祖之所自出以其祖配之諸侯祫毁廟之主陳乎大祖大夫士享或四廟或三廟或二廟庶人薦於寢故曰德厚者流光德薄者流卑時祭稱有事祫祭稱大事大之外無加者矣上孫氏覺曰閔僖之為君臣較然於人一旦以臣而君亂法之甚孫氏抃曰世與昭穆云者據父子之正而言也若兄弟則昭穆同不得以世數之矣趙氏鵬飛曰兄弟一家之私恩世統天下之大義僖之繼閔世統之正也安可以私恩而亂世統哉聖人謹而志之以著其失垂萬世之法也此柳下惠所以稱夏父弗忌為不祥而仲尼又以罪臧文仲為不知禮歟家氏鉉翁曰三傳明逆祀皆已得之但謂閔僖昭穆各自為世不可不辨左傳曰子雖齊聖不先父食此言君臣猶父子非謂閔為文祖也公羊乃云先禰後祖穀梁云無昭穆則無祖也社預曰閔僖不得為父子嘗為臣位應下今居閔上逆也孔穎逹發明杜意頗詳若兄弟各為世紊昭穆之序斷不可行矣吳氏􅊹曰四時之祭稱祭名而曰蒸曰嘗者五廟各祭也曰有事於大廟者四廟之主遷於大廟而合祭也是為祫曰大事於大廟者毁廟之主亦與祭自伯禽以下禰廟以上之主皆合祭于大廟也是為大祫程氏端學曰文公居喪未大祥而吉祭於大廟非禮一也僖公之主未嘗入宫非禮二也躋僖公於閔公之上非禮三也李氏廉曰古者戎祀皆國之大事季氏將有事於顓臾以兵事為有事也天子有事於文武以祭祀為有事也故春秋書大祫為大事書禴祠蒸嘗為有事此年大事祫也宣八年有事禴也昭十五年有事蒸也此皆於祭無譏故不書祭名其郊禘大雩皆書祭名者祭之僭也蒸嘗有書祭名者祭之失也此年大事之為祫公穀皆同杜氏以為禘者非也又案僖閔逆祀杜氏只以為位次之逆不以為昭穆之異胡氏辨世指父子之義恐未至穆汪氏克寬曰穀梁謂逆祀是無昭穆范寧曰以昭父祖為喻何休謂惠公與莊公當同南面西上隱桓與閔僖亦當同北面西上孔穎達正義曰閔僖不得為父子同為穆爾今升僖先閔此二公位次之逆非昭穆亂也若兄弟相代即異昭穆設令兄弟四人皆立則祖父之廟即已從毁禮必不然今考文定此傳用韋昭説父為昭子為穆僖為閔臣臣子一例而以閔僖各為一世襄公三年謂哀公以襄公為皇考亦以昭定各為一世則是異昭穆矣然於仲嬰齊後歸父則引何休以為亂昭穆之序竊疑古者一君各為一廟則兄弟同昭穆共為一世祫祭大廟則魯當以僖公特設位於閔公之下後世同堂異室不可以二先君共祭於一室必至於異昭穆而仍以兄弟共為一世數之也然曾子問云七廟五廟無虛主諸侯祫祭則祝逆四廟之主是諸侯之昭穆無過四廟天子之昭穆無過六廟考之春秋哀公之世桓宫猶在則是祭十君而八世定公立煬宫則是祭二十一傳之祖後世天子之廟有十餘世歷十四五君而其廟皆不毁説禮者反引春秋以為證而聖王經世之制不可復見矣案兄弟昭穆廟制與五年再殷祭之説諸家之説紛然不一皆不可以不辨祭統曰昭穆者所以别父子逺近長幼親疏之序而無亂也周禮小宗伯辨廟祧之昭穆鄭注曰自始祖之後父為昭子為穆賈疏曰周以后稷廟為始祖不窋父為昭鞠子為穆從此以後皆父為昭子為穆是故父子異昭穆兄弟昭穆同弟必不可為兄後子必不可為父孫也小宗伯所為辨之者恐其父子兄弟之序之有亂而辨之也如三傳及胡傳皆以閔僖為父子則是以兄為弟後以子為父孫其亂昭穆之序也甚矣鄭氏謂商六廟自契至湯二昭二穆考之殷本紀陽甲盤庚小卒小乙兄弟四王如果兄弟異昭穆各為一代則武丁之祭將不能上及祖乎晉賀循謂禮兄弟不相為後不得以承代為世又謂兄弟相代則共是一代昭穆位同不得兼毁二廟禮之常例也殷之盤庚不繼陽甲而上繼先君以弟不繼兄故也華恆謂兄弟旁及禮之變也宜為神主立室不當以室限神主又謂廟當以容主為限無拘常數又謂以七為正不限之七室雖有兄弟旁及不越昭穆溫嶠謂兄弟同代於恩既順於義無否唐禮官謂兄弟不相為後不得為昭穆晉武帝時景文同廟廟雖六代其實七主至元帝明帝廟皆十室宋禮官亦謂兄弟繼統同為一代魯隱桓繼及皆當穆位殷陽甲至小乙兄弟四人相承故不稱嗣子而稱及王明不繼兄之統也唐中睿皆處昭位敬文武昭穆同為一世伏請每大祭太祖太宗昭穆同位祝文並稱孝子又謂兄弟一體無父子之道父為昭子為穆不刋之典也據此歷代禮官之議合之何氏孔氏之言可以知四傳之為謬矣汪氏克寬斟酌情理可謂盡善故特録之至所謂五年再殷祭者漢儒每援此為禘祫相因之説何氏鄭氏謂三年祫五年禘徐邈謂相去各三十月三十月而祫三十月而禘唐自睿宗而後五年一禘三年一祫各自計年不相通數開元二十七年乃至禘祫並在一歲宋熙寧八年亦至既禘又祫竟無一定之論善哉乎楊氏復之説曰夫殷祭乃大祫之祭也五年而再殷祭謂三年一祫五年再祫也於禘祭乎何與可以一掃諸家之紛紛多端矣冬晉人宋人陳人鄭人伐秦左傳冬晉先且居宋公子成陳轅選鄭公子歸生伐秦取汪及彭衙而還以報彭衙之役胡傳案左氏四國伐秦報彭衙之役則皆國卿也其貶而稱人者晉人再勝秦師在常情亦可以已矣而復興此役結怨勤民是全不務德專欲力爭而報復之無已也以致濟河焚舟之師故特貶而稱人集説劉氏敞曰晉人宋人陳人鄭人伐秦左氏曰卿不書為穆公故尊秦也非也於經何以知其非微者稱人乎無程子曰秦以憤取敗晉可以已矣而復伐秦報復已殘民結怨故貶稱人髙氏閌曰三國以伐秦再舉兵而過京師尤其惡之大者専陳氏傅良曰曷為不序大夫將猶稱人也自士縠盟書大夫自陽處父専將書大夫是故春秋之始大夫將恆稱人由救鄭之後大夫始貶稱人矣李氏亷曰此條左氏尊秦之義非經意其説如襄八年邢丘貶諸侯以尊晉相類胡氏説本程子其貶晉固是但自入春秋以來至此除魯大夫帥師外外兵非君將者皆稱人如隱五年邾鄭伐宋桓十四年宋以四國伐鄭齊桓之霸伐宋伐郳伐鄭伐英氏晉襄以三國伐許與明年五國之伐沈皆未有書大夫名氏者則陳氏之考據不為無見公子遂如齊納幣左傳襄仲如齊納幣公羊納幣不書此何以書譏何譏爾譏喪娶也娶在三年之外則何譏乎喪娶三年之內不圗婚吉禘于莊公譏然則曷為不於祭焉譏三年之恩疾矣非虛加之也以人心為皆有之以人心為皆有之則曷為獨於娶焉譏娶者大吉也非常吉也其為吉者主於己以為有人心焉者則宜於此焉變矣胡傳昏姻常事不書其書納幣者喪未終而圗昏也夫娶在三年之外矣則何譏乎春秋論事莫重乎志志敬而節具與之知禮志和而音雅與之知樂志哀而居約與之知喪非虛加之也重志之謂也此皆使人私欲不行間邪復禮之意集説董氏仲舒曰春秋譏文公以喪娶難者曰喪不過三年三年之喪二十五月文公四十一月乃娶何以為喪娶曰事莫重乎志納幣之月在喪內故曰喪娶也且文公以秋祫祭以冬納幣皆失於太早三年之喪肌膚之情也反在思念娶事春秋之所甚疾也何氏休曰僖以十二月薨至此未滿二十五月又禮先納采問名納吉乃納幣四者皆在三年之內范氏寧曰喪制未畢而納幣書非禮劉氏敞曰左氏曰禮也則是以喪娶為禮不亦悖乎杜預遷僖公薨月以就傳説然文公此年大事于大廟則已自除喪矣彼尚能逆祀何故不能於此娶乎明此傳誤無為歸過於經而疑之也孫氏覺曰納幣之禮婚姻之將成也文公於納幣之時而猶在喪制之月春秋以其喪而謀婚故書以罪之也左氏之説范寧非之當矣徴高氏閌曰婚禮有六曰納采曰問名曰請吉曰納曰請期曰親迎自有次第納幣者即納徴也公始祥而納幣則納采問名皆在三年之內矣夫三年之內不圗婚聖人於此譏之所以闡幽也汪氏克寬曰據春秋十二公皆不書納幣惟此年及莊公親往則書之又曰喪雖二十五月大祥然中月而禫必二十七月始為終制况春秋凡書四時皆指首月此書冬則納幣在十月是僖公之薨甫及二十三月殺哀而圗婚失禮甚矣宣公元年逆女其蔑禮視此尤甚然其篡立之罪已極於喪娶乎何誅陳氏際泰曰莊公不勝其母逾期納幣焉君子以為己緩矣文公不喪其父不及期納幣焉君子以為己亟矣案左傳謂襄仲如齊納幣禮也凡君即位好舅甥修昏姻娶元妃以奉粢盛孝也孝禮之始也此不待辨而知謬者也人君即位自非始封皆有三年之服喪而圗婚何禮之有杜注孔疏以長厯衍之謂喪服已終又以納幣之前尚有納采問名納吉不能併行於一月之內因謂公為太子時已行昏禮皆曲附左氏而遷就其説也丁襄王二酉十八年三年晉襄四年齊昭九年衛成十一年蔡莊二十二年鄭穆四年曹共二十九年陳共八年把桓十三年宋成十三年秦穆三十六年楚穆二年春王正月叔孫得臣會晉人宋人陳人衛人鄭人伐沈沈潰霸國大夫會諸夫夫伐國自此始汝沈杜注國名也汝南平輿縣北有沈亭今河南寧府汝陽縣東南六十里有平輿故城沈亭在其地左傳三年春莊叔會諸侯之師伐沈以其服於楚也沈潰凡民逃其上曰潰在上曰逃集説孫氏覺曰沈者楚所與之國也諸侯不忍楚之暴於是伐其所與之國將以懼之沈小國不勝而潰沈何罪乎春秋書之以諸侯為失所伐矣潰劉氏絢曰一被侵伐而民散君之不能可知矣蔡沈潰許潰是也諸王氏葆曰霸國大夫會諸大夫伐國自伐沈始會大夫救患自救鄭始春秋皆貶人之不與大夫之專政也蓋舉兵伐人使之畏服所謂威也率衆救人使免於難所謂福也威福人主之利器諸侯擅之則有害於天下大夫擅之則有害於國聖人見微知著故於此二役皆貶之所以戒威福之不可下移也名髙氏閌曰魯使卿往則諸國必非微者獨得臣書氏者詳內且明諸國皆卿行書人以貶之也文公三年之間遂敖得臣纍見於經則知魯政盡在諸臣矣漢五行志文公時大夫始専政信夫胡氏銓曰春秋侵伐之柄下移於諸侯自是遂移於大夫矣趙氏鵬飛曰內書得臣則外亦大夫矣外書人則亦人內矣晉襄紹霸未嘗一出與諸侯為衣裳之會而區區以大夫主之吾於此知晉襄之不足與有為矣襄公之霸易於桓文桓制楚於方張文敗楚於既熾難乎為力而襄公之世商臣有滔天之惡楚人棄之此襄公之霸資也而襄不能就乃竭力於無事之秦而以大夫主會卒之大夫橫於內諸侯受其弊區區潰蕞爾之沈以為能伐楚之與國也嗚呼隘矣宜聖人人之以示貶也家氏鉉翁曰楚商臣負滔天之罪於今二年使晉襄仗義而前天下諸侯孰不鼓勇而從者晉之霸業有光於前矣乃舍其大而務其細以諸侯之兵伐沈而潰之避豺虎而獵狐兔雖潰百沈何益乎故春秋貶人之案伐沈之役五國皆稱人先儒之説以為威福下移而政在大夫者高氏閌胡氏銓也以為諸侯失所伐而晉襄舍大務細不足有為者孫氏覺家氏鉉翁趙氏鵬飛也蓋皆以書人為貶也胡傳謂雖非義舉而與報復私怨者有間故其辭無褒貶恐非經旨今故不録附録左傳衛侯如陳拜晉成也夏五月王子虎卒左傳夏四月乙亥王叔文公卒來赴弔如同盟胡傳王子虎不書爵譏之也天子內臣無外交集説杜氏預曰不書爵者天王赴也翟泉之盟雖輒假王命周王因以同盟之例為赴孔氏穎逹曰王子虎即王叔文公也諡之為文必當有爵不書爵者畿內之國不得外交諸侯其臣不敢赴魯必天子為之赴赴以王子為親不復言其爵也之啖氏助曰穀梁云叔服也叔服若是王子則會葬時何不書王子乎曰趙氏匡曰臣無外交之禮今死而赴故書以譏又左氏云弔如同盟禮也案天子大夫無與諸侯盟之禮而曰禮也豈春秋之意乎虎孫氏復曰外大夫來赴非禮也劉氏敞曰王子者何天子之大夫也外大夫不卒此何以卒或曰為其嘗臨諸侯之盟也髙氏閌曰赴於諸侯而書其卒蓋著其交政於諸侯也氏陳氏傅良曰公榖以為叔服非是李氏亷曰左注王子虎太宰文公王卿士也內史叔服王之大夫也後十四年星孛之變又載叔服之言則分明兩人矣啖子陳氏亦以公穀為非不知胡氏何據且胡氏於星孛之下又引叔服之言則亦不以左氏為非矣不知何不照應如此汪氏克寬曰或者謂虎與卷皆夾輔天子於艱難危困之中故春秋賢而卒之然單穆公旗與劉文公翼贊敬王以安周室亦不書卒竊疑王子虎盟諸侯於王庭劉文公為王官伯尹氏世執朝權皆王室之秉政者故特赴於諸侯而魯史記其卒春秋存而弗削以示王臣不當赴喪於列國耳秦人伐晉左傳秦伯伐晉濟河焚舟取王官及郊晉人不出遂自茅津濟封殽尸而還遂霸西戎用孟明也君子是以知秦穆公之為君也舉人之周也與人之一也孟明之臣也其不解也能懼思也子桑之忠也其知人也能舉善也詩曰于以采蘩于沼于沚于以用之公侯之事秦穆有焉夙夜匪解以事一人孟明有焉詒厥孫謀以燕翼子子桑有焉王官杜注晉地今山西平陽府臨晉縣東南七十里王官谷有廢壘即王官城也郊杜注晉地史記取王官及鄗正義曰鄗音郊當為臨晉平陽間小邑茅津杜注在河東大陽縣西今山西平陽府平陸縣南有大陽渡即春秋茅津也有古茅城南對陜州胡傳案左氏秦伯伐晉濟河焚舟封殽尸而還其稱人何也聖人作易以懲忿室欲為損卦之象其辭曰損德之修也春秋諸侯之知德者鮮矣穆公初聽把子之請違蹇叔之言其名為貪兵是欲而不能窒也及敗於殽歸作秦誓庶幾能改將窒其欲矣復起彭衙之師報殽函之役其名為忿兵是忿而不能懲也今又濟河取郊人之稱斯師也何義哉晉人畏秦而不出穆公逞其忿而後悔自是見伐不報始能踐自誓之言矣是故於此貶而稱人備責之也集説程子曰搆怨連禍殘民以逞晉人畏之而不敢出秦人極其忿而後悔過聖人取其終能悔耳有陳氏傅良曰此秦伯也曷為貶稱人殽之誓孔子取焉而秦穆之連兵無虛歲故自韓原秦不以爵見於經此張氏洽曰穆公既歸自殽而作秦誓矣然彭衙及役猶以報復為事豈非悔過之心不能勝其恥敗之心而至此乎而趙氏鵬飛曰秦穆公伐晉以報前日三敗之辱也説者以穆公之霸在此齊桓晉文之霸聖人必有褒大之辭雖宋襄之無成春秋於曹南之盟亦必書爵以揭於諸侯之上今秦於殽之戰彭衙之役皆書師而於此乃書人豈謂其霸而反人之即孟子之所謂五霸者其實桓文而已宋襄之敗固所不録而秦穆楚莊皆無豫辭鄙秦楚也今秦人伐晉實忿兵矣前日之敗兵端皆啓於秦彼君子歟固亦懲忿窒欲爾且三敗豈晉敗之秦實伐人實自敗爾論者徒見其殽之敗有悔咎之誓孔子列於周書遂以為聖人豫秦穆今自殽之敗兵連禍結以戕其民安在其為悔也聖人特取誓之文而已非謂進秦穆也今焚舟之勝雖霸西戎春秋書曰人其貶可知矣鄭氏玉曰夫子於秦穆録其悔過之辭於書以為法著其窮兵之禍於春秋以為戒猶化工之於物生殺並行而不相悖也李氏亷曰左氏以此役為秦伯西戎之始且稱其舉人之周與人之一孟明之不解子桑之知人而胡氏諸説皆以為貶者左氏得其事胡氏論其義也來汪氏克寬曰穆公自誓之言追咎既往之失冀將之善不貴勇夫而貴良士惡媦疾而思彥聖期以保邦為念諄諄懇惻誠可為有天下國家者之法則夫子取之以繼四代之書而門人引之以釋大學平夫下章亦可謂善言矣胡乃不踐其言終用孟明報復至再必以勝晉而後已故書取其言而春秋責其事也説春秋者因左傳有霸西戎之一語而史記謬稱穆公益國十二開地千里天子使召公賀以金鼓然考傳之所記則踰二年而穆公卒其謂焚舟伐晉而遂霸者己非事實况證以經之書法自戰韓稱爵其後終穆公之身並以人書殽之役且以號舉反不若楚莊之見於經並紀其爵則許穆公以霸者妄矣秋楚人圍江左傳楚師圍江晉先僕伐楚以救江集説高氏閌曰江近楚自貫澤之盟已服從於齊桓而楚自城濮之後亦不敢侵伐今復圍者蓋晉文既沒襄公不能討楚人弒逆之惡故楚復有窺諸侯之意而先圍江以試之也吳氏􅊹曰自齊桓之霸江黃以近楚之國而從齊故楚憾之之深前既滅黃矣而未加兵於江者蓋江猶能守其國也故至今年有圍江之師所李氏亷曰經書人以圍國者十一圍非將卑師少能辦皆貶辭也黃氏正憲曰晉襄嗣位霸業始衰楚人已有侮心矣近又與秦為敵無暇圗楚商臣遂發兵圍江以威江淮間小國非専報伐沈之役也雨螽于宋左傳秋雨螽于宋公羊何以書記異也外異不書此何以書為王者之後記異也穀梁外災不志此何以志也曰災甚也其甚奈何茅茨盡矣著於上見於下謂之雨集説杜氏預曰自上而墮有似於雨來告故書來孫氏覺曰雨自上而下者也螽不見其所從自上而下衆多如雨而在宋之四境故曰雨螽于宋也黃氏仲炎曰春秋書外國之災有因弔問而知之者有聞而知之者宋大水公使弔焉是因弔問而知之者也六鷁退飛隕石雨螽之類非弔問也特聞而知之爾所趙氏鵬飛曰螽生於下今雨於上異之大者也此謂天降之災外災不書此何以書赴於我也或以為死而墜安知其為死吾欲聞之矣程氏端學曰螽生則害五穀况如雨之多害物甚災異極矣甚王氏樵曰螽非上隊之物來多而隊故書雨見災耳既為災則非隊而死也左氏因雨字而生説耳徐邈云禾稼既盡又食屋之茅茨驗嘗有之冬公如晉十有二月己巳公及晉侯盟此書公如晉之始左傳晉人懼其無禮於公也請改盟公如晉及晉侯盟晉侯饗公賦菁菁者莪莊叔以公降拜曰小國受命於大國敢不愼儀君貺之以大禮何樂如之抑小國之樂大國之惠也晉侯降辭登成拜公賦嘉樂集説高氏閌曰公之如晉蓋朝也非為盟也晉人於是請改盟夫盟已定矣又何改為公宜固辭乃復與盟皆非禮也能張氏洽曰不書地盟於晉都也趙氏鵬飛曰魯屈而事大國不憚於親朝以雪敖之抗晉能有忍不遽以干戈相向一盟而釋忿猶為知自反者也故聖人直文無諱非若二年及處父盟沒公以見耻處父去族以示貶者矣為李氏廉曰文公再如晉矣二年以見辱不書故此書公如晉之始侯汪氏克寬曰前此未有因朝聘而盟於國都者諸有不協之故則期會於某地而牲歃以示信己非盛世之事况因其朝聘而要之哉前年朝晉晉既以處父盟公於其國此年雖云改盟而猶要公之朝以約誓於國都甚矣文公之屈辱也晉襄苟懼其無禮曷不為會於晉魯之間以相盟乎厥後荀庚孫良夫郤犨孫林父向戌且因聘魯而要盟矣又其甚則把子以三恪之君亦即魯而歃盟焉始也魯君盟於霸國終也諸侯盟於魯世變可知矣晉陽處父帥師伐楚以救江公穀無以字左傳冬晉以江故告於周王叔桓公晉陽處父伐楚以救江門於方城遇息公子朱而還公羊此伐楚也其言救江何為諼也其為諼奈何伐楚為救江也穀梁此伐楚其言救江何也江逺楚近伐楚所以救江也胡傳以者不以者也救江善矣其書以何楚嘗伐鄭矣齊桓公逺結江黃合九國之師於召陵然後伐鄭之謀罷又嘗圍宋矣晉文公許復曹衛會四國之師於城濮然後圍宋之役解今江國小而弱非能與宋鄭比楚人圍之必不待徹四境屯戍守禦之衆與宿衛盡行也當是時楚有覆載不容之罪晉主夏盟宜合諸侯聲罪致討乃獨遣一軍逺攻強國豈能濟乎故書伐楚以救江言救江雖善而所以救之者非其道矣此春秋紀用兵之法也集説孫氏復曰先言伐楚而後言以救江者惡不能救江也楚人圍江陽處父帥師不急赴之乃先伐楚欲其引兵自救而江圍解非救患之師也故明年秋楚人滅江陳氏傅良曰晉大夫書帥師於是始大夫強也逼張氏洽曰楚商臣無父無君乃致患於江是禽獸人之甚晉襄不能率諸侯乘此時誅之此春秋特書以正其不能奉天討之罪也若吕氏大圭曰春秋之初有以大夫帥師者矣未有陽處父之専伐也內大夫帥師而不氏者則無駭帥師入極溺會齊師伐衛是也內大夫帥師而氏者公子慶父帥師伐於餘丘公孫兹帥師會侵陳是也而外大夫則未有帥師而出主名者若陽處父則帥師而出主名矣以見征伐之自大夫出也兵吳氏􅊹曰江受楚之伐霸者所當救也處父畏楚之強不敢徑趨江之城下乃揚言伐楚以救江門於方城一見息公之來即避之而返既不能救江又不能伐楚其畏怯也明矣以汪氏克寬曰春秋書侵伐多不言所事而此書伐救實為特筆考於傳之所録非惟楚侵陳以救鄭伐鄭以救齊不書雖齊桓伐厲以救徐亦止書伐厲而不書以救也豈非責處父既不能伐楚又不能救江而特起伐以救之文以罪之歟經書加兵於楚者三惟齊桓聲包茅不貢之罪而得屈完之服處父有伐楚之名而無討楚之實晉定公會十八國於召陵有伐楚之勢而僅為侵楚之陋春秋蓋惜之也偏王氏樵曰襄公實無制楚憂諸夏之誠心故僅遣師以塞責胡傳乃議其宜合諸侯以秦甲出武關以齊兵略陳蔡而南是時秦方為怨耦豈所能合然使襄公有真志而務其實則亦無賴於秦也案楚滅弦滅黃齊未嘗遣一旅之師至是圍江而晉人勤之既遣先僕於前又請王師於後命上卿動大衆聲罪而致討焉非徒以孤軍塞責也且傳稱門於方城遇息公子朱而還注謂子朱為楚伐江之師聞晉師起而江兵解故晉亦還是處父亦未嘗無功矣三年秋書圉四年秋書滅蓋江近於楚晉師既還楚師復出遂致滅耳故晉之罪在於不能存江而伐楚以救江則未見其罪也胡傳行世已久先儒多從之今仍其説而附見此義云戊襄王二戌十九年四年晉襄五年齊昭十年衛成十二年蔡莊二十三年鄭穆五年曹共三十年陳共九年杞桓十四年宋成十四年秦穆三十七年楚穆三年春公至自晉集説孫氏復曰自是公朝強國皆至者惡其輕去宗廟逺朝強國也孫氏覺曰文公之出六致之者四危之也不致者二安之也者汪氏克寬曰自是公如皆致如晉者凡二十書至十有三皆所以著其去國踰時之久或執或辱故危之也始也文公如晉則有處父要盟之恥而不書至迄其終也昭定六如晉而不見納書至河乃復焉又不若書至之為愈矣人君舉動之得失可不慎哉據事直書而義自見謂此類也附録左傳四年春晉人歸孔逹於衛以為衛之良也故免之夏衛侯如晉拜曹伯如晉會正夏逆婦薑于齊穀梁其曰婦薑為其禮成乎齊也其逆者誰也親逆而稱婦或者公與何其速婦之也曰公也其不言公何也非成禮于齊也曰婦有姑之辭也其不言氏何也貶之也何為貶之也夫人與有貶也胡傳逆皆稱女以未成婦而女者在父母家之所稱也往逆而稱婦入國不書至何哉此春秋誅意之效也禮制未終思念娶事是不志哀而居約矣方逆也而已成為婦未至也而如在國中原其意而誅之也不稱夫人薑氏者亦與有貶焉婦人不専行何以與有貶父母與有罪也文公不知敬其伉儷違禮而行使國亂子弒齊人不能鑒微知著冒禮而往使其女不允於魯皆失於不正其始之過也夫婦之際人倫之首禮不可不謹也故交貶之以為後鑒集説范氏寧曰婦禮成於齊故在齊便稱婦何楊氏士勛曰公羊傳曰其謂之逆婦薑于齊娶於大夫者略之也徐邈亦以為不書至不稱夫人下娶賤略之若以諸侯下娶大夫便為略賤則大夫亦不得上娶諸侯且天子得下婚諸侯何為諸侯不得下娶大夫是公羊之言不可以解此也蓋不稱夫人不言至者以其婦禮成於齊故異於餘稱傳曰夫人與有貶也者解不稱氏之意非釋不稱夫人也趙氏匡曰公自逆常事不書以成禮于齊所以變文云逆婦以譏之孫氏復曰此公逆婦薑于齊也不言公者諱之也不言逆女者以其成禮于齊也以其成禮于齊故不言公以諱之劉氏敞曰逆婦薑于齊正始之道也待之不以夫人之禮故夫人不以其位終國亂子弒強臣擅命幾於亡矣夫文公非不欲存妻子傳世者也暗弱惰慢不能率禮而行以為苟若而可何禮之守故卒至於禍也夫婦之際人倫之首可不愼哉故鑒末以原本因微以知著又非獨文公之罪也雖夫人預有罪矣當是之時夫人冒大禮以往遂無所據依以危其身而亡其子由本不正故也殆而呼天不亦晚乎吾以此觀之禮之於人大矣是存則存是亡則亡文公之不能保其後嗣者由無以刑其妻也夫人之不能安其位者由無以謹於禮也此正始之道也又曰公羊曰娶乎大夫略之也此雖孤經無他證據然魯初納幣乃用上卿審娶大夫者禮豈如此崇乎也程子曰納幣在喪中與喪昏同也稱婦薑已成婦不稱夫人不可為小君奉宗廟也張氏洽曰聖人嚴吉凶之辨蓋人之所以異於禽獸者正以有父子之親而三年之喪哀戚之至也國君為風教之首而納幣於喪中春秋變逆女為逆婦薑不成其夫人之禮以見人倫之本已失何以正是國人為後嗣之基乎大家氏鉉翁曰三傳不同穀梁之義為正公羊娶乎夫恐未然汪氏克寬曰春秋一經書逆夫人惟此年最略既不書逆者名氏文不書如齊不稱夫人不言氏不書至豈非聖人責文公首紊通喪之禮而然歟宣公之娶尤亟而書法加詳事同而既貶則從同同也陳氏際泰曰文薑不與桓偕入抗也哀薑不可見乎宗廟仇也出薑若己成為歸怠也女壯者或弒其夫或弒其子女弱者至不保其子與不允其身案納幣卿行則逆婦必非微者蓋文公自行也聖人惡其成禮於齊故沒公不書以示貶榖梁得之而左氏非也公羊以為娶於大夫則失之逺矣逆婦雖在免喪之後而納幣則在喪中先儒譏喪娶亦可兼用蓋圖昏於憂服而成禮於婦家所謂失禮之中又失禮也狄侵齊集説王氏葆曰大國如齊狄侵者四則其他邢衛魯鄭不足怪也趙氏鵬飛曰僖三十三年狄犯晉晉人敗之故其後狄不敢干晉之怒狄侵齊而齊不討故至是復侵齊汪氏克寬曰狄自箕之敗至是始復侵齊以晉襄無攘却之謀而齊伯不紹故也秋楚人滅江左傳楚人滅江秦伯為之降服出次不舉過數大夫諫公曰同盟滅雖不能救敢不矜乎吾自懼也君子曰詩云惟彼二國其政不獲惟此四國爰究爰度其秦穆之謂矣集説高氏閌曰江終為楚所滅則知楚之復強而處父之帥師無益於救張氏洽曰江之不祀晉襄之無遠謀也能趙氏鵬飛曰江之滅晉之恥而處父之罪也晉不服楚則何以庇江無以庇江則安保其無滅方江受楚圍使處父帥師直赴於江江鬬楚於前處父掎之於後楚兵未必不敗而奔也乃以區區之師伐楚欲楚兵釋江以自救宜其不能撼楚而致江之滅也江君不書奔死社稷也江之圍於是蓋期歲矣期歲必不下則江君之賢否抑亦可見歟滅不見執不書奔則江雖滅其君之義固存也吳氏􅊹曰三年之秋楚人圍江晉人陽為救之之名而無救之之實江之受圍周一期而其國竟滅晉霸不競而荆楚得以肆其虐於小國可哀也夫而汪氏克寬曰公羊云入不言圍書其重者黃書伐江書圍著齊晉之不能救也滅者亡國之善辭上下之同力江黃之君不書奔不書以歸則能固守待援而死於其位又可知矣晉侯伐秦左傳秋晉侯伐秦圍邧新城以報王官之役邧杜注秦邑當在今澄城縣境十新城杜注秦邑今陜西西安府澄城縣東北二里有古新城地名考曰即梁國之新里也集説程子曰秦逞忿以伐晉晉畏而避之其見報乃常情也秦至此能悔過矣故不復報晉聖人取其能遷善也稱晉侯不復加譏見秦宜得報而自悔不復修怨乃其善也朱子曰謂書晉侯而以常情待晉襄書秦人而以王事責秦穆恐未必如此程子所謂微辭隱義未易言也張氏洽曰晉襄以王官之役不報為恥未若商臣之得志於江為恥之大也報秦而不誅商臣使亂臣賊子得以夷滅小弱逞其凶毒晉襄之為盟主末矣比事書之深罪晉侯不以江亡為恥而敵秦怨也趙氏鵬飛曰三年秦人伐晉雖報三敗之辱其實非義舉也三敗秦自敗何報之有秦報之非似晉報之為是矣雖然聖人豈欲人之興戎交怨而不釋哉實均罪人也然曲直施報之文不辨則無以寓夫褒貶故於秦書人而晉書侯其曲直是非之理判矣兵李氏廉曰秦穆晉襄五年之間交者五止此案伐秦之役經書晉侯張氏洽以為深罪襄公者是也自戰殽以來晉屢勝秦及秦伯濟河焚舟而晉避不出兩國勝負亦相當矣今又伐秦是日尋干戈以相讎也况救江則遣大夫伐秦則君親之故書晉侯伐秦於滅江之下以見其急於修怨而緩於恤患也趙氏鵬飛以晉報為是蓋以秦晉交兵釁起自秦故晉無譏爾其説亦通胡氏安國謂春秋以常情待晉襄以王事責秦穆不責晉侯者正所以深善秦伯則朱子亦疑其説矣今故不録衛侯使寧俞來聘左傳衛寧武子來聘公與之宴為賦湛露及彤弓不辭又不答賦使行人私焉對曰臣以為肄業及之也昔諸侯朝正於王王宴樂之於是乎賦湛露則天子當陽諸侯用命也諸侯敵王所愾而獻其功王於是乎賜之彤弓一彤矢百玈弓矢千以覺報宴今陪臣來繼舊好君辱貺之其敢干大禮以自取戾集説趙氏鵬飛曰禮諸侯歲相問也殷相聘也殷衆也殷見曰同十有二年五服盡朝故曰殷見殷見既畢諸侯更遣大夫以交聘於鄰邦是之謂殷相聘今殷見則亡而殷聘則存所亡者在周而所存者在諸侯則知諸侯強而周室微矣子太叔曰文襄之霸也其務不煩令諸侯三歲一聘五歲一朝則三歲之聘本於文襄今襄公未沒諸侯其敢違之則寧俞之聘霸主令也霸主之令則然矣周公之典安在哉此聖人書之以傷周道也衛吳氏􅊹曰案左氏所載晉文公之季年諸侯朝晉成公獨不朝又使孔逹侵鄭伐綿訾及匡晉襄公既祥使告於諸侯而伐衛圍戚取之衛不服罪而孔逹敢伐伯主其明年晉會諸侯于垂隴將伐衛幸得陳侯為之請成執孔逹以説于晉而衛遂得免於晉伐自孔逹遭執之後蓋寧俞代之為政至次年春衛從晉伐沈自此衛服伯主而無事矣至次年春晉遂歸孔逹其夏衛侯朝晉至秋而來聘魯焉事大睦鄰以安社稷或者皆出寧俞之謀也夫子稱其知可及者蓋如此冬十有一月壬寅夫人風氏薨左傳冬成風薨胡傳風氏僖公之母莊公妾也而稱夫人自是嫡妾亂矣語曰邦君之妻邦人稱之曰君夫人稱諸異邦曰寡小君蓋敵體之稱也若夫妾媵則非敵矣其生亦以夫人之名稱號之其卒亦以夫人之禮卒葬之非所以正其分也以妾媵為夫人徒欲尊寵其所愛而不虞卑其身以妾母為夫人徒欲崇貴其所生而不虞賤其父卑其身則失位賤其父則無本越禮至是不亦悖乎夫禮庶子為君為其母無服不敢二尊者也春秋於成風記其卒葬各以實書不為異辭者謹禮之所由變也集説陸氏淳曰啖子曰自成風之後妾母皆僭用夫人之禮程子曰自成風以後妾母稱夫人嫡妾亂矣仲子始僭尚未敢同嫡也稱蘇氏轍曰僖公之妾母也凡魯君之妾母其生也夫人其沒皆以夫人之禮成之而天子諸侯亦以夫人之禮禮之考之舊典則非禮也然春秋書之不為異詞者君臣之禮也以朱子曰僖公成風與晉簡文帝鄭太后一也皆所著妾母之義陳氏傅良曰夫人某氏嫡稱也喪之以夫人之禮也隱公之喪桓母猶有疑焉是故别廟也祔姑稱諡伉然如夫人則自文公之喪成風始秋薛氏季宣曰妾母為夫人僭也僭則何以取乎春不沒其實也黃氏仲炎曰惠公仲子而不稱夫人是當時猶不以夫人稱之也今以夫人稱成風則已甚矣或曰子為君而不得尊其母可乎曰為人子以所當得者加於其親而親安之則孝在是矣苟以其所不當得者加於其親使其親無以安之可謂孝乎誼齊氏履謙曰哀薑以罪誅死雖還其喪而葬之於不可以入宗廟故僖公緣此誼尊成風為夫人以妾亂嫡非所以正名分尊君父也至其後世宣母敬嬴襄母定姒昭母齊歸哀母弋氏皆援例以立失禮自成風始也春秋惟弋氏文獨異説者以為哀未逾年餘並同夫人書之不沒其實而已陳氏際泰曰歸仲子之賵考仲子之宫已有夫人之實特未被以夫人之名爾踵事增華變本加厲又何怪焉禮之失也自成風昉也成風之為夫人也自仲子昉也已襄王三亥十年五年晉襄六年齊昭十一年衛成十三年蔡莊二十四年鄭穆六年曹共三十一年陳共十年把桓十五年宋成十五年秦穆三十八年楚穆四年春王正月王使榮叔歸含且賵含户暗反公羊含者何口實也其言歸含且賵何兼之也穀梁含一事也賵一事也其曰且志兼也胡傳珠玉曰含車焉曰賵歸含且賵者厚禮妾母也不稱天王者弗克若天也春秋繫王於天以定其名號者所履則天位也所治則天職也所敇而惇之者則天之所敘也所自而庸之者則天之所祑也所賞所刑者則天之所命而天之所討也夫婦人倫之本王法所尤謹者今成風以妾僭嫡王不能正又使大夫歸含賵焉而成之為夫人則王法廢人倫亂矣是謂弗克若天而悖其道非小失爾故特不稱天以謹之也集説杜氏預曰珠玉曰含含口實車馬曰賵成風莊公之妾天子以夫人禮賵之范氏寧曰榮叔天子之上大夫也榮采地叔字當孔氏穎達曰公羊傳曰兼之非禮也賈服云含賵異人今一人兼兩使故書且以譏之案禮雜記諸侯相弔之禮含禭賵臨同日而畢與介代有事焉不言遣異使也言且者見有二禮而已宰咺言來歸此不言來者穀梁傳曰其不言來者不周事之用也賵以早而含以晚其意以為含者所以實口當及未殯而至以其至晚故不言來以責王也案雜記含者執璧將命坐委於殯東南有葦席既葬蒲席然則含禭者所以助喪盡恩示其有禮而己既葬猶尚致之不必以濟其用天子之與鄰國莫不道路長逺赴者猶尚不至責其未殯而來此是禮之不通也且來者自外之文非是褒貶之意宰咺言來豈周事之用者乎一趙氏匡曰公穀皆云兼之非禮也據禮含賵禭止人兼行爾若每事須一人則罄王朝之臣不足以充喪禮之使也子劉氏敞曰王使榮叔歸含且賵不知者乃以謂天賵人之妾小過爾而譏之深求車殺母弟大惡也而譏之略是不及知春秋正人倫之意也君臣也父子也夫婦也治之三綱也道莫先焉桓以臣弒君而王命之成風以妾僭嫡而王成之於三綱廢矣是失人之所以為人也王之無天不亦明乎不程子曰天子成妾母為夫人亂倫之甚失天理矣稱天義已明稱叔存禮也則陳氏傅良曰賵常事不書惟賵仲子成風特書之遂命為夫人也春秋之初猶以為非常事也宣之敬嬴襄之定姒昭之齊歸雖命為夫人不復書矣孟子卒不赴於京師孔子曰夫人之不命於天子自昭公始也喪汪氏克寬曰禮經天子諸侯於妾無服而周官職掌諸侯之喪及卿大夫士凡有爵者之喪亦不及邦國夫人之喪也今王臣含賵則是魯以成風之喪赴於京師矣夫人之喪猶不當赴於王况妾母乎王之賜以含賵其責已深而魯之往赴其罪亦不可掩春秋王禮之施於魯者惟桓文二公為數且盛而紊瀆三綱有知此者亦可悲夫案魯弒君始桓僭嫡始成風王不能正而又成之故錫命歸含賵會葬王皆不稱天以謹其始僭嫡不謹之於仲子者仲子不稱夫人又别立宫未全乎僭故於其歸賵也名宰而已或疑王不稱天為闕文則榮叔歸含賵偶一闕焉可也不應召伯會葬又闕三月辛亥葬我小君成風公羊成風者何僖公之母也胡傳仲子雖聘非惠公之嫡也春秋之初尚以為疑故别為立宫而羽數特異此雖非禮之正然不袝於姑猶有辨焉至是成風書葬乃有二夫人祔廟而亂倫易紀無復辨矣故禮之失自成風始也集説何氏休曰風氏也任宿顓臾之姓夫孫氏復曰成諡也程氏端學曰小君者嫡人之稱而妾母稱之又私諡焉亂禮甚矣正汪氏克寬曰後世以妾母為正嫡至於襄事乃黜嫡而嬖妾合葬焉如中宗之葬乾陵嚴善思諫而弗止循襲而莫知其失矣孰有如漢之孝文自謂側室之子而不以為嫌者乎王使召伯來會葬召穀作毛左傳召昭公來會葬穀梁會葬之禮於鄙上胡傳王臣下聘桓公冢宰書名示貶而大夫再聘則無譏焉或以為從同同也或以為同則書重也成風薨王使榮叔歸含且賵既不稱天矣及使召伯來會葬又與貶焉何也歸含且賵施於妾母已稠疊矣又使卿來會葬恩數有加焉是將祔之於廟也而致禮於成風盡矣聘一也含賵而又葬則其事益隆亂人倫廢王法甚矣再不稱天者聖人於此尤謹其戒而不敢略也集説杜氏預曰召伯天子卿也召采地伯爵曰范氏寧曰從竟至墓主為送葬來劉氏敞左氏曰禮也非也禮庶子為君為其母無服不敢二尊者也妾母稱夫人王不能正而又使公卿會葬何禮之有故杜氏諤曰薨而賵含尚曰不可况又使卿會葬乎復去天以示義程子曰天子以妾母同嫡亂天理也故不稱天聖人於此尤謹其戒王蘇氏轍曰諸侯必有使來會葬者矣以微故不録人雖微必書石尚歸脤是也而况召伯乎見陳氏傅良曰王不稱天於追錫桓公見之至是再以夫人之禮喪成風也莊僖之際天下知有盟主而已而襄王之季年更有事於諸侯於是叔服會葬毛伯錫命尤汲汲於魯也尤汲汲於魯而何為乎成風一人賵含之一人葬之以是懷諸侯吾見周之益陵夷矣宰咺嘗以賵妾母貶則召伯何以不貶王公一體也宰書名則王不待貶而自見王不稱天則召伯不待貶而自見也桓以少篡長成風以庶亂嫡王道熄矣而莊襄不能正又從而褒賞之是以天命施之天討也故皆不稱天施家氏鉉翁曰天子之於諸侯有會葬之禮非所以之妾母也元年書叔服此年書召伯五年之間後先兩會葬或稱天王或王不稱天比事而觀著義豈不甚明乎汪氏克寬曰春秋君夫人葬惟僖公及成風王使大夫來會施湛氏若水曰會葬之禮諸侯所以尊天子天子答於諸侯猶之可也而施於妾母是成其夫人而教人以妾僭嫡矣紊名分逆天理莫此之甚者也故春秋既書王使榮叔歸含且賵又書王使召伯來會葬則王之不王其過自不可掩矣夏公孫敖如晉集説髙氏閌曰王含且賵又來會葬矣捨天王而謹事晉不待貶而惡見也吳氏􅊹曰三年之冬公朝晉今又使卿往聘焉魯之謹於事霸主也魯臣如晉聘者二十四致襚會葬者又四焉始於公子遂而終於季孫斯仲孫何忌或疏或數或無所為或有所為考其時與事而得失見矣秦人入鄀鄀音若左傳初鄀叛楚即秦又二於楚夏秦人入鄀集説髙氏閌曰鄀蓋微國秦以其叛而入之後遂為楚所並楚昭王復國之後畏吳之強去郢而都鄀矣懷趙氏鵬飛曰穆公之霸西戎以威勝而已無德以之故不足以宗諸侯也楚商臣不君鄀叛楚而即秦以穆之霸為足恃也及楚滅江則鄀懼而二於楚秦不能以德柔之而稱兵入鄀彼區區小邦一舉可滅矣而穆公亦念所以致鄀之二於楚者誰也秦誓曰責人斯無難惟受責俾如流吾見徒能言之矣田家氏鉉翁曰齊桓滅遂降鄣晉文請隧弗許則受至以兵取之秦穆滅滑入鄀是三君者天理人欲往來於方寸之間所以僅能為霸君子羞稱焉鄀季氏本曰秦自入滑以窺東諸侯而不得至是入以窺楚也非晉迫其東則其肆行豈在楚下哉秋楚人滅六六杜注六國廬江六縣今在江南廬州府六安州北左傳六人叛楚即東夷秋楚成大心仲歸帥師滅六冬楚公子燮滅蓼臧文仲聞六與蓼滅曰皋陶庭堅不祀忽諸德之不建民之無援哀哉蓼杜注蓼國安豐蓼縣今河南汝寧府固始縣東北蓼城岡其地即古蓼國漢蓼縣集説髙氏閌曰楚人滅江滅六敢肆其惡逆如此者以列國不正其弒逆之罪故也吕氏祖謙曰邾滅須句楚滅六蓼夫須句司大皞之祀六蓼實皋陶之後此皆先王所封諸侯唐虞三代綿延不廢何故才入春秋之世便見屠戮蓋向時間有聖賢之君相與維持故得世守其國祀至此先王德澤既斬故先王之諸侯亦不能自存此最見得天下大勢事家氏鉉翁曰武王訪帝王聖賢之後紹其封盛德也周綱陵遲先代之後蠶食無餘若滅夔滅六滅蓼之類是也吳氏􅊹曰晉襄公死期將及故其志氣不能如初年之盛紹霸之業浸以衰微故秦楚敢於肆行吞噬弱小而無所忌也冬十月甲申許男業卒集説林氏堯叟曰僖公卒昭公錫我立附録左傳晉陽處父聘於衛反過寧寧嬴從之及溫而還其妻問之嬴曰以剛商書曰沈漸剛克高明柔克夫子一之其不沒乎天為剛德猶不干時况在人乎且華而不實怨之所聚也犯而聚怨不可以定身余懼不獲其利而離其難是以去之晉趙成子欒貞子霍伯臼季皆卒寧杜注晉邑汲郡修武縣今河南衛輝府獲嘉縣西北有修武故城古寧邑秦置縣庚襄王三子十一年六年晉襄七年齊昭十二年衛成十四年蔡莊二十五年鄭穆七年曹共三十二年陳共十一年把桓十六年宋成十六年秦穆三十九年楚穆五年春葬許僖公集説俞氏皋曰不書月史闕文也附録左傳六年春晉搜於夷舍二軍使狐射姑將中軍趙盾佐之陽處父至自溫改搜於董易中軍陽子成季之屬也故黨於趙氏且謂趙盾能曰使能國之利也是以上之宣子於是乎始為國政制事典正法罪辟獄刑董逋逃由質要治舊汙本秩禮續常職出滯淹既成以授大傅陽子與大師賈他使行諸晉國以為常法夷杜注晉地西董杜注河東汾陰縣有董亭汾陰今絳州屬山平陽府有董澤在聞喜縣東北四十里接絳州界夏季孫行父如陳左傳臧文仲以陳衛之睦也欲求好於陳夏季文子聘於陳且娶焉集説杜氏預曰臣非君命不越竟故因聘而自為娶范氏寧曰行父季友孫黃氏仲炎曰春秋書內大夫出聘者其旨有四有書以見簡禮者有書以見諂禮者有書以見大夫専命者有書以見大夫私行者所謂簡禮者公子遂如京師叔孫得臣如京師之類是也諸侯不朝而使大夫聘也諂禮者季孫行父如晉繼於公孫敖如晉之明年之類是也使幣頻煩而不知節也大夫専命者公子遂叔孫得臣如齊之類是也非君命而行也大夫私行者公子友如陳公孫兹如牟季孫行父如陳之類是也蓋公子友以原仲之舊而兹行父以娶婦之故於是託君命以遂其私也吳氏􅊹曰此亦行父欲迎婦於陳而請於君借聘禮以行前此魯陳未嘗有邦交也祖汪氏克寬曰季友如陳者再今行父之往蓋因其之舊好假公室之聘而圗婚耳春秋特書公子友葬原仲而行父之娶於陳公孫兹娶於牟嬰齊娶於莒皆止書如所以貶季友之私行而不豫行父兹嬰齊因聘以濟其私欲也自逆猶可敖如莒涖盟而代弟逆婼聘宋而為意如逆則又甚矣附録左傳秦伯任好卒以子車氏之三子奄息仲行針虎為殉皆秦之良也國人哀之為之賦黃鳥君子曰秦穆之不為盟主也宜哉死而棄民先王違世猶詒之法而况奪之善人乎詩曰人之云亡邦國殄瘁無善人之謂若之何奪之古之王者知命之不長是以並建聖哲樹之風聲分之采物著之話言為之律度陳之藝極引之表儀豫之法制告之訓典教之防利委之常秩道之以禮則使毋失其土宜衆隸賴之而後即命聖王同之今縱無法以遺後嗣而又收其良以死難以在上矣君子是以知秦之不復東征也秋季孫行父晉如左傳秋季文子將聘於晉使求遭喪之禮以行其人曰將焉用之文子曰備豫不虞古之善教也求而無之實難過求何害集説朱子曰季文子三思而後行如使晉而求遭喪之禮以行亦其一事也汪氏克寬曰王制諸侯於天子比年一小聘三年一大聘五年一朝文公即位六年君朝於晉者再而貴卿比年往聘過於事天子之禮而京師之朝終其世不見於經蓋諸侯知有霸主而不知有王也黃氏正憲曰季文子専執國政不能以禮佐其君乃與敖相繼出聘阿結強援故既書如陳又書如晉所以著其私交樹黨為三家僭竊之漸也八月乙亥晉侯歡卒歡喚官反公作歡左傳八月乙亥晉襄公卒靈公少晉人以難故欲立長君趙孟曰立公子雍好善而長先君愛之且近於秦秦舊好也置善則固事長則順立愛則孝結舊則安為難故故欲立長君有此四德者難必抒矣賈季曰不如立公子樂辰嬴嬖於二君立其子民必安之趙孟曰辰嬴賤班在九人其子何震之有且為二嬖淫也為先君子不能求大而出在小國辟也母淫子辟無威陳小而逺無援將何安焉杜祁以君故讓逼姞而上之以狄故讓季隗而已次之故班在四先君是以愛其子而仕諸秦為亞卿焉秦大而近足以為援母義子愛足以威民立之不亦可乎使先蔑士會如秦逆公子雍賈季亦使召公子樂於陳趙孟使殺諸郫郫杜注晉地博物記垣縣有邵郫之厄今河南懷慶府濟源縣西一百里有郫亭唐置邵元縣於此與山西垣曲縣接界集説李氏琪曰齊孝公不能率桓公之烈晉襄能繼晉文之統孝公初宋有抑齊之志襄公初秦懷駕晉之謀宋啓甗之爭秦尋殽之釁此皆爭霸之端也孝公不能抗宋而襄公首能挫秦此晉之所以未失伯也文公之沒三強並興秦雄西陲狄狃北師楚復強於南苟縱一敵則晉伯去矣襄公夏戰殽以却秦秋敗箕以翦狄冬伐許以離楚一年之間三敵悉退亦可謂有伯者之略此其能繼文者也苟有伯者之略則襄公之烈何為僅止乎此曰外患既息舉動即異伐衛則損威矣會公孫敖則毁列矣士穀主盟則權散矣處父救江則謀怠矣越一二載事不逮初况能持久乎是以君子不貴速成而圗全於其終不志小利而慮患於其逺襄之規模又後於文公甚矣冬十月公子遂如晉葬晉襄公左傳冬十月襄仲如晉葬襄公集説杜氏預曰卿共葬事文襄之制也三月而葬速孔氏穎達曰昭三十年傳曰先王之制諸侯之喪士弔大夫送葬昭三年傳曰昔文襄之霸也其務不煩諸侯君薨大夫弔卿共葬事是也汪氏克寬曰鄭子大叔曰先王之制諸侯之喪士弔大夫送喪稽之於經前此未有使卿送葬者雖桓文之霸止遣微者會葬蓋晉文昉為霸令使大夫弔卿共葬事故叔孫婼葬平公季孫意如葬昭公馴致少薑以妾媵而諸侯使卿會葬矣又曰趙盾患秦之送公子雍欲禦秦師故急於襄事季氏本曰晉自襄以後書葬者悼平昭頃皆甫三月不知其故豈其意在速定嗣君而遂以為常制歟晉殺其大夫陽處父晉狐射姑出奔狄射穀作夜左傳賈季怨陽子之易其班也而知其無援於晉也九月賈季使續鞫居殺陽處父十一月丙寅晉殺續簡伯賈季奔狄宣子使臾駢送其帑夷之搜賈季戮臾駢臾駢之人欲盡殺賈氏以報焉臾駢曰不可吾聞前志有之曰敵惠敵怨不在後嗣忠之道也夫子禮於賈季我以其寵報私怨無乃不可乎介人之寵非勇也損怨益仇非知也以私害公非忠也釋此三者何以事夫子盡具其帑與其器用財賄親帥扞之送致諸竟公羊晉殺其大夫陽處父則狐射姑曷為出奔射姑殺也射姑殺則其稱國以殺何君漏言也其漏言奈何君將使射姑將陽處父諫曰射姑民衆不説不可使將於是廢將陽處父出射姑入君謂射姑曰陽處父言曰射姑民衆不説不可使將射姑怒出刺陽處父於朝而走穀梁稱國以殺罪纍上也襄公已葬其以纍上之辭言之何也君漏言也上泄則下暗下暗則上聾且暗且聾無以相通夜姑殺者也夜姑之殺奈何曰晉將與狄戰使狐夜姑為將軍趙盾佐之陽處父曰不可古者君之使臣也使仁者佐賢者不使賢者佐仁者今趙盾賢夜姑仁其不可乎襄公曰諾謂夜姑曰吾始使盾佐女今女佐盾矣夜姑曰敬諾襄公死處父主竟上事夜姑使人殺之君漏言也故士造辟而言詭辭而出曰用我則可不用我則無亂其德胡傳公羊子曰晉殺其大夫陽處父則狐射姑曷為出奔射姑殺也射姑殺則其稱國以殺何君漏言也易曰不出戶庭無咎何謂也子曰亂之所生則言語以為階君不密則失臣臣不密則失身幾事不密則害成是以君子慎密而不出也凡書殺者在上則稱君在下則稱氏在衆則稱人在微則稱盜君與臣同殺則稱國今殺處父者射姑耳君獨以漏言故亦預殺焉所以為後世戒也或以處父為侵官非歟曰人君用人失當則其國必危凡立於朝者舉當諫君况身為晉國之太傅邪若以為侵官將相大臣非其人百官有司失其職在位者當拱默自全隱聽人主之所為至於顛危而不救則將焉用彼相乎率天下臣子為持祿容身不忠之行以誤朝迷國者必此侵官之説夫集説范氏寧曰親殺者夜姑而歸罪於君明由君言而殺之罪在君也劉氏敞曰左氏曰侵官也案左氏此事始末罪處父獨有稱趙宣子為能耳改搜易將凡出晉侯何以謂處父侵官邪人君任賢不稱必將致敗苟食祿者舉當諌君况處父晉國太傅邪以此為侵官是教大臣為拱默也如使大臣見賢而舉謂之侵官見賢而不舉乃其職矣不亦謬乎君孫氏覺曰春秋殺大夫之例自下殺之者稱人自殺之者稱國襄公既卒新君方幼殺之者決非其君然書之以君殺之為文蓋公穀之説以為其君漏言而狐射姑殺之君漏言而處父見殺焉則殺之者君耳非身殺之而以告言殺之亦等爾亦何論君亡乎二傳之説皆是大王氏葆曰詩曰紹庭上下陟降厥家謂人君升黜臣當由直道也襄公儻以大公至正之道上下其臣雖豫奪不盡當人亦退聽而無所歸咎今乃漏言於射姑嫁怨於處父則是處父之罪襄公致之矣處高氏閌曰先書晉殺處父繼書射姑出奔則實殺父之罪自著矣陳氏傅良曰兩下相殺其書國殺何春秋之法苟有賊而不知則其君之罪也是故晉胥童殺三卻欒書中行偃殺胥童齊崔杼殺髙厚鄭子展子西殺公子嘉皆稱國而已矣張氏洽曰據左氏則若晉國之事一聽於陽處父者及考穀梁所謂君漏言則是易中軍乃處父密言於襄公公不能謹而輕漏之以致射姑之殺處父春秋所以分其殺於君與大夫也而家氏鉉翁曰射姑以私怨殺一大夫其罪固當誅處父以私意黨趙氏使盾由是為政於晉擅廢立専刑賞其末流遂有弒君之事然則處父固當言言而以私乃其罪也吳氏􅊹曰是時襄公已卒而書國殺者若曰處父今日之死實襄公殺之也閏月不告月猶朝于廟告音梏左傳閏月不告朔非禮也閏以正時時以作事事以厚生生民之道於是乎在矣不告閏朔棄時政也何以為民穀梁不告月者何也不告朔也胡傳不告月者不告朔也不告朔則曷為不言朔也因月之虧盈而置閏是主乎月而有閏也故不言朔而言月占天時則以星授民事則以節候寒暑之至則以氣百官修其政於朝庶民服其事於野則主乎是焉耳矣閏不可廢乎曰迎日推䇿則有其數轉璣觀衡則有其象歸竒於扐以象閏數也斗指兩辰之間象也象數者天理也非人所能為也故以定時成歲者唐典也以詔王居門終月者周制也班告朔於邦國不以是為附月之餘而弗之數也猶朝于廟者幸其不己之辭子貢欲去告朔之餼羊子曰爾愛其羊我愛其禮集説何氏休曰禮諸侯受十二月朔政於天子藏於大祖廟每月朔朝廟使大夫南面奉天子命君北面而受之比時使有司先告朔謹之至也受於廟者孝子歸美先君不敢自専也言朝者緣生以事死親在朝朝莫夕已死不敢泄鬼神故事必於朔者感月始生而朝杜氏預曰諸侯每月必告朔聽政因朝宗廟文公以閏非常月故闕不告朔怠慢政事特孔氏穎逹曰論語云子貢欲去告朔之餼羊是用羊告於廟謂之告朔人君即以此日聽視此朔之政謂之視朔十六年公四不視朔僖五年傳曰公既視朔是也視朔者聽治此月之政亦謂之聽朔玉藻云天子聼朔於南門之外是也其日又以禮祭於宗廟謂之朝廟周禮謂之朝享其歲首為之則謂之朝正襄二十九年正月公在楚傳曰釋不朝正於廟是也告朔視朔聽朔朝廟朝享朝正二禮各有三名同日而為之也文公以閏非常月故闕不告朔啖氏助曰公穀言不告月為是非也案經文言不告月明當告也孫氏復曰春秋二百四十二年閏月多矣獨此書不告月者是常告也文既不告閏月猶朝於廟非禮可知劉氏敞曰諸侯歲受朔於天子退而藏之祖廟朔告月於祖廟退而班之百官正也閏不告月非正也朝廟為告月也不告月而朝廟亦非正也又曰公羊謂不告朔禮也猶朝於廟非禮也非也閏雖無常而政有常安得不告假令閏十二月者必有立春立春之政所當告也若就前月告之則先時若就後月告之則不及時夏書曰先時者殺無赦不及時者殺無赦由是觀之則自當告也禮杜氏諤曰春秋志文公廢告朔而猶朝廟是幸其不盡廢聖人愛禮之深意也繹蘇氏轍曰春秋蓋有同辭而異實者矣猶三望猶可以己也猶朝於廟幸其不己也則王氏葆曰不曰朔而曰月蓋朔者月之初吉而月積日而成也以閏月而不告則一月之政俱不舉聖人變文而書為怠政而設也而高氏閌曰苟知朝廟之不可己則告月之禮曷為可已哉朱子曰閏者所以定四時成歲天子以為月而頒之為諸侯而不奉以告是輕正朔而慢時令也公穀以為附月之餘日又曰天子不以告朔此説己非而猶字之義諸傳皆以為可己之辭大率皆譏其舍大政而謹小禮獨胡傳以為幸其不己之辭以我愛其禮證之則此義精矣黃氏仲炎曰自文公怠棄時政以閏月為非常月而廢告月之禮漸致其後雖常月亦不告矣此子貢所以欲去告朔之餼羊也汪氏克寬曰有朔而無中者為閏月月有晦朔則自然有閏無閏則失月行之數故曰主乎月而有閏也日月所會是謂辰以厯言之則是積飭分而置閏以日月星辰觀之則閏月日月亦會於辰與他月無以異也又曰周天三百六十五度四分度之一日一日一周在天為不及一度積三百六十五日四分日之一而與天會為一歲月一日不及天十三度十九分度之七積三百五十四日九百四十分日之三百四十八而與日會者十二為一年大率三百六十日為常數一嵗多五日九百四十分日之二百三十五分為二十四氣是為氣盈而晝夜長短節氣寒暑於是定焉一年少五日九百四十分日之五百九十二分為十二月是為朔虛而晦朔弦望於是定焉積歲之有餘就年之不足而後有閏三年一閏尚餘三日有竒五年再閏則少五日有竒積十九年閏在十二月則氣朔分齊大率三十二月則有閏閏前之月中氣在晦閏後之月中氣在朔若歷不置閏則弦望晦朔皆非其正晝夜平分不在春秋之中而寒暑反易矣故書云以閏月定四時成歲周禮注中數曰歲朔數曰年中朔大小不齊正之以閏乃天地自然之理歷家因其自然而立積分之數以合之耳公羊謂閏月天無是月榖梁謂附月之餘日皆非是夫二十九日九百四十分日之四百九十九而晦朔交則為一月月非有閏之名特以日月行天疾徐之不同而歲年盈縮之有異遂謂之閏天與日月之行自然有閏豈可謂天無是月哉月非有餘也又豈可謂附月之餘哉月之有閏則由乎天而月之名閏乃由於人故於文王在門為閏禮稱天子閏月則聼朔於明堂闔門左扉立於其中王之謹乎閏月者如此而諸侯安可不告月哉考之經傳凡言閏月多在歲終蓋是時厯法謬矣每置閏於歲終故左傳以閏三月為非禮則無中者不謂之閏而名曰閏者非閏月矣秦之後九月實倣於此是宜當時之卿大夫以天無是月指為厯家所置而導其君廢告朔之禮也説經者且曰天子不告朔尚何責昏庸之魯文也哉春秋書猶朝廟即聖人愛禮存羊之意謂朔雖不告而朝廟不廢則告朔之禮猶有存者公穀皆曰猶者可以己也杜預亦云可止之辭大失春秋之意蓋聖人傷魯文之怠慢政事故特書不告月猶朝於廟若曰不如此而尚幸其如此將已而不遂己是知其不可已而自不能己也與猶三望猶繹之義不同閏嚴氏啓隆曰此閏月閏十二月也經書月者二皆在十二月辛襄王三丑十二年七年晉靈公夷皋天年齊昭十三年衛成十五年蔡莊二十六年鄭穆八年曹共三十三年陳共十二年杞桓十七年宋成十七年秦康公罃元年楚穆六年春公伐邾左傳七年春公伐邾間晉難也集説杜氏預曰公因霸國有難而侵小三月甲戌取須句句公作朐左傳三月甲戌取須句置文公子焉非禮也集説杜氏預曰絶太皞之祀以與鄰國叛臣僖公反其君之後邾復滅之今邾文公子叛邾在魯故公使為守須句大夫句孫氏復曰惡再取也案僖二十二年公伐邾取須後其地復入於邾劉氏敞曰公羊曰取邑不日此何以日內辭也使若他人然非也僖公時亦嘗伐邾取須朐矣何不為內辭哉穀梁曰取邑不日此其日何也不正其再取故謹而日之非也設不日則聽其取乎諸取邑不日者皆聼之矣君黃氏仲炎曰齊靈公與臧紇言伐晉臧紇對曰抑似鼠夫鼠晝伏夜動不穴於寢廟畏人故也今君聞晉之亂而後作焉非鼠而何觀魯文公聞晉難而伐邾取邑是亦臧紇之所謂鼠者爾汪氏克寬曰僖公雖曰私其母家猶有崇明祀保小寡之義文公乘霸國之喪貪土地而舍逋逃其罪益甚矣遂城郚郚音吾山郚杜注魯邑卞縣南有郚城今在東兗州府泗水縣東南穀梁遂繼事也集説杜氏預曰因伐邾師以城郚備邾難僖孫氏復曰遂城郚重勞民也趙氏鵬飛曰公蓋嘗伐邾取須句矣其後復歸之今文公效尤復伐而取焉僖公有善文弗率也僖公之失必履其轍吾於此尤見文之不子矣既伐邾取邑師徒亦頓敝又遂城郚文公以為既伐邾以攘邾之邑不可不城郚以備邾之兵是一舉而兩得也其亦念兵之勞而民之疲歟况三月今之正月東作之時而奪農時則一歲之獲荒矣文公何以為國乎民汪氏克寬曰文公以邾叛臣守須句之地又重勞力城內邑以防邾師之至心有慊焉故畏鄰國之伐而不知愈重其過也夏四月宋公王臣卒穀作壬臣集説髙氏閌曰以國亂故不葬兒治則禮詳亂則禮略家氏鉉翁曰不書葬責嗣子輕舉召亂葬不如禮立汪氏克寬曰其弟禦殺世子而自立國人殺禦而其少子杵臼是為昭公季氏本曰昭公初立羣族亂作於是送終之禮廢矣故凡不書葬者非皆由魯不會亦有其國葬不備禮而謝絶諸侯者宋成公是矣宋人殺其大夫左傳夏四月宋成公卒於是公子成為右師公孫友為左師樂豫為司馬鱗矔為司徒公子蕩為司城華御事為司寇昭公將去羣公子樂豫曰不可公族公室之枝葉也若去之則本根無所庇廕矣葛藟猶能庇其本根故君子以為比况國君乎此諺所謂庇焉而縱尋斧焉者也必不可君其圗之親之以德皆股肱也誰敢携二若之何去之不聼穆襄之族率國人以攻公殺公孫固公孫鄭於公宫六卿和公室樂豫舍司馬以讓公子卬昭公即位而葬書曰宋人殺其大夫不稱名衆也且言非其罪也胡傳書宋人者國亂無政非君命而衆人擅殺之也大夫不名義繫於殺大夫而其名不足紀也集説杜氏預曰不稱殺者及死者名殺者衆死者無罪又曰二子在公宫為亂兵所殺趙氏匡曰以三世內娶便云三世無大夫公羊之説不近人理若實殺有罪何以不書死者之名乎穀梁之説非也字陸氏淳曰非君意而殺之者衆不可書名特加人以别之又明死者無罪髙氏閌曰貶責無所寄直志其衆亂無政而已下陳氏傅良曰終昭公之世不名其大夫春秋有天之辭有一國之辭有一人之辭於晉靈公凡會盟皆不序諸侯是天下之辭也於魯莊公凡會齊襄皆書人是一國之辭也於魯桓公凡大夫將皆不言大夫於宋昭公凡大夫不名是一人之辭也吳氏􅊹曰穆襄之族率國人人衆非一人也故稱宋人死者不幸而遭亂兵非有可殺之罪故不書名汪氏克寬曰宋昭方居諒陰明年復殺司馬而逐司城經書宋公王臣卒宋人殺其大夫明年又書宋人殺其大夫司馬宋司城來奔以見嗣君之無政先君在殯而國人作亂以戮其大夫踰年而掌兵之官見誅守國之官見逐皆書宋人而昭公之為君可知矣曾未十年而有帥甸之弒經以大惡繫之宋人所以備責昭公不足為宋人之君也余氏光曰成公在殯昭公首為亂階至使公族搆難大夫罹殃其不君甚矣然則固與鄭也何以不名是必從君於昏者他日昭公被弒蕩意諸不得與孔父仇牧苟息齒即大夫不名之義也戊子晉人及秦人戰于令狐晉先蔑奔秦令力呈反蔑公作昧奔上有以師字左傳秦康公送公子雍於晉曰文公之入也無衛故有吕卻之難乃多與之徒衛穆嬴日抱大子以啼於朝曰先君何罪其嗣亦何罪舍嫡嗣不立而外求君將焉置此出朝則抱以適趙氏頓首於宣子曰先君奉此子也而屬諸子曰此子也才吾受子之賜不才吾惟子之怨今君雖終言猶在耳而棄之若何宣子與諸大夫皆患穆嬴且畏逼乃背先蔑而立靈公以禦秦師箕鄭居守趙盾將中軍先克佐之荀林父佐上軍先蔑將下軍先都佐之步招御戎戎津為右及堇隂宣子曰我若受秦秦則賔也不受寇也既不受矣而復緩師秦將生心先人有奪人之心軍之善謀也逐冦如追逃軍之善政也訓卒利兵秣馬辱食潛師夜起戊子敗秦師于令狐至於刳首己丑先蔑奔秦士會從之先蔑之使也荀林父止之曰夫人大子猶在而外求君此必不行子以疾辭若何不然將及攝卿以往可也何必子同官為寮吾嘗同竂敢不盡心乎弗聼為賦板之三章又弗聽及亡荀伯盡送其帑及其器用財賄於秦曰為同寮故也士會在秦三年不見士伯其人曰能亡人於國不能見於此焉用之士季曰吾與之同罪非義之也將何見焉及歸遂不見董陰杜注晉地平刳首杜注令狐在河東與刳首相接案令狐今陽府猗氏縣地水經注刳首在西三十里當在今滎河臨晉間也公羊何以不言師敗績敵也何以不言出遂在外也穀梁不言出在外也輟戰而奔秦以是為逃軍也胡傳案左氏襄公卒大子幼晉人欲立長君趙孟使先蔑如秦逆公子雍秦康公以師納之襄夫人日抱大子以啼於朝曰舍適嗣不立而外求君將焉置此諸大夫畏逼乃背先蔑立靈公趙盾將中軍以禦秦潛師夜起敗秦師于令狐先蔑奔秦程氏以為晉不謝秦秦納不正皆罪也故稱人晉懼秦之不肯已而擊之是晉人為志乎是戰者也故書及其貶之如此者使後世臣子慎於廢立之際不可忽也治亂存亡繫國君之廢立事莫重於此矣而可以有誤乎奕者舉棋不定不勝其耦况置君而可以不定乎集説孫氏復曰秦晉自殽之役結怨用兵償報不已故自是不復名將帥但曰某人某人而已言戰不言敗者勝負敵也先蔑書者不可言晉人故也不言出者明自軍中而去王氏沿曰既貶宣子又貶秦伯罪各當誅康陳氏傅良曰宋襄公納齊孝公戰于甗貶稱師秦公送晉公子雍戰于令狐貶稱人秦晉之交兵於是再世自令狐之後不悉書矣八年秦伐晉取武城不書十年晉伐秦取少梁不書張氏洽曰如左氏説則當書晉人敗秦師于令狐今書晉及秦戰又不言敗者交貶之也然二國之兵晉曲尤甚故秦伯趙盾皆稱人而特以晉及且不書秦師之敗深罪晉人置君而不定也黃氏仲炎曰平其心以觀天下之故則是非利害未嘗不甚明一或錮於貪欲之私則如逐鹿者不見泰山矣觀荀林父之戒先蔑者平心之言也故卒不逃其所料惟先蔑之意在於覬覦立君之功而不暇擇焉將以求福乃更得禍此可為行險者之戒矣豈汪氏克寬曰晉襄以前年八月卒十月葬矣秦人不知其已立君而至是始納公子雍耶蓋趙盾始議求長君而中變其説秦人雖知其立靈公而欲以重兵強納公子雍以爭國也夫康公始為大子送舅氏而念母之不見故作渭陽之詩是固良心也今乃納庶孽而奪嫡甥之位自是兵爭不息豈非怨欲害乎良心而然歟不然春秋釋秦而専罪趙盾矣案公羊此偏戰也又云此晉先昧也其稱人何貶曷為貶外也其外奈何以師外也以是戰為偏戰而以晉人為指先昧是不知晉三軍之在行而將中軍者之為趙盾也然先蔑既將下軍而又奔秦即以為逃軍亦可故刪節公羊而存穀梁狄侵我西鄙左傳狄侵我西鄙公使告於晉趙宣子使因賈季問酆舒且讓之酆舒問於賈季曰趙衰趙盾孰賢對曰趙衰冬日之日也趙盾夏日之日也集説許氏翰曰狄懲箕之敗四年間一侵齊而未敢肆至是復侵魯侵齊侵宋侵衛晉襄既沒莫之忌矣魯高氏閌曰魯間晉難而伐邾則狄亦間晉難而侵聖人書此罪魯之不自正也張氏洽曰間秦晉之爭也窺湛氏若水曰晉襄既沒霸業陵替秦晉交爭狄人伺其間大肆內侵故侵魯侵齊侵宋侵衛之事漸見矣秋八月公會諸侯晉大夫盟于扈扈杜注鄭地滎陽卷縣西北有扈亭今在河南開封府原武縣西北左傳秋八月齊侯宋公衛侯陳侯鄭伯許男曹伯會晉趙盾盟于扈晉侯立故也公後至故不書所會凡會諸侯不書所會後也後至不書其國辟不敏也穀梁其曰諸侯略之也胡傳諸侯會晉趙盾盟于扈為晉侯立也諸侯不序見公之不及於會也文公怠惰事多廢緩既約晉盟而復後至故隱其不及罪公之不能自強於政治魯自是日益衰矣集説趙氏匡曰諸侯不序公不得與之盟也而曰公會諸侯盟者言公附於載書也載書不可從附與盟主之大夫敵焉也責公不早赴而自取其恥爾劉氏敞曰公羊曰諸侯不可使與公盟昳晉大夫使與公盟非也在會者皆諸侯也既與公盟矣又何云眣晉大夫乎且諸侯不欲與魯侯盟乃敢眣晉大夫使之盟乎皆事之不然者也年孫氏覺曰春秋書及某大夫盟者惟二例耳莊九公及齊大夫盟于蔇及此晉大夫是也蔇之盟齊襄被弒而無知見討小白在外而未入齊方無君齊之大夫不求盟以紓國之難則安危未可知於是權宜與公盟齊無君大夫盟公非大夫之罪是以不名而曰齊大夫也晉襄已葬靈公尚幼晉之大夫求盟諸侯以紹先君之業而諸侯皆會晉之嗣君幼不能盟則大夫權宜而盟諸侯以大夫伉諸侯則有罪矣然不幸而值幼君則不可不假一時之權是以不名而曰晉大夫也春秋之法外臣而盟我君皆書名以見其罪不幸其國無君若無知之亂則齊之大夫得免焉大夫而盟諸侯亦書其名以見其罪不幸其君薨而嗣子少若靈公之在抱則晉之大夫得免焉舍是二者未有不得罪於春秋者矣春秋之法前目後凡扈之盟不序而前無所見以晉之大夫不名不以諸侯之序而敵一大夫也春秋通晉大夫之得盟諸侯是以不列諸侯之爵也程子曰文公怠政事多廢緩既約晉盟而復後至故書往會而隱其不及不序諸侯以見其不在故明年公子遂再往與晉盟也許氏翰曰諸侯何不序大始也吳夫扈何之以會不名大夫而主盟諸侯自氏􅊹曰此經年書以諸侯者皆前目後凡前並無諸國之目若無左傳則不知其為齊宋衛陳鄭許曹七國之君不列敘諸國而但言諸侯以無盟主而大夫強合諸國之君故略之也以李氏亷曰文公之編三會于扈皆止書諸侯左氏十五年盟扈書諸侯無能為也十七年會扈書諸侯無功也是則總稱諸侯者皆罪諸侯也此總稱諸侯為公後至也諸侯皆在公獨後至故諱公罪而歸責於諸侯若言諸侯無功然所以辟公之不敏也汪氏克寬曰經書大夫之盟不書名氏者三莊公九年書及齊大夫盟時襄公已弒桓公未入齊無君當國大夫自為主而與莊公盟故大夫不書名氏此年趙盾初立靈公亦若晉無君然故趙盾亦不書名氏湨梁之會諸侯皆在而十一國之大夫自盟則諸國皆若無君矣故亦但書大夫盟扈之盟書晉大夫霸主失政也湨梁之盟書大夫則諸侯皆失政矣案諸侯不序左氏以為公後至劉氏敞孫氏覺皆駁之劉氏又謂諸侯不序為欲治宋而後不能與十五年盟扈十七年會扈左氏所謂諸侯無能為諸侯無功者其意相合似亦有理然趙氏匡胡氏安國皆主左氏而程子又引遂會衡雍討扈後至為證故今仍從左氏焉趙盾不名胡傳謂盾內専廢置其君外強諸侯為此盟故略而不名非也盾自新城以後皆以名書惟此年盟扈以主幼而得無貶耳孫氏覺之説得之矣冬徐伐莒集説劉氏敞曰杜云不書將帥徐告辭略非也傳云徐伐莒莒來請盟然則莒來告也且徐不來告則已苟其來告若不稱君必當稱將帥豈亦自云徐而已乎杜氏之意固以謂從赴告而向者晉人戰于令狐又何以云貶趙盾稱人哉公孫敖如莒涖盟公穀作蒞左傳穆伯娶於莒曰戴已生文伯其娣聲已生惠叔戴已卒又聘於莒莒人以聲已辭則為襄仲聘焉冬徐伐莒莒人來請盟穆伯如莒蒞盟且為仲逆及鄢陵登城見之美自為娶之仲請攻之公將許之叔仲惠伯諫曰臣聞之兵作於內為亂於外為寇寇猶及人亂自及也今臣作亂而君不禁以啓寇讎若之何公止之惠伯成之使仲舍之公孫敖反之復為兄弟如初從之榖梁蒞位也何也前定也集説高氏閌曰莒為徐所伐故來求援而請修洮之盟敖娶於莒故許其盟而請往涖之趙氏鵬飛曰魯有徐之患久矣自咱禽受國而有費誓之師入春秋服於齊桓之令而不敢仇於諸侯今霸王不作徐將為魯患彼其伐莒蓋所以撼魯也公孫敖於是往盟於莒修僖公洮向之好協謀以備徐也吳氏􅊹曰魯臣每欲娶婦必請於君行聘會之禮假公事以遂其私君之無政臣之無禮也况敖代弟逆名尤不正卒以淫奔禽獸之行也盟湛氏若水曰莒以弱小之國見伐於徐公孫敖如以救之似禮矣而敖之意不在於救莒因盟莒以為迎娶之地假公以圗私濟邪以害正故春秋書之使人考其迹知其心而非禮自見矣附録左傳晉郤缺言於趙宣子曰日衛不睦故取其地今已睦矣可以歸之叛而不討何以示威服而不柔何以示懷非威非懷何以示德無德何以主盟子為正卿以主諸侯而不務德將若之何夏書曰戒之用休董之用威勸之以九歌勿使壞九功之德皆可歌也謂之九歌六府三事謂之九功水火金木土穀謂之六府正德利用厚生謂之三事義而行之謂之德禮無禮不樂所由叛也若吾子之德莫可歌也其誰來之盍使睦者歌吾子乎宣子説之壬襄王三寅十三年八年晉靈二年齊昭十四年衛成十六年蔡莊二十七年鄭穆九年曹共三十四年陳共十三年把桓十八年宋昭公杵臼元年秦康二年楚穆七年春王正月附録左傳八年春晉侯使解揚歸匡戚之田於衛且復致公壻池之封自申至於虎牢之竟申杜注鄭地當在鄭州汜水縣界夏四月附録左傳夏秦人伐晉取武城以報令狐之役秋八月戊申天王崩左傳秋襄王崩集説史記襄王崩子頃王壬臣立頃王六年崩陸氏淳曰頃王不書崩冬十月壬午公子遂會晉趙盾盟于衡雍盾徒本反雍於用反左傳晉人以扈之盟來討冬襄仲會晉趙孟盟于衡雍報扈之盟也集説高氏閌曰衡雍晉文公會諸侯朝王之處也夫天王崩諸侯不奔喪而盾遂皆國之正卿乃自相會盟於王畿之內惡莫大焉張任氏公輔曰晉魯之用事者會盟政在大夫矣氏洽曰後漢河南卷縣有垣􅮯城古衡雍也與扈相近自晉文翟泉之盟付之諸大夫文公復以國事付之公子遂而不知一國之禮樂征伐皆自公子遂出此敬嬴所以得窺伺間隙私事之以胚胎殺適立庶之禍也汪氏克寬曰大夫専盟始此前此盟翟泉猶有僖公在會也自是而有袁婁之盟雞澤湨梁諸侯皆在而大夫自盟矣于宋于虢則晉楚大夫狎主齊盟而諸侯不復在矣其事自衡雍之盟始也况當是時仲遂已有無君之心而晉討文公之盟扈必要仲遂歃血而後信亦猶成公之沙隨不得見而季孫行父會晉郤犨盟于扈昭公弔少薑不見納而季孫宿如晉馴致乾侯之次晉不能修方伯之職而意如會荀躒於適歷矣三桓専魯六卿分晉豈一朝一夕之故哉乙酉公子遂會雒戎盟于暴雒音洛雒戎公作伊雒戎暴杜注鄭地路史曰暴辛公采地一曰暴隧左傳遂會伊雒之戎胡傳春秋記約而志詳其書公子遂盟趙盾及雒戎何辭之贅乎曰聖人所以别內外也集説劉氏敞曰左氏曰珍之也言遂權與戎盟得事之宜故褒稱公子非也若兩稱公子為褒者僖三十年公子遂如京師遂如晉則貶矣彼不謂貶何邪孫氏覺曰盟于衡雍盟于暴一公子遂耳壬午乙酉四日耳公子遂一人相去四日之間而行二事於經可以言遂也然不曰遂者衡雍之盟與暴之盟皆受命於其君而後行事非繼事之謂是以不曰遂也蘇氏轍曰公子遂既盟趙盾四日而盟雒戎皆公命也何以知其皆公命也以其書雒戎之盟與書趙盾之盟一也張氏洽曰盟盾未幾而遂會雒戎不以遂事言之所以辨內外也盾李氏亷曰內大夫特盟外大夫二公子遂會晉趙盟衡雍季孫行父及晉郤犨盟于扈是也此皆權臣専行之事而此為造端春秋於翟泉歷貶諸國大夫而此無譏焉蓋不勝譏矣公孫敖如京師不至而復丙戌奔莒公無而字左傳穆伯如周弔喪不至以幣奔莒從已氏焉胡傳案左氏公孫敖奔莒從已氏也男女人之大欲存焉寡欲者養心之要欲而不行可以為難矣敖如京師其書不至而復者言敖無入使於周之意惟己氏之欲從也集説陸氏淳曰還者事畢復者未畢師還公還自晉歸父還自晉士丐聞齊侯卒乃還皆不當更往又並合禮故曰還事畢也公如晉至河乃復公孫敖如京師不至而復仲遂至黃乃復皆事未畢而復也奔孫氏復曰公孫敖如京師弔喪也不至而復丙戌莒文公不能誅敖得以自恣文公之惡亦可見矣不言所至者舉京師為重也命劉氏敞曰何以不言出受命矣自外出也大夫受而出君言不宿於家臣子大受命則何以不言其至近也曷為或言而復或言乃復乃難乎而也朱子曰丈定云色出於性淫出於氣其説原於上蔡此殊分得不是大凡出於人身上道理固皆是性色固性也然不能節之以禮制之以義便是惡孟子云君子不謂性其語便無病又曰只不至而復便是大不恭魯亦不再使人往皆罪也文定只貶他從已氏之過經文原不及此事喪張氏洽曰國君為天子斬衰敖受命以赴天王之廢君命而徒返已為不赦之罪况懷桑中之行而淫奔乎文公容其復而奔魯之無政刑也宋氏宜春曰公不奔喪而卿行是諸侯不有天子也敖如京師不至復是大夫不有諸侯也黃氏仲炎曰觀遂之専敖之恣則文公之不能制其臣可知矣壅汪氏克寬曰敖豈惟無王實以無君文公既不加命之譴於敖又不遣他卿如京師况天王之喪赴告及魯已三越月仲遂盟戎近在王都之側若罔聞知徐徐遣敖方共弔事又且敖不至而亟還以喪考妣之戚而恝然忘情不啻秦越亦不思僖公母子之喪王臣將命者至再而至三也經書乙酉公子遂會雒戎公孫敖如京師不至而復丙戌奔莒非獨著敖之罪舉魯國君臣之罪皆不逃聖筆之誅矣案不至而復經文甚眀孫氏以為中道而返者得之諸家謂受命不行者非也若果不行聖人何難據實以書之乎螽螽公作􅏑集説何氏休曰先是公如晉公子遂公孫敖比出不可使勢奪於大夫煩擾之應杜氏預曰為災故書宋人殺其大夫司馬宋司城來奔左傳宋襄夫人襄王之姊也昭公不禮焉夫人因戴氏之族以殺襄公之孫孔叔公孫鍾離及大司馬公子卬皆昭公之黨也司馬握節以死司城蕩意諸來奔效節於府人而出公以其官逆之皆復之胡傳初宋昭公將去羣公子樂豫以為不可遂舍司馬以讓公子卬則卬固昭公之黨欲専宋政而昭公固欲以其弟卬自衛也夫司馬掌兵之官不選衆舉賢以素有威望為國人所畏服者使居其任乃欲寵其私昵鮮有不亡者矣公子卭蕩意諸皆以官舉者見主兵者不能其官至於見殺守土者不能其官至於出奔而其君不免失身見弒之禍宜矣集説劉氏敞曰司馬者何司城者何皆官舉也曷為皆官舉言不能其官也不能其官者何君弱政亂強臣擅命然則何以不名非國討也非國討則孰討之華孫殺之華孫逐之曰宋人殺其大夫司馬宋司城來奔何曰是卿也不能其官者非他人之罪也又曰左氏云司馬握節以死司城效節以出公以其官逆之故皆書官非也計司馬握節未如仇牧司城奉身以退不及荀息而左氏推彼二人為貶申此兩人為賢輕重貿易莫甚於此且身居亂兵之中苟棄節偷生則為大罪握節而死人臣之常耳既無智力以禦亂又欲負節而私逃亦大罪也效節而出自求免罪而已未見可貴之美也魯公庸人不識大義則妄以其官逆之春秋亦何為珍之耶又曰公羊曰宋三世無大夫非也僖二十五年宋殺其大夫不舉名氏以謂宋無大夫也今此舉官亦云無大夫若實內娶無大夫者都無所舉是矣或官舉或不舉何哉又曰穀梁曰以其官稱無君之辭也鄭康成解云謂無人君之德皆非也既有大夫矣何謂無君又晉殺其大夫郤錡郤犨郤至並尸三卿亦可謂無君德者則曷為不以官稱之黎氏錞曰司馬典兵之官而殺之司城扞禦之任而來奔則主勢孤矣宜昭公卒死於弒胡氏寧曰列國大夫未有書官者宋卿何以書程氏云宋王者之後得自命官故獨書爾不備書省詞也因公子卬蕩意諸不任二官之職華孫以逆族而主兵權所謂因事之變者而書之亦猶魯之郊禘云爾陳氏傅良曰未有書官者於是官從其官司馬司城是也未有書字者於是字從其字子哀是也張氏洽曰司城司空也宋以武公名司空諱之故曰司城保黃氏仲炎曰紀綱不立政權紛亂則君臣不能相且仕於亂邦濫嬰戮辱非君子見幾之道也垂戒之義明矣歲家氏鉉翁曰司馬司城皆國之柄臣穆襄之族連怙亂固昭公有以致之然為司馬司城者當思所以防患之計乃置之弗戒至於乘釁再作司馬死而司城奔由昭公信任非人以私昵寵臣而在列位既不慮患於平日復不制變於臨時也吳氏􅊹曰宋人者戴氏之族非一人也見昭公無政而臣庶得以擅殺大夫也二賀氏仲軾曰殺其大夫所以志亂也而此則専舉人華督之事則書及其大夫仇牧所以志節也而此不稱名氏特變文以官書之者蓋以其官責之也且見司馬非人所得殺之官而司城亦非意諸所得奔之官也案大夫者階也司馬司城者官也宋殺大夫司馬宋司城來奔猶云殺其大夫中之司馬而大夫中之司城來奔耳大夫貫下司馬司城言考之周官卿非一人有大宰大司空大宗伯等大夫亦非一人有小宰小司徒小宗伯等可以知矣附録左傳夷之搜晉侯將登箕鄭父先都而使士縠梁益耳將中軍先克曰狐趙之勳不可廢也從之先克奪蒯得田於堇陰故箕鄭父先都士縠梁益耳蒯得作亂欽定春秋傳説彚纂卷十七
