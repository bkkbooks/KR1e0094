body:
  text: 欽定四庫全書欽定春秋傳說彚纂卷首下王朝世表春秋尊王之書也大全列國年表周與諸侯並列恐非經㫖今别為王朝世表列於二十國年表之前不使與列國為伍所以正名辨分也平王宜臼幽王子在位五十一年桓王林平王孫在位二十三年莊王他桓王子在位十五年僖王胡齊莊王子在位五年惠王閬僖王子在位二十五年襄王鄭惠王子在位三十三年頃王壬臣襄王子在位六年匡王班頃王子在位六年定王瑜匡王弟在位二十一年簡王夷定王子在位十四年靈王泄心簡王子在位二十七年景王貴靈王子在位二十五年王子猛景王子四月立十月卒敬王匄子猛弟在位四十四年元王仁敬王子在位七年二十國年表年表昉於史記其十二國年表六國年表皆冠之以周者舉王朝以統列國也春秋大全二十國年表周與諸侯並列殊失尊王之義今旣為王朝世表而列國年表則冠之以周而不數周庶於史法有合史記不載滕把薛邾莒小邾許而大全無燕夫燕為召公後其事屢見於經特增入為二十國焉周之宗盟先同姓春秋主魯魯宗國也故居首蔡曹衛皆武王同母弟故次之滕亦文王子又次之虞為武王子友為厲王子故晉鄭又次之呉為大王子見經晚燕與周同姓故又次之齊大師後五霸桓公為盛故異姓以齊為首秦楚大國也次之宋把陳先代之後也又次之薛邾莒小邾許俱小邦也各從其爵以為序又次之陸氏淳曰薛小國無記世不可知亦不知為誰所滅白鹿洞石刻春秋列國世次薛小邾皆未詳今亦闕之獨以其事之見於經者稍誌一二以存其畧云王朝世次平王宜臼幽王子桓王林平王孫大子洩父子莊王他桓王子僖王胡齊莊王子惠王閬史記僖王子大全僖王孫襄王鄭惠王子頃王壬臣襄王子匡王班頃王子定王瑜匡王弟簡王夷定王子靈王泄心簡王子景王遺靈王子王子猛景王子史記作悼王敬王匄景王子魯國世次隱公息姑惠公子桓公允隱公弟莊公同桓公子閔公啓方莊公子僖公申閔公兄文公興僖公子宣公倭文公子成公黑肱宣公子襄公午成公子昭公稠襄公子定公宋昭公弟哀公蔣定公子蔡國世次宣公考父戴公子桓公封人宣公子哀公獻舞桓公弟穆公盻哀公子莊公甲午穆公子文公申莊公子景公固文公子靈公般景公子平公廬靈公孫世子有之子悼公東國平公弟昭公申悼公弟成公朔昭公子曹國世次桓公終生穆公子莊公射姑桓公子僖公夷莊公子昭公班僖公子共公襄昭公子文公壽共公子宣公廬文公子成公負芻杜注宣公庶子史記作宣公弟武公滕成公子平公須武公子悼公午平公子聲公野悼公弟隱公通平公弟靖公露聲公弟伯陽靖公子衛國世次桓公完莊公子宣公晉桓公弟惠公朔宣公子公子黔牟羣公子立六年惠公復入黔牟奔周懿公赤惠公子戴公申昭伯頑子宣公孫文公燬戴公弟成公鄭文公子穆公速成公子定公臧穆公子獻公衎定公子殤公剽穆公孫立十二年甯喜弑之獻公復入襄公惡獻公子靈公元襄公子出公輒莊公子莊公蒯聵靈公子衛君起靈公子立一年奔齊出公復入悼公黚靈公子滕國世次滕侯見隱七年名諡未詳宣公嬰齊孝公鄭昭公元文公壽成公原文公子悼公寧成公子頃公結悼公子隱公虞毋頃公子晉國世次鄂侯郄孝侯子哀侯光鄂侯子小子侯哀侯子晉侯緡哀侯弟武公滅之曲沃莊伯鮮桓叔子武公稱莊伯子王命為晉侯獻公詭諸武公子奚齊獻公子卓子獻公子惠公夷吾獻公子懷公圉惠公子文公重耳獻公子襄公驩文公子靈公夷皋襄公子成公黑臀文公子景公獳成公子厲公州蒲景公子悼公周惠伯談子襄公曾孫平公彪悼公子昭公夷平公子頃公去疾昭公子定公午頃公子鄭國世次莊公寤生武公子厲公突莊公子昭公忽莊公子公子亹昭公弟公子儀昭公弟立十四年傅瑕弑之厲公復入文公捷厲公子穆公蘭文公子靈公夷穆公子襄公堅靈公弟悼公費襄公子成公睔悼公弟僖公髠頑成公子簡公嘉僖公子定公寧簡公子獻公蠆定公子聲公勝獻公子呉國世次壽夢大伯十八世孫始見春秋諸樊壽夢子餘祭諸樊弟夷昧餘祭弟王僚夷昧子闔廬諸樊子名光夫差闔廬子燕國世次繆侯鄭侯子宣侯繆侯子桓侯宣侯子莊公桓侯子襄公莊公子桓公宣公昭公武公文公懿公惠公懿公子悼公共公平公簡公獻公孝公齊國世次僖公禄父莊公子襄公諸兒僖公子桓公小白襄公弟公子無虧桓公子孝公昭桓公子昭公潘桓公子舎昭公子懿公商人桓公子惠公元桓公子頃公無野惠公子靈公環頃公子莊公光靈公子景公杵臼莊公弟安孺子荼景公子悼公陽生荼兄簡公壬悼公子平公驁簡公弟秦國世次文公襄公子寧公文公孫出子寧公少子武公寧公子德公武公弟宣公徳公子成公宣公弟穆公任好成公弟康公罃穆公子共公稻康公子桓公榮共公子景公桓公子哀公景公子惠公哀公孫悼公惠公子楚國世次武王熊通蚡冒弟文王熊貲武王子堵敖熊囏文王子成王頵文王子穆王商臣成王子莊王旅穆王子共王審莊王子康王昭共王子郟敖麇康王子靈王䖍共王子一名圍平王居共王子一名棄疾昭王軫平王子惠王章昭王子宋國世次穆公和宣公弟殤公與夷宣公子莊公馮穆公子閔公捷莊公子桓公御說莊公子襄公兹父桓公子成公王臣襄公子昭公杵臼成公子文公鮑昭公弟共公固文公子平公成共公子元公佐平公子景公頭曼元公子昭公得元公曾孫公孫周子把國世次武公謀娶公子索隱曰謀一作謨靖公武公子共公靖公子德公共公子世本作惠公成公徳公子桓公姑容成公弟孝公匄桓公子文公益姑孝公弟平公郁釐文公弟悼公成平公子隱公乞悼公子僖公過隱公弟閔公維僖公子陳國世次桓公鮑文公子陳佗桓公弟厲公躍桓公子莊公林桓公子宣公杵臼桓公子穆公欵宣公子共公朔穆公子靈公平國共公子成公午靈公子哀公溺成公子惠公呉哀公孫世子偃師子懷公柳惠公子閔公越懷公子薛國世次薛侯見隱十一年名諡未詳薛伯見莊三十一年名諡未詳獻公穀襄公定獻公子薛伯比襄公子惠公夷比子邾國世次邾子克字儀父邾子瑣儀父子文公蘧蒢瑣子定公貜且文公子宣公牼定公子悼公華宣公子莊公穿悼公子隱公益莊公子立十九年而呉執之子革嗣桓公革隱公子立十二年而奔越隱公復入公子何桓公弟莒國世次莒子見隱二年名諡未詳兹㔻公紀公庶其渠丘公季佗庶其子黎比公密州渠丘公子展輿黎比公子著丘公去疾展輿弟郊公著丘公子庚輿著丘公弟立十年奔魯郊公復入莒子狂馬氏端臨通考以季佗為厲公朱為渠丘公是佗與朱乃二人也徐氏邈孔氏頴逹皆謂莒君無諡則佗安得獨諡厲乎齊氏履謙作莒國統紀不載厲公蓋亦以通考為未可信也汪氏克寛以渠丘公為季佗必有所據今故不用馬氏說小邾國世次魯莊公五年郳黎來來朝僖七年小邾子來朝始命為附庸也自時厥後朝於襄者一朝於昭者二盟會屢見於春秋而世次相承經傳無明文可據今姑闕之許國世次莊公穆公新臣莊公弟僖公業穆公子昭公錫我僖公子靈公甯昭公子悼公買靈公子許男斯悼公子元公成王朝興廢說周姬姓黄帝之苖裔后稷之後也后稷封於邰今武功縣也及夏之衰后稷之子不窋失其官竄於西戎括地志曰不窋故城在慶州𢎞化縣今慶陽府安化縣也不窋之孫公劉徙居邠今邠州東北有豳亭三水縣西有古豳城皆是也公劉傳九世至太王去邠邑於岐山之陽今岐山縣也文王受命作邑於豐今西安府鄠縣南有酆城武王克商而有天下定都於鎬鎬在豐水之東豐在豐水之西相去二十五里平王遷都王城今洛陽縣西河南故城是也敬王又遷成周今洛陽縣東洛陽故城是也平王四十九年魯隱公立敬王三十九年獲麟之歲也後九王二百二十年而赧王為秦所滅案大全諸國興廢說共二十四國周與諸侯亦並列今區而别之不使周與列國齒虞虢紀俱早亡不録列國興廢說魯姬姓侯爵周文王第四子周文公旦所封也周公有大勲勞於天下位冡宰留相天子乃封其長子伯禽為魯侯都於曲阜今山東兖州府曲阜縣是也伯禽十三世傳至隱公息姑元年春秋託始於此又二百四十有二年為哀公蔣之十四年西狩獲麟春秋以終後九君至頃公讎為楚所滅蔡姬姓侯爵武王同母弟叔度所封也武王克商封叔度於蔡今汝寧府上蔡縣是也平侯徙新蔡今新蔡縣是也昭侯又徙州來謂之下蔡今壽州北三十里有蔡國城卽下蔡也宣侯二十八年魯隱公立成侯十年魯哀公十四年也後為楚所滅曹姬姓伯爵武王同母弟叔振鐸所封也武王克商封叔振鐸於曹今兖州府定陶縣是也叔振鐸生太伯脾脾後九世桓公終生卽位桓公三十五年魯隱公元年也魯哀公八年曹伯陽為宋所滅衛姬姓侯爵武王同母少弟康叔封之後也武王封康叔於衛今衛輝府淇縣東北朝歌城是也文公遷楚丘其故城在今滑縣東成公又遷帝丘今開州有顓頊城是也桓公十三年魯隱公卽位出公十二年魯哀公十四年也其後貶號曰君止有濮陽之地秦二世廢其君角為庶人滕姬姓侯爵周文王子叔繡所封今滕縣是也魯隱公七年始見滕侯卒其後書子蓋時王所黜也漢地理志滕封三十一世為齊所滅孔氏穎達及諸家多因之戰國䇿則謂滕滅於宋通鑑通考皆云宋滅滕未知孰是姑並存之晉姬姓侯爵周武王少子唐叔虞之後也成王封叔虞於唐始都於翼今平陽府翼城縣是也唐叔子燮父為晉侯傳十世至昭侯昭侯封其父文侯之弟成師於曲沃是為桓叔曲沃者今之聞喜縣也昭侯傳至哀侯為桓叔之孫武公所滅武公徙居絳在今絳州之北景公又自絳徙新田今在曲沃縣南鄂侯二年魯隱公立定公三十一年魯哀公十四年也又六世韓魏趙三分晉地遷其君靖公俱酒為家人鄭姬姓伯爵周厲王少子友之後也宣王二十二年封友於鄭在西都畿内棫林之地漢屬京兆曰鄭縣今華州是也幽王之難友寄帑於虢鄶之間因取二國之地在濟西洛東河南潁北四水間謂之新鄭今開封府新鄭縣是也莊公二十二年魯隱公卽位聲公二十年魯哀公十四年也後為韓所滅呉姬姓子爵周太王長子太伯奔荆蠻以避季歴居於梅里今無錫縣也太伯卒仲雍嗣立後十七世至壽夢始稱王其後闔閭築大城而都之卽今蘇州府治也魯成公六年壽夣見經夫差十五年獲麟之歳也魯哀公二十二年為越句踐所滅燕姬姓伯爵周同姓召公奭之後也武王封召公於薊號為北燕今順天府大興縣是也穆侯七年魯隱公即位獻公十二年魯哀公十四年也後六世易王立傳王號者六世至燕王喜為秦所滅齊姜姓侯爵太公望之後也其先四岳佐禹平水土有功虞夏間封於呂商末太公起漁釣為文武師封營丘曰齊侯漢地志云臨淄師尚父所封臣瓚謂臨淄即營丘也案齊曾徙薄姑後復都臨淄詩所云王命仲山甫城彼東方卽其事也今臨淄縣屬青州府薄姑即博興縣也僖公九年魯隱公立簡公四年魯哀公十四年也後三君一百有二年康公貸卒田氏遂并齊秦嬴姓伯爵出自顓頊裔孫女修子大業生大費與禹平水土佐舜調馴鳥獸賜姓嬴是為柏翳柏翳十九世非子為周孝王主馬汧渭間馬大蕃息孝王分為附庸而邑之秦今秦州清水縣故秦城是也非子之曾孫曰秦仲死於西戎其孫襄公討西戎有功平王東遷賜以岐豐之地列為諸侯寧公徙平陽今郿縣西有平陽故城徳公徙雍今鳳翔縣也獻公徙櫟陽今臨潼縣也孝公徙咸陽今咸陽縣也文公四十四年魯隱公立悼公十一年魯哀公十四年也後九世孝公用商鞅以耕戰霸秦其子惠文君自號為王傳武王昭襄王孝文王莊襄王至始皇并天下自立為皇帝二世而亡楚芈姓子爵出自顓頊孫重黎為高辛氏火正能光融天下命曰祝融其弟呉回嗣為祝融生陸終陸終生六子最少者季連季連之苖裔鬻熊為周文武師成王時封鬻熊曾孫熊繹於荆蠻胙以子男之田其地居丹陽徐廣宋忠皆曰在南郡枝江縣今屬荆州府其後都郢今江陵縣是也昭王徙鄀水經注謂之鄢郢今在宜城縣西南秦㧞鄢郢楚保陳城即故陳國也其最後徙壽春即今壽州是也武王十九年魯隱公立惠王八年魯哀公十四年也惠王而下有簡聲悼肅宣威懷頃襄考烈幽哀負芻十二王而秦滅之宋子姓公爵出自商王帝乙之長庶子啓食采於微謂之微子周武王誅紂立其子武庚武庚以三監畔成王誅之乃更封微子為宋公以奉湯祀禮樂車服悉如商舊作賓王家漢地志云梁國睢陽縣故宋國微子所封今歸德府商丘縣是也穆公和七年魯隱公立景公三十六年魯哀公十四年也後至王偃稱王圖伯而齊魏楚共滅其國把姒姓伯爵武王克商求夏禹苗裔得東樓公封把以奉禹祀杜氏預曰把國本都陳留雍丘縣桓六年淳于公亡國把似并之遷都淳于又遷緣陵襄二十九年又遷淳于今開封府把縣即雍丘也淳于廢城在安丘縣東北縁陵故城在昌樂縣東南東樓公四傳至武公武公二十九年魯隱公立閔公六年獲麟之歳也後為楚所滅陳媯姓侯爵出自帝舜之後封於有虞虞幕裔孫閼父為周武王陶正能利器用王賴之以元女大姬下嫁其子滿而封諸陳使奉虞帝祀今陳州是也桓公二十三年魯隱公立閔公二十一年魯哀公十四年也後三年楚惠王使公孫朝滅陳薛任姓侯爵黄帝之後奚仲封於薛今滕縣南四十里有薛城隱十一年滕薛來朝始見經莊三年書薛伯卒蓋時王所黜也孔氏頴達陸氏淳皆曰小國無紀世不可知亦不知為誰所滅邾曹姓子爵出自陸終第五子晏安之後武王克商封其苗裔曹挾於邾為附庸今魯國鄒縣是也自挾至儀父十二世始見春秋魯隱公元年儀父㑹盟於蔑北杏之㑹附從齊桓進爵為子莊十六年經書邾子克卒即儀父也哀公十年邾子益來奔後為楚所并莒嬴姓子爵出自少昊之後武王封兹輿期於莒今莒州是也莒君無諡而有號自兹輿期十一世至兹㔻父始見於春秋共公庚輿而下微不復見後四世而楚滅之小邾曹姓子爵出自邾挾之後夷父顏有功於周周封其子友於郳為附庸莊公五年友之曾孫黎來始朝魯杜注東海昌慮縣東北有郳城今昌慮故城在滕縣東南齊小白霸郳君附從進爵為子始列諸侯謂之小邾子孔氏頴達陸氏淳皆曰穆公之孫惠公以下春秋後六世而楚滅之許姜姓男爵與齊同祖武王封四岳之苖裔文叔於許今許州是也春秋時國小而近鄭為鄭所偪成十五年遷葉今南陽府葉縣是也昭九年遷夷實城父今亳州東南七十里有城父故城十一年遷析實白羽今南陽府鄧州内鄉縣是也定四年遷容城應劭曰容城即華容城今監利縣也或曰容城在葉縣西未知孰是孔氏頴達曰自文叔至莊公十一世始見春秋元公子結元年獲麟之歳也戰國初楚滅之春秋一百二十四國爵姓爵姓具者五十國魯姬姓侯爵蔡姬姓侯爵曹姬姓伯爵衛姬姓侯爵滕姬姓侯爵晉姬姓侯爵鄭姬姓伯爵呉姬姓子爵燕姬姓伯爵虞姬姓公爵虢姬姓公爵祭姬姓伯爵邢姬姓侯爵凡姬姓伯爵滑姬姓伯爵原姬姓伯爵荀姬姓侯爵芮姬姓伯爵息姬姓侯爵隨姬姓侯爵巴姬姓子爵賈姬姓侯爵郕姬姓子爵齊姜姓侯爵秦嬴姓伯爵楚芈姓子爵宋子姓公爵把姒姓伯爵陳媯姓侯爵紀姜姓侯爵鄧曼姓侯爵薛任姓侯爵州姜姓公爵梁嬴姓伯爵宿風姓男爵南燕姞姓伯爵莒嬴姓子爵邾曹姓子爵徐嬴姓子爵越姒姓子爵小邾曹姓子爵鄅妘姓子爵鄫姒姓子爵許姜姓男爵胡媯姓子爵䕫芈姓子爵郯嬴姓子爵萊姜姓子爵舒鳩偃姓子爵偪陽妘姓子爵有爵無姓者十五國唐侯爵弦子爵或隗姓頓子爵沈子爵或嬴姓譚子爵或子姓宗子爵䢵子爵白狄子爵賴子爵肥子爵戎蠻子爵麇子爵或祈姓鼓子爵或祈姓穀伯爵或嬴姓舒子爵有姓無爵者十七國魏姬姓耿姬姓霍姬姓郜姬姓韓姬姓或侯爵焦姬姓楊姬姓淮姬姓密姬姓黄嬴姓羅熊姓或偃姓申姜姓夷妘姓向姜姓鄋瞞漆姓舒庸偃姓戴子姓爵姓俱亡者三十二國江或嬴姓鄖權或偃姓道栢貳軫絞六或偃姓遂崇項或姑姓冀温厲蓼或偃姓巢庸姒介邿無終蓐收於餘丘英氏根牟鮮虞陸渾房桐或偃姓鄀狄附庸九國顓臾風姓須句風姓葛嬴姓任風姓牟極蕭或子姓鄟鄣王朝地名王城成周駘豳岐陽酆祭凡鄔瓦屋劉蔿邘溫原隰郕攢茅絺樊向盟州陘隤酒泉伊川坎欿懷夷召甘毛隰城榮翟泉邥垂暴郟鄏鄄鄇田檀湨梁郊閻揚轘轅平畤雒汭三塗陽城太室景亳孟津甘鹿北山要餞圃車前城東圉領侯氏谿泉任人京京楚鄩平隂澤邑狄泉牆人直人阪道尹道左巷西闈皇社隂汜解蒯三川乾祭瑕杏鞏渠滑尸氏施谷褚氏莒􅍉谷胥靡闕塞圉澤堤上負黍狐人彘闕外姑蕕鄻馮儀栗窮谷穀城簡城榮錡氏盂訾尹唐魯國地名曲阜蔑郎費潛唐棠中丘泰山防鄧菟裘許田讙郕趡闞祝丘咸丘夫鍾曲池奚蔇洙生竇長勺乗丘郭濟西洮郿魯濟諸薛秦梁丘逵泉密酈甯母升陘闡昌衍卞重館郚鹹勾鼆戾丘泉臺平陽鄆蜀龍巢丘陽橋棘聊台中城壞隤貍脤鹿囿蒲圃海陘劉遇桃陽闗旅松漷水西郛武城泗上高魚陽州庚宗丘蕕蚡泉塞闗萊柞郎囿比蒲祲祥泉丘昌間沂上紅郈淄桐汝炊鼻東野棘下姑蔑㧞房霄莒父啓陽邾瑕負瑕漆毗具嶅二山東陽五梧蠶室稷曲大