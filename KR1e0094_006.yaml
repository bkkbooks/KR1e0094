body:
  text: 欽定四庫全書欽定春秋傳說彚纂卷四桓公集說楊氏士勛曰魯世家桓公名允恵公之子隱公之弟以桓王九年即位世本作軌諡法辟土服遠曰桓庚桓王午九年元年齊僖二十年晉哀七年衞宣八年蔡桓四年鄭莊三十三年曹桓四十六年陳桓三十四年把武四十年宋殤九年秦寧五年楚武三十年春王正月公卽位公羊繼弑君不言即位此其言即位何如其意也穀梁桓無王其曰王何也謹始也其曰無王何也桓弟弑兄臣弑君天子不能定諸侯不能救百姓不能去以為無王之道遂可以至焉爾元年有王所以治桓也繼故不言即位正也繼故不言即位之為正何也曰先君不以其道終則子弟不忍即位也繼故而言即位則是與聞乎弑也繼故而言即位是為與聞乎弑何也曰先君不以其道終已正即位之道而即位是無恩於先君也胡傳桓公與聞乎故而書即位著其弑立之罪深絶之也諸侯不再娶於禮無二適恵公元妃既卒繼室以聲子則是攝行内主之事矣仲子安得為夫人母非夫人則桓乃隱之庶弟安得謂當立乎桓不當立則國乃隱公之國其欲授桓乃實讓之非攝也以其實讓而桓乃弑之春秋所以惡桓深絶之也公羊所謂桓幼而貴隱長而卑子以母貴者徇惠公失禮而為之詞非春秋之法也春秋明著桓罪深加貶絶備書終始討罪之義以示王法正人倫存天理訓後世不可以邪汨之也集說何氏休曰弑君欲即位故如其意以著其惡直而不顯諱而不盈即者就也先謁宗廟明繼祖也還之朝正君臣之位也事畢而反凶服焉繼杜氏預曰嗣子位定於初喪而改元必湏逾年者父之業成父之志不忍有變於中年也立孔氏穎逹曰諸侯每嵗首必有禮於廟今遭喪繼者每新年正月亦改元正位百官以序故國史因書即位於策以表之此新君之常禮也今桓雖實簒立歸罪寫氏詐言不與賊謀而用常禮自同於遭喪繼位者亦既實即其位國史依實書之仲尼因而不改反明公實簒立而自同於常亦足見桓之簒也王程子曰桓公弑君而立不天無王之極也而書春正月公即位以天道王法正其罪也桓實與聞乎弑然聖人如其意而書即位與僖文等同辭則其惡自見乃所以深責之也即朱子曰書即位者是魯君行即位之禮繼故不書位者是不行即位之禮若桓公之書即位則是桓公自正其即位之禮耳桓家氏鉉翁曰此春秋誅討亂賊始見於魯事者也以臣弑君以弟簒兄罪大惡極而魯之先君也夫子於魯之先君不容直正其罪故特書王書正書即位皆所以討也桓在位十八年書王者四年不書王者十有四年書王明王法也不書王著桓無王與王不能以王法正天下也誅魯也亦責王也元年書王謂王誅當即加也二年書王憤魯誅之未及而宋亂又作也至三年王朝不聞有誅殛之命而宰渠伯糾父下聘焉王法於是埽地天下無王矣自是不書王者七年至十年正月書王則以天道一周至十八年桓見殺於齊乃復書王正月言王誅雖不加而天理未嘗終冺其死於齊是亦討也聖人於桓之弑隱書法特異於他或以不書王為簡編之脱誤春秋無深意不亦鹵乎又曰春秋比事以見襃貶隱不書即位所以明隱之能讓也桓書即位所以著桓之為簒也桓弑君簒國不當即位亦明矣春秋所以書即位絶之也言季氏本曰桓公弑立姦黨輔之而諸臣亦無一人大義者則其位安矣故逾年改元即位以正其始而魯無臣子於此見焉凡簒弑之賊春秋皆成之為君歐陽永叔曰魯桓公弑隱公而自立者宣公弑子赤而自立者鄭厲公逐世子忽而自立者衞公孫剽逐其君衎而自立者春秋皆不絶其為君夫欲著其罪於後世在乎不没其實則四君之罪不可得而掩誠得春秋之意然所以得成為君者亦以國無二君也如昭二十三年敬王在國則尹氏立子朝不得稱王矣三月公會鄭伯于垂穀梁會者何外為主焉爾集說葉氏夢得曰衞州吁弑桓公而立厚問定君於石碏石碏曰王覲為可於是敎之使朝陳而請覲曹負芻殺宣公之子而自立諸侯與㑹於戚而執之曹人請於晉曰若有罪則君列諸會矣亂臣賊子之所懼者天子與侯伯爾天子而與之覲諸侯而與之㑹是既許之為君矣後雖有欲討者無所加兵焉此周之末造也宣公弑子赤而會齊侯於平州左氏以為宣公會齊人於是取濟西田以為賂左氏亦既言之桓之會鄭非齊之與宣㑹歟鄭伯以璧假許田則濟西之㑹也高氏閌曰鄭伯知公之簒逆不自安特為好會將以求賂焉度魯急於會諸侯必從所欲故也夫鄭莊與隱公同盟和好今見其賊不能討反有所邀求欲以定其位是誠何心哉自張氏洽曰公簒立而懼諸侯之討已欲外結好以固因鄭伯嘗歸祊以易許田而未遂乃求好於鄭鄭亦欲乗此機以求許田故㑹于垂簒弑之人凡民㒺不憝而鄭莊首與為會故書公會鄭伯言出於鄭志所以深罪鄭伯也李氏廉曰魯與鄭特相㑹盟者惟桓公之編有四㑹垂盟越盟武父會曹是也鄭莊之結魯桓與魯桓之交鄭突皆黨簒逆之賊爾卓氏爾康曰桓公為仲子所生於宋更親宋鄭向以公子馮故互相搆怨鄭於隱十年已伐宋今不結魯虞魯必助宋以相難魯固鄭所急欲善也隠公因隂結鄭况桓公身抱大惡又為宋親不交鄭鄭必仗大義以難魯鄭又魯所急欲善也故有是會鄭伯以璧假許田左傳公即位修好於鄭鄭人請復祀周公卒易祊田公許之三月鄭伯以璧假許田為周公祊故也公羊其言以璧假之何易之也易之則其言假之何為恭也曷為為恭有天子存則諸侯不得専地也許田者何魯朝宿之邑也諸侯時朝乎天子天子之郊諸侯皆有朝宿之邑焉此邑也其稱田何田多邑少稱田邑多田少稱邑穀梁假不言以言以非假也非假而曰假諱易地也禮天子在上諸侯不得以地相與也無田則無許可知矣不言許不與許也許田者魯朝宿之邑也邴者鄭伯之所受命而祭泰山之邑也用見魯之不朝於周而鄭之不祭泰山也胡傳許田所以易祊也鄭既歸祊矣又加璧者祊薄於許故也魯山東之國與祊為鄰鄭畿内之邦許田近地也以此易彼各利於國而聖人乃以為惡而隐之獨何歟曰利者人欲之私放於利必至奪攘而後厭義者天理之公正其義則推之天下國家而可行湯沐之邑朝宿之地先王所錫先祖所受私相貿易而莫之顧是有無君之心而廢朝覲之禮矣是有無親之心而棄先祖之地矣故聖人以是為國惡而隐之也其不曰以璧易田而謂之假者夫易則已矣言假則有歸道焉又以見許人改過遷善自新之意非止隐國惡而已也其垂訓之意大矣集說杜氏預曰魯不宜聽鄭祀周公又不宜易取祊田犯二不宜以動故隐其實不言祊稱璧假言若進璧以假田非久易也借孔氏穎達曰祊薄於許加之以璧易取許田非假之也不言以祊假而言以璧假者此璧實入於魯諸侯相交有執圭璧致信命之理故璧猶可言祊則不可言也祊許俱地以地借地易理已章非復得為隐諱故也為劉氏敞曰易之者我也使其辭若自鄭出然是亦之諱也又曰公羊謂許田者魯朝宿之邑也謂之許者繫之許也非也詩云居常與許復周公之宇然則周公受封本有此許邑非孔子作春秋故繫之許也且地邑各自有名或曰許田或曰龜隂田據實而書豈擅改易哉以蘇氏轍曰許田所以易祊也以祊為未足而益之璧耳程子曰隐公八年鄭伯使宛来歸祊盖欲易許田魯受祊而未與許及桓弑立故為㑹以求之復加以璧朝宿之邑先祖受之於先王豈可相易也故諱之曰假諱國惡禮也也陳氏傅良曰取許田曷為謂之以璧假鄭伯之辭公羊氏曰為恭也春秋之初諸侯之為惡必有辭焉以自文鄭伯以璧假許田齊侯鄭伯如紀單伯送王姬築王姬之館于外皆善辭也夫子傷周之敝曰利而巧文而不慙於春秋著其事以見王化衰風俗曰趨於變且以𤼵明鄭莊之欺也之黄氏震曰許田鄰於鄭鄭莊久欲得之故以祊歸取宋之郜防以予之得許而讓凡皆以投隱公之欲而冀許田之得也隱公雖受祊取防郜而辭許鄭無得而強之隱没而桓以簒立急於結援自固故許田卒為鄭所得書黄氏澤曰歸祊後復書我入祊重取地假許後不以許歸鄭重失地為内諱也案加璧易許田孔氏穎逹以為祊薄於許蘇氏轍胡氏安國皆從之陳氏傅良獨以為鄭伯自文之辭於當時情事亦合故竝存其說夏四月丁未公及鄭伯盟于越越杜注近垂地名當在山東兗州府曹州附近左傳結祊成也盟曰渝盟無享國穀梁及者内為志焉爾越盟地之名也胡傳垂之會鄭為主也故稱會越之盟魯志也故稱及鄭人欲得許田以自廣是以為垂之㑹桓公欲結鄭好以自安是以為越之盟夫弑逆之人孟子所謂不待敎命人得而誅之者也而鄭與之盟無俟於貶絶而惡自見矣集說杜氏預曰公以簒立而修好於鄭鄭因而迎之成禮於垂終易二田然後結盟程子曰桓公欲結鄭好以自安故既與許田又為盟也弑君之人凡民㒺不憝而鄭與之盟以定之其罪大矣王氏錫爵曰桓公弑立懼討故垂之一會既結鄭好自安而猶未可必信故既與許田又盟越以為定位計案越之盟左氏謂結祊成循其迹也穀梁謂内為志誅其心也鄭借易田之迹以行要求之心桓諱求盟之心而附結成之迹二傳似相異而意實相足也秋大水書水災之始左傳凡平原出水為大水公羊何以書記災也穀梁高下有水災曰大水胡傳大水者隂逆而與怨氣并之所致也桓行逆徳而致隂沴宜矣或問堯之時豈有致之者而曰洚水警予何也曰堯之水非有以致之開闢以來水之行未得其所歸故堯有憂焉使禹治之然後人得平土而居爾若曰洪水者積雨之所成時𤾉而熄矣奚待乎九年十有三載之治也山谷之所洩歟自禹功既施疏鑿決排以至於今而其流不減何也是知天非為堯有洪水之災至禹而後水由地中行爾後世有人為不善感動天變召水溢之災者必引堯為解誤矣集說范氏甯曰禮月令季秋行夏令則其國大水修孫氏復曰水不潤下也昔者聖王在上五事而彝倫叙則休驗應之故曰肅時雨若乂時𤾉若哲時燠若謀時寒若聖時風若若聖王不作五事廢而彝倫攸斁則咎驗應之故曰狂恒雨若僭恒𤾉若豫恒燠若急恒寒若䝉恒風若若春秋之世多災異者聖王不作故也然自隱迄哀天下之災異多矣悉書之則不可勝其所書矣是故孔子惟日食與内災則詳而書之外災則或舉其一或舉於齊鄭宋衞則天下之異從可見矣孫氏覺曰大者非常之辭水非常而為災或害禾稼敗廬舍凡為災則書之也水者隂也隂之盛至於大水而為災則陽不勝隂而隂専盛矣聖人既著其為災之跡又以見當時天下有召災之實春秋之間一魯國之小而大水者八天下之災又可勝紀乎致程子曰君徳修則和氣應而雨𤾉若桓行逆徳而隂沴乃其宜也家氏鉉翁曰不書月槩一秋而言也傷人害物而後書時汪氏克寛曰書時不書月則水之汎濫為害蓋歴而未平也經書内大水者八後此十三年書夏此年莊七年二十五年宣十年成五年皆書秋莊十一年宋大水亦書秋惟莊二十四年紀於八月姜氏入之後襄二十四年紀於七月日食之後書月者未至歴時之久然非非常為災則不志也冬十月穀梁無事焉何以書不遺時也春秋編年四時具而後為年集說俞氏皋曰雖無事必書時書首月而成嵗其有四時不具者盖闕文也附錄左傳冬鄭伯拜盟辛桓王未十年二年齊僖二十一年晉哀八年衞宣九年蔡桓五年鄭莊三十四年曹桓四十七年陳桓三十五年杞武四十一年宋殤十年秦寜六年楚武三十一年春王正月戊申宋督弑其君與夷及其大夫孔父左傳宋華父督見孔父之妻於路目逆而送之曰美而艷二年春宋督攻孔氏殺孔父而取其妻公怒督懼遂弑殤公君子以督為有無君之心而後動於惡故先書弑其君公羊及者何累也弑君多矣舍此無累者乎曰有仇牧茍息皆累也舍仇牧荀息無累者乎曰有有則此何以書賢也何賢乎孔父孔父可謂義形於色矣其義形於色奈何督將弑殤公孔父生而存則殤公不可得而弑也故於是先攻孔父之家殤公知孔父死已必死趨而救之皆死焉孔父正色而立於朝則人莫敢過而致難於其君者孔父可謂義形於色矣穀梁孔父先死其曰及何也書尊及卑春秋之義也孔父之先死何也督欲弑君而恐不立於是乎先殺孔父孔父閑也胡傳桓無王而元年書春王正月以天道王法正桓公之罪也桓無王而二年書春王正月以天道王法正宋督之罪也宋殤公立十年十一戰民不堪命孔父為司馬無能改於其徳非所謂格君心之非者然君弑死於其難處命不渝亦可以無媿矣父者名也著其節而書及不失其官而書大夫是春秋之所賢也督將弑殤公孔父生而存則不可得而弑於是乎先攻孔父而後及其君能為有無亦庶幾焉凡亂臣賊子畜無君之心者必先翦其所忌而後動於惡不能翦其所忌則有終其身而不敢動也華督欲弑君而憚孔父劉安欲叛漢而憚汲直曹操欲禪位而憚孔融此數君子者義形於色皆足以衞宗社而忤邪心姦臣之所以憚也不有君子其能國乎集說范氏甯曰姦逆之人王法所宜誅故書王以正之范氏邵曰會盟言及别内外也尊卑言及上下序也君孔氏穎達曰凡言其者是其身之所有君是臣之故臣弑君則云弑其君臣是君之臣故君殺臣則云殺其大夫子亦君之子故云殺其世子稱國稱人以殺亦言其者人與國竝舉一國之辭君與大夫皆是國人所有故亦言其也若兩臣相殺死者非殺者所有則兩書名氏不得言其若王札子殺召伯毛伯是也與夷是督之君言弑其君則可孔父非督之大夫而言及其大夫者與君俱死據君為文言宋督弑其君據督為文而上弑其君也言及其大夫孔父據君為文而下及其大夫言及與夷之大夫非督之大夫也又曰諸言父者雖或是字而春秋之世有齊侯禄父蔡侯考父季孫行父衞孫林父乃皆是名故杜以孔父為名君陸氏淳曰穀梁曰何以知其先殺孔父也臣既死不忍稱其名案趙子曰孔父之事自是史册載之非殤公自書也何闗君之不忍乎又曰不稱名盖為祖諱也案春秋魯史非孔子家傳安得祖諱乎孔劉氏敞曰及者何累也何以書賢也何賢乎孔父父之智則衆孔父之忠則盡矣託六尺之孤寄百里之命知必死而不避孔父可謂處命不渝矣春秋賢者不名孔父者所賢也則其名之何父前子名君前臣名杜氏云孔父稱名内不能治其閨門外取怨於民身死而禍及君故貶之非也春秋雖以字為襃然已名其君於上不得字其臣於下此所謂君前臣名禮之大節也用杜氏之意者乃當名君字大夫顛倒人倫乎其不通經亦巳甚矣弑蘇氏轍曰此弑其君與殺其大夫其言及何也由及之也公羊曰孔父字也其不名賢也諸侯不生名死猶名之大夫生名死而名正也孔父之死何賢而字乎且方名其君而字其臣禮乎逆程子曰桓公無王而書王正月正宋督之罪也弑之罪不以王法正之天理滅矣督雖無王而天理未嘗亡也人臣死君難書及以著其節父名也稱大夫不失其官也陳氏傅良曰華督則曷為但稱督隐桓莊之春秋凡賊皆名之張氏洽曰初宋穆公舍馮而立與夷使馮出居鄭與夷既立而鄭莊公欲納馮於宋於是自隐四年以後鄭宋屢相侵伐華督盖馮之黨也將弑與夷而憚孔父故先攻殺孔父殤公怒則弑之遂召馮而立焉書與夷之弑而後及孔父明孔父之死為君故所以著其節也是家氏鉉翁曰桓王伐鄭以師從者猶有蔡衛陳使時王能以誅討二簒號召天下名之正言之順諸侯大國必將來會允馮督翬可坐而翦也惟其無志於此王綱日壞主威日削凶彚日繁春秋所為作為是故耳又曰此春秋誅亂賊崇死節之始也公羊得表章死節之意汪氏克寛曰或謂孔父不當䝉弑丈夫茍書曰宋督弑其君與夷遂殺其大夫孔父則不見孔父為君而死而大臣扞君之節不著矣故特書及以襃其死君難此聖筆之精意也湛氏若水曰以臣弑君人倫之大變書春王正月戊申以時月日紀其實大變不可不詳史之法也季氏本曰春秋書死難者三孔父仇牧荀息皆忠於所事而無二心者也凡非其本心與動於私者皆不預焉案穀梁以孔父為字趙氏匡駁之是矣左氏以父為名杜氏預因為罪孔父之說亦非也惟劉氏敞君前臣名之說最為精當故程子及蘇氏轍胡氏安國皆用之啖氏助則云孔字父美稱也孔氏之先皆以字連父故有弗父金父若孔為氏豈世世改乎又春秋時名嘉者多字孔是其證也此說甚詳核然名君而字臣於義終未安故主劉傳而啖氏之說附存於此滕子來朝集說杜氏預曰隱十一年稱侯今稱子者盖時王所黜楊氏士勛曰周公之制爵有五等所以擬其黜陟此時周徳雖衰尚為天下宗主滕今降爵明是時王所黜也葉氏夢得曰滕侯國何以稱子時王貶之也諸侯一不朝則貶其爵宗廟有不順亦絀以爵焉周道也滕侯必居一於此矣王政不行於諸侯何以能加於滕春秋之小國猶有聽命焉者也故把於桓以侯見至僖而書子薛於隱以侯見至莊而書伯與是為三皆微國也大國則莫見焉把與僖以子見至文則復書伯亦以是進之也自文以後雖三國亦莫行則周益衰矣或者以為進退皆春秋夫爵王命也可春秋而専之乎以春秋為可専則諸侯之惡有大於此三國者何以不貶或曰小白伯而正王爵把薛盖終小白之世未嘗與齊通也朱子曰滕子來朝或以春秋惡其朝桓特削而書子自此之後滕一向稱子豈春秋惡其朝桓而幷後代子孫削之乎或以為當喪未君前又不見滕侯卒皆不通之論李氏廉曰案滕稱子杜氏與穀梁同張氏與胡氏同張氏之說𤼵明胡氏然春秋善善長惡惡短先王罸弗及嗣安有一人之罪而世世子孫受貶黜乎趙子以滕子此朝為在喪而後日齊桓覇後方與把薛皆降號以從會此亦為有見者而在喪之說鑿矣故沙随程可久以為春秋時大國強暴每責賦於小國小國不堪多自降爵以從殺禮引子産爭承以為證盖亦用趙子意朱子極取之然考之於經諸侯降爵惟滕薛把滕初稱侯自桓二年始稱子薛初稱侯至莊三十一年始書伯以為自降可也杞初稱侯至莊二十七年稱伯而僖二十三年卒稱子文十二年稱伯而襄二十九年來盟又稱子其升降不一比前說又不通矣且二邾皆自附庸升而為子傳者以為齊桓請於天子命為諸侯由是觀之則又似時王黜陟之說亦可行姑記所聞以俟知者又曰程子以滕稱子為臣屬於楚朱子曰滕未嘗服楚不知何據桓卓氏爾康曰灌甫曰案樂正子記滕薛旅朝隱公王聞之徴朝滕以子徃薛以伯徃王怒皆黜焉以子徃以伯徃自貶之說王怒皆黜焉時王所黜之說也因其子徃而貶之尤易為力樂正所記可作兩證頗陳氏際泰曰胡文定貶滕子之說非徒刻也又復甚滕侯不得已而朝也則與紀侯等也無罪焉爾已其為桓而朝乎宜在穀鄧二侯之列貶名足矣奈何子之即子之而奈何終其身且世世也滕孱國耳貶之若是即前伐鄭四國與後成宋亂四國罪有大焉者矣而又何無此峻刑乎即桓之身與桓之子若孫其又何罪之從此又必窮之獄也案滕降稱子趙氏匡以為當喪未君程子以為後臣屬於楚胡氏安國以為貶其朝桓朱子皆駁之獨取程氏逈自貶以省貢賦之說於情事為近而揆諸春秋之義例亦有不可通者五等之列周有定制春秋不聽諸侯之自尊而獨聽其自貶耶故惟杜氏預楊氏士勛為時王所貶之說為得其實胡氏安國曰時王能黜諸侯則春秋不作夫東周之替也齊晉之覇實王命之儀父黎來實王爵之即其威不行於呉楚之遠且大若滕薛把小邦以為時王所黜夫豈不可春秋之後又將百年周益卑矣三晉為侯猶請命焉况平桓之世東遷之初乎三月公會齊侯陳侯鄭伯于稷以成宋亂稷杜注宋地當在今歸徳府境左傳㑹于稷以成宋亂為賂故立華氏也宋殤公立十年十一戰民不堪命孔父嘉為司馬督為大宰故因民之不堪命先宣言曰司馬則然已殺孔父而弑殤公召莊公於鄭而立之以親鄭以郜大鼎賂公齊陳鄭皆有賂故遂相宋公郜杜注國名濟隂城武縣東北有郜城盖郜有二城北郜城則為郜國又南二里曰南郜城則為宋邑隠十年取郜是也俱在山東兗州府城武縣公羊内大惡諱此其目言之何遠也所見異辭所聞異辭所傳聞異辭隠亦遠矣曷為為隱諱隱賢而桓賊也穀梁以者内為志焉爾公為志乎成是亂也此成矣取不成事之辭而加之焉於内之惡而君子無遺焉爾胡傳華督弑君之賊凡民㒺不憝也而桓與諸侯會而受賂以立華氏使相宋公甚矣故特書其所為而曰成宋亂夫臣為君隠子為父隠禮也此其目言之何桓惡極矣臣子欲盡隠之而不可以欺後世其曰成宋亂而不書立華氏猶為有隱乎爾春秋列會未有言其所為者獨此與襄公末年會於澶淵各書其事者桓弑隠督弑殤般殺景皆天下大惡聖人所為懼春秋所以作也一則受宋賂而立華氏一則謀宋災而不能討故特書其事以示貶焉然澶淵之會既不書魯卿又貶諸國之大夫而稱人此則書公又序諸侯之爵何也澶淵之會欲謀宋災而不討弑君之賊雖書曰宋災故而未能表其誅責之意也必深諱魯卿而重貶諸國之大夫然後足以啓問者見是非也稷之㑹前有宋督弑君後有取宋鼎之事書曰成宋亂則其責已明不必諱公與貶諸侯之爵次然後見其罪矣集說何氏休曰宋公馮與督共弑君而立諸侯會于稷欲共誅之受賂便還令宋亂遂成桓公本亦弑隱而立君子疾同類相養小人同惡相長故賤不為諱也古者諸侯五國為屬屬有長二屬為連連有帥三連為卒卒有正七卒為州州有伯也州中有為無道者則長帥卒正伯當征之不征則與同惡當春秋時天下散亂保伍壊敗雖不誅不為成亂今責其成亂者疾其受賂也加以者辟直成亂也徐氏邈曰春秋雖為親尊者諱然亦不没其實故納鼎於廟躋僖逆祀及王室之亂昭公之孫皆指事而書孫氏復曰弑君之賊諸侯皆得討之宣十一年楚人殺陳夏徴舒是也此言公㑹齊侯陳侯鄭伯于稷以成宋亂者惡不討賊也成劉氏敞曰保人之賊私人之賂制人之上下謂之亂則可謂之平亂則不可杜氏云成平也非也春秋有輸平又有暨齊平又有公及齊侯平莒及郯皆直稱平若春秋欲諱受賂之惡言其平宋亂乃是矣今不曰平而曰成此豈平之謂乎且案傳曰會于稷以成宋亂為賂故立華氏也此則傳以受賂立華氏解經之成宋亂也豈不明哉也程子曰宋弑其君而四國共成定之天下之大惡是朱子曰春秋大義數十如成宋亂宋災故之類乃聖人直著誅貶自是分明陳氏傅良曰向也合五國之君大夫以定州吁而州吁訖於討今也合四國之君以立華督督遂相宋莊弑君之禍接迹於天下四君為之也春秋之襃貶至於變文嚴矣向也五國之君大夫書之復書之終春秋僅一再見焉以變文為猶未也而直言其所為舍此無復見者矣此家氏鉉翁曰督雖弑君而馮之位未定今三國為會將以謀宋而邀利而馮之位始定督之罪始得無討故成宋亂者三國也所以使三國成此亂者魯也穀梁曰以者内為志又曰公為志乎成此亂深得聖人之意邵氏寶曰春秋紀事書也而幷言其意者有四事焉曰成宋亂也曰宋災故也曰釋宋公也曰伐楚以救江也皆不能已於言者也易曰繫辭焉以盡其言四事者近之君卓氏爾康曰討弑者明正其罪莫如州吁以後弑者輩出多不書矣成弑者明著其罪莫如于稷以後逆黨者輩出多不書矣春秋之初止記二條以為大法而已張氏溥曰是會也名定宋公實立華氏也魯桓弑君之賊與督同惡亟成宋亂非徒為督於已亦有利焉是故齊陳鄭受宋賂不書魯受郜大鼎則書取書納詞重而不殺魯桓黨逆之罪深於三國也夏四月取郜大鼎于宋戊申納于大廟左傳夏四月取郜大鼎于宋戊申納于大廟非禮也臧哀伯諫曰君人者將昭徳塞違以臨照百官猶懼或失之故昭令徳以示子孫是以清廟茅屋大路越席大羮不致粢食不鑿昭其儉也袞冕黻珽帯裳幅舄衡紞紘綖昭其度也藻率鞞鞛鞶厲游纓昭其數也火龍黼黻昭其文也五色比象昭其物也錫鸞和鈴昭其聲也三辰旂旗昭其明也夫徳儉而有度登降有數文物以紀之聲明以𤼵之以照臨百官百官於是乎戒懼而不敢易紀律今滅徳立違而寘其賂器於大廟以明示百官百官象之其又何誅焉國家之敗由官邪也官之失徳寵賂章也郜鼎在廟章孰甚焉武王克商遷九鼎於雒邑義士猶或非之而況將昭違亂之賂器於大廟其若之何公不聽周内史聞之曰臧孫達其有後於魯乎君違不忘諫之以徳雒邑杜注武王但營雒邑未有都城周公乃卒營雒邑謂之王城即河南城也今河南河南府洛陽縣城内西偏即王城故址公羊此取之宋其謂之郜鼎何器從名地從主人器何以從名地何以從主人器之與人非有即爾宋始以不義取之故謂之郜鼎至乎地之與人則不然俄而可以為其有矣然則為取可以為其有乎曰否何者若楚王之妻媦無時焉可也戊申納于大廟何以書譏何譏爾遂亂受賂納于大廟非禮也穀梁桓内弑其君外成人之亂受賂而退以事其祖非禮也其道以周公為弗受也郜鼎者郜之所為也曰宋取之宋也以是為討之鼎也孔子曰名從主人物從中國故曰郜大鼎也胡傳取者得非其有之稱納者不受而強致之謂弑逆之賊不能致討而受其賂器寘于大廟以明示百官聖人直載其事垂訓後世使知寵賂之行保邪廢正能敗人之國家也亦或知戒矣集說杜氏預曰戊申五月十日戊孔氏穎達日長厯此年四月庚午朔其月無申五月己亥朔十日得戊申是有日而無月也大劉氏敞曰此取之宋其謂之郜大鼎何郜所守之鼎也武王克商封諸侯班宗彝以為子孫藏郜以不義失之宋以不義得之雖久非其有也故謂之郜大鼎程子曰四國既成宋亂而宋以鼎賂魯齊陳鄭皆有賂魯以為功而受之故書取以成亂之賂器寘於周公之廟周公其饗之乎故書納納者弗受而強致之也鄭葉氏夢得曰鄭人以賂輸平於我而我從之故書伯使宛來歸邴我責賂於宋以成其亂而宋與焉故書取郜大鼎于宋有所刺於後必有所見於前其曰取于宋宋非我所得取也周公稱大廟魯公稱世室羣公稱宫魯道也廟之有器所以薦徳不義而薦之是謂瀆其祖納者以力強致之辭也大家氏鉉翁曰前書成宋亂兼責四國也此書取郜鼎納于大廟専責魯也魯李氏廉曰春秋致賂例宋以郜鼎賂公而書取在魯以濟西賂齊而書取在齊蔽罪於魯齊也齊致衞寶而書來歸結正諸侯之罪不獨在魯也秋七月把侯來朝公穀作紀侯胡傳公穀程氏皆以把為紀桓弟弑兄臣弑君天下之大惡王與諸侯不奉天討反行朝聘之禮則皆有貶焉所以存天理正人倫也紀侯來朝何獨無貶乎當是時齊欲滅紀紀侯求魯為之主非為桓立而朝之也集說劉氏敞曰左氏云把侯不敬歸乃謀伐之九月入把是也案公羊經紀侯來朝竊以謂當作紀不當作把春秋雖亂世至於兵革之事亦慎用之杞來朝魯有少不敬未宜便入其國也左氏誤紀為杞遂生不敬之說穀梁曰朝時此其月何也桓内弑其君外成人之亂於是為齊侯陳侯鄭伯討數日以賂已即是事而朝之惡之故謹而月之非也六年冬紀侯來朝猶是前紀侯耳猶是此桓公耳行不加進惡不差減而紀侯過而不改其責宜深深則宜日反書時何哉是豈春秋不惡之乎程子曰凡杞稱侯者皆當為紀杞爵非侯文誤也及紀侯大去其國之後把不復稱侯矣呉氏􅊹曰齊謀幷紀而鄭助之紀國小弱為齊鄭所謀度不能自存以魯與齊鄭睦故來朝魯將求芘焉李氏廉曰紀稱侯公羊注以隱二年考之紀本非侯爵此稱侯者天子將娶於紀故封之百里後恒稱侯而穀注亦以為蓋時王所進是皆不知紀子伯為闕文之故爾年汪氏克寛曰成七年曹伯朝六年十八年定十五邾子朝皆書月不可以書月為貶蔡侯鄭伯會于鄧鄧杜注潁川召陵縣西南有鄧城今鄧襄城在河南開封府郾城縣東南三十五里公羊以鄧為國則五年鄧侯來朝即其君也左傳始懼楚也楚杜注楚國南郡江陵縣北紀南城也孔疏譜云楚芈姓顓頊之後其後鬻熊事周文王早卒成王封其曾孫熊繹於楚以子男之田居丹陽南郡枝江是也熊通始稱武王武王居郢江陵是也今江陵縣屬荆州府紀南城在府北十里枝江縣亦屬荆州府公羊離不言會此其言會何蓋鄧與會爾胡傳案左氏曰始懼楚也其地以國鄧亦與焉楚僭號稱王憑陵江漢此三國者地與之鄰是以懼也其後卒滅鄧虜蔡侯而鄭以王室懿親為之服役終春秋之世聖人蓋傷之也夫天下莫大於理莫強於信義循天理惇信義以自守其國家荆楚雖大何懼焉不知本此事醜徳齊莫能相尚則以地之大小力之強弱分勝負矣集說何氏休曰時因鄧都得與鄧會自三國以上言會者重其少從多也杜氏預曰楚武王始僭號稱王蔡鄭姬姓近楚故懼而㑹謀康李氏廉曰楚自熊繹始受封六世至熊渠立其子為句亶王紅為鄂王執疵為越章王此僭王之始又八世至熊儀是為若敖又二世至熊眴是為蚡冒又一世至熊通是為武王武王十九年入春秋侵隨於桓之六年合諸侯於桓之八年圍鄾敗鄧於桓之九年盟貳軫敗鄖師蒲騷於桓之十一年伐絞伐羅楚已大於江漢之間矣莊公四年文王熊貲立莊六年而伐申莊十年而執蔡侯莊十六年而滅鄧於是楚勢益張他日爭伯之權輿始此湛氏若水曰三國不守㑹同之大義不宜會而㑹以謀禦楚則終不免矣時季氏本曰蔡鄭鄧三國皆在楚北境而鄧尤近是熊通始僭稱王憑陵江漢鄧先患之故為地主而會蔡鄭於其國不知蔡桓鄭莊本無遠慮不足與謀後五年鄧侯吾離奔魯蓋日廹於楚而轉託於周公之後矣案公羊以為鄧與會胡氏安國及湛氏若水季氏本皆因之隱元年盟宿之例正與此合釋例以鄧為蔡地孔氏穎逹遂謂鄧國去蔡甚遠蔡鄭不宜遠會其國都其說亦通九月入杞穀梁我入之也集說杜氏預曰不稱主帥微者也伐程子曰將卑師少外則稱人内則止云入某某高氏閲曰此年入杞八年入邾其辭雖略而罪有餘也夫桓弑君莫入莫伐而已乃入人伐人是使天下共蒙其恥也書汪氏克寛曰或以為蔡鄭入杞然滅偪陽滅賴皆遂此不書遂則入者魯也左傳謂討其來朝之不敬蓋因僖二十七年春把子來朝秋公子遂帥師入杞而傅㑹其説耳公及戎盟于唐左傳修舊好也集說陳氏深曰桓弑逆而懼人之討汲汲乎與戎盟以自固書之以示貶也呉氏澂曰隱公因戎之請盟至再而後與盟今戎不請而桓及之盟蓋與及鄭盟越之意同以已之負大惡而結好以自固也為季氏本曰懼戎患復修舊好冬公至自唐此書至之始左傳告於廟也凡公行告於宗廟反行飲至舍爵策勲焉禮也特相㑹徃來稱地讓事也自參以上則往稱地來稱㑹成事也集說杜氏預曰傳例曰告於廟也特相會故致地也凡公行不書至者皆不告廟也孔氏穎達曰反行必告而春秋公行一百七十六書至者惟八十二耳其餘不書者釋例曰凡公之行不書至者九十有四皆不告廟也隱公之不告謙也餘公之不告慢於禮也慢於禮者舉大例言耳若行有恥辱克躬罪已不以告廟非為慢於禮也若事實可恥而不以為恥反行告廟則史亦書之宣五年傳曰公如齊高固使齊侯止公請叔姬焉夏公至自齊是不應告而告故書之以示過也釋例又曰桓公之喪至自齊此則死還告廟而書至者也莊公違禮如齊觀社用飲至之禮此則夫禮之書至者也宣公黒壤之㑹以賂免諱不書盟而復書至亦諱不以見止告廟也襄公至自晉此則榮還而書至者也昭公至自齊居于鄲此則宜告而書至者也僖十六年公㑹諸侯于淮未歸而取項齊人以為討而止公十七年聲姜以公故會齊侯于卞公始得歸而書公至自會是諱止而以㑹告也諸侯盟者必在會後皆書公至自㑹不言公至自盟者以盟是因會而為之公行以㑹告廟故還以㑹告至雖幷以盟告亦不云至自盟為行時不以盟告故也僖二十八年公會諸侯于溫遂圍許經書公至自圍許襄十年公會諸侯于柤遂滅偪陽經書公至自會二文不同釋例曰諸若此類事勢相接或以始致或以終致蓋時史之異耳無他義也定十二年公至自圍成行不出境而亦告廟者釋例曰陪臣執命大都耦國仲由建墮三都之計而成人不從故公親伐之雖不越境動衆興兵大其事故出入皆告於廟也啖氏助曰凡公行一百七十有六書至者八十有二不書至者九十有四左傳謂告廟則書於策夫子隨其所至以示功過且志其去國逺邇遲速也其有一出而渉兩事者或致前事或致後事擇其重者志之也又有不致本事者本事非功也十二公惟隱不告蓋謙讓不以人君之禮自處也其謙不以告或恥也或怠也劉氏敞曰曷為或至或不至至禮也不至非禮也君行必告於廟反必奠而後入朝劉氏絢曰君行其至必書於法當然也古之諸侯會有常節出入有常期周衰以後無法妄行征伐會盟紛紛四出棄社稷委人民往往越月踰歲而後得返觀其所書而其亂自著矣此劉氏永之曰夫時有逺近則史有詳略辭有同異其易曉也自文以前君行八十書至者十七文以後君行九十書至者六十四是也案反行必告則史書其至不告則不書杜注孔疏甚明諸家紛紛或以為遠或以為久或以為危或以為幸失之鑿矣附錄左傳初晉穆侯之夫人姜氏以條之役生大子命之曰仇其弟以千畝之戰生命之曰成師師服曰異哉君之名子也夫名以制義義以出禮禮以體政政以正民是以政成而民聽易則生亂嘉耦曰妃怨耦曰仇古之命也今君命大子曰仇弟曰成師始兆亂矣兄其替乎惠之二十四年晉始亂故封桓叔於曲沃靖侯之孫欒賔傅之師服曰吾聞國家之立也本大而末小是以能固故天子建國諸侯立家卿寘側室大夫有貳宗士有隸子弟庻人工商各有分親皆有等衰是以民服事其上而下無覬覦今晉甸侯也而建國本既弱矣其能久乎惠之三十年晉潘父弑昭侯而納桓叔不克晉人立孝侯惠之四十五年曲沃莊伯伐翼弑孝侯翼人立其弟鄂侯鄂侯生哀侯哀侯侵陘庭之田陘庭南鄙啓曲沃伐翼條杜注晉地今山西平陽府解州安邑縣有中條山縣北三十里有鳴條岡千畝杜注西河界休縣有地名千畝今平陽府介休縣有千畝原東陘庭杜注翼南鄙邑翼即今平陽府翼城縣縣南七十五里有熒庭城志云即陘庭也壬桓王十申一年三年齊僖二十二年晉哀九年衞宣十年蔡桓六年鄭莊三十五年曹桓四十八年陳桓三十六年杞武四十二年宋莊公馮元年秦寧七年楚武三十二年春正月胡傳桓公三年而後經不書王有以為周不班厯者昭公末年王室有子朝之亂豈暇班厯而經皆書王非不班厯明矣又有以為此闕文也安得一公之内凡十四年皆不書王其非闕文亦明矣然則云何桓公弑君而立至於今三年而諸侯之喪事畢矣是入見受命於天子之時也而王朝之司馬不施殘執之刑鄰國之大夫不聞有沐浴之請魯之臣子義不戴天反面事讎曽莫之恥使亂臣賊子肆其凶逆無所忌憚人之大倫滅矣故自是而後不書王者見桓公無王與天王之失政而不王也集說何氏休曰無王者以見桓公無王而行也二年有王者見始也十年有王者數之終也十八年有王者桓公之終也於孔氏穎達曰桓公元年二年十年十八年凡四年春有王九年春無王無月其餘十三年雖春有月悉皆無王字趙氏匡曰詳經意直以桓公不顧王法故去其王以見其罪耳劉氏敞曰何以不書王桓無王也桓何以無王桓不受命於王也諸侯喪畢以士服見天子未受命不敢服其服也巳見天子賜之黻冕圭璧然後服歸設奠於祖廟然後臨諸臣桓内弑其君外成人之亂弱天子而不受命則固無王也不書王見不受命也不受命雖久不得為諸侯二年有王未畢喪也又曰何休曰二年有王見始也不就元年見始者未無王也非也弑君之罪不輕於成人亂易地之惡不差於納鼎太廟而以為元年未無王輕重失序矣弑君見於即位成亂效於納賂易地著於璧假其迹已明雖使春秋歲輙書王其可謂桓有王乎然則不書王其不為此數事亦明矣程子曰桓公弑君而立元年書王以王法正其罪也二年宋督弑君以王法正其罪也三年不書王見桓之無王也家氏鉉翁曰王室微弱不能誅討亂賊元年二年猶書王望之也今魯隱喪事既終逆桓未能入見天子而明年春宰糾銜命下聘自是再三聘當誅而奬王綱盡矣天下不復知有王自是不書王示天下之無王也李氏廉曰案桓公惟元年二年十年十八年有王趙氏以為後人誤加其說已非而注穀梁者見二年書王以為正與夷之卒遂附會以為十年書王正終生之卒是又不知正弑逆之義矣注公羊者於十年十八年書王得之而元年書王以為桓公此時未敢無王至三年始著其無王之罪是又穿鑿之甚也故胡氏獨取程子又案范氏例春秋上下無王者凡一百有八桓無王見不奉王法餘公無王者為不書正月不得書王也宣亦簒位而不去者罪之輕重異也則趙氏恒曰春秋之法莫嚴於弑君之賊故其立法以天下無非當討之人亦無往而非可討之時以當時之人言不但責之天王也而又責之鄰國責之魯國臣子其責之天王固為王法其責之鄰國與魯人亦王法也以可討之時言元年則書王三年以後不書王十年則書王十八年將終又書王其書王者固為示王法之當討其不書者亦為示王法之當討也附錄左傳春曲沃武公伐翼次於陘庭韓萬御戎梁𢎞為右逐翼侯於汾隰驂絓而止夜獲之及欒共叔汾隰杜注汾水邊釋例汾水出太原故汾陽縣至河東汾陰入河今汾水出太原府靜樂縣西南至府城西東南流經汾州平陽二府至滎河縣北入河靜樂漢汾陽滎河漢汾陰也欒杜注晉地晉大夫欒氏封邑今直隸真定府欒城縣是也公會齊侯于嬴嬴杜注齊邑泰山嬴縣今故城在山東泰安州東南五十里左傳會于嬴成昏於齊也集說杜氏預曰公不由媒介自與齊侯會而成昏非禮也孫氏覺曰桓二年嘗與齊侯會于稷成宋之亂於是復為之㑹而經不繫事秋七月遂有公子翬如齊逆女之事是於未婚之前而為此會也左氏曰成婚於齊是也桓公與齊謀婚而不由紹介之命媒妁之言身至齊境以與齊謀已之婚醜惡見矣張氏洽曰亂臣賊子與會而為婚著齊侯之罪也家氏鉉翁曰魯桓懼方伯之有討而乞昏於齊以為此會非媒而昏昏不以正也越境而會會不以正也使其私人徃逆逆不以正也為齊侯而親迎迎不以正也是以春秋於嬴之㑹讙之㑹謹而書之又曰是時鄭莊善用兵齊為强國故桓以賂結鄭以昏求齊所以逭弑君之討而終殞於齊天也非人所能為也案會者外為志書會不書及當以張氏洽責齊之說為正蓋畏討者魯之情黨惡者齊之罪經意尤惡齊故獨書會夏齊侯衞侯胥命于蒲蒲杜注衞地在陳留長垣縣西南今直隸大名府長垣縣治故蒲城是也左傳不盟也公羊胥命者何相命也何言乎相命近正也此其為近正奈何古者不盟結言而退穀梁胥之為言猶相也相命而信諭謹言而退以是為近古也是必一人先其以相言之何也不以齊侯命衛侯也胡傳公羊曰胥命者相命也相命近正也古者不盟結言而退人愛其情私相疑貳以成傾危之俗其所由來漸矣有能相命而信諭豈不獨為近正乎故特起胥命之文於此有取焉聖人以信易食荅子貢之問君子以信易生重桓王之失信去則民不立矣故荀卿言春秋善胥命集說何氏休曰盟不歃血但以命相誓善其不盟近正似於古而不相背故書以撥亂也范氏甯曰江熙曰齊衞胥命雖有先倡倡和理均若以齊命衞則歸功於齊以衛命齊則齊僅隨從言其相命則冺然無際矣大楊氏士勛曰今二國相命則大者宜倡小者宜和則齊也小則衛也故傳云不以齊侯命衛侯也明齊大也但倡和理均故直以相命言之劉氏敞曰胥命者何相命也何言乎相命古者有方伯有州牧有卒正有連率命於天子正也諸侯自相命非正也齊大公之後東州之侯也衛康叔之後北州之侯也以事相命也又曰齊侯衛侯胥命于蒲公羊以謂結言而不盟春秋善之也非也春秋亂世齊衛凡君㑹而相命蓋何足算陽穀之會公羊以謂逺國皆至桓公發禁於諸侯諸侯咸無用盟最盛矣豈非結言而退乎則何不謂之胥命哉可蘇氏轍曰胥命者約言而不盟也有以相命故不以言㑹未嘗歃血故不可以言盟也程子曰二國為㑹約言相命而不為盟詛近於理故善之朱子語類問張洽曰尋常如何理會是胥命曰嘗考之矣當從劉侍讀之説自王命不行則諸侯上僭之事由階而升然必與勢力之不相上下者共為之所以布於衆而成其僭也齊衛當時勢敵故齊僖自以為小伯而黎人責衛以方伯之事當時王不能命伯而欲自為伯故於此彼此相命以成其私也及其久也則力之能為者専之矣故桓公遂自稱伯以至戰國諸侯各有稱王之意不敢獨稱於國必與勢力之相侔者共約而為之魏齊會於濁澤以相王是也其後七國皆王秦人思有以勝之於是使人致帝於齊約共稱帝自相命而至於相王自相王而至於相帝僭竊之漸勢必至此豈非其明證乎曰然則左傳所謂胥命於弭何也曰此以納王之事相遜相先也曰説亦有理考汪氏克寛曰朱子意與程子傳稍異姑兩存之竊莊二十一年鄭虢胥命於弭同謀納王不可云相命以伯況齊衛胥命之後不聞有㑹盟侵伐之事僅能一戰于郎一盟惡曹皆以鄭忽之故則非相推為伯矣蓋胥命者相結以言而不盟而相結之善惡則存乎其事耳泰邵氏寶曰胥命一體也來言又一體也也陳氏際曰于垂貶也書遇譏其簡禮也于蒲善書胥命美其近正也案公穀皆以胥命為善程子因之而胡傳亦主其説蓋比之屢盟長亂者為近古也張氏洽從劉氏敞之説謂彼此相命以成其私而極言其僭竊之所至朱子以為有理故竝存之六月公會把侯于郕把公作紀郕公作盛集說程子曰自桓公簒立無嵗不與諸侯盟會結外援以自固也高氏閌曰紀侯懼齊欲親魯郕亦然公張氏洽曰紀與魯親而求援於魯以抗齊鄭故桓因其二年來朝而與之㑹也汪氏克寛曰程子云把稱侯皆當為紀左傳云把求成豈因入杞而傳會其説歟案左穀俱作杞公羊獨作紀程子以為杞稱侯皆為紀當以公羊為是蓋齊魯方睦紀與郕皆畏齊故會魯而求庇也高氏閌之説得之秋七月壬辰朔日有食之旣公羊既者何盡也穀梁既者盡也有繼之辭也胡傳日者衆陽之宗人君之象而有食之既則其變大矣集說何氏休曰光明滅盡也食范氏甯曰盡而復生謂之既孔氏穎達曰既者謂日光盡也故云既盡也月體無光待日照而光生半照即為弦全照乃成望為日光所照反得奪月光者厯家之説當日之衝有大如日者謂之闇虚闇虚當月則月必滅光故為月食張衡靈憲曰當日之衝光常不合是謂闇虚在星則星微遇月則月食是言日奪月光故月食也若是日奪月光則應每望常食而望亦有不食者由其道度異也日月異道有時而交交則相犯故日月遞食交在望前朔則日食望則月食交在望後望則月食後月朔則日食交正在朔則日食既前後望不食交正在望則月食既前後朔不食大率一百七十三日有餘而道始一交非交則不相侵犯故朔望不常有食也道不正交則日斜照月故月光更盛道若正交則日衝當月故月光即滅譬如火斜照水日斜照鏡則水鏡之光旁照他物若使鏡正當日水正當火則水鏡之光不能有照日之奪月亦猶是也日月同會道度相交月食是日光所衝日食是月體所掩故日食常在朔月食常在望也食有上下者行有高下謂月在日南從南入食南下北高則食起於下月在日北從北入食則食發於高是其行有高下故食不同也故異義云月高則其食虧於上月下則其食虧於下也日月之體大小正同相掩密者二體相近正映其形故光得溢出而中食也相掩疏者二體相遠月近而日遠自人望之則月之所映者廣故日光不復能見而日食既也日食者實是月映之也但日之所在則月體不見聖人不言月來食日而云有物食之以自食為文闕於所不見也孫氏復曰凡日食人君皆當戒懼修德以消其咎書程子曰既盡也食盡為異大也家氏鉉翁曰此食既之始也四李氏廉曰食既例三此年及宣八年七月襄二十年七月皆大變也黄氏正憲曰列國分野上應列宿日月交㑹之辰亦各有所屬故日雖無所不照而所食之影在下觀之有正而多者有偏而少者當時所食之處必關於魯分居多故自魯觀之見其為既案胡傳引穀梁不書朔不書日為夜食謂因朝日而知之者非也既曰見其虧傷矣則時刻可稽書朔書日無不可且使日食於亥子之交未出地而復明則雖朝日何從見其虧傷之處耶蓋日食不占夜猶月食不占晝是以唐一行作厯上溯往古千有餘年日食長在晝月食長在夜也公子翬如齊逆女胡傳娶妻必親迎禮之正也若夫邦君以爵則有尊卑以國則有大小以道途則有遠邇或迎之於其國或迎之於境上或迎之於所館禮之節也紀侯於魯以小大言則親之者也而使履緰來魯侯於齊以遠邇言則親之者也而使公子翬往是不重大昏之禮失其節矣故書集說范氏甯曰翬稱公子者桓不以為罪人也逆孔氏穎達曰天子尊無與敵不自親迎使卿而上公臨之諸侯則親逆有故得使卿八年祭公逆王后于紀傳曰禮也是當使人天子不親逆也襄十五年傳曰官師從單靖公逆王后于齊卿不行非禮也是知天子之禮當使卿逆而上公臨之也禮記哀公問曰冕而親迎不已重乎孔子對曰合二姓之好以繼先聖之後以為天地宗廟社稷之主君何謂已重乎此對哀公指言魯事是諸侯正禮當親逆也莊二十四年公如齊逆女丘明不為之傳以其得禮故也文四年逆婦姜于齊傳曰卿不行非禮也以卿不行為非禮知君有故得使卿逆也孫氏復曰是時文姜亂魯驪姬惑晉南子傾衛夏姬喪陳上下化之滔滔皆是不可悉舉也故自隱而下夫人内女出處之迹皆詳而錄之以懲以戒為萬世法秋劉氏敞曰左氏曰修先君之好故曰公子非也春非修先君之好而稱公子者多矣若修先君之好乃稱公子者翬帥師適其宜矣無謂疾之去氏也張氏洽曰君臣同弑隱公乃昏於齊以求配偶所謂不待貶絶而罪惡見者也俞氏皋曰在齊故稱女逆女為桓公逆夫人也者李氏廉曰逆女例諸侯親迎當事不書書魯之逆五惟莊逆哀姜以仇女為譏其餘若翬逆文姜公子遂逆穆姜叔孫僑如逆齊姜皆卿為君逆也出姜不書逆者蓋公也譏禮成於齊故不斥公也遂汪氏克寛曰翬為桓弑隱復為桓逆女以結齊好為宣弑赤復為宣納賂逆婦以結齊援皆不待貶絶而罪惡見者也子陳氏際泰曰公子翬不宜逆女也輕也然公翬尤不宜逆女也賊也案紀履緰來逆女程子謂親迎於其所館豈有遠適他國以迎婦者張氏洽主其説洵為有理故此年公子翬如齊逆女凡以不親迎為譏者皆刪之九月齊侯送姜氏于讙讙杜注魯地濟北蛇丘縣西有下讙亭今濟南府肥城縣西南有故城水經注云俗訛為夏暉城左傳齊侯送姜氏非禮也凡公女嫁於敵國姊妹則上卿送之以禮於先君公子則下卿送之於大國雖公子亦上卿送之於天子則諸卿皆行公不自送於小國則上大夫送之公羊何以書譏何譏爾諸侯越竟送女非禮也此入國矣何以不稱夫人自我言齊父母之於子雖為鄰國夫人猶曰吾姜氏穀梁禮送女父不下堂母不出祭門諸母兄弟不出闕門父母戒之曰謹慎從爾舅姑之言諸母般申之曰謹慎從爾父母之言送女踰竟非禮也集說劉氏敞曰此入國矣何以不稱夫人未見廟猶未入國也葉氏夢得曰父而自送女非禮也何以不稱夫人以齊侯為之辭也文公逆女于齊在國不言女已成禮也於文公則既成婦矣故書逆婦姜于齊姜宜稱女者也齊侯送女于讙入國不言夫人未成禮也於齊侯猶女矣故書齊侯送姜氏于讙姜氏宜稱夫人者也是謂名正而言順鈞杜氏諤曰魯逆失之輕而齊送失之過其貶固者也公會齊侯于讙集說程子曰齊侯出疆送女公遠會之皆非義也齊胡氏銓曰公果親逆自當書逆女必不曰會侯也此直曰會見公因㑹齊侯而受姜氏耳女張氏洽曰聖人制禮不可過不可不及齊僖愛其之過至於越境而送之遂使魯侯之出不為親迎而為齊侯在讙特往會之僖公之送桓公之會皆非所以重大昏而正人倫之始春秋所以書之也所姚氏舜牧曰魯桓意在結齊為援而娶其女故桓行事重在會不在於婚夫人姜氏至自齊公羊翬何以不致得見乎公矣穀梁其不言翬之以來何也公親受之於齊侯也子貢曰冕而親迎不已重乎孔子曰合二姓之好以繼萬世之後何謂已重乎胡傳親迎之禮廢於是乎有父母兄弟越境而送其女者以公子翬徃逆則既輕矣為齊侯來乃逆而會之于讙是公之行其重在齊侯而不在姜氏豈禮也哉不言以至者既得見乎公也不能防閑於是乎在敝笱之刺兆矣禮者所以别嫌明微制治於未亂不可不謹也娶夫人國之大事故詳集說杜氏預曰告於廟也不言翬以至者齊侯送之公受之於讙孫氏復曰此齊侯送姜氏公受之于讙也公受姜氏于讙不以讙至者不與公受姜氏于讙也故曰夫人姜氏至自齊以正其義胡氏銓曰易曰漸女歸待男行也女歸必待男乃行夫人姜氏不與公俱至故先書公會齊侯于讙次書姜氏至自齊以見公會于讙本非親迎非易待男之義也薛氏季宣曰齊侯送女於外公以會禮接之非親迎且兩失之也夫婦大倫也不正之於其始桓之夫婦是不為夫婦矣呉氏澂曰昏禮之大節有三納幣一也親迎二也夫人至三也得禮則皆不書魯桓㑹嬴書譏不由媒介而自求昏於齊也逆女書譏不親迎而使公子翬也送姜氏書譏齊侯親送也㑹讙書譏不親迎而親會齊侯也夫人至不書翬以譏魯桓初使翬迎而中自受姜氏于讙也夫李氏廉曰夫人至例啖子曰夫人初至皆書經書人至三文姜得見公故不書翬以穆姜齊姜書遂僑如書以者言不當以也哀姜書入不可見乎宗廟也出姜不書至貶成禮於齊也昭公娶呉女不書至恥娶同姓也二汪氏克寛曰文定此年傳謂娶夫人國之大事莊十四年傳謂婚姻常事不書蓋婚姻合禮而不志者書法之常也故僖公之娶夫人納幣逆女夫人至皆不書也桓公之娶文姜不合於禮故以為大事而悉志之者所以垂戒而書法之變也昭公之娶同姓則又以國惡而隱之也聖人作經如化工生物洪纎高下因物賦形安可執一而論之哉王氏樵曰案翬逆女齊侯送姜氏于讙公㑹齊侯于讙此文姜之始也公與夫人姜氏遂如齊公薨于齊此文姜之終也公如齊納幣公如齊逆女夫人姜氏入大夫宗婦覿用幣此哀姜之始也夫人姜氏孫于邾公子慶父出奔莒此哀姜之終也春秋據事而書讀者比事而觀而幾微著監戒昭矣張氏溥曰㑹蠃逆女會讙夫人至齊僖公送女女既嫁使大夫聘問咸具志焉春秋惡文姜之終不得不詳其始冬齊侯使其弟年來聘左傳冬齊仲年來聘致夫人也集說杜氏預曰古者女出嫁又使大夫隨加聘問存謙敬序殷勤也在魯而出則曰致女在他國而來則總曰聘故傳以致夫人釋之致孔氏穎達曰經書來聘傳言致夫人是行聘禮而之也呉氏澂曰齊僖親送女至魯竟未幾又使貴介弟致之見其愛女之至情之私非禮之正也有年公羊有年何以書以喜書也大有年何以書亦以喜書也此其曰有年何僅有年也彼其曰大有年何大豐年也僅有年亦足當喜乎恃有年也穀梁五穀皆熟為有年也胡傳舊史災異與慶祥竝記故有年大有年得見於經若舊史不記聖人亦不能附益之也然十二公多歴年所有務農重穀閔雨而書雨者豈無豐年而不見於經是仲尼於他公皆削之矣獨桓有年宣大有年則存而不削者緣此二公獲罪於天宜得水旱凶災之譴今乃有年則是反常也故以為異特存爾然則天道亦僭乎桓宣享國十有八年獨此二年書有年他年之歉可知也而天理不差信矣此一事也在不修春秋則為慶祥君子修之則為變異是聖人因魯史舊文能立興王之新法也故史文如畫筆經文如化工嘗以是觀非聖人莫能修之審矣有年大有年先儒說經者多列於慶瑞之門至程子發明奥㫖然後以為記異此得於言意之表者也集說何氏休曰桓公之行諸侯所當誅民人將去賴得五穀皆有使百姓安土樂業故喜而書之明為國家者不可不有年熟孔氏穎達曰年訓為稔謂歲為年者取其歲穀一之義賈云桓惡而有年豊異之也言有非其所宜有案昭元年傳曰國無道而年穀和熟天贊之也是言歲豐為佐助之非妖異之物也君行既惡澤不下流遇有豐年輙以為異是則無道之世惟宜有大饑非天佑下民之意也楊氏士勛曰凡書有年者冬五穀畢入計用豐足然後書之不可繫以日月故例時也宣十六年冬大有年亦時是其證也年孫氏復曰桓立十八年唯此言有年者是未嘗有也書者著桓公為國不能勤民務農若是也上程子曰書有年記異也人事順於下則天氣和於桓弑君而立逆天理亂人倫天地之氣為之謬戾水旱凶災乃其宜也今乃有年故書其異宣公為弑君者所立其惡有間故大有年則書之劉氏克莊曰桓有年宣大有年古史修以為祥仲尼筆以為異王氏樵曰桓宣行惡宜得天譴固矣民則何辜天降之有年正見人不恤民而天勤之也考於經元年大水五年旱螽八年建酉之月未霜而雪十有三年又大水十四年無氷御廩災咎徵疊見惟此年以有年書見年為民之命國之所以存亡而深為人君不徳召災之戒也案賈氏逵曰言有非其所宜有程子因之而胡傳暢言之其持議甚正或疑以君之故而惡其民非聖人書法本意其實程胡二傳亦謂君惡召災而病民惟此有年為可異爾與公羊以喜書之意正同觀何氏休之說則兩不相悖矣附錄左傳芮伯萬之母芮姜惡芮伯之多寵人也故逐之出居於魏芮杜注芮國在馮翊臨晉縣今陜西西安府同州朝邑縣有芮故城在黄河西岸魏杜注魏國在河東河北縣括地志魏故國在芮城縣北五里今山西平陽府解州芮城縣河北故城是也孔疏世本芮魏皆姬姓癸桓王十酉二年四年齊僖二十三年晉小子侯元年衞宣十一年蔡桓七年鄭莊三十六年曹桓四十九年陳桓三十七年把武四十三年宋莊二年秦寧八年楚武三十三年春正月公狩于郎此蒐狩之始左傳書時禮也公羊狩者何田狩也常事不書此何以書譏何譏爾遠也諸侯曷為必田狩一曰乾豆二曰賔客三曰充君之庖穀梁四時之田皆為宗廟之事也四時之田用三焉唯其所先得一為乾豆二為賔客三為充君之庖胡傳何以書譏遠也戎祀國之大事狩所以講大事也用民以訓軍旅所以示之武而威天下取物以祭宗廟所以示之孝而順天下故中春教振旅遂以蒐中夏敎茇舍遂以苗中秋敎治兵遂以獮中冬敎大閲遂以狩然不時則傷農不地則害物田狩之地如鄭有原圃秦有具圃皆常所也違其常所犯害民物而百姓苦之則將聞車馬之音見羽旄之美舉疾首蹙頞而相告可不謹乎以非其地而必書是春秋謹於微之意也每謹於微然後王徳全矣集說杜氏預曰冬獵曰狩行三驅之禮得田狩之時故曰書時禮也周之春夏之冬也田狩從夏時郎非國内之狩地故書地周孔氏穎達曰周之春正月建子即是夏之仲冬也禮大司馬中冬敎大閲遂以狩田是田狩從夏時也釋例曰三王異正朔而夏數為得天雖在周代於言時舉事皆據夏正故公以春狩而傳曰書時禮也隠五年公矢魚于棠傳曰言遠地也僖二十八年天王狩于河陽傳曰言非其地也舉地名者皆言其非地故知此郎非國内之狩地故書地也若國内狩地大野是也哀十四年傳曰西狩於大野經不書大野明其得常地故不書耳由此而言則狩于禚蒐于紅及比蒲昌間皆非常地故書地也田狩之地須有常者古者民多地狹唯在山澤之間乃有不殖之地故天子諸侯必於其封内擇隙地而為之僖三十三年傳曰鄭之有原圃猶秦之有具囿也是其諸國各有常狩之處違其常處則犯害民物故書地以譏之禮陸氏淳曰啖子曰蒐狩合禮者常事不書非時越而為之則書以示譏也趙子曰四時之田其事各殊其名亦異春以閲武擇材故以蒐為稱夏以為苗除害故以苖為名秋則順天時以殺物故以獮為義冬則因守禽獸以習戰故以狩為目左氏曰春蒐夏苗秋獮冬狩是也公羊穀梁冬狩秋蒐竝同而苗則公羊在春穀梁在夏公羊則夏時無名穀梁則春曰田田者四時獵之總名不當専在於春故非也公羊之義夏時務農不苗然則自非警急及有獸害苗則不苗也孫氏復曰狩冬田也天子諸侯四時必田者盖安不忘危治不忘亂講武經而敎民戰也豈徒肆盤遊逐禽獸而已哉然禽獸多則五穀傷不可不捕也故因田以捕之上以供宗廟之鮮下以除稼穡之害故田必以時殺必由禮田不以時謂之荒殺不由禮謂之暴惟荒也妨於農惟暴也殄於物此聖人之深戒也劉氏敞曰四時曷為必田狩春敎振旅辨鼓鐸火弊以獻社夏敎茇舍辨號名車弊以獻礿秋敎治兵辨旗物羅弊以獻祊冬敎大閲總軍實徒弊以獻烝又曰公羊以謂春曰苗秋曰蒐冬曰狩非也周禮春蒐夏苗秋獮冬狩得其正矣周禮雖非仲尼所論著然制度麤存焉盖周公之舊也仲尼嘗執之矣其有駁雜似周衰諸侯所增益也不足以害其大體蒐狩之名則吾從周禮記王制記四時之田亦復闕夏蓋王制出於漢時諸儒而諸儒承公羊之繆遂至於此不足以為據也曰程子曰公出動衆皆當書于郎逺也趙氏鵬飛昭九年築郎囿其後遂為田獵苑囿之地蓋基於今日之狩李氏廉曰四時之田春蒐夏苗秋獮冬狩見於周禮爾雅而左氏記臧僖伯之言亦同獨公穀所言皆不合穀疏曰左氏之文是周公制禮之名二傳之文或春秋取異代之法或當時天子諸侯别法經典散亡無以取正觀此則胡氏取周禮之説是矣又曰春秋書狩四于郎譏遠于禚譏親讎河陽本非狩特以避召王之名西狩本常事特以志非常之瑞各有義耳其卓氏爾康曰四時之田止書蒐狩蒐狩經不多書書者必有故也文公以後四公俱不書以大夫専國公不復知軍政時田得失無足議也昭公八年以後又復頻書是時三家分魯假春蒐之禮以耀武示強又與非時非地之蒐不同故頻書以示變耳夏天王使宰渠伯糾來聘胡傳宰冢宰也渠氏伯爵糾其名也王朝公卿書爵大夫書字上士中士書名下士書人例也糾位六卿之長降從中士之例而書名貶也於糾何貶乎在周制大司馬九伐之法諸侯而有賊殺其親則正之放弑其君則殘之桓公之行當此二者舍曰不討而又聘焉失天職矣操刑賞之柄以馭下者王也論刑賞之法以詔王者宰也以經邦國則有治典以安邦國則有敎典以平邦國則有政典以詰邦國則有刑典治敎政刑而謂之典明此天下之大常也大宰所掌而獨謂之建以此典大宰之所定也乃為亂首承命以聘弑君之賊乎故特貶而書名以見宰之非宰也聘於弑君之賊而名其宰則桓公没王使榮叔来錫命矣榮叔何以書字而不名也始而來聘冢宰書名以見貶終而追錫王不稱天以示譏其義備矣夫咺賵仲子糾聘桓公其事皆三綱之所繫也然咺獨書官糾兼稱爵何也如咺者豈初得政猶未受封而糾則或以諸侯入相或既相而已封者乎漢初命相必擇列侯為之後用公孫因相而得封盖欲放古重其任也任之重則責益深矣嫡妾之分君臣之義天下之大倫無所輕重糾以既封故兼稱爵見春秋責相之意也集說杜氏預曰國史之記必書年以集此公之事書首時以成此年之嵗故春秋有空時而無事者今不書秋冬首月史闕文也他皆放此乎劉氏敞曰宰者何官也天子之宰也天子之宰通天下渠伯者何爵也糾者何名也天子大夫不名其曰宰渠伯糾何譏何譏爾桓内弑君外成人之亂又不受命王弗能討也而聘之是崇亂也參譏之又曰左氏曰父在故名非也武氏子來求賻言世武氏也仍叔之子來聘言幼弱也糾擅攝父位自取冢宰其貶猶應甚彼不得但以父在名之而已捨大責小非春秋也又曰公羊以謂下大夫也繫官氏名且字非也理不可書名而又書字仲尼之筆一何繁且迂至此哉又何氏休曰下去二時者為貶天子下聘也亦非也史有遺闕日月者仲尼皆不私益之日月無足見義而益之似不信故不為也而程子曰桓公弑君而立天子不能治天下莫能討王使其宰聘之示加尊寵天理滅矣人道亡矣書天王言當奉天也而其為如此名糾尊卑貴賤之義亡也朱子曰不書秋冬史闕文也或謂貶天子之失刑不成議論魯桓之弑天子不能討罪惡自著何待於去秋冬而後見乎張氏洽曰宰太宰也渠采地伯爵糾名也為天子之冢宰而不能詔王以八柄馭羣臣乃親奉命來聘魯桓故貶而名之也已李氏廉曰宰糾書名左氏直譏其攝父職以出聘昧於仍叔子之文而杜注又以伯糾為名則伯乃字稱而非名也公穀皆以為下大夫繫官氏名且字以宰為官氏渠為名糾為字而以伯為老稱則單伯祭伯亦老稱乎盖欲言微者而經稱伯欲言尊卿則連名故為是臆説耳是皆不知春秋責宰相之書法也矣趙氏恒曰桓公弑逆天王不討而又聘焉失天職其責當在天王然移其責於宰者蓋糾位高職重若能諫王必無來聘之失諫而不聽則辭位而去而所使者必非糾也今乃承命而來可知其為阿諛順㫖而不忠不智不足為宰所以不貶王而貶宰也陳氏際泰曰天王終以桓公為嫡而可立故糾之聘也與賵之歸同聖人終以桓公非嫡而不當立故渠之名也與咺之斥同案不書秋冬程子以為天王失刑其説本於何氏休不若杜注以為史闕文於義為正故劉氏敞及朱子皆從之汪氏克寛歴舉全經闕文相校以申明程子之說終無確據附錄左傳秋秦師侵芮敗焉小之也歸冬王師秦師圍魏執芮伯以秦詩譜曰秦隴西谷名徐廣曰天水隴西縣有秦亭今鞏昌府秦州清水縣故秦城是也史記秦之先伯翳佐禹平水土賜姓嬴氏後有大駱生非子為周孝王主馬汧渭間分土為附庸邑之秦欽定春秋傳說彚纂卷四
