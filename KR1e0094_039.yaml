body:
  text: 欽定四庫全書欽定春秋傳說彚纂卷三十七甲敬王三寅十三年八年晉定二十五年齊悼二年衞出六年蔡成四年鄭聲十四年曹陽十五年陳閔十五年把僖十九年宋景三十年秦悼五年楚惠二年吳夫差九年春王正月宋公入曹以曹伯陽歸左傳八年春宋公伐曹將還禇師子肥殿曹人詬之不行師待之公聞之怒命反之遂滅曹執曹伯及司城彊以歸殺之集說劉氏敞曰公羊曰不言其滅諱同姓之滅也非也當此時魯人自救不暇豈有不救同姓之滅春秋遂責之乎且責魯不救而諱曹之滅縱失宋公之惡苟責無罪之魯甚無理也蘇氏轍曰此滅曹也書曰宋公入曹而不書滅言自滅也猶虞之滅言晉人執虞公而不言滅也鄭氏玉曰宋公滅曹而經書入先儒以為力能救而不之救故不言滅信爾則救者之罪何責乎曹之過也或又謂滅者亡國之善辭曹亡與虞同故不書滅曹之與虞事既不同書法亦異難以例觀也或又以為曹亡春秋之終興滅國繼絶世夫子嘗有此言也於是曹不言滅其意蓋謂夫子至此不忍書滅也義失之巧詳考其義與公入邾以邾子益來同文然其既殺曹伯又無復曹之事亦不應以内辭書外事也入字疑誤湛氏若水曰書宋公入曹以曹伯陽歸罪滅國也入曹俘君不必言滅而實滅也案虞不書滅者晉存其祀而不以滅告也宋之入曹或亦當然孟子時猶有曹交為曹君之弟則戰國之世曹尚未亡蓋滅而復存如陳蔡許之類吳伐我書伐我始此左傳吳為邾故將伐魯問於叔孫輒叔孫輒對曰魯有名而無情伐之必得志焉退而告公山不狃公山不狃曰非禮也君子違不適讎國未臣而有伐之奔命焉死之可也所託也則隱且夫人之行也不以所惡廢鄉今子以小惡而欲覆宗國不亦難乎若使子率子必辭王將使我子張病之王問於子洩對曰魯雖無與立必有與斃諸侯將救之未可以得志焉晉與齊楚輔之是四讎也夫魯齊晉之脣脣亡齒寒君所知也不救何為三月吳伐我子洩率故道險從武城初武城人或有因於吳境田焉拘鄫人之漚菅者曰何故使吾水滋及吳師至拘者道之以伐武城克之王犯嘗為之宰澹臺子羽之父好焉國人懼懿子謂景伯若之何對曰吳師來斯與之戰何患焉且召之而至又何求焉吳師克東陽而進舍於五梧明日舍於蠶室公賔庚公甲叔子與戰於夷獲叔子與析朱鉏獻於王王曰此同車必使能國未可望也明日舍於庚宗遂次於泗上微虎欲宵攻王舍私屬徒七百人三踊於幕庭卒三百人有若與焉及稷門之内或謂季孫曰不足以害吳而多殺國士不如已也乃止之吳子聞之一夕三遷吳人行成將盟景伯曰楚人圍宋易子而食析骸而爨猶無城下之盟我未及虧而有城下之盟是棄國也吳輕而逺不能久將歸矣請少待之弗從景伯負載造於萊門乃請釋子服何於吳吳人許之以王子姑曹當之而後止吳人盟而還東陽杜注魯邑呂氏春秋夏孔甲遊於東陽即此也在兗州府費縣西南七里今名闗陽鎮五梧杜注魯邑今費縣西有五梧城山蠶室杜注魯邑或曰今滕縣東三十里有蠶母是也案春秋滕不屬魯亦應在費縣西北境胡傳吳為邾故興師伐魯兵加國都而盟於城下經書伐我不言四鄙及與吳盟者諱之也來戰于郎直書不諱盟於城下何諱之深也楚人圍宋易子而食析骸而爨亦云急矣欲盟城下則曰有以國斃不能從也晉師從齊齊侯致賂晉人不可國佐對曰子若不許請合餘燼背城借一敝邑之幸亦云從也遂盟于袁婁而春秋與之今魯未及虧不能少待遂有城下之盟是棄國也夫棄國者其能國乎使有華元國佐之臣則不至此矣故春秋不言四鄙及與吳盟者欲見其實而深諱之以為後世謀國之士不能以禮義自彊偷生惜死至於侵削凌遲而不知恥者之戒也集說孫氏復曰吳伐我以邾子益來故也直曰伐我者兵加於都城也黄氏仲炎曰讀春秋而知魯之為國始末三變焉魯始受敵國之兵如戰于郎戰于奚而不言伐我四鄙者蓋邊鄙有備敵至則戰故言戰不言其伐也觀左氏載奚之戰先是齊人侵魯疆吏來告公曰疆埸之事謹守其一而備其不虞姑盡所備焉事至而戰又何謁焉以此知當時魯之邊鄙尚有素備也其後疆埸之備弛故敵兵得以乘之而春秋書曰伐我北鄙伐我西鄙然猶見鄰敵之宼止為邊患而不能直造其國也今哀公之世如受吳齊之師則又不復云伐我北鄙伐我西鄙而直言伐我者以見其直造於我國都也夫使敵兵得踰越邊鄙而直造其國都則其為國可知矣秋家氏鉉翁曰吳伐我以救邾而書法無襃辭者春之貴救貴義也茅成子之請救於吳也動吳子以利吳子說於利而動是以率師造於魯之城下不責魯以存邾遽受盟而返何救之足言其後吳責報於邾者不已執其君而擾亂其國存亡國者顧如是乎李氏廉曰春秋伐我者必書四鄙不使難邇我國也獨此與明年國書伐我為特筆蓋曲在我也謝氏曰不至國都則書某鄙至國都則書伐我亦是又曰是時魯政雖陵無以為國然觀左氏所記盡忠死難之士皇多有之此所以為禮義之國歟公山不狃以叛亡之人而處心尚能如此賢於人逺矣孔子欲往豈無意夫汪氏克寛曰哀公即位七年加兵於邾者五而且入其國俘其君自入春秋魯恃彊凌弱未有若是之甚也此年書吳伐我比事以觀則魯之受伐蓋有由矣前此書侵伐必言四鄙見魯之國都猶足為守也至於是年吳兵直抵魯之城下則魯之四境屏藩蕩然而國不足為國矣哀公之經兩書伐我若曰我能入邾吳能為邾而伐我我能㑹吳伐齊齊能興師而伐我雖據事直書而詳味書法亦有反已自咎之意焉夏齊人取讙及闡闡尺善反公作僤後同故闡杜注在束平剛縣北漢志剛縣闡城今兗州府寧陽縣本魯闡邑地故剛城在縣東北三十五里左傳齊悼公之來也季康子以其妹妻之即位而逆之季魴侯通焉女言其情弗敢與也齊侯怒夏五月齊鮑牧帥師伐我取讙及闡公羊外取邑不書此何以書所以賂齊也曷為賂齊為以邾婁子益來也穀梁惡内也集說杜氏預曰不書伐兵未加而魯與之邑兵陳氏岳曰凡用兵而取先書伐次書取不用而取苐書取民程子曰内失邑不書君辱當諱也不能保其土地人是不君也已與之彼以非義而受則書取此與濟西田是也魯入邾而以其君來致齊怒吳伐故賂齊以說之家氏鉉翁曰公榖以齊為邾故取讙闡左氏則以季姬未歸故齊人來討觀齊之兵端當從二傳非以女故蓋齊取二邑要魯以存邾爾案齊取讙闡公榖謂齊為邾故與左氏不同程子及家氏鉉翁皆主公穀於情事甚合然春秋事據左氏苟無大謬則存以俟考今故竝錄三傳附錄左傳或譖胡姬於齊侯曰安孺子之黨也六月齊侯殺胡姬歸邾子益于邾左傳齊侯使如吳請師將以伐我乃歸邾子邾子又無道吳子使大宰子餘討之囚諸樓臺栫之以棘使諸大夫奉大子革以為政穀梁益之名失國也集説胡氏銓曰先書吳伐我又書齊取二邑然後書歸邾子于邾則是畏吳懼齊而歸之也黄氏仲炎曰魯以不道肆虐於邾物極必反於是吳攻其國齊取其田不勝困挫乃始歸邾子于邾易所謂不威不懲者小人也哉秋七月附錄左傳秋及齊平九月臧賔如如齊涖盟齊閭丘明來涖盟且逆季姬以歸嬖鮑牧又謂羣公子曰使女有馬千乘乎公子愬之公謂鮑子或譖子子姑居於潞以察之若有之則分室以行若無之則反子之所出門使以三分之一行半道使以二乘及潞麇之以入遂殺之潞杜注齊邑當在齊之郊外冬十有二月癸亥把伯過卒過音戈集説孔氏穎達曰世族譜云僖公過悼公曾孫案悼公祖文公以昭六年卒父平公以昭二十四年卒悼公以定四年卒未應有曾孫可以授之國也把世家僖公過是悼公之子疑譜誤齊人歸讙及闡左傳冬十二月齊人歸讙及闡季姬嬖故也集説汪氏克寛曰不言來者齊本取讙闡脅魯歸邾子今既歸邾子則齊遂所欲故歸讙闡非感於義而心悦誠服故不言來歸案宣公賂齊感齊之德非齊脅之也故其歸言我此則取歸竝不言我不諱之中猶有諱焉乙敬王三卯十四年九年晉定二十六年齊悼三年衞出七年蔡成五年鄭聲十五年陳閔十六年把閔公維元年宋景三十一年秦悼六年楚惠三年吳夫差十年春附錄左傳九年春齊侯使公孟綽辭師於吳吳子曰昔嵗寡人聞命今又革之不知所從將進受命於君王二月葬把僖公集說季氏本曰三月而葬必有故宋皇瑗帥師取鄭師于雍丘雍於勇反又於用反留雍丘杜注雍丘縣屬陳郡今河南開封府把縣治左傳鄭武子賸之嬖許瑕求邑無以與之請外取許之故圍宋雍丘宋皇瑗圍鄭師每日遷舍壘合鄭師哭子姚救之大敗二月甲戌宋取鄭師于雍丘使有能者無死以郏張與鄭羅歸公羊其言取之何易也其易奈何詐之也穀梁取易辭也以師而易取鄭病矣集説杜氏預曰左傳例覆而敗之曰取某師謂威力兼備若羅網所掩覆一軍皆見禽許氏翰曰春秋之季日尋干戈詐力相傾奇變滋起於是始志取人之師甚其譎惡其盡也鄭以不義深入敵境而圍其邑此固喪師之道也言黄氏仲炎曰取鄭師者盡俘以歸掩為己有也不敗言取敗可知矣李氏廉曰胡氏左氏例覆而敗曰取悉虜而俘之曰取觀左氏所載使有能者無死而止以二人歸則殺人多矣春秋之末特書取師者二謝氏所謂著其禍之大者是也自定十五年老丘之役以來宋鄭結怨久矣故皇瑗悉力取雍丘之師罕達悉力取嵒之師蓋不勝忿怨以至此也長平之坑所由來漸矣此當與隱十年鄭莊取三國之師同看夏楚人伐陳左傳夏楚人伐陳陳即吳故也集説李氏廉曰六年吳伐陳楚昭救之卒於城父不克而還則陳之即吳惟彊是從而已昭王旅卒楚惠君臣不念陳之有德於楚也而亟伐之此春秋所以以救予吳也歟汪氏克寛曰陳之為國屢滅於楚而僅存者也今而從吳亦以楚之屢伐而求以自託焉耳楚不思所以自反而憤陳之背已攻之荐數而不已今年伐陳明年公子結復伐之十三年公子申又伐之陳之困於楚終春秋之世雖其力弗克自振而楚之暴横不道其罪蓋不可勝誅矣秋宋公伐鄭集説汪氏克寛曰鄭雖不義宋覆其師而盡取之亦云憯矣而又君親帥師以伐其國明年偏師再伐十二年向巢又伐十三年鄭人復取宋師然則宋鄭之喪師皆其自取之也卓氏爾康曰宋景不自揣量妄圖興伯前年以曹伯陽歸而齊晉不加討則其志益驕且皇瑗又盡俘許瑕之師則視滅鄭不啻入曹之易矣鄭非弱國豈肯遂為臣虜連年侵伐不能得志於鄭而喪師于嵒與雍丘之役得失相當兵驕者敗宋之謂也附錄左傳秋吳城刋溝通江淮晉趙鞅卜救鄭遇水適火占諸史趙史墨史龜史龜曰是謂沈陽可以興兵利以伐姜不利子商伐齊則可敵宋不吉史墨曰盈水名也子水位也名位敵不可干也炎帝為火師姜姓其後也水勝火伐姜則可史趙曰是謂如川之滿不可游也鄭方有罪不可救也救鄭則不吉不知其他陽虎以周易筮之遇泰之需曰宋方吉不可與也微子啓帝乙之元子也宋鄭甥舅也祉祿也若帝乙之元子歸妹而有吉祿我安得吉焉乃止邗杜注云於邗江築城穿溝東北通射陽湖西北至宋口入淮通糧道也今廣陵邗江是冬十月附錄左傳冬吳子使來儆師伐齊丙敬王三辰十五年十年晉定二十七年齊悼四年衞出八年蔡成六年鄭聲十六年陳閔十七年把閔二年宋景三十二年秦悼七年楚惠四年吳夫差十一年春王二月邾子益來奔左傳十年春邾隱公來奔齊甥也故遂奔齊集説高氏閌曰先為魯所俘而又來奔其不知恥甚矣陳氏傅良曰吳人討邾奉太子為政而後奔則其但書奔何以是為自失國也春秋之法苟其道足以失國雖有敵國猶以自致之文書之公會吳伐齊三月戊戌齊侯陽生卒左傳公㑹吳子邾子郯子伐齊南鄙師於鄎齊人弑悼公赴於師吳子三日哭於軍門之外徐承帥舟師將自海入齊齊人敗之吳師乃還鄎杜注齊地集説杜氏預曰以疾赴故不書弑生孔氏穎逹曰傳稱齊人弑悼公赴於師則陽被弑矣而經書卒是以疾死赴也襄七年鄭伯髠頑卒于鄵傳稱子駟使賊夜弑僖公而以瘧疾赴於諸侯知此亦以疾死赴故不書弑也公卒遂以為弑爾吳氏澂曰當時以吳師在齊而鄭氏玉曰經書卒而𫝊稱齊人弑悼公以赴於師蓋夫差怒齊之止吳師率四國之師以臨齊人恐懼無以為解而悼公適斃乃偽赴於師若曰齊君得罪於吳國人已討之矣無辱諸侯之師吳師乃還史因其赴而書弑經考其事乃書卒也其王氏樵曰齊大國也止師小嫌也齊人何至遽弑君以說乎以吳伐我且曰魯雖無與立必有與斃諸侯將救之未可以得志而况齊乎故悼公之弑傳未可信信經可也案陽生之死傳書弑而經書卒杜氏預謂以疾赴孔氏穎逹引鄭伯髠頑為證於情事相合吳氏澂鄭氏玉王氏樵皆疑之謂齊為大國何至弑君以說乎亦是一說夏宋人伐鄭集説許氏翰曰既取其師伐而又伐惡其修怨不已也晉趙鞅帥師侵齊左傳夏趙鞅帥師伐齊大夫請卜之趙孟曰吾卜於此起兵事不再令卜不襲吉行也於是乎取犂及轅毁高唐之郭侵及賴而還犂杜注一名隰濟南有隰隂縣或曰齊大夫隰氏之采邑也今濟南府臨邑縣西有漯隂故城本齊犂邑水經注漯水逕漯隂縣故城北縣故犂邑今巨漯亭是也轅杜注祝阿縣西有轅城漢置瑗縣屬平原郡水經注瑗即轅也今山東濟南府禹城縣西北有瑗城集説高氏閌曰齊帥諸侯以貳晉可以討矣然趙鞅加兵於有喪之國聖人弗與也故書侵異乎士匄矣之吳氏澂曰吳猶遭齊喪而去之晉乃乘齊喪而伐曾吳之不若也李氏廉曰𫝊書伐而經書侵者乘吳之亂伐齊之喪無名甚矣五月公至自伐齊集説高氏閌曰齊魯接境而公㑹吳伐之既聞其喪則遂班師可也所以久而不歸者公之進退制在吳故也池李氏廉曰哀公編書公㑹吳者五獨此役與黄書至蓋聖人擇其危甚者而書之也葬齊悼公集説高氏閌曰公雖不廢喪紀往㑹其葬不足以贖過汪氏克寛曰悼公書葬與鄭僖公同不及五月禮略也衞公孟彄自齊歸于衞集説杜氏預曰書歸齊納之棄李氏廉曰彄蒯聵之黨今歸于衞必從輒而蒯聵故十五年蒯聵入國彄復奔齊薛伯夷卒秋葬薛惠公夷公作寅附錄左傳秋吳子使來復儆師冬楚公子結帥師伐陳吳救陳書救止此左傳冬楚子期伐陳吳延州來季子救陳謂子期曰二君不務德而力爭諸侯民何罪焉我請退以為子名務德而安民乃還集説杜氏預曰季子不書陳人來告不以名曹陳氏傅良曰自魯救晉凡救皆不書書鄭救則列國無霸諸侯自相救也列國無霸諸侯自相救春秋憫焉而特書之吳救陳諸夏幾於亡矣春秋之所甚懼也之汪氏克寛曰宣十一年楚縣陳尋復封昭八年楚滅陳十三年復封陳案吳不挾陳以叛楚則楚陳無釁何用救哉陳之禍吳為之也救庸足多乎此當與楚救鄭同蓋志在於爭諸侯非扶危恤患之義也延陵季子亦自言之矣胡傳謂吳以號舉為深著楚罪殊失經旨朱子所謂以義理為穿鑿者也丁敬王三已十六年十有一年晉定二十八年齊簡公壬元年衞出九年蔡成七年鄭聲十七年陳閔十八年把閔三年宋景三十三年秦悼八年楚惠五年吳夫差十二年春齊國書帥師伐我左傳十一年春齊為鄎故國書高無㔻帥師伐我及清季孫謂其宰冉求曰齊師在清必魯故也若之何求曰一子守二子從公禦諸竟季孫曰不能求曰居封疆之間季孫告二子二子不可求曰若不可則君無出一子帥師背城而戰不屬者非魯人也魯之羣室衆於齊之兵車一室敵車優矣子何患焉二子之不欲戰也宜政在季氏當子之身齊人伐魯而不能戰子之恥也大不列於諸侯矣季孫使從於朝俟於黨氏之溝武叔呼而問戰焉對曰君子有逺慮小人何知懿子彊問之對曰小人慮材而言量力而共者也武叔曰是謂我不成丈夫也退而蒐乘孟孺子洩帥右師顔羽御邴洩為右冉求帥左師管周父御樊遲為右季孫曰須也弱有子曰就用命焉季氏之甲七千冉有以武城人三百為已徒卒老幼守宫次於雩門之外五日右師從之公叔務人見保者而泣曰事充政重上不能謀士不能死何以治民吾既言之矣敢不勉乎師及齊師戰於郊齊師自稷曲師不踰溝樊遲曰非不能也不信子也請三刻而踰之如之衆從之師入齊軍右師奔齊人從之陳瓘陳莊涉泗孟之側後入以為殿抽矢策其馬曰馬不進也林不狃之伍曰走乎不狃曰誰不如曰然則止乎不狃曰惡賢徐步而死師獲甲首八十齊人不能師宵諜曰齊人遁冉有請從之三季孫弗許孟孺子語人曰我不如顔羽而賢於邴洩子羽鋭敏我不欲戰而能黙洩曰驅之公為與其嬖僮汪錡乘皆死皆殯孔子曰能執干戈以衞社稷可無殤也冉有用矛於齊師故能入其軍孔子曰義也清杜注齊地濟北盧縣東有清亭盧縣今長清縣也稷曲杜注郊地名胡傳諸侯來伐無有不書四鄙者今齊師及清渉泗非有城下之盟可諱之辱亦書伐我何也𫝊説復於高宗曰惟甲胄起戎惟干戈省厥躬者自反之謂也自反而縮則為壯自反而不縮則為老師之老壯在曲直曲直自我而不繫乎人者也邾子齊之甥魯嘗入邾以其君來齊人為是取讙及闡請師於吳曲在我也及歸邾益而齊人歸讙及闡又辭吳師直在齊矣魯人何名㑹吳伐之也故春秋之記斯師特曰伐我者欲省致師之由而躬自厚也垂訓之義大矣集説家氏鉉翁曰伐我云者我自有以致宼垂後王臨難省躬之戒所以譏哀公也汪氏克寛曰春秋書伐我二十有一唯哀八年吳伐此年齊伐止書伐我餘皆言四鄙又曰高郵孫氏謂春秋之始内魯而外諸夏故魯為他國所侵伐必曰某鄙哀公之經再書伐我同魯於諸侯竊以為春秋詳内而略外故外之侵伐止書國而魯書四鄙非尊魯而卑諸侯也此書伐我不言地比於兵加國都之例所以貶之也然傳載老幼守宫次於雩門之外師及齊師戰於郊冉求曰一子帥師背城而戰則齊師逼廹於魯之國都矣杜諤曰直曰伐我見其以國言之也然則國書之伐與他伐異矣王氏樵曰案師及齊師戰於郊右師奔齊人從之至於涉泗則兵實加國都矣故直言伐我無他説也然公斂處父謂墮成齊人必至於北門是前此無兵及近郊者吳師克東陽而進次於泗上子服景伯曰楚人圍宋易子而食析骸而爨猶無城下之盟我未及虧而有城下之盟是棄國也請少待之弗從負載造於萊門吳人盟而還齊師在清冉有請一子守二子從公禦諸竟不可居封疆之間不可一子帥師背城而戰孟氏始黽勉以右師從從而又後戰而先奔微冉有在左師則魯事敗矣是時政在季氏生事啓釁故二家不肯同力前之吳師後之齊師召之而來傅國都而止故春秋兩書伐我所以見魯之益衰其亦傷之而已夏陳轅頗出奔鄭轅公作袁頗破多反左傳夏陳轅頗出奔鄭初轅頗為司徒賦封田以嫁公女有餘以為已大器國人逐之故出道渴其族轅咺進稻醴粱糗腵脯焉喜曰何其給也對曰器成而具曰何不吾諫對曰懼先行集説許氏翰曰春秋書轅頗之奔所以為人臣附上以刻下託公以營私者之戒也家氏鉉翁曰聚斂媚上者固當有討然國不能自討致衆怒而逐之是衆為政也而可哉五月公會吳伐齊甲戌齊國書帥師及吳戰于艾陵齊師敗績獲齊國書書戰書獲止此此齊魯交兵亦止左傳為郊戰故公㑹吳子伐齊五月克博壬申至於嬴中軍從王胥門巢將上軍王子姑曹將下軍展如將右軍齊國書將中軍高無㔻將上軍宗樓將下軍陳僖子謂其弟書爾死我必得志宗子陽與閭丘明相厲也桑掩胥御國子公孫夏曰二子必死將戰公孫夏命其徒歌虞殯陳子行命其徒具含玉公孫揮命其徒曰人尋約吳髪短東郭書曰三戰必死於此三矣使問弦多以琴曰吾不復見子矣陳書曰此行也吾聞鼓而已不聞金矣甲戌戰于艾陵展如敗高子國子敗胥門巢王卒助之大敗齊師獲國書公孫夏閭丘明陳書東郭書革車八百乘甲首三干以獻於公將戰吳子呼叔孫曰而事何也對白從司馬王賜之甲劍鈹曰奉爾君事敬無廢命叔孫未能對衛賜進曰州仇奉甲從君而拜公使大史固歸國子之元寘之新篋褽之以𤣥纁加組帶焉寘書於其上曰天若不識不衷何以使下國博杜注齊邑漢置博陽縣金升為泰安州今故城在山東濟南府泰安州東南嬴杜注齊邑屬泰山集說劉氏敞曰戰而言及之者主之者也猶曰國書為志乎為此戰也云爾又曰事君者自盡而後求進焉成民而後求用焉治内而後求服焉夫以吳之無道犯間上國涉數千里之地以伐人之邦固求棄疾於人與之俱靡焉爾國書之用齊也内不能安其君外不能交鄰國而輕與之戰其不愛百姓也不亦甚乎故善戰者服上刑所謂為志乎此戰者是也高氏閌曰戰不書公者没公乃所以深貶公也且書及吳我師戰于艾陵不可也書及公吳戰于艾陵不可也先言公會吳伐齊繼書及吳戰則公與貶可知矣書獲國書與宋華元同然華元生獲而國書死獲故公使大史固歸國子之元也薛氏季宣曰戰不書伐今書伐何難乎公之㑹吳與齊戰也會伐則戰見矣吳自入郢之後困而久不能見公之六年稍出而伐陳吾叔還會之于柤公又㑹之于鄫還而入邾吳以邾故伐我而齊取讙闡由是齊魯始暌齊歸二邑則固知罪矣我之不寘固與吳合前年會伐齊故有國書之報卒㑹吳而勝齊吳之威加北方多魯之力也春秋書公㑹伐而不言會戰難言而有以見之也李氏廉曰此戰以國書主之者吳之來伐齊人皆知其不可禦而必敗矣苟能全民兵嚴守備屈之以義而勿與交鋒則齊可以坐困彊吳而却之矣今乃以伐魯方歸之罷兵未息肩未解甲而快志於一朝之忿師敗身獲為國大殃故艾陵之戰以國書主之者深罪之也附錄左傳吳將伐齊越子率其衆以朝焉王及列士皆有饋賂吳人皆喜惟子胥懼曰是豢吳也夫諫曰越在我心腹之疾也壤地同而有欲於我夫其柔服求濟其欲也不如早従事焉得志於齊猶獲石田也無所用之越不為沼吳其泯矣使醫除疾而曰必遺類焉者未之有也盤庚之誥曰其有顛越不共則劓殄無遺育無俾易種于兹邑是商所以興也今君易之將以求大不亦難乎弗聽使於齊屬其子於鮑氏為王孫氏反役王聞之使賜之屬鏤以死將死曰樹吾墓檟檟可材也吳其亡乎三年其始弱矣盈必毁天之道也秋七月辛酉滕子虞毋卒集説孔氏穎逹曰四年滕子結卒虞毋代結為君來赴故書也附錄左傳秋季孫命修守備曰小勝大禍也齊至無日矣冬十有一月葬滕隱公衞世叔齊出奔宋左傳冬衞大叔疾出奔宋初疾娶於宋子朝其娣嬖子朝出孔文子使疾出其妻而妻之疾使侍人誘其初妻之娣寘於犂而為之一宫如二妻文子怒欲攻之仲尼止之遂奪其妻或淫於外州外州人奪之軒以獻恥是二者故出衞人立遺使室孔姞疾臣向魋納美珠焉與之城鉏宋公求珠魋不與由是得罪及桓氏出城鉏人攻大叔疾衞莊公復之使處巢死焉殯於鄖葬於少禘初晉悼公子憖亡在衞使其女僕而田大叔懿子止而飲之酒遂聘之生悼子悼子即位故夏戊為大夫悼子亡衞人翦夏戊孔丈子之將攻大叔也訪於仲尼仲尼曰胡簋之事則嘗學之矣甲兵之事未之聞也退命駕而行曰鳥則擇木木豈能擇烏文子遽止之曰圉豈敢度其私訪衞國之難也將止魯人以幣召之乃歸犂杜注衞邑地外州杜注衞邑襄城鉏杜注宋邑巢杜注衞寰宇記巢亭在陵縣南二十里今河南歸德府睢州巢亭是也鄖杜注衞地少禘杜注衞地集說高氏閌曰春秋書内外大夫奔者凡六十蓋君之股肱故重而書之然春秋之末何其出奔之多也是時政在大夫各欲自專始則相猜相忌終乃相攻相逐也附錄左傳季孫欲以田賦使冉有訪諸仲尼仲尼曰丘不識也三發卒曰子為國老待子而行若之何子之不言也仲尼不對而私於冉有曰君子之行也度於禮施取其厚事舉其中斂從其薄如是則以丘亦足矣若不度於禮而貪冒無厭則雖以田賦將又不足且子季孫若欲行而法則周公之典在若欲苟而行又何訪焉弗聽戊敬王三午十七年十有二年晉定二十九年齊簡二年衞出十年蔡成八年鄭聲十八年陳閔十九年把閔四年宋景三十四年秦悼九年楚惠六年吳夫差十三年春用田賦左傳十二年春王正月用田賦公羊何以書譏何譏爾譏始用田賦也穀梁古者公田什一用田賦非正也胡傳哀公問於有若曰年饑用不足如之何有若對曰盍徹乎曰二吾猶不足如之何其徹也曰百姓足君孰與不足百姓不足君孰與足古者公田什一助而不税魯自宣公初税畝後世遂以為常而不復矣至是二猶不足故又以田賦也夫宣王制土籍田以力而砥其逺邇賦里以入而量其有無今用田賦軍旅之征非矣田以出粟為主而足食賦以出軍為主而足兵周制宅不毛者有里布無職事者征夫家漆林之稅二十而五則弛力薄征當以農民為急而增賦竭作不使末業者獨幸而免也今二猶不足而用田賦是重困農民而削其本何以為國書曰用田賦用者不宜用也近世議弛商賈之征達於時政者欲先省國用首寛農民後及商賈知春秋譏田賦之意矣集説杜氏預曰直書之者以示改法重賦田陸氏淳曰以田多少出軍賦也孫氏復曰者井田也賦者財賦也宣公奢泰始什二而税至於哀公則又甚焉哀公不道既什二而税其田又什二而斂其財故曰用田賦言用田以為財賦之率也爾劉氏敞曰用田賦者籍田為賦也何以書譏何譏古者取於民也有常用田賦非正也田吕氏大圭曰陳君舉謂以丘賦一乘為未足又以賦之田賦之者家一人以為兵也然九夫為井六十四井為甸甸出革車一乘則是五百七十六夫而出七十五人今凡受田者皆出一人為兵比古七倍恐加兵不至如是之甚賈逵以為周制十六井賦戎馬一匹牛三頭今使一井之田出十六井之賦是多於常賦十六倍於理亦未宜然吳氏澂曰宣公稅畝首壊井田什一之法則賦民之財也非古矣成公作丘甲賦民之力也非古矣至哀公用田賦而民財民力竭矣萬氏孝恭曰周制嵗時登其夫家之衆寡辨其可任者國中自七尺以及六十野自六尺以及六十有五皆征之今哀公以計口率泉為不足於用又計田而使之出泉以為賦李氏廉曰孔子惡冉求聚斂附益之言蓋在此時又曰田賦之說杜氏以為丘賦之法因其田財通出馬一匹牛三頭今欲别其田及家財各為一賦則是一丘出馬二匹牛六頭也范氏注榖梁同之然杜氏於作丘甲條内已曰今魯使丘出甸賦是一丘十六井已出馬四匹牛十二頭矣安得復以為出馬一匹牛三頭乎此其前後自相戾也況家財有無難均何得别之賈氏以為一井之田而欲出十六井之賦蓋以為井出丘賦也夫一井八家而使出一馬三牛之賦可乎故胡氏獨用國語國語載孔子對冉有之言曰先王制土籍田以力而砥其逺邇賦里以入而量其有無任力以夫而議其老幼於是乎有鰥寡孤疾有軍旅之出則征之無則已其嵗收田一井出稯禾六百四十斛秉芻二百四十斗缶米十六斗不過是也先王以為足若子季孫欲其法也則有周公之籍矣大率以為田主出粟而賦則取於商賈之里㕓今魯以商賈所當出之賦而令農民出之則非古人重本抑末之意矣吕氏亦曰古者田出租里出賦要之二家說為長蓋收區域之征以備馬牛車乘若漢家收田賦泉以補車馬亦其遺意也緣此賦止里㕓出之而今賦於田上故譏之耳然則司馬法所謂甸出一乘者其止出一乘之人歟觀春秋傳所載多臨事而始授以甲授以車則知馬牛車乘决非丘甸所出也胡氏說近之陳氏非是通汪氏克寛曰杜預范寗皆云丘賦之法因其田財出馬一匹牛三頭今别其田及家財各出此賦然丘甲之法增三之一今别田及家財各為一賦則是比先王之制而加倍不翅矣亦未可信要之計田而斂取民財以充軍賦之用而其數之多寡則不可考爾孔子云丘亦足矣蓋以計丘而出兵車乃賦之常法安可計田而又賦其財哉觀哀公年鐖用不足及二吾猶不足如之何其徹也之言則為斂財以足用可知矣車王氏樵曰今案賦之本義專為出軍計兵而出兵賦之常法今計田而出故曰田賦漢計口而出則曰口賦蓋春秋諸侯盟會禮繁兵戎事廣不能復守先王之籍故魯用不足則初税畝益兵則作丘甲至哀公逺事彊吳事充政重二猶不足復用田賦蓋託以軍用加斂於田計田而出貨財也其數之多寡則不可考大約税畝多乎什一田賦又多乎稅畝矣稅畝私田始有征也田賦私田又加征也夏五月甲辰孟子卒左傳夏五月昭夫人孟子卒昭公娶於吳故不書姓死不赴故不稱夫人不反哭故不言葬小君孔子與弔適季氏季氏不絻放絰而拜公羊孟子者何昭公之夫人也其稱孟子何諱娶同姓蓋吳女也穀梁孟子者何也昭公夫人也其不言夫人何也諱娶同姓也胡傳孟子吳女昭公之夫人其曰孟子云者諱娶同姓也禮娶妻不娶同姓買妾不知其姓則卜之厚男女之别也同姓從宗合族屬異姓主名治際㑹名著而男女有别矣四世而緦服之窮也五世而袒免殺同姓也六世親屬竭矣其庻姓别於上戚單於下昏姻可以通乎綴之以姓而弗别合之以食而弗殊雖百世而昏姻不通周道然也昭公不謹於禮欲結好強吳以去三家之權忍娶同姓以混男女之别不命於天子以弱其配不見於廟不書於䇿以廢其常典禮之大本喪矣其失國也宜故陳司敗問昭公知禮乎子曰知禮子退揖巫馬期而進之曰吾聞君子不黨君子亦黨乎君娶於吳為同姓謂之吳孟子君而知禮孰不知禮巫馬期以告子曰丘也幸苟有過人必知之書孟子卒雖曰為君隱而實亦不可掩矣集説杜氏預曰魯人諱娶同姓謂之孟子春秋不改所以順時范氏寗曰葬當書姓諱故亦不書葬卒啖氏助曰同姓不可書曰夫人姬氏薨故曰孟子劉氏敞曰孟子者何昭公之夫人也其稱孟子何諱娶同姓蓋吳女也何以不曰夫人薨命於天子然後成夫人孟子不受命不可以稱夫人蓋自是魯夫人不命於天子也孔王氏葆曰是時季氏當國孔子與弔而季孫不絻子亦放絰而拜是知當時不以小君待之矣秋高氏閌曰國人不以為非而昭公乃知避其名春亦因其實而書之曰孟子卒朱子曰諱之使若宋女子姓者然也薛氏季宣曰知其非禮而異其名雖欲蓋而彌彰吳氏澂曰固是以同姓而不書夫人薨亦以見魯臣不以夫人之禮喪之也昭公君也尚且逐出之而葬不備禮况其夫人乎一書卒而二義具焉書汪氏克寛曰或謂舊史固書夫人孟子薨春秋不夫人而書卒示天下後世娶同姓之必不可也然小君之薨必書夫人某氏當時既鶻突稱呼曰孟子則國史必不可書夫人孟子薨春秋因舊史之文而非禮之實已見矣案傳襄二十三年晉嫁女於吳則同姓之昏非自昭公始春秋於孟子以隱辭書之所以深責秉禮之魯歟公會吳于槖皋槖章夜反又音托南槖皋杜注在淮南逡遒縣東南今江廬州府巢縣西北六十里有柘皋鎮漢之槖皋縣春秋吳邑也左傳公㑹吳于槖皋吳子使大宰嚭請尋盟公不欲使子貢對曰盟所以周信也故心以制之玉帛以奉之言以結之明神以要之寡君以為苟有盟焉弗可改也已若猶可改日盟何益今吾子曰必尋盟若可尋也亦可寒也乃不尋盟集説王氏葆曰吳欲尋盟非衛賜之言不可却故曰不有君子其能國乎秋公會衞侯宋皇瑗于鄖鄖音云公作運縣鄖杜注發陽也廣陵海陵東南有發繇亭今江南揚州府如皋縣東立發壩古發陽也亦名古鄖左傳吳徵㑹于衛初衛人殺吳行人且姚而懼謀於行人子羽子羽曰吳方無道無乃辱吾君不如止也子木曰吳方無道國無道必棄疾於人吳雖無道猶足以患衞往也長木之斃無不摽也國狗之瘈無不噬也而况大國乎秋衞侯會吳于鄖公及衞侯宋皇瑗盟而卒辭吳盟吳人藩衞侯之舍子服景伯謂子貢曰夫諸侯之㑹事既畢矣侯伯致禮地主歸餼以相辭也今吳不行禮於衞而藩其君舍以難之子盍見大宰乃請束錦以行語及衞故大宰嚭曰寡君願事衞君衞君之來也緩寡君懼故將止之子貢曰衞君之來必謀於其衆其衆或欲或否是以緩來其欲來者子之黨也其不欲來者子之讎也若執衞君是堕黨而崇讎也夫墮子者得其志矣且合諸侯而執衞君誰敢不懼墮黨崇讎而懼諸侯或者難以霸乎大宰嚭說乃舍衞侯衞侯歸效夷言子之尚㓜曰君必不免其死於夷乎執焉而又說其言從之固矣集說王氏錫爵曰子貢就緩字發出所以緩之故無中生有能令聞者魄奪宋向巢帥師伐鄭左傳宋鄭之間有隙地焉曰彌作頃丘玉暢嵒戈鍚子産與宋人為成曰勿有是及宋平元之族自蕭奔鄭鄭人為之城嵒戈錫九月宋向巢伐鄭取鍚殺元公之孫遂圍嵒十二月鄭罕達救嵒丙申圍宋師玉暢把縣東北三十里有玉帳或云古玉暢案把縣為春秋宋地北與陳留接壤傳曰宋鄭之間或即是也滅錫地名路史商末鍚疇子斯在宋鄭之間鄭人之以處宋元公之孫彌作頃丘嵒戈皆地名集說李氏廉曰自皇瑗取鄭師之後書宋公宋人伐鄭者再宋兵亦可以釋怨矣而向巢之師復起是必欲殺平元之族而後已也全師覆沒亦蹈前日鄭人之覆轍佳兵不祥其事好還信哉冬十有二月螽左傳冬十二月螽季孫問諸仲尼仲尼曰丘聞之火伏而後蟄者畢今火猶西流司厯過也公羊何以書記異也何異爾不時也集說杜氏預曰周十二月今十月是嵗應置閏而失不置雖書十二月實今九月九月之初尚温故得有螽吕孫氏復曰周之十二月夏之十月也為異之甚氏大圭曰左氏以為失閏之故然明年九月螽又十二月螽恐不專為失閏與家氏鉉翁曰十二月螽氣燠也宣十五年冬蝝生此記同左氏所錄疑非聖人之言也直王氏樵曰案明年九月螽蟲災亟作而不時以失政爾非闗閏也案左氏載孔子之言杜氏預以為失閏然二年之間三以螽告其災甚矣故先儒多駁之者今竝存其説已敬王三未十八年十有三年晉定三十年齊簡三年衞出十一年蔡成九年鄭聲十九年陳閔二十年把閔五年宋景三十五年秦悼十年楚惠七年吳夫差十四年春鄭罕達帥師取宋師于嵒左傳十三年春宋向魋救其師鄭子賸使徇曰得桓魋者有賞魋也逃歸遂取宋師于嵒獲成讙郜延以六邑為虚公羊其言取之何易也其易奈何詐反也穀梁取易辭也以師而易取宋病矣集說家氏鉉翁曰春秋書取師誅取者之不仁以多殺為功也先書宋取鄭師責宋也今書鄭取宋師亦責鄭也然朱氏睦㮮曰宋鄭怨已十三年雖造端由於罕達宋自九年皇瑗取鄭師之後宋公宋人兩伐鄭亦可以釋憾矣而向巢之師復起何耶故是年鄭亦取宋師于嵒彼以諼來我以諼報耳夏許男成卒成公作戌集說汪氏克寛曰元公也國滅後楚立之公會晉侯及吳子于黄池書會止此有黄池杜注陳留封丘縣南黄亭近濟水國語夫差起師北征闕為深溝於商魯之間北屬之沂西屬之濟以會晉公午于黄池沂水出蓋縣臨樂山入於泗而濟水在封丘縣南是時夫差既通江淮遂帥舟師自淮入泗自泗入沂復穿魯宋之境連屬水道有不通者鑿而通之以達於封丘之濟杜氏所謂近濟水也今黄池在河南開封府封丘縣西南左傳夏公會單平公晉定公吳夫差于黄池公羊其言及吳子何㑹兩伯之辭也集說杜氏預曰夫差欲霸中國尊天子自去其僭號而稱子以告令諸侯故史承而書之孔氏穎達曰七年㑹吳于鄫十二年會吳于槖皋皆不稱子此稱吳子故觧之夫差欲霸中國尊天子而自號為王則諸侯不服故去其僭號自稱吳子以告令諸侯故諸侯之策承而書曰吳子吳語說此事云晉侯命董褐告吳王曰今君奄王東海以淫名聞於天下君有短垣而自踰之況蠻荆則何有於周室夫命圭有命固曰吳伯不曰吳王諸侯是以敢辭夫諸侯無二君而周無二王君若無卑天子而曰吳公孤敢不順從君命吳王許諾是其去僭號也於此會去王號耳其於吳國猶稱王不改也陸氏淳曰趙子曰據左氏有單平公而不書於經者緣吳晉敵禮而會如今賔主對舉酒自然單子無坐位故不書且經文有及字是兩伯之義分明也公羊乃云吳為會主與經不同不足取也故留其兩伯之辭而已公羊又曰吳在是則天下諸侯莫敢不至趙云黄池魯地故魯獨㑹之耳若更有諸侯不當不序穀梁曰黄池之會吳子進矣趙子曰此為吳同為會主故不人傳不逹此理遂妄為議耳劉氏敞曰公羊曰吳主會也案吳主會必非晉所願也春秋宜曰公會晉侯暨吳子于黄池則與公羊例合矣今乃曰及吳子此其晉魯汲汲我欲之者邪又曰吳在是則天下諸侯莫敢不至也何休以謂云爾者欲為魯侯殺恥故不書諸侯也吾謂春秋審欲為魯侯殺恥者書諸侯乃宜矣無為乃沒之也許氏翰曰左氏曰先晉國語曰先吳此二國史籍之異也顧自宋之盟則晉已為楚所先陵遲至於黄池之時豈能復與吳爭國語信也晉人恥吳先之故諱焉耳池高氏閌曰首止先及而後會所以尊王世子也黄先會而後及所以外吳子也吳泰伯之後與周同姓狂僭大號擾亂列國夫天無二日民無二王今吳為黄池之會以主盟列國是二王也將置周王於何地耶聖人自十年吳伐齊之後春不書王以見天下之無王此春秋之所以終也陳氏傅良曰黄池之盟不書吳晉之盟春秋終諱之公會晉侯及吳子雖兩伯之辭而終不以吳晉同主盟也單平公不書不忍書也楚鄭氏玉曰會于黄池吳子主之晉魯聽命矣然吳有僭王之罪聖人終絶之而莫之與也此所以序晉吳上而書及以終春秋之會盟也汪氏克寛曰辰陵于蜀于申楚雖主盟而晉不與故春秋皆先楚以紀實也于宋于虢楚同主會且先於晉然晉君猶未同盟故春秋但先晉以正名而不書及焉今黄池之㑹吳子主盟而晉定公以奕世之伯魯哀公以秉禮之望皆俯伏聽命於壇坫之上故春秋先晉以存中國之名而書及以著兩伯之實則内外之分不紊而彊弱之勢自見矣穀梁謂嘉其尊王進而書子使夫差果能尊周則當序單平公於吳晉之上如葵丘宰周公之例矣吳語又謂趙鞅使董褐復命責其僭王而夫差降爵稱公夫以齊桓之盛未能責楚僭王之罪豈以晉之衰弱而反能使吳王黜其僭號乎殆不足信也案黄池之㑹左傳稱乃先晉人吳語稱吳公先歃晉侯亞之二説者諸儒互有所主夫宋之盟晉國方彊而卒先楚人則謂晉定之不能先吳似也吳方在會而邊遽猝以越亂告吳王駭懼刎其告者七人則謂吳子内惕而不敢復爭春秋所書次第乃其事實亦似也趙氏匡又謂吳晉敵禮而會如今賔主對舉酒故晉史即云晉為先而吳語即云吳先歃各自䕶其主亦似有理姑竝存之楚公子申帥師伐陳集説高氏閌曰楚畏吳之彊無如之何故乘吳之出會而伐陳也於越入吳左傳六月丙子越子伐吳為二隧疇無餘謳陽自南方先及郊吳大子友王子地王孫彌庸壽於姚自泓上觀之彌庸見姑蔑之旗曰吾父之旗也不可以見讎而弗殺也大子曰戰而不克將亡國請待之彌庸不可屬徒五千王子地助之乙酉戰彌庸獲疇無餘地獲謳陽越子至王子地守丙戌復戰大敗吳師獲大子友王孫彌庸壽於姚丁亥入吳吳人告敗於王王惡其聞也自剄七人於幕下姑蔑杜注越地今東陽大末縣案越地西至於姑蔑即此秦置大末縣今衢州府龍游縣也胡傳吳自柏舉以來憑陵列國黄池之會遂及兩伯可謂彊矣而春秋繼書於越入吳所謂因事屬辭垂戒後世而見深切著明之義也曾子曰戒之戒之出乎爾者反乎爾老氏曰佳兵不祥之器其事好還夫以力勝人者人亦以力勝之矣吳嘗破越遂有輕楚之心及其破楚又有驕齊之志既勝齊師復與晉人爭長自謂莫之敵也而越已入其國都矣吳侵列國而越滅之越又不監而楚滅之楚又不監而秦滅之秦又不監而漢滅之老氏曾子其言豈欺也哉春秋初書於越入吳在柏舉之後再書於越入吳在黄池之後皆因事屬辭垂戒後世不待貶絶而見深切著明之義也而可廢乎集說孫氏復曰吳子方會越乘其無備而入之也卒薛氏季宣曰吳子不戒爭中國之諸侯而越入吳所謂無逺慮有近憂矣吳子忘不共戴天之恥而求諸侯於外此越之所以伯諸侯乎附錄左傳秋七月辛丑盟吳晉爭先吳人曰於周室我為長晉人曰於姬姓我為伯趙鞅呼司馬寅曰日旰矣大事未成二臣之罪也建鼓整列二臣死之長幼必可知也對曰請姑視之反曰肉食者無墨今吳王有墨國勝乎大子死乎且夷德輕不忍久請少待之乃先晉人吳人將以公見晉侯子服景伯對使者曰王合諸侯則伯帥侯牧以見於王伯合諸侯則侯帥子男以見於伯自王以下朝聘玉帛不同故敝邑之職貢於吳有豐於晉無不及焉以為伯也今諸侯㑹而君將以寡君見晉君則晉成為伯矣敝邑將改職貢魯賦於吳八百乘若為子男則將半邾以屬於吳而如邾以事晉且執事以伯召諸侯而以侯終之何利之有焉吳人乃止既而悔之將囚景伯景伯曰何也立後於魯矣將以二乘與六人從遲速惟命遂囚以還及户牖謂大宰曰魯將以十月上辛有事於上帝先王季辛而畢何世有職焉自襄以來未之改也若不會祝宗將曰吳實然且謂魯不共而執其賤者七人何損焉大宰嚭言於王曰無損於魯而祗為名不如歸之乃歸景伯吳申叔儀乞糧於公孫有山氏曰佩玉繠兮余無所繫之旨酒一盛兮余與褐之父睨之對曰梁則無矣麤則有之若登首山以呼曰庚癸乎則諾王欲伐宋殺其丈夫而囚其婦人大宰嚭曰可勝也而弗能居也乃歸户牖杜注陳留外黄縣西北東昏城是今東昏故城在開封府蘭陽縣東北秋公至自會晉魏曼多帥師侵衞魏下公無曼字霸國侵伐止此集說許氏翰曰晉以范中行之難伐衞伐鮮虞間齊之難而一侵之又再侵衞而諸侯卒莫之宗師雖數出能侵而已天家氏鉉翁曰此霸國侵伐之終事也晉之盛威行下今其衰也趙鞅魏曼多數修怨於衞衞卒不服豈力不足哉鞅曼多志不在求諸侯志於怙權自私而已李氏廉曰晉事止於此李氏曰讀隱桓之春秋而知王澤之竭也讀昭定哀之春秋而知伯烈之壞也晉霸復盛於悼公浸衰於平昭而遂廢於頃定夫晉以奕世九君之業豈無積累之功著在列國至頃定一壞而不可復收嗚呼廢興存亡未有無故而然者也千尋之木物能蠧之必其中先腐壊戕蝕而後蠧生焉嘗原晉事之顛末而察其所由失矣或曰晉之微也有楚弗攘有吳弗抑二彊竝立伯權遂弱自召陵擁十八國之衆不能振旅至於戎蠻之執晉俛焉北面而事楚以京師之禮自吳滅巢滅徐伐陳伐齊晉不能誰何迄乎黄池之㑹吳哆然操方伯之令而下以列國命晉春秋由是絶筆焉則晉之失伯實吳楚之張也曰諸侯苟合吳楚豈能間乎其端在諸侯之先貳當時以齊景衞靈宋景之君其國皆彊勠力周旋何患於吳楚今也齊景公有抑晉代齊者也蓋晉之志宋衛魯鄭之君無非攘臂以從行人叔孫婼與邾大夫坐而失魯執宋仲幾樂祁犂而失宋涉佗成何詬衞而失衞荀寅辭蔡而失蔡假羽旄於鄭而失鄭是以齊得以盡取諸侯鄭則與齊盟于鹹會于安甫矣衞則與齊盟于沙次于五氏矣魯則與齊㑹于牽宋則與齊會于洮矣終而齊侯衞侯且伐晉矣則晉之失伯乃諸侯之離也曰晉國苟治諸侯安得背乎其原在大夫之先叛使六卿諸臣如先大夫之肅皆盡忠以輔公何憂乎齊衞今也彊家多門各求封殖而削弱之禍獨歸宗國自趙鞅取衞貢五百家動晉陽之甲自韓不信執宋命卿不顧踐土之盟自魏舒南面涖政敢干位以命大事而趙籍魏斯韓䖍為諸侯之萌已成矣則晉之失伯乃大夫之擅也曰晉之禮義素明則大夫豈得擅乎利勝而義微此上下之所以不奪不饜也范鞅請冠而魯使䝉執趙鞅受楊楯而宋卿賈禍邯鄲爭貢而三卿亂國或取季孫之賄而昭公弗納或求蔡侯之貨而伐楚之師徒出或索十牢而吳人借為口實孟子曰上下交征利而國危矣晉伯之衰又誰咎歟此春秋所以謹義利之辨察天理人欲之分正君臣上下之位而示後世以防微杜漸反本澄源之道也葬許元公九月螽集說黄氏震曰高氏集注曰去嵗十有二月螽今年九月螽十二月又螽為災甚矣愚按左氏傳凡十二月螽皆以為司厯之過若以此月為螽猶未蟄則以秋為冬差一時也民時亂而農功失司厯之過一至此乎天下寧有此理哉况螽乃災異非侯蟲之常以時而蟄者也螽即蝗也蝗蝻在地冬雪乃深入今冬燠而有螽將蔓延為來嵗之災尤災之甚者也冬十有一月有星孛于東方孛音佩又音勃公羊孛者何彗星也其言于東方何見於旦也何以書記異也集說高氏閌曰不言宿名者董仲舒劉向以為不加宿也文十四年有星孛于北斗昭十七年有星孛于大辰皆言所次而此獨不言則不加宿可知也蓋著人事所召也家氏鉉翁曰天欲旦太陽將升而孛見焉妖星干太陽駭常之變也滅汪氏克寛曰星孛東方乃東方悖亂吳爭彊而越之之徵也盜殺陳夏區夫區烏侯反公作彄苦侯反集說高氏閌曰區夫徵舒之後徵舒弑逆楚人殺之而陳人猶使世執國政春秋因其為盜所殺而書之與華孫同意盜殺蔡侯申盜殺陳夏區夫當春秋之季世變之極至於盜興而專殺國君卿大夫則亂已極矣殺趙氏鵬飛曰春秋書盜者四殺君者一殺兄者一大夫者二以盜之賤而及君大夫之貴其國無政刑矣十有二月螽集說呂氏本中曰此年九月螽十二月又螽比年十月螽陰陽錯亂甚矣當世君臣亦可以自省矣於許氏翰曰春秋書魯人事至用田賦書魯天災至二年三螽見其重賦害民傷和致異民力已窮天命已去君子之心於魯已矣附錄左傳吳及越平庚敬王三申十九年十有四年晉定三十一年齊簡四年衞出十二年蔡成十年鄭聲二十年陳閔二十一年把閔六年宋景三十六年秦悼十一年楚惠八年吳夫差十五年春西狩獲麟左傳十四年春西狩於大野叔孫氏之車子鉏商獲麟以為不祥以賜虞人仲尼觀之曰麟也然後取之大野杜注在高平鉅野縣東北大澤是也元和志大野澤一名鉅野今山東兗州府嘉祥縣西有獲麟堆蓋嘉祥本鉅野分置也公羊麟者仁獸也有王者則至無王者則不至有以告者曰有麕而角者孔子曰孰為來哉孰為來哉反袂拭面涕沾袍顔淵死子曰噫天喪予子路死子曰噫天祝予西狩獲麟孔子曰吾道窮矣集説杜氏預曰冬獵曰狩蓋虞人修常職故不書狩者大野在魯西故言西狩孔氏穎逹曰公羊傳曰麟者仁獸也何休云一角而戴肉設武備而不為害所以為仁也鄭氏詩箋云麟角之末有肉示有武而不用釋獸云麐麕身牛尾一角李巡曰麟瑞應獸名孫炎曰靈獸也京房易傳曰麟麕身牛尾狼額馬蹄有五采腹下黄高丈二廣雅云麒麟狼頭肉角含仁懐義音中鐘呂行步中規折旋中矩遊必擇土翔必有處不履生蟲不折生草不羣不旅不入䧟穽不入羅網文章斌斌説文云麒仁獸從鹿其聲麟大牝鹿也從鹿粦聲釋文云冬獵為狩周之春夏之冬故稱狩也桓四年公狩于郎莊四年公及齊人狩于禚禚郎二者公親行皆書公狩此狩不書公卿者蓋是虞人賤官自修常職公卿不行故不書狩者名氏此狩常事本不合書書之為獲麟故也傳稱狩於大野大野之澤在魯國之西故言西狩得用曰獲定九年傳例也杜以獲麟之義惟此而已先儒穿鑿妄生異端説公羊者云麟是漢將受命之瑞周亡天下之異夫子知其將有六國爭彊秦項交戰然後劉氏乃立夫子故為之隕泣案此時去漢二百七十有餘年矣漢氏起於匹夫先無王迹前期三百許嵗天已豫見徵兆其為靈命何太逺乎言既不經事無所據説左氏者云麟生於火而遊於土中央軒轅大角之獸孔子作春秋春秋者禮也修火德以致其子故麟來而為孔子瑞也賈逵服䖍頴容等皆以為孔子自衛反魯考正禮樂修春秋約以周禮三年文成致麟麟感而至取龍為水物故以為修母致子之應若然龍為水物以其育於水耳麟生於火豈其産於火乎孔子之作春秋門徒盡知之矣丘明親承聖旨目見獲麟丘明何以不言弟子何以不説子思孟軻去聖尤近荀卿著書尊崇禮德麟若應孔子而來著書無容不述何乃經傳羣籍了爾不言以其既妖且妄故杜悉無所取有趙氏匡曰公羊穀梁二傳以經不言狩人之名故薪采引取之説不知舉獸獲之義是以爾也非劉氏敞曰公羊曰春秋何以始乎隱祖之所逮聞也聖人作經為天子法不苟記祖所逮而已且如所言祖者謂曾祖乎高祖乎如謂曾祖孔子曾祖防叔則孔父三世之孫如謂高祖孔子高祖祁父亦孔父二世之孫孔父死於桓二年其孫不得見隱審矣計防叔祁父之時應在閔僖之間春秋則當起於閔僖不宜始隱公也又曰榖梁曰不言其來不外麟也不言有不使麟不恒有也皆非也謂之獲麟矣則不得言其來不得言其有記事之理也何説乎即以言其來為外之季子來歸亦外之耶即以言其有為使不恒有大有年亦使不恒有耶故守一而廢百謂之章句之儒去道逺矣朱子曰春秋獲麟某不敢指定是書成感麟亦不敢指定是感麟作大槩出非其時被人殺了是不祥李氏廉曰感麟而作春秋之説杜氏何氏程子謝氏呂氏張氏諸家多同絶筆獲麟之説諸家皆不過以為所感而起因以為終而何氏獨以為春秋之成文致太平託言太平而瑞應至故就以麟終焉此其異也文成致麟之説本於范氏而胡氏因之其意直以為孔子自衞反魯即修春秋經成道備嘉瑞應焉而以天道終之比於關雎之應而能事畢矣蓋亦祖於何休之遺意也麟汪氏克寛曰説左氏者以春秋感麟而作作起獲而文止於所起學公榖者以謂春秋文成致麟竊疑聖人作經絶筆於獲麟之一句則非經成而麟至矣苟曰經成而後麟至則春秋筆絶於哀公十三年十二月螽殊無意義特世儒推尊孔子作經之效至於如是之盛故曰文成致麟耳春秋成而亂臣賊子懼聖人之道雖不行於當時而大行於後世矣為人君而法乎春秋則可以命德而討罪躋斯世於至治為人臣而學乎春秋則可以善善而惡惡尊主而庇民其義得行則天理流行人欲壅遏孟子論孔子作春秋之功以為一治豈不信哉季氏本曰周道衰廢人欲横流亂賊接跡撥亂反正孔子作春秋以明王法雖無麟固將作矣孔子之卒在後二年苟非平日所嘗用心豈能詳哉故文成致麟之説元凱斷其妖妄兹不復論若必謂感麟始作則理亦未盡焉陳氏際泰曰西狩獲麟其論者非一家一曰麟獲而孔子始作春秋獲麟之嵗距孔子之卒為時幾何而汲汲操筆乎且麟不獲孔子終不作春秋否也一曰文成而麟至麟而獲也烏在其為瑞而可以應文成也春秋以天道終又非也春秋以天道終是即文成麟至之説而益張大之凡此皆尊聖人之過而不得其實計孔子之作春秋或在定公之末年或在哀公之初年與夫哀十年之前後俱未可知也案吾夫子以道不行而有乘桴之歎鳳不至圖不出而有已矣之嗟蓋天下之莫宗久已知之其欲從事於屬辭比事以垂世立教者非一日矣春秋一書豈必感麟而後作乎若夫文成致麟修母致子應孔子而來之說尤為不經胡傳乃謂簫韶九奏鳳儀於庭魯史成經麟出於野不亦謬乎古昔盛時治化翔洽休徵畢至爰有麟鳳以昭太平之祥今見戕於虞人似亦不足以為瑞也善乎朱子之言曰某不敢指定是書成感麟亦不敢指定是感麟作此真通儒卓識可以一洗紛紛穿鑿之論矣至於絶筆獲麟杜氏預謂感麟而作固所以為終也鄭氏樵謂終於獲麟聖人初無意也歐陽氏修謂孔子得魯史記自隱公至於獲麟遂刪修之義在春秋不在起止諸家所見不同皆非篤論也麟獲於哀公十四年春秋成於是年之九月越二年而孔子卒夫國史編年之體案年書事至於年終乃止則哀公十四年之事魯史自當備錄必不僅書獲麟而遽止也史家記錄時事必闕其近數年以俟異日之採緝若謂孔子作春秋亦闕其近數年則當至十四年冬而止或至十三年冬而即止何為忽止於十四年春乎是當仍以朱子為㫁矣朱子曰大槩出非其時被人所殺是不祥蓋麟為仁獸聖王之嘉瑞也今出非其時而虞人戕之聖心能無傷乎然則感其不祥而遂絶筆焉聖人亦非無所寓意也今故遵朱子為定論而凡謂感麟而作與夫文成致麟者皆不錄欽定春秋傳説彚纂卷三十七
