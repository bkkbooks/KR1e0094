body:
  text: 欽定四庫全書欽定春秋傳說彚纂卷二十八乙靈王二卯十六年二十有七年晉平十二年齊景二年衛獻三十一年蔡景四十六年鄭簡二十年曹武九年陳哀二十三年把文四年宋平三十年秦景三十一年楚康十四年吳餘祭二年春附録左傳二十七年春胥梁帶使諸喪邑者具車徒以受地必周使烏餘具車徒以受封烏餘以其衆出使諸侯僞效烏餘之封者而遂執之盡獲之皆取其邑而歸諸侯諸侯是以睦於晉齊侯使慶封來聘左𫝊齊慶封來聘其車美孟孫謂叔孫曰慶季之車不亦美乎叔孫曰豹聞之服美不稱必以惡終美車何為叔孫與慶封食不敬為賦相鼠亦不知也集說杜氏預曰景公即位通嗣君也莊趙氏鵬飛曰齊自圍成之役讎於魯久矣今公見弒景公即位而修好於四鄰首命慶封以來聘焉齊魯復通自慶封之聘始故聖人書之家氏鉉蓊曰齊靈莊相繼魯受兵無寧日景公立始通好春秋書以美之李氏廉曰齊聘魯五止於此汪氏克寬曰自齊人媵伯姬僑如逆婦姜二國不通好者三十年今景公不事侵伐先遣貴卿聘於魯亦云賢矣夏叔孫豹會晉趙武楚屈建蔡公孫歸生衛石惡陳孔奐鄭良霄許人曹人于宋屈居勿反奐公作瑗後同晉楚始同主盟左𫝊宋向戌善於趙文子又善於令尹子木欲弭諸侯之兵以為名如晉告趙孟趙孟謀於諸大夫韓宣子曰兵民之殘也財用之蠧小國之大菑也將或弭之雖曰不可必將許之弗許楚將許之以召諸侯則我失為盟主矣晉人許之如楚楚亦許之如齊齊人難之陳文子曰晉楚許之我焉得已且人曰弭兵而我弗許則固攜吾民矣將焉用之齊人許之告於秦秦亦許之皆告於小國為會于宋五月甲辰晉趙武至於宋丙午鄭良霄至六月丁未朔宋人享趙文子叔向為介司馬置折俎禮也仲尼使舉是禮也以為多文辭戊申叔孫豹齊慶封陳須無衛石惡至甲寅晉荀盈從趙武至丙辰邾悼公至壬戌楚公子黑肱先至成言於晉丁卯宋向戌如陳從子木成言於楚戊辰滕成公至子木謂向戌請晉楚之從交相見也庚午向戌復於趙孟趙孟曰晉楚齊秦匹也晉之不能於齊猶楚之不能於秦也楚君若能使秦君辱於敝邑寡君敢不固請於齊壬申左師復言於子木子木使馹謁諸王王曰釋齊秦他國請相見也秋七月戊寅左師至是夜也趙孟及子晳盟以齊言庚辰子木至自陳陳孔奐蔡公孫歸生至曹許之大夫皆至以藩為軍晉楚各處其偏伯夙謂趙孟曰楚氛甚惡懼難趙孟曰吾左還入於宋若我何集說杜氏預曰案𫝊會者十四國齊秦不交相見邾滕為私屬皆不與盟宋為主人地於宋則與盟可知故經唯序九國大夫間孫氏復曰隱桓之際天子失道諸侯擅權宣成之諸侯僭命大夫専國至宋之會則又甚矣何哉自宋之會諸侯日微天下之政皆大夫専持之也故二十九年城把三十年㑹澶淵昭元年會虢諸侯莫有見者此天下之政皆大夫盟専持之可知也陳氏傅良曰此晉楚初同主諸夏也晉楚常盟矣㑹于瑣澤之歲宋華元克合晉楚之成士燮㑹公子罷盟於宋西門之外不書猶曰特相盟也兩國之好而非天下之大變也以諸侯分為二國之從而交相見也於是始則是南北二伯也天下之大變也各家氏鉉翁曰向戌欲弭兵當請命京師馳告晉楚率其與國朝王而受命盟於王庭兵庶可弭矣今俾晉楚之從交相見而列國乃有二霸趙武向戌豈非罪人乎汪氏克寬曰荆楚之同主夏盟皆宋為之也宋襄圖伯始進楚人于鹿上之盟既而盂之㑹楚書爵而與宋公竝序於諸侯之上二伯之端兆於此矣故遂有盂之執泓之敗而宋不能霸華元合晉楚之成盟于宋西門之外爭霸之業復起於此故鄢陵楚子敗績而鄭終從楚今也向戌為成使晉楚之從交相見而兩霸之勢遂成於此故于申之㑹晉遂退縮不復主諸侯而宋向戌且獻禮於楚子由是知荆楚之爭雄於北方皆宋為之也衛殺其大夫寧喜左𫝊衛寧喜専公患之公孫免餘請殺之公曰微寧子不及此吾與之言矣事未可知祗成惡名止也對曰臣殺之君勿與知乃與公孫無地公孫臣謀使攻寧氏弗克皆死公曰臣也無罪父子死余矣夏免餘復攻寧氏殺寧喜及右宰穀尸諸朝石惡將㑹宋之盟受命而出衣其尸枕之股而哭之欲斂以亡懼不免且曰受命矣乃行穀梁稱國以殺罪纍上也寧喜弒君其以纍上之辭言之何也嘗為大夫與之涉公事矣寧喜由君弒君而不以弒君之罪罪之者惡獻公也胡𫝊寧喜既坐弒君之罪矣不以討賊之詞何也子鮮曰逐我者出納我者死賞罰無章何以勸沮君失其信而國無刑不亦難乎故稱國以殺而不去其官集說孫氏復曰寧喜不以討賊辭書者獻公殺之不以其罪也孫氏覺曰喜弒剽而納衎衎反國而復用之既而以其私殺之喜雖有罪而衛侯殺之不以其罪矣昔里克殺奚齊而立夷吾夷吾殺之二君之殺其大夫皆以其私里克寧喜之見殺皆不以其罪故春秋皆曰殺其大夫家氏鉉翁曰剽篡君者也他人可殺而寧喜嘗事之以為君不得殺也故書弒以正其罪喜弒君者也他人可殺而衛獻因之以入不得殺也故稱國以殺不削其官衛侯之弟鱄出奔晉鱄市戀反又音専穀作専左𫝊子鮮曰逐我者出納我者死賞罰無章何以沮勸君失其信而國無刑不亦難乎且鱄實使之遂出奔晉公使止之不可及河又使止之止使者而盟於河託於木門不鄉衛國而坐木門大夫勸之仕不可曰仕而廢其事罪也從之昭吾所以出也將誰訴乎吾不可以立於人之朝矣終身不仕公喪之如稅服終身公與免餘邑六十辭曰唯卿備百邑臣六十矣下有上祿亂也臣弗敢聞且寧子唯多邑故死臣懼死之速及也公固與之受其半以為少師公使為卿辭曰太叔儀不二能贊大事君其命之乃使文子為卿木門杜注晉邑穀梁𫝊曰織絇邯鄲則木門當在邯鄲之境公羊衛殺其大夫寧喜則衛侯之弟鱄曷為出奔晉為殺寧喜出奔也曷為為殺寧喜出奔衛寧殖與孫林父逐衛侯而立公孫剽寧殖病將死謂喜曰黜公者非吾意也孫氏為之我即死女能固納公乎喜曰諾寧殖死喜立為大夫使人謂獻公曰黜公者非寧氏也孫氏為之吾欲納公何如獻公曰子苟納我吾請與子盟喜曰無所用盟請使公子鱄約之獻公謂公子鱄曰寧氏將納我吾欲與之盟其言曰無所用盟請使公子鱄約之子固為我與之約矣公子鱄辭曰夫負羈縶執鈇鑕從君東西南北則是臣僕庶孽之事也若夫約言為信則非臣僕庶孽之所敢與也獻公怒曰黜我者非寧氏與孫氏凡在爾公子鱄不得已而與之約已約歸至殺寧喜公子鱄挈其妻子而去之將濟於河挈其妻子而與之盟曰苟有履衛地食衛粟者昧雉彼視穀梁専其曰弟何也専有是信者君賂不入乎喜而殺喜是君不直乎喜也故出奔晉織絇邯鄲終身不言衛専之去合乎春秋胡傳衛侯之入使鱄與寧喜約言既殺寧喜鱄病失言遂出奔晉其稱弟罪衛侯也集說趙氏鵬飛曰鱄不曰公子而書衛侯之弟非鱄不弟衛侯不能弟也家氏鉉翁曰鱄始銜其君兄之命以與寧喜約固許之以專衛國之政今以其專而殺之在衛獻為食言鱄自以失信於死者逃其兄而去之夫鱄衛獻之母弟也獻非鱄不得返國今甫奠於位而不能安鱄之身獻之不友甚矣書衛侯之弟譏不友也夫王氏樵曰今案書弟罪衛侯也書鱄出奔於殺大寧喜之後見鱄為寧喜出奔亦以罪鱄也衛侯無君兄之道殺喜不以其罪使鱄至於出奔其罪昭矣其罪鱄奈何曰信近於義言可復也已雖急納其兄不思剽既立矣為復之道欲兩得而無害則何地以置剽寧喜不願盟而願得子鮮之一言重其義也欲堅其意豈無君臣之大義可指陳以感動而乃從獻公政由寧氏祭則寡人之云乎此信之不義言之必不可復者也而子鮮為之殺寧喜者固政由寧氏之一言也夫言必信行必果而不唯義之所在未有不至於賊者也重於失信而不知兄弟之恩之尤重也不忍負寧氏而不知君之尤不忍離也為子鮮者初决於出以感悟獻公可也公再三止之則可止矣夫亦念國之無人公之無恆也而與太叔儀竭力以輔之勸公以立寧氏之後則亦無負於喜矣乃决於自絶止使者而盟於河終身不向衛國而坐不已甚乎案寧喜納衎所信者鱄也衎入而殺喜鱄自以失信避兄而奔先儒多豫之者獨王氏樵以為信不近義必至於敗而兄弟之恩不宜决於自絶則鱄亦不得為無過也穀梁謂與謀弒君則其說刻矣故竝存王氏樵說而删節穀梁秋七月辛巳豹及諸侯之大夫盟于宋左傳辛巳將盟于宋西門之外楚人衷甲伯州犂曰合諸侯之師以為不信無乃不可乎夫諸侯望信於楚是以來服若不信是棄其所以服諸侯也固請釋甲子木曰晉楚無信久矣事利而已苟得志焉焉用有信太宰退告人曰令尹將死矣不及三年求逞志而棄信志將逞乎志以發言言以出信信以立志參以定之信亡何以及三趙孟患楚衷甲以告叔向叔向曰何害也匹夫一為不信猶不可單斃其死若合諸侯之卿以為不信必不捷矣食言者不病非子之患也夫以信召人而以僭濟之必莫之與也安能害我且吾因宋以守病則夫能致死與宋致死雖倍楚可也子何懼焉又不及是曰弭兵以召諸侯而稱兵以害我吾庸多矣非所患也季武子使謂叔孫以公命曰視邾滕既而齊人請邾宋人請滕皆不與盟叔孫曰邾滕人之私也我列國也何故視之宋衛吾匹也乃盟晉楚爭先晉人曰晉固為諸侯盟主未有先晉者也楚人曰子言晉楚匹也若晉常先是楚弱也且晉楚狎主諸侯之盟也久矣豈專在晉叔向謂趙孟曰諸侯歸晉之德只非歸其尸盟也子務德無爭先且諸侯盟小國固必有尸盟者楚為晉細不亦可乎乃先楚人書先晉晉有信也壬午宋公兼享晉楚之大夫趙孟為客子木與之言弗能對使叔向侍言焉子木亦不能對也乙酉宋公及諸侯之大夫盟於蒙門之外子木問於趙孟曰范武子之德何如對曰夫子之家事治言於晉國無隱情其祝史陳信於鬼神無愧辭子木歸以語王王曰尚矣哉能歆神人宜其光輔五君以為盟主也子木又語王曰宜晉之伯也有叔向以佐其卿楚無以當之不可與爭晉荀盈遂如楚涖盟鄭伯享趙孟於垂隴子展伯有子西子産子大叔二子石從趙孟曰七子從君以寵武也請皆賦以卒君貺武亦以觀七子之志子展賦草蟲趙孟曰善哉民之主也抑武也不足以當之伯有賦鶉之賁賁趙孟曰牀笫之言不踰閾况在野乎非使人之所得聞也子西賦黍苖之四章趙孟曰寡君在武何能焉子産賦隰桑趙孟曰武請受其卒章子太叔賦野有蔓草趙孟曰吾子之惠也印段賦蟋蟀趙孟曰善哉保家之主也吾有望矣公孫段賦桑扈趙孟曰匪交匪敖福將焉往若保是言也欲辭福祿得乎卒享文子告叔向曰伯有將為戮矣詩以言志志誣其上而公怨之以為賔榮其能久乎幸而後亡叔向曰然已侈所謂不及五稔者夫子之謂矣文子曰其餘皆歎世之主也子展其後亡者也在上不忘降印氏其次也樂而不荒樂以安民不淫以使之後亡不亦可乎宋左師請賞曰請免死之邑公與之邑六十以示子罕子罕曰凡諸侯小國晉楚所以兵威之畏而後上下慈和慈和而後能安靖其國家以事大國所以存也無威則驕驕則亂生亂生必滅所以亡也天生五材民竝用之廢一不可誰能去兵兵之設久矣所以威不軌而昭文德也聖人以興亂人以廢廢興存亡昏明之術皆兵之由也而子求去之不亦誣乎以誣道蔽諸侯罪莫大焉縱無大討而又求賞無厭之甚也削而投之左師辭邑向氏欲攻司城左師曰我將亡夫子存我德莫大焉又可攻乎君子曰彼己之子邦之司直樂喜之謂乎何以恤我我其收之向戌之謂乎蒙門杜注宋城門胡𫝊此一地也曷為再言宋書之重詞之復其中必有大美惡焉宋之盟合左師欲弭諸侯之兵以為名而楚屈建請晉楚之從交相見自是列國諸侯南向而朝楚及申之㑹大合十有一國之衆而用齊桓召陵之禮宋左師鄭子産皆獻禮焉宋世子佐以後至遂辭而不見伐吳滅賴無敢違者自宋之盟始也故㑹盟同地而再言宋者貶之也集說劉氏敞曰此乃一事再見者前目而後凡耳何謂殆諸侯乎且石惡名惡耳行未必惡也公羊之說非也稱諸侯者常文耳不稱諸侯者變文也又豹不氏乃一事再見卒名之例不以是為恭也穀梁之說亦非也蔡許失位左氏貶之今魯欲自同人之私失位甚矣且命出季氏而曰不可違何哉左氏違命不書族之說尤非也舊陳氏傅良曰自宋以來晉不專主盟矣虢之盟讀書加於牲上而已至鄟陵則齊主諸侯至皋鼬則魯及諸侯晉之不足以主夏盟自宋始宋之盟趙武之偷也鄭氏玉曰湨梁之㑹諸侯皆在而書大夫不書諸侯之大夫宋之㑹諸侯不在而書諸侯之大夫蓋諸侯在會大夫盟人猶知為諸侯之大夫也故不書諸侯以罪其臣諸侯不在會而大夫盟人安知為諸侯之大夫故書諸侯以存其君於李氏廉曰楚之爭伯常始於宋而楚之分伯亦成宋其爭伯也圍宋盟宋矣然僖二十七年宋之盟無嫌於宋與春秋猶恕宋也至宣十五年宋楚為平已開天下南北之變矣故以貶詞書未幾而成十二年華元克合晉楚之成於是晉楚分伯之幾啓於宋矣春秋諱而不書蓋有以也至是向戌以弭兵為名驅列國之諸侯而交見於楚廷宋其春秋之罪人歟春秋兩書宋為地主以首禍罪宋也汪氏克寬曰說者稱於宋弭兵蓋是時晉楚皆怠於出師是以偶有六七年之安靖然楚人衷甲苟非伯州犂之言則趙孟為宋襄之執矣況魯帥師而取鄆晉帥師而敗狄兵亦未嘗戢也楚圍既讀舊書未幾篡國大合諸侯伐吳滅賴安在其能弭兵也哉蓋季氏本曰豹不氏一事再見也地以宋宋亦與焉向戌也向戌以晉霸無為則宋受楚患故為弭兵之說晉楚之從交相見焉自是諸侯南向朝楚而楚亦自主會於申其勢益强矣之王氏樵曰鄢陵之敗鄭叛吳興楚少懦矣而悼公亡晉亦不在諸侯故二十五年趙武告穆叔有自今以往兵其少弭之語然則合和南北以苟數年之無事晉楚之同心也吳乘其後奔命不暇楚非昔日之楚矣使誠欲劫盟豈先使晉知之蓋形我而使我懼則可以獲所求耳是以欲晉楚之從交相見則許之爭長則讓之一一不較趙武叔向如嬰兒寄玩於人之股掌乃曰弭兵以召諸侯而稱兵以害我吾庸多矣非所患也諸侯歸晉之德只非歸其尸盟也虛為大語耳孔子相夾谷之㑹以為有文事必有武備聖人之制事待人蓋如此趙武信楚而以藩為軍使楚乘其無備雖左還入於宋不亦晚乎附録左傳齊崔杼生成及彊而寡娶東郭姜生明東郭姜以孤入曰棠無咎與東郭偃相崔氏崔成有疾而廢之而立明成請老於崔崔子許之偃與無咎弗子曰崔宗邑也必在宗主成與彊怒將殺之告慶封曰夫子之身亦子所知也唯無咎與偃是從父兄莫得進矣大恐害夫子敢以告慶封曰子姑退吾圖之告盧蒲嫳盧蒲嫳曰彼君之讎也天或者將棄彼矣彼實家亂子何病焉崔之薄慶之厚也他日又告慶封曰苟利夫子必去之難吾助女九月庚辰崔成崔彊殺東郭偃棠無咎於崔氏之朝崔子怒而出其衆皆逃求人使駕不得使圉人駕寺人御而出且曰崔氏有福止余猶可遂見慶封慶封曰崔慶一也是何敢然請為子討之使盧蒲嫳帥甲以攻崔氏崔氏堞其宫而守之弗克使國人助之遂滅崔氏殺成與彊而盡俘其家其妻縊嫳復命於崔子且御而歸之至則無歸矣乃縊崔明夜辟諸大墓辛巳崔明來奔慶封當國薳楚薳罷如晉涖盟晉侯享之將出賦既醉叔向曰氏之有後於楚國也宜哉承君命不忘敏子蕩將知政矣敏以事君必能養民政其焉往崔氏之亂申鮮虞來奔僕賃於野以喪莊公冬楚人召之遂如楚為右尹崔杜注濟南東朝陽縣西北有崔氏城今在濟南府章丘縣西北二十五里俗呼古城集說王氏錫爵曰春秋諸國惟楚英賢最多而為令尹執政者皆其公族少有僨事旋即誅死所以彊大纍世而威權略無下移固其君之彊明亦其傳國用人之制獨善也冬十有二月乙亥朔日有食之左傳十一月乙亥朔日有食之辰在申司歷過也再失閏矣集說杜氏預曰周十一月今九月斗當建戌而在申故知再失閏也文十一年三月甲子至今年七十一歲應有二十六閏今長厯推之得二十四閏通計少再閏孔氏穎逹曰此經言十二月而𫝊言十一月今杜以長厯推之乙亥是十一月朔非十二月也𫝊曰辰在申再失閏矣若是十二月當為辰在亥以申為亥則是三失閏非再失也推厯與𫝊合知𫝊是而經誤也丙靈王二辰十七年二十有八年晉平十三年齊景三年衛獻三十二年蔡景四十七年鄭簡二十一年曹武十年陳哀二十四年把文五年宋平三十一年秦景三十二年楚康十五年吳餘祭三年春無冰左傳二十八年春無冰梓愼曰今兹宋鄭其饑乎歲在星紀而淫於𤣥枵以有時菑隂不堪陽蛇乘龍龍宋鄭之星也宋鄭必饑𤣥枵虛中也枵耗名也土虛而民耗不饑何為集說孫氏復曰無冰時燠也季汪氏克寬曰是時襄公昏庸三家專政明年武子取卞而襄公幾不得入其紀綱縱弛可知矣月湛氏若水曰書春無冰志災異也周之春子丑寅也子丑之月氣方寒正鑿冰之時而乃無冰則為災異矣附録左傳夏齊侯陳侯蔡侯北燕伯把伯胡子沈子白狄朝於晉宋之盟故也齊侯將行慶封曰我不與盟何為於晉陳文子曰先事後賄禮也小事大未獲事焉從之如志禮也雖不與盟敢叛晉乎重丘之盟未可忘也子其勸行北燕杜注燕國今薊縣孔疏譜云北燕姬姓召公奭之後也案薊縣遼改薊北縣又改析津縣金改大興縣今京城東偏即其地也潁胡杜注歸姓之國汝隂縣西北有胡城今州是也夏衛石惡出奔晉左傳衛人討寧氏之黨故石惡出奔晉衛人立其從子圃以守石氏之祀禮也集說季氏本曰衛侯既殺寧喜羣臣必有後言石惡用事之臣宗彊黨附尤衛侯所疑以逼而奔耳邾子來朝左𫝊邾悼公來朝時事也集說高氏閌曰邾自晉執其君魯取其田益微弱矣至是悼公來朝秋八月大雩左傳秋八月大雩旱也集說高氏閌曰春無冰秋旱此皆人事所召而僭用大禮以祈之不亦悖乎附録左傳蔡侯歸自晉入於鄭鄭伯享之不敬子産曰蔡侯其不免乎曰其過此也君使子展迋勞於東門之外而傲吾曰猶將更之今還受享而惰乃其心也君小國事大國而惰傲以為己心將得死乎若不免必由其子其為君也淫而不父僑聞之如是者恆有子禍仲孫羯如晉左𫝊孟孝伯如晉告將為宋之盟故如楚也附録左傳蔡侯之如晉也鄭伯使游吉如楚及漢楚人還之曰宋之盟君實親辱今吾子來寡君謂吾子姑還吾將使馹奔問諸晉而以告子太叔曰宋之盟君命將利小國而亦使安定其社稷鎮撫其民人以禮承天之休此君之憲令而小國之望也寡君是故使吉奉其皮幣以歲之不易聘於下執事今執事有命曰女何與政令之有必使而君棄而封守跋涉山川蒙犯霜露以逞君心小國將君是望敢不唯命是聽無乃非盟載之言以闕君德而執事有不利焉小國是懼不然其何勞之敢憚子太叔歸復命告子展曰楚子將死矣不修其政德而貪昧於諸侯以逞其願欲久得乎周易有之在復之頤曰迷復凶其楚子之謂乎欲復其願而棄其本復歸無所是謂迷復能無凶乎君其往也送葬而歸以快楚心楚不幾十年未能恤諸侯也吾乃休吾民矣裨竈曰今兹周王及楚子皆將死歲棄其次而旅於明年之次以害鳥帑周楚惡之集說王氏錫爵曰太叔知楚子之死以理裨竈知楚子之死以數要之有是理即有是數也附録左傳九月鄭游吉如晉告將朝於楚以從宋之盟子産相鄭伯以如楚舍不為壇外僕言曰昔先大夫相先君適四國未嘗不為壇自是至今亦皆循之今子草舍無乃不可乎子産曰大適小則為壇小適大苟舍而已焉用壇僑聞之大適小有五美宥其罪戾赦其過失救其菑患賞其德刑教其不及小國不困懷服如歸是故作壇以昭其功宣告後人無怠於德小適大有五惡說其罪戾請其不足行其政事共其職貢從其時命不然則重其幣帛以賀其福而弔其凶皆小國之禍也焉用作壇以昭其禍所以告子孫無昭禍焉可也冬齊慶封來奔左傳齊慶封好田而耆酒與慶舍政則以其內實遷於盧蒲嫳氏易內而飲酒數日國遷朝焉使諸亡人得賊者以告而反之故反盧蒲癸癸臣子之有寵妻之慶舍之士謂盧蒲癸曰男女辨姓子不辟宗何也曰宗不余辟余獨焉辟之賦詩斷章余取所求焉惡識宗癸言王何而反之二人皆嬖使執寢戈而先後之公膳日雙雞饔人竊更之以鶩御者知之則去其肉而以其洎饋子雅子尾怒慶封告盧蒲嫳盧蒲嫳曰譬之如禽獸吾寢處之矣使析歸父告晏平仲平仲曰嬰之衆不足用也知無能謀也言弗敢出有盟可也子家曰子之言云又焉用盟告北郭子車子車曰人各有以事君非佐之所能也陳文子謂桓子曰禍將作矣吾其何得對曰得慶氏之木百車於莊文子曰可慎守也已盧蒲癸王何卜攻慶氏示子之兆曰或卜攻讎敢獻其兆子之曰克見血冬十月慶封田於萊陳無宇從丙辰文子使召之請曰無宇之母疾病請歸慶季卜之示之兆曰死奉龜而泣乃使歸慶嗣聞之曰禍將作矣謂子家速歸禍作必於嘗歸猶可及也子家弗聽亦無悛志子息曰亡矣幸而獲在吳越陳無宇濟水而戕舟發梁盧蒲姜謂癸曰有事而不告我必不捷矣癸告之姜曰夫子愎莫之止將不出我請止之癸曰諾十一月乙亥嘗於太公之廟慶舍涖事盧蒲姜告之且止之弗聽曰誰敢者遂如公麻嬰為尸慶奊為上獻盧蒲癸王何執寢戈慶氏以其甲環公宮陳氏鮑氏之圉人為優慶氏之馬善驚士皆釋甲束馬而飲酒且觀優至於魚里欒髙陳鮑之徒介慶氏之甲子尾抽桷擊扉三盧蒲癸自後刺子之王何以戈擊之解其左肩猶援廟桷動於甍以俎壺投殺人而後死遂殺慶繩麻嬰公懼鮑國曰羣臣為君故也陳須無以公歸稅服而如內宫慶封歸遇告亂者丁亥伐西門弗克還伐北門克之入伐內宮弗克反陳於嶽請戰弗許遂來奔獻車於季武子美澤可以鑑展莊叔見之曰車甚澤人必瘁宜其亡也叔孫穆子食慶封慶封泛祭穆子不說使工為之誦茅鴟亦不知既而齊人來讓奔吳吳句餘豫之朱方聚其族焉而居之富於其舊子服惠伯謂叔孫曰天殆富淫人慶封又富矣穆子曰善人富謂之賞淫人富謂之殃天其殃之也其將聚而殲旃魚里杜注里名當在今青州府臨淄境徒嶽杜注里名朱方杜注吳邑顔師古曰漢丹縣吳朱方也唐為潤州治宋改軍名鎮江徽宗升軍為府明為鎮江府自唐迄明皆以丹徒為附郭今仍之集說家氏鉉翁曰盧蒲癸王何莊公之幸臣也殺慶舍逐慶封而戮崔杼莊之弒也幸臣與之俱死者十人今為之討賊亦幸臣也身為國君以幸臣為羽翼莊固可鄙矣而卿大夫無能為君討賊復讎者而幸臣乃能之亦卿大夫之恥也亂王氏貫道曰崔杼弒君慶封與之為比乃乘其家而滅之以當國欲不亡得乎魯敢受亂是召亂也謀王氏錫爵曰癸何嬖人爾區區懷其君煦育之恩除慶氏而同朝之賢卿大夫顧不聞有斂手以衝亂臣之胸者如申鮮虞所譏君昏不能匡危不能救死不能死獨閭丘嬰乎哉君子曰千乘之齊有二嬖人而已亦足悲夫附録左傳癸巳天王崩未來赴亦未書禮也在崔氏之亂喪羣公子故鉏在魯叔孫還燕賈在句瀆之丘及慶氏亡皆召之具其器用而反其邑焉與晏子邶殿其鄙六十弗受子尾曰富人之所欲也何獨弗欲對曰慶氏之邑足欲故亡吾邑不足欲也益之以邶殿乃足欲足欲亡無日矣在外不得宰吾一邑不受邶殿非惡富也恐失富也且夫富如布帛之有幅焉為之制度使無遷也夫民生厚而用利於是乎正德以幅之使無黜嫚謂之幅利利過則為敗吾不敢貪多所謂幅也與北郭佐邑六十受之與子雅邑辭多受少與子尾邑受而稍致之公以為忠故有寵釋盧蒲嫳於北竟求崔杼之尸將戮之不得叔孫穆子曰必得之武王有亂臣十人崔杼其有乎不十人不足以葬既崔氏之臣曰與我其拱璧吾獻其柩於是得之十二月乙亥朔齊人遷莊公殯於大寢以其棺尸崔杼於市國人猶知之皆曰崔子也邶殿杜注齊别都十有一月公如楚諸夏之君始旅見於楚左傳為宋之盟故公及宋公陳侯鄭伯許男如楚公過鄭鄭伯不在伯有迋勞於黃崖不敬穆叔曰伯有無戾於鄭鄭必有大咎敬民之主也而棄之何以承守鄭人不討必受其辜濟澤之阿行潦之蘋藻置諸宗室季蘭尸之敬也敬可棄乎黃崖杜注滎陽宛陵縣西有黃水水經注黃水出秦山南黃泉流徑華城西又東南與上水合即春秋所謂黃崖也今黃水在新鄭縣東二十里集說陳氏傅良曰列國之君旅見於楚始於此舉魯以見其餘也汪氏克寬曰僖十八年鄭文公始朝於楚二十二年鄭伯又如楚二十四年宋成公亦如楚自是而後鄭伯屢朝於楚而陳許諸君朝楚傳亦間見蓋至於今年而列國之諸侯旅朝於楚以事天子之禮事之矣逮昭九年而諸侯之大夫亦旅見於楚矣迄哀之四年而晉亦京師楚矣世變至是聖人蓋傷之甚矣十有二月甲寅天王崩左傳王人來告喪問崩日以甲寅告故書之以徴過也集說汪氏克寬曰不書葬諸侯不㑹也乙未楚子昭卒左傳及漢楚康王卒公欲反叔仲昭伯曰我楚國之為豈為一人行也子服惠伯曰君子有遠慮小人從邇饑寒之不恤誰遑其後不如姑歸也叔孫穆子曰叔仲子專之矣子服子始學者也榮成伯曰遠圖者忠也公遂行宋向戌曰我一人之為非為楚也饑寒之不恤誰能恤楚姑歸而息民待其立君而為之備宋公遂反胡傳甲寅天王崩乙未楚子昭卒相距四十二日則閏月之驗也然不以閏書見喪服之不數閏也齊景公葬書閏月明殺恩之非禮也集說吕氏本中曰此明閏月之驗然不書閏者承前月而受其餘日故書閏月之日繫前月之下史䇿常體又有定例故不必每月發傳此范寧之說也杜預以十二月無乙未日誤孔穎逹以為甲寅乙未不得同月是皆不知閏月之日繫前月之下耳附録左傳楚屈建卒趙文子喪之如同盟禮也丁景王巳元年二十有九年晉平十四年齊景四年衛獻三十三年蔡景四十八年鄭簡二十二年曹武十一年陳哀二十五年把文六年宋平三十二年秦景三十三年楚郟敖麇元年吳餘祭四年春王正月公在楚左傳二十九年春王正月公在楚釋不朝正於廟也楚人使公親襚公患之穆叔曰祓殯而禭則布幣也乃使巫以桃茢先祓殯楚人弗禁既而悔之公羊何言乎公在楚正月以存君也穀梁閔公也胡傳案左氏楚人使公親襚夏四月送楚子葬至於西門之外還及方城季武子取卞以自封使公冶告曰聞守卞者將叛臣帥師徒以討既得之矣公曰欲而言叛祇見疏也吾不可以入矣將適諸侯有賦式微者乃歸故特於歲首朝正之時而書曰公在楚使後世臣子戴天履地視君父之危且困者必有天威不違顔咫尺食坐見於羹牆之意而不以頃刻忘也此義一行豈敢有顧其身與妻子與其家而不恤國朋附權臣以圖富貴而背其君者乎集說董氏仲舒曰公在楚臣子思君無一日無君之意范氏寧曰閔公為楚所制故存録孔氏穎逹曰釋例曰襄二十九年春正月公在楚凡公之行始則書所如還則書公至今中復書公在楚者明國之守臣每月亦以公不朝之故告於廟也每月必告而特於正月釋之者蓋歲之正也月之正也日之正也三始之正嘉禮所重人理所以自新故特顯以通他月也陳氏嶽曰如晉而不朝正者常也故不書如楚不朝正者非常也故書但高氏閌曰公在齊晉多矣闕朝正之禮亦不少矣書公如齊如晉而義自見也今書公在楚則聖人之旨深矣二十八年十一月公如楚十二月甲寅天王崩乙未楚子昭卒公不篤君臣之義以奔天王之喪而以俟楚子之葬久留於楚逮夏乃歸故聖人特於朝正之時書公所在與昭公失國在乾侯同且以責季氏之無君也君金氏賢曰公羊子曰何以言乎公在楚正月以存也穀梁子曰閔公也胡文定公曰特書所在以存君也愚謂存君也閔公也亦罪公也公何以在楚朝楚也公在位三十年未聞有在京師者故曰亦罪公也附録左傳二月癸卯齊人葬莊公於北郭送夏四月葬楚康王公及陳侯鄭伯許男葬至於西門之外諸侯之大夫皆至於墓楚郟敖即位王子圍為令尹鄭行人子羽曰是謂不宜必代之昌松柏之下其草不殖夏五月公至自楚左傳公還及方城季武子取卞使公冶問璽書追而與之曰聞守卞者將叛臣帥徒以討之既得之矣敢告公冶致使而退及舍而後聞取卞公曰欲之而言叛祇見疏也公謂公冶曰吾可以入乎對曰君實有國誰敢違君公與公冶冕服固辭彊之而後受公欲無入榮成伯賦式微乃歸五月公至自楚公冶致其邑於季氏而終不入焉曰欺其君何必使余季孫見之則言季氏如他日不見則終不言季氏及疾聚其臣曰我死必無以冕服斂非德賞也且無使季氏葬我集說孫氏復曰公留於楚者七月喜劉氏敞曰穀梁曰喜之也致君者殆其往而其反非也公如晉如齊而致者多矣又何喜乎且春秋公出不必盡致也是為臣子或喜或不喜者邪邵氏寶曰季氏之勢盛矣襄公之不敢歸畏武子也況昭公之於平子乎公冶有子家之節而才識弗逮庚午衛侯衎卒附録左傳葬靈王鄭上卿有事子展使印段往伯有曰弱不可子展曰與其莫往弱不猶愈乎詩云王事靡盬不遑啓處東西南北誰敢寧處堅事晉楚以蕃王室也王事無曠何常之有遂使印段如周閽弒吳子餘祭閽音昏祭側界反左傳吳人伐越獲俘焉以為閽使守舟吳子餘祭觀舟閽以刀弒之公羊閽者何門人也刑人也刑人則曷為謂之閽刑人非其人也君子不近刑人近刑人則輕死之道也穀梁閽門者也寺人也不稱名姓閽不得齊於人不稱其君閽不得君其君也禮君不使無恥不近刑人不狎敵不邇怨賤人非所貴也貴人非所刑也刑人非所近也舉至賤而加之吳子吳子近刑人也閽弒吳子餘祭仇之也胡傳左氏以為伐越獲俘焉以為閽使守舟吳子觀舟閽以刀弒之亦邇怨之失也集說程氏迥曰謂之弒蓋其君也不曰其君賤閽也盜殺蔡侯申書殺閽書弒何也以閽食庶人在官者之祿也諸家氏鉉翁曰春秋所以書言祻生於所忽也吳之君往往輕以蹈禍遏卒於巢餘祭死於閽僚死於專諸春秋之書良以垂戒示後焉耳附録左𫝊鄭子展卒子皮即位於是鄭饑而未及麥民病子皮以子展之命餼國人粟戶一鍾是以得鄭國之民故罕氏常掌國政以為上卿宋司城子罕聞之曰鄰於善民之望也宋亦饑請於平公出公粟以貸使大夫皆貸司城氏貸而不書為大夫之無者貸宋無饑人叔向聞之曰鄭之罕宋之樂其後亡者也二者其皆得國乎民之歸也施而不德樂氏加焉其以宋升降乎仲孫羯㑹晉荀盈齊高止宋華定衛世叔儀鄭公孫段曹人莒人滕人薛人小邾人城把儀公作齊莒人下公穀有邾人左傳晉平公把出也故治把六月知悼子合諸侯之大夫以城把孟孝伯會之鄭子太叔與伯石往子太叔見太叔文子與之語文子曰甚乎其城把也子太叔曰若之何哉晉國不恤周宗之闕而夏肄是屏其棄諸姬亦可知也已諸姬是棄其誰歸之吉也聞之棄同即異是謂離德詩曰協比其鄰昏姻孔云晉不鄰矣其誰云之侯齊髙子容與宋司徒見知伯女齊相禮賔出司馬言於知伯曰二子皆將不免子容専司徒侈皆亡家之主也知伯曰何如對曰専則速及侈將以其力斃専則人實斃之將及矣胡傳晉平公把出也故合諸侯之大夫以城把古之建國立家者必親九族然有父族而後及母族有母族而後及妻族此葛藟之詩所為次也晉主夏盟令行列國平公不能修文襄悼公之業尊奬王室恤宗周之闕而夏肄是屏輕棄諸姬可謂知本乎平王唯不撫其民而遠屯戍於母家周人怨思焉揚之水所以降為國風不得列於雅也城把之役亦不待貶絶而可見矣集說許氏翰曰齊桓城衛而諸侯歸心者桓公之志公天下也晉平城把而人疾其役其志私也動又不時能無携乎悼陳氏傅良曰合十一國諸侯之大夫而書城把為夫人也合十二國諸侯之大夫于澶淵而書宋災故為共姬也衛寧喜弒其君孫林父以邑叛蔡世子般弒其父吳楚之大夫交聘於列國天下亦多故矣晉為盟主而區區於宋把是晉之已細也晉之已細而後有執齊慶封放陳招殺蔡侯般假討賊之義以盟諸侯如楚靈王者矣之李氏廉曰僖公為成風伐邾而春秋不豫以救患義平公為悼夫人城把而春秋不豫以保小之仁則於公私之際審矣汪氏克寬曰齊桓恤把而城緣陵雖僭天子封國之權而得方伯救患之義事雖專而心則公也故春秋書曰諸侯城緣陵略諸侯而不序且不曰城把而曰城緣陵所以隱其專也晉平治把而城之以大夫合天下之衆而修其私親之城郭初非救災恤患之舉心既私而事亦悖矣故春秋列序十有一國之大夫而曰城把所以著其失也案晉平以母家之私煩諸侯以城把伯業所由隳也晉女叔及鄭衛之大夫皆譏之故經書城把以示貶穀梁以為變之正者非也晉侯使士鞅來聘左傳范獻子來聘拜城把也公享之展莊叔執幣射者三耦公臣不足取於家臣家臣展瑕展玉父為一耦公臣公巫召伯仲顔莊叔為一耦鄫鼓父黨叔為一耦集說高氏閌曰謝城把且使我歸把田也令李氏廉曰觀拜城把之使即私情之不足以諸侯可知矣把子來盟左傳晉侯使司馬女叔侯來治把田弗盡歸也晉悼夫人慍曰齊也取貨先君若有知也不尚取之公告叔侯叔侯曰虞虢焦滑霍揚韓魏皆姬姓也晉是以大若非侵小將何所取武獻以下兼國多矣誰得治之把夏餘也而即東夷魯周公之後也而睦於晉以杞封魯猶可而何有焉魯之於晉也職貢不乏玩好時至公卿大夫相繼於朝史不絶書府無虛月如是可矣何必瘠魯以肥把且先君而有知也毋寧夫人而焉用老臣把文公來盟書曰子賤之也揚杜注屬平陽郡集說高氏閌曰晉使魯歸前所侵把田故書把子來盟於士鞅來聘之下家氏鉉翁曰把入春秋爵屢升降姑闕疑治李氏廉曰此非前定之盟亦非因朝而盟蓋晉之把田非出於公義魯之歸把田未必出於誠心故把子親來以要結之耳年汪氏克寬曰把自莊二十七年稱伯至僖二十三二十七年兩稱子自後竝稱伯惟此年來盟稱子厥後終春秋稱伯吳子使札來聘吳始聘竝吳始君臣見左傳吳公子札來聘見叔孫穆子說之謂穆子曰子其不得死乎好善而不能擇人吾聞君子務在擇人吾子為魯宗卿而任其大政不愼舉何以堪之禍必及子請觀於周樂使工為之歌周南召南曰美哉始基之矣猶未也然勤而不怨矣為之歌邶鄘衛曰美哉淵乎憂而不困者也吾聞衛康叔武公之德如是是其衛風乎為之歌王曰美哉思而不懼其周之東乎為之歌鄭曰美哉其細已甚民弗堪也是其先亡乎為之歌齊曰美哉泱泱乎大風也哉表東海者其大公乎國未可量也為之歌豳曰美哉蕩乎樂而不淫其周公之東乎為之歌秦曰此之謂夏聲夫能夏則大大之至也其周之舊乎為之歌魏曰美哉渢渢乎大而婉險而易行以德輔此則明主也為之歌唐曰思深哉其有陶唐氏之遺民乎不然何憂之遠也非令德之後誰能若是為之歌陳曰國無主其能久乎自鄶以下無譏焉為之歌小雅曰美哉思而不二怨而不言其周德之衰乎猶有先王之遺民焉為之歌大雅曰廣哉熙熙乎曲而有直體其文王之德乎為之歌頌曰至矣哉直而不倨曲而不屈邇而不逼遠而不攜遷而不淫復而不厭哀而不愁樂而不荒用而不匱廣而不宣施而不費取而不貪處而不底行而不流五聲和八風平節有度守有序盛德之所同也見舞象簫南籥者曰美哉猶有憾見舞大武者曰美哉周之盛也其若此乎見無韶濩者曰聖人之𢎞也而猶有慙德聖人之難也見舞大夏者曰美哉勤而不德非禹其誰能修之見舞韶簫者曰德至矣哉大矣如天之無不幬也如地之無不載也雖甚盛德其蔑以加於此矣觀止矣若有他樂吾不敢請已其出聘也通嗣君也故遂聘於齊說晏平仲謂之曰子速納邑與政無邑無政乃免於難齊國之政將有所歸未獲所歸難未歇也故晏子因陳桓子以納政與邑是以免於欒高之難聘於鄭見子産如舊相識與之縞帶子産獻紵衣焉謂子産曰鄭之執政侈難將至矣政必及子子為政愼之以禮不然鄭國將敗適衛說蘧瑗史狗史鰌公子荆公孫發公子朝曰衛多君子未有患也自衛如晉將宿於戚聞鐘聲焉曰異哉吾聞之也辨而不德必加於戮夫子獲罪於君以在此懼猶不足而又何樂夫子之在此也猶燕之巢於幕上君又在殯而可以樂乎遂去之文子聞之終身不聽琴瑟適晉說趙文子韓宣子魏獻子曰晉國其萃於三族乎說叔向將行謂叔向曰吾子勉之君侈而多良大夫皆富政將在家吾子好直必思自免於難邶孔氏穎達曰自紂城而北謂之邶今邶城在衛輝府東北鄘孔氏穎逹曰自紂城而南謂之鄘今鄘城在新鄉縣西云豳杜注周之舊國在新平漆縣東北鄭氏詩譜豳屬扶風恂邑案漆縣今邠州恂邑今三水邠州東北有豳亭豳谷三水有豳城皆是也鄶杜注在滎陽密縣東北今密縣東北五十里有鄶城集說杜氏預曰吳子餘祭既遣札聘上國而後死札以六月到魯未聞喪也不稱公子其禮未同於上國其孔氏穎逹曰上云閽弒吳子此言吳子使聘𫝊曰出聘也通嗣君也不知通嗣君通誰嗣也賈逵服虔皆以為夷末新即位使來通聘案隱三年武氏子來求賻文九年毛伯來求金竝不言王使傳皆云王未葬也是知先君未葬嗣君不得命臣此與閽弒吳子文不隔月吳魯相去經塗至遠豈以君死之月即命臣乎而得書吳子使也且傳稱季札至魯遍觀周樂至戚聞鐘聲譏孫文子云君又在殯而可以樂乎自請觀樂譏人聽樂曠世大賢豈當若是故杜以為通嗣君通餘祭嗣也二十五年遏為巢牛臣所殺餘祭嗣立至此始使札通上國吳子未死之前命札出使既遣札聘而後身死札以六月到魯未及聞喪故每事皆行吉禮也經傳皆無札至之月知以六月到者以城把在五月之下城把既訖乃有士鞅來聘把子來盟若共在月中則不容此事下文有秋知札以六月至也札去之後吳使告喪告以五月被弒故追書在聘上耳札實公子不書公子者其禮未同於上國故史不書氏以札是卿故書其名耳孫氏復曰吳成六年伐郯始見於經稱吳襄五年㑹于戚稱人今使札來聘稱子者與其慕義來聘進之也先書閽弒吳子餘祭而後言吳子使札來聘者吳子使札來聘未至於魯而吳子遇弒故先書閽弒吳子餘祭也吳子既弒而札至於魯故後書吳子使札來聘黃氏仲炎曰胡氏謂季札遜國事聖人不取故於春秋書吳子使札來聘無異於楚椒蓋以不稱氏族為貶也不知春秋之紀事皆為戒而已矣不以稱氏族為褒亦不以不稱氏族為貶也遜國之事自是季札之善聘魯之役自是吳子之謀二者不相關也聖人豈得因其聘魯而致不足於其遜國也哉辭季氏本曰胡傳謂因其辭國生亂而貶之夫札之國在聘魯二十九年之後而貶之於二十九年之前無乃加非其罪歟王氏樵曰今案有太王之父季歷之弟文王之子則泰伯當讓季歷當受此所謂聖逹節也若季札則亦當守節耳壽夢之欲立季札與諸樊之舍子而立弟約以次𫝊必及季子蓋聞其先太王泰伯之事慕而欲效之者而不知其時義之非宜而徒啓後日之爭也假令夷昧也死季子不度而即之吳國其靖乎彼僚與光何人哉僚固不憚於襲光固不憚於弒徒以季子之素所不屑者足以取信於二子故二子佯讓之以為名而內不失其有國之實豈誠心死於先君之命而季子立則無辭者邪立長正也立少非正也壽夢過中而反謂季子之過中乎立子正也傳弟非正也諸君之輕死為勇飲食必祝為過中而反謂季子之過中乎且春秋褒貶各當其事札辭國乃後日事而逆於來聘貶之乎來姚氏舜牧曰此條本與楚子使椒來聘秦伯使術聘同讀春秋者先看當日所使聘者何事其所以使聘者何心然後看所使聘者何人如此條所書要見當時晉楚交主夏盟晉楚之從者交相見也而一不及吳且二十四年楚子伐吳二十五年吳子伐楚為楚所戕以是吳子使札來聘致其殷勤此雖為國結援然能以禮來亦有可取故春秋進而稱子若楚之子秦之伯焉其稱札也亦若楚之椒秦之術焉此蓋以使事論而非以人品論也正意在吳子使聘上撇去正意獨於札之一字謂來聘書名乃夫子特致其貶恐非夫子書法之旨余氏光曰自左氏有諸樊將立季札之說而公羊遂附益之以為兄弟皆愛之同欲立以為君季子不受及考諸樊餘祭皆輕死為勇者也一則取死於伐一則見弒於閽而國威不振者終二君之世要其行事似非知禮義者所為未必肯讓札也況又不能正終必非先有遺命其次𫝊及弟蓋繇國家多難羣臣議立長君耳及夷昧初季札始用通好上國言詞有文故季札以知禮稱而溢美歸之矣夫夷昧之死札辭為君亦或有之但久居臣位事僚終身則未見其有彊立固避之狀至僚弒國亂是時人心欲推立札如𫝊載光使專諸刺僚而致國乎季子季子不受延陵之逃實在於此是札之辭國以此而得名矣若札者即其潔身獨善亦一清修之士也胡傳乃謂因其辭國生亂而貶之無乃加非其罪而輕於絶人與案吳能以禮來聘春秋書子以進之札以名書當以杜注孔疏為正非褒貶之所係也公羊以札能讓國而賢之穀梁以吳能使賢而善之皆非經旨胡傳謂札以讓國階禍聖人書名以示貶而不得比於季友叔肸之例則鑿之甚矣又謂聖人於札望之深責之備夫二百四十二年之間列國之卿大夫不乏賢者何獨於札而望之責之乎姚氏舜牧黃氏仲炎季氏本辨之詳矣余氏光又以光弒僚而致國乎季子季子不受此為讓國之實而公羊為附益之說亦頗有理今故刪公穀及胡𫝊而凡以書名為貶者皆無取焉秋九月葬衛獻公齊高止出奔北燕北燕始見經左傳秋九月齊公孫蠆公孫竈放其大夫高止於北燕乙未出書曰出奔罪高止也高止好以事自為功且專故難及之穀梁其曰北燕從史文也集說范氏寧曰南燕姞姓在鄭衛之間北燕姬姓在晉之北楊氏士勛曰𫝊言從史文者以時有直言燕者故仲尼從史文也可許氏翰曰君放大夫可也臣放大夫是無君也不以訓故以出奔書也冬仲孫羯如晉左傳冬孟孝伯如晉報范叔也附録左𫝊為高氏之難故高豎以盧叛十月庚寅閭丘嬰帥師圍盧高豎曰苟使髙氏有後請致邑齊人立敬仲之曽孫酀良敬仲也十一月乙卯高堅致盧而出奔晉晉人城綿而置旃鄭伯有使公孫黑如楚辭曰楚鄭方惡而使余往是殺余也伯有曰世行也子晳曰可則往難則已何世之有伯有將彊使之子晳怒將伐伯有氏大夫和之十二月己巳鄭大夫盟於伯有氏禆諶曰是盟也其與幾何詩曰君子屢盟亂是用長今是長亂之道也禍未歇也必三年而後能紓然明曰政將焉往禆諶曰善之代不善天命也其焉辟子産舉不踰等則位班也擇善而舉則世隆也天又除之奪伯有魄子西即世將焉辟之天禍鄭久矣其必使子産息之乃猶可以戾不然將亡矣戊景王午二年三十年晉平十五年齊景五年衛襄公惡元年蔡景四十九年鄭簡二十三年曹武十二年陳哀二十六年把文七年宋平三十三年秦景三十四年楚郟敖二年吳夷末元年春王正月楚子使薳罷來聘薳于委反罷音皮公作頗後同左傳三十年春王正月楚子使薳罷來聘通嗣君也穆叔問王子之為政何如對曰吾儕小人食而聽事猶懼不給命而不免於戾焉與知政固問焉不告穆叔告大夫曰楚令尹將有大事子蕩將與焉助之匿其情矣集說劉氏敞曰說者曰聘例時此月何也欲書王以正蔡般之罪推此言也而觀之其妄可勝記乎來高氏閌曰公踰年在楚楚郟敖新即位故使薳罷聘以報之自文公九年至此歷七十餘年未嘗交聘今薳罷之來蓋為恭也自是吳楚皆不復來聘矣張氏洽曰魯以君行而楚以大夫聘此齊桓晉文所以行乎列國者故自宋之盟楚人行霸主之禮非晉平趙武之責而何哉附録左傳子産相鄭伯以如晉叔向問鄭國之政焉對曰吾得見與否在此歲也駟良方爭未知所成若有所成吾得見乃可知也叔向曰不既和矣乎對曰伯有侈而愎子晳好在人上莫能相下也雖其和也猶相積惡也惡至無日矣年二月癸未晉悼夫人食輿人之城把者絳縣人或長矣無子而往與於食有與疑年使之年曰臣小人也不知紀年臣生之歲正月甲子朔四百有四十五甲子矣其季於今三之一也吏走問諸朝師曠曰魯叔仲惠伯會郤成子於承匡之歲也是歲也狄伐魯叔孫莊叔於是乎敗狄於鹹獲長狄僑如及虺也豹也而皆以名其子七十三年矣史趙曰亥有二首六身下二如身是其日數也士文伯曰然則二萬六千六百有六旬也趙孟問其縣大夫則其屬也召之而謝過焉曰武不才任君之大事以晉國之多虞不能由吾子使吾子辱在泥塗久矣武之罪也敢謝不才遂仕之使助為政辭以老與之田使為君復陶以為絳縣師而廢其輿尉於是魯使者在晉歸以語諸大夫季武子曰晉未可偷也有趙孟以為大夫有伯瑕以為佐有史趙師曠而咨度焉有叔向女齊以師保其君其朝多君子其庸可偷乎勉事之而後可難夏四月己亥鄭伯及其大夫盟君子是以知鄭之不已也夏四月蔡世子般弒其君固般音班左傳蔡景侯為大子般娶於楚通焉大子弒景侯集說孫氏復曰稱世子以弒甚般之惡也不言其父而言其君者君之於世子有君之尊也有父之親也以般之於尊親盡矣不日者脫之日劉氏敞曰穀梁曰其不日子奪父政非也向若書者可遂云非奪父政乎五月甲午宋災宋伯姬卒公穀伯姬上無宋字左傳或呌於宋大廟曰嘻嘻出出鳥鳴於亳社如曰嘻嘻甲午宋大災宋伯姬卒待姆也穀梁取卒之日加之災上者見以災卒也其見以災卒奈何伯姬之舍失火左右曰夫人少辟火乎伯姬曰婦人之義傅母不在宵不下堂左右又曰夫人少辟火乎伯姬曰婦人之義保母不在宵不下堂遂逮乎火而死婦人以貞為行者也伯姬之婦道盡矣詳其事賢伯姬也胡傳或以為共姬女而不婦非也世衰道微暴行交作女德不貞婦道不明能全其節守死不回見於春秋者宋伯姬耳聖人冠以夫諡書於春秋曰葬宋共姬以著其賢行勵天下之婦道也集說胡氏瑗曰伯姬乃婦人中之伯夷也女劉氏敞曰左氏曰君子謂宋共姬女而不婦待人婦義事也非也如共姬之守禮死義不求生以害仁亦可免矣反謂之不婦乎昜曰恆其德貞婦人吉共姬恆之矣所謂婦也姬許氏翰曰王化始於正家春秋撥亂謹禮以宋共為婦道之表故詳録焉趙氏鵬飛曰伯姬不幸遇災保母不在不下堂而死於火嗚呼難哉君子行不貴苟難而婦人非難無以見其節此伯姬之節所以特書於春秋也春秋之書內女者四鄫把二姬以惡紀宋二姬以賢然語其難則紀姬未若宋姬之難也故紀姬之葬以字而宋姬之葬以諡此則聖人輕重之權也家氏鉉翁曰伯姬以成九年歸宋至是亦老矣恪守婦節以死足以風勵千古春秋是以表而出之吳氏􅊹曰蓋亦罪宋之子與臣不能救其君母使之逮乎火而死也火齊氏履謙曰宋平以千乘之君而不能救其母於共姬之婦道雖盡而宋平之於子職則虧故書公孫壽季孫行父二上卿納幣致女不謂不貴晉齊衛三國之人來媵不謂不尊葬則冠以夫諡不謂不正皆所以重録伯姬之變深著宋平之罪汪氏克寬曰伯姬以成九年歸於宋共公成十五年共公卒婺矛牙居三十有四年其年蓋六十矣火延其宮必待傅姆而後避固守婦節以及於死或者云傅姆宵出必有常處伯姬守常而不知變必逮於火以是為賢則嫂溺援之以手者非耶竊謂援溺之權乃丈夫變禮以救他人之死婦人越禮以貪生而免己之死則非義矣伯姬年邁六十雖曰避火全生未害其貞然君子之道過乎厚小人之道過乎薄春秋賢伯姬所以著其秉節不渝庶幾風勵千古使夫不當避而避以失節於造次顚沛之際者知所警也豈曰小補之哉王氏樵曰案列女𫝊宋伯姬者魯宣公之女成公之妹也既嫁於共公七年共公卒伯姬寡三十四年至景公時伯姬之宮夜失火左右曰夫人少避火伯姬曰婦人之義保傅不俱夜不下堂待傅來也保母至矣傅母未至也左右又曰夫人少避火伯姬曰婦人之義傅母不至夜不可下堂越義求生不如守義而死遂逮於火而死此視三傳尤備夫保傅不俱宵不下堂此伯姬所守之禮也豈無所見而徒守哉越義求生不如守義而死此伯姬素定於心之見也天理人欲之間在乎此而已矣死生命也禮義之間所欲有甚於生所惡有甚於死一下堂而此足之失不可悔也故寧守義而死也天王殺其弟佞夫公作年夫左傳初王儋季卒其子括將見王而歎單公子愆期為靈王御士過諸廷聞其歎而言曰烏乎必有此夫入以告王且曰必殺之不戚而願大視躁而足髙心在他矣不殺必害王曰童子何知及靈王崩儋括欲立王子佞夫佞夫弗知戊子儋括圍蒍逐成愆成愆奔平畤五月癸巳尹言多劉毅單蔑甘過鞏成殺佞夫括瑕廖奔晉書曰天王殺其弟佞夫罪在王也平畤杜注周邑穀梁傳曰諸侯且不首惡況於天子乎君無忍親之義天子諸侯所親者惟長子母弟耳天王殺其弟佞夫甚之也集說杜氏預曰稱弟以惡王殘骨肉傳言罪在王知稱弟以惡王也孔氏穎逹曰劉氏敞曰殺世子母弟直稱君者甚之也此其為甚之奈何儋括將作亂立佞夫佞夫弗知王誅儋括也并殺佞夫非親親之道也曰吕氏本中曰言殺其弟無親親之恩也張氏洽王者之道親親而及天下則治有序别嫌疑以明賞罰則政有經周景王初立儋括謀亂而免佞夫不知而死所厚者薄本心亡矣所以終欲黜嫡立庶而致子朝之亂也以趙氏鵬飛曰景王以萬乘之尊而不能容一弟何示天下宜其不能興周也生殺之柄自天王專之故入春秋未嘗書天王殺卿大夫者今內不親九族而手足不相容滅天倫矣故於此一書天王殺焉弟吳氏澄曰象欲殺舜而舜封之為諸侯仁人之於蓋如此儋括為亂佞夫實不知謀而尹劉諸人乃殺佞夫書王殺者罪王不能免其弟也王子瑕奔晉集說范氏寧曰不言出周無外弗蘇氏轍曰佞夫無罪五臣以王故殺之而王察猶王殺之也故書曰天王殺其弟佞夫王子瑕奔晉括廖不書賤也汪氏克寬曰瑕朝皆為逆亂無所容身避罪逃竄非居祿位而出奔如國滅之君與在外之臣故不言出而止言奔湛氏若水曰書王子瑕奔晉交譏之也罪瑕之逃王而王不能存之也蓋佞夫見殺瑕懼及禍而奔晉瑕自比於逆亂之黨固有罪矣景王使佞夫見殺瑕又出奔王獨無罪乎春秋書之譏及王也附録左傳六月鄭子産如陳涖盟歸復命告大夫曰陳亡國也不可與也聚禾粟繕城郭恃此二者而不撫其民其君弱植公子侈大子卑大夫敖政多門以介於大國能無亡乎不過十年矣秋七月叔弓如宋葬宋共姬共姬上榖無宋字左傳秋七月叔弓如宋葬共姬也公羊外夫人不書葬此何以書隱之也何隱爾宋災伯姬卒焉其稱諡何賢也何賢爾宋災伯姬存焉有司復曰火至矣請出伯姬曰不可吾聞之也婦人夜出不見傅母不下堂傅至矣母未至也逮乎火而死穀梁外夫人不書葬此其言葬何也吾女也卒災故隱而葬之也集說杜氏預曰共姬從夫諡也卿共葬事禮過厚三月而葬速陸氏淳曰為災而死高其志行使卿往㑹所以書之年孫氏復曰共諡也內女不葬葬者皆非常也莊四齊侯葬紀伯姬三十年葬紀叔姬此年叔弓如宋葬共姬是也害劉氏敞曰葬宋共姬使共姬避火而全生未足以其貞也然而不以己之可以全其生之故而違天下之常義此安乎性命者乃能之故審乎死生之度辨乎榮辱之境知禮之重重於生辱之甚甚於死伯夷叔齊餓于首陽之下求仁得仁何以過此乎詩云彼己之子舍命不渝喪家氏鉉翁曰傳謂國君之喪大夫弔卿葬夫人之士弔大夫葬以此命卿為過禮蓋魯人高共姬之節其禮視舊為優耳遷陳氏宗之曰薛氏曰古者夫人無諡從夫之諡東之後其制隳矣共姬執禮而死宋人不敢加非禮之諡鄭良霄出奔許自許入于鄭鄭人殺良霄左傳鄭伯有耆酒為窟室而夜飲酒擊鐘焉朝至未已朝者曰公焉在其人曰吾公在壑谷皆自朝布路而罷既而朝則又將使子晳如楚歸而飲酒庚子子晳以駟氏之甲伐而焚之伯有奔雍梁醒而後知之遂奔許大夫聚謀子皮曰仲虺之志云亂者取之亡者侮之推亡固存國之利也罕駟豐同生伯有汰侈故不免人謂子産就直助彊子産曰豈為我徒國之禍難誰知所敝或主彊直難乃不生姑成吾所辛丑子産斂伯有氏之死者而殯之不及謀而遂行印段從之子皮止之衆曰人不我順何止焉子皮曰夫子禮於死者況生者乎遂自止之壬寅子産入癸卯子石入皆受盟于子晳氏乙巳鄭伯及其大夫盟於太宫盟國人於師之梁之外伯有聞鄭人之盟已也怒聞子皮之甲不與攻已也喜曰子皮與我矣癸丑晨自墓門之瀆入因馬師頡介於襄庫以伐舊北門駟帶帥國人以伐之皆召子産子産曰兄弟而及此吾從天所與伯有死於羊肆子産襚之枕之股而哭之斂而殯諸伯有之臣在市側者既而葬諸斗城子駟氏欲攻子産子皮怒之曰禮國之幹也殺有禮禍莫大焉乃止於是游吉如晉還聞難不入復命於介八月甲子奔晉駟帶追之及酸棗與子上盟用兩圭質於河使公孫肸入盟大夫己巳復歸書曰鄭人殺良霄不稱大夫言自外入也於子蟜之卒也將葬公孫揮與裨竈晨㑹事焉過伯有氏其門上生莠子羽曰其莠猶在乎於是歲在降婁降婁中而旦裨竈指之曰猶可以終歲歲不及此次也已及其亡也歲在娵訾之口其明年乃及降婁僕展從伯有與之皆死羽頡出奔晉為任大夫雞澤之㑹鄭樂成奔楚遂適晉羽頡因之與之比而事趙文子言伐鄭之說焉以宋之盟故不可子皮以公孫鉏為馬師斗城杜注鄭地今開封府陳留縣南三十五里有斗城酸棗杜注陳留縣今開封府延津縣是縣北十五里有古酸棗城府任杜注晉縣屬廣平郡今任縣屬直隸順德縣東南有古任城穀梁不言大夫惡之也胡傳不言叛者將以滅國非直叛也若華亥之入南里宋辰之入蕭其書叛者皆據土背君以自保未有滅國之謀也不言殺其大夫者非其大夫矣討賊之詞也集說杜氏預曰耆酒荒淫書名罪之庫葉氏夢得曰良霄既自墓門之瀆入介於襄為亂以伐北門子駟子帶帥國人討而殺之不書大夫位已絶矣非復大夫也曰鄭人討賊之辭也張氏洽曰良霄之出公孫黑蓋有罪焉春秋舍公孫黑專伐之罪而罪良霄何也曰嗜酒而不恤政汰侈而好爭伯有之所為有喪家亡身之道焉雖微公孫黑其能免于死乎既亡而不自省又入伐君而大亂其國此春秋所以正名以討賊之辭也欒家氏鉉翁曰大夫奔而復復而作亂國中如魚石盈及良霄春秋書之非特責亂者其君與執政之臣有以召亂焉耳案鄭良霄出奔而君大夫國人共盟之猶魯之盟東門氏叔孫氏臧氏也其位之絶可知矣胡傳主劉氏敞說以為位未絶者誤也冬十月葬蔡景公胡傳春秋大法君弒而賊不討則不書葬況世子之於君父乎蔡景公何以獨書葬遍刺天下之諸侯也葬送之禮在春秋時視人情之疏密而為之者也有嘗同盟卒而不赴者有雖同姓赴而不會者則以哀死而致禭為輕弔生而歸賻為重必矣今蔡世子般弒其君藏在諸侯之策而往會其葬是恩義情禮之篤於世子般不以為賊而討之也故聖人深痛其所為遍刺天下之諸侯也集說劉氏敞曰穀梁曰不日卒而月葬不葬者也卒而葬之不忍使父失民於子也非也君弒賊未討不書葬此乃春秋之常矣凡不書葬者豈失民之謂乎家氏鉉翁曰君弒賊不討而書葬臣子親為逆無臣子可責也重汪氏克寬曰公羊云君子辭也說者以為弒父恥故作諱辭夫既明書世子弒君又曰諱之可乎葬湛氏若水曰書葬蔡景公使人求其所以死所以之故而其罪惡自見矣鄰國諸侯不討弒君之賊而乃公然會葬諸侯之罪與般均矣附録左傳楚公子圍殺大司馬蒍掩而取其室申無宇曰王子必不免善人國之主也王子相楚國將善是封殖而虐之是禍國也且司馬令尹之偏而王之四體也絶民之主去身之偏艾王之體以禍其國無不祥大焉何以得免晉人齊人宋人衛人鄭人曹人莒人邾人滕人薛人把人小邾人會于澶淵宋災故左傳為宋災故諸侯之大夫會以謀歸宋財冬十月叔孫豹會晉趙武齊公孫蠆宋向戌衛北宮他鄭罕虎及小邾之大夫會于澶淵既而無歸於宋書曰某人某人會于澶淵宋災故尤之也不書魯大夫諱之也胡傳智者無不知當務之為急不能三年之喪而緦小功之察放飯流啜而問無齒決是之謂不知務蔡世子般弒其君天下之大變人理所不容也則會其葬而不討宋國有災小事也則合十二國之大夫更宋之所喪而歸其財則可謂知務乎是故諸國之大夫貶而稱人魯卿諱而不書又特言㑹之所為以垂戒後世可謂深切著明矣集說劉氏敞曰左氏云謀歸宋財既而無歸故不書其人非也失信者如清丘之盟直貶其人而已矣今獨舉其事又貶其人非特惡失信而已也公羊云此大事曷為使微者卿也其稱人卿不得憂諸侯也亦非也諸侯相聚而更宋之所喪何大事之有大夫受君命以出是諸侯耳何用必其非諸侯之命乎穀梁云善之也其曰人何也救災以衆亦非也一國失火自焚其財小事耳諸侯何至羣聚而謀之乎以此為善是春秋貴小惠而不貴道也且宋以五月失火諸侯以冬會于澶淵是可謂救災乎朱子曰程子所謂春秋大義數十如成宋亂宋災故之類乃是聖人直著誅貶張氏洽曰盟㑹之書其故者有二以稷考之則澶淵之所貶非為宋財之無歸明矣竊黃氏仲炎曰自晉人廢討賊之義而後楚子䖍得是義以行之以討陳亂為名而滅陳以討蔡亂為名而滅蔡蓋澶淵之㑹為之也家氏鉉翁曰或謂蔡屬於楚非北方諸侯之責曰蔡諸姬也安可與荒遠小國同日語乎晉人苟能仗大義而討蔡則足以愧楚而服諸侯之心舍此不為乃致楚䖍特為異日滅蔡之兵端晉君臣愚亦甚矣汪氏克寬曰春秋君弒賊不討而書葬者惟蔡景公許悼公皆世子弒君然許止但不嘗藥非真弒君者故特書葬以減其罪蔡般罪大惡極而諸侯不討故春秋書葬且貶㑹澶淵之大夫而書宋災故所以深著其不能討賊也附録左傳鄭子皮授子産政辭曰國小而逼族大寵多不可為也子皮曰虎帥以聼誰敢犯子子善相之國無小小能事大國乃寬子産為政有事伯石賂與之邑子大叔曰國皆其國也奚獨賂焉子産曰無欲實難皆得其欲以從其事而要其成非我有成其在人乎何愛於邑邑將焉往子太叔曰若四國何子産曰非相違也而相從也四國何尤焉鄭書有之曰安定國家必大焉先姑先安大以待其所歸既伯石懼而歸邑卒與之伯有既死使大史命伯石為卿辭大史退則請命焉復命之又辭如是三乃受䇿入拜子産是以惡其為人也使次已位子産使都鄙有章上下有服田有封洫廬井有伍大人之忠儉者從而與之泰侈者因而斃之豐卷將祭請田焉弗許曰惟君用鮮衆給而已子張怒退而徴役子産奔晉子皮止之而逐豐卷豐卷奔晉子産請其田里三年而復之反其田里及其入焉從政一年輿人誦之曰取我衣冠而禇之取我田疇而伍之孰殺子産吾其與之及三年又誦之曰我有子弟子産誨之我有田疇子産殖之子産而死誰其嗣之集說王氏錫爵曰為國以禮其奚不服如以賂則鄭國褊小而族大寵多藉令不逞之輩􅏌然有要其上之心而相效尤以求賂焉將安取以給之其何以定之有然則子産不知為政歟是又不然鄭國大臣不和久矣子産以子皮之讓一旦秉國之政設非相從以悅其心其誰帖然而順令者洎乎政成而大夫之忠儉者與之汰侈者斃之子産豈直賂之云乎哉故必有子産之志則可已景王未三年三十有一年晉平十六年齊景六年衛襄二年蔡靈公般元年鄭簡二十四年曹武十三年陳哀二十七年把文八年宋平三十四年秦景三十五年楚郟敖三年吳夷末二年春王正月附録左傳三十一年春王正月穆叔至自㑹見孟孝伯語之曰趙孟將死矣其語偷不似民主且年未盈五十而諄諄焉如八九十者弗能久矣若趙孟死為政者其韓子乎吾子盍與季孫言之可以樹善君子也晉君將失政矣若不樹焉使早備魯既而政在大夫韓子懦弱大夫多貪求欲無厭齊楚未足與也魯其懼哉孝伯曰人生幾何誰能無偷朝不及夕將安用樹穆叔出而告人曰孟孫將死矣吾語諸趙孟之偷也而又甚焉又與季孫語晉故季孫不從及趙文子卒晉公室卑政在侈家韓宣子為政不能圗諸侯魯不堪晉求讒慝𢎞多是以有平丘之㑹齊子尾害閭丘嬰欲殺之使帥師以伐陽州我問師故夏五月子尾殺閭丘嬰以說於我師工僂灑渻竈孔虺賈寅出奔莒出羣公子陽州杜注魯地在東平西北蓋齊魯境上之邑也夏六月辛巳公薨于楚宮左傳公作楚宮穆叔曰大誓云民之所欲天必從之君欲楚也夫故作其宮若不復適楚必死是宮也六月辛巳公薨于楚宮叔仲帶竊其拱璧以與御人納諸其懷而從取之由是得罪穀梁楚宮非正也集說何氏休曰公朝楚好其宮歸而作之故名之云爾杜氏預曰不居先君之路寢而安所樂失其所也財許氏翰曰公還自楚不能增修德政而反勤民傷務作楚宮公之志亦荒矣其何振之有薛氏季宣曰楚宫别宮也小寢猶非正也況别宮乎趙氏鵬飛曰魯大夫之橫起於文而成於襄非文之怠忽大夫未敢肆非襄之懦庸公室未遽弱雖大夫世祿不能免於橫而上之人有以制之則亦未能專也文公怠忽不君諸大夫寖以秉國幸成公繼之粗能剛果有立大夫之權日沮公室日張矣不幸即世襄公乳臭子嗣魯之統三家憑之會盟征伐皆出於己威令已去襄公雖壯而不能收矣李氏廉曰襄公在位三十一年當其初立外則晉悼之伯方務綏睦親鄰內則季孫行父仲孫蔑叔孫豹皆賢大夫故魯國自事伯外皆無他虞奈何自五年季文子卒後武子繼之專權肆欲城費而私邑張作三軍而公室卑入鄆而君命不行於是諸大夫則而象之城成郛而孟氏彊矣城防而臧氏亦彊矣悼公既沒齊邾交伐魯之不振益甚蓋以兵權分於三家故也至其末年乃俯首南面而朝於楚雖晉伯之失使然而魯之人望亦泯矣孔子曰祿之去公室五世矣政逮於大夫四世矣蓋宣成以來已然而實成於襄公也李氏曰仲孫之用事者五叔孫之用事者十有四季孫之用事者十則三卿專政之形成齊人伐我者七邾人伐我者二莒人侵我者四則鄰國交爭之禍起雖享國長久倚晉為重已階削弱之端此襄公生亂而不悟其變也公邵氏寶曰魯襄公作楚宮而穆叔知其必死衛出效吳言而子之知其不免妖孽見乎四體固其然哉秋九月癸巳子野卒左傳立胡女敬歸之子子野次於季氏秋九月癸巳卒毁也立敬歸之娣齊歸之子公子裯穆叔不欲曰大子死有母弟則立之無則立長年鈞擇賢義鈞則卜古之道也非嫡嗣何必娣之子且是人也居喪而不哀在戚而有嘉容是謂不度不度之人鮮不為患若果立之必為季氏憂武子不聽卒立之比及葬三易衰衰袵如故衰於是昭公十九年矣猶有童心君子是以知其不能終也胡傳子般子赤弒而書卒子野過毁亦書卒何以别乎曰閔公內無所承不書即位則子般之弒可知下書夫人姜氏歸于齊上書公子遂叔孫得臣如齊則子赤之弒可知與子野異矣子野有命立昭公故穆叔雖不欲而不能止也集說杜氏預曰不書葬未成君公孫氏復曰襄公太子未踰年之君也名者襄未葬也不薨不地降成君也之湛氏若水曰春秋之時臣弒其君子弒其父視野傷孝何如哉聖人書之其感深矣王氏樵曰案居喪毁瘠不形者先王之禮也毁不滅性者先王之教也子野喪致乎哀根乎至性豈不賢哉而不能輔之以教開之以禮以保其躬使至滅性大臣之罪也己亥仲孫羯卒羯居謁反左傳己亥孟孝伯卒集說汪氏克寬曰子貜嗣為大夫是為僖子冬十月滕子來㑹葬諸侯始親來㑹葬左傳冬十月滕成公來會葬惰而多涕子服惠伯曰滕君將死矣怠於其位而哀已甚兆於死所矣能無從乎集說劉氏敞曰諸侯之喪諸侯會之非禮也葬許氏翰曰先王之制諸侯之喪士弔大夫送滕子會葬非禮也春陳氏傅良曰改葬惠公也衛侯來會葬隱公不見秋之初魯猶秉禮也晉景公之喪成公弔焉亦已卑矣晉於是止公使送葬諸侯莫在魯人辱之雖伯主未有君會葬者也葬楚康王也公及陳侯鄭伯許男送於西門之外則天下諸侯有㑹葬於楚者矣於是滕子會葬於魯是春秋之季也會葬猶可奔喪甚矣魯家氏鉉翁曰魯君未嘗會天王之葬而滕君來㑹葬滕之來魯之受皆貶也季氏本曰六年來朝至是又來會葬滕之事魯可謂恭矣然諸侯會葬諸侯非禮也癸酉葬我君襄公附録左傳公薨之月子産相鄭伯以如晉晉侯以我喪故未之見也子産使盡壞其館之垣而納車馬焉士文伯讓之曰敝邑以政刑之不修寇盜充斥無若諸侯之屬辱在寡君者何是以令吏人完客所館高其閈閎厚其墻垣以無憂客使今吾子壞之雖從者能戒其若異客何以敝邑之為盟主繕完葺牆以待賔客若皆毁之其何以共命寡君使丐請命對曰以敝邑𥚹小介於大國誅求無時是以不敢寧居悉索敝賦以來會時事逢執事之不間而未得見又不獲聞命未知見時不敢輸幣亦不敢暴露其輸之則君之府實也非薦陳之不敢輸也其暴露之則恐燥濕之不時而朽蠧以重敝邑之罪僑聞文公之為盟主也宮室卑庳無觀臺榭以崇大諸侯之館館如公寢庫廏繕修司空以時平易道路圬人以時塓館宮室諸侯賔至甸設庭燎僕人巡宫車馬有所賔從有代巾車脂轄隸人牧圉各瞻其事百官之屬各展其物公不留賔而亦無廢事憂樂同之事則巡之教其不知而恤其不足賔至如歸無寧菑患不畏寇盜而亦不患燥濕今銅鞮之宮數里而諸侯舍於隸人門不容車而不可踰越盜賊公行而夭癘不戒賔見無時命不可知若又勿壞是無所藏幣以重罪也敢請執事將何所命之雖君之有魯喪亦敝邑之憂也若獲薦幣修垣而行君之惠也敢憚勤勞文伯復命趙文子曰信我實不德而以隸人之垣以贏諸侯是吾罪也使士文伯謝不敏焉晉侯見鄭伯有加禮厚其宴好而歸之乃築諸侯之館叔向曰辭之不可以已也如是夫子産有辭諸侯賴之若之何其釋辭也詩曰辭之輯矣民之協矣辭之繹矣民之莫矣其知之矣鄭子皮使印段如楚以適晉告禮也十有一月莒人弒其君密州胡𫝊經以傳為案𫝊有乖繆則信經而棄𫝊可也若密州之事是矣左氏稱莒子生去疾及展輿既立展輿又廢之莒子虐國人患焉展輿因國人以攻莒子弒之乃立信斯言則子弒其父也而春秋有不書乎故趙匡謂其文當曰展輿因國人之攻莒子弒之乃立而後來傳寫誤為以字爾左氏博通諸史叙事尤詳能令後人得見本末因以求意經文可知而門弟子轉相傳受日月既久浸失本真如書晉趙盾許世子止等事詳考𫝊之所載以求經之大義可也而𫝊不可疑如莒人弒其君密州獨依經之所言以證𫝊之謬誤可也而傳不可信盡以為可疑而廢傳則無以知其事之本末盡以為可信而任傳則經之𢎞意大旨或泥而不通矣要在學者詳考而精擇之可也集說陸氏淳曰左氏云展輿因國人以攻莒子弒其父不當不書義同庶其之弒但恐是展輿因國人之攻弒莒子乃立𫝊誤以之字為以字不敢輒改其文故略其辭劉氏敞曰左氏曰莒人弒其君買朱鉏言罪之在也如是則父有罪子得而弒之也蔡世子般弒其君固固之惡最甚矣何以亦貶乎且經曰密州傳曰買朱鉏吾誰適從哉也程子曰莒子虐國人弒之而立展輿展輿非親弒故書國人又曰春秋傳為案經為斷以傳考經之事迹以經别傳之真僞家氏鉉翁曰左氏云書莒人之弒其君言罪之在也置其子之大惡歸過於其父春秋必不然蓋犂比公虐國人作亂而弒之展輿既廢於父而見立於國人使展輿能討賊於既立之後庶乎可免矣附録左傳吳子使屈狐庸聘於晉通路也趙文子問焉曰延州來季子其果立乎巢隕諸樊閽戕戴吳天似啓之何如對曰不立是二王之命也非啓季子也若天所啓其在今嗣君乎甚德而度德不失民度不失事民親而事有序其天所啓也有吳國者必此君之子孫實終之季子守節者也雖有國不立過十二月北宫文子相衛襄公以如楚宋之盟故也鄭印段廷勞於棐林如聘禮而以勞辭文子入聘子羽為行人馮簡子與子大叔逆客事畢而出言於衛侯曰鄭有禮其數世之福也其無大國之討乎詩云誰能執熱逝不以濯禮之於政如熱之有濯也濯以救熱何患之有子産之從政也擇能而使之馮簡子能斷大事子大叔美秀而文公孫揮能知四國之為而辨於其大夫之族姓班位貴賤能否而又善為辭令禆諶能謀謀於野則獲謀於邑則否鄭國將有諸侯之事子産乃問四國之為於子羽且使多為辭令與禆諶乘以適野使謀可否而告馮簡子使斷之事成乃授子大叔使行之以應對賔客是以鮮有敗事北宮文子所謂有禮也如鄭人游於鄉校以論執政然明謂子産曰毁鄉校何子産曰何為夫人朝夕退而游焉以議執政之善否其所善者吾則行之其所惡者吾則改之是吾師也若之何毁之我聞忠善以損怨不聞作威以防怨豈不遽止然猶防川大决所犯傷人必多吾不克救也不如小決使道不如吾聞而藥之也然明曰蔑也今而後知吾子之信可事也小人實不才若果行此其鄭國實賴之豈唯二三臣仲尼聞是語也曰以是觀之人謂子産不仁吾不信也子皮欲使尹何為邑子産曰少未知可否子皮曰願吾愛之不吾叛也使夫往而學焉夫亦愈知治矣子産曰不可人之愛人求利之也今吾子愛人則以政猶未能操刀而使割也其傷實多子之愛人傷之而已其誰敢求愛於子子於鄭國棟也棟折榱崩僑將厭焉敢不盡言子有美錦不使人學製焉大官大邑身之所庇也而使學者製焉其為美錦不亦多乎僑聞學而後入政未聞以政學者也若果行此必有所害譬如田獵射御貫則能獲禽若未嘗登車射御則敗績厭覆是懼何暇思獲子皮曰善哉虎不敏吾聞君子務知大者遠者小人務知小者近者我小人也衣服附在吾身我知而愼之大官大邑所以庇身也我遠而慢之微子之言吾不知也他日我曰子為鄭國我為吾家以庇焉其可也今而後知不足自今請雖吾家聽子而行子産曰人心之不同如其面焉吾豈敢謂子面如吾面乎抑心所謂危亦以告也子皮以為忠故委政焉子産是以能為鄭國曰衛侯在楚北宮文子見令尹圍之威儀言於衛侯令尹似君矣將有他志雖獲其志不能終也詩云靡不有初鮮克有終終之實難令尹其將不免公曰子何以知之對曰詩云敬愼威儀惟民之則令尹無威儀民無則焉民所不則以在民上不可以終公曰善哉何謂威儀對曰有威而可畏謂之威有儀而可象謂之儀君有君之威儀其臣畏而愛之則而象之故能有其國家令聞長世臣有臣之威儀其下畏而愛之故能守其官職保族宜家順是以下皆如是是以上下能相固也衛詩曰威儀棣棣不可選也言君臣上下父子兄弟內外大小皆有威儀也周詩曰朋友攸攝攝以威儀言朋友之道必相教訓以威儀也周書數文王之德曰大國畏其力小國懷其德言畏而愛之也詩云不識不知順帝之則言則而象之也紂囚文王七年諸侯皆從之囚紂於是乎懼而歸之可謂愛之文王伐崇再駕而降為臣蠻夷帥服可謂畏之文王之功天下誦而歌舞之可謂則之文王之行至今為法可謂象之有威儀也故君子在位可畏施舍可愛進退可度周旋可則容止可觀作事可法德行可象聲氣可樂動作有文言語有章以臨其下謂之有威儀也欽定春秋傳說彚纂卷二十八
