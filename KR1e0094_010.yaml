body:
  text: 欽定四庫全書欽定春秋傳說彚纂卷八乙莊王十未一年八年齊襄十二年晉緡十九年衞惠十四年蔡哀九年鄭厲十五年子儀八年曹莊十六年陳宣七年把靖十八年宋閔六年秦武十二年楚文四年春王正月師次于郎以俟陳人蔡人公羊次不言俟此其言俟何託不得已也榖梁次止也俟待也胡傳用大衆曰師次止也伐而次者有整兵慎戰之意其次善之也遂伐楚次于陘是也救而次者有緩師畏敵之意其次譏之也次于匡于聶北于雍榆是也俟而次者有無名妄動之意次于郎以俟陳人蔡人是也何俟乎陳蔡或曰陳蔡將過我俟而邀之也或曰魯將與陳蔡有事於鄰國而陳蔡不至故次于郎以待之也若是皆非義矣其曰次曰以俟者深貶之也集說杜氏預曰期共伐郕陳蔡不至故駐師于郎以待之孔氏穎逹曰唯言以俟陳蔡不知何故待之下有師及齊師圍郕或與陳蔡同計故云期共伐郕陳蔡不至故待之賈逵及說榖梁者皆云陳蔡欲伐魯故待之陳蔡於魯竟絶路遥春秋以來未嘗構怨何因輒伐魯也又俟者相須同行之辭非防冦拒敵之稱若是畏其來伐當謂之禦不得稱俟故知期共伐郕耳何休服䖍亦言欲共伐郕趙氏匡曰師駐曰次惡興師也無寇而次是欲自為寇也師陸氏淳曰非奉王覇之命以討罪救亂則不當興惡其興師無名故書次率孫氏覺曰郕與魯為同姓之國莊公無親親之恩諸侯以伐之春次于郎以俟陳蔡我俟之也及齊師以圍之我約之也其為志者皆我也所以見内之罪也陳氏傅良曰此吾君將也何以稱師莊之㑹齊皆譏也莫甚於及圍郕是故一貶之師行不言次必久而無功也而後言次吾師嘗久外矣而莊公特書次以莊之不競於齊也俟陳蔡不至及齊圍郕郕降于齊師以正月治兵及秋而還斯可以言次矣動張氏洽曰不由王命妄興師衆久次於外無名而期㑹莫應故書師次又書俟以深責之而李氏廉曰春秋書内外之次十二胡氏分三例伐次善之也救而次貶之也次而俟無名之師也莊三年公次滑三十年師次成皆可入救而次之例襄元年仲孫蔑㑹四國次鄫可入伐而次之例莊十年齊宋次郎可入無名之例又有次而伐者亦貶之楚蔡次厥貉齊衞次五氏垂葭籧蒢也汪氏克寛曰十二公惟莊公書次者三昭公書次者三莊公忘親釋怨欲救紀與鄣而不能俟陳蔡不至而遂及齊圍郕昭公失國而祈哀乞憐於齊晉卒至客死皆惡之大者故書以示戒是以他公之次皆不書湛氏若水曰春秋無義戰敵加於己不得已而應之人來㑹己不得已而㑹之猶可言也至於先出而俟之罪在我矣不可言也甲午治兵治公作祠公羊祠兵者何出曰祠兵入曰振旅其禮一也皆習戰也何言乎祠兵為久也曷為為久吾將以甲午之日然後祠兵於是榖梁出曰治兵習戰也入曰振旅習戰也治兵而陳蔡不至矣兵事以嚴終故曰善陳者不戰此之謂也善為國者不師善師者不陳善陳者不戰善戰者不死善死者不亡胡傳此治兵于郎也俟而不至暴師露衆役久不用則有失伍離次逃亡潰散之虞故復申明軍法以整齊之其志非善之也譏黷武也集說劉氏敞曰治兵者何習戰也常事不書此何以書譏何譏爾春而治兵不時也治兵以俟陳蔡也何以不言地國中則不言地何以不言公國中則不言公又曰左氏曰治兵於廟禮也非也凡出曰治兵入曰振旅是以秋治兵春振旅今魯以春治兵治兵非其時何以為禮乎且若中禮是則常事耳亦何足書乎又言於廟夫廟中嚴矣非治兵之地也申張氏洽曰久次於外而所俟者不至衆心不一故明約束以訓齊其衆而不知出不以律己失治兵之本矣雖欲治之其將能乎書曰治兵治者不治者也程氏端學曰有文事者必有武備故治兵於閒暇之時而用之於不得已之際則師出以律矣今莊公輕次於外俟陳蔡而不應衆心離貳然後治之末矣遂李氏廉曰周禮中春教振旅遂以蒐中夏教茇舍以苖中秋教治兵遂以獮中冬教大閲遂以狩然春秋有書治兵大閲者其只講武而不及於獮狩乎有書蒐書狩者其兼及於振旅大閲乎榖梁治兵之義甚善但注者以為予莊公能以嚴終則失之矣汪氏克寛曰周禮大司馬因秋獮治兵以教戰公榖皆言出而治兵今莊公不以仲秋田狩而教戰又不治兵於出兵之時而治兵於次郎之後皆非禮也蓋莊公之治兵非預備不虞之意實久役不得已而治之爾大閲治兵皆一經之特筆而桓公有所畏而大閲非其時莊公有所俟而治兵非其地故皆特書以示貶不然常事不書夏師及齊師圍郕郕降于齊師郕公作成降戸江反左傳仲慶父請伐齊師公曰不可我實不德齊師何罪罪我之由夏書曰皋陶邁種徳徳乃降姑務修徳以待時乎胡傳書及齊師者親仇讎也圍郕者伐同姓也郕降于齊師者見伐國無義而不能服也於是莊公之惡著矣集説范氏甯曰郕同姓之國而與齊伐之是用師之過也劉氏敞曰郕者何國也降者何降之者何降者未失其國家者也降之者失其國家者也未失其國家者復見失其國家者不復見猶遷也又曰公羊以為成者盛也諱滅同姓也不言降吾師辟之也非也實共圍盛改謂之成實滅其國改謂之降實降於魯又獨言齊皆非聖人之文也凡聖人諱國惡亦在可諱之域不在不可諱之域如改白為黒曰已為人豈獨非道亦不可傳世矣又曰榖梁曰不使齊師加威於郕故使若齊無武功而郕自降審如此春秋為縱失齊師之惡也其意雖欲貶齊存郕其實乃爲齊文過張氏洽曰書及内之志也魯與郕皆文王之昭蓋同姓兄弟之當親者莊公忘親而志於取郕始俟陳蔡而陳蔡不來然後要齊以圍之所以郕不服魯而降于齊春秋直書以見其從讎而貪利資人以虐小二國同役而不同心敵遂得以間之魯師之出大無功也故略公而書師以著其輕用民力之罪吳氏􅊹曰説者謂魯欲取郕而結陳蔡同伐陳蔡不至乃藉力於齊案魯弱於齊齊豈肯爲魯役魯亦何敢役之哉蓋齊欲圍郕而徴兵於魯與陳蔡爾郕畏齊而不畏魯故齊魯同圍而郕獨降齊也人李氏廉曰春秋書圍國二十五始於此而終於宋之圍曹之湛氏若水曰莊公舍復讎之義而反同以伐郕宜郕人之不服而降齊也秋師還還音旋後同榖梁還者事未畢也遯也胡傳書師還譏役久也案左氏仲慶父請伐齊師莊公不可是國君上將親與圍郕之役也然其次其及其還皆不稱公者重衆也春秋正例君將不稱帥師則以君為重今此不稱公又以為重衆何也輕舉大衆妄動久役俟陳蔡而陳蔡不至圍郕而郕不服歴三時而後還則無名黷武非義害人未有如此之甚也至是師為重矣義繫於師故不書公以著勞民毒衆之罪為後戒也春秋王道輕重之權衡此類是矣集說趙氏匡云左氏云君子是以善魯莊公勞師㑹讎何善之有且齊强魯弱自當不敢爭也孫氏復曰春秋用師多矣未有言師還此言師還者惡其與强讎覆同姓踰時還也劉氏敞曰公羊曰病之也曰師病矣非師之罪也然則理實貶之何言善之乎崔氏子方曰歴三時而師還春秋所以始終其事而見其惡詳劉氏絢曰春秋之世用師多矣未有所書如此之者何則莊公此師尤為非義上既不用天王之命無故而興師自正月次于郎以俟陳蔡而陳蔡不至可謂無名矣甲午治兵可謂黷武矣夏師及齊師圍郕郕又降于齊可謂無義矣歴三時而師還可謂害民矣夫逆天道親仇讎圍同姓勦民力與國不信伐國不服故聖人備書之季王氏沿曰公圍郕而始末稱師者刺之也薛氏宣曰師還何幸之也何幸乎師之還公欲取郕而力不足藉力於齊而齊取之以夏降郕及秋而反公謀擊齊而遂不果故遲遲也莊公忘國之大恥滅同姓親讎敵暴師之久書之危辭也陳氏傅良曰師還不書書還危不得還也廟趙氏鵬飛曰書還不書至蓋無功而返何辭而告也或者以還為善詞夫出師無名三時而反猶曰善之春秋之法不如是之疎也士李氏廉曰春秋書還例四歸父還自晉公還自晉匄侵齊聞䘮乃還皆善詞也獨此年師還則異乎是鄭汪氏克寛曰莊公之伐衛納朔與僖公之侵蔡伐圍新城成公之如京師伐秦定公之㑹召陵侵楚皆歴三時而始返皆不書師還考其時而久役黷武之罪自見獨此年無名興戎師出無功春秋沒公不書以深貶之茍不書師還則不見其久役大衆之惡故備書始末結正莊公之罪也不邵氏寳曰君將不稱帥師正也三稱師而及君變乎正矣冬十有一月癸未齊無知弑其君諸兒左傳齊侯使連稱管至父戍葵丘瓜時而往曰及瓜而代期戍公問不至請代弗許故謀作亂僖公之母弟曰夷仲年生公孫無知有寵於僖公衣服禮秩知適襄公絀之二人因之以作亂連稱有從妺在公宫無寵使間公曰㨗吾以女為夫人冬十一月齊侯游於姑棼遂田於貝丘見大豕從者曰公子彭生也公怒曰彭生敢見射之豕人立而啼公懼隊於車傷足喪屨反誅屨於徒人費弗得鞕之見血走出遇賊於門劫而東之費曰我奚御哉袒而示之背信之費請先入伏公而出鬬死於門中石之紛如死於階下遂入殺孟陽於牀曰非君也不類見公之足於户下遂弑之而立無知初襄公立無常鮑叔牙曰君使民慢亂將作矣奉公子小白出奔莒亂作管夷吾召忽奉公子糾來奔初公孫無知虐於雍廩葵丘杜注齊地臨淄縣西有地名葵丘後漢志西安縣有蘧丘亭亦名渠丘即古葵丘也今山東青州府臨淄縣西三十里有西安故城葵丘在其處姑棼杜注齊地即薄姑也今青州府博興縣東北十五里有薄姑城青貝丘杜注齊地樂安博昌縣南有地名貝丘今州府博興縣南有貝中聚胡傳案左氏齊侯游於姑棼遂田於貝丘徒人費遇賊於門先入伏公出而鬬死石之紛如死於階下是能死節者也春秋重死節之臣而法有特書其不見於經何也如費等所謂便嬖私暱之臣逢君之惡田獵畢弋而不修民事使百姓苦之者也與大臣孔父仇牧義形於色不畏强禦以身死其職則異矣當是時管仲隰朋鮑叔皆沈於下僚不見庸也而徒人費石之紛如乃得居左右襄公之所疏逺親信者如此故以齊國之强大一也桓公用之則九合諸侯不以兵車由親賢人逺小人所以興也襄公用之不能保其身死於户下由親小人逺賢人所以亡也此二人雖死於難與自經於溝瀆而莫之知者猶不逮焉乃致亂之臣死不償責又何取乎集說劉氏敞曰榖梁曰大夫弑君以國氏者嫌也弑而代之也非也宋萬豈亦弑而代之者乎公子商人豈非弑而代之者乎之陳氏傅良曰此公孫無知也其曰無知何隱桓莊春秋凡賊皆名之弑君者連稱管至父則其專罪無知伺君弑而無知受之則賊不在二子矣春秋誅利心是故連稱管至父實弑齊襄無知與聞故者也而無知受之則無知為逆首公子棄疾實弑楚靈比與聞故者也而比受之則比為逆首於張氏洽曰無知公孫也不書氏與翬州吁同例舉此後皆稱氏從同同也又曰齊襄之見弑以禍本言之則無知之亂嫡積漸於僖公之時而襄公之惡積不可揜如抗王伐衞殺魯桓公色荒禽荒暱比小人以至禍發蕭墻身殱賊手考其即位至今所書齊事無非亡國戕身之媒所謂積不善之餘殃也春家氏鉉翁曰齊襄淫亂不道今而見弑亦天討也秋為之從州吁弑之例削無知族以正其弑君之罪何哉曰無知弑君自立志在乎簒罪在不赦故從州吁之例去其族而以賊討之汪氏克寛曰徒人費石之紛如孟陽死於襄公之弑賈舉州綽邴師公孫敖封具鐸父襄伊僂堙祝佗父申蒯死於莊公之弑皆不得以死節書蓋近暱嬖幸之臣從君於昏而任其禍未可以死節許之也又曰文定謂州吁不氏責衛莊不待以公子之道無知不氏責齊僖不待以公孫之道斯亦一義然督萬亦以國氏蓋隱桓莊之春秋凡賊皆名之大義既明於初其後皆以氏稱張氏之言乃程子之意也案無知不稱公孫絶其屬籍也胡傳罪僖公恐非篤論故刪之丙莊王十申二年九年齊桓公小白元年晉緡二十年衞惠十五年蔡哀十年鄭厲十六年子儀九年曹莊十七年陳宣八年杞靖十九年宋閔七年秦武十三年楚文五年春齊人殺無知左傳九年春雍廩殺無知胡傳殺無知者雍廩也而曰齊人者討賊之辭也弑君之賊人人之所惡夫人之所得討故稱人人者衆辭也無知不稱君已不能君齊人亦莫之君也集說孫氏復曰案隱四年衛人殺州吁于濮此不地者齊人即於國内殺之也稱人以殺討賊辭劉氏敞曰傳曰雍廩殺之雍廩殺之則其稱人以殺之何討賊之辭也又曰榖梁曰無知之挈失嫌也稱人以殺大夫殺有罪也非也無知弑君以代其位不可復氏公子又上有齊人下有無知明無知者齊人之賊亦不煩再氏國爾非謂失嫌故挈之也無知又非大夫而以大夫例解之似仍失指陳氏𫝊良曰無知嘗踰年則其曰齊人殺無知何是不成君之辭也向也州吁之弑衞人為之變不踰年卒討之今也無知之弑齊人亦為之變踰年卒討之是故無知不成君而雍廩得書人是國有臣子也張氏洽曰稱人者弑君之賊人無貴賤皆得殺之所以尊君父廣忠孝而誅惡逆也吳氏仲迂曰聖人以討賊寄之人人亂臣賊子無容足之地矣有汪氏克寛曰春秋之例稱人以殺而但名之則討罪也稱人以殺而不去其官則非討賊也經書殺弑賊者十州吁無知陳佗夏徵舒晉里克衞甯喜齊商人楚䖍公子比蔡般是也州吁無知國人能自討賊陳佗徵舒待蔡人楚人討之無臣子矣然皆以討賊書之也晉惠因里克弑君而得國衞獻因甯喜弑君而復國利其所為使復為大夫既又忌而殺之非討賊也故以國殺大夫為文楚棄疾誘比以為君之利而俾當弑君之名既而殺之意在代其位亦非討賊也故以兩下相殺為文齊商人楚䖍蔡般則國人君之諸侯㑹之不知其為賊矣故春秋亦不得用討賊之例也張氏溥曰左傳云無知虐於雍廩雍廩因而殺之非如石碏之以義討也然齊人不能討雍廩討之即有憾庸何傷是故衞齊均稱人以殺義雍廩者猶之義石碏也公及齊大夫盟于蔇蔇其器反公穀作暨亭蔇杜注魯地琅琊繒縣北有蔇今在山東兗州府嶧縣東八十里故鄫城左傳齊無君也公羊公曷為與大夫盟齊無君也榖梁公不及大夫大夫不名無君也盟納子糾也胡傳及者内為志大夫不名者義繫於齊而不繫於大夫之名氏也曰公及齊大夫盟者譏公之釋父怨親仇讎也或曰以德報怨寛身之仁何以譏之也曰德有輕重怨有深淺怨莫甚於父母之讎而德莫重乎安定其國家而圖其後嗣也有父之讎而不知怨乃欲以重德報之則人倫廢天理滅矣然則如之何以直報怨以德報德集說范氏甯曰春秋之義内大夫可以㑹外諸侯公不可以盟外大夫所以明尊卑定内外也今齊國無君要當有任其盟者故不得不以權通禮君前臣名齊無君故大夫不名啖氏助曰榖梁曰無君制在公矣當可納而不納故惡内也案讎人之子本不當納有何惡乎趙氏匡曰納讎人之子損禮而盟大夫故盟書公及言大夫以明非大夫之罪也所以異於髙傒及處父也劉氏敞曰其言及齊大夫何盟納子糾也盟納子糾則何以不名其大夫公之納子糾其所納也若曰為齊大夫則可以納也又曰杜氏曰大夫非一故不稱名非也大夫雖衆固應名其貴者一人而已經曰及諸侯晉大夫盟豈晉國大夫皆在邪之孫氏覺曰春秋之義魯公及外大夫盟非外大夫罪則書人不言其名者成二年盟于蜀是也外大夫及公盟而伉公者則沒公而書名若但與微者也莊二十二年及齊高傒盟于防是也蓋曰諸侯君也外大夫臣也君有常尊臣有常卑所以正君臣之分而防僭禮之萌也以大夫之卑而敵諸侯之尊大夫之罪也明書大夫之名以著其罪沒我公之號示不與大夫之得僭也以諸侯之尊而求與大夫盟者則魯公之罪也明書魯公之及以著其罪沒大夫之名以人書之不與大夫之敵諸侯若微者則不嫌也公及齊大夫盟于蔇既書公矣又書大夫而不名公則有罪而大夫無嫌也莊公父見弑於齊不以復讎為念而為齊立君又屈諸侯之尊以與大夫盟公則有罪矣齊之大夫無君於上而公子在外故以一時之權伉公而盟于蔇聖人深察人情之難而盡一時之變也公則有罪而大夫無嫌故變例而書之報朱子曰以直報怨者不以私害公不以曲勝直當則報不當報則止一觀夫理之當然聖人之心終不使人忘怨而沒其報復之名者亦以見夫君父之讎有不得不報者而申夫忠臣孝子之心也若於其所怨而反報之以德誠若忠且厚矣而於君父之讎亦將有時而忘之豈不悖天理之甚也哉或曰君父之讎亦有當報不當報之别乎曰周禮有曰殺人而義者令勿讎此不當報者也春秋傳曰父不受誅子復讎可也此當報者也當報而報不當報而止是即所謂直也李氏廉曰春秋於蔇之盟書齊大夫扈之盟書晉大夫其詞雖同然齊無君而書大夫非貶詞又書公及則大夫無伉公之嫌而罪公之及齊明矣晉靈初即位而趙盾書大夫則趙盾之專可知其書公㑹雖譏公之後至然乃所以見趙盾之强諸侯為此盟也又曰子糾三傳皆以為當納趙子程子胡氏以為不當納所以然者杜氏以子糾小白竝齊僖之子而糾長故當立榖梁曰齊無知弑襄公公子糾公子小白出亡似若以為襄公子矣而終以糾為兄故亦以為當立獨程子用史記證之而定以糾爲襄公子於是魯納讎之罪明定以糾為小白弟於是糾不當立之義著然後糾不書子小白之繫齊管仲之不死魯之忘親釋怨皆得其説矣邵氏寶曰盟以謀納糾内則釋怨親讎外則輔少伉長如倫理何人莫甚於父母之讎國莫大於少長之序夏公伐齊納糾齊小白入于齊左作納子糾左傳夏公伐齊納子糾桓公自莒先入榖梁大夫出奔反以好曰歸以惡曰入齊公孫無知弑襄公公子糾公子小白不能存出亡齊人殺無知而迎公子糾於魯公子小白不讓公子糾先入又殺之於魯故曰齊小白入于齊惡之也胡傳左氏書子糾二傳曰伐齊納糾君子以公榖為正納者不受而强致之稱入者難詞糾不書子者明糾不當立也以小白繫齊者明小白宜有齊也所以然者襄公見殺糾與小白皆以庶子出奔而糾弟也又未嘗為世子案史稱周公誅管蔡以安周齊桓殺其弟以反國是糾幼而小白長其有齊宜矣宜則何以不稱公子内無所承上不禀命故以王法絶之也集說范氏甯曰春秋於内公子為大夫者乃記其奔子糾不為大夫故不書其奔鄭忽既受命嗣位是以書其出然則重非嫡嗣官非大夫皆事例所略故許叔蔡季小白重耳通亦不書出何休曰三年溺㑹齊師伐衞故貶而名之四年公及齊人狩于郜故卑之曰人今親納讎子反惡其晚恩義相違莫此之甚甯謂讎者無時而可與通縱納之遲晚又不能全保讎子何足以惡内乎然則乾時之戰不諱敗齊人取子糾殺之皆不迃其文正書其事内之大惡不待貶絶居然顯矣二十四年公如齊親迎亦其類也惡内之言傳或失之伐杜氏預曰二公子各有黨故雖盟而迎子糾當須乃得入又出在小白之後小白稱入從國逆之文本無位主孔氏穎逹曰眧十三年傳稱桓公有國髙以為内則國子髙子是小白之黨也彼迎小白既早公送子糾又遲公伐齊納子糾始行即書小白入齊得告乃書故至齊之時出小白之後也傳例曰凡去國國逆而立之曰入小白稱入從國逆之文以其本無位也若夲有位則當云復歸小孫氏復曰夏公伐齊納子糾其言齊小白入齊者白爭立也言入者皆非世嫡劉氏敞曰公羊云納者入辭也非也納者納辭耳得入不得入未可知也非入辭也又曰伐而言納者猶不能納也亦非也有伐而納者有圍而納者有未嘗伐未嘗圍而納者各據實書之耳糾不稱公子君前臣名也非也糾失國在魯本非魯臣何以責以君前臣名乎且若稱公子糾則可謂非君前臣名乎又云以國氏者當國也非也凡言當國之説皆無通例不可條貫齊孫氏覺曰春秋之義納者不宜納也桓公見弑於齊之與魯有不同天之讎仇讎之國無時而可與通也莊公忘君父之大讎伐齊而納讎人之子書曰納者不宜納也弟程子曰桓公子糾襄公之二子也桓公兄而子糾襄公死則桓公當立春秋書桓公則曰齊小白言當有齊國也於子糾則止曰糾不言齊以不當有齊也不言子非君之嗣子也公榖并注四家皆書納糾左傳獨言子糾誤也然書齊人取子糾殺之者齊大夫嘗與魯盟于蔇既納糾以為君又殺之故書子是二罪也齊胡氏銓曰齊不受子糾而公必納之故先書公伐見齊不受子糾也次書納糾見公黨讎之子也嘗朱子曰程子以薄昭之言證桓公之為兄則荀卿謂桓公殺兄以爭國而其言固在薄昭之前矣蓋未可以此證其必然但以公榖春秋所書之文為據而參以夫子荅子路子貢之言斷之可也蓋聖人之於人不以罪掩其功亦不以功掩其罪今於管仲但稱其功不言其罪則可見不死之無害於義而桓公子糾之長少亦從以明矣又曰仲之所以不死者正以小白兄而子糾弟耳若使糾兄而當立則齊國之士君臣之義無所逃矣後陳氏傅良曰凡納所宜納皆不書必不宜納也而書襄公吾讎也而納其亡公子以為徳是納不宜納也納吕氏大圭曰伐齊納糾欲納之而實未能納也故而得入則書其國楚人納頓子于頓楚人納公孫寧儀行父于陳是也未得國而入於邑則書邑齊髙偃納北燕伯于陽晉趙鞅納世子蒯瞆于戚是也莊公納子糾以國則小白已君以邑則糾未能入故但書納以見其不能納也案張氏洽曰左氏作納子糾今從公羊榖梁作納糾正義云今定本乃有子字則知左氏古本亦作納糾矣又曰莊公忘齊之讎而納其公子又所奉者不正故特書納糾以罪之桓公當立而書入無王命也使趙氏與權曰魯莊之伐齊似矣惜乎其以納糾也移此以為復讎之師魯其庶乎春秋書其故以其非讎齊而徳齊也如吳氏澂曰齊人初欲迎糾既而當國者知糾之不小白故拒糾而召小白先入於國而奉以為君小白之立蓋齊國公議為社稷計也則小白乃齊國之所共戴而糾特魯君之所私納故曰齊小白言其當為齊君也入者難詞雖齊大夫之所欲立然有魯兵見伐奉糾爭國故小白亦藉莒兵䕶送而後得入齊非如歸之易也與李氏廉曰春秋書納七皆不當納也糾不書公子㨗菑同公之伐戰與晉之弗克納異糾㨗菑以庶孽書納蒯瞆以世子亦書納蒯瞆無親之罪大也蒯瞆得書世子而糾㨗菑不書公子者書世子以著靈公之失也楚之納頓子納公孫寧儀行父齊之納北燕伯皆内弗受之謂也糾郜鼎同此義又曰公子入國而繫國者齊小白莒去疾齊陽生皆宜有國者也汪氏克寛曰杜氏注小白僖公庶子子糾小白庶兄公羊謂小白稱入為簒詞榖梁謂小白不讓子糾太史公序小白次子糾皆以子糾為兄小白為弟且謂皆僖公子韓宣子亦謂齊桓衞姬之子有寵於僖而程子謂襄公子也據左傳公子小白公子糾䝉襄公立而言今考小白子糾其爲僖公或襄公之子則不可考然以經考之忽繫鄭而突不繫鄭羈繫曹而赤不繫曹則嫡庶之辨也㨗菑不繫邾而書弗克納則長幼之辨也今小白繫齊則鄭忽曹羈之例也糾不稱子而稱納則㨗菑之例也是則小白當立而糾不當立明矣以經别傳之真偽則公榖杜氏不可信也況夫子盛稱管仲之功而不責其忘君事讎别其長幼是非豈不灼然可見哉魯莊忘讎而納其公子奉少奪長興師以助不正卒至於敗書公伐齊書納而罪惡著矣又曰有當入而言入者難詞也有不當入而言入者逆詞也許叔之入小白之入當入者也鄭突之入衞朔之入不當入者也齊陽生入于齊與此書法雖同然下書陳乞弑荼則知陽生之入所以簒荼矣讀經當合上下文觀之案左氏經文公伐齊納子糾繫子於糾而不繫於小白是以子糾為兄也公榖經文雖稱糾不繫子而公羊謂糾宜君榖梁謂糾可立亦以子糾為兄也三傳注疏竝無異説其見於他書者荀卿謂桓公殺兄史記序糾於小白之上蓋皆以子糾為兄也獨薄昭與淮南王書謂齊桓殺弟韋昭注曰子糾兄也言弟者諱也趙氏汸曰時漢文於淮南為兄故避兄而言弟是則薄昭所云乃一時遷就之語而非不易之論也程子及胡傳據公榖經文稱糾不繫子遂直以糾為弟而諸家多因之夫公榖之傳所以釋經也取其經而背其傳不㡬進退兩無據乎朱子論語或問引用程子説而其荅潘友恭書又引荀卿殺兄之語而以薄昭所云為未必然蓋兩存之而未嘗有所偏主也今故從朱子而兩存之再考叔向謂齊桓為衛姬之子有寵於僖史記謂襄公次弟糾次弟小白又謂小白母衞女也其説與叔向同杜氏預謂小白僖公庶子子糾小白庶兄是俱以糾與小白為僖公子也獨榖梁謂無知弑襄公公子糾公子小白出亡啖氏助趙氏匡主榖梁之說謂襄被弑二公子乃出奔以二公子為襄公之子程子及胡傳皆主之二説未詳孰是亦竝存焉秋七月丁酉葬齊襄公集說杜氏預曰九月乃葬亂故曰張氏洽曰無知已誅可以葬矣陳氏際泰卒王姬不得不卒也葬齊襄公不得不葬也八月庚申及齊師戰于乾時我師敗績乾音干地乾時杜注齊時水在樂安縣界支流旱則竭涸故曰乾時今樂安故城在山東青州府博興縣北時水在縣南左傳師及齊師戰于乾時我師敗績公喪戎路傳乘而歸秦子梁子以公旗辟於下道是以皆止胡傳案左氏戰于乾時公喪戎路傳乘而歸則敗績者公也能與讎戰雖敗亦榮何以不言公貶之也公本忘親釋怨欲納讎人之子謀定其國家不為復讎與之戰也是故沒公以見貶若以復讎舉事則此戰為義戰當書公冠於敗績之上與沙隨之不得見平丘之不與盟為比以示榮矣惟不以復讎戰也是故諱公以重貶其忘親釋怨之罪其義深切著明矣集說趙氏匡曰内敗不書此書者納讎喪師以惡内也劉氏敞曰此言敗何公佚獲也戰而大敗蓋僅然後免爾師敗恥也佚獲辱也恥可言辱不可言也公羊曰内不言敗此言敗者伐敗也非也若魯實以復讎而戰者春秋不宜不言公若以復讎者在下故不言公春秋豈奪人臣子意哉臣有善言君行之則君善也奈何以復讎者在下則不以其美歸公哉程子曰及其師非卿也公戰諱敗凡言敗績大敗也小小勝負不書也趙氏鵬飛曰春秋内戰未有書敗績者皆為之諱今乾時之戰内忘父讎而外為齊納不當立之君莊公之過非徒日月之食也終身之罪也尚何足為諱哉或者以我伐齊為有復讎之名故聖人與之不諱其敗噫莊所納者讎之子而名為復讎有是理乎汪氏克寛曰書齊師書我師則非師少矣上文書公及齊大夫盟公伐齊則此戰乃公及之戰不待考傳而知之也然不書公而以微者之辭及戰者所以著公志在於納糾而不在於敵讎也經書内戰者三書敗外師者八言敗者勝彼言戰者為彼所勝也内諱敗言戰乃敗矣故奚升陘皆不言敗績升陘諱公不書為公諱敗也獨此書敗績讎湛氏若水曰魯與齊之讎不共戴天也莊公忘復之義為納糾之舉而與之戰其道已顛寘矣焉得而不敗及季氏本曰莊公輔邪奪正志在必爭乾時之戰書在魯以見齊人本不欲戰而魯决求一逞也之王氏錫爵曰齊讎國也而為納君即致敗衂其誰憐之九月齊人取子糾殺之左傳鮑叔帥師來言曰子糾親也請君討之管召讎也請受而甘心焉乃殺子糾於生竇召忽死之管仲請囚鮑叔受之及堂阜而税之歸而以告曰管夷吾治於髙傒使相可也公從之生竇杜注魯地史記作笙瀆賈逵曰句瀆也今山東兗州府曹州北有句陽古城即句瀆故地堂阜杜注齊地東莞蒙隂縣西北有夷吾亭鮑叔解夷吾縛於此因以為名今堂阜在山東青州府蒙隂縣西北公羊其取之何内辭也脅我使我殺之也榖梁外不言取言取病内也取易辭也猶曰取其子糾而殺之云爾十室之邑可以逃難百室之邑可以隱死以千乘之魯而不能存子糾以公為病矣胡傳取者不義之詞前書納糾不稱子者明不當立也此書殺糾復稱子者明不當殺也或奪或予於義各安春秋精意也仁人之於兄弟不藏怒焉不宿怨焉親愛之而已糾雖爭立越在他國置而勿問可也必請於魯殺之然後快於心其不仁亦甚矣後世以傳讓為名而取國者必殺其主以為一人心防後患意與此同流毒豈不逺哉故孟子曰五伯三王之罪人也仲尼之徒無道桓文之事者集說賈氏逵曰稱子者愍之甚劉氏敞曰此魯人殺也則其曰齊人取之何齊侯也内私人之國而奪焉外敗人之師而脅焉是取其子糾戮之而已矣蘇氏轍曰子糾之死魯殺之也其曰齊人取子糾殺之何也不予齊人之使魯殺其親也故使齊其尸之且曰有國而不能庇一人亦所以病魯也公羊曰稱子糾宜為君也或因公羊而益之曰此殺未踰年之君也夫子糾小白爭國未知孰宜為君也未知孰宜為君納而未得入而以為未踰年之君也可乎髙氏閌曰桓公殺子糾書齊人者并其國人罪之也書曰取殺之重之也爭張氏洽曰糾者齊桓公之兄弟也以其不當爭而立則為罪以其骨肉之至親則不可殺為齊桓者當列其罪以告諸人且明示親親之義而全其生則恩義兩得矣夫殺兄弟當目君而稱齊人者廢立之際殺生予奪寄於當國大臣之手毫釐之差霄壤之謬今齊大夫始以糾為先君之子而盟欲立之始謀不審已為罪矣及桓公得國又不體其君天倫之恩從議親之辟以赦其罪而必殺之廢興生死輕率甚矣故加子於糾又書齊人書取書殺以責其舉國君臣忘親失義之罪也家氏鉉翁曰此桓公殺之而書齊人殺子糾以路人絶之絶之於天倫所以大誅斥之也魯不能納糾又使受而甘心焉魯亦有罪矣白吳氏澂曰齊立小白魯亦立糾以與小白爭國小立而魯師還則糾乃一亡公子寄寓於魯者爾何罪而齊欲殺之乎今齊有君而魯又立糾是齊有二君矣勢固不兩立也魯兵戰敗力不敵齊故齊聲子糾爭國之罪偪魯殺之魯不能芘遂殺之於生竇殺之者雖魯從齊令也是猶齊人取之於魯魯以畀齊而殺之焉爾所以著子糾之死皆魯之罪也李氏廉曰子糾書法與子般子野同故公穀皆以為貴而當立殊不知前不書子責子糾以天倫之義此復書子責桓公以天倫之恩也汪氏克寛曰王者之道自修身正家以及於為國桓公殺子糾晉文殺懷公以取國夫子糾懷公論長幼之序雖不當立而桓文之殺亦非也以是得國而覇諸侯其本固已不正矣此仲尼之門五尺童子所以羞稱五覇也殺懷公之事不見於經非善之也舊史不存耳邵氏寶曰魯方伐齊納糾今取而殺之何其易也意出於齊而歸討於魯將誰欺乎又曰糾雖不當立然無可殺故納也不子殺也子之子之而可殺孰不可哉此齊人之罪也於魯何如取之者齊聼之者魯季氏本曰殺糾不言地殺之於魯也子糾之難召忽死之而春秋不書者蓋糾弟也桓公兄也召忽輔糾所事已不正矣孔子比之匹夫匹婦自經於溝瀆而不知也可以為萬世之公案矣姦黄氏正憲曰魯莊納糾有四罪忘讎德怨一輔邪正二事定復戰三既納復殺四已張氏溥曰鄭莊公之克段也使餬其口於四方而春秋猶惡其志存於殺小白既為君矣糾避焉可也必取而殺之是糾罪薄於太叔而小白忍於鄭莊也蔇之盟魯許納糾敗於乾時即聽殺糾其初盟也不知擇義其既敗也不知守信魯自是為齊役矣浚洙以備何益乎冬浚洙洙音殊公羊洙者何水也浚之者何深之也曷為深之畏齊也曷為畏齊也辭殺子糾也榖梁浚洙者深洙也著力不足也胡傳固國以保民為本輕用民力妄興大作邦本一摇雖有長江巨川限帶封域洞庭彭蠡河漢之險猶不足憑而况洙乎書浚洙見勞民於守國之末務而不知本爲後戒也集說孫氏覺曰春秋之義凡興作書之皆罪殺張氏洽曰洙水在魯北齊伐魯之道也魯雖子糾猶有畏齊之心故浚而深之以備齊師之至書此以見其不能明政刑結人心使大國畏之而重勞民力務以深險自守不知困民於無益古人徹彼桑土綢繆牖户之意不如是之陋也汪氏克寛曰城郭溝池有國者之所不可廢然有當守而不可不守者有不必徒恃於守者春秋書滅下陽書城虎牢責虢鄭之不能守也書浚洙書内築城邑者一十有四所以責魯之徒恃於守而重困民力也湛氏若水曰非所當作而作雖時非也丁莊王十酉三年十年齊桓二年晉緡二十一年衞惠十六年蔡哀十一年鄭厲十七年子儀十年曹莊十八年陳宣九年杞靖二十年宋閔八年秦武十四年楚文六年春王正月公敗齊師于長勺勺上酌反成長勺杜注魯地路氏曰王以商民六族錫魯公有長勺氏尾勺氏此商民所居也左傳十年春齊師伐我公將戰曹劌請見其鄉人曰肉食者謀之又何間焉劌曰肉食者鄙未能逺謀乃入見問何以戰公曰衣食所安弗敢專也必以分人對曰小惠未徧民弗從也公曰犧牲玉帛弗敢加也必以信對曰小信未孚神弗福也公曰小大之獄雖不能察必以情對曰忠之屬也可以一戰戰則請從公與之乘戰于長勺公將鼓之劌曰未可齊人三鼓劌曰可矣齊師敗績公將馳之劌曰未可下視其轍登軾而望之曰可矣遂逐齊師既克公問其故對曰夫戰勇氣也一鼓作氣再而衰三而竭彼竭我盈故克之夫大國難測也懼有伏焉吾視其轍亂望其旗靡故逐之胡傳齊師伐魯經不書伐意責魯也詐戰曰敗敗之者為主或曰長勺魯地而齊師至此所謂敵加於己不得已而後應者也疑若無罪焉何以見責乎善為國者不師善師者不陣善陣者不戰故行使則有文告之詞而疆場則有守禦之備至於善陣德已衰矣而況兵刃相接又以詐謀取勝乎故書魯為主以責之皆已亂之道寡怨之方王者之事也集說杜氏預曰齊人雖成列魯以權譎稽之列成而不得用故以未陳為文孔氏穎逹曰例稱敵未陳曰敗某師皆陳曰戰此傳稱齊人成陳擊鼓不應稱敗齊師故解之孫子兵書曰誓稽之使失其先後謂稽留彼敵不時與戰使先後失其次第魯以曹劌之語權謀譎詐以稽留之列成而不得用與未陳相似故以未陳為文時啖氏助曰凡魯勝則曰敗某師孫氏復曰報乾之戰也斥言公者惡其伐齊納糾喪師乾時不自悔過復敗齊師於此也爭張氏洽曰書敗而不書戰惡詐戰也用民力以戰古有司馬車戰之法定日刻期兩陳相向以决勝負雖敗而奔亦無多殺之禍若詐戰而出其不意或舉衆而覆之則不仁之甚者也莊公政刑不修制軍無法齊師之來以詐謀而僥倖一勝春秋深譏之程氏端學曰不書伐而書敗某師書法與隱十年公敗宋師于菅同汪氏克寛曰或謂莊公與讎國為敵聖人幸其勝而志之也嗟夫使莊公於即位之初悉索敝賦以問罪於齊而有再戰再勝之功則為善者也乃挾不能納糾之憤而逞其狙詐何有於敵讎茍以為敵讎則侵宋再敗宋師非敵讎也邵氏寶曰敗之云者以詐戰之法施之或謂齊已陳而鼓之何詐之有不知劌之稽師所以為詐也自後世兵家言之可謂勝算矣三代之用師必不若是斯民也三代之所以直道而行也何獨於兵而不然此聖人所以待斯世之意也下金氏賢曰觀長勺之勝則魯與齊戰我豈盡出其哉使莊公移乾時之戰於魯桓遇弑之時移長勺之戰於齊襄未死之日則勝亦榮也敗亦榮也莊公之師不用之以復父讎而用之以納子糾也可勝歎哉案外兵加魯以主客為予奪意責外則書來戰意責内則勝書敗某師敗書及某師戰此定法也魯莊於齊既忘仇讎而修甥舅之禮一旦乘齊之喪納讎子而伐之及齊師來伐又憤然而與戰故經以魯為主而不書齊伐胡傳以為意責魯不可易矣或謂閔魯積弱又謂齊為讎國故幸其勝而喜之然則乘丘及鄑公先侵宋既無强弱之嫌宋非讎國復何所喜乃亦不言宋伐止書敗宋師也邪故諸為異論者悉擯不取二月公侵宋此書侵之始公羊曷為或言侵或言伐觕者曰侵精者曰伐戰不言伐圍不言戰入不言圍滅不言入書其重者也集說孫氏復曰公既敗齊師于長勺又退而侵宋結怨二國劉氏敞曰曷為或言侵或言伐無鐘鼓曰侵有鐘鼓曰伐侵淺事也伐精事也天杜氏諤曰周官九伐之法負固不服則侵之此蓋子命諸侯使侵之非列國可得而專春秋之世侵伐戰圍者甚衆必詳録之以示譏也張氏洽曰莊公以僥倖得志於齊遂舉無名之師以掠宋境此所以致郎之師也黄氏仲炎曰稱罪而討其國曰伐不稱罪而掠其境曰侵即書所謂侵于之疆是也春秋書侵伐雖有異詞而均之為挾私逞忿無王命而專兵焉爾克陳氏深曰凡書侵伐不書勝敗掠而還也罪汪氏寛曰趙氏纂例駁三傳侵伐之説而謂聲致討曰伐無名行師曰侵然齊桓侵蔡劉文公侵楚豈可謂無名行師乎文定改之曰潛師掠境曰侵其義當矣三月宋人遷宿此遷國之始榖梁遷亡辭也其不地宿不復見也遷者猶未失其國家以往者也胡傳其曰遷宿者宿非欲遷為宋人之所遷也懷土常物之大情遷國重事也雖違害就利去危即安猶或恐沈於衆不肯率從而況廹於横逆非其所欲棄久宅之田里刈新徙之蓬藋道途之勤營築之勞起怨諮傷和氣豈不惻然有隱乎肆行莫之顧也其不仁亦甚矣凡書遷不再貶而惡已見矣集說范氏甯曰為人所遷則無復國家故曰亡辭閔二年齊人遷陽亦是也國亡不復見經不言滅者言滅則殺其君滅其宗廟社稷就而有之不遷其民謂自遷者僖元年邢遷于夷儀成十五年許遷于葉之類是也彼二傳曰遷者猶得其國家以往者也此傳云遷者猶未失其國家以往互文也陸氏淳曰啖子曰凡言遷者有二義如宋人遷宿齊人遷陽是移其國於國中而為附庸也如邢遷于夷儀衛遷于帝丘之類或自請遷或見彊遷皆猶為列國故不言某人遷之言所遷之地但言移國都而已非為附庸也趙子曰凡非所遷而遷之其惡著矣曰宿微國天子封之宋人遷之其惡可知孫氏復劉氏敞曰遷者何遷之者何遷者其欲也遷之者非其欲也遷者其國家復見者也遷之者其國家不復見者也宿者何國也有蘇氏轍曰凡諸侯遷國自遷曰某遷於某人遷而之曰某人遷某猶以為附庸也故不言滅亡王氏葆曰驅而屬之為附庸自是宿不復見則亦矣宋閔所為如此閲三載而見弑於賊臣豈不曰天道好還哉難許氏翰曰遷之使未失其國家以往其義猶有所則是王澤之未竭也僖文以後有滅國無遷國矣以髙氏閌曰宿介於宋魯之間屬於宋而親魯宋人為貳於魯而遷之胡氏寧曰有不利焉意欲自遷則何惡矣或介乎大國為人之所遷者春秋閔之李氏廉曰左氏榖梁同公羊因而臣之之説亦是而不通之詞迂僻無義故不取遷汪氏克寛曰書遷國邑者三自遷者七宋遷宿齊紀郱鄑郚遷陽皆强遷之而取其地者也邢遷夷儀衞遷帝丘許遷葉夷白羽容城蔡遷州來皆以自遷為文者也然唯邢衞乃廹而自遷蔡許為人所遷然遷而不滅則曰某國遷於某遷而遂滅則曰某人遷某國也邢遷如歸齊桓得興滅繼絶之義春秋二百餘年之最善者後莫有繼之者矣夏六月齊師宋師次于郎公敗宋師于乘丘乘繩證反乘丘杜注魯地西漢泰山郡有乘丘縣顔師古曰即春秋乘丘也括地志乘丘在瑕丘縣西北三十五里今山東兗州府滋陽縣西有古瑕丘城左傳夏六月齊師宋師次于郎公子偃曰宋師不整可敗也宋敗齊必還請擊之公弗許自雩門竊出蒙皋比而先犯之公從之大敗宋師于乘丘齊師乃還榖梁次止也畏我也胡傳齊宋輕舉大衆深入他境肆其報復之心誠有罪也魯人若能不用詐謀奉其辭令二國去矣偷得一時之㨗而積四鄰之忿此小人之道故次者不以其事勝者不以其理交譏之集説趙氏匡曰公羊云齊與伐而不與戰故言伐也案經文實未伐而敗故不言伐爾又曰我能敗之故言次若然則但書敗義不明乎何假言次而劉氏敞曰齊宋輕用其衆揚兵整旅以徑人之國不名所伐欲闚利乘便快其攻取之意故使魯人恫疑憂恐出竒計詐謀以自救覆滅其軍百姓父子無辜䧟沒此人君貪利輕用其衆之罪也又杜氏諤曰公不能復讎而反納子糾以啟齊之宼侵宋以衆其敵致二國同次于郎公雖敗宋不足為羙不許氏翰曰齊桓始入未撫其民而輕用之是以再得志於魯晉文之入五年而後用其民蓋監此也外陳氏傅良曰其言次何以桓公之圖伯而未集也師未有書次者桓公所甚汲汲者魯也茍不得魯不可以合諸侯宿師于郎將以詘魯耳而北杏之㑹不至鄄㑹不至則猶未得志於魯也於是書次用見桓之未得志於諸侯也是故書齊師宋師次于郎以志齊伯之難書楚子蔡侯次于厥貉以志楚伯之難於此焉可以知人心矣不茍於從齊是人心猶有周也不茍於從楚是人心猶有晉也有王者作天下歸往之矣於李氏廉曰齊之忿魯始於子糾之納宋之忿魯始公之侵而其實則齊桓挾宋以圖伯也故胡氏發明於次敗之旨而陳氏深察於齊宋之心二説兼用乃備師汪氏克寛曰齊宋書師著兵力之强也書次見其出之無名也魯書公書敗見其以千乘之君而勝人不以其道也記稱戰于乘丘馬驚敗績公隊佐車授綏則雖能勝宋魯亦殆矣此春秋所以目公而譏之也與秋九月荆敗蔡師于莘以蔡侯獻舞歸莘所巾反舞榖作武莘杜注蔡地在今河南汝寧府汝陽縣境左傳蔡哀侯娶於陳息侯亦娶焉息媯將歸過蔡蔡侯曰吾姨也止而見之弗賓息侯聞之怒使謂楚文王曰伐我吾求救於蔡而伐之楚子從之秋九月楚敗蔡師于莘以蔡侯獻舞歸公羊蔡侯獻舞何以名絶曷為絶之獲也榖梁其言敗何也釋蔡侯之獲也以歸猶愈乎執也胡傳蔡侯何以名絶之也凡書敗書滅書入而以其君歸皆名者為其服為臣虜故絶之也若蔡獻舞潞嬰兒沈嘉許斯頓牂胡豹曹陽邾益之類是矣楚人滅夔以夔子歸獨不名者夔子以無罪見討雖國滅身為臣虜其義直其辭初不服也是以獨假之爵而不名也春秋之法諸侯不生名失地則生而名之比於賤者欲使有國之君戰戰兢兢長守富貴無危溢之行也集說孔氏穎逹曰荆楚一木二名故以為國號亦得二名終莊公之世經皆書荆僖之元年乃書楚人伐鄭以後常稱楚也又曰榖梁傳曰以歸猶愈乎執也杜於隱七年注云但言以歸非執也則以歸者直將與共歸不被囚執其恥輕於執也聖孫氏復曰荆自方叔薄伐之後入春秋肆禍復甚王不作故也行髙氏閌曰王室衰微不能自救齊桓始入威令不是以荆人强暴敢於肆毒也朱子語類曰荆楚初書國進稱人從卑稱也後漸大故稱爵至吳氏􅊹曰蔡侯為荆所獲而以之歸留於楚九年莊十九年卒之李氏廉曰楚文王立於莊之四年方是時承武王烈内有鄧曼為之母外有令尹鬭祁莫敖屈重等為之臣為㑹漢汭而隨人不能乘其喪鄧不血食而三甥無以謀其暴於是楚勢不可遏矣莊之十年齊桓方謀魯以圖伯於東而荆亦執蔡以爭强於南故執君滅國之禍皆始於此年又曰楚書荆始此年書荆人始莊二十三年書楚人始僖元年書楚大夫姓名始僖四年書楚子始僖二十一年汪氏克寛曰史記周文王封祝融之苖裔熊繹於楚蠻封以子男之田夷王時王室微熊渠甚得江漢間民和熊渠立為王厲王暴虐熊渠畏其伐去王號十一世至熊通伐隨令請王室尊為王王不聼乃自立為武王子文王始强陵江漢間小國敗蔡即此時也公榖皆謂書荆以州舉杜預謂荆其夲號後改為楚今考檀弓謂夫子將之荆晉語叔向謂荆敗我則荆或是楚故號然商頌稱荆楚則荆改號楚已久或者如郳改號小邾而仍稱郳申稱滕薛郳蓋春秋略之故舉其故號耳嘗考近楚之國自申息諸國既亡惟陳蔡為密邇故二國屢受侵伐且見滅而僅存蔡之君自獻舞已降死於楚者三焉春秋之書楚患始之以荆敗蔡而終之以楚公子申伐陳聖人蓋傷之也冬十月齊師滅譚譚子奔莒此滅國之始陵譚杜注譚國在濟南平縣西南今山東濟南府歴城縣東南七十里有譚城左傳齊侯之出也過譚譚不禮焉及其入也諸侯皆賀譚又不至冬齊師滅譚譚無禮也譚子奔莒同盟故也公羊何以不言出國已滅矣無所出也胡傳滅而書奔責不死位也不書出國亡無所出也國滅身奔而不能守其富貴何以書爵乎已無取滅之罪為横逆所加而力不能勝至於出奔則亦不幸焉爾矣其義蓋未絶也案左氏齊侯之出也過譚譚不禮焉及其入也諸侯皆賀譚又不至責其失事大之禮可矣坐此見滅可乎齊師滅譚譚子奔莒楚人滅弦弦子奔黄秋滅温温子奔衞三國所以皆存其爵不比於失地之君而名之也然則吳滅徐徐子章羽奔楚何以獨名案左氏吳伐徐徐子斷其髪攜其夫人以逆吳子既已屈服而後奔豈有興復之志乎獨書名所以絶之也春秋之義雖在於抑强扶弱又責弱者不自强於為善也故其書法如此集說范氏甯曰譚子國滅不名蓋無罪也凡書奔責不死社稷孫氏覺曰春秋之法滅有三例國滅而其君死之者書滅莊公十三年齊人滅遂是也國滅而其君出奔者書奔齊師滅譚譚子奔莒是也滅其國以其君歸者書歸僖二十六年楚人滅夔以夔子歸是也春秋之義就其可責者責之不責其所不能也强大之國以兵加弱小之諸侯滅人之國而殺人之君其罪不容誅也國為之滅而身為之死者非無罪聖人方深誅滅者之罪不得不少緩死者之責故滅而其君死之者但書曰滅不更出死者之名以深罪滅其國而殺其君也土地不能守宗社不能全愛其死而奔亡於外者則書滅書奔罪其不能死社稷也國為之滅而民人為之有也宗祀又有不能全焉是有不同天之讎而乃茍完其一身隨之歸而為之臣蓋其罪不可勝誅矣故書滅書歸又書名也滅人之國者其例則三而其罪則一為人所滅者其罪之輕重有三科焉此春秋所以辯罪惡之深淺而示誅責之輕重也胡氏寧曰管仲相桓公覇諸侯只是詭遇如譚有恨便滅之鄣可取便降之若學聖人則行一不義殺一不辜而得天下不為也薛氏季宣曰五伯桓公為盛威陵諸侯以圖伯功首滅天子之建侯以肆威耳儒者之不道也宜哉陳氏傅良曰書滅始於此紀侯大去宋人遷宿未可以言滅必若齊桓而後可以言滅矣然則滅國自齊桓乎前此矣曷為以首滅罪齊微桓公則滅國之禍不接迹於天下春秋滅國三十六五伯為之也張氏洽曰齊桓方有志為政於天下非特不能興滅繼絶而以私憾覆滅小國其罪大矣李氏廉曰啖子曰凡滅國直書滅者罪來滅者甚於見滅者言力屈而死也如蕭邢之類則遂黄頓江六庸舒蓼甲氏留吁舒庸萊舒鳩賴蔡州來巢不書君奔當入此例凡書滅又書其君奔者則兩罪之且責其不死社稷也如譚弦温徐之類是也凡書滅又書以歸又書名者既責其不死又無興復之志如潞嬰兒沈嘉許斯頓牂胡豹之類也其書滅鄫非滅而書滅下陽不當書滅而書滅則又變例也以偪陽子歸不書陸渾子奔楚不書免其罪也胡髠沈盈一戰而身國俱亡也楚滅陳不書所奔陳無君也夔子不名無罪也徐子書名己屈節也已上胡氏皆用啖子之説故詳録之左氏曰用大師曰滅公羊曰滅者亡國之善辭上下之同力也皆可通外傳曰軍譚遂而不有也言以地分諸侯蓋誇大桓公之詞耳汪氏克寛曰齊桓圖伯之初滅譚滅遂降鄣遷陽專以威力陵暴小國以恐懼天下之諸侯其後雖能存三亡國而功不足以掩過矣春秋書荆敗蔡師于莘以蔡侯獻舞歸齊師滅譚譚子奔莒則齊桓亦熊貲之為耳不待貶絶而惡自見矣戊莊王十戌四年十有一年齊桓三年晉緡二十二年衛惠十七年蔡哀十二年鄭厲十八年子儀十一年曹莊十九年陳宣十年把靖二十一年宋閔九年秦武十五年楚文七年春王正月夏五月戊寅公敗宋師于鄑鄑子斯反州鄑杜注魯地當在今兗府境與元年在都昌縣西者乃二地左傳十一年夏宋為乘丘之役故侵我公禦之宋師未陳而薄之敗諸鄑凡師敵未陳曰敗某師皆陳曰戰大崩曰敗績得儁曰克覆而敗之曰取某師京師敗曰王師敗績于某集說孫氏復曰此言五月戊寅公敗宋師于鄑者甚之也公二年之中三敗齊宋之師可謂甚矣王氏葆曰宋既敗而不知懲魯既勝而不知止其黷武甚矣張氏洽曰宋師再至再敗兵禍旋及其君魯雖再勝其國亦困於兵矣莊趙氏與權曰宋報復之師也屢役不勝可以已矣公以兵始禍屢勝鄰國能無悔乎書汪氏克寛曰傳言侵我經不侵與長勺義同秋宋大水左傳秋宋大水公使弔焉曰天作淫雨害於粢盛若之何不弔對曰孤實不敬天降之災又以為君憂拜命之辱臧文仲曰宋其興乎禹湯罪已其興也悖焉桀紂罪人其亡也忽焉且列國有凶稱孤禮也言懼而名禮其庶乎既而聞之曰公子御説之辭也臧孫逹曰是宜為君有恤民之心公羊何以書記災也榖梁髙下有水災曰大水胡傳凡外災告則書所謂災者害及民物如水火兵戎之寇是也諸侯於四隣有恤病救急之義則告為得禮而不可以不弔故四國同災許人不弔君子以是知許之先亡也凡志災見春秋有謹天戒恤民隱之心王者之事也集說杜氏預曰公使弔之故書不孫氏復曰水不潤下也春秋之世災異多矣可悉書故外災或舉其一或舉其二以見天下之異也此年秋宋大水二十年秋齊大災僖十六年隕石于宋五六鷁退飛過宋都昭十八年宋衞陳鄭災之類是也不劉氏敞曰此宋大水也何以書弔焉爾主人告災告異諸侯弔災不弔異告異則書之弔災則書之又曰公羊云外災不書此書者及我也案春秋内其國而外諸夏若水災及魯自可記魯災而已無為詳宋而略我也榖梁曰外災不書此何以書王者之後也非也杞亦王者之後未嘗記其災何與又曰異者天所以譴人君使修德也故異至則内自省而已耳非所待於外也不當告告為失禮失禮則書災者害之及民物者也諸侯於四鄰固有恤病救急之義是所待於外也不可不弔弔為得禮得禮則書不吕氏祖謙曰諸國告則書其顯然為衆所知者亦待告也春秋之世災異多矣聖人不能盡書取其一二甚者以為後世戒張氏洽曰比嵗交兵怨不廢禮蓋古意之猶存而未冺者也閔公不能踐敬之一言而以靳宋萬自禍乃董氏所謂出災害以譴告之而不知變者春秋之存災異可不察哉烏張氏溥曰兵敗於外水災於内宋得而不亂冬王姬歸于齊左傳冬齊侯來逆共姬胡傳案周制王姬嫁於諸侯車服不繫其夫下王后一等禮亦隆矣春秋之義尊君抑臣其書王姬下嫁曷為與列國之女同辭而不異乎曰陽倡而隂和夫先而婦從天理也述天理訓後世則雖以王姬之貴其當執婦道與公侯大夫士庶人之女何以異哉故舜為匹夫妻帝二女而其書曰嬪于虞西周王姬嫁於齊侯亦執婦道成肅雍之德其詩曰曷不肅雍王姬之車自秦而後尤欲尊君抑臣為治而不得其道至謂列侯尚公主使男事女夫屈於婦逆隂陽之位又豈所以為治也春秋書王姬侯女同詞而不異垂訓之義大矣集說陸氏淳曰公榖皆云志其過我也案書其歸為魯主婚爾榖梁他處卽云為之中者歸之與此自相反矣書孫氏復曰羣公受命主王姬者多矣唯元年與此者惡公忘父之讎再與齊接婚姻也劉氏敞曰何以書我主之也我主之則曷為不言我主之常事不書必非常然後書又曰杜氏曰不書齊侯逆不見公非也魯為王主婚若齊侯來逆女而公輒不見何謂主婚矣乃常事自不書者也王氏葆曰主襄公之婚其罪大故書之詳主桓公之婚其罪小故書之略張氏洽曰王姬即齊侯之夫人王姬是也魯於齊為讎然已易世故齊侯之來逆不書止書王姬之歸而已王女下嫁無異於諸侯之女適人者蓋夫婦之道乃三綱之所繫不可不早正故因其始嫁而一之於諸侯女歸之辭焉若曰往之女家必敬必戒常禮不可紊也固趙氏鵬飛曰魯主之也魯周之懿親也為王主婚多矣惟莊公之世兩書王姬歸于齊所以見莊之無父也不然同姓主婚常事爾何以書之不書齊逆亦常事也案王姬歸齊春秋兩書之皆以魯主婚也左氏稱齊侯來逆共姬則魯之主婚明矣公榖以此年為過我恐無可據當從陸氏淳劉氏敞所駁為是己莊王十亥五年十有二年齊桓四年晉緡二十三年衞惠十八年蔡哀十三年鄭厲十九年子儀十二年曹莊二十年陳宣十一年把靖二十二年宋閔十年秦武十六年楚文八年春王三月紀叔姬歸于酅榖梁國而曰歸此邑也其曰歸何也吾女也失國喜得其所故言歸焉爾胡傳莊公四年紀侯去國叔姬至此始歸于酅者紀侯方卒故叔姬至此然後歸爾歸者順詞以宗廟在酅歸奉其祀也魯為宗國婦人有來歸之義紀既亡矣不歸於魯所謂全節守義不以亡故而虧婦道者也魯人髙其節義恩禮有加焉是故其歸于酅其卒其葬史冊悉書夫子修經存而弗削使與衛之共姜同垂不朽為後世勸若夏侯令女曹爽之弟婦也寡居守志父母欲奪而嫁之誓而弗許而曰曹氏全盛之時尚欲保終況今衰亡何忍棄之聞者為之感動其間叔姬之風而興起者乎集説何氏休曰書歸酅者痛其國滅無所歸也酅不繫齊者時齊聼後五廟故國之范氏甯曰酅紀邑也紀季所用入于齊者紀國既滅故歸酅江熙曰叔姬守節積有年矣紀季雖以酅入于齊不敢懷貳然襄公豺狼未可闇信桓公既立德行方宣於天下是以叔姬歸於酅魯喜其女得申其志杜氏預曰紀侯去國而死叔姬歸魯紀季自定於齊而後歸之全守節義以終婦道故繫之紀而以初嫁為文賢之也之陸氏淳曰啖氏云稱紀言紀之婦也書歸善叔姬全婦道也蓋紀侯大去其國之後死於他國而叔姬還魯至是乃歸于酅羙其能全婦道故特書之劉氏敞曰紀君奔國滅紀侯之沒尚不書叔姬何以得書春秋欲因叔姬之行以明紀季之義言季之以酅入齊非利之也凡欲存國耳此其效也蘇氏轍曰叔姬始以媵歸紀紀侯去國無歸而叔姬歸魯及紀季自定於齊而後歸酅善其得禮故書稱紀叔姬明非嫁也滅陳氏傅良曰紀亡矣曷為謂之紀叔姬存紀也國而復見者善辭也是故紀亡書紀叔姬陳亡書陳災既張氏洽曰叔姬伯姬之娣隱七年歸于紀者伯姬死叔姬實攝内事而能不以國之存亡貳其事君子之心不以身之榮悴變其奉宗廟之志故必歸于酅以終其身易曰眇能視利幽人之貞於叔姬見之矣可不録其本末以示婦道之正乎家氏鉉翁曰夫死無子而終於父母家者非正也終於夫家正也公陳氏深曰公羊傳其國亡矣徒歸於叔爾師氏探羊說以為未詳而謂紀侯既卒叔姬歸於父母之國可也嫂叔不通問況可歸於叔乎以歸為婦人初嫁之辭今叔姬于酅亦言之蓋譏之也東海亦謂失婦人以禮自防之義其説固通然春秋於叔姬當隱七年歸紀雖媵亦特書之以其賢也至此已三十四年紀國已亡歸酅奉祀以終其身非其婦節可重聖筆何故書卒又書葬以為婦道之勸以是觀之三子之説殆不然也則汪氏克寛曰叔姬雖伯姬之娣然諸侯夫人既卒次妃攝治内事故叔姬雖媵妾當奉紀之祭祀又曰或謂叔姬歸於叔非其所歸亂也夫叔姬歸于酅酅乃紀五廟之所在叔姬之歸以奉祭祀而非歸於紀季也春秋書内女惟紀叔姬宋伯姬録本末甚詳非賢而得若是乎酅季氏本曰叔姬從紀侯去國至此紀侯卒而始歸宗廟在焉義當歸也卓氏爾康曰叔姬歸酅一事足風千古故先書叔姬之歸以本之惟書叔姬故於伯姬之歸卒亦詳不然魯女之嫁於諸侯多矣何獨伯姬乎讀張氏溥曰莊三年紀季以酅入齊左氏云紀判矣者疑焉紀未亡而酅先入恐季之不能守也及紀侯去國而薨叔姬歸酅矣然後益知紀季之賢也惟紀季能存宗廟惟叔姬能歸宗廟其兄失國而其弟存之夫人卒而娣攝之春秋録焉案紀侯失國而薨叔姬歸魯至是始歸于酅杜氏預劉氏敞蘇氏轍皆同江氏熙亦曰叔姬來歸不書非歸寧亦非大歸也然叔姬之志在於歸酅以奉祀不終居魯故胡傳有不歸於魯之説夏四月秋八月甲午宋萬弑其君捷及其大夫仇牧捷公作接左傳十二年秋宋萬弑閔公於蒙澤遇仇牧於門批而殺之遇大宰督於東宫之西又殺之立子游羣公子奔蕭公子御説奔亳南宫牛猛獲帥師圍亳蒙澤杜注宋地梁國有蒙縣今河南歸徳府商丘縣北有蒙澤縣南二十五里有蒙縣古城蕭杜注宋邑沛國蕭縣今縣屬江南徐州縣北十里有蕭城亳杜注宋邑蒙縣西北有亳城今歸德府商丘縣北有大蒙城皇甫謐所謂蒙為北亳是也公羊及者何累也弑君多矣舍此無累者乎孔父荀息皆累也舍孔父荀息無累者乎曰有有則此何以書賢也何賢乎仇牧仇牧可謂不畏彊禦矣其不畏彊禦奈何萬嘗與莊公戰獲乎莊公莊公歸散舍諸宫中數月然後歸之歸反為大夫於宋與閔公博婦人皆在側萬曰甚矣魯侯之淑魯侯之羙也天下諸侯宜為君者唯魯侯爾閔公矜此婦人妬其言顧曰此虜也爾虜焉故魯侯之羙惡乎至萬怒搏閔公絶其脰仇牧聞君弑趨而至遇之於門手劍而叱之萬臂摋仇牧碎其首齒著乎門闔仇牧可謂不畏彊禦矣榖梁及其大夫仇牧以尊及卑也仇牧閑也胡傳君弑而大夫死於其難春秋書之者其所取也大夫死於弑君之難而有不書者故知孔父牧息皆所取也夫仇牧可謂不畏彊禦矣然徒殺其身不能執賊無益於事也亦足取乎食焉不避其難義也徒殺其身不能執賊亦足為求利焉而逃其難者之訓矣何名為無益哉夫審事物之重輕者權也權重輕而處之得其宜者義也大宰督亦死於閔公之難削而不書者身有罪也惠伯死於子惡之難亦削而不書者非君命也召忽死於子糾之難孔子比於匹夫匹婦之諒自經於溝瀆而莫之知者所事不正也若仇牧茍息立乎人之本朝執國之政而君見弑不以其私也雖欲勿死焉得而勿死聖人書而弗削以為求利焉而逃其難者之勸也惟此義不行然後有視棄其君如土梗弁髦曽莫之省而三綱絶矣集說范氏甯曰仇牧扞衞其君故見殺以孔氏穎逹曰萬不書氏者釋例曰宋萬賈氏為未賜族案傳稱南宫長萬則為已氏南宫不得為未賜族也推尋經文自莊公以上諸弑君者皆不書氏閔公以下皆書氏未劉氏敞曰何以書賢也何賢乎仇牧仇牧之智則仇牧之忠則盡矣疾其疾而忘其力憂其憂而忘其生也賢劉氏克莊曰仇牧荀息殺身而不能執賊春秋猶之家氏鉉翁曰春秋書弑君而及其大夫者凡三人皆所以録死節也宋萬南宫萬也以討故去其族李氏廉曰孔父仇牧荀息胡氏皆以為名獨公榖啖子以孔父為書字疑公榖先君死之説亦通蓋考傳皆合也卓氏爾康曰太宰督與仇牧同死官位崇於牧操國重於牧削而不得書身有罪也當時督之見殺告䇿必先於牧削而不書夫子特筆冬十月宋萬出奔陳左傳冬十月蕭叔大心及戴武宣穆莊之族以曹師伐之殺南宫牛於師殺子游於宋立桓公猛獲奔衞南宫萬奔陳以乘車輦其母一日而至宋人請猛獲於衛衞人欲勿與石祁子曰不可天下之惡一也惡於宋而保於我保之何補得一夫而失一國與惡而棄好非謀也衞人歸之亦請南宫萬於陳以賂陳人使婦人飲之酒而以犀革裹之比及宋手足皆見宋人皆醢之胡傳案左氏宋萬弑閔公於蒙澤奔陳宋人請萬於陳以賂陳人使婦人飲之酒而以犀革裹之宋人醢萬然則賊已討矣曷為不書陳人殺萬而葬閔公乎夫天下之惡一也陳人不以萬為賊而納之又受宋人之賂而使婦人飲之酒是與賊為黨非政刑也特書萬出奔陳而閔公不葬以著陳人與賊為黨之罪而不能正天討其法嚴矣故曰春秋成而亂臣賊子懼集說劉氏絢曰弑君叛國凡民罔不憝況均諸侯哉書所奔之國則受之之罪亦自見也張氏洽曰陳容其奔罪已大矣受賂而後歸之與所謂殺其人汙其宫而瀦焉之意何其異哉陳氏深曰不曰宋人殺萬而書宋萬出奔陳歸惡於陳也陳納之又受宋賂而後歸之黨惡之罪不可掩矣吳氏􅊹曰陳人當如昔年之執州吁者以執萬今乃受其奔是為逆賊之逋逃主也李氏廉曰經書外大夫出奔三十五始於宋萬之汪氏克寛曰陳人既受賊及貪賄而後以狙詐戮則非天討矣慶父弑閔公奔莒莒人亦受賂而後歸之及境而縊事與此同蓋亦不能正天討故閔公亦不書葬也里克甯喜皆已殺而卓剽不書葬蓋晉衞討亂臣不以其罪而又不以君禮葬卓剽也蔡般未討而蔡景書葬乃變例而責諸侯之不能討賊也考經之上下文與經之前後事而其義見矣屬辭比事春秋教也此之謂也季氏本曰書宋萬出奔陳者幸宋之臣子猶知賢桓公而立之以逐萬也豈可遂謂宋無人哉卓氏爾康曰宋萬奔陳賂陳得萬而醢之受賂者固有罪非宋之罪也茍得賊行誅信大義以快人心可矣其得賊之法安足問焉案宋萬既討不書宋人殺萬而止書宋萬奔陳者責陳人受賊且取賂也或併罪宋人緩討逸賊則未察當日情事而無以服宋臣子之心矣萬勇而多力又執大權弑君殺大臣立子游而遣師圍亳勢彊若此蕭叔與五公之子孫以曹師伐之構兵兩月然後殺子游而立桓公豈能禁萬之逸也乃用賂請萬於陳得而醢之宋可謂有臣子矣何得與陳竝譏乎然以視衞石碏討州吁之義則終為有間故宋閔不書葬與魯閔同汪氏克寛之説得之庚僖王子元年十有三年齊桓五年晉緡二十四年衞惠十九年蔡哀十四年鄭厲二十年子儀十三年曹莊二十一年陳宣十二年把靖二十三年宋桓公御說元年秦武十七年楚文九年春齊侯宋人陳人蔡人邾人會于北杏齊侯榖作齊人北杏杜注齊地當在今山東兗州府東阿縣境左傳十三年春會于北杏以平宋亂遂人不至榖梁是齊侯宋公也其曰人何也始疑之何疑焉桓非受命之伯也將以事授之者也曰可矣乎未乎舉人衆之辭也胡傳桓何以及四國之微者㑹是宋公邾子也然則何以稱人春秋之世以諸侯而主天下㑹盟之政自北杏始其後宋襄晉文楚莊秦穆交主夏盟跡此而為之者也桓非受命之伯諸侯自相推戴以為盟主是無君矣故四國稱人以誅始亂正王法也或曰桓公始平宋亂遂得諸侯故四國稱人言衆與之也集說范氏甯曰言諸侯將權時推齊侯使行伯事㑹杜氏預曰宋有弑君之亂齊桓欲修伯業故于北杏以平之皆孫氏復曰周禮九命作伯得專征諸侯若五伯者非命伯召伯賜齊侯命尹氏䇿命晉侯春秋皆不録之故孟子曰三王之罪人又曰北杏之㑹桓公獨書爵者孔子傷周道之絶也桓公既入乘天子衰季將伯諸侯乃合宋人陳人蔡人邾人於此首圖大舉夫欲責之深者必先待之重故北杏之㑹獨書其爵以與之侯蘇氏轍曰齊桓始合諸侯以平宋亂自是遂得諸故四國皆稱人言衆與之也僖二十八年晉文公與齊宋秦敗楚于城濮三國皆稱師蓋春秋之書始得諸侯者好㑹則稱人兵㑹則稱師以示衆與之也至襄八年晉悼公㑹諸侯之大夫於邢丘改命朝聘之數儉而有禮則大夫亦皆稱人蓋亦衆與之耳由楊氏時曰春秋之世以諸侯而主天下㑹盟之政北杏之㑹始以大夫而主天下㑹盟之政由文七年扈之盟始以諸侯主天下之政諸侯之無王也諸侯無天子之命而自相推戴桓公為盟主聖人茍不貶於其始則後世迹此而亂故獨書齊侯而宋陳蔡邾之君皆稱人則無王命而推齊侯為伯之罪著矣厥後宋襄晉文楚莊交爭天下之盟主而王道絶者襲桓之故也髙氏閌曰齊桓始謀合諸侯皆人之而獨舉齊爵抑揚之辭也宋陳氏傅良曰春秋非主兵皆序爵也於是序齊於之上而獨爵齊將予齊以伯也晉文公之簡曰晉侯齊師宋師秦師皆始伯之辭也自是無特相㑹者矣張氏洽曰東遷以來王政不行亂賊得志强暴肆行天下思得賢伯之興久矣齊桓一㑹而宋陳蔡邾竝來受命可見天下歸之㡬如水之就下然桓公茍能於宋萬初弑君之時舉兵討之則不勞告諭而天下翕然宗齊矣噬吕氏大圭曰方伯圖之未興也列國諸侯更相吞間有若鄭莊齊僖之流雖能雄長於一時而終未能執伯主之柄天下紛紛莫之綂一然心猶知有周也及伯圖既興則翕然唯伯主之為聽下以號令諸侯上以脅制天子一時氣勢聲燄赫奕中國賴以少事自是王命浸微矣是故有北杏之㑹則有幽之盟有幽之盟而後有葵丘之盟則宰周公㑹矣然猶未也至温之㑹則天王實狩焉比事以觀而善惡自見矣平黄氏震曰北杏之㑹齊桓圖伯之始也左氏以為宋亂或者因之以起事歟家氏鉉翁曰北杏之㑹惟齊侯書爵諸侯在㑹者皆書人書爵貴之也書人示衆望之所同屬也吳氏􅊹曰是時管仲為政四年矣教齊桓糾合諸侯以圖伯而始為此㑹也案上年宋有弑君之亂蕭叔大心僅能率五族殄亂賊立桓公御説平宋亂者定御說之位也以平宋亂㑹諸侯其名正矣然列國僅有陳蔡小國僅有邾併宋四國而已若魯若衛最近於齊而皆不㑹齊桓之信未能孚於諸侯也李氏廉曰春秋始伯之書有三北杏獨書齊侯曹南獨書宋公城濮獨書晉侯是也然胡氏止於北杏發予齊侯之說陳氏兼及城濮至於曹南二家皆不予之蓋以鹿上復人宋則非始伯之辭矣然則曹南予宋亦可又曰此為齊桓伯事之始桓公自莒反齊得管仲於鮑叔而任之首懲襄公田獵畢弋之戒於是管仲得以盡行其術制國以為二十一鄉工商之鄉六士鄉十五公與國髙各帥五鄉焉作内政而寄軍令興鹽筴以盡海王之利春蒐秋獮有士三萬人以方行天下而又以三選擇賢始於鄉長之推繼於官長之選復親自貲相於是民皆勉於為善相地而衰征山澤各致其時於是民各安其居正封疆重聘幣號召天下之遊士以犀甲贖罪反棠潛於魯使為南伐之主反臺原漆里於衛使為西伐之主反柴夫吠狗於燕使為北伐之主故齊國之境南至􅡤隂西至濟北北至於河東至於紀酅有革車八百乘即位數年東南多亂者萊莒徐夷吳越一戰帥服三十一國是雖伯者之事然規模次第亦有自矣左氏於桓公事多略故具於此又曰内政之法十五鄉出三萬人五家為軌軌有長十軌為里里有司四里為連連有長十連為鄉鄉有良人五鄉一帥故萬人為一軍帥帥之比之周制萬二千五百人為軍者誠簡便矣故曰桓文節制之師者汪氏克寛曰桓率諸侯以平宋亂宋公决不以微㑹邾小國尤不敢以微者㑹公侯邵氏寳曰周禮九命作伯天子嘗使召伯錫齊侯命矣而榖梁氏謂桓非受命之伯何居命而後伯禮也伯而後命非禮也相湛氏若水曰此五伯之始也平宋亂可也而列國與戴齊以為主是無王也所謂功之首罪之魁也案齊侯榖梁作齊人據李氏廉始伯之辭例以曹南城濮則當作齊侯為是四國稱人何氏休謂為微者劉氏敞謂為大夫皆非也春秋之時諸侯列於㑹而位乃定左氏謂平宋亂則宋人為宋公無疑餘可知矣或以稱人為貶辭或以為衆辭以為貶者天子錫命之法也以為衆者諸侯推戴之情也二說相兼始為得之夏六月齊人滅遂遂杜注遂國在濟北蛇丘縣東北今兗州府寧陽縣西北三十里有遂鄉與濟南府肥城縣接界陳氏深曰遂國舜之後左傳夏齊人滅遂而戍之榖梁遂國也胡傳滅國之與見滅罪孰為重取國而書滅奪人土地使不得有其民人毁人宗廟使不得奉其宗祀非至不仁者莫之忍為見滅而書滅亡國之善辭上下之同力其亦不幸焉爾語有之曰興滅國繼絶世天下之民歸心焉今乃滅人之國而絶其世罪莫重矣集說何氏休曰齊桓不任文徳而尚武力又功未足以除惡孫氏復曰桓公貪土地之廣恃甲兵之衆驅逐廹脅以强制諸侯懼其未盡從也約之以㑹要之以盟臨之以威束之以力有弗徇者小則侵之伐之甚則執之滅之其實假尊周之名以自封殖爾故此年滅遂十四年伐宋十五年伐郳十六年伐鄭十九年伐我西鄙二十年伐戎二十六年伐徐二十八年伐衞三十年降鄣閔元年救邢二年遷陽皆稱人以切責之示蘇氏轍曰討其不㑹于北杏也髙氏閌曰齊桓威小國以脅大國聖人深責之黄氏仲炎曰北杏之㑹魯遂皆不至也齊於魯有納糾之憾有敗師之怨比於遂之可疾輕重較然矣然齊桓能忍於魯而㑹盟之不能忍於遂而殄滅之何歟蓋遂小國也利其易虐則借以立威魯望國也知其難圖則結以為助几其恩威異用大率聽於力放於利而已矣非能壹以禮義為節也故曰五伯者三王之罪人也可家氏鉉翁曰遂人不㑹北杏固為有罪然未至於滅也伯者假公義以濟私欲滅譚矣又滅遂不過為拓土開疆之計春秋於三年之間聨書二滅以著齊桓之罪陳氏際泰曰齊桓方修北杏之㑹而先滅譚繼滅遂其滅也有二曰讋諸侯曰倍兵力故有滅國之事齊桓之所以為伯無柔逺能邇之心也有滅國之事齊桓之所以能伯得近攻逺取之術也案榖梁云不日微國也非也經書滅而不書日者多矣亦有書時而不書月者矣蓋皆因史舊文也秋七月冬公會齊侯盟于柯柯杜注濟北東阿齊之阿邑今兗州府東阿縣地左傳冬盟于柯始及齊平也公羊莊公將㑹乎桓曹子進曰君之意何如莊公曰寡人之生則不若死矣曹子曰然則君請當其君臣請當其臣莊公曰諾於是㑹乎桓莊公升壇曹子手劍而從之管子進曰君何求乎曹子曰城壞壓竟君不圖與管子曰然則君將何求曹子曰願請汶陽之田管子顧曰君許諾桓公曰諾曹子請盟桓公下與之盟已盟曹子摽劍而去之要盟可犯而桓公不欺曹子可讎而桓公不怨桓公之信著乎天下自柯之盟始焉榖梁曹劌之盟也信齊侯也胡傳始及齊平也世讎而平可乎於傳有之敵惠敵怨不在後嗣魯於襄公有不共戴天之讎當其身則釋怨不復而主王姬狩于禚㑹伐衞同圍郕納子糾故聖人詳加譏貶以著其忘親之罪今易世矣而桓公始合諸侯乃欲修怨怒鄰危其宗社可謂孝乎故長勺之役専以責魯而柯之盟公與齊侯皆書其爵則以為釋怨而平可也或稱齊襄公復九世之讎而春秋賢之信乎以仲尼所書柯之盟其詞無貶則復九世之讎而春秋賢之者妄矣其諸傳者借襄公事以深罪魯莊當其身而釋怨耶集說范氏甯曰曹劌之盟經傳無文蓋有信者也其孫氏復曰公不及北杏之㑹桓公既滅遂懼見討故盟於此之孫氏覺曰魯與齊為世讎小白之入魯納子糾伐至於屢戰則齊魯不和久矣於是齊桓求伯欲與魯平故為柯之盟也左氏曰始及齊平是也王氏葆曰柯齊地而言公㑹則此㑹本齊侯之志也能朱子曰凡事貴謀始莊公親見襄公殺其父既不復讎反與之燕㑹又為之主婚豈特不能復而已既親與讎人如此到桓公時又自隔一重了如何更責他去報見讎在面前不曽報得更欲報之於其子若孫非惟事有所不可也自做得沒氣勢又況齊桓公率諸侯尊周室以義而舉莊公雖欲不赴其盟㑹豈可得哉事又當權箇時勢義理輕重若桓公無事自來召諸侯莊公不赴可也今桓公名為尊周室若莊公不赴非是叛齊乃叛周也而張氏洽曰魯莊自齊桓入國屢與之戰雖一再勝齊方修軍政以圖伯魯有見伐之虞至此始及齊平公榖所載曹子之事齊桓捐小利以收魯容或有之皆伯術也但公羊言之過其實耳不趙氏鵬飛曰公羊載曹子於盟齊歸汶陽之事經書歸田況汶陽之田至鞌之戰而後能取無足據者然以為桓之信自是結於諸侯則有之公伐齊納糾於桓為讎又敗齊師于長勺郎之次齊又不得志魯之怨齊蓋未償也今頓釋前憾而為是盟桓之心蓋休然有容矣宜諸侯之心服也考李氏廉曰曹子之説趙子不取胡氏亦未及之然之當時桓公修伯非得魯則不足為重故捐小利以収之魯亦知齊欲以信求諸侯故因盟以求地而公羊遂誇大之也蓋魯自長勺乘丘之勝國勢稍振齊不敢以待譚遂之術待魯而多方以求之屈己於歸田之請遷延於姻好之成示威於三國之伐耀武於戎㨗之獻而魯自是不敢有從違之心矣九合之盛亦原於此公羊之說不可謂無汪氏克寛曰公羊稱齊襄復九世之讎則失之過莊公當其身釋怨不復則失之不及今考桓公至定公纔八世而夫子相定公㑹齊侯于夾谷安得謂九世猶可復讎乎春秋於禚之狩人齊侯以貶公於溺㑹伐衛貶不書公子於圍郕諱不書公屢加貶絶則復讎之責至矣故柯之盟不復致貶誠以齊桓倡霸尊王安夏顧不可以區區不能報之寡弱召其危辱以獲戾於先君也聖人輕重之權衡豈不深切著明也哉張氏溥曰柯之盟史記公羊以為曹沫之劫也仁山金氏則曰遂在濟北必魯之附庸也齊未得魯必有來伐之師伐遂而卒滅之以威魯是以魯忍而與齊平為柯之盟也齊桓修霸必先以義動諸侯欲重於諸侯必先得魯北杏之㑹宋陳蔡邾皆至猶未有魯也至公與盟而齊伯成矣反稷之㑹而為北杏忘長勺之敗而為柯盟桓之所以能為諸侯主也案汶陽歸田不見於經先儒多疑之者然經以公㑹為文則此㑹乃齊桓之志桓欲親魯以圖伯不惜小㑹以結之是以屢戰之怨一旦而平也張氏洽李氏廉俱不廢公羊之說今從之隱三年盟蔑莊八年盟蔇經不書日榖梁曰其盟渝也此年盟柯公榖皆以不日為信豈蔑與蔇俱不可信而柯獨不渝乎盟柯之後鄄再㑹而魯不從則亦未可為信也況扈與葵丘桓盟亦有書日者則又遷就其說或以為危之或以為羙之何前後之互異乎朱子謂以日月為襃貶穿鑿無義理者此類是也夫日與不日皆因舊史假使舊史所無則聖人安得而强加之乎故凡以日月為例者皆不録辛僖王丑二年十有四年齊桓六年晉緡二十五年衛惠二十年蔡哀十五年鄭厲二十一年子儀十四年曹莊二十二年陳宣十三年杞共公元年宋桓二年秦武十八年楚文十年春齊人陳人曹人伐宋左傳宋人背北杏之㑹十四年春諸侯伐宋胡傳宋人背北杏之㑹諸侯伐宋其稱人者將卑師少也齊自管仲得政滅譚之後二十年間未嘗遣大夫為主將亦未嘗動大衆出侵伐蓋以制用兵而賦於民薄矣故能南摧彊楚西抑秦晉天下莫能與之爭也或以為貶齊稱人誤矣集說杜氏預曰經書人傳言諸侯者總衆國之稱師程子曰春秋之法將尊師衆曰某帥師將卑衆曰某師將卑師少曰某人將尊師少曰某伐某齊自管仲為政莊十一年而後未嘗興大衆也其賦於諸侯亦寡矣終管仲之身四十年息養天下厚矣惟救邢稱師譏其次也至於秦晉使之不競而已不强致也是以其功卑而易成簡張氏洽曰伐宋而同陳曹皆宋之鄰不動逺國亦便之規模也吳氏􅊹曰北杏之㑹齊侯夲以定宋君之位而宋即背之蓋假仁義非誠心故人心不孚也李氏廉曰經列國書人而伐者齊伯之編有三此年伐宋十五年伐郳十六年伐鄭皆連三國而稱人將卑師少之文也晉伯之編有三文二年伐秦十七年伐宋宣十年伐鄭皆連四國而稱人貶之之文也餘若宣元年二國伐鄭僖三十三年三國伐許宣二年四國侵鄭稱人皆在貶例汪氏克寛曰十三年滅遂十五年伐郳十六年伐鄭十九年伐我二十年伐戎二十六年伐徐二十八年伐衛救鄭三十年降鄣閔元年救邢二年遷陽僖四年伐陳侵陳七年伐鄭十七年伐英氏皆稱人惟次聶北城邢伐厲書師救徐書大夫其餘侵蔡伐楚伐鄭圍新城伐北戎皆書爵則君自行爾伐山戎書人獨非將卑師少者以遇魯濟獻㨗書齊侯故也案胡傳以稱人為將卑師少揆之經文所書亦不盡合至謂二十年間未嘗遣大夫為主將則非也夫不遣大夫為將則以何人為將耶此説之不可通者矣然相沿已久姑存其説夏單伯㑹伐宋單音善左傳夏單伯㑹之取成於宋而還公羊其言㑹伐宋何後㑹也榖梁㑹事之成也胡傳隱公四年諸侯伐鄭翬帥師㑹伐則再舉宋陳蔡衛四國之名今諸侯伐宋而單伯㑹伐不復再舉三國之名何也宋人背北杏之㑹合諸侯而伐之者齊桓公也㑹伐者無貶焉故其辭平主謀伐鄭而欲求寵於諸侯以定其位者州吁也㑹之者黨逆賊矣故其辭繁而不殺疾之也再舉而列書者甚疾四國之辭也言之不足故再言之而聖人之情見矣集説何氏休曰据伐國不殊㑹曹伯襄言㑹諸侯本期而後故但舉㑹書者刺其不信因以分别功惡有深淺也從義兵而後者功薄從不義兵而後者惡淺范氏甯曰伐事已成單伯乃至孫氏復曰此公使單伯㑹伐宋也桓以諸侯伐宋本不期㑹魯自畏齊故使單伯㑹伐宋三國稱人獨書單伯者吾大夫不可言魯人故也不劉氏敞曰其言㑹伐宋何往㑹之也伐宋之時本預謀後聞乃遣大夫往㑹之爾銓髙氏閌曰非既約而後期與袁僑如㑹同也胡氏曰齊桓非天王命而專伐亦春秋之所惡孟子曰天子討而不伐五伯摟諸侯以伐諸侯三王之罪人也張氏洽曰魯自盟柯已平於齊而未從其役故因齊討宋命上卿帥師往㑹示從伯之意齊桓方興理勢當從固異於翬㑹宋殤黨亂賊伐無罪矣故書㑹伐而不再叙諸國也逺吳氏􅊹曰伐宋之役齊止用近宋之陳曹而不煩兵然魯方從伯故齊雖不徴於魯而魯自遣單伯以兵往㑹也卿俞氏皋曰單伯魯卿元年逆王姬者左氏以為周杜氏附㑹以為畿内諸侯蓋周有單子非單伯也若周之單伯則當書曰天王使單伯㑹伐宋今先書春齊人陳人曹人伐宋則知齊主兵也夏單伯㑹伐宋則知魯臣㑹伐也又如隱公四年四國伐鄭宋主兵而翬㑹伐辭與此同由是論之單伯魯臣確矣成鄭氏玉曰案左氏於單伯逆王姬誤為送至是附其説故以為齊請師而單伯王臣㑹之也單李氏廉曰内大夫㑹伐者八獨翬㑹四國伐鄭與伯㑹伐宋皆先列諸侯之伐然後稱㑹蓋後㑹之文也左汪氏克寛曰左氏云齊請師於周單伯㑹之故治氏者皆以單伯為周大夫今考成十六年十七年尹子單子三㑹伐鄭不書㑹伐又況定四年傳云劉文公合諸侯伐楚而經仍書公㑹劉子諸侯侵楚今既稱單伯㑹伐則單伯為魯大夫明矣附録左傳鄭厲公自櫟侵鄭及大陵獲傅瑕傅瑕曰茍舍我吾請納君與之盟而赦之六月甲子傅瑕殺鄭子及其二子而納厲公初内蛇與外蛇鬭於鄭南門中内蛇死六年而厲公入公聞之問於申繻曰猶有妖乎對曰人之所忌其氣燄以取之妖由人興也人無釁焉妖不自作人棄常則妖興故有妖厲公入遂殺傅瑕使謂原繁曰傅瑕貳周有常刑既伏其罪矣納我而無貳心者吾皆許之上大夫之事吾願與伯父圖之且寡人出伯父無裏言入又不念寡人寡人憾焉對曰先君桓公命我先人典司宗祏社稷有主而外其心其何貳如之茍主社稷國内之民其誰不為臣臣無貳心天之制也子儀在位十四年矣而謀召君者庸非貳乎莊公之子猶有八人若皆以官爵行賂勸貳而可以濟事君其若之何臣聞命矣乃縊而死大陵杜注鄭地今河南開封府臨潁縣北十里有大陵城秋七月荆入蔡左傳蔡哀侯為莘故繩息媯以語楚子楚子如息以食入享遂滅息以息媯歸生堵敖及成王焉未言楚子問之對曰吾一婦人而事二夫縱弗能死其又奚言楚子以蔡侯滅息遂伐蔡秋七月楚入蔡君子曰商書所謂惡之易也如火之燎于原不可鄉邇其猶可撲滅者其如蔡哀侯乎榖梁荆者楚也其曰荆何州舉之也州不如國國不如名名不如字集說張氏洽曰息之亡蔡之入皆哀侯致之惟干戈省厥躬亦足見蔡自㑹鄧懼楚之後非但不為徹桑土繆牖户之謀而以一婦人之故再召楚師始則身虜繼以國破楚熊貲興兵以悦婦人當時齊桓之業未成遂致其横行淮漢故特書蔡之見入兩著其罪也吕氏大圭曰入春秋以來蔡嘗從王伐鄭則猶修勤王之職也㑹于鄧盟于折㑹于曹則猶交諸侯玉帛之好也伐鄭伐衛伐戴則猶同諸侯兵車之㑹也自敗莘以來五年兩被荆伐齊桓稱伯蔡僅一從北杏之㑹自是而後蔡皆不與蓋折而從楚矣是故召陵加師僅足以得楚人之屈服而不能革蔡人從楚之心城濮之役楚既大創蔡始改圖踐土之載書曰晉重耳蔡甲午晉文既殁而中國之盟㑹蔡復不與晉悼之興列國悚焉聽命而蔡且安於楚之宇下終悼之世不能得蔡也晉悼歿而楚之役蔡常從之蔡昭以裘佩之微遭三年拘止之辱沈璧以絶楚質子以請晉而召陵之役晉人求貨而辭蔡柏舉之戰遂使蔡人假手於吳楚禍雖深蔡憂未艾哀元年楚復圍蔡蔡人謀徙州來迄春秋之後而蔡終為楚所并其從楚最先其事楚最堅而蒙楚之禍最甚未趙氏鵬飛曰齊桓圖伯三年得魯而失宋諸侯蓋協也而荆又入蔡齊桓蓋患之而未有以制也其後凡二十六年諸侯協從中國無釁而後伐之亦足見楚之强不可俄而服也李氏廉曰蔡為周室宗盟之長近於楚而嘗受楚禍故自北杏之後齊之盟㑹蔡不復與矣蔡之始録於經則㑹鄧以懼楚終録於經則遷州來以避楚楚之始録於經曰敗蔡終録於經曰圍蔡齊晉之伯其極盛則侵蔡以伐楚其極衰則㑹召陵以救蔡而不能終於栢舉之戰吳操中國之權又以蔡故焉原一蔡之始終而中國消長之形荆楚强弱之端皆可見矣案蔡以女子啟戎荆以彊暴虐小誠有罪也蔡從齊為北杏之㑹而荆人入之齊桓坐視不恤不亦病乎經書荆入蔡參譏之也然則齊桓不知蔡之當救邪非也是時桓之力尚未足以制楚故不欲自挫其鋭而姑以蔡委之况宋人甫㑹而遽畔桓専力以謀宋則勢難相顧矣豈不知蔡之當救也哉冬單伯會齊侯宋公衞侯鄭伯于鄄鄄音絹郡鄄杜注衞地東甄城今山東東昌府濮州東二十里舊城集故鄄城也左傳冬㑹于鄄宋服故也榖梁復同㑹也集説范氏甯曰諸侯欲推以為伯故復同㑹于此以謀之劉氏敞曰左氏見周有單子遂誤以單伯亦為周大夫凡王人出㑹諸侯無不序公侯之上者宰周公劉子之類是也既序公侯之上則是主㑹之人矣何必赴以單伯㑹諸侯乃成主㑹乎左氏誤以單伯為大夫杜氏因為之飾說欲證單伯使必為周人而委曲求合非解經之體也為髙氏閌曰諸侯伐宋踰時不觧至是宋公始服而此㑹張氏洽曰宋公親㑹魯卿而齊伯略定矣伯吳氏􅊹曰陳蔡曹邾已歸齊者不復與㑹蓋齊之政務簡便不欲煩諸侯也鄄李氏廉曰經書内大夫㑹外諸侯者六惟單伯于季孫宿于邢丘㑹伯主及列國其餘若公孫敖㑹晉侯公孫歸父㑹楚子季孫行父公孫歸父之㑹齊侯皆特相㑹也大夫㑹諸侯伉尊出位左氏例以為内大夫可㑹外公侯非也雖齊桓初伯得魯為重不以單伯為嫌魯人顧望未專從齊不以單伯為卑然他日開權臣之專未必不始於此論季氏本曰先儒以此為衣裳之㑹一也其説本於語九合諸侯之言故以九定㑹數又計桓公之㑹不止於九則又以衣裳之㑹九兵車之㑹四足之此由不知九當作糾之過也朱子辨之詳矣遇卓氏爾康曰衛朔入國不通諸侯者九年鄭突自垂不通諸侯者十一年今皆不敢不至宋服故也欽定春秋傳說彚纂卷八
