body:
  text: 欽定四庫全書欽定春秋傳説彚纂卷十五丙襄王十戌七年二十有五年晉文公重耳元年齊孝八年衛文二十五年蔡莊十一年鄭文三十八年曹共十八年陳穆十三年把桓二年宋成二年秦穆二十五年楚成三十七年春王正月丙午衛侯燬滅邢左傳春衛人伐邢二禮從國子巡城掖以赴外殺之正月丙午衛侯燬滅邢同姓也故名禮至為銘曰余掖殺國子莫余敢止公羊衛侯燬何以名絶曷為絶之滅同姓也榖梁燬之名何也不正其伐本而滅同姓也胡傳衛侯何以名滅同姓也春秋之法諸侯不生名滅同姓則名者謂其絶先祖之裔蔑骨肉之恩故生而書名示王法不容誅也聖人與天地合德滅人邦國而絶其祀同姓與異姓奚别焉而或名或否何也正道理一而分殊異端二本而無分分殊之弊私勝而失仁無分之罪兼愛而失義春秋之法由仁義行而人道立者也可以無差等乎然則晉滅虞楚滅夔亦同姓也曷為不名曰諸侯滅同姓則名其常也有名有不名例之變也邢雖與狄伐衛而經無譏文者為能救齊也衛人曽不反思而遷怒於邢又遣禮至昆弟往仕焉誘其守而殺之於外與虞公貪璧馬以易鄰國及其身者其情異矣春秋原情定罪而衛燬獨名蓋輕重之權衡也若荆楚則僭號稱王於滅夔乎何誅集説孔氏頴逹曰諸侯位貴居尊故不斥其名書名則是罪絶之事孫氏復曰邢衛皆齊桓所存之亡國也衛侯不念桓公之大德以絶先祖之支體故生而名之也劉氏敞曰滅人之國春秋之所惡也於所惡之中又有甚焉秦穆公衛侯燬是也兩君皆有賢名其惠足以使衆其威足以服敵就令其不能遵法守制舉干戈以覆人之國并人之地此則諸侯之強暴者爾雖有罪人猶得而備之今兩君皆出詭計險謀使臣反其君下畔其上以快已兼并之欲雖有道之國不知所備甚可惡也豈得與他滅國者等哉故秦穆見貶而衛侯燬名舉髙氏閌曰始則邢連狄以伐衛固可罪矣今衛遂兵以滅之抑又甚焉而張氏洽曰邢周公之胤也聖人以興滅繼絶為心甚惡不仁而滅絶宗祀者至於同所自出不知相保而肆強以絶滅之又使其臣為譎詐之事行盜賊傾覆之計天理所不容故名之同於楚子虔之誘殺也大王氏元杰曰衛侯忘同姓之恩絶先代之祀惡之者也經書正月滅邢四月衛侯燬卒則知天道禍淫之理明矣案衛燬滅邢書名三傳以為滅同姓胡傳從之蓋惡其使禮至仕邢隂謀以取人國故劉氏敞比諸秦穆謀鄭張氏洽例以楚虔誘蔡也朱子謂諸侯滅國未嘗書名今經文只隔夏四月癸酉一句便書衛侯燬卒恐是傳寫之誤此説亦有理夏四月癸酉衛侯燬卒集説季氏本曰左氏謂衛文元年革車三十乘季年乃三百乘今無從考其實縱使有之亦富強之術偶有獲焉未可以為教飬所致也宋蕩伯姬來逆婦公羊宋蕩伯姬者何蕩氏之母也其稱婦何有姑之辭也榖梁婦人既嫁不踰竟宋蕩伯姬來逆婦非正也其曰婦何也緣姑言之之辭也胡傳伯姬公女也而配蕩氏其往嫁不見於經者國君不與大夫敵也今來逆婦而史䇿書之見公失禮下主大失之昏是慢宗廟卑朝廷姑自逆婦其失明矣集説孔氏頴達曰紀裂繻來逆女此云逆婦者姑自來逆故稱婦也宋有蕩氏者宋桓公生公子蕩蕩生公孫壽壽生蕩意諸意諸之後以蕩為氏則此人字蕩也陸氏淳曰公羊云其言來逆婦何兄弟辭也案經文直書其事以明非禮爾兄弟辭有何義乎劉氏敞曰婦人不専行姑無為婦逆者宋蕩伯姬來逆婦非禮也然刖何以書以公之自主之也諸侯嫁女於大夫主大夫以與之公之自主之非禮也又曰伯姬之嫁也固不見經今其來也且何為見經吾以此觀之內女雖親體不敵則不書於䇿不書於䇿所以尊君也今君失其禮以愛易典主大夫之昏是卑朝廷而慢宗廟非安上治民之節也張氏洽曰姑自逆婦公不使大夫主之皆非禮也兩譏之今趙氏鵬飛曰諸侯嫁女於大夫以大夫同姓為主公自主之是尊屈乎卑也娶妻必親迎之而伯姬為子逆婦是上役乎下也公以愛其女而自主伯姬以愛其子而逆之愛與禮孰重乎以愛奪禮而尊卑上下之分亂非所以愛之也汪氏克寬曰大夫自逆則稱字姑來逆故稱婦把伯姬來求婦亦主姑而言之之辭宋殺其大夫集説孫氏復曰稱國以殺不以其罪也不稱名氏者與莊二十六年曹殺其大夫義同劉氏敞曰宋殺其大夫公羊曰不名者宋三世無大夫三世內娶也非也文稱大夫是有大夫非無大夫明矣且君娶一卿而一國之內何得悉無大夫哉詭僻不經乃至于此又曰穀梁曰其不稱名姓以其在祖之位尊之也非也春秋非孔氏家牒當為後世書法爾何得擅諱其祖名哉且傳曰臨文不諱安得諱祖之名遂不書乎大孫氏覺曰春秋之義殺大夫不書爵不與其專殺夫也為大夫而見殺則其賢否可知矣故不以其有罪無罪皆無與辭宋殺其大夫不書名史失之爾無所見也黃氏震曰杜氏注曰其事則未聞胡安定曰以泓之戰不死難也崔氏曰豈嗣君三年喪畢既臨事而治泓戰之罪手木訥曰宋為楚所敗宋襄自取之也安可以責其臣今襄公死成公立宋將託于晉乃歸罪于其臣以滅先君之恥而殺其大夫愚案此皆以宋之事而意度之若闕所不知當從杜注汪氏克寬曰義繫於殺則止書其官又曰宋殺大夫者四惟蕩山書名公子卬則書官此及文七年不紀名氏蓋因魯史舊文而不能益非義所繫也附録左傳秦伯師于河上將納王狐偃言于晉侯曰求諸侯莫如勤王諸侯信之且大義也繼文之業而信宣於諸侯今為可矣使卜偃卜之曰吉遇黃帝戰於阪泉之兆公曰吾不堪也對曰周禮未改今之王古之帝也公曰筮之筮之遇大有之睽曰吉遇公用享于天子之卦戰克而王饗吉孰大焉且是卦也天為澤以當日天子降心以逆公不亦可乎大有去睽而復亦其所也晉侯辭秦師而下三月甲辰次於陽樊右師圍溫左師逆王城夏四月丁巳王入於王城取大叔于溫殺之於隰戊午晉侯朝王王饗醴命之宥請隧弗許曰王章也未有代德而有二王亦叔父之所惡也與之陽樊溫原攢茅之田晉於是始啓南陽陽樊不服圍之倉葛呼曰德以柔中國刑以威四夷宜吾不敢服也此誰非王之親姻其俘之也乃出其民案晉侯有功於王室未有不告諸侯者其事不見於經蓋夫子削之也求諸侯而勤王受田請隧且以兵威強取畿內之邑過大於功故削之秋楚人圍陳納頓子于頓左傳秋秦晉伐鄀楚鬪克屈禦寇以申息之師戍商密秦人過析隈入而係輿人以圍商密昏而傅焉宵坎血加書偽與子儀子邉盟者商密人懼曰秦取析矣戍人反矣乃降秦師囚申公子儀息公子邉以歸楚令尹子玉追秦師弗及遂圍陳納頓子于頓鄀杜注本在商密界上小國其後遷於南郡鄀縣今河南南陽府淅川縣西有丹水故城古鄀國也鄧商密杜注鄀别邑也析杜注楚邑一名白羽今州內鄉縣即其地屬河南南陽府析隈山在鄧州南七十里公羊何以不言遂兩之也榖梁納者內弗受也胡傳圍陳納頓子也納云者不與納也諸侯失國諸侯納之正也何以不與乎夫陳先代之後不能以禮安靖鄰國保恤寡小而使楚人納之故書曰楚人圍陳納頓子于頓此亦正本自治之意也集説孔氏頴逹曰圍陳而納頓子明頓子迫於陳而出奔也楚人納之知其出奔楚也公羊傳曰何以不言遂兩之也一舉兵而行此兩意非因前生後故不言遂明此圍陳納頓子正是一事陸氏淳曰穀梁云納頓子者陳也案經文楚自納之何關陳事劉氏敞曰頓子之奔由陳攻之故楚必圍陳乃得納頓子不王氏葆曰失地出奔則名他國納之不名以諸侯得相名也故頓子北燕伯皆不名陳氏傅良曰出罪也納之者亦罪也則悉書之出非其罪納之者罪也則但書納齊桓公卒楚始與諸侯盟于齊盟于鹿上執宋公納頓子侈然欲廢置諸侯矣春秋之所懼也趙氏鵬飛曰楚納頓子陳之罪也陳不仁不義陵頓子之小而迫逐之楚人貪婪反假仁仗義而納之此誰致之也故陳之罪重於楚也李氏亷曰陳頓之爭又見於襄之四年汪氏克寬曰之楚圍陳納頓子于頓書法如楚伐吳執齊慶封殺蓋一事爾夫頓國小弱而介於陳楚之間陳欲迫而兼并之故前年楚伐陳城頓而還此年納頓子保全微國以示恩責義於陳以示威其意皆預為圖伯之地也厥後頓子會申從楚而伐吳戰雞父陳衰而服屬於楚也僅一從十國會召陵侵楚而諸夏終不能保恤遂為楚結陳他人所滅是時陳亦屢滅於楚而僅存非能剖分其地特助楚為虐爾又曰諸侯納失國之君合于義則不書書楚納頓子不與楚之納也書齊髙偃納北燕伯不與大夫之納也葬衛文公附録左傳冬晉侯圍原命三日之糧原不降命去之諜出曰原將降矣軍吏曰請待之公曰信國之寶也民之所庇也得原失信何以庇之所亡滋多退一舍而原降遷原伯貫於冀趙衰為原大夫狐溱為溫大夫冬十有二月癸亥公會衛子莒慶盟于洮洮杜注魯地孔氏頴逹曰八年盟于洮杜注曹地三十一年魯始得曹田此時不得為魯地注誤爾左傳衛人平莒於我十二月盟于洮修衛文公之好且及莒平也集説杜氏預曰莒以元年酈之役怨魯衛文公將平之未及而卒成公追成父志莒慶不稱氏未賜族氏陸氏淳曰衛子在喪之稱也莒慶莒國大夫葬劉敞曰公會衛子莒慶盟于洮杜云衛文公既成公不稱爵者述父之志降名從未成君故書子以善之非也諸侯逾年即位即位稱君不即位不稱君此乃常禮以年為限不以葬為限若即以葬為限葬畢可以稱君何待明年乃改元耶春秋之時禮法放絶見諸侯葬畢輒稱君因謂禮矣此衰世習俗之敝何足據耶諸杜所言天子諸侯喪制皆若此非古法也又曰何休曰莒無大夫書慶者尊敬壻之義推此言也觀之其妄可勝計乎又曰穀梁曰莒無大夫其曰莒慶何也以公之會目之也非也直云衛子莒人豈不可乎在春秋之中此類多矣何獨至於慶也而目之乎可趙氏鵬飛曰莒自獲拿之後未嘗通於魯其怨亦謂深矣衛成繼立斬然在衰絰之中為會于洮以平之其為心蓋有比小事大之義周禮有調人調和萬民合方氏除其怨惡同其好善則平怨於人者亦聖人之所許也然平莒而莒子不至以慶如會何益于平蓋平之意出於衛莒蓋疑魯之不肯平也故以大夫聼命焉則夫洮之盟平未成也明年向之會而後成矣汪氏克寬曰莒慶者魯之壻之故因衛成公為平於二國遂來會盟君盟大夫自浮來而已然矣案經凡書盟者惡之况衛子居喪出盟莒慶又以大夫盟諸侯而趙氏鵬飛獨以為子釋怨豈以內不諱公而莒慶書名經固無惡於洮之盟耶故今從趙説附録左傳晉侯問原守於寺人勃鞮對曰昔趙衰以壺飱從徑餒而弗食故使處原丁襄王十亥八年二十有六年晉文二年齊孝九年衛成公鄭元年蔡莊十二年鄭文三十九年曹共十九年陳穆十四年把桓三年宋成三年秦穆二十六年楚成三十八年春王正月已未公會莒子衛寧速盟于向速公作遫後同向杜注莒地寰宇記曰莒州南七十里有向城今屬山東青州府左傳春王正月公會莒茲丕公寧莊子盟于向尋洮之盟也榖梁公不會大夫其曰寧速何也以其隨莒子可以言會也集説張氏洽曰十二月已盟今又屢盟所以致齊之討也趙氏鵬飛曰洮之盟衛成在會而莒以大夫向之盟衛以大夫而莒子在會何哉初洮之會衛意也衛平莒魯而已不親之何以必信於人故雖離苫塊之次不得不躬行也莒之於魯其怨舊矣今一旦復通于魯安測魯之心哉故先以大夫聼命而測魯之情也今向之盟莒意也莒知魯肯平乎已前日洮之盟蓋已信矣今將與魯為會而已不躬行非所以為平故莒子必親之而二國既從則斯盟之信在莒魯矣衛侯何與哉故以大夫與歃以質信而已故聖人兩無貶辭外雖盟大夫內不沒公不以為抗也吳氏􅊹曰衛本欲平魯莒之怨洮盟莒子不親至僖公必欲與莒子盟故復為此會也齊人侵我西鄙公追齊師至酅弗及酅户圭反公作巂穀作嶲弗左作不穀酅杜注齊地濟北榖城縣西有地名酅下城今山東兖州府東阿縣西南有酅下聚左傳齊師侵我西鄙討是二盟也公羊其言至雟弗及何侈也榖梁至嶲急辭也弗及者弗與也可以及而不敢及也其侵也曰人其追也曰師以公之弗及大之也弗及內辭也胡傳書人書侵書師罪齊也書追書至酅弗及罪魯也凡書追者在境內則譏其不預追戎於濟西是也在境外則譏其深入追齊師至酅是也酅者齊地至者言逺也弗者遷辭也有畏而弗敢及之也齊魯皆私憤之兵而非正也故交譏之集説趙氏匡曰寇至不知追而不及言內之無警戒劉氏敞曰追之者何逐之也其言弗及何弗者遷辭也為畏而弗敢及使若不及然齊師者齊人也其稱師何為公之弗敢及張之也然則何言爾譏畏也譏畏奈何諸侯有道守在四鄰聞以百里為政手天下者矣未聞以千乘畏人者也又曰穀梁曰人微者也侵淺事也公之追之非正也案穀梁例苞人民驅牛馬曰侵今齊為無道至如此矣追之是也反蒙不正之貶乎又曰弗及者弗與也可以及而弗敢及也內辭也然則穀梁譏公之弗敢及又何云追之非正乎加陳氏傅良曰此齊侯也其稱人何自隱以來以兵我君大夫將皆書人君將書君自文十五年齊懿公始大夫將書大夫自襄十七年齊髙厚始訖春秋惟莒邾書人趙氏鵬飛曰齊之於魯固有怨矣甗之戰孝公將入而魯救無虧雖救之不捷而於孝公為慊也然齊之會固已釋然矣魯與齊為甥舅之邦既為齊之盟則魯無慮齊之心孝公因其不虞而潛師略其西鄙故書人以見其惡齊侵我疆魯固不可不問然公追齊師驅而出境可也乃因追以及於酅酅齊之附庸紀季之邑也則侵非義師追非義師戕民而已矣三吳氏􅊹曰齊師無名故書侵者李氏亷曰齊侵我始於此汪氏克寬曰書至二至酅譏其深入酅齊境也公救成至遇譏其怯而不進遇魯地也王氏樵曰是時諸侯無伯齊侯無名興師故書侵以譏之師人異文者穀梁美公能逐其師故大之而曰師非也夏齊再來伐展禽有辭齊侯乃還比事而觀得失見矣案侵書人追書師穀梁謂以公之弗及大之蓋謂弗及為怯故大齊師以諱其怯即劉氏敝所謂為公之弗敢及張之而公羊以至雟弗及為侈意亦如此非如孔疏所云變文以美公能逐齊師也胡傳乃謂齊為諼以為少稱人衆稱師前書齊人是見其弱以誘魯後書齊師是伏其衆以邀魯信斯言也則城濮柏舉二役俱戰書楚人敗書楚師豈亦楚為諼以誘晉與吳耶於義亦未安也若孫氏復蘇氏轍謂不可言公追齊人故曰師似為近理然經嘗書衛人敗績可以人敗則亦可言追齊人矣故仍主榖梁而釋以劉氏敞之説而孔疏則刪而不録夏齊人伐我北鄙集説張氏洽曰春秋以其爭盟而侵伐亟與故人之趙氏鵬飛曰齊孝於此不義甚矣前日酅之役齊首兵也首兵侵魯而憾魯報怨可乎况酅之役追兵而已初未報齊也今又興北鄙之伐何耶雖然義非孝公之所知也宋有納己之恩孝公利其危而伐之何有於魯衛人伐齊左傳夏齊孝公伐我北鄙衛人伐齊洮之盟故也公使展喜犒師使受命於展禽齊侯未入境展喜從之曰寡君聞君親舉玉趾將辱於敝邑使下臣犒執事齊侯曰魯人恐乎對曰小人恐矣君子則否齊侯曰室如懸罄野無青草何恃而不恐對曰恃先王之命昔周公太公股肱周室夾輔成王成王勞之而賜之盟曰世世子孫無相害也載在盟府太師職之桓公是以糾合諸侯而謀其不協彌縫其闕而匡救其災昭舊職也及君即位諸侯之望曰其率桓之功我敝邑用不敢保聚曰豈其嗣世九年而棄命廢職其若先君何君必不然恃此以不恐齊侯乃還集説張氏洽曰二盟乃衛人平莒於我故為魯伐之吳氏􅊹曰衛平莒魯齊何與焉洮向之二盟雖瀆其過在魯非齊人之所當問也齊孝公乃連興侵伐之師非義其矣其致衛之伐與魯之伐自取之也公子遂如楚乞師書乞師始此左傳東門襄仲臧文仲如楚乞師臧孫見子玉而道之伐齊宋以其不臣也公羊乞師者何卑辭也曷為以外內同若辭重師也曷為重師師出不正反戰不正勝也榖梁乞重辭也何重焉重人之死也非所乞也師出不必反戰不必勝故重之也胡傳衛人報德以怨伐齊之喪助少陵長又遷怒於邢而滅其國不義甚矣公既與其君盟于洮又與其臣盟于向是黨衛也故齊人既侵其西又伐其北齊師固亦非義矣而僖公不能省德自反深思逺慮計安社稷乃乞楚師與齊為敵於義可乎其書公子遂如楚乞師而惡自見矣集説孔氏穎逹曰凡乞者有求過理之辭執謙以逼成其討兵凶器戰危事用師必有死傷不可必全得歸本不可謂之假借故皆以乞為名孫趙氏匡曰天子在上而諸侯自相請師非禮也氏復曰齊再伐我故公子遂如楚乞師夫國之大小師之衆寡皆有王制不可乞也書者惡魯不能內修戎備而外乞師乞葉氏夢得曰古者諸侯無師帥教衛以贊元侯人師而我從之固已非矣況我不足而乞於人乎非正師之道也齊自鹿上之會不復與楚通蓋欲與爭霸而我方與諸侯會楚盟于薄以釋宋公則棄齊而從楚矣故齊連年既侵我又從而伐之我畏齊弗敢追反假楚以報怨所謂既不能令又不受命者也召陵之盟桓公與我伐楚而楚服今我乃欲以楚伐齊而恃之以勝公之謀國為可知己張氏洽曰僖公初年頗有意於治國務農閔雨國以殷富中年以來民事既荒國備不立齊人再伐已不能支而逺乞師以刷其恥孔子罪臧文仲竊位使其立展禽以為政所以輔僖公者必有道矣何至乞楚師以伐齊哉宋趙氏鵬飛曰楚自齊之盟陳蔡召之然而兵交于未嘗及齊也今魯憾齊之侵伐而乞師於楚其罪可勝誅乎雖齊之伐我固不義矣以魯之衆仗義而報之何患不克乃召兵於楚以為天下患雖克齊得穀何益于魯經書乞師者五均為不能國而僖公之罪尤重矣家氏鉉翁曰魯固可貶楚以兵赴之其不謂之義乎曰魯列國之望也楚前此聘魯及會于盂獻捷以要公之來欲得魯以致諸侯也魯忽乞援楚利魯來服為諸侯倡爾春秋何取焉年李氏亷曰乞師五始於此成十三年晉郤錡十六欒黶十七年荀罃十八年士魴皆晉伯也魯之乞師於楚屈甚矣若晉之乞師謂之伯主不能令諸侯亦可謙以求諸侯亦可又曰是年展喜犒師正受命於栁下惠而公子遂如楚則臧文仲為之介孔子曰臧文仲其竊位者與知栁下惠之賢而不能用也夫為人臣謀國有賢人而不用乃逺乞師于強楚以逞忿於齊是猶揖盜賊以困姻鄰也觀展禽一語已足以却齊則所以折衝必有道矣春秋特書如楚乞師而與外之乞師同文蓋深罪為國之無謀而至此極也竊位之歎其因此而發與湛氏若水曰兄弟鬩于墻外禦其侮僖公不忍齊人侵伐之怨使遂乞師於楚是置毒于心腹也其害義釀禍孰大焉季氏本曰魯之讎齊皆以楚故又使臣哀乞則楚師安得不為魯所以哉秋楚人滅夔以夔子歸夔求龜反公作隗縣夔杜注楚同姓國建平秭歸湖廣荆州府歸州志云州西南三里有夔子城地名夔沱左傳夔子不祀祝融與鬻熊楚人讓之對曰我先王熊摯有疾鬼神弗赦而自竄于夔吾是以失楚又何祀焉秋楚成得臣鬪宜申帥師滅夔以夔子歸榖梁以歸猶愈乎執也胡傳春秋滅國以其君歸無有不名者而夔何以獨不名諸侯之祀無過其祖者而夔祖熊摯是不得祀祝融與鬻熊也而楚反以是滅之非其罪矣故特存其爵而不名也然則楚滅同姓何以不名人而不名春秋待楚之體也集説杜氏預曰夔楚同姓國祝融髙辛氏之火正楚之逺祖也鬻熊祝融十二世孫劉氏敞曰楚人滅夔杜云夔有不祀之罪故不譏楚滅同姓非也夔雖有罪楚亦非得専滅也如此是征伐自諸侯出乃可矣且夔不祀祝融鬻熊禮也非所以為罪也衛祖康叔不敢祀后稷魯祖周公不敢祀公劉祝融猶后稷鬻熊猶公劉矣寧可復責此二國耶又曰國滅而虜無不名者而夔何以獨不名夔之所以取滅者乃非其罪故假之也春秋有王者作興滅國繼絶世則夔庶幾矣蘇氏轍曰夔楚之同姓而不名楚子以為人楚子甚於名楚子也見陳氏傅良曰滅同姓名此楚子頵也楚自武王始於傳文王始見於經猶以州舉也至成王而後書楚人盂之會嘗書楚子矣而復人之頵之名非遇弒未登於春秋則滅夔固不名也滅夔名之則疑於衛侯燬家氏鉉翁曰夔子不名専罪楚也案楚滅同姓經不書名者蓋欲削其爵故不得而名之也穀梁以為不日微國也非也赴告闕爾冬楚人伐宋圍緡緡穀作閔左傳宋以其善於晉侯也叛楚即晉冬楚令尹子玉司馬子西帥師伐宋圍緡公羊邑不言圍此其言圍何刺道用師也榖梁伐國不言圍邑此其言圍何也以吾用其師目其事也非道用師也集説何氏休曰時以師與魯未至又道用之於是惡其視百姓之命若草木不仁之甚也稱人者楚未有大夫未聞稱師楚自道用之故從楚文伐范氏寧曰楚人出師為魯伐齊而中道以伐宋故圍兼書所以責楚幾趙氏鵬飛曰宋自襄公為楚執辱既而復敗於泓至於亡成公即位傷痛未瘳而復有緡之圍四鄰亦可為動心矣而諸侯惟楚是從坐視宋之病而不藥也而僖公又投其毒而瞑眩之吾知聖人責魯為重矣之吳氏􅊹曰前年宋成公忘父之讎與楚平而往朝今而即晉可謂能速於徙義者矣楚伐其國而圍其邑書以著其橫也公以楚師伐齊取穀左傳凡師能左右之曰以置桓公子雍於穀易牙奉之以為魯援楚申公叔侯戍之桓公之子七人為七大夫於楚榖梁以者不以者也民者君之本也使民以其死非其正也胡傳楚強魯弱而能用其師進退在已故特書曰以以者不以者也集説髙氏閌曰齊人加兵於魯魯欲報之當請命於天子會諸侯以同討其罪夫楚豺狼也安可遠引其師以伐親鄰之國乎用張氏洽曰楚師而魯君以之楚以其衆付魯使自之以伐齊也家氏鉉翁曰魯以楚師伐齊春秋惡之蔡以吳師伐楚春秋與之何哉曰楚僭王號魯從而乞師義之必不可者也吳雖僭號與楚為水火厥後去王號為黃池之盟春秋以二伯書未可與楚同貶故蔡用吳師而不譏而吳氏􅊹曰公不用魯師而用楚師雖能取齊之邑辱國莫大焉將以刷西鄙北鄙之恥而適所以甚其恥也再李氏亷曰齊魯之爭自盟柯以來未之有也於是見者天下無伯也推其事迹乾時長勺之兵由于納糾而西鄙北鄙之怨始於救齊本非有深憾者但桓公孝公欲得魯以集事爾然桓公卒能屈己于柯盟而孝公不知自反搆怨連兵遂使楚人得乘間而肆毒矣然則魯助無虧者也孝公怨之尚宜宋衛納孝公者也亦不能固其交孝公之墜先業宜哉公至自伐齊公羊此已取榖矣何以致伐未得乎取榖也曷為未得乎取榖曰患之起必自此始也穀梁惡事不致此其致之何也危之也胡傳取人之邑為己有失正甚矣患之起必自此始其致危之也集説何氏休曰魯內虛而外乞師以犯強齊會齊侯昭卒晉文行霸幸而得免孔子曰人之生也直罔之生也幸而免故雖得意猶致伐也求趙氏鵬飛曰君子所恃以安靖國家者有諸內不諸外有諸內則本不搖而外無憂不求諸外則權在已而外有所忌今以楚師伐齊而取榖是受賜于楚而結怨于齊也幸而齊孝即世晉文服楚不然方皇皇然虞齊屑屑然奉楚無日而少暇矣不義而反猶以為功而告至䇿勳焉僖蓋不知其功之在前而罪居其後也汪氏克寬曰書公至自伐齊者三襄十九年合十二國之師同圍齊此年以楚師伐齊哀十年會吳伐齊戊襄王十子九年二十有七年晉文三年齊孝十年衛成二年蔡莊十三年鄭文四十年曹共二十年陳穆十五年把桓四年宋成四年秦穆二十七年楚成三十九年春把子來朝左傳春把桓公來朝公卑把把不共也集説趙氏孟何曰把先代之後微於滕薛每從盟會皆序滕薛下入春秋即為莒人伐取其邑其後非齊桓城緣陵以遷之國幾亡矣豈有財貨可以為禮者其來朝魯將以庇社稷也而魯反以兵入其國魯豈能庇把者乎伯姬拳拳相其夫託其子於魯庶幾魯能篤舅甥之好也當其身國且見破況後世乎僖公號賢君且不念姑姊妹况他君乎而僖之末年伯姬又來求婦當時小國之自結於大國者類如此亦可哀矣於是僖公女叔姬歸把為桓公夫人而伯姬之卒亦不弔案把稱子時王黜之也左氏似謂孔子黜之非也春秋有褒貶而無黜陟孔子惡諸侯之僭天子者乃以黜陟諸侯之權自豫是身為僭也而可乎杜氏預於滕子既以為時王所黜此復曲徇左傳癖亦甚矣夏六月庚寅齊侯昭卒左傳更齊孝公卒有齊怨不廢喪紀禮也集説杜氏預曰弟潘殺其子而自立是為昭公藉許氏翰曰齊桓既沒諸侯思之而孝公不能之以興觀其間楚之勝以困宋襄又侵伐魯僖不已有以知其為謀不逺霸業之所以隳矣家氏鉉翁曰史記昭卒弟潘殺嗣子而自立經傳不書疑有闕文秋八月乙未葬齊孝公集説杜氏預曰三月而葬速乙巳公子遂帥師入把左傳秋入把責無禮也集説杜氏預曰弗地曰入八月無乙巳乙巳九月六日髙氏閌曰弱國既來朝而用師以報之把魯乃舅甥之國而伯姬在焉魯人不義甚矣僖公之德衰矣張氏洽曰人方來朝而帥師入之以怨報德此所謂欲加之罪何患無辭者也朝趙氏鵬飛曰把蕞爾小邦既朝而且伐之若其不則尚何以自存耶魯怯於齊而虐于把怯者吾乞師以必取其邑微者吾以偏師直入其郛魯之為魯抑可見矣數年之間內不自修而結憾四鄰僖公自公子友卒而用公子遂善惡判矣不有君子果能國乎吳氏􅊹曰魯在春秋為次國未嘗不受強大之陵暴當推已及人所惡于強無以施之于弱可也把以小弱而朝於魯使禮有不備豈不愈于不朝乎今其來朝已忽而卑之朝禮甫畢以上卿帥重師入其國其志在於取之也魯號秉禮之國而陵小弱如此他又何責焉冬楚人陳侯蔡侯鄭伯許男圍宋左傳楚子將圍宋使子文治兵於睽終朝而畢不戮一人子玉復治兵於蒍終日而畢鞭七人貫三人耳國老皆賀子文子文飲之酒蒍賈尚幼後至不賀子文問之對曰不知所賀子之傳政于子玉曰以靖國也靖諸內而敗諸外所獲幾何子玉之敗子之舉也舉以敗國將何賀焉子玉剛而無禮不可以治民過三百乘其不能以入矣苟入而賀何後之有冬楚子及諸侯圍宋宋公孫固如晉告急先軫曰報施救患取威定伯於是乎在矣狐偃曰楚始得曹而新昏於衛若伐曺衛楚必救之則齊宋免矣於是乎搜於被廬作三軍謀元帥趙衰曰郤穀可臣亟聞其言矣説禮樂而敦詩書詩書義之府也禮樂德之則也德義利之本也夏書曰賦納以言明試以功車服以庸君其試之乃使郤穀將中軍郤溱佐之使狐偃將上軍讓於狐毛而佐之命趙衰為卿讓於欒枝先軫使欒枝將下軍先軫佐之荀林父御戎魏犫為右晉侯始入而教其民二年欲用之子犯曰民未知義未安其居於是乎出定襄王入務利民民懷生矣將用之子犯曰民未知信未宣其用於是乎伐原以示之信民易資者不求豐焉明徴其辭公曰可矣乎子犯曰民未知禮未生其共於是乎大搜以示之禮作執秩以正其官民聽不惑而後用之出穀戍釋宋圍一戰而伯文之教也睽杜注楚邑杜蒍杜注楚邑被廬注晉地榖梁楚人者楚子也其曰人何也人楚子所以人諸侯也胡傳楚稱人貶也宋先代之後作賔王家非有篡弒之惡楚人無故摟諸侯以圍之何名也故黜而稱人以著其罪集説范氏寧曰江熙曰夫屈信理對言信必有屈也宋楚戰于泓宋以信義而敗未有闕也楚復圍之諸侯信楚之曲屈宋之直是義所不取也四國信楚而屈宋春秋屈其信而信其屈貶楚子於兵首則彼碌碌者以類見矣故曰人楚子所以人諸侯子孔氏潁逹曰此年傳云楚子及諸侯圍宋則是楚親自來也十二月公會諸侯盟于宋公為楚子在宋而往會之明與楚子共盟也明年楚子入居于申使子玉去宋由此而言楚子初來圍宋必親至宋國使子玉主兵明年見晉之盛身始去之獨留子玉於宋耳春秋之例會同以國大小為序征伐則以主兵在前此序諸侯之上由楚主兵故也陸氏淳曰淳聞于師曰若書楚子則四國之惡不著故書曰楚人則從楚之罪昭然可見也劉氏敞曰公羊曰其稱人為執宋公貶也非也宋襄公死久矣春秋前貶之明矣又終僖之篇貶何為乎程子曰楚稱人貶之為其合諸侯以圍宋也之髙氏閌曰曹南之盟諸侯稱人而宋獨稱爵圍宋役諸侯稱爵而楚獨稱人聖人之嚴如此盟陳氏傅良曰此楚子也其稱人何嫌豫楚以伯也于齊楚猶序陳蔡之下于鹿上猶不先齊宋也盂之會宋楚始並為諸侯長矣楚之稱子而長於諸侯宋襄公為之也魯僖衛文夫子之刪詩有取焉桓公卒而衛從楚魯又從楚楚敗宋于泓納頓子滅夔取齊之穀且合四國之君以圍宋春秋雖序於諸侯之上而特人之賢趙氏鵬飛曰宋成以父之讎義不屈於楚亦可謂子者歟於時晉文興霸蓋已四年宋亦有足恃者而楚虐宋不已楚之暴至是極矣執宋于盂敗宋于泓伐陳圍陳而陳屈圍緡取穀又將以屈齊宋也明年敗楚于城濮豈獨宋賴之天下賴之也趙氏恆曰楚稱人貶也荆楚舉號未有稱人者故來聘稱人則為進之伐鄭稱人則為謹其浸強楚既書爵不當復稱人矣故稱人又為黜之也此以後楚稱人者皆貶十有二月甲戌公會諸侯盟于宋胡傳公與楚結好故往會盟集説杜氏預曰諸侯伐宋公與楚有好而往會之宋方見圍無嫌于與盟故直以宋地孔氏頴逹曰陳蔡鄭許皆是楚之屬國楚子帥而與之圍宋往年公使公子遂如楚乞師始與之通和好魯非楚之屬國圍宋之事公不與謀直聞其在宋往會之耳非是楚來召公公自往會之也諸侯即上圍宋之諸侯也一事而再見者前目而後凡常例也之葉氏夢得曰晉文公之興首伐衛以致楚而公為戍衛則公之附楚審矣圍宋之役初雖不與會而為盟豈有意於救宋哉殆亦若戍衛以成楚志爾楚子居申而後子玉去宋是會圍非解圍也會張氏洽曰春秋書公會諸侯于薄于宋皆楚子為主也然猶曰會諸侯不曰會楚使公從楚之罪必待考而後見聖人之忠厚春秋之微婉概可見矣家氏鉉翁曰春秋之法盟主爵而諸侯人者有矣未有盟主人而諸侯爵者也人楚子而爵諸侯不與楚子以主盟也亦以正諸侯從楚之罪也人李氏亷曰晉文晉悼之興皆以救宋却楚成功晉有言曰成伯安疆自宋始矣大抵宋亦列國之樞紐也故始焉楚成爭伯而有宋之圍繼焉楚莊圖伯而又有宋之圍始焉楚爭伯而有宋之盟終焉楚分伯而亦有宋之盟案齊之盟不書公而盟于宋則書公家氏鉉翁以為不為公諱其責公深矣然經沒楚子不書亦所以為公諱也與薄之盟同已襄王二丑十年二十有八年晉文四年齊昭公潘元年衛成三年蔡莊十四年鄭文四十一年曹共二十一年陳穆十六年把桓五年宋成五年秦穆二十八年楚成四十年春晉侯侵曹晉侯伐衛左傳二十八年春晉侯將伐曹假道於衛衛人弗許還自南河濟侵曹伐衛正月戊申取五鹿二月晉郤縠卒原軫將中軍胥臣佐下軍上德也晉侯齊侯盟于斂盂衛侯請盟晉人弗許衛侯欲與楚國人不欲故出其君以説於晉衛侯出居于襄牛南河杜注從汲縣南渡出衛南而東水經注河水徑東燕縣故城北有棘津之名即此也棘津在河南衛輝府汲縣南七里盂斂盂杜注衛地今直𨽻大名府開州東南有斂聚是其地也襄牛杜注衛地秦置襄邑縣明初省縣併入睢州今屬河南歸德府集説趙氏匡曰曷為不言遂非因曺而伐衛異乎侵蔡而伐楚也孫氏復曰曺衛楚與國也晉侯將救宋故侵曺伐衛不言遂者非繼事也此侵曺既反而後伐衛爾故曰晉侯侵曺晉侯伐衛也劉氏敞曰曷為再言晉侯侵一事也伐一事也公羊曰未侵曺也非也若未侵曺者春秋豈探其情而先書之穀梁曰再稱晉侯忌也非也即實再出何以知之而杜氏諤曰齊桓圖霸二十餘年而後服楚桓公沒宋襄繼圖其業然力不能攘而身見執戰敗而死聖人悼之晉文之立特起救宋之志欲敝強楚以曺衛附楚而侵伐之非欲侵伐曺衛蓋志在于救宋而服楚也蘇氏轍曰齊桓侵蔡蔡潰而遂伐楚故一稱齊侯今侵曺與伐衛異道故再稱晉侯左朱子曰晉侯侵曺晉侯伐衛皆是文公譎處考之氏可見皆所以致楚師也異趙氏鵬飛曰晉文之霸功與齊桓同而勢與齊桓齊桓制楚以三十年之久故合諸侯以正問罪之名期其服而已晉文則解倒懸之急於旦暮之間故必於勝之而後已是二者勢之不同也晉侯侵曺伐衛不為曺衛設以動楚也故先侵曺侵曺而楚不出則又伐衛則夫侵曺伐衛蓋二事爾豈可書遂哉再書晉侯非褒非貶即事之實而書之耳呂氏大圭曰從楚圍宋者陳蔡鄭許晉文不攻陳蔡鄭許而乃及於無罪之曹衛陳蔡鄭許邇楚之國也曹衛邇宋之國也楚方圍宋而晉乃逺攻陳蔡鄭許則無以釋宋之圍而亦無及於楚安有城濮之戰曺衛二國雖曰其師不與圍然楚之所以敢於橫行者實以得曺而新昏於衛故也齊侯伐楚猶恃江黃楚人伐宋豈無資於曺衛哉家氏鉉翁曰去年書圍宋盟于宋著宋之急也今年繼書侵曺伐衛攻楚之必救以救宋也楚攻宋不已是併兼之計也而文公首以救宋為事春秋不間事而重舉晉侯所謂言之不足而重言之謂其先天下之所難慰諸侯之望爾之鄭氏玉曰晉文侵曹伐衛以成救宋之功而曹衛不禮亦以報焉所謂假天理之公雜以人欲之私者也然春秋以功許其為霸非原其事貶其修怨也故爵而重書之又曰齊桓書人伐楚後始書爵今晉一舉即爵何也齊桓創霸其事難晉文繼霸其功易因其功之成而豫之豈計先後哉季氏本曰侵伐各言晉侯此紀兩事之恆辭也以為譏復怨者非也黃氏正憲曰案是時諸侯俱已事楚獨宋尚存而今且受圍晉所恃以協力排楚者齊秦兩大國而兩國之師又未能即至於是潛掠曹境以搖四國之心聲言伐衛以致楚頵之救及楚救衛晉又不與戰而入曹不過使楚人兩地奔馳寬緩時日以待齊秦之至也以朱氏睦􅥱曰晉文欲伐楚以楚勢方盛豈能遽加兵乃侵曹伐衛欲先破其黨與也故齊桓伐楚有事于蔡晉文伐楚有事於曹衛案侵曹伐衛胡傳以為譏復怨者據左氏晉文出亡不為曹衛所禮爾然宋人告急子犯已定侵曹伐衛之計蓋取威定霸實出於此豈得僅以為復怨而譏之乎又以下書楚人救衛為譏晉夫楚頵嘗書子矣經於晉之伐衛則書爵楚之救衛則書人謂豫楚而譏晉者亦非也至于不攻陳蔡鄭許而攻曹衛辨見於吕氏大圭再稱晉侯之義則孫氏復劉氏敞之説得之今故不録胡傳公子買戍衛不卒戍刺之刺七賜反左傳公子買戍衛楚人救衛不克公懼於晉殺子叢以説焉謂楚人曰不卒戍也公羊刺之者何殺之也殺之則曷為謂之刺之內諱殺大夫謂之刺之也胡傳刺未有書其故者而以不卒戍刺之則知買為無罪矣孟子曰無罪而殺士則大夫可以去無罪而戮民則士可以徙今乃殺無罪之主將以苟説於強國於是乎不君矣故特書其故以貶之也集説何氏休曰有罪無罪皆不得専殺故諱殺言刺之杜氏預曰公子買魯大夫子叢也內殺大夫皆書刺公實畏晉殺子叢而誣叢以廢戍之罪似孔氏頴逹曰經言買傳言叢蓋名買字叢或字相而一謬也魯殺子叢本有兩意謂晉云公子買比來戍衛今不使終其戍事是以殺之謂楚云比令公子買戍衛買不終戍事是以殺之罪陸氏淳曰啖氏云書不卒戍以刺之者見買之非且示譏也以晉之強楚猶不敵衛侯請盟尚不見許出居襄牛不敢在國買之退還未失其宜公殺骨肉以説晉非也故書曰不卒戍明非他罪也不目君者內無貶君之義但微示譏爾公子偃直書刺之不言其事刺有罪也劉氏敝曰殺大夫不著其罪其著之罪則是加之加之則濫矣春秋直記之見濫也公羊謂不可使往非也若不可使往而刺之是得其罪矣又何更其文為不卒戍乎穀梁云先名後刺刺有罪也亦非也會不言所為言所為皆譏也然則刺不言所坐言所坐皆諱也張氏洽曰懼於晉而殺公子買者其實也謂不卒戍而刺之者以解於楚也蓋戍衛者楚命也魯衛本兄弟之國若推至公之心俾買往戍之則買之不卒戍可誅然其名如此而其情則不然書之之詳所以見其辭之不直而情之甚私買之死實非其罪不止于專殺大夫而已也戍趙氏鵬飛曰僖公殺公子買其赴於晉必曰子買衛殺之赴於楚必曰買不卒戍殺之彼以為晉楚之強弱蓋猶未判也楚勝則從楚晉勝則從晉殺一子買以從容於晉楚之間以觀勝負故城濮之戰公不與至踐土之會而後朝於王所其不與曹伯同執以畀宋者幸也殺子買以誑楚惑晉魯則免於難矣子買何罪哉彼公子遂之徒不忠不義之心於是啓矣家氏鉉翁曰殺無罪之大夫春秋所深惡故不書殺而書刺蓋知其無罪而殺之幽暗之中與周禮三刺之義不同案説文云刺直傷也君殺大夫曰刺周官司刺之刺蓋審察之義與此刺字不同故一刺曰訊羣臣再刺曰訊羣吏三刺曰訊萬民皆謂審問之而已自鄭康成誤釋刺為殺於是杜氏預以下皆引三刺之義以釋此經然胡傳謂刺審其情與衆棄之則亦以刺為審矣以刺為審而猶用三刺之説是謂公子買戍衛不卒戍審之也可乎今故以公羊傳為主而凡引周官者皆不録楚人救衛集説髙氏閌曰此書救者非善之也著衛國附楚之罪晉文果能致楚師之出也楚師既出故有城濮之戰於陳氏傅良曰僖六年二十二年楚嘗救鄭矣不書是始書以為晉文之伯楚欲救而不能也矣趙氏鵬飛曰齊桓伐楚直造楚地蓋諸侯皆為齊今諸侯既從楚矣越曹衛而伐之則懼二國議其後故先伐曺衛楚兵出救是墮其計也且晉之伐衛久而不克者豈勢不敵邪待楚而已今楚救至克楚則諸侯皆為晉矣彼陳鄭許蔡曽何勞師哉故晉兵不及楚境克之城濮而諸侯自歸此晉文之廟謀也已吳氏􅊹曰蓋楚人分圍宋之師以救衛也狐偃固先料其必然矣鄭氏玉曰春秋書救未有不善之者今以為非善之何也春秋書救所以見晉伐所必救制之得其道能致城濮之戰而成服楚之功也豈可與他書救例觀哉故曰比事屬辭春秋教也三月丙午晉侯入曹執曹伯畀宋人畀必利反左傳晉侯圍曹門焉多死曹人尸諸城上晉侯患之聽輿人之謀曰稱舍於墓師遷焉曹人凶懼為其所得者棺而出之因其凶也而攻之三月丙午入曹數之以其不用僖負羈而乘軒者三百人也且曰獻狀令無入僖負羈之宫而免其族報施也魏犫顛頡怒曰勞之不圖報於何有爇僖負羈氏魏犫傷於胸公欲殺之而愛其材使問且視之病將殺之魏犫束胸見使者曰以君之靈不有寧也距躍三百曲踊三百乃舍之殺顛頡以徇於師立舟之僑以為戎右宋人使門尹般如晉師告急公曰宋人告急舍之則絶告楚不許我欲戰矣齊秦未可若之何先軫曰使宋舍我而賂齊秦藉之告楚我執曹君而分曹衛之田以賜宋人楚愛曹衛必不許也喜賂怒頑能無戰乎公説執曹伯分曹衛之田以畀宋人公羊畀者何與也其言畀宋人何與使聽之也曹伯之罪何甚惡也其甚惡奈何不可以一罪言也榖梁入者內弗受也畀與也其曰人何也不以晉侯畀宋公也胡傳古者覿文匿武修其訓典序成而不至於是乎有攻伐之兵故孟子謂萬章曰子以為有王者作將此今之諸侯而誅之乎其教之不改而後誅之乎曹伯羸者未狎晉政莫知所承晉文不修詞令遽入其國既執其君又分其田暴矣欲致楚師與之戰而以曹伯畀宋人譎矣雖一戰勝楚遂主夏盟舉動不中於禮亦多矣徒亂人上下之分無君臣之禮其功雖多道不足尚也集説杜氏預曰執諸侯當以歸京師晉欲怒楚使戰故以與宋所謂譎而不正孫氏復曰晉侯侵曹曹不服罪故入曹執曹伯畀宋人畀與也晉侯入曹執曹伯不歸於京師畀宋人使自治之甚矣不奪爵者曹伯即楚晉侯圖伯執得其罪也其劉氏敞曰其稱侯以執何稱侯以執者伯討也此為伯討奈何曹共公為無道逺君子而近小人服赤芾者三百也其言畀宋人何與宋人也晉侯執曹伯則曷為與宋人為譎也又曰穀梁曰以晉侯而斥執曹伯惡晉侯也非也向若稱晉人執曹伯則穀梁毋乃又如齊人執陳袁濤塗而譏其踰國以執乎與張氏洽曰自晉侯侵曹至此皆春秋著文公致楚戰之由也家氏鉉翁曰救宋而執之固當其罪不歸之京師而畀宋人則貶也又曰此爵晉侯是嵗執衛侯歸之京師人晉何歟曰執曹伯明王法也執衛侯以臣之訴雖歸京師猶有責是以人之吳氏􅊹曰晉之用師於曹衛也實欲致楚而與之戰先以假道而啓衛之釁衛既不許則還師自南河濟略侵曹境不深治曹也移師伐衛責其不假道之罪取其邑衛服罪請盟而猶不許以致其君出避魯戍逃還則楚人不得不救衛矣楚既救衛則又移師臨曹入其國而執其君又以曹君畀受圍之宋多方以激楚之怒則楚人不得不與晉戰矣書李氏亷曰晉執曹伯畀宋與執戎蠻子歸楚同此畀而彼書歸蓋畀者猶此與彼之辭歸者以京師之禮待楚矣又曰書法獻者下奉上也錫者上賜下也畀者非上非下者也三者據尊卑言之夏四月己巳晉侯齊師宋師秦師及楚人戰于城濮楚師敗績左傳楚子入居於申使申叔去穀使子玉去宋曰無從晉師晉侯在外十九年矣而果得晉國險阻艱難備嘗之矣民之情偽盡知之矣天假之年而除其害天之所置其可廢乎軍志曰允當則歸又曰知難而退又曰有德不可敵此三志者晉之謂矣子玉使伯棼請戰曰非敢必有功也願以間執讒慝之口王怒少與之師唯西廣東宫與若敖之六卒實從之子玉使宛春告於晉師曰請復衛侯而封曹臣亦釋宋之圍子犯曰子玉無禮哉君取一臣取二不可失矣先軫曰子與之定人之謂禮楚一言而定三國我一言而亡之我則無禮何以戰乎不許楚言是棄宋也救而棄之謂諸侯何楚有三施我有三怨怨讎已多將何以戰不如私許復曹衛以攜之執宛春以怒楚既戰而後圖之公説乃拘宛春于衛且私許復曹衛曹衛告絶於楚子玉怒從晉師晉師退軍吏曰以君辟臣辱也且楚師老矣何故退子犯曰師直為壯曲為老豈在久乎微楚之惠不及此退三舍辟之所以報也背惠食言以亢其讎吾曲楚直其衆素飽不可謂老我退而楚還我將何求若其不還君退臣犯曲在彼矣退三舍楚衆欲止子玉不可夏四月戊辰晉侯宋公齊國歸父崔夭秦小子憖次于城濮楚師背酅而舍晉侯患之聽輿人之誦曰原田每每舍其舊而新是謀公疑焉子犯曰戰也戰而捷必得諸侯若其不捷表裏山河必無害也公曰若楚惠何欒貞子曰漢陽諸姬楚實盡之思小惠而忘大也晉侯夢與楚子搏楚子伏已而鹽其腦不如戰以懼子犯曰吉我得天楚伏其罪吾且柔之矣子玉使鬪勃請戰曰請與君之士戲君馮軾而觀之得臣與寓目焉晉侯使欒枝對曰寡君聞命矣楚君之惠未之敢忘是以在此為大夫退其敢當君乎既不獲命矣敢煩大夫謂二三子戒爾車乘敬爾君事詰朝將見晉車七百乘韅靷鞅靽晉侯登有莘之虛以觀師曰少長有禮其可用也遂伐其木以益其兵己巳晉師陳於莘北胥臣以下軍之佐當陳蔡子玉以若敖之六卒將中軍曰今日必無晉矣子西將左子上將右胥臣蒙馬以虎皮先犯陳蔡陳蔡奔楚右師潰狐毛設二斾而退之欒枝使輿曵柴而偽遁楚師馳之原軫郤溱以中軍公族橫擊之狐毛狐偃以上軍夾攻子西楚左師潰楚師敗績子玉收其卒而止故不敗晉師三日館穀及癸酉而還有莘之虛杜注故國名括地志陳留縣東五里有莘城即古莘國今河南開封府陳留縣有莘城山東兗州府曹縣有莘仲集其地接二縣界也公羊此大戰也曷為使微者子玉得臣也子玉得臣則其稱人何貶曷為貶大夫不敵君也胡傳楚稱人貶也戰而言及主乎是戰者也集説孫氏復曰晉文始見於經孔子遽書爵者與其功不旋踵而建也昔者齊桓既殁楚人復張猖狂不道欲宗諸侯與宋並爭會盂戰泓以窘宋者數矣今又圍之踰年天下諸侯莫有能與伉者晉文奮起春征曹衛夏服強楚討逆誅亂以紹桓烈故召陵之盟城濮之戰専與齊桓晉文也劉氏敞曰戰而言及之者主之者也猶曰晉侯為志乎為此戰也云爾當是之時晉辟楚三舍欲戰者得臣也而春秋書晉焉得臣雖有必戰之意由先軫激之是以書晉也王氏沿曰陳蔡從楚而不書者自以其師從楚右師失位故賤而不書亦猶哀十年會吳伐齊不言邾郯朱子曰齊桓公死楚侵列國得晉文公攔遏住如橫流泛濫硬做隄防不然列國為淹浸必矣又曰文公伐衛以致楚而隂謀以取勝故夫子稱譎而不正也陳氏傅良曰此宋公齊國歸父秦小子憖也宋公則何以但稱師尊晉侯也尊晉者豫晉以霸也也張氏洽曰齊桓之伐楚致屈完於召陵楚未大創故次年即滅弦救鄭終桓公之霸楚為患而不能制文公欲霸天下以為楚不大創不足以定霸故欲戰而勝楚以取威而後霸業定當是時楚為齊宋二國之患救之宜也然虐曹衛以報怨致楚與戰以取威皆譎而不正之事故賤楚稱人書晉侯主是戰也間趙氏鵬飛曰桓文之服楚一也然晉文以五年之突起而攻之一戰而霸可謂一時之偉績矣使齊桓之興五年而遽伐楚則未必勝用是知晉文之功為難也故聖人於桓之興書人書師而後爵之而於文則一出而書侯侵曹伐衛執曹伯敗楚師皆舉而爵之而城濮之戰三國書師而晉獨稱侯蓋不如是無以顯其一時之功也濮吕氏大圭曰召陵之次一得屈完之盟而退師城之役不至敗楚師不已蓋桓公所為將以服強楚之心晉文之舉所以挫強楚之勢也所遇不同用計亦異其為有功則一也然召陵之師規模既定聲其罪而伐之楚亦屈校此正也晉文加兵曹衛以致楚許復二又拘子玉之使以怒楚三舍避之示怯以誘楚其詭計如此孔子斷之曰譎豈不信哉故齊桓圖楚之功三十年而後有召陵之役會諸侯之事亦三十餘年屢盟屢會而後有葵丘之盛若文公則侵曹伐衛勝楚圍許盟踐土會溫兩致天王執曹衛之君而後復之凡霸者之事為之略盡皆在一年之內是齊桓猶有近正之意若晉文則太譎矣齊桓猶有近厚之心若晉文則太迫矣家氏鉉翁曰城濮為救宋而戰也豈惟救宋尊天子安諸侯在此一舉是以爵晉侯又曰凡戰我為主則書某及某戰于某褒貶不在是也持一及字為例謂春秋不與晉何其偏歟城李氏亷曰召陵雖以來盟豫齊而亦有遂伐之專濮雖以書侯豫晉而亦有先盟及戰之譎此皆功過不相掩之法也汪氏克寬曰此戰與柏舉皆書楚師敗績則楚非將卑師少而稱人矣此下書楚殺得臣則知楚人為得臣矣柏舉之戰下書囊瓦奔鄭則知楚人為囊瓦矣宋襄及楚子戰于泓晉文及楚令尹得臣戰城濮蔡侯以吳子及楚令尹囊瓦戰柏舉皆稱楚人惟鄢陵稱楚子以敗績在君故不得不稱楚子也王氏樵曰何休曰戰言及所以别主客直不直也鄭君曰及者别異主客耳不施於直與不直也直不直自在事而已説者以鄭言為是此經書及在晉亦當以鄭君此意觀之之陳氏際泰曰楚稍斂於召陵之師而甚張於于盂會非城濮挫之更霸問鼎其何日之有夫盂無論已召陵惟不極挫故楚大張而齊日以不競城濮之勝晉伯世于天下於此見兵力之不可已焉案城濮之戰宋公在焉乃三國皆稱師而晉獨稱爵與北杏曹南同是豫晉以霸也得臣之殺書大夫而此戰貶而書人皆所以豫晉也齊桓用兵皆書人惟伐楚救鄭書爵晉文自用兵以來侵伐入執戰無不爵者其豫晉可知矣胡傳謂書之略而無美辭似未合經意故不録楚殺其大夫得臣楚始書大夫左傳初楚子玉自為瓊辨玉纓未之服也先戰夢河神謂己曰畀余余賜女孟諸之麇弗致也大心與子西使榮黃諫弗聽榮季曰死而利國猶或為之况瓊玉乎是糞土也而可以濟師將何愛焉弗聽出告二子曰非神敗令尹令尹其不勤民實自敗也既敗王使謂之曰大夫若入其若申息之老何子西孫伯曰得臣將死二臣止之曰君其將以為戮及連穀而死晉侯聞之而後喜可知也曰莫余毒也已蒍吕臣實為令尹奉己而已不在民矣孟諸杜注宋藪澤郭璞云梁國睢陽東北今河南歸德府治東北有孟諸澤連榖杜注楚地當在楚方城之外胡傳案左氏子玉從晉師文公退三舍辟之楚衆欲止子玉不可戰于城濮楚師敗績夫得臣信有罪矣而楚子知其不可敵不能使之勿敵而少與之師又以一敗殺之是以師為重而棄其將以與之也是晉再克而楚再敗也故稱國以殺而不去其官以仲尼書鄭棄其師與楚殺得臣之事觀之可為來世之永鑒矣集説劉氏敞曰稱國以殺大夫者罪纍上也此殺有罪其以纍上之辭言之何惡楚子也何惡乎楚子知其不可使也而不能勿使知其不可敵也而不能勿敵是亦棄其師之道也陳氏傅良曰於是楚子使止子玉曰毋死不及則其斥殺何春秋之法苟有誅意於其臣雖自殺也書殺是故楚得臣公子側皆書殺而已矣尹張氏洽曰稱國以殺者楚子自得臣伐陳立為令授以兵柄無非狃勝之事故雖知晉之不可敵而不能使之退師師敗而不能自反其平日求勝無厭之罪方且責其無以見申息之老故春秋謂得臣乃楚子之大夫平日縱使求勝及一敗而輒殺之故稱國以殺而不去其官黃氏仲炎曰楚殺得臣而晉文為之深喜則知得臣者固晉文之所忌也國有人才使敵國望而忌之庸可殺乎今楚殺之以快敵君子是以知楚之無能為也聽汪氏克寬曰楚屈瑕伐羅之敗羣帥囚于冶父以刑楚子曰孤之罪也殽之役秦大夫及其左右請殺孟明秦伯曰孤之過也其賢於楚頵之殺得臣審之殺側遠矣案得臣有才而剛愎自用治其罪而廢之誨其不及而復用之斯為善矣先儒因稱國以殺而不去其官為罪纍上遂偏責楚子似未盡得經傳之意罪纍上者謂臣之罪纍及上爾非謂臣不當罪也胡傳主再勝再敗之説先儒多從之者獨郝氏仲與以為謀人軍師敗則死之城濮敗而誅子玉泜水退而誅子上鄢陵敗而誅子反屬國叛而誅子辛是乃楚所以振爾其説似亦有理衛侯出奔楚集説陸氏淳曰令叔武攝位而去故不名也代劉氏敞曰諸侯去其社稷或有代之者或無之者有代之者衛侯衎是也無代之者魯昭公是也春秋書有代之者則名之書無代之者則不名今衛侯有代之者矣而不名何哉言叔武之代之也非奪之也乃將復之也故正其號謂之衛子蘇氏轍曰衛侯失地而不名何也其出也使元咺奉叔武以受盟國猶其國也吳氏􅊹曰衛侯黨楚之情深固晉雖私許復之終懷疑而不敢信故聞楚敗懼晉害已而出奔楚也汪氏克寬曰衛成公出奔據公羊則是晉文逐衛侯而立叔武衛侯之位已絶春秋當以鄭厲衛惠之例而書名據左氏則是衛侯懼晉使元咺奉其弟叔武盟于踐土而奔楚適陳以免討其位未絶若曹伯負芻之類故陸氏曰令叔武攝位而去故不名案諸侯失地則名未失地則不名衛侯之出也使元咺奉叔武以受盟則國固衛侯之國也是以不名也其歸也疑叔武為篡已而殺之是自處於失國也是以名之也胡傳謂晉文修怨故不名衛侯以著晉罪夫晉文君臣之謀特欲致楚戰而敗之以為取威定霸之大計故致師於曹衛爾未嘗一言及於修怨也是故未與楚戰則衛侯不可許盟而曹伯不得不執其既敗楚師則執者可釋而出者可反其不為修怨亦明矣故衛侯不名之説以陸氏淳劉氏敞之説為主而胡傳張注皆不録五月癸丑公會晉侯齊侯宋公蔡侯鄭伯衛子莒子盟于踐土踐在演反有踐土杜注鄭地括地志滎澤縣西北十五里王宫城城內東北隅有踐土臺滎澤今屬河南開封府左傳甲午至於衡雍作王宫於踐土鄉役之三月鄭伯如楚致其師為楚師既敗而懼使子人九行成於晉晉欒枝入盟鄭伯五月丙午晉侯及鄭伯盟于衡雍丁未獻楚俘于王駟介百乘徒兵千鄭伯傅王用平禮也己酉王享醴命晉侯宥王命尹氏及王子虎內史叔興父䇿命晉侯為侯伯賜之大輅之服戎輅之服彤弓一彤矢百玈弓矢千秬鬯一卣虎賁三百人曰王謂叔父敬服王命以綏四國糾逖王慝晉侯三辭從命曰重耳敢再拜稽首奉揚天子之丕顯休命受策以出出入三覲衛侯聞楚師敗懼出奔楚遂適陳使元喧奉叔武以受盟癸亥王子虎盟諸侯于王庭要言曰皆奬王室無相害也有渝此盟明神殛之俾隊其師無克祚國及其元孫無有老幼君子謂是盟也信謂晉于是役也能以德攻衡雍杜注鄭地滎陽卷縣今河南開封府原武縣西北五里有衡雍城即衡雍也胡傳踐土之會天王下勞晉侯削而不書何也周室東遷所存者號與祭爾其實不及一小國之諸侯晉文之爵雖曰侯伯而號令天下幾於改物實行天子之事此春秋之名實也與其名存實亡猶愈於名實俱亡是故天王下勞晉侯於踐土則削而不書去其實以全名所謂君道也父道也晉侯以臣召君則書天王狩于河陽正其名以統實所謂臣道也子道也而天下之大倫尚存而不滅矣衛侯奔楚不書名者未絶其位也叔武受盟而稱衛子者立以為君也此見聖人深罪晉文專權自恣廢置諸侯之意集説杜氏預曰王子虎臨盟不同歃故不書衛侯出奔其弟叔武攝位受盟非王命所加從未成君之禮故稱子而序鄭伯之下經書癸丑月十八日也傳書癸亥月二十八日經傳必有誤陸氏淳曰桓文之伯不書錫命或曰以不告故不書爾案錫命為侯伯事之大者無不告之理且公在會不容不知所以不書蓋有微旨也為陳氏嶽曰襄王聞晉勝自往勞之非晉致之也故襄王諱而不書孫氏復曰踐土之盟襄王在是也不書不與晉文致天子也晉文既攘強楚不能朝於京師獻楚俘反以乘勝之衆坐致衰陵之主盟諸侯于是甚矣况又受其侯伯之命弓矢之賜哉雖曰不脅天子吾未之信也是故惠王賜齊侯命襄王命晉侯為侯伯皆沒而不書焉噫孔子皆沒而不書後世又有脅天子而取九錫者悲夫者劉氏敞曰穀梁曰諱會天王也非也若實會天王罪大矣可得諱乎髙氏閌曰晉一戰敗楚威震諸侯向之附會楚者皆會踐土而請盟焉晉於是遂伯諸侯也陳氏傅良曰序晉侯於齊侯宋公之上豫晉以霸也於是王子虎實盟諸侯則其不書何凡王人涖盟不書涖伐不書張氏洽曰文公負震主之威不帥諸侯朝王而致天子屈尊下勞失正位居體之道非所以正天下大分諸侯之受盟陳侯之新附皆為文公而來若書天王下臨而列踐土之盟則尊卑倒植綱常易矣故即其可書者記之而天王下勞沒而不書以示天下之大訓故曰非聖人孰能修之李氏亷曰外以諱為善則諱晉者非貶也朱子亦曰如葵丘之會召陵之師踐土之盟自是好本末自别汪氏克寬曰晉侯召王以諸侯見而使王狩乃晉文之不知所尊故春秋先書諸侯會溫次書天王巡狩所以正天子自尊之名後書王所之朝所以統天下常尊之實是為晉文隱惡明其所以為臣子之禮也踐土于溫諸侯皆先行朝禮而後盟會春秋皆先書盟會而後書朝使若晉文合諸侯以尊王也王自來則不書使若諸侯之往朝召王使狩則書王自狩使若因巡狩而朝之也或謂盟踐土會溫之時天王未至又謂不當先盟會而繼事以朝王皆未知聖人屬辭之深意矣又曰踐土之下勞乃襄王之自失其尊故諸侯朝王而盟于王庭春秋削天王之下臨所以去其降尊之實先書諸侯盟踐土而後書公朝於王所所以全臣子當尊之名是為襄王隱惡明其所以為君父之道也又曰齊侯非主盟亦序宋公之上蓋伯者以勢之強弱相上下謂齊強於宋故也自是訖春秋之終凡齊盟必以齊次晉而先宋溫季氏本曰邾莒未嘗豫大國會盟今莒子豫焉至之會邾子豫焉蓋莒嘗因魯即楚邾嘗附宋伐齊今亦恐懼請從而晉文示以坦懷遂使豫會爾案踐土之役先儒相承謂天王下勞晉侯惟項氏安世以為天王出居于鄭亦既五年諸侯未嘗救天王未嘗歸也又趙氏鵬飛亦謂聖人作春秋以周為重安有晉侯納王之事而不書者不知晉文欲求諸侯故納王以為圖伯之計而又恃功請隧圍畿內之邑而取之故春秋削之也説見僖二十五年陳侯如會公羊其言如會何後會也榖梁如會外乎會也於會受命也集説杜氏預曰陳本與楚楚敗懼而屬晉來不及盟故曰如會范氏寧曰外乎會不及序也受命於會故書如會會孔氏頴逹曰沈氏云八年鄭伯云乞盟此直云如者彼及其盟故云乞盟此則不及其盟又陳侯不乞故與彼文異遭趙氏鵬飛曰陳月二十三年受楚之伐二十五年楚之圍遂折而從楚蓋五年矣今晉侯勝楚踐土之盟外獻楚俘內靖王室實為盛舉陳胡敢不從故惠然來歸願與斯會聖人即其情而書之曰陳侯如會喜其悔罪知反與鄭伯乞盟者有間焉乞者辱辭也乞盟懼齊侯之不我信也今陳書如會如會者緩而不迫與會足矣不求盟也陳鄭之來一也觀聖人之書法則善惡自異矣伯李氏亷曰經書如會三此及雞澤袁僑于鄬鄭汪氏克寬曰陳穆公如會於盟踐土之後則不與於盟如會於朝王所之先則亦與於朝矣是時晉文始合諸侯故陳侯雖棄異即同且疑且畏其來尚緩故不及于盟歃也至于溫則共公居喪而亟會不敢斯須少怠矣公朝于王所榖梁朝不言所言所者非其所也胡傳朝乎廟禮也于外非禮也有虞氏五載一巡守羣后四朝周制十有二年王乃時巡諸侯各朝於方嶽亦何必於京師於廟然後為禮乎古者天子巡守於四方有常時諸侯朝於方嶽有常所其宫室道途可以豫修故民不勞其供給調度可以豫備故國不費今天王下勞晉侯公朝于王所則非其時與地矣然則天子在是其可以不朝乎天子在是而諸侯就朝禮之變也春秋不以諸侯就朝為非而以王所非其所為貶正其本之意也集説杜氏預曰王在踐土非京師故曰王所天孔氏頴逹曰公羊傳曰曷為不言公如京師子在是也曷為不言天子在是不與致天子也其意言晉文公召王來踐土左傳於此無召王之事直云作王宫于踐土杜云襄王聞戰勝自往勞之故為作宫則以王意自往非晉召之不同公羊説也陳氏傅良曰此踐土之諸侯也外朝王不書書魯以見其餘也張氏洽曰言王所則非京師也言所而不言京師後人不知其諱而謂出居於鄭未復京師皆不考本末而昧於春秋之大旨也豈知婉而成章之法固見於此歟書趙氏鵬飛曰王之所在諸侯朝之禮所當然然兩王所之朝則見諸侯之不常朝也諸侯不因晉文之會未必朝也聖人書此以見諸侯之罪而顯晉文之功歟吳氏􅊹曰諸侯朝王於踐土之宫春秋魯史故但書公朝非是魯一國獨朝而諸侯不朝也李氏亷曰春秋書魯之朝王者三此年二成十三年如京師是也皆因伯事以行禮然此雖在外而得書朝彼雖至京師而反書如者蓋此若書如則無以見天王就朝之實彼若書朝則無以見諸侯之不成乎禮義各有在也彼書朝於伐秦之先此書朝於盟踐土之後者蓋彼不先書朝無以見朝王之為重此不後書朝無以見諱王之實義亦各有在也然此書朝猶為下事上之辭彼書如則不過彼適此之例矣亦微有分别汪氏克寬曰王所居之處則曰王所故覲禮云伯父順命於王所朝者覲君之總稱故虞周之書諸侯見天子於京師於外皆言朝春秋書公朝于王所者二所以正其尊王之名蓋謂事雖出於權而禮則專也書公如京師者一而不言朝以其無尊王之實蓋謂事雖似於正而禮則簡也穀梁謂朝不言所非謂王所不當朝但以踐土河陽非天王之所當居爾如云聘諸侯非正也之意六月衛侯鄭自楚復歸于衛衛元咺出奔晉左傳或訴元咺於衛侯曰立叔武矣其子角從公公使殺之咺不廢命奉夷叔以入守六月晉人復衛侯寧武子與衛人盟於宛濮曰天禍衛國君臣不協以及此憂也今天誘其衷使皆降心以相從也不有居者誰守社稷不有行者誰扞牧圉不協之故用昭乞盟于爾大神以誘天衷自今日以往既盟之後行者無保其力居者無懼其罪有渝此盟以相及也明神先君是糾是殛國人聞此盟也而後不二衛侯先期入寧子先長牂守門以為使也與之乘而入公子􅞰犬華仲前驅叔武將沐聞君至喜捉髮走出前驅射而殺之公知其無罪也枕之股而哭之􅞰犬走出公使殺之元咺出奔晉榖梁自楚楚有奉焉爾復者復國也歸者歸其所也鄭之名失國也胡傳衛侯失國出奔則不名復歸得國何以名殺叔武也叔武者衛侯之弟也晉文公有憾于衛侯而不釋怨于是逐衛侯立叔武叔武辭立而他人立則恐衛侯之不得反也於是已立乎其位治反衛侯衛侯得反而疑其弟則曰叔武篡我元咺爭之曰叔武無罪衛侯不信其言終殺叔武是不念鞠子哀而以爭國為心亂民彝滅天理其為罪大矣此其所以名也元咺由是走之晉而訟其君然衛侯初歸則稱復再歸何以不稱復乎春秋立法甚嚴而待人以恕鄭之初歸雖殺叔武既名之矣猶意其或出於誤而能革也是以稱復及其再歸又殺元咺及公子瑕則是終以爭國為心長惡不悛無自艾之意矣是以不稱復其曰歸于衛者易辭也諸侯嗣故稱復者繼之也不稱復者絶之也而國非其國矣集説杜氏預曰元咺雖為叔武訟訴失君臣之節故無賢文孔氏頴逹曰宣十年齊崔氏出奔衛傳曰書曰崔氏非其罪也文八年宋司城來奔傳言司城效節於府人而出故書以官貴之也然書官及氏為貴則書名不是賢文以元咺所訴雖直令君陷罪失君臣之節故無賢文書其名從本文也劉氏敞曰衛侯鄭何以名貶曷為貶殺叔武也衛侯曷為殺叔武叔武治反衛侯衛侯驅而入射叔武而殺之其言歸何易也其易奈何叔武在內也不髙氏閌曰叔武雖不能避嫌然亦請復衛侯衛侯之信先期而入因殺之故春秋不書叔武之事是專責衛侯也張氏洽曰衛成公書名聽讒慝之言殺無罪之弟也前驅殺叔武而罪衛侯者蓋殺元咺之子角又自疑叔武而先期入此叔武之所以死于前驅也呂氏大圭曰經書自如意如至自晉蔡季自陳歸于蔡曹伯歸自京師著其昔在彼而今歸於此也書自楚歸則即楚之罪著矣曹伯歸自京師著其自京師也鄭之再執亦歸自京師不云自京師晉文之執與厲之執有間矣驅吳氏􅊹曰衛侯怒元咺之立叔武而殺其子故前􅞰犬探衛侯之心陽為不識叔武而射殺之􅞰犬見衛侯哭弟之哀於是走出衛侯使殺之者亦聊以歸獄云爾又曰凡言復歸者言國乃其國昔失而今復之爾載李氏亷曰胡氏所引叔武之事本公羊與左傳所小異由左氏言之則衛侯為誤殺由公羊言之則衛侯為忌殺然衛侯之內忌信讒始于殺角之時今之殺叔武乃其本心特誣罪於前驅以告諸侯爾此公羊所以為實録也襄汪氏克寬曰春秋書國君去國而歸者七鄭忽曹衛衎邾益及衛侯鄭之再歸皆不書自惟衛侯鄭初歸書自楚著其懼晉之辱不得已而奔楚今始自楚而歸也曹成公之歸書自京師著天王之釋有罪也陳侯欵卒秋把伯姬來集説杜氏預曰莊公女歸寧曰來入家氏鉉翁曰伯姬來寧成風許氏曰書此志把之怨釋也天下有霸諸侯弛兵於是族姻之恩始録鄰國之好交修以是為晉侯之澤也吳氏􅊹曰把桓公伯姬之次子繼其兄成公而立即來朝魯而為魯所卑又使卿帥師入其國魯之待把可謂無恩矣故伯姬又來謝過而求平也亦季氏本曰伯姬莊二十五年歸把至是三十八年老矣而匍匐來魯豈得已哉國小為魯所陵也公子遂如齊集説許氏翰曰齊自孝公立與魯好絶比相侵伐昭公復與公同踐土之盟故公遣大夫聘之張氏洽曰把伯姬來而入把之怨釋公子遂如齊而取穀之憾解伯權之立如此此邵子所謂功之首也吳氏􅊹曰魯以楚師伐齊取穀幸而孝公遄卒未及報怨晉文既伯齊魯均為受盟之國則齊不敢背晉盟而報魯怨故魯因使公子遂聘齊講好而釋前怨也附録左傳城濮之戰晉中軍風于澤亡大斾之左旃祁瞞姦命司馬殺之以徇於諸侯使茅茷代之師還壬午濟河舟之僑先歸士會攝右秋七月丙申振旅愷以入於晉獻俘授馘飲至大賞徴會討二殺舟之僑以徇於國民於是大服君子謂文公其能刑矣三罪而民服詩云惠此中國以綏四方不失賞刑之謂也冬公會晉侯齊侯宋公蔡侯鄭伯陳子莒子邾子秦人于溫晉侯下穀無齊侯秦與諸侯會始此左傳冬會于溫討不服也集説杜氏預曰陳共公稱子先君未葬宋襄公稱子自在本班陳共公降在鄭下陳懷公稱子在鄭上蓋主會所次非褒貶也君孔氏穎逹曰陳侯欵經不書葬正以稱子知其先未葬也吳氏􅊹曰諸侯服楚而同圍宋者陳蔡鄭許也楚既敗蔡鄭即從晉陳雖後盟亦來如會獨許最小弱而猶不改圖故合諸侯以討許也衛侯既赦之使復國矣猶欲討衛者元咺訴之於晉故晉聼其訴而又欲討衛也陳共稱子班鄭下與衛叔武稱子班鄭下同踐土無邾秦至此則小國畏威大國聞風皆至可見晉伯之盛矣朝湛氏若水曰穀梁曰諱會天王非也夫溫會將以王討罪而天王亦會有何義乎若以此會為諱王會則下不當又有天王狩河陽之文矣天王狩于河陽狩穀作守河河陽杜注晉地河內郡河陽縣今屬南懷慶府古河陽城在縣西三十里左傳是會也晉侯召王以諸侯見且使王狩仲尼曰以臣召君不可以訓故書曰天王狩于河陽言非其地也榖梁全天王之行也為若將守而遇諸侯之朝也為天王諱也水北為陽山南為陽溫河陽也胡傳案左氏晉侯召王以諸侯見仲尼曰以臣召君不可以訓故書曰天王狩于河陽以尊周而全晉也啖助謂以常禮言之晉侯召君名義之罪人也其可訓乎若原其自嫌之心嘉其尊王之意則請王之狩忠亦至焉故夫子特書狩于河陽所謂原情為制以誠變禮者也夫踐土之會王實自往非晉罪也故為王諱而足矣溫之會晉則有罪而其情順也故既為王諱之又為晉解之於以見春秋忠恕也集説何氏休曰使若天子自狩非致也王杜氏預曰晉實召王為其辭逆而意順故以狩為辭趙氏匡曰左氏云且明德也未及于禮而謂之為德無乃過乎若謂此為德則率諸侯朝於京師者謂之何哉以德為目非施於伯者罪劉氏敞曰晉侯召王自嫌不順故使王狩以匿其狩不當書今故書者所以起狩為晉侯召也故程子曰晉文公欲率諸侯以朝王正也懼其不能譎以行之召王以就焉人獨見其召王之非而不見其欲朝之本心是以譎而掩其正也張氏洽曰名不正則言不順以天子之尊而下從臣召其名不正故溫之會諱之古有巡狩之禮帝王以來未之有改王狩而諸侯朝則名正而言順故書之也家氏鉉翁曰齊桓會王世子于首止猶曰尊王室孰知繼桓而霸者遂至屈天王之尊就而朝焉積習之漸使然爾之吳氏􅊹曰城濮勝楚之後襄王下勞晉侯故踐土盟晉侯以為榮而夸示諸侯今溫之會晉侯又欲如踐土故召王來狩於其國之地然踐土是天王自來故沒而不書存君體也會溫則晉實召王故書天王自狩存臣禮也非李氏亷曰案王巡虢守不書則王狩之非狩審矣狩而曰狩為尊者諱也春秋書狩四而此非講武之狩蓋假巡狩之禮以為辭也案胡氏安國本啖氏助蘇氏轍之説以為尊周全晉其義甚正公羊謂不與再致天子則專責晉文似非經旨壬申公朝于王所榖梁獨公朝與諸侯盡朝也會于溫言小諸侯溫河北地以河陽言之大天子也集説杜氏預曰壬申十月十日有日而無月史闕文趙氏匡曰若録內而書日何不書月乎公羊之説非也諸劉氏敞曰穀梁曰朝于外非禮也然則天王在是侯可勿朝乎又曰日繫月月繫時以晉文之行事為己傎矣亦非也晉文行事之傎豈患不見乎必待日月乃見哉此皆不足以論春秋吳氏􅊹曰踐土之盟天王在盟所若主是盟者然故既盟而晉率與盟之諸侯以朝王溫之會天王在會所若主是會者然故既會而晉復率與會之諸侯以朝王也古者天子巡狩其方伯率諸侯以朝於方嶽之下此禮之廢久矣今一嵗之間天子兩受諸侯之朝晉文之心不過欲假此以夸諸侯非真能尊天子也實譎而名則正心非而迹則是故啖氏亦有取焉晉人執衛侯歸之于京師左傳衛侯與元咺訟寧武子為輔針莊子為坐士榮為大士衛侯不勝殺士榮刖針莊子謂寧俞忠而免之執衛侯歸之于京師置諸深室寧子職納槖饘焉公羊歸之于者何歸于者何歸之于者罪已定矣歸于者罪未定也罪未定則何以得為伯討歸之于者執之于天子之側者也罪定不定已可知矣歸于者非執之于天子之側者也罪定不定未可知也衛侯之罪何殺叔武也何以不書為叔武諱也春秋為賢者諱何賢乎叔武讓國也其讓國奈何文公逐衛侯而立叔武叔武辭立而他人立則恐衛侯之不得反也故於是已立然後為踐土之會治反衛侯衛侯得反曰叔武篡我元咺爭之曰叔武無罪終殺叔武元咺走而出此晉侯也其稱人何貶曷為貶衛之禍文公為之也文公為之奈何文公逐衛侯而立叔武使人兄弟相疑放乎殺母弟者文公為之也榖梁此入而執其不言入何也不外王命於衛也歸之于京師緩辭也斷在京師也集説孫氏復曰晉人執衛侯歸之于京師者元咺故也晉文既勝強楚不能招攜撫二以崇大德助其臣而執其君非所以宗諸侯也故曰晉人以疾之程子曰歸于者順易之辭歸之于者強歸之辭君臣無獄而文公惡衛侯使與元咺辨曲直衛侯不勝遂刑其大夫執其君其聽頗矣雖歸于王而實強致之故曰歸之于京師猶陳氏傅良曰其稱人何非王命也凡執譏也春秋以當乎罪不當乎罪為褒貶苟當乎罪雖晉厲公執曹伯得為伯討苟不當乎罪雖齊桓執陳轅濤塗稱人而已矣張氏洽曰此元咺訟衛侯於晉而文公右元咺故衛侯之詞不見直而見執也天子在是故遂以歸于京師也或者乃以襄王至是乃復於京師果如其言則非有所諱何為而不書况書執衛侯歸京師而天王之復乃不書此必不然之理也案左氏稱衛侯出居襄牛聞楚敗而後出奔使元咺奉叔武以受盟公羊謂晉逐衛侯而立叔武二説不同然衛侯懼晉而出奔則亦晉逐之也叔武與踐土之盟則亦晉立之也故可並存衛元咺自晉復歸于衛左傳元咺歸于衛立公子瑕公羊自者何有力焉者也此執其君其言自何為叔武爭也榖梁自晉晉有奉焉爾歸者歸其所也胡傳其言歸之于者執不以正之辭也古者君臣無獄諸侯不專殺為臣執君故衛侯不名而元咺稱復大夫不世其稱復絶之也自晉者晉有奉焉因其力也歸者易辭以文公為之主故其歸無難而方伯之罪亦明矣是以執而稱人不得為伯討也集説何氏休曰恃晉力以歸然臣無訴君之義復于衛非也劉氏敞曰其言復歸何大夫無復復者位已絶也已絶而復惡也惡則其言歸何易也其易奈何以文公為之主也髙氏閌曰晉文聽其臣子之訟而執其君非伯者所以靖亂之義也書曰自晉晉侯之罪亦已明矣陳氏傅良曰歸大夫不言復必諸侯也而後言復君有歸道也大夫言復者伉也是故元咺復歸宋魚石晉欒盈復入皆伉辭也張氏洽曰叔武雖死而非成公實殺之元咺豈得以此訟其君而致之縲紲元咺歸衛異于蔡季華元之歸特書復者著其假霸主之力遂其無君之心也而家氏鉉翁曰元咺臣也衛侯非咺所宜訴衛侯執咺歸名分掃地矣春秋於晉侯治衛一事再三見之書法責晉深矣然則治此獄宜何歸曰執衛侯治其殺弟之罪執元咺正其訴君之戮執吳氏􅊹曰元咺譖訴衛侯之甚而晉侯怒之深故之以歸于京師蓋將假託王命而廢黜之此晉文之意實元咺之謀也故咺自晉歸衛即别立公子瑕為君而無所忌憚挾伯主之威而易置其君如奕棋然咺之罪大矣奚啻當服今將之誅而已哉諸侯遂圍許榖梁遂繼事也胡傳諸侯比再會天子再至皆朝于王所而許獨不會以其不臣也故諸侯圍許案古者巡狩諸侯各朝于方嶽今法天子行幸三百里內亦皆問起居許距河陽踐土近矣而可以不會乎其稱遂繼事之辭也集説杜氏預曰會溫諸侯也自許氏翰曰許能從齊而不能從晉何也齊桓北杏之會十有七年而後侵許服之又九年而後從于伐楚又二年許坐受圍救而後定自桓公之沒諸侯從楚衆矣許在鄭之南密邇於楚久服楚之威令是以難變也許髙氏閌曰前目後凡也吳氏􅊹曰會溫本欲討然既會之後朝天王執衛侯歸元咺而後圍許故書圍許為繼事也晉文一年之間自春初侵曹伐衛入曹兵威如摧枯拉朽又合諸侯勝楚而盟踐土霸業成矣是後當休兵息民修德行禮以服諸侯之心而禮煩威黷踐土之盟血未乾又合諸侯以會溫城濮之大勞甫息又率諸侯以圍許諸侯亦罷於應命矣是以合四國之力能勝強大之楚合十一國之力乃不能服小弱之許所謂強弩之末不能穿魯縞者矣蓋圍許之諸侯亦強從爾孰肯盡心竭力哉成李氏廉曰桓公沒諸侯從楚不獨許自子人九行而鄭從晉叔武受盟而衛從晉陳侯如會而陳亦從晉前日從楚以執宋圍宋者皆改乘轅而北向獨許負固不至蓋許在鄭南密邇於楚服楚之威令久矣是以久圍而不變也以蕞爾之許合十一國之衆逾時閲嵗而不能成功雖曰義舉亦以見成力之及人淺矣許之甘心從楚其亦有懲於江黃也歟曹伯襄復歸于曹遂會諸侯圍許左傳丁丑諸侯圍許晉侯有疾曹伯之豎侯獳貨筮史使曰以曹為解齊桓公為會而封異姓今君為會而滅同姓曹叔振鐸文之昭也先君唐叔武之穆也且合諸侯而滅兄弟非禮也與衛偕命而不與偕復非信也同罪異罰非刑也禮以行義信以守禮刑以正邪舍此三者君將若之何公説復曹伯遂會諸侯於許榖梁遂繼事也胡傳曹伯襄何以名其歸之道非所以歸也晉侯有疾使其豎侯獳貨筮史曰以曹為解晉侯恐於是反曹伯夫以賂得國而春秋名之比於失地滅同姓之罪以此知聖人嚴於義利之别以正性命之理其説行而天下定矣豈曰小補之哉集説杜氏預曰遂者得復而行不歸國宋陸氏淳曰穀梁云天子免之案晉以曹伯畀人非天子之命也伯孫氏復曰三月晉侯入曹執曹伯畀宋人此言曹襄復歸于曹者晉文赦之也晉文執之曷為晉文赦之春秋亂世強侯執辱小國之君無復天子命執之赦之自我而已案二百四十年惟成十六年曹伯負芻執而得歸由天子命故曰曹伯歸自京師以異其文餘皆否焉劉氏敞曰曹伯襄復歸于曹衛侯以殺叔武名曹伯以賂得國名其惡不同其貶一也此正性命之理也張氏洽曰叔孫豹叔孫婼見執於晉或求貨而為之言豹與婼不與而拒之大夫之知義者猶恥以貨利苟免也况諸侯乎曹伯襄之名其歸之道不得其正矣又迫於晉之威令一年拘執而得釋亟會於圍許之役晉之強已甚而曹之弱可憫也伯汪氏克寬曰曹共公之歸不書自蓋言自晉則曹始執畀於宋若言自宋則其歸實出於晉侯而非宋之得歸故不書自而止曰復歸附録左傳晉侯作三行以禦狄荀林父將中行屠擊將右行先蔑將左行欽定春秋傳説彚纂卷十五
