body:
  text: 欽定四庫全書欽定春秋傳説彚纂卷二十二成公集説范氏寧曰魯世家成公名黑肱宣公之子以周定王十七年即位諡法安民立政曰成辛定王十未七年元年晉景十年齊頃九年衛穆十年蔡景二年鄭襄十五年曹宣五年陳成九年杞桓四十七年宋文二十一年秦桓十五年楚共王審元年春王正月公即位二月辛酉葬我君宣公無冰胡傳寒極而無冰者常燠也案洪範傳曰豫恆燠若此政事舒緩紀綱縱弛之象成公幼弱政在三家公室不張其象已見故當涸陰沍寒而常燠應之古者日在北陸而藏冰獻羔而啓朝之祿位賔食喪祭冰皆與焉此亦燮調愆伏之一事也今既寒而燠遂廢凌人之職然策書所載皆經邦大訓人有微而不登其姓名事有小而不記其本末雨雹冰雪何以悉書天人一理也萬物一氣也觀於陰陽寒暑之變以察其消息盈虛此制治於未亂慎於微之意也每慎於微然後王事備矣集説杜氏預曰周二月今之十二月而無冰書冬溫啖氏助曰二月今之十二月舉此無冰則一時無冰可見矣若待終時乃書則今之正月豈可更言無冰乎榖梁之説非也吕氏大圭曰陽氣之在天地間譬猶火之著於物也故常有以解之十二月陽氣藴伏錮而未發其盛在下則納冰於地中二月四陽作蟄蟲起陽始用事則亦始啓冰而廟薦之四月陽氣畢達陰氣將絶則冰於是大發食肉之祿老病喪浴冰無不及故藏冰發冰所以節陽氣也霜汪氏克寬曰七書不雨三書雨雹及無冰再書隕亦三書雨雪附録左傳春晉侯使瑕嘉平戎於王單襄公如晉拜成劉康公徼戎將遂伐之叔服曰背盟而欺大國此必敗背盟不祥欺大國不義神人弗助將何以勝不聽遂伐茅戎三月癸未敗績於徐吾氏茅戎杜注戎别種也水經注大陽縣有茅亭故茅戎邑也括地志茅戎在河北縣西二十里當在今山西平陽府平陸縣界徐吾氏杜注茅戎别種三月作丘甲左傳為齊難故作丘甲胡傳作丘甲益兵也古者九夫為井四井為邑四邑為丘四丘為甸甸地方八里旁加一里為成所取於民者出長轂一乘此司馬法一成之賦也為齊難作丘甲益兵備敵重困農民非為國之道其曰作者不宜作也唐太宗問李靖楚廣與周制如何靖曰周制一乘步卒七十二人甲士三人以二十五人為一甲凡三甲共七十五人然則一丘所出十有八人積四丘而具一乘耳今作丘甲者即丘出一甲是一甸之中共百人為兵矣則未知其所作者三甸而增一乘乎每乘而增一甲乎魯至昭公時嘗搜於紅革車千乘則計甸而增乘未可知也楚人二廣之法一乘至用百有五十人則魯每乘而增一甲亦未可知也賦雖不同其實皆為益兵其數皆增三之一耳先儒或言甲非人人之所能為又以為丘出甸賦加四倍者誤矣集説劉氏敞曰元年作丘甲魯不務廣德而務廣力不務益義而務益兵以王者之制論之則作丘甲之罪大矣王者之制諸侯不得擅賦其民擅稅其民稅為足食也賦為足兵也足食足兵民信之矣然而不得擅者先王之稅既足以食矣先王之賦既足以用矣今不循先王而以意為準必亂之道也是以聖人禁之杜云長轂一乘戎馬四匹牛十二頭甲士三人步卒七十二人此甸所賦而魯今使丘出之豫謂丘者十六井爾甸乃六十四井使丘供甸賦是加四倍之斂魯亦必不為也公羊云譏始丘使也非也若如此經自當言丘作甲非作丘甲也榖梁云丘為甲也非也審為使民作甲者春秋何不云井作甲邑作甲農作甲而必云作丘甲乎三孫氏覺曰是丘出一甲而甸出甲士四人也往者人而今增其一丘出一人焉甲胡氏寧曰成公以前甸賦車一乘每乘七十二人士三人凡二十五人為一甲是四丘共出三甲爾今作丘甲即一丘出一甲其於賦增三分之一也張氏洽曰每甲士統二十四人必無增甲士而不增步卒之理故知李靖所謂二十五人為一甲者其考周制詳矣家氏鉉翁曰丘甲之説三傳不同公榖謂課丘民自為甲似未得經意杜氏謂古者四丘為甸甸出甲士三人今使一丘出一甸之甲一丘之人豈能出一甸之甲雖求多於民亦未若是之甚也案周禮及司馬法四丘為甸五百七十六夫共出甲士三人步卒七十二人今作丘甲云者每丘出一甲一甸出四甲而古兵制始壞於此矣萬氏孝恭曰四丘之甸共出甲士三人而成公使一丘出一甲士甲士之數既加則長轂牛馬步卒之賦率加其四之一聖人惡其紊亂先王軍賦之制故書以譏之李氏亷曰作例六直云作者三作僖公主作丘甲作三軍新作三新作南門新延廄新作雉門也然延廄不書作又曰此條惟胡氏得之蓋司馬法舊制四丘出三甲三甲為七十五人今四丘出四甲四甲為百人四丘六十四井五百一十二家也公榖之説固無足取杜氏則又太過豈有一丘十六井一百二十八家而使之出一乘之賦哉故胡氏不取夏臧孫許及晉侯盟于赤棘赤棘杜注晉地左傳聞齊將出楚師夏盟於赤棘胡傳初宣公謀以晉人去三桓歸父為是見逐而奔齊矣今季孫當國恨齊人之立宣公納歸父又懼晉侯之或見討也故往結此盟赤棘晉地也其稱及魯所欲也盟非春秋所貴而惡屢盟者非惟長亂亦國用民力所難給也成公即位之初方經大故未有施舍己責逮鰥寡救乏困之事也為齊難既作丘甲矣聞將出楚師又逺與晉尋盟豈固本保邦之道乎書及晉侯盟于赤棘非特備齊懼晉蓋三桓懷忿懟君父之心將有事於齊而汲汲欲之者罪可見矣集説孫氏復曰臧孫許臧孫辰子公胡氏銓曰大夫及諸侯盟見大夫之強也自子遂及齊侯盟後益甚故仲孫何忌及邾子又甚非惟惡大夫之強亦惡諸侯之失其御也高氏閌曰許曷為及晉侯盟齊怨成矣晉援不可緩也故汲汲焉求為此盟公趙氏鵬飛曰魯固齊之與也宣之末年怠於事齊孫歸父如晉叛齊也未反而宣公即世歸父奔齊魯固篤於親晉矣晉蓋疑歸父在齊魯必有二心於齊而魯亦疑晉之不已信也故為赤棘之盟魯蓋果於絶齊志於求晉焉明年齊伐我北鄙而四卿會晉師為鞍之戰其謀蓋定於赤棘也國家氏鉉翁曰中世以後諸侯之大夫多自結於伯魯之季氏衛之孫氏宋之華氏皆結於晉者也不特外交其君又以賄結其大夫故君常見疏於伯國臣反挾伯國之援以脅制其君亂亡所從始也故春秋深著人臣外交之戒汪氏克寬曰自公孫敖會晉侯于戚而後季孫行父會齊侯于陽穀公子遂及齊侯盟于郪丘繼而公孫歸父會齊侯于穀會楚子于宋矣今也臧孫許及晉侯盟于赤棘以大夫盟伯主而不愧也昔也遂盟趙盾今也許盟晉侯益無忌憚矣春秋內大夫特盟外諸侯者五郪丘赤棘拔句繹皆書及唯祲祥書會夫盟齊盟晉魯之汲汲可知于拔則定公之位未定如晉見卻故修好於邾句繹則二卿取邾田又脅邾子以盟之也故四盟皆魯之志也祲祥外為志猶為彼善於此也秋王師敗績于茅戎公榖作貿戎左傳秋王人來告敗穀梁不言戰莫之敢敵也為尊者諱敵不諱敗為親者諱敗不諱敵尊尊親親之義也集説杜氏預曰不言戰王者至尊天下莫之得校故以自敗為文不書敗地而書茅戎明為茅戎所敗書秋從告之啖氏助曰公羊曰孰敗之蓋晉敗之或曰貿戎敗曷為不言晉敗之王者無敵莫敢當也若晉敗王師而改曰貿戎是掩惡也如何懲勸乎陸氏淳曰淳聞於師曰王者之師有征無戰今王與戎為敵此取敗之道非戎所能敗也故以自敗為文所以深譏王也孫氏復曰王者至尊天下莫得而敵非茅戎可得敗也定王庸暗無宣王之烈王師為茅戎所敗惡之大者故孔子以王師自敗為文所以存周也莫劉氏敞曰此敗績也何以不言戰王者無敵天下敢當也莫敢當其言敗績何天下之勢大矣非有能敗王之師者也王自敗也言陳氏傅良曰戰然後言敗績此不戰何以書敗績自敗也凡王有事譏不在諸侯諸侯有事譏不在臣子如天王出居于鄭鄭棄其師皆以自致之文書之雖有敵國亦自致也梁亡齊人殲于遂王師敗績于茅戎無敵國之辭也家氏鉉翁曰穀梁為尊者諱敵不諱敗此義正矣但公穀皆以為晉敗王師則無是也冬十月穀梁季孫行父秃晉郤克眇衛孫良夫跛曹公子手僂同時而聘於齊齊使秃者御秃者使眇者御眇者使跛者御跛者使僂者御僂者蕭同姪子處臺上而笑之聞於客客不説而去相與立胥閭而語移日不解齊人有知之者曰齊之患必自此始矣集説范氏寧曰穀梁子作傳皆釋經以立義未有無其文而橫發傳者疑冬十月下云季孫行父如齊脫此六字附録左傳冬臧宣叔令修賦繕完具守備曰齊楚結好我新與晉盟晉楚爭盟齊師必至雖晉人伐齊楚必救之是齊楚同我也知難而有備乃可以逞壬定王十申八年二年晉景十一年齊頃十年衛穆十一年蔡景三年鄭襄十六年曹宣六年陳成十年把桓四十八年宋文二十二年秦桓十六年楚共二年春齊侯伐我北鄙左傳二年春齊侯伐我北鄙圍龍頃公之嬖人盧蒲就魁門焉龍人囚之齊侯曰勿殺吾與而盟無入而封弗聽殺而膊諸城上齊侯親鼓士陵城三日取龍遂南侵及巢丘龍杜注魯邑在泰山博縣西南胡傳初魯事齊謹甚雖易世而聘會不絶也及與晉侯盟于斷道而後怨隙成再盟于赤棘而後伐我北鄙齊侯之興是役非義矣魯人為鞍之戰豈義乎同曰憤兵務相報復而彼此皆無善者則亦不待貶而罪自見矣集説髙氏閌曰魯絶齊而與晉盟齊遂即楚而伐我也趙氏鵬飛曰魯二於晉久矣而齊未遽加兵於魯者蓋望魯之或改而事齊也齊頃不義於四鄰諸侯皆哆然外之獨魯宣以援立之故不敢忘惠公之好而折節事齊蓋亦不情矣末年命歸父如晉其叛齊之迹已顯而齊不察見歸父之來奔猶以為魯之未絶齊也既而成公立臧孫許及晉侯盟于赤棘始知魯決然無齊故有北鄙之伐焉頃公驕傲結憾於諸侯晉衛既以讎齊今又賈怨於魯其召鞍之敗非不幸也蓋自取也家氏鉉翁曰此齊人爭魯於晉也前日魯宣專意事齊晉莫如之何也今魯人去齊而即晉赤棘朝盟齊師暮至書齊侯伐我所謂目其人而貶之也夫既辱晉使又以兵加於魯則其志在於與晉為敵好戰而不度力其頃公之謂矣李氏亷曰自齊懿公之後齊兵不至魯者二十年於是再見夏四月丙戌衛孫良夫帥師及齊師戰于新築衛師敗績新築杜注衛地史記趙成侯及魏惠王遇于葛築或云即新築也今直隸大名府魏縣南二十里有新築城左傳衛侯使孫良夫石稷寧相向禽將侵齊與齊師遇石子欲還孫子曰不可以師伐人遇其師而還將謂君何若知不能則如無出今既遇矣不如戰也夏有石成子曰師敗矣子不少須衆懼盡子喪師徒何以復命皆不對又曰子國卿也隕子辱矣子以衆退我此乃止且告車來甚衆齊師乃止次于鞫居新築人仲叔于奚救孫桓子桓子是以免既衛人賞之以邑辭請曲縣繁纓以朝許之仲尼聞之曰惜也不如多與之邑唯器與名不可以假人君之所司也名以出信信以守器器以藏禮禮以行義義以生利利以平民政之大節也若以假人與人政也政亡則國家從之弗可止也已鞫居杜注衛地後漢志封丘有鞫亭即古鞫居也胡傳齊師侵虐而以衛主此戰何也衛侯初與晉同盟于斷道矣又使世子臧與晉同伐齊矣又使孫良夫石稷將侵齊矣及與齊師遇石稷欲還良夫不可曰以師伐人遇其師而還將謂君何若知不能則如無出今既遇矣不如戰也遂戰于新築故齊師雖侵虐而此戰以衛主之也春秋善解紛貴逺怨而惡以兵刃相接故書法如此集説杜氏預曰四月無丙戌丙戌五月一日良劉氏敞曰戰而言及之者主之者也猶曰孫夫為志乎為此戰也云爾夫陳氏傅良曰衛書大夫帥師於是始大夫強也良世為卿至林父出其君入于戚以叛是故孔達不言帥師必良夫而後言帥師人張氏洽曰易曰師左次無咎凡戰而不能勝者聖立全師愛民之法所以重民命而存國體也良夫不從石稷之言必進而戰致敗其師幾於喪身辱國此春秋所以罪良夫而以之主新築之戰也莫程氏端學曰良夫專兵輕進以取敗辱國害民罪大焉衛侯使之戰以致敗亦罪也齊侯侵虐鄰國雖得勝於一時遂來鞍之敗績亦罪也案新築之戰説者以為衛伐齊也或又謂新築衛地戰于衛則齊伐衛也考其情事蓋衛興侵齊之師尚在衛之封內而齊既伐魯遂乘勝而伐衛兩軍遇于新築而戰爾良夫喪師辱國故以之主戰而書及六月癸酉季孫行父臧孫許叔孫僑如公孫嬰齊帥師會晉郤克衛孫良夫曹公子首及齊侯戰于鞍齊師敗績郤去逆反首公穀作手鞍音安鞍鞍杜注齊地穀梁曰鞍去齊五百里杜氏通典云在平陰縣東今平陰去臨淄五百里似與穀梁合矣然以左傳考之自始合以至齊敗止為一日之事華不注在濟南城北去平陰二百三十里何以一奔而遽至乎近志云鞍即古之歷下似為得之左傳孫桓子還於新築不入遂如晉乞師臧宣叔亦如晉乞師皆主郤獻子晉侯許之七百乘郤子曰此城濮之賦也有先君之明與先大夫之肅故捷克於先大夫無能為役請八百乘許之郤克將中軍士燮將上軍欒書將下軍韓厥為司馬以救魯衛臧宣叔逆晉師且道之季文子帥師會之及衛地韓獻子將斬人郤獻子馳將救之至則既斬之矣郤子使速以徇告其僕曰吾以分謗也師從齊師於莘六月壬申師至於靡笄之下齊侯使請戰曰子以君師辱於敝邑不腆敝賦詰朝請見對曰晉與魯衛兄弟也來告曰大國朝夕釋憾於敝邑之地寡君不忍使羣臣請於大國無令輿師淹於君地能進不能退君無所辱命齊侯曰大夫之許寡人之願也若其不許亦將見也齊髙固入晉師桀石以投人禽之而乘其車繫桑本焉以徇齊壘曰欲勇者賈余餘勇癸酉師陳于鞍邴夏御齊侯逢丑父為右晉解張御郤克鄭丘緩為右齊侯曰余姑翦滅此而後朝食不介馬而馳之郤克傷於矢流血及屨未絶鼓音曰余病矣張侯曰自始合而矢貫余手及肘余折以御左輪朱殷豈敢言病吾子忍之緩曰自始合苟有險余必下推車子豈識之然子病矣張侯曰師之耳目在吾旗鼓進退從之此車一人殿之可以集事若之何其以病敗君之大事也擐甲執兵固即死也病未及死吾子勉之左並轡右援枹而鼓馬逸不能止師從之齊師敗績逐之三周華不注韓厥夢子輿謂己曰且辟左右故中御而從齊侯邴夏曰射其御者君子也公曰謂之君子而射之非禮也射其左越於車下射其右斃於車中綦毋張喪車從韓厥曰請寓乘從左右皆肘之使立於後韓厥俯定其右逢丑父與公易位將及華泉驂絓於木而止丑父寢於轏中蛇出於其下以肱擊之傷而匿之故不能推車而及韓厥執縶馬前再拜稽首奉觴加璧以進曰寡君使羣臣為魯衛請曰無令輿師陷入君地下臣不幸屬當戎行無所逃隱且懼奔辟而忝兩君臣辱戎士敢告不敏攝官承乏丑父使公下如華泉取飲鄭周父御佐車宛茷為右載齊侯以免韓厥獻丑父郤獻子將戮之呼曰自今無有代其君任患者有一於此將為戮乎郤子曰人不難以死免其君我戮之不祥赦之以勸事君者乃免之齊侯免求丑父三入三出每出齊師以帥退入於狄卒狄卒皆抽戈楯冒之以入於衛師衛師免之遂自徐關入齊侯見保者曰勉之齊師敗矣辟女子女子曰君免乎曰免矣曰鋭司徒免乎曰免矣曰苟君與吾父免矣可若何乃奔齊侯以為有禮既而問之辟司徒之妻也豫之石窖晉師從齊師入自丘輿擊馬陘齊侯使賔媚人賂以紀甗玉磬與地不可則聼客之所為賔媚人致賂晉人不可曰必以蕭同叔子為質而使齊之封內盡東其畝對曰蕭同叔子非他寡君之母也若以匹敵則亦晉君之母也吾子布大命於諸侯而曰必質其母以為信其若王命何且是以不孝令也詩曰孝子不匱永錫爾類若以不孝令於諸侯其無乃非德類也乎先王疆理天下物土之宜而布其利故詩曰我疆我理南東其畝今吾子疆理諸侯而曰盡東其畝而已唯吾子戎車是利無顧土宜其無乃非先王之命也乎反先王則不義何以為盟主其晉實有闕四王之王也樹德而濟同欲焉五伯之霸也勤而撫之以役王命今吾子求合諸侯以逞無疆之欲詩曰布政優優百祿是遒子實不優而棄百祿諸侯何害焉不然寡君之命使臣則有辭矣曰子以君師辱於敝邑不腆敝賦以犒從者畏君之震師徒橈敗吾子惠徼齊國之福不泯其社稷使繼舊好惟是先君之敝器土地不敢愛子又不許請收合餘燼背城借一敝邑之幸亦云從也况其不幸敢不惟命是聼魯衛諫曰齊疾我矣其死亡者皆親昵也子若不許讎我必甚唯子則又何求子得其國寶我亦得地而紓於難其榮多矣齊晉亦唯天所授豈必晉晉人許之對曰羣臣帥賦輿以為魯衛請若苟有以藉口而復於寡君君之惠也敢不唯命是聽禽鄭自師逆公莘杜注齊地下靡笄杜注山名史記晉平公元年伐齊戰于靡徐廣曰靡當作歷志曰歷山即左傳所謂靡笄之山也今名千佛山在山東濟南府南十里華不注杜注山名伏琛云不音跗與詩鄂不韡韡之不同謂花蒂也言此山孤秀如華跗之著於水也今在山東濟南府城北華泉京相璠曰華不注山下泉水也北徐關今淄川縣有古徐關石窖杜注邑名濟盧縣東有地名石窖隋初為盧縣之長清鎮尋置長清縣今仍之古城在縣東南三十里丘輿杜注齊邑當在益都縣界今馬陘杜注齊邑在益都縣西南胡傳大國三軍次國二軍魯雖大國而四卿並將是四軍也當此時舊制猶存尺地皆公室之土也一民皆公室之兵也上卿行父與僑如嬰齊各帥一軍會戰而臧孫許如晉乞師又逆晉師為之道本不將兵特往來晉魯兩軍之間預謀議耳成公初立主幼國危為季孫一怒掃境內興師而四卿並出肆其憤欲雖無人乎成公之側有不恤也然後政自季氏出矣將稱元帥略其副屬辭之體也而四卿皆書者豈特為詳內録哉堅冰之戒亦明矣經之大例受伐者為主而此以四國及之者以一笑之微殘民毒衆幾獲其君而怒猶未怠焚雍門之茨侵車東至海故以四國主之為憤兵之大戒見諸行事深切著明矣集説董氏仲舒曰頃公齊桓之孫伯主之餘業即位九年未嘗一與會同之事有怒魯衛之志伐魯入其北郊伐衛敗之新築大國往聘慢而不敬晉魯俱怒合四國之衆大困之於鞍大辱身幾亡國為天下笑梁趙氏匡曰公羊云曹無大夫書公子手憂內也穀云以吾四大夫在焉舉其貴也此尤鄙近春秋豈黨內而專輕重於外乎也劉氏敞曰公羊曰曹無大夫公子手何以書憂內非也春秋不王魯吾既言之矣且曹何以獨無大夫乎若曹以小國故無大夫鄭亦伯也亦無大夫乎且春秋之正諸侯也以王爵不以土地廣狹也曹鄭同儕一有大夫一無大夫何哉陳氏傅良曰凡帥非卿不書雖卿也非元帥亦不書書魯四卿是各自帥也自文季年而無使介至是而無將佐魯三家之勢成矣於是衛書良夫曹書公子首而賞鞍之功晉於是有六卿征伐在大夫不獨魯也以四國之臣戰齊君甚矣張氏洽曰兵法爭恨小故不忍忿怒者謂之忿兵今晉為盟主興師討齊非有救亂誅暴之名而起於郤克一怒之憤故春秋不以齊為主見晉魯衛曹之大夫為志乎是戰雖得一朝之勝不足道也趙氏鵬飛曰鞍之戰以四國之七大夫而敵一齊侯雖頃公橫逆有以召天下之兵而大夫之專恣亦甚矣驕傲不悛以犯諸侯之怒者齊也威丙下移而啓大夫之橫者四國也齊侯不義而四國之君不智春秋蓋同一貶焉家氏鉉翁曰魯諸卿俱帥師又見昭十年伐莒哀二年伐邾三家專兵丘甸卒乘悉為所有其君孤立於上國益不可為而春秋終矣戰鞍乃魯卿擅兵之始也又曰凡內大夫帥師惟主帥得書今四卿並書見羣下知有季孫不知有公室三家自是愈專而公室微矣李氏廉曰春秋列書將佐始此自此以後昭十年伐莒書三卿哀二年伐邾書三卿成六年侵宋書二卿定八年侵衛書二卿汪氏克寬曰齊桓伐衛與衛人戰則先書伐而後書戰此不書四國伐齊者以郤克志在釋己私忿非能聲齊頃陵弱犯寡之罪而討之也然齊自翟泉以來不與晉之會盟者踰四十年而袁婁以後逮於悼公之終歷三十餘載無會之不同無役之不與則亦以鞍之敗衄有以挫其氣而摧其強故耳晉氏世伯合諸侯以加兵於齊者三鞍之戰雖能勝齊然恃力而不能服之以義惟平陰之役合十有二國之君以討其暴橫憑陵之惡故春秋書同圍齊以豫之至于夷儀之會雖曰討之以義而徇於利不能成討齊之功故春秋書同盟重丘以貶之也之王氏錫爵曰齊之君臣恃勇輕敵而不免於敗晉將佐忍傷致死而卒能勝之所謂兩敵相當貴於忍也案四國戰齊於鞍諸大夫興大衆以雪一笑之恥故説者多以為忿兵然是時楚氛孔熾齊以東方之大國亦與楚通矣晉將復修伯業若不得齊則魯衛曹邾皆有依違觀望之意故盟于斷道謀楚即以謀齊及爰婁既盟而齊不背晉者二十餘年楚亦少斂其鋒晉人世伯之緒賴以不墜則鞍之戰亦安可少哉秋七月齊侯使國佐如師己酉及國佐盟于袁婁穀作爰婁西袁婁張氏洽曰臨淄縣有袁婁或曰在淄川境左傳秋七月晉師及齊國佐盟于袁婁使齊人歸我汶陽之田公羊師還齊侯晉郤克投戟逡巡再拜稽首馬前逢丑父者頃公之車右也面目與頃公相似衣服與頃公相似代頃公當左使頃公取飲頃公操飲而至曰革取清者頃公用是佚而不反逢丑父曰吾賴社稷之神靈吾君已免矣郤克曰欺三軍者其法奈何曰法斫於是斫逢丑父己酉及齊國佐盟于袁婁曷為不盟於師而盟于袁婁前此者晉郤克與臧孫許同時而聘於齊蕭同姪子者齊君之母也踊於棓而窺客則客或跛或眇於是使跛者迓跛者使眇者迓眇者二大夫出相與踦閭而語移日然後相去齊人皆曰患之起必自此始二大夫歸相與率師為鞍之戰齊師大敗齊侯使國佐如師郤克曰與我紀侯之甗反魯衛之侵地使耕者東畝且以蕭同姪子為質則吾舍子矣國佐曰與我紀侯之甗請諾反魯衛之侵地請諾使耕者東畝是則土齊也蕭同姪子者齊君之母也齊君之母猶晉君之母也不可請戰一戰不勝請再再戰不勝請三三戰不勝則齊國盡子之有也何必以蕭同姪子為質揖而去之郤克眣魯衛之使使以其辭而為之請然後許之逮于袁婁而與之盟穀梁鞍去國五百里爰婁去國五十里一戰綿地五百里焚雍門之茨侵車東至海君子聞之曰夫甚甚之辭焉齊有以取之也齊之有以取之何也敗衛師于新築侵我北鄙敖郤獻子齊有以取之也爰婁在師之外郤克曰反魯衛之侵地以紀侯之甗來以蕭同姪子之母為質使耕者皆東其畝然後與子盟國佐曰反魯衛之侵地以紀侯之甗來則諾以蕭同姪子之母為質則是齊侯之母也齊侯之母猶晉君之母也晉君之母猶齊侯之母也使耕者盡東其畝則是終土齊也不可請一戰一戰不克請再再不克請三三不克請四四不克請五五不克舉國而授於是而與之盟雍門齊記古齊城周五十里有十三門其西曰雍門胡傳齊國佐如師與楚屈完來一也然陘之役則曰來盟于師盟于召陵鞍之戰則曰及國佐盟于袁婁何也荆楚暴橫憑陵諸夏齊桓公仗義聲罪致討威行江漢之上不待加兵而楚人帖服其書來盟于師者楚人自服而求盟也盟于召陵者桓公退舍禮與之盟也在春秋時斯為善矣若夫袁婁則異於是齊雖侵虐未若荆楚之暴也諸國大夫含憤積怒欲雪一笑之恥至於殺人盈野非有擊強扶弱之心國佐如師將以賂免非服之也晉大夫又不以德命使齊人盡東其畝而以蕭同叔子為質夫蕭同叔子齊君之母也則亦悖矣由是國子不可請合餘燼背城借一揖而去之郤克使魯衛之使以其辭為之請逮于袁婁而與之盟則汲汲欲盟者晉也故反以晉人及之若此類見曲直之繩墨矣是故制敵莫如仗義天下莫大於理而強有力不與焉亦可謂深切著明矣集説劉氏敞曰齊侯使國佐如師公羊曰君不行使乎大夫此其行使乎大夫何佚獲也非也君不行使乎大夫者謂安平無事耳今兩國治戎將在軍君命有所不受苟君命有所不受其重且專也可知矣行使何傷又諸侯會晉師於棐林實趙盾之師言晉師者君不會大夫也君不會大夫故可言晉師不可言趙盾今此亦言晉師足矣乃其常文何以為不行使大夫乎髙氏閌曰國佐受成命於君而可否在晉之大夫非服晉而往也直畏晉強賂晉而請盟爾故不曰來盟而曰齊侯使如師師在齊境故書如於陳氏傅良曰屈完不言使而退盟之於召陵以禮楚使國佐言使而進盟之于袁婁以逼齊君桓公之所不敢而四國之臣敢為之甚矣鞍戰之忿也勝張氏洽曰郤克挾主盟之勢以行其私憤一旦戰而以不義求多於齊反為國佐以理折之其氣遂餒書曰齊侯使國佐如師言齊非有誠服之心也曰及國佐盟于袁婁言汲汲在晉齊不得已而盟也公家氏鉉翁曰召陵之師諸侯皆在兵力甚強而桓乃能以不戰服楚退師而禮與之盟鞍之戰郤克既敗齊師極其兵力之所至逮於袁婁去國都五十里進師將及其城而強與之盟退而盟盟之以其禮也進而盟盟之以其力也春秋書來盟及盟一字褒敗深切著明矣故吳氏澄曰齊師既敗于鞍使國佐來納賂以求成書如師晉之義既不足以服齊之心故國佐徑去四國進師追及國佐近逼齊都而與盟袁婁此晉之無義又無禮也程氏端學曰齊侯自恃其強以伐人及其窮蹙則使重臣求免四國大夫專兵雪忿偶得一勝則逞無窮之欲二者皆足為永鑒矣入李氏廉曰此條三傳略同公羊序事與榖梁相出但以使齊為臧孫許及郤克斫丑父等小不合又左氏作蕭同叔子以為同叔蕭君之字其子齊君之母也此説得之公羊作蕭同姪子以蕭同為國名姪子者蕭同君姪娣之子嫁於齊生頃公榖梁作蕭同姪子之母以為蕭國也同姓也姪子字也其母更嫁齊惠公生頃公楚人滅蕭隨母在齊其説無據夫汪氏克寬曰齊桓末年公孫敖帥師及諸侯之大救徐征伐自大夫出矣而未嘗盟會也晉文末年翟泉之盟以諸侯之大夫上盟王子虎禮樂自大夫出矣而非征伐也今此魯以四卿帥師會伯國之上卿與衛曹之卿大夫敗齊侯于鞍又盟齊國佐于袁婁而禮樂征伐皆自大夫出矣厥後晉悼以復伯之賢首以諸侯之大夫圍彭城城虎牢盟陳袁僑征伐盟會悉付之大夫而蕭魚之後凡役皆以大夫矣翟泉之大夫貶稱人此不勝貶則從同同也附録左傳公會晉師于上鄍賜三帥先路三命之服司馬司空輿師候正亞旅皆受一命之服上鄍杜注地闕當在陽穀縣境蓋齊衛境上之邑也八月壬午宋公鮑卒左傳八月宋文公卒始厚葬用蜃炭益車馬始用殉重器備槨有四阿棺有翰檜君子謂華元樂舉於是乎不臣臣治煩去惑者也是以伏死而爭今二子者君生則縱其惑死又益其侈是棄君於惡也何臣之為庚寅衛侯速卒速公作遫左傳九月衛穆公卒晉三子自役弔焉哭於大門之外衛人逆之婦人哭於門內送亦如之遂常以葬附録左傳楚之討陳夏氏也莊王欲納夏姬申公巫臣曰不可君召諸侯以討罪也今納夏姬貪其色也貪色為淫淫為大罰周書曰明德慎罰文王所以造周也明德務崇之之謂也慎罰務去之之謂也若興諸侯以取大罰非慎之也君其圖之王乃止子反欲取之巫臣曰是不祥人也是天子蠻殺御叔弒靈侯戮夏南出孔儀喪陳國何不祥如是人生實難其有不獲死乎天下多美婦人何必是子反乃止王以豫連尹襄老襄老死於邲不獲其尸其子黑要蒸焉巫臣使道焉曰歸吾聘女又使自鄭召之曰尸可得也必來逆之姬以告王王問諸屈巫對曰其信知罃之父成公之嬖也而中行伯之季弟也新佐中軍而善鄭皇戍甚愛此子其必因鄭而歸王子與襄老之尸以求之鄭人懼於邲之役而欲求媚於晉其必許之王遣夏姬歸將行謂送者曰不得尸吾不反矣巫臣聘諸鄭鄭伯許之及共王即位將為陽橋之役使屈巫聘於齊且告師期巫臣盡室以行申叔跪從其父將適郢遇之曰異哉夫子有三軍之懼而又有桑中之喜宜將竊妻以逃者也及鄭使介反幣而以夏姬行將奔齊齊師新敗曰吾不處不勝之國遂奔晉而因郤至以臣於晉晉人使為邢大夫子反請以重幣錮之王曰止其自為謀也則過矣其為吾先君謀也則忠忠社稷之固也所蓋多矣且彼若能利國家雖重幣晉將可乎若無益於晉晉將棄之何勞錮焉曰晉師歸范文子後入武子曰無為吾望爾也乎對師有功國人喜以逆之先入必屬耳目焉是代帥受名也故不敢武子曰吾知免矣郤伯見公曰子之力也夫對曰君之訓也二三子之力也臣何力之有焉范叔見勞之如郤伯對曰庚所命也克之制也燮何力之有焉欒伯見公亦如之對曰燮之詔也士用命也書何力之有焉陽橋杜注魯地陸澄曰博縣有陽橋今在泰安州西北取汶陽田汶音問公羊汶陽田者何鞍之賂也胡傳汶陽之田本魯田也取者得非其有之稱不曰復而謂之取何也恃大國兵力一戰勝齊得其故壤而不請於天王以正疆理則取之不以其道與得非其有奚異乎然則宜奈何考於建邦土地之圖若在封域之中則先王所錫先祖所受經界世守不可亂矣不然侵小得之春秋固有興滅國繼絶世之義必有處也魯在戰國時地方五百里而孟氏語慎子曰如有王者作在所損乎在所益乎經於復其故田而書取所損益可知矣集説杜氏預曰晉使齊還魯故書取不以好得故不言歸石氏介曰內取外邑皆曰取如取郜取防取訾婁外歸魯地皆曰歸如濟西龜陰及歡闡汶陽田魯地也齊人以歸於我當曰歸今而曰取者蓋因晉力而取之也歸者其意也取者我也非其志也於後齊復事晉故八年使韓穿來言歸之於齊然此年齊歸我田書曰取八年齊取我田乃曰歸者取之自晉歸之自晉以見魯國之命制於晉而已故雖我田也而不得偃然有之其猶寄爾故齊歸我田書曰取猶若取之於外者齊取我田書曰歸猶若齊之所有也故孫氏復曰汶陽之田魯地也齊人侵之今魯從晉復取之不言取之齊者明本非齊地家氏鉉翁曰取汶陽田與取濟西田其事同故書法不異蓋濟西本魯田為曹所侵晉人取以歸魯汶陽亦魯田為齊所侵晉人命以歸魯皆魯侵疆也今而得歸春秋不以為歸而以為取為其因伯國之力而得之也伯國復不稟命於王分正疆理而擅其豫奪所以書取若此田非魯之舊疆必繫之於齊不直書取汶陽田矣再李氏廉曰汶陽田侵於齊久矣一反於曹沫之盟復於鞍之戰又失於韓穿之來言直至孔子為政然後有鄆歡龜陰之歸鄆歡龜陰左氏亦曰汶陽之田也汪氏克寬曰僖元年公賜季友汶陽之田又曰趙氏云凡力得之曰取齊歸汶陽而稱取言藉晉之力以復之而得之之難也穀梁云歸易辭也齊取汶陽而稱歸言奉晉之命以反之而失之之易也冬楚師鄭師侵衛集説髙氏閌曰鄭從楚而首伐衛喪是授戈與寇而攻其親戚罪不勝誅矣列鄭於下所以深罪鄭也機趙氏鵬飛曰機會之失為損大矣楚鄭侵衛晉失也晉自文襄以降世嗣霸統成公靈公庸懦無立猶時出而主諸侯景公之興適當楚莊之方張無以施其一二宣十八年楚子旅卒共王即位未能和諸侯晉不能於是時修文襄之業號召諸侯以抗楚乃區區修一朝之忿而助魯衛以逞憾於齊則楚鄭侵衛晉致之也既而楚勢益張魯人戰恐公及楚大夫為蜀之會卒之天下諸侯自河以東一舉而屬楚是雖魯成之罪而晉之責為重也十有一月公會楚公子嬰齊于蜀楚書公子自嬰齊始左傳宣公使求好於楚莊王卒宣公薨不克作好公即位受盟於晉會晉伐齊衛人不行使於楚而亦受盟於晉從於伐齊故楚令尹子重為陽橋之役以救齊將起師子重曰君弱羣臣不如先大夫師衆而後可詩曰濟濟多士文王以寧夫文王猶用衆况吾儕乎且先君莊王屬之曰無德以及逺方莫如惠恤其民而善用之乃大户已責逮鰥救乏赦罪悉師王卒盡行彭名御戎蔡景公為左許靈公為右二君弱皆強冠之冬楚師侵衛遂侵我師於蜀使臧孫往辭曰楚逺而久固將退矣無功而受名臣不敢楚侵及陽橋孟孫請往賂之以執斫執針織紝皆百人公衡為質以請盟楚人許平胡傳案左氏魯衛受盟於晉從於伐齊故楚為陽橋之役令尹子重曰師衆而後可於是王卒盡行二國稱師著其衆也侵衛則書侵我師于蜀致賂納質沒而不書非諱也書其重者則莫重乎降班失列下與楚大夫會也季孫行父為國上卿當使其君尊榮其民免於侵陵之患而危辱至此特起於忿忮肆其褊心而不知制之以禮也集説啖氏助曰穀梁曰楚無大夫其曰公子何也嬰齊亢也傳以處父不書族為亢今以書族為亢何自矛盾也夫陳氏傅良曰凡吾君會諸侯則有大夫得稱其大故洮書莒慶向書衛寧速苟無諸侯則不以大夫敵吾君故莒無大夫則曰莒人齊有大夫則曰齊大夫及高傒盟及處父盟始以大夫敵吾君矣皆不書公以是為齊晉之譏則諱公焉耳此其曰公會楚公子嬰齊是公自與嬰齊夷也於楚之會盂公後諸侯至於楚之圍宋公亦後諸侯至魯猶重從楚也公與嬰齊夷楚何譏焉不足為公諱焉爾是故自屈完以來楚大夫無氏族也而書公子自嬰齊始家氏鉉翁曰自楚僭王其公子亦僭而稱王子久矣今書楚公子春秋革之也衛吳氏澄曰楚用子重之謀以救齊為名加兵於魯魯納賂請平又約諸國會盟公先往會嬰齊不沒嬰齊之氏名者欲見其挾衆威魯而以臣伉君也李氏廉曰公特會外大夫止此楚季氏本曰成公以周公之裔諸侯之望下與大夫會辱已甚矣何以善其後哉丙申公及楚人秦人宋人陳人衛人鄭人齊人曹人邾人薛人鄫人盟于蜀左傳十一月公及楚公子嬰齊蔡侯許男秦右大夫説宋華元陳公孫寧衛孫良夫鄭公子去疾及齊國之大夫盟于蜀卿不書匱盟也於是乎畏晉而竊與楚盟故曰匱盟蔡侯許男不書乘楚車也謂之失位君子曰位其不可不慎也乎蔡許之君一失其位不得列於諸侯况其下乎詩曰不解于位民之攸塈其是之謂矣胡傳盟而魯與必先書公尊內也次書主盟者衆所推也此書公及楚人則知主盟者楚也公子嬰齊秦右説宋華元陳公孫寧衛孫良夫鄭去疾皆國卿也何以稱人楚僭稱王春秋黜之晉雖不競猶主夏盟諸侯苟能任仁賢修政事保固疆圉要結鄰好同心擇義堅事晉室荆楚雖大何畏焉今乃西向服從而與盟不亦恥乎集説陸氏淳曰趙氏云公與外大夫盟例不書公而此書之譏公棄晉從楚也又曰淳聞於師曰外大夫悉書人言公自屈禮與之盟非大夫之罪也序李氏堯俞曰前此楚與諸國盟皆序諸國之下此諸國之上欲見楚之主盟也識劉氏敞曰公羊云其稱人何得一貶焉云爾吾不得貶云者竟何事也榖梁曰會與盟同月則地會不地盟不同月則地會地盟此其地會地盟何也以公之得其所申其事也非也會時一國盟時十一國十一月公會楚公子嬰齊于蜀丙申公及楚人秦人宋人陳人衛人鄭人齊人曹人邾人薛人繒人盟于蜀此乃兩會也各自書地乃其理矣何申之有程子曰楚為強盛陵轢諸侯諸侯苟能保固疆圉要結鄰好豈有不能自存之理乃懼而服從與之盟約故皆稱人以見其衰弱責諸侯則魯可知矣諸陳氏傅良曰曷為貶稱人楚大夫初會盟也是故侯之大夫復不序晉大夫初會盟則不言公楚大夫初會則其言公何公固與嬰齊夷矣無足諱焉爾家氏鉉翁曰晉伐齊敗之鞍盟之袁婁齊遂與楚合導之以來晉人坐視莫之如何吳氏澄曰嬰齊於此盟降稱人而前會稱氏名者欲見楚人即公子嬰齊也蔡許之君不書者以其為楚之車左車右降在臣列同於楚臣李氏廉曰列人諸國之大夫者惟翟泉澶淵及此三役翟泉諱公不書澶淵沒魯大夫不書惟此書公又曰合此一年之事觀之晉蓋竭力以事齊故無力以制楚勝齊之得小而縱楚之害大矣又曰楚專主諸侯之盟莫盛於此以楚成之強所得者陳蔡鄭許四國而已而宋之盟止書諸侯商臣之暴所得者陳蔡鄭宋四國而已而厥貉之次止書蔡雖以莊王之盛而辰陵之盟亦不過陳蔡二國從之今蜀之盟諸侯從之者十一國晉不敢爭其後四十三年然後晉楚之從交相見又八年楚靈求諸侯於晉皆蜀之役啓之也春秋安得不重貶之哉一會一盟前不書嬰齊之名氏無以見楚之強後不貶諸國無以見諸國之弱惟貶諸國之卿不得不貶楚貶楚及諸國則不諱公可也胡氏陳氏説得之榖梁以為前書嬰齊者嬰齊之伉後書楚人者嬰齊能自降以從盟故春秋於會蜀不諱公疑其説之誤矣案楚秦列諸國之上蓋以強大相先也舊史從赴告之文聖人亦因而書之耳蔡許不書則左氏得之附録左傳楚師及宋公衡逃歸臧宣叔曰衡父不忍數年之不宴以棄魯國國將若之何誰居後之人必有任是夫國棄矣是行也晉辟楚畏其衆也君子曰衆之不可已也大夫為政猶以衆克况明君而善用其衆乎大誓所謂商兆民離周十人同者衆也晉侯使鞏朔獻齊捷於周王弗見使單襄公辭焉曰蠻夷戎狄不式王命淫湎毁常王命伐之則有獻捷王親受而勞之所以懲不敬勸有功也兄弟甥舅侵敗王略王命伐之告事而已不獻其功所以敬親昵禁淫慝也今叔父克遂有功於齊而不使命卿鎮撫王室所使來撫余一人而鞏伯實來未有職司於王室又姦先王之禮余雖欲於鞏伯其敢廢舊典以忝叔父夫齊甥舅之國也而大師之後也寧不亦淫從其欲以怒叔父抑豈不可諫誨士莊伯不能對王使委於三吏禮之如侯伯克敵使大夫告慶之禮降於卿禮一等王以鞏伯宴而私賄之使相告之曰非禮也勿籍癸定王十酉九年三年晉景十二年齊頃十一年衛定公臧元年蔡景四年鄭襄十七年曹宣七年陳成十一年把桓四十九年宋共公固元年秦桓十七年楚共三年春王正月公會晉侯宋公衛侯曹伯伐鄭左傳三年春諸侯伐鄭次於伯牛討邲之役也遂東侵鄭鄭公子偃帥師禦之使東鄙覆諸鄤敗諸丘輿皇戍如楚獻捷伯牛杜注鄭地注鄤杜注鄭地丘輿杜鄭地胡傳案左氏諸侯伐鄭討邲之役也遂東侵鄭公子偃帥師禦之覆諸鄤敗諸丘輿夫討邲之役則復怨勦民非觀釁也遂東侵則潛師掠境非以律也覆而敗諸則專用詐謀非正勝也度彼參此皆無善也略而不紀勝負微也晉侯稱爵而以伐書何也初為是役必以鄭之從楚也則盟主有辭於伐耳宋衛未葬曷為稱爵背殯越境以吉禮從金革之事也集説杜氏預曰宋衛未葬而稱爵以接鄰國非禮也高氏閌曰去冬之役鄭為楚導而宋魯衛曹雖盟于蜀猶不敢背晉故罷盟而遂會晉伐鄭焉鄭罪當討故春秋正諸國之爵以示義鄭敗晉遊兵於丘輿使皇戍如楚獻捷終鄭襄公之身不復從晉矣家氏鉉翁曰魯宋衛曹去強盛之楚而從衰弱之晉以伐有罪之國是春秋之所嘉也四國書爵序晉為首存晉伯也李氏亷曰此邲之後晉再伐鄭而不服也敗汪氏克寬曰左傳云鄭皇戌如楚獻捷則曰覆曰皆指鄭而言非諸侯之敗鄭也經書伐而不書敗所以尊諸侯也辛亥葬衛穆公穆公作繆集説高氏閌曰此見衛侯背殯出師不臨先君之喪王氏葆曰六月乃葬非禮也二月公至自伐鄭集説吳氏澄曰雖未逾時伐鄭無功亦危之而致也甲子新宫災三日哭公羊新宫者何宣公之宫也宣宫則曷為謂之新宫不忍言也其言三日哭何廟災三日哭禮也新宫災何以書記災也穀梁新宫者禰宫也三日哭哀也其哀禮也迫近不敢稱諡恭也其辭恭且哀以成公為無譏矣集説杜氏預曰三年喪畢宣公神主新入廟故謂之新宫書三日哭善得禮宗廟親之神靈所馮居而遇災故哀而哭之立高氏閌曰君子於是乎知有天道也宣公弒君篡生不能誅死方立廟遽遇火災春秋志此示有天道公家氏鉉翁曰公羊以廟災三日哭為禮榖梁以成為無譏常山劉氏以主未遷入不當哭書哭所以譏愚竊以公穀之義為正也三年之喪通喪也二十七月而終宣公薨至是二十八月則主已入廟此入廟之始也主方入廟而廟災此人情之戚成公三日哭可謂知所哀而哀也焚先人之廬猶三日哭今主始入廟而廟為火所燬人子之痛切為甚三日哭而謂之不合於禮失春秋所以書之旨為李氏廉曰此條諸傳皆以得禮惟胡氏不合乙亥葬宋文公胡傳案左氏文公卒始厚葬益車馬重器備君子謂華元樂舉於是乎不臣考於經未有以驗其厚也數其葬之月則信然矣天子七月諸侯五月大夫三月士踰月以降殺遲速為禮之節不可亂也文公之卒國家安靖外無危難曷為越禮踰時逮乎七月而後克襄事哉故知華元樂舉之棄君於惡而益其侈無疑矣夫禮之厚薄稱人情而為之者也宋公在殯而離次出境從金革之事哀戚之情忘矣顧欲厚葬其君親此非有所不忍於死者特欲誇耀淫侈無知之人耳世衰道微禮法既壞無以制其侈心至於秦漢之間窮竭民力以事丘隴其禍有不可勝言者春秋據事直書而其失自見此類是也豈不為永戒哉集説高氏閌曰七月而葬天子之禮也以葬月考之知其僭禮夏公如晉左傳夏公如晉拜汶陽之田集説張氏洽曰汶陽之田特書曰取足以見疆埸之令不出於王矣今為取田而往拜賜於伯國晉偃然受之而八年復使韓穿來言汶陽之田歸之於齊足見私情之納侮於晉也趙氏鵬飛曰古者諸侯繼世喪葬畢則以士服見於王王賜之韍冕然後朝鄰國以繼好結信禮之經也今成公釋禫不朝王而朝晉此何禮邪春秋諸侯以強弱為判何有於禮宣公受位於齊故喪畢則朝齊而不朝晉成公受制於晉故喪畢則朝晉而不朝齊則夫相朝之禮顧所畏者先之匹敵以下有所不朝而况周室之微哉彼其狎諸侯而不復朝君子在所不責聖人書朝晉之事凡以責其偃然無王也家氏鉉翁曰魯宣諂齊未除喪而會既除喪而朝成公事晉率宣公之舊除喪入見之禮不用之王而施之晉春秋所以譏也李氏廉曰成公朝晉者四三年四年十年四年不見敬十年見止張氏所謂納侮者信矣惟十八年悼公即位之朝無譏焉賜汪氏克寬曰僖公取濟西田而使公子遂如晉拜已非正矣况以成公取汶陽而躬朝於晉乎濟西汶陽魯之故田也以為伯國之私惠而聘之朝之見魯之不振也鄭公子去疾帥師伐許左傳許恃楚而不事鄭鄭子良伐許集説高氏閌曰疲命於晉楚而以伐之君子以是惡鄭也陳氏傅良曰鄭初書大夫將也張氏洽曰晉方怒鄭之不服其為國憂未有底止也乃怒許之不事已而使大夫動大衆以伐之見其興兵之不度德量力也職趙氏鵬飛曰鄭之伐許自撤藩蔽以開楚寇也以方考之許近於楚楚越許而後至鄭許弱不能抗楚折而從之君子不責恤其弱也鄭以許為蔽而北事晉連諸侯以抗荆楚楚亦未遽得鄭也今鄭折而從楚又連年伐許扼許之小而肆其毒許鄭脣齒也許亡則鄭亡曷釋許以為外扞固鄭之利也乃區區逼許不已其後許畏鄭益甚遷入楚地遷于葉又遷于白羽又遷于容城逼近楚都所以倚楚而抗鄭鄭既失許故楚兵一出則直履鄭郊楚患益近故襄公之後鄭多入楚歲有晉楚之兵腹背受敵水火交熾而鄭特如在鼎之魚耳其患皆起於伐許而自撤藩扞之故不可不察也故聖人於鄭伐許之事始終詳之所以誅鄭之無謀而隳內固之勢也公至自晉胡傳宣公薨至是三年之喪畢矣宜入朝京師見天子受王命然後歸而即政可也嗣守社稷之重而不朝於周以拜汶陽田之故而往朝於晉其行事亦悖矣此春秋所為作也集説家氏鉉翁曰諸侯既除喪而入見於王受黻冕之賜然後成其為君自東遷此禮廢然亦未有除喪而入見大國以事王之禮而事大國者也宣公挾強齊之援弒君篡國凡可以諂齊而求悅者無不為矣未除喪而會既除喪而朝今成公借援於晉率循先公之舊其無王之罪大矣書如書至所以譏也年汪氏克寬曰成公一經此年如晉明年再如晉十又如晉十八年又如晉過於事天子之禮蓋當時諸侯知有伯者而不知有王不以為異耳春秋莫不書至比事以觀義自著矣附録左傳晉人歸楚公子穀臣與連尹襄老之尸於楚以求知罃於是荀首佐中軍矣故楚人許之王送知罃曰子其怨我乎對曰二國治戎臣不才不勝其任以為俘馘執事不以釁鼓使歸即戮君之惠也臣實不才又誰敢怨王曰然則德我乎對曰二國圖其社稷而求紓其民各懲其忿以相宥也兩釋纍囚以成其好二國有好臣不與及其誰敢德王曰子歸何以報我對曰臣不任受怨君亦不任受德無怨無德不知所報王曰雖然必告不穀對曰以君之靈纍臣得歸骨於晉寡君之以為戮死且不朽若從君之惠而免之以賜君之外臣首首其請於寡君而以戮於宗亦死且不朽若不獲命而使嗣宗職次及於事而帥偏師以修封疆雖遇執事其弗敢違其竭力致死無有二心以盡臣禮所以報也王曰晉未可與爭重為之禮而歸之秋叔孫僑如帥師圍棘棘杜注汶陽田之邑在濟北蛇丘縣劉昭曰蛇丘縣有棘鄉季氏私考曰今當為肥鄉縣地左傳秋叔孫僑如圍棘取汶陽之田棘不服故圍之公羊棘者何汶陽之不服邑也其言圍之何不聽也胡傳案左氏取汶陽之田棘不服故圍之復故地而民不聽至於命上將用大師環其邑而攻之何也魯於是時初稅畝作丘甲稅役日益重矣棘雖復歸故國所以不願為之民也歟成公不知薄稅斂輕力役修德政以來之而肆其兵力雖得之亦必失之集説趙氏匡曰凡內自圍者皆叛邑三李氏廉曰春秋內叛書圍者七始於此昭十年圍費二十六年圍成定六年圍鄆十年圍郈圍費十二年圍成大雩晉郤克衛孫良夫伐牆咎如牆在良反公作將榖作牆咎音羔牆咎如杜注赤狄别種左傳晉郤克衛孫良夫伐牆咎如討赤狄之餘焉牆咎如潰上失民也集説胡氏寧曰經不書牆咎如潰者晉常滅赤狄潞氏甲氏及留吁矣其餘黨散入牆咎如又欲盡殄滅之非仁人之心也段紀明請滅羌種羌雖滅漢亦亡後世豈嘗絶羌患哉牆咎如潰削而不書聖人之情見矣此家氏鉉翁曰克與良夫得志於鞍不知自戢更為舉春秋書之誅善戰也楚方躪藉中原晉人不務修明伯業圖其逺者大者既滅潞氏又殄留吁以為未快復興此役此逐利之師春秋惡之屢書皆所以貶焉程氏端學曰晉不修德以綏諸侯攘強楚而斃斃惟狄之務摟與國以伐之其為國可知矣冬十有一月晉侯使荀庚來聘晉來聘之始衛侯使孫良夫來聘丙午及荀庚盟丁未及孫良夫盟聘而遂盟之於是始左傳冬十一月晉侯使荀庚來聘且尋盟衛侯使孫良夫來聘且尋盟公問諸臧宣叔曰中行伯之於晉也其位在三孫子之於衛也位為上卿將誰先對曰次國之上卿當大國之中中當其下下當其上大夫小國之上卿當大國之下卿中當其上大夫下當其下大夫上下如是古之制也衛在晉不得為次國晉為盟主其將先之丙午盟晉丁未盟衛禮也公羊此聘也其言盟何聘而言盟者尋舊盟也胡傳其言及者公與之盟而不言公見二卿之抗也集説髙氏閌曰庚晉之下卿良夫衛之上卿而魯人盟之先晉後衛豈非畏晉之強乎李氏廉曰聘而遂盟例五此年荀庚良夫十一年郤犫襄七年林父十五年向戌案庚與良夫聘且盟左氏公羊皆以為尋盟則是二臣之聘盟兩受君命非奉命來聘而擅及魯盟也劉氏敞以為專命生事者過矣又謂不繫於國以見遂事之辱不知奉使而來既書晉侯衛侯則及盟可不繫於晉衛也鄭伐許胡傳晉楚爭鄭鄭兩事焉及邲之敗於是乎專意事楚晉雖加兵終莫之聽也至此一歲而再伐許甚矣夫不擇於義之可否以為去就又馮弱犯寡一歲之中而再動干戈於鄰國不既甚乎集説孔氏穎達曰直舉國名傳無其説知是告辭略故史異文耳賈逵云鄭小國與大國爭諸侯仍伐許不稱將帥刺無知也此年夏鄭公子去疾帥師伐許明年冬鄭伯伐許先後並無貶責何獨此伐偏刺之公家氏鉉翁曰鄭莊滅許自知不義置之而去今襄以兵加許歲至於再莊有悔過之心而裔孫濟惡自是許卒為鄭所並案蜀之盟諸侯從楚者多出於不得已若許若蔡國小受脅不足責也鄭為畿內之國以邲之敗而叛晉既伐衛又一歲再伐許故春秋惡之胡傳所謂不擇於義以為去就而馮弱犯寡者也不書將帥孔氏穎達從杜注以為告辭略而駁賈逵之説謂先後伐許皆不貶責何以獨於此偏刺亦似有理今並存之附録左傳十二月甲戌晉作六軍韓厥趙括鞏朔韓穿荀騅趙旃皆為卿賞鞍之功也齊侯朝於晉將授玉郤克趨進曰此行也君為婦人之笑辱也寡君未之敢任晉侯享齊侯齊侯視韓厥韓厥曰君知厥也乎齊侯曰服改矣韓厥登舉爵曰臣之不敢愛死為兩君之在此堂也荀罃之在楚也鄭賈人有將置諸褚中以出既謀之未行而楚人歸之賈人如晉荀罃善視之如實出已賈人曰吾無其功敢有其實乎吾小人不可以厚誣君子遂適齊甲定王二戌十年四年晉景十三年齊頃十二年衛定二年蔡景五年鄭襄十八年曹宣八年陳成十二年把桓五十年宋共二年秦桓十八年楚共四年春宋公使華元來聘左傳四年春宋華元來聘通嗣君也集説王氏葆曰宋入春秋未嘗聘魯文十一年公子遂雖往而宋不報也華元之來其為共公謀昏張本乎之趙氏鵬飛曰禮諸侯世相朝所以繼好結信春秋世以強弱為判齊晉大國宋不敢不朝匹敵以下固未嘗朝聘已為腆矣聖人志之凡以志其任勢而廢禮也吳氏澄曰晉衛宋三國相繼來聘以三年春同會伐鄭交結和好也年李氏廉曰經書宋聘魯始此終春秋宋聘魯四此及八年華元襄十五年向戌昭十二年華定三月壬申鄭伯堅卒集説杜氏預曰壬申二月二十八日把伯來朝左傳杞伯來朝歸叔姬故也集説杜氏預曰將出叔姬先修朝禮言其故直趙氏鵬飛曰叔姬不令於把把伯將出之彼歸叔姬則疑魯用叔姬之諼以疾於把故先朝於魯而言其故焉故明年叔姬來歸夏四月甲寅臧孫許卒集説汪氏克寬曰文仲之子宣叔也子紇嗣為大夫是為武仲公如晉左傳夏公如晉晉侯見公不敬季文子曰晉侯必不免詩曰敬之敬之天維顯思命不易哉夫晉侯之命在諸侯矣可不敬乎集説高氏閌曰公連歲如晉者以嘗即楚故也曰張氏洽曰晉景公勝齊而驕也汪氏克寬成公此年朝晉而取辱豈非禮愈繁而身愈卑徒自屈而已耳葬鄭襄公集説汪氏克寬曰喪未五月葬之速也太不懷也公季氏本曰襄公卒二月而葬其速如此必襄以弟代兄其後嗣子有爭也觀悼公未逾年而稱伯則必有故而汲汲於即位治喪矣秋公至自晉左傳秋公至自晉欲求成於楚而叛晉季文子曰不可晉雖無道未可叛也國大臣睦而邇於我諸侯聽焉未可以二史佚之志有之曰非我族類其心必異楚雖大非吾族也其肯字我乎公乃止集説家氏鉉翁曰甚哉魯成中無所主逐變而屢遷也始與晉人連兵伐齊以有鞍之勝謂當與晉為睦曾未幾月率先諸侯受盟於楚猶幸晉人之無討也去年如晉今年又如晉正所以救前日匱盟之過一不為所禮又將叛而即楚春秋於魯成之從楚適晉備書以貶之也冬城鄆鄆公作運集説杜氏預曰公欲叛晉故城而為備曰趙氏鵬飛曰鄆即汶陽之一邑也以田言之汶陽以邑言之曰鄆三戴氏溪曰定公時齊歸鄆歡龜陰之田杜氏謂此邑者汶陽之田也魯既得汶陽故城鄆以自固入家氏鉉翁曰鄆有三莒之别邑亦曰鄆九年楚人鄆是也魯自有二鄆文十二年城諸及鄆此東鄆莒魯所爭者也成十六年公待於鄆此西鄆今此所城也春秋譏魯人不務安靜而輕於用民力鄆雖城何益哉案經書城鄆左氏無傳杜氏預以為備晉者因公之不禮於晉也戴氏溪謂魯得汶陽故城鄆以自固於情事亦近鄭伯伐許左傳冬十一月鄭公孫申帥師疆許田許人敗諸展陂鄭伯伐許取鉏任泠敦之田晉欒書將中軍荀首佐之士燮佐上軍以救許伐鄭取汜祭楚子反救鄭鄭伯與許男訟焉皇戍攝鄭伯之辭子反不能決也曰君若辱在寡君寡君與其二三臣共聽兩君之所欲成其可知也不然側不足以知二國之成展陂杜注許地今在許州西北縣鉏任泠敦俱在許州境泛祭杜注鄭地成皋東有泛水案此為二邑泛即成皋之泛祭即中牟之祭亭周祭伯之邑也蓋此時已入於鄭矣胡傳悼公伐許稱爵何也喪未踰年以吉禮從金革之事則忘親矣稱爵非美詞所以著其惡也集説董氏仲舒曰父卒未踰年即以喪舉師也春秋以為薄恩且失其子心其先君襄公伐喪叛盟得罪諸侯繼其業者宜矜善以覆之今又重之父伐人喪子以喪伐人父不義於人子失恩於親也何氏休曰未踰年君稱伯者樂成君位親自伐許故如其意以著其惡程子曰稱鄭伯見其不復為喪以吉禮從戎陵家氏鉉翁曰父所為義已繼之為孝父挾楚之援暴小國歲再用師其子繼世而不能改是之謂濟惡庸得為孝乎不書子而書爵絶之於名教也李氏廉曰鄭自隱十一年入許之後鄭許世讎至此凡書於經者又四侵伐矣年季氏本曰鄭介晉楚之間國尚不能自立而乃屢用兵爭勝鄰國豈固本保邦之道乎許余氏光曰郭氏曰案去歲鄭襄公伐許經書鄭伐今年鄭悼公伐許經書鄭伯伐許前此成公二年八月衛穆公速卒冬楚師鄭師侵衛三年夏鄭公子去疾帥師伐許凡此亦皆據舊史而書之春秋立義雖不同不應於數年之中事同罪一或恕之於前或誅之於後參錯變亂聖人決不如此也附録左傳晉趙嬰通於趙莊姬乙定王二亥十一年五年晉景十四年齊頃十三年衛定三年蔡景六年鄭悼公費元年曹宣九年陳成十三年把桓五十一年宋共三年秦桓十九年楚共五年春王正月把叔姬來歸穀梁婦人之義嫁曰歸反曰來歸胡傳前書把伯來朝左氏以為歸叔姬也此書杞叔姬來歸則出也春秋於內女其歸其出録之詳者男女居室人之大倫也男子生而願為之有室女子生而願為之有家父母之心人皆有之而不能為之擇家與室則夫婦之道苦淫僻之罪多矣王法所重人倫之本録之詳也為世戒也集説何氏休曰始歸不書與郯伯姬同曰孫氏復曰來歸者棄而來歸也黃氏仲炎把叔姬見出而來歸猶郯伯姬也不趙氏鵬飛曰內女見出皆曰來歸然罪惡不可以辨故有歸之者有自歸者以見意齊人來歸子叔姬罪在齊也把叔姬來歸罪在叔姬也叔姬自取出絶故以自歸為文雖姬之罪無所考而觀聖人所書之文則歸之者以見夫不夫自歸者以見婦不婦家氏鉉翁曰春秋之世倫分廢缺夫婦之道乖矣有出而允於義者有出而悖於禮者杞伯來朝之明年而後叔姬乃歸此與他悖義之出不同必叔姬自不安於把非把絶之也故其卒把復逆喪以葬叔姬繫於把義未絶也吳氏澄曰疑是叔姬無子把桓别有妾子為太子叔姬心不自安而願歸魯故叔姬既卒而把桓復來逆其喪以歸也姻汪氏克寬曰叔姬始嫁不見於經與郯伯姬同婚得禮常事不書又曰郯伯姬把叔姬皆出而來歸然叔姬書卒書把伯逆喪以歸而郯伯姬來歸之後不復見於經則其善惡優劣不可以槩觀矣附録左傳春原屛放諸齊嬰曰我在故欒氏不作我亡吾二昆其憂哉且人各有能有不能舍我何害弗聽嬰夢天使謂己祭余余福女使問諸士貞伯貞伯曰不識也既而告其人曰神福仁而禍淫淫而無罰福也祭其得亡乎祭之之明日而亡仲孫蔑如宋左傳孟獻子如宋報華元也集説汪氏克寬曰蔑與華元交相聘問其情厚矣而明年蔑僑如逼於晉令遽興侵宋之師朝玉帛而暮干戈謹於邦交者固如是乎夏叔孫僑如會晉荀首于穀首公作秀左傳夏晉荀首如齊逆女故宣伯餫諸穀集説高氏閌曰荀首逆女而僑如往饋之此之謂非禮之禮故以大夫會大夫書之鄭氏玉曰穀齊地他國大夫非過吾境而使大夫會之非禮也若僑如私會則尤專恣之甚故謹而書之汪氏克寬曰自文十一年彭生會郤缺宣十五年蔑會高固自是大夫會大夫率以為常矣梁山崩梁山杜注在馮翊夏陽縣北詩奕奕梁山水經注河水又南徑梁山原是也夏陽今同州韓城縣屬陜西西安府左傳梁山崩晉侯以傳召伯宗伯宗辟重曰辟傳重人曰待我不如捷之速也問其所曰絳人也問絳事焉曰梁山崩將召伯宗謀之問將若之何曰山有朽壤而崩可若何國主山川故山崩川竭君為之不舉降服乘縵徹樂出次祝幣史辭以禮焉其如此而已雖伯宗若之何伯宗請見之不可遂以告而從之公羊梁山者何河上之山也梁山崩何以書記異也何異爾大也何大爾梁山崩壅河三日不㳅為天下記異也穀梁梁山崩壅遏河三日不流晉君召伯尊而問焉伯尊來遇輦者輦者不辟使車右下而鞭之輦者曰所以鞭我者其取道逺矣伯尊下車而問焉曰子有聞乎對曰梁山崩壅遏河三日不流伯尊曰君為此召我也為之奈何輦者曰天有山天崩之天有河天壅之雖召伯尊如之何伯尊由忠問焉輦者曰君親素縞帥羣臣而哭之既而祠焉斯流矣伯尊至君問之曰梁山崩壅遏河三日不流為之奈何伯尊曰君親素縞帥羣臣而哭之既而祠焉斯流矣孔子聞之曰伯尊其無績乎攘善也胡傳梁山韓國也詩曰奕奕梁山韓侯受命而謂之韓奕者言奕然髙大為韓國之鎮也後為晉所滅而大夫韓氏以為邑焉書而不繫國者為天下記異是以不言晉也左氏載絳人之語於禮文備矣而未記其實也夫降服乘縵徹樂出次祝幣史辭六者禮之文也古之遭變異而外為此文者必有恐懼修省之心主於內若成湯以六事檢身髙宗克正厥事宣王側身修行欲銷去之是也徒舉其文而無實以先之何足以弭災變乎夫國主山川至於崩竭當時諸侯未聞有戒心而修德也故自是而後六十年間弒君十有四亡國三十二其應亦憯矣春秋不明著其事應而事應具存其可忽諸集説杜氏預曰記異也有劉氏敞曰穀梁曰不日何也髙者有崩道也崩道則何以書也尋穀梁此文似云山有崩道崩不當書今以晉侯問伯宗故獨書也是豈春秋意耶髙氏閌曰先王之制名山大川不以封梁山雖屬於韓而非諸侯正受封之地故春秋書梁山崩而不繫之國者為天下記異也是以不書晉夫國主山川豈特晉當之哉侯趙氏鵬飛曰梁山晉地也詩曰奕奕梁山蓋在韓之國韓滅於晉其地為晉晉侯及秦伯戰於韓是也梁山晉地而不繫之晉山崩川竭天下之大異天地不為一國而示變聖人亦豈為一國而書之天地示變以警人君聖人志之以示後世君人者觀此亦可以識天意矣若取其事應以合之曰此梁山崩之驗是亦淫巫瞽史之事非君子所欲聞也汪氏克寬曰春秋之初晉滅韓曲沃莊伯之弟韓萬以為采邑又曰自此至昭十六年凡六十年經書弒君惟晉州蒲齊光衛剽吳餘祭蔡固莒密州楚虔凡七滅國惟舒庸鄫萊逼陽舒鳩賴陳蔡州來凡九耳故徐彥疏云注誤今考文十一年敗狄于鹹何氏謂宣成以往弒君二十八亡國四十證諸經亦不合抑並春秋所不書者言之如穀梁三十四戰者歟入邵氏寶曰春秋為天下紀異者三梁山崩有星孛於北斗西狩獲麟山斗以異為異麟以祥為異以異為異者亂世之常以祥為異者亂世之變附録左傳許靈公訴鄭伯於楚六月鄭悼公如楚訟不勝楚人執皇戌及子國故鄭伯歸使公子偃請成於晉秋八月鄭伯及晉趙同盟于垂棘出宋公子圍龜為質於楚而歸華元享之請鼓譟以鼓譟以復入曰習攻華氏宋公殺之秋大水集説張氏洽曰山崩大水陰盛之徵冬十有一月己酉天王崩集説孫氏復曰定王也之高氏閌曰不書葬罪諸侯不會也十有二月己丑公會晉侯齊侯宋公衛侯鄭伯曹伯邾子杞伯同盟于蟲牢蟲牢杜注鄭地陳留封丘縣北有桐牢今桐牢亭在河南開封府封丘縣北三里左傳冬同盟于蟲牢鄭服也諸侯謀復會宋公使向為人辭以子靈之難胡傳案左氏許靈公訴鄭伯於楚鄭伯如楚訟不勝歸而請成於晉盟于蟲牢鄭服也鄭服則何以書同盟天王崩赴告已及在諸侯之策矣以所聞先後而奔喪禮也而九國諸侯會盟不廢故特書同盟以見其皆不臣集説何氏休曰約備強楚序杜氏預曰言同盟服異也杜氏諤曰晉齊於宋上把伯序於諸侯之下者以強弱為大小也盟孫氏復曰蟲牢之盟鄭服也天王崩晉合諸侯同于蟲牢不顧甚矣程子曰天王崩而會盟不廢書同見其皆不臣斷趙氏鵬飛曰晉景即位十有五年矣蓋嘗為清丘道之盟以求諸侯於時楚莊方張諸侯二三其德晉不能宗主也今蟲牢之會始能復振其勢且反鄭於久叛雖未足以成桓文之功而志有足嘉也人李氏亷曰鄭自邲戰後皆從楚至此始從晉而晉不能明尊王之義以示之汲汲於要之以盟誓此所以竟不能服鄭雖再救而卒無功也汪氏克寬曰是盟乃何休所謂同心為惡惡必成者也蓋諸侯之同盟實有同外楚之心而不知悖於尊王之義天子之喪人道始終之大變諸侯相見揖讓入門而聞訃則不得終禮况已聞而猶相與會盟不亦無人心乎春秋之諸侯不知有王故襄王方崩則晉魯之卿會盟王都之側而不奔喪簡王方崩而邾與晉衛修朝聘於魯而不修弔事蓋將以是為常而不知愧甚者靈王之訃音已達於天下而諸侯旅朝於荆楚且俟致襚執紼越歲踰時而後返而曾不遣一介行李問國恤於京師也吁可歎哉趙氏恆曰書同盟亦只是志同欲之通例善惡則存乎其事以此時言之史策方有天王崩之文而同盟豈其時乎非特為不臣而立此同盟之文也案蟲牢之盟胡傳謂九國不知奔喪其議甚正然是時齊始從晉鄭以訟許不勝亦改而從晉晉為是盟以固諸侯之心亦復伯之機也趙氏鵬飛之説亦可並存欽定春秋傳説彚纂卷二十二
