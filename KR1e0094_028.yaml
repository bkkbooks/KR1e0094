body:
  text: 欽定四庫全書欽定春秋傳説彚纂卷二十六戊靈王戌九年十年晉悼十年齊靈十九年衛獻十四年蔡景二十九年鄭簡三年曹成十五年陳哀六年把孝四年宋平十三年秦景十四年楚共二十八年呉壽夢二十三年春公㑹晉侯宋公衛侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光㑹呉于柤柤莊加反州柤杜注楚地今山東兗府嶧縣泇口是也左傳十年春㑹于柤㑹呉子壽夢也三月癸丑齊髙厚相太子光以先㑹諸侯於鍾離不敬士莊子曰髙子相太子以㑹諸侯將社稷是衛而皆不敬棄社稷也其將不免乎夏四月戊午㑹于柤集説杜氏預曰呉子在柤晉以諸侯往㑹之故曰㑹呉劉氏敞曰社云呉不稱子從所稱也非也呉子豈自稱呉而已乎凡呉子鄭伯之類亦皆人稱之爾非其君自稱也且若從其所稱而稱之乎則呉當稱王楚亦當稱王必不但曰呉也榖梁曰㑹又㑹外之也非也㑹于戚呉人亦在何不外之乎㑹于申淮夷亦在何不外之乎曰蘇氏轍曰特書㑹呉以呉為㑹故也趙氏鵬飛晉率十二諸侯㑹呉於楚地謀楚也謀楚則未嘗伐楚何以知其謀盖謀制楚以服鄭而已不志於伐也晉楚爭鄭久矣前日伐鄭鄭既同盟而復叛以楚兵逼之也楚兵不出則鄭可久安故晉侯㑹呉于柤以示晉已得呉呉將援晉而椅楚楚謀出兵則懼呉襲其後而内有所忌然後晉得以服鄭鄭得以從晉而無楚患也卓氏爾康曰合十二國以㑹夀夢而於楚界示楚以得呉也晉得呉則楚右臂斷不敢議鄭議鄭則恐呉之據其後也其後蕭魚之㑹卒得鄭不叛者二十年吳掎楚楚不敢伐鄭也雖然晉悼虎牢之城先識地勢扼鄭咽喉自戲盟之役三分四軍以待來者是故楚疲晉逸三駕而不可爭鄭子展曰晉君方明必不棄鄭楚之柄臣如子囊者亦曰晉不可敵事之而後可豈獨以柤㑹呉之故哉張氏溥曰荆楚地大人悍専與伯爭當日諸侯能敵之者齊晉秦三大國齊自桓公薨後國亂君弱不敢専兵伐楚秦以殽戰讐晉連歲搆師反與楚合晉獨力制楚秦又乘之雖城濮餘威鄢陵新敗楚無懼志虐宋役鄭惟所欲為晉雖欲起而服之未有隙也呉居肘腋之下盛氣方厲巫臣啟謀楚疲奔命鳩兹庸浦之間干戈日見晉一通呉呉益致鋭於楚師不出則擾其旁出則議其後楚畏呉偪無暇與晉校晉始得息鄰睦交屢舉盟㑹收宋陳伐秦鄭坐享霸功是故晉三㑹呉専以楚故權事濟變非得已也晉文之時能克楚者齊秦而樂為晉用文公因之集二國之師于城濮一戰而勝晉悼之時能克楚者呉而未必即為晉用悼公惟招之同㑹不用呉師而楚人自屈此悼公之知權也戚陳氏際泰曰悼公三駕呉未始與焉然于善道于于柤其申好不一而足也夫豈無所用也吾謂此即齊桓逺結江黄之遺智也而吳竟未嘗亡一矢遺一鏃吾謂此即江黄按兵不動遥相掎角之遺智也案晉悼之時楚氛方熾晉合諸侯以攘之猶懼不足以集事於是通呉以為掎角之勢及鄭已服晉而楚不敢爭則晉不復恃呉矣故呉伐楚喪范宣子數其不徳以退之盖用呉而不肯為呉用晉之君臣早有成算説者必以㑹呉為悼公伯業之累不亦過乎夏五月甲午遂滅偪陽偪音福又彼力反榖作傅懐偪陽杜注彭城傅陽縣也章太子曰偪陽故城在氶縣南今在兖州府嶧縣南五十里左傳晉荀偃士匄請伐偪陽而封宋向戌焉荀罃曰城小而固勝之不武弗勝為笑固請丙寅圍之弗克孟氏之臣秦堇父輦重如役偪陽人啟門諸侯之士門焉縣門發郰人紇抉之以出門者狄虒彌建大車之輪而蒙之以甲以為櫓左執之右㧞㦸以成一隊孟獻子曰詩所謂有力如虎者也主人縣布堇父登之及堞而絶之隊則又縣之蘇而復上者三主人辭焉乃退帶其斷以狥於軍三日諸侯之師久於偪陽荀偃士匄請於荀罃曰水潦將降懼不能歸請班師知伯怒投之以机出於其間曰女成二事而後告余余恐亂命以不女違女既勤君而興諸侯牽帥老夫以至於此既無武守而又欲易余罪曰是實班師不然克矣余羸老也可重任乎七日不克必爾乎取之五月庚寅荀偃士匄帥卒攻偪陽親受矢石甲午滅之書曰遂滅偪陽言自㑹也以與向戌向戌辭曰君若猶辱鎮撫宋國而以偪陽光啟寡君羣臣安矣其何貺如之若専賜臣是臣興諸侯以自封也其何罪大焉敢以死請乃予宋公宋公享晉侯於楚丘請以桑林荀罃辭荀偃士匄曰諸侯宋魯於是觀禮魯有禘樂賔祭用之宋以桑林享君不亦可乎舞師題以旌夏晉侯懼而退入於房去旌卒享而還及著雍疾卜桑林見荀偃士匄欲奔請禱焉荀罃不可曰我辭禮矣彼則以之猶有鬼神於彼加之晉侯有間以偪陽子歸獻於武宮謂之夷俘偪陽妘姓也使周内史選其族嗣納諸霍人禮也師歸孟獻子以秦堇父為右生秦丕兹事仲尼聊杜注聊邑魯縣東南莝城是也霍人杜注霍晉邑榖梁遂直遂也集説杜氏預曰因柤㑹而滅之故曰遂之劉氏敞曰偪陽者何妘姓之國也其言遂滅何諸侯㑹而滅人之國非禮也諸侯與有貶焉左氏曰使周内史選其族姓納諸霍人禮也夫偪陽子竟何罪乎欲取其國以封向戌耳既已擅滅諸侯又擅以其地予人罪孰大焉謂之禮何哉即以選其族姓納諸霍人為禮諸侯誰不樂滅國乎苟滅國矣取其子孫償以一邑誰不樂為此乎孫氏覺曰晉因諸侯而為利名恤災救患而實自封殖者也及高氏閌曰偪陽楚與國也汪氏克寛曰偪陽國柤地皆在沛縣乃吳入北方之要衝則悼公之㑹吳于柤蓋謀滅偪陽而通吳也齊桓之霸滅譚滅遂降鄣遷陽晉文之霸執曹伯逐衛侯悼公之霸滅偪陽皆功不揜過此孟子所以謂五霸者三王之罪人也公至自㑹集説王氏葆曰此致前事者二事偶舉其可道者也㑹吳猶可㑹吳而滅人之國其惡甚矣故以㑹致焉致髙氏攀龍曰不致滅而㑹舉其可道者也楚公子貞鄭公孫輒帥師伐宋左𫝊六月楚子囊鄭子耳伐宋師於訾毋庚午圍宋門於桐門訾毋杜注宋地當在歸德府鹿邑縣境集説髙氏閌曰以宋公受偪陽故也序陳氏傅良曰凡專將言帥師苟二國㑹則先主兵者而不言帥師言帥師是國自為帥也國自為帥自楚公子貞鄭公孫輒始自是雖圍滅亦竝稱帥師矣李氏亷曰鄭之從楚連兵以伐宋一見於宣之元年再見於成之十八年三見於此年四見於明年晉師伐秦左𫝊晉荀罃伐秦報其侵也集説髙氏攀龍曰去年秦人侵晉晉饑不能報至是伐之是時秦人南交於楚而秦景妹又為楚共王夫人附錄左𫝊衛侯救宋師於襄牛鄭子展曰必伐衛不然是不與楚也得罪於晉又得罪於楚國將若之何子駟曰國病矣子展曰得罪於二大國必亡病不猶愈於亡乎諸大夫皆以為然故鄭皇耳帥師侵衛楚令也孫文子卜追之獻兆於定姜姜氏問繇曰兆如山陵有夫出征而喪其雄姜氏曰征者喪雄禦宼之利也大夫圖之衛人追之孫蒯獲鄭皇耳於犬丘秋七月楚子囊鄭子耳伐我西鄙還圍蕭八月丙寅克之九月子耳侵宋北鄙孟獻子曰鄭其有災乎師競已甚周猶不堪競况鄭乎有災其執政之三士乎秋莒人伐我東鄙左傳莒人間諸侯之有事也故伐我東鄙集説汪氏克寛曰莒屢同晉悼之盟而乘間加兵於魯其無忌憚亦甚矣公㑹晉侯宋公衛侯曹伯莒子邾子齊世子光滕子薛伯杞伯小邾子伐鄭此三駕之一左傳諸侯伐鄭齊崔杼使太子光先至於師故長於榺己酉師於牛首集説杜氏預曰齊世子光先至於師為盟主所尊故在滕上孔氏穎逹曰周禮典命諸侯之適子誓於天子攝其君則下其君之禮一等未誓則以皮帛繼子男十九年傳云光之立也列於諸侯矣則光是未誓者也法當繼於子男之下柤之㑹列扵小邾之下是其正也於此伐也𫝊稱崔杼使太子光先至於師故長於滕晉悼以齊是大國光復先至心善其共遂進其班為盟主所尊故在滕上言其非正法也春呂氏大圭曰齊世子光序諸侯上主㑹者為之也秋不改所以示譏言専以彊弱事勢為先後也趙氏鵬飛曰楚鄭伐宋故晉侯率諸侯伐鄭鄭不服於是戍虎牢汪氏克寛曰齊世子光同盟雞澤㑹戚救陳盟戲㑹柤皆序小邾子之下惟此年伐鄭序滕薛杞小邾子之上而傳稱光先至於師明年兩伐鄭又序莒邾之上𫝊亦云齊太子光宋向戌先至於鄭杜氏皆云為盟主所尊故進之夫諸侯之世子誓扵天子而攝其君者下其君之禮一等則侯國世子宜次於伯爵之君之下齊光未誓於天子而可序於薛伯杞伯之上乎成十五年宋世子成序齊大夫之上昭四年宋世子佐序小邾子之下以上公世子而次於子爵是則世子未誓於天子以皮幣繼子男之常制也齊光序諸侯之上是晉悼以私意之向背謂莒邾薛把國弱而卑齊光國大而彊故紊周班而進之也况自晉悼之伯莒邾以子爵而常在薛伯把伯之上則班爵之等又安可以先王舊制論之哉據事直書義自見矣冬盗殺鄭公子騑公子發公孫輒騑公榖作斐書盗始此左傳初子駟與尉止有爭將禦諸侯之師而黜其車尉止獲又與之爭子駟抑尉止曰爾車非禮也遂弗使獻初子駟為田洫司氏堵氏侯氏子師氏皆喪田焉故五族聚羣不逞之人因公子之徒以作亂於是子駟當國子國為司馬子耳為司空子孔為司徒冬十月戊辰尉止司臣侯晉堵女父子師僕帥賊以入晨攻執政於西宮之朝殺子駟子國子耳刦鄭伯以如北宮子孔知之故不死書曰盗言無大夫焉子西聞盗不儆而出尸而追盗盗入於北宮乃歸授甲臣妾多逃噐用多喪子産聞盗為門者庀羣司閉府庫慎閉藏完守備成列而後出兵車十七乘尸而攻盗於北宫子蟜帥國人助之殺尉止子師僕盗衆盡死侯晉奔晉堵女父司臣尉翩司齊奔宋子孔當國為載書以位序聽政辟大夫諸司門子弗順將誅之子産止之請為之焚書子孔不可曰為書以定國衆怒而焚之是衆為政也國不亦難乎子産曰衆怒難犯專欲難成合二難以安國危之道也不如焚書以安衆子得所欲衆亦得安不亦可乎專欲無成犯衆興禍子必從之乃焚書於倉門之外衆而後定集説杜氏預曰非國討當兩稱名氏殺者非卿故稱盗以盗為文故不得言其大夫孔氏穎逹曰若國家討而殺之則舉國名言殺其大夫若非國討兩下相殺則兩書名氏王札子殺召伯毛伯是也此非國討亦當兩書名氏但殺之者尉止司臣之徒皆非卿也非卿則名氏不合見經故稱之為盗凡言其者是其所有也君是臣之君故書弑其君臣是君之臣故書殺其大夫盗者宼賊之名賤之不繫於國被殺者非盗之所有既以盗為文故不得言其大夫數孫氏復曰盗者微賤之稱盗一日而殺三卿故列之惡鄭伯失刑政也上劉氏敞曰榖梁曰稱盗以殺大夫弗以上下道惡也非也若以盗者指其君乎殺其臣而謂之盗是不正名也若以盗者固盗賊乎稱盗乃宜矣又何云弗以上下道也如榖梁之意以上下道則曰盗殺其大夫乎則是大夫為盗之臣盗為大夫之君乃可耳胡氏銓曰盗乘釁而至者也苟無釁隙盗豈敢犯哉三子者不能佐時憂國日尋干戈何異負販小人而乘君子之噐乎如此則盗之招也殺之何悔哉上王氏葆曰易曰小人而乘君子之噐盗思奪之矣慢下暴盗思伐之矣鄭三卿之禍其近是乎者髙氏閌曰為大夫而見殺扵盗則其所以在人上可知也張氏洽曰鄭之從楚以勞列國皆公子騑之罪也鄭成公卒之初諸大夫欲從晉矣公子騑以官命未改止之及鄵之役僖公如㑹以從盟主而騑弑之及楚子囊伐鄭子展欲堅守以待晉而騑請從楚以任其咎故公子騑者弑君之賊也而公子發公孫輒惟騑是從惡積而不可掩鄭不能討而盗得殺之所謂上慢下暴而致宼至孔子以為盗之招也案鄭三卿之死經書盗殺胡𫝊本程子説以為失卿職者非也身為國卿而駢首受戮於盗則不能其職明矣何待削其大夫而始為當官失職者之戒乎杜注孔疏謂以盗為文故不得言其大夫於義為長戍鄭虎牢楚公子貞帥師救鄭左傳諸侯之師城虎牢而戍之晉師城梧及制士魴魏絳戍之書曰戍鄭虎牢非鄭地也言將歸焉鄭及晉平楚子囊救鄭十一月諸侯之師還鄭而南至於陽陵楚師不退知武子欲退曰今我逃楚楚必驕驕則可與戰矣欒黶曰逃楚晉之恥也合諸侯以益恥不如死我將獨進師遂進己亥與楚師夾潁而軍子蟜曰諸侯既有成行必不戰矣從之將退不從亦退退楚必圍我猶將退也不如從楚亦以退之宵渉潁與楚人盟欒黶欲伐鄭師荀罃不可曰我實不能禦楚又不能庇鄭鄭何罪不如致怨焉而還今伐其師楚必救之戰而不克為諸侯笑克不可命不如還也丁未諸侯之師還侵鄭北鄙而歸楚人亦還梧杜注鄭舊地也案隋書滎陽縣有梧桐澗疑即梧也陽陵杜注鄭地今在河南開封府許州西北公羊孰戍之諸侯戍之曷為不言諸侯戍之離至不可得而序故言我也諸侯已取之矣曷為繫之鄭諸侯莫之主有故反繫之鄭集説劉氏敞曰此非鄭地矣曷為繫之鄭反之也曷為反之不土其地正也不土其地則戍之何諸侯以義反之矣而未入也又曰向者鄭虎牢也而不言鄭不使鄭得專之意也今者非鄭虎牢也而繫之鄭不取於鄭之意也故義可以取雖過千乘君子不以為非義所不取雖已失之猶予使得名焉取之以義予之以義雖用天下可也况其下乎又曰榖梁曰其曰鄭虎牢决鄭乎虎牢也非也城人之邑戍人之都勢必繫其國而言有不繫其國者乃變例也如其繫國矣此乃常文又何决哉蘇氏轍曰諸侯既城虎牢非鄭地矣而繫之鄭諸侯將服鄭而歸之故致其意也鄭之虎牢宋之彭城一也陳氏傅良曰向也曰虎牢今也曰鄭虎牢何不繫之鄭者為天下城之也繫之鄭者為鄭戍之也是故楚丘不繫之衛緣陵不繫之杞梁山沙鹿不繫之晉皆非一國之辭也郱鄑郚繫之紀彭城繋之宋皆一國之辭也又曰楚數救鄭矣不書於是始書以為晉悼復伯楚欲救而不能也是故書救陳見晉之終失陳書救鄭見楚之終失鄭云爾為趙氏鵬飛曰孰戍之伐鄭之諸侯戍之也説者以魯獨戍之魯敢以單師抗楚哉家氏鉉翁曰胡文定謂春秋善楚之救殆不然也唐之叛將有乞援於外而抗其君者與諸侯乞援於楚何異即是而觀救之善不善判矣楚汪氏克寛曰前書晉悼救陳而陳卒屬於楚此書救鄭而鄭遂服於晉得鄭而棄陳悼公蓋惑於諸大夫之言以為陳近於楚是以計近功而虧大義急於此而緩於彼也季氏本曰楚本爭鄭春秋何嘗以救許楚乎紀其實而已陳氏宗之曰左氏曰非鄭地也言將歸焉蓋既欲駐師扼險以逼之亦欲兼斷荆楚之路為鄭屏蔽鄭服則將歸焉德威竝行以示懐納扵鄭城而不戍猶不城也楚來爭鄭徐合諸侯以救之無及於楚而勦民猶不救也此戍虎牢之意也戍則當宿兵峙糧據險退可守進可戰鄭服則保鄭以拒楚鄭貳則我扼其要而制其肩膂南向足以禦楚而反向足以臨鄭矣牢嚴氏啟隆曰諸侯伐鄭而鄭不下於是乎頓兵虎為久駐計故亦曰戍非遣兵徃戍之戍若戍陳者比也戍之與圍其用不一圍則勞而戊則逸是以我兵方戍而鄭即平昔日之城所以為今日之戍地也晉師城梧及制梧與制皆虎牢之旁邑城之所以翼虎牢其事細故史不書是時晉之計主於擾鄭而使自服故進無偪之之兵亦主於肄楚而使自疲故遇亦無勝之之意案胡傳謂虎牢繫鄭為罪諸侯非也既滅虎牢而不戍何貴乎城諸侯合兵以戍之所以庇鄭而抗楚三駕之績實本於此何罪之有焉又謂楚師救鄭春秋以救許楚亦非也此年書楚救鄭與僖二十八年書楚救衛義同盖以見晋伯之方興而楚不能爭耳今故不主胡氏説公至自伐鄭集説季氏本曰鄭雖未服而諸侯已戍虎牢則伐鄭之功也故以此飲至附錄左傳王叔陳生與伯輿爭政王右伯輿王叔陳生怒而出奔及河王復之殺史狡以說焉不入遂處之晉侯使士匄平王室王叔與伯輿訟焉王叔之宰與伯輿之大夫瑕禽坐獄於王庭士匄聽之王叔之宰曰篳門閨竇之人而皆陵其上其難為上矣瑕禽曰昔平王東遷吾七姓從王牲用備具王賴之而賜之騂旄之盟曰世世無失職若篳門閨竇其能來東厎乎且王何賴焉今自王叔之相也政以賄成而刑放於寵官之師旅不勝其富吾能無篳門閨竇乎唯大國圖之下而無直則何謂正矣范宣子曰天子所右寡君亦右之所左亦左之使王叔氏與伯輿合要王叔氏不能舉其契王叔奔晉不書不告也單靖公為卿士以相王室已靈王亥十年十有一年晉悼十一年齊靈二十年衛獻十五年蔡景三十年鄭簡四年曹成十六年陳哀七年杞孝五年宋平十四年秦景十五年楚共二十九年吳夀夢二十四年春王正月作三軍左傳十一年春季武子將作三軍告叔孫穆子曰請為三軍各征其軍穆子曰政將及子子必不能武子固請之穆子曰然則盟諸乃盟諸僖詛諸五父之衢正月作三軍三分公室而各有其一三子各毁其乘季氏使其乘之人以其役邑入者無征不入者倍征孟氏使半為臣若子若弟叔孫氏使盡為臣不然不舍胡傳三軍魯之舊也古者大國三軍次國二軍小國一軍魯侯封於曲阜地方數百里天下莫强焉及僖公時能復周公之宇而史克作頌其詩曰公車千乘説者以為大國之賦也又曰公徒三萬説者以為大國之軍也故知三軍魯之舊爾然車而謂之公車則臣下無私乘也徒而謂之公徒則臣下無私民也若有侵伐諸卿更帥以出事畢則將歸於朝車復於甸甲散於丘卒還於邑將皆公家之臣兵皆公家之衆不相繫也文宣以來政在私門襄公㓜弱季氏益張廢公室之三軍而三家各有其一季氏盡征焉而舊法亡矣是以謂之作其明年季孫宿救台遂入鄆又其後享范獻子而公臣不能具三耦民不屬公可知矣春秋書其作舍以見昭公失國定公無正而兵權不可去公室有天下國家者之所宜鑒也集説杜氏預曰魯本無中軍唯上下二軍皆屬於公有事三卿更帥以征伐季氏欲専其民人故假立中軍因以改作舍孔氏穎逹曰昭五年云舍中軍明此年作而彼年故知舊有二軍今増立中軍也然則止是作中軍耳而云作三軍者𫝊言三子各毁其乘則舊時屬已之乘毁之以足成三軍是舊軍盡廢而全改作之故云作三軍杜見其以二改三復據彼中軍之文故言増立中軍耳又曰禮明堂位云成王封周公於曲阜地方七百里其時必有三軍也詩魯頌閟宮頌僖公能復周公之宇曰公徒三萬鄭康成云大國三軍合三萬七千五百人言三萬者舉成數也則僖公復古制亦三軍矣盖自文公以來霸主之令軍多則貢事多自減為二軍耳非是魯衆不滿三軍也若然昭五年舍中軍書之於經往前若減一軍亦應書之而經不書者作三軍與舍中軍皆是變故改常卑弱公室季氏秉國權專擅改作故史特書之耳若國家自量彊弱其軍或減或益國史不須書也周禮小司徒云凡起徒役無過家一人是家出一人故鄉為一軍天子六軍出自六鄉則大國三軍出自三鄉其餘公邑采地之民不在三軍之數季武子今為三軍則異於是矣以魯國屬公之民皆分為三亦謂之三軍其軍之民不啻一萬二千五百家也何則魯國合竟之民屬公者豈唯有三萬七千五百家乎明其决不然矣由此言之此作三軍與禮之三軍名同而實異也又曰三家所得各以父兄子弟分為四季氏盡取四分叔孫氏取子弟而以父兄歸公孟氏止取其子弟之半而以三歸公盖分國民為十二三家得七公得五也趙氏匡曰公羊曰三卿也古者上卿下卿上士下士案魯卿素已有四五不止三也公羊此説適足令學者疑繆爾榖梁曰諸侯一軍案國有小大軍制當異而但云一軍無等差之異必無此理周禮萬二千五百人為軍天子六軍大國三軍次國二軍小國一軍據魯初封時最為大國非一軍明矣孫氏覺曰盖三桓欲弱公室彊私家不量其力之可否而頓作一軍春秋以為亂王制竭民力書曰作三軍也陳氏傅良曰於是季武子作三軍非公命也向也新作南門非公命不書此何以書作南門常事作三軍非常也是故必常事譏不及公則不書苟非常則謹書之書作三軍志三家之分公室也立武宫立煬宮雖非公命皆非常也家氏鉉翁曰析二軍以為三而三家各有其一為國君者僅擁虛噐於上國非其國乾侯之禍權輿於此春秋書城費於前書作三軍於後所以垂人臣負固跋扈之戒李氏廉曰此條其制國分民之説左氏得之而正義尤詳胡氏張氏諸家多從之但杜氏以為魯舊二軍今増立中軍為三軍胡氏以為魯本有三軍今不過廢公室之三軍而三家各有其一故謂之作耳此處小不合然疏又曰成王封周公時必有三軍後以軍多貢重故自減為二軍耳非是魯衆不滿三軍也若如此説則亦無礙於胡氏之義矣汪氏克寛曰費誓稱魯人三郊三遂説者謂大國三軍故三郊三遂則魯舊有三軍明矣然春秋書作三軍盖是時軍政隳壊而公室之三軍不能備王制之舊是以季氏借改作之名而專兵權也聖人不以作三軍繫之三家者其意曰魯國雖失兵權而聖王之大法則不使兵權不在公室也經凡書作者不宜作也如作丘甲作南門作雉門兩觀皆譏也三軍魯之舊制而亦書作學者習其讀而問其𫝊則知罪之在矣王氏錫爵曰此魯民不屬公之始三陳氏宗之曰増立中軍則正是作中軍耳而云作軍者舊軍盡廢而全改作之故云作三軍也往前民皆屬公國家自有二軍若非征伐不屬三子故三子自以采邑之民為己之私乘如子産出兵車十七乘之類是其私家車乘也今既三分公室所分得者即是已有不須更立私乘故三子各自毁壊舊時車乘部伍分以足成三軍也案魯頌公徒三萬鄭箋以為舉成數而言費誓三郊三遂説者亦以為大國三軍故胡𫝊以三軍為魯之舊也考伯禽受封為東方之望國周公有大勲勞於天下得用天子禮樂則舊有三軍尚何疑乎杜氏預因昭五年舍中軍遂謂魯惟上下二軍季氏欲專其民人増立中軍盖昭五年之所舍即此年之所立也其説似非無據今主胡𫝊而杜注亦附存之夏四月四卜郊不從乃不郊集説高氏閌曰魯不當郊郊非禮也今不郊者非知其非禮故也乃卜不從故耳直書不郊則不復免牲矣曰吳氏􅊹曰因四卜瀆以著魯郊之僭牲汪氏克寛僖三十一年亦四卜郊不從但書免不書不郊蓋免牲則不郊可知此云不郊則卜免牲不吉而不敢免也鄭公孫舍之帥師侵宋左傳鄭人患晉楚之故諸大夫曰不從晉國㡬亡楚弱於晉晉不吾疾也晉疾楚將辟之何為而使晉師致死於我楚弗敢敵而後可固與也子展曰與宋為惡諸侯必至吾從之盟楚師至吾又從之則晉怒甚矣晉能驟來楚將不能吾乃固與晉大夫説之使疆埸之司惡於宋宋向戌侵鄭大獲子展曰師而伐宋可矣若我伐宋諸侯之伐我必疾吾乃聽命焉且告於楚楚師至吾又與之盟而重賂晉師乃免矣夏鄭子展侵宋集説杜氏預曰欲以致諸侯國鄭氏玉曰鄭諸大夫既知楚弱於晉不從晉㡬亡即當勇於從晉堅於却楚而乃妄興大衆侵犯大國萬一事有不然輕則喪師重則覆國春秋書之見鄭之無謀罪其大夫之過舉也欲王氏樵曰案鄭之謀國有二犧牲玉帛待於二竟唯彊是從者子駟也晉君方明八卿和睦知必不棄鄭欲仗信以待晉者子展也至是子駟既亡子展遂堅於從晉然猶必侵宋以致諸侯之師使晉師驟來而後固與晉者盖前此從晉則楚師至從楚則晉師至今故欲激使晉師致死於鄭楚弗敢敵而後可固與也卒之晉師三駕而楚弗能與爭可謂如子展之言矣然而子展未知本也子展所見者晉楚之力耳兩彊則爭爭則難於兩與也一弱則吾與固矣此子展之見也然使鄭一於信義以從晉致死不二則以北方與國之多信好之重保鄭却楚有餘矣何至為是瀆武勞人以冀小定而僅給耶故為國在修德政以自彊敦信義以睦鄰而待人之彊有禮以為庇幸敵之少懦以苟安者愚而已矣公㑹晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭此三駕之二左傳四月諸侯伐鄭己亥齊太子光宋向戌先至於鄭門於東門其莫晉荀罃至於西郊東侵舊許衛孫林父侵其北鄙六月諸侯㑹於北林師於向右還次於瑣圍鄭觀兵於南門西濟於濟隧舊許杜注許之舊國鄭新邑案成十五年許遷于葉則許之舊國為鄭所有故謂之舊許向杜注地在頴川長社縣東北今開封府尉氏縣西南四十里有向城瑣杜注滎陽宛陵縣西有瑣侯亭今在河南開封府新鄭縣北溝濟隧杜注水名水經注濟水伏流自河而出隂上源濟隧絶焉世謂之十字溝集説高氏閌曰以前伐未得志而鄭復來侵宋故也陳氏傅良曰隱桓之諸侯皆序爵也伯者作而後小國或序大國之上有以子男長於伯者矣於是以世子長於小國之君則悼公為之也季氏本曰舍之侵宋晉亦不救但亦伐鄭而已是時諸侯之兵常在虎牢國君一集則兵力不勞矣卓氏爾康曰此三駕之二𢷬虛以救宋亦以虎牢先有戍兵易為聲援也秋七月己未同盟于亳城北亳蒲洛反公榖作京河亳城杜注鄭地當在今南府偃師縣左傳鄭人懼乃行成秋七月同盟于亳范宣子曰不慎必失諸侯諸侯道敝而無成能無貳乎乃盟載書曰凡我同盟毋蕰年毋壅利毋保姦毋留慝救災患恤禍亂同好惡奬王室或間兹命司慎司盟名山名川羣神羣祀先王先公七姓十二國之祖明神殛之俾失其民隊命亡氏踣其國家集説杜氏預曰伐鄭而書同盟鄭與盟可知見程子曰鄭服而同盟也隨復從楚伐宋云同其反覆公至自伐鄭集説吳氏􅊹曰以前事致者見雖同盟而未得鄭也李氏廉曰此盟後致伐以先事致與伐楚盟召陵致伐書法同然彼以服楚為大則書致伐者宜也此則未能服鄭正與柯陵事同而書至異者何也榖梁以此為盟後更伐柯陵獨不盟後復伐乎盖厲公三伐終不能服鄭則只以常例書之此則三駕之後蕭魚序績方以㑹至故兩書至伐以見兵事之未可息而終書至㑹以見中國之所以安所謂不一勞者不永逸也歟楚子鄭伯伐宋左傳楚子囊乞旅於秦秦右大夫詹帥師從楚子將以伐鄭鄭伯逆之丙子伐宋胡傳盟于亳城北鄭服而同盟也尋復從楚伐宋故書同盟見其既同而又叛也既同而又叛從子展之謀欲致晉師而後與之也故亳之盟其載書曰或間兹命明神殛之俾失其民隊命亡氏踣其國家雖渝此盟而不顧也噫慢鬼神至於此極而盟猶足恃乎集説高氏閌曰盖用公孫舍之之謀以伐宋自信於楚而數叛晉使楚道敝而固與晉以託國焉公㑹晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭㑹于蕭魚此三駕之三少蕭魚杜注鄭地路史昊後嬴姓國修魚即蕭魚也左傳九月諸侯悉師以復伐鄭諸侯之師觀兵於鄭東門鄭人使王子伯駢行成甲戌晉趙武入盟鄭伯冬十月丁亥鄭子展出盟晉侯十二月戊寅㑹于蕭魚庚辰赦鄭囚皆禮而歸之納斥候禁侵掠晉侯使叔肸告於諸侯公使臧孫紇對曰凡我同盟小國有罪大國致討苟有以藉手鮮不赦宥寡君聞命矣鄭人賂晉侯以師悝師觸師蠲廣車軘車淳十五乘甲兵備凡兵車百乘歌鐘二肆及其鎛磬女樂二八晉侯以樂之半賜魏絳曰子教寡人和諸戎狄以正諸華八年之中九合諸侯如樂之和無所不諧請與子樂之辭曰夫和戎狄國之福也八年之中九合諸侯諸侯無慝君之靈也二三子之勞也臣何力之有焉抑臣願君安其樂而思其終也詩曰樂㫖君子殿天子之邦樂㫖君子福禄攸同便蕃左右亦是帥從夫樂以安德義以處之禮以行之信以守之仁以厲之而後可以殿邦國同福禄來逺人所謂樂也書曰居安思危思則有備有備無患敢以此規公曰子之教敢不承命抑㣲子寡人無以待戊不能濟河夫賞國之典也藏在盟府不可廢也子其受之魏絳於是乎始有金石之樂禮也公羊此伐鄭也其言㑹于蕭魚何盖鄭與㑹爾胡傳程氏曰㑹于蕭魚鄭又服而請㑹也不書鄭㑹謂其不可信也而晉悼公推至誠以待人信鄭不疑禮其囚而歸焉納斥候禁侵掠遣叔肸告於諸侯而鄭自此不復背晉者二十四年至哉誠之能感人也自悼公能謀於魏絳以息民聽於知武子而不與楚戰故三駕而楚不能與之爭雖城濮之績不越是矣集説王氏沿曰書公㑹伐鄭再書㑹于蕭魚盖羙晉侯之功也亦猶楚屈完來盟于師再書盟于召陵之義也乞劉氏敞曰㑹于蕭魚鄭伯如㑹歟則宜以如㑹書盟歟則宜以乞盟書今一皆没之獨稱㑹何哉曰春秋嘉善矜不能而成人之美悼公之服鄭也有道其信義著於諸侯非一日之積此善之可嘉者也鄭伯之欲從晉也亦非一日之積逼於楚之彊而未果此不能之可矜者也然則晉之取鄭鄭之下晉不始於㑹蕭魚之日其信已在前矣至其㑹也諸侯以小息北方以小安是乃有貴乎約信者也其義不言而喻不盟而壹故略其文以見其實盖春秋成人之羙之意也陳氏傅良曰有地㑹而後伐者矣未有伐而後地㑹者也地㑹而後伐未集事之辭也伐而後地㑹集事之辭也伐鄭㑹于蕭魚序績也之吕氏大圭曰悼公再霸之烈其最可稱道者蕭魚㑹以盟則不如屈完之來有以服其心以戰則不如城濮之師有以讋其氣然以荆楚方彊子囊為政而凛然有憚晉之心雖或時帥師徒以示不怯而卒不能以陵駕北方者豈無故哉觀子囊之言則晉悼之所以能服楚者固有道矣趙氏鵬飛曰悼公三年之中五合兵車何晉之速於得鄭哉盖鄭在楚則楚患深鄭不歸則兵不息必得鄭以為外禦則諸侯得以安枕無虞也然鄭自子騑之死君臣皆有歸晉之心戲之盟亳城之役既服而復叛以楚逼之不置耳悼公知楚之逺於鄭故屢出而屢擾之楚知鄭終不能久為楚也數𤼵應兵不勝其疲故亦置而不問焉而鄭亦决於事晉兩犯宋以致晉師藉諸侯之兵叛楚而為晉也蕭魚之役楚疲於外鄭服於内故寸兵不折而鄭自歸隻牲不歃而鄭不叛書曰某侯某侯伐鄭㑹于蕭魚而鄭黙與其列其後二十餘年鄭不復叛而楚不復伐則悼公所以制楚服鄭之功豈不比於桓文耶李氏廉曰晉悼三駕止此八年九合亦止此自襄八年後晉楚爭鄭三年之間晉四興師伐鄭楚輒救之然悼公之服鄭也不以盟誓為信不以威力為武所謂善勝者也故晉之制楚者三文公以力勝厲公以幸勝悼公以善勝其亦庻㡬乎召陵之不戰乎伐楚盟召陵伐鄭㑹蕭魚皆序績之文也汪氏克寛曰㑹于蕭魚與盟于召陵書法正同皆一經之特筆所以序二霸之績鄭之服晉不著鄭㑹而書㑹于蕭魚公至自㑹楚人執鄭行人良霄於伐鄭之下得鄭可知矣又曰晉趙武入盟鄭伯鄭子展出盟晉侯經皆略之謂鄭不可信而小信不足恃也又曰齊桓霸業至葵丘而盛桓公束牲載書而不歃血天下諸侯咸喻乎桓公之志晉悼伯業至蕭魚而盛悼公信鄭不疑不復以諸侯同盟而鄭自此不復叛盖要之以信而使人彊從不若待之以誠而使人自服也公至自㑹榖梁伐而後㑹不以伐鄭致得鄭伯之辭也集說杜氏預曰以㑹至者觀兵而不果侵伐春程子曰兵不加鄭故書至自㑹高氏閌曰秋以變文為襃貶屢書盟而不信則以不書盟為誠屢書伐而無功則以不致伐為羙趙氏鵬飛曰亳城之盟至自伐而蕭魚之役至自㑹亦足以知其以㑹為功而不以伐為功也則諸侯之師盖陣而不伐歟觀乎此益見悼公之功不戰不盟而服鄭也致李氏廉曰厲公三伐終以伐致悼公三伐終以㑹春秋之立文精矣㑹季氏本曰伐鄭而致㑹不以伐為功以為喜也蕭魚㑹而兵得息矣楚人執鄭行人良霄榖作良宵左傳鄭人使良霄大宰石㚟如楚告將服於晉曰孤以社稷之故不能懐君君若能以玉帛綏晉不然則武震以攝威之孤之願也楚人執之書曰行人言使人也榖梁行人者挈國之辭也集説杜氏預曰書行人言非使人之罪古者兵交使在其間所以通命示整或執殺之皆為譏也啖氏助曰稱行人而執以其事執也不稱行人而執以己執也許氏翰曰書楚執良霄見楚之力盡於是矣絶髙氏閌曰此著晉之所以得鄭也鄭伯使良霄告於楚楚人怒而執之雖執之亦不伐鄭是不能得鄭也不能得鄭者勢分於吳也勢分於吳無如之何故執良霄以舒其憤懣不平之氣自是不復出師以與晉爭斯見楚力盡於此矣鄭於是乎堅從晉也趙氏鵬飛曰稱行人將使命於楚也鄭既從晉矣將命於楚何哉告絶也故楚子怒而執之然執鄭行人何傷哉適足以張楚之虐而昭鄭之誠也汪氏克寛曰悼公之四伐鄭于戲則楚子伐鄭戍虎牢則公子貞救鄭亳北則楚鄭伐宋或伐或救或挾鄭以與晉爭獨至於蕭魚僅能止鄭之一卿而不能出師盖勢窮力屈知不可敵而不敢抗也季氏本曰書楚人執鄭行人良霄則鄭之服可知矣悼公之善於屈楚於此可見矣冬秦人伐晉左傳秦庶長鮑庶長武帥師伐晉以救鄭鮑先入晉地士魴御之少秦師而弗設備壬午武濟自輔氏與鮑交伐晉師己丑秦晉戰於櫟晉師敗績易秦故也櫟杜注晉地是時秦師濟自輔氏而敗晉於櫟則櫟乃河上之邑也有謂臨潼縣北有櫟鄉城即此櫟者不知櫟鄉去河甚逺非此櫟也集説髙氏閌曰秦景公妹為楚共王夫人於是為楚伐晉報去年之役家氏鉉翁曰晉為秦所敗春秋略敗而不書不與秦人之為楚而救鄭也庚靈王子一年十有二年晉悼十二年齊靈二十一年衛獻十六年蔡景三十一年鄭簡五年曹成十七年陳哀八年把孝六年宋平十五年秦景十六年楚共三十年呉夀夢二十五年春王三月莒人伐我東鄙圍台台榖作邰下同有台杜注琅琊費縣南台亭今屬山東兗州府集説范氏甯曰伐國重圍邑輕舉重可以包輕不足書而今書盖為下事起劉氏敞曰公羊云伐而言圍者取邑之辭也非也伐一事也圍一事也取一事也三者不相亂而猶云云不亦惑乎榖梁云取邑不書圍安足書也亦非也取邑不書有所避爾始髙氏閌曰諸侯伐我未有言圍邑者書圍邑自此莒人間歳伐我公五與莒子㑹宜其釋怨同好矣而見伐不已則魯弱可知矣季孫宿帥師救台遂入鄆鄆公作運季鄆杜注莒邑案文十二年孫行父帥師城諸及鄆即此也盖季孫城鄆時鄆方屬魯後入於莒是年雖入鄆而未能有之昭元年季孫宿伐莒取鄆則又屬魯矣左傳十二年春莒人伐我東鄙圍台季武子救台遂入鄆取其鐘以為公盤公羊大夫無遂事此其言遂何公不得為政爾榖梁遂繼事也受命而救台不受命而入鄆惡季孫宿也胡傳鄆莒邑也遂者生事也入者逆詞也大夫無遂事受命而救台不受命而入鄆惡季孫宿之擅權使公不得有為於其國也或曰古者命將得專制閫外之事有可以安國家利社稷者專之可也曰此為境外言之也台在邦域之中而專行之非有無君之心者不敢為也昭公逐定無正夫豈一朝一夕之故哉其所由來者漸矣集説何氏休曰時公微弱政教不行故季孫宿遂取鄆而自益其邑髙氏閌曰文十二年嘗帥師城鄆矣魯不能守復為莒所取今復取之季孫因救台而入鄆是無君也家氏鉉翁曰宿始繼其父即首城賜邑繼而作三軍取公室之丘甸以為己之私有今而救台遂事入鄆取邑以自廣其心非為國也年李氏廉曰襄公之編書救邑者二此年救台十五救成盖作三軍之後魯益弱矣以區區之邾莒而連年來伐况齊乎然季孫救台遂入鄆而不忌公親救成乃至遇而不敢前君弱臣彊又可知矣汪氏克寛曰春秋書遂事者十九而内大夫遂事有三公子遂如京師遂如晉乃受君命而以二事出者也公子結媵陳人之婦于鄄遂及齊侯宋公盟季孫宿救台遂入鄆皆以一事出而專繼事者也然結之遂盟致三國之伐乃禮樂之事事雖有害而意猶公也宿之入鄆乃征伐之事事雖有利而意則純乎私矣於惡之中又有惡焉遂入鄆之類是也夏晉侯使士魴來聘左傳夏晉士魴來聘且拜師集説杜氏預曰謝前年伐鄭師鄭抑楚而聘魯善持勝也許氏翰曰晉悼服趙氏鵬飛曰晉以聘問維諸侯薄往而厚來霸者之術也故冬公如晉秋九月呉子乘卒呉始書卒左傳秋呉子壽夢卒臨於周廟禮也凡諸侯之喪異姓臨於外同姓於宗廟同宗於祖廟同族於禰廟是故魯為諸姬臨於周廟為邢凡蔣茅胙祭臨於周公之廟集説徐氏彦曰案宣十八年秋楚子旅卒而呉至是乃書卒者正以其與列國㑹同本在楚後是以春秋略之諸杜氏諤曰宣十八年錄楚子旅卒者甚其暴盛而侯交接赴告之相親也此書呉子卒亦以其暴盛且明諸侯通之㑹之而赴告之相及也避趙氏鵬飛曰呉楚不書葬非魯不㑹也聖人削之其號耳冬楚公子貞帥師侵宋左傳冬楚子囊秦庶長無地伐宋師於楊梁以報晉之取鄭也揚梁杜注梁國睢陽縣東有地名楊梁水經注渙水東逕陽亭北即楊梁也今在歸徳府城東南三十里集説髙氏閌曰秦人與焉而削之者楚人率秦故專罪楚也李氏廉曰著楚之無能為也汪氏克寛曰𫝊言伐而經書侵貶之也貞季氏本曰晉既得鄭而楚欲得志於宋故使公子侵之然楚兵加宋每無功焉盖為晉人不戰所屈而樂喜謀國之功亦不可少也附錄左傳靈王求后於齊齊侯問對於晏桓子桓子對曰先王之禮辭有之天子求后於諸侯諸侯對曰夫婦所生若而人妾婦之子若而人無女而有姊妹及姑姊妹則曰先守某公之遺女若而人齊侯許昏王使隂里結之公如晉左傳公如晉朝且拜士魴之辱集説趙氏匡曰左氏云且拜士魴之辱禮也案大國使聘即須自往拜之是公無寧歳也而言禮也一何繆乎親髙氏閌曰晉侯一使人來聘而公遂往朝之事晉之禮恭矣附錄左傳秦嬴歸於楚楚司馬子庚聘於秦為夫人寧禮也辛靈王十丑二年十有三年晉悼十三年齊靈二十二年衛獻十七年蔡景三十二年鄭簡六年曹成十八年陳哀九年杞孝七年宋平十六年秦景十七年楚共三十一年吳諸樊遏元年春公至自晉左傳十三年春公至自晉孟獻子書勞於廟禮也集説杜氏預曰書勲勞於䇿也桓二年傳曰公至自唐告於廟也凡公行告於宗廟反行飲至舍爵䇿勲焉禮也桓十六年傳又曰公至自伐鄭以飲至之禮也然則還告廟及飲至及書勞三事偏行一禮則亦書至悉闕乃不書至功孔氏穎逹曰凡反行飲至必以嘉㑹昭告祖禰有則舍爵䇿勲無勞告事而已而杜氏諤曰公行踰年返不可不致之夏取邿邿音詩公作詩封邿杜注任城亢父縣有邿亭後漢建武二年劉隆為邿侯即此也今亢父城在濟寧州南五十里邿城在州東南左傳夏邿亂分為三師救邿遂取之集説楊氏士勛曰公羊以邿為邾婁之邑此傳雖無說盖從左氏為國也孔氏穎逹曰釋例曰乗其衰亂或受其潰叛或用少師而不頓兵勞力則直言取如取如攜言其易也劉氏敞曰左氏曰凡書取言易也用大師曰滅弗地曰入非也春秋之興褎善貶惡所以示後世法非記難易而已也難易何足紀乎而許氏翰曰晉始息民是以楚侵宋而不報魯取邿不討取無大亂而已髙氏閌曰魯乘亂滅之以為附庸不言滅者内大惡故婉其辭也取趙氏鵬飛曰邿小國也内諱滅書取視若己地而之諱之適所以張之也此所謂隱而顯者也邾汪氏克寛曰公羊以邿為邾邑然不書伐邾則非邑明矣季氏本曰邿近魯微國取之以為己邑附錄左傳荀罃士魴卒晉侯蒐於綿上以治兵使士匄將中軍辭曰伯游長昔臣習於知伯是以佐之非能賢也請從伯游荀偃將中軍士匄佐之使韓起將上軍辭以趙武又使欒黶辭曰臣不如韓起韓起願上趙武君其聽之使趙武將上軍韓起佐之欒黶將下軍魏絳佐之新軍無帥晉侯難其人使其什吏率其卒乘官屬以從於下軍禮也晉國之民是以大和諸侯遂睦君子曰讓禮之主也范宣子讓其下皆讓欒黶為汰弗敢違也晉國以平數世賴之刑善也夫一人刑善百姓休和可不務乎書曰一人有慶兆民賴之其寧惟永其是之謂乎周之興也其詩曰儀刑文王萬邦作孚言刑善也及其衰也其詩曰大夫不均我從事獨賢言不讓也世之治也君子尚能而讓其下小人農力以事其上是以上下有禮而讒慝黜逺由不爭也謂之懿德及其亂也君子稱其功以加小人小人伐其技以馮君子是以上下無禮亂虐竝生由爭善也謂之昏徳國家之敝恆必由之秋九月庚辰楚子審卒左傳楚子疾告大夫曰不榖不德少主社稷生十年而喪先君未及習師保之敎訓而應受多福是以不德而亡師於鄢以辱社稷為大夫憂其𢎞多矣若以大夫之靈獲保首領以没於地惟是春秋窀穸之事所以從先君於禰廟者請為靈若厲大夫擇焉莫對及五命乃許秋楚共王卒子囊謀諡大夫曰君有命矣子囊曰君命以共若之何毁之赫赫楚國而君臨之撫有蠻夷奄征南海以屬諸夏而知其過可不謂共乎請諡之共大夫從之附錄左傳吳侵楚養由基奔命子庚以師繼之養叔曰呉乗我喪謂我不能師也必易我而不戒子為三覆以待我我請誘之子庚從之戰於庸浦大敗吳師獲公子黨君子以呉為不弔詩曰不弔昊天亂靡有定庸浦杜注楚地當在今無為州南冬城防左傳冬城防書事時也於是將早城臧武仲請俟畢農事禮也集説許氏翰曰鄭役既息魯政有裕則知取邿以為利城防以為安而已矣髙氏閌曰防臧氏之邑也厥後齊髙厚伐我北鄙圍防則城者畏齊也是趙氏鵬飛曰魯有二防一近宋隱十年伐宋取防也一近齊隱九年公㑹齊侯于防是也今之城疑近齊之防耳魯既事晉而外齊懼有齊師故城防以備之而明年齊卒有圍成之役用是知城防以備齊也李氏廉曰莊二十九年已城防矣今又城之盖臧武仲始受邑也十七年齊師圍臧孫于防二十四年臧孫自邾如防以求後於魯此一防之始末也觀下年㑹向伐秦齊崔杼皆怠慢不攝悼公既卒齊師先叛則城防其亦為疆事之備歟附錄左傳鄭良霄大宰石㚟猶在楚石㚟言於子囊曰先王卜征五年而歳習其祥祥習則行不習則増修德而改卜今楚實不競行人何罪止鄭一卿以除其偪使睦而疾楚以固於晉焉用之使歸而廢其使怨其君以疾其大夫而相牽引也不猶愈乎楚人歸之壬靈王十寅三年十有四年晉悼十四年齊靈二十三年衛獻十八年蔡景三十三年鄭簡七年曹成十九年陳哀十年把孝八年宋平十七年秦景十八年楚康王昭元年呉諸樊二年春王正月季孫宿叔老㑹晉士匄齊人宋人衛人鄭公孫蠆曹人莒人邾人滕人薛人把人小邾人㑹吳于向蠆丑邁反公作囆後同左傳十四年春吳告敗於晉㑹于向為呉謀楚故也范宣子數吳之不德也以退呉人執莒公子務婁以其通楚使也於是子叔齊子為季武子介以㑹自是晉人輕魯幣而益敬其使胡傳使舉上客而叔老竝書者以内卿行則不得不書矣季孫宿以卿為介而不使之免叔老介於宿而不敢避盖兩失之雖晉人輕其幣而敬其使於君命使人之體豈為得哉集説杜氏預曰魯使二卿㑹晉敬事伯國晉人輕魯幣而益敬其使故叔老雖介亦列於㑹也呉來在向諸侯㑹之故曰㑹呉曰劉氏敞曰傳曰將執戎子駒支范宣子親數於朝今諸侯之事我寡君不如昔者言語漏洩職女之由此皆不實也諸侯解體非此戎之過審矣范宣子豈不知邪何以誣之哉去年蒐于綿上傳曰晉國由是大和諸侯遂睦到此一年爾何故遽有言語漏洩不如昔者之事邪言與事不相應矣又曰宣子辭焉使即事於㑹以成愷悌然則是姜戎列於㑹矣經何以不序乎許氏翰曰四卿帥師自成公始二卿列㑹自襄公始大夫張也執陳氏傅良曰向之㑹悼德衰矣退呉人而卒㑹呉莒公子而卒㑹莒諸侯之大夫從晉侯伐秦而悼不自將荀偃欒黶一爭而大還是故伐秦之役不書晉侯志晉侯之怠也自是㑹澶淵晉趙武宋向戌不書書鄭良霄於城杞鄭游吉不書書公孫叚則君令多不行於大夫矣不家氏鉉翁曰内大夫未有二卿俱㑹者志二卿之當竝行也吳氏􅊹曰左氏以此㑹為吳謀楚然吳在向而晉率諸侯之大夫往㑹之是晉有求於呉非呉有求於晉也李氏廉曰晉之㑹吳止此自此以後吳不資於晉晉亦不能致吳至黄池而兩伯竝列矣汪氏克寛曰卿使則大夫為介大夫使則士為介昭二十三年叔孫婼如晉曰寡君之命介子服回在婼卿而回大夫也今魯以二卿㑹晉而晉列二卿於㑹晉魯俱失禮矣且自蕭魚而後凡役皆大夫悼公之怠而霸業之衰也附錄左𫝊呉子諸樊既除喪將立季札季札辭曰曹宣公之卒也諸侯與曹人不義曹君將立子臧子臧去之遂弗為也以成曹君君子曰能守節君義嗣也誰敢奸君有國非吾節也札雖不才願附於子臧以無失節固立之棄其室而耕乃舍之二月乙未朔日有食之夏四月叔孫豹㑹晉荀偃齊人宋人衛北宮括鄭公孫蠆曹人莒人邾人滕人薛人把人小邾人伐秦晉秦兵爭止此左傳夏諸侯之大夫從晉侯伐秦以報櫟之役也晉侯待於竟使六卿帥諸侯之師以進及涇不濟叔向見叔孫穆子穆子賦匏有苦葉叔向退而具舟魯人莒人先濟鄭子蟜見衛北宮懿子曰與人而不固取惡莫甚焉若社稷何懿子說二子見諸侯之師而勸之濟濟涇而次秦人毒涇上流師人多死鄭司馬子蟜帥鄭師以進師皆從之至于棫林不獲成焉荀偃令曰雞鳴而駕塞井夷竈惟余馬首是瞻欒黶曰晉國之命未是有也余馬首欲東乃歸下軍從之左史謂魏莊子曰不待中行伯乎莊子曰夫子命從帥欒伯吾帥也吾將從之從帥所以待夫子也伯游曰吾令實過悔之何及多遺秦禽乃命大還晉人謂之遷延之役欒鍼曰此役也報櫟之敗也役又無功晉之恥也吾有二位於戎路敢不恥乎與士鞅馳秦師死焉士鞅反欒黶謂士匄曰余弟不欲往而子召之余弟死而子來是而子殺余之弟也弗逐余亦將殺之士鞅奔秦秦伯問於士鞅曰晉大夫其誰先亡對曰其欒氏乎秦伯曰以其汰乎對曰然欒黶汰虐已甚猶可以免其在盈乎秦伯曰何故對曰武子之德在民如周人之思召公焉愛其甘棠况其子乎欒黶死盈之善未能及人武子所施没矣而黶之怨實章將於是乎在秦伯以為知言為之請於晉而復之棫林杜注秦地案棫林即舊鄭咸林也今為華州屬陜西西安府集説趙氏匡曰左氏云齊宋大夫不書惰也向之㑹亦如之衛北宮括書於伐秦攝也案經意以事之邪正襃貶不為其小小幹舉惰怠生文弛髙氏閌曰春夏興師煩擾列國將帥不和威德兩晉國之政衰矣結汪氏克寛曰晉秦七十年之兵爭釁兆於圍鄭怨於敗殽禍稔於三戰大舉於九國之伐而終於此役盖自文公之霸合諸侯之師未有若是之衆也然以十三國之卿大夫帥重兵以壓境而師出無律將各異心徒以煩民功績蔑有晉侯待於境上視若贅旒皆悼公之怠於政事致諸臣之専恣也己未衛侯出奔齊公作衛侯衎左傳衛獻公戒孫文子寗惠子食皆服而朝日旰不召而射鴻於囿二子從之不釋皮冠而與之言二子怒孫文子如戚孫蒯入使公飲之酒使大師歌巧言之卒章大師辭師曹請為之初公有嬖妾使師曹誨之琴師曹鞭之公怒鞭師曹三百故師曹欲歌之以怒孫子以報公公使歌之遂誦之蒯懼告文子文子曰君忌我矣弗先必死并帑於戚而入見蘧伯王曰君之暴虐子所知也大懼社稷之傾覆將若之何對曰君制其國臣敢奸之雖奸之庸知愈乎遂行從近闗出公使子蟜子伯子皮與孫子盟于丘宫孫子皆殺之四月己未子展奔齊公如鄄使子行於孫子孫子又殺之公出奔齊孫氏追之敗公徒于阿澤鄄人執之初尹公佗學射於庾公差庾公差學射於公孫丁二子追公公孫丁御公子魚曰射為背師不射為戮射為禮乎射兩軥而還尹公佗曰子為師我則逺矣乃反之公孫丁授公轡而射之貫臂子鮮從公及竟公使祝宗告亡且告無罪定姜曰無神何告若有不可誣也有罪若何告無舍大臣而與小臣謀一罪也先君有冢卿以為師保而蔑之二罪也余以巾櫛事先君而暴妾使余三罪也告亡而已無告無罪公使厚成叔弔於衛曰寡君使瘠聞君不撫社稷而越在他竟若之何不弔以同盟之故使瘠敢私於執事曰有君不弔有臣不敏君不赦宥臣亦不帥職増淫𤼵洩其若之何衛人使大叔儀對曰羣臣不佞得罪於寡君寡君不以即刑而悼棄之以為君憂君不忘先君之好辱弔羣臣又重恤之敢拜君命之辱重拜大貺厚孫歸復命語臧武仲曰衛君其必歸乎有大叔儀以守有母弟鱄以出或撫其内或營其外能無歸乎齊人以郲寄衛侯及其復也以郲糧歸右宰榖從而逃歸衛人將殺之辭曰余不説初矣余狐裘而羔䄂乃赦之衛人立公孫剽孫林父甯殖相之以聼命於諸侯衛侯在郲臧紇如齊唁衛侯衛侯與之言虐退而告其人曰衛侯其不得入矣其言糞土也亡而不變何以復國子展子鮮聞之見臧紇與之言道臧孫説謂其人曰衛君必入夫二子者或輓之或推之欲無入得乎丘宫杜注近戚地郲阿澤杜注濟北東阿縣西南有大澤杜注齊所滅郲國集説許氏翰曰逐君之惡未有若林父者矣鄭厲衛惠猶以禮去者也春秋之季君弱臣彊衛獻出奔不名所以抑彊臣而存大義也其李氏亷曰此年衛侯奔剽立二十年甯殖卒遺命子喜納衛侯二十五年晉人令衛與之夷儀衞侯入夷儀其冬使與寗喜言求復國二十六年喜弑剽衎復國二十七年殺喜子鮮奔晉羊汪氏克寛曰王氏箋義云衛侯不道失國當從公書名今考二十五年入夷儀三𫝊皆不名經必有義不可彊合失國書名之例其王氏樵曰案春秋惟弑君書某弑其君至於君為下所出止書出奔而已如臣見逐亦止書某奔某也胡傳謂舊史書孫林父甯殖出其君而仲尼筆削稱衛侯出奔恐無此理出之為言不容而見逐之謂也臣子施於君父而史官直書於䇿則非辭也故但言出奔而已言出奔則或君無道或臣彊皆可推上下比事而見之矣専以為歸罪其君者害敎之言也嚴氏啟隆曰胡𫝊曰不書所逐之臣而以自奔為名所以警乎人君為後世鑒又曰所為見逐無乃肆於民上縦其淫虐以棄天地之性然則經書衛侯出奔齊全乎責衎之意而於林父竟無責乎率天下之人而為弑君逐君之事者必此之言矣案春秋於衛侯之出不書逐君之賊而以自奔為文杜注孔疏皆以為責其君而胡𫝊因之非經㫖也人臣而出其君罪莫大焉乃謂聖人專責其君有是理乎故王氏樵嚴氏啟隆皆駁之附錄左𫝊師歸自伐秦晉侯舍新軍禮也成國不過半天子之軍周為六軍諸侯之大者三軍可也於是知朔生盈而死盈生六年而武子卒彘裘亦㓜皆未可立也新軍無帥故舍之師曠侍於晉侯晉侯曰衛人出其君不亦甚乎對曰或者其君實甚良君將賞善而刑淫養民如子盖之如天容之如地民奉其君愛之如父母仰之如日月敬之如神明畏之如雷霆其可出乎夫君神之主而民之望也若困民之主匱神乏祀百姓絶望社稷無主將安用之弗去何為天生民而立之君使司牧之勿使失性有君而為之貳使師保之勿使過度是故天子有公諸侯有卿卿置側室大夫有貳宗士有朋友庶人工商皁𨽻牧圉皆有親暱以相輔佐也善則賞之過則匡之患則救之失則革之自王以下各有父兄子弟以補察其政史為書瞽為詩工誦箴諫大夫規誨士傳言庻人謗商旅於市百工獻藝故夏書曰遒人以木鐸徇于路官師相規工執藝事以諫正月孟春於是乎有之諫失常也天之愛民甚矣豈其使一人肆於民上以從其淫而棄天地之性必不然矣案是時晉悼伯業漸衰無復勵精之志執政大夫如荀偃軰皆與孫甯為黨故師曠承望風㫖而有其君實甚之言得罪於名教多矣莒人侵我東鄙集説杜氏預曰報入鄆也髙氏閌曰莒自滅鄫之後四伐我矣是無晉趙氏鵬飛曰季孫宿入鄆非兵首也而莒猶以為憾侵我東鄙報入鄆之役焉至十六年魯訴於晉晉人執而釋之然後少悛故二十年為向之盟而魯始無東鄙之患汪氏克寛曰湨梁之執盖有由矣秋楚公子貞帥師伐呉左傳秋楚子為庸浦之役故子囊師於棠以伐呉呉不出而還子囊殿以呉為不能而弗儆呉人自皋舟之隘要而擊之楚人不能相救呉人敗之獲楚公子宜榖棠楚地寰宇記六合古棠邑晉立堂邑郡周改六合郡隋廢郡為六合縣至今仍之屬江南江寧府集説趙氏鵬飛曰楚康即位修先君之怨於諸侯謂楚所以不得志於北方者呉實為之梗也故置宋鄭不問而首伐呉焉今伐而未得呉故二十二年親伐之其所以讐呉也深矣汪氏克寛曰楚既不得志於北方故致怨於呉也附錄左𫝊王使劉定公賜齊侯命曰昔伯舅大公右我先王股肱周室師保萬民世胙大師以表東海王室之不壊繄伯舅是賴今余命女環兹率舅氏之典纂乃祖考無忝乃舊敬之哉無廢朕命冬季孫宿㑹晉士匄宋華閱衛孫林父鄭公孫蠆莒人邾人于戚閱音悅左𫝊晉侯問衛故於中行獻子對曰不如因而定之衛有君矣伐之未可以得志而勤諸侯史佚有言曰因重而撫之仲虺有言曰亡者侮之亂者取之推亡固存國之道也君其定衛以待時乎冬㑹于戚謀定衛也范宣子假羽毛於齊而弗歸齊人始貳集説許氏翰曰衛人立剽非正也而謀定之則正弗勝矣林父在㑹是以知其謀定剽也髙氏閌曰諸國書卿明皆林父之儔也悼陳氏傅良曰襄昭之際大夫無君之禍晉為之也公之德衰矣薛氏季宣曰衛亂不討㑹其賊以定之非義也霸張氏洽曰前書衛侯之奔此列孫林父於㑹晉為主抑君而臣是助具書於䇿則晉大夫之黨林父罪惡具見家氏鉉翁曰晉悼用師於鄭衛衎無㑹不徃無役不從今為其臣所逐晉當㑹諸侯納衛君誅孫甯以伸伯討乃盟主職分之所宜為既不能然反聽賊臣立君而為㑹以定其位此春秋之所甚惡也君王氏貫道曰戚林父邑也合列國於孫氏私邑抑而臣是助非正名之義矣而李氏廉曰衛侯出奔而林父㑹于戚昭公在乾侯季孫㑹適歴釋君助臣之禍前後一轍悼公霸業盡喪矣荀偃親弑君之人而以此問之悼公之聰明不逮少年矣齊人之貳豈待假羽毛哉其王氏錫爵曰荀偃本弑君之賊故為逆賊謀而成弑君之亂自是剽弑而衎歸衛有二君者十年晉實為之也賢如悼公竟為荀偃所誤惜哉附錄左𫝊楚子囊還自伐呉卒將死遺言謂子庚必城郢君子謂子囊忠君薨不忘増其名將死不忘衛社稷可不謂忠乎忠民之望也詩曰行歸于周萬民所望忠也癸靈王十卯四年十有五年晉悼十五年齊靈二十四年衛獻十九年殤公剽元年蔡景三十四年鄭簡八年曹成二十年陳哀十一年把孝九年宋平十八年秦景十九年楚康二年呉諸樊三年春宋公使向戌來聘二月己亥及向戌盟于劉劉孔氏頴逹曰釋例也闕盖魯城外之近地左傳十有五年春宋向戌來聘且尋盟見孟獻子尤其室曰子有令聞而美其室非所望也對曰我在晉吾兄為之毁之重勞且不敢間集説杜氏預曰報二年豹之聘尋十一年亳之盟弱許氏翰曰不盟于國而盟于劉崇向戌故公甚矣禮汪氏克寛曰不言公見其伉也聘而遂盟已為非况以千乗之君而降尊失列與之盟於國都之外乎公嘗如晉而及晉侯盟長樗此霸主謙遜以懐望國而非諸侯待鄰國大夫之所當施也朝聘而盟于外惟此兩見而已劉夏逆王后于齊左傳官師從單靖公逆王后于齊卿不行非禮也公羊劉夏者何天子之大夫也劉者何邑也其稱劉何以邑氏也胡傳劉夏何以不稱使不與天子之使夏也昏姻人倫之本王后天下之母劉夏士也士而逆后是不重人倫之本而輕天下之母矣然則何使卿往逆公監之禮也官師從單靖公逆王后于齊書劉夏而不書靖公是知卿往逆公監之禮也春秋昏姻得禮者常事不書集説杜氏預曰劉采地夏名也天子卿書字劉夏非卿故書名孔氏穎逹曰諸侯之娶言逆女此興桓八年皆言逆王后者天子無外所命則已成后矣故不言逆女也孫氏復曰天子不親逆取后則三公逆之劉夏士也王后天下母使㣲者逆之可哉故曰劉夏逆王后于齊以著其非劉氏敞曰榖梁曰過我故志之非也王后尊矣禮自當志豈與諸侯一例以過我而書哉然則他王后不見者太子立則妃為后自無緣見耳書孫氏覺曰天子無親迎之禮逆后則使三公春秋逆后者二祭公行得禮而又書之者譏遂事也劉夏之逆則以非三公譏之春秋周王十二而逆后者惟二是知非禮則書也家氏鉉翁曰桓八年祭公來遂逆王后于紀謀之於魯也今劉夏其亦詢度而往歟周天子昏姻多以命魯非譏其來譏其以官師行卿事不呉氏􅊹曰王后天下母上儀天王猶乾之有坤可重歟祭公遂行逆后而紀姜遄歸京師其逆其歸兩從苟簡故書逆書歸劉夏以士逆后而齊之歸女無違於禮書逆故不書歸得禮者不書失禮然後書附錄左𫝊楚公子午為令尹公子罷戎為右尹蒍子馮為大司馬公子橐師為右司馬公子成為左司馬屈到為莫敖公子追舒為箴尹屈蕩為連尹養由基為宮廏尹以靖國人君子謂楚於是乎能官人官人國之急也能官人則民無覦心詩云嗟我懐人寘彼周行能官人也王及公侯伯子男甸采衛大夫各居其列所謂周行也子鄭尉氏司氏之亂其餘盗在宋鄭人以子西伯有産之故納賂於宋以馬四十乗與師茷師慧三月公孫黑為質焉司城子罕以堵女父尉翩司齊與之良司臣而逸之託諸季武子武子寘諸卞鄭人醢之三人也師慧過宋朝將私焉其相曰朝也慧曰無人焉相曰朝也何故無人慧曰必無人焉若猶有人豈其以千乗之相易淫樂之朦必無人焉故也子罕聞之固請而歸之夏齊侯伐我北鄙圍成公救成至遇遇杜注魯地公羊其言至遇何不敢進也集說杜氏預曰公畏齊不敢至成復劉氏絢曰武備不謹成郛見圍救患當速乃畏避公之所為可知矣齊髙氏閌曰衛侯在齊季孫宿為戚之㑹以定衛而不與焉齊固有憾於諸侯矣伐我北鄙以此之故魯於是時三分其民而公室卑弱已不足以當敵故書公救成至遇陳氏傅良曰自宣之季年内不言君將於是救成而不敢進無惑乎三家之專魯也家氏鉉翁曰魯本非弱國自季專政務豐植其私門城費矣又取公室之丘甸卒乘自歸其私於是魯君拱手於上邾莒交侵齊亦屢伐譬之百金之家猶足自立而盗起於内莫知所以制之則外宼之來亦付之無可奈何而已李氏廉曰此齊之弱魯第五役也自鞍戰之後齊兵不至魯者三十餘年則以畏晉之故也於是再見晉悼衰矣三年之間伐魯者六而有同圍之師又曰此隳成不服之始事也春秋書齊之圍成者二此年及明年公之圍成者二昭二十六年定十二年始則疆事之無備終則家臣之恃彊季孫宿叔孫豹帥師城成郛左𫝊夏齊侯圍成貳於晉故也於是乎城成郛集說蘇氏轍曰備齊也三胡氏銓曰城築二十有九大夫帥師而城者見文襄之際大夫張矣故帥師而城者皆三家也氏劉氏絢曰由不能救成故成郛見壊而城也髙閌曰此孟孫之邑而季孫叔孫帥師以城之者見三家相黨以備齊為名而興役之衆故其城堅固可守卒為魯患而不可墮也張氏洽曰先事之無備敵去而後城亦已晚矣邑黄氏仲炎曰城成郛者名曰備齊其實城孟氏私爾孟氏邑而叔季城之何也三家合為一體以弱公室也家氏鉉翁曰宼未至無備及見圍救之又緩逮其去乃城之魯之治其國者可見矣秋八月丁巳日有食之集說張氏洽曰悼公卒政逮大夫之徴也邾人伐我南鄙左傳秋邾人伐我南鄙使告於晉晉將為㑹以討邾莒晉侯有疾乃止冬晉悼公卒遂不克㑹集説許氏翰曰政在君則民一民一則國彊政在臣則民二民二則國弱魯自文公失政大夫益竊國柄齊與邾莒交伐其國不競甚矣無他民分於三桓故也王氏貫道曰邾屬於齊而黨於莒齊莒來伐故邾亦效尤冬十有一月癸亥晉侯周卒集説許氏翰曰悼公之霸功亞桓文平公受之遺烈猶在祝柯澶淵之盟是己自是則晉日替矣趙氏鵬飛曰晉室中僨三郤誅厲公弑悼公以公族自外入繼即位之初慨然思復文公之業一圍宋彭城而得諸侯再奪鄭虎牢而得鄭陳外抗彊楚内通東呉蕭魚之㑹不戰不盟楚不敢爭鄭不敢叛雖召陵之役不是過也其為國也施舍己責逮鰥寡振廢滯康乏困救災患禁淫慝薄賦歛宥罪戾舉不失職官不易方爵不踰德師不陵正旅不偪官民無謗言所以復霸諸侯至於屈王臣以同歃于雞澤用諸侯以報怨於秦則亦未逃末習歟惜哉之李氏廉曰悼公立於成十八年凡十六年起四公衰而復文襄之盛入國之明日逐不臣者七人即位之一月取六官於民譽盖晉賢侯也李氏曰晉悼公其猶有君子之資乎不獨伯功之羙也齊桓歴變履險以數十年之經營而行事未免過舉晉文老於奔走晚而復國然血氣之驕悍未除悼公之齒淺矣乃能忠厚而不迫堅忍而持重有回顧却慮之謀無輕逞輒快之舉其亦稍知以道養心歟八年九合則勤於安夏也三分四軍則謹於用民也六卿選德則用人有章也騶御知訓則敎士有法也此其所以能得諸侯服鄭而駕楚也使晉以詐力相長未必能服諸侯也悼公先以謙德臨之雞澤之召諸侯曰寡君願與二三兄弟相見以謀不協故十三國相與周旋不令而從無滅譚滅遂執曹執衛之事使晉以盟誓為信未必能得鄭也悼公純以誠心行之鄭子展曰晉君方明必不棄鄭故五㑹之信終於不盟無逃盟乞盟之煩使晉以戰伐為威未必能駕楚也悼公一以容量處之楚子囊曰晉不可敵事之而後可故三駕之烈不交一旅無城濮鄢陵之勞是三者非有君子之資乎然能服諸侯而不能杜大夫用事之漸能得鄭而不掩失陳之責夫諸侯盟誓之權非大夫敢干也蕭魚已後凡三大㑹荀偃士匄儼然臨之諸侯雖合大夫浸分何謹於諸侯而縱於大夫乎陳不可棄猶鄭不可舍也戍陳之役以為有陳非吾事無之而後可鄭雖向晉陳竟歸楚何工於撫鄭而拙於懐陳乎不然悼公之霸過桓文矣國季氏本曰晉悼公召集諸侯則惟示謙德經營列則惟務息民可謂有君子之資矣但以孫林父之懐姦而不能正齊靈公之撓霸而不能馴邾莒之肆行無忌而不能禁悼公之治亦疎矣之王氏樵曰案不討衛孫林父甯殖逐君之惡尤失大者魯之三家晉之六卿齊之崔慶陳氏視此而縱矣附錄左傳鄭公孫夏如晉奔喪子蟜送葬者宋人或得玉獻諸子罕子罕弗受獻玉曰以示玉人玉人以為寳也故敢獻之子罕曰我以不貪為寳爾以玉為寳若以與我皆喪寳也不若人有其寳稽首而告曰小人懐璧不可以越鄉納此以請死也子罕寘諸其里使玉人為之攻之富而後使復其所狗十二月鄭人奪堵之妻而歸諸范氏甲靈王十辰五年十有六年晉平公彪元年齊靈二十五年衛獻二十年殤二年蔡景三十五年鄭簡九年曹成二十一年陳哀十二年把孝十年宋平十九年秦景二十年楚康三年呉諸樊四年春王正月葬晉悼公集説杜氏預曰踰月而葬速也我孔氏頴逹曰四年七月夫人姒氏薨八月葬小君定姒纔别月耳杜云踰月而葬速也今晉悼往年十一月卒此年正月葬積三月也杜亦云踰月而葬者踰越也所越有多有少俱是踰越之義故杜𢎞通兩解之何鄭氏玉曰欲㑹諸侯而速葬其親背禮莫斯為甚以為盟主而令諸侯乎宜晉霸之不競也焉季氏本曰晉平公初立見諸侯尚多不協故汲汲欲合諸侯喪未三月而速葬也三月公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子薛伯把伯小邾子于湨梁戊寅大夫盟湨古閴反内湨梁杜注湨水出河軹縣東南至溫入河案爾雅梁莫大于湨梁湨梁水隄也今濟源縣西北原山有白澗水即湨梁也左傳平公即位羊舌肸為傅張君臣為中軍司馬祁奚韓襄欒盈士鞅為公族大夫虞丘書為乘馬御改服修官烝於曲沃警守而下㑹于湨梁命歸侵田晉侯與諸侯宴於溫使諸大夫舞曰歌詩必類齊髙厚之詩不類荀偃怒且曰諸侯有異志矣使諸大夫盟髙厚髙厚逃歸於是叔孫豹晉荀偃宋向戌衛甯殖鄭公孫蠆小邾之大夫盟曰同討不庭公羊諸侯皆在是其言大夫盟何信在大夫也何言乎信在大夫徧刺天下之大夫也曷為徧刺天下之大夫君若贅旒然榖梁湨梁之㑹諸侯失正矣諸侯㑹而曰大夫盟正在大夫也諸侯在而不曰諸侯之大夫大夫不臣也胡𫝊牡丘之㑹諸侯既次于匡則書曰公孫敖帥師及諸侯之大夫救徐雞澤之㑹諸侯既盟而陳侯使袁僑如㑹則書曰叔孫豹及諸侯之大夫及陳袁僑盟今湨梁之㑹諸侯皆在是若欲使大夫盟者則書魯卿及諸侯之大夫盟可也而獨書大夫何也諸侯失政大夫皆不臣也上二年春正月㑹于向十有四國之大夫也夏四月㑹伐秦十有三國之大夫也冬㑹于戚七國之大夫也此三㑹皆國之大事也而使大夫皆專之而諸侯皆不與焉是列國之君不自為政弗躬弗親禮樂征伐己自大夫出矣况悼公既没晉平初立無先公之明也君若贅旒而大夫張亦宜矣夫豈一朝一夕之故哉善惡積於至微而不可掩常情忽於未兆而不預謀荀偃怒大夫盟而晉靖公廢趙籍韓䖍魏斯為諸侯之勢見矣有國者謹於禮而不敢忽此春秋以待後世之意也集說杜氏預曰不書髙厚逃歸故也諸大夫本欲盟髙厚髙厚逃歸故遂自共盟雞澤㑹重序諸侯今此間無異事即上諸侯大夫可知君孔氏穎逹曰案𫝊荀偃怒使諸侯大夫盟髙厚以臣不敵故使大夫盟之君使之盟非自專也以齊人既有二心髙厚歌詩不類知小國必有從齊者也諸侯大夫本意欲盟髙厚髙厚雖已逃歸仍恐餘國有二故大夫遂自共盟使同㑹之國皆一其志也雞澤之㑹又隔袁僑如㑹故重言諸侯之大夫今此間無異事直言大夫即是上㑹諸侯之大夫不言諸侯可知故也陸氏淳曰淳聞於師曰諸侯為㑹而使大夫盟晉侯失盟主之道矣不曰晉侯使之參譏之也盧氏仝曰諸侯之大夫自盟君各在㑹則諸侯之政自兹失矣三桓逐魯六卿分晉其所由來者漸髙氏閌曰為討邾莒也邾莒連伐魯魯使告於晉悼公將為㑹以討之遇疾乃止平公即位遂成父志朱子曰五霸既衰湨梁之㑹諸侯出㑹而大夫自盟這箇自是差異不好陳氏傅良曰文十五年盟扈十七年㑹扈霸主在而但曰諸侯者無霸也此盟君在而但曰大夫者無君也自文以下則有斥言諸侯而不序自襄以下則有斥言大夫而不序志項氏安世曰文七年書公㑹諸侯晉大夫盟于扈變之始也雖然猶有諸侯也此書大夫盟志變之終也言自是無諸侯也張氏洽曰春秋莊十三年以前禮樂征伐自諸侯出而權未一也自桓文繼霸列國之政齊晉專之然猶在諸侯也至今年以後則皆自大夫出矣故於此書大夫盟著世變之益降也權趙氏鵬飛曰君之所以立國者在權國之所以立者在信權存則國存信去則權去湨梁之㑹諸侯㑹而大夫盟信在大夫也於是晉權漸移於六卿魯權日入於三家齊權屬崔髙衛權在孫甯宋權歸於罕陳權歸二慶曹莒邾把従可知爾權既移於下宜信之不在君而在臣也藉使君交盟而臣不欲則不保其無寒故寧聽大夫之欲而俾自盟焉則其信可必也平公承悼公之烈固可以因時而有為今衰絰之中為是盟乃挈霸權以歸大夫何以示天下則平公之威令不及悼公逺矣其後把之城宋之盟皆出於大夫平公不與焉原其失權之漸盖自此始是以聖人謹之也李氏廉曰春秋書大夫者皆有所係盟蔇書齊盟扈書晉猶係於國也救徐稱諸侯盟袁僑盟宋稱諸侯猶係於君也獨此盟止書大夫公榖胡氏陳氏皆得之次汪氏克寛曰經書大夫不序者四救徐之役諸侯匡不行而遣大夫往救則大夫之帥師實受諸侯之命也雞澤之盟諸侯己盟而大夫又盟然猶受命而盟袁僑也湨梁之盟則諸侯皆在而大夫自相與盟非諸侯之命矣于宋之盟則諸侯不出而大夫自為㑹盟矣然經於此年不以大夫繫之諸侯著大夫之無諸侯也于宋之盟復以大夫繫之諸侯不使大夫之終無諸侯也晉平即位十年之間七合諸侯湨梁祝柯澶淵商任沙隨兩夷儀是也於斯時也苟能攬權以挈政統明義而感人心則霸功之盛不惟可以繼悼公之業而且可以踵桓文之跡矣奈何首事之初即以太阿之柄授之大夫而討罪服貳又紊於義是以湨梁則髙厚逃歸而執邾莒二君不歸京師且不能復魯之侵田平隂圍齊焚其四郭而齊猶不服遂以無功澶淵雖獲齊成實以齊莊欲求好於諸侯非誠服於晉厥後不免朝歌之伐商任沙隨錮欒氏而反召盈之亂國夷儀將以伐齊卒受弑君者之賂而同盟焉自是不復能合諸侯而大夫専出㑹盟矣原其失在於縱權於下世卿彊家黨惡怙亂不肯仗義以正諸侯是以致霸政之隳也公王氏樵曰案晉悼公將為魯討邾莒未果而卒平初立以父之志兼虞諸侯有異志故為是㑹以嗣霸而攬諸侯也然踰月而葬改服而烝其不懐親也甚矣方在喪稱子之日而合諸侯接㑹享使諸大夫歌詩必類其越於禮也大矣國君風化之本人倫政事之基而所為若是不待大夫專盟而後可罪也案湨梁之㑹諸侯在而大夫盟公榖皆以權移於大夫胡傳及朱子俱從之盖經書大夫而不係於諸侯與牡丘雞澤不同則君若贅旒而大夫之不臣可知矣杜注孔疏謂大夫欲盟髙厚厚逃而大夫共盟非大夫之専與公榖異揆之當時情事亦合今兩存其說晉人執莒子邾子以歸執以歸始此左傳以我故執邾宣公莒犂比公且曰通齊楚之使集説孫氏復曰晉平湨梁之㑹方退執莒子邾子以歸又不歸於京師非所以宗諸侯也髙氏閌曰諸侯有罪執之以歸而不歸京師已則不臣而以討人非正也故稱晉人而二君不名家氏鉉翁曰莒邾侵魯晉為執之莒邾信有罪矣魯之滅邿何獨無討而晉滅偪陽不當自反乎莒邾力屈而心未服况不歸京師是無王也書以貶晉十李氏廉曰經書執諸侯十三惟此書以歸執大夫四惟意如書以歸齊侯伐我北鄙集説髙氏閌曰齊既叛晉聞公在㑹將討邾莒故復來伐是時齊益强自柯陵之㑹遂不復出但使大夫聽命使世子伉禮出㑹盖有輕諸侯之心故前年北鄙之伐為莒伐我邾實附齊故亦伐我南鄙晉㑹湨梁以討貳莒邾畏晉往㑹而齊獨不至晉執二君以歸齊乃益復伐我三年之間齊師五至於魯矣夏公至自㑹集説高氏閌曰見公出㑹謀齊尚未及還而齊師已見伐矣五月甲子地震叔老㑹鄭伯晉荀偃衛甯殖宋人伐許左傳許男請遷於晉諸侯遂遷許許大夫不可晉人歸諸侯鄭子蟜聞將伐許遂相鄭伯以從諸侯之師穆叔從公齊子帥師㑹晉荀偃夏六月次於棫林庚寅伐許次於函氏晉荀偃欒黶帥師伐楚以報宋揚梁之役楚公子格帥師及晉師戰於湛阪楚師敗績晉師遂侵方城之外復伐許而還棫林杜注許地湛函氏杜注許地注湛阪杜注襄城昆陽縣北有水東入汝水經湛水出犫縣北魚齒山東南流為湛浦即此今葉縣北二十里有昆陽城集説劉氏敞曰左氏云書曰㑹鄭伯為夷故也言諸侯之卿可以㑹伯子男故示之義云爾非也主兵者居上自其班列同者也諸侯與諸侯相從卿大夫與卿大夫相從若名位不敵卿雖主兵猶序諸侯之下貴王爵也去諸侯而言主兵者自可見爾何疑哉許氏翰曰先書鄭伯臣不可過君也髙氏閌曰許欲棄楚請遷於晉既而不果故晉㑹諸侯大夫同伐之鄭與許有宿怨故君親行卿不先諸侯先國君也宋稱人盖微者見張氏洽曰許男有從晉國之志而大夫沮之足以一時之俗矣李氏廉曰士縠主垂隴趙盾主新城而書㑹宋荀偃主伐許而書㑹鄭其事一也王氏樵曰案春秋之例用兵則主兵者為首大夫雖主兵不得在諸侯上此經所書正其名例左氏乃别生義曰為夷故也說者謂禮卿不㑹公侯而可以㑹伯子男此處欲示叔老可以㑹鄭伯故荀偃在下殊為曲説無理秋齊侯伐我北鄙圍成左作圍郕左傳秋齊侯圍郕孟孺子速徼之齊侯曰是好勇去之以為之名速遂塞海陘而還海陘杜注魯隘道集説髙氏閌曰去年伐我圍成而壊其郛今春再伐至是又圍成甚之也家氏鉉翁曰齊叛晉而屢以師伐魯欲致晉而與之戰其志在於爭霸也大雩冬叔孫豹如晉左傳冬穆叔如晉聘且言齊故晉人曰以寡君之未禘祀與民之未息不然不敢忘穆叔曰以齊人之朝夕釋憾於敝邑之地是以大請敝邑之急朝不及夕引領西望曰庶㡬乎比執事之間恐無及也見中行獻子賦圻父獻子曰偃知罪矣敢不從執事以同恤社稷而使魯及此見范宣子賦鴻鴈之卒章宣子曰匄在此敢使魯無鳩乎集説髙氏閌曰魯不能内修其政以禦無道之齊而乞憐於晉魯之君臣庸甚矣趙氏鵬飛曰言齊之見伐也故十八年晉率諸侯圍齊魯故也後家氏鉉翁曰齊大國也魯亦望國也春秋於圍郕書豹如晉著魯不為自治之計急則求晉亦可鄙矣乙靈王十已六年十有七年晉平二年齊靈二十六年衛獻二十一年殤三年蔡景三十六年鄭簡十年曹成二十二年陳哀十三年把孝十一年宋平二十年秦景二十一年楚康四年呉諸樊五年春王二月庚午邾子牼卒牼苦耕反公榖作瞷音閑集説杜氏預曰宣公也邾孫氏復曰前年晉人執莒子邾子以歸此書子牼卒者晉人尋赦之也莒子同此歸蘇氏轍曰不書其不告也宋人伐陳左傳十七年春宋莊朝伐陳獲司徒卬卑宋也集説髙氏閌曰七年鄬之㑹陳侯逃歸自是不復與諸侯㑹而楚鄭連年侵宋宋於是請於晉而伐之書伐許伐陳皆著楚之詘也討陳氏傅良曰莊朝宋微者也曷為得書人微者唯賊得書人大夫交征於列國而後微者書人是故鄭皇武書宋莊朝書甚者秦庶長鮑越常夀過書家氏鉉翁曰宋撓楚也十一年楚鄭伐宋撓晉也今宋人伐陳以撓楚春秋貴之李氏廉曰伐而不書獲異於鄭人之侵蔡獲燮矣夏衛石買帥師伐曹左傳衛孫蒯田於曹隧飲馬於重丘毁其瓶重丘人閉門而訽之曰親逐而君爾父為厲是之不憂而何以田為夏衛石買孫蒯伐曹取重丘曹人愬於晉重丘杜注曹邑寰宇記重丘在乘氏縣東北三十一里今曹縣東北有乘氏故城屬山東兗州府集説趙氏鵬飛曰賢方伯在上諸侯無敢妄加侵伐衛無故而伐曹晉之累也故明年晉人執衛行人石買君汪氏克寛曰孟子曰有人於此其待我以横逆則子必自反也孫蒯犯上之臣凡民㒺不惡者也越竟田獵而遭曹人之辱盍亦内自省耳乃挾貴卿將重兵以攻其國不亦甚乎經之書伐所謂欲加之罪不患無辭者也秋齊侯伐我北鄙圍桃齊髙厚帥師伐我北鄙圍防桃公作洮髙厚上左無齊字左傳齊人以其未得志於我故秋齊侯伐我北鄙圍桃髙厚圍臧紇於防師自陽闗逆臧孫至於旅松郰叔紇臧疇臧賈帥甲三百宵犯齊師送之而復齊師去之齊人獲臧堅齊侯使夙沙衛唁之且曰無死堅稽首曰拜命之辱抑君賜不終姑又使其刑臣禮於士以杙抉其傷而死陽闗杜注在泰山鉅平縣東今兗州府寧陽縣東北有陽闗故城旅松杜注近防地也集説孫氏復曰三年之中君臣加兵於魯者四齊之不道亦可知也高氏閌曰齊之君臣同來伐我分兵以圍吾二邑其恃衆暴寡如此欲家氏鉉翁曰自鞌之戰齊屈於晉而内懐不平每釋憾於魯以致晉師今君臣異道而進魯三家束手無策春秋不惟責齊亦閔魯也九月大雩宋華臣出奔陳左傳宋華閱卒華臣弱皋比之室使賊殺其宰華呉賊六人以鈹殺諸盧門合左師之後左師懼曰老夫無罪賊曰皋比私有討於呉遂幽其妻曰畀余而大璧宋公聞之曰臣也不唯其宗室是暴大亂宋國之政必逐之左師曰臣也亦卿也大臣不順國之恥也不如盖之乃舍之左師為己短䇿苟過華臣之門必騁十一月甲午國人逐瘈狗瘈狗入於華臣氏國人從之華臣懼遂奔陳集説杜氏預曰暴亂宗室懼而出奔實以冬出書秋者以始作亂時來告髙氏閌曰華臣暴其宗室而亂宋政不有國討失政刑矣君子違不適讐國陳乃宋讐而奔焉尤可誅也王氏錫爵曰左師畏華臣之强勸君盖其惡而舍之而諉曰大臣不順國之恥也細人姑息之論耳異日者瘈狗入而華臣出顧不恥歟冬邾人伐我南鄙左傳冬邾人伐我南鄙為齊故也集説杜氏預曰齊未得志於魯故邾助之邾王氏葆曰魯之四鄙而莒伐其東齊伐其北伐其南魯之微弱不振亦可知矣國有政雖弱而彊國無政雖大必弱魯蒐于紅革車千乘豈曰無兵而陵夷至此者三家分政民不知有君故也卒髙氏閌曰邾之先君以伐魯而為晉所執既歸而嗣子在喪而復興師伐我者叛晉與齊齊人使之修先君之怨也此祝柯之㑹所以復執也薛氏季宣曰乗齊之圍報執之讐也附錄左傳宋皇國父為大宰為平公築臺妨於農收子罕請俟農功之畢公弗許築者謳曰澤門之晳實興我役邑中之黔實慰我心子罕聞之親執扑以行築者而抶其不勉者曰吾儕小人皆有闔廬以辟燥濕寒暑今君為一臺而不速成何以為役謳者乃止或問其故子罕曰宋國區區而有詛有祝禍之本也倚齊晏桓子卒晏嬰麤縗斬苴絰帶杖菅屨食鬻居廬寢苫枕草其老曰非大夫之禮也曰唯卿為大夫丙靈王十午七年十有八年晉平三年齊靈二十七年衛獻二十二年殤四年蔡景三十七年鄭簡十一年曹成二十三年陳哀十四年把孝十二年宋平二十一年秦景二十二年楚康五年呉諸樊六年春白狄來左傳十八年春白狄始來胡傳劉氏敞曰周公致大平越裳氏重九譯而獻其白雉公曰君子德不及焉不享其贄此乃天子而讓也况列國之君乎守藩之臣乎集説杜氏預曰不言朝不能行朝禮與髙氏閌曰春秋書白狄於是焉止白狄之來介葛盧同家氏鉉翁曰春秋之義㑹戎盟戎則有譏介葛盧來白狄來之類則無絶也夏晉人執衛行人石買左傳夏晉人執衛行人石買於長子執孫蒯於純留為曹故也長子純留杜注二縣皆屬上黨郡純地理志作屯今俱屬山西潞安府集説杜氏預曰因其為使執之故書行人之蘇氏轍曰十七年石買侵曹取重丘曹人訴晉晉人因其使而執之買則有罪而執之於其使則非禮也故書曰執衛行人石買張氏洽曰石買之執有三失焉舍大而治小一也行人非所執二也不歸於京師三也三者有一不得為伯討而况於兼而有之乎之黄氏震曰為石買無故伐曹而執也然不當因其為行人而執之秋齊師伐我北鄙榖作齊侯集説杜氏預曰不書齊侯齊侯不入竟邾許氏翰曰四年之中六伐鄙而四圍邑又縱莒以助其虐諸侯之陵暴未有若是之甚者也是以動天下之兵㡬亡其國季氏本曰齊之伐魯志在爭霸欲以長驅中原三年之中五伐四圍而今又以師伐暴亦甚矣安得不致十二國之圍哉冬十月公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子同圍齊左傳秋齊侯伐我北鄙中行獻子將伐齊夢與厲公訟弗勝公以戈擊之首隊於前跪而戴之奉之以走見梗陽之巫皋他日見諸道與之言同巫曰今兹主必死若有事於東方則可以逞獻子許諾晉侯伐齊將濟河獻子以朱絲係玉二瑴而禱曰齊環怙恃其險負其衆庻棄好背盟陵虐神主曾臣彪將率諸侯以討焉其官臣偃實先後之苟㨗有功無作神羞官臣偃無敢復濟唯爾有神裁之沈玉而濟冬十月㑹於魯濟尋湨梁之言同伐齊齊侯禦諸平隂塹防門而守之廣里夙沙衛曰不能戰莫如守險弗聽諸侯之士門焉齊人多死范宣子告析文子曰吾知子敢匿情乎魯人莒人皆請以車千乘自其鄉入既許之矣若入君必失國子盍圖之子家以告公公恐晏嬰聞之曰君固無勇而又聞是弗能久矣齊侯登巫山以望晉師晉人使司馬斥山澤之險雖所不至必斾而疏陳之使乗車者左實右偽以斾先輿曳柴而從之齊侯見之畏其衆也乃脫歸丙寅晦齊師夜遁師曠告晉侯曰鳥烏之聲樂齊師其遁邢伯吿中行伯曰有班馬之聲齊師其遁叔向告晉侯曰城上有烏齊師其遁十一月丁卯朔入平隂遂從齊師夙沙衛連大車以塞隧而殿殖綽郭最曰子殿國師齊之辱也子姑先乎乃代之殿衛殺馬於隘以塞道晉州綽及之射殖綽中肩兩矢夾脰曰止將為三軍獲不止將取其衷顧曰為私誓州綽曰有如日乃弛弓而自後縛之其右具丙亦舍兵而縛郭最皆衿甲面縛坐於中軍之鼓下晉人欲逐歸者魯衛請攻險己卯荀偃士匄以中軍克京兹乙酉魏絳欒盈以下軍克邿趙武韓起以上軍圍盧弗克十二月戊戌及秦周伐雍門之萩范鞅門於雍門其御追喜以戈殺犬於門中孟莊子斬其橁以為公琴己亥焚雍門及西郭南郭劉難士弱率諸侯之師焚申池之竹木壬寅焚東郭北郭范鞅門於揚門州綽門於東閭左驂廹還於東門中以枚數闔齊侯駕將走郵棠太子與郭榮扣馬曰師速而疾略也將退矣君何懼焉且社稷之主不可以輕輕則失衆君必待之將犯之太子抽劍斷鞅乃止甲辰東侵及濰南及沂梗陽杜注晉邑在太原晉陽縣南今太原府清源縣有梗陽故城平隂杜注在濟北盧縣東北其城南有防防有門於門外作塹平隂古城在縣東北三十五里今縣屬東平州巫山杜注在盧縣東北今濟南府肥城縣西北七十五里有孝堂山即齊侯望晉師處也京兹杜注在平隂城東南州邿杜注平隂西有峙山棠郵棠杜注齊邑今膠即墨縣南八十里有甘社即古棠鄉濰水經注濰水出琅琊箕縣過東武平昌髙密淳于逕都昌入海箕縣在今莒州東武故城今為諸城縣治平昌髙密淳于皆在今安丘縣都昌今昌邑縣也沂杜注沂水出東莞盖縣至下邳入海盖縣省入沂水縣今屬山東青州府胡傳凡侵伐圍入未有書同者而獨於此書同圍齊何也齊環背盟棄好陵虐神主肆其暴横數伐鄰國觀加兵於魯則可見矣諸侯所共惡疾故同心而圍之也同心圍齊其以伐致何也見齊環無道宜得惡疾大諸侯之伐而免其圍齊之罪辭也春秋於此有阻横逆抑强暴之意孟子曰國必自伐而後人伐之自作孽不可逭其齊侯環之謂矣尚誰懟哉集説杜氏預曰齊數行不義諸侯同心俱圍之特陸氏淳曰齊背盟主數伐小國諸侯同心故書曰同圍若劉氏敞曰榖梁曰非圍而曰圍非也春秋信史也未圍而言圍豈得為信史哉程子曰書同圍見諸侯之惡齊齊許氏翰曰環而攻之焚其四郭故謂之圍曰同圍言得罪於天下也家氏鉉翁曰或謂鞌之戰晉為魯衛而伐齊春秋不與也今晉平為魯伐齊而春秋與之何耶事有似同而實異者兩伐齊是也鞌之戰雖曰為魯衛出師其實大夫逞其私憾春秋不與也今兹伐齊靈背盟好歲以兵加於魯晉為之合諸侯以問齊人憑陵與國之罪從衆欲而出師非為其私也故書同圍齊此聖人之特筆非因乎舊史者也圍鄭氏玉曰莒邾嘗病魯矣滕薛小邾嘗屬齊矣今齊莫敢不同者晉人以大義驅之也於王氏樵曰齊環恃其桀暴虐鄰殘民四年之中至六伐鄙而四圍邑不道之甚為諸侯所共疾也晉討得其罪與衆同欲而非為其私也故書同圍以與之曹伯負芻卒于師集説杜氏預曰禮當與許男同而劉氏敞曰榖梁曰閔之也非也是亦記事已矣何閔之有楚公子午帥師伐鄭左傳鄭子孔欲去諸大夫將叛晉而起楚師以去之使吿子庚子庚弗許楚子聞之使揚豚尹宜告子庚曰國人謂不榖主社稷而不出師死不從禮不榖即位於今五年師徒不出人其以不榖為自逸而忘先君之業矣大夫圖之其若之何子庚歎曰君王其謂午懐安乎吾以利社稷也見使者稽首而對曰諸侯方睦於晉臣請嘗之若可君而繼之不可收師而退可以無害君亦無辱子庚帥師治兵于汾於是子蟜伯有子張從鄭伯伐齊子孔子展子西守二子知子孔之謀完守入保子孔不敢㑹楚師楚師伐鄭次於魚陵右師城上棘遂渉潁次於􅏧然蒍子馮公子格率鋭師侵費滑胥靡獻于雍梁右回梅山侵鄭東北至於蟲牢而反子庚門于純門信於城下而還渉於魚齒之下甚雨及之楚師多凍役徒㡬盡晉人聞有楚師師曠曰不害吾驟歌北風又歌南風南風不競多死聲楚必無功董叔曰天道多在西北南師不時必無功叔向曰在其君之德也汾杜注襄城縣東北有汾丘城水經注潁水東歴罡丘城南故汾丘城也今襄城縣屬河南開封府注魚陵杜注魚齒山也在南陽犨縣北鄭地水經湛水源於魚齒山今在汝州東南五十里上棘郡縣志陽翟有上棘城今在禹州南注􅏧然杜注􅏧然水出滎陽成皋縣東入汴水經索水出京縣西南嵩渚山即古􅏧然水也嵩渚山在滎陽縣東南三十五里胥靡杜注鄭邑獻于杜注鄭邑梅雍梁杜注鄭邑河南陽翟縣東北有雍氏城山杜注在滎陽密縣東北今開封府鄭州西南三十里有梅山集説薛氏季宣曰楚公子午之伐間鄭伯之出也乘人不備而迄無成功黷武而已矣李氏廉曰此蕭魚之後楚兵又至鄭也欽定春秋傳説彚纂卷二十六
