body:
  text: 欽定四庫全書欽定春秋傳說彚纂卷二十四辛簡王已六年十有一年晉厲公州蒲元年齊靈二年衛定九年蔡景十二年鄭成五年曹宣十五年陳成十九年把桓五十七年宋共九年秦桓二十五年楚共十一年吳壽夢六年春王三月公至自晉左傳十一年春王三月公至自晉晉人以公為二於楚故止公公請受盟而後使歸集說杜氏預曰正月公在晉不書諱見止釋孔氏穎達曰襄二十九年正月公在楚傳曰不朝正於廟也彼以踰年故書正月公在楚此亦踰年不書正月公在晉者為諱見止故正月不以告廟趙氏鵬飛曰公自前年七月如晉至今三月而後至留於晉者凡九月魯亦有人民社稷之守乎晉侯獳卒於五月則九月葬矣既葬而稽於晉者凡六月吾竊為成公懼之晉侯使郤犫來聘己丑及郤犫盟犫尺由反公作州後同左傳郤犫來聘且涖盟聲伯之母不聘穆姜曰吾不以妾為姒生聲伯而出之嫁於齊管于奚生二子而寡以歸聲伯聲伯以其外弟為大夫而嫁其外妹於施孝叔郤犫來聘求婦於聲伯聲伯奪施氏婦以與之婦人曰鳥獸猶不失儷子將若何曰吾不能死亡婦人遂行生二子於郤氏郤氏亡晉人歸之施氏施氏逆諸河沈其二子婦人怒曰已不能庇其伉儷而亡之又不能字人之孤而殺之將何以終遂誓施氏集說杜氏預曰郤犫郤克從父兄弟乃髙氏閌曰公留於晉者九月晉侯不與公盟反公於國而使大夫盟之見晉侯之無禮於公甚矣負趙氏鵬飛曰前年公如晉留於晉者凡九月公何於晉而晉止之晉之不義也甚矣今公既返因以郤犫來聘且抗公而盟之陽為禮而隂實疑魯蓋厲公初立而求諸侯疑公之憾其見止而或叛也以公而敵大夫其辱為如何聖人沒公不書非苟為內諱伸公所以誅郤犫也之家氏鉉翁曰與三年荀庚來聘而盟書法同荀庚盟魯自慊其二求與之盟雖伉也其責在魯今晉無禮於公懼公即楚故遣郤犫為此盟其責在晉晉厲新立以無禮加諸侯書以貶之吳氏􅊹曰晉景公卒成公旋往奔喪可謂謹於事大矣而晉不禮之止之使送葬已大辱矣送葬畢又不使歸公遂請受盟以明其非二故於三月而後得歸才及國而郤犫已至豈誠心行聘禮也哉直欲迫公使盟爾夏季孫行父如晉左傳夏季文子如晉報聘且涖盟也集說張氏洽曰公之至自晉也既受盟矣及文子之聘也亦且涖盟焉春秋皆不書而獨書郤犫之涖盟何也蓋成公自汶陽之歸齊欲二晉而不果然嫌隙竟章無以自明晉因公之朝而止之數月公請受盟而後使歸又使郤犫來聘而涖盟魯使行父往則又從而盟之據彊大之勢要君臣之盟皆魯之恥也惟犫聘而盟春秋以荀庚孫良夫例而書之若成公之受盟與行父之涖豈能得晉君而盟之乎亦大夫盟之爾不書而諱皆魯之恥也聘黃氏仲炎曰晉人止公九月而後歸之然猶亟於魯者豈復有親魯之意哉疑其叛而要結之也魯侯被晉之辱然猶繼朝而聘晉者豈復有德晉之心哉畏其威而諂事之也晉以要結為信魯以諂事為禮二者皆小人之相與焉爾附録左傳周公楚惡惠襄之逼也且與伯與爭政不勝恕而出及陽樊王使劉子復之盟於鄄而入三日復出奔晉鄄杜注周邑秋叔孫僑如如齊左傳秋宣伯聘於齊以修前好集說許氏翰曰魯蓋激晉之德禮不施將二於齊而未能者歟薛氏季宣曰由齊之媵始交好於齊也忿張氏洽曰僑如之聘蓋謝戰鞍之師捐歸汶陽之而行之迫於晉之辱而不得已也趙氏鵬飛曰行父如晉報郤犫之聘也僑如如齊改事齊也既報聘於晉而復事齊何邪魯弱不能自立從容於二大國之間惟厚於己者親之爾前日以憾齊之故不得不事晉今魯與宋婚而齊且來媵尚何歉於齊乎晉既以魯為二己公朝之而反見止郤犫來聘又抗公而盟之魯安能忍辱以服事晉乎故以僑如如齊通舊好也德戴氏溪曰晉使我歸田於齊齊未嘗遣使至魯是晉而怨魯也今僑如修好未幾而求昏齊卒無報聘則魯為齊弱久矣案僑如如齊諸儒皆謂受晉之辱而改事齊理或然也是時齊當新敗之後魯即事齊齊亦未敢抗晉但恐晉不足恃則齊將乘間而為搆怨之師魯何以堪故與之修好以求免焉此行父僑如相繼而為晉齊之行也冬十月附録左傳晉郤至與周爭鄇田王命劉康公單襄公訟諸晉郤至曰溫吾故也故不敢失劉子單子曰昔周克商使諸侯撫封蘇忿生以溫為司寇與檀伯達封於河蘇氏即狄又不能於狄而奔衛襄王勞文公而賜之溫狐氏陽氏先處之而後及子若治其故則王官之邑也子安得之晉侯使郤至勿敢爭許宋華元善於令尹子重又善於欒武子聞楚人既晉糴茷成而使歸復命矣冬華元如楚遂如晉合晉楚之成河秦晉為成將㑹於令狐晉侯先至焉秦伯不肯涉次於王城使史顆盟晉侯於河東晉郤犫盟秦伯於河西范文子曰是盟也何益齊盟所以質信也㑹所信之始也始之不從其可質乎秦伯歸而背晉成鄇田杜注溫别邑河內懷縣西南有鄇人亭今在河南懷慶府武陟縣檀周邑今在懷慶府集說王氏錫爵曰晉侯已至而秦伯不肯涉河兩主誠僞自見壬簡王午七年十有二年晉厲二年齊靈三年衛定十年蔡景十三年鄭成六年曹宣十六年陳成二十年杞桓五十八年宋共十年秦桓二十六年楚共十二年吳壽夢七年春周公出奔晉左傳十二年春王使以周公之難來告書曰周公出奔晉凡自周無出周公自出故也榖梁周有入無出其曰出上下一見之也言其上下之道無以存也上雖失之下孰敢有之今上下皆失之矣胡傳案左氏周公楚惡惠襄之逼且與伯與爭政不勝怒而出王使劉子復之盟於鄄而入三日復出奔晉夫人主無誠慤之心而下要大臣盟是謂君不君人臣無忠信之實而上與人主盟是謂臣不臣既已要質鬼神以入矣又叛盟失信而出奔則是自絶於天也自周無出而書曰出者見周室衰微刑政號令不行於天下爾集說杜氏預曰天子無外故奔不言出周公為王所復而自絶於周故書出罪之陸氏淳曰公羊曰王者無外此其言出何自其私土而出也案周是畿內之國不當以私土為義孫氏覺曰春秋之義自周無出蓋曰天下一周也何往而非周乎天王居鄭周公奔晉特異之者孔子之意也王之所以為王以有其位而天下皆其有也王得言出是自絶其位而不能有天下也天下非其有則雖居鄭不可不言出也周公之所以為公以其左右天王而與王共治也為三公而自絶於王是不能有三公之位雖止奔晉猶若出於四海之外也天下一王而王有三公春秋書出用見天下無王而王無三公也高氏閌曰周無出也天下皆周也周公為天子三公而不能同寅協恭乃與伯與爭政不勝而出王既復之又違命而奔於諸侯之國是自絶於周故書出以為萬世之戒是時王室衰微號令不行於天下故逋逃之臣諸侯敢受之書此而晉罪昭然矣所趙氏鵬飛曰周之盛時王臣有罪放殺屏竄惟上令未聞有罪而掩然自奔也王之所棄天下同棄之大則討之以敵王所愾小則執之以歸於甸人未聞黜於周而保於晉也周室不綱晉為逋逃主匿比罪人以抗天子其罪何可不誅哉李氏廉曰王室書居三居皇居狄泉不書出惟襄王居鄭書出王臣書奔三子瑕子朝不書出惟周公奔晉書出故穀梁曰上下一見之也汪氏克寬曰王子瑕王子朝之奔不言出蓋瑕朝皆為逆亂無所容其身逃竄他國以逭誅戮如國滅之君與在外之臣非居位祿而出奔也其不書出乃書法之常耳襄王御萬乘之尊周公都三公之貴皆當以天下為家其書出則為貶矣王黃氏正憲曰案左氏載周公與伯與爭政怒而出使劉子復之三日復出奔晉夫政出一人豈容私競復由王命何可再奸伯與之曲直固無實證而周公之罪自大矣夏公㑹晉侯衛侯于瑣澤公作沙澤闕瑣澤杜注地左傳宋華元克合晉楚之成夏五月晉士燮㑹楚公子罷許偃癸亥盟於宋西門之外曰凡晉楚無相加戎好惡同之同恤菑危備救凶患若有害楚則晉伐之在晉楚亦如之交贄往來道路無壅謀其不協而討不庭有渝此盟明神殛之俾隊其師無克胙國鄭伯如晉聽成㑹于瑣澤成故也集說劉氏敞曰左氏曰宋華元克合晉楚之成鄭伯如晉聽成㑹于瑣澤成故也然則瑣澤之㑹本以合楚鄭也今楚鄭不至魯衛自盟何邪且合晉楚者宋也宋亦不與又何邪凡晉楚為平則應大合諸侯以申成好今三國㑹而已又何邪然則傳之言未足信也高氏閌曰考傳事實與經不合夫晉厲之㑹實始於此略諸國而致魯衛則以見厲公之德不能謹始諸侯多解體矣吕氏大圭曰瑣澤之㑹為伐秦起文耳今年㑹于瑣澤明年春使郤錡來乞師而後五月暨諸侯伐秦比事而觀之可見矣家氏鉉翁曰晉楚為成關繫不細春秋略而不書豈無意乎齊桓之於楚討而服之晉文之於楚敗而却之而霸者之職舉矣晉自靈成君昏暗而臣惰偷以避楚為得計至是因俘纍以通意遂交聘而為成晉固苟求安佚而楚實怙其彊大略無息肩之意後三年渝盟伐鄭無所恤也又其後宋向戌復持弭兵之說為盟而長楚遂使列國諸侯北面於楚庭其端實兆於此故瑣澤之㑹書法如此不與晉為此㑹也李氏廉曰此㑹左氏以為晉楚為成經既不書晉楚之盟而公穀胡氏又無𫝊陳氏章指曰晉楚嘗同盟矣不書至襄二十七年始書之案西門之盟左氏備載其事而不見於經趙氏匡遂以為附㑹之說非也若果無此盟則郤至與公子罷交相往來何以歷歷如繪乎蓋晉楚為成春秋惡之故聖人削而不書也瑣澤之㑹經書魯與晉衛而不及鄭伯傳載鄭伯如晉而不及魯衛故劉氏敞以為傳未足信然春秋事據左氏且相沿已久今仍存之秋晉人敗狄于交剛交剛杜注地闕左傳狄人問宋之盟以侵晉而不設備秋晉人敗狄于交剛集說高氏閌曰此秋蓋白狄也九年秦人白狄伐晉此先敗狄而後伐秦是知報九年之役也冬十月附録左傳晉郤至如楚聘且涖盟楚子享之子反相為地室而縣焉郤至將登金奏作於下驚而走出子反曰日云莫矣寡君須矣吾子其入也賔曰君不忘先君之好施及下臣貺之以大禮重之以備欒如天之福兩君相見何以代此下臣不敢子反曰如天之福兩君相見無亦唯是一矢以相加遺焉用欒寡君須矣吾子其入也賔曰若讓之以一矢禍之大者其何福之為世之治也諸侯間於天子之事則相朝也於是乎有享宴之禮享以訓共儉宴以示慈惠共儉以行禮而慈惠以布政政以禮成民是以息百官承事朝而不夕此公侯之所以扞城其民也故詩曰﨣﨣武夫公侯干城及其亂也諸侯貪冒侵欲不忌爭尋常以盡其民略其武夫以為己腹心股肱爪牙故詩曰﨣﨣武夫公侯腹心天下有道則公侯能為民干城而制其腹心亂則反之今吾子之言亂之道也不可以為法然吾子主也至敢不從遂入卒事歸以語范文子文子曰無禮必食言吾死無日矣夫冬楚公子罷如晉聘且涖盟十二月晉侯及楚公子罷盟于赤棘癸簡王未八年十有三年晉厲三年齊靈四年衛定十一年蔡景十四年鄭成七年曹宣十七年陳成二十一年把桓五十九年宋共十一年秦桓二十七年楚共十三年吳壽夢八年春晉侯使郤錡來乞師錡魚綺反左傳十三年春晉侯使郤錡來乞師將事不敬孟獻子曰郤氏其亡乎禮身之幹也敬身之基也郤子無基且先君之嗣卿也受命以求師將社稷是衛而惰棄君命也不亡何為榖梁乞重辭也古之人重師故以乞言之也胡傳晉主夏盟行使諸侯徴㑹討二誰敢不從以霸主之尊而書曰乞師何也列國疏封雖有大小土地甲兵受之天子不相統屬魯兵非晉所得專也今晉不以王命興諸侯之師故特書曰乞聖人作春秋無不重內而輕外至於乞師則內外同辭者蓋皆有報怨復讎貪得之心是以如此若夫誅亂臣討賊子請於天王以大義驅之誰不拱手以聽命何至於乞哉噫此聖人所以垂戒後世見諸行事之深切著明者也集說杜氏預曰將伐秦也侯伯當召兵而乞師謙辭陸氏淳曰淳聞於師曰晉之於魯霸主也其使之來召兵而已而云乞師者用明列國之禮小大雖殊不相統屬魯兵非晉所宜有又非天子之命且譏之也郤劉氏敞曰公子遂如楚乞師此內接外之辭也晉錡來乞師此外接內之辭也聖人作春秋無不輕外而重內至於乞師則內外同之者以兵為重也故伯主之尊猶以乞師為文程子曰不以王命興諸侯師故書乞王劉氏絢曰雖晉之大命魯興師亦書曰乞所以正法李氏廉曰晉厲公之乞師三郤錡為伐秦欒黶為戰楚荀罃為伐鄭厲公不德人心未服矯以求諸侯也晉悼之乞師一士魴為救宋悼公初興伯事未定謙以接諸侯也楚汪氏克寬曰春秋書乞師者五其一則我乞兵於其三則晉郤錡欒黶荀罃皆厲公徴兵於魯悼公初立而士魴來或者循襲厲公之遺法歟案晉為盟主遣使召兵而曰乞者杜氏預以為謙辭是也胡𫝊謂卑伏屈損則誤矣是時晉方無禮於魯朝則留而不歸㑹則拒而不見盟郤犫以輕之執行父以辱之安有卑屈之意乎三月公如京師集說杜氏預曰伐秦道過京師因朝王氏孔氏頴達曰劉氏炫云魯朝聘皆言如劉敞曰公如京師主人習其讀而問其傳則以謂如京師固美志也而未知春秋以是譏之也曰公不伐秦豈能朝天子乎天子者天下之父也朝有年聘有時盡心竭力致其誠慤專一之意以將之則所謂子事親臣事君之道也焉有挾二事以往哉重於伐人輕於事君雖有朝之名而無朝之誠書曰享多儀儀不及物惟曰不享此春秋所惡也得黃氏仲炎曰春秋魯十二公而覲天子者二皆不謂之禮者僖朝於王所成如京師是也僖執朝王之禮而不行於京師則非其所矣成假道於京師因以朝王而意不在朝王矣故皆不得謂之禮也以其皆不得謂之禮故書夏五月公自京師遂㑹晉侯齊侯宋公衛侯鄭伯曹伯邾人滕人伐秦左傳三月公如京師宣伯欲賜請先使王以行人之禮禮焉孟獻子從王以為介而重賄之公及諸侯朝王遂從劉康公成肅公㑹晉侯伐秦成子受脤於社不敬劉子曰吾聞之民受天地之中以生所謂命也是以有動作禮義威儀之則以定命也能者養之以福不能者敗以取禍是故君子勤禮小人盡力勤禮莫如致敬盡力莫如敦篤敬在養神篤在守業國之大事在祀與戎祀有執膰戎有受脤神之大節也今成子惰棄其命矣其不反乎夏四月戊午晉侯使吕相絶秦曰昔逮我獻公及穆公相好戮力同心申之以盟誓重之以昏姻天禍晉國文公如齊惠公如秦無祿獻公即世穆公不忘舊德俾我惠公用能奉祀於晉又不能成大勳而為韓之師亦悔於厥心用集我文公是穆之成也文公躬擐甲胄跋履山川踰越險阻征東之諸侯虞夏商周之𦙍而朝諸秦則亦既報舊德矣鄭人怒君之疆埸我文公帥諸侯及秦圍鄭秦大夫不詢於我寡君擅及鄭盟諸侯疾之將致命於秦文公恐懼綏靜諸侯秦師克還無害則是我有大造於西也無祿文公即世穆為不弔蔑死我君寡我襄公迭我殽地奸絶我好伐我保城殄滅我費滑散離我兄弟撓亂我同盟傾覆我國家我襄公未忘君之舊勳而懼社稷之隕是以有殽之師猶願赦罪於穆公穆公弗聽而即楚謀我天誘其衷成王隕命穆公是以不克逞志於我穆襄即世康靈即位康公我之自出又欲闕翦我公室傾覆我社稷帥我蝥賊以來蕩搖我邊疆我是以有令狐之役康猶不悛入我河曲伐我洓川俘我王官翦我羈馬我是以有河曲之戰東道之不通則是康公絶我好也及君之嗣也我君景公引領西望曰庶撫我乎君亦不惠稱盟利吾有狄難入我河縣焚我箕郜芟夷我農功䖍劉我邊陲我是以有輔氏之聚君亦悔禍之延而欲徼福於先君獻穆使伯車來命我景公曰吾與女同好棄惡復修舊德以追念前勳言誓未就景公即世我寡君是以有令狐之㑹君又不祥背棄盟誓白狄及君同州君之仇讐而我之昏姻也君來賜命曰吾與女伐狄寡君不敢顧昏姻畏君之威而受命於吏君有二心於狄曰晉將伐女狄應且憎是用告我楚人惡君之二三其德也亦來告我曰秦背令狐之盟而來求盟於我昭告昊天上帝秦三公楚三王曰余雖與晉出入余唯利是視不榖惡其無成德是用宣之以懲不一諸侯備聞此言斯是用痛心疾首昵就寡人寡人帥以聽命唯好是求君若惠顧諸侯矜哀寡人而賜之盟則寡人之願也其承寧諸侯以退豈敢徼亂君若不施大惠寡人不佞其不能以諸侯退矣敢盡布之執事俾執事實圖利之秦桓公既與晉厲公為令狐之盟而又召狄與楚欲道以伐晉諸侯是以睦於晉晉欒書將中軍荀庚佐之士燮將上軍郤錡佐之韓厥將下軍荀罃佐之趙旃將新軍郤至佐之郤毅御戎欒針為右孟獻子曰晉帥乘和師必有大功五月丁亥晉師以諸侯之師及秦師戰於麻隧秦師敗績獲秦成差及不更女父曹宣公卒于師師遂濟涇及侯麗而還迓晉侯於新楚成肅公卒於瑕費滑杜注滑國都於費今緱氏縣水經注休水徑延壽城南緱氏縣治故費滑也今河南河南府偃師縣南二十里有緱氏故城河洓川杜注洓水出河東聞喜縣西南至蒲坂入今山西平陽府蒲州東北二十六里有涑水城涇麻隧杜注秦地在陜西西安府涇陽縣西南杜注涇水出安定東南漢志涇水出开頭山在今陜西平凉府西南三十里侯麗杜注秦地劉伯莊云在涇陽縣境西新楚杜注秦地當在安府同州朝邑縣境公羊其言自京師何公鑿行也公鑿行奈何不敢過天子也榖梁言受命不敢叛周也胡傳諸侯每嵗侵伐四出未有能修朝覲之禮者今公欲㑹伐秦道自王都不可越天子而往也故皆朝王而不能成朝禮書曰如京師見諸侯之慢也因㑹伐而行矣又書公自京師以伐秦為遂事者此仲尼親筆明朝王為重存人臣之禮也古者諸侯即位服喪畢則朝小聘大聘終則朝巡狩於方嶽則朝觀春秋所載天王遣使者屢矣十二公之述職蓋闕如也獨此年書公如京師又不能成朝禮不敬莫大焉君臣人道之大倫而至於此極故仲尼為此懼作春秋或抑或縱或豫或奪所以明君臣之義者至矣其義得行則臣必敬於君子必敬於父天理必存人欲必消大倫必正豈曰小補之哉此以伐秦為遂事之意也集說孫氏覺曰成公之如京師法當罪之而君臣之大法不可以成公非禮而亂之也書曰如京師遂㑹諸侯則成公之罪無所可逃而君臣之法愈久愈正也晉侯實召天王而書狩河陽成公實㑹伐秦而書如京師惟其無禮故以禮正之伐程子曰不書朝王因㑹伐而行也故不成其朝以秦為遂事明朝為重道髙氏閌曰公如京師専行之辭也然本㑹晉伐秦過王畿不得不朝舉其可道者志敬也然上書晉來乞師下書公自京師遂㑹伐秦則是挾他事以往而非專行乃志其不敬也其辭若志敬而實志不敬此春秋微辭也夫諸侯擅興兵而大㑹於京師罪之大者故聖人詳言之以著其惡也陳氏傅良曰戰于麻隧秦師敗績但書伐秦戰于櫟晉師敗績但書伐晉以為不足詳焉爾張氏洽曰春秋以諸侯事周之禮久闕而因行於伐秦之役若沒而不書是盡廢其僅存之禮也若書以為朝於京師則是舉百年之墜典亦非其實也故書如京師而不言朝以見其行禮之不專書自京師㑹諸侯伐秦以見諸侯之行止為伐秦而不為朝京師也而劉子成子之在㑹亦削而不書則晉無請命之實意朝王之專禮而伯主違典禮以遂私意摟諸侯以輕王室之罪具見矣趙氏鵬飛曰公如京師責之淺者則曰十二公之中惟成公如京師聖人蓋褒之責之深者則曰公因伐秦過京師而已未嘗朝也故不書朝淺者在所不辨而深者吾竊以為過矣且公三月如京師至五月而㑹晉伐秦久留京師非朝王而然與公朝於王所非其所也故不可書公如王所而書朝焉若公朝齊晉及內大夫聘於京師皆書如而朝聘自見矣今書公如京師責其不朝蓋曰不因伐秦則亦不朝京師爾家氏鉉翁曰書如京自京録其猶知有王也書自京師㑹諸侯伐秦示禀王命若征伐自天子出焉此春秋存周之意也劉康公成肅公皆行不書晉與秦私鬬上公不當與俱不書劉成義在此乎年吳氏􅊹曰魯號秉禮之國歷十二世二百四十二之久僅有成公一如京師乃因㑹晉伐秦道自王都因而朝焉本意不在朝王也故書曰如而不曰朝李氏廉曰左氏正義云公朝於王所者時王不在京師故指言王所據王言之不得不稱朝此則王在京師京師是國之總稱不可稱朝故依尋常朝聘鄰國之文稱如而已此說亦近之汪氏克寬曰經書朝王之禮者三僖公朝王所為㑹晉而行成公如京師為伐秦而往皆非有尊周之本心也然僖二十八年書公㑹諸侯盟于踐土公朝于玉所公㑹諸侯于溫天王狩于河陽公朝于王所使若諸侯先㑹而後朝王去其實以全名也此年書公如京師公自京師遂㑹伐秦使若請命而往伐正其名以統實也然書乞師於前書至伐於後則見朝京師實因行以見王而簡慢之罪視僖公不侔矣或曰一經之中魯君僅一如京師而貶之有如是者則朝者反得罪而不朝者無譏歟吁不朝之罪經不書而貶自著今也因過京師而朝王苟不示譏而豫之以朝則天下後世將謂尊君之禮可以簡慢而欺世盜名挾天子以令諸侯者又將借禀命伐秦之例以為口實矣其關繫豈淺淺哉王氏錫爵曰桓公既與晉厲公為令狐之盟而又召楚與狄以伐晉是以諸侯睦於晉而晉作書以絶之然晉辭亦多誣不足以服秦也又曰晉自以鄭二於楚與秦伐之鄭未嘗侵秦諸侯亦未嘗以秦之退而致命但秦納燭之武之說而私與之盟則誠罪也附録左傳六月丁卯夜鄭公子班自訾求入於大宫不能殺子印子羽反軍於市己已子駟帥國人盟於大宫遂從而盡焚之殺子如子駹孫叔孫知訾杜注鄭地曹伯廬卒于師廬左作盧左傳曹人使公子負芻守使公子欣時逆曹伯之喪秋負芻殺其大子而自立也諸侯乃請討之晉人以其役之勞請俟他年榖梁傳曰公大夫在師曰師在㑹曰㑹集說杜氏預曰負芻欣時皆宣庶子則劉氏敞曰榖梁謂閔之也非也諸侯死於行記其地例如此何閔之有祖高氏閌曰非戰死也死於行爾故不書地吕氏謙曰曹宣公從晉侯伐秦卒於師使公子負芻守國使公子欣時逆曹伯之喪公子欣時即子臧也負芻與欣時俱曹伯庶子公子欣時逆喪未歸負芻殺其大子而自立晉執負芻而歸之京師將見子臧於王而立之子臧辭曰聖達節次守節下失節遂逃奔宋負芻歸自京師自為曹君大抵學者之患最是勇於義而不能精擇如子臧輕千乘之國視之如敝屣固是勇於為義然而講學不明擇義不精反使篡弒之人儼然居一國之上都緣子臧歸潔其身太過輕重隆殺都不分所以得罪於君子秋七月公至自伐秦集說孫氏復曰不以京師至者明本非朝京師書王氏葆曰此年書法抑揚豫奪例變無窮始乞師知伐秦厲公意也次書如京師知成公之朝非専行也次書自京師伐秦使若繼事焉不可過天子也卒書至伐則著公之此行非為朝王名言其實也春秋之稱微而顯非聖人孰能修之張氏洽曰上書如京師而以伐秦為遂事春秋所以明朝王之當重也今以伐秦致明諸侯以伐秦為重也李氏廉曰不以如京師致而以伐秦致即如僖四年不以侵蔡致而以伐楚致皆究其初心也冬葬曹宣公左傳冬葬曹宣公既葬子臧將亡國人皆將從之成公乃懼告罪且請焉乃反而致其邑集說劉氏克莊曰子魚君宋茲父讓也昭王位楚子申讓也負芻八曹子臧讓也襄公繼鄭子良讓也又曰負芻弒君而自立子臧不義而舍之去吳子光刃僚而致國於季子季子舍之延陵而君子持衡於二者之間獨謂子臧失賊不討季子守匹夫介節不承父兄之志以是譏二子之讓國未為至也甲簡王申九年十有四年晉厲四年齊靈五年衛定十二年蔡景十五年鄭成八年曹成公負芻元年陳成二十二年杞桓六十年宋共十二年秦桓二十八年楚共十四年吳壽夢九年春王正月莒子朱卒集說范氏寧曰徐邈曰葬皆稱諡而莒君無諡諡以公配而吳楚稱王所以終春秋亦不得稱葬楊氏士勛曰莒子朱者莒渠丘公今不書葬者葬須稱諡莒無諡故不書葬也汪氏克寬曰渠丘公即季他也在位三十二年子密州嗣是為黎比公夏衛孫林父自晉歸于衛左傳春衛侯如晉晉侯彊見孫林父焉定公不可夏衛侯既歸晉侯使郤犫送孫林父而見之衛侯欲辭定姜曰不可是先君宗卿之嗣也大國又以為請不許將亡雖惡之不猶愈於亡乎君其忍之安民而宥宗卿不亦可乎衛侯見而復之衛侯饗苦成叔寧惠子相苦成叔傲寧子曰苦成家其亡乎古之為享食也以觀威儀省禍福也故詩曰兕觥其觩㫖酒思柔彼交匪傲萬福來求今夫子傲取禍之道也集說孫氏復曰林父七年奔晉其言自晉歸於衛者由晉侯而得歸也衛大夫由晉侯而得歸則衛國之事可知矣反許氏翰曰人臣不唯義之為安而介恃大國使之己此能為逐君之惡者也唯辨之不早是以衛獻至於出奔禍兆此矣歸易辭也自晉奉之故也高氏閌曰晉受衛國逋逃罪戾之臣又彊歸之故書自晉歸敢趙氏鵬飛曰林父脅晉以得入知衛侯畏晉而不治己則肆惡於衛庸何忌哉故其後卒至於叛所以叛衛者林父也而致林父之叛者晉也晉侯之罪當加林父一等故吾以為春秋責晉為重也不程氏端學曰林父之罪著矣晉厲之惡顯矣衛定能辭以大義而受之其不能君亦可知矣成李氏廉曰孫氏出於衛武公至林父八世林父以七年奔晉此年歸國襄十四年逐衛獻公立公孫剽其冬晉㑹于戚而不能討十九年復奉晉命伐齊二十五年獻公入夷儀二十六年寧喜弒剽林父入戚以叛其年晉㑹澶淵為林父討衛疆戚田取衛西鄙懿氏六十以與孫氏此晉人黨孫氏之本末也子賀氏仲軾曰有宜歸而歸之以為重者蔡季魯季陳侯之弟黃是也有不宜歸而歸之以為惡者鄭突曹赤楚比趙鞅衛公孟彄孫林父是也蔡季公子友陳黃皆天顯之親經或稱字或稱子或稱弟故知其豫之也突赤去族趙鞅書叛於前楚比公孟彄孫林父皆去國於八年之後而歸不言復故知其罪之也陳黃雖不比於蔡季魯季子然以介弟而困於讒人其情為可哀故出與秦針同而秦針不得與陳黃竝書歸是以知經之幸其歸也秋叔孫僑如如齊逆女左傳秋宣伯如齊逆女集說杜氏預曰成公逆夫人最為得禮而經無納幣者文闕絶也孔氏頴達曰闕絶者闕而文斷絶蓋疑仲尼修定後其文始闕也以劉氏敞曰十四年叔孫僑如如齊逆女九月僑如夫人婦姜氏至自齊左氏曰稱族尊君命也舍族尊夫人也非也一事而再見者卒名之此春秋之常爾非為尊君命故舉氏尊夫人故舍族也鄭公子喜帥師伐許左傳八月鄭子罕伐許敗焉戊戌鄭伯復伐許庚子入其郛許人平以叔申之封集說許氏翰曰鄭逼許楚困鄭以國大小兵力彊弱更相吞噬矣高氏閌曰此著許之所以遷亦見晉厲之不霸也夫許鄭之怨久矣三年再伐四年伐九年圍之今又伐焉使厲公而霸則鄭人怒鄰兼弱敢如是乎明年遷於葉避鄭以依楚明晉不足恃也九月僑如以夫人婦姜氏至自齊左傳九月僑如以夫人婦姜氏至自齊集說張氏洽曰稱婦宣公夫人穆姜尚存以黃氏仲炎曰春秋內大夫或稱族或舍族者前後一事故後從省文爾如前書叔孫豹及晉趙武楚屈建㑹於宋故後書豹及諸大夫盟於宋如前書晉人執季孫意如以歸故後書意如至自晉其稱族舍族者豈復有意義存乎其間哉左氏以僑如稱族為尊君命舍族為尊夫人者妄也宣李氏廉曰夫人有姑而稱婦者三文四年逆婦姜元年婦姜至皆不書氏惟此齊姜書氏無貶辭也案先儒皆謂諸侯當親迎程子獨辨之以為親迎者迎於所館未有委宗廟社稷而逺適他國以逆婦者其說是也僑如以夫人至自齊榖梁以為譏不親迎而胡傳從之且謂或迎於其國或迎於境上似亦未有定見矣既曰迎於境上則未入境之先安得不以大夫逆之乎今故從程子而凡為親迎之說者皆刪之冬十月庚寅衛侯臧卒左傳衛侯有疾使孔成子寧惠子立敬姒之子衎以為大子冬十月衛定公卒夫人姜氏既哭而息見大子之不哀也不內酌飲歎曰是夫也將不惟衛國之敗其必始於未亡人嗚呼天禍衛國也夫吾不獲鱄也使主社稷大夫聞之無不聳懼孫文子自是不敢舍其重器於衛盡置諸戚而甚善晉大夫秦伯卒集說高氏閌曰秦桓公也立二十八年卒史失其名乙簡王酉十年十有五年晉厲五年齊靈六年衛獻公衎元年蔡景十六年鄭成九年曹成二年陳成二十三年杞桓六十一年宋共十三年秦景公元年楚共十五年吳壽夢十年春王二月葬衛定公三月乙巳仲嬰齊卒公羊仲嬰齊者何公孫嬰齊也公孫嬰齊則曷為謂之仲嬰齊為兄後也為兄後則曷為謂之仲嬰齊為人後者為之子也為人後者為其子則其稱仲何孫以王父字為氏也然則嬰齊孰後後歸父也歸父使於晉而未反何以後之叔仲惠伯傅子赤者也文公死子幼公子遂謂叔仲惠伯曰君幼如之何願與子慮之叔仲惠伯曰吾子相之老夫抱之何幼君之有公子遂知其不可與謀退而殺叔仲惠伯弒子赤而立宣公宣公死成公幼臧宣叔者相也君死不哭聚諸大夫而問焉曰昔者叔仲惠伯之事孰為之諸大夫皆雜然曰仲氏也其然乎於是遣歸父之家然後哭君歸父使乎晉還自晉至柳聞君薨家遣墠帷哭君成踊反命於介自是走之齊魯人徐傷歸父之無後也於是使嬰齊後之也胡傳嬰齊者公子遂之子公孫歸父之弟也歸父出奔齊魯人徐傷其無後也於是使嬰齊後之故書曰仲嬰齊此可謂亂昭穆之序失父子之親者以後歸父則弟不可為兄嗣以後襄仲則以父字為氏亦非矣集說何氏休曰未見於經為公孫嬰齊今為大夫死見於經為仲嬰齊弟無後兄之義為亂昭穆之序失父子之親故不言仲孫明不與子為父孫氏杜氏預曰嬰齊襄仲子歸父弟宣十八年逐東門既而使嬰齊紹其後曰仲氏仲氏故其子孫稱仲氏爾劉氏炫曰仲遂受賜為劉氏敞曰嬰齊孰後後歸父也歸父出奔齊魯人徐傷其無後也於是使嬰齊後之非正也古者蓋一昭一穆又曰榖梁謂子由父疏不得稱公孫則歸父何故稱公孫乎歸孫氏覺曰嬰齊公子遂之子而歸父之弟也公孫父奔齊而仲遂之後遂絶魯不欲絶仲遂之後使嬰齊後之故曰仲嬰齊也榖梁以為子由父疏之父自有罪何與子哉兄家氏鉉翁曰公羊謂之仲嬰齊為兄後也弟無後之理以後襄仲爾李氏廉曰以仲遂生而賜氏俾世其卿之說考之則仲固為族無可疑矣賀氏仲軾曰魯人立後重在仲遂不重在歸父謂魯人為歸父立後是閔歸父也反歸父之子而立之不亦可乎不必用親弟為之後季孫與仲遂同為逆原無惡於仲遂直因歸父欲去三桓故季孫逐之安有為立後之理此亦情事之易見者也是時魯有兩嬰齊一為叔肸子一即仲嬰齊皆公孫也皆見於經如俱稱公孫則此卒者知為何嬰齊耶且以公族言則皆公孫以親疏言則仲遂者莊公之子叔肸者文公之子世次亦既有辨則仲嬰齊從君賜稱氏而叔嬰齊稱公孫亦情理所安案公羊謂嬰齊為兄後何氏休以為弟無後兄之義諸儒多從之者孫氏覺謂魯命嬰齊後仲遂故曰仲嬰齊非為歸父後也家氏鉉翁賀氏仲軾皆主是說二者不同胡傳本公羊發傳而又謂父字不可為氏則亦以為後襄仲也今故兼兩說而並存之或曰歸父嬰齊均為仲遂子經於歸父何以書公孫而嬰齊何以書仲夫襄仲之生也書曰公子遂其卒也書曰仲遂彼一人之身先後異稱而又何疑於歸父嬰齊乎蓋生而賜氏非禮也以父字為氏亦非禮也故於其生也書曰公子公孫所以從其本稱也而於其卒也繫之以氏則所以著其生而賜氏與以父字為氏之非禮也孫氏復黃氏仲炎謂嬰齊為歸父之子其說無據不可從癸丑公㑹晉侯衛侯鄭伯曹伯宋世子成齊國佐邾人同盟于戚集說程子曰十三年曹伯卒于師負芻殺太子自立既三年諸侯與之盟矣方執之稽天討也故書同盟見其既同矣盟高氏閌曰戚之㑹將討曹伯也若欲討之勿與之可也假他事相㑹而與之盟既盟而執之故特書同盟以譏之所吳氏􅊹曰諸侯世子代君會盟伐救皆非世子之宜也汪氏克寬曰三月宋世子成㑹盟六月宋公卒蓋宋公有疾而世子出㑹也晉侯執曹伯歸于京師公作歸之于左傳春㑹于戚討曹成公也執而歸諸京師諸侯將見子臧於王而立之子臧辭曰前志有之曰聖達節次守節下失節為君非吾節也雖不能聖敢失守乎遂逃奔宋胡傳稱侯以執伯討也何以為伯討晉合諸侯伐秦曹宣公卒于師曹人使公子負芻守使公子欣時逆曹伯之喪負芻殺其大子而自立至是晉侯執之又不敢自治而歸于京師使即天刑夫是之謂伯討春秋執諸侯者衆矣未有執得其罪如此者故獨書其爵集說杜氏預曰歸之京師禮也相陸氏淳曰淳聞於師曰二百四十二年諸侯執多矣此獨稱晉侯者以其執既當罪又歸京師得侯伯討罪之義故明書晉侯之爵以表其善也劉氏敞曰左氏云書晉侯執曹伯不及其民也凡君不道於民諸侯討而執之則曰某人執某侯不然則否非也負芻殺太子而篡之國人不義舉欲隨公子欣時而亡此非不道而何且大者天地其次君臣有人殺其君反輕於不道其民乎有忍其君而非不道其民乎夫負芻之惡未見於經也晉侯執之然後可見其罪今以左氏例推之則負芻非不道其民而晉侯妄執之爾豈其然耶又曰穀梁曰以晉侯而斥執曹伯惡晉侯也非也若云晉人執曹伯穀梁又如齊人執袁濤塗而非之乎陳氏傅良曰執未有稱爵者此其稱爵何討有罪也不張氏洽曰春秋爵厲公而執曹伯與其討也然猶掩曹伯之與盟者以為先執曹伯以令諸侯然後盟之乃盡善也觀曹人請君於晉曰若有罪則君列諸㑹矣由一舉措之不當遂開釋姦之門豈小失哉之呂氏大圭曰或疑負芻之殺太子經無明文設有春秋何以不書疑未得其實然嘗以春秋書法考之則他執諸侯皆稱人其稱侯者獨此一事爾安得以為非伯討乎傳之所言與經意同益足以為證矣是家氏鉉翁曰曹宣公卒公子負芻弒嗣子自立至晉厲公合諸侯執負芻歸之京師自入春秋未有執當其罪若此而又歸京師示不敢專春秋與之非貶也李氏廉曰此條張氏最得之其義足以補胡氏之所不及蓋此事與齊桓辭子華正相類彼則列於㑹而後辭之此則列於㑹而後執之皆未為盡善也公至自㑹夏六月宋公固卒左傳夏六月宋共公卒楚子伐鄭左傳楚將北師子囊曰新與晉盟而背之無乃不可乎子反曰敵利則進何盟之有申叔時老矣在申聞之曰子反必不免信以守禮禮以庇身信禮之亡欲免得乎楚子侵鄭及暴隧遂侵衛及首止鄭子罕侵楚取新石欒武子欲報楚韓獻子曰無庸使重其罪民將叛之無民孰戰暴隧鄭地路史曰暴辛公采地一曰暴隧蓋周圻內之邑而是時為鄭所有也新石杜注楚邑當在河南南陽府裕州葉縣境集說趙氏鵬飛曰楚子伐鄭鄭有以招之也前年鄭公子喜無故而伐許許楚之與也鄭昔嘗伐許而楚不問以鄭在楚爾今鄭從晉而伐己之與國楚能不惡鄭乎故楚子伐鄭為許也家氏鉉翁曰晉楚為成期以弭兵甫及三嵗而楚伐鄭首禍也書楚子目其人而貶之非爵也秋八月庚辰葬宋共公共音恭集說劉氏敞曰穀梁曰月卒日葬不葬者也以其葬共姬不可不葬共公也夫人之義不踰君非也若以葬夫人則必葬其君莊二十九年葬紀叔姬而不葬紀侯何哉季氏本曰宋共公卒三月即葬必嗣子幼弱恐有他變而急於襄事也喪禮之苟可知矣宋華元出奔晉宋華元自晉歸于宋宋殺其大夫山宋魚石出奔楚左傳秋八月葬宋共公於是華元為右師魚石為左師蕩澤為司馬華喜為司徒公孫師為司城向為人為大司寇鱗朱為少司寇向􅙮為大宰魚府為少宰蕩澤弱公室殺公子肥華元曰我為右師君臣之訓師所司也今公室卑而不能正吾罪大矣不能治官敢賴寵乎乃出奔晉二華戴族也司城莊族也六官者皆桓族也魚石將止華元魚府曰右師反必討是無桓氏也魚石曰右師苟獲反雖許之討必不敢且多大功國人與之不反懼桓氏之無祀於宋也右師討猶有戍在桓氏雖亡必偏魚石自止華元於河上請討許之乃反使華喜公孫師帥國人攻蕩氏殺子山書曰宋殺其大夫山言背其族也魚石向為人鱗朱向􅙮魚府出舍於睢上華元使止之不可冬十月華元自止之不可乃反魚府曰今不從不得入矣右師視速而言疾有異志焉若不我納今將馳矣登丘而望之則馳騁而從之則决睢澨閉門登陴矣左師二司寇二宰遂出奔楚華元使向戌為左師老佐為司馬樂裔為司寇以靖國人胡傳宋六卿魚氏蕩氏向氏鱗氏皆桓族也華氏戴族也華元為右師魚石為左師蕩氏汰而驕共公卒已葬蕩澤弱公室殺公子肥華元曰我司君臣之訓而不能正罪大矣不能治官敢賴寵乎乃出奔晉魚石將止之魚府曰元反必討是無桓氏也石曰彼多大勳國人所與不反懼桓氏之無祀於宋也遂自止元於河上元歸使國人攻桓氏殺蕩山出魚石國然後定元之出奔晉與歸於宋皆不省文者著其正也書之重辭之復必有美惡焉辭繁而不殺所以與之也以不賴寵而出奔以國人與晉皆許之討而後入正可知矣蘇轍謂使元懷祿顧寵重於出奔則不能討此說是也山不書氏背其族也背其族者伐其本也人而無本人道絶矣葛藟猶能芘其本根况於人而忍伐其本乎集說杜氏預曰蕩氏宋公族還害公室故去族以示罪王氏葆曰華元初欲奔晉至河而復是未至晉者也今以自晉歸宋為文何也蓋其奔也欲求晉討彊臣以張公室今為魚石所止許討蕩氏則與晉討無異故周公為王所復既而復奔晉君子以為自絶於周書出以罪之華元為魚石所止遂反其位春秋善之故書自晉歸于宋以成其志也非劉氏敞曰杜云華元欲挾晉以自重故以外納告也如左氏之說則魚石止華元耳大凡奔者在外而內無形援則有挾大國之勢以重其身求入而已今華元內有魚石之援則不待挾晉以為勢而自入也尚何求而挾晉哉程子曰山去族害公族也蘇氏轍曰華元之奔晉也未至而復其書曰華元出奔晉且書自晉歸于宋何也元將討山而知力之不能故奔奔而國人許之討故歸故其討山也雖其族人莫敢救之者故書曰宋華元出奔晉宋華元自晉師于宋言其出入之正是以能討山也使元懷祿顧寵重於出奔則不能討山矣鄭子産為政豐卷將祭請田弗許卷退而徴役子産奔晉子皮止之歸而逐卷亦猶是也家氏鉉翁曰蕩山殺公子肥弱公室也華元起而討之以其族大不假霸國之援事弗獲濟故自晉而歸山乃即刑春秋去山族與以討亂然不與元以逐桓族以其挾晉力盡去異已不純為國也奔李氏廉曰華元之奔其奔而歸與鄭良霄之奔其而入事若相類然逆順之情不同故歸入之辭亦異鄭良霄之入不再書鄭良霄而宋華元之入再書宋華元所以豫之也又據杜氏以為元本未至晉春秋既書奔晉又書自晉歸者著其亡已出竟反能討罪此春秋之精意也又曰公羊注引春秋說言宋公卒子幼華元以憂國為大夫山所譖出奔晉晉人理其罪宋人反華元而誅山故繁文大之也言歸者明出入無惡魚石與山有親恐見及故奔楚也此說亦近事情故胡氏以為國人與晉皆許之討而後入亥汪氏克寬曰五大夫同奔亦同復入但書魚石華向寧華定宋公弟辰仲他石彄公子地出入悉列名氏蓋魚石首惡舉重而書之餘不足紀陳氏所謂罪其甚焉者是也亥寧定辰他彄地其罪皆同故備録之耳援王氏錫爵曰魚石之自止元於河上也畏其挾晉以討而桓氏皆無祀於宋也其既許元討山而終不免於去也為與山有親而嘗同惡恐見及也但所奔在楚而宋天下要樞正楚所欲爭卒致助魚石入彭城釀成他日之大禍則魚石之罪大矣附録左傳晉三郤害伯宗譖而殺之及欒弗忌伯州犁奔楚韓獻子曰郤氏其不免乎善人天地之紀也而驟絶之不亡何待初伯宗每朝其妻必戒之曰盜憎主人民惡其上子好直言必及於難冬十有一月叔孫僑如㑹晉士燮齊髙無咎宋華元衛孫林父鄭公子鰌邾人㑹吳于鍾離咎其九反鰌音秋此吳㑹之始亦晉以諸侯之大夫為㑹之始離鍾離杜注楚邑淮南縣晉成帝置鍾離郡唐置鍾縣明改為臨淮縣又析臨淮地置鳯陽縣今仍之屬江南鳯陽府左傳十一月㑹吳于鍾離始通吳也胡傳太伯至德是始有吳以族言之則周之伯父也至其後世遂以號舉者以其僭竊稱王爾成襄之間齊晉大國亦皆俯首東向而親吳聖人蓋傷之集說孫氏復曰諸侯大夫不敢致吳子也吳子在鍾離故相與㑹吳于鍾離爾劉氏敞曰公羊曰曷為殊㑹吳外吳也非也一地而再言㑹者明一㑹也吳則其君矣未可以爵通又不可稱人稱人則下從大夫之例故須云㑹吳以成其文也穀梁曰㑹又㑹外之也非也吾於公羊既言之矣程子曰吳益彊大求㑹於諸侯諸侯之衆往而從之故書諸國往與之㑹也時諸侯病楚故與吳親襄十年柤之㑹十四年向之㑹與此同初髙氏閌曰外㑹書卿蓋始於此陳氏傅良曰晉與諸侯之大夫㑹吳也傳曰始通吳也於是大夫自為㑹矣始吕氏大圭曰向也未有吳也自成之七年吳伐郯見於經此年㑹吳于鍾離然所與同㑹者猶曰諸侯之大夫也戚之㑹柤之㑹則諸侯實與為㑹矣馴致黃池之㑹遂與晉爭長而奄然主盟與趙氏鵬飛曰于時吳楚兩熾晉既抗楚則不得不吳以奪楚援此所以合諸侯而㑹于鍾離也然襄五年戚之㑹吳人在焉而不殊㑹何也蓋鍾離柤向皆近吳晉合諸侯往㑹之故曰㑹以㑹戚衛地晉侯合諸侯於戚吳以人來㑹故不殊㑹事殊文異無用多疑而說者以為尊吳故殊㑹與首止文同不知首止之㑹蓋書及以㑹非若㑹以㑹之異也聖人豈以吳比王世子哉說者又曰㑹以㑹外吳也齊之盟盂之㑹未嘗外楚而獨外吳此蓋晉率諸侯往㑹之其義甚顯安用鑿生尊之外之之說也哉晉李氏廉曰吳之見經始於郯之伐盛於州來之入之通吳始於于蒲之欲㑹成於鍾離之往㑹諸王氏樵曰案先儒因再書㑹而生外吳之說其實國之大夫相約集而後㑹吳于鍾離春秋據事直書爾若曰外吳獨不外楚乎㑹楚何以不殊也趙氏謂再㑹亦非只一㑹也許遷于葉葉舒涉反左傳許靈公畏逼於鄭請遷於楚辛丑楚公子申遷許于葉榖梁遷者猶得其國家以往者也其地許復見也集說杜氏預曰許畏鄭南依楚故以自遷為文葉趙氏鵬飛曰許自遷也鄭虐於許許畏鄭遷葉近楚倚楚以抗鄭也許家氏鉉翁曰陳蔡許謂楚可恃卒之陳蔡為楚滅五遷自葉而白羽實楚迫之又遷容城遂為鄭滅陳蔡許自取焉爾白李氏廉曰許以此年遷葉昭九年遷夷十八年遷羽定四年遷容城皆避鄭也又二年而滅於鄭游速矣觀其所主而成敗見許逃而主楚其亦不善擇所從哉季氏本曰自成三年以至九年鄭之伐圍許者凡四於是許遷葉以避鄭許固不能自彊矣然大國無霸而小國不得其所非經世者所憂哉丙簡王十戌一年十有六年晉厲六年齊靈七年衛獻二年蔡景十七年鄭成十年曹成三年陳成二十四年把桓六十二年宋平公成元年秦景二年楚共十六年吳壽夢十一年春王正月雨木冰公羊雨木冰者何雨而木冰也何以書記異也榖梁雨而木冰也志異也傳曰根枝折胡傳雨木冰者雨而木冰也何休曰木者少陽幼君大臣之象冰者凝隂兵之類也冰脅木者君臣將執於兵之徴未幾而有沙隨苕丘之事天人之際休咎之應焉可誣也而欲盡廢五行傳亦過矣集說范氏寧曰鄭嗣曰榖梁傳曰雨木冰者木介甲胄兵之象雨著木成冰程子曰春秋所書災異皆天人響應但人以淺狹之見以為無應其實皆應之然漢儒言災異皆牽合不足信儒者見此因盡廢之也蘇氏轍曰雨木冰五行木不曲直庶證常寒之罰劉歆謂上陽施不下通下隂施不上通故雨而木為之冰唐遜皇帝以為木稼者是也木稼蓋木介爾此記異也王氏葆曰隂陽和則雨雨者融隂陽之和氣以潤澤於草木者也今乃封著於木則隂勝而陽不足甚矣髙氏閌曰雨著木而成冰上溫而下寒也與隕霜不殺菽相反劉向謂木者少陽貴臣卿大夫之象後世雨木冰多應在大臣天人之應或可推也漢儒之學豈無所受但不當每事求合爾朱子曰上溫故雨而不雪下冷故著木而冰附録左傳春楚子自武城使公子成以汝隂之田求成於鄭鄭叛晉子駟從楚子盟於武城夏四月辛未滕子卒左傳夏四月滕文公卒集說髙氏閌曰滕入春秋至今三書卒皆不名汪氏克寬曰在位十年成公原立鄭公子喜帥師侵宋左傳鄭子罕伐宋宋將鉏樂懼敗諸汋陂退舍於夫渠不警鄭人覆之敗諸汋陵獲將鉏樂懼宋恃勝也汋陂杜注宋地府夫渠杜注宋地五汋陵杜注宋地今河南歸德寧陵縣南二十里有汋陵城集說孫氏復曰鄭叛晉故侵宋侵髙氏閌曰鄭至是附楚為楚加兵於宋故書自是諸侯之兵無寧嵗矣附録左傳衛侯伐鄭至於鳴鴈為晉故也鳴鴈杜注在陳留雍丘縣西北後漢志雍丘有鳴鴈亭今白鴈亭在把縣北四十里屬河南開封府六月丙寅朔日有食之晉侯使欒黶來乞師黶於斬反左傳晉侯將伐鄭范文子曰若逞吾願諸侯皆叛晉可以逞若唯鄭叛晉國之憂可立俟也欒武子曰不可以當吾世而失諸侯必伐鄭乃興師欒書將中軍士燮佐之郤錡將上軍荀偃佐之韓厥將下軍郤至佐新軍荀罃居守郤犫如衛遂如齊皆乞師焉欒黶來乞師孟獻子曰有勝矣集說范氏寧曰鄭嗣曰將與鄭楚戰後程子曰時以穆姜叔孫僑如將作難故師出時趙氏鵬飛曰欒黶乞師以伐鄭魯師不及期晉侯憾之故沙隨之㑹不見公甲午晦晉侯及楚子鄭伯戰于鄢陵楚子鄭師敗績鄢音偃鄢鄢陵杜注鄭地今屬潁川郡案鄢陵與鄢一地也妘姓之國為鄭武公所滅初仍其故名後改為鄢陵耳左傳戊寅晉師起鄭人聞有晉師使告於楚姚句耳與往楚子救鄭司馬將中軍令尹將左右尹子辛將右過申子反入見申叔時曰師其何如對曰德刑詳義禮信戰之器也德以施惠刑以正邪詳以事神義以建利禮以順時信以守物民生厚而德正罔利而事節時順而物成上下和睦周旋不逆求無不具各知其極故詩曰立我蒸民莫匪爾極是以神降之福時無災害民生敦厖和同以聽莫不盡力以從上命致死以補其闕此戰之所由克也今楚內棄其民而外絶其好瀆齊盟而食話言奸時以動而疲民以逞民不知信進退罪也人恤所底其誰致死子其勉之吾不復見子矣姚句耳先歸子駟問焉對曰其行速過險而不整速則失志不整喪列志失列喪將何以戰楚懼不可用也五月晉師濟河聞楚師將至范文子欲反曰我僞逃楚可以紓憂夫合諸侯非吾所能也以遺能者我若羣臣輯睦以事君多矣武子曰不可六月晉楚遇於鄢陵范文子不欲戰郤至曰韓之戰惠公不振旅箕之役先軫不反命邲之師荀伯不復從皆晉之恥也子亦見先君之事矣今我辟楚又益恥也文子曰吾先君之亟戰也有故秦狄齊楚皆彊不盡力子孫將弱今三彊服矣敵楚而已惟聖人能內外無患自非聖人外寧必有內憂盍釋楚以為外懼乎甲午晦楚晨壓晉軍而陳軍吏患之范丐趨進曰塞井夷竈陳於軍中而疏行首晉楚惟天所授何患焉文子執戈逐之曰國之存亡天也童子何知焉欒書曰楚師輕窕固壘而待之三日必退退而擊之必獲勝焉郤至曰楚有六間不可失也其二卿相惡王卒以舊鄭陳而不整蠻軍而不陳陳不違晦在陳而囂合而加囂各顧其後莫有鬬心舊不必良以犯天忌我必克之楚子登巢車以望晉軍子重使大宰伯州犂侍於王後王曰騁而左右何也曰召軍吏也皆聚於中軍矣曰合謀也張幕矣曰䖍卜於先君也徹幕矣曰將發命也甚囂且塵上矣曰將塞井夷竈而為行也皆乘矣左右執兵而下矣曰聽誓也戰乎曰未可知也乘而左右皆下矣曰戰禱也伯州犂以公卒告王苖賁皇在晉侯之側亦以王卒告皆曰國士在且厚不可當也苖賁皇言於晉侯曰楚之良在其中軍王族而已請分良以擊其左右而三軍萃於王卒必大敗之公筮之史曰吉其卦遇復曰南國䠞射其元王中厥目國䠞王傷不敗何待公從之有淖於前乃皆左右相違於淖步毅御晉厲公欒針為右彭名御楚共王潘黨為右石首御鄭成公唐苟為右欒范以其族夾公行陷於淖欒書將載晉侯針曰書退國有大任焉得專之且侵官冒也失官慢也離局姦也有三罪焉不可犯也乃掀公以出於淖癸巳潘尫之黨與養由基蹲甲而射之徹七札焉以示王曰君有二臣如此何憂於戰王怒曰大辱國詰朝爾射死藝吕錡夢射月中之退入於泥占之曰姬姓日也異姓月也必楚王也射而中之退入於泥亦必死矣及戰射共王中目王召養由基與之兩矢使射吕錡中項伏韜以一矢復命郤至三遇楚子之卒見楚子必下免胄而趨風楚子使工尹襄問之以弓曰方事之殷也有韎韋之跗注君子也識見不榖而趨無乃傷乎郤至見客免胄承命曰君之外臣至從寡君之戎事以君之靈間䝉甲胄不敢拜命敢告不寧君命之辱為事之故敢肅使者三肅使者而退晉韓厥從鄭伯其御杜溷羅曰速從之其御屢顧不在馬可及也韓厥曰不可以再辱國君乃止郤至從鄭伯其右茀翰胡曰諜輅之余從之乘而俘以下郤至曰傷國君有刑亦止石首曰衛懿公惟不去其旗是以敗於熒乃內旌於韜中唐苟謂石首曰子在君側敗者一大我不如子子以君免我請止乃死楚師薄於險叔山冉謂養由基曰雖君有命為國故子必射乃射再發盡殪叔山冉搏人以投中車折軾晉師乃止囚楚公子茷欒針見子重之旌請曰楚人謂夫旌子重之麾也彼其子重也曰臣之使於楚也子重問晉國之勇臣對曰好以衆整曰又何如臣對曰好以暇今兩國治戎行人不使不可謂整臨事而食言不可謂暇請攝飲焉公許之使行人執榼承飲造於子重曰寡君乏使使針御持矛是以不得犒從者使某攝飲子重曰夫子嘗與吾言於楚必是故也不亦識乎受而飲之免使者而復鼓旦而戰見星未已子反命軍吏察夷傷補卒乘繕甲兵展車馬雞鳴而食唯命是聽晉人患之苖賁皇徇曰搜乘補卒秣馬利兵修陳固列蓐食申禱明日復戰乃逸楚囚王聞之召子反謀榖陽豎獻飲於子反子反醉而不能見王曰天敗楚也夫余不可以待乃宵遁晉入楚軍三日榖范文子立於戎馬之前曰君幼諸臣不佞何以及此君其戒之周書曰唯命不于常有德之謂公羊敗者稱師楚何以不稱師王痍也王痍者何傷乎矢也然則何以不言師敗績末言耳榖梁日事遇晦曰晦四體偏斷曰敗此其敗則目也楚不言師君重於師也胡傳不書師敗績以其君親集矢於目而身傷為重也當是時兩軍相抗未有勝負之形晉之捷也亦幸焉爾幸非持勝之道范文子所以立於軍門有聖人能內外無患盍釋楚以為外懼之戒乎楚師雖敗其勢益張晉遂怠矣卒有欒氏之譖而誅三郤國內大亂聖人備書以見行事之深切著明也集說孫氏覺曰韓之戰實獲晉侯不言晉師之敗君獲則師敗矣鄢陵之戰楚子傷焉不曰楚師敗君傷則師敗也於髙氏閌曰晉將伐鄭鄭告於楚楚子遽引師而來是晉不暇俟諸侯之兵先與之合戰而敗之我既未致伐於彼彼志非來伐於我故直言戰而已家氏鉉翁曰晉自靈成景天下諸侯去而從楚及厲公者乃能率其驕狠惰慢之卿與楚一戰城濮以來所未有也論者乃謂欒書欲戰不如士燮僞逃不然也而厲公志得旋驕以速其死良可惜矣李氏廉曰公羊以晦為晝冥記異也以上文丙寅朔考之則甲午正二十九日榖梁是也濮汪氏克寬曰春秋二百四十二年晉勝楚者惟城鄢陵而已自宋襄泓之敗楚郡衡行列國至城濮而沮其志自荀林父邲之敗楚之陵駕尤甚嬰齊盟蜀諸侯之大夫從之者十有一國至鄢陵而挫其鋒前此未有諸侯助楚以戰者惟鄢陵之役鄭伯佐楚共以敵晉使無吕錡射月之勝則楚將倚鄭為援長驅中原其害可勝言耶所可惜者厲公始無制勝之大計不能堅忍持重從欒書固壘之謀以困楚終乏持勝之實德不能修政於內而徒務求逞於外是以三假王命以伐鄭而鄭終不服聽讒譛之言而刀鋸日弊卒及於難迹其所為去楚䖍無幾耳由是論之鄢陵之戰固不可不勝而厲公無取勝之道所以不遂霸也之王氏樵曰今案楚子敗績不言師君重於師也泓戰宋公傷股不書宋公敗者泓之師亦大崩而鄢陵楚師未大崩也凡君將不言帥師以君重於師也戰陳以師相敵死亡既多舉師為重矣若君將被殺戮獲則既書師敗又書殺獲大棘之戰獲華元雞父之敗胡沈之君滅是也楚殺其大夫公子側左傳楚師還及瑕王使謂子反曰先大夫之覆師徒者君不在子無以為過不榖之罪也子反再拜稽首曰君賜臣死死且不朽臣之卒實奔臣之罪也子重使謂子反曰初隕師徒者而亦聞之矣盍圖之對曰雖微先大夫有之大夫命側側敢不義側亡君師敢忘其死王使止之弗及而卒瑕杜注楚地水經注肥水徑山桑縣故城南又東積而為陂謂之瑕陂又東南徑瑕城南春秋楚師還及瑕即此城也山桑縣在今夀州䝉城縣北屬江南鳯陽府集說髙氏閌曰凡楚師之敗必行兵法於主將而死之春秋之世楚實彊於天下其所以能彊者兵彊也兵所以能彊者將帥之力也將帥之所以力者賞罰行也二百四十二年之間敗績者凡十有六而楚居三焉城濮之敗殺得臣鄢陵之敗殺公子側柏舉之敗囊瓦逃刑而奔鄭至於列國之敗績凡十有三不聞加兵法於一主將者國勢浸弱遂成姑息漢魏而下率皆踵之端可為鑑汪氏克寬曰楚審躬臨戰陳以罷卒致敗而集矢於其目乃歸咎於司馬側而殺之亦異於秦穆之不替孟明者矣傳稱王使止之弗及而死亦猶頵之止得臣曰無死蓋亦僞耳嬰齊身為令尹以將左軍與側相惡使敵國謀臣知其莫有鬬心而委罪於側何耶春秋稱國以殺不去其官著楚君大臣之失也書法與殺得臣同秋公㑹晉侯齊侯衛侯宋華元邾人于沙隨不見公沙隨杜注宋地梁國寧陵縣北有沙隨亭今沙隨城在寧陵縣西六里屬河南歸德府左傳戰之日齊國佐髙無咎至於師衛侯出於衛公出於壞隤宣伯通於穆姜欲去季孟而取其室將行穆姜送公而使逐二子公以晉難告曰請反而聽命姜怒公子偃公子鉏趨過指之曰女不可是皆君也公待於壞隤申宫警備設守而後行是以後使孟獻子守於公宫秋㑹于沙隨謀伐鄭也宣伯使告郤犫曰魯侯待於壞隤以待勝者郤犫將新軍且為公族大夫以主東諸侯取貨於宣伯而訴公於晉侯晉侯不見公榖梁不見公者可以見公也可以見公而不見公譏在諸侯也胡傳臣子之於君父揚其美不揚其惡為尊者諱為親者諱禮也聖人假魯史以示王法其於魯事有君臣之義故君弒則書薨易地則書假滅國則書取出奔則書孫屈己而與彊國之大夫盟則書及叛盟失信而莫適守則沒公而書㑹凡此類雖不沒其實示天下之公必隱避其辭以存臣子之禮然則沙隨之㑹晉不見公是魯侯之大辱深可恥焉者矣曷為直書其事而不諱乎曰春秋伸道不伸邪榮義不榮勢正已而無恤乎人以仁禮存心而不憂橫逆之至者也沙隨之㑹魯有內難師出後期所當恤者晉人聽叔孫僑如之譛怒公而不見曲在晉矣魯侯自反非有背仁棄禮不忠之咎也昔曽子嘗聞大勇於夫子曰自反而縮雖千萬人吾往矣孟子言浩然之氣至大至剛以直養而無害則塞乎天地之間沙隨之不見於公何歉乎直書而不諱者示天下後世使知大勇浩然之氣所以守身應物如此其垂訓之義大矣集說陳氏嶽曰公不及鄢陵之戰且誣於宣伯晉侯不察其實而信其誣是罪不在公故書以彰晉侯之信誣明我公之無罪恤程子曰晉怒公之後期故不見公君子正已而無乎人魯之後期國難故也晉不見為非矣彼曲我直故不足恥也之劉氏絢曰夫子於魯事有可恥者必為之諱君臣禮也若我無失道而橫逆所加則不諱今晉怙彊而不見公我何罪故直書以罪諸侯也李氏廉曰此與昭十三年平丘之盟公不與盟同一書法蓋晉曲魯直故不為諱若曲在魯則諱之黑壤是也此不書公不與㑹者上書公㑹已著魯之志矣故此直見諸侯之罪也汪氏克寬曰聖人嘗言譛訴不行可謂明也已矣晉厲聽叔孫僑如之譛而不見公於沙隨晉昭聽邾莒之訴而不使昭公與盟於平丘自晉人觀之皆曰所以討魯之二也然沙隨之後又執季孫行父而從楚之鄭三伐不服平丘之後執季孫意如以歸魯昭如晉又止之而諸侯之二於晉者自若也蓋以晉之責魯非義故不足以令諸侯也晉厲之不克終而晉昭遂失霸業考諸沙隨平丘之事而見之矣公至自㑹集說石氏介曰公之此行內有僑如之患外不見於霸主故危而致之劉氏敞曰十六年㑹於沙隨不見公公羊曰公不見見大夫執何以致㑹不恥也曷為不恥公幼也非也案公即位至今十有六年矣豈得云幼哉在趙氏鵬飛曰以㑹告也公雖不見而實往㑹曲不已可以成事告也故曰公至自㑹附録左傳曹人請於晉曰自我先君宣公即世國人曰若之何憂猶未弭而又討我寡君以亡曹國社稷之鎮公子是大泯曹也先君無乃有罪乎若有罪則君列諸㑹矣君唯不遺德刑以伯諸侯豈獨遺諸敝邑敢私布之公㑹尹子晉侯齊國佐邾人伐鄭王臣始㑹伐左傳七月公㑹尹武公及諸侯伐鄭將行姜又命公如初公又申守而行諸侯之師次於鄭西我師次於督揚不敢過鄭子叔聲伯使叔孫豹請逆於晉師為食於鄭郊師逆以至聲伯四日不食以待之食使者而後食諸侯遷於制田知武子佐下軍以諸侯之師侵陳至於鳴鹿遂侵蔡未反諸侯遷於潁上戊午鄭子罕宵軍之宋齊衛皆失軍督揚杜注鄭東地案襄十九年諸侯自沂上盟於督揚杜以督揚即祝阿蓋齊之督揚與此不同制田杜注滎陽宛陵縣東有制澤今制城在河南開封府新鄭縣東北鳴鹿杜注陳國武平縣西南有鹿邑今鹿邑縣西南有古鹿邑城屬河南歸德府集說杜氏預曰尹子王卿士子爵奔王氏葆曰春秋於尹氏之卒與立子朝以朝楚皆書氏者著世卿之禍也於盟㑹侵伐稱尹子則指其人而正其爵也髙氏閌曰楚師既敗而鄭猶不服見晉政之斁於人矣晉為曹伯請於天子因假王命以再伐鄭故以尹子主㑹也宋衛以後至不書是役也晉尚以僑如之譖不使公與其事初陳氏傅良曰㑹伐未有書王人者此其書尹子何以王卿士與伐也春秋不以諸侯用王師陽處父之救江王叔桓公不書前年伐秦之役劉子成子猶不書也於是厲公恣矣初以尹子與齊國佐邾人序甚矣厲公之無道也師家氏鉉翁曰桓文大征伐必以王命行之厲公用四方必請王朝公卿與俱而兩年之間三伐鄭尹單奔走轍不及息謂之挾天子以令諸侯可也謂之尊天子而正諸夏則未也單李氏廉曰經書王臣㑹伐者此年尹子十一年尹其冬單子皆伐鄭也定元年劉子則侵楚也皆假天子之威而服人者也征汪氏克寬曰前此未有以王臣與伐者桓文之大伐雖不請命而專行然猶以尊周安夏為心未嘗瀆王臣以臨師旅比於假天子之命而威諸侯者尚為彼善於此也厲公嗣霸以私怨伐秦則挾劉康公成肅公以偕行以攜二而爭鄭則要尹武公單襄公而屢往於是王臣奔走道塗轍不及息而為霸者之用矣春秋於伐秦不書劉成者所以削其請王師而著因行朝王之慢也於伐鄭洊書尹單所以彰其瀆王臣之失也夫苟伐秦書劉成則為朝王請命而伐秦為善矣伐鄭不書尹單則無挾王臣之罪而討二抑楚不為過矣聖人筆削豈不深切著明也哉曹伯歸自京師左傳曹人復請於晉晉侯謂子臧反吾歸而君子臧反曹伯歸子臧盡致其邑與卿而不出公羊執而歸者名曹伯何以不名而不言復歸於曹何易也其易奈何公子喜時在內也公子喜時在內則何以易公子喜時者仁人也內平其國而待之外治諸京師而免之其言自京師何言甚易也舍是無難矣胡傳曹伯不名其位未嘗絶也不絶其位所以纍乎天王也其言自京師王命也言天王之釋有罪也善不䝉賞惡不即刑以堯為君舜為臣雖得天下不能一朝居也負芻殺世子而自立不能因晉之執置諸刑典而使復國則無以為天下之共主矣集說啖氏助曰諸侯在他國則是失地之君故反國則名之今曹伯在京師而王不黜之是不失國故不名也討陸氏淳曰淳聞於師曰曹伯之篡罪莫大焉晉侯而執之其事當矣王不能定其罪失政刑也書曰歸自京師以深譏王也平陳氏嶽曰不曰自京師歸於曹而曰歸自京師若常之歸如書公至自某也不劉氏敞曰此復歸也曷為不言復不與復也曷為與復是殺其君之子者也其言自京師何言王之舍有罪也又曰榖梁曰不言所歸歸之善者也出入不名以為不失其國也非也曹伯之惡學者知之榖梁子不知爾曹伯何善乎又曰歸為善自某歸次之亦非也衛元咺衛侯鄭何善之有乎且自某者明其有奉焉耳本不為善不善設也京程子曰曹伯不名不稱復歸王未嘗絶其位也自師王命也嗣髙氏閌曰不書復不與其復也篡逆之人殺君之子而自立既列於諸侯之㑹又赦於天子之庭是率天下而入於亂耳也趙氏鵬飛曰曹成殺世子而自立是天下之大惡晉侯執之不自正其罪以歸京師尊王室也簡王不能正王法以令天下復歸之曹王室不綱失政刑矣春秋書執諸侯歸京師者二晉文執衛侯歸于京師既而晉自釋之書曰衛侯鄭歸于衛不云歸自京師者非王命也今曹伯歸自京師王命釋之也京李氏廉曰晉文執衛侯歸京師與晉厲執曹伯歸師一也然晉文書人而晉厲得書侯者文公以私怨討衛厲公以公罪討曹也衛侯之歸與曹伯之歸一也然衛不書自京師而曹伯自京師者釋衛主於責晉而釋曹則主於責王室也書法精矣余氏光曰當時周王擁虛器而已生殺豫奪不敢專主觀曹人一則請於晉再則請於晉未聞遣一介如周至晉侯許之子臧反曹伯來歸則操縱之權盡繇於晉特寄囚於京師假周之名而已王靈不振諸侯縱恣世道之衰重可歎哉案負芻篡弒法所宜討而天王不誅此春秋所譏也若余氏光引郭氏說以為操縱由晉於當日情事亦合九月晉人執季孫行父舍之于苕丘舍如字苕音條公作招章遙上饒二反注苕丘杜晉地左傳宣伯使告郤犫曰魯之有季孟猶晉之有欒范也政令於是乎成今其謀曰晉政多門不可從也寧事齊楚有亡而已蔑從晉矣若欲得志於魯請止行父而殺之我斃蔑也而事晉蔑有二矣魯不二小國必睦不然歸必叛矣九月晉人執季文子于苕丘公還待於鄆使子叔聲伯請季孫於晉郤犫曰苟去仲孫蔑而止季孫行父吾與子國親於公室對曰僑如之情子必聞之矣若去蔑與行父是大棄魯國而罪寡君也若猶不棄而惠徼周公之福使寡君得事晉君則夫二人者魯國社稷之臣也若朝亡之魯必夕亡以魯之密邇仇讎亡而為讎治之何及郤犫曰吾為子請邑對曰嬰齊魯之常𨽻也敢介大國以求厚焉承寡君之命以請若得所請吾子之賜多矣又何求范文子謂欒武子曰季孫於魯相二君矣妾不衣帛馬不食粟可不謂忠乎信讒慝而棄忠良若諸侯何子叔嬰齊奉君命無私謀國家不二圖其身不忘其君若虛其請是棄善人也子其圖之乃許魯平赦季孫鄆杜注魯西邑東郡廪丘縣東有鄆城隋開皇十八年改為鄆城縣今屬山東兖州府濟寧州榖梁執者不舍而舍公所也執者致而不致公在也何其執而辭也猶存公也存意公亦存也公存也集說陸氏淳曰公羊曰執未有言舍之者言舍之者何仁之也曰在招丘悕矣案經書舍之於苕丘言不在晋都執據實書耳無他義行孫氏復曰沙隨之㑹晉侯既不見公今又執季孫父舍之于苕丘魯一不出師而晉再辱於魯其惡可知也而劉氏敞曰公羊曰代公執故仁之非也凡國有罪執其正卿禮也又公羊說公時尚幼則罪非公為罪非公為則正卿當執矣此乃行父致恥於公春秋何故反仁之乎理苟不足仁之則舍于招丘都不如公羊之語也程子曰置之于苕丘也李氏廉曰晉執魯卿三此年行父及昭十三年執季孫意如二十三年執叔孫舍也皆稱人者罪晉之私也然就三子論則意如之惡又非二子比也公汪氏克寬曰晉人舍季孫行父于苕丘如秦穆獲晉惠公舍諸靈臺冬十月乙亥叔孫僑如出奔齊左傳冬十月出叔孫僑如而盟之僑如奔齊集說髙氏閌曰季孫得釋將與公皆歸故僑如懼罪而出奔程氏端學曰僑如造釁成公不明之所致也以僑如之惡魯不即誅於不見公之時至再辱國又不能誅而縱之奔魯國無政可知也世卿之禍一至於此後世可以鑒此矣十有二月乙丑季孫行父及晉郤犫盟于扈左傳十二月季孫及郤犫盟于扈歸刺公子偃召叔孫豹於齊而立之集說孫氏覺曰不書釋而書晉大夫與之盟則釋之可知矣髙氏閌曰晉釋行父行父自苕丘與郤犫為此盟也稽趙氏鵬飛曰公及行父之出於今六月矣君臣久於外以僑如之譛而晉責之罪不釋也今僑如之譛既敗不遂而奔故晉釋行父而盟之於扈公至自㑹歸而刺公子偃偃僑如之黨也則公之不見與夫行父之執皆僑如之譛明矣春秋之文簡而明考其原則情狀昭然矣汪氏克寬曰晉不見公而盟季孫晉人下比之端兆於此矣公至自㑹集說髙氏閌曰大夫執則致行父不致者公待行父偕歸焉舉公為重也然公未嘗為㑹而曰至自㑹者有託焉爾夫沙隨之㑹既不見公伐鄭之㑹又不得與而國之宗卿於是見執公傍徨於外以求自明於晉僅能使僑如見逐季孫受盟而公免於難焉方秋而出盡冬而歸始以伐鄭出㑹而不得與乎其事君辱臣執亦國之深恥也及公之歸不可以伐鄭致故託曰至自㑹以見公之不與於伐鄭也張氏洽曰君臣同出以君致也伐鄭不致而致以㑹著公之危不在於伐而在於㑹也李氏廉曰春秋不以本事致者惟此年伐鄭至㑹襄十八年圍齊至伐附録左傳齊聲孟子通僑如使立於髙國之間僑如曰不可以再罪奔衛亦間於卿晉侯使郤至獻楚捷於周與單襄公語驟稱其伐單子語諸大夫曰溫季其亡乎位於七人之下而求掩其上怨之所聚亂之本也多怨而階亂何以在位夏書曰怨豈在明不見是圖將慎其細也今而明之其可乎乙酉刺公子偃集說杜氏預曰偃鉏二公子公庶弟何劉氏敞曰不言刺之何刺有罪也其有罪奈是叔孫僑如之黨諸公者也又曰榖梁以為殺無罪非也且以理觀之先刺後名是得其罪者先名後刺是不得其罪不訊於羣吏不訊於萬民者可知矣尚髙氏閌曰公之將行穆姜指偃與鉏曰皆君也鉏幼則姜之意在偃也公以是歸而刺之然公子買戍衛不卒戍刺之明言其罪此直云刺者言其罪者著其事實以眀非其罪也不言其罪者刺得其罪也不趙氏鵬飛曰公子買戍衛不卒戍刺之非其罪也書其故無以見其非罪故先書戍而後書刺偃之罪於僑如之奔已知其為惡黨故直書刺而罪自顯春秋之法如此偃家氏鉉翁曰季孫之執僑如之奔郤犫之盟公子之刺春秋備書其事為魯國隱憂也季孫之執以魯二故其釋之也欒范私之行父外交有素矣始與襄仲共謀弒君陷叔仲惠伯於死魯亂賊之亞也今自晉歸逞執辱之憾幽君母殺公子魯之政一出季氏矣吳氏􅊹曰象謀殺舜及舜為天子則封之舜豈不知象之謀殺已哉故孟子以為仁人之於弟也不藏怒焉不宿怨焉親愛之而富貴之此舜所以盡為兄之道而為人倫之至也偃雖為穆姜所指然不過脅公使從己爾未見姜真有廢立之謀而偃實有今將之心也今僑如既逐成公當修身齊家以感化其母威權在己則偃雖真有邪謀亦焉所施乃不能制其母而怒其弟竟殺之其視舜之所以處象者為何如也公子者非氏也屬也言先公之子也而可殺乎案先刺後名先儒多從劉氏敞以為得其罪吳氏􅊹獨責成公失親愛之道其義尤正蓋偃雖有罪而身為介弟尚有議親之條乃成公不念鞠子哀忿然殺之豈仁人之用心乎故當兼用二說丁簡王十亥二年十有七年晉厲七年齊靈八年衛獻三年蔡景十八年鄭成十一年曹成四年陳成二十五年把桓六十三年宋平二年秦景三年楚共十七年吳壽夢十二年春衛北宫括帥師侵鄭括公作結左傳十七年春王正月鄭子駟侵晉虛滑衛北宮括救晉侵鄭至於髙氏虛滑杜注晉二邑縣髙氏杜注在陽翟西南今禹州即陽翟也屬河南開封府集說金氏賢曰先儒謂晉命也為他人興師故書侵以譏之非也衛以與國受霸主之命春秋何譏乎又謂鄭背晉猶畏晉之彊豈敢興師自與晉抗乎亦非也鄭之侵晉安知其非受楚之命乎其所以敢興師者必恃楚之衆也觀楚公子成公子寅戌鄭以備晉及公子嬰齊師于首止公子申師于汝上則可見矣夏公㑹尹子單子晉侯齊侯宋公衛侯曹伯邾人伐鄭左傳夏五月鄭大子髠頑侯獳為質於楚楚公子成公子寅戌鄭公㑹尹武公單襄公及諸侯伐鄭自戲童至於曲洧戲童襄九年諸侯盟于戲即比也水經注曰汜水出浮戲之山今汜水縣屬河南開封府曲洧杜注今新汲縣治曲洧城案漢宣帝神爵三年以許縣之汲鄉置新汲縣以河內有汲故稱新汲也金置洧川縣今仍之屬河南開封府集說杜氏預曰單襄公王卿士晉未能服鄭故假天子威周使二卿㑹之髙氏閌曰晉假王命討鄭重以王之二卿士晉主兵先尹單以王命為重也夫晉厲之無道而能數合諸侯力捍彊楚者由假王靈扶義以令天下也也陳氏傅良曰王人未有書二卿者書二卿皆與伐汪氏克寬曰成王少子臻食邑於單至襄公世為王卿士附録左傳晉范文子反自鄢陵使其祝宗祈死曰君驕侈而克敵是天益其疾也難將作矣愛我者唯祝我使我速死無及於難范氏之福也六月戊辰士燮卒六月乙酉同盟于柯陵柯陵杜注鄭西地左傳乙酉同盟于柯陵尋戚之盟也榖梁柯陵之盟謀復伐鄭也集說陸氏淳曰不重言諸侯譏尹單與盟鄭程子曰諸侯同病楚也蘇氏轍曰書同盟叛也齊晉之盛天子之大夫㑹而不盟尊周也柯陵之㑹尹子單子始與諸侯之盟自是習以為常非禮也陳氏傅良曰狄泉之盟諱王子虎於是不諱曷為不諱㑹伐未有書王人者唯厲公特書之㑹盟不足諱焉爾士薛氏季宣曰前此征伐未嘗出王官也未嘗盟卿也去年王官出今年卿士盟三伐鄭而鄭不服無益於事徒以為亂而已約張氏洽曰晉厲公憤鄭之不服而假同盟之禮以束諸侯然不知其無益於鄭之叛而自取盟王官之罪單李氏廉曰王臣與盟而書同者三柯陵尹單雞澤子平丘劉子也諸侯要言以不信加王官失正甚矣春秋不重言諸侯所以見二子之與盟也至於書同則同外楚而已不為尹單劉子而書同也秋公至自㑹左傳楚子重救鄭師于首止諸侯還集說吳氏澄曰方欲聲鄭之罪以致伐而楚救己至諸侯畏楚而還未嘗得致伐也故不以伐致而以㑹致事李氏廉曰此條伐後而盟故以㑹至此即穀梁二偶則以後事致之例也與襄十一年伐鄭㑹蕭魚至㑹定四年侵楚盟皋鼬至㑹書法同而穀梁於此乃曰不至自伐鄭者公不周乎伐鄭也解者曰周信也公遏諸侯為此盟爾意不欲更伐鄭是自違前例為此無據之言矣齊髙無咎出奔莒左傳齊慶克通於聲孟子與婦人䝉衣乘輦而入於閎鮑牽見之以告國武子武子召慶克而謂之慶克久不出而告夫人曰國子謫我夫人怒國子相靈公以㑹髙鮑處守及還將至閉門而索客孟子訴之曰髙鮑將不納君而立公子角國子知之秋七月壬寅刖鮑牽而逐髙無咎無咎奔莒髙弱以盧叛齊人來召鮑國而立之初鮑國去鮑氏而來為施孝叔臣施氏卜宰匡句須吉施氏之宰有百室之邑與匡句須邑使為宰以讓鮑國而致邑焉施孝叔曰子實吉對曰能與忠良吉孰大焉鮑國相施氏忠故齊人取以為鮑氏後仲尼曰鮑莊子之知不如葵葵猶能衛其足集說王氏葆日無咎身為卿佐而不能謀國正君以致疑間至於見逐亦不為無罪矣故書奔無異文勝趙氏鵬飛曰髙國崔鮑皆齊之彊臣也非爭政不而奔則詭謀暴露而出决非善之者故今年髙氏奔而明年國氏誅其故可知矣九月辛丑用郊公羊用者何用者不宜用也九月非所用郊也然則郊曷用郊用正月上辛或曰用然後郊榖梁夏之始可以承春以秋之末承春之始蓋不可矣九月用郊用者不宜用也宫室不設不可以祭衣服不備不可以祭車馬器械不備不可以祭有司一人不備其職不可以祭祭者薦其時也薦其敬也薦其美也非享味也胡傳郊之不時未有甚於此者也故特曰用郊用者不宜用也集說范氏寧曰鄭嗣曰郊春事也僖三十一年夏四月四卜郊不從傳曰四月不時今言可者方明秋末之不可故以是為猶可也用李氏廉曰春秋書用有用幣用牲用田賦用鄫子致夫人皆不宜用之文年趙氏鵬飛曰成公七年蓋嘗卜之而不從乃免十又嘗卜之五卜不從而遂不郊今懼卜而不從則不得郊故不復卜而直用之聖人書曰用郊蓋前乎此未嘗用也至定哀之郊則不復書用吳氏􅊹曰九月乃夏時孟秋建申之月豈郊之時乎不卜日不卜牲而彊用其禮焉故曰用非時之甚不敬之大也見程氏端學曰九月用郊劉氏以用為用人以祭彼邾人執鄫子用之故以凡稱用者皆用人也殊不知邾用鄫子上言執又言鄫子故知其用為用人今但言用郊則與用致夫人大夫宗婦覿用幣用牲用田賦用幣於社何以異哉案劉氏敞以用郊為用人非也昭十年季平子始用人於亳社若此年用人則昭十年不應言始矣邾用鄫子楚用蔡世子皆執獲讎敵以快意於山川成公之時未嘗執獲讎敵之人也豈有殺無罪以祭上帝者哉此理之必不可信者矣胡傳曰六畜不相為用况敢用人乎胡氏寧亦云其意皆以為人不可用而不知成公之用郊實未嘗用人也故為辨之如此晉侯使荀罃來乞師罃乙耕反集說范氏寧曰鄭嗣曰將伐鄭乞薛氏季宣曰伐秦之役公如京師故以郤錡師起事之端伐鄭三出卿士而起之以欒黶荀罃之使明諸侯之不以王命㑹且書王師之重猶役於諸侯也冬公㑹單子晉侯宋公衛侯曹伯齊人邾人伐鄭左傳冬諸侯伐鄭十月庚午圍鄭榖梁言公不背柯陵之盟也集說孫氏復曰鄭與楚比周晉厲三假王命合諸侯以伐之而不能服伯國不振可知也趙氏鵬飛曰晉三伐鄭皆以王師冠之王威豈能攝楚而服鄭哉徒假之以致諸侯之師也然三伐鄭而鄭不歸亦足以見力之不足恃矣而晉厲不能內修德以來之徒極其忿而不置鄭卒不服晉亦以亂身陷不測攘外而不治內吁可戒哉舉李氏廉曰晉自鄢陵以後兵威非不振霸事非不而鄭卒不服者以厲公無服人之德也可姚氏舜牧日晉三假王命伐鄭矣鄭卒不服似無書者春秋屢書於冊辭繁而不殺何也當時楚勢甚張且挾鄭為援睥眤列國若無人焉不有晉厲假王靈以薄伐不知其憑陵列國當何如者此雖伐鄭不服不猶愈縱彼肆行直入而莫之忌耶所恨者晉厲無德以服衆不能迄成攘楚之功爾然春秋但書晉之伐不書楚之救則其意未嘗不與晉也十有一月公至自伐鄭左傳楚公子申救鄭師於汝上十一月諸侯還汝上汝水出汝州魯山縣成十六年楚以汝隂之田求成於鄭國語齊桓公伐楚濟汝踰方城則汝上蓋鄭楚之界也集說杜氏預曰不書圍畏楚救不成圍而還無趙氏鵬飛曰公從伐鄭者三而兩至自㑹蓋功以告廟徒以㑹至也今之伐又何功之有乃至自伐何耶前此二伐非乞師而往則其反也亦不以師行而告今之伐以乞師而㑹則其反也不得不以伐告焉用是知聖人之書至從告廟為得其實汪氏克寬曰王官下臨諸侯景從以却已敗之楚服懷二之鄭宜若振槁然夏伐鄭楚師至而諸侯還冬伐鄭楚師至而諸侯還望風却走何哉蓋厲公既勝鄢陵驕佚放恣黷於用武慢於尊王是以諸侯無同心戮力之誠鄭不畏而楚復肆非列國之力有不足蓋厲公之德有歉爾有嗣霸之資而以無道行之惜哉壬申公孫嬰齊卒于貍脤貍力之反脤市軫反公作軫榖作蜃貍脤杜注闕左傳初聲伯夢涉洹或與己瓊瑰食之泣而為瓊瑰盈其懷從而歌之曰濟洹之水贈我以瓊瑰歸乎歸乎瓊瑰盈吾懷乎懼不敢占也還自鄭壬申至於貍脤而占之曰余恐死故不敢占也今衆繁而從余三年矣無傷也言之之莫而卒洹杜注洹水出汲郡林慮縣今林縣西北林慮山即洹水所出也屬河南彰德府集說趙氏匡曰是月也無壬申書壬申誤也年陸氏淳曰穀梁曰致君而後録臣案春秋編月之書一例以先後書之且言卿卒後言公至皆據實事何傷教意劉氏敞曰公羊曰非此月日也待君命然後卒大夫非也君之許嬰齊為大夫固在前矣君至而後明之爾然則卒嬰齊當在致公之前無疑也若以嬰齊反未至故不得以大夫卒之者嬰齊之卒竟未為大夫則嬰齊終不合卒無為但移卒於致公之後也若以公許之則成大夫矣先公未至卒之何傷乎假令國人未知公命不録其卒公後告之乃追録其卒既追録之固應在致公之前明公之許之為大夫也固在前爾豈不可乎又公孫敖卒於齊彼不待公命何為卒之哉其蘇氏轍曰嬰齊從於伐鄭還而道卒大夫卒不地地在外也案下十二月丁巳朔則壬申非十一月失之矣附録左傳齊侯使崔杼為大夫使慶克佐之帥師圍盧國佐從諸侯圍鄭以難請而歸遂如盧師殺慶克以穀叛齊侯與之盟於徐關而復之十二月盧降使國勝告難於晉待命於清清杜注陽平樂平縣今山東青州府堂邑縣東南有清城十有二月丁巳朔日有食之邾子貜且卒貜俱縛反且子餘反集說汪氏克寬曰定公也在位四十年子牼嗣是為宣公晉殺其大夫郤錡郤犫郤至左傳晉厲公侈多外嬖反自鄢陵欲盡去羣大夫而立其左右胥童以胥克之廢也怨郤氏而嬖於厲公郤錡奪夷陽五田五亦嬖於厲公郤犫與長魚矯爭田執而梏之與其父母妻子同一轅既矯亦嬖於厲公欒書怨郤至以其不從己而敗楚師也欲廢之使楚公子茷告公曰此戰也郤至實召寡君以東師之未至也與軍帥之不具也曰此必敗吾因奉孫周以事君公告欒書書曰其有焉不然豈其死之不恤而受敵使乎君盍嘗使諸周而察之郤至聘於周欒書使孫周見之公使覘之信遂怨郤至厲公田與婦人先殺而飲酒後使大夫殺郤至奉豕寺人孟張奪之郤至射而殺之公曰季子欺余厲公將作難胥童曰必先三郤族大多怨去大族不逼敵多怨有庸公曰然郤氏聞之郤錡欲攻公曰雖死君必危郤至曰人所以立信知勇也信不叛君知不害民勇不作亂失茲三者其誰與我死而多怨將安用之君實有臣而殺之其謂君何我之有罪吾死後矣若殺不辜將失其民欲安得乎待命而已受君之祿是以聚黨有黨而爭命罪孰大焉壬午胥童夷羊五帥甲八百將攻郤氏長魚矯請無用衆公使清沸魋助之抽戈結袵而僞訟者三郤將謀於榭矯以戈殺駒伯苦成叔於其位溫季曰逃威也遂趨矯及諸其車以戈殺之皆尸諸朝胥童以甲劫欒書中行偃於朝矯曰不殺二子憂必及君公曰一朝而尸三卿余不忍益也對曰人將忍君臣聞亂在外為姦在內為軌御姦以德御軌以刑不施而殺不可謂德臣逼而不討不可謂刑德刑不立姦軌並至臣請行遂出奔狄公使辭於二子曰寡人有討於郤氏郤氏既伏其辜矣大夫無辱其復職位皆再拜稽首曰君討有罪而免臣於死君之惠也二臣雖死敢忘君德乃皆歸公使胥童為卿公遊於匠麗氏欒書中行偃遂執公焉召士丐士丐辭召韓厥韓厥辭曰昔吾畜於趙氏孟姬之讒吾能違兵古人有言曰殺老牛莫之敢尸而况君乎二三子不能事君焉用厥也榖梁自禍於是始矣集說孫氏復曰君之卿佐是謂股肱厲公不道一日而殺三卿此自禍之道也誰與處矣故列數之以著其惡厲張氏洽曰郤氏雖多怨既為大夫則君之股肱也公不正其有罪無罪而用嬖幸胥童長魚矯之計一朝殺三卿又劫欒書中行偃能無及乎此春秋所以列書而深罪之也王氏錫爵曰勝則驕驕則淫侈而生亂范文子所謂外寧而內憂也楚人滅舒庸左傳舒庸人以楚師之敗也道吳人圍巢伐駕圍釐虺遂恃吳而不設備楚公子櫜師襲舒庸滅之巢駕釐虺杜注楚四邑今俱在江南廬州府境附録左傳閏月乙卯晦欒書中行偃殺胥童民不與郤氏胥童道君為亂故皆書曰晉殺其大夫戊簡王十子三年十有八年晉厲八年齊靈九年衛獻四年蔡景十九年鄭成十二年曹成五年陳成二十六年把桓六十四年宋平三年秦景四年楚共十八年吳壽夢十三年春王正月晉殺其大夫胥童集說蘇氏轍曰胥童厲公之嬖臣也與厲公謀殺三郤又執欒書中行偃將殺之公不許公使胥童為卿書偃既執厲公乃先殺童童雖道君為亂然書偃自是以弒君故稱國以殺髙氏閌曰宋督殺孔父而弒殤公春秋書及其大夫書偃殺胥童而弒厲公而書晉殺其大夫蓋孔父忠於殤公者也胥童嬖於厲公者也嬖臣道君為不道亡其身以及其君故春秋兩治之以為萬世戒家氏鉉翁曰三郤之死晉厲殺之也胥童之死書偃殺之也春秋一以國殺為文著胥童道君作難而其君由是以殞童亦晉國之罪人也人臣與君俱死於難是之謂死節胥童與厲公先後死春秋繫之國殺為其有當誅之罪也使童大節可録則必用孔父牧息之例繼其君而書死矣庚申晉弒其君州蒲左傳十八年春王正月庚申晉欒書中行偃使程滑弒厲公葬之於翼東門之外以車一乘使荀罃士魴逆周子於京師而立之生十四年矣大夫逆於清原周子曰孤始願不及此雖及此豈非天乎抑人之求君使出命也立而不從將安用君二三子用我今日否亦今日共而從君神之所福也對曰羣臣之願也敢不唯命是聽庚午盟而入館於伯子同氏辛已朝於武宫逐不臣者七人周子有兄而無慧不能辨菽麥故不可立集說朱子曰文定之意蓋以為欒書執國之政而厲公無道如此亦不得坐視為書之計厲公可廢而不可弒也張洽言傳中全不是此意曰文定既以為當如此作傳雖不可明言豈不可微示其意乎今纍數百言而其意絶不可曉是亦拙於傳經者也殺陳氏傅良曰弒不言故弒而言故有自來者矣晉其大夫郤錡郤犫郤至晉殺其大夫胥童晉弒其君州蒲蔡殺其大夫公子駟蔡放其大夫公孫獵盜殺蔡侯申春秋書弒未有詳於此者也剛黃氏仲炎曰晉厲公嗣霸數年之間北挫狄於交西敗秦於麻隧南破楚於鄢陵威名震赫逺過前代而卒以驕侈失德致殺身亂國之禍此可為萬世永戒矣李氏廉曰晉伯在靈成景厲之世其權卑於列國矣楚莊乘晉之衰其事進乎方伯矣然春秋書伯在晉不在楚者存晉國也自文六年盡成十八年凡四十九年為靈成景厲之繼霸李氏曰靈公政墮柄分無抗伯業之志成公力弱事淺無伯諸侯之權景公心勞謀舛無馭天下之略厲公外彊中乾無服人心之道四君雖執夏盟非復文襄之舊矣靈公以少主蒞彊卿上驕下肆楚始爭鄭蓋將嘗試晉政於是有狼淵之師此非細故也而救鄭之役止書晉人衛鄭欲介魯以求通蓋未忘晉德於是為沓棐之㑹此關大勢也而新城之盟晉侯不出扈之盟曰討齊難扈之㑹曰平宋難蓋君臣之大倫人道之不可廢此豈常變也或求賂以免或無功而還方且沉溺晏安厚斂以雕牆輕殺以愎諌欲不亡得乎故曰無抗伯業之志也成公若有其志矣內難甫靖履國未長四年而後始出偏師以侵陳黑壤與扈二㑹僅能再合列國而已黑壤以服鄭扈以服陳亦庶幾改物也然始之不能有為者凡數年外而楚人三嵗三伐鄭晉無攘却之謀內而鄭子家弒君晉無討賊之刑諸侯何所觀焉故曰無主諸侯之權也景公若能收其權矣規模失序徒勤諸侯不能首合與國大修同盟以治即異之黨使楚人得號令於辰陵乃且亟㑹櫕函是孰緩孰急也不能謀少西氏之逆以誅陳之惡使楚得行方伯之事方且修房帷一笑之憾興大師以伐齊是孰重孰輕也不能統一六師搜繕卒乘以一矢遺楚使邲不振旅為列國羞乃伐牆咎如滅赤狄哆然言功是孰害孰利也蟲牢馬陵于蒲晚年三㑹竟莫駕楚故曰無馭天下之略也厲公若有其略矣德薄而多大功慮淺而數得志觀厲公不特純以汰心行之亦假義飾譽者也歸於京師而後正曹負芻之罪請於王官而後進駕鄭之威此類可欺世自掩矣晋之所忌曰楚曰吳曰秦曰狄厲公自交剛敗狄而狄服㑹京師伐秦而秦恐戰鄢陵勝楚而楚弱㑹鍾離通吳則吳成四鄰無釁而諸侯反二是以沙隨辱魯猶未快也而求多季孫柯陵伐鄭猶未已也而再厪單子諸侯無患而蕭牆反危是以三郤之誅成而匠麗之難萌故曰無服人心之道也周汪氏克寬曰晉人立襄公少子捷之孫是為悼公案稱國以弒榖梁以為君惡甚胡傳以為略之諸儒多主其說謂君為一國所共疾則與衆弒之所以分其惡於衆也夫春秋之作將以立臣子之防豈有為亂賊分惡者傷教害義安可訓乎考十二公之編君無道而被弒者多矣以晉論之靈與厲相去不逺而靈則書盾厲則稱國何也蓋穿弒靈公時則有董狐之直筆趙盾遂受惡而不辭今書弒厲公史筆未必如董狐書亦未必受惡其赴告於列國必有所以諉其罪者魯之舊史從其所赴而書之矣春秋不與其諉也故書曰晉弒其君使天下後世考其被弒之實而真凶不得以漏網此聖人之特筆也詳見文十六年宋人弒君下齊殺其大夫國佐左傳齊為慶氏之難故甲申晦齊侯使士華免以戈殺國佐於內宫之朝師逃於夫人之宫書曰齊殺其大夫國佐棄命專殺以榖叛故也使清人殺國勝國弱來奔王湫奔萊慶封為大夫慶佐為司寇既齊侯反國弱使嗣國氏禮也集說蘇氏轍曰佐雖以專殺叛君為罪然其咎發於慶克齊人右慶氏而殺佐故稱國以殺罪纍上也詰許氏翰曰慶克作慝濁亂中閨譛害大臣不誅不使國佐無所發其忠憤起而殺之顧為俱靡而已於是因以為國佐罪以張氏洽曰無咎奔於去年之秋而鮑牽刖齊靈可省母之言是非矣國佐叛而後復之意靈公非不知國佐之直與慶克之內亂於宫聞也卒殺國佐則靈公之知又下魯成數等矣保姦如此因慶克以成慶封黨賊之禍慶封逐而政歸於陳氏皆靈公蔽塞聰明所致也國佐不能見幾而去以邑叛君又仕危亂之朝身死宫闈非不幸矣家氏鉉翁曰齊靈不能防間其母又受母譛戮高國不君甚矣國佐不忍一旦之忿誅慶克據盧以抗君不得謂之非叛矣然其心則為其君正家法可憫也故春秋以纍上書之李氏廉曰此為齊崔慶専國始事也附録左傳二月乙酉朔晉悼公即位於朝始命百官施舍己責逮鰥寡振廢滯匡乏困救災患禁淫慝薄賦斂宥罪戾節器用時用民欲無犯時使魏相士魴魏頡趙武為卿荀家荀㑹欒黶韓無忌為公族大夫使訓卿之子弟共儉孝弟使士渥濁為太傅使修范武子之法右行辛為司空使修士蒍之法辨糾御戎校正屬焉使訓諸御知義荀賔為右司士屬焉使訓勇力之士時使卿無共御立軍尉以攝之祁奚為中軍尉羊舌職佐之魏絳為司馬張老為候奄鐸遏寇為上軍尉籍偃為之司馬使訓卒乘親以聽命程鄭為乘馬御六騶屬焉使訓羣騶知禮凡六官之長皆民譽也舉不失職官不易方爵不踰德師不陵正旅不逼師民無謗言所以復霸也集說朱子曰晉悼公甚次第他才大假高觀當初人去周迎他時只十四嵗他說幾句話便乖便有操有縱才歸晉做得便别當時厲公恁地做得狼當被人攛掇胡亂殺了晉室大假費力及悼公歸來不知如何便被他做得恁地好恰如久雨積隂忽遇天晴光景便别赫然為之一新問勝桓文否曰儘勝但桓文是白地做起來悼公是現成基址公如晉左傳公如晉朝嗣君也夏楚子鄭伯伐宋宋魚石復入于彭城彭城杜注宋邑今彭城縣項羽都此謂之西楚晉立徐州唐宋元沿革不一明初復為徐州今直𨽻江南省左傳夏六月鄭伯侵宋及曹門外遂㑹楚子伐宋取朝郟楚子辛鄭皇辰侵城郜取幽丘同伐彭城納宋魚石向為人鱗朱向􅙮魚府焉以三百乘戍之而還書曰復入凡去其國國逆而立之曰入復其位曰復歸諸侯納之曰歸以惡曰復入宋人患之西鉏吾曰何也若楚人與吾同惡以德於我吾固事之也不敢二矣大國無厭鄙我猶憾不然而收吾憎使贊其政以間吾釁亦吾患也今將崇諸侯之姦而披其地以塞夷庚逞姦而攜服毒諸侯而懼吳晉吾庸多矣非吾憂也且事晉何為晉必恤之朝郟杜注宋地當在夏邑境宋城郜杜注宋地當在徐州蕭縣界幽丘杜注地當在蕭縣界夷庚杜注吳晉往來之要道胡傳此伐宋以納魚石其不曰納宋魚石於彭城何也劉敞曰不與納也諸侯失國諸侯納之正也諸侯世也大夫失位諸侯納之非正也大夫不世也諸侯託於諸侯禮也大夫託於諸侯非禮也其言復入者已絶而復入惡之甚者宋魚石晉欒盈是矣集說胡氏寧曰孫林父宋辰趙鞅荀寅皆據外邑以自保故書叛魚石欒盈將以亂國故書復入陳氏傅良曰奔大夫復不書莊閔以上有書歸若入者矣則皆不書奔者也奔而言歸自衛元咺始咺訟其君者也雖然歸猶言自也若宋魚石晉欒盈是賊而已矣故魚石不言自楚欒盈不言自齊李氏亷曰經書復入者止魚石欒盈大夫無繼世故稱復者已絶之辭稱入者甚逆之辭汪氏克寬曰諸侯失國而諸侯納之春秋皆不書惟書納頓子納北燕伯譏納者之非正也况納大夫乎楚莊納寧行父於陳使之復為大夫春秋猶譏之况納叛臣而據地以逼其君乎書伐書復入而不言納見魚石之復入由楚鄭之伐也以余氏光曰楚與鄭伐宋取彭城置宋亡臣而三百乘戍之塞吳晉交通之路公至自晉晉侯使士丐來聘左傳公至自晉晉范宣子來聘且拜朝也君子謂晉於是乎有禮集說許氏翰曰公朝始至而聘使繼至晉悼之下諸侯肅矣此列國之所以睦而叛國之所以服也秋把伯來朝左傳秋祀桓公來朝勞公且問晉故公以晉君語之把伯於是驟朝於晉而請為昏附録左傳七月宋老佐華喜圍彭城老佐卒焉八月邾子來朝左傳八月邾宣公來朝即位而來見也集說汪氏克寬曰成公末年把邾相繼來朝蓋皆謀從晉耳季氏本曰杞邾相繼來朝蓋晉悼公初立尤厚於魯故二君來修舊好欲依附魯耳築鹿囿左傳築鹿囿書不時也公羊何以書譏何譏爾有囿矣又為也榖梁築不志此其志何也山林藪澤之利所以與民共也虞之非正也集說孫氏覺曰春秋興作皆書雖城池之固門廄之急無遺焉重民力也况耳目之玩一身之娛哉獸許氏翰曰大夫擅國威權日去而公務自娛於鳥草木是謂冥豫在上何可長也高氏閌曰前此未有書築囿者是後昭九年築郎囿定十三年築蛇淵囿人君之示子孫也可不謹哉家氏鉉翁曰成公之世內有彊家肘腋之虞外有晉楚莫適所從而猶築囿從畋無怪公室日卑也李氏亷曰築囿三始於此年成公自朝晉而歸士丐來聘杞邾交朝蓋晉悼之初欲親魯以成伯業故致此耳而成公遽自以為安肆意於苑囿之樂所謂國家閒暇及是時般樂怠傲者也汪氏克寬曰古之聖王臺池園囿與民同樂今築牆為囿為阱於國中以厲民此豈君人者之心乎己丑公薨于路寢左傳己丑公薨于路寢言道也榖梁路寢正也男子不絶婦人之手以齊終也集說李氏廉曰成公在位十有八年自鞍戰以後汶陽未歸之前魯事晉甚謹自汶陽歸齊之後魯之於晉嫌隙已生然方其事晉也東讎於齊南屈於楚丘甲作而兵政變四卿將而公室弱魯已無一事之可取矣及其得罪於晉也㑹葬而見止來聘而及盟沙隨困苕丘執而辱於外僑如讒夫人失德而亂於內魯自隱公以來未有如是者也及其末年幸悼公之興國家無事而又一時諸臣如季文子孟獻子子叔聲伯臧宣叔臧武仲皆賢智之資故能維持協贊以綏內難不然魯蓋不可為矣冬楚人鄭人侵宋左傳冬十一月楚子重救彭城伐宋宋華元如晉告急韓獻子為政曰欲求得人必先勤之成霸安疆自宋始矣晉侯師於台谷以救宋遇楚師於靡角之谷楚師還靡角杜注宋地集說李氏廉曰齊桓霸業始於平宋亂晉文霸業始於釋宋圍悼公霸業又始於彭城之救宋故曰成伯安疆自宋始矣前則楚鄭皆稱爵而書伐今則楚鄭皆稱人而書侵晉之勢漸盛而楚之勢漸衰矣鄭汪氏克寬曰前書楚鄭伐宋魚石入彭城此書楚侵宋而不曰救彭城彭城不可救也比事考之黨叛臣之迹見矣荆楚不足責也鄭何崇姦甚乎故特貶而人之序鄭於楚下以著其惡然晉悼公一出師而楚師還異於楚師至而諸侯亟還者矣晉侯使士魴來乞師魴音房公作彭經書乞師止此左傳晉士魴來乞師季文子問師數於臧武仲對曰伐鄭之役知伯實來下軍之佐也今彘季亦佐下軍如伐鄭可也事大國無失班爵而加敬焉禮也從之集說許氏翰曰悼公復興伯業而乞師以救宋猶遵厲公故事元年而後遂無乞師則召兵而已矣十有二月仲孫蔑㑹晉侯宋公衛侯邾子齊崔杼同盟于虛朾杼直吕反虛起居反朾他丁反虛朾杜注闕或云即宋之虛也左傳十二月孟獻子㑹于虛朾謀救宋也宋人辭諸侯而請師以圍彭城孟獻子請於諸侯而先歸㑹葬集說許氏翰曰襄公不㑹在喪故也悼公所以仁諸侯也高氏閌曰諸侯師至而楚鄭之師已退故宋人辭諸侯而請其師以圍彭城而先為此盟也陳氏傅良曰崔杼嘗奔衛不言歸其再見何齊納以為大夫也向也曰崔氏今曰崔杼則已為大夫也前年逐高無咎今年殺國佐而杼當國已而殺高厚齊無世臣矣於是伐莒伐魯皆杼帥師焉而後弒齊之禍靈公為之也家氏鉉翁曰楚伐宋納魚石復侵宋間晉難也悼㑹師雖未戰足以伐楚人之謀書同盟言諸侯同欲也李氏亷曰晉悼公同盟四虛朾雞澤戲亳城北救汪氏克寬曰諸侯同心懼楚而謀宋故書同盟丁未葬我君成公左傳丁未葬我君成公書順也集說杜氏預曰薨於路寢五月而葬國家安靖世適承嗣故曰書順欽定春秋傳說彚纂卷二十四
