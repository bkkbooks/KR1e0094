body:
  text: 欽定四庫全書欽定春秋傳說彚纂卷三十三乙敬王酉四年二十有六年晉頃十年齊景三十二年衛靈十九年蔡昭三年鄭定十四年曹悼八年陳惠十四年把悼二年宋景公欒元年秦哀二十一年楚平十三年吳僚十一年春王正月葬宋元公左傳二十六年春王正月葬宋元公如先君禮也集說汪氏克寬曰昭公在外而魯於宋晉鄭曹滕薛每遣使㑹葬不廢喪紀則意如之專魯無疑矣附録左傳庚申齊侯取鄆集說杜氏預曰前年已取鄆至是乃發傳者為公處鄆起三月公至自齊居于鄆左傳三月公至自齊處于鄲言魯地也穀梁公次于陽州其曰至自齊何也以齊侯之見公可以言至自齊也居于鄆者公在外也至自齊道義不外公也胡傳居者有其土地人民之稱也昭公失國出奔而稱居于鄆者存一國之防也襄王已出而稱居于鄭敬王未入而稱居于狄泉者存天下之防也天子之於天下率土之濱莫非其臣非諸侯所敢擅也諸侯之於封國四境之內莫非其土非大夫所得專也故諸侯避舍以待巡守而大夫專邑是謂叛君曰居于鄆其為防也至矣集說杜氏預曰入魯境故書至猶在外故書地在啖氏助曰王者至尊雖在外皆曰居諸侯奔境內亦曰居皆言猶居其地但不得其所耳也孫氏復曰居于鄆者公為意如所拒不得入于魯杜氏諤曰春秋書王猛居于皇天王居于狄泉志天王之失政而尹氏專之也書公次于陽州居于鄆公圍成志魯君失政而季氏專之也而孫氏覺曰凡公行反而告廟則書至在外雖不告書至所以存公也王氏葆曰公自野井來居于鄆初未及齊國都而曰至自齊者野井齊地故也黃氏仲炎曰昭公雖出奔而春秋每歲必書公之所處者存君也存君者天地之大義也故范氏唐鑑用春秋之法削武后紀而系之中宗垂教戒於萬世嚴矣書家氏鉉翁曰居于鄆志公之失位也失位矣而猶至書居所以存魯君而抑亂賊也自是每歲書至書居凡五見焉及鄆潰乃書公在乾侯亦所以存公而繫魯國臣民之望也鄆魯境故書居乾侯晉地故書在非吳氏澄曰曰居雖非所宜居然猶吾土也曰在者吾土矣汪氏克寬曰居猶處也處已所有之地也衛侯出居于襄牛楚子入居于申皆在國也此已失國而書居使之如未失國然若曰魯地非意如之所得有也鄭伯突失國而取櫟以居之衛侯衎失國而取夷儀以居之皆書曰入此不言入而言居者內辭也為尊者諱為親者諱使若適他國而返居於是也夏公圍成左傳夏齊侯將納公命無受魯貨申豐從女賈以幣錦二兩縳一如瑱適齊師謂子猶之人髙齮能貨子猶為髙氏後粟五千庾髙齮以錦示子猶子猶欲之齮曰魯人買之百兩一布以道之不通先入幣財子猶受之言於齊侯曰羣臣不盡力於魯君者非不能事君也然據有異焉宋元公為魯君如晉卒於曲棘叔孫昭子求納其君無疾而死不知天之棄魯耶抑魯君有罪於鬼神故及此也君若待於曲棘使羣臣從魯君以卜焉若可師有濟也君而繼之兹無敵矣若其無成君無辱焉齊侯從之使公子鉏帥師從公成大夫公孫朝謂平子曰有都以衛國也請我受師許之請納質弗許曰信女足矣告於齊師曰孟氏魯之敝室也用成已甚弗能忍也請息肩於齊齊師圍成成人伐齊師之飲馬於淄者曰將以厭衆魯成偹而後告曰不勝衆師及齊師戰於炊鼻齊子淵捷從泄聲子射之中楯瓦繇朐汰輈七入者三寸聲子射其馬斬鞅殪改駕人以為鬷戾也而助之子車曰齊人也將擊子車子車射之殪其御曰又之子車曰衆可懼也而不可怒也子囊帶從野泄叱之泄曰軍無私怒報乃私也將亢子又叱之亦叱之冉豎射陳武子中手失弓而罵以告平子曰有君子白晳鬒鬚睂甚口平子曰必子彊也無乃亢諸對曰謂之君子何敢亢之林雍羞為顏鳴右下苑何忌取其耳顔鳴去之苑子之御曰視下顧苑子刜林雍斷其足鑋而乘於他車以歸顔鳴三入齊師呼曰林雍乘淄杜注出泰山梁父縣西北入汶水經注淄水徑梁父縣故城南又西南徑柴縣故城北世謂之柴汶矣漢梁父縣在今泗水縣北四十里炊鼻杜注魯地胡傳成者孟氏之邑也齊侯使公子鈕帥師從公圍成不書齊師者景公怵於邪說為義不終故微之也書公圍成則季氏之不臣昭公之不君齊侯之不能修方伯連帥之職其罪咸具矣集說王氏沿曰齊侯謀納公若齊侯自行當書曰公及齊侯圍成善伐叛也反惑幸臣之說使公子鉏帥師圍成公失國之君無師衆亦當書曰公以齊師圍成今直書曰公圍成惡齊受季氏之賂雖得其師不足以也成劉氏敞曰穀梁云言圍大公也非也公失國而圍師在封內而書之此小之甚者不可謂大陵陳氏傅良曰齊侯將納公以梁邱據一言而止鄟之盟將以合諸侯云爾而徒曰納公三年而無成則是取鄆而已矣故取鄆則書齊圍成則書公李氏廉曰經書公圍成二昭公圍成見季氏之彊也定公圍成見家臣之彊也昭公圍成不能得夫人心也定公圍成不能俟夫聖化也汪氏克寬曰書取鄆圍成以見意如據有魯國之土脅制魯國之民而使昭公不得入國也取鄆不書公而圍成不言取又以見昭公無德於國無恩於民而魯人皆不附也既不書公以齊師圍成又不言公及齊師圍成圍成不服而昭公終居于鄆則齊景救患之功不足乎揚而昭公之主齊失所因矣春秋凡公出在竟內而返不書至定公在國而致圍成者所以著公之危弱攻私邑如敵國也昭公已去國而不致圍成者所以存公如公之在國也然昭公既孫自他國而返必書至惟自圍成而復居于鄆則不言至亦以示內外之别也或謂昭公當討意如不當急近利而圍孟氏之成夫當是時舉魯國之民皆聼順於季氏成近於齊故能圍之猶不能取况能入竟而討季氏耶附録左傳四月單子如晉告急五月戊午劉人敗王城之師於尸氏戊辰王城人劉人戰於施谷劉師敗績尸氏杜注尸在鞏縣西南偃師城漢志偃師有尸鄉殷湯所都今河南河南府偃師縣西南有新蔡鎮即古尸鄉春秋時之尸氏殷西亳也故亦名亳城施谷杜注周地秋公㑹齊侯莒子邾子把伯盟于鄟陵鄟音專又市轉反鄟陵杜注地闕左傳秋盟于鄟陵謀納公也集說孫氏復曰謀納公而不能也止王氏葆曰齊盟諸侯于鄟陵謀納公也而公居于鄆晉㑹諸侯之大夫于扈亦謀納公也而公終薨于乾侯蓋是時諸侯之權不足以制大夫而梁邱據士鞅之姦與季氏表裏故也晉髙氏閌曰公失國而㑹諸侯者求入也求入不主而主齊故齊侯矯為此盟以莒邾把皆魯之與國也也陳氏傅良曰此參盟也參盟自齊桓以來未之有於是再見其再見何晉不復主盟也十六年齊徐郯莒嘗盟于蒲隧十九年宋邾郳嘗盟于蟲則諸侯有不待伯主而自盟㑹久矣於是始書以晉之不復主盟也晉不復主盟而後齊專盟矣家氏鉉翁曰齊景此㑹辭曰以公故魯賄朝入齊師夕旋為善不勇書以譏之志季氏本曰此昭公欲齊納已勸之糾合也而景公不及逺不能納公也合王氏錫爵曰此盟蓋景公假納公之大義以為糾之謀者也使其志能及逺雖北杏之業何難哉而僅僅集諸小國卒不能納公也則爭霸之略止於如此矣公至自㑹居于鄆穀梁公在外也至自㑹道義不外公也集說汪氏克寬曰君行而返返必告廟告廟則書至召誥稱王朝步自周至於豐豐去鎬京二十五里而文武廟在焉故告於文武也昭公之居鄆則非宗廟之所在矣而昭公㑹鄟陵如齊如乾侯無不書至若公之在國春秋大義所以存君而厲臣子忠義之心銷亂賊悖逆之惡也雖然曽子問云君去其國大宰取羣廟之主以從則昭公之去鄆而返亦或告於祖禰矣顧季氏彊悖專有魯國當時史官阿附必不書公至吾聖人以所見之世而特志耳五書至必繫以居于鄆不言居鄆則疑於復國附録左傳七月己巳劉子以王出庚午次于渠王城人焚劉丙子王宿於禇氏丁丑王次於雈谷庚辰王入於胥靡辛巳王次於滑晉知躒趙鞅帥師納王使女寬守闕塞渠杜注周地案即周陽渠也在今河南府洛陽縣劉澄之永初記言城西有陽渠周公制之是也亦謂之九曲瀆禇禇氏杜注洛陽縣南有禇氏亭後漢志洛陽有氏聚今在洛陽縣東雈谷杜注周地案後漢書孫堅進軍大谷距洛九十里其谷連亘至潁陽縣何進設八關大谷其一也周之雈谷施谷皆其支徑耳四胥靡杜注周地本鄭邑今河南府偃師縣東南十里有胥靡城滑杜注周地本鄭邑今河南府偃師縣南緱氏故城即古滑地也闕塞杜注洛陽西南伊闕口也今河南府洛陽縣南闕塞山是九月庚申楚子居卒左傳九月楚平王卒令尹子常欲立子西曰太子壬弱其母非適也王子建實聘之子西長而好善立長則順建善則治王順國治可不務乎子西怒曰是亂國而惡君王也國有外援不可瀆也王有適嗣不可亂也敗親速讎亂嗣不祥我受其名賂吾以天下吾滋不從也楚國何為必殺令尹令尹懼乃立昭王冬十月天王入于成周公羊成周者何東周也其言入何不嫌也穀梁周有入無出也胡傳不曰入于京師者京師衆大之稱不可繫之入也其曰成周云者黍離而次不列於雅降為國風之意而景王寵愛庶孽弱其世適之罪著矣集說杜氏預曰傳言王入在子朝奔後經在前者子朝來告晚李氏瑾曰晉人納王之善無一言及之何也罪晉不臣而哀周之衰也晉為同姓大國爵為侯伯主盟於時不能即逐子朝之黨而安定之二十三年一圍郊而亟還坐視成敗踰五年然後興師納王原情責實不忠不臣之甚者也若以納王之功而善之則藏姦觀釁不忠不臣者勝矣書陳氏傅良曰惠王出入皆不書襄王雖書出猶不入也於是悼王自皇敬王自狄泉則曷為皆書入幸之也王室亂矣入無足諱焉耳吕氏祖謙曰漢河南縣即郟鄏周武王遷九鼎周公營以為都是為王城洛誥所謂卜澗水東瀍水西惟洛食者也漢洛陽縣周公營下都以遷殷頑民是為成周洛誥所謂卜瀍水東亦惟洛食者也平王東遷定都於王城子朝之亂其餘黨多在王城敬王畏之徙都成周對吳氏澄曰王城曰東都蓋以鎬京為周之西都東西而言也成周曰下都蓋以王城為洛之上都下對上而言也時子朝據王城故王入于成周而居汪氏克寬曰成周在王城之東故公羊以為東周萇𢎞謂敬王為東王子朝為西王也然左傳記王入于莊宫杜氏注莊宫在王城則敬王亦入王城矣三十二年書城成周蓋敬王畏子朝黨入王城而弗居遂定都成周也天子之都必稱之曰京師故襄二十四年齊人城郟而叔孫豹賀城書曰如京師三十二年城成周晉人執宋仲幾亦曰執之于京師京師衆大之統㑹天子之居必以衆大言之也悼王入王城敬王入成周皆不稱京師而以地名書之著其衰弱不能自振與列國諸侯無以異耳其不稱京師者見天王之失尊也其稱京師者示天下之當尊也尹氏召伯毛伯以王子朝奔楚左傳冬十月丙申王起師於滑辛丑在郊遂次於尸十一月辛酉晉師克鞏召伯盈逐王子朝王子朝及召氏之族毛伯得尹氏固南宫嚚奉周之典籍以奔楚陰忌奔莒以叛召伯逆王於尸及劉子單子盟遂軍圉澤次於隄上癸酉王入於成周甲戌盟於襄宫晉師使成公般戍周而還十二月癸未王入於莊宫王子朝使告於諸侯曰昔武王克殷成王靖四方康王息民竝建母弟以蕃屏周亦曰吾無專享文武之功且為後人之迷敗傾覆而溺入於難則振救之至於夷王王愆於厥身諸侯莫不竝走其望以祈王身至於厲王王心戾虐萬民弗忍居王於彘諸侯釋位以間王政宣王有志而後效官至於幽王天不弔周王昏不若用愆厥位攜王奸命諸侯替之而建王嗣用遷郟鄏則是兄弟之能用力於王室也至於惠王天不靖周生頽禍心施於叔帶惠襄辟難越去王都則有晉鄭咸黜不端以綏定王家則是兄弟之能率先王之命也在定王六年秦人降妖曰周其有頿王亦克能修其職諸侯服享二世共職王室其有間王位諸侯不圖而受其亂災至於靈王生而有頿王甚神聖無惡於諸侯靈王景王克終其世今王室亂單旗劉狄剝亂天下一行不若謂先王何常之有唯余心所命其誰敢討之帥羣不弔之人以行亂於王室侵欲無厭規求無度貫瀆鬼神慢棄刑法倍奸齊盟傲狠威儀矯誣先王晉為不道是攝是贊思肆其罔極兹不穀震蕩播越竄在荆蠻未有攸底若我一二兄弟甥舅奬順天法無助狡猾以從先王之命毋速天罰赦圖不榖則所願也敢盡布其腹心及先王之經而諸侯實深圖之昔先王之命曰王后無適則擇立長年鈞以德德鈞以卜王不立愛公卿無私古之制也穆后及大子夀早夭即世單劉贊私立少以間先王亦唯伯仲叔季圖之閔馬父聞子朝之辭曰文辭以行禮也子朝干景之命遠晉之大以專其志無禮甚矣文辭何為莒杜注周地洛圉澤杜注周地案圉澤即東圉之澤也今在陽縣東境隄上杜注周地穀梁逺矣非也奔直奔也胡傳取國有五利寵居一焉子朝有寵於景王為之黨者衆矣卒不能立至於奔楚何也是非有出於人之本心者不可以私愛是亦不可以私惡非卒歸於公而止矣景王寵愛子朝將蘄於見是而天下不以為是疏薄子猛將蘄於見非而天下卒不以為非徒設此心兩棄之也庶孽慿寵為羣小之所宗而人心不附適子恃正人心之所向而羣小不從故伯服雖殺而平王亦不能復宗周之盛申生已死而奚齊卓子亦不能勝里克之兵是兩棄之也景王不鑒覆車王猛子朝之際危亦甚矣春秋詳書為後世戒可謂深切著明也哉集說王氏沿曰子朝謀亂王室兵敗而奔其罪不容誅矣然由三子所黨助故書曰尹氏召伯毛伯以王子朝奔楚言子朝之罪由三子所致也先書天王入于成周後書子朝奔楚天子反正然後罪人咸服也者陳氏傅良曰尹氏獨欲立子朝耳兼言召伯毛伯敬王在外四年而後入則二子為之也然則曷為不以二子首惡以二子首惡則有奉子朝者矣皆卿士也單劉奉猛毛召奉朝尹氏之下則從之者而已誅家氏鉉翁曰書法一以字在劉單為褒在尹召為其所輔者正不正而已汪氏克寬曰尹氏世卿秉政擅權書立朝書以朝奔楚著始終黨惡而不悛也奔不言出者篡賊逃竄以逭天討無所出也故比於國滅之君與在境外之臣但書奔爾書曰奔楚則楚受篡賊之罪亦見矣附録左傳齊有彗星齊侯使禳之晏子曰無益也祗取誣焉天道不諂不二其命若之何禳之且天之有彗也以除穢也君無穢德又何禳焉若德之穢禳之何損詩曰惟此文王小心翼翼昭事上帝聿懷多福厥德不回以受方國君無違德方國將至何患於彗詩曰我無所監夏后及商用亂之故民卒流亡若德回亂民將流亡祝史之為無能補也公說乃止齊侯與晏子坐於路寢公歎曰美哉室其誰有此乎晏子曰敢問何謂也公曰我以為在德對曰如君之言其陳氏乎陳氏雖無大德而有施於民豆區釜鍾之數其取之公也薄其施之民也厚公厚斂焉陳氏厚施焉民歸之矣詩曰雖無德與女式歌且舞陳氏之施民歌舞之矣後世若少惰陳氏而不亡則國其國也已公曰善哉是可若何對曰惟禮可以已之在禮家施不及國民不遷農不移工賈不變士不濫官不滔大夫不收公利公曰善哉我不能矣吾今而後知禮之可以為國也對曰禮之可以為國也久矣與天地竝君令臣共父慈子孝兄愛弟敬夫和妻柔姑慈婦聽禮也君令而不違臣共而不二父慈而教子孝而針兄愛而友弟敬而順夫和而義妻柔而正姑慈而從婦聽而婉禮之善物也公曰善哉寡人今而後聞此禮之上也對曰先王所禀於天地以為其民也是以先王上之丙敬王戌五年二十有七年晉頃十一年齊景三十三年衛靈二十年蔡昭四年鄭定十五年曹悼九年陳惠十五年把悼三年宋景二年秦哀二十二年楚昭王軫元年吳僚十二年春公如齊公至自齊居于鄆左傳二十七年春公如齊公至自齊處于鄆言在外也穀梁公在外也集說髙氏閌曰書公至自齊居于鄆者三至自㑹居于鄆者一至自乾侯居于鄆者一書至書居我君故也君播越於外不得其所而魯國臣子之義可絶乎春秋之作明君臣也程氏端學曰為人之君而見逐於其臣求救於人而不見與可為永鑒矣季氏本曰公每如齊求納而不能也故復居鄆夏四月吳弒其君僚左傳吳子欲因楚喪而伐之使公子掩餘公子燭庸帥師圍潛使延州來季子聘於上國遂聘於晉以觀諸侯楚莠尹然工尹麇帥師救潛左司馬沈尹戌帥都君子與王馬之屬以濟師與吳師遇於窮令尹子常以舟師及沙汭而還左尹郤宛工尹夀帥師至於潛吳師不能退吳公子光曰此時也弗可失也告鱄設諸曰上國有言曰不索何獲我王嗣也吾欲求之事若克季子雖至不吾廢也鱄設諸曰王可弒也母老子弱是無若我何光曰我爾身也夏四月光伏甲於堀室而享王王使甲坐於道及其門門階户席皆王親也夾之以鈹羞者獻體改服於門外執羞者坐行而入執鈹者夾承之及體以相授也光僞足疾入於堀室鱄設諸置劍於魚中以進抽劒刺王鈹交於胸遂弒王闔廬以其子為卿季子至曰苟先君無廢祀民人無廢主社稷有奉國家無傾乃吾君也吾誰敢怨哀死事生以待天命非我生亂立者從之先人之道也復命哭墓復位而待吳公子掩餘奔徐公子燭庸奔鍾吾楚師聞吳亂而還潛杜注楚邑在廬江六縣西南今江南廬州府霍山縣東北三十里有灊城窮水經注窮水出安豐縣窮谷即楚與吳師遇處在今江南鳯陽府霍邱縣西沙汭杜注水名水經注汴沙到浚儀而分汴東注沙南流至義城縣西南入於淮謂之沙汭楚東地也義城故城在今懷逺縣東北鍾吾杜注小國漢志東海郡司吾應劭曰左傳執鍾吾子今江南邳州宿遷縣西北有司吾城胡傳此公子光使專諸弒之而稱國何也吳子壽夢有四子長諸樊次餘祭次夷末次季札光諸樊之子也僚夷末之子也諸樊兄弟以次相及必欲致國於季子而季子終不受則國宜之光者也僚烏得為君故稱國以弒而不歸獄於光其稱國以弒者吳大臣之罪也大臣任大事事莫大於置君矣故君存而國本定君終而嗣子立社稷嘉靖人無間言此秉政大臣之任伊召之所以安商周孔明之所以定劉漢也若廢立進退出於羣小閽寺而當國大臣不預焉則將焉用彼相矣此春秋歸罪大臣稱國弒君之意其經世之慮深矣集說胡氏寧曰季子自度其力有不能辦者故歸潔其身而已矣使札有周公之才之美必討弒君之賊正僭竊之名奉周正朔以治吳國為萬邦之憲矣趙氏鵬飛曰吳之亂諸樊為之也夀夢四子長諸樊次餘祭次夷末次札札賢諸樊貴之諸樊卒不授之子而授之弟欲兄弟授受以及於札及夷末卒國將及札而札逃說者皆以吳之亂責季子而吾獨以為非季子之責也諸樊之罪也使季子不逃而受之則亦不免乎亂何則季子之終將授之誰哉君子立法必傳乎無窮法而有窮是亂之本也且兄弟授受而至於札札奄然受之吳人安焉及札之終則必不肯私傳其子不私其子而以循環之法授之則諸樊餘祭夷末莫不皆有子莫不皆欲立當此之時札將何以處之故札之所以不受而逃者非賢也勢也受之而身當其亂孰愈乎逃之而已享其安乎此札之志也豫之者以其能遜而無心非之者以其不受以致亂此皆非也夢汪氏克寬曰光者諸樊之冢嗣夀夢之嫡孫也壽父子諸樊兄弟欲致國季札而不可則當立光以為君吳之大臣不立光而立僚故僚之弒不以光首惡而歸罪於吳國之大臣也史記以僚為夷昧之子而公羊以僚為光之庶兄公羊傳及史記皆以光為諸樊子而世本以光為夷昧之子竊詳事勢史記為是案湛氏若水曰書吳弒其君僚則亂賊之罪可得矣左氏傳弒吳君僚者公子光專諸也而書曰吳者使人考其跡而罪人斯得矣後儒以吳國之亂歸罪於季子之讓國誤矣若夫季子所謂知禮者也方光之弒君公子掩餘燭庸皆出而季子乃曰苟先君無廢祀民人無廢主社稷有奉國家無傾乃吾君也曽是以為知禮乎季子之罪獨在此耳案光弒其君春秋不書光而書吳胡傳歸罪大臣固是一說湛氏若水謂使人考其跡而罪人斯得其說尤勝杜氏預以為罪在僚孔氏穎達劉氏敞以為國人皆欲弒之安可訓耶文十六年宋人弒君下辨之詳矣楚殺其大夫郤宛郤榖作郤宛於阮反又於元反左傳郤宛直而和國人說之鄢將師為右領與費無極比而惡之令尹子常賄而信讒無極譖郤宛焉謂子常曰子惡欲飲子酒又謂子惡令尹欲飲酒於子氏子惡曰我賤人也不足以辱令尹令尹將必來辱為惠已甚吾無以酬之若何無極曰令尹好甲兵子出之吾擇焉取五甲五兵曰置諸門令尹至必觀之而從以酬之及饗日帷諸門左無極謂令尹曰吾幾禍子子惡將為子不利甲在門矣子必無往且此役也吳可以得志子惡取賂焉而還又誤羣帥使退其師曰乘亂不祥吳乘我喪我乘其亂不亦可乎令尹使視郤氏則有甲焉不往召鄢將師而告之將師退遂令攻郤氏且爇之子惡聞之遂自殺也國人弗爇令曰不爇郤氏與之同罪或取一編菅焉或取一秉秆焉國人投之遂弗爇也令尹炮之盡滅郤氏之族黨殺陽令終與其弟完及陀與晉陳及其子弟晉陳之族呼於國曰鄢氏費氏自以為王專禍楚國弱寡王室蒙王與令尹以自利也令尹盡信之矣國將如何令尹病之集說趙氏鵬飛曰傳者以為郤宛之死費無極譖而殺之而經以國殺為文蓋聽無極而致宛之死者君也故以纍上之辭書之矣入家氏鉉翁曰殺無罪之大夫且夷其族楚是以有郢之禍金氏賢曰楚大夫郤宛之死孰殺之乎曰楚令尹子常殺之也子常何為而殺宛耶曰以費無極之讒也子常殺宛何為而稱國以殺曰將罪乎楚君也曷罪乎楚君曰君無道以令其臣致其擅殺大夫而無忌紀綱亡矣是則君之罪也或曰若然則子常逃其罪矣乎曰子常之罪何可逃也若專罪乎子常則責君之義不白而垂戒之意以微獨責乎君則子常之惡亦不待貶絶而自見矣秋晉士鞅宋樂祁犂衛北宫喜曹人邾人滕人㑹于扈左傳秋會于扈令戍周且謀納公也宋衛皆利納公固請之范獻子取貨於季孫謂司城子梁與北宫貞子曰季孫未知其罪而君伐之請囚請亡於是乎不獲君又弗克而自出也夫豈無備而能出君乎季氏之復天救之也休公徒之怒而啓叔孫氏之心不然豈其伐人而說甲執冰以游叔孫氏懼禍之濫而自同於季氏天之道也魯君守齊三年而無成季氏甚得其民淮夷與之有十年之備有齊楚之援有天之贊有民之助有堅守之心有列國之權而弗敢宣也事君如在國故鞅以為難二子皆圖國者也而欲納魯君鞅之願也請從二子以圍魯無成死之二子懼皆辭乃辭小國而以難復胡傳文十五年諸侯盟于扈將為魯討齊齊侯賂之而不克討故在㑹諸侯略而不序今此謀納公亦以賂故不克納而諸國之大夫皆序何也曰利於納公者宋衛之大夫也受賂而不欲納公者獨范鞅主之耳又况戍周之令行乎所以列序而不略也以此見聖人取舍之大情而輕重審矣集說許氏翰曰士鞅謀納公而以貨解無貶辭者以令戍周故也霸圖不競苟有一善則為之匿諸慝而存之此春秋所以扶衰亂也公趙氏孟何曰宋元公為公故如晉卒于曲棘衛靈欲以其公子及其大夫之子質於諸侯以求納公於是樂祁犂北宫喜固請之則宋衛猶知有君臣之義也士鞅取貨於季孫辭二子與曹滕之大夫而以難復鞅與季孫同惡相濟者也以宋衛君大夫拳拳於納公而公卒不獲返國則晉人為之也之家氏鉉翁曰齊景為鄟陵之盟而梁邱據入季氏錦晉頃為扈之㑹而士鞅納季氏之貨二君懵然無知以為魯之休戚無關於己孰知田常韜禍於齊六卿伏憂於晉厝火積薪而不悟使工君能為魯討賊亦足以讋內盜之膽也五季氏本曰扈之㑹令戍周也齊魯不至鄭亦不來年後始城成周可見晉霸威令不嚴而諸侯勤王不急也冬十月曹伯午卒邾快來奔集說髙氏閌曰快亦三叛人之黨魯為逋逃淵藪而受之魯之彊臣逐君而邾快來奔從其類也趙氏鵬飛曰大夫來奔者有矣而邾獨為多聖人亦不以微而略之者蓋邾本魯之附庸自受王命叛服不常魯蓋憾之虐於邾者屢矣及其末年邾嘗訴於晉魯蓋畏晉而不欲顯疾於邾特陰誘其臣而弱之故來奔者四竊邑來者二魯實利之也堂堂大國為逋逃主以登受叛人其為惡著矣家氏鉉翁曰邾庶其畀我來奔季孫宿始納之今邾快又來奔意如復納之宿意如世濟其凶不君其君又誘人之臣使之叛其君而已為之逋逃主罪可勝誅乎快邾之賤者不足録也春秋所以録之而無所遺誅季氏之無君也三十一年黑肱以濫來復受之而不疑推其無忌憚之心亦何所不至春秋詳書之非誅叛人實誅季氏也附録左傳孟懿子陽虎伐鄆鄆人將戰子家子曰天命不慆久矣使君亡者必此衆也天既禍之而自福也不亦難乎猶有鬼神此必敗也嗚呼為無望也夫其死於此乎公使子家子如晉公徒敗於且知戌楚郤宛之難國言未巳進胙者莫不謗令尹沈尹言於子常曰夫左尹與中廄尹莫知其罪而子殺之以興謗讟至於今不已戍也惑之仁者殺人以掩謗猶弗為也今吾子殺人以興謗而弗圖不亦異乎夫無極楚之讒人也民莫不知去朝吳出蔡侯朱喪太子建殺連尹奢屏王之耳目使不聰明不然平王之溫惠共儉有過成莊無不及焉所以不獲諸侯邇無極也今又殺三不辜以興大謗幾及子矣子而不圖將焉用之夫鄢將師矯子之命以滅三族國之良也而不愆位吳新有君疆埸日駭楚國若有大事子其危哉知者除讒以自安也今子愛讒以自危也甚矣其惑也子常曰是瓦之罪敢不良圖九月己未子常殺費無極與鄢將師盡滅其族以說於國謗言乃止且知杜注近鄆地公如齊左傳冬公如齊齊侯請饗之子家子曰朝夕立於其朝又何饗焉其飲酒也乃飲酒使宰獻而請安子仲之子曰重為齊侯夫人曰請使重見子家子乃以君出集說杜氏預曰禮君宴大夫使宰為主獻比公於大夫也齊侯請自安不在坐也子仲魯公子憗十二年謀逐季氏不能而奔齊今行飲酒禮而欲使重見從宴媟也公至自齊居于鄆集說髙氏閌曰公以齊之卑我也遂歸而明年如晉據范獻子之言曰季氏有齊楚之援然則齊固助季氏安肯納公謀趙氏鵬飛曰公朝齊者二㑹齊者一齊無以為公也故明年公如晉求於晉焉汪氏克寬曰孟懿子陽虎伐鄆公徒敗於且知春秋不書皆所以存公也上之於下有征而無戰而况敗乎以君而伐臣己褻其威而况見伐於其臣乎陽虎逆儔不足責仲孫何忌嘗學於聖人者也何乃昧於君臣之大義亦至於此極乎嘻可歎也附録左傳十二月晉籍秦致諸侯之戍於周魯人辭以難丁敬王亥六年二十有八年晉頃十二年齊景三十四年衛靈二十一年蔡昭五年鄭定十六年曹聲公野元年陳惠十六年把悼四年宋景三年秦哀二十三年楚昭二年吳闔廬元年春王三月葬曹悼公公如晉次于乾侯乾侯杜注在魏郡斥邱縣晉竟內邑闞駰曰地多斥鹵故曰斥邱今直隸廣平府成安縣東南有斥邱古城左傳二十八年春公如晉將如乾侯子家子曰有求於人而即其安人孰矜之其造於竟弗聼使請逆於晉晉人曰天禍魯國君淹恤在外君亦不使一個辱在寡人而即安於甥舅其亦使逆君使公復於竟而後逆之穀梁公在外也集說孫氏復曰公前年如齊者再皆不見禮故如晉其言次於乾侯者不得入於晉也公既不見禮於齊又不得入於晉其窮辱若此於胡氏寧曰次者止而有待之意于陽州者不得入齊也于乾侯者不得見於晉也人君失國出奔而詳書其所在見臣子不可頃刻忘君父必欲知其所居之安與否也而進退去就之是非亦自見矣今趙氏鵬飛曰公朝於齊求於君也君且不能納已朝於晉求於臣也臣其能為己謀之乎晉之六卿與三家等也前曰扈之盟既取貨於季氏其忍背賂以傷其類哉故徒次于乾侯不得入也者家氏鉉翁曰自公孫于齊次于陽州繼書居于鄆四在乾侯者五如齊者三如晉者再皆聖人特筆所以存公於魯也又曰書次于乾侯責晉也齊猶致恤患之文晉則拒而不受矣汪氏克寬曰昭公之春秋五書如晉至河乃復傷其見拒於晉不得入而徒返也兩書如晉次于乾侯傷其既不得入於晉亦不得返其國也書至書復外雖見辱而內猶不失其國也書次則止於是而已矣無可復之道矣次於陽州猶曰齊魯之竟也次于乾侯進退維谷則羇旅之人耳書次于乾侯而後書在乾侯是僅存視息而已矣聖人汲汲於存公而屢書不一書然昭公之跡愈逺愈微而愈不能自振亦可見矣公之在齊猶有齊侯取鄆圍成之事晉頃拒而弗受略無兄弟孔懷同惡相恤之義豈不重可歎哉余氏光曰郝氏曰意如之逐昭公狡矣始而公伐之也陽為不敵請盟請亡以緩公而待兩家之援公既出矣請改事君稽首叔孫僞求復公公之奔齊晉也則賂齊晉公之在外也則車馬遺於外齒及君則憂恤之言不絶於口君之左右衣履不絶於餽是以內有逐君之實外結彊大內連羣小昭公昏庸不斷忠言不入卒至大行而不返也悲夫案昭公失國之後其往來居處聖人書之特詳所以繫魯國臣民之望而深誅季氏之無君也胡氏寧以為全罪昭公者誤矣夏四月丙戌鄭伯寧卒寧公作寧六月葬鄭定公集說湛氏若水曰書葬鄭定公志恤鄰之禮也而鄭葬之非禮見矣諸侯五月而葬此其速也附録左傳晉祁勝與塢臧通室祁盈將執之訪於司馬叔游叔游曰鄭書有之惡直醜正實蕃有徒無道立矣子懼不免詩曰民之多辟無自立辟姑已若何盈曰祁氏私有討國何有焉遂執之祁勝賂荀躒荀躒為之言於晉侯晉侯執祁盈祁盈之臣曰鈞將皆死憖使吾君聞勝與臧之死也以為快乃殺之夏六月晉殺祁盈及楊食我食我祁盈之黨也而助亂故殺之遂滅祁氏羊舌氏初叔向欲娶於申公巫臣氏其母欲娶其黨叔向曰吾母多而庶鮮吾懲舅氏矣其母曰子靈之妻殺三夫一君一子而亡一國兩卿矣可無懲乎吾聞之甚美必有甚惡是鄭穆少妃姚子之子子貉之妹也子貂早死無後而天鍾美於是將必以是大有敗也昔有仍氏生女黰黑而甚美光可以鑑名曰𤣥妻樂正后夔取之生伯封實有豕心貪婪無饜忿纇無期謂之封豕有窮后羿滅之夔是以不祀且三代之亡共子之廢皆是物也女何以為哉夫有尤物足以移人苟非德義則必有禍叔向懼不敢取平公强使取之生伯石伯石始生子容之母走謁諸姑曰長叔姒生男姑視之及堂聞其聲而還曰是豺狼之聲也狼子野心非是莫喪羊舌氏矣遂弗視秋七月癸巳滕子寧卒寧公作寧附録左傳秋晉韓宣子卒魏獻子為政分祁氏之田以為七縣分羊舌氏之田以為三縣司馬彌牟為塢大夫賈辛為祁大夫司馬烏為平陵大夫魏戊為梗陽大夫知徐吾為塗水大夫韓固為馬首大夫孟丙為盂大夫樂霄為銅鞮大夫趙朝為平陽大夫僚安為楊氏大夫謂賈辛司馬烏為有力於王室故舉之謂知徐吾趙朝韓固魏戊餘子之不失職能守業者也其四人者皆受縣而後見於魏子以賢舉也魏子謂成鱄吾與戊也縣人其以我為黨乎對曰何也戊之為人也逺不忘君近不逼同居利思義在約思純有守心而無淫行雖與之縣不亦可乎昔武王克商光有天下其兄弟之國者十有五人姬姓之國者四十人皆舉親也夫舉無他惟善所在親疏一也詩曰唯此文王帝度其心莫其德音其德克明克明克類克長克君王此大國克順克比比于文王其德靡悔既受帝祉施于孫子心能制義曰度德正應和曰莫照臨四方曰明勤施無私曰類教誨不倦曰長賞慶刑威曰君慈和遍服曰順擇善而從之曰比經緯天地曰文九德不愆作事無悔故襲天祿子孫賴之主之舉也近文德矣所及其逺哉賈辛將適其縣見於魏子魏子曰辛來昔叔向適鄭鬷蔑惡欲觀叔向從使之收器者而往立於堂下一言而善叔向將飲酒聞之曰必鬷明也下執其手以上曰昔賈大夫惡娶妻而美三年不言不笑御以如皋射雉獲之其妻始笑而言賈大夫曰才之不可以已我不能射女遂不言不笑夫今子少不揚子若無言吾幾失子矣言之不可以已也如是遂如故知今女有力於王室吾是以舉女行乎敬之哉毋墮乃力仲尼聞魏子之舉也以為義曰近不失親逺不失舉可謂義矣又聞其命賈辛也以為忠詩曰永言配命自求多福忠也魏子之舉也義其命也忠其長有後於晉國乎塢杜注太原塢縣今塢城故趾在山西太原府介休縣東北二十七里祁杜注太原祁縣今山西太原府祁縣東南八里有古祁城東平陵案平陵亦曰大陵今山西太原府文水縣北二十里有大陵故城縣梗陽杜注在太原晉陽縣南漢書地理志榆次有梗陽鄉今山西太原府清源縣南有梗陽城案清源本漢榆次縣地隋分置清源縣故梗陽在清源境塗水杜注太原榆次縣漢志榆次有塗水鄉今塗水故城在山西太原府榆次縣西南二十里馬首案元和郡縣志馬首故城在壽陽縣東南十五里今屬山西太原府原盂杜注太原盂縣案兩漢志盂縣丙邑即今太府盂縣也鞮銅鞮杜注上黨銅鞮縣今山西沁州西南有銅故城平陽杜注平陽平陽縣古平陽即堯所都今故城在山西平陽府臨汾縣西南府楊氏杜注平陽楊氏縣今古楊城在山西平陽洪洞縣南二里又名危城村是也冬葬滕悼公集說王氏葆曰諸侯之葬魯往㑹之則書昭公在外季氏使人㑹諸侯之葬以結外援也髙氏閌曰公不在國凡喪葬之禮皆季氏專之也附録左傳冬梗陽人有獄魏戊不能斷以獄上其大宗賂以女樂魏子將受之魏戊謂閻沒女寬曰主以不賄聞於諸侯若受梗陽人賄莫甚焉吾子必諫皆許諾退朝待於庭饋入召之比置三歎既食使坐魏子曰吾聞諸伯叔諺曰唯食忘憂吾子置食之間三歎何也同辭而對曰或賜二小人酒不夕食饋之始至恐其不足是以歎中置自咎曰豈將軍食之而有不足是以再歎及饋之畢願以小人之腹為君子之心屬厭而已獻子辭梗陽人戊敬王子七年二十有九年晉頃十三年齊景三十五年衛靈二十二年蔡昭六年鄭獻公蠆元年曹聲二年陳惠十七年把悼五年宋景四年秦哀二十四年楚昭三年吳闔廬二年春公至自乾侯居于鄆齊侯使髙張來唁公左傳二十九年春公至自乾侯處于鄆齊侯使髙張來唁公稱主君子家子曰齊卑君矣君祗辱焉公如乾侯穀梁唁公不得入於魯也胡傳遣使來唁淺事也亦書於經者罪齊侯不能修方伯連帥之職也諸侯失國託於諸侯禮也諸侯失國諸侯納之正也齊之先世嘗主夏盟而太公受先王五侯九伯之命矣魯為鄰境甥舅之國也昭公朝夕立於其朝曾不能陳師境上討意如逐君之罪而遣使唁公豈得禮乎集說何氏休曰不致以晉者不見容於晉未至晉于孔氏穎達曰二十五年公孫于齊齊侯唁公野井二十六年經書公至自齊公雖不至齊都既入齊竟得與齊侯相見故書公至自齊往年公如晉次于乾侯雖入晉竟不得與晉侯相見故書至自乾侯許氏翰曰荀躒唁公地高張不地以公居鄆猶以魯志也故稱來焉在高氏閌曰唁于野井齊地也唁于乾侯晉地也今鄆乃魯地故但書來而已汪氏克寬曰衛獻公出奔齊臧紇如齊唁衛侯春秋不書以是為不足書也而昭公之孫齊侯野井之唁高張之唁晉荀躒之唁莫不悉書所以譏齊晉之徒能唁公而不能納公也齊侯始親唁猶有恤患之意今使髙張來而弔其至晉不見受且比公於大夫適以恥公而已奚益㦲季氏本曰公如齊齊侯唁公又為公取鄆故言至自齊若夫乾侯晉無一使通焉公不敢入晉則不得以自晉言矣豈非士鞅取貨季孫之故哉案胡傳引式微之二章其取義與朱子不同今刪之附録左傳三月已邜京師殺召伯盈尹氏固及原伯魯之子尹固之復也有婦人遇之周郊尤之曰處則勸人為禍行則數日而反是夫也其過三嵗乎夏五月庚寅王子趙車入於鄻以叛陰不佞敗之鄻杜注周邑公如晉次于乾侯左傳平子每嵗賈馬具從者之衣屨而歸之于乾侯公執歸馬者賣之乃不歸馬衛侯來獻其乘馬曰啓服塹而死公將為之櫝子家子曰從者病矣請以食之乃以幃裹之公賜公衍羔裘使獻龍輔於齊侯遂入羔裘齊侯喜與之陽穀公衍公為之生也其母偕出公衍先生公為之母曰相與偕出請相與偕告三日公為生其母先以告公為為兄公私喜於陽穀而思於魯曰務人為此禍也且後生而為兄其誣也久矣乃黜之而以公衍為大子集說高氏閌曰齊侯比公於大夫故復如晉冀晉見恤也而晉復不受故次于乾侯諸侯出奔狼狽未有如公之甚者陵家氏鉉翁曰野井之唁虛禮也鄆之取成之圍鄟之㑹虛惠也公猶弗悟及使宰獻請安於是悟其卑已至髙張稱主君以致命公始去而之晉其去已後矣諸侯無為魯討賊者桓文之轍跡掃地無餘矣昭汪氏克寬曰竊疑意如剛忍凶悖必無歸馬之事公居鄆四年始適乾侯鄆猶未潰而左氏云每嵗歸馬於乾侯不亦謬乎脫有是事亦鄭莊射王中肩使祭足勞王且問左右之類耳加刃於人而以手撫之此小人之欲掩其惡者也夏四月庚子叔詣卒榖梁季孫意如曰叔倪無病而死此皆無公也是天命也非我罪也集說范氏寧曰言叔倪欲納公無病而死此皆天命使魯無君爾魯公之出非我罪髙氏閌曰叔詣欲納公而卒秋七月附録左傳秋龍見於絳郊魏獻子問於蔡墨曰吾聞之蟲莫知於龍以其不生得也謂之知信乎對曰人實不知非龍實知古者畜龍故國有豢龍氏有御龍氏獻子曰是二氏者吾亦聞之而不知其故是何謂也對曰昔有飂叔安有裔子曰董父實甚好龍能求其耆欲以飲食之龍多歸之乃擾畜龍以服事帝舜帝賜之姓曰董氏曰豢龍封諸鬷川鬷夷氏其後也故帝舜氏世有畜龍及有夏孔甲擾於有帝帝賜之乘龍河漢各二各有雌雄孔甲不能食而未獲豢龍氏有陶唐氏既衰其後有劉纍學擾龍於豢龍氏以事孔甲能飲食之夏后嘉之賜氏曰御龍以更豕韋之後龍一雌死潛醢以食夏后夏后饗之既而使求之懼而遷於魯縣范氏其後也獻子曰今何故無之對曰夫物物有其官官修其方朝夕思之一日失職則死及之失官不食官宿其業其物乃至若泯棄之物乃坻伏鬱湮不育故有五行之官是謂五官實列受氏姓封為上公祀為貴神社稷五祀是尊是奉木正曰句芒火正曰祝融金正曰蓐收水正曰𤣥冥土正曰后土龍水物也水官棄矣故龍不生得不然周易有之在乾之垢曰潛龍勿用其同人曰見龍在田其大有曰飛龍在天其夬曰亢龍有悔其坤曰見羣龍無首吉坤之剝曰龍戰于野若不朝夕見誰能物之獻子曰社稷五祀誰氏之五官也對曰少皞氏有四叔曰重曰該曰修曰熙實能金木及水使重為句芒該為蓐收修及熙為𤣥冥世不失職遂濟窮桑此其三祀也顓頊氏有子曰犂為祝融共工氏有子曰句龍為后土此其二祀也后土為社稷田正也有烈山氏之子曰柱為稷自夏以上祀之周棄亦為稷自商以來祀之飂杜注古國也漢地理志南陽郡湖陽縣故廖國也師古曰廖音力救反左氏傳作飂其音同耳湖陽故城在今河南南陽府唐縣南陽鬷川杜注鬷水上夷皆董姓魯縣杜注今魯也今河南汝寧府魯山縣西北有魯陽故城也窮桑杜注地在魯北即少皞之虛冬十月鄆潰公羊邑不言潰此其言潰何郛之也曷為郛之君存焉爾穀梁潰之為言上下不相得也上下不相得則惡矣亦譏公也昭公出奔民如釋重負胡傳民逃其上曰潰自是昭公削迹於魯尺地一民皆非其有矣公之出奔處鄆四年民不見德亡無愛徵至於潰散豈非昏迷不返自納於罟擭陷穽之中其從者又皆艾殺其民視如土芥其下不堪所以潰歟然則去宗廟社稷出奔而猶不惕然恐懼蘄改過以補前行之愆也自棄甚矣欲不亡得乎噫故書以為後世戒集說杜氏預曰民逃其上曰潰潰散叛公邑范氏寧曰公既出奔不能改德修行居鄆小復使潰散德之不建如此之甚公孔氏穎逹曰公自二十六年以來常居于鄆此時既如晉必留人守鄆鄆人潰散而叛公使公不得更來當是季氏道之使然曰孫氏復曰季孫專魯民不附公故鄆潰髙氏閌昭公居於國而國人逐之出居于鄆而鄆潰見魯民皆叛但知畏季氏也家氏鉉翁曰論者多咎公之失民此季氏凶威所脅非民之罪亦不可盡責魯君汪氏克寬曰或謂意如間公如乾侯誘其民而使之潰夫苟昭公之德澤足以固結其民而民心不忘昭公則雖誘之使叛其民亦必深思逺念而不忍叛去也燕樂毅以秦魏韓趙之師破齊與楚淖齒共殺齊湣王分其地未期年而王孫賈一呼齊人皆袒右攻賊以季氏之彊孰與六國而魯人之思昭公不若齊人之思念其君何也豈非昭公失民既久而若是耶然則鄆民之見誘於季氏實以耳濡目染之有素而非一朝一夕之故也附録左傳冬晉趙鞅荀寅帥師城汝濵遂賦晉國一鼓鐡以鑄刑鼎著范宣子所為刑書焉仲尼曰晉其亡乎失其度矣夫晉國將守唐叔之所受法度以經緯其民卿大夫以序守之民是以能尊其貴貴是以能守其業貴賤不愆所謂度也文公是以作執秩之官為被廬之法以為盟主今棄是度也而為刑鼎民在鼎矣何以尊貴貴何業之守貴賤無序何以為國且夫宣子之刑夷之搜也晉國之亂制也若之何以為法蔡史墨曰范氏中行氏其亡乎中行寅為下卿而干上令擅作刑器以為國法是法姦也又加范氏焉易之亡也其及趙氏趙孟與焉然不得已若德可以免汝濱杜注晉所取陸渾地陸渾今嵩縣汝水在縣南已敬王丑八年三十年晉頃十四年齊景三十六年衛靈二十三年蔡昭七年鄭獻二年曹聲三年陳惠十八年把悼六年宋景五年秦哀二十五年楚昭四年吳闔廬三年春王正月公在乾侯榖梁中國不存公存公故也胡傳公去社稷於今五年每歲首月不書公者在魯四封之內則無適而非其所也至是鄆潰客寄乾侯非其所矣歲首必書公之所在者蓋以存君不與季氏之專國也而罪臣子譏諸侯之意具矣唐武后廢遷中宗革命自立史臣列於本紀欲著其罪而君子以為非春秋之法其言曰天下者唐之天下中宗受之於其父武后安得絶先君之世復繫嗣君之年黜武后之號自以為竊取春秋之義信矣集說范氏寧曰中國猶國中也非陸氏淳曰此時鄆潰公無所容寄在乾侯既其地不得書居故每歲首皆書所在存劉氏敞曰其言公在乾侯何正月以存公也曷為公公在外也公在外久矣曷為於此乎存公居于鄆有魯也在乾侯無魯也公雖無魯魯不可無公向曰居今曰在向也魯而今也晉一民莫得使焉尺地莫得有焉人故曰乾侯之君耳而春秋則以為猶吾君也王氏葆曰天子所在稱居王者以天下為家示無外也故襄王奔鄭曰出居于鄭諸侯在其國稱居寄他國稱在示有尊也故昭公于鄆稱居于乾侯稱在書薛氏季宣曰鄆潰而遂不反故書公在乾侯鄆之居乾侯書在內外之别也臣家氏鉉翁曰書公在乾侯君在他國之境也為人者當人主播遷常如威顔咫尺然後無愧人臣之常分以李氏廉曰經書公在楚一公在乾侯三皆於正月存公也汪氏克寬曰杜氏云釋不朝正於廟夫魯之諸君不朝正者多矣惟襄公之留於楚昭公之次乾侯則書公所在者蓋襄公為季宿擅其國而不得入昭公為意如所逐越在他竟故特志所在以繫臣民之望也或謂春秋不與季氏以頒朔夫昭公自二十五年奔竄在外不朝正頒朔於今五年意如攝祭専國之罪不書而自見矣何獨至是始書哉不嚴氏啓隆曰歲首三書公在乾侯左氏何據而曰先書鄆與乾侯非公且徵過也又曰言不能外內也又曰言不能用其人也夫君臣無獄父子無獄非君父之無過也父子君臣非曲直之地也蔡世子般弒其君固父非無過也而春秋不以責其父齊崔杼弒其君光君非無過也而春秋不以責其君昭之過不若固與光之甚也聖人豈以不責之固與光者而反責之昭哉夏六月庚辰晉侯去疾卒秋八月葬晉頃公頃音傾左傳夏六月晉頃公卒秋八月葬鄭游吉弔且送葬魏獻子使士景伯詰之曰悼公之喪子西弔子蟜送葬今吾子無二何故對曰諸侯所以歸晉君禮也禮也者小事大大字小之謂事大在共其時命字小在恤其所無以敝邑居大國之間共其職貢與其備御不虞之患豈忘共命先王之制諸侯之喪士弔大夫送葬惟嘉好聘享三軍之事於是乎使卿晉之喪事敝邑之間先君有所助執紼矣若其不間雖士大夫有所不獲數矣大國之惠亦慶其加而不討其乏明底其情取備而已以為禮也靈王之喪我先君簡公在楚我先大夫印段實往敝邑之少卿也王吏不討恤所無也今大夫曰女盍從舊舊有豐有省不知所從從其豐則寡君幼弱是以不共從其省則吉在此矣唯大夫圖之晉人不能詰集說杜氏預曰三月而葬速其汪氏克寬曰是時公在晉地不弔其喪不送葬者晉不受公公亦淹恤在外不能備其禮也冬十有二月吳滅徐徐子章羽奔楚羽公作禹左傳吳子使徐人執掩餘使鍾吾人執燭庸二公子奔楚楚子大封而定其徙使監馬尹大心逆吳公子使居飬莠尹然左司馬沈尹戌城之取於城父與胡田以與之將以害吳也子西諫曰吳光新得國而親其民視民如子辛苦同之將用之也若好吳邊疆使柔服焉猶懼其至吾又彊其讎以重怒之無乃不可乎吳周之胄裔也而棄在海濱不與姬通今而始大比於諸華光又甚文將自同於先王不知天將以為虐乎使翦喪吳國而封大異姓乎其抑亦將卒以祚吳乎其終不遠矣我盍姑億吾鬼神而寧吾族姓以待其歸將焉用自播揚焉王弗聽吳子怒冬十二月吳子執鍾吾子遂伐徐防山以水之已卯滅徐徐子章禹斷其髮攜其夫人以逆吳子吳子唁而送之使其邇臣從之遂奔楚楚沈尹戌帥師救徐弗及遂城夷使徐子處之養今河南開封府陳州沈邱縣東有養城是其地也胡田杜注故胡子之地集說啖氏助曰徐子名者初已服吳吳子唁而送之非能自奔也劉氏絢曰齊滅談楚滅弦狄滅溫君奔皆不名者彊暴加於小弱力不能勝而奔義未絶也訴於天子方伯則理可伸而國可復豈可遽絶之哉章羽既已服吳而後奔楚則既降矣安有興復之志哉故名之以著其絶也陳氏傅良曰奔非其罪莫甚於被兵者也雖不死社稷猶不名也其名徐子臣吳而後奔也滅國有三辭以歸臣之之辭也奔猶弗臣之之辭也不言歸若奔死之之辭也是故奔者不必名以歸而後名之徐子不名則疑於談子弦子溫子矣奔趙氏鵬飛曰國滅而不書其君者死社稷也書君而不名者不得己見逼而奔也故國滅而君奔者三皆不名而徐子章羽獨名之傳者以為先服而後奔其或然歟既服而懼其不赦因遂奔楚既服而奔辱社稷也故特名之不然聖人不妄加人以名也家氏鉉翁曰闔廬既弒君怨徐納亡公子而滅之書滅徐貶也章羽以名書為其不能死社稷而偷生耳黃氏正憲曰案徐在江淮間實為勾吳通中國適荆楚之路四年楚虔恐吳爭伯因執徐子以斷其道則徐久服於楚而吳深憾之矣今楚勢既衰吳欲伐楚故先滅徐徐子懼死逃命奔楚附録左傳吳子問於伍員曰初而言伐楚余知其可也而恐其使余往也又惡人之有余之功也今余將自有之矣伐楚何如對曰楚執政衆而乖莫適任患若為三師以肄焉一師至彼必皆出彼出則歸彼歸則出楚必道敝亟肄以罷之多方以誤之既罷而後以三軍繼之必大克之闔廬從之楚於是乎始病庚敬王寅九年三十有一年晉定公午元年齊景三十七年衛靈二十四年蔡昭八年鄭獻三年曹聲四年陳惠十九年把悼七年宋景六年秦哀二十六年楚昭五年吳闔廬四年春王正月公在乾侯集說王氏錫爵曰左氏曰言不能外內也蓋不知春秋存君之義季孫意如會晉荀躒于適歷躒力狄反公穀作櫟後同適歷杜注晉地左傳晉侯將以師納公范獻子曰若召季孫而不來則信不臣矣然後伐之若何晉人召季孫獻子使私焉曰子必來我受其無咎季孫意如會晉荀躒于適歷荀躒曰寡君使躒謂吾子何故出君有君不事周有常刑子其圖之季孫練冠麻衣跣行伏而對曰事君臣之所不得也敢逃刑命君若以臣為有罪請囚於費以待君之察也亦唯君若以先臣之故不絶季氏而賜之死若弗殺弗亡君之惠也死且不朽若得從君而歸則固臣之願也敢有異心胡傳意如出君不事專有魯國晉實主盟不能致討而寵以會禮不亦悖哉或曰季孫事君如在國未知其罪而君伐之是昭公之過也則非矣行貨齊晉使不納公禱於煬宫求君不入及其復也猶欲絶其兆域加之惡諡安在乎事君如在國猶曰未知其罪乎齊晉不能誅亂禁姦悖君臣之義不知其從自及也陸淳以為逐君之臣晉不之罪而反與為會書曰意如㑹晉荀躒于適歷晉侯之為盟主可見矣荀躒之為人臣可知矣此不待貶絶而罪惡見者也得春秋所書之意矣集說陳氏傅良曰季氏出其君而納邾快黑肱卒大夫㑹葬宋滕薛晏然如二君矣君在外雖卿有事不書必有諸侯之事而後書故文公在晉敖會垂隴襄公在晉宿會邢邱皆伯令也昭公在乾侯意如會適歷非諸侯之事也則何以書以晉之釋君而助臣也士鞅㑹諸侯之大夫于扈將以納公取貨于季孫而遂不果荀躒復為此會昭公所以死於外也襄昭之際大夫無君之禍晉人為之也書公如晉次于乾侯公在乾侯意如會晉荀躒于適歷公薨于乾侯皆罪晉之辭也吕氏大圭曰昭公在外託於齊晉而皆不果納未嘗不嘆世道之薄而亂賊之無所懼也夫以臣逐君意如之罪易見也昭公奔訴二國其情亦可矜也苟有人心者孰不憤意如而戚昭公而况齊晉乎齊大國也鄟陵之會四國同之伐季氏以納昭公何不可之有而所以不克納公者則以梁邱據之受賂也晉盟主也扈之㑹六國同之伐季氏以納昭公尤易為力而所以不克納者以士鞅之取貨也自其為義之心不勝其貪利之心而其為義者不勇矣此齊晉納公之謀所以姑為之名而卒之無功歟抑不但其貨利之行而已也觀晉侯欲以師納公而士鞅使人私於意如則其互為唇齒久矣當是時晉之六卿猶意如也晉君猶昭公也其肯并心一意以誅其臣而納其君哉以黃氏仲炎曰晉侯將納公而先使荀躒㑹季孫是納君之事取必於季孫也其可哉齊侯之始謀納公也據取貨以沮之齊宋衛之再謀納公也鞅取貨以沮之今荀躒與季孫為會得無出於此哉是以晉侯雖有納公之志而卒於無成徒以空言慰唁之而已蓋蔽於荀躒而莫之察也自古君德不明為臣下所蔽欺者豈能濟天下之事哉汪氏克寬曰意如之練冠麻衣跣行卑辭伏罪皆外飾詐僞以欺晉晉定既惑於范鞅之巧言而知躒又導之叛逆而不恤魯君有汲汲求哀之請不亦甚乎千載而下說春秋者如何休杜預猶謂意如負捶謝過以示憂戚則其姦譎之志不惟可以欺當年而且可以欺後世也召季氏本曰晉定公初立有嗣霸之志觀成周之城陵之㑹可見矣故納公之意不可謂無也使非士鞅私於季孫則昭公豈至客死哉晉侯墮其計中反使荀躒出㑹何以為盟主夏四月丁巳薛伯穀卒左傳同盟故書集說季氏本曰薛自魯桓公以來服屬於宋魯雖與同盟猶以宋屬待之故獻公之先君不赴喪不書卒獻公三家所私厚也故因公出而告喪魯之弔葬亦備其皆三家之私歟晉侯使荀躒唁公于乾侯左傳夏四月季孫從知伯如乾侯子家子曰君與之歸一慙之不忍而終身慙乎公曰諾衆曰在一言矣君必逐之荀躒以晉侯之命唁公且曰寡君使躒以君命討於意如意如不敢逃死君其入也公曰君惠顧先君之好施及亡人將使歸糞除宗祧以事君則不能見夫人已所能見夫人者有如河荀躒掩耳而走曰寡君其罪之恐敢與知魯國之難臣請復於寡君退而謂季孫君怒未怠子姑歸祭子家子曰君以一乘入於魯師季孫必與君歸公欲從之衆從者脅公不得歸穀梁唁公不得入於魯也曰既為君言之矣不可者意如也集說陸氏淳曰在晉地故不言來討孫氏復曰季孫意如逐君之賊也晉侯不能而戮之既使荀躒㑹意如于適歷又使荀躒唁公于乾侯何所為哉此晉侯之惡亦可見矣劉氏敞曰會于適歷矣則曷為唁公唁公使之入也寓孫氏覺曰晉為大國又世為盟主昭公久留於外於其國不得入而晉侯恬無納公之意乃使其大夫㑹其叛臣而空言唁公書曰晉侯使荀躒來唁公所以見晉侯空言無實隂交其臣而陽唁其君也於吕氏本中曰齊侯唁公於野井晉侯使荀躒唁公乾侯言大國盟主皆不能討亂無助順向正之意也欲家氏鉉翁曰晉頃將納公沮於范鞅晉定始立即納公沮於荀躒權移於下志不獲伸也案左氏適歷之㑹意如願從君而歸此奸邪欺人之言豈本心哉晉使苟躒唁公而勸公以入亦借此以塞責耳及公謂不能見季氏則晉亦不復謀納公矣穀梁以為意如不可必有所據蓋左氏述其言穀梁得其情也今竝存之秋葬薛獻公附録左傳秋吳人侵楚伐夷侵潛六楚沈尹戌帥師救潛吳師還楚師遷潛於南岡而還吳師圍弦左司馬戍右司馬稽帥師救弦及豫章吳師還始用子胥之謀也夷潛六杜注皆楚邑夷在今亳州故潛城六城在今壽州俱屬江南鳯陽府冬黑肱以濫來奔肱公作弓在濫杜注東海昌慮縣今昌慮故城山東兗州府滕縣東南左傳冬邾黑肱以濫來奔賤而書名重地故也穀梁來奔內不言叛也集說杜氏預曰黑肱邾大夫不書邾史闕文解孔氏穎逹曰公羊穀梁亦以濫為邾邑而傳其無邾之意言邾人以濫封此黑肱使為别國故不繫於邾以非天子所封故無子男爵號其言不可通於左氏左氏無傳明是闕文二傳見其文闕而妄為說耳陸氏淳曰左氏云或求名而不得或欲蓋而名彰若艱難其身以險危大人而有名彰徹攻難之士將奔走之趙子曰據例兩下相殺若非大夫即書盜殺者於例既不合書名而被殺者合書事須如此耳左氏若以齊豹是大夫但為求名故書為盜以不與其名者則諸相殺而書其名者皆是與其名乎又據左氏說齊豹乃是怒縶而殺之何得妄有求名之義乎且推之情理凡殺人者皆謂懷怨不勝其怒乃為亂耳又云三叛人欲蓋而名彰言其賤必不書其名夫子矯其心而書耳若如此則三人豫知夫子修春秋賤者不書其名乎為是將地賂魯而屬夫子令不書乎何言欲蓋也皆妄為曲說殊可怪也邾孫氏復曰黑肱以濫來奔濫邑也案襄二十一年庶其以漆閭邱來奔五年莒牟夷以牟婁及防兹來奔邾莒言國此不言國者脫之也劉氏敞曰公羊云通濫也非也以叔術為賢賢既不足又懸隔數十世之外而通叛君之黑弓使當有國誰能信之乎許氏翰曰邾快黑肱相繼來奔季孫當國以類至也氏李氏廉曰此條大例本只與庶其牟夷書法同左得之但左氏於齊豹書盜之說先儒多不取己見衛縶下注獨黑肱不繫邾杜氏謂闕文亦是公羊通濫之事出於傳聞不可信劉敞極非之是矣然穀梁亦曰别乎邾也注曰邾以濫邑封黑肱故别之若國陳氏亦曰不繫之邾濫嘗自别於邾也二家又本公羊蓋未可據汪氏克寬曰二傳皆云邾黑肱而公穀經文不繫邾者闕文耳有習於公穀而不得其義者或以為通濫為國或以為别乎邾皆妄說也齊楚大國且未嘗分其地以封子弟况蕞爾之邾乎苟别於邾而自為國又何為挾地以歸他國乎惟左氏所引經文則曰邾黑肱故啖趙纂例從之亦加邾字今左傳所附之經則杜預别以經文攙入而亦闕邾字如襄十七年齊高厚圍防左傳經文獨闕齊字不可以為非齊之高厚也或者又謂濫乃天子之地而黑肱乃天子之命吏此尤穿鑿之臆說夫王吏守土則得自專其地矣何為奔於諸侯耶豈以二百四十二年之久而天子守土之吏僅一見也二傳又何以皆稱濫為邾地耶湛氏若水曰書黑肱以濫來奔則黑肱叛君之賊季氏納叛之罪皆可見矣故曰直書其事而其得失自見案叔術以弟妻嫂亂人倫也天子誅顔而叔術為顔報讎犯王命也其得罪於春秋大矣公羊乃以為賢不亦謬乎十有二月辛亥朔日有食之左傳十二月辛亥朔日有食之是夜也趙簡子夢童子裸而轉以歌旦占諸史墨曰吾夢如是今而日食何也對曰六年及此月也吳其入郢乎終亦弗克入郢必以庚辰日月在辰尾庚午之日日始有謫火勝金故弗克辛敬王邜十年三十有二年晉定二年齊景三十八年衛靈二十五年蔡昭九年鄭獻四年曹聲五年陳惠二十年把悼八年宋景七年秦哀二十七年楚昭六年吳闔廬五年春王正月公在乾侯取闞集說杜氏預曰公别居乾侯遣人誘闞而取之不用師徒孔氏穎達曰公羊傳曰闞者何邾婁之邑也案傳定元年將葬昭公季孫使役如闞公氏將溝焉則闞是魯公葬地非是邾邑公羊不可通於左氏也又劉氏敞曰三十二年公在乾侯傳曰言不能外內不能用其人也非也公以三十年始居乾侯春秋歲歲書之傳亦歲歲為說說之盡異此明不知春秋本意也設公今歲未死明年正月亦書之耳復欲以何事為解乎取杜氏諤曰志公在外而得邑於季氏雖復得之如諸外也薛氏季宣曰公居乾侯而大夫出㑹城成周晉侯之令固行於魯也公之不入晉之罪也趙氏鵬飛曰三年之間歲首皆書公在乾侯存公所以誅季氏之義也而左氏各為之說鑿矣謂左氏專信國史而不附㑹殆不然也家氏鉉翁曰闞者魯羣公墓之所在公不得奉宗廟祭祀而先君墳墓所在特以取書著賊臣據國拒君之罪屢書特書致討於季氏也今吳氏澄曰昭公為魯國之君四封之內皆其土地公為季氏所逐而書取鄆取闞以見季氏據國公無尺土矣雖得魯邑猶取之於外云爾李氏廉曰謝氏曰公旅寄乾侯久矣非有兵力可以得邑也所以取闞者魯人以闞與公而公取之也書取闞者著其微弱也夏吳伐越左傳夏吳伐越始用師於越也史墨曰不及四十年越其有吳乎越得歲而吳伐之必受其凶集說高氏閌曰前此越與楚子伐吳故始用師於越而國自是亡矣家氏鉉翁曰吳方抗楚越議其後自是吳楚越不相為下而齊晉二大國之患在彊臣矣秋七月冬仲孫何忌㑹晉韓不信齊高張宋仲幾衛世叔申鄭國參曹人莒人薛人把人小邾人城成周世叔穀作大叔莒人下公有邾婁人穀有邾人左傳秋八月王使富辛與石張如晉請城成周天子曰天降禍於周俾我兄弟竝有亂心以為伯父憂我一二親昵甥舅不皇啓處於今十年勤戍五年余一人無日忘之閔閔焉如農夫之望歲懼以待時伯父若肆大惠復二文之業弛周室之憂徼文武之福以固盟主宣昭令名則余一人有大願矣昔成王合諸侯城成周以為東都崇文德焉今我欲徼福假靈於成王修成周之城俾戍人無勤諸侯用寧蝥賊遠屛晉之力也其委諸伯父使伯父實重圖之俾我一人無徵怨於百姓而伯父有榮施先王庸之范獻子謂魏獻子曰與其戍周不如城之天子實云雖有後事晉勿與知可也從王命以紓諸侯晉國無憂是之不務而又焉從事魏獻子曰善使伯音對曰天子有命敢不奉承以奔告於諸侯遲速衰序於是焉在冬十一月晉魏舒韓不信如京師合諸侯之大夫於狄泉尋盟且令城成周魏子南面衛彪傒曰魏子必有大咎干位以令大事非其任也詩曰敬天之怒不敢戲豫敬天之渝不敢馳驅况敢干位以作大事乎己丑士彌牟營成周計丈數揣高卑度厚薄仞溝洫物土方議遠邇量事期計徒庸慮財用書餱糧以令役於諸侯屬役賦丈書以授帥而效諸劉子韓簡子臨之以為成命穀梁天子微諸侯不享覲天子之在者惟祭與號故諸侯之大夫相帥以城之此變之正也胡傳不曰城京師而曰城成周者京師衆大之稱成周地名也與列國等矣集說陸氏淳曰公為旅人何忌不能從季氏逐君何忌不能去罪大矣雖受晉命而城成周亦無補於過也此實覩文知罪不待貶絶而惡見者也之孫氏復曰周自天子言之則曰王城成周諸侯言則曰京師德吕氐本中曰周室雖衰諸侯猶勤之如此先王之澤猶有存者也張氏洽曰此敬王徙都成周自王城而遷故因諸大夫之城而書成周以紀實也家氏鉉翁曰此諸侯之大夫奉王命而城成周霸政之僅克舉者也故吳氏澄曰王城自平王東遷以來天子世世居之其城完固子朝據王城敬王居狄泉晉師納王然後王入于成周子朝棄王城奔楚王畏子朝餘黨尚多故不居王城而留居成周成周乃周公遷殷頑民之地其城圯惡故諸侯以兵戍之至此晉率諸侯城成周之後始徹諸侯之戍鄭氏玉曰敬王避子朝之黨居于成周今城之遂定都焉使成周為京師則不假再城矣李氏廉曰晉自城虎牢以來有城把城成周書法雖若無異然城把之下書士鞅來聘把子來盟則私親之意已著今書城成周於天王入成周之下則雖非盛時之美事終是情出於公亦衰世之幸也胡氏但傷成周之等於列國而未嘗譏列國之城成周蓋與公朝于王所意同得之矣苦薛氏陳氏重貶諸大夫則已甚之責也惟謝氏曰諸侯不勤王事久矣當王室危弱之時列國乃能從王命以安王室善之大者也書城成周善之也可從猶湛氏若水曰書諸侯大夫會城成周著尊王之心未忘也故春秋書以與之季氏本曰敬王以正得國能自樹立侯邦咸集見王澤未竭而晉定猶能率諸侯也黃氏正憲曰成周之城非為城圯以其狹小不足以容衆故擴而大之如狄泉本在城外今則繞入城內矣若為圯而城則完舊而已何待勞諸侯之大夫耶王高氏攀龍曰敬王既入成周即於此定都不復返城以劉單羣族在焉遠惡黨也成周既城後遂謂之京師十有二月己未公薨于乾侯左傳十二月公疾遍賜大夫大夫不受賜子家子雙琥一環一璧輕服受之大夫皆受其賜己未公薨子家子反賜於府人曰吾不敢逆君命也大夫皆反其賜書曰公薨于乾侯言失其所也趙簡子問於史墨曰季氏出其君而民服焉諸侯與之君死於外而莫之或罪也對曰物生有兩有三有五有陪二故天有三辰地有五行體有左右各有妃耦王有公諸侯有卿皆有二也天生季氏以二魯侯為日久矣民之服焉不亦宜乎魯君世從其失季氏世修其勤民忘君矣雖死於外其誰矜之社稷無常奉君臣無常位自古以然故詩曰高岸為谷深谷為陵三后之姓於今為庶主所知也在易卦雷乘乾曰大壯天之道也昔成季友桓之季也文姜之愛子也始震而卜卜人謁之曰生有嘉聞其名曰友為公室輔及生如卜人之言有文在其手曰友遂以名之既而有大功於魯受費以為上卿至於文子武子世增其業不廢舊績魯文公薨而東門遂殺適立庶魯君於是乎失國政在季氏於此君也四公矣民不知君何以得國是以為君愼器與名不可以假人胡傳諸侯失國出奔者衆矣鄭伯突為祭仲所逐而出奔入于櫟而復國衛侯衎為孫寧所逐而出奔入于夷儀而復國昭公在外八年終以客死為天下笑何也祭仲雖專而世權不重於季氏衛侯失國猶夫人也而有推挽之者所以雖失而復得也魯自季友受費以為上卿至於意如專執國命四世矣其臣皆季氏之孚也其民皆季氏之獲也而昭公有一子家駒言不見聽計不行也不能復國宜矣集說杜氏預曰十五日而劉氏本曰昭公八年於外齊晉不能討意如納之者豈非諸侯之政柄各授於大夫黨同伐異皆為季氏之所為其君畏逼而不敢歟然意如攝祭而不敢篡亦由周公忠義之澤流入人心猶未忘耳為家氏鉉翁曰昭公習於周旋揖讓之儀當時有以知禮者而在喪不戚娶同姓不以為嫌浮文雖勝於禮何有哉乃若忿季氏之專欲一創治之固人君當為之分以是為過則不然也春秋始終書法於昭公之討季氏尚有取焉胡氏謂書圍成取鄆為絶昭公於魯吾不知其說李氏廉曰昭公在位二十五年居鄆四年客乾侯三年乃魯國衰惰不振之君也當其初年居喪無戚容而父子之親喪娶妻以同姓而夫婦之倫乖立國立身之本皆無矣季氏之禍雖積習於成襄之世然取鄆而不能正納牟夷而不能郤大雩大雨雹天戒屢見而不知警舍中軍搜于紅軍政盡失而不能收卒之得罪於伯主則五如晉而不得入十三國同盟而不得與昭公果何以保其國哉當是時齊有陳氏晉有六卿與三家蓋聲勢相倚迭為輔車宜昭公之不入也史墨之言其論魯事則善矣毋乃速三晉為諸侯之勢乎衛汪氏克寬曰鄭祭仲逐昭公而昭公奔衛則立突公子泄公子職逐惠公而惠公奔齊則立公子黔牟衛孫林父寧殖逐獻公而獻公奔齊則立公孫剽意如逐昭公魯國八年無君意如非惟不敢如田和三晉之篡立亦不敢别立君者良以魯秉周禮理義之在人者深是以猶懼公議之或見討而未敢肆無忌憚也然史墨之言謂魯民忘君而君臣無常位專於責昭公而略無一語責意如與師曠之所以論衛獻者無異此可以警乎人君而非所以告為臣者也率天下之彊臣而為篡奪之謀者未必非此言啓之且愼器與名此可以責魯之先君而非所以責昭公也或曰桓公薨于齊昭公薨于乾侯皆沒於外或弒或非弒何以辨歟經書公與夫人如齊公薨于齊喪至自齊夫人孫于齊則桓公之弒可知書公在乾侯薨于乾侯喪至自乾侯葬我君昭公則非意如弒公可見矣內弒君則不書葬矣金氏賢曰昭公在位三十有二年父沒而有嘉容母沒而無憂色三易其衰敝惡如舊年已十九猶有童心君子固已知其不終矣乘亂以取人之邑仁已逺矣納叛以受人之地義安在哉喪少姜而取辱於己謝莒訴而受辱於人舍中軍三家盡取其民搜于紅三家大耀其武彊臣自恣君若贅旒嗚呼君不顧親國不忌君其能保乎舍子家之忠良聽羣小之邪僻不思衆合難敵舍民何逞不忍小忿遂失大機以致孫于齊次于陽州唁于野井居于鄆淹恤在外八年之久薨于乾侯良可哀哉欽定春秋傳說彚纂卷三十三
