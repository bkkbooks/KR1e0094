body:
  text: 欽定四庫全書欽定春秋傳説彚纂卷七莊公集説楊氏士勛曰魯世家莊公名同桓公之子以莊王四年即位諡法勝敵克壯曰莊戊莊王子四年元年齊襄五年晉緡十二年衛惠七年黔牟三年蔡哀二年鄭厲八年子儀元年曹莊九年陳莊七年把靖十一年宋莊十七年秦武五年楚武四十八年春王正月公羊公何以不言即位春秋君弒子不言即位君弒則子何以不言即位隱之也孰隱隱子也榖梁繼弒君不言即位正也繼弒君不言即位之為正何也曰先君不以其道終則子不忍即位也集説孔氏穎逹曰此月無事而空書月者莊雖不即君位而亦改元朝廟與民更始史書其事見此月公宜即位而父弒母出不忍即位故空書其文閔僖亦然陸氏淳曰左氏云莊公不言即位文薑出故也且母以得罪去國猶曰不忍父為他國所弒其情若何不舉其大而舉其細非通論也且三月文薑方孫何妨正月即位乎至劉氏敞曰原左傳此意當為文薑與桓俱行未有文故云出爾不知夫人行不以正者至皆不書也且文薑弒君自絶於魯莊公何故不忍即位乎莊公不忍即位文薑感之而還則莊公已忘文薑弒其父矣何以文薑又孫于齊乎弒孫氏覺曰繼弒而不行即位者三莊之繼桓桓見於齊也閔之繼子般般見弒於慶父也僖之繼閔閔見弒於慶父也黃氏澤曰莊公不書即位當據公羊傳為正立李氏廉曰經不書即位者隱莊閔僖四公隱公之特以非出惠公意與莊閔僖之繼弒者不同春秋既托始於隱以明大法矣而莊公之事又與閔僖不同蓋閔僖之立猶念念討賊故慶父叔牙卒不得志於魯今桓公見戕於齊固不及有立子之命况繼承之初創巨痛深異於他公不但當請命於王即位而父讎未討亦當告於天王以國事委冢宰而專以討賊為事今泰然居之曾不以父之無辜見殺於鄰國為念則非人子矣其不書即位僅比於桓公特書者異爾然以人子之心處莊公之時又知莊公之無志非可與隱閔僖比也自王氏樵曰朱子以不書即位者非聖人絀其即位是魯君元不行即位之禮其書即位者是魯君行即位之禮也莊公不行即位之禮公穀以為繼故而有所不忍焉得之矣曰何氏其偉曰莊之不書即位也重復讎也胡何以無所承不請命也夫父死之謂何而急於請命乎且死於外而欲有所承乎榖梁曰先君不以其道終則子不忍即位也夫不忍即位則寢塊枕戈必申人子之痛滅此而後君焉於是以為正而已矣案莊公不書即位左氏以為文薑出陸氏淳劉氏敞駁之是矣胡傳謂內無所承上不請命故春秋絀之亦非也隱莊閔僖外俱書即位豈皆稟命於王若桓若宣若定豈皆內有所受自當從公榖三月夫人孫于齊左傳不稱薑氏絶不為親禮也公羊孫者何孫猶孫也內諱奔謂之孫夫人何以不稱薑氏貶曷為貶與弒公也其與弒公奈何夫人譖公於齊侯公曰同非吾子齊侯之子也齊侯怒與之飲酒於其出焉使公子彭生送之於其乘焉搚幹而殺之榖梁孫之為言猶孫也諱奔也不言氏姓貶之也人之於天也以道受命於人也以言受命不若於道者天絶之也不若於言者人絶之也臣子大受命胡傳夫人文薑也桓公之弒薑氏與焉為魯臣子者義不共戴天矣嗣君夫人所出也恩如之何徇私情則害天下之大義舉王法則傷母子之至恩此國論之難斷者也經書夫人孫于齊而恩義之輕重審矣梁人有繼母殺其父者而其子殺之有司欲當以大逆孔季彥曰文薑與弒魯桓春秋去其薑氏傳謂絶不為親禮也夫絶不為親即凡人爾方諸古義宜以非司寇而擅殺當之不得以逆論也人以為允故通於春秋然後能權於天下之事矣孫者順讓之辭使若不為人子所逐以全恩也哀薑去而弗返文薑即歸於魯例以孫書何也與聞弒桓之罪已極有如去而弗返深絶之也然則恩輕而義重矣河廣之詩其詞何取而聖人録於國風者明宋襄公之重本亦此義也其垂訓逺矣集説杜氏預曰薑氏齊姓於文薑之義宜與齊絶而復奔齊故於其奔去薑氏以示義范氏寧曰桓公夫人文薑也哀薑有殺子之罪輕故僖元年曰夫人氏之喪至自齊去薑以貶之文薑有殺夫之罪重故去薑氏以貶之此輕重之差母啖氏助曰公羊云夫人固在齊矣其言孫于齊念也豈有先在齊而今書孫乎蓋見無夫人至文故云爾不知夫人隨喪而歸矣榖梁曰接練時録母之變始人之也亦言夫人先在齊至練時始録之亦非也齊孫氏復曰內諱奔公夫人皆曰孫此年夫人孫于閔二年夫人薑氏孫于邾昭二十五年公孫于齊是也子劉氏敞曰夫人與於弒者不可以入宗廟又曰母至親而不得不絶者義也春秋為人之不明於義而私其親有不忍也故示之以絶之之文胡氏寧曰絶於外則去姓絶於內則去氏內外俱絶則姓氏皆去曰夫人孫于齊則知其為文薑矣若曰薑氏安知其非姪娣乎君張氏洽曰文薑之罪上通乎天為魯臣子者原先見弒之由固難以嗣君夫人所出而以恩掩義故斷以大義而去薑氏以絶之所以尊社稷而重本也吳氏􅊹曰魯人以桓公之弒實由夫人衆怒羣誚夫人內慙不安故出奔齊臣李氏廉曰左注以為文薑宜與齊絶公榖以為魯子宜絶文薑二説不同然考之左氏本文絶不為親安知非謂魯之臣子當絶文薑而不以為親乎但其文意不明致杜氏誤釋爾故胡氏引孔季彥之言而左氏之傳始明要之此條公榖皆通而榖梁尤精汪氏克寬曰文薑與弒桓公哀薑與弒二君皆罪大惡極不可復居魯國故皆書孫雖不曰奔使若知愧恥而去然亦可見其無所容則其絶之至矣哀薑去而不返齊人討而殺之得討賊之義矣文薑復歸於魯而或會或享如齊如莒一書再書而又再書春秋非與其歸魯也所以深惡魯之臣子無憤疾之心而不能仗大義以誅之也案文薑之罪莫大乎與聞乎弒故尤於出奔時貶之李氏廉所謂一貶而罪惡自見也故二年如齊復書薑氏夏單伯逆王姬單音善後同逆左作送公羊單伯者何吾大夫之命乎天子者世何以不稱使天子召而使之也逆之者何使我主之也曷為使我主之天子嫁女於諸侯必使諸侯同姓者主之諸侯嫁女於大夫必使大夫同姓者主之榖梁單伯者何吾大夫之命乎天子者也命大夫故不名也其不言如何也其義不可受於京師也其義不可受於京師何也曰躬君弒於齊使之主昏姻與齊為禮其義固不可受也集説何氏休曰不自為主者尊卑不敵行昏姻之禮則傷君臣之義行君臣之禮則廢昏姻之好故必使同姓敵體者主之命范氏寧曰單姓也伯字諸侯歲貢士於天子天子親之使還其國為大夫者不名天子就其國命之者以名氏通也禮尊卑不敵天子嫁女於諸侯必使同姓諸侯主之魯桓親見殺於齊若天子命使為主則非禮大矣春秋為尊者諱故不可受之於京師杜氏預曰王姬不稱字以王為尊且别於內女也之孔氏穎逹曰以姬繫王不稱女字以王為尊故繫於王內女則以字配姓謂之伯姬是也昏之行禮必賔主相敵天子於諸侯諸侯於大夫不親昏者尊卑不敵故也二王之後雖王所賔客示崇先代而已不得即與王敵嫁於二王之後亦使諸侯主之秦漢以來使三公主之呼為公主陸氏淳曰諸國大夫王賜之圻內邑為號令歸國如單伯祭仲是也孫氏復曰天子嫁女於齊魯受命主之故使單伯逆王姬不言如京師者不與公使單伯如京師逆王姬也魯桓見殺於齊天子命莊公與齊主昏非禮也莊公以親讎可辭而莊公不辭非子也故交譏之劉氏敞曰十四年單伯會齊侯宋公衛侯鄭伯于鄄稱單伯會諸侯則單伯為魯人眀也猶曰叔孫豹會晉趙武楚屈建矣若單伯為周大夫則應書單伯齊侯會于鄄不得屬會於單伯也己張氏洽曰常事不書而此特書之斬衰而主昏固非禮况齊乃不可同天之讎奈何與之主昏於此見魯之君臣無復讎之心而國之三綱絶矣又曰左傳作送王姬考之春秋之例非也况築館在秋如單伯果以天子大夫送王姬必俟館成之後方至魯豈得預書之當從公榖作逆子俞氏皋曰逆迎也單伯魯卿四命例書字與齊髙之例同吳氏􅊹曰王將嫁女於齊命魯主之故魯遣單伯往逆王姬於周俾先至於魯而後往歸於齊也鄭氏王曰文十五年經書單伯至自齊單伯為王臣安得告至於魯其為內臣明矣爾汪氏克寬曰左氏惑於成襄昭之經書單子故云然周有祭伯祭叔豈可以鄭祭仲亦周大夫乎何季氏本曰王姬桓王之女嫁與齊襄公者即召南彼穠矣之詩所謂王姬也案三傳互異者折𠂻於經左氏以單伯為周大夫故以逆為送然以書會書至例考之則單伯實為魯臣故主公榖之説秋築王姬之館于外公羊何以書譏何譏爾築之禮也于外非禮也于外何以非禮築于外非禮也其築之何以禮主王姬者必為之改築主王姬者則何為必為之改築於路寢則不可小寢則嫌羣公子之舍則以卑矣其道必為之改築者也榖梁築禮也于外非禮也築之為禮何也主王姬者必自公門出於廟則己尊於寢則己卑為之築節矣築之外變之正也築之外變之為正何也仇讎之人非所以接昏姻也衰麻非所以接辨冕也其不言齊侯之來逆何也不使齊侯得與吾為禮也胡傳魯於王室為懿親其主王姬亦舊矣館於國中必有常處今特築之于外者榖梁子以為仇讎之人非所以接昏姻也衰麻非所以接辨冕也知其不可故特築之于外也築之于外得變之正乎曰不正有三年之喪天王於義不當使之主有不戴天之讎莊公於義不可為之主築之于外之為宜不若辭而弗主之為正也是以君子貴端本焉或曰天王有命固不可辭使單伯逆于京師上得尊周之義為之築館于外下未失居喪之禮奚為不可曰以常禮言之可也今莊公有父之讎方居苫塊此禮之大變也而為之主昏是廢人倫滅天理矣春秋於此事一書再書又再書者其義以復讎為重示天下後世臣子不可忘君親之意故雖築館于外不以為得禮而特書也集説范氏寧曰外城外也公門朝之外門主王姬者當設几筵於宗廟以俟迎者故在公門之內築王姬之館親迎服祭服者重昏姻也公時有桓之喪杜氏預曰公在諒暗慮齊侯當親迎不忍便以禮接於廟又不敢逆王命故築舍于外豈趙氏匡曰左氏云于外禮也與讎主昏縱在城外為禮乎劉氏敞曰為讎主昏而不知辭乃以築外自誣曰我庶幾得禮哉是何足以言禮也張氏洽曰築館所以待王姬之舍以俟齊之逆也然魯主王姬非一前此必有其所今特築于外者知衰麻哭泣不可雜於吉事故築于外也然桓公弒於齊未及一年其創巨痛深當百倍於先君正終之日又可以于外為安命國人以築齊王姬之館與春秋所以著其忘父親讎之罪也李氏廉曰公羊以築于外為非禮是知魯主王姬之常事而不知今日之齊乃讎也左氏榖梁以築于外為合禮是知齊之為讎而不知讎終不可與交則雖于外而亦非也又曰春秋書築館一築臺三築囿三築邑一皆創始之文也汪氏克寬曰莊公是時畏齊之強不以殺父為讎方欲結齊好以為安故自主王姬之後今年會伐衛明年同狩又明年復會伐衛其讎齊之意略無幾微見於舉動則非畏王命而不敢辭主昏之事實乃畏齊而不肯辭也比事以觀而莊公忘讎之罪不可掩矣冬十月乙亥陳侯林卒集説髙氏閌曰莊公與桓王同時王名林而公亦名林君臣同名也汪氏克寬曰莊公也在位八年弟杵臼立是為宣公王使榮叔來錫桓公命此書錫命之始公羊錫者何賜也命者何加我服也其言桓公何追命也榖梁禮有受命無來錫命錫命非正也生服之死行之禮也生不服死追錫之不正甚矣胡傳啖助曰不稱天王寵篡弒以瀆三綱也春秋書王必稱天所履者天位也所行者天道也所賞者天命也所刑者天討也今桓公弒君篡國而王不能誅反追命之無天甚矣與葬成風引為夫人使妾並嫡無以異故其文一施之范寧乃以出居于鄭來聘求車三事為證而謂非義之所存誤矣集説何氏休曰禮有九錫一車馬二衣服三樂則四朱户五納陛六虎賁七弓矢八鈇鉞九秬鬯皆所以勸善扶不能言命不言服者重命不重其財物周禮典命百里不過九命七十里不過七命五十里不過五命又曰死當加善諡不當加錫桓行實惡而追錫之尤悖天道故不稱天王范氏寧曰賞人於朝與人共之當召而錫也周禮大宗伯職曰王命諸侯則儐之是來受命杜氏預曰榮叔周大夫榮氏叔字錫賜也追命桓公褒稱其德若昭七年王追命衛襄之比孔氏穎逹曰公羊傳曰錫者何賜也命者何加我服也又詩唐風無衣之篇晉人為其君請命於天子之使以無衣為辭則王錫諸侯當有服也傳稱王錫晉惠公命受玉惰則王賜又有玉也但賜諸侯以玉者欲使執而朝覲所以合瑞今追命桓公若追命衛襄之比止應褒稱其德賜之䇿書或當有服以表尊卑不復合瑞未必有玉也釋例曰天子錫命其詳未聞諸侯或即位而見錫或歷年乃加錫或已薨而追錫魯桓薨後見錫則亦衛襄之比也魯文即位見錫則亦晉惠之比也魯成八年齊靈二十三年乃見錫隨恩所加得失存乎其事言存乎其事者觀其錫之早晚知恩之厚薄觀其人之善惡知事之得失故傳不復顯言其是非也楊氏士勛曰九錫出禮緯文與周禮九命異案大宗伯以九儀之命正邦國之位一命受職再命受服三命受位四命受器五命受則六命受官七命賜國八命作牧九命作伯其言與九錫不同明知異也白虎通云能安民者賜車馬能富民者賜衣服能和民者賜樂則民衆多者賜朱户能進善者賜納陛能退惡者賜虎賁能誅有罪者賜鈇鉞能征不顯者賜弓矢孝道偹者賜秬鬯亦是有功特賜不關九命之事也舊説解九錫之命一曰輿馬大輅戎輅各一玄馬二也二曰衣服謂玄衮也三曰樂則謂軒縣之樂也四曰朱户謂所居之室朱其户也五曰納陛謂從中階而升也六曰虎賁謂三百人也七曰弓矢彤玈之弓矢也八曰鈇鉞謂大柯斧賜之專殺也九曰秬鬯謂賜秬鬯之酒盛以圭瓚之中以祭祀也又曰文公踰年而賜成公八年乃賜桓公死後追賜三者異時嫌不得相蒙故並皆發傳此追命失禮最大故以甚言之陸氏淳曰啖氏云不稱天王寵篡弒以瀆三綱言不能法天正道故去天字以貶之也孫氏復曰賞所以勸善也罰所以懲惡也善不賞惡不罰天下所以亂也桓弒逆之人莊王生不能討死又追錫之此莊王之為天子可知也不劉氏敞曰錫命者何命為諸侯也諸侯非受命則成為君桓內弒其兄外不朝王終身不受非諸侯也故桓無王生不能討死追命之非王義也故王無天桓無王王無天君子見法焉又曰王者之義必純法天天道子善奪惡而無私者也今桓公篡君取國終不受命而王不能誅反追命之此無天法甚矣其失非小過小惡也不孫氏覺曰春秋書錫命者三三傳諸儒論其禮皆同杜預尋左氏之説則以謂桓公之命若今之哀䇿文公則錫以命圭合瑞為信若如其説則錫命之禮有不同矣然書之皆曰命無異文天髙氏閌曰禮諸侯嗣位三年喪畢以士服朝天子子錫之黼冕圭璧然後歸以臨其民謂之受命桓篡弒未嘗入朝受命王命魯主昏故追錫桓公以寵之魯桓已葬矣因其私諡而錫之尤為非禮恩胡氏寧曰王使聘桓者三死又追命大惡不討而禮加焉誰不勸於為惡春秋弒君三十六豈無自而然哉三陳氏傅良曰桓王未葬則榮叔何以言使不可以年無君張氏洽曰莊公主王姬之昏故王寵嘉其父桓公已終而遣使錫之䇿命若昭七年王使成簡公追命衛侯之比也桓弒隱在王法有賊殺其親之罪乃司馬九伐之所宜加王不能討又以惡為善示以褒嘉故特去天而止書王也季氏廉曰錫命例三莊王錫桓公寵篡弒也故不書天王以深責之文元年襄王錫文公成八年簡王錫成公二公不朝又無敵愾之功遣使錫命之非正也然比之桓公則有間矣故仍書天亦以見王室之失禮也又曰錫命公羊注取禮緯説榖梁注亦引九錫文而疏曰九錫與周禮九命異胡氏於文元年傳曰黻冕圭璧因其終喪入見而錫之車馬衮黻因其嵗時來朝而錫之彤弓玈矢因其敵愾獻功而錫之然參之諸書平王命晉文侯以秬鬯弓矢虎賁宰孔賜齊侯受命賞服大輅龍旗九旒渠門赤旗襄王命晉文亦以大輅之服戎輅之服彤弓鏚鉞秬鬯虎賁而已則古者䇿命之典亦不過如此何休范寧本得之但其所引出禮緯及白虎通則漢儒以漢法附會增益之也胡氏取禮及詩為證而分為三事蓋詩人之詞不過言其大槩其實有功亦可以賜車馬黻冕也王命士會以黻冕是矣又考之左傳文元年毛伯錫命注曰諸侯即位天子賜以命圭莊二十七年惠王使召伯廖賜齊侯命不言所命杜氏直謂命為侯伯以此觀之則錫命有命辭有命物矣又或止有命辭而無命物亦未可知也有命辭有命物者如後世以璽書褒賞功臣增秩賜金是也止有命辭者如後世賜手詔褒美是也要之三傳之説皆可通汪氏克寬曰襄十四年靈王將昏於齊使劉定公錫齊侯命則此年錫桓公命亦因命魯主王姬之昏而追錫其先君爾經傳言錫命者八考之周制王命諸侯則大宗伯儐司几筵設王位黼扆而後內史作䇿命之未聞遣使就其國而錫命也蔡仲之命命之踐諸侯之位也旅巢命因巢伯來朝而命之也文侯之命以其有功而錫之命也春秋之時天子不能以正禮制諸侯故皆遣使就其國而賜之命如僖十一年賜晉侯命文元年毛伯錫命則因始即位而錫之莊二十七年使召伯賜齊侯命成八年召伯賜命乃即位之久而後命之此年錫桓公命昭七年追命衛侯又皆既卒而追錫之惟僖二十八年晉文獻俘朝王而王命尹氏王子虎內史叔興父䇿命晉侯則為晉侯受命而王之下勞其失尊又甚於遣使矣然文成雖不朝王毛伯召伯無貶直書而義見此年追命篡弒之人其惡尤大故王不稱天以示非常之貶也王姬歸于齊公羊何以書我主之也榖梁為之中者歸之也胡傳魯主王姬之嫁舊矣在他公時常事不書此獨書者以歸于齊故也逆于京師築館于外而不書歸于齊則無以見其罪之在也書歸于齊而後忘親釋怨之罪著矣春秋復讎之義明矣集説趙氏匡曰凡外女歸皆以非常乃書兩書王姬歸皆非常譏與讎為昏主也劉氏敞曰不言逆之何親逆之也親逆之則何為不言親逆之常事不書有非常然後書又曰杜云不書逆公不與接非也若不與接則向者何得云慮其親迎築館于外乎築館于外本慮其親迎故避廟中相接爾非都不與接也事孫氏覺曰不書來逆者蓋齊侯自來得禮親迎常不書齊與魯為世讎而魯主其昏又在衰絰之中也不書王姬之歸無以見魯之失禮而天王失命也陳氏傅良曰王姬不書唯莊公之篇再書之曷為再書以莊公之於齊不可與相為禮也魯有主王姬者矣莫悖於與齊昏是故特譏之春秋之書外女未有詳於此者也書逆女書築王姬之館書歸書卒皆以病莊公也張氏洽曰王姬來而不書至别於魯夫人也李吳氏􅊹曰書歸于齊魯既主昏則同於內女也氏廉曰書王姬歸齊二此年及十一年也此歸襄公十一年歸桓公齊師遷紀郱鄑郚郱蒲丁反鄑子斯反郚音吾胊此書遷之始郱杜注在東莞臨縣東南今屬山東青州府邑鄑杜注都昌縣西有訾城都昌今山東青州府昌縣也有訾亭社在縣西十里南郚杜注在朱虛縣東南今山東濟府安丘縣西南六十里有郚城公羊遷之者何取之也胡傳郱鄑郚者紀三邑也邑不言遷遷不言師其以師遷之者見紀民猶足與守而齊人強暴用大衆以迫之為己屬也凡書遷者自是而滅矣春秋興滅國繼絶世則遷國邑者不再貶而罪己見集説孔氏穎逹曰齊人遷此三邑非三邑之人自遷也故知齊欲滅紀故徙其三邑之民而取其地也人啖氏助曰公羊云曷為不言取為襄公諱也案取邑非善事若為之諱是掩惡也榖梁曰紀國也郱鄑郚國也或曰遷紀於郱鄑郚案下有紀侯大去其國明此時未遷故知是紀之三邑劉氏敞曰郱鄑郚者何紀之邑也又曰榖梁曰紀國也郱鄑郚國也非也計齊一師必不能並遷兩國又春秋自當分别以見滅兩國之惡不當合之也為葉氏夢得曰遷邑不書此何以書蓋紀自是亡矣紀侯言也凡自遷者己欲也故書曰某遷於某人遷之者非己欲也故書曰某人遷某某師遷某以人遷者驅之以師遷者脅之凡遷之志皆惡也暴薛氏季宣曰黃之盟才二年也今又遷紀三邑強之無忌憚甚矣程氏迥曰土地人民盡有之曰取逐其人有其地曰遷而髙氏閌曰紀與齊乃同姓之國况天子娶后於紀王姬又歸於齊豈無親親之愛今乃背黃之盟一舉而遷三邑蓋自是遂滅紀矣吕氏大圭曰諸侯之國皆受之於天子其封域有定分人民有定居強者不可以力并詐者不可以誕取紀之土地人民受之於天子齊烏得而遷之哉紀之滅始於此聖人所以書師而深疾之也家氏鉉翁曰書師書遷言用大衆迫而遷之耳公羊以為不言取為齊襄諱以其志在復讎也但此春秋所貶不為之諱程氏端學曰邑者天子所封有故而遷民邑者天子之事也而諸侯僭之况非有罪而欲吞其國乎齊襄之惡大矣李氏廉曰經書遷人國邑三齊師遷郱鄑郚十年宋人遷宿閔二年齊人遷陽是也宿與陽皆國而郱鄑郚為紀邑遷宿遷陽皆書人而遷郱鄑郚書師此春秋特筆著齊之罪也己莊王丑五年二年齊襄六年晉緡十三年衛惠八年黔牟四年蔡哀三年鄭厲九年子儀二年曹莊十年陳宣公杵臼元年把靖十二年宋莊十八年秦武六年楚武四十九年春王二月葬陳莊公集説杜氏預曰魯往會之故書夏公子慶父帥師伐於餘丘於餘丘杜注國名孔疏公榖皆以於餘丘為邾之别邑左氏無傳正以春秋之旨未有伐人之邑而不繫國者此無所繫故知是國釋例注闕不知其處蓋近魯小國也公羊於餘丘者何邾婁之邑也曷為不繫乎邾婁國之也曷為國之君存焉爾榖梁國而曰伐於餘丘邾之邑也其曰伐何也公子貴矣師重矣而敵人之邑公子病矣病公子所以譏乎公也其一曰君在而重之也胡傳案二傳於餘丘邾邑也國而曰伐此邑爾其曰伐何也志慶父之得兵權也莊公幼年即位首以慶父主兵卒致子般之禍於餘丘法不當書聖人特書以志亂之所由為後戒也魯在春秋中見弒者三君其賊未有不得魯國之兵權者公子翬再為主將專會諸侯不出隱公之命仲遂擅兵兩世入杞伐邾會師救鄭三軍服其威令之日久矣故翬弒隱公而寫氏不能明其罪慶父弒子般而成季不能遏其惡公子遂殺惡及視而叔仲惠伯不能免其死夫豈一朝一夕之故哉春秋所書為戒逺矣集説杜氏預曰莊公時年十五則慶父莊公庶兄至孔氏穎逹曰莊公時年十五者以桓六年生此二年為十五莊二十七年公羊傳曰公子慶父公子牙公子友皆莊公之母弟也釋例曰經書公子慶父伐於餘丘而公羊以為莊公母弟計其年嵗未能統軍今推案傳之上下羽父之弒隱公皆咨謀於桓公則桓已成人也桓以成人而弒隱即位乃娶於齊自應有長庶故氏曰孟此明證也氏曰孟氏傳文實然而經稱仲孫杜無明釋蓋慶父雖為庶長而以仲為字其後子孫以字為氏是以經書仲孫時人以其庶長稱孟故傳稱孟孫也劉炫云慶父自稱仲欲同於正適言已少次莊公為三家之長故以莊公為伯而自稱仲國啖氏助曰前後未有邑言伐者故依杜氏舊説為許氏翰曰當莊公初魯未有以勝齊則當休兵息民蓄德修政以俟有間舍堂堂之讎國弗圗而用師伐於餘丘知莊公之無志程氏迥曰書伐國也公榖以為邾邑蓋邾附庸同張氏洽曰莊公之立寢苫枕戈莫先於率一國以讎於不義之齊捨是而命將帥師先有事於無罪之小國兵興無名而慶父以尊屬主兵使之得政以制一國之權軍政之本既失而權移於下以成異日子般閔公之禍故詳書以譏之趙氏鵬飛曰溺伐衛則聖人貶其族慶父專聖人不去氏何也於以著孟氏之孽蓋基於此不氏則無以見之故書曰公子吳氏􅊹曰於發語辭猶曰於越伐李氏廉曰一經書魯大夫帥師伐國者九伐邾七莒一獨於餘丘以邑而書伐亦春秋特筆欲以啓問者察事情也欲熊氏過曰慶父者莊公之庶兄本庶孟宜稱孟不先莊公故自稱仲若母弟然公羊遂指為母弟也邑張氏溥曰於餘丘杜云近魯小國公榖則云邾别實不可考抑春秋所惡者不在於餘丘之被伐而在慶父之帥師魯弒君三賊皆由主兵而成故憂慶父者比之公子翬與仲遂也慶父杜云莊公庶兄公羊則云母弟母弟猶幼少也庶兄則其年能制莊矣國君新立公子將兵或兄或弟寧有一可哉大陳氏際泰曰下陽曰滅餘丘曰伐此必關天下之故者也故以為志慶父之得兵權也案於餘丘左氏無傳公榖皆以為邾邑杜氏預獨以為國詳考經文伐人之邑未有不繫國者亦未有邑而書伐者則杜注為勝也公羊以慶父為莊公母弟杜氏以為庶兄然為弟則不當稱孟為兄則不當稱仲惟劉氏炫謂慶父欲同正適故以莊公為伯而自稱仲理或然也要之經意所重者惡慶父之得兵權爾或國或邑或弟或兄皆非義所急故諸家並存而以張氏溥之説為正秋七月齊王姬卒公羊外夫人不卒此何以卒録焉爾曷為録焉爾我主之也榖梁為之者卒之也胡傳內女嫁為諸侯妻則書卒王姬何以書比內女為之服也故檀弓曰齊告王姬之喪魯莊公為之大功或曰由魯嫁故為之服姊妹之服夫服稱情而為之節者也莊公於齊王姬厚矣如不共戴天之念何此所謂不能三年之喪而緦小功之察也特卒王姬以著其罪集説范氏寧曰主其嫁則有兄弟之恩死則服之服之故書卒杜氏預曰魯為之主比之內女孔氏穎逹曰他國夫人之卒例皆不書惟魯女為諸侯之妻書其卒爾王姬非是內女亦書其卒為比之內女故也多孫氏覺曰魯與天王同姓天王之女下嫁諸侯者魯主之然而十二公二百四十二年之久王姬之歸書之最偹者齊王姬也書之偹者所以見莊公之盡禮於仇讎而無恩於先君也罪之大則書之備惡之積不可掩也昏張氏洽曰莊公捨不共戴天之讎而主齊夫人之知有齊而不知有父其罪可謂大矣故自逆王姬至此特書屢書辭繁而不殺以正其淟汨大倫誣滅天理之罪所謂婉而成章也告吳氏􅊹曰禮經本無為王姬服之禮莊公因齊之喪特為之服以媚齊也王氏樵曰周禮為王后齊衰解之者曰諸侯為之不杖期固未聞主昏王女而為之服也春秋二百四十二年王后崩不見於經則當時諸侯於王后之喪禮略矣而顧為王姬服其重在齊而不在周也冬十有二月夫人薑氏會齊侯于禚禚諸若反公作郜禚杜注齊地左傳定九年齊侯致禚媚杏於衛杜注三邑皆齊西界據此當為齊魯衛分界之地左傳書姦也榖梁婦人既嫁不踰竟踰竟非正也婦人不言會言會非正也饗甚矣胡傳婦人無外事送迎不出門見兄弟不踰閾在家從父既嫁從夫夫死從子今會齊侯于禚是莊公不能防間其母失子道也故趙匡曰薑氏齊侯之惡著矣亦所以病公也曰子可以制母乎夫死從子通乎其下况於國君君者人神之主風教之本也不能正家如正國何若莊公者哀痛以思父誠敬以事母威刑以督下車馬僕從莫不俟命夫人徒往乎夫人之往也則公威命之下行哀戚之不至爾集説葉氏夢得曰前書公與夫人如齊不告至而見孫與喪俱至也今書孫于齊不告至而見會不敢告至也蓋夫人無辭以見其宗廟矣曰髙氏閌曰夫人稱姓氏者貶不再也吕氏大圭父母在則歸寧葛覃稱歸寧父母是也殁則使卿寧楚子庚聘于秦為夫人寧是也家氏鉉翁曰薑氏身負弒君未討之誅甫除喪而往會其兄齊襄方有王姬伉儷之戚未踰時而出淫其妹此天下之大惡覆載之所不容聖人為是故於春秋聨書之比而誅之也行程氏端學曰案周禮司馬九伐之法內外亂鳥獸則滅之齊襄之惡不容誅矣薑氏與弒而淫縱如此則莊公之不能齊家治國王法之不能行於天下舉可見矣大黃氏澤曰天下後世為人子而使母至於是罪之者也汪氏克寬曰春秋之末公父文伯之母䦱門而與康子言皆不踰閾祭悼子康子與焉胙不受徹爼不宴仲尼聞之以為别於男女之禮夫季世俗薄而敬薑獨能守禮而不違春秋備書文薑之行雖國惡不容諱其善善惡惡之心亦猶美敬薑之意乎能賀氏仲軾曰今日之會莫能禁之則前日之孫孰迫之故知如齊者是薑氏之志而以為孫者春秋之文也齊張氏溥曰元年三月夫人孫于齊二年十二月會侯于禚始且孫今則會矣作春秋者欲諱而不得矣乙酉宋公馮卒馮皮冰反集説髙氏閌曰觀宋莊忮求敗類則穆公之不以國與子有以知之矣庚莊王寅六年三年齊襄七年晉緡十四年衛惠九年黔牟五年蔡哀四年鄭厲十年子儀三年曹莊十一年陳宣二年把靖十三年宋閔公捷元年秦武七年楚武五十年春王正月溺會齊師伐衛左傳疾之也公羊溺者何吾大夫之未命者也榖梁溺者何也公子溺也其不稱公子何也惡其會仇讎而伐同姓故貶而名之也胡傳有父之讎而釋怨其罪大矣況與合黨興師伐人國乎集説孫氏復曰衛侯朔在齊故溺會師伐衛謀納朔也孫氏覺曰溺未命之大夫也無駭翬挾之類是也不曰帥師師少也會者外為志也伐者聲其罪而行也髙氏閌曰衛朔奔齊齊欲納之然天王已絶朔而立公子黔牟為衛侯魯輒興兵會仇讎之人抗天子之命納不義之君其罪大矣薛氏季宣曰大讎不報而又與之出師舍其田而藝人之田莊公之謂矣溺不書帥師所將之兵少也家氏鉉翁曰榖梁曰會仇讎伐同姓名以貶之但春秋始年未賜族之大夫不皆有所貶會齊伐衛則貶也或曰納朔非父志乎曰納朔者父惡也不復父讎而成父惡不孝也李氏廉曰考之三傳左傳則曰衛朔出奔二公子立黔牟何休據世本史記以為衛朔背叛出奔天子新立公子留范氏則以為齊受天子罪人為之興師而魯同之然則黔牟與留雖未知孰是而此時衛朔在齊齊欲納之明矣齊黨罪人固不足責而莊公新立寢苫枕戈莫先於率國人以同讎舍是不顧而二年伐於餘丘三年伐衛又且同齊師以往此何心哉左氏疾之之説得之夏四月葬宋莊公榖梁月葬故也五月葬桓王左傳緩也榖梁天子志崩不志葬必其時也何必焉舉天下而葬一人其義不疑也志葬故也危不得葬也曰近不失崩不志崩失天下也獨隂不生獨陽不生獨天不生三合然後生故曰母之子也可天之子也可尊者取尊稱焉卑者取卑稱焉其曰王者民之所歸往也胡傳左氏曰緩也天子七月而葬同軌畢至諸侯五月同盟至大夫三月同位至士踰月外姻至王崩至是蓋七年矣先儒或言天子不志葬又以為不言葬者常也夫事孰有大於葬天子者而可以不志乎死生終始之際人道之大變豈以是為常事而不書也集説杜氏預曰以桓十五年崩七年乃葬公劉氏敞曰崩久矣曷為於此而葬慢也又曰羊榖梁以為改葬非也若誠改葬應曰改葬如改卜之類矣今不言改非改葬也夫世衰禮廢何事不有豈能必桓王前已葬哉固當據經文年髙氏閌曰平王崩求賻於諸侯然後克葬桓崩七乃克葬者蓋承諸侯背叛王師傷敗之後力益不足矣夫以天下而葬一人安可緩也聖人書之以著天下臣子之罪若曰改葬則聖人明書之矣莊王以後王室益弱無有以緩葬書者而有速葬者抑以禮滋略歟薛氏季宣曰七年而葬閔王室之無臣子也人陳氏傅良曰會葬不書其人必有故也而後書其文公使公子遂葬晉侯叔孫得臣葬襄王是均周晉也昭公使叔弓葬宋公滕侯叔鞅葬景王是均周宋滕也均猶可也晉景公卒成公弔喪而定王不書葬楚康王卒襄公送葬而靈王不書葬不臣於周而詘於晉楚春秋諱之是故春秋不徒志葬也大張氏洽曰魯遣微者往會故不書公如又不書卿夫往而止記桓王之葬也同軌畢至之禮既不復行於是諸侯惡其害已而去其籍先王之喪禮僅得傳於後世惟士喪既夕士虞耳可勝惜哉葬陳氏深曰先書葬宋莊公合五月而葬之義後書桓王有乖七月而葬之義至於七年之久見諸侯葬不失時而天子之葬若此之緩則周之王臣與諸侯無君之罪自見於言外俞氏皋曰凡天王之葬魯會則書其不書者皆不會也謂王氏元杰曰案禮未及期葬謂之不懷過期不葬之緩慢桓王七年之久經始書葬其緩慢可知當是時王綱不振諸侯無王蔑君臣之大倫惟強弱之是視天王之喪三不書崩則訃之不及也七不書葬則魯不往會也至於晉楚之君會葬之行越日踰時何其待強國之厚而待王室之薄耶春秋謹而書之上以著王室之衰下以誅諸侯不臣之罪李氏廉曰春秋十三王志葬者桓莊匡簡景而已諸侯之不臣可知也又曰桓王以隱公三年立桓十五年而崩在位二十五年子莊王立越七年始葬考之傳文惟桓十八年傳曰周公欲弒莊王而立王子克辛伯告王遂與王殺周公黑肩王子克奔燕由此觀之豈非王室有子儀黑肩之亂乎張氏溥曰桓王崩七年乃克葬傳者疑其太緩遂云改葬至春秋説云恆星不見夜明周人榮奢改葬桓王冡則近誕矣考之傳文桓公十八年王室有子儀黑肩之亂因亂而緩葬其然歟然周室無人魯不會葬不臣之慢見於天下矣秋紀季以酅入于齊酅户圭反今酅杜注紀邑在齊國東安平縣山東青州府臨淄縣東有安平城又有酅亭左傳紀於是乎始判公羊紀季者何紀侯之弟也何以不名賢也魯子曰請後五廟以存姑姊妹榖梁酅紀之邑也入于齊者以酅事齊也入者內弗受也胡傳大夫不得用地公子不當去國盜地以下敵棄君以避患非人臣也故春秋之義私逃者必書奔有罪者必加貶今季不書奔則非竊地也不書名則非貶也諸侯兄弟貶則書名宋辰秦針之類是也不貶則書字蔡季許叔之類是也紀季所以不書奔者有紀侯之命矣所以不書名者天下無道強衆相陵天子不能正方伯不能伐屈己事齊請後五廟其亦不得已而為之者非其罪也所以無貶乎入云者難辭也集説范氏寧曰雍曰紀國微弱齊將吞并紀季深覩存亡之機大懼社稷之傾故超然遐舉以酅事齊庶胤嗣不泯宗廟永存春秋賢之故褒之以字齊受人之邑而滅人之國故於義不可受也孔氏穎達曰釋例曰齊侯鄭伯詐朝於紀侯以襲之紀人大懼而謀難於魯請王命以求成於齊公告不能齊遂逼之遷其三邑國有旦夕之危而不能自入為附庸故分季以酅使請事於齊大去之後季為附庸先祀不廢社稷有奉季之力也故書字不書名書入不書叛也判分也傳曰始分為紀侯大去張本也紀亡之後叔姬歸于酅明為附庸猶得専酅故可歸也以叔姬歸酅知酅為附庸附庸之君雖無爵命而分地建國南面之主得立宗廟守祭祀蔡趙氏匡曰諸侯兄弟以國連字者蔡叔許叔紀季季皆國而字之言與君一體也非陸氏淳曰淳聞於師曰紀季以君之邑入於他國人臣之行也不書曰叛原其有兄之命矣而又字之其意何也曰齊強國也其圖紀也久矣天子不能正鄰國莫能救辱身愈於絶祀降國愈於殘民以酅事齊仁人之行矣故聖人善之齊劉氏敞曰何以不曰紀侯之弟言以酅為附庸於也紀季曷為以酅為附庸於齊齊將滅紀紀侯以道事之則不得免焉因不忍鬪其民也逡巡有去志紀季用是以酅入于齊復五廟焉然則豫之乎豫之也字而不名入而不畔是豫之也豫之則其言入何難也何難焉爾析地以去國降志以事讎是非季之心也以宗國為寄矣又曰公羊以為賢紀季服罪故不名非也春秋所以不貶季為畔者以季受命於紀侯也若齊欲滅紀紀季不能同心守國専析其地以事讎敵外託服罪實私享其利者是春秋所惡也趙鞅入于晉陽以叛以無君命雖有功不除其惡假令季實服罪以存宗廟猶與趙鞅無君命等耳不得沒其叛又稱其字也又曰季見齊之必將滅紀故請先下齊以退敵兵存宗國春秋豫之與鄫世子巫異鄫君舉其國以仕魯欲身去南面而就臣列是茍免而無廉恥者也况季公子耳以安君存國之故析地事讎又不可得然後援存亡繼絶之義使宗廟血食百姓有奉後嗣復見叔姬歸于酅是也可謂明於權矣紀葉氏夢得曰邾快以漆閭丘來奔春秋書以叛使季而不告於紀侯雖以存紀與邾快何異夫惟紀季入齊而後紀侯可以去其國則紀季不失其為仁紀侯不失其為義是以紀季特書入紀侯特書去皆不以為奔焉陳氏傅良曰紀侯在而季以酅入齊若以邑叛其稱字紀侯意也齊襄自桓始年挾鄭以圗紀黃之會魯為之求成不得免焉遷郱鄑郚紀之不絶也如線季以酅入齊紀於是乎始判是分國以與之也齊人所欲者吾土地茍可以免紀者無不為也是紀侯意也是故稱字不稱字則疑於宋魚石邾庶其行張氏洽曰王政不行霸者未作強大吞并無道肆小國不能校巽詞下敵以存宗祀以先王之建國而聽命於強暴春秋所以於季無譏焉書入以志其難蓋閔之也黑李氏廉曰春秋書以地出奔者邾庶其莒年婁邾肱是也書名書地而竊邑叛君之罪著矣書大夫入于某者宋魚石晉欒盈是也書地書復入而據邑叛君之罪見矣今季不書奔不書名所以别於二例也不書弟明非紀侯之薄也書入所以罪齊而閔季也原季之情免季之罪不使與其他公子去國者比耳故紀季之事謂之不貶則可謂之知權亦可知以賢而褒之則恐未可與微子適周例論也季季氏本曰齊既遷紀郱鄑郚必欲盡得紀地故紀雖止欲存酅而齊亦難之故曰入也存酅之請豈無興復之意惜其勢衰力弱終不能振耳齊張氏溥曰觀叔姬歸酅庶幾善存宗廟矣春秋惡之暴傷魯之弱不得已而賢紀季亦處小國之道乎案以酅入齊紀季降志以存先祀也諸侯兄弟例稱字紀季書季未嘗褒也恕詞焉耳恕季所以罪齊也當以胡傳及李氏廉之説為正冬公次于滑滑公榖作郎南滑杜注鄭地在陳留襄邑縣北今河歸德府睢州有滑亭左傳將會鄭伯謀紀故也鄭伯辭以難凡師一宿為舍再宿為信過信為次公羊其言次于郎何刺欲救紀而後不能也榖梁次止也有畏也欲救紀而不能也胡傳春秋紀兵伐而書次以次為善救而書次以次為譏次于滑譏之也魯紀有昏姻之好當恤其患於齊有父之讎不共戴天茍能救紀抑齊一舉而兩善并矣見義不為而有畏也春秋之所惡故書公次于滑以譏之也或言夫子意在刺無王命若譏其怯懦則當褒其勇者春秋乃鼓亂之書為此言者誤矣易於謙之六五則曰利用侵伐師之六四則曰左次無咎進退勇怯顧義如何耳豈可専以勇為鼓亂而不與乎集説杜氏預曰凡兵未有所加所次則書之既書兵所加則不書其所次孔氏穎逹曰釋例曰凡師一宿為舍再宿為信過信為次此周公之典以詳録師出入行止遲速因為之名也兵事尚速老師費財不可以久故春秋告命三日以上必記其次舍之與信不書者輕碎不以告也兵未有所加所次則書之以示遲速公次于滑師次于郎是也既書兵所加則不書其所次以事為宜非虛次諸久兵而不書次是也既書兵所加而又書次者義有取於次遂伐楚次于陘盟于牡丘遂次于匡是也所記或次在事前次以成事也或次在事後事成而次也皆隨事實無義例也先儒又言次者皆善之辭釋例曰叔孫救晉次于雍榆傳曰禮者善其宗助盟主非以次為禮也齊桓公次于聶北救邢亦以存邢具其器用師人無私見善不在次也而賈氏皆即以為善次次之與否自是臨時用兵之宜非禮之所素制也言非素制者非禮家制此名以為善號也書劉氏敞曰次者何止也曷為或以事書或不以事以事書者止之以事者也不以事書者止之不以事者也君舉於政師舉於義止不以事者亂之道也葉氏夢得曰有師次有公次何以或言師次或言公次君將不言師公次師亦在焉次非用師之道有伐而言次者有救而言次者有俟而言次者其出猶有名未有無事而言次君子以為輕用其身而妄動其衆故內外之辭一施之之杜氏諤曰莊公惕然出師儻必行之則復讎救弱義兩存髙氏閌曰但書次若無故而自出者焉欲薛氏季宣曰書次不能為輕重也次張氏洽曰公閔紀之難而度其力終不能救故師于滑將以鄭之不會而辭於紀耳非實有救紀之心也彼於父之讎尚忘之而不圗豈真有心於存紀哉故書次見出師無名以深譏之不吳氏􅊹曰紀將亡矣以昏姻之故告急於魯魯莊能自已故出次于滑將會鄭伯為紀謀而祈哀乞憐於齊鄭伯知齊之滅紀不可止也故辭而不會俞氏皋曰次欲進而止也書公次君親將也次李氏廉曰莊之編書次者三此年次滑書公八年郎書師三十年次成不書公書師甚矣莊之不競於齊也君父死焉不能討謀紀而齊滅紀及齊圍郕而郕降於齊救鄣而鄣卒不免師出何名哉此救而不書救者不以救豫公也書救則疑於聶北雍榆矣汪氏克寬曰春秋書兵次者十有三次于滑次于成次而欲救也師次于郎齊宋次于郎齊衛次五氏垂葭蕖蒢楚蔡次厥貉次而欲伐也悉以無名紀之皆所以示譏也今考次滑之後紀侯去國即及齊狩禚次成之後齊人降鄣即及齊遇魯濟不能救紀與鄣而無憤恨之心則是莊公佯為救患之虛聲而實無志於救紀鄣也師次郎而卒有圍郕之役齊宋次郎而隨有乘丘之敗齊衛三次楚蔡次厥貉而終有伐晉伐麇之舉是其所以次者非有悔過班師之謀乃稔惡伺便之階也救者不書其救譏其實不能救伐者遂書伐圍者遂書圍戰者遂書敗譏其不克悔過以遷善也若夫齊桓伐楚次陘晉悼伐鄭次鄫則不忍殘民其次為善如次聶北救邢次匡救徐救晉次雍榆雖曰緩於救患然比於欲救不能者亦有間矣湛氏若水曰譏救難之不勇也辛莊王郋七年四年齊襄八年晉緡十五年衛惠十年黔牟六年蔡哀五年鄭厲十一年子儀四年曹莊十二年陳宣三年把靖十四年宋閔二年秦武八年楚武五十一年春王二月夫人薑氏享齊侯于祝丘享公榖作饗榖梁饗甚矣饗齊侯所以病齊侯也胡傳享者兩君之禮所以訓恭儉也兩君相見享於廟中禮也犧象不出門嘉樂不野合非兩君相見又去其國而享諸侯甚矣集説孔氏穎逹曰鄭康成儀禮注饗謂享太牢以飲賔則享是飲酒大禮與會小别而以享為會者言夫人與齊侯會而設享禮故書享齊侯也定十年夾谷之會傳稱齊侯將享公孔丘拒之乃不果享是享者兩君相見之禮失陸氏淳曰淳聞於師曰參譏之也公夫人齊侯皆正也孫氏覺曰春秋諸侯相見皆謂之會會者蓋春秋之時諸侯相見以禮之名也簡禮而會者謂之遇遇罪又重於會也二百四十二年之間未有言享者其因會而相享者亦不書以會為重則享不足校夫人無道而享齊侯亦因會而後享也然經不言會而言享者薑氏會齊侯又享之播惡於二國之內會已不可况享乎以享為重故書享也薑氏齊侯之惡不待貶絶而見矣為莊公者亦未免于有罪也葉氏夢得曰禚齊地言會則外為志焉祝丘魯地蓋齊侯來而我享之內為志也以禚視祝丘則地愈逼以會視享則禮愈厚蓋莊公不能制其母而後夫人得以極其欲莊公亦已病矣坐髙氏閌曰禮姑姊妹已嫁而反兄弟不與同席而况用兩居相見之禮乎漢張氏洽曰假先王之禮為禽獸之行大亂之道也人有云淫亂之漸其變為篡文薑之行瀆亂周公之禮魯人習之三十餘年卒至子般閔公薦弒而後止聖人作易以間有家為家人之始垂訓遠矣復呂氏大圭曰前此嘗會矣而未之享也今享矣又如齊師矣人之為不善一縱之後如水方至莫知所極輕吳氏澄曰古者飲食之禮有三享食燕也燕禮最蓋主於飲酒而食物不盛食禮次之食物甚盛而不飲酒享禮最重飲酒如燕禮之多食物如食禮之備雖君大夫亦無行享食燕之禮於野者況婦人乎然此不足責也禮汪氏克寬曰周官儀禮有天子諸侯大夫饗燕之而春秋於晉侯享齊侯宋公享晉侯楚子享公小邾子郯子來朝公與之宴公享宰周公范宣子享晉六卿于蒲圃寧俞華耦來公與之宴皆不書于策雖鄭伯享王王享晉侯亦不書也而書夫人享齊侯則以其非禮也三月紀伯姬卒榖梁外夫人不卒此其言卒何也吾女也適諸侯則尊同以吾為之變卒之也集説何氏休曰禮天子諸侯絶期大夫絶緦天子惟女之適二王後者諸侯惟女之為諸侯夫人者恩得申故卒之姊范氏寧曰隱二年履緰所逆者禮諸侯絶旁期姑妹女子子嫁於國君者尊與己同則為之服大功九月變不服之例然則適大夫者不書卒陳氏傅良曰內女為夫人書卒不書葬其不書卒者必有故也非有故而不卒者則不赴也伯汪氏克寬曰內女為諸侯夫人者七惟紀伯姬宋姬志卒志葬蓋閔紀之亡褒共姬之賢而詳其本末也鄫季姬把叔姬止書卒志其常也郯伯姬齊子叔姬不書卒被出不復其國非尊同之比也把伯姬不書卒蓋不赴也非夫人者七僖九年伯姬卒文十二年子叔姬卒許嫁稱字比於尊同者也莒慶叔姬宋蕩伯姬及婦齊髙固子叔姬則嫁大夫而不卒也若夫紀叔姬非夫人而書卒書葬則以其賢而特録之乃春秋之變例也附録左傳四年春王三月楚武王荆尸授師孑焉以伐隨將齊入告夫人鄧曼曰余心蕩鄧曼歎曰王祿盡矣盈而蕩天之道也先君其知之矣故臨武事將發大命而蕩王心焉若師徒無虧王薧於行國之福也王遂行卒於樠木之下令尹鬪祁莫敖屈重除道梁溠營軍臨隨隨人懼行成莫敖以王命入盟隨侯且請為會於漢汭而還濟漢而後發喪溠杜注溠水在義陽厥縣西東南入鄖水釋例云即漈水源出縣北今在德安府隨州東南夏齊侯陳侯鄭伯遇于垂胡傳蘇轍曰鄭伯子儀也桓十五年書突出奔蔡忽歸于鄭是年九月突入于櫟十七年高渠彌弒忽立子亹十八年齊襄公殺子亹鄭人立子儀莊十四年突使傅瑕弒子儀而入則遇于垂者子儀也然則鄭有二君可乎春秋有一國而二君者鄭突與儀衛衎與剽是也突衎始終為君子儀君鄭十有四年剽君衛十有一年皆能君者也故春秋因其實而君之然則孰與曰皆不與也突之入以篡衎之出以惡儀剽雖國人所立而突衎在焉非所以為安也故四人者春秋莫適與也皆不沒其實耳君子不幸而處此如子臧季札可也不如是則亂不止為此説者善矣然而鄭伯實厲公也非子儀也集説許氏翰曰齊與陳鄭遇垂蓋謀取紀是以紀侯見難而去也高氏閌曰或以此鄭伯為子儀非也忽世子出奔猶不得稱子其復歸猶不得稱爵子儀乘間得立其為君微矣豈敢輕去國都而與諸侯會乎故知此鄭伯即突也高渠彌弒忽立子亹齊人殺子亹立子儀春秋皆沒而不書以突為鄭伯故也二胡氏寧曰蘇子由以鄭伯為子儀謂春秋有一國君其説辨其理通善發春秋之意然而鄭伯實厲公終始能君故不沒其實非與之也惟不沒其實故出奔入櫟會垂皆書其爵惟非與之也故歸鄭奔蔡入櫟皆書其名春秋於世子忽猶不書爵況子儀之微者乎汪氏克寬曰不期而會曰遇春秋諸侯私為之約乃用不期而會之禮書之所以譏之也況以三國之君相會亦此於不期而遇其為簡慢詭譎益可以見矣紀卓氏爾康曰垂之遇趙子嘗謂鄭要陳遇齊請存社稷然突方居櫟豈能謀紀高抑崇言齊恐陳鄭救紀故結二國之歡夫齊何畏於陳鄭陳鄭又去紀最遠亦何能救紀者而至於宋衛之間為遇哉此疑鄭突求釋援紀之怨於齊假陳以為介紹也案高氏閌謂亹儀之立經沒而不書斷以鄭伯為突依經立義持論甚正或以為子儀者非也紀侯大去其國左傳紀侯不能下齊以與紀季夏紀侯大去其國違齊難也公羊大去者何滅也孰滅之齊滅之榖梁大去者不遺一人之辭也言民之從者四年而後畢也紀侯賢而齊侯滅之不言滅而曰大去其國者不使小人加乎君子胡傳凡大閲大雩大搜而謂之大者譏其僭也大無者志倉廩之竭也大去者土地人民儀章器物悉委置之而不顧也或曰以爭國為小而不為以去國為大而為之者也夫守天子之土疆承先祖之祭祀義莫重焉委而去之無貶歟曰有國家者以義言之世守也非身之所能為則當效死而弗去以道言之不以其所以養人者害人亦可以去而不守於斯二者顧所擇如何耳然則擬諸太王去邠之事可以無愧矣曰太王去邠從之者如歸市紀侯去國日以微滅則何太王之可擬哉故聖人與其不爭而去而不與其去而不存與其不爭而去是以異於失地之君而不名不與其去而不存是故書叔姬歸酅而不録紀侯之卒眀其為君之末矣集説范氏寧曰不曰滅而曰大去其國蓋抑無道之強以優有道之弱若進止在已非齊所得滅也逐杜氏預曰以國與季季奉社稷故不言滅不見迫故不言奔大去者不反之辭孔氏穎逹曰傳稱紀侯不能下齊以與紀季是往年分酅與之紀國猶在今則全以紀與之故云以國與季十二年叔姬歸于酅則紀季雖全得紀國亦不移就紀都紀之宗廟社稷皆遷之於酅承祀如本故為不滅雖云國祚不滅其實為齊所吞紀之器物財賄亦應為齊得成二年傳稱紀甗玉磬目之以紀得非滅紀所得也陸氏淳曰趙氏云失國而曰大去何也紀侯賢而無罪怙力者并之故力不足者君子不咎之也不曰出奔所以護紀惡齊也不書滅不絶其祀也其劉氏敞曰大去其國者何出奔不復出奔不復則曰大去其國何不使紀侯有奔之名也曷為不使紀侯有奔之名紀侯者仁人也不以所用養人者害人然則紀滅乎紀滅矣滅則其不言滅何以其未至乎滅而去也又曰公羊以謂滅也不言滅為襄公諱也非也文稱紀侯大去何以謂之滅乎蔡侯弒父惡莫大焉楚子討之書曰楚子虔誘蔡侯般者固惡其懷惡而討不義也紀侯九世之惡不深於蔡般齊襄懷惡而討不義不減於楚子而春秋深抑紀侯以難明之事専信齊侯以一偏之辭何哉且烹哀公者王也非紀侯也紀侯有罪罪在譖人不在烹人何滅紀以為賢哉以辨持之以曲通之公羊之義固勝以道觀之以義推之公羊之義未有一可也蘇氏轍曰公羊曰為齊襄諱也春秋為賢者諱何賢乎襄公復讎也齊哀公烹於周紀侯譖之於是九世矣世蓋有復九世之讎者乎襄公非志於復讎者也雖或以是為名春秋從而信之可乎胡氏寧曰伊川先生以大者紀侯之名罪其不能死社稷也吾恐紀侯以爭國為小而不為以去國為大而為之也紀侯為齊所逼雖其夫人在殯而不顧必不以儀章器物自隨欲假諸侯之禮以為重也其賢於爭地以戰殺人盈野者逺矣故不去其爵不書其名而曰大去其國以陳氏傅良曰諸侯去國恆書奔此其不書奔何不奔罪加紀侯也其不以奔罪加紀侯何罪齊也黃之會魯為之求成不得免焉遷郱鄑郚紀之不絶如線也紀季以酅入于齊猶不得免焉則有去而已矣失國如紀侯庶幾有辭焉故不以奔罪加紀侯也然則何以罪齊書曰紀侯大去其國未知紀之自亡與人之亡之與曰齊侯葬紀伯姬則齊亡之也張氏洽曰自桓之五年書齊鄭如紀以至莊元年三年凡關紀之存亡者一一備書紀侯圖存不獲團強暴之陵迫委宗廟於其弟而去之故特書大去而不曰出奔所以責強暴閔小弱而寓興滅繼絶之志也陳氏深曰紀為齊所迫未嘗不謀保其國或會盟或會戰來朝于魯結昏于周其用心至矣其如魯雖親不能為之援周雖尊不能為之保齊襄吞噬之志未已既遷紀之三邑紀侯又使其季以邑入齊為附庸以存宗祀而齊侯方且遇陳鄭以謀于垂紀侯知其力不能抗又不能下齊故大去其國以避齊難聖人以其無所失道迫于強暴不爭而去異乎失地之君而不名也春李氏廉曰大去之説左氏榖梁略同惟公羊以為秋大齊之復讎何氏注曰齊侯謂死為吉者復讎以死敗為榮也此語甚善但以論魯莊之復讎則可以論齊襄之復讎則不可蓋敵惠敵怨不在後嗣故胡氏以為傳者借此以深罪魯莊之不能復讎耳汪氏克寬曰大去者如荀偃云大還婦人見絶於夫家為大歸蓋凡可欲之物盡棄不顧往而不返也邵氏寶曰大去曷歸乎是時紀亡矣告者誰歟是故弗詳所如也案紀侯失國書爵書去説者以為憫紀而罪齊其義甚正公羊謂齊襄復讎故諱之而不書滅非春秋之旨也齊襄志在併紀肆行侵逼雖以王命臨之悍然不顧此王法之所必誅者而何以為之諱乎六月乙丑齊侯葬紀伯姬公羊外夫人不書葬此何以書隱之也何隱爾其國亡矣徒葬于齊爾胡傳葬紀伯姬不稱齊人而目其君者見齊襄迫逐紀侯使之去國雖其夫人在殯而不及葬然後襄公之罪著矣或曰葬之禮也而以為著其罪何也弒魯君滅其昏姻之國而葬其女是猶加創於人以手撫之也而可以為禮乎斥言齊侯賤之也或曰惡其詐也如紀似禮存季似義葬伯姬似仁惡似而非者惡莠恐其亂苖也集説杜氏預曰紀季入酅為齊附庸而紀侯大去其國齊侯攝伯姬之喪而以紀國夫人禮葬之孔氏穎達曰雖為齊侯所葬亦由魯往會之故書不書諡者亡國之婦夫妻皆降莫與之諡啖氏助曰內女之葬不書書者皆非常也也陸氏淳曰淳聞於師曰葬者臣子之事非由鄰國齊侯恃其強大并人之國而禮葬其妻是謂豺狼之行而為婦人之仁也孫氏復曰紀侯大去其國紀無臣子故齊侯葬紀伯姬齊侯不道逐紀侯而葬伯姬生者逐之死者葬之甚矣齊侯之詐也劉氏敞曰滅國不葬紀已滅矣其言葬紀伯姬何以齊侯之葬之著焉也齊侯滅紀則曷為葬其夫人為説也葬臣子之事也斥言齊侯而葬伯姬甚賤之也然則其為説奈何曰逐人之君而取其國為非所為以求媚説者也又曰穀梁曰吾女也失國故隱而葬之非也若但云葬紀伯姬者如穀梁説可矣今曰齊侯葬紀伯姬此非常文也此其重在齊侯不在吾女甚明危杜氏諤曰春秋之世法度無所稟強暴者恣其貪亡者無所託紀為齊所滅而伯姬為齊所葬聖人書之惡齊而憫紀也髙氏閌曰魯實伯姬父母之國既不能救其國恤其喪反使齊侯假以為名聖人以此罪魯文見乎此而起義在彼也胡氏寧曰上書齊師遷紀郱鄑郚又書紀季以酅入于齊又書齊侯鄭伯遇于垂下書齊侯葬紀伯姬滅紀之罪著矣呂氏祖謙曰內女不書葬而書葬者三宋共姬紀伯姬與叔姬皆非常也汪氏克寬曰書曰齊人則疑齊之微者往紀會葬揭齊侯之爵則知齊襄躬造紀之國都迫逐其君而徒葬其夫人以示恩也湛氏若水曰滅紀者齊也紀有伯姬之喪而滅之者亦齊也使其喪之無所歸而於我殯者亦齊也書之而齊侯之罪益著矣秋七月冬公及齊人狩于禚禚公榖作郜公羊公曷為與微者狩齊侯也齊侯則其稱人何諱與讎狩也前此者有事矣後此者有事矣則曷為獨於此焉譏於讎者將一譏而已故擇其重而譏焉莫重乎其與讎狩也於讎者則曷為將一譏而已讎者無時焉可與通通則為大譏不可勝譏故將一譏而已其餘從同同榖梁齊人者齊侯也其曰人何也卑公之敵所以卑公也何為卑公也不復讎而怨不釋刺釋怨也胡傳穀梁子曰刺釋怨也父母之讎不共戴天兄弟之讎不與同國九族之讎不同鄉黨朋友之讎不同市朝今莊公與齊侯不共戴天則無時焉可通也而與之狩是忘親釋怨非人子矣夫狩者馳騁田獵其為樂下主乎已一為乾豆其事上主乎宗廟以為有人心者宜於此焉變矣故齊侯稱人而魯公書及以著其罪集説王氏葆曰公及之狩志在公也來髙氏閌曰齊人齊侯貶人也齊侯自元年以見經者數矣前欲著其宣淫而無忌憚不可云齊人因與公狩始得一貶也狩以奉祭祀與人共之且不可況其親之讎乎不沒公而書及以深罪之獵薛氏季宣曰齊侯書人隱辭也不忍公之與讎會也何以知其為齊之君曰會獵遊田之事也遊田微者則君何為與之會會之非微者也吳氏澄曰於本國而非狩地且譏況越境而與讎人狩於彼國之地乎禚即二年薑氏與齊侯所會之地也莊公於是乎無羞惡之心矣人汪氏克寬曰公羊記柯之盟將會公謂曹子曰寡之生則不若死矣自傷與齊為讎不能復也然則禚之狩盍亦興念及此耶壬莊王辰八年五年齊襄九年晉緡十六年衛惠十一年黔牟七年蔡哀六年鄭厲十二年子儀五年曹莊十三年陳宣四年把靖十五年宋閔三年秦武九年楚文王熊資元年春王正月夏夫人薑氏如齊師榖梁師而曰如衆也婦人既嫁不踰竟踰竟非禮也胡傳師者衆多之地案齊詩載驅刺襄公無禮義盛其車服疾驅於通道大都與文薑淫之詩也其三章曰汶水湯湯行人彭彭魯道有蕩齊子翺翔彭彭者多貌也其四章曰汶水滔滔行人儦儦魯道有蕩齊子遊遨儦儦者衆貌也曰會曰享猶為之名也至是如齊師羞惡之心亡矣夫人之行不可復制矣春秋書此以戒後世謹禮於微慮患於早之意也集説孔氏頴逹曰於時齊無征伐之事不知師在何處蓋齊侯疆理紀地有師在紀杜云書姦姦發夫人當向紀地從之不言會者往其軍內就齊侯耳不行會禮孫氏覺曰薑氏會齊侯之惡春秋皆據實書之傳信後人也或會或享或如師一時之迹不侔而為行之惡則一王氏葆曰齊侯數出會淫以其無名乃興師而出託以侵伐之事文薑於是會之前此會禚享祝丘皆歷日而返故書月至此歷月而返故止書時次髙氏閌曰不言地者師之止無常也秋郳黎來來朝郳公作倪黎左作犂有郳杜注附庸國也東海昌慮縣東北郳城今昌慮城在兗州府滕縣東南六十里郳城在縣東六里左傳名未王命也公羊倪者何小邾婁也小邾婁則曷為謂之倪未能以其名通也黎來者何名也其名何微國也榖梁郳國也黎來微國之君未爵命者也胡傳郳國也黎來名也能修朝禮故特書曰朝其後王命以為小邾子蓋於此已能自進於禮矣集説董氏仲舒曰附庸字者方三十里名者方二十里孔氏穎達曰郳之上世出於邾國譜云小邾邾挾之後也夷父顔有功於周其子友别封為附庸居於郳曾孫黎來始見春秋數從齊桓尊周室王命為小邾子是孫氏復曰附庸之君例書字二十三年蕭叔朝公也此名者以其土地微陋其禮不足賤之也成劉氏敞曰郳者何小邾也小邾則曷為謂之郳未國謂之郳既成國謂之小邾王氏葆曰郳邾之别郳國小故與介同稱郳猶有禮介又不可以語此故介止言來而郳則兼曰朝張氏洽曰案宋仲幾云滕薛郳吾役也則郳蓋宋之附庸而不得與邾儀父同稱字者臨江劉氏以為未成國謂之郳其或然歟及李氏亷曰郳以僖七年書小邾子其來朝五此年僖七襄七昭三昭十七年也其後服役於宋何湛氏若水曰凡不朝王而私相朝會者皆非之此以取之曰已朝王也史未之傳耳觀王命以為小邾可見其朝矣案郳黎來書名三傳説同胡傳别自立義比於介葛盧揆以宋仲幾語不合故從刪節冬公會齊人宋人陳人蔡人伐衛左傳冬伐衛納惠公也公羊此伐衛何納朔也曷為不言納衛侯朔辟王也榖梁是齊侯宋公也其曰人何也人諸侯所以人公也其人公何也逆天王之命也胡傳桓公十六年衛侯朔出奔齊經書其名者以王命絶之也又黨有罪以納之故貶而稱人集説孫氏復曰此諸侯伐衛納朔也不言納朔者不與諸侯伐衛納朔也朔行惡甚國人逐之奔齊故天子不使反衛明年王人子突救衛是也公與諸侯連兵不顧王命伐衛納朔故貶諸侯曰某人人諸侯則公之惡從可是矣侯劉氏敞曰不言納衛侯朔不與納也諸侯失國諸納之正也有其實者居其名無其實者不得居其名有其名者享其功無其名者不得享其功納朔非正也納朔何以非正天子命黔牟矣為蘇氏轍曰不言納將言朔之入故也朔以殺二兄罪而諸侯納之言納則罪在納者而入者幸矣言入則罪在入者而納者亦未免也成十八年楚子鄭伯伐宋宋魚石復入於彭城言復入而不言納亦猶是也中程子曰諸國稱人違抗王命也貶諸侯則魯在其矣王氏葆曰不言公則若內之微者亦不足以見四國稱人之為君也故陳氏傅良曰不言納以朔入為重也入不言納是伐鄭納突伐衛納朔書入而已矣故吳氏澄曰三年齊師會魯伐衛以納朔而不克納今又會四國之兵以納之也以汪氏克寬曰成二年蜀之盟人諸國之大夫亦所人公也文九年救鄭人趙盾華孔亦所以人公子遂也大金氏賢曰衛朔殺二兄而自立逆王召而不往罪惡極莫此為甚天王廢之正也朔奔國人立其羣公子黔牟亦正也齊人以朔之在齊也乃違王命約五國以攻黔牟納衛朔果何義耶王人子突帥師禦朔以救衛亦正也五國乃敗子突之師納亂逆之賊卒使子突之師不勝王室之義不張黔牟以放泄職以死其無君之罪助亂之惡可勝誅哉故皆貶而稱人魯獨稱公者臣子之詞也案衛朔得罪於王而齊襄會諸侯以納之無王甚矣故春秋皆書人以貶之或以為諸侯非自行實是微者恐未足據蓋齊襄志在納朔桓十六年為黃之會莊三年又與魯會伐今則興師大舉糾集五國以抗拒王命必欲納朔而後己也安見其不自行乎癸莊王巳九年六年齊襄十年晉緡十七年衛惠十二年黔牟八年蔡哀七年鄭厲十三年子儀六年曹莊十四年陳宣五年把靖十六年宋閔四年秦武十年楚文二年春王正月王人子突救衛正月公穀作三月書救始此左傳六年春王人救衛公羊王人者何微者也子突者何貴也貴則其稱人何繫諸人也曷為繫諸人王人爾榖梁王人卑者也稱名貴之也善救衛也救者善則伐者不正矣胡傳王人微者子突其字也以下士之微超從大夫之例而書字者褒救衛也朔陷其兄使至於死罪固大矣然其父所立諸侯莫得而治也王治其舊惡而廢之可也又藉諸侯之力抗王命以入國是故四國之君貶而稱人王人之微嘉而書字或曰子突王之子弟也用兵大事而委諸子弟使無成功故書人以譏之必若此言是春秋以成敗論事而不計理也使諸侯茍顧逆順之理子突雖微自足以申王命矣彼既肆行莫之顧也雖天子親臨將有請從如祝聃者況其下乎子突不勝五國使之得入也其亦不幸焉爾矣幸不幸命也守義循理者法也君子行法以俟命故其褒貶如此集説杜氏預曰王人王之微官也雖官卑而見授以大事故稱人而又稱字范氏寧曰徐乾曰王人者卑者之稱也當直稱王人而已今以其能奉天子之命救衛而拒諸侯故加名以貴之僖八年公會王人齊侯是卑者之常稱兄孔氏穎達曰昭十二年傳稱叔孫昭子三命踰父則昭子之父叔孫豹再命也再命而名見於經知諸侯之卿再命三命皆書名一命乃稱人諸侯之臣既然則王朝之臣亦然周禮王之上士三命中士再命下士一命故杜以為劉夏石尚稱名氏者上士中士也稱王人者下士也僖八年公羊傳曰王人微者知此王人亦微者故云王人王之微官也春秋之世二字而子在上者皆是字故知子突是字救衛必以師救而文不稱師於例為將卑師少以卑官而帥少師救衛不能使衛侯不入是無功也無功而稱字者以朔既讒構取國而又不能於民王意即定黔牟不欲使朔得入故遣師救之子突雖則官卑蒙王授以大事故稱人而又稱字貴王人所以責諸侯也楊氏士勛曰王者有伐無救而云善者朔叛逆王命天子廢之立其嗣子而遣師往救有存諸侯之功故曰善不可以太平之法格之書啖氏助曰救者救其患難凡救患皆為美也考其法之不同則輕重之權衡見矣王人子突救衛為書救之始吳救陳為春秋之終世變又可知矣字劉氏敞曰王人者何微者也子突者何字也曷為貴之也曷為貴之以其任之重貴之也任之重則曷為貴之諸侯亂命納衛侯朔君子曰子突見正焉又曰子突討則不能服救則不能定春秋曷為貴之曰天下方無道賤奪貴少陵長天子不能禁者凡以紀綱失而賞罰不明也幸而發憤赫然以誅衛為事而諸侯成同類黨同行沮逆天子之命前雖貶之稱人未足以效王所為之是也故復託正於子突子突正則王正矣程子曰王人微者例不書字子突救衛而字之善之也善子突則善王命也救陳氏傅良曰自伐鄭以來王師不書其書救衛何衛無功也救衛無功而後王命益不行於天下昔者王嘗以一軍命曲沃伯為晉侯詩人美之而經不書以為天子宜廢置諸侯也天子而猶得廢置諸侯春秋可以無作而朔終以自立故曰救衛無功而後王命益不行於天下也張氏洽曰救衛者奉天王之命以存黔牟而拒朔朔搆兄篡國天討之所當加而子突能奉王命以救之春秋一經王旅之出而合司馬九伐之法者惟此一事所以雖微者帥師而書字以褒之也家氏鉉翁曰諸侯有國雖受之於父而其父若祖實受之於王故諸侯世子之立必稟於王或無嫡嗣以庶子為嗣亦必王命之而後得繼承於其國朔譖殺其兄而篡居其位旋為國人所逐二傳謂朔實得罪於王以奔黔牟之立嘗請命於王而王許之立矣今五國悖義亂常敗王師而納朔於衛是之謂逆春秋人五國而尊王人所以正五國無王之戮而衛朔之罪亦無所逃矣李氏亷曰通經書王人三胡氏曰王朝下士書人故救衛之王人與盟洮之王人皆下士也但救衛為義事則特書字盟洮不過奉命而出則但序公侯之上以尊王命耳至於翟泉之王人左氏以為王子虎則本非下士但春秋貶之而同於下士之例此變文也又曰通經書救二十三案左氏以子突為字徐乾本榖梁以子突為名名字雖殊其以為褒救衛則一也孔氏穎達謂二字而子在上者皆是字於理為近先儒多從之故當主左氏而穀梁及徐乾之説亦附見焉或以名字非褒貶所在則恐非經意程子固亦以書字為褒也夏六月衛侯朔入于衛左傳夏衛侯入放公子黔牟於周放寧跪於秦殺左公子泄右公子職乃即位公羊衛侯朔何以名絶曷為絶之犯命也其言入何篡辭也榖梁其不言伐衛納朔何也不逆天王之命也入者內弗受也何用弗受也為以王命絶之也朔之名惡也朔入逆則出順矣朔出入名以王命絶之也胡傳入有二義一難詞也一逆詞也朔藉諸侯之力連五國之師距王官之微者以復歸於衛其勢宜無難矣而書入者逆王命也春秋大義在於天下為公選賢與能而不拘大人世及之禮雖以正取國未之貴也況殺其兄又逆王命乎故衛朔書名書入以著其惡王人書字書救以著其善外則諸侯書人內則莊公書至而春秋之情見矣集説孔氏穎達曰凡諸侯外納有三一者以言語告請得入蔡季歸于蔡是也二者興師送入其國楚人圍成納頓子于頓是也三者所納之君别在他國而諸侯師伐彼國令其得入今公及諸侯伐衛是也與孫氏復曰衛侯朔得入于衛天子之威命盡矣公諸侯之罪不容誅矣故言伐言救言入以著其惡牟劉氏敞曰何以名絶曷為絶殺世子伋篡公子黔入者何逆辭也又曰傳曰君子以二公子之立黔牟為不度非也王人子突救衛春秋貴之則是黔牟王所欲立也篡王所立朔則有罪今朔不見貶而黔牟顧先蒙惡豈春秋意哉又曰朔故嘗有國矣入而不言復者不與復之意也為諸侯受之君君所不命而自取之雖有鄰國之助大亂之道也為此乃非所以復也張氏洽曰名之又書入與鄭伯突同篡逆之罪衛李氏亷曰春秋書奔君復國皆稱復歸鄭世子忽侯鄭衛侯衎皆與其復也衎初入夷儀不稱歸未得國也獨衛侯朔之入衛與鄭伯突入櫟同文故穀梁曰篡辭也然春秋於諸侯繼世有父命則得書即位齊景公逐陽生而立孺子荼與衛宣之殺伋夀而立朔一也陳乞之迎陽生與泄立黔牟一也春秋以陳乞君荼而陽生書入説者謂荼有父命則朔獨無父命乎由是觀之則雖有父命而亂倫失正又當以君命為重矣荼邵氏寶曰於衛朔見君命之重於齊見父命之重秋公至自伐衛公羊曷為或言致會或言致伐得意致會不得意致伐衛侯朔入于衛何以致伐不敢勝天子也榖梁惡事不致此其致何也不致則無用見公之惡事之成也集説蘇氏轍曰朔入而公至雖不言納而公之罪亦明矣張氏洽曰書至蓋公至自唐之意王誅若行齊魯宋衛皆當誅故書至以危之也篡家氏鉉翁曰出而至必告於廟禮也今公輔朔之而納之於衛又敗王師以歸一舉而二罪從之將何辭以告書至自伐衛不與其至也吳氏澄曰莊之出十有九其致者五譏也不致者十有四常事不書惡汪氏克寬曰師出經年黷武以抗王師考其時而自著螟冬齊人來歸衛俘俘公榖作寶左傳齊人來歸衛寶文薑請之也公羊此衛寶也則齊人曷為來歸之衛人歸之也衛人歸之則其稱齊人何讓乎我也其讓乎我奈何齊侯曰此非寡人之力魯侯之力也榖梁以齊首之分惡於齊也使之如下齊而來我然惡戰則殺矣胡傳俘者二傳以為寶案商書稱遂伐三朡俘厥寶玉則俘者正文也寶者釋辭也言齊歸衛寶則知四國皆受朔之賂矣春秋特書此事結正諸侯之罪也夫以弟弒兄臣弒君篡居其位上逆天王之命人理所不容矣彼諸侯者豈其弗察而援之甚力則未有以驗其喪心失志迷惑之端也及書齊人歸寶然後知其有欲貨之心而後動於惡也世衰道微暴行交作徇於貨寶賄賂公行使君臣父子兄弟終去仁義懷利以相與不至於篡弒奪攘則不厭也春秋書此結正諸侯之罪垂戒明矣集説孫氏復曰此衛寶也其言齊人歸之者齊本主兵伐衛故衛寶先入於齊齊人歸之魯人受之其惡一也玉劉氏敞曰衛寶者何衛之寶也古者分同姓以寶展親分異姓以逺方之職貢使無忘服此衛之寶則齊人曷為來歸之齊以不義取之衛以不義失之公之納朔也力故齊人歸於我也又曰郜之鼎雖在宋猶謂之郜鼎衛之寶雖在齊猶謂之衛寶尊天子之命貴先祖之守也天子所命先祖所守而喪之猶喪其土也茍喪其土則奚君矣納髙氏閌曰朔之奔齊侯容之其入也齊侯連諸侯之故以寶賂齊而齊以分於四國焉故主齊言之而曰來歸衛寶則同黨之罪各有所歸而齊為首惡胡氏銓曰諸侯逆王而納朔志乃在於衛俘蓋志於利則叛其君矣春秋書齊人歸俘以見諸侯之逆王命蓋本志於利也鼎家氏鉉翁曰桓莊二公皆黨篡逆以要厚賂宋之衛之寶其事之尤著者也李氏亷曰春秋嚴賄賂之禍魯齊陳鄭之立督也以郜鼎也魯齊宋陳蔡之納朔也以衛寶也晉平公以十一國會夷儀而與崔抒成也以宗器樂器也是三役者皆定篡弒也春秋於郜鼎書取蔽罪於魯也於衛俘書來歸首惡於齊也重邱之盟書同以同情罪伯主及諸侯則不必書所賂矣附録左傳楚文王伐申過鄧鄧祁侯曰吾甥也止而享之騅甥𥅆甥養甥請殺楚子鄧侯弗許三甥曰亡鄧國者必此人也若不早圖後君噬齊其及圖之乎圖之此為時矣鄧侯曰人將不食吾餘對曰若不從三臣抑社稷實不血食而君焉取餘弗從還年楚子伐鄧十六年楚復伐鄧滅之甲莊王午十年七年齊襄十一年晉緡十八年衛惠十三年蔡哀八年鄭厲十四年子儀七年曹莊十五年陳宣六年把靖十七年宋閔五年秦武十一年楚文三年春夫人薑氏會齊侯于防左傳文薑會齊侯于防齊志也榖梁婦人不會會非正也集説杜氏預曰文薑數與齊侯會至齊地則姦發夫人至魯地則齊侯之志黃氏震曰岷隱曰春會于防猶魯地也冬會于榖則齊地也一歲再會稔惡已極無知之禍行且及矣陳氏深曰師氏曰凡夫人與齊侯會享一一書之而不遺所以著其已甚也夏四月辛卯夜恆星不見夜中星隕如雨辛卯夜榖夜作昔見音現隕于閔反公作霣凡霣字後同左傳恆星不見夜明也公羊何以書記異也胡傳恆星者列星也如兩者言衆也人事感於下則天變動於上前此者五國連衡旅拒王命後此者桓文更霸政歸盟主而王室遂虛其為法度廢絶威信凌遲之象著矣集説何氏休曰列星天之常宿分守度周之四月夏之二月昏參伐狼注之宿當見參伐主斬艾立義狼注主持衡平也皆滅者法度廢絶威信凌遲之象杜氏預曰日光不匿恆星不見而云夜中者以水漏知之夜孔氏穎達曰夜者自昏至旦之總名但此經下言中則此言夜者夜未至中謂初昏之後耳非竟夜不見星也穀梁夜作昔傳曰日入至於星出謂之昔不見者可以見也必如彼言星出以前名之曰昔則名昔之時法當未有星矣何怪其不見而書為異也明經所言夜者夜昏之後星應見之時而不見耳公羊傳曰恆星者何列星也言天官列宿常見之星也於時周之四月則夏之仲春月令仲春之月日在奎昏弧中鄭康成云弧在輿鬼南則於時南方之星盡當列見謂常見之星者謂南方星也又曰漏者晝夜百刻於時春分之月夜當五十刻二十五刻而夜半也啖氏助曰星隕如雨謂奔流者衆如雨之多李陵云謀臣如雨皆言多耳之孫氏復曰恆星星之常見者也常見而不見此異大者隕墜也夜中星隕如雨謂隕墜者衆也雨劉氏敞曰如雨者言衆多不可為數也左氏云與偕也非也榖梁注以如猶而也言星隕且雨也亦非也春秋記星隕為異耳夜中而雨何足記乎榖梁云著於上見於下謂之雨以言雨螽可也以言雨雪則何著於上之有又曰著於下不見於上謂之隕以言隕石可也以言星隕則何不見於上之有公羊説不修春秋曰雨星不及地尺而復君子修之曰星隕如雨此妄語也若實尺而復無為不書同蘇氏轍曰星隕如雨衆也案歷代天文志記衆星隕者以為星隕如雨蓋無足怪也光朱子曰日見於晝星明於夜天道常理今夜有日常星不見此隂不隂陽不陽君不君臣不臣之應也舜張氏洽曰蓋王運將終而伯統方作之祥自此堯禹湯文武之紀綱法度掃滅殆盡矣吳氏澄曰恆星謂有名之經星星謂無名之衆星夜無日光則暗而星見晝有日光則明而星不見恆星不見者夜明如晝故也大星之常見者不見則小星之無名者亦無也隕謂自天而隕也李氏亷曰經書星隕隕石隕霜於隕字有先後之異者蓋星在天有象先見星而後見其隕石與霜皆隕而後見也汪氏克寬曰經星沒而不見乃天地常經泯滅之象衆星奔流乃諸侯放恣互相凌駕之證也是時王綱廢弛列國爭衡故天變應之經書星變者四皆變之大者也案星隕如雨言其隕之多也三傳之説俱有未協劉氏敞皆駁之其義甚精秋大水無麥苖公羊何以書記災也穀梁髙下有水災曰大水麥苖同時也胡傳書大水畏天災也無麥苖重民命也畏天災重民命見王者之心矣忽天災而不懼輕民命而不圖國之亡無日矣春秋所以謹之也集説孫氏復曰水不潤下麥與禾黍之苖同時而死故曰無麥苖非謂一災不書傷及二榖乃書也案傷一榖亦書定元年冬十月隕霜殺菽是也此聖人指其所災而實録耳劉氏敞曰曷為先言麥而後言苖麥苖同時麥成而先敗也何以書記災也又曰左氏曰不害嘉榖也非也大水無麥苖此聖人為記災而書耳言其不害嘉榖何益於教乎且隱元年例曰凡物不為災不書今不害嘉穀是水不為災也水不為災不應書大水也大水矣無麥苖矣而猶謂不害嘉榖罔也又曰公羊云一災不書待無麥然後書無苖非也若春秋一災不書豈愛民之謂乎歉杜氏諤曰洪範八政食為之先一榖不登禮謂之莊公不德屢致災異此年大水麥苖見害聖人録之以示憂民之教俾後世人君以重民命為心也孫氏覺曰二十八年麥禾之無經書曰大大者非常之辭麥苖之無以水災而無也災之所不及者猶有存焉不得曰大無也故無麥苖志之於秋見水災也大無麥禾志之於冬見歲凶也春秋一字聖人必盡心無茍然者也蘇氏轍曰是時麥熟五稼苖而未秀皆為水所害張氏洽曰書大水為異非常也蓋文薑宣淫隂盛不制之所感也周之秋今五月麥熟苖將秀因水漂盡故麥與苖俱無民食乏絶有國之大事故書之王氏樵曰案穀梁云麥苗同時也謂麥與五稼苖同為大水所漂而無收故書曰無麥苖冬夫人薑氏會齊侯于榖穀杜注齊地濟北穀城縣今山東兗州府東阿縣治故穀城是也榖梁婦人不會會非正也胡傳防魯地也穀齊地也初會于禚次享于祝丘又次如齊師又一嵗而再會焉其為惡益逺矣明年無知弒諸兒其禍淫之明驗也集説葉氏夢得曰夫人與齊侯八年而五相求自始孫于齊見一貶其後不復貶惡惡不再貶也張氏洽曰文薑元年以罪孫于齊後復宣淫自二年至今詳書于策敝笱載驅録于齊風論其時世與衛之鶉之奔奔牆有茨諸篇皆一時之事魯衛先王之後婦行放逸同播其惡于萬民夫子曰魯衛之政兄弟也蓋不特周公康叔之盛而其世衰俗薄末政之陵夷亦相似也其後慶父亂魯齊幾取之與衛滅同時聖人以魯事詳於春秋而齊詩及魯事者不刪夫二南之風后妃不待間而德足以化天下後世間有家之道廢而亡國敗家之禍同一軌轍詩春秋之旨蓋相表裏也汪氏克寬曰齊詩南山載驅刺襄公而皆曰魯道有蕩不一言之聖人於春秋一則曰夫人薑氏會齊侯二則曰夫人薑氏會齊侯雖國惡有不容諱其垂戒豈不逺哉書張氏溥曰二年于禚書冬十有二月四年于祝丘春王二月猶書月也五年夏如齊師則書時矣七年于防書春于榖書冬則時而數矣欽定春秋傳説彚纂卷七
