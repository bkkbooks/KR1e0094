body:
  text: 欽定四庫全書欽定春秋傳說彚纂卷六庚桓王十辰九年十有一年齊僖三十年晉緡四年衞宣十八年蔡桓十四年鄭莊四十三年曹莊公射姑元年陳厲六年把靖三年宋莊九年秦出子三年楚武四十年春正月齊人衞人鄭人盟于惡曹惡曹杜注地闕左傳齊衞鄭宋盟于惡曹胡傳盟㑹皆君臣之禮故微者之盟㑹不志於春秋凡春秋所志必有君與貴大夫居其間者也惡曹之盟即三國之君矣既不以道興師為郎之戰又結怨固黨為惡曹之盟故前書其爵而以來戰著罪後書此盟而以奪爵示貶集說孫氏復曰謀魯也矣孫氏覺曰去年之冬三國之君嘗伐魯而勝於此復為惡曹之盟但以新勝魯而結好耳謂之宋與盟於此九月必不執鄭祭仲與折之盟有夫鍾之㑹也左氏之說謬矣又曰前書齊人伐山戎後書齊侯來獻戎㨗則知伐戎者齊侯也上書㑹楚公子嬰齊于蜀下書及楚人盟于蜀則知盟蜀者楚公子嬰齊也十二月書齊侯衞侯鄭伯戰郎正月書齊人衞人鄭人盟惡曹以比事之法求之則三國之貶稱人可知也凡陳氏傅良曰此郎之諸侯也曷為戰稱君盟稱人一役而再見者但人之略之也猶曰上無天子下無方伯莫適為主則人自為盟而已矣鄭敗王師齊滅后之母家而衞亦抗子突以自立其無王甚矣自有參盟莫甚於惡曹故略之也趙氏鵬飛曰惡曹之盟同絶魯也然三國既伐魯何用復盟盖齊鄭忿魯連衞以伐之而衞嘗期魯為桃丘之㑹雖因齊而不克往齊鄭盖疑衞復與魯也故盟之其後齊僖鄭莊衞宣皆不通於魯則斯盟為固矣然以私忿絶魯歃血要神其為盟誣矣雖固何益哉同汪氏克寛曰鹿上之盟三國皆書人齊之盟清丘盟四國皆書人翟泉之盟七國皆書人蜀之盟十有一國皆書人澶淵之㑹十有二國皆書人未必皆微者茍皆微者則不書於經矣湛氏若水曰春秋無善盟盟者忠信之薄况結黨謀魯同惡相濟逞其私忿而不知聲罪致討之義乎案三國稱人以為微者固非矣或以為大夫亦無確據觀孫氏覺比事之法斷以經文則信乎為三國之君故獨主胡傳附錄左傳楚屈瑕將盟貳軫鄖人軍於蒲騷將與隨絞州蓼伐楚師莫敖患之鬭亷曰鄖人軍其郊必不誡且日虞四邑之至也君次於郊郢以禦四邑我以銳師宵加於鄖鄖有虞心而恃其城莫有鬭志若敗鄖師四邑必離莫敖曰盍請濟師於王對曰師克在和不在衆商周之不敵君之所聞也成軍以出又何濟焉莫敖曰卜之對曰卜以決疑不疑何卜遂敗鄖師於蒲騷卒盟而還鄭昭公之敗北戎也齊人將妻之昭公辭祭仲曰必取之君多内寵子無大援將不立三公子皆君也弗從貳杜注國名今在隨州應山縣境鄖軫杜注國名今在徳安府應城縣西鄖杜注國江夏雲杜縣東南有鄖城水經注溳水經安陸故城古鄖城也今為安陸縣屬湖廣徳安府蒲騷杜注鄖邑今在湖廣徳安府應城縣北三十里在絞杜注國名在今鄖陽府西北州杜注州國南郡華容縣東南今湖廣荆州府監利縣東三十里有州陵城蓼杜注蓼國義陽棘陽縣東南湖陽城今在河南南陽府唐縣南八十里城郊郢杜注楚地今湖廣安陸府治郢州故是其地也夏五月癸未鄭伯寤生卒左傳夏鄭莊公卒初祭封人仲足有寵於莊公莊公使為卿為公娶鄧曼生昭公故祭仲立之祭杜注鄭地陳留長垣縣東北有祭城今屬直隸大名府胡傳鄭莊公志殺其弟使餬其口於四方自以為保國之計得也然身沒未幾而世嫡出奔庶孽奪正公子五爭兵革不息忽儀亹突之際其禍憯矣亂之初生也起於一念之不善後世則而象之至於兄弟相殘國内大亂民人思保其室家而不得不亦酷乎有國者所以必循天理而不可以私欲滅之也莊公之事可以為永鑒矣集說俞氏皋曰莊公娶鄧曼生世子忽是為昭公又納宋雍氏女名雍姞生子突是為厲公又生子亹子儀昭公立四月而出奔厲公自宋入而立焉後厲公出奔國人弑昭公而立子亹齊侯殺子亹祭仲又立子儀秋七月葬鄭莊公集說杜氏預曰三月而葬速生高氏閌曰鄭忽既立不待五月而葬其父是亂階季氏本曰卒踰兩月而葬速也太不懷也其故何也必慮有爭焉耳盖嗣君為喪主諸侯㑹葬其位始定庶孽不敢爭矣故凡速葬者皆有故也九月宋人執鄭祭仲此書執之始左傳宋雍氏女於鄭莊公曰雍姞生厲公雍氏宗有寵於宋莊公故誘祭仲而執之曰不立突將死亦執厲公而求賂焉祭仲與宋人盟以厲公歸而立之公羊祭仲者何鄭相也榖梁宋人者宋公也其曰人何也貶之也胡傳祭仲鄭相也見執於宋使出其君而立不正罪較然矣何以不名命大夫也命大夫而稱字非賢之也乃尊王命貴正卿大祭仲之罪以深責之也其意若曰以天子命大夫為諸侯相而執其政柄事權重矣固將下庇其身而上使其君保安富尊榮之位也今乃至於見執廢絀其君而立其非所立者不亦甚乎任之重者責之深祭仲無所逃其罪矣集說何氏休曰宋不稱公者脅鄭之簒首惡當誅非伯討也劉氏敞曰何為或稱人以執或稱侯以執稱侯以執者伯討也稱人以執者非伯討也又曰公羊以謂知權非也若祭仲知權者宜效死勿聽使宋人知雖殺祭仲猶不得鄭國乃可矣且祭仲謂宋誠能以力殺鄭忽而滅鄭國乎則必不待執祭仲而劫之矣如力不能而夸為大言何故聽之且祭仲死焉足矣何故黜正而立不正以為行權乎蘇氏轍曰書曰宋人執鄭祭仲而繼之以突之入與忽之出仲以出君易死罪之也公羊曰祭仲何以不名賢其知權也夫以出君為知權亂之道也恒陳氏傅良曰祭仲以命大夫專廢置君曷為從其稱而不名春秋之褒貶名號不足以盡意則見於辭書曰宋人執鄭祭仲突歸于鄭鄭忽出奔衞其為辭也詳矣則從其恒稱不名可也受家氏鉉翁曰宋非方伯連帥鄭之執政非其臣屬其執而不怒盖共為盜姦外雖執而中則同也春秋先書宋人執鄭祭仲繼書突入忽出著仲為首惡也王氏元杰曰鄭忽以世嫡而嗣位突歸以庶孽而亂倫嫡既弱而無能庶則強而有援宋莊私愛而黨突祭仲被執以要盟仲既受付託於先公不能守死以輔君反忍奪嫡以立庶春秋稱人貶宋者惡其暴以正專執之誅書祭仲者貴命卿以大祭仲之罪突不書氏明其不能有國書忽繫鄭示其正而不君輕重權衡見矣李氏廉曰經書他國執他國大夫九祭仲鄭詹陳濤塗衞甯喜宋仲幾皆稱人以執不稱行人鄭良霄衞石買宋樂祁衞北宫結皆稱人以執不稱行人事各不同執而殺者二齊慶封陳千徵師也執内大夫四齊執單伯晉執行父意如婼也亂金氏賢曰祭仲鄭相也宋執之欲其廢正立邪以人國宋莊之不道甚矣春秋去其爵所以惡宋也祭仲見執惟知偷生之為安而不知死難之為義遂從亂以忘君其為不道亦甚矣春秋去其官所以惡仲也突歸于鄭左傳秋九月丁亥昭公奔衞己亥厲公立公羊突何以名挈乎祭仲也穀梁曰突賤之也曰歸易辭也祭仲易其事權在祭仲也死君難臣道也今立惡而黜正惡祭仲也胡傳突不稱公子絶之也小白入于齊則曰齊小白突歸于鄭何以不稱鄭突乎以小白繫之齊者明桓公之宜有齊也不以突繫之鄭者正厲公不當立也突不當立何以書歸于鄭乎春秋書歸有二義一易辭也一順辭也其書入亦有二義一難辭也一逆辭也突以庶奪正固為不順矣然内則權臣許之立外則大國為之援而世子忽之才不能以自固也則其歸無難故穀梁子曰歸易辭也集說孔氏穎達曰成十八年傳例曰諸侯納之曰歸知此為宋所納故曰歸也劉氏敞曰此鄭突也曷為不繫之鄭貶曷為貶鄭非突之所可號歸非突之所可名歸非突之所可名則其曰突歸于鄭何病祭仲也祭仲之為人臣也處則不能守出則不能權貪生而好勢廢正以立亂曰突歸于鄭者見突之挈乎祭仲者也歸者順辭也有易辭焉非所順而書歸易也入者逆辭也有難辭焉非所逆而書入難也突之易見祭仲之挈也交惡之又曰公羊曰其言歸何順祭仲也非也若仲之為者春秋之亂臣也如何順之乎曰程子曰突不稱公子不可以有國也歸陳氏傅良凡歸皆譏也莫甚於突故弗繫之鄭未有不繫國者突莊公子也而弗繫之鄭以為是簒鄭也家氏鉉翁曰鄭有君而突自外歸簒也削其公子不繫之鄭所以討也祭仲執而突歸突由仲而入也俞氏皋曰突不言鄭突不當有鄭也稱鄭忽言忽當有鄭也與書糾齊小白赤曹羈之義同年李氏廉曰經以簒而書歸者二此年突莊二十四赤執而歸者二僖三十年衞侯鄭成十六年曹伯也大國得封而書歸者二昭十三年蔡侯廬陳侯吳也書歸例惟穀梁得之公羊失於祭仲知權之說故以書歸為順祭仲之辭不可取汪氏克寛曰公羊謂歸者出入無惡入者出入惡復歸者出惡歸無惡復入者出無惡入有惡然突歸鄭赤歸曹不可謂無惡許叔入許天王入成周不可謂出入惡鄭忽曹襄出無惡魚石欒盈出入有惡則其說不可通矣季氏本曰宋人執祭仲突歸于鄭則突自宋歸可知文省而義自備矣鄭忽出奔衞此書奔之始公羊忽何以名春秋伯子男一也辭無所貶穀梁鄭忽者世子忽也其名失國也胡傳忽以國氏正也出奔而名不能君也集說何氏休曰既葬稱子合伯子男為一辭無所貶皆從子忽稱子則與諸侯改伯從子辭同於成君無所貶損故名也敞陸氏淳曰不稱子者責其不能嗣先君耳劉氏曰此鄭子也何以名貶曷為貶忽不子也忽不子者何逺君子近小人不能與賢者圖事權臣擅命放乎五世亂鄭者忽失為子之道也不蘇氏轍曰鄭忽未踰年之君也未踰年之君稱子稱子何也不能君也國人不附大國不援以至於出奔盖未嘗君也故不曰子氏程子曰忽以國氏正也不能有其位故不爵葉夢得曰何以不書爵未踰年也未踰年則何以不稱子不周乎喪也何以名别二君也一年不可以二君故未踰年之君未葬皆不以爵見内稱子其子般子野卒外稱子宋襄公以宋子㑹于葵丘陳懷公以陳子㑹于召陵是也未踰年雖既葬内亦稱子不名子赤卒稱子卒外亦稱子衞成公以衞子㑹盟于洮是也曠年不可以無君故踰年之君既葬稱爵鄭厲公以鄭伯㑹武父是也雖未葬亦稱爵衞惠公以衞侯㑹諸侯及魯戰宋共公以宋公㑹諸侯伐鄭是也未踰年而有事於諸侯不周乎喪而用吉禮則稱爵以見貶齊頃公以齊侯使國佐來聘鄭悼公以鄭伯伐許邾隱公以邾子盟于拔是也未踰年見迫逐不周乎喪而出奔則奪其子以見貶鄭忽出奔衞是也踰年見迫逐不周乎喪而出奔則奪其爵以見貶曹羈出奔陳莒展輿出奔吳是也立陳氏傅良曰鄭忽何不能為子也身為冢嗣而廢自權臣不可以言子矣是故書奔始於此也李氏廉曰經書君奔而名者三鄭忽曹羈莒展輿趙子曰忽羈不書爵言不能嗣先君也展輿雖踰年猶不書爵其罪大也又曰突簒位四年而出奔昭公以桓十五年入國其秋突因櫟人殺檀伯而入櫟據強都以窺鄭諸侯㑹于袲又㑹于曹以納之而弗克然突固分國以居矣十七年高渠彌弑昭公而立公子亹十八年齊人殺子亹祭仲逆子儀於陳而立之莊十四年突自櫟侵鄭傅瑕殺子儀及其二子而納焉於是鄭國之禍稍息四公子之事多不見經故具於此柔㑹宋公陳侯蔡叔盟于折折杜注地闕公羊柔者何吾大夫之未命者也集說杜氏預曰柔魯大夫未賜族者族孔氏穎達曰以柔不稱族與無駭相類是無可稱知其未賜族也也孫氏復曰柔不氏内大夫之未命者蔡叔蔡侯弟案諸侯母弟未命為大夫者皆字此年柔㑹宋公陳侯蔡叔盟于折十五年許叔入于許十七年蔡季自陳歸于蔡莊三年紀季以酅入于齊之類是也三葉氏夢得曰凡諸侯兄弟尊之則稱公子故大夫命以氏見公子之尊視大夫亦三命而後氏也親之則稱兄弟故或奔亡而責以恩或盟聘而譏以私則稱兄弟也其不以公子兄弟見者惟許叔紀季蔡季與此而四耳故陳氏傅良曰柔者何以大夫㑹諸侯盟於是始也貶之至公子結不貶矣吕氏大圭曰以大夫與諸侯盟此不待貶絶而自見者也故内大夫帥師自無駭始内大夫與諸侯盟自柔始叔李氏廉曰案陸氏例諸侯兄弟以國連字者有蔡許叔蔡季紀季皆國而字之言與君一體也是以蔡叔為蔡侯之弟矣而穀梁杜氏皆以為蔡大夫未命故名而不氏此未可知恐陸氏是又曰經書内大夫盟外諸侯九始於此所季氏本曰宋莊弑立本倚鄭莊然得國以來為鄭抑諸侯㑹盟不得與焉其積忿久矣故鄭莊卒即挾突以亂鄭將謂突立必助已也而鄭之羣臣猶足拒宋突為衆議所廹即絶宋交宋莊不得志於鄭故合三國以為盟將為圖鄭之計矣是盟也宋為主魯使大夫往既而五㑹桓公欲堅魯之志也盖鄭齊為黨宋得魯則齊兵不敢擬其後而宋可專意向鄭耳此折之盟所以為宋公志與公㑹宋公于夫鍾鍾公作童寧夫鍾杜注郕地今在山東兗州府陽縣盛鄉城春秋郕國其北有夫鍾里冬十有二月公㑹宋公于闞闞杜注魯地東平須昌縣東南今山東兗州府汶上縣西有闞亭在南旺湖中胡傳臣與宋公盟于折君與宋公㑹于夫鍾于闞于虛于龜皆存而不削何其辭費也曰盟者春秋所惡而屢盟以長亂㑹者諸侯所不得而數㑹以厚疑聖人皆存而不削於以見屢盟而卒叛數㑹而卒離其事可謂著明矣是故春秋之志在於天下為公講信修睦不以㑹盟為可恃也集說高氏閌曰公憾鄭忽而欲定突是以不憚屈辱力為鄭請宋亦數與公㑹皆非為國為民其罪均耳書家氏鉉翁曰二年之間兩盟四㑹惟宋之故春秋盟㑹未有若是頻數者也季氏本曰宋欲結魯讎鄭也必桓公懷疑故堅其志耳結卓氏爾康曰宋魯皆助突者折以下三盟皆宋莊魯爭鄭之計屢盟而厚疑胡氏之言是也是時鄭黨於齊宋非制齊難以圖鄭而魯方有戰郎之怨於齊陳蔡亦有積怨深恨於鄭故折之㑹宋欲得魯為應以防齊之議其後也張氏溥曰惡曹之盟齊衞鄭為郎之戰謀魯而固黨也宋亦與焉經不書左云闕也及觀柔盟于折公㑹于夫鍾于闞魯君臣於宋獨親然則惡曹之盟宋果不與未可知也參盟莫甚於惡曹屢盟莫甚於魯宋盟並無善焉辛桓王二已十年十有二年齊僖三十一年晉緡五年衞宣十九年蔡桓十五年鄭厲公突元年曹莊二年陳厲七年杞靖四年宋莊十年秦出子四年楚武四十一年春正月集說黄氏震曰書春正月以存四時之始夏六月壬寅公㑹杞侯莒子盟于曲池杞公穀作紀曲池公作毆蛇曲池杜注魯地魯國汶陽縣北有曲水亭今在曲阜縣東北四十里源出石門山集說程子曰杞侯皆當作紀隱二年紀莒盟于密是時紀謀齊難故魯桓與之盟莒以援之耳家氏鉉翁曰公穀以杞為紀是也隱公二年盟于密左氏注莒魯有怨紀侯既昏於魯使大夫盟莒以和解之紀莒以魯故而為盟有自來矣故吳氏澂曰紀為齊難危急甚矣魯桓切切為紀謀屢㑹焉而大國無與同心者此㑹也僅能與小弱之莒偕其不能為助而無救於紀之亡也盖可知矣俞氏皋曰書㑹而紀先序紀為主也者湛氏若水曰紀謀齊難不能自達於天子為魯桓當為之請於天子明下禁令各守封疆而齊不服從王命則當告於天子㑹於連帥而伐之何為㑹之紛紛而無益於救紀也故春秋書之以著其非秋七月丁亥公㑹宋公燕人盟于穀丘榖丘杜注宋地今在山東兗州府曹州北三十里左傳公欲平宋鄭秋公及宋公盟于句瀆之丘句瀆之丘杜注即穀丘也漢濟隂郡有句陽縣應劭曰即句瀆之丘今其地名句陽店集說杜氏預曰燕人南燕大夫十孫氏覺曰入春秋來燕未嘗見於經惟此與三年始見而稱燕人昭三年書北燕伯欵出奔齊言北燕則亦有南燕也北燕限於山戎自莊二十八年齊桓伐山戎之後始為燕開路得通中國是於此穀丘之盟北燕猶為山戎所隔杜預解之曰南燕大夫是也趙氏鵬飛曰南燕也黄帝之後入春秋盖未與諸侯通於此首與宋魯盟宋魯之盟為鄭謀也宋不義而魯不信兩無可從者至十三年乃遂從宋與魯鄭戰小國兵力有限而從不義之役兵敗之後不復見於經不知為何國所滅宋吳氏􅊹曰左氏以為魯欲平宋鄭然此盟必是魯燕三國别有他事相要約非為鄭賂之事盟也因是盟與宋公相見而為鄭致請焉耳將黄氏正憲曰去年宋與魯陳蔡為盟今又與燕盟以斷齊鄭之道也左氏乃云公欲平宋鄭何也盖是時齊鄭為黨齊謀吞紀桓公欲援之而不可得其欲乎鄭於宋者意欲圖鄭背齊合魯而隂援紀也計亦巧矣八月壬辰陳侯躍卒集說杜氏預曰厲公也十一年與魯大夫盟于折不書葬魯不㑹也壬辰七月二十三日書於八月從赴曰孔氏穎達曰躍為厲公世本文也莊二十二年傳陳厲公蔡出也故蔡人殺五父而立之五父即佗六年殺佗而厲公立也陳世家以佗與五父為二人言蔡人為佗殺五父及桓公大子免而立佗是為厲公立七年大子免之三弟躍林杵臼共弑厲公而躍立是為利公利公立五月卒林立是為莊公案傳五父佗一人而世家以為二人案經蔡人殺佗在桓公卒之明年不得為佗立七年也佗以六年見殺躍以此年始卒不得為躍立五月也既以佗為厲公又妄稱躍為利公世本本無利公皆是馬遷妄說也壬辰是七月二十三日上有七月書於八月之下如此類者注皆謂之日誤今云從赴者以其終不可通盖欲兩解故也同張氏洽曰去年與柔盟于折不書葬魯不㑹不恤盟也家氏鉉翁曰左傳謂蔡人殺陳佗而立厲公厲公即躍公羊何氏以躍為佗子故削其葬疑佗子未必為君公㑹宋公于虛虛去魚反公作郯州虛杜注宋地疑在睢境冬十有一月公㑹宋公于龜龜杜注宋地疑在睢州境左傳宋成未可知也故又㑹于虛冬又㑹于龜集說高氏閌曰公委宗社人民而五出與宋㑹諸侯臨涖一國之民民不可一日不治則國不可一日去之故先王之法諸侯無故不得出其四境朝事天子則出境天子巡狩則出境方伯率諸侯以征伐則出境若無事而出境則誅于葉氏夢得曰公始以柔㑹宋未幾復自㑹于夫鍾闞于穀丘夫鍾郕地闞魯地穀丘宋地也及是復㑹于虛于龜皆宋地而公即之盖自隱公以來我之相與為厚薄者惟宋與鄭黨鄭則伐宋善宋則伐鄭孰有立國如是而可久者乎暴戾則無親失道則寡援君子是以知桓公之不終也固汪氏克寛曰桓公屢至宋地強宋公之從而不已為屈辱然二盟四㑹皆以㑹宋為詞則是宋公有志於㑹盟矣盖宋之所以㑹魯者將以求賂於鄭而魯之所以㑹宋者將以為鄭免其賂是以卒不能降心以相從也魯桓憾忽于郎之戰幸鄭莊之卒欲求好於厲公而以恩結之厲公簒忽特欲反忽之所為而求善於魯以為之援耳故黄氏正憲曰案折闞夫鍾之㑹是宋欲親魯伐鄭數㑹於魯地宋為主也此龜虛之㑹是魯欲平宋鄭宋不受平故數㑹於宋地魯為主也案自折以下魯與宋四㑹二盟有以為魯志者左氏所謂欲平宋鄭也有以為宋志者穀梁所謂㑹者外為志也二說不同惟黄氏正憲謂始則宋欲親魯繼則魯欲為宋平鄭引宋魯地名以為證於情事為近丙戌公㑹鄭伯盟于武父武父杜注鄭地陳留濟陽縣東北有武父城水經注濟陽縣故武父城也今在直隸大名府東明縣西南與河南開封府蘭陽縣接界左傳宋公辭平故與鄭伯盟于武父集說蘇氏轍曰鄭伯突也突簒其兄而立春秋以君許之何也諸侯雖以簒得苟能和其民而親諸侯内外君之則以君書之不沒其實也雖君而實簒雖簒而實君皆因其實而已不然則否不能君也衞州吁陳佗是也命許氏翰曰王迹既熄霸統未興諸侯自擅無所禀觀隱十年見兵革之亂也桓十一年十二年見盟㑹之亂也霸統興而諸侯有所一無復此亂矣是以君子不得已而與桓文張氏洽曰與人交之道忠信誠慤本乎中則有不期合而合者其人非有是心則其相與也不過以利合而一旦爭小利則相視忽如讎敵然桓公之見棄於宋而盟鄭其離合正如是春秋詳書之以見王政不行諸侯放恣魯桓宋莊鄭厲皆以簒國而立交相盟㑹紛紛離合惟利是視煩盟瀆信祗以長亂王法之所必誅也其吕氏大圭曰突簒而書爵者諸侯雖以簒得國苟大臣君之其國人君之諸侯亦與之㑹盟春秋從而君之從其實也已趙氏鵬飛曰自突之入鄭四㑹兩盟皆為鄭謀而使宋鄭可平一盟足矣何以多為今屢盟數㑹而宋不肯平可以已矣乃寒前日之盟背前日之㑹盟鄭突而謀伐焉故詳書㑹宋一書㑹鄭以著允之惡者家氏鉉翁曰與齊衞伐魯戰于郎者忽也突簒忽也故善於魯自是魯鄭遂合程氏端學曰魯桓與宋兩盟四㑹不浹旬而背之以盟鄭反覆如是比事而觀其義自見季氏本曰鄭伯即突也此盟鄭求於魯也魯與宋合而宋無魯規則鄭受其害矣然鄭非許以棄齊則魯亦必不背宋魯與鄭合而鄭亦援紀矣桓公為紀之心此亦可見丙戌衞侯晉卒集說孔氏穎達曰春秋之中惟此重書日其餘亦應有一日兩事各書日名但更無其日不可復知計赴告之體本應皆以日告史官書策復應各書其日仲尼書經不以日月褒貶或略或詳非此所急故日月詳略皆依舊文此重書丙戌以舊史所重故因史成文爾孫氏復曰再言丙戌羨文也此盟與卒同日爾且經未有一日而再書者此羨文可知其劉氏敞曰曷為再日春秋故史也有所不革子曰事則齊桓晉文其文則史其義則丘竊取之矣為孫氏覺曰丙戌之日再見於經者誤文耳穀梁以決日義也案春秋不以日月為例有書之者但因舊史而詳略之耳穀梁謂之決日非也黄氏震曰再書丙戌國史成文也鄭夾漈曰丙戌一日也不應再書丙戌非後申則前子邵氏寶曰日同而地異故兩書焉即書者紀事之職追書者承赴之體也十有二月及鄭師伐宋丁未戰于宋左傳遂帥師而伐宋戰焉宋無信也君子曰苟信不繼盟無益也詩云君子屢盟亂是用長無信也公羊此偏戰也何以不言師敗績内不言戰言戰乃敗矣穀梁於伐與戰敗也内諱敗舉其可道者也胡傳既書伐宋又書戰于宋者責賂於鄭而無厭屢盟於魯而無信者宋也二國聲其罪以致討故書曰伐夫宋人之罪則固可伐矣然取其賂以立督者魯桓也資其力以簒國者鄭突也無諸己然後可以非諸人春秋之義用賢治不肖不以亂易亂也故又書曰戰于宋來戰者罪在彼戰于郎是也往戰者罪在内戰于宋是也集說啖氏助曰穀梁曰不言與鄭戰恥不和也不知省文之義故云爾孫氏復曰此公及鄭伯伐宋也不言公者諱之也地以宋則宋與戰可知也不出主名者不與公及鄭伯伐宋也故以魯鄭自戰為文凡公專尸其事則諱之此年及鄭師伐宋丁未戰于宋十七年及齊師戰于奚莊九年及齊師戰于乾時之類是也公劉氏敞曰孰及之公也戰者曷為或言公或不言戰而勝則言公言敗戰而不勝則不言公不言敗戰而敵則言公而不言敗也高氏閌曰内没公而稱及鄭不爵而稱師鈞其罪陳氏傅良曰此公及鄭伯也曷為前稱君後稱師略之也戰不言伐有不與戰則言伐如僖十八年宋曹衞邾伐齊而宋及齊戰是也未始有不與戰者而亦言伐則甚伐者也曰戰于宋薄宋之罪也張氏洽曰爭恨小故不忍憤怒謂之憤兵兵憤者敗魯桓鄭突此役是也趙氏與權曰魯軌弑隱宋馮弑殤鄭突簒忽三者皆逆賊周有常刑皆戮餘也故稱兵為戰見王法之不行也黄氏震曰戰于宋者魯鄭深入伐之而宋應之故戰耳八齊氏履謙曰戰伐不書主帥者凡九桓二年入杞年伐邾十年齊衞鄭來戰于郎此年及鄭伐宋十七年及齊師戰于奚及宋人衞人伐邾莊九年及齊師戰于乾時僖四年及江人黄人伐陳二十二年及邾人戰于升陘以上九事内省文者三以國與之者三闕文者三先書十有一月丙戌公㑹鄭伯盟于武父次書十有二月及鄭師伐宋先書夏公伐齊納糾次書八月庚申及齊師戰于乾時先書春正月公㑹諸侯伐楚次書秋及江人黄人伐陳皆一出而再有事其不書主帥者省文也戰于郎于奚于升陘郎奚升陘皆魯地或經以來戰為文或傳以疆事為解其不書主帥者國與之也桓二年入杞八年伐邾十七年再伐邾其不書主帥者闕文也吳氏􅊹曰宋莊貪得鄭賂之多而不許魯桓之請鄭突遂忘宋立已之恩與魯結黨為伐戰之舉魯桓棄屢㑹屢盟之好乃與舊怨之鄭興兵以讎宋交道之翻覆不常在匹夫猶不可況國君乎莒汪氏克寛曰桓平宋鄭不從而至於伐戰宣平郯不肯而至於伐取皆不能反已而求其本也今李氏廉曰宋莊之立以魯齊陳鄭之皆有賂故也責賂於鄭是以已之前日望鄭也春秋書郜鼎之取以見宋魯鄭之交以賂合書武父之戰以見宋魯鄭之黨以賂離吁嚴矣哉主趙氏汸曰春秋内外恒異辭伐者為客受伐者為由外言之也苟吾君在焉則不得從外辭案宋之戰左傳以為宋無信盖宋馮責賂無厭魯鄭可以聲罪而致討也然魯允鄭突皆簒弑之賊王法所當誅何得稱兵以擅伐人國乎胡氏安國曰往戰者罪在内也二說相兼其義始備附錄左傳楚伐絞軍其南門莫敖屈瑕曰絞小而輕輕則寡謀請無扞采樵者以誘之從之絞人獲三十人明日絞人爭出驅楚役徒於山中楚人坐其北門而覆諸山下大敗之為城下之盟而還伐絞之役楚師分渉於彭羅人欲伐之使伯嘉諜之三巡數之彭杜注彭水在新城昌魏縣後漢志房陵有筑水即彭水也故昌魏縣在今湖廣鄖陽府房縣西南江羅杜注熊姓國在宜城縣西山中後徙南郡枝縣今湖廣襄陽府宜城縣西二十里羅川城乃羅故國其在岳州府平江縣南三十里之羅城與長沙府湘隂縣接界者是後徙處也楚遷之枝江後漢志枝江侯國本羅國是也又自枝江徙長沙今岳州府平江縣南三十里有羅城長沙府湘隂縣東六十里亦有羅城乃接境處也壬桓王二午十一年十有三年齊僖三十二年晉緡六年衞恵公朔元年蔡桓十六年鄭厲二年曹莊三年陳莊公林元年杞靖五年宋莊十一年秦出子五年楚武四十二年春附錄左傳春楚屈瑕伐羅鬭伯比送之還謂其御曰莫敖必敗舉趾高心不固矣遂見楚子曰必濟師楚子辭焉入告夫人鄧曼鄧曼曰大夫其非衆之謂其謂君撫小民以信訓諸司以徳而威莫敖以刑也莫敖狃於蒲騷之役將自用也必小羅君若不鎮撫其不設備乎夫固謂君訓衆而好鎮撫之召諸司而勸之以令徳見莫敖而告諸天之不假易也不然夫豈不知楚師之盡行也楚子使賴人追之不及莫敖使徇於師曰諫者有刑及鄢亂次以濟遂無次且不設備及羅羅與盧戎兩軍之大敗之莫敖縊於荒谷羣帥囚於冶父以聽刑楚子曰孤之罪也皆免之賴後漢志襃信侯國有賴亭故賴國文獻通考頼國在襃信縣元省縣為鎮今在息縣東北其賴亭則在商城縣南息縣商城皆屬汝寧府光州盖地相接也杜注在義陽隨縣則去光州甚逺不知何據水鄢杜注鄢水在襄陽宜城縣入漢孔穎達曰鄢出新城沶鄉縣今湖廣襄陽府宜城縣南有宜城故城即古鄢國也南盧戎杜注南蠻即今中廬故城在湖廣襄陽府漳縣東五十里荒谷杜注楚地荆州記州東三里有三湖湖東有水名荒谷今在湖廣荆州府冶父杜注楚地水經注荒谷東岸有冶父城今治父城在荆州府東二月公㑹紀侯鄭伯已己及齊侯宋公衞侯燕人戰齊師宋師衞師燕師敗績穀梁其言及者由内及之也其曰戰者由外言之也戰稱人敗稱師重衆也其不地於紀也胡傳左氏以為鄭與宋戰公羊以為宋與魯戰穀梁以為紀與齊戰趙匡考據經文内兵則以紀為主而先於鄭外兵則以齊為主而先於宋獨取穀梁之說盖齊紀者世讎也齊人合三國以攻紀魯鄭援紀而與戰戰而不地於紀也不然紀懼滅亡不暇何敢將兵越國助魯鄭以増怨乎齊為無道恃强凌弱此以紀為主何也彼為無道加兵於己必有引咎責躬之事禮儀辨喻之文猶不得免焉則亦固其封疆效死以守上訴諸天子下告諸方伯連率與鄰國之諸侯其必有伸之者矣不如是而憤然與戰豈已亂之道乎力同度徳動則相時小國讎大國而幸勝焉禍之始也息伐鄭而亡鄭勝蔡而懼蔡大敗楚而滅今紀人不度徳不量力不徴詞輕與齊戰而為之援者弑君之賊簒國之人也不能保其國自此戰始矣春秋以紀為主省徳相時自治之意也集說杜氏預曰或稱人或稱師史異辭也衞宣公未葬惠公稱侯以接鄰國非禮也孔氏穎達曰戰稱將敗稱師是史䇿之常法也師是將之所帥故戰則稱將敗則稱師言其衆師盡敗非獨將身敗也自趙氏匡曰左云宋責賂於鄭責賂小事止當二國不和無容諸侯為戰也公羊曰曷為後日恃外也案先㑹而後日成㑹而後戰也恃外有何義乎又曰凡諸侯在喪而有境外之事以喪行者稱子以吉行者稱爵志惡之淺深也紀劉氏敞曰左氏曰宋多責賂於鄭鄭不堪命故以魯及齊與宋戰不書所戰後也非也若宋鄭相怨鄭為此戰者鄭當序紀上宋當序齊上何故反顛倒之乎公雖不及其㑹期而及其戰期自當没㑹地而舉戰地今何故反没戰地乎又曰鄭人來修好案魯鄭同好未嘗有隙何故忽修之是見明年㑹于曹因說此耳公羊云何以不地近也然則郎之戰非為近也明矣而曰郎猶可以不地不亦誣乎又曰其言戰從外也非也戰者聖王所有何故諱乎其意以為敗則言戰言戰則敗也今實不敗不可言戰故云從外矣不知凡書戰而不言敗績者乃諱敗耳書戰而言敗績者敗者他國也必言戰而後見其敗何得不言又何以為從外乎日蘇氏轍曰先言㑹而後言日既㑹而後戰㑹戰異也孫氏覺曰春秋戰必書地此不書地者戰於紀也紀為齊之侵削志欲滅之舉宋衞燕三國之師往伐之紀於是要魯鄭之君以為之敵然經不書所戰之地者以紀侯主兵而與之戰則是其戰在紀也吕氏大圭曰紀以垂亡之國而獲戰勝之功此可喜也齊以大國之威而蓄必報之怨甚可懼也桓公之所以為紀謀者既無以為固紀之道而徒挾鄭以戰幸而勝齊必將謂可固紀矣而不知所以促紀之亡者在此役也迨夫紀懼亡不給然後為黄之盟求以安紀亦晚矣陳氏深曰春秋首書公㑹公及罪之也四國之師衆若可勝也而皆敗績見衆之不可恃也宋吳氏􅊹曰昔鄭莊助齊謀紀者也魯桓數為鄭㑹繼又同鄭伐宋鄭厲徳魯故助魯救紀而反其父之所為李氏廉曰經書内外之戰二十三書敗績十五書戰例左氏曰皆陳曰戰胡氏曰兩兵相接曰戰書及例胡氏曰戰而言及主乎是戰者也趙子曰戰而言及以主及客也戰不言及交為主也書敗績例左氏曰大崩曰敗績何氏曰績功也諸說皆通季氏本曰齊鄭本一黨也及武父之盟鄭魯合則宋燕黨於齊衞矣齊欲滅紀魯援之故桓公與紀鄭合以與齊戰日在㑹後見其以㑹定日志在我也因王氏樵曰紀逼於齊鄭突以責賂而怨宋魯主紀怨忽而助突此一兵也齊謀紀忽嘗有功於齊故齊主之宋以賂怨突而忽奔衞故衞主之此一兵也志各有在相糾合為此戰非一紀能主兵也案是戰也三傳互異趙氏匡獨取穀梁而胡氏安國孫氏覺吳氏􅊹皆因之其說是也鄭康成謂紀當為已范氏甯引之以駁穀梁則鑿矣三月葬衞宣公胡傳葬自内錄也既與衞人戰曷為葬宣公怨不棄義怒不廢禮是知古人以葬為重也禮喪在殯孤無外事衞宣未葬朔乃即戎已為失禮又不稱子是以吉服從金革之事其為惡大矣凡此類據事直書年月具存而惡自見也集說劉氏敞曰君子怨不棄義怒不廢禮惡不忘親陳氏傅良曰凡君在喪恒稱子衞宣公未葬則其稱衞侯何不以居喪之禮出也紀家氏鉉翁曰衞宣公未葬而嗣子朔從諸侯及魯鄭戰敗績而歸乃葬其親甚矣衞朔之不仁也春秋不書衞子而以爵書絶之於名教也衞宣行同犬彘教之行於家者可知是不足深責而春秋垂法後世不容無責也吳氏􅊹曰二月己巳之戰齊紀為敵怨衞助齊滅紀魯為紀禦齊魯衞非敵怨也故不廢㑹葬之禮鄰汪氏克寛曰春秋在喪而出預㑹盟征伐及遣使國者有十此年衞惠㑹戰紀僖九年宋襄㑹葵丘二十五年衞成㑹洮二十八年陳共㑹溫三十三年晉襄敗秦師于殽宣十年齊頃使國佐聘成三年宋共衞定伐鄭四年鄭悼伐許定四年陳懷㑹召陵侵楚是也然宋襄衞成陳共懷皆稱子則見其未易吉服其罪猶可末減此年衞惠稱爵㑹戰則以吉服從戎其罪益甚矣然戰紀非朔主兵故直書而惡自見晉襄敗秦則忘親背惠墨衰絰而以詐取勝視朔尤甚故不稱爵而以微者紀之宋共衞定未葬而已越葬期齊頃鄭悼雖已葬而未踰年但直書而罪惡著矣夏大水集說高氏閌曰自堯有洪水之患使禹治之禹疆理天下正其經界有畎有澮有溝有洫有川有遂遂無水患但有其利故年之豐凶一係農力水旱不能為之害或天時久雨則由畎注澮由澮注溝由溝注洫由洫入川由川入遂以次疏導入河入江終至於海盖以決而不為災也或天時久旱則於溝洫川遂之間遞引其水以為灌溉又得其利焉春秋之時暴君汙吏壞其經界使畎澮溝洫之屬皆蕪而不治於是遇大水而無以決遇大旱而無以溉民為兵戰所驅無暇治田畝聖人書大水者上痛禹迹之亡下悼井田之廢生民受其患無以拯濟之也是王氏葆曰經書水災者九而桓居其二莊居其三大水之災二公居三之二矣豈桓公積惡不悛莊公釋讎不復怨氣蘊結有以致之歟張氏洽曰隂盛之災湛氏若水曰紀異也水隂之象也惡之象也小人之象也臣下之象也妻妾之象也人君可以省矣秋七月冬十月集說黄氏震曰書備四時癸桓王二未十二年十有四年齊僖三十三年晉緡七年衞惠二年蔡桓十七年鄭厲三年曹莊四年陳莊二年杞靖六年宋莊十二年秦出子六年楚武四十三年春正月公㑹鄭伯于曹左傳春㑹于曹曹人致餼禮也集說杜氏預曰以曹地曹與㑹所高氏閌曰公與鄭伯皆有簒逆之大惡天下不容今相㑹于曹曹之容惡可知也好張氏洽曰厲公比年與公連兵戰伐修怨故來求趙氏鵬飛曰突之立雖以宋而宋既憾之所與者魯而已一日失魯突其能固哉故求於魯為專前年之戰實受魯賜而敗宋師徳魯益深故今春㑹公而夏又來聘盖同惡相濟舍魯無可求援者也王氏葆曰公於鄭突比之至矣十二年屢㑹以平宋鄭而不克則為武父之盟為宋之伐十三年偕紀侯之戰今又㑹于曹同惡相濟明矣吳氏􅊹曰前年魯鄭同救紀而敗齊衞之師盖虞齊衞之報怨也故為㑹以謀之曹素與魯協故㑹鄭於其地在季氏本曰九年射姑來朝曹與魯協者也曹衞南東北為齊界亦伺齊衞之往來也無冰公羊何以書記異也穀梁時燠也胡傳案豳風七月周公陳王業之詩也其辭曰二之日鑿冰沖沖三之日納于凌隂四之日其蚤獻羔祭韭周官凌人之職頒冰於夏其藏之也固隂沍寒於是乎取其出之也賔食喪祭於是乎用藏之周用之徧亦理隂陽天地之一事也今在仲冬之月燠而無冰則政治縱弛不明之所致也故書於策夫春秋所載者皆經邦大訓而書法若此其察於四時寒暑之變詳矣集說何氏休曰周之正月夏之十一月法當堅冰無冰者溫也范氏甯曰皆君不明去就政治舒緩之所致五行傳曰視之不明是謂不哲厥咎舒厥罰常燠葉氏夢得曰水以孟冬始冰仲冬壯季冬盛二之日鑿冰沖沖壯也凡書以時者志春書以月者志正月二月春包三月也時不志冬始冰則或未冰也春不志三月以解凍則不冰也災張氏洽曰固隂沍寒之時而不冰隂不能成物之吕氏大圭曰古者藏冰發冰所以節陽氣之盛也十二月陽氣蘊伏錮而未發其盛在下則納冰於地中至二月四陽作蟄蟲起陽始用事則亦始啓冰而廟薦之及四月陽氣畢達隂氣將絶則冰於是大發食肉之祿老病喪浴冰無不及是以四時無愆陽伏隂淒風苦雨故夫藏冰發冰者燮調之一事也春秋之書無冰不獨志常燠之異而亦以見備暑之無其備也或謂開冰而書無冰豈有建寅之月遽開冰乎春秋所書螽蝝李梅實隕霜之類皆據目前之災異而志之豈必待開冰而後書無乎或者又援大無麥禾之例謂歲終㑹計而後書大無麥禾猶開冰而後書無冰也不知大無麥禾與書大有年為一類謂歲終㑹計而後知也開冰之事亦可與㑹於歲終者比乎政家氏鉉翁曰春秋書無冰者凡三皆在春月以冰不舉而書也解俞氏皋曰此亦見是周月紀事若夏正月則東風凍宜無冰也必周正月夏之十一月也當冰而不冰冬溫也然冰亦國所有用之物無則國用不給是以書之汪氏克寛曰此年正月書無冰成元年二月書無冰襄二十八年書春無冰則知因陽盛氣燠而隨時以紀之苟以發冰而知無冰則富常以二月而不在正月矣若曰或藏冰無冰而書無或發冰無冰而書無抑何紀事之錯亂乎劉氏實曰凡不宜無曰無明陳氏宗之曰天官占云燠而無冰則政治縱弛不之所致也又劉向曰周失之舒秦失之急故周衰無寒歲秦滅無燠年夏五公羊夏五者何無聞焉爾穀梁孔子曰聽逺音者聞其疾而不聞其舒望逺者察其貌而不察其形立乎定哀以指隱桓隱桓之日逺矣夏五傳疑也胡傳夏五傳疑也疑而不益見聖人之慎也故其自言曰吾猶及史之闕文也其語人曰多聞闕疑慎言其餘則寡尤而世或以私意改易古書者有矣盍亦視此為鑒可也然則春秋何以謂之作曰其義則斷自聖心或筆或削明聖人之大用其事則因舊史有可損而不能益也集說杜氏預曰不書月闕文曰啖氏助曰夏五之下必知脫月字孫氏復孔子作春秋專其筆削損之益之以成大中之法豈其日月舊史之有闕者不隨而刋正之哉此云夏五無月者後人傳之脫漏爾疑劉氏敞曰何以不益疑也春秋信以傳信疑以傳家氏鉉翁曰此修經以後之闕文若舊史有闕聖人必修之矣其邵氏賢簡曰夏五何傳疑也是簡闕何可疑者因無疑而傳之示萬世傳疑之法也況真有疑者乎案夏五或以為闕月字或以五為羨文或以為聖人因史闕文或以為後人傳寫脫漏皆傳疑之意也鄭伯使其弟語來盟語穀作禦左傳鄭子人來㝷盟且修曹之㑹穀梁諸侯之尊弟兄不得以屬道其弟云者以其來我舉其貴者也來盟前定也胡傳來盟稱使則前定之盟也其不稱使如楚屈完齊高子則權在二子盟不盟特未定也諸侯之兄弟例以字通而書名者罪其有寵愛之私非友于之義也集說孫氏復曰來盟者求盟於我也於蘇氏轍曰凡外大夫來盟於魯内大夫涖盟他國皆盟其君也大夫而盟其君禮乎禮諸侯不親盟於他國大夫即盟於他國非敵君也雖盟其君可也孫氏覺曰春秋諸侯使其弟來者皆罪其不當使也弟而可使則命而使之可也不命而使之徒曰弟焉罪之也來盟者盟於魯也春秋主我使自外而至盟者書曰來盟不言其地盟於我之國都也程子曰使來盟盟前定矣與高子不同欲高氏閌曰來盟於我彼欲之之辭也涖盟於彼我之之辭也鄭魯同惡而屢盟可惡之甚也欲趙氏鵬飛曰突之立於鄭内恃祭仲而已國人不也外恃魯而已鄰國不與也春秋書來盟者凡六皆屈己而求盟於我也鄭非無大夫而必使其弟則知諸大夫有所不心乎突也趙氏與權曰請㑹矣又請盟焉突盖徳軌之排宋而黨已也李氏廉曰來盟例五鄭語衞良夫稱使者前定之盟也謂已有約言未足效信而釋疑復遣使固結之也楚屈完齊高子不稱使者權在二子謂齊楚二君遣使之時未常有命令盟也宋華孫不稱使者華孫權臣專行不受君命也屈完非來魯亦書來者内桓師也又曰語後為子人氏鄭昭公之禍以羣弟之多寵也今厲公奪嫡又復私愛子人使交政諸侯何不鑑覆轍乎觀甯母之役鄭子華言於齊桓曰洩氏孔氏子人氏實違君命君若去之以為成則子人氏之專懽於鄭可知矣盟汪氏克寛曰大夫因聘而盟則先書聘而後書及非聘而特來結盟則但書來盟然皆所以著大夫之敵君也案穀梁謂前定之盟不日非也春秋不以日月為例二百四十二年之間盟不書日者多矣前定不日豈書日者皆非前定乎來盟有書使者有不書使者鄭語衞良夫奉使而來意主於盟以為前定可也齊高子楚屈完宋華孫皆臨事制宜安得以為前定乎故凡以不日為前定者皆不錄而來盟不書使者俱刪前定之說秋八月壬申御廩災公羊御廩者何粢盛委之所藏也御廩災何以書記災也胡傳門觀災而新作則書御廩粢盛之所藏其新必矣何以不書營宫室以宗廟為先重本也御廩災而新則不書常事也以為常事而不書垂教之意深矣知其說者然後知有國之急務為政之後先雖勤於工築而民不怨勞與妄興土木困民力以自奉者異矣集説杜氏預曰御廩公所親耕以奉粢盛之倉也天火曰災孔氏穎達曰傳稱御廩災乙亥嘗書不害也明嘗之所用是御廩之所藏也禮記祭義云天子為籍千畝諸侯百畝躬秉耒以事天地山川社稷先古敬之至也月令季秋乃命冢宰藏帝籍之收於神倉鄭康成云重栥盛之委也帝籍所耕千畝也藏祭祀之穀故為神倉以此諸文知御廩藏公所親耕以奉粢盛之倉也廩即倉之别名周禮廩人為倉人之長其職曰大祭祀則共其接盛鄭康成云接讀為扱扱以授舂人大祭祀之穀籍田之取藏於神倉者不以給小用是公所親耕之粟擬共祭祀藏於倉廩故謂之御廩劉氏敞曰御廩者何粢盛委積之所藏也災者火也其謂之災何也猶曰天戒之鬼神害之云爾高氏閌曰御廩災此將不得奉其宗廟之祥也君躬耕夫人獻穜稑以供粢盛而災焉咎在君夫人矣宗廟鬼神之怒兆見於此吳氏􅊹曰君之在車與御者最相親近故君所親近之人謂之御君所親用之物亦謂之御御廩者以貯人君躬耕籍田之米專供宗廟之粢盛而不敢他用者桓李氏廉曰經書内災六御廩西宫新宫雉門兩觀僖宫亳社也外災六齊一成周一宋二陳一宋衞陳鄭同日一也汪氏克寛曰御廩西宫新宫亳社譏不能戒謹而致災也雉門兩觀桓宫僖宫譏其非禮而宜災也乙亥嘗公羊常事不書此何以書譏何譏爾譏嘗也曰猶嘗乎御廩災不如勿書而已矣穀梁御廩之災不志此其志何也以為唯未易災之餘而嘗可也志不敬也天子親耕以共粢盛王后親蠶以共祭服國非無良農工女也以為人之所盡事其祖禰不若以己所自親者也何用見其未易災之餘而嘗也曰甸粟而内之三宫三宫米而藏之御廩夫嘗必有兼甸之事焉壬申御廩災乙亥甞以為未易災之餘而嘗也胡傳嘗祭時事之常則何以書志不時與不敬也春秋紀事用周月而以八月嘗則不時也御廩災於壬申而嘗以乙亥是不改卜而供未易災之餘則不敬也禮以時為大施於事則不時禮以敬為本發於心則不敬故書集說杜氏預曰先其時亦過也曰孔氏穎達曰八月建未未是始殺趙氏匡穀梁云御廩之災不志案此乃大故何得不志左氏曰書不害也案八月嘗非時也又以災之餘而祭譏不敬也非為不害而書祭葉氏夢得曰不書月䝉上文廩張氏洽曰四時之常事耳今書者以壬申有御災之變遇災而懼未可以遽有事於祖考況祭祀用夏時此八月乃夏之六月未當時祭何為汲汲然以四日之間遽舉嘗祭乎其無誠敬之心而所以供粢盛者苟簡滅裂概可見矣春秋特書以責其奉宗廟之不誠且不敬也著趙氏鵬飛曰災與嘗自二事爾災以著天變嘗以不時趙氏與權曰御廩之災在致齋三日之前春秋書之盖以嘗之不謹而災於齋之日也非李氏廉曰三傳惟穀梁得之而夫人兼甸之說亦公羊以為不如勿嘗而注者以為宜廢祭自責謬矣左注尤失實苟不害何必書乎故胡氏不時不改卜之說主趙子之汪氏克寛曰郊禘諸侯之所不當祭故孔子云魯郊禘非禮也嘗社諸侯之常祭故春秋一書嘗譏以災餘之米供粢盛四書社皆以日食大水鼓用牲之非禮而志之不書祭社以為常事也漢儒因中庸以郊杜禘嘗並言又見春秋書郊社禘嘗故傅㑹以為皆僭禮然春秋書烝書嘗豈以嘗獨為重祭而烝非重祭乎嘗而謂之大春秋何以不書大乎案公羊不如勿嘗乃甚言其嘗之不敬豈真以嘗為可廢乎趙氏匡劉氏敞蘇氏轍並駁之恐非公羊立言之旨也穀梁所謂未易災之餘者以御廩所藏為奉祭時既舂之米故曰甸粟而納之三宫三宫米而藏之御廩劉氏權衡駁之云壬申之日災乙亥之日嘗嘗之粟出廩久矣乃其未災者何謂災之餘乎此則以御廩所藏為未舂之粟也考周禮廩人之職曰大祭祀則共其接盛鄭康成云扱以授舂人是御廩所藏固未舂也權衡之說似較穀梁為勝然遇災後不改卜而遽嘗則無誠敬之心故不時不敬二義先儒多兼用之冬十有二月丁巳齊侯祿父卒宋人以齊人蔡人衞人陳人伐鄭公蔡人在衞人下左傳冬宋人以諸侯伐鄭報宋之戰也焚渠門入及大逵伐東郊取牛首以大宫之椽歸為盧門之椽牛首杜注鄭邑今河南開封府陳留縣西南十一里有牛首城公羊以者何行其意也穀梁以者不以者也民者君之本也使人以其死非正也胡傳師而曰以者能左右之以行己意也宋怨鄭突之背己故以四國伐鄭魯怨齊人之侵己故以楚師伐齊蔡怨囊瓦之拘己故以吳子伐楚蔡弱於吳魯弱於楚宋與蔡衞陳敵而弱於齊乃用其師以行己意故特書曰以列國之兵有制皆統乎天子而敢私用之與私為之用以伐人國大亂之道也故穀梁子曰以者不以者也集說杜氏預曰凡師能左右之曰以大宫鄭祖廟盧門宋城門告伐而不告入取故不書范氏甯曰不以者謂本非所得制今得以之也刺四國使宋專用其師輕民命也孫氏復曰案十二年及鄭師伐宋丁未戰于宋宋人怨突之背己也故以齊人蔡人衞人陳人伐鄭以者乞師而用之也謂四國本不出師宋以力弱不足以乞四國之師而伐鄭爾僖二十六年公以楚師伐齊取穀定四年蔡侯以吳子及楚人戰于栢舉皆此義也然四國從宋伐鄭助其不道其惡亦可見矣劉氏敞曰以者何行其意也貴則行乎賤大則行乎小衆則行乎寡此皆微者也其言以何宋公也宋公則其稱人何貶曷為貶君之伐國者不斬祀不殺厲不堙井正之而已矣宋公伐鄭殘其郊牧焚其城郭隳其大宫取其椽以歸為盧門之椽是暴而已矣又曰書宋人以齊人則足以知宋人者宋公也書晉人及姜戎則足以知晉人者晉侯也文不虛出必有其指緣於文以求其指則得之矣宋公殘人之國而毁其宗廟晉侯背父之殯而覆人之師其罪一也夢王氏沿曰入而書伐鄭亦有罪致其伐耳葉氏得曰伐何以言以己不能敵而假人以為用也徳不足服於人而以人義不可服於人而為人所以是謂以私濟私皆失政也四國何以皆稱人微者也時齊侯卒矣而未葬齊非君則三國亦非君也宋公何以稱人貶也殘人之宗廟以大宫之椽為盧門之椽君子以為與吳入郢者何擇故吳子與國宋公稱人其罪一也高氏閌曰折之盟陳蔡在焉紀之戰齊衞在焉皆與宋同惡者也宋公不道執人之卿易人之君深怨突之背己而自量其力不足以加之於是復以齊蔡衞陳之兵伐鄭宋公之罪斯為尤重胡氏寧曰齊桓晉文戰勝天下威服諸侯固能左右諸國之師非以弱假強故不言以之陳氏傅良曰伐未有言以者則其言以何用諸侯師於是始也東遷之後諸侯雖㑹伐非一國之志也非一國之志也則㑹者序爵而已矣雖主兵也而小國序大國之上亦非一國之志也以一國而用諸侯之師於是始吕氏大圭曰齊方有喪而㑹伐惡之甚者矣齊趙氏鵬飛曰宋於鄭初以為親終以為讎為利也蔡衞陳輕民之命而為他人役是以聖人惡之一舉而書人君臣同一貶焉其法盖嚴矣宋家氏鉉翁曰書以有貶者有襃者此貶也春秋坐以兵首責宋亦責四國也四國以其民為宋人役賊其民者也定四年蔡昭侯以吳師伐楚為其復世讎摧強楚故許之以之一字不可以例觀為陳氏深曰宋用四國之師而左右死生唯宋人之聽比於平日諸侯各率其師以伐人者又不同故書以别之結程氏瑞學曰宋莊之罪著矣然鄭突忘立己之恩魯以伐宋以致交怨報復殺戮無辜突真薄徳哉鋒汪氏克寛曰或謂言以者用彼師伐戰而已不交盖泥於左傳記柏舉事皆吳楚自戰故云爾盖蔡師微弱故不詳錄也夫苟不自交鋒則非能左右之謂矣況傳稱宋以大宫椽歸為盧門椽經書魯取穀則非不交鋒之驗也季氏本曰蔡陳與宋盟折者也衞與齊盟惡曹者也今合為一黨宋莊公當鄭莊公存日畏不敢為及鄭莊卒遂與鄭讎至是齊僖又卒遂侈然雄長而能以四國之兵矣伐鄭所以報厲公連年之怨也甲桓王二申十三年十有五年齊襄諸兒元年晉緡八年衞惠三年蔡桓十八年鄭厲四年曹莊五年陳莊三年杞靖七年宋莊十三年秦武公元年楚武四十四年春二月天王使家父來求車左傳非禮也諸侯不貢車服天子不私求財公羊何以書譏何譏爾王者無求求車非禮也穀梁古者諸侯時獻於天子以其國之所有故有辭讓而無徴求求車非禮也求金甚矣胡傳遣使需索之謂求王畿千里租稅所入足以充費不至於有求四方諸侯各有職貢不至於來求以喪事而求貨財已為不可況車服乎經於求賻求車求金皆書曰求垂後戒也集說何氏休曰王者千里畿内租稅足以供費四方各以其職來貢足以尊榮當以至廉無為率先天下不當求求則諸侯貪大夫鄙士庶盜竊周孫氏復曰天王使家父來求車者諸侯貢賦不入室材用不足也不劉氏絢曰世之治也天子命貢賦於天下而無敢從無有求也諸侯奉貢賦於天子而無敢不共不至於來求也世亂反此書此以見王室之微而著諸侯之辜也葉氏夢得曰古者車有器貢用有貨貢諸侯不貢而伐之正也不能伐之又從而求焉器不足而求車用不足而求金非所以王天下也路張氏洽曰古者諸侯有功則車服以庸盖王之五自同姓以下其用之皆有等差非諸侯所得而私為況可以天子之尊而下求於列國乎上越禮以求之下違法而供之則示貪風於天下其失自上非小故也故特書示譏家父為大夫無所正救奉使侯國自取辱命之罪具見矣家氏鉉翁曰以天王之尊而徴需猥及於不稟命之侯始而求賻繼而求車繼而求金以求書者見成周號令不行於當時而遜詞以有求深責諸侯之無王也以吳氏􅊹曰車重器也天子可以之錫下諸侯不可之貢上也使當貢之物諸侯不供而天子乏用猶不當遣使以私求況諸侯不當貢之物而可求乎哉趙氏恒曰左氏言諸侯不貢車服而周官却有服貢先儒謂周禮後出雖左氏亦未之知也然此不須問其當貢與否雖當貢者不至亦不當來求如賻豈非諸侯所宜歸然不歸豈可求也胡氏謂以喪事求貨財已為不可況車服乎當時諸侯雖不臣恐職貢亦未必不至不然則包茅不入齊桓安得假之以伐楚乎大抵此求車是為桓王喪具乃在服貢之外命張氏溥曰武氏子來求賻不稱使當喪未君非王也家父稱使則王命矣天子五路不出列國諸侯九貢不供王車求之何為至文公九年頃王使毛伯求金世彌降則求彌下悲哉三月乙未天王崩集說何氏休曰桓王也告趙氏匡曰此後莊王僖王不書崩見王室不魯之不赴著諸侯之不臣也周俞氏皋曰周桓王崩太子佗立是為莊王趙氏曰嗣王即位皆不書不能令於天下也諸侯之不臣而莫之臣也哀王道積微而莫之興也大趙氏汸曰七年而後克葬則諸侯不王之罪矣夏四月己巳葬齊僖公集說王氏葆曰桓負大惡王非惟不討而八年之間三遣使來聘恩禮厚矣今王崩來赴魯無奔喪㑹葬之事齊僖之存干戈歲㝷卒則㑹葬如禮比事以觀不貶而惡自見高氏閌曰魯不供天王之喪而㑹齊僖之葬其顚倒甚矣五月鄭伯突出奔蔡左傳祭仲專鄭伯患之使其壻雍糾殺之將享諸郊雍姬知之謂其母曰父與夫孰親其母曰人盡夫也父一而已胡可比也遂告祭仲曰雍氏舍其室而將享子於郊吾惑之以告祭仲殺雍糾尸諸周氏之汪公載以出曰謀及婦人宜其死也夏厲公出奔蔡公羊突何以名奪正也穀梁譏奪正也胡傳案左氏祭仲專鄭伯患之使其壻雍糾殺之雍姬知之以告仲仲殺雍糾公出奔蔡是祭仲逐之也没而不書其義何也陸淳曰逐君之臣其罪易知也君而見逐其惡甚矣聖人之教在乎端本清源故凡諸侯之奔皆不書所逐之臣而以自奔為名所以警乎人君其說是也集說杜氏預曰突既簒立權不足以自固又不能倚任祭仲反與小臣造盜賊之計故以自奔為文罪之也舊孔氏穎達曰凡諸侯出奔皆被逐而出非自出也史書臣以逐君仲尼修春秋責其不能自固皆以自奔為文衞獻公出奔不名鄭伯突及北燕伯欵蔡侯朱等皆書名者從彼告詞故釋例曰衞赴不以名而燕赴以名隨赴而書之凡孫氏復曰突厲公也簒忽立國人不與故出奔蔡諸侯不能嗣守先業以墮厥緒荒怠淫虐結怨於民上下乖離播越失地自取奔亡之禍者皆生而名之此年鄭伯突出奔蔡昭二十一年蔡侯朱出奔楚二十三年莒子庚輿來奔哀十年邾子益來奔之類是也劉氏敞曰突何以名奔而名者見有君也忽未入則其曰有君何忽雖未入國固其國也蘇氏轍曰諸侯不生名突之名失地也突將殺祭仲不克而出諸侯之出奔必有出之者矣言其出不言其出之者何也君實有國而出於臣臣雖有罪而君至於失國自取之也曰程子曰避祭仲而出非國人出之也陳氏傅良春秋之法苟其道足以失國雖有權臣亦以自致之文書之是故鄭祭仲殺雍糾而突出衞孫林父殺子蟜子伯子皮而衎出燕大夫殺外嬖而欵出書奔而已矣張氏洽曰凡為國君而失位出奔者春秋皆以自出書之其書爵不名者罪輕惡淺雖曰失道而其位為未絶若突以庶孽奪嫡固不可以有國又為反覆盜賊之計以自取亡盖王法之所當誅故特書其名以絶之也陳氏深曰突既欲殺祭仲而不克故畏而出奔稱鄭伯著其已簒立而鄭之臣子嘗君之也汪氏克寛曰春秋書君出奔者十有二鄭突衞朔燕欵蔡朱莒庚輿邾益皆書名啖氏所謂君奔例書名言其失地非復諸侯也鄭忽曹羈莒展輿不稱爵者忽羈未成君展輿雖踰年而以弑立不可稱爵也衞鄭不名則以叔武攝而位未絶也衞衎位已絶而不名者著衎之立以正非突朔之比而剽之簒實逆非如忽黔牟可以兩君言之也郕朱儒不名小國記錄簡略耳案逐突者祭仲也不書仲逐其君而書鄭突出奔者春秋誅討亂賊嚴君臣之大分不使賊臣得以逞志於其君故以自奔為文也胡𫝊本陸氏淳謂所以警乎人君豈逐君者其罪尚可貸乎於義頗有未安然相沿已久今仍存之鄭突書名或以為絶之或以為從赴二說俱通鄭世子忽復歸于鄭左傳六月乙亥昭公入公羊其稱世子何復正也穀梁反正也胡傳忽嘗嗣位君其國歸而獨稱世子則亡其君位明矣其稱復歸者謂既絶而復歸也然諸侯失國出奔歸而稱復則可大夫失位出奔歸而稱復則不可古者諸侯世國大夫不世官或曰復厭詞也集說杜氏預曰忽實居君位故今還以復其位之例為文也陸氏淳曰復歸之正者莫過於鄭忽于孫氏復曰鄉曰鄭忽出奔衞今曰鄭世子忽復歸鄭者明忽世嫡當嗣也劉氏敞曰公羊以謂復歸者出惡歸無惡歸者出入無惡非也如忽之奔盖有不得已亦何惡乎若以為惡猶有可諉未知突之簒國亦何故出入無惡乎稱蘇氏轍曰忽嘗為君矣其出也稱鄭忽其復歸也鄭世子忽何也於其出言其不能君也於其復歸言其所恃以反國者惟世子也舍是無足以歸者矣突既出則忽之歸無難矣曰孫氏覺曰春秋之法易者曰歸難者曰入復其位復歸復其惡曰復入鄭突因祭仲之援逐世子忽出奔而復歸焉盖易也故書曰突歸于鄭忽嘗有鄭伯之位突見逐而出奔忽歸無難而位又復也故書曰鄭世子忽復歸于鄭齊小白外有糾之爭立内無大臣之為援遽以兵歸而奪國焉歸之難也故書曰齊小白入于齊宋魚石既奔於楚藉楚而入于彭城明年宋嘗㑹數國之師而圍之出奔嘗有惡矣入又據其邑以叛復其惡而不悛也故曰宋魚石復入于彭城春秋以一字定其難易之迹故有書歸復歸書入復入四者之異然其事之善惡迹之順逆則皆隨其所書而可見矣程子曰稱世子本當立者不能保其位故不稱爵恒陳氏傅良曰忽嘗不稱世子此其加世子何從其稱也以其失國也不稱子以其歸國也稱世子春秋無加損焉正其名實而已矣國趙氏與權曰突忽之出入惟祭仲之為聽權臣擅命而廢置其君舉國之人莫之違祭仲之事不可以訓也李氏廉曰諸侯失國復歸者四鄭忽衞侯鄭曹伯襄衞侯衎是也出汪氏克寛曰前先書突歸而繼書忽奔者以忽之由突之入也此先書突奔而繼書忽歸者明忽之歸由突之出也忽與突之強弱見矣突之歸不繫國而忽稱世子嫡庶之名分辨矣許叔入于許穀梁許叔許之貴者也莫宜乎許叔其曰入何也其歸之道非所以歸也胡傳許太岳之裔先王建國廹於齊鄭不得奉其社稷未聞可滅之罪也則當伸大義以直詞上告諸天王下赴諸方伯求復其國糞除宗廟孰能與之爭今乃因亂竊入則非復國之義故書入于許入云者難詞也集說杜氏預曰許叔莊公弟也隱十一年鄭使許大夫奉許叔居許東偏鄭莊公既卒乃入居位許人嘉之以字告也二范氏甯曰許國之貴莫過許叔叔之宜立又無與而進無王命退非父授故不書歸自孔氏穎達曰入者自外之詞本其所自之處言其許東偏而入于許國非從外國入也鄭莊公以十一年卒許叔今始入者盖鄭突不使其復忽既得位親仁善鄰存許以徳許人冀其為已之援故此年始得入也小白陽生入皆稱名此叔稱字故云許人嘉之以字告也陸氏淳曰啖氏云言入志非其正也字之善興復也此言取國者皆有傾奪唯許叔有克復之功無傷義之責故可善也劉氏敞曰許叔者何許公子也何以字賢也何賢爾宜為君也宜為君則其稱入何難也何難焉爾鄭幾滅之迨其亂而後能入也亂孫氏覺曰許嘗為鄭所有於此之時鄭有爭國之許叔得乘其勢入許而復其國聖人美之特書其字曰許叔不書其爵者未嘗有爵也不曰歸者有鄭之難不可以安而歸也紀季以酅入齊則書季許叔入許則書叔皆賢之也紀季能全其祀許叔能復其國皆諸侯之弟而其兄奔亡存祀復國之善同故其賢一也陸淳論之曰入繼之美者莫過於季興復之善者莫過於許此說是也蘇氏轍曰叔之不稱公子將為君也不名而字無與爭國者也凡將君而非爭者皆字許叔蔡季是也葉氏夢得曰叔字也許叔何以得字賢之也鄭莊公入許許叔復之君子以是為賢也何以不言許男得國而未君也蔡侯廬陳侯吳得稱爵王命復之則君也許叔未受命可以復許未可以君許必君命而後得爵也何以言入難也國已分矣乘人之亂而幸得焉其復之道為難也陳氏傅良曰凡入皆譏也則其曰許叔何以是為宜入也入未有書字者雖公子也弗謂公子此其曰許叔所以别有罪也叔不書字則疑於齊小白陽生莒去疾已張氏洽曰諸侯進以正乃可以正邦國因亂竊入之不正無以正乎人故書入以見義有所不受突家氏鉉翁曰許叔之入入之善者也衞朔之入鄭之入入之惡者也鄭氏玉曰入有二義一曰逆辭一曰難辭以經文觀之既係之國復著其字則入非有所貶乃所以見其難耳李氏廉曰諸侯入國例七許叔宜復國而不得其道故書字書入齊小白陽生莒去疾可以有國而無君父之命故雖以國氏不書公子而書入鄭突衞朔亂倫失正已失國而又復春秋以其逆也故書爵書名書入獨衞獻入夷儀春秋俟其改過也故書爵書入而不名胡氏於許叔小白去疾皆曰難詞則陽生衞獻亦可入此例於衞朔曰逆詞則鄭突亦可入此例公羊注以為許叔本小國春秋前失爵在字例凡入者出入皆惡明當誅是盖不知入許之本末而妄為此說案許叔有興復之美故書字乘人之亂無王命而復國故書入或以為不必俟王命而疑胡傳為迂非春秋尊王之義也公㑹齊侯于艾艾公作鄗穀作蒿集說孫氏覺曰艾之盟左氏以為謀定許也案若二國實謀定許當見其定許之迹經無其事此亦未可知也是高氏閌曰魯嘗與齊絶矣自僖公卒襄公新立至復通好焉鄭氏玉曰隱十一年入許之役齊魯鄭也今許叔乘鄭之亂以復其國齊魯不興師以問之則已矣安得反為之㑹以立其位乎高氏謂魯嘗與齊絶至是復通好彭生之禍兆於此矣故春秋志之以齊侯為主理或然也案㑹艾之後魯再伐鄭而齊不與焉安見其為謀定許耶孫氏覺鄭氏玉所以駁左氏也高氏閌以為魯與齊復通好揆諸當日情事似為近之故定許之說皆不錄邾人牟人葛人來朝牟杜注牟國泰山牟縣今山東濟南府東二十里有牟城葛杜注梁國寧陵縣東北今河南歸徳府寧陵縣有葛城在汴河之南僖十七年傳齊桓公夫人葛嬴則葛國嬴姓集說董氏仲舒曰為天王崩而相朝故貶同孔氏穎達曰三國俱稱人合行禮知其尊卑也孫氏復曰皆微國之君貶劉氏敞曰滕薛之旅見也與邾牟葛無異滕薛之輕而邾牟葛之貶重何也曰古之諸侯朝者固曰間於天子之事考禮正刑一徳以尊天子焉耳滕薛是也今天王崩魯與三國未嘗奔問弔贈修臣子之職而方沛然以朝禮自處其義上僭是所以責之重也杜氏諤曰三國班見所以人之也杜元凱以為附庸世子安有三國同時遣世子耶陳氏傅良曰旅見非邦交之舊自參以上甚矣凡朝不勝譏莫甚於自參以上故貶人之朝黄氏震曰旅朝諸侯事天子之禮魯不當受旅秋九月鄭伯突入于櫟櫟杜注鄭别都也河南陽翟縣今開封府禹州是也左傳鄭伯因櫟人殺檀伯而遂居櫟公羊櫟者何鄭之邑也曷為不言入於鄭末言爾曷為末言爾祭仲亡矣然則曷為不言忽之出奔言忽為君之微也祭仲存則存矣祭仲亡則亡矣胡傳經於厲公復國削而不書獨書入于櫟何也夫制邑之死虢君共城之叛大叔皆莊公所親戒也今又城櫟而寘子元焉使昭公不立何謀國之誤也衞有蒲戚而出獻公楚有陳蔡不羮而叛棄疾末大必折有國之害也故夫子行乎季孫曰古者家不藏甲邑無百雉之城遂墮三都以張公室於厲公復國削而不書者若曰既入于櫟則其國已復矣於以明居重馭輕強幹弱枝以身使臂之義為天下與來世之鑒也為國者可不謹於禮乎集說孫氏復曰鄭世子忽復歸于鄭故鄭伯突入于櫟以逼之程子曰突非正也忽既恣行故國人君之諸侯助之書爵所以戒居正者己不能保則人取之矣書入以見義不容也葉氏夢得曰突何以名疾之也因櫟人殺其大夫檀伯而竊居之以是而求復國雖曰盜可也張氏洽曰春秋止書突入櫟而忽亹儀之事皆不書者所以見大都耦國既入於此則鄭國之命已制於突與入其國都盖無以異特書入于櫟而略其入國亦所以謹亂之所由生也又以見忽亹儀之為君者末矣而不足紀此春秋所以為簡嚴之書也突趙氏鵬飛曰諸侯奔而復入不至於國者唯此鄭入櫟與襄二十五年衞侯入夷儀而已然鄭伯突名而衞侯不名衞侯衎書復歸于衞而鄭伯突不書歸於鄭此正不正之辨也衞侯之出國固其國也林父逐之而立剽不正也故衎入于夷儀待剽之死而已非簒也故聖人不名以别之突之出位固非其位宋立之也突入於櫟逼忽而出之簒也故聖人名之以見其惡李氏廉曰春秋謹強都之害書突入櫟而不書其入鄭書晉滅下陽而不書其滅虢責鄭之失虎牢予魯之墮費郈皆此意也宜陳氏際泰曰下陽法不宜書滅而曰滅于櫟法不書入而曰入下陽滅而虞已無事矣于櫟入而鄭已無事矣冬十有一月公㑹宋公衞侯陳侯于袲伐鄭宋公上公有齊侯袲昌氏反公作侈今袲杜注宋地沛國相縣西南有袲亭在江南鳯陽府宿州左傳㑹于袲謀伐鄭將納厲公也弗克而還胡傳左氏曰將納厲公也穀梁曰地而後伐疑辭非其疑也昭公與突之是非邪正亦明矣然昭公雖正其才不足以君一國之人復歸于鄭日以微弱厲公雖簒其智足以結四國之援既入于櫟日以盛强諸侯不顧是非而計其强弱始疑於輔正終變而與邪穀梁所謂非其疑者非其疑於為義而果於為不義相與連兵動衆納簒國之公子也故詳書其㑹地而後言伐以譏之也集說杜氏預曰先行㑹禮而後伐也又劉氏敞曰何休以為征突非也盖休不知之曰穀梁曰地而後伐疑詞也非其疑也非也此先㑹後伐耳亦何疑詞哉蘇氏轍曰地而後伐既㑹而後伐也穀梁曰疑詞也非其疑也盖以為伐突以正忽也夫突在櫟不在鄭伐鄭非伐突也乃所以救突也穀梁之妄若是者衆矣定陳氏傅良曰納厲公也㑹伐㑹盟㑹救㑹侵皆前之詞也未前定則書㑹於某而後伐㑹於某而後盟㑹於某而後救㑹於某而後侵前定同欲也未前定繼事也吕氏大圭曰或疑宋既責賂於突而伐鄭不當又納突遂謂伐突救忽然魯桓方與突伐宋亦不當㑹宋伐突忽奔於衞而袲之㑹則衞與焉突奔蔡而曹之㑹蔡與焉謂衞不應伐忽以納突則蔡亦不應伐突以救忽春秋諸侯之離合不常可勝辨哉但據經伐鄭二字則突在櫟忽在鄭為伐忽明矣趙氏與權曰宋馮前年方以四國之師伐突未幾突出忽歸又以三國之師納突馮之無恒心可知矣案公㑹諸侯兩伐鄭左氏以為納厲公是也注公羊者謂善諸侯征突不知忽方在鄭突尚居櫟安得以伐鄭為征突乎穀梁曰疑辭也夫㑹而後伐則謀已定矣尚何疑乎胡傳雖引用穀梁而亦主納突之說與左傳同乙莊王酉元年十有六年齊襄二年晉緡九年衞惠四年蔡桓十九年鄭厲五年昭公忽元年曹莊六年陳莊四年杞靖八年宋莊十四年秦武二年楚武四十五年春正月公㑹宋公蔡侯衞侯于曹左傳㑹于曹謀伐鄭也集說杜氏預曰前年冬謀納厲公不克故復更謀伐孫氏覺曰曹之㑹二傳無說惟左氏以為謀鄭案左氏事迹凡此二年之間㑹盟侵伐皆為納厲公突盖突猶居櫟忽未出奔故諸侯謀伐忽而納之爾若張氏洽曰於此又邀蔡與同事黨益張矣為湛氏水曰左氏曰謀伐鄭也愚謂非禮之㑹且不正況屢謀以伐人乎其肆人欲滅天理罪孰大焉夏四月公㑹宋公衞侯陳侯蔡侯伐鄭左傳夏伐鄭胡傳春正月㑹于曹蔡先於衞夏四月伐鄭衞先於蔡王制諸侯之爵次其後先固有序矣在周官大司馬設儀辨位以等邦國猶天建地設不可亂也及春秋時禮制既亡霸者以意之向背為升降諸國以勢之強弱相上下蔡嘗先衞今序陳下者先儒以為後至也以至之先後易其序是以利率人而不要諸禮也豈所以定民志乎春秋防微杜漸尤嚴於名分考其所書意自見矣集說杜氏預曰蔡嘗在衞上今序陳下盖後至莊孔氏穎達曰諸侯之序以大小為次自隱至十四年四十三歲征伐盟㑹凡十六國時無霸主無有成序其間蔡與衞凡七㑹六在衞上惟此處在陳下故以為盖後至也以劉氏敞曰傳曰伐鄭以納突也伐鄭以納突則何不曰納鄭伯於鄭不與納也何為不與納諸侯失國諸侯納之正也納突非正也又曰案傳例與謀曰及不與謀曰㑹此稱公㑹則不與謀者也而正月㑹于曹傳云謀伐鄭乃是與謀與謀而稱㑹何耶杜云魯諱納不正非也如魯人自知其罪而諱避不言此固春秋所當正也何故緣其不肖之意與之比周揜匿耶且魯人惟不知義故伐鄭豈復稍避與謀之名哉葉程子曰突善結諸侯故皆為之致力屢伐鄭也氏夢得曰此納突也鄭忽自是不復見矣忽之弑與子亹子儀之弑終於突復立皆不見於經王氏葆曰突之未出也宋欲有所責故嘗伐之突之既出也宋懼無所得又欲納之始鄭不和魯嘗以鄭伐宋及突既出魯又與宋伐鄭及覆皆私也年張氏洽曰自鄭突入國之後即比魯而讎宋十二之戰十四年之伐其怨深矣及其出奔乃能使魯與宋自冬及夏悉力伐鄭所謂善結也衞侯朔與母構兄亦姦惡之雄今復因同惡之合陵蔡侯而居其上春秋比事直書以見當時王政不行霸者未作小人恃其強衆凌暴寡弱如此及桓文之興而後少抑焉春秋欲不與齊晉可得乎諸吕氏大圭曰㑹于曹蔡先衞伐鄭衞先蔡盖當時侯皆以一切強弱目前利害為先後不復用周班春秋因事紀實以見當時之亂無復禮也家氏鉉翁曰自去冬及今夏三書公㑹再書伐鄭不間以他事誅宋魯之輔簒而干正也汪氏克寛曰蔡衞皆姬姓侯爵而或先或後者率以私意為進退也故此年㑹曹先衞伐鄭先蔡而盟踐土㑹宋㑹召陵侵楚蔡又先衞㑹虢衞又先蔡紛更不一㑹鄄盟幽侵蔡㑹首止圍新城㑹鹹盟牡丘㑹淮盟新城㑹棐林盟蜀襄五年㑹戚㑹鄬則陳先於衞從王伐鄭宋以四國伐鄭㑹于袲此年伐鄭㑹宋㑹虢㑹召陵則衞先於陳此年伐鄭伐衞納朔次郎㑹北杏盟齊㑹盂圍宋盟翟泉㑹虢則以陳先蔡從王伐鄭宋以四國伐鄭㑹溫襄二十四年伐鄭㑹宋㑹申再伐吳㑹召陵敗雞父則又以蔡先陳是皆先後之無常無非霸者以意之向背為升降也又其甚者許以男而先曹伯淮之㑹則又先邢侯莒邾以子而先薛伯把伯矣齊桓以侯而先宋公則曰主盟也晉亦以侯而先宋公則亦曰主盟也然自晉霸後齊亦以侯而先宋公矣齊世子光盟雞澤至㑹柤皆序小邾子之下世子未誓以皮帛繼子男似也然伐鄭戍虎牢之役則序滕子薛伯杞伯之上亳城比蕭魚之役則序莒邾之上據傳於戍虎牢之役謂齊太子光先至於師故長於滕亳北之役謂齊太子光宋向戌先至於鄭門於東門則亦以至之先後易其序耳春秋之時王政不綱典禮廢壞滕薛朝魯而爭長魯以周班後鄭而有郎之戰馴至季世宋虢之㑹楚爭晉先春秋之終吳且爭長於黄池而主㑹矣然春秋於諸侯爵次之紊亂從主㑹者之所為而不革者所以彰其失也宋虢先晉黄池以兩霸言之所以抑其強也宋虢黄池待貶絶以見罪惡其餘從主㑹者之所為不待貶絶以見罪惡秋七月公至自伐鄭此致伐之始左傳秋七月公至自伐鄭以飲至之禮也集說孫氏覺曰案書至義與二年公至自唐同說皆告廟則書也彼書地此書伐鄭盖非魯地者皆志以事也鉉程子曰不惟告廟又以見勤勞於鄭突也家氏翁曰自去年十一月㑹而伐今年正月又㑹四月又伐歴三年之久乃歸暴師一年為是逆理悖常之事桓之惡亦稔矣已簒弑未討前既㑹諸侯于稷以成宋之亂此復合三國以輔鄭突之簒謂天下無王而敢為此也物極必復天討將加濼之禍且將作矣書吳氏􅊹曰公至常事書者皆譏也除李氏廉曰經公至自伐十二而至自伐鄭者五此役外餘皆伯事也冬城向向失亮反左傳書時也集說杜氏預曰傳曰書時也而下有十一月舊說因謂傳誤此城向亦俱是十一月但本事異各隨本而書之耳又推校此年閏在六月則月却而節前水星可在十一月而正也孔氏穎達曰十一月水星昏猶未正故復推校厯數此年月却節前水星可在十一月而正又方者未至之辭故以定之方中為方欲向中而實未正中十一月可以興土功書時非傳誤也啖氏助曰下有十一月則此乃十月也縱是同月亦今之九月農功未畢不可興役氏張氏洽曰下有十一月即夏正九月不時也趙鵬飛曰向介莒魯之境上本非莒邑故莒魯交爭互以為已有而其交爭自今日城向始故聖人謹志之趙氏與權曰鄭之伐既疲民於鋒鏑向之城復役民於畚鍤終歲勤動民不得休息汪氏克寛曰凡書城未有繋月者盖城築之事非可月成也然周之十月十一月皆農收之時盖戒事於冬而以春正月畢功則無妨農之病矣案劉氏炫歴引周語之文謂火見土功必在建亥之月則建戍之中必無土功之理故啖氏助張氏洽皆以為不時其說是也杜氏預謂此年閏在六月則月却節前孔氏穎達暢發其義以明非傳之誤似亦有理十有一月衞侯朔出奔齊左傳初衞宣公烝於夷姜生急子屬諸右公子為之娶於齊而美公取之生壽及朔屬壽於左公子夷姜縊宣姜與公子朔構急子公使諸齊使盜待諸莘將殺之壽子告之使之行不可曰棄父之命惡用子矣有無父之國則可也及行飲以酒壽子載其旌以先盜殺之急子至曰我之求也此何罪請殺我乎又殺之二公子故怨惠公十一月左公子洩右公子職立公子黔牟惠公奔齊莘杜注衞地陽平縣西北有莘亭今山東東昌府莘縣北莘亭故城是也公羊衞侯朔何以名絶曷為絶之得罪於天子也其得罪於天子奈何見使守衞朔而不能使衞小衆越在岱隂齊屬負兹舍不即罪耳穀梁朔之名惡也天子召而不往也集說杜氏預曰惠公也朔讒構取國故不言二公子逐罪之也劉氏敞曰朔何以名奔而名者見有君也孰君公子黔牟也書陳氏傅良曰此衞人立公子黔牟而後奔則其但奔何以為自失國也春秋之法苟其道足以失國雖有簒公子亦以自致之文書之是故衞人立黔牟而朔出蔡人立東國而朱出郕人立君而朱儒出書奔而已矣公家氏鉉翁曰朔譖殺其兄而居其處因以有國左子洩右公子職因衆怒逐之而立黔牟春秋不書所逐之人以朔殺兄簒國罪固當逐是以名以奔之盖討之也而天王命子突救黔牟則知朔以有罪見黜於王而黔牟之立王實命之則黔牟不得謂之簒而朔非君矣張氏洽曰朔立已五年二公子不能獨逐之必因其陵蔑天子周室欲討而後二子得以行其志所以莊六年王人子突救衞公羊氏之說其必有所傳矣朔殺兄奪國王命絶之故名王氏元杰曰衞朔以庶孽兆釁陷兄於死罪莫大焉國君乃社稷人民之主而見逼逐失君道矣經書出奔其罪不待貶絶而義自見矣案衞朔之奔左氏以為二公子所逐公穀以為得罪天子張氏洽兼而用之謂王室欲討而後二子得行其志於情事甚合當主其說丙莊王戌二年十有七年齊襄三年晉緡十年衞惠五年黔牟元年蔡桓二十年鄭厲六年昭二年曹莊七年陳莊五年杞靖九年宋莊十五年秦武三年楚武四十六年春正月丙辰公㑹齊侯紀侯盟于黄黄杜注齊地路史登州黄縣東南有古黄城本紀邑後入齊案登州府黄縣齊東垂也去魯殊逺疑非㑹盟處左傳平齊紀且謀衞故也集說高氏閌曰紀懼齊之見圖每為之備而齊人多詐故為此盟示之以不疑俾之弛怠而不我慮是以㝷盟既退魯遂與齊戰于奚二年齊遂遷紀之三邑足以知盟之無益而攻伐隨之矣張氏洽曰公十三年㑹紀侯敗齊以益其怨今乃盟之豈足以釋憾又欲納朔一動而二失也黄氏震曰為紀平齊也齊之圖紀於是十有二年矣魯為紀納后於王故紀雖從魯鄭敗齊而齊僖不敢報怨齊僖畏義也僖公卒而襄公立春與魯盟于黄夏與魯戰于奚齊且無魯豈為魯存紀故紀卒為齊所滅汪氏克寛曰紀魯之姻國而衞朔在齊故齊欲納朔而魯欲平紀也然二年之後齊遽遷紀三邑六年之後魯卒㑹齊納朔則非特紀之削弱盟不足恃而齊魯之強弱亦具見矣二月丙午公㑹邾儀父盟于趡㑹公穀作及趡翠軌反趡杜注魯地當在今兗州府泗水鄒縣之間左傳及邾儀父盟于趡尋蔑之盟也集說杜氏預曰二月無丙午丙午三月四日也日月必有誤孫氏覺曰及内為志㑹外為志儀父附庸之君非敢盟公公欲與之盟耳此當以公穀及字為定高氏閌曰趡我地彼來而我及之也與蔑之盟同邾來為此盟豈非諸侯有謀邾者欲求魯之援耶家氏鉉翁曰隱公立之始年即為蔑之盟桓公十有七年始為是盟盖簒國之君儀父惡而逺之八年為魯所伐十五年乃與牟葛俱朝至是始㑹而盟猶曰尋蔑之盟儀父之不苟有所附可見伐吳氏􅊹曰隱公元年及邾盟蔑七年而隱公渝盟邾桓公八年又伐邾魯邾不通好十有餘年至桓十五年邾同牟葛朝魯既朝之後二國欲尋蔑盟而平其再伐之怨故邾來魯地受盟而公與之盟也矣汪氏克寛曰下書伐邾則趡盟不待貶而惡自見隱桓皆盟邾而背盟皆以宋故以國君之重而其心無所適主尚足貴乎夏五月丙午及齊師戰于奚公闕夏字奚穀作郎杜此齊魯交兵之始奚注魯地今兗州府滕縣南奚公山下有奚邑水經注夏車正奚仲之國也山上有奚仲冢左傳夏及齊師戰于奚疆事也於是齊人侵魯疆疆吏來告公曰疆埸之事慎守其一而備其不虞姑盡所備焉事至而戰又何謁焉穀梁内諱敗舉其可道者也不言其人以吾敗也不言及之者為内諱也集說杜氏預曰齊背盟而來公以信待故不書侵伐皆陳曰戰高氏閌曰不書敗盖魯敗也趙氏鵬飛曰前日為黄之盟齊盖不欲魯必有以強之故春盟而夏有是戰焉何以不書伐不與齊之背盟而來伐我也日家氏鉉翁曰今年春魯及齊紀㑹盟于黄曾幾何遽戰於此齊無信也魯桓自齊僖存時為紀有求及襄之立繼申前請遂為黄之㑹盟襄不惟不從乃遽以兵加於魯襄之慢魯甚矣六月丁丑蔡侯封人卒左傳蔡桓侯卒秋八月蔡季自陳歸于蔡左傳蔡人召蔡季於陳秋蔡季自陳歸于蔡穀梁蔡季蔡之貴者也自陳陳有奉焉爾胡傳季字也歸順詞蔡季之去以道而去者也其歸以禮而歸者也公子不去國季何以去權也既歸何以不有國獻舞立矣若季者劉敞所謂智足以與權而不亂力足以得國而不居逺而不㩦邇而不廹者也是以見貴於春秋集說何氏休曰稱字者蔡侯封人無子季次當立封人欲立獻舞而疾害季季辟之陳封人死歸反奔喪思慕三年卒無怨心故賢而字之故陸氏淳曰啖氏云蔡季者蔡侯之弟也歸而合義字之言當時自外而入者或有謀殺或有奪正或本非當立或國人不順無如蔡季之美者故襃而字之所謂君子義而後取者也許叔非國人所逆故不得同此例立孫氏復曰蔡季言自陳歸于蔡者桓侯卒蔡季當時多簒奪明季無惡故曰歸于蔡所以與許叔異也劉氏敞曰蔡季何以稱字賢也何賢爾其去也以道其反也以禮公子不去國何賢乎季之去權也其言自陳何陳有力焉爾又曰左氏曰蔡人嘉之也案此蔡人嘉之則必蔡人逆之矣晉葉氏夢得曰春秋大夫言自而歸者二宋華元自歸于宋衞孫林父自晉歸于衞是也公子言自而歸者二陳侯之弟黄自楚歸于陳楚公子比自晉歸于楚是也然其先必見奔故華元書出奔孫林父書出奔黄書出奔比書出奔惟蔡季見歸不見奔夫奔之為言惡也皆非以道去其國者魯公子友書季子來歸而不見奔魯公子之奔未有不書於策者也盖以非其罪有不得已而出故君子特變其文曰季子來歸志魯人之喜也蔡季處於封人獻舞之間亦難乎其免矣公子無去國之道而出不言奔其還則蔡人召之進退必有類於魯友歟何休之言略與左氏合雖無所經見而有近乎春秋也善張氏洽曰復國於危疑之際考之書法惟蔡季為以其潔身而去一無爭心念念宗國聞召即歸能逺禍於未然不悻悻以為高其去就合宜故春秋貴之吕氏大圭曰突歸于鄭則名之赤歸于曹則名之以其爭國也蔡季歸于蔡則不名以其非爭國也言其終不為君也家氏鉉翁曰諸儒多從公羊之說謂字而歸之襃之也獻舞失國之君蔡季讓國之賢春秋二人賢否具見書法而左氏乃謂季獻舞為一人愚竊惑焉字李氏廉曰春秋兄弟之歸者惟蔡季與季子或稱或稱子美之也非若陳黄楚比之書名者比矣書大夫之自某而歸者蔡季之自陳非若元咺孫林父公孟彄之假力於晉齊者比矣又曰兄弟之取貴於春秋者惟許叔之復蔡季之歸紀季之去叔肸之不仕與夫季子之來歸而已皆書字以貴之衞鱄雖有合於春秋而不得同於書字之例者主於書弟以罪衞侯而鱄亦無可美也案蔡季非獻舞杜氏預誤合為一人耳左氏止曰召蔡季於陳蔡季自陳歸于蔡而已未嘗謂立以為君也先儒並主何氏之說而家氏鉉翁斷以書法尤為可信癸巳葬蔡桓侯胡傳啖助曰蔡桓何以稱侯盖蔡季之賢知請諡也或曰葬未有不稱公者其稱侯傳失之耳臣子之於君極其尊而稱之禮也其說誤矣孔子疾子路使門人為臣子曰無臣而為有臣吾誰欺欺天乎曾子疾革而易簀曰吾得正而斃焉斯已矣故終而必安於正人子不以非所得而加之於父是為孝人臣不以非所得而加之於君是為忠極其尊而稱之不正之大者而可以為禮哉或曰魯君生而稱公亦非禮乎曰生而稱公為虛位禮之文也没而繫諡為定名禮之實也春秋諸侯雖伯子男葬皆稱公志其失禮之實為後世戒欲其以正終也其垂訓之義大矣集說啖氏助曰其稱侯盖蔡季之賢請諡於王也此言凡諸侯請諡於王王之策書則云諡曰某侯諸國史因而紀之故西周諸侯記傳皆依本爵春秋之時則皆稱公夫子因而書之以明其不請於王也公陸氏淳曰啖氏云五等諸侯本國臣子皆稱之曰葬既不請王命因而私諡為公從而書之以見非禮案史記世本左氏傳蔡之諸君皆諡為侯經則皆稱公者以其私諡與僭同也惟蔡桓稱侯盖告王請諡故特書之明得禮也又曰侯伯子男之國稱其君曰公臣子之辭也諡不得云公者諡王所賜也劉氏敞曰葬者稱公此其稱爵何稱爵禮也稱公非禮也稱爵何以禮稱公何以非禮稱爵者誄之於天子者也稱公者非誄之於天子者也賤不誄貴㓜不誄長生無爵者死無諡生有爵者死有諡孔子曰諸侯相誄非禮也又曰諸侯之國亦多矣莫能正死生之禮者桓侯之賢又未有聞於春秋吾以此效之桓侯非賢而蔡季請之可知矣人亦多愛其君者矣莫能愛其君以禮而蔡季行之此乃賢者之所以異於衆人也賢胡氏銓曰生有黜陟没有諡王者柄此以别臣下不肖而使人有勸懲也晉侯仇卒於平王之時諡曰文侯以諡加本爵足以知命於天子也是後周益衰諸侯没者不復請諡於王五等一稱公乃臣子之自諡未汪氏克寛曰近世仕於時者其親友僕隸皆以其得官爵為稱謂暨其死也銘旌墓誌止稱所得官爵所謂生而稱者為虛位没而稱者為定名也邵氏寶曰何以知其諡於王侯王爵也爵王爵則諡王諡矣故私諡者則從其私稱及宋人衞人伐邾集說陸氏淳曰左氏曰宋志也趙子曰據例稱及者皆内之志云宋志非也孫氏覺曰邾前年來朝又此年盟于趡今遽帥二國之人伐親附者所以見㑹盟無信強大縱横而弱小見陵也許氏翰曰正月與齊為黄之盟而五月戰焉二月與邾為趡之盟而八月伐之詩曰君子屢盟亂是用長豈不然哉邾張氏洽曰桓公春與齊邾盟既而皆背之戰奚伐並見於一年之中反顧前日刑牲詔神玉帛交錯棄如敝屣盖其為人瀆信而好亂不仁而佳兵人理滅矣宜其不踰年見殺於齊也陳氏深曰案左氏雖魯從宋志此書及則亦魯之志也著湛氏若水曰及者我及之也書及宋人衞人伐邾魯桓反覆之罪亦季氏本曰衞為宋黨其從宋何尤焉魯方與邾盟為宋所扳稱兵失信以大國而中無適主何以使人任乎故卓氏爾康曰邾宋爭疆魯從宋志背趡盟而伐邾不書師不書人張氏溥曰齊侵魯疆背盟者齊邾宋爭疆啓兵者宋抑召爭從亂誰則為之是故譏桓盟者甚於隱之盟蔑也冬十月朔日有食之集說杜氏預曰甲乙者歴之紀也晦朔者日月之㑹也日食不可以不存晦朔晦朔須甲乙而可推故日食必以書朔日為例之趙氏匡曰左氏曰不書日宫失之非也或史官闕或年深寫誤何關日官日御乎下陳氏傅良曰自文以上日食有不書日者自文以皆書日故曰桓莊之世多闕文湛氏若水曰紀異也不書日史逸其傳耳案書朔不書日趙氏匡陳氏傅良湛氏若水皆以為闕盖晦朔甲乙或書或不書者舊史有詳略而夫子因之也劉氏敞楊氏時於隱三年辨之精矣再考厯家論朔有平朔有定朔以日平行月平行推算某日某時某刻合朔是為平朔日有盈縮月有遲疾取均度或加或減於平行為某日某時某刻日月相㑹是為定朔自劉洪乾象厯始用定朔於是非朔不食漢初以前皆用平朔故有食於朔之前後者公羊所謂失之前失之後穀梁所謂食晦日食既朔也但朔前朔後聖人何難據實以書之而必各立義例乎日食於朔二日則不得為朔矣而可仍以朔書之乎故當以闕文為正附錄左傳初鄭伯將以高渠彌為卿昭公惡之固諫不聽昭公立懼其殺已也辛卯弑昭公而立公子亹君子謂昭公知所惡矣公子達曰高伯其為戮乎復惡已甚矣丁莊王亥三年十有八年齊襄四年晉緡十一年衞惠六年黔牟二年蔡哀侯獻舞元年鄭厲七年子亹元年曹莊八年陳莊六年杞靖十年宋莊十六年秦武四年楚武四十七年春王正月胡傳是年桓公已終復書王者春秋之時諸侯放恣弑君簒國者已列於㑹則不復致討故魯宣殺惡及視以取國賂齊請㑹而傳曰㑹于平州以定公位曹伯負芻殺太子自立見執於晉而曹人請之曰若為有罪則君列諸㑹矣孔子為此懼作春秋於十八年復書王者明弑君之賦雖身已没而王法不得赦也又據桓十五年天王崩至是新君嗣立三年之喪畢矣明弑君之賊雖在前朝而古今之惡一也然則簒弑者不容於天地之間身無存没時無古今皆得討而不赦聖人之法嚴矣已列於㑹則不致討可乎故曰春秋成而亂臣賊子懼集説范氏甯曰此年書王以王法終治桓之事王孫氏復曰桓無王元年二年十年十八年書者春秋之法王無十年不書也十年無王則人道絶矣是故二百四十二年王無十年不書者也孫氏覺曰正月有王桓公之終也弑君之賊無可赦之理不見誅於一時當見誅於歲月不見誅於其生當見誅於其死不見誅於終身當見誅於萬世討家氏鉉翁曰魯桓弑兄簒國十有八年天王不能因而善之彼亦忘其為簒久矣孰知亂自内作送死彊鄰以迄天誅春秋於是年復書王正月以正簒賊之罪而垂法於後世也汪氏克寛曰此年正月書王誅桓公之終身無王弑君之賊身無存没時無古今皆得討而不赦故漢之王莽弑平帝魏之司馬昭弑高貴鄉公唐之韋后弑中宗之類前史皆隱其迹而朱子於通鑑綱目必正其大惡之名使其罪暴白於萬世豈非取春秋之義歟趙氏汸曰桓無王其曰王何也既謹其始必正其終也公㑹齊侯于濼濼廬篤反又音洛濟濼水杜注在濟南府歴城縣西北入今趵突泉即濼水之源也盖濟水伏流重發處公與夫人姜氏遂如齊公無與字左傳公將有行遂與姜氏如齊申繻曰女有家男有室無相瀆也謂之有禮易此必敗公㑹齊侯于濼遂及文姜如齊齊侯通焉公謫之以告公羊公何以不言及夫人夫人外也夫人外者何内辭也其實夫人外公也榖梁濼之㑹不言及夫人何也以夫人之伉弗稱數也胡傳與者許可之辭曰與者罪在公也為亂者文姜而春秋罪桓公治其本也易曰夫夫婦婦而家道正夫不夫則婦不婦矣乾者夫道也以乘御為才坤者婦道也以順承為事易著於乾坤述其理春秋施於桓公見其用集説杜氏預曰公本與夫人俱至濼公與齊侯行㑹禮故先書㑹濼既㑹而相隨至齊故曰遂孔氏穎達曰僖十一年公及夫人㑹齊侯于陽穀彼言及此不言及者傳載申繻之言譏公男女相瀆盖以相䙝瀆之故果致大禍時史譏其男女無别故不書及也范氏甯曰實驕伉而不制故不言及陸氏淳曰淳聞於師曰婦人之義從夫者也何夫人之伉譏公失為夫之道自致其禍劉氏敞曰不言及而言與猶匹夫匹婦之相與云爾自禍之道也公蘇氏轍曰非禮也濼之㑹公實與姜氏行其不言與夫人姜氏㑹齊侯于濼夫人不㑹也其不言及何也及上下之詞也與不相屬也所以惡夫人也程子曰人雖不能無欲然當有以制之無以制之而惟欲之從則人道廢而入於禽獸矣葉氏夢得曰夫人不婦而後欲為㑹強公以適齊公不夫而後不能制夫人與之如齊以成其意故不言及言與以繼事之辭見也及趙氏鵬飛曰如齊者文姜志也非公意也故不書而書與若曰公不得已而與姜氏如齊也吕氏大圭曰古人制禮尺寸不敢踰毫髪不敢越者也夫豈強拂人之性情而以繁文末節為尚哉經國家定禍亂而杜未然也泉水載衞女思歸而不可得載馳載許穆夫人欲歸唁其兄而義不可夫人之適其國父母在則有歸寧既終則大夫行聘問而已古人之制禮也嚴矣違此者未有不敗公之與夫人如齊是夫而不能夫也夫者以智帥人者也智不足以帥人而可謂之夫乎吳氏􅊹曰此行公往㑹齊侯爾夫人欲同往公不能制濼㑹禮畢夫人又欲從齊侯至齊夫婦既同出公不可獨反國故遂與之同如齊也屬汪氏克寛曰與之為言乃黨與匹敵之義而不相之辭也故以尊及卑曰及以此及彼曰及皆及者為主僖公及夫人姜氏㑹齊侯于陽穀以公及夫人夫人不敢專行也桓公與夫人姜氏如齊若曰夫人專行而公從之也易曰夫子制義從婦凶也桓公不能制義而從文姜以往其咎可知矣春秋以一字為襃貶豈不信哉夏四月丙子公薨于齊丁酉公之喪至自齊左傳夏四月丙子享公使公子彭生乘公公薨於車魯人告於齊曰寡君畏君之威不敢寧居來修舊好禮成而不反無所歸咎惡於諸侯請以彭生除之齊人殺彭生穀梁其地於外也薨稱公舉上也胡傳魯公弑而薨者則以不地見其弑今書桓公薨于齊豈不没其實乎前書公與夫人姜氏如齊後書夫人孫于齊去其姓氏而莊公不書即位則其實亦明矣集説范氏甯曰夫人與齊謀殺之不書諱也地趙氏匡曰在外薨不以有故無故皆當書其石氏介曰其以喪至痛之也可蘇氏轍曰公薨不地故也此其言齊何也在外不不言也朱子曰孔子直書義在其中云公㑹齊侯于某公與夫人姜氏如齊公薨于齊公之喪至自齊夫人孫于齊此等顯然在目雖無傳亦可曉春高氏閌曰桓弑立不免見殺於人天理亦不僭矣秋不以討賊書者齊襄殺之非討弑隱之罪也濼之㑹不書夫人出以遂如齊見之喪至不書夫人入以孫于齊見之不與其出不與其入聖人之意微矣實張氏洽曰魯君見弑有二在内則不書地以存其在外則不容不書其地而以上下文見之此先書公與夫人姜氏如齊而明年書夫人孫于齊又莊公不書即位雖不明書齊人戕公而桓公之不得其死已昭然矣盖本國之事書之與他國同則非所以見尊君親上之意是以桓公見殺不得不諱又當不没其實以示後世之傳信故曰婉而成章也家氏鉉翁曰齊魯雖婚姻之國盟㑹未幾戰爭相尋盖敵國也公一旦與姜氏如齊殆天所以致簒逆之誅非人所能為也程氏端學曰魯軌簒弑天子不征諸侯不討魯人戴之為君彼自恃其無誰何也於是黨亂賊凌小國背盟結怨黷武殘民不奔王喪怠忽宗祀成亂取賂儼朝同列身既不正家遂莫齊卒殄於淫婦之禍夫姜氏諸兒之惡不待言而著矣然自作孽者幸免王誅難違乎天矣春秋比書十八年之事而終之以此有以為永鑒哉金氏賢曰陳佗弑逆之賊也如蔡蔡人以私殺之春秋以討賊之義與蔡以當討之賊名佗書曰蔡人殺陳佗桓亦弑逆之賊也如齊齊人亦以私殺之春秋以惡佗之例惡桓可也乃不以討賊之義予齊不以當討之賊名桓而書公薨于齊者臣子之詞也然桓見弑而書地賊未討而書葬聖人之情亦可見矣秋七月附録左傳秋齊侯師於首止子亹㑹之高渠彌相七月戊戌齊人殺子亹而轘高渠彌祭仲逆鄭子於陳而立之是行也祭仲知之故稱疾不往人曰祭仲以知免仲曰信也周公欲弑莊王而立王子克辛伯告王遂與王殺周公黒肩王子克奔燕初子儀有寵於桓王桓王屬諸周公辛伯諫曰並后匹嫡兩政耦國亂之本也周公弗從故及首止杜注衞地陳留襄邑縣東南有首鄉今河南歸徳府睢州即襄邑也首鄉在州東南冬十有二月己丑葬我君桓公公羊賊未討何以書葬讎在外也讎在外則何以書葬君子辭也穀梁葬我君接上下也君弑賊不討不書葬此其言葬何也不責踰國而討於是也桓公葬而後舉諡諡所以成徳也於卒事乎加之矣胡傳公羊曰賊未討何以書葬讎在外也穀梁子曰讎在外者不責踰國而討於是也夫桓公之讎在齊則外也隱公之讎在魯則内也在外者不責其踰國固有任之者矣在内者討於是此春秋之法也故十八年書王而桓公書葬惟可與權者其知之矣集説范氏甯曰禮君父之讎不共戴天而曰不責踰國而討於是者時齊强大非已所討君子即而恕之以申臣子之恩諡者行之迹所以表徳人之終卒事畢於葬故於葬定稱號也昔周公制諡法大行受大名小行受小名所以勸善而懲惡其陸氏淳曰賊在異國故可葬孫氏復曰桓諡也曰葬我君桓公者此臣子自諡以公禮而葬也敬張氏洽曰葬稱我君而後舉諡趙氏以為臣子之詞盖明言我君以舉其新加之諡然後其詞恭且順不然則恐渉他國君而近於不敬矣李氏亷曰桓公在位十有八年首亂兄弟之倫而天理隳終瀆夫婦之倫而人理喪魯國亂臣賊子之禍接迹於史册實始於此然其為人往往亦不義而得衆故即位之一年棄許田以結鄭而有垂越之成二年因宋賂以立督而有于稷之㑹三年假姻好以協齊而有嬴之㑹讙之㑹弟年之來矣及其得志天王屢聘逺國屢朝於是宋之戰紀之戰伐邾納突無所不至自以為莫已害矣孰知禍起於帷薄哉此盖天理之應也汪氏克寛曰春秋君弑而書葬者有九衞桓齊襄陳靈則賊已討者也鄭僖齊悼則經不書弑者也蔡景之葬徧刺天下之諸侯也許悼之葬不使止為弑父也蔡靈讎在外而亦弑逆之賊與魯桓同楚䖍之殞於比亦猶齊諸兒之殞於無知也蔡昭讎在内賊已討而賊微不書且以蔡昭背楚誑吳應受斃於盜賊也聖人之書法如化工之生物無不適於天理之當然也家王氏樵曰朱子發明君弑賊不討不書葬之義諸所不及然則在内不書葬者示臣子急於討賊之意讎在外書葬者勢或未可以遂討難於久暴露其親耳葬者權也必討者義也不討則義猶不葬也非許其可緩也陳氏際泰曰葬桓公君子辭也以恕待人之道也雖然薄乎云爾讎在外遂可以不報乎則春秋又何望莊公之深也案劉氏敞曰君弑臣不討賊非臣子不復讎非子奈何以讎在外則勿復乎若以齊強魯弱量力不討君子不責是復讎者行於柔弱而困於強禦也與公穀不同而揆以不共戴天之義則其說未可廢故附見於此欽定春秋傳說彚纂卷六
