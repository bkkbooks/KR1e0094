body:
  text: 欽定四庫全書欽定春秋傳說彚纂卷二辛平王五酉十一年三年齊僖十一年晉鄂四年衛桓十五年蔡宣三十年鄭莊二十四年曹桓三十七年陳桓二十五年把武三十一年宋穆九年秦文四十六年楚武二十一年春王二月集說孫氏復曰正月書王者九十二二月書王者二十三月書王者十七程子曰月王月也事在二月則書王二月在三月則書王三月無事則書時書首月蓋有事則道在事無事則存天時正王朔天時備則歲功成王道存則人理立春秋之大義也數吳氏澄曰每歲春之下書月必加王字以見此月乃時王之所改定明汪氏克寬曰春秋於歲首係王著周王之正朔以大一統之義或歲首所書事舊史止書時或例當書時則二月三月皆不書王如隱八年書遇垂三月歸祊襄十五年書春向戍聘二月盟文九年書春毛伯求金二月得臣如京三月夫人至之類是也何休乃謂二月殷之正月三月夏之正月王者存二王之後使統其正朔其說謬甚當周之世而存夏殷之正朔豈所謂大一統耶天無二日民無二王之義安在耶己巳日有食之榖梁日有食之何也吐者外壤食者內壤闕然不見其壤有食之者也其不言食之者何也知其不可知知也胡傳經書日食三十六去之千有餘歲而精厯算者所能考也其行有常度矣然每食必書示後世治厯明時之法也有常度則災而非異矣然每食必書示後世遇災而懼之意也集說杜氏預曰日月動物雖行度有大量不能不小有盈縮故有雖交㑹而不食者或有頻交而食者惟正陽之月君子忌之故有伐鼓用幣之事今以長厯推經傳明此食是二月朔也不書朔史失之孔氏穎達曰古今言厯者大率皆以周天為三百六十五度四分度之一日行比月為遲每日行一度故一嵗乃行一周天月行比日為疾每日行十三度十九分度之七故一月內則行一周天又行二十九度過半乃逐及日言一月一周天者略言之耳其實及日之時不啻一周天也日月雖共行於天而各有道每積二十九日過半行道交錯而相與㑹集以其一㑹謂之一月每一歲之間凡有十二㑹故一歲為十二月日食者月掩之也日月之道互相出入或月在日表從外而入內或月在日裏從內而出外道有交錯故日食也日月同處則日被月映而形魄不見聖人不言日被月食而言日有食之者以其月不可見故不言月也朔則交㑹故食必在朔自隱之元年盡哀二十七年積二百五十五年凡三千一百五十四月惟三十七食是雖交而不食也襄二十二年九月十月頻食二十四年七月八月頻食是頻交而食也食無常月惟正陽之月君子忌之以日食者隂侵陽也當陽長之月不宜為弱陰所侵故有伐鼓用幣之事餘月則否戰國及秦厯紀全差漢來漸候天時始造其術劉歆三統以為五月二十三分月之二十而日一食空得食日而不得加時漢末㑹稽都尉劉洪作乾象厯始推月行遲疾求日食加時後代修之漸益詳密今為厯者推步日食莫不符合但無頻月食法漢書髙祖本紀髙祖即位三年十月十一月晦日頻食則自有頻食之理之劉氏敞曰公羊以謂或日或不日或失之前或失後非也日月有詳略皆史文也聖人不得改之非不欲改也無所據也榖梁說晦朔之例雖文與公羊異而謬與公羊同楊氏時曰日之盈虧有數存焉此巧厯者所知也何與於人事而先王為之恐懼修省者謹天戒而已故春秋日食必書之然或言朔或言日或不言朔日或朔日並書史之詳略異也朱子曰厯法周天三百六十五度四分度之一左旋於地一晝一夜則其行一周而又過一度日月皆右行於天一晝一夜則日行一度月行十三度十九分度之七故日一嵗而一周天月二十七日有竒而一周天又二日半逐及於日而與之㑹一嵗凡十二㑹方㑹則月光都盡而為晦巳㑹則月光復蘇而為朔晦朔而日月之合東西同度南北同道則月掩日而日為之食之胡氏寧曰春秋不書祥瑞而災異則書君子見物有失常者必恐懼修省而不敢忽况日者衆陽之宗乎春秋所以存而弗削也然災與異不同日有食之常度也故程氏以為災而先儒以為異春秋日食三十六精厯算者得之幾盡其有常度審矣謂之異非也王氏元杰曰春秋二百四十二年日食三十有六月食不書至鄭氏玉曰不曰日食而曰日有食之者有者自外之詞也案公羊以日食為異程子辨之以為災是也先儒又精也有謂德之休明則當食不食非也乃治厯者測之未三月庚戌天王崩左傳三月壬戌平王崩赴以庚戌故書之胡傳春秋歷十有二王桓襄匡簡景志崩志葬者赴告及魯往㑹之也平惠定靈志崩不志葬者赴告雖及魯不㑹也莊僖頃皆不志者王室不告魯亦不往也今周人來訃而隱公不往是無君也集說杜氏預曰周平王也實以壬戌崩欲諸侯之速至故逺日以赴不書葬魯不㑹劉氏敞曰左氏曰春秋書逺日者即傳其僞以徴臣子之過也非也赴以庚戌史自當書庚戌聖人雖欲遷正亦不可得豈故傳其僞者乎頃邵氏寶曰魯不㑹葬者凡七平也莊也僖也惠也也定也靈也蓋諸侯皆然罪於是乎大矣當是時霸者誰歟謂之尊王不亦愧乎夏四月辛卯尹氏卒尹左作君左傳夏君氏卒聲子也不赴於諸侯不反哭於寢不祔於姑故不曰薨不稱夫人故不言葬不書姓為公故曰君氏公羊尹氏者何天子之大夫也其稱尹氏何貶曷為貶譏世卿世卿非禮也胡傳尹氏天子大夫世執朝權為周階亂因其告喪以氏書者志世卿非禮為後鑒也官不擇人世授之柄黨與既衆威福下移春秋於周書尹氏武氏於魯書季友仲遂皆志其非禮也集說杜氏預曰不書姓避正夫人也隱見為君故特書於經曰君氏孫氏復曰尹氏天子卿言氏者起其世也泰誓曰官人以世夏商之亂政也周既失道其政亦然程子曰尹氏王之世卿古者使以德爵以功世録而不世官是以俊傑在位庶績咸熙及周之衰士皆世官政由是敗尹氏世為王官故於其卒書曰尹氏見其世繼也仍齊氏履謙曰君氏當依公榖作尹氏蓋尹氏武氏叔榮叔家父曰氏曰叔曰父皆世稱也如晉稱趙孟之類世世稱之故詩有仍叔春秋亦有仍叔詩有家父春秋亦有家父詩有尹氏春秋凡兩書尹氏春汪氏克寬曰詩節南山朱子傳尹氏蓋吉甫之後秋書尹氏卒公羊以為譏世卿者即此也今案詩常武王謂尹氏指吉甫也家父云尹氏太師又云赫赫師尹則尹氏當幽王時為三公矣此書尹氏卒則來訃於魯也五年傳稱王使尹氏助曲沃伐晉僖二十八年王命尹氏䇿命晉侯為侯伯文十四年王使尹氏訟周公於晉成十六年十七年尹武公㑹諸侯伐鄭昭二十三年尹氏立王子朝二十六年以子朝奔楚則尹氏始終秉權又曰宣王時吉甫已稱氏春秋惟尹武公兩伐鄭書子其餘經傳所紀悉曰尹氏案歐陽氏修曰公羊榖梁以尹氏為正卿左氏以君氏為隱母一以為男子一以為婦人得於所傳者蓋如此是可盡信乎馬氏端臨曰左傳經文君氏卒則以為聲子魯之夫人公榖經文尹氏卒則以為師尹周之卿士然則夫子所書夏四月辛卯卒者竟為何人乎是皆疑而不敢定也故兩存之附録左傳鄭武公莊公為平王卿士王二於虢鄭伯怨王王曰無之故周鄭交質王子狐為質於鄭鄭公子忽為質於周王崩周人將畀虢公政四月鄭祭足帥師取溫之麥秋又取成周之禾周鄭交惡君子曰信不由中質無益也眀恕而行要之以禮雖無有質誰能間之苟有明信澗溪沼沚之毛蘋蘩蕰藻之菜筐筥錡釜之器潢汙行潦之水可薦於鬼神可羞於王公而况君子結二國之信行之以禮又焉用質風有采蘩采蘋雅有行葦泂酌昭忠信也溫杜注河內溫縣今屬懷慶府古溫城在縣西南三十里成周杜注洛陽縣今河南河南府洛陽縣東北有洛陽故城秋武氏子來求賻賻音附始此來求之左傳武氏子來求賻王未葬也公羊武氏子者何天子之大夫也榖梁歸死者曰賵歸生者曰賻歸之者正也求之者非正也周雖不求魯不可以不歸魯雖不歸周不可以求之求之為言得不得未可知之詞也交譏之集說孫氏復曰武氏世卿也其言武氏子父死未葬也孫氏覺曰春秋之法為上者無求求之失上也為下者無見求見求失下也曰賻曰金因喪而有求者也車無事而有求者也喪事有贈無求而有求於下以是為亟也車服上所以賜下而有求於下以是為失制矣程子曰武氏王之卿士稱武氏見其世官氏陳氏傅良曰周大夫有爵稱爵未爵稱字但曰武子見非大夫也微者雖王人不書此何以書魯賻不入來求不可以不録也於家氏鉉翁曰武氏子仍叔子銜命而出必皆有位朝今乃以某氏子書公榖於仍叔之子曰父老子代從政於武氏子曰父卒子未命蓋以仍叔為尚存之人武氏為已卒之大夫也王朝公卿大夫莫非世官世祿之家何獨於此二子而書法異乎曰某氏子云者有父在焉故也行吳氏澄曰稱氏義與尹氏同子者父老而以子攝卿之事汪氏克寬曰隱五年王使尹氏武氏助曲沃伐晉則武氏之子亦命為卿而尹武皆為世卿可見矣春秋書武氏之子則嫌武氏之子自來求賻仍叔子不加之字又不見其父在八月庚辰宋公和卒左傳宋穆公疾召大司馬孔父而屬殤公焉曰先君舍與夷而立寡人寡人弗敢忘若以大夫之靈得保首領以殁先君若問與夷其將何辭以對請子奉之以主社稷寡人雖死亦無悔焉對曰羣臣願奉馮也公曰不可先君以寡人為賢使主社稷若棄德不讓是廢先君之舉也豈曰䏻賢光昭先君之令德可不務乎吾子其無廢先君之功使公子馮出居於鄭八月庚辰宋穆公卒殤公即位君子曰宋宣公可謂知人矣立穆公其子饗之命以義夫商頌曰殷受命咸宜百祿是荷其是之謂乎胡傳外諸侯卒國史承告而後書聖人皆存而弗削曷為弗削春秋天子之事也古者諸侯之邦交間問殷聘而世相朝蓋王事相從則有和好之情及告終易代則有弔恤之禮所以睦鄰國也凡諸侯卒皆存弗削而交鄰國之義見矣卒而或名或不名者因舊史而不革也集說何氏休曰宋稱公者殷後也王者封二王後地方百里爵稱公客待之而不臣也杜氏預曰稱卒者略外以别內也告趙氏匡曰諸侯同盟名於載書朝㑹名於要約聘名於簡牘故於卒赴可知而紀也左氏曰同􅉀則赴以名豈有臣子當創巨痛深之日乃忍稱君之名禮篇所録云寡君不祿而已蓋曽同􅉀知其名故於死時書之以紀易代正劉氏敞曰榖梁云諸侯日卒正也非也正者日不者不日則其義可信而無疑今正者日篡者亦日曹伯使世子射姑來朝則曹伯之嫡也莊二十三年曹伯射姑卒有月無日此復何耶者孫氏覺曰諸侯不生名卒則名之亦有卒而不名記卒記名者即位之初以名赴我我因其卒得以名之於冊也卒而不名者即位之初不赴於我或史失之不得記其名也案左氏記楚公子圍使赴于鄭伍舉問應為後之辭焉更之曰共王之子圍為長是當君卒赴諸侯巳言嗣君之名矣故凡往來之國皆得記其名也然則不待于同􅉀朝㑹聘告而嗣君之名已見于常所往來之諸侯矣故春秋記外諸侯之卒一百三十有三而無名者十或即位之初不以名赴或史失之未可知也必若以􅉀㑹求之則未嘗與者五十二而不名者九耳未可通也程子曰吉凶慶弔講信修睦鄰國之常禮人情所當然諸侯之卒與國之大故來告則書也程氏端學曰宋以王者後故得稱公諸侯書卒正書薨者臣子之詞也故內書薨而外書卒列汪氏克寬曰赴告以日史書其日則經弗削以見國臣子之謹終赴告略史不書日則經無自而書日以見臣子之慢先君而忽其死生之大變也又曰晉獻公惠公未嘗同㑹􅉀通聘問而卒書名宿男同盟滕子把子來朝而卒不書名是皆據史舊文也案左氏云同􅉀則赴以名趙氏匡駁之其說是矣孫氏覺又謂即位之初以名赴似更有理若卒而或名或不名則胡傳得之冬十有二月齊侯鄭伯盟于石門此外諸侯特相􅉀之始齊太公所封國都今山東青州府臨淄縣西北營丘城是也後胡公徙都薄姑則在今青州府博興縣東北孔疏齊國侯爵譜云姜姓太公望之後門石門杜注齊地或曰濟北盧縣故城西南濟水之盧縣故城在今山東濟南府長清縣西南左傳冬齊鄭􅉀于石門尋盧之􅉀也庚戌鄭伯之車僨於濟盧杜注齊地今盧城在長清縣西南二十五里東濟禹貢導沇水東流為濟蔡沈書傳濟水出河郡垣曲縣王屋山至青州博興縣入海今垣曲屬平陽府博興屬青州府集說杜氏預曰來告故書書劉氏敞曰何以書􅉀㑹之事告則書常事不非常則書􅉀㑹於春秋常也於王者非常也殷人作㑹而民始畔周人作誓而民始疑程子曰天下無王諸侯不守信義數相􅉀誓所以長亂也故外諸侯􅉀來告者則書之直葉氏夢得曰外􅉀也內􅉀言㑹及外􅉀不言㑹及言􅉀而已內外之辭也石張氏洽曰隱公十一年之間盟而不食言者惟此門之􅉀二君終身未嘗相伐蓋齊方盛強而鄭之深讎專在於宋故鄭莊恃齊以敵之雖齊間與宋􅉀好而左右離間必使惟巳之從是以石門之􅉀雖不寒而宋與許紀諸國交受伐春秋詳書於策將使後人考其本末而知鄭莊多詐齊僖不義二國相與之固列國並被其禍也魯趙氏鵬飛曰隱公之世宋衛為西黨齊鄭為東黨則徘徊於二黨之間惟利是從初比於宋矣至艾之􅉀而從齊附鄭故聖人於此書石門之􅉀而知齊為鄭之黨及艾之􅉀則知公從齊而附鄭也以吳氏澄曰􅉀非盛世事也王政不行諸侯放恣欲戰伐而敵讎則不得不以􅉀㑹而固黨㑹不足恃而重之以􅉀人不自信而要之於神故凡書􅉀者春秋所惡也汪氏克寬曰左傳尋盧之􅉀則春秋之前齊鄭巳有盟陳氏以石門之􅉀為諸侯之合特據春秋所書以立義耳元年􅉀蔑巳特相􅉀然僅與附庸相歃非關於天下之故惟石門乃肇伯之端故特書之劉氏實曰齊鄭之􅉀春秋亦存而不削者以志世變也鄭莊挾齊以自強而齊僖亦資鄭以糾合自是齊鄭之黨合天下始多故而諸侯遂無王矣癸未葬宋穆公穆公榖作繆後同公羊宣公謂繆公曰以吾愛與夷則不若愛女以為社稷宗廟主則與夷不若女盍終為君矣宣公死繆公立繆公逐其二子莊公馮與左師勃曰爾為吾子生毋相見死毋相哭與夷復曰先君之所為不與臣國而納國乎君者以君可以為宗廟社稷主也今君逐君之二子而將致國乎與夷此非先君之意也且使子而可逐則先君其逐臣矣繆公曰先君之不爾逐可知矣吾立乎此攝也終致國乎與夷莊公馮弒與夷故君子大居正宋之禍宣公為之也胡傳傳稱諸侯五月而葬同􅉀至同􅉀謂同方嶽之􅉀者其生講㑹同之好其沒有葬送之禮是諸侯所以睦鄰國也卒而或葬或不葬者何有怠於禮而不葬者有弱其君而不葬者有討其賊而不葬者有諱其辱而不葬者有治其罪而不葬者有避其號而不葬者宋殤齊昭告亂書弒矣而經不書葬是討其賊而不葬者也晉主夏􅉀在景公時告喪書日而經不書葬是諱其辱而不葬者也魯宋􅉀㑹未嘗不同而三世不葬是治其罪而不葬者也吳楚之君書卒者十亦有親送於西門之外者矣而經不書葬是避其號而不葬者也怠於禮而不往弱其君而不㑹無其事闕其文魯史之舊也討其賊而不葬諱其辱而不葬治其罪而不葬避其號而不葬聖人所削春秋之法也集說徐氏邈曰凡書葬者皆據我而言葬彼所以不稱宋葬繆公而言葬宋繆公杜氏預曰魯使大夫㑹葬故書舉諡稱公者據彼國之辭也絶范氏寧曰記卒記葬録魯恩義之所及若存沒隔情禮不交則卒葬無文或有書卒不書葬蓋外雖赴卒而內不㑹葬孔氏穎達曰昭三年叔弓如滕葬滕成公如此之類遣卿行者皆書其使名此不書使名知是大夫往也大夫奉命出使位賤不合書名故直書其所為之事而已􅉀則云及某􅉀㑹則云㑹某人葬則云葬某公舉其所為之事眀有使往可知也釋例曰先王之制諸侯之喪士弔大夫送葬及其失也禮過於重文襄之伯因而抑之諸侯之喪大夫弔卿共葬事夫人之喪士弔大夫送葬猶過古制故公子遂如晉葬襄公傳不言禮葬秦景公傳曰大夫如秦葬景公特稱禮也一以示古制二以示書他國之葬必須魯㑹三以示奉使非卿則不書於經此丘眀之微文也五啖氏助曰吳楚之君不書葬者不可言葬某王也等諸侯本國臣子皆稱之曰公葬既不請王命而私諡為公從而書之以見非禮自劉氏敞曰諸侯何為或卒或不卒或葬或不葬卒外録也葬自內録也不卒非外也不葬非內也葬者臣子之事也國滅不葬無臣子也君弒賊不討不葬亦無臣子也請程子曰諸侯告喪魯往㑹葬則書春秋之時皆不而私諡稱私諡所以罪其臣子張氏洽曰宋公爵也其稱公與齊衛異矣穆諡也諸侯合請諡於王然春秋自蔡桓侯之外皆不請於王而私諡者也黃氏震曰初宣公舍其子與夷而立穆公穆公亦舍其子馮而立與夷其後馮遂弒與夷左氏美宣公知人公羊則謂宋之禍宣公為之也愚案公羊之說為萬世垂戒而左氏之說亦不可全廢也蓋宣公遜穆公穆公終以遜宣公之子是穆公不可謂非賢宣公不可謂不知賢其後馮之弒逆罪在馮耳雖春秋責賢者備豈可盡沒其賢而反加以始禍之惡名哉且謂宣穆再遜而再亂亦未當其實宣之遜穆初未嘗亂穆遜殤公而馮始為亂耳不鄭氏玉曰卒以外赴書葬以魯㑹書不卒則是外赴不葬則是魯不㑹也非汪氏克寬曰此葬穆公合五月之節而書日穆公弒其國無亂公子馮出居於鄭則無謀亂者矣不可謂危不得葬蔡桓侯三月而葬書日蔡季賢而請諡不可謂渴葬齊惠公三月而葬魯君奔喪卿往送葬齊國無難晉悼公三月而葬晉伯方盛平公嗣業諸卿和睦不可謂慢葬而皆不日衛穆公六月而葬宋文公七月而葬並書日二國皆無亂而傳謂宋文公始厚葬不可謂痛之衛桓公十五月而葬陳靈公二十有一月而葬皆不日非不能葬蓋二君被弒故待討賊而後葬也若夫葬之遲速則據文考事而義自見若國無亂而葬速葬緩皆以著臣子之失禮國有亂而葬不以其時則以著人君不能防微杜漸俾身沒弗藏而且責臣子及天子諸侯方伯連率之緩於討賊也附録左傳衛莊公娶於齊東宫得臣之妹曰莊姜美而無子衛人所為賦碩人也又娶於陳曰厲媯生孝伯早死其娣戴媯生桓公莊姜以為巳子公子州吁嬖人之子也有寵而好兵公弗禁莊姜惡之石碏諌曰臣聞愛子教之以義方弗納於邪驕奢淫佚所自邪也四者之來寵祿過也將立州吁乃定之矣若猶未也階之為禍夫寵而不驕驕而能降降而不憾憾而能眕者鮮矣且夫賤妨貴少陵長逺間親新間舊小加大淫破義所謂六逆也君義臣行父慈子孝兄愛弟敬所謂六順也去順效逆所以速禍也君人者將禍是務去而速之無乃不可乎弗聼其子厚與州吁游禁之不可桓公立乃老陳杜注陳國陳縣即今河南開封府陳州孔疏陳國侯爵譜云媯姓虞舜之後當周之興有虞遏父者為周陶正武王以元女大姬配遏父之子滿封於陳賜姓曰媯號曰胡公壬桓王戌元年四年齊僖十二年晉鄂五年衛桓十六年蔡宣三十一年鄭莊二十五年曹桓三十八年陳桓二十六年杞武三十二年宋殤公與夷元年秦文四十七年楚武二十二年春王二月莒人伐把取牟婁此伐國取邑之始縣把杜注本都陳留雍丘今河南開封府杞縣是也後遷都淳于今青州府安丘縣有淳于故城孔疏譜云杞姒氏夏禹之苖裔武王克殷求禹之後得東婁公而封之於把城牟婁杜注杞邑案城陽諸縣東北有婁鄉今婁鄉在山東青州府諸城縣境公羊牟婁者何杞之邑也外取邑不書此何以書疾始取邑也榖梁傳曰言伐言取所惡也諸侯相伐取地於是始故謹而志之也胡傳取者收奪之名聲罪伐人而強奪其土故特書曰取以著其惡或曰諸侯土地上受之天王下傳之先祖所以守宗廟之典籍也聖王不作諸侯放恣強者多兼數圻弱者日以侵削當是時有取其故地者夫豈不可然僖公常取濟西田矣成公嘗取汶陽田矣亦書曰取何也苟不請於天王以正疆理而擅兵爭奪雖取本邑與奪人之有者無以異春秋之義不以亂易亂故亦書曰取正其本之意也上二年莒人擅興入向而天討不加焉至是伐國取邑其暴益肆矣集說范氏寧曰既伐其國又取其土眀伐不以罪而貪其利兩書取伐以彰其惡孔氏穎達曰牟婁杞邑莒伐取之自是以後常為莒邑昭五年莒牟夷以牟婁來奔是也文三年秦人伐晉傳稱取王官及郊襄二十三年齊侯伐晉傳稱取朝歌並書伐不書取此伐取兩書者彼告伐不告取此伐取並告故也昭元年伐莒取鄆書取不書伐昭十年伐莒取郠書伐不書取者元年兵未加莒而鄆逆服故書取不書伐十年晉以取郠討公故書伐不書取其伐國圍邑書圍與否亦從告也啖氏助曰凡先言伐國下言取邑者眀其國之邑也如取郜取防上言敗宋師則宋邑可知趙氏匡曰凡力得之曰取不當取也不是其專奪雖復取本邑亦無異辭左氏云凡書取言易也榖梁亦曰取易辭也案取者收奪之名何關難易假令取之難而得之欲如何書之乎又云凡克邑不用師徒曰取今經文見云伐何得云不用師徒乎今謂凡繫屬外而我克有之不論難易一切稱取其言伐某取某者是用師徒也取者或以師威逼或招收而得之既不侵伐方可是不用師徒耳然取之非正皆為力得春秋之義在辨其得之邪正固不當惟以師徒為例又曰凡內取之邑不繫國者皆夲是魯邑曽為外國所奪今却取之既是夲國邑不可繫之他國爾又曰凡有邑稱邑無邑稱田公羊曰田多邑少稱田邑多田少稱邑案田繫於邑若有邑則稱邑舉重也無邑自然稱田皆據事實爾取孫氏覺曰伐而後言取者先聲其罪以伐之又奪其邑以為巳有也其程子曰諸侯土地有所受伐之其罪大矣而奪取土惡又甚焉王法所當誅也薛氏季宣曰諸侯田天子之守臣地非其有也或取之或失之皆罪也陳氏傅良曰外取邑不書自隱以前則書之春秋之初猶以取邑為重也桓十四年宋以諸侯伐鄭取牛首而後皆不書黃氏震曰杞夏之後在周為三恪莒自入春秋首加兵於向今又扼杞之弱稱兵而攘其封邑至桓十二年公㑹杞莒於曲池而後釋今日之憾莒之橫甚矣于李氏廉曰取字例胡氏曰悉虜而俘之曰取取師雍丘于嵒是也取者得非其有之稱取郜鼎之類是也取者收奪之名取牟婁長葛之類是也此三例亦略相通矣汪氏克寬曰春秋書外伐國者一百二十有八惟此書伐書取餘書圍邑者三書伐戰者一書伐救者一蓋中葉以後爭地爭城殺人盈野諸侯城邑今日奪之於此眀日并之於彼得失無常不足悉書故傳言取地而經不書取者甚多蓋以擅興殘民為重而土地之攘奪不暇論矣趙氏汸曰陳氏曰春秋之初猶以取邑為重也得之矣據桓十四年宋伐鄭取牛首僖二十三年楚伐陳取焦夷文八年秦伐晉取武城十年春晉伐秦取少梁夏秦伐晉取北徵之類皆不書雖成二年齊侯伐我北鄙取龍不書春秋重滅國自書齊鄭入許而後取邑不復書傳曰疆場之邑一彼一此何常之有書之則不勝書故書其重者而已戊申衛州吁弒其君完完音丸州榖作祝後同此書弒之始左傳衛州吁弒桓公而立集說杜氏預曰稱臣弒君臣之罪也戊申三月十七日有日而無月孔氏穎達曰州吁實公子而不稱公子者傳文更無褒貶直是告辭不同史有詳略爾自莊公以上諸弒君者皆不書氏閔公以下皆書氏亦足眀時史之異同非仲尼所皆刋也戊申在癸未之後二十五日更盈一周則八十五日往年十二月癸未葬宋穆公則此年二月不得有戊申雖承二月之下未必是一月之日故長厯推此年二月癸亥朔十日壬申二十二日甲申不得有戊申也二月壬辰朔則十七日有戊申也此經上有二月下有夏得在三月之內不是字誤故云有日而無月僖二十八年冬下無月而經有壬申公朝於王所有日而無月經有比類故知此亦同之凡如此者有十四事劉陳氏嶽曰隱桓莊之春秋凡弒君之賊皆名之氏敞曰公羊以謂不稱公子當國也非也諸弒君而稱公子公子而為大夫者也公子而不稱公子公子而未為大夫者也當國與不當國何足辨乎榖梁曰大夫弒其君以國氏者嫌也弒而代之也非也宋督宋萬亦可云弒而代之乎公子商人豈非弒而代之乎而督萬氏國商人不氏國何也程子曰自古篡弒多公族蓋自謂先君子孫可以為君國人亦以為然而奉之春秋於此眀大義以示萬世故春秋之初弒君者多不稱公子公孫蓋身為大惡自絶於先君矣豈復得為先君子孫哉古者公族刑死則無服況弒君乎大義既明於初矣其後弒立者則皆以屬稱或見其以親而寵之太過任之太重以至於亂或見其天屬之親而為寇讎立義各不同也春秋所書大率事同則辭同後人因謂之例然有事同而辭異者蓋各有義非可例拘也秋家氏鉉翁曰衛州吁齊無知弒君而自立為君春首絶其屬籍書名書弒及其殺也書衛人殺州吁齊人殺無知不子以為君名其為賊示國人皆可殺此春秋誅討亂賊之上刑也又曰胡氏謂州吁削屬籍以國氏罪莊公不待以公子之道愚謂此方誅討弒賊未當追議莊公既往之咎案州吁不稱公子削之也弒君之賊例應從同而獨於衛州吁齊無知宋督萬削之其後或氏族之或世子公子之何也不削之則無以著其弒逆之罪不氏族之不世子公子之則安知非盜與微者而無以著其弒之實程子所謂大義既明於初其後皆以屬通立義各不同也胡傳謂莊公不以公子之道待州吁則追咎莊公家氏鉉翁駁之矣穀梁謂萬為卑者則萬巳為大夫其說亦不可通也孔氏頴達以為史有詳略亦似有理故並存之夏公及宋公遇于清此書遇之始亭清杜注衛邑濟北東阿縣有清今東阿縣屬兗州府左傳公與宋公為㑹將尋宿之盟未及期衛人來告亂夏公及宋公遇于清公羊遇者何不期也一君出一君要之也榖梁及者內為志焉爾遇者志相得也胡傳遇者草次之期古有遇禮不期而㑹以眀造次亦有恭肅之心春秋書遇私為之約自比於不期而遇者直欲簡其禮爾簡略慢易無國君之禮則莫適主矣故志內之遇者四而皆書及若曰以此及彼然也志外之遇者三而皆以爵若曰以尊及卑然也其意以為莫適主者異於古之不期而㑹矣故凡書遇者皆惡其無人君相見之禮也集說杜氏預曰遇者草次之期二國各簡其禮若道路相逢遇也孔氏穎達曰曲禮下云諸侯未及期相見曰遇相見於郤地曰㑹然則㑹者豫謀間地克期聚集訓上下之則制財用之節示威於衆各重其禮雖特㑹一國若二國以上皆稱㑹也遇者或未及㑹期或暫須相見各簡其禮若道路相逢遇然此時宋魯特㑹欲尋舊盟未及㑹期衛來告亂故二國相遇若三國簡禮亦曰遇故莊四年齊侯陳侯鄭伯遇于垂是也周禮冬見曰遇則與此别相孫氏復曰遇者不期也不期而㑹曰遇詩稱邂逅遇適我願兮是也諸侯守天子土非享覲不得踰境此言公及宋公遇于清者惡其自恣出入無度許氏翰曰隱莊之間凡六書遇自閔以後有㑹無遇而胡氏寧曰古者諸侯或因朝覲或從王命無期約適值於途必有兩君相見之儀近者為主逺者為賔所以崇禮讓絶慢易也故謂之遇周衰諸侯放恣出入無期度私為邂逅之約有如適值於途亦謂之遇非矣間汪氏克寬曰古者諸侯因王事不期而遇倉卒之且有禮義春秋之時非王事而出預有期約以相㑹聚乃行古者不期之禮是自欺爾程氏端學曰公及宋公遇于清孫劉葉氏皆以魯宋適相遇為說豫獨從趙氏杜氏簡禮而㑹之言者蓋孫劉葉氏之說公羊之餘意也如公與宋公果不期而適相遇必有所往之處而適邂逅於中途今經傳不載其所往之處而但書遇則知遇者相期簡禮以見也蓋邵氏寶曰古之遇也適今之遇也預同禮而異情非禮之禮也君子不謂之禮也王氏樵曰以下文推之此非無事而遇蓋有所謀宋魯合交將以謀鄭托於無約而遇蓋祕其迹也宋公陳侯蔡人衛人伐鄭此諸侯㑹伐之始亦東諸侯分黨之始蔡杜注汝南上蔡縣今屬河南汝寧府縣西南十里有故蔡國城孔疏蔡國侯爵譜云姬姓文王子叔度武王封之於汝南上蔡為蔡侯左傳宋殤公之即位也公子馮出奔鄭鄭人欲納之及衛州吁立將修先君之怨於鄭而求寵於諸侯以和其民使告於宋曰君若伐鄭以除君害君為主敝邑以賦與陳蔡從則衛國之願也宋人許之於是陳蔡方睦於衛故宋公陳侯蔡人衛人伐鄭圍其東門五日而還公問於衆仲曰衛州吁其成乎對曰臣聞以德和民不聞以亂以亂猶治絲而棼之也夫州吁阻兵而安忍阻兵無衆安忍無親衆叛親離難以濟矣夫兵猶火也弗戢將自焚也夫州吁弒其君而虐用其民於是乎不務令德而欲以亂成必不免矣胡傳春秋之法誅首惡興是役者首謀在衛而以宋主兵何也前書州吁弒君其罪已極至是阻兵修怨勿論可也而鄰境諸侯聞衛之有大變也可但已乎陳恆弒簡公孔子沐浴而朝告於哀公請討之公曰告夫三子者子曰以吾從大夫之後不敢不告也之三子告不可曰以吾從大夫之後不敢不告也然則鄰有弒逆聲罪赴討雖先發而後聞可矣宋殤不恤衛有弒君之難欲定州吁而從其邪說是肆人欲滅天理非人之所為也故以宋公為首諸國為從示誅亂臣討賊子必先治其黨與之法也集說程子曰宋以公子馮在鄭故與諸侯伐之也摟諸侯以伐諸侯固為罪矣而衛弒其君天下所當誅也乃與修好而同伐人其惡甚矣當張氏洽曰宋殤受國於穆公而馮有爭位之心正修德和民外好鄰國則其位自定而馮無所伺其隙矣況州吁逆賊內懷見討之懼而欲納交殤公苟名其為賊告於王而討之則一舉而君臣父子之倫定今乃怵於邪說合陳蔡以助逆賊使宋國之人不復知君臣順逆之正理而弒逆之事卒及其身皆殤公不能早辨於此役也家氏鉉翁曰是役本衛志而序宋為首責宋深矣宋公書爵目其人而貶之也絶吳氏仲迂曰孔子作春秋以討亂賊是年春秋已筆而猶請討陳恆作春秋者莫如孔子用春秋者亦莫如孔子汪氏克寬曰弼風擊鼓詩序云州吁用兵暴亂使公孫文仲將而平陳與宋經書衛人於蔡人之下所以誅文仲黨惡而忘讎也陳氏際泰曰東諸侯分黨鄭之禍自此始鄭者天下之所必爭也魯東諸侯也晉北諸侯也秦西諸侯也楚南諸侯也入春秋以來四方無有不伐鄭者矣齊桓晉文秦穆楚莊自主盟以來五霸無有不爭鄭者矣秋翬帥師翬許歸反之此大夫㑹伐始左傳秋諸侯復伐鄭宋公使來乞師公辭之羽父請以師㑹之公弗許固請而行故書曰翬帥師疾之也胡傳宋人來乞師而公辭之羽父請以師㑹而公弗許其辭弗許義也翬以不義強其君固請而行無君之心兆矣夫公子公孫升為貴戚之卿者其植根膠固難御於異姓之卿況翬已使主兵而方命乎隱公不能早罷其兵權是以及鍾巫之禍春秋於此去其公子以謹履霜之戒集說杜氏預曰公子翬魯大夫不稱公子疾其固請強君以不義也諸外大夫貶皆稱人至於內大夫貶則皆去族稱名於紀事之體他國可言某人而已魯之卿佐不得言魯人此所以為異也孫氏復曰翬不氏未命也當劉氏敞曰公羊以謂翬不氏者與弒公貶也非也此之時翬未弒君可得貶乎穀梁曰不稱公子貶之也非也欲貶翬者宜於此稱公子既弒君而除之無為先事而貶也又曰曷為或㑹言伐或及言伐㑹者聚辭也及者繼辭也其程子曰宋虐用其民衛當誅之賊而與之同伐人罪大矣二國搆怨而他國與之同伐其罪均也子薛氏季宣曰師興而後翬㑹之陳氏傅良曰公翬則曷為但稱翬以大夫而㑹伐於諸侯於是始故名之也宋吕氏大圭曰書帥師則翬專兵可知故單伯㑹伐不言帥師伐齊氏履謙曰伐者出師之總名周禮大司馬掌九之法眚壇侵削正殘杜滅伐總謂之伐正猶春秋書伐其侵圍入滅之類皆伐之事也然經有重言其事者有不重言其事者有但言其事而不言伐者重言其事者如伐鄭圍長葛伐杞取牟婁之類是也必繫之國以見其為某國之邑也不重言其事者如伐楚次于陘伐鄭㑹于蕭魚之類是也雖曰伐而實未有事乎伐也但言其事而不言伐者侵入滅及圍國之類是也不言伐者省文也戰而言伐者伐兵也不言伐者非伐兵也及齊師戰于奚傳言疆事及楚人戰于城濮經書楚人救衛之類是也亦有史失其事而經則泛書曰伐者翬帥師㑹伐鄭之類是也㑹宋公陳侯蔡人衛人伐鄭左傳諸侯之師敗鄭徒兵取其禾而還胡傳春秋立義至精詞極簡嚴而不贅也若曰翬帥師㑹伐鄭豈不白乎再序四國何其詞費不憚煩也四國合黨翬復㑹師同伐無罪之邦欲定弒君之賊惡之極也再序四國而誅討亂臣之法嚴矣集說程子曰再序四國重言其罪左氏以為再伐妄也陳氏傅良曰公子弒君衛人不踰年能討之衛猶有臣子也而五國之君大夫伐鄭以定州吁苟有人心焉不若是甚矣書之復書之春秋僅一再見焉特書之法嚴矣九月衛人殺州吁于濮濮音卜水濮杜注陳地名左傳州吁未能和其民厚問定君於石子石子曰王覲為可曰何以得覲曰陳桓公方有寵於王陳衛方睦若朝陳使請必可得也厚從州吁如陳石碏使告於陳曰衛國褊小老夫耄矣無能為也此二人者實弒寡君敢即圖之陳人執之而請涖於衛九月衛人使右宰醜涖殺州吁于濮石碏使其宰獳羊肩涖殺石厚於陳君子曰石碏純臣也惡州吁而厚與焉大義滅親其是之謂乎公羊其稱人何討賊之辭也榖梁稱人以殺殺有罪也祝吁之挈失嫌也于濮者譏失賊也胡傳公羊子曰稱人者何討賊之辭也其義是矣于濮者憫衛國之人著諸侯之罪也夫州吁二月弒君而不能即討者緣四國連兵欲定其位故久然後能殺之于濮爾非諸侯之罪而何夫以討賊許衆人而以失賊罪鄰國與賊者寡矣故曰春秋成而亂臣賊子懼集說何氏休曰明國中人人得討之所以廣忠孝之路書者善之也范氏寧曰有弒君之罪者則舉國之人皆欲殺之人趙氏匡曰凡作亂自立為君而國人殺之者皆稱以殺言衆所共棄不君之也被孫氏復曰稱人以殺討賊亂也其言于濮者桓公弒至此八月惡衛臣子緩不討賊俾州吁出入自恣也又劉氏敞曰傳曰石碏殺之其稱人何討賊之辭也曰杜氏云未列於㑹故不稱君是篡弒之人已㑹諸侯則無咎矣此豈王法哉秋程子曰稱衛人衆辭也舉國殺之也朱子曰春之法亂臣賊子人人得而誅之不必士師也同胡氏寧曰陸淳云經中一字遍施於諸例而義不者惟人字爾或衆而稱人或美而稱人或諱而稱人或貶而稱人或賤而稱人髙氏閌曰稱國稱人稱地所以廣忠臣孝子之義使人人皆得殺之而無間於尊卑又使亂臣賊子雖竊發於一時而天地之大四海之廣欲逃無所也討家氏鉉翁曰此石碏殺之若書碏則是一人之私而不見其從衆望故惟書衛人李氏廉曰春秋討賊書人例六州吁無知陳他徵舒欒盈良霄是也欒盈良霄雖非弒君而皆叛逆之臣故書法同晉里克弒君而惠公殺之不以其罪故不豫以討賊楚比弒君而棄疾殺之亦非正故不成其為賊商臣弒君而齊人殺之蔡般弒父而楚子殺之不得例於討賊者罪齊蔡國人不以為賊而君之也汪氏克寬曰宋萬之弒宋人求賊於陳慶父之弒魯人求賊於莒皆責賂而後與今陳人能執州吁而不匿賊取賂亦賢於後此陳莒之為矣然陳乃衛桓之母家而陳侯亦親率兵㑹伐鄭欲定其位則今日之善不足以贖前日之過故經不書陳人執州吁而止著衛人之殺之也劉氏實曰時石碏請於陳而殺之今乃稱衛人殺何也此見舉國之人皆有討賊之心亦見衛猶有人能以討賊為事也王氏錫爵曰石子不正言州吁之不當立而乃以王覲紿其子何也豈其時姦黨衆盛言之無益且恐泄其於陳之討耶冬十有二月衛人立晉左傳衛人逆公子晉於邢冬十二月宣公即位書曰衛人立晉衆也邢杜注國名在廣平襄國縣今直隸順德府邢臺縣西南襄國故城即其地公羊晉者何公子晉也立者何立者不宜立也其稱人何衆立之之辭也然則孰立之石碏立之石碏立之則其稱人何衆之所欲立也衆雖欲立之其立之非也榖梁衛人者衆辭也立者不宜立者也晉之名惡也其稱人以立之何也得衆也得衆則是賢也賢則其曰不宜立何也春秋之義諸侯與正而不與賢也胡傳人衆辭立者不宜立也晉雖諸侯之子內不承國於先君上不禀命於天子衆謂宜立而遂自立焉可乎故春秋於衛人特書曰立所以著擅置其君之罪於晉絶其公子所以明專有其國之非以此垂法而父子君臣之義明矣集說何氏休曰諸侯立不言立此獨言立明不宜立之辭范氏寧曰嗣子有常位故不言立立納入皆非正也劉孫氏復曰諸侯受國於天子非國人所得立也氏敞曰衆知晉之可以立不知立君之非衆石碏知晉之得乎衆可以為君不知立晉之非已是以謂之不宜立也孫氏覺曰晉以國人衆立宜有得立之理聖人特於疑似之間而明不當立之義程子曰諸侯之立必受命於天子當時雖不受命於天子猶受命於先君衛人以晉公子也可以立故立之春秋所不與也雖先君子孫不由天子先君之命不可立也故去其公子氏葉氏夢得曰晉桓公之弟也不氏未三命也髙閌曰晉乃桓公之弟莊公之子於次當立又國人之所同欲而謂之不宜立何也彼曰我君之子也國我之國我宜立國人亦曰彼吾君之子也國乃其國彼當立是諸侯之子不必命於天子特以公子之親衆人宜之而自立也如此則千乘之國皆可擅置其君而邦君之子皆可專有其國矣程氏迥曰衛人立晉一國之公也尹氏立朝一族之私也辭陳氏傅良曰爭國不稱公子晉則何為以爭國之書之衛之臣子可以討賊不可以置君州吁為僇而晉受之上無天子下無君父是亦爭國而已矣繼故未有書立者賊不討君不葬譏不在立也是故宋殤之弒也馮立閔之弒也御說立晉靈之弒也黑臀立厲之弒也周立皆不書必若衛人賊討君葬而後書立君家氏鉉翁曰不書石碏之名氏而曰衛人立晉立從衆望也非一人所得而私立也人鄭氏玉曰石碏之言曰老夫耄矣無能為也此二者實弒寡君敢即圖之懇惻之意形於言表宜陳人為之動心而州吁之見執也惜其習於當時聞見之陋不知國君非人臣所可置公子晉之立不能請命天王故聖人既美其討賊於前復著其擅立於後李氏廉曰春秋書立四晉與子朝皆不宜立武宫煬宫皆非所當立也故書法同晉為國人所與子朝獨為尹氏所與故書法異朝書王子而晉不書公子者朝之罪已顯晉之得衆疑於當立故特去公子以見之也汪氏克寬曰殺州吁衆辭乃王法所當討而衛人皆欲討之故書人以善之立晉衆辭乃無天王之命而衛人以私意擅立之故書人以罪之美惡不嫌同辭侯髙氏攀龍曰未有為子而不受之父也未有為諸而不受之王也內不承國於先君故不稱公子上不稟命於天子故稱衛人立知張氏溥曰州吁宜殺天下知之晉不宜立天下不也春秋辨焉天下之父子君臣定矣癸桓王亥二年五年齊僖十三年晉鄂六年衛宣晉元年蔡宣三十二年鄭莊二十六年曹桓三十九年陳桓二十七年杞武三十三年宋殤二年秦文四十八年楚武二十三年春公觀魚于棠觀左作矢侯棠杜注髙平方與縣北有武唐亭魯觀魚臺今兗州府魚臺縣魚亭山是其處也左傳公將如棠觀魚者臧僖伯諌曰凡物不足以講大事其材不足以備器用則君不舉焉君將納民於軌物者也故講事以度軌量謂之軌取材以章物采謂之物不軌不物謂之亂政亂政亟行所以敗也故春搜夏苖秋獮冬狩皆於農隙以講事也三年而治兵入而振旅歸而飲至以數軍實昭文章眀貴賤辨等列順少長習威儀也鳥獸之肉不登於爼皮革齒牙骨角毛羽不登於器則公不射古之制也若夫山林川澤之實器用之資皂隸之事官司之守非君所及也公曰吾將略地焉遂往陳魚而觀之僖伯稱疾不從書曰公矢魚于棠非禮也且言逺地也公羊何以書譏何譏爾逺也公曷為逺而觀魚登來之也百金之魚公張之登來之者何美大之之辭也棠者何濟上之邑也榖梁傳曰常事曰視非常曰觀禮尊不親小事卑不尸大功魚卑者之事也公觀之非正也胡傳隱公慢棄國政逺事逸遊僖伯之忠言不見納亦已矣又從而為之辭是縱欲而不能自克以禮也特書觀魚譏之也集說杜氏預曰書陳魚以示非禮也書棠譏逺地也孔氏穎達曰陳魚者獸獵之類謂使捕魚之人陳設取魚之備觀其取魚以為戲樂非謂既取得魚而陳列之也說文云魚捕魚也然則捕魚謂之魚天官漁人掌以時漁為梁凡漁者掌其政令是謂捕魚為魚魚者猶言獵者也孫氏復曰觀魚非諸侯之事也天子適諸侯諸侯朝天子無非事者動必有為也隱公怠棄國政觀魚于棠可謂非事者矣程子曰諸侯非王事民事不逺出逺出觀魚非道也獲葉氏夢得曰古者天子諸侯將祭必親射牲因而禽以共祭春獻魚之節也公將以盤遊蓋託射牲以祭焉以公為荒矣家氏鉉翁曰譏公之從事於遊畋非其時非其地也隱公浸驕矢魚於逺春秋書之譏也亦危之也棠在宋魯之間無故而輕出寪氏之禍其兆於斯乎寢吳氏澄曰古者天子季冬之月命漁師始漁先薦廟隱公蓋非為宗廟嘗魚而往棠乃逺地漁師取魚而公往觀之特為遊觀之樂耳㑹李氏廉曰觀例二觀魚則以縱欲為譏觀社則以祀為貶皆舉動之妄也則汪氏克寬曰月令季冬乃周之二月經書春觀魚是周正月未當嘗魚之時隱公决非為嘗魚而往明矣苟隱公果為嘗魚薦廟則為常事得禮而不書矣邵氏寶曰魚者漁也故比於狩而加觀焉狩者人之所有事也狩之過則有書焚咸丘者矣附録左傳曲沃莊伯以鄭人邢人伐翼王使尹氏武氏助之翼侯奔隨曲沃杜注在河東聞喜縣今屬山西平陽府縣翼杜注在平陽絳邑縣東今山西平陽府翼城是也縣東南有古翼城屬隨杜注晉地今介休縣東有古隨城山西汾州府夏四月葬衛桓公左傳衛亂是以緩榖梁月葬故也胡傳諡者行之迹所以紀實德垂勸戒也列爵惟五皆王命也衛本侯爵何以稱公見臣子不請於王而私自諡耳春秋於邦君薨正以王法而書卒至於葬則從其私諡而稱公或革或因前以貶不臣順之諸侯後以罪不忠孝之臣子辭顯而義微皆所以遏人欲存天理大居正也集說杜氏預曰有州吁之亂十四月乃葬魯程子曰衛亂是以緩稱桓公見國人私諡也往㑹故書送終大事也必就正寢不殁於婦人之手曽子易簀而殁豈苟然乎死而加之不正之諡知忠孝者肯為乎終張氏洽曰春秋之時為臣子者皆無以正君父之程子之言深足以發明一經書葬之㫖桓公名完而諡桓蓋古不諱嫌名也弒家氏鉉翁曰凡弒而賊不討不書葬無臣子也此而葬以州吁即刑衛之臣子能葬其君也公李氏廉曰程子私諡之說本啖子春秋諸國皆稱獨蔡桓稱侯蓋告王請諡故特書之明得禮也見汪氏克寬曰先王之制諸侯初立喪畢則以士服天子而賜之命及其殁則臣子請於王而賜之諡今衛桓公諡不當其行號不同其爵春秋據事直書而罪自見矣榖梁云月葬故也非也後此蔡宣曹桓鄭莊皆非弒何以月葬乎於季氏本曰禮賤不誄貴幼不誄長故大夫之諡請諸侯諸侯之諡請於天子是勸懲之權制於上也世衰諸侯死不請諡無怪乎其加溢美之稱矣案春秋於列國諸侯書葬者五十一而月葬者三十三豈皆有故乎汪氏克寬駁之是也後凡以月葬為故者皆刪附録左傳四月鄭人侵衛牧以報東門之役衛人以燕師伐鄭鄭祭足原繁泄駕以三軍軍其前使曼伯與子元潛軍軍其後燕人畏鄭三軍而不虞制人六月鄭二公子以制人敗燕師於北制君子曰不備不虞不可以師立曲沃叛王秋王命虢公伐曲沃而哀侯於翼牧杜注衛邑今汲縣地也屬河南衛輝府城燕杜注南燕國東郡燕縣今汲縣西有古東燕孔疏燕有二國一稱北燕故此注南燕以别之地理志南燕國姞姓黃帝之後制杜注北制鄭邑河南成皋縣也一名虎牢今汜水縣西有虎牢城屬河南開封府秋衛師入郕郕音成公作盛鄉郕杜注郕國也東平剛父縣西南有郕今山東兗州府寧陽縣北有盛鄉城是也堽城壩即剛父故縣孔疏史記郕叔武文王子武王之母弟後世無所見不知其君號諡惟文十二年書郕伯來奔則郕國伯爵也左傳衛之亂也郕人侵衛故衛師入郕公羊曷為或言率師或不言率師將尊師衆稱某率師捋尊師少稱將將卑師衆稱師將卑師少稱人君將不言率師書其重者也榖梁入者內弗受也郕國也將卑師衆曰師胡傳稱師者紀其用衆而立義不同有矜其盛而稱師者如齊師宋師曹師城邢之類是也有著其暴而稱師者楚滅陳蔡公子棄疾主兵而曰楚師之類是也有惡其無名不義而稱師者次于郎以俟陳蔡及齊圍郕之類是也衛宣繼州吁暴亂之後不施德政固夲恤民而毒衆臨戎入人之國失君道矣書衛師入郕著其暴也集說程子曰衛晉乘亂得立不思安國保民之道以尊王為先居喪為重乃興戎修怨入人之國書其失道也連黃氏震曰郕被鄰國之兵自衛始至隱十年齊鄭兵入郕莊八年公又及齊師圍郕而郕降于齊文十二年郕伯來奔自此不復見於經計失地而奔國遂滅矣家氏鉉翁曰有以書師而褒者有以書師而貶者褒貶在事而不在師也又曰此入郕入而弗有也十年齊鄭入郕知此入之弗有非其力之可以取而不取蓋懼強國來討雖入之而弗敢遂有之耳吳氏澄曰衛與郕皆文王之子所封莒入向魯入極且不可况以師而入兄弟之國乎何張氏溥曰桓公方葬師即入郕送終何其緩用兵其急憂亂者䏻無為宣懼乎九月考仲子之宫公羊考宫者何考猶入室也始祭仲子也桓未君則曷為祭仲子隱為桓立故為桓祭其母也然則何言爾成公意也榖梁考者何也考者成之也成之為夫人也禮庶子為君為其母築宫使公子主其祭也於子祭於孫止胡傳考者始成而祀也其稱仲子者惠公欲以愛妾為夫人隱公欲以庶弟為嫡子聖人以為諸侯不再娶於禮無二適孟子入惠公之廟仲子無祭享之所為别立宫以祀之非禮也故因其來賵而正名之曰仲子之賵因其考宫而正名之曰仲子之宫而夫人衆妾之分定矣隱公攝讓之實辨矣桓公篡弒之罪昭矣存則以氏繫姓以姓繫號殁則以諡繫號以姓繫諡者夫人也存不稱號殁不稱諡單舉姓氏者妾也凡宫廟非志災失禮則不書集說服氏虔曰宫廟初成祭之名為考惠杜氏預曰成宫安其主而祭之諸侯無二嫡公欲以仲子為夫人隱公成父之志為别立宫也是孫氏復曰考成也元年宰咺歸賵非禮也隱公以考仲子之宫祭之此又甚矣夫宗廟有常故公夫人之廟皆不書陳氏傅良曰仲子之宫别廟也古者妾祔於妾祖姑無妾祖姑則易牲而祔於女君别廟非禮也非家氏鉉翁曰隱為桓築宫以祭其母公子允之母魯君所宜為之立廟也春秋書之譏也仲李氏廉曰存不稱號殁不稱氏單舉姓氏者妾也子之例是矣成風敬嬴定姒齊歸皆妾母而全用夫人之禮直書以貶之也哀公母姒氏卒蓋以有子則廟廟則書卒葬無貶也昭公娶孟子則以同姓而諱之也而汪氏克寬曰諸侯妾母祇當以氏繫字魯自成風後妾母皆稱夫人稱小君稱諡惟定姒以哀未成君不稱夫人及小君然亦襲成風敬嬴齊歸之例而稱諡矣夫人且不當别有諡而况妾乎又曰榖梁云庶母築宫而君終則廢禮曰妾母不世祭乃庶子為君之禮也若庶子未為君而祭其妾母則固無其禮也禮稱女君死則妾為女君之黨服攝女君則不為先女君之黨服所以防嫡妾之亂也孟子卒則聲子攝小君矣仲子先君之妾耳安可為之立宫乎隱公立宫以祭庶弟之母遂啓後世追尊妾母皆援春秋考宫之義聖人特書以著失禮之始厥後成風敬嬴定姒齊歸皆以妾母祔廟而不書矣凡經書宫廟若西宫新宫桓宫僖宫則以災而書作新宫合禮則不書世室屋壞則書新作世室合禮亦不書丹桓宫楹郟桓宫桷過侈非禮則書武宫煬宫親盡不當立則書取郜鼎納於大廟禘於大廟用致夫人大事於太廟躋僖公有事於大廟仲遂卒猶繹非禮皆書凡易世立先君之廟得禮皆不書案仲子實桓母說見歸賵初獻六羽左傳九月考仲子之宫將萬焉公問羽數於衆仲對曰天子用八諸侯用六大夫四士二夫舞所以節八音而行八風故自八以下公從之於是初獻六羽始用六佾也公羊初者何始也六羽者何舞也榖梁初始也尸子曰舞夏自天子至諸侯皆用八佾初獻六羽始厲樂矣胡傳初者事之始魯僭天子之禮樂舊矣是成王過賜而伯禽受之非也用於太廟以祀周公已為非禮其後羣公皆僭用焉仲子以别宫故不敢同羣廟而降用六羽書初獻者眀前此用八之僭也集說杜氏預曰魯惟文王周公廟得用八而他公遂因仍僭而用之范氏寧曰佾之言列八人為列羽翟雉之羽舞者所執人執一羽不言六佾言佾則干在其中孫氏復曰魯僭用天子禮樂舞則八佾孔子不敢斥也故因減用六羽以見其僭天子之惡劉氏敞曰魯祭周公宜用八佾祭魯公宜用六佾祭羣公宜四佾今祭仲子用六佾是以仲子僭魯公且以羣公僭周公矣孫氏覺曰凡舞有千羽此不言干但言羽者婦人無武事但陳羽舞也廟程子曰成王賜魯用天子禮樂祀周公後世遂羣皆用仲子别宫故不敢同羣廟而用六羽也書初獻見前此用八之僭也仲尼以魯之郊禘為周公之道衰用天子之禮樂祀周公成王之過也公蘇氏轍曰天子八佾諸侯六大夫四士二魯以周祭文王文王周公之廟用八諸侯因之非禮也亦朱子曰使魯不曽用天子之禮樂則三家雖欲僭無緣見此等禮樂而用之次吕氏祖謙曰孟子古王制皆以公侯為大國伯為國子男為小國計其土地大小是也其禮數髙下皆稱公榖又以為天子八佾諸公六諸侯四亦異於王制孟子古書所記當時禮文公侯多為一等未嘗有以侯為一等伯子男同為一等者然則公榖之出去孔子之世逺甚程氏端學曰以諸侯夫人用六羽猶為僭今妾用之聖人所以傷周禮之大壞也汪氏克寬曰春官樂師有羽舞有干舞籥師祭祀則鼓羽籥之舞司干祭祀舞者既陳則授舞器然則祭祀或文舞武舞並用或止用文舞而不用武舞也又曰魯僭天子禮樂春秋因事書之以著其罪諸侯六佾而魯僭八佾隱公以仲子别立宫當下於羣公之廟疑其羽數乃從衆仲而改用六羽蓋隱公之心若曰先公之廟可循舊用天子所賜之禮仲子别宫祇當用諸侯之禮而不知先君之妾不可與君同安可用諸侯之禮乎孔子之時季氏舞八佾則知隱公惟用六佾於仲子之宫而羣公仍僭八佾厥後成風敬嬴定姒齊歸皆以妾母用小君之禮則隱公為仲子立宫而獻六羽有以啓之也公榖皆云天子八佾諸公六佾諸侯四佾然樂舞之數自上而下降殺以兩諸侯既降于諸公則諸伯當降於諸侯而用二佾矣子男復何所用乎况禮經所記廟制堂制袞旒席數五等諸侯皆同豈以舞佾而獨異其制乎然邵氏寶曰獻六羽何以書初眀前此用八之僭也則仲子而用六羽可乎臣擬君妾擬嫡其僭一也矣張氏溥曰六羽夫人禮也仲子妾而夫人禮亦僭惟隱之厚桓母至則桓之弒隱罪益深是故薨而歸賵宫成而祭祭而奏樂一婦人也記之綦詳痛隱惡桓也案妾不可僭嫡猶臣不可僭君以用六為善蓋本孔穎逹善其復正之說不知書初獻所以明八佾之僭書六羽所以眀妾母之僭而已無所謂善也邾人鄭人伐宋左傳宋人取邾田邾人告於鄭曰請君釋憾於宋敝邑為道鄭人以王師㑹之伐宋入其郛以報東門之役宋人使來告命公聞其入郛也將救之問於使者曰師何及對曰未及國公怒乃止辭使者曰君命寡人同恤社稷之難今問諸使者曰師未及國非寡人之所敢知也胡傳凡班序上下以國之小大從禮之常也而盟㑹征伐以主者先因事之變也然則衛州吁告於宋以伐鄭事與此同而聖人以宋為主者何此春秋撥亂之大法也凡誅亂臣賊子必深絶其黨集說杜氏預曰邾主兵故序鄭上欲孔氏穎達曰雖小國主兵即序於大國之上見伐由其國善惡所歸故也雖大夫為主國君從之亦序主兵於上僖二十七年楚人陳侯蔡侯鄭伯許男圍宋注云傳言楚子使子玉去宋經書人者恥不得志以微者告猶序諸侯之上楚主兵故是微人主兵亦序國君之上史策之常法也序程子曰先邾人為主也侵家氏鉉翁曰邾小國而於鄭之上兵首也邾見於宋當告之天子請之方伯聲其罪而治之不當間宋鄭之隙而偕鄭以伐宋春秋所不與也鄭以伯爵而序於邾之下亦所以貶也邾陳氏深曰春秋書人謂微者士也宋大國邾小國假鄭之力又㑹王師以同伐决非微者書曰人蓋貶其以小加大不量力而窮兵以逞賤之故也李氏廉曰主兵例桓十三年齊先宋僖二年虞先晉皆以小國序大國之上非主兵而小國序大國之上則伯者為之如莊十六年許男滑伯文十四年許男曹伯成十五年邾子把伯襄十年齊世子光之類是也州吁伐鄭而宋主兵衛圍戚而齊國夏主兵春秋討黨賊之法也鄭汪氏克寬曰㑹􅉀則先主㑹征伐則先主兵又曰人以王師㑹伐宋而經序邾為首不書王臣蓋鄭莊是時為王卿士故擅興天子鄉遂之兵非王室遣將故不書也螟音冥此蟲災始公羊何以書紀災也榖梁螟蟲災也胡傳蟲食苖心曰螟食葉曰螣食節曰賊食根曰蟊國以民為夲民以食為天詩去螟螣害稼也春秋書螟記災也聖人以是為國之大事也故書而近世王安石乃稱為人牧者不必論奏災傷之事亦獨何哉甚矣其不􅊰於聖人之經以欺當年而誤天下與來世也集說杜氏預曰蟲食苗心者為災故書行范氏寧曰甚則即盡不及厯月月令曰仲春夏令則蟲螟為害程孔氏穎達曰食禾心曰螟言其姦冥冥難知也子曰書螟書螽皆為災也國之大事故書也朱子曰書山崩地震螽螟之類知災異有所自致薛氏季宣曰異天之變也災人之害也賢君恐懼修省消災變之道也哀家氏鉉翁曰春秋變見於上必書災見於民必書十二年冬螽傳者歸過于司厯之失閠此諛臣所以蔽災而託為聖人之言豈春秋書水旱螽螟之㫖哉齊氏履謙曰案春秋所書有災有異害及於民之謂災物反其常之謂異然二者魯皆備書諸國惟異則書之蓋災則事止一國異則理關天下故於內外所書如此隱汪氏克寬曰春秋書蟲災者十四書螟者三而在公之世者二在莊公之世者一書螽者十而桓僖文襄四公之世各一宣公之世者三哀公之世者三書蝝生者一亦在宣公之世蓋宣公以弒兄得國而又改法稅畝重困農民故螽蝝水旱饑饉之災比嵗相仍猶不知恐懼修省以消天變聖人備書為後鑒也案春秋記災或月或時皆據實書之非有義例也若計其久暫則時甚於月乃謂甚則月不甚則時何耶榖梁之說非也冬十有二月辛巳公子彄卒彄苦侯反左傳臧僖伯卒公曰叔父有憾於寡人寡人弗敢忘葬之加一等胡傳公將如棠觀魚者僖伯諫而不聼則稱疾不從可謂忠臣矣葬之加一等夫是之謂稱然隱公不敢忘其忠而不䏻聼其言與郭公善善而不䏻用至於亡國一也其及宜矣集說杜氏預曰大夫書卒不書葬葬者臣子之事非公家所及故不書葬陸氏淳曰趙子曰魯卿有王命者即書卒尊吾命卿所以尊王命也曰孫氏復曰公子彄臧僖伯也孝公子葉氏夢得公子彄吾大夫之三命者也臧髙氏閌曰其子臧孫達嗣是為哀伯自是終春秋氏世預魯國之政吕氏大圭曰榖梁云隱不爵命大夫蓋謂隱攝而非君也然其生也稱公其殁也稱薨魯之臣子皆以君待之矣非攝也豈有不爵命大夫乎彼見無駭之不稱公子求其說而不得故云爾家氏鉉翁曰胡氏曰書日見恩禮之厚然日不日不繫乎褒貶稱汪氏克寬曰僖伯以先公子必未賜族蓋左氏追氏如陳桓未卒而稱陳桓公有寵於王大湛氏若水曰重親者貴者賢者之故也宋人伐鄭圍長葛此書圍之始城長葛杜注穎川長社縣北有長葛今河南開封府許州長葛縣北十二里有故城左傳宋人伐鄭圍長葛以報入郛之役也穀梁伐國不言圍邑此其言圍何也久之也伐不踰時戰不逐奔誅不填服胡傳圍者繯其城邑絶其往來之使禁其樵採之途城守不下至於經年而不解誅亂臣討賊子可也長葛鄭邑何罪乎書圍於此而書取於後宋人之惡彰矣集說范氏寧曰宋以此冬圍之至六年冬乃取之古者師出不踰時重民之命愛民之財乃暴師經年僅而後克無仁隱之心而有貪利之行故圍伐兼舉以眀之趙氏匡曰伐國而圍邑皆書之不可偏遺也公羊曰強也夫一邑之強亦何䏻為而特書乎劉氏敞曰公羊以謂邑不言圍非也圍之為義施於塹守而已無擇於國與邑也茍有告者則書之何為不言乎且春秋之所以不擇於國與邑而悉書之者為害民傷財也何謂邑不言圍為杜氏諤曰春秋書圍四十四伐國而言圍者九此之首書伐書圍書取惡之也城程子曰伐國而圍邑肆其暴也也髙氏閌曰圍人邑者其兵必衆而稱人者貶之家氏鉉翁曰宋穆公受國於宣公及其卒也復以歸宣公之子而使己子馮出居於鄭殤公不仁日以殺馮為事輒率諸侯伐鄭以有東門之役自是兵連不解宋殤實為禍首書伐書圍責其暴也吳氏􅊹曰前書莒人伐把取牟婁一加兵即取其邑取之易也宋雖加兵於鄭之邑而取之難故圍之經年乃得取宋李氏廉曰伐國圍邑四而有二例伐鄭圍長葛伐圍緡皆著其暴也齊侯伐鄭圍新城則又以著其無貪地之心辭同而義異矣或曰外伐之圍邑僅四魯一國而被伐圍邑亦四何也趙子曰內事詳故悉書外事不告則不書矣甲桓王子三年六年齊僖十四年晉哀侯光元年衛宣二年蔡宣三十三年鄭莊二十七年曹桓四十年陳桓二十八年杞武三十四年宋殤三年秦文四十九年楚武二十四年春鄭人來輸平輸左作渝左傳更成也公羊輸平者何輸平猶墮成也何言乎墮成敗其成也曰吾成敗矣吾與鄭人末有成也吾與鄭人則曷為末有成狐壤之戰隱公獲焉然則何以不言戰諱獲也穀梁輸者墮也平之為言以道成也來輸平者不果成也胡傳輸者納也平者成也鄭人曷為納成於魯以利相結解怨釋讎離宋魯之黨也公之未立與鄭人戰於狐壤止焉元年及宋􅉀於宿四年遇於清其秋㑹師伐鄭即宋魯為黨與鄭有舊怨明矣五年鄭人伐宋入其郛宋來告命魯欲救之使者失辭公怒而止鄭伯知其有間可乘也是以來納成爾然則善之乎曰平者解怨釋讎固所善也輸平者以利相結則貶矣曷為知其相結之以利也後此鄭伯使宛來歸祊而魯入其地㑹鄭人伐宋得郜及防而魯又取其二邑是知輸平者以利相結乃貶之也集說杜氏預曰和而不􅉀曰平變孔氏穎達曰渝變也變更前惡而復為和好即更之義成即平之訓故傳解渝平謂之更成自狐壤以來與鄭不和今日復和故曰更成言更復狐壤以前之好也孫氏復曰鄭人來輸誠於我平四年翬㑹諸侯伐鄭之怨也平者釋憾之辭孫氏覺曰輸者納也鄭人請和來納其平􅉀葉氏夢得曰輸猶輸粟然有物以將之也和而不曰平來外辭也何以不言及鄭平方請未平也人微者也而程氏迥曰輸如吕刑輸而孚之輸我無欲平之意鄭輸其平於我陳氏傅良曰渝平釋憾而為平也平不書必關於天下之故而後書書渝平以志諸侯之合書及鄭平以志諸侯之散是春秋之所終始也為張氏洽曰鄭莊之納平非有講信修睦之心而深合黨敵宋之計是以不憚屈已求和於魯繼以納祊而未即求許所以為敗宋入許之權輿魯隱亦入於其術中而不悟也故惟胡氏之說為得春秋之㫖曰吕氏大圭曰春秋書平者六而此獨書來輸何也平者解讎釋怨之辭也平之義則一而情異矣宋人及楚人平則宋欲之也及齊平則兩相下也宋及楚平蓋出于不得已也魯及齊平則齊知敬魯而魯亦不欲加兵於齊也若夫來輸平則直出於鄭伯之意爾言來輸則有自屈損之意豈誠敬魯畏魯欲與魯釋其舊憾哉特以魯宋方合而幸其有可乘之隙於是乎自屈損以求成爾吳氏􅊹曰來者彼來求我非我往求彼也輸謂輸寫其情平謂兩國昔有忿怨如地之不平今悉剗削而使之平也輸平猶曰納欵也上年魯嘗同宋衛伐鄭今鄭釋其怨而求和於魯故曰來輸平齊氏履謙曰渝當依公榖作輸彼欲而求成於我曰輸我欲而往平於彼曰暨兩相欲曰及鄭人來輸平是彼欲而求成於我也宋及楚平是兩相欲也暨齊平是我欲而往平於彼也汪氏克寬曰經書平者凡六惟此言輸平輸之為言必有貨賂行乎其間而非虛言求平矣乃鄭志而非魯志茍不以利啖魯則魯必不從也其劉氏實曰輸納也此必有挾而來謂之輸平謂平前日之怨爾曰來輸平見我無所欲鄭人有所挾而來請和於我爾豈非欲離宋魯之交而為他日敗宋之計乎張氏溥曰鄭莊歲與宋戰務孤宋援特來輸平魯遂讎宋而專從鄭雖鄭莊之狡善於離合人國抑在魯未可謂信也盟宿遇清守信不固鄭始得而用之不然胡為乎十一年之中五年黨宋六年黨鄭也哉案輸平渝平三傳互異左氏以渝平為更成公榖以輸平為墮成考前年公子翬伐鄭有憾而未平則更成之說於義為近但左氏謂變前惡而為和好則渝與平為二意葉氏胡氏諸儒多主公榖作輸而訓輸為納言其納平於我而變更前惡之意亦在其中矣文從公榖義從左氏似為得之故三傳並存焉附録左傳翼九宗五正頃父之子嘉父逆晉侯於隨納諸鄂晉人謂之鄂侯鄂杜注晉别邑今在平陽府鄉寧縣南夏五月辛酉公㑹齊侯盟于艾艾五蓋反艾此齊魯交好之始杜注泰山牟縣東南有艾山今在山東青州府䝉陰縣西北左傳夏􅉀于艾始平於齊也集說杜氏預曰春秋前魯與齊不平今棄惡結好齊陳氏傅良曰春秋之初宋魯衛陳蔡一黨也鄭一黨也於是鄭始平魯鄭方交惡於王而亟平齊魯將以合諸侯焉爾趙氏鵬飛曰艾之􅉀鄭故也自石門之􅉀而知齊鄭為與國齊將救鄭則地隔於魯不求魯無以救鄭鄭來渝平齊為之謀也故鄭使反命而齊為艾之盟年陳氏深曰公與齊㑹四十一始于艾終於定十二盟黃吳氏􅊹曰前此魯未嘗與齊交因鄭輸平之後而公始與齊􅉀蓋鄭莊之謀也齊侯與魯為􅉀為鄭結魯也程氏端學曰外為主稱㑹此類是也方李氏廉曰齊大師之後受地於王方百里者五東之國莫大焉自師尚父十二世至僖公已稱東州之小伯宋以先伐之後爵居上公方與魯為好未可間也故假鄭以求魯魯一溺於輸平之利再狥於于艾之盟三誘於祊田之歸四惑於不王之告而魯與齊鄭之交固矣又曰書公㑹齊侯盟者四艾齊僖小伯之初也柯與扈齊桓圖伯之初也于黃齊景爭伯之初也春秋皆書㑹眀齊志也邑汪氏克寬曰宋殤既合五國之師伐鄭又出師圍經年而取之鄭之怨宋深矣去年與邾伐宋末足以釋怨故特平齊魯以為他日伐宋之謀魯與齊􅉀而曰鄭莊合齊魯者以三年齊鄭盟石門知齊鄭合黨故也􅉀不書及而書㑹則非魯志而齊欲為􅉀也書􅉀于艾志齊僖小伯之始書􅉀于黃志齊景爭伯之終前乎于艾雖􅉀石門然未與魯平則黨與未盛也後乎于黃雖次垂葭㑹牽㑹洮次蕖除伐晉伐宋而無盟矣凡書􅉀皆春秋所惡比事以觀而世變可知矣季氏本曰諸侯修睦以惇信眀義為本者也魯嘗與宋􅉀宿矣齊嘗與鄭􅉀石門矣至此則魯離宋黨而與齊為艾之盟又二年齊離鄭黨而與宋為瓦屋之盟又二年齊魯復離宋黨而與鄭為中丘之􅉀倐離忽合倐合忽離不過為結黨行私計爾信義何有焉此􅉀之所以不足貴也附録左傳五月庚申鄭伯侵陳大獲往歲鄭伯請成於陳陳侯不許五父諫曰親仁善鄰國之寶也君其許鄭陳侯曰宋衛實難鄭何䏻為遂不許君子曰善不可失惡不可長其陳桓公之謂乎長惡不悛從自及也雖欲救之其將䏻乎商書曰惡之易也如火之燎于原不可鄉邇其猶可撲滅周任有言曰為國家者見惡如農夫之務去草焉芟夷藴崇之絶其本根勿使䏻殖則善者信矣秋七月公羊此無事何以書春秋雖無事首時過則書首時過則何以書春秋編年四時具然後為年胡傳四德備而後為乾故易曰乾元亨利貞一德不備則乾道熄矣四時具而後成歲故春秋雖無事首時過則書一時不具則嵗功虧矣既書時又書月者時天時也月王月也書時又書月見天人之理合也易不云乎君子行此四德者故曰乾元亨利貞若夫上下異致天人殊觀聖學不傳而春秋之義見矣集說何氏休曰過厯也春以正月為始夏以四月為始秋以七月為始冬以十月為始厯一時無事書其首月眀王者當奉順四時之正也有事不月者人道正則天道正矣杜氏預曰雖無事而書首月具四時成嵗也黃程子曰無事書首月天時王月備而後成歲也氏震曰無事亦書首月備四時也趙木訥曰或不書者傳授脫之事程氏端學曰凡夏秋冬無事必書首月本與春無書首月同義但春以一嵗之始王所頒之正朔而多一王字爾故劉氏實曰四時具然後成嵗一時不具嵗功不成無事而亦書時示王者當奉若天道體乾之四德爾時天時月王月也厯一時無事而書始月示國君當謹守王度奉正朔與其法制禁令爾諸侯之奉王朔猶王之奉天道天人合而上下一此春秋書時月之㫖也冬宋人取長葛左傳作秋左傳秋宋人取長葛公羊外取邑不書此何以書久也穀梁外取邑不志此其志何也久之也胡傳宋人恃強圍邑久役大衆取非所有其罪著矣在王朝不䏻施九伐之威在列國不䏻修連帥之職鄭人土地天子所命先祖所受不䏻保有而失之是上無天王下無方伯而鄭亦無君也宋人強取以王法言不可勝誅以天理言不善之積著矣初穆公屬國於與夷使其子馮出居於鄭殤公既立忌馮而伐鄭不亦逆天理乎春秋序宋主兵以殤之罪重也眀年鄭人伐宋序邾為首以鄭伯之罪輕也至是宋又舉兵伐鄭而圍其邑肆行暴虐不善之積已著而不可解矣集說何氏休曰不繫鄭舉伐者因上伐圍取也長杜氏預曰秋取冬乃告也上有伐鄭圍長葛葛鄭邑可知故不言鄭也經孔氏穎達曰絰書冬傳言秋丘眀為傳例不虛舉文獨以秋言此事明是以秋取冬乃告也冬告者告言冬始取爾故書之於冬若其使以冬至告言秋取亦當追書於秋八年傳曰冬齊侯使來告成三國秋成冬告書之於秋眀此以冬取告故書於冬也孫氏復曰長葛鄭邑天子所封非宋人可得取也宋人前年伐鄭圍長葛此而取之故言伐言圍言取悉其惡以誅之也劉氏敞曰左氏作秋杜氏云秋取冬來告也非也史之記事雖據赴告而書至其日月猶當依先後次序豈得但據告時編之乎然左傳日月與經不同者多或丘眀作書雜取當時諸侯史䇿有用夏正者有用周正者故經所云冬傳謂之秋也而程子曰宋人圍長葛嵗且周矣其虐民無道之甚天子弗治方伯弗征鄭視其民之危困而不䏻保有赴訴卒喪其邑皆罪也宋之強取不可勝誅矣張氏洽曰宋自去冬圍長葛經年不解志於必取鄭莊不赴訴於天子方伯同列以求保其土地人民反結交於魯以為後日報復之計而委長葛於宋稔禍長惡宋殤雖若得志而後日終受鄭莊報復蹙國喪師以及其身春秋所深誅也說王氏元杰曰宋圍鄭邑取非所有始惑州吁之邪摟諸侯以伐之圍城之師經年不解其役久矣其民殘矣春秋書圍長葛於前以著殘民毒衆之罪書取長葛於後正其擅兵強奪之誅誅亂禁暴其法嚴矣強汪氏克寬曰彼此皆列國而伐之以圍其邑是恃也圍之期年是久役也環而攻之是用大衆也鄭邑而已取之是取非所有也直書而罪自見鄭張氏溥曰春鄭來輸平夏公㑹齊盟納成於魯者也合齊魯之交者亦鄭也五年冬宋伐鄭圍長葛六年冬取之言圍則日久言伐言取則惡彰鄭若無聞焉豈忘長葛哉彼將圖大欲合諸侯抗王室姑以長葛委宋而徐圖報復也鄭急平齊魯而不爭長葛宋幸得長葛而蹙國喪身甚矣鄭莊之狡宋殤之愚也案經書冬左傳作秋杜氏預謂秋取冬告引八年齊侯告成為證其義甚明劉氏敞以為左傳雜取諸侯史䇿有用夏正者有用周正者故經所云冬傳謂之秋也似亦有理附録左傳冬京師來告饑公為之請糴於宋衛齊鄭禮也鄭伯如周始朝桓王也王不禮焉周桓公言於王曰我周之東遷晉鄭焉依善鄭以勸來者猶懼不蔇況不禮焉鄭不來矣周杜注采邑扶風雍縣東北有周城今在陕西鳳翔府岐山縣南欽定春秋傳說彚纂卷二
