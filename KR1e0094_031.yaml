body:
  text: 欽定四庫全書欽定春秋傳說彚纂卷二十九昭公集說孔氏穎達曰魯世家昭公名裯襄公之子齊歸所生以周景王四年即位諡法威儀共明曰昭庚景王申四年元年晉平十七年齊景七年衛襄三年蔡靈二年鄭簡二十五年曹武十四年陳哀二十八年把文九年宋平三十五年秦景三十六年楚郟敖四年吳夷末三年春王正月公即位穀梁繼正即位正也集說楊氏士勛曰重發傳者嫌繼子野非正故明之襄家氏鉉翁曰入春秋即位以正者四君文成哀承國於父昭公乃子野之弟魯大夫穆叔謂大子死有母弟則立之無則立長子野非嫡夫人之子不當立其娣子則襄公諸子有年長當立者季氏利昭公之幼弱而立耳隱公之立先儒以為內無所承上不禀命故不書即位今昭公越次而立何猶書即位乎竊觀聖人之微旨蓋正季氏逐君之罪也季氏犯上作亂漸不可制昭公起而誅之事不克濟殞身於外嗣子復為賊臣所擯不得有國若不書即位無以明君臣之分正亂賊之戮故書即位為其有討亂之心與為大夫所立而俯首屏息受制賊臣者不同矣此書即位之變例叔孫豹會晉趙武楚公子圍齊國弱宋向戌衛齊惡陳公子招蔡公孫歸生鄭罕虎許人曹人于虢國弱公作國酌齊惡公作右惡罕虎公作軒虎虢公作漷穀作郭虢杜注鄭地案東虢君為鄭所滅故為鄭地左傳春楚公子圍聘於鄭且娶於公孫段氏伍舉為介將入館鄭人惡之使行人子羽與之言乃館於外既聘將以衆逆子産患之使子羽辭曰以敝邑褊小不足以容從者請墠聽命令尹命大宰伯州犂對曰君辱貺寡大夫圍謂圍將使豐氏撫有而室圍布几筵告於莊共之廟而來若野賜之是委君貺於草莽也是寡大夫不得列於諸卿也不寧唯是又使圍蒙其先君將不得為寡君老其蔑以復矣唯大夫圖之子羽曰小國無罪恃實其罪將恃大國之安靖已而無乃包藏禍心以圖之小國失恃而懲諸侯使莫不憾者距違君命而有所壅塞不行是懼不然敝邑館人之屬也其敢愛豐氏之祧伍舉知其有備也請垂櫜而入許之正月乙未入逆而出遂㑹于虢尋宋之盟也祁午謂趙文子曰宋之盟楚人得志於晉今令尹之不信諸侯之所聞也子弗戒懼又如宋子木之信稱於諸侯猶詐晉而駕焉況不信之尤者乎楚重得志於晉晉之恥也子相晉國以為盟主於今七年矣再合諸侯三合大夫服齊狄寧東夏平秦亂城淳于師徒不頓國家不罷民無謗讟諸侯無怨天無大災子之力也有令名矣而終之以恥午也是懼吾子其不可以不戒文子曰武受賜矣然宋之盟子木有禍人之心武有仁人之心是楚所以駕於晉也今武猶是心也楚又行僭非所害也武將信以為本循而行之譬如農夫是穮是蓘雖有饑饉必有豐年且吾聞之能信不為人下吾未能也詩曰不僭不賊鮮不為則信也能為人則者不為人下矣吾不能是難楚不為患楚令尹圍請用牲讀舊書加於牲上而已晉人許之三月甲辰盟楚公子圍設服離衛叔孫穆子曰楚公子美矣君哉鄭子皮曰二執戈者前矣蔡子家曰蒲宮有前不亦可乎楚伯州犂曰此行也辭而假之寡君鄭行人揮曰假不反矣伯州犂曰子姑憂子晳之欲背誕也子羽曰當璧猶在假而不反子其無憂乎齊國子曰吾代二子愍矣陳公子招曰不憂何成二子樂矣衛齊子曰苟或知之雖憂何害宋合左師曰大國令小國共吾知共而已晉樂王鮒曰小旻之卒章善矣吾從之退㑹子羽謂子皮曰叔孫絞而婉宋左師簡而禮樂王鮒字而敬子與子家持之皆保世之主也齊衛陳大夫其不免乎國子代人憂子招樂憂齊子雖憂弗害夫弗及而憂與可憂而樂與憂而弗害皆取憂之道也憂必及之大誓曰民之所欲天必從之三大夫兆憂憂能無至乎言以知物其是之謂矣胡傳此陳侯之弟招也何以不稱弟諸侯之尊弟兄不得以屬通曰公子者其本當稱者也曰弟者因事而特稱之也所以然者諸侯非始封之君則臣諸父昆弟族人不得以屬戚君也會于虢尋宋之盟而經何以不書在宋之盟楚人先歃若曰狎主諸侯則懼晉之先也故圍請讀舊書加於牲上而晉人許之觀其事雖若楚重得志晉少懦矣然春秋不貴修盟晉人以信為本故每書必先趙武集說杜氏預曰招實陳侯母弟不稱弟者義與莊二十五年公子友同今讀舊書則楚當先晉而先書趙武者亦取宋盟貴武之信故尚之也衛在陳蔡上先至於㑹孔氏穎達曰八年經書陳侯之弟招故知是陳侯母弟也母弟至親異於他臣其相殺害則稱弟以示義至於嘉好之事兄弟篤睦非例所興或稱弟或稱公子仍舊史之文也八年招殺世子故稱弟以章招罪此奉使以會諸國非義例之所興舊史書為公子而仲尼因之也貶劉氏敞曰公羊曰此陳侯之弟招也何以不稱弟也非也公羊以母弟稱弟故云爾不知母弟可以稱弟而不可常稱常稱皆以重書也且招之罪在殺世子偃師不在會于漷也聖人褒貶各於其事豈有迎其未然之事探其且然之罪以為貶哉又曰招之罪已重矣何為復貶於此著招之有罪也言楚之託乎討招以滅陳也亦非也夫殺世子此招之罪也滅陳之國非招之罪也以楚討招而滅陳而遂移罪於招豈春秋之理哉之髙氏閌曰此㑹乃楚公子圍帥諸侯之大夫尋宋盟也宋之盟齊人不預焉今齊又從楚矣晉伯之衰可知也家氏鉉翁曰向戌持弭兵之說趙武苟偷目前之安俾諸侯咸北面於楚庭始曰弭兵而合晉楚之成既而楚盛兵以臨諸侯滅陳滅蔡滅賴芟夷小國憑陵北方所謂讀舊書不歃血者楚再為長而晉不敢與爭也李氏廉曰晉趙武為政再合諸侯三合大夫止此先汪氏充寬曰宋虢之盟楚再先晉而春秋不以楚者亦猶黃池之會吳子主會而春秋以晉居吳之上也辰陵蜀之盟申之㑹楚序諸侯之上皆主盟會也盂之㑹楚子亞於宋公而序諸侯之上宋虢兩役楚屈建公子圍亞於晉趙武而序於諸侯大夫之上皆兩伯之辭也三月取鄆鄆公作運左傳季武子伐莒取鄆莒人告於㑹楚告於晉曰尋盟未退而魯伐莒瀆齊盟請戮其使樂桓子相趙文子欲求貨於叔孫而為之請使請帶焉弗與梁其脛曰貨以藩身子何愛焉叔孫曰諸侯之會衛社稷也我以貨免魯必受師是禍之也何衛之為人之有牆以蔽惡也牆之隙壞誰之咎也衛而惡之吾又甚焉雖怨季孫魯國何罪叔出季處有自來矣吾又誰怨然鮒也賄弗與不已召使者裂裳帛而與之曰帶其褊矣趙孟聞之曰臨患不忘國忠也思難不越官信也圖國忘死貞也謀主三者義也有是四者又可戮乎乃請諸楚曰魯雖有罪其執事不辟難畏威而敬命矣子若免之以勸左右可也若子之羣吏處不辟汚出不逃難其何患之有患之所生汚而不治難而不守所由來也能是二者又何患焉不靖其能其誰從之魯叔孫豹可謂能矣請免之以靖能者子㑹而赦有罪又賞其賢諸侯其誰不欣焉望楚而歸之視遠如邇疆埸之邑一彼一此何常之有王伯之令也引其封疆而樹之官舉之表旗而著之制令過則有刑猶不可一於是乎虞有三苗夏有觀扈商有姺邳周有徐奄自無令王諸侯逐進狎主齊盟其又可一乎恤大舍小足以為盟主又焉用之封疆之削何國蔑有主齊盟者誰能辨焉吳濮有釁楚之執事豈其顧盟莒之疆事楚勿與知諸侯無煩不亦可乎莒魯爭鄆為日久矣苟無大害於其社稷可無亢也去煩宥善莫不競勸子其圖之固請諸楚楚人許之乃免叔孫令尹享趙孟賦大明之首章趙孟賦小宛之二章事畢趙孟謂叔向曰令尹自以為王矣何如對曰王弱令尹彊其可哉雖可不終趙孟曰何故對曰彊以克弱而安之彊不義也不義而彊其斃必速詩曰赫赫宗周褒姒滅之彊不義也令尹為王必求諸侯晉少懦矣諸侯將往若獲諸侯其虐滋甚民弗堪也將何以終夫以彊取不義而克必以為道道以淫虐弗可久已矣觀杜注今頓丘衛縣案后啓五庶分封於衛是為五觀隋置觀城縣屬魏州元屬濮州至今仍之古觀國城在縣西西扈杜注在始平鄠縣今縣北有古鄠城屬陜西安府姺邳杜注二國商諸侯邳今下邳縣竹書紀年商外壬元年姺人邳人叛即此徐奄杜注二國皆嬴姓案徐偃王為周所滅後封其子宗為徐子莊二十六年三國伐徐是也成王伐淮夷遂踐奄因以封周公蓋周公已封於武王時而成王以奄地益之也今志言曲阜舊城即古奄地或言奄城在縣東二里濮杜注今建寧郡南有濮夷案晉建寧郡在今雲南界杜蓋極言其所至也胡傳不曰伐莒取鄆者乘莒亂而取邑故不悉書為內諱也集說杜氏預曰不稱將帥將卑師少書取言易也氏程子曰乘莒之亂而取之故隱避其辭胡寧曰鄆莒邑伐國而奪其地者王法所當誅魯乘莒亂奪其邑故隱避其辭特書取鄆爾與書外事詞固異也以鄆為國者誤矣魯家氏鉉翁曰左氏以為莒之鄆無疑不書伐莒為諱亦以貶也昭公新立豈知為此皆季氏所為也蓋救台入鄆之時欲取而未得至是取之李氏廉曰書伐莒是以討賊豫魯也不書伐而書取則收奪而已矣始汪氏克寬曰文十二年城諸及鄆實莒魯爭鄆之湛氏若水曰取鄆之事季武子為之也春秋直書取鄆則貪殘之心非其有而取之與其君之弱其臣之專且竝著矣錢氏時俊曰此季孫宿伐莒取鄆則書法何以異於宣十年歸父伐邾歸父伐邾猶公命也此專取邑而已附録左傳夏四月趙孟叔孫豹曹大夫入於鄭鄭伯兼享之子皮戒趙孟禮終趙孟賦瓠葉子皮遂戒穆叔且告之穆叔曰趙孟欲一獻子其從之子皮曰敢乎穆叔曰夫人之所欲也又何不敢及享具五獻之籩豆於幕下趙孟辭私於子産曰武請於冢宰矣乃用一獻趙孟為客禮終乃宴穆叔賦鵲巢趙孟曰武不堪也又賦采蘩曰小國為蘩大國省穡而用之其何實非命子皮賦野有死麕之卒章趙孟賦常棣且曰吾兄弟此以安尨也可使無吠穆叔子皮及曹大夫興拜舉兕爵曰小國賴子知免於戾矣飲酒樂趙孟出曰吾不復此矣哉天王使劉定公勞趙孟於潁館於雒汭劉子曰美禹功明德逺矣微禹吾其魚乎吾與子辨冕端委以治民臨諸侯禹之力也子盍亦遠績禹功而大庇民乎對曰老夫罪戾是懼焉能恤遠吾儕偷食朝不謀夕何其長也劉子歸以語王曰諺所謂老將知而耄及之者其趙孟之謂乎為晉正卿以主諸侯而儕於隸人朝不謀夕棄神人矣神怒民叛何以能久趙孟不復年矣神怒不歆其祀民叛不即其事祀事不從又何以年謂叔孫歸曾天御季孫以勞之旦及日中不出曾天曾阜曰旦及日中吾知罪矣魯以相忍為國也忍其外不忍其內焉用之阜曰數月於外一旦於是庸何傷賈而欲贏而惡嚻乎阜謂叔孫曰可以出矣叔孫指楹曰雖惡是其可去乎乃出見之鄭徐吾犯之妹美公孫楚聘之矣公孫黑又使強委禽焉犯懼告子産子産曰是國無政非子之患也唯所欲與犯請於二子請使女擇焉皆許之子晳盛飾入布幣而出子南戎服入左右射超乘而出女自房觀之曰子晳信美矣抑子南夫也夫夫婦婦所謂順也適子南氏子晳怒既而櫜甲以見子南欲殺之而取其妻子南知之執戈逐之及衝擊之以戈子晳傷而歸告大夫曰我好見之不知其有異志也故傷大夫皆謀之子産曰直鈞幼賤有罪罪在楚也乃執子南而數之曰國之大節有五女皆奸之畏君之威聽其政尊其貴事其長養其親五者所以為國也今君在國女用兵焉不畏威也奸國之紀不聽政也子晳上大夫女嬖大夫而弗下之不尊貴也幼而不忌不事長也兵其從兄不養親也君曰余不女忍殺宥女以遠勉速行乎無重而罪五月庚辰鄭放游楚於吳將行子南子産咨於大叔大叔曰吉不能亢身焉能亢宗彼國政也非私難也子圖鄭國利則行之又何疑焉周公殺管叔而蔡蔡叔夫豈不愛王室故也吉若獲戾子將行之何有於諸游雒汭杜注洛水在河南鞏縣南水曲流為汭夏書太康五弟須于洛汭即此也水經注洛水入河之處淸濁異流亦名什谷隋置洛口倉於此夏秦伯之弟針出奔晉針其廉反左傳秦后子有寵於桓如二君於景其母曰弗去懼選癸卯針適晉其車千乘書曰秦伯之弟針出奔晉罪秦伯也后子享晉侯造舟於河十里舍車自雍及絳歸取酬幣終事八反司馬侯問焉曰子之車盡於此而已乎對曰此之謂多矣若能少此吾何以得見女叔齊以告公且曰秦公子必歸臣聞君子能知其過必有令圖令圖天所贊也后子見趙孟趙孟曰吾子其曷歸對曰針懼選於寡君是以在此將待嗣君趙孟曰秦君何如對曰無道趙孟曰亡乎對曰何為一世無道國未艾也國於天地有與立焉不數世淫弗能斃也趙孟曰天乎對曰有焉趙孟曰其幾何對曰針聞之國無道而年穀和熟天贊之也鮮不五稔趙孟視䕃曰朝夕不相及誰能待五后子出而告人曰趙孟將死矣主民玩歲而愒日其與幾何穀梁諸侯之尊弟兄不得以屬通其弟云者親之也親而奔之惡也胡傳書曰弟者罪秦伯也夫后子出奔其父禍之而罪秦伯何也春秋以均愛望人父以能友責人兄父母有愛妾猶沒身敬之不衰況兄弟乎兄弟翕而后父母順矣故不曰公子而特稱秦伯之弟云集說劉氏敞曰公羊曰秦無大夫仕諸晉也有千乘之國而不能容其母弟故君子謂之出奔也非也如傳所說當書曰秦伯放其弟針於晉今經言奔何以見秦伯仕之於晉乎所謂秦無大夫者直虛言爾其家氏鉉翁曰以千乘之國而區區母弟車之多伉君針之汰甚矣書秦伯之弟譏秦伯亦貶針也其母使之奔亦智矣卒得返國由母賢爾為季氏本曰秦自文宣之世與晉相讎至襄十四年晉所伐閉關不出庶幾知治內矣然不能以禮親親陷弟於罪使適讎國雖針有以自致而景公豈為能正其家者乎案秦伯失親親之道四傳皆罪之而家氏鉉翁以為兼貶針蓋懼選而奔非無罪也二說相兼其義乃備附録左傳鄭為游楚亂故六月丁巳鄭伯及其大夫盟於公孫段氏罕虎公孫僑公孫段印段游吉駟帶私盟於閨門之外實薰隧公孫黑強與於盟使大史書其名且曰七子子産弗討六月丁巳邾子華卒晉荀吳帥師敗狄于大鹵鹵音魯大鹵公穀作大原杜注大原晉陽縣左傳晉中行穆子敗無終及羣狄于大原崇卒也將戰魏舒曰彼徒我車所遇又厄以什共車必克困諸厄又克請皆卒自我始乃毁車以為行五乘為三伍荀吳之嬖人不肯即卒斬以徇為五陳以相離兩於前伍於後專為右角參為左角偏為前拒以誘之狄人笑之未陳而薄之大敗之集說髙氏閌曰箕與交剛之役皆晉人至是卿帥師則晉益衰矣趙氏鵬飛曰僖文之世齊宋魯衛皆罹狄害文十一年魯敗之于鹹成十二年晉敗之于交剛其害遂息今諸侯未受其患而荀吳敗之于大鹵大鹵即太原太原在晉之東北無乃為晉邊鄙之患而晉敗之歟十六年吳又伐鮮虞十七年復滅陸渾之戎則吳蓋亦好武功者也於時六卿曰張各立功以固其寵趙氏以盟㑹勝荀氏以戰伐顯則吳之勝非晉之利荀氏之諼也鄶趙氏恆曰此毁車用卒之始大抵因所遇之厄而為制勝之略不然彼徒我車自古而然晉嘗數敗羣狄於魯亦然何至是而毁車用卒以取勝也蓋徒便侵軼車勢遲重若平原廣野以我遲重遏其奔突宜矣今所遇厄宜步而不宜車也故以什共車言以十士共一車之地而與敵鬭勇者勝故曰必克困諸厄言因其厄而困之用奇設伏智者勝故曰又克然非用卒不可也故請皆卒自我始乃毁車以為行五乘為三伍向者每乘三人五乘為十五人今五人為伍三五亦一十五也此言用卒之法為五陳以相離兩於前伍於後專為右角參為左角偏為前拒以誘之相離者布陳使相遠也司馬法五十乘為兩百二十乘為伍八十一乘為專二十九乘為參二十五乘為偏皆準車數多少為名今雖用卒猶襲車陳之名也此言布陳之法秋莒去疾自齊入于莒去起呂反左傳莒展輿立而奪羣公子秩公子召去疾於齊秋齊公子鉏納去疾集說季氏本曰去疾因齊力以入國未見其能討賊也必與國人約衆許入而後為之逐展輿耳陳氏宗之曰案於次去疾為長本當立者也密州舍之而立展輿既立展輿而又廢之國人患其虐而弒之展輿因而即之國本去疾之國也故春秋正之曰莒去疾入于莒不與密州之舍去疾也不與國人之君展輿也胡傳以為因不禀命而削其公子恐非也莒展輿出奔吳展下公穀無與字胡傳展輿莒子也曷為不稱爵為弒君者所立既立乎其位而不能討賊則是與聞乎故也斯不可以有國矣集說趙氏匡曰鄭忽曹羈未踰年出奔不稱爵言不能嗣先君也莒展雖踰年不稱爵其罪大也劉氏敞曰莒展出奔吳莒展子也而不謂之子展失子之道也凡人之所以稱乎臣者以有君也所以稱乎子者以有父也君弒矣而臣不討賊父殺矣而子不復讎是固無臣子之理也展之見奪不亦宜乎髙氏閌曰莒人弒君諸侯不共討之是時楚人方聽莒人之訴而欲執魯大夫是不以莒人為可討也展不稱子聖人不豫其為君也少呂氏大圭曰意者去疾繫莒則是去疾長而展輿也去疾當立明矣然自密州既弒之後去疾即奔齊而莒人固已立展輿矣則其繫展輿以莒也亦宜李氏廉曰此條莒去疾與齊小白之例同固無疑矣獨展輿以國氏程氏謂罪諸侯之與其立此意似晦竊意國無二君常例也衛衎與剽莒展輿去疾皆以二君書者變例也彼突方入國糾方爭國故不得書國書子今展輿既立踰年成君矣其不書爵已足以見絶之之意若又不書莒何以見其已立乎陳他以討賊書亦繫以國則展輿之繫國不必求他義也髙季氏本曰不稱爵為弒君者所立不以為君也氏攀龍曰展輿曷為以國氏明其已立也若曰是莒之展輿而非莒之君所謂與陳他同者是也叔弓帥師疆鄆田左傳叔弓帥師疆鄆田因莒亂也於是莒務婁暓胡及公子滅明以大厖與常儀靡奔齊君子曰莒展之不立棄人也夫人可棄乎詩曰無競維人善矣大厖常儀靡杜注莒二邑當在莒州北境穀梁疆之為言猶竟也集說杜氏預曰春取鄆今正其封疆别劉氏敞曰疆之者何溝封之也曷為溝封之乎莒也何以書譏何譏爾以亂為利也公羊曰畏莒也非也鄆本屬莒故魯取其邑未得其地故因莒亂帥師而往分明疆土此乃欺之非畏之也且魯強莒小魯安莒亂何為乃畏莒哉王氏葆曰取鄆不書帥師疆田書之者以見其因莒亂出不意而取得之為易今欲固其所得則莒人來爭必矣故遣卿帥師而疆之然魯秉周禮既因人之亂以取田又恃其師衆而疆之則先王封域不復守矣書者所以志亂也髙氏閌曰文十二年季孫行父常帥師而城之復為莒所取今乘莒之亂而取之又帥師以疆其田必帥師者以不義得之懼不服也疆之者溝封之以别乎莒也何以書譏其乘亂牟利也趙氏鵬飛曰魯乘莒之亂以取其田鄆民不順也於是帥師而疆之其惡甚矣地任氏公輔曰春取鄆而秋疆其田汲汲乎利其土之甚也帥師而疆之豈獨有虞於莒乎雖鄆人亦不服所以必欲疆之也取鄆為不善矣帥師而疆之尤為不善也義汪氏克寬曰春秋一經書假田者一譏豫之之非也書疆田者一譏取之之非義也凡此皆聖人之特筆所以垂訓戒也葬邾悼公集說高氏閲曰入春秋來邾始書葬蓋邾滕薛小國也秦遠國也皆至昭公而書葬是魯衰甚矣小國如大國遠國如近國附録左傳晉侯有疾鄭伯使公孫僑如晉聘且問疾叔向問焉曰寡君之疾病卜人曰實沈臺駘為祟史莫之知敢問此何神也子産曰昔髙辛氏有二子伯曰閼伯季曰實沈居於曠林不相能也日尋干戈以相征討后帝不臧遷閼伯於商丘主辰商人是因故辰為商星遷實沈於大夏主參唐人是因以服事夏商其季世曰唐叔虞當武王邑姜方震大叔夢帝謂已余命而子曰虞將與之唐屬諸參而蕃育其子孫及生有文在其手曰虞遂以命之及成王滅唐而封大叔焉故參為晉星由是觀之則實沈參神也昔金天氏有裔子曰昧為𤣥冥師生允格臺駘臺駘能業其官宣汾洮障大澤以處大原帝用嘉之封諸汾川沈姒蓐黃實守其祀今晉主汾而滅之矣由是觀之則臺駘汾神也抑此二者不及君身山川之神則水旱癘疫之災於是乎禜之日月星辰之神則雪霜風雨之不時於是乎禜之若君身則亦出入飲食哀樂之事也山川星辰之神又何為焉僑聞之君子有四時朝以聽政晝以訪問夕以修今夜以安身於是乎節宣其氣勿使有所壅閉湫底以露其體兹心不爽而昏亂百度今無乃一之則生疾矣僑又聞之內官不及同姓其生不殖美先盡矣則相生疾君子是以惡之故志曰買妾不知其姓則卜之違此二者古之所愼也男女辨姓禮之大司也今君內實有四姬焉其無乃是也乎若由是二者弗可為也已四姬有省猶可無則必生疾矣叔向曰善哉肸未之聞也此皆然矣叔向出行人揮送之叔向問鄭故焉且問子晳對曰其與幾何無禮而好陵人怙富而卑其上弗能久矣晉侯聞子産之言曰博物君子也重賄之是晉侯求醫於秦秦伯使醫和視之曰疾不可為也謂近女室疾如蠱非鬼非食惑以喪志良臣將死天命不祐公曰女不可近乎對曰節之先王之樂所以節百事也故有五節遲速本末以相及中聲以降五降之後不容彈矣於是有煩手淫聲慆堙心耳乃忘平和君子弗聽也物亦如之至於煩乃舍也已無以生疾君子之近琴瑟以儀節也非以慆心也天有六氣降生五味發為五色徵為五聲淫生六疾六氣曰隂陽風雨晦明也分為四時序為五節過則為菑隂淫寒疾陽淫熱疾風淫未疾雨淫腹疾晦淫惑疾明淫心疾女陽物而晦時淫則生內熱惑蠱之疾今君不節不時能無及此乎出告趙孟趙孟曰誰當良臣對曰主是謂矣主相晉國於今八年晉國無亂諸侯無闕可謂良矣和聞之國之大臣榮其寵祿任其大節有菑禍興而無改焉必受其咎今君至於淫以生疾將不能圖恤社稷禍孰大焉主不能禦吾是以云也趙孟曰何謂蠱對曰淫溺惑亂之所生也於文皿蟲為蠱穀之飛亦為蠱在周易女惑男風落山謂之蠱皆同物也趙孟曰良醫也厚其禮而歸之曠林杜注地闕國商丘杜注宋地釋例云宋商商丘三名一地梁睢陽縣也明嘉靖二十四年置商丘縣為歸德府附郭今仍之水大夏杜注今晉陽縣即太原也汾洮杜注二名僖十六年狄侵晉涉汾即此汾也後漢志聞喜有洮水水經注涑水經聞喜縣周陽邑與洮水合今聞喜縣屬山西平陽府臺沈姒蓐黃杜注四國駘之後冬十有一月己酉楚子麇卒麇九倫反公穀作卷音權左傳楚公子圍使公子黑肱伯州犂城犫櫟郟鄭人懼子産曰不害令尹將行大事而先除二子也禍不及鄭何患焉冬楚公子圍將聘於鄭伍舉為介未出竟聞王有疾而還伍舉遂聘十一月己酉公子圍至入問王疾縊而弒之遂殺其二子幕及平夏右尹子干出奔晉宮廄尹子晳出奔鄭殺大宰伯州犂於郟葬王於郟謂之郟敖使赴於鄭伍舉問應為後之辭焉對曰寡大夫圍伍舉更之曰共王之子圍為長子干奔晉從車五乘叔向使與秦公子同食皆百人之餼趙文子曰秦公子富叔向曰底祿以德德鈞以年年同以尊公子以國不聞以富且夫以千乘去其國彊禦已甚詩曰不侮鰥寡不畏彊禦秦楚匹也使后子與子干齒辭曰針懼選楚公子不獲是以皆來亦唯命且臣與羇齒無乃不可乎史佚有言曰非羇何忌楚靈王即位薳罷為令尹薳啓彊為大宰鄭游吉如楚葬郟敖且聘立君歸謂子産曰具行器矣楚王汰侈而自說其事必合諸侯吾往無日矣子産曰不數年未能也犫杜注犫縣屬南陽史記沛公與秦南陽守莊齕戰於犫東即此今河南汝寧府魯山縣東南有犫縣故城是其地郟郟杜注郟縣屬襄城二世元年陳勝將鄧龍居即此也今屬河南汝寧府汝州集說孔氏穎達曰傳稱縊而殺之而經書卒襄七年鄭子駟使賊夜弒僖公而以瘧疾赴於諸侯而經書為卒知此亦以瘧疾赴故不書弒鄭陳氏傅良曰圍弒其君晏然赴於他國如恆辭猶騑也而其臣子聽焉相與設應為後之詞甚矣無人紀也從而書卒所以誅楚之臣子聽賊之所為也圍之未弒也魯蔡鄭之大夫固知之矣㑹于申以齊慶封徇於諸侯曰無或如齊慶封弒其君弱其孤以盟其大夫慶封曰無或如楚共王之庶子圍弒其君兄之子麇而代之以盟諸侯軍人粲然皆笑史見其事春秋著其心則後世有考矣者汪氏克寬曰楚䖍之戮慶封也其臣椒舉曰無瑕可以戮人播於諸侯焉用之則䖍篡弒之跡不可掩矣侯髙氏攀龍曰經書楚子麇卒或曰以申之㑹為諸諱也則弒賊不討如成宋亂宋災故聖人皆明著其罪而又何以諱為也或曰麇以病卒實非弒也則椒舉之言慶封之對當時皆彰彰人之耳目豈其盡妄乎竊以楚國既無齊晉之太史列國册書皆承其僞赴謂聖人因魯史舊文其說為長不必更鑿也案圍執慶封聲其弒君之罪於軍中則弒麇之跡當日必甚祕而以僞赴故魯史亦承赴而書之春秋因而不革也與髠頑之書卒同義胡傳謂圍以篡弒而主㑹盟故聖人憫列國之衰微懼人欲之橫流而略其篡弒焉失經旨矣楚公子此出奔晉集說何氏休曰辟內難也右髙氏閌曰靈王既殺其君之子而自立比為尹力不能制是以出奔春秋書之為十三年乾溪事起也益湛氏若水曰書楚公子比出奔晉則圍篡弒之罪著矣季氏本曰楚麇未屬纊之前靈王奉使而比為右尹必不推戴奉迎其兄此所以得罪而見逐也附録左傳十二月晉既蒸趙孟適南陽將會孟子餘甲辰朔蒸於溫庚戌卒鄭伯如晉弔及雍乃復辛景王酉五年二年晉平十八年齊景八年衛襄四年蔡靈三年鄭簡二十六年曹武十五年陳哀二十九年杞文十年宋平三十六年秦景三十七年楚靈王䖍元年吳夷末四年春晉侯使韓起來聘左傳二年春晉侯使韓宣子來聘觀書於大史氏見易象與魯春秋曰周禮盡在魯矣吾乃今知周公之德與周之所以王也公享之季武子賦綿之卒章韓子賦角弓季武子拜曰敢拜子之彌縫敝邑寡君有望矣武子賦節之卒章既享宴於季氏有嘉樹焉宣子譽之武子曰宿敢不封殖此樹以無忘角弓遂賦甘棠宣子曰起不堪也無以及召公宣子遂如齊納幣見子雅子雅召子旗使見宣子宣子曰非保家之主也不臣見子尾子尾見彊宣子謂之如子旗大夫多笑之唯晏子信之曰夫子君子也君子有信其有以知之矣自齊聘於衛衛侯享之北宫文子賦淇澳宣子賦木瓜集說趙氏匡曰左氏云為政而來見禮也案霸國正卿無有適諸國告為政之理前後為政者多矣何不來乎政汪氏克寬曰前此晉之聘魯者九未嘗以上卿執者將命今韓起始以去年為政而是春即聘於魯蓋晉霸漸衰而欲以嘉好結魯也不黃氏正憲曰晉自趙武與楚狎主夏盟諸侯由此專事晉韓起代武為政欲致諸侯故親來聘魯起可謂有志於治者矣惜乎人心已散勢不易同而德又不足以服人卒不免於示威平丘耳附録左傳夏四月韓須如齊逆女齊陳無宇送女致少姜少姜有寵於晉侯晉侯謂之少齊謂陳無宇非卿執諸中都少姜為之請曰送從逆班畏大國也猶有所易是以亂作中都杜注晉邑在西河界休縣東南今山西汾州府平遙縣西北十二里有中都古城西南至界休五十里夏叔弓如晉左傳叔弓聘於晉報宣子也晉侯使郊勞辭曰寡君使弓來繼舊好固曰女無敢為賔徹命於執事敝邑𢎞矣敢辱郊使請辭致館辭曰寡君命下臣來繼舊好好合使成臣之祿也敢辱大館叔向曰子叔子知禮哉吾聞之曰忠信禮之器也卑讓禮之宗也辭不忘國忠信也先國後已卑讓也詩曰敬慎威儀以近有德夫子近德矣集說趙氏鵬飛曰諸侯即位小國朝之大國聘焉禮也韓起之來聘通嗣君也故叔弓如晉以報之秋鄭殺其大夫公孫黑左傳秋鄭公孫黑將作亂欲去游氏而代其位傷疾作而不果駟氏與諸大夫欲殺之子産在鄙聞之懼弗及乘遽而至使吏數之曰伯有之亂以大國之事而未爾討也爾有亂心無厭國不女堪專伐伯有而罪一也昆弟爭室而罪二也薰隧之盟女矯君位而罪三也有死罪三何以堪之不速死大刑將至再拜稽首辭曰死在朝夕無助天為虐子産曰人誰不死凶人不終命也作凶事為凶人不助天其助凶人乎請以印為褚師子産曰印也若才君將任之不才將朝夕從女女罪之不恤而又何請焉不速死司寇將至七月壬寅縊尸諸周氏之衢加木焉胡傳黑有罪而鄭人初畏其彊不之討也因其疾而幸勝之則亦云殆矣故稱國以殺纍乎上也集說劉氏敞曰稱國以殺大夫者罪纍上也黑有罪其以纍上言之何惡鄭伯也何惡乎鄭伯言不能去有罪以放乎亂也之蘇氏轍曰駟黑富而無禮襄三十年攻良霄而殺元年與游楚爭室而逐之鄭人畏其彊不討也既又將作亂而去游氏疾作而不克子産因其疾也數其罪而殺之黑固有罪而鄭之所以誅之者亦殆矣是以稱國以殺也冬公如晉至河乃復季孫宿如晉左傳晉少姜卒公如晉及河晉侯使士文伯來辭曰非伉儷也請君無辱公還季孫宿遂致服焉叔向言陳無宇於晉侯曰彼何罪君使公族逆之齊使上大夫送之猶曰不共君求以貪國則不共而執其使君刑已頗何以為盟主且少姜有辭冬十月陳無宇歸十一月鄭印段如晉弔胡傳舉動人君之大節賢哲量之以行藏其道姦邪窺之以作止其惡四鄰視之以厚薄其情故有國者必謹於禮而後動此守身之本保國之基也禮雖自卑而尊人亦不妄悅人以自辱昭公失國出奔客死他境蓋始諸此行矣集說杜氏預曰致少姜之襚服但劉氏敞曰穀梁曰恥如晉故著有疾也非也云至河乃復安知有疾哉十李氏廉曰昭公如晉九得入而欲見止者二五年五年也至河而見郤者四此年十二年十三年二十一年也有疾而復者一二十三年也次乾侯者二二十八年二十九年也此條如左氏說晉之辭公未為失也則春秋止罪公之輕動矣若胡傳無乃成少姜之為適乎又聞義不徙而強為非禮之行亦非也命汪氏克寬曰昭公服喪已畢當類見於天子而受之時也嗣守社稷之重不朝於周以少姜之喪而特如晉親修士弔之事是以妄說人而取辱也晉平以閨闥之愛勤動天下之君大夫以為嬖妾之哀榮其為盟主抑末矣宣公如齊奔惠公之喪成公如晉奔景公之喪已為非禮而況於弔寵妾之喪乎積習之弊至於趙文子卒鄭簡公如晉弔晉人辭之及雍乃復則不唯弔其妾而且弔其臣矣春秋書昭公適晉不至而復所以譏昭公之取辱亦以傷世道之衰也王氏錫爵曰晉以少姜非伉儷辭公公見辭乃復未為失禮其失在公不能守正而妄動所謂恭不近禮不能遠恥辱者公也至於季孫宿如晉蓋公既返矣猶有所未盡於心故遣宿將命以終其事焉耳此理易見公穀之說反使聖人之意晦而不明恐皆非也案僖公以來朝晉者屢矣夫人之喪則未嘗親造其庭也況非伉儷乎公以少姜卒而如晉晉人辭公而公乃復春秋據事直書而動不以禮自取其辱可知矣公羊以為不敢進釋公羊者以為晉將執公不亦謬乎是時魯晉方睦韓起來聘叔弓報之公即位踰年未聞獲罪於晉而晉欲執公何耶壬景王戌六年三年晉平十九年齊景九年衛襄五年蔡靈四年鄭簡二十七年曹武十六年陳哀三十年把文十一年宋平三十七年秦景三十八年楚靈二年吳夷末五年春王正月附録左傳三年春王正月鄭游吉如晉送少姜之葬梁丙與張躍見之梁丙曰甚矣哉子之為此來也子大叔曰將得已乎昔文襄之霸也其務不煩諸侯令諸侯三歲而聘五歲而朝有事而會不協而盟君薨大夫弔卿共葬事夫人士弔大夫送葬足以昭禮命事謀闕而已無加命矣今嬖寵之喪不敢擇位而數於守適唯懼獲戾豈敢憚煩少姜有寵而死齊必繼室今兹吾又將來賀不唯此行也張躍曰善哉吾得聞此數也然自今子其無事矣譬如火焉火中寒暑乃退此其極也能無退乎晉將失諸侯諸侯求煩不獲二大夫退子大叔告人曰張躍有知其猶在君子之後乎丁未滕子原卒原公作泉左傳丁未滕子原卒同盟故書名集說孔氏穎達曰杜世族譜滕成公是文公之子附録左傳齊侯使晏嬰請繼室於晉曰寡君使嬰曰寡人願事君朝夕不倦將奉質幣以無失時則國家多難是以不獲不腆先君之適以備內官焜耀寡人之望則又無祿早世隕命寡人失望君若不忘先君之好惠顧齊國辱收寡人徼福於大公丁公照臨敝邑鎮撫其社稷則猶有先君之適及遺姑姊妹若而人君若不棄敝邑而辱使董振擇之以備嬪嬙寡人之望也韓宣子使叔向對曰寡君之願也寡君不能獨任其社稷之事未有伉儷在縗絰之中是以未敢請君有辱命惠莫大焉若惠顧敝邑撫有晉國賜之內主豈唯寡君舉羣臣實受其貺其自唐叔以下實寵嘉之既成昏晏子受禮叔向從之宴相與語叔向曰齊其何如晏子曰此季世也吾弗知齊其為陳氏矣公棄其民而歸於陳氏齊舊四量豆區釜鍾四升為豆各自其四以登於釜釜十則鍾陳氏三量皆登一焉鍾乃大矣以家量貸而以公量收之山木如市弗加於山魚鹽蜃蛤弗加於海民參其力二入於公而衣食其一公聚朽蠧而三老凍餒國之諸市屨賤踊貴民人痛疾而或燠休之其愛之如父母而歸之如流水欲無獲民將焉辟之箕伯直柄虞遂伯戲其相胡公大姬已在齊矣叔向曰然雖吾公室今亦季世也戎馬不駕卿無軍行公乘無人卒列無長庶民罷敝而宮室滋侈道殣相望而女富溢尤民聞公命如逃寇讎欒郤胥原狐續慶伯降在皂隸政在家門民無所依君日不悛以樂慆憂公室之卑其何日之有讒鼎之銘曰昧旦丕顯後世猶怠況日不悛其能久乎晏子曰子將若何叔向曰晉之公族盡矣肸聞之公室將卑其宗族枝葉先落則公從之肸之宗十一族唯羊舌氏在而已肸又無子公室無度幸而得死豈其獲祀初景公欲更晏子之宅曰子之宅近市湫隘嚻塵不可以居請更諸爽塏者辭曰君之先臣容焉臣不足以嗣之於臣侈矣且小人近市朝夕得所求小人之利也敢煩里旅公笑曰子近市識貴賤乎對曰既利之敢不識乎公曰何貴何賤於是景公繁於刑有鬻踊者故對曰踊貴屨賤既已告於君故與叔向語而稱之景公為是省於刑君子曰仁人之言其利博哉晏子一言而齊侯省刑詩曰君子如社亂庶遄已其是之謂乎及晏子如晉公更其宅反則成矣既拜乃毁之而為里室皆如其舊則使宅人反之且諺曰非宅是卜唯鄰是卜二三子先卜鄰矣違卜不祥君子不犯非禮小人不犯不祥古之制也吾敢違諸乎卒復其舊宅公弗許因陳桓子以請乃許之晉夏四月鄭伯如晉公孫段相甚敬而卑禮無違者侯嘉焉授之以䇿曰子豐有勞於晉國余聞而弗忘賜女州田以胙乃舊勳伯石再拜稽首受策以出君子曰禮其人之急也乎伯石之汰也一為禮於晉猶荷其祿況以禮終始乎詩曰人而無禮胡不遄死其是之謂乎初州縣欒豹之邑也及欒氏亡范宣子趙文子韓宣子皆欲之文子曰溫吾縣也二宣子曰自郤稱以别三傳矣晉之别縣不唯州誰獲治之文子病之乃舍之二子曰吾不可以正議而自與也皆舍之及文子為政趙獲曰可以取州矣文子曰退二子之言義也違義禍也余不能治余縣又焉用州其以徼禍也君子曰弗知實難知而弗從禍莫大焉有言州必死豐氏故主韓氏伯石之獲州也韓宣子為之請之為其復取之之故州田案州本周邑隱十一年王以豫鄭是時又屬晉集說王氏錫爵曰宣子意在得州而為豐氏請之此以與為取之計夏叔弓如滕五月葬滕成公滕始書葬左傳五月叔弓如滕葬滕成公子服椒為介及郊遇懿伯之忌敬子不入惠伯曰公事有公利無私忌椒請先入乃先受館敬子從之集說杜氏預曰卿共小國之葬禮過厚葬襄公滕子來會故魯厚報之高氏閌曰與二十二年葬景王無辨矣來趙氏鵬飛曰魯未嘗㑹小國之葬襄公之葬滕子㑹葬故魯以叔弓報㑹之然天王之葬魯有所不㑹或以微者㑹之今滕小國而以卿㑹葬何厚私情而薄王禮也厚薄之間諸侯之情見矣附録左傳晉韓起如齊逆女公孫蠆為少姜之有寵也以其子更公女而嫁公子人謂宣子子尾欺晉晉胡受之宣子曰我欲得齊而遠其寵寵將來乎秋七月鄭罕虎如晉賀夫人且告曰楚人日徵敝邑以不朝立王之故敝邑之往則畏執事其謂寡君而固有外心其不往則宋之盟云進退罪也寡君使虎布之宣子使叔向對曰君若辱有寡君在楚何害修宋盟也君苟思盟寡君乃知免於戾矣君若不有寡君雖朝夕辱於敝邑寡君猜焉君實有心何辱命焉君其往也苟有寡君在楚猶在晉也張躍使謂大叔曰自子之歸也小人糞除先人之敝廬曰子其將來今子皮實來小人失望大叔曰吉賤不獲來畏大國尊夫人也且孟曰而將無事吉庶幾焉秋小邾子來朝左傳小邾穆公來朝季武子欲卑之穆叔曰不可曹滕二邾實不忘我好敬以逆之猶懼其二又卑一睦焉逆羣好也其如舊而加敬焉志曰能敬無災又曰敬逆來者天所福也季孫從之集說高氏閌曰公即位之初大國來聘小國來朝非不可為之國也而終之以流播詩曰靡不有初鮮克有終可不戒哉失季氏本曰小邾穆公雖纍從晉列於諸侯而不事大之禮本魯附庸故耳八月大雩左傳八月大雩旱也集說汪氏克寬曰春秋書雩二十有一而昭公之世有七焉此年及六年八年十六年二十四年二十五年再雩是也左氏唯八年無傳餘皆云旱也於再雩則曰旱甚也亦可見災變之數見矣是年既遭旱暵未幾而連月雨雹昭公昏懦略無遇災而懼之意終及於難吁可歎哉附録左傳齊侯田於莒盧蒲嫳見泣且請曰余髮如此種種余奚能為公曰諾吾告二子歸而告之子尾欲復之子雅不可曰彼其髮短而心甚長其或寢處我矣九月子雅放盧蒲嫳於北燕冬大雨雹集說杜氏預曰記災北燕伯欵出奔齊左傳燕簡公多嬖寵欲去諸大夫而立其寵人冬燕大夫比以殺公之外嬖公懼奔齊穀梁其曰北燕從史文也案燕大夫相與比而殺其君之外嬖威脅其君而出之厥罪大矣左氏乃以經書出奔為罪欵胡傳及諸儒皆主其說是何刻以繩君而緩於誅逆乎今故刪而不録附録左傳十月鄭伯如楚子産相楚子享之賦吉日既享子産乃具田備王以田江南之夢齊公孫竈卒司馬竈見晏子曰又喪子雅矣晏子曰惜也子旗不免殆哉姜族弱矣而媯將始昌二惠競爽猶可又弱一個焉姜其危哉癸景王亥七年四年晉平二十年齊景十年衛襄六年蔡靈五年鄭簡二十八年曹武十七年陳哀三十一年把文十二年宋平三十八年秦景三十九年楚靈三年吳夷末六年春王正月大雨雹雹公穀作雪左傳大雨雹季武子問於申豐曰雹可禦乎對曰聖人在上無雹雖有不為災古者日在北陸而藏冰西陸朝覿而出之其藏冰也深山窮谷固隂沍寒於是乎取之其出之也朝之祿位賔食喪祭於是乎用之其藏之也黑牡秬黍以享司寒其出之也桃弧棘矢以除其災其出入也時食肉之祿冰皆與焉大夫命婦喪浴用冰祭寒而藏之獻羔而啓之公始用之火出而畢賦自命夫命婦至於老疾無不受冰山人取之縣人傳之輿人納之隸人藏之夫冰以風壯而以風出其藏之也周其用之也遍則冬無愆陽夏無伏隂春無凄風秋無苦雨雷出不震無菑霜雹癘疾不降民不夭札今藏川池之冰棄而不用風不越而殺雷不發而震雹之為菑誰能禦之七月之卒章藏冰之道也胡傳隂陽之氣和而散則為霜雪雨露不和而散則為戾氣曀霾雹戾氣也隂脅陽臣侵君之象當是時季孫宿襲位世卿將毁中軍專執兵權以弱公室故數月之間再有大變申豐者季氏之孚也不肯端言其事故暴揚於朝歸咎藏冰之失夫山谷之冰藏之也周用之也遍亦古者本末具舉燮調之一事耳謂能使四時無愆伏凄苦之變雷出不震無菑霜雹則亦誣矣意者昭公遇災而懼以禮為國行其政令無失其民雹之災也庶可禦也不然雖得藏冰之道合於豳風七月之詩其將能乎集說劉氏敞曰豐言聖王在上無雹可也言雹之為災由藏冰故非也魯雖藏川池之冰未為不藏冰如今之天下莫有藏冰何故雹不輒降乎且豐之為人姦佞人也黨於季氏不敢端言其罪故推雹災歸之藏冰欲以諂媚彊臣抹摋災異此與張禹谷永何異哉所以使昭公死於外者未必非此人也髙氏閌曰自去年冬至今年春正月連大雨雹故前以時紀此以月紀夫天道如此人事可知黃氏仲炎曰季氏專國有無君之志人道乖戾干犯隂陽故冬春之間大雨雹者再時魯人申豐區區以不藏冰為咎可謂矯誣上天矣得非有所畏而不敢正言之歟抑豈非黨附季孫故曲為之解使其君莫之疑歟趙氏鵬飛曰隂陽不和蔽而為雹冬大雨雹而正月復然其隂陽之災甚矣噫安得皇極之主以叙九疇哉侵熊氏過曰當雪而雹故以為災凡陽隂不入為霰隂侵陽不入為雹附録左傳四年春王正月許男如楚楚子止之遂止鄭伯復田江南許男與焉使椒舉如晉求諸侯二君待之椒舉致命曰寡君使舉曰日君有惠賜盟於宋曰晉楚之從交相見也以歲之不易寡人願結歡於二三君使舉請閒君若苟無四方之虞則願假寵以請於諸侯晉侯欲勿許司馬侯曰不可楚王方侈天或者欲逞其心以厚其毒而降之罰未可知也其使能終亦未可知也晉楚唯天所相不可與爭君其許之而修德以待其歸若歸於德吾猶將事之況諸侯乎若適淫虐楚將棄之吾又誰與爭公曰晉有三不殆其何敵之有國險而多馬齊楚多難有是三者何鄉而不濟對曰恃險與馬而虞鄰國之難是三殆也四嶽三塗陽城大室荆山中南九州之險也是不一姓冀之北土馬之所生無興國焉恃險與馬不可以為固也從古以然是以先王務修德音以亨神人不聞其務險與馬也鄰國之難不可虞也或多難以固其國啓其疆土或無難以喪其國失其守宇若何虞難齊有仲孫之難而獲桓公至今賴之晉有里㔻之難而獲文公是以為盟主衛邢無難敵亦喪之故人之難不可虞也恃此三者而不修政德亡於不暇又何能濟君其許之紂作淫虐文王惠和殷是以隕周是以興夫豈爭諸侯乃許楚使使叔向對曰寡君有社稷之事是以不獲春秋時見諸侯君實有之何辱命焉椒舉遂請昏晉侯許之楚子問於子産曰晉其許我諸侯乎對曰許君晉君少安不在諸侯其大夫多求莫匡其君在宋之盟又曰如一若不許君將焉用之王曰諸侯其來乎對曰必來從宋之盟承君之歡不畏大國何故不來不來者其魯衛曹邾乎曹畏宋邾畏魯魯衛逼於齊而親於晉唯是不來其餘君之所及也誰敢不至王曰然則吾所求者無不可乎對曰求逞於人不可與人同欲盡濟四嶽杜注東嶽岱西嶽華南嶽衡北嶽恆峽三塗在河南陸渾縣南水經注伊水厯崖口山也翼崖深髙壁立如闕伊水經其下厯峽北流即古三塗山也在今河南河南府嵩縣陽城杜注在陽城縣東北今河南府登封縣北三十八里俗名車嶺山是也大室杜注在陽城縣西南戴延之曰嵩高三十六峰東曰大室西曰少室今嵩髙山在登封縣北十里荆山杜注在新城沶鄉縣南禹貢荆及衡陽惟荆州荆河惟豫州則荆山乃二州之界也今在湖廣襄陽府南漳縣西南中南杜注在始平武功縣南亦作終南今在陜西西安府長安縣南五十里雍録終南山橫亘關中南面西起秦隴東徹藍田凡雍岐郿鄠長安萬年相去八百里連綿峙據其南者皆此一山夏楚子蔡侯陳侯鄭伯許男徐子滕子頓子胡子沈子小邾子宋世子佐淮夷會于申楚子專㑹諸侯始此左傳夏諸侯如楚魯衛曹邾不會曹邾辭以難公辭以時祭衛侯辭以疾鄭伯先待於申六月丙午楚子合諸侯于申椒舉言於楚子曰臣聞諸侯無歸禮以為歸今君始得諸侯其愼禮矣霸之濟否在此㑹也夏啓有鈞臺之享商湯有景亳之命周武有孟津之誓成有岐陽之搜康有酆宮之朝穆有塗山之㑹齊桓有召陵之師晉文有踐土之盟君其何用宋向戌鄭公孫僑在諸侯之良也君其選焉王曰吾用齊桓王使問禮於左師與子産左師曰小國習之大國用之敢不薦聞獻公合諸侯之禮六子産曰小國共職敢不薦守獻伯子男㑹公之禮六君子謂合左師善守先代子産善相小國王使椒舉侍於後以規過卒事不規王問其故對曰禮吾未見者有六焉又何以規宋大子佐後至王田於武城久而弗見椒舉請辭焉王使往曰屬有宗祧之事於武城寡君將墜幣焉敢謝後見徐子吳出也以為二焉故執諸申楚子示諸侯侈椒舉曰夫六王二公之事皆所以示諸侯禮也諸侯所由用命也夏桀為仍之㑹有緡叛之商紂為黎之搜東夷叛之周幽為大室之盟戎狄叛之皆所以示諸侯汰也諸侯所由棄命也今君以汰無乃不濟乎王弗聽子産見左師曰吾不患楚矣汰而愎諫不過十年左師曰然不十年侈其惡不遠遠惡而後棄善亦如之德遠而後興鈞臺杜注河南陽翟縣南有鈞臺陂金置鈞州以鈞臺得名今河南開封府禹州是也州城北關外有鈞臺遺址師景亳杜注河南鞏縣西南有湯亭或言亳即偃案今河南府偃師縣南二十里有景山商頌陟彼景山即此史記正義曰湯即位徙西亳西亳即偃師景亳當主偃師為是孟津即盟津也隱十一年王以盟豫鄭即此陽岐陽杜注岐山在扶風美陽縣西北案漢之美在今武功縣境今岐山縣正在武功之西北彼時未有縣故岐山在其境內也後周始置岐山縣今屬陜西鳯翔府十酆宮杜注酆在始平鄠縣東括地志鄠縣東三五里有豐宮今屬陜西西安府顔師古謂靈臺鄉在豐水上是也為塗山杜注在壽春東北水經注荆塗二山相連一脈禹以桐柏之流泛濫為害鑿山為二以通之今山在鳯陽府懷遠縣東南八里胡傳弒君之賊在春秋時有臣子討之則衛人殺州吁是也有四鄰討之則蔡人殺陳他是也臣子不能討之於內四鄰不能討之於外有與之㑹以定其位則齊侯及魯宣公㑹于平州是也有受其賂以免於討則晉侯及諸國㑹于扈是也然至此極矣則未有不以為賊而又推為盟主相與朝事之以聽順其所為而不敢忤者也故申之㑹在㑹諸侯皆王法之所當斥也集說范氏寧曰楚靈王始會諸侯也之程子曰晉平公不在諸侯楚於是彊為霸者事蘇氏轍曰平公始衰齊靈公莊公背之平公屢合諸侯以討焉襄二十五年齊莊公死齊與晉平晉侯自是不復出與㑹盟其大夫趙武為政諸侯少安然而晉日益衰政在六卿故楚靈王合諸侯于申而晉不敢爭楚自是益肆於北方以髙氏閌曰春秋以來蔡常在陳衛上莊十六年後服屬於楚未嘗先陳衛今楚大合諸侯故復居陳上長陳氏傅良曰楚初專合諸侯也齊桓卒楚宋嘗爭矣敗于城濮楚師不出者八年晉志不在諸侯而後楚莊盟于辰陵以莊王之賢從之者陳鄭焉耳申之會合十有二國楚之得志於諸侯未有盛於此時者也外家氏鉉翁曰宋之盟虢之㑹晉楚同之猶以紊內之辨春秋譏焉今楚䖍新立逞其狂悖從晉人求諸侯晉之君臣輕以許之楚遂合十有二國而為此㑹會盟之一大變也楚人執徐子集說楊氏士勛曰不言歸者蓋在㑹而執尋亦釋之故不言所歸也劉氏敞曰稱人以執者非伯討也此其為非伯討奈何楚人讎吳徐子吳出也以為二焉而執之非道也髙氏閌曰執之非道也蓋欲效桓文之舉以示威諸侯爾而趙氏鵬飛曰楚子將以諸侯伐吳徐既聽於㑹矣楚疑徐子出於吳而執之此豈霸討哉故稱人以執也已季氏本曰徐服楚已久此則謂其不能閉道為二耳觀史記載季札北使過徐可知其通上國必由徐矣秋七月楚子蔡侯陳侯許男頓子胡子沈子淮夷伐吳左傳秋七月楚子以諸侯伐吳宋大子鄭伯先歸宋華費遂鄭大夫從集說杜氏預曰因申㑹以伐吳不言諸侯者鄭徐滕小邾宋不在故也高氏閌曰諸侯畏楚之彊守宋之盟而從之然猶不能致魯衛曹薛邾把至伐吳之役則北方之諸侯皆去唯屬楚者從之爾人心之嚮背可知也執齊慶封殺之左傳使屈申圍朱方八月甲申克之執齊慶封而盡滅其族將戮慶封椒舉曰臣聞無瑕者可以戮人慶封唯逆命是以在此其肯從於戮乎播於諸侯焉用之王弗聽負之斧鉞以徇於諸侯使言曰無或如齊慶封弒其君弱其孤以盟其大夫慶封曰無或如楚共王之庶子圍弒其君兄之子麇而代之以盟諸侯王使速殺之公羊此伐吳也其言執齊慶封何為齊誅也其為齊誅奈何慶封之罪脅齊君而亂齊國也穀梁慶封其以齊氏何也為齊討也靈王使人以慶封令於軍中曰有若齊慶封弒其君者乎慶封曰子一息我亦且一言曰有若楚公子圍弒其兄之子而代之為君者乎軍人粲然皆笑慶封弒其君而不以弒君之罪罪之者慶封不為靈王服也不與楚討也春秋之義用貴治賤用賢治不肖不以亂治亂也孔子曰懷惡而討雖死不服其斯之謂歟集說陸氏淳曰趙氏云弒君之臣天下共棄殺之是也故繫之齊焉此言慶封時已非齊臣夫子以其與弒君之賊所當討故繫之於齊明示其當死之義也陳氏傅良曰此執有罪曷為不再言楚子不豫楚以討齊慶封之辭也猶曰諸侯執之焉耳而張氏洽曰春秋書殺他國大夫之法有二凡有罪當誅者曰某人殺某若楚人殺陳夏徵舒是也無罪而不服者則書執而殺之若執蔡世子有以歸用之楚人執陳行人千徵師殺之是也慶封有與弒其君之罪楚子殺之宜也不曰殺齊慶封而曰執齊慶封殺之者楚靈有諸己而非諸人是以慶封不服而春秋亦不得純以討賊之法書之也家氏鉉翁曰始向戌合晉楚之成曰以弭兵也楚䖍既得諸侯遂動兵伐吳晉之為政者略無所問春秋聯書㑹盟伐國哀晉之失霸也或曰殺慶封非討有罪乎曰楚䖍賊之未討者也春秋之義不以亂治亂也汪氏克寬曰執宋公而不書楚執分其惡於諸侯也討齊慶封而不書楚討移其善於諸侯也若曰不使楚䖍得以竊討賊之名也案慶封弒君之賊法所當討故書執書殺明其罪之可殺也楚圍身為弒逆懷惡而討故不書楚子所以别於殺徵舒也公穀以不書伐防伐鍾離為不與專封則失之矣既書伐吳則慶封所受之邑亦何必更言伐乎遂滅賴賴公穀作厲左傳遂以諸侯滅賴賴子面縛銜璧士袒輿櫬從之造於中軍王問諸椒舉對曰成王克許許僖公如是王親釋其縛受其璧焚其櫬王從之遷賴於鄢楚子欲遷許於賴使鬭韋龜與公子棄疾城之而還申無宇曰楚禍之首將在此矣召諸侯而來伐國而克城竟莫校王心不違民其居乎民之不處其誰堪之不堪王命乃禍亂也穀梁遂繼事也集說趙氏鵬飛曰嗚呼楚一出而伐吳執殺慶封滅賴一至此哉晉平嗣霸偷安苟且坐視而不救天下何賴彼蓋以晉楚交好為利吾竊以為害矣楚家氏鉉翁曰遂滅賴著楚之暴也齊桓侵蔡遂伐遂事之正也楚䖍怙其彊橫劫諸侯而滅無罪之國書遂所以誅也遂之為義要當隨事以求經意執一例則拘矣九月取鄫左傳九月取鄫言易也莒亂著丘公立而不撫鄫鄫叛而來故曰取凡克邑不用師徒曰取集說劉氏敞曰公羊曰諱滅也非也莒已滅鄫矣此又能重滅之乎公羊本謂鄫未滅故因而為之辭耳年黃氏仲炎曰春秋國言滅邑言取鄫國也自襄六見滅於莒遂為莒邑至是魯乘莒亂而有之故言取也書取鄫者明魯人苟貪其土無興滅繼絶之義也附録左傳鄭子産作丘賦國人謗之曰其父死於路已為蠆尾以令於國國將若之何子寬以告子産曰何害苟利社稷死生以之且吾聞為善者不改其度故能有濟也民不可逞度不可改詩曰禮義不愆何恤於人言吾不遷矣渾罕曰國氏其先亡乎君子作法於涼其敝猶貪作法於貪敝將若之何姬在列者蔡及曹滕其先亡乎逼而無禮鄭先衛亡逼而無法政不率法而制於心民各有心何上之有命冬吳伐楚入棘櫟麻以報朱方之役楚沈尹射奔於夏汭針尹宜咎城鍾離薳啓彊城巢然丹城州來東國水不可以城彭生罷賴之師櫟杜注楚東鄙邑汝隂新蔡縣東北有櫟亭今河南汝寧府新蔡縣北二十里有野櫟店即古櫟城也若鄭之櫟邑則河南陽翟縣與此不同索麻杜注楚東鄙邑魏收志碭郡安陽縣治麻城隱襄城縣有麻城未知孰是案今江南徐州碭山縣有安陽城即故麻城以楚之東鄙言之安陽之說為近冬夏汭杜注漢水曲入江今夏口也應劭曰夏水竭夏流故謂之夏荆州記夏口入江處謂之夏汭蓋夏水之尾也漢末謂之夏口亦曰漢口亦曰沔口沔之下流為漢夏水亦㑹三水共出此口也章懷太子曰夏口實在江北唐置鄂州而夏口之名移於江南沔水入江之口亦止謂漢口矣今在湖廣武昌府江夏縣冬十有二月乙卯叔孫豹卒左傳初穆子去叔孫氏及庚宗遇婦人使私為食而宿焉問其行告之故哭而送之適齊娶於國氏生孟丙仲壬夢天壓已弗勝顧而見人黑而上僂深目而豭喙號之曰牛助余乃勝之旦而皆召其徒無之且曰志之及宣伯奔齊饋之宣伯曰魯以先子之故將存吾宗必召女召女何如對曰願之久矣魯人召之不告而歸既立所宿庚宗之婦人獻以雉問其姓對曰余子長矣能奉雉而從我矣召而見之則所夢也未問其名號之曰牛曰唯皆召其徒使視之遂使為豎有寵長使為政公孫明知叔孫於齊歸未逆國姜子明取之故怒其子長而後使逆之田於丘蕕遂遇疾焉豎牛欲亂其室而有之彊與孟盟不可叔孫為孟鐘曰爾未際饗大夫以落之既具使豎牛請日入弗謁出命之日及賔至聞鐘聲牛曰孟有北婦人之客怒將往牛止之賔出使拘而殺諸外牛又彊與仲盟不可仲與公御萊書觀於公公與之環使牛入示之入不示出命佩之牛謂叔孫見仲而何叔孫曰何為曰不見既自見矣公與之環而佩之矣遂逐之奔齊疾急命召仲牛許而不召杜泄見告之飢渴授之戈對曰求之而至又何去焉豎牛曰夫子疾病不欲見人使置饋於個而退牛弗進則置虛命徹十二月癸丑叔孫不食乙卯卒牛立昭子而相之公使杜泄葬叔孫豎牛賂叔仲昭子與南遺使惡杜泄於孝孫而去之杜泄將以路葬且盡卿禮南遺謂季孫曰叔孫未乘路葬焉用之且冢卿無路介卿以葬不亦左乎季孫曰然使杜泄舍路不可曰夫子受命於朝而聘於王王思舊勳而賜之路復命而致之君君不敢逆王命而復賜之使三官書之吾子為司徒實書名夫子為司馬與工正書服孟孫為司空以書勳今死而弗以是棄君命也書在公府而弗以是廢三官也若命服生弗敢服死又不以將焉用之乃使以葬季孫謀去中軍豎牛曰夫子固欲去之庚宗杜注魯地今山東兗州府泗水縣有庚宗亭丘蕕杜注地名集說許氏翰曰豹卒而毁中軍則公若寄矣以是知豹之有力於公室所謂剝之無咎者歟甲景王子八年五年晉平二十一年齊景十一年衛襄七年蔡靈六年鄭簡二十九年曹武十八年陳哀三十二年把文十三年宋平三十九年秦景四十年楚靈四年吳夷末七年春王正月舍中軍左傳五年春王正月舍中軍卑公室也毁中軍於施氏成諸臧氏初作中軍三分公室而各有其一季氏盡征之叔孫氏臣其子弟孟氏取其半焉及其舍之也四分公室季氏擇二二子各一皆盡征之而貢於公以書使杜泄告於殯曰子固欲毁中軍既毁之矣故告杜泄曰夫子唯不欲毁也故盟諸僖閎詛諸五父之衢受其書而投之帥士而哭之叔仲子謂季孫曰帶受命於子叔孫曰葬解者自西門季孫命杜泄杜泄曰卿喪自朝魯禮也吾子為國政未改禮而又遷之羣臣懼死不敢自也既葬而行仲至自齊季孫欲立之南遺曰叔孫氏厚則季氏薄彼實家亂子勿與知不亦可乎南遺使國人助豎牛以攻諸大庫之庭司宮射之中目而死豎牛取東鄙三十邑以與南遺昭子即位朝其家衆曰豎牛禍叔孫氏使亂大從殺適立庶又披其邑將以赦罪罪莫大焉必速殺之豎牛懼奔齊孟仲之子殺諸塞關之外投其首於寧風之棘上仲尼曰叔孫昭子之不勞不可能也周任有言曰為政者不賞私勞不罰私怨詩云有覺德行四國順之初穆子之生也莊叔以周易筮之遇明夷之謙以示卜楚丘曰是將行而歸為子祀以讒人入其名曰牛卒以餒死明夷日也日之數十故有十時亦當十位自王已下其二為公其三為卿日上其中食日為二旦日為三明夷之謙明而未融其當旦乎故曰為子祀日之謙當鳥故曰明夷于飛明而未融故曰垂其翼象日之動故曰君子于行當三在旦故曰三日不食離火也艮山也離為火火焚山山敗於人為言敗言為讒故曰有攸往主人有言言必讒也純離為牛世亂讒勝勝將適離故曰其名曰牛謙不足飛不翔垂不峻翼不廣故曰其為子後乎吾子亞卿也抑少不終大庫之庭杜注魯城內有大庭氏之虛於其上作庫孔疏炎帝號神農氏一曰大庭氏寧風杜注齊地胡傳案左氏舍中軍卑公室也初作三軍三分公室而各有其一及其舍之也四分公室季氏擇二二子各一皆盡征之而貢於公然則三軍作舍皆自三家公不與焉公室益卑而魯國之兵權悉歸於季氏矣兵權有國之司命三綱兵政之本原書其作舍而公孫於齊薨於乾侯定公無正必至之理也已則不臣三綱淪替南蒯叛陽貨專季斯囚而三桓之子孫微矣亦能免乎書曰舍中軍微詞以著其罪也集說孔氏穎達曰初作三軍季氏盡征之竝不入公室也叔孫氏臣其子弟以一家之內有父兄子弟四品以父兄之稅入公子弟之稅入已大率半屬公半入已孟氏則於子弟中取其半或取子或取弟大率三分歸公一分入已十二分其國民三家得七公得五國民不盡屬公公室已年矣今舍中軍四分公室三家自取其稅而隨時獻公公室彌卑矣初云作三軍今不云舍三軍者初作時三家各毁其乘足成三軍今此唯舍中軍之衆屬上下二軍季氏因叔孫家禍退之使同孟孫獨取其半為專已甚又擇取善者是專之極故傳言擇二以見之亂杜氏諤曰魯之軍法或作或舍皆出於季氏而洊舊制安可謂復古復正乎作與舍其實皆譏氏髙氏閌曰自是公室有貢而已無復有民矣張洽曰季宿自承行父為政即城費以保障私家為竊兵權之計自作三軍之初叔孫豹已知其必改而以盟詛要之今叔孫死未期年而改更前制蔑公室以歸私家利昭公之猶有童心而穆叔既卒魯遂無人春秋舍中軍之書殆著堅冰之已成也此家氏鉉翁曰前作三軍者非公作也三家之作也言舍中軍者非公舍也三家舍也作之非公舍之又非公國人盡屬於三家公室其貧乎當是時諸侯大夫狂恣犯上未有若季氏之甚者使非家臣內叛有以掣其篡弒之肘則田常所為不在齊而在魯禍不止於乾侯之出也又曰舍中軍非復為二軍乃析三軍為四季氏有其二孟叔各有其一而孟則羯亡貜始立叔則豹卒婼未安於位皆惟季氏所欲為書作於前書舍於後變更軍制之罪見矣左傳卑公室也得書法之旨汪氏克寬曰襄二十九年享范獻子公臣不能具三耦則公室已無民矣今季孫復舍中軍以國民四分之而已取其半非獨欲弱公室亦欲乘叔孫婼之未定其位弱仲叔二家而彊已也經書舍中軍而不言其故至十年伐莒列書三卿比事以觀而罪自見矣公羊以為復古穀梁以為復正非也苟曰後此不立三卿不設三軍則季孫意如叔弓仲孫貜帥師伐莒及哀二年季孫斯叔孫州仇仲孫何忌帥師伐邾何以三卿竝將而三軍竝出耶荀悅云春秋之義舍中軍則善之皆惑於公穀之說而未之考也嚴氏啓隆曰問季欲弱二氏何不直去二氏曰勢不可也魯之立國與齊晉異晉之爭政者八卿也故首去郤次去欒次去范中行次去知而後成其為韓趙魏齊之爭政者二相也故杼與厚爭而殺厚封與杼爭而殺杼陳鮑與欒髙爭而去欒高陳與鮑爭而去鮑魯三家如鼎足不可以驟革故敖雖奔魯人仍立其子穀僑如雖奔魯人仍立其弟豹一旦斥逐國之人必有譁然其不協者矣故季之僅出於弱非謀之迂勢不可也世言季氏弱公宜降於篡國一等而不知誅其意乃與弒君者無輕重之異誅亂討賊宿其可以末減哉楚殺其大夫屈申左傳楚子以屈申為二於吳乃殺之以屈生為莫敖使與令尹子蕩如晉逆女過鄭鄭伯勞子蕩於汜勞屈生於菟氏晉侯送女於邢丘子産相鄭伯㑹晉侯於邢丘汜杜注鄭地僖二十四年王適鄭處於汜即此縣菟氏杜注鄭地寰宇記菟氏城在開封府尉氏西北四十里集說劉氏敞曰稱國以殺大夫者罪纍上也屈申之纍上奈何楚人讎吳而疑屈申謂屈申二於吳也而殺之然則屈申之罪何屈申之為人臣也君弒則不能討國亂則不能去北面而事寇讎足以殺其身而已矣氏蘇氏轍曰稱國以殺言無罪也罪季氏本曰案左楚子以其二於吳殺之然非其故不去其大夫公如晉左傳公如晉自郊勞至於贈賄無失禮晉侯謂女叔齊曰魯侯不亦善於禮乎對曰魯侯焉知禮公曰何為自郊勞至於贈賄禮無違者何故不知對曰是儀也不可謂禮禮所以守其國行其政令無失其民者也今政令在家不能取也有子家羈弗能用也奸大國之盟陵虐小國利人之難不知其私公室四分民食於他思莫在公不圖其終為國君難將及身不恤其所禮之本末將於此乎在而屑屑焉習儀以亟言善於禮不亦遠乎君子謂叔侯於是乎知禮集說汪氏克寬曰昭公如晉凡七至晉而見止者一及河而不至者五惟此年得善往返然以莒人之訴幾不免於辱蓋昭公習於威儀之節而不知禮之本是以晉平雖稱其善於禮猶欲止而討之也附録左傳晉韓宣子如楚送女叔向為介鄭子皮子大叔勞諸索氏大叔謂叔向曰楚王汰侈已甚子其戒之叔向曰汰侈已甚身之災也焉能及人若奉吾幣帛愼吾威儀守之以信行之以禮敬始而思終終無不復從而不失儀敬而不失威道之以訓辭奉之以舊法考之以先王度之以二國雖汰侈若我何及楚楚子朝其大夫曰晉吾仇敵也苟得志焉無恤其他今其來者上卿上大夫也若吾以韓起為閽以羊舌肸為司宮足以辱晉吾亦得志矣可乎大夫莫對薳啓彊曰可苟有其備何故不可恥匹夫不可以無備況恥國乎是以聖王務行禮不求恥人朝聘有圭享俯有璋小有述職大有巡功設機而不倚爵盈而不飲宴有好貨飱有陪鼎入有郊勞出有贈賄禮之至也國家之敗失之道也則禍亂興城濮之役晉無楚備以敗於邲邲之役楚無晉備以敗於鄢自鄢以來晉不失備而加之以禮重之以睦是以楚弗能報而求親焉既獲姻親又欲恥之以召寇讎備之若何誰其重此若有其人恥之可也若其未有君亦圖之晉之事君臣曰可矣求諸侯而麇至求昏而薦女君親送之上卿及上大夫致之猶欲恥之君其亦有備矣不然奈何韓起之下趙成中行吳魏舒范鞅知盈羊舌肸之下祁午張躍籍談女齊梁丙張骼輔躒苗賁皇皆諸侯之選也韓襄為公族大夫韓須受命而使矣箕襄邢帶叔禽叔椒子羽皆大家也韓賦七邑皆成縣也羊舌四族皆彊家也晉人若喪韓起楊肸五卿八大夫輔韓須楊石因其十家九縣長轂九百其餘四十縣遺守四千奮其武怒以報其大恥伯華謀之中行伯魏舒帥之其蔑不濟矣君將以親易怨實無禮以速寇而未有其備使羣臣往遺之禽以逞君心何不可之有王曰不穀之過也大夫無辱厚為韓子禮王欲敖叔向以其所不知而不能亦厚其禮韓起反鄭伯勞諸圉辭不敢見禮也鄭罕虎如齊娶於子尾氏晏子驟見之陳桓子問其故對曰能用善人民之主也索氏杜注河南成皋縣東有大索城今滎陽東北三十里有京城大索城在京城西二十里其東北四十里為小索城三圉杜注鄭地漢置圉縣後魏曰圉城縣周顯德年征淮南駐師於圉城鎮即此今在把縣南五十里夏莒牟夷以牟婁及防兹來奔防杜注城陽平昌縣西南有防亭今平昌故城在安丘縣西南六十里縣兹杜注姑幕縣東北有兹亭今山東青州府諸城西北有姑幕故城兹亭在其境左傳牟夷非卿而書尊地也公羊莒牟夷者何莒大夫也莒無大夫此何以書重地也其言及防兹來奔何不以私邑纍公邑也穀梁以者不以者也來奔者不言出及防兹以大及小也莒無大夫其曰牟夷何也以其地來也以地來則何以書也重地也胡傳邾莒之大夫名姓不登於史策微也牟夷莒大夫曷為以姓氏通重地也以地叛雖賤必書地以名其人終為不義弗可滅矣其書來奔是接我以利而我入其利兩譏之也為國以義不以利如以利則上下交征而國必危矣為已以義不以利如以利則患得患失亦無所不至矣春秋於三叛人雖賤特書其名以懲不義懼淫人為後戒也邑而言及者公羊所謂不以私邑纍公邑是也集說許氏翰曰卿會虢方盟而伐莒取鄆公如晉未返而受莒牟婁及防兹惡季氏之專也家氏鉉翁曰庶其牟夷邾莒之盜也季孫宿魯之盜也襄二十一年公如晉庶其以地來奔季氏納之今公如晉在行牟夷復以地來奔季氏又納之季氏乘魯君之出招納邾莒之叛人叛邑以為已之私有不曰魯之內盜可乎襄公如楚還及方城季孫宿取卞使人以告公懼不敢入幾欲適諸侯今公在晉而宿所為復爾蓋置其君於陷穽罟擭之地將使晉人執之而已得以遂其竊國之計意如逐君之謀實兆於宿矣乃汪氏克寬曰三叛之受皆非魯君之意黑肱之來昭公已孫定公未立之時蓋水流濕火就燥季孫有叛君之心是以納叛人也秋七月公至自晉左傳莒人訴於晉晉侯欲止公范獻子曰不可人朝而執之誘也討不以師而誘以成之惰也為盟主而犯此二者無乃不可乎請歸之間而以師討焉乃歸公秋七月公至自晉集說汪氏克寬曰歷三時乃得歸書至危之也戊辰叔弓帥師敗莒師于蚡泉蚡扶粉反公作濆穀作賁蚡泉杜注魯地左傳莒人來討不設備戊辰叔弓敗諸蚡泉莒未陳也集說劉氏敞曰公羊曰濆泉者直泉也非也此地名爾豈謂戰而泉湧乎戰而泉湧固當舉戰地於上而後書曰有濆泉不得引濆泉以為戰地也鄭髙氏閌曰書敗莒師幸魯之勝乃所以罪之也氏玉曰晉人方以納牟夷之故欲止公而叔弓又敗莒師不顧霸討以成君禍比事而觀罪可知矣秦伯卒集說家氏鉉翁曰史失其名春秋因之非貶也故湛氏若水曰來赴故書之其不名者赴之略史書之略耳是無關於竊取之義焉公羊以為匿嫡之名非矣冬楚子蔡侯陳侯許男頓子沈子徐人越人伐吳越始見經左傳冬十月楚子以諸侯及東夷伐吳以報棘櫟麻之役薳射以繁揚之師㑹於夏汭越大夫常壽過帥師㑹楚子於瑣聞吳師出薳啓彊帥師從之遽不設備吳人敗諸鵲岸楚子以馹至於羅汭吳子使其弟蹶由犒師楚人執之將以釁鼓王使問焉曰女卜來吉乎對曰吉寡君聞君將治兵於敝邑卜之以守龜曰余亟使人犒師請行以觀王怒之疾徐而為之備尚克知之龜兆告吉曰克可知也君若歡焉好逆使臣兹敝邑休怠而忘其死亡無日矣今君奮焉震電馮怒虐執使臣將以釁鼓則吳知所備矣敝邑雖羸若早修完其可以息師難易有備可謂吉矣且吳社稷是卜豈為一人使臣獲釁軍鼓而敝邑知備以禦不虞其為吉孰大焉國之守龜其何事不卜一臧一否其誰能常之城濮之兆其報在邲今此行也其庸有報志乃弗殺楚師濟於羅汭沈尹赤會楚子次於萊山薳射帥繁揚之師先入南懷楚師從之及汝清吳不可入楚子遂觀兵於坻箕之山是行也吳早設備楚無功而還以蹶由歸楚子懼吳使沈尹射待命於巢薳啓彊待命於雩婁禮也瑣杜注楚地當在今江南壽州霍丘縣東繁鵲岸杜注廬江舒縣有鵲尾渚今江南太平府昌縣西南大江中有鵲洲蓋自銅陵鵲頭山至三山為鵲尾故江曰鵲江岸曰鵲岸南懷汝清杜注皆楚界應在今江淮間踟坻箕之山今江南無為州巢縣南三十七里有蹰山輿地志以為即坻箕山也集說蘇氏轍曰越於是始見而與徐稱人何也不可云沈子徐越伐吳故也猶戚之㑹吳以鄫故稱人也間趙氏鵬飛曰吳自襄十四年至是凡四受楚兵其惟吳遏伐楚而卒於道實未有以報楚也而楚兵無歲不行於吳境吳非怯也養鋒戢鋭以坐敵楚師故柏舉之役一戰及郢楚幾不祀用是知僚與闔閭非怯乎楚其為謀深矣若楚靈者其亦暴而無策歟若夫越初見於經而書人便文爾與戚之㑹吳人鄫人同非褒貶討家氏鉉翁曰胡文定以為楚伐吳執齊慶封殺之罪也吳不當報楚於是復為此役師出有名愚以為未然楚䖍篡弒之罪未討乃云為齊討賊春秋不以亂治亂以賊治賊也李氏廉曰此為楚通越制吳之始昭三十二年書吳伐越定五年書於越入吳十四年書於越敗吳于欈李哀元年吳夫差敗越于夫椒句踐行成既歸國十年生聚十年教訓至黃池之後又書於越入吳至哀二十年而越滅吳矣越惟此條書人久季氏本曰吳自襄十四年至是四受楚兵養鋭既而州來之滅長岸雞父之兵漸奮起焉至於柏舉一戰及郢矣然則以兵侮人豈非自侮耶案伐吳之役胡傳以為善楚而進越不知楚䖍身負大惡王法所不宥也而恃彊逞暴合諸侯以為修怨之師何善之有焉越從楚以伐吳是甘為篡賊役也聖人亦何為而進之乎此說之不可通者也附録左傳秦后子復歸於秦景公卒故也乙景王丑九年六年晉平二十二年齊景十二年衛襄八年蔡靈七年鄭簡三十年曹武十九年陳哀三十三年把文十四年宋平四十年秦哀公元年楚靈五年吳夷末八年春王正月杞伯益姑卒左傳六年春王正月把文公卒弔如同盟禮也集說髙氏閌曰即襄二十九年所書把子是也至是復稱伯者豈其後復振歟葬秦景公秦始書葬左傳大夫如秦葬景公禮也附録左傳三月鄭人鑄刑書叔向使詒子産書曰始吾有虞於子今則已矣昔先王議事以制不為刑辟懼民之有爭心也猶不可禁禦是故間之以義糾之以政行之以禮守之以信奉之以仁制為祿位以勸其從嚴斷刑罰以威其淫懼其未也故誨之以忠聳之以行教之以務使之以和臨之以敬涖之以彊斷之以剛猶求聖哲之上明察之官忠信之長慈惠之師民於是乎可任使也而不生禍亂民知有辟則不忌於上竝有爭心以徵於書而徼幸以成之弗可為矣夏有亂政而作禹刑商有亂政而作湯刑周有亂政而作九刑三辟之興皆叔世也今吾子相鄭國作封洫立謗政制參辟鑄刑書將以靖民不亦難乎詩曰儀式刑文王之德日靖四方又曰儀刑文王萬邦作孚如是何辟之有民知爭端矣將棄禮而徵於書錐刀之末將盡爭之亂獄滋豐賄賂竝行終子之世鄭其敗乎肸聞之國將亡必多制其此之謂乎復書曰若吾子之言僑不才不能及子孫吾以救世也既不承命敢忘大惠士文伯曰火見鄭其火乎火未出而作火以鑄刑器藏爭辟焉火如象之不火何為夏季孫宿如晉左傳夏季孫宿如晉拜莒田也晉侯享之有加籩武子退使行人告曰小國之事大國也苟免於討不敢求貺得貺不過三獻今豆有加下臣弗堪無乃戾也韓宣子曰寡君以為歡也對曰寡君猶未敢況下臣君之隸也敢聞加貺固請徹加而後卒事晉人以為知禮重其好貨集說髙氏閌曰謝前年取莒牟夷叛邑蓋莒既伐魯則魯有辭是以晉受季孫之聘而不見討也卓氏爾康曰魯受莒牟夷之奔時公在晉宿實主之及莒訴晉公幾為晉所止以范獻子之言得歸故武子如晉謝歸公且偵晉也葬把文公宋華合比出奔衛左傳宋寺人柳有寵大子佐惡之華合比曰我殺之柳聞之乃坎用牲埋書而告公曰合比將納亡人之族既盟於北郭矣公使視之有焉遂逐華合比合比奔衛於是華亥欲代右師乃與寺人柳比從為之徵曰聞之久矣公使代之見於左師左師曰女夫也必亡女喪而宗室於人何有人亦於女何有詩曰宗子維城毋俾城壞毋獨斯畏女其畏哉胡傳宋公寵信閽寺殺世適痤而父子之恩絶逐華合比而君臣之義暌刑人之能敗國亡家亦可畏矣猶有任趙高以亡秦信恭顯十常侍以亡漢寵王守澄田令孜以亡唐而不知鑒覆車之轍不亦悲夫凡此類直書而義自見矣集說許氏翰曰經書宋公殺其世子痤宋華合比出奔衛皆著寺人讒慝敗國以為世戒而秦漢以來庸君衰季溺心嬖習遠去忠良亂亡相屬若出一軌春秋之義惡可一日而不明哉家氏鉉翁曰伊戾與柳所以譖太子與右師皆坎用牲埋書以售其憸謀後先如出一轍而華亥之比柳與向戌之比伊戾適以相似而平公不之悟也嗟夫閹官禍人國家必外廷臣與之合而其譖乃售伊柳戌亥之事後世往往有之可不戒哉附録左傳六月丙戌鄭災虎楚公子棄疾如晉報韓子也過鄭鄭罕公孫僑游吉從鄭伯以勞諸柤辭不敢見固請見之見如見王以其乘馬八匹私面見子皮如上卿以馬六匹見子産以馬四匹見子大叔以馬二匹禁芻牧採樵不入田不樵樹不采藝不抽屋不彊丐誓曰有犯命者君子廢小人降舍不為暴主不慁賔往來如是鄭三卿皆知其將為王也韓宣子之適楚也楚人弗逆公子棄疾及晉竟晉侯將亦弗逆叔向曰楚辟我衷若何效辟詩曰爾之教矣民胥效矣從我而已焉用效人之辟書曰聖作則無寧以善人為則而則人之辟乎匹夫為善民猶則之況國君乎晉侯說乃逆之秋九月大雩左傳秋九月大雩旱也楚薳罷帥師伐吳罷音皮左傳徐儀楚聘於楚楚子執之逃歸懼其叛也使薳泄伐徐吳人救之令尹子蕩帥師伐吳師於豫章而次於乾溪吳人敗其師於房鍾獲宮廏尹棄疾子蕩歸罪於薳泄而殺之豫章當在江北淮水南州乾溪杜注在譙國城父縣南今江南鳳陽府亳東南有乾溪與城父村相近即漢之城父縣也城房鍾杜注吳地當在今壽州蒙縣界集說許氏翰曰敗楚師者非薳泄也而泄伏其誅故書薳罷伐吳以正之楚再不競於吳乃移兵有事陳蔡至復伐徐而國亂矣趙高氏閌曰三書伐吳者見楚終不得志於吳也氏鵬飛曰楚於是伐吳者凡五冬叔弓如楚左傳冬叔弓如楚聘集說王氏葆曰昭公內見迫於彊臣外見絶於盟主區區求附於不信之荆蠻宜其終見逐也高氏閌曰蓋左氏以為弔敗者非也楚恃彊暴雖敗猶諱之魯豈敢弔乎四年公不會申己而震楚兵威將朝楚而不能故以叔弓先聘而明年躬繼之也由張氏洽曰楚與吳讎敵之國而昭公婚吳遠楚故之會魯不與焉今楚復伐吳其惡益遠昭公始通好於楚蓋不待薳啓疆之召已服楚而將朝之矣趙氏鵬飛曰諸侯兩事晉楚季孫宿如晉則不得不以叔弓如楚也齊侯伐北燕左傳十一月齊侯如晉請伐北燕也士丐相士鞅逆諸河禮也晉侯許之十二月齊侯遂伐北燕將納簡公晏子曰不入燕有君矣民不二吾君賄左右諂諛作大事不以信未嘗可也集說家氏鉉翁曰齊侯伐北燕將納其君書爵書伐師出有名也不書所以伐貶也仗義而往納賂而還是以不能成功也齊景賢君每欲有為輒為近幸小人所阻優游不斷以逮終老而國非其國矣汪氏克寬曰晉人納捷菑于邾則書弗克納此不書齊侯納北燕伯弗克納者諸侯失國諸侯納之正也非奉少奪長之比也但齊景受賂而退故止書伐北燕若以彊陵弱而非納燕君耳欽定春秋傳說彚纂卷二十九
