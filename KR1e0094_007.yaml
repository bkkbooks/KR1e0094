body:
  text: 欽定四庫全書欽定春秋傳説彚纂卷五甲桓王十戌三年五年齊僖二十四年晉小子二年衛宣十二年蔡桓八年鄭莊三十七年曹桓五十年陳桓三十八年杞武四十四年宋莊三年秦寧九年楚武三十四年春正月甲戌己丑陳侯鮑卒左傳於是陳亂文公子他殺大子兔而代之公疾病而亂作集説杜氏預曰甲戌前年十二月二十一日己丑此年正月六日孔氏穎逹曰以長厯推之知甲戌己丑别月而赴者並言正月故兩書其日而共言正月若其各以月赴亦應兩書其月但此異年之事設令兩以月赴則當於四年云十二月甲戌陳侯鮑卒五年正月己丑陳侯鮑卒啖氏助曰公榖皆云甲戌之日出而亡己丑之日死而得案國君雖狂而去亦當有臣子從之豈有國君走出臣下不追逐昧其死日乎競趙氏匡曰左氏云再赴豈有正當禍亂之時而暇使人赴告哉假令實再赴夫子亦當詳定其實日何乃總載之乎且傳云公疾而難作此文亦據陳國史而記之驗此則經文甲戌下當記陳他作亂之事全簡脫之耳丑陸氏淳曰甲戌下脫也戌孫氏復曰此言甲戌己陳侯鮑卒闕文也蓋甲之下有脫事耳且諸侯未有以二日卒者也或劉氏敞曰春正月甲戌此無事何以無無聞焉爾曰陳侯之弟他殺陳世子免云爾闕也傳程子曰甲戌下文闕黃氏仲炎曰甲戌己丑三皆以為魯史舊文而孔子因之非也孔子修春秋以筆削自命若魯史有二日並存之訛不應述而不削遺無故之疑也此必聖人筆削之後傳録者誤耳二李氏亷曰三傳不究闕文之義公羊則曰曷為以日卒之怴也甲戌之日亡己丑之日死而得君子疑焉榖梁則曰陳侯以甲戌之日出己丑之日得不知死之日故舉二日以包之左氏則以為再赴其謬戾甚矣之王氏錫爵曰豈有正當禍亂之時而暇使人再赴理即令再赴孔子何以不據實而書蓋或上下其文有闕耳而或者遂謂陳他殺其君之子免八字則又失之鑿夏齊侯鄭伯如紀左傳齊侯鄭伯朝於紀欲以襲之紀人知之胡傳案左氏齊鄭朝紀欲以襲之紀人知之夫如者朝詞也尊不朝乎卑大不朝乎小紀之為紀微乎微者也齊在東州尊則方伯鄭亦大國也並驅而朝紀乃懷詐諼之謀欲以襲之而不虞紀人之覺也其志憯矣此外相如爾何以書紀人主魯故來告其事魯史承告故備書於䇿夫子修經存而不削者以小國恃大國之安靖已而乃包藏禍心以圗之亦異於興滅國繼絶世之義矣故存而弗削以著齊人滅紀之罪明紀侯去國之由劉敞意林所謂聖人誅意之效是也集説杜氏預曰外相朝皆言如齊欲襲紀紀人懼而來告故書孔氏穎逹曰傳言朝經言知知如即朝也下文州公如曹與此相類故云外相朝皆言所如也魯出朝聘例亦言如獨言外朝者經有公朝王以不盡云公如故獨云外也朝聘而謂之如者爾雅釋詁云如往也劉氏敞曰外相如不書此何以書疾之也曷為疾之齊侯鄭伯將襲紀以朝往焉紀人知之然後以朝反如者朝辭也尊不朝乎卑大不朝乎小強不朝乎弱不正其為詐以圗人之國使若誠朝然疾之也又曰公羊以謂離不言會故言如也非也春秋之記盟會者所以刺譏諸侯非善羣聚而惡離會也離會何為不可書而改會為如以亂事實哉之孫氏覺曰春秋之時齊鄭強大而紀最小此紀侯朝事不暇者而齊鄭往焉有以窺之也故桓十三年之戰而莊元年遷其郱鄑郚三年以酅入齊而紀亡矣程子曰齊侯鄭伯朝於紀欲以襲之紀人知之齊為諸侯而欲為賊於鄰國不道之甚鄭伯助之其罪均矣吳氏澄曰許近於鄭紀近於齊鄭欲得許與齊同謀之而卒得許齊欲得紀與鄭同謀之而卒得紀李氏廉曰外相如例二州公如曹為來魯書也齊鄭如紀為紀人來告也此皆非常例公羊直以為離不言會榖梁又以為過我而書不及左氏逺矣又曰春秋之初齊僖鄭莊皆小人之雄合謀同心以吞噬小國為事自隱二年石門之盟至桓十一年惡曹之盟二十年間二國為一伐宋入郕入許立督今又相與謀紀自二君如紀之後紀百計求援六年會於成其冬來朝謀於魯也深矣九年季薑歸京師託於周也至矣十一年鄭莊卒後齊鄭之黨方散故十三年紀侯得魯鄭而僥幸於一勝然怨愈搆矣十五年齊僖卒襄公立十七年于黃之盟魯欲平二國也而襄公方襲小伯之勢豈顧一盟而棄僖公之業哉故莊元年而遷郱鄑郚矣三年而紀季入酅矣齊勢方盛鄭亦棄紀而為垂之遇矣故自齊鄭如紀蓋十有七年而紀卒去國齊可罪也鄭莊之惡可勝誅哉秋汪氏克寬曰外相如惟齊鄭如紀與州公如曹春惡齊鄭之不能恤小國而假朝禮以濟凌人之謀惡州公不能保其國而假朝禮以為依人之具皆非真能行朝禮者也比事以觀考齊人滅紀之本末及州實之來魯而聖人之意見矣天王使仍叔之子來聘仍榖作任左傳仍叔之子弱也公羊仍叔之子者何天子之大夫也其稱仍叔之子何譏何譏爾譏父老子代從政也榖梁任叔之子者録父以使子也故微其君臣而著其父子不正父在子代仕之辭也胡傳仍叔之子云者譏世官非公選也帝王不以私愛害公選故仕者世祿而不世官任之不以其賢也使之不以其能也卿大夫子弟以父兄故而見使則非公選而政由是敗矣上世有自耕野釣渭擢居輔相而人莫不以為宜伊陟象賢復相太戊丁公世美入掌兵權不以世故疑之也崇伯殛死禹作司空蔡叔既囚仲為卿士亦不以其父故廢之也惟其公而已矣及周之衰小人得政視朝廷官爵為己私援引親黨分據要途施及童稚賢者退處於蓽門老身而不用公道不行然後國家傾覆雖有智者不能善其後矣春秋書武氏仍叔之子云者戒後世人主徇大臣私意而用其子弟之弱者居公選之地以敗亂其國家欲其深省之也集説何氏休曰不言氏者起父在也加之者起子辟一人杜氏預曰仍叔天子之大夫稱仍叔之子本於父字幼弱之辭也君范氏寧曰録父使子謂不氏名其人稱父言子也暗劣於上臣茍進於下蓋參譏之天孔氏穎逹曰天子大夫例皆書字仍氏叔字知是子大夫也又曰傳雖不言聘蓋為將伐鄭而遣告魯也人劉氏敞曰仍叔之子者何猶曰仍叔之子云爾爵以其德也祿人以其能也天下之公也王者不以愛害公貴家氏鉉翁曰宰紏名貶也仍叔之子不名亦貶也者以名為貶少且賤者以不名為貶皆以著其奬逆之罪也大汪氏克寬曰詩雲漢序云仍叔美宣王則仍叔世夫可知又曰公榖皆云父老子代從政程子則云父受命而使子代行今案非有天子之命則亦不敢使子代聘也卓氏爾康曰此蓋譏子弟預國政耳如仍氏之子巳為大夫經自當以官氏名字見今曰仍叔之子蓋知其未命之稱也案左氏以為弱公榖以為父老子代從政胡傳以為譏世官其義蓋相因也程子謂仍叔承命而使子代行則是仍叔自使其子何以稱天王使耶汪氏克寬駁之是矣葬陳桓公集説黃氏震曰使會葬故書之吳氏澄曰不書月史失之蓋陳他篡立而葬也俞氏皋曰不書月日闕文也是年陳他殺大子免而自立不書不來告也城祝丘祝丘杜注魯地漢即丘縣孟康曰春秋時之祝丘也今沂州東南五十里有即丘城集説杜氏預曰齊鄭將襲紀故齊髙氏閌曰莊二十年夫人會齊侯於祝丘是魯兩境上邑也齊將襲紀公欲助紀而畏齊之來討故非時城此以備之以桓之暴逆奪民之力則旱蝗應矣家氏鉉翁曰非時也故書秋蔡人衛人陳人從王伐鄭左傳王奪鄭伯政鄭伯不朝秋王以諸侯伐鄭鄭伯禦之王為中軍虢公林父將右軍蔡人衛人屬焉周公黑肩將左軍陳人屬焉鄭子元請為左拒以當蔡人衛人為右拒以當陳人曰陳亂民莫有鬬心若先犯之必奔王卒顧之必亂蔡衛不枝固將先奔既而萃於王卒可以集事從之曼伯為右拒祭仲足為左拒原繁髙渠彌以中軍奉公為魚麗之陳先偏後伍伍承彌縫戰於繻葛命二拒曰旝動而鼓蔡衛陳皆奔王卒亂鄭師合以攻之王卒大敗祝聃射王中肩王亦能軍祝聃請從之公曰君子不欲多上人况敢陵天子乎苟自救也社稷無隕多矣夜鄭伯使祭足勞王且問左右繻葛杜注鄭地或云即長葛也今河南開封府長葛縣北十二里有故城公羊其言從王伐鄭何從王正也胡傳案左氏王奪鄭伯政鄭伯不朝王以諸侯伐鄭鄭伯禦之戰於繻葛王卒大敗春秋書王必稱天者所章則天命也所用刖天討也王奪鄭伯政而怒其不朝以諸侯伐焉非天討也故不稱天或曰鄭伯不朝惡得為無罪曰桓公弒君而自立宋督弒君而得政天下大惡人理所不容也則遣使來聘而莫之討鄭伯不朝貶其爵可也何為憤怒自將以攻之也移此師以加宋魯誰曰非天討乎春秋天子之事述天理而時措之也既譏天王以端本矣三國以兵會伐則言從王者又以明君臣之義也君行而臣從正也戰於繻葛而不書戰王卒大敗而不書敗者又以存天下之防也三綱軍政之本聖人寓軍政於春秋而書法若此皆裁自聖心非國史所能與也集説杜氏預曰王自為伐鄭之主君臣之辭也瑗啖氏助曰不言會及臣從君之辭也胡氏曰不書王師敗績於鄭王者無敵於天下書戰則王者可敵書敗則諸侯得禦故言伐而不言敗茅戎書敗者王師非王親兵致討故敗而書之也孫氏復曰桓王以蔡人衛人陳人伐鄭鄭伯叛王其言蔡人衛人陳人從王伐鄭者不使天子首兵也案十四年宋人以齊人蔡人衛人陳人伐鄭僖二十六年公以楚師伐齊定四年蔡侯以吳子及楚人戰於柏舉皆曰以此不使天子首兵可知也曷為不使首兵天子無敵非鄭伯可得伉也故曰蔡人衛人陳人從王伐鄭以尊之尊桓王所以甚鄭伯之惡也夫鄭同姓諸侯密邇畿甸桓王親以三國之衆伐之拒而不服此鄭伯之罪不容誅矣劉氏敞曰榖梁曰舉從者之辭也其舉從者之辭何也為天王諱伐鄭也非也直言從王伐鄭文順事明可不煩解矣又妄云舉從者之辭何益哉且安見諱伐鄭之義哉葉程子曰王師於諸侯不書敗諸侯不可敵王也氏夢得曰古者諸侯有罪方伯征之方伯不能服二伯征之二伯不能服而後王親征之諸侯而至于王親征之無以立於天下矣從吕氏祖謙曰天子得用諸侯之師故不曰以而曰王臣聼君之辭也陳氏傅良曰王師不書書伐鄭伐鄭不服也伐鄭不服而後王命不行於天下嘗戰矣而不言戰嘗敗績矣而不言敗績諱之也其曰蔡人衛人陳人從王伐鄭尊王也事薛氏季宣曰九伐之法無親征諸侯之制王親戎危道也其不書王師何王為重也大家氏鉉翁曰王討叛而不勝反為所敗此王室一變春秋是以書三國從王伐鄭存君臣之義以示天下後世亦褒三國之能以師從王責齊宋魯大國之不從王者也萬氏孝若曰桓王伐鄭非天討莊王錫桓公命非天命故皆不書天俞氏皋曰三國稱人將卑師少也從順辭也王自將而三國以微者從亦罪也不言敗諱也李氏廉曰春秋王師之出有二伐鄭救衛是也陳氏云王師不書書伐鄭伐鄭不服而後王命不行於天下書救衛救衛無功而後王命不行於天下此説固是然春秋明道不計功故伐鄭不書以而救衛書子突又不可以一槩論也汪氏克寬曰傳稱王以諸侯伐鄭而經書三國從王實變文以著君臣之大分然成十三年傳云公及諸侯遂從劉康公成肅公會伐秦而經不書諸侯從劉子成子者王臣非至尊之比猶尹子單子之伐鄭止以列會為文也襄十四年傳云諸侯之大夫從晉侯伐秦而經不書大夫從晉侯者諸侯非王命不當擅興列國之師蓋齊桓晉文之侵伐止以列會為文也文定謂桓王伐鄭非天討乃端本澄源之意董子所謂正心以正朝廷正朝廷以正四方而逺近莫不一於正非謂鄭莊之無罪也春秋深明其用自貴者始王不稱天以正其本三國書從以明人臣從君之義戰敗不書以存大君無敵之體書三國從王伐鄭以人臣而致天子之親伐則鄭之罪亦不可掩矣從王伐鄭為一經之特筆輕重之權衡君臣之名分莫不畢見豈不深切著明矣哉大雩此書雩之始左傳秋大雩書不時也凡祀啓蟄而郊龍見而雩始殺而嘗閉蟄而蒸過則書公羊大雩者何旱祭也然則何以不言旱言雩則旱見言旱則雩不見何以書記災也胡傳大雩者雩於上帝用盛樂也諸侯雩於境內之山川爾魯諸侯而郊禘大雩欲悉書於䇿則有不勝書故雩祭則因旱以書而特謂之大郊禘亦因事以書而義自見此皆國史所不能與君子以謂性命之文是也諸侯不得祭天地大夫不得祭山川士庶人不敢以他人祖禰祭於巳之寢禮也故季氏旅於泰山子曰嗚呼曾謂泰山不如林放乎明乎春秋所書郊禘大雩之義則知聖人治國知指諸掌之説矣集説禮記月令曰仲夏之月命有司為民祈祀山川百源大雩帝用盛樂注云雩吁嗟求雨之祭也雩帝為壇於南郊之旁雩五方上帝配以先帝自鞀鞞至柷敔皆作曰盛樂他雩用歌舞而已正雩在四月為五月不雨修雩故記之於五月也氏鄭氏康成曰天子雩上帝諸侯以下雩上公杜預曰啓蟄夏正建寅之月祀天南郊龍見建巳之月蒼龍宿之體昏見東方萬物始盛待雨而大故祭天逺為百榖祈膏雨建酉之月隂氣始殺嘉榖始熟故薦嘗於宗廟建亥之月昆蟲閉户萬物皆成可薦者衆故蒸祭宗廟六孫氏復曰雩求雨之祭建巳之月常祀也故經無月雩者建午建申之月非常則書謂之大者雩於上帝也天子雩於上帝諸侯雩於山川百神魯諸侯也雩於山川百神禮也雩於上帝非禮也是時周室既微諸侯之僭者多舉於魯則諸侯僣之從可見矣然春秋魯史孔子不敢斥也其或災異非常改作不時者則從而録之以著其僣天子之惡隱五年九月考仲子之宫初獻六羽此年秋大雩六年八月壬午大閲閔二年夏五月乙酉吉禘於莊公僖三十一年夏四月四卜郊不從乃免牲宣三年春王正月郊牛之口傷改卜牛牛死乃不郊定二年夏五月壬辰雉門及兩觀災之類是也嗚呼其旨微矣程子曰成王尊周公故賜魯重祭得郊禘大雩大雩雩於上帝用盛樂也諸侯雩於境內之山川耳成王之賜魯公之受皆失道也故夫子曰魯之郊禘非禮也周公其衰矣大雩嵗之常祀不能皆書也故因其非時則書之遇旱災則非時而雩書之所以見其非禮且志旱也郊禘亦因事而書又曰古者一年之間祭天甚多春則因播種而祈榖夏則恐旱暵而大雩春楊氏時曰愚案啓蟄而郊龍見而雩此詩頌所謂夏祈榖於上帝也龍見而雩與周禮所掌春秋所書不同周禮司巫帥巫而舞雩為旱而雩也春秋書雩二十有一因旱而雩也龍見而雩乃建巳之月逺為百榖祈膏雨與啓蟄之郊其意同是以樂則必用盛樂與它祭不同聲音之號所以詔告於天地之間以逹神明也郊非不用樂也以禮為主雩非不用禮也以樂為主亦各隨其宜也屬朱子曰天子祭天地諸侯祭國內山川只緣是他我故祭得他若不屬我氣便不與之交感如何祭得此春秋所書郊禘大雩之義也家氏鉉翁曰常祀不書書雩皆旱而雩也大雩帝天子事也雩山川百神諸侯事也魯僣雩帝故書大以譏之郊禘亦僣何以不書大曰郊禘一而已矣雩則諸侯天子為禮各異故書大以譏其僣為吳氏􅊹曰魯之雩祀僣王禮特書曰大雩以表其天子祀上帝之雩而非諸侯祭山川之雩也左氏謂龍見而雩過則書龍見者孟夏建巳之月經無書六月雩者蓋得禮則不書七月八月九月則皆過時故書書冬則建酉之月穀已成熟尤為非時也魯有舞雩壇蓋祀帝於壇如郊焉而用盛樂歌舞於壇上故名其壇為舞雩而日亦如郊之用辛也齊氏履謙曰天子有雩諸侯亦有雩天子有社諸侯亦有社雩社雖同所以為雩社則異故春秋大雩則書鼓於社則書皆非禮之禮也三李氏廉曰經書雩二十一止書秋者七此年及成襄五十六昭八定七十二是也書八月者四僖十一襄二十八昭三二十四是也書七月者二昭二十五是也書九月者七僖十三襄八十七昭六十六定元七年是也書冬者一成七年是也蓋左氏但知龍見而雩為正故以為不時而不知因旱而雩乃記災也公羊以大雩為大旱趙子以稱大為遍雩舊説又以為大者禮物有加也是皆不知大雩之為僣矣一年而二雩者昭二十五定七年也皆旱甚而無格天之誠季辛又雩不言大者啖子曰承上文也時汪氏克寬曰經書雩二十一左氏於此年云書不襄五年八年二十八年昭三年六年十六年二十四年皆曰旱也昭二十五年再雩則曰旱甚餘年無傳首言不時而後皆言旱其意以互文見義皆以旱而皆不時也然春秋書雩實以旱書而併著其僣耳熊氏過曰雩者號祭吁嗟求雨也魯南為雩門舞雩在城南舞以女巫雩樂以皇所以逹陽中之隂雩祭以舞為盛遂名壇曰舞雩舞雩有二龍見而雩設壇祈澤常祭也旱而雩非常也大雩上帝用盛樂又非常僣也胡氏義備矣月令建午之雩則秦制耳案以逺釋雩本孔疏耳賈服皆無此義杜注謂萬物待雨又曰逺為百榖祈膏雨似以雨釋雩逺字非其所立義也爾雅謂雩為號祭則榖梁吁義近之古人釋文或從類或諧聲雩文從雨而聲近吁若逺則兩無取焉螽公作􅏑公羊􅏑何以書記災也榖梁螽蟲災也集説何氏休曰􅏑者煩擾之所生曰杜氏預曰蚣蝑之屬為災故書孔氏穎逹釋蟲云蜇螽蜙蝑揚雄方言云舂黍謂之蜙蝑陸璣毛詩疏云幽州人謂之舂箕舂箕即舂黍蝗類也長而青股鳴者或謂似蝗而小斑黑其股狀如玳瑁又五月中以兩股相切作聲聞十數步爾雅又有蟿螽土螽樊光云皆蜙蝑之屬然則螽之種類多故言屬以包之傳稱凡物不為災不書知此為災故書程子曰蝗也既旱又蝗飢不待書也股一生九十九子朱子曰螽蝗屬長而青長角長鄭氏樵曰古曰螽今曰蝗家氏鉉翁曰繼雩書螽旱蝗並作也見汪氏克寬曰春秋書螽者十桓僖文襄之世各一惟宣哀之世各三見大程氏端學曰螽者乖戾之氣所生也生則害五榖意與書螟同李氏廉曰經書螽十桓五宣十三十五皆書秋文八書冬僖十五宣六襄七皆書八月哀十三書九月哀十二十三書十二月案此與隱五年書螟同蓋以久暫計之則時甚於月矣榖梁之説非也故不録冬州公如曹州國名今山東青州府安邱縣淳于城州所都也曹杜注曹國濟隂定陶縣今屬山東兗州府縣西北四里有定陶故城即曹國也孔疏世本州國薑姓曹國伯爵譜云曹姬姓文王子叔振鐸之後左傳淳于公如曹度其國危遂不復淳于杜注州國所都城陽淳于縣也今青州府安邱縣東北三十里有淳于故城公羊外相如不書此何以書過我也榖梁外相如不書此其書何也過我也胡傳案左氏淳于公如曹度其國危遂不復天子三公稱公王者之後稱公州公諸侯而稱公者昔畢髙以父師而保釐東土衛武以列國而入相於周蓋與後世出入均勞之意同此其所以稱公也外相知不書此何以書將有其末故先録其本集説孔氏穎逹曰如者朝也以朝出國不得書奔外朝不書以因來向魯故書其本也趙氏匡曰據經文直書譏其外交故書曰如曹何劉氏敞曰州公者何寰內諸侯也外相如不書此以書過我也過我則何以書接焉爾如程子曰州公嘗為王三公故稱公不能保其國去曹遂不復張氏洽曰州稱公與祭公同則州必畿內之地河內州縣也左氏乃云淳于公杜注城陽淳于縣州國所都昭元年傳云城淳于或云因州公不反國為把所并遂以淳于為都未詳孰是吳氏􅊹曰此人君之失國者與紀侯大去其國同但州公之去國有所如紀侯之去國無所如爾凡國君如他國皆朝也蓋其國危亡將寄託於曹假朝禮以行實則奔也稱趙氏鵬飛曰州公王臣也天下諸侯非二王後無公者把以夏之後宋以商之後故爵以公天子三公稱公祭公虞公虢公與此州公是也州寰內采邑也公爵也州邑即河內州縣其初蓋蘇忿生采地至是為州公食邑左氏乃以為淳于公淳于公則把公耳淳于隸今密州把後遷於淳于世或以地稱之如東樓公之類是也左氏不知遂以淳于公為州公不知諸侯非二王後非天子三公無稱公者外相如不書此何以書為六年實來起也州公其實來魯而中道如曺故先書州公如曺而繼書實來文相承也案左氏以州公為淳于公張氏洽趙氏鵬飛皆以州為畿內之國與癸公同二説各有所見今並存之乙桓王十亥四年六年齊僖二十五年晉小子三年衛宣十三年蔡桓九年鄭莊三十八年曹桓五十一年陳厲公躍元年把武四十五年宋莊四年秦寧十年楚武三十五年春正月實來左傳六年春自曹來朝書曰實來不復其國也公羊實來者何猶曰是人來也孰謂謂州公也曷為謂之實來慢之也曷為慢之化我也榖梁實來者是來也何為是來謂州公也其謂之是來何也以其晝我故簡言之也諸侯不以過相朝也胡傳案左氏自曹來朝書曰實來不復其國也實者州公名也春秋之法諸侯不生名失地滅同姓則名正名經世之本名正而天下定矣或曰諸侯失國而後託於諸侯孟子以為禮也今州公來朝將以諸侯之禮接之乎則春秋乃書其名將以匹夫之賤畜之乎孟子乃以託國為禮將何處而可曰世衰道微諸侯放恣強凌弱衆暴寡天子不能正方伯不能治其有壤地褊小迫乎大國之間而失國是不幸焉非其罪也則以諸侯之禮接之可也若談子在莒弦子在黃溫子在衛雖失國出奔而春秋不名義可見矣若夫不能修道以正其國或棄賢保佞或驕奢淫縱或用兵暴亂自底滅亡如蔡獻舞邾益曹陽州實之徒皆其自取焉爾則待之以初乃禮之過也觀春秋名與不名則知所以處寓公之禮與強為善自暴棄者之勸戒矣集説杜氏預曰實實也不言州公者承上五年冬經如曹間無異事省文從可知又曰傳亦承五年冬淳于公如曹也言奔則來行朝禮言朝則遂留不去故變文言實來劉氏敞曰實來者孰謂謂州公也曷為不曰州公來簡之也不程子曰五年冬如曺尚為君也故以諸侯書之今能反國則匹夫也故名之來來魯也忽稱鄭忽明其正也實不稱州亡其國也陳氏傅良曰以為來朝則非朝也來奔則非奔也但曰州公來則疑於祭伯故書曰州公如曹春正月實來是不復其國之辭也古者君去其國大宰取羣廟之主以從而託於諸侯曰寓公先王所以通不得已也州公如曹實來紀侯大去其國不書奔通不得已也他張氏洽曰淳于公自曹來朝記禮者曰天子曰非伯父實來成二年傳王曰所使來撫豫一人而鞏伯實來今案書州公曰實來以其不復國而略之也案三傳皆以實來為州公來程子及胡傳亦同惟三傳以實來為承上文而程胡以實為州公之名蓋諸侯不生名失地則名也強氏治主三傳之説引證實來甚為詳核則二説當並存附録左傳楚武王侵隨使薳章求成焉軍於瑕以待之隨人使少師董成鬬伯比言於楚子曰吾不得志於漢東也我則使然我張吾三軍而被吾甲兵以武臨之彼則懼而協以謀我故難間也漢東之國隨為大隨張必棄小國小國離楚之利也少師侈請羸師以張之熊率且比曰季梁在何益鬪伯比曰以為後圗少師得其君王毁軍而納少師少師歸請追楚師隨侯將許之季梁止之曰天方授楚楚之羸其誘我也君何急焉臣聞小之能敵大也小道大淫所謂道忠於民而信於神也上思利民忠也祝史正辭信也今民餒而君逞欲祝史矯舉以祭臣不知其可也公曰吾牲牷肥腯粢盛豐備何則不信對曰夫民神之主也是以聖王先成民而後致力於神故奉牲以告曰博碩肥腯謂民力之普存也謂其畜之碩大蕃滋也謂其不疾瘯蠡也謂其備腯咸有也奉盛以告曰潔粢豐盛謂其三時不害而民和年豐也奉酒醴以告曰嘉栗旨酒謂其上下皆有嘉德而無違心也所謂馨香無讒慝也故務其三時修其五教親其九族以致其禋祀於是乎民和而神降之福故動則有成今民各有心而鬼神乏主君雖獨豐其何福之有君姑修政而親兄弟之國庶免於難隨侯懼而修政楚不敢伐隨杜注義陽隨縣西魏置隨州今屬湖廣德安府古城在州南孔疏世本隨國姬姓不知始封為誰江瑕杜注隨地府漢杜注漢水出武都至江夏入武都今漢中寧羌州江夏今武昌府江夏縣夏四月公會紀侯于郕郕左公作成南成杜注魯地泰山巨平縣東今山東兗州府寧陽縣東北九十里有故城社即古成城也左傳夏會於成紀來咨謀齊難也集説杜氏預曰齊欲滅紀故來謀之與二年書來朝三年會郕同旨孫氏復曰此孫氏覺曰其後齊終并紀會盟侵伐自此無已經書之所以見強國暴恣而小國微弱奔走不暇以救其危者也程子曰謀齊難也紀髙氏閌曰以紀之微而捍齊之強者十有七年亦侯憂畏咨謀之功也歟黃氏震曰齊欲圗紀紀魯甥也以魯婚於齊故求魯而公會之家氏鉉翁曰前年齊鄭以盜竊之兵襲紀而弗遂因是啓釁且將大加兵於其國紀睦於魯越境而謀公往會之義之不容巳者春秋無譏也是冬紀復來朝胡氏謂魯桓弒君之賊人人得而討之而紀主之以求援其何以能國然紀實危迫而有求於魯當時諸侯之國未有能與齊為敵者惟魯望國紀之求之亦有弗獲巳焉是以春秋無譏至冬而復來則不能無譏矣附録左傳北戎伐齊齊侯使乞師於鄭鄭大子忽帥師救齊大敗戎師獲其二帥大良少良甲首三百以獻於齊於是諸侯之大夫戍齊齊人饋之餼使魯為其班後鄭鄭忽以其有功也怒故有郎之師公之未昏於齊也齊侯欲以文薑妻鄭大子忽大子忽辭人問其故大子曰人各有耦齊大非吾耦也詩云自求多福在我而已大國何為君子曰善自為謀及其敗戎師也齊侯又請妻之固辭人問其故大子曰無事於齊吾猶不敢今以君命奔齊之急而受室以歸是以師昏也民其謂我何遂辭諸鄭伯秋八月壬午大閲左傳簡車馬也公羊大閲者何簡車徒也榖梁大閲者何閲兵車也修教眀諭國道也平而修戎事非正也胡傳大閲簡車馬也周制大司馬中冬大閲教衆庶修戰法獨詳於三時者為農隙故也書八月不時矣以鼓則王執路鼓諸侯執賁鼓以旗則王載太常諸侯載旗以殺則王下大綏諸侯下小綏其禮固亦不同也書大閲非禮矣先王寓軍政於四時之田訓民禦暴其備豫也懼鄭忽畏齊人不因田狩而閲兵車厲農失政甚矣何以保其國乎春秋非特以不時非禮書也乃天未隂雨徹彼桑土綢繆牖户之意集説周禮中冬教大閲前期羣吏戒衆庶修戰法虞人萊所田之野為表百步則一為三表又五十步為一表田之日司馬建旗於後表之中羣吏以旗物鼓鐸鐲鐃各帥其民而致質明弊旗誅後至者乃陳車徒如戰之陳皆坐羣吏聼擔於陳前斬牲以左右徇陳曰不用命者斬之中軍以鼙令鼓鼓人皆三鼓司馬振鐸羣吏作旗車徒皆作鼓行鳴鐲車徒皆行及表乃止三鼓摝鐸羣吏弊旗車徒皆坐又三鼓振鐸作旗車徒皆作鼓進鳴鐲車驟徒趨及表乃止坐作如初乃鼓車馳徒走及表乃止鼓戒三闋車三發徒三刺乃鼓退鳴鐃且卻及表乃止坐作如初簡何氏休曰孔子曰以不教民戰是謂棄之故比年徒謂之搜三年簡車謂之大閲五年大簡車徒謂之大搜存不忘亡安不忘危杜氏預曰齊為大國以戎事徵諸侯之戍嘉美鄭忽而忽欲以有功為班怒而訴齊魯人懼之故以非時簡車馬孔氏穎逹曰公狩於郎公狩於禚皆書公大搜大閲不書公者周禮雖四時教戰而遂以田獵但搜閲車馬未必皆因田獵田獵從禽未必皆閲車馬何則怠慢之主外作禽荒豈待教戰方始獵也公及齊人狩於禚乃與鄰國共獵必非自教民戰以矢魚於棠非教戰之事主為逰戲而斥言公則狩於郎禚亦主為遊戲故特書公也大搜大閲國家之常禮公身雖在非為逰戲如此之類例不書公定十四年大搜于比蒲邾子來會公公身在搜而經不書公知其法所不書以其國家大事非公私欲故也且比蒲昌間皆舉搜地此不言地者蓋在國簡閲未必田獵昭十八年鄭人簡兵大搜在於城內此亦當在城內陸氏淳曰公羊蓋以罕書也案以其非常故書耳非為少也榖梁蓋以觀婦人也案經無異文傳自穿鑿孫氏復曰八月不時也大閲非禮也大閲仲冬簡車馬八月不時可知也大閲大搜謂天子田劉氏敞曰何以書譏何譏爾不時也大閲之禮冬事也秋興之非正也厲農甚矣孫氏覺曰周禮大司馬之職中春教振旅中夏教茇舍中秋教治兵中冬教大閲又因以行田獵之禮然而大閲之禮比於三時最為盛大蓋當仲冬之月田事已畢而農功間隙之際又禽獸盛長取而無擇故也天子有天下諸侯有一國軍旅之事皆不可忘宗廟之事皆不可忽故田獵以四時皆以習兵教戰因取禽獸以共祭祀也周禮所載者天子之事春秋所書者諸侯之事春秋常事不書書之者皆有所見也大閲之禮冬行之是也春秋之八月夏之六月也盛夏六月之時農方居野而苗稼方長桓公於此乃行大閲之禮簡車徒選士馬以妨農之稼聖人所以深罪也民程子曰為國之道武備不可廢必於農隙講肄保守國之道也盛夏大閲妨農害人失政之甚無事而為之妄動也有警而為之教之不素何以保其國乎王氏葆曰古者外事用剛日內事用柔日兵戎外事故大閲以壬午治兵以甲午猶吉日美宣王田而曰吉日維戊吉日庚午也邵氏寶曰凡王所建皆曰大大廟大學之類是也凡王所舉皆曰大大搜大閲之類是也曽謂魯可行之乎書責之也蔡人殺陳他胡傳他弒太子而代其位至是踰年不成之為君者以賊討也書蔡人以善蔡書陳他以善陳善蔡者以蔡人知他之為賊善陳者以陳國不以他為君知其為賊故稱人稱人討賊之詞也不以為君故稱名稱名當討之賊也魯桓弒君而鄭伯與之盟宋督弒君而四國納其賂則不知其為賊矣齊商人弒君者及其見殺而稱位蔡般弒父者及其是殺則稱爵是齊蔡國人皆以為君矣聖人於此抑揚與奪遏人欲於橫流存天理於既滅見諸行事可謂深切著明矣篡弒之賊外則異國皆欲致討而不赦內則國人不以為君而莫之與誰敢勸於為惡故曰孔子成春秋而亂臣賊子懼集説趙氏匡曰他殺太子之賊公榖不逹此意妄云淫於蔡淫獵於蔡不近人情陸氏淳曰啖氏云他踰年之君也不曰陳侯以賊誅也又曰淳聞於師曰臣弒其君子弒其父凡在官者殺無赦陳他殺太子之賊也蔡雖他國以義殺之亦變之正也故書曰蔡人孫氏復曰稱人以殺討賊亂也劉氏敞曰稱人以殺何討賊之辭也此蔡人也其以討賊言之何與之也何為與之上無天子下無方伯天下諸侯有為無道孽亂宗賤害貴者義能討之則討之可也又曰公羊以謂外淫乎蔡蔡人殺之非也蔡人者討賊之辭也他本篡故以討賊之辭言之猶衛人殺州吁齊人殺無知楚人殺陳夏徴舒等也他雖自君內不為國人所附外不為天子所命是以異於商人而不得以逾年例言也程子曰他弒世子免而竊位不能有其國故書曰陳他陳厲公蔡出也故蔡桓侯殺他而立之他天下之大惡人皆得誅之蔡侯殺之實以私也而書蔡人見殺賊者衆人之公也於朱子曰此是夫子據魯史書之他之弒君初不見經者亦是魯史無之耳知吕氏大圭曰陳他既踰年矣而不稱君何也齊無亦踰年而不稱君蓋當時一國之人異邦之人猶知其為弒逆也陳家氏鉉翁曰臣弒其君子弒其父夫人皆得而討人討州吁蔡人殺陳他此鄰國之二討春秋所深與也五國定州吁四國成宋督齊鄭輔魯桓宋魯扶鄭突春秋深誅而痛斥之此與國之四逆也而又有特筆之三罪焉州吁陳他無知是也彼列於諸侯之會或既立踰年春秋以討賊書不成其為君此聖人之特筆非因乎舊史者也亦有討賊而不明正其罪者不以本罪討也而俞氏皋曰案左氏曰陳厲公蔡出也故蔡人殺他立之然則蔡人殺他出於私意而經書無貶者善其討賊也公羊以為淫榖梁以為獵皆臆説也其程氏端學曰春秋有一事見一義者不必兼首尾餘有首必有尾有尾必有首所謂屬辭比事者也蔡人殺陳他事之尾也而首不經見五年正月甲戌之下趙謂當記陳他作亂事豈其然乎賊汪氏克寬曰弒君而見殺者十有二惟四人以討書州吁無知衛人齊人能自討賊陳他夏徵舒待蔡人楚人討之臣子之不能討其罪著矣晉惠因里克弒君而得國衛獻因寧喜弒君而復國利其所為使復為大夫既又忌而殺之非討賊也故以國殺大夫為文楚棄疾誘比以為君之利而俾當大惡之名既而殺之意在代其位非討賊也故以公子相殺為文陳人雖殺宋萬然與賊為黨待宋人之賂而後殺之齊慶封誘崔杼而致之死皆非天討故不以討賊書也宋督死於南宫萬書之則為捍君難故不見於經齊商人蔡般既為國人所君曠嵗歷年假手而討之春秋雖欲奪其爵位同之於賊有不可得矣也李氏亷曰殺他國君例四陳他鄫子蔡般戎蠻子金氏賢曰州吁死於陳而書衛人殺陳他死於蔡而不書陳人殺者何哉蓋書衛人者嘉其臣之忠也不書陳人者著其臣之罪也九月丁卯子同生左傳以大子生之禮舉之接以大牢卜士負之士妻食之公與文薑宗婦命之公問名於申繻對曰名有五有信有義有象有假有類以名生為信以德命為義以類命為象取於物為假取於父為類不以國不以官不以山川不以隱疾丕以畜牲不以器幣周人以諱事神名終將諱之故以國則廢名以官則廢職以山川則廢主以畜牲則廢祀以器幣則廢禮晉以僖侯廢司徒宋以武公廢司空先君獻武廢二山是以大物不可以命公曰是其生也與吾同物命之曰同公羊子同生孰謂謂莊公也何言乎子同生喜有正也未有言喜有正者此其言喜有正何久無正也子公羊子曰其諸以病桓與胡傳適冢始生即書於䇿與子之法也與子者定於立適傳子以適天下之逹禮也故有君薨而世子未生之禮植遺腹朝委裘而天下不亂者以名分素明而民志定也經書子同生所以明與子之法正國家之本防後世配適奪正之事垂訓之義大矣集説何氏休曰所以書莊公生者感隱桓之禍生於無正故喜之孔氏穎逹曰杜云十二公惟子同是適夫人之長子又云文公哀公其母並無明文未知其母是適與否蓋其父未為君之前已生總令是適亦不書也禮接之則史書啖氏助曰君適子生以大子生之趙氏匡曰禮備於適是重宗廟記其是以著其非也何劉氏敞曰子同生者孰謂謂莊公也何以書貴也貴爾世子也又曰榖梁曰疑故志之非也聖人豈至此乎若聖人疑之誰復不疑之乎且詩云展我甥兮展者信也詩人賢者信魯莊公為齊侯之甥何有仲尼反疑其先君為齊侯之子乎就令當時國人有疑之者是國惡無大於此矣聖人曷為明明揭之乎舉程子曰冡嫡之生國之大事故書葉氏夢得曰之以禮則書不以禮則不書所以重嫡也八朱子曰桓三年夫人薑氏至自齊六年子同生十年桓公乃與夫人如齊則莊公誠非齊侯之子矣子鄭氏玉曰生即書之所以見名分之巳定而明父之親擔於天子然後稱世子所以見爵秩之貴而明君臣之義冬紀侯來朝左傳冬紀侯來朝請王命以求成於齊公告不能胡傳案左氏會于郕咨謀齊難也冬來朝請王命以求成於齊也公告不能孟子曰觀近臣以其所為主觀逺臣以其所主主者成敗之機榮辱之本也昭公棄晉主齊至於客死鄭伯逃齊主楚終以乞盟觀其所主而榮辱成敗見矣魯桓者弒君之賊人人之所同惡夫人得而討之也而主之以求援其能國乎然則何以免於貶志不在於朝桓也集説杜氏預曰紀微弱不能自通於天子欲因公以請王命公無寵於王故告不能程子曰紀侯懼齊來朝以求助不能上訴於天子近赴於諸侯和輯其民人效死以守而欲求援於魯桓不能保其國宜矣矣家氏鉉翁白夏會於郕冬又來朝紀之求於魯至卒不能有益坐待滅亡春秋書之責紀之不能自治其國苟焉圗存責魯坐受鄰國之朝莫之或拯也汪氏克寬曰桓公篡立惴惴焉不能自保安足與謀紀難哉春秋所以恕紀侯而不之貶者紀以蕞爾之國介居大國之間欲上告於天子則不能欲下告方伯連率則無非齊之與國其所以僕僕朝魯會魯亦曰紀之與魯暨魯之與齊皆比鄰婚姻之國或可資其助耳比事而觀紀不能自強於政治魯桓不能憂人之憂急人之急齊以強大肆意吞噬弱小其罪皆不待貶而自見矣不卓氏爾康曰左氏紀侯請王命以求成於齊公告能杜謂公無寵於王故告不能然明年王使主紀婚矣何言不能自通也當繇齊欲滅紀魯與齊好不敢顯言為紀求成耳丙桓王十子五年七年齊僖二十六年晉小子四年衛宣十四年蔡桓十年鄭莊三十九年曹桓五十二年陳厲二年把武四十六年宋莊五年秦寧十一年楚武三十六年春二月己亥焚咸丘咸丘杜注魯地髙平巨野縣南有咸亭今屬山東兗州府胡傳咸丘地名也易稱王用三驅在禮天子不合圍諸侯不掩羣夫子釣而不綱弋不射宿皆愛物之意也推此心以及物至於鳥獸若草木裕無淫獵之過矣書焚咸丘所謂焚林而田也集説杜氏預曰焚火田也譏盡物故書火孔氏穎逹曰以火焚地明為田獵故知焚是田也不言搜狩者以火田非搜狩之法而直書其焚以譏其盡物也釋例曰狩既非法雖得地亦譏不復譏其失地也咸丘知地亦非也禮記王制云昆蟲未蟄不以火田則是巳蟄得火田也又爾雅釋天云火田為狩似法得火田而譏其焚者説爾雅者李巡孫炎皆云放火燒草守其下風周禮羅氏蠟則作羅襦鄭云襦細密之羅此時蟄者畢矣可以羅罔圍取禽也今俗放火張羅其遺教然則彼大田者直焚其一叢一聚羅守下風非謂焚其一澤也禮天子不合圍諸侯不掩羣尚不盡取一群豈容并焚一澤知其譏盡物故書也焚劉氏敞曰焚咸丘者何以火田也以火田則其曰咸丘何火田而咸丘焚也何以書譏何譏爾焚咸丘疾矣又曰焚咸丘淫獵之過也古者誅不逐奔追不越防又曰公羊謂咸丘者邾婁之邑其君在焉故不繫國焚之者樵之也非也案公羊凡春秋所書內取也茍不繫國悉歸之邾婁今此亦其比也又案邾人執鄫子用之蔡人衛人伐戴鄭伯伐取之諸若此類不仁之甚者春秋明書之不使文亂實若誠火攻人君應書曰伐咸丘焚之與伐戴之文相符矣今但曰焚咸丘而無兵戈之意安知不以火田乎又曰榖梁曰其不言邾咸丘疾其以火攻與公羊説相近吾既言之矣程子曰古者昆蟲蟄而後火田去莽翳以逐禽獸非竭山林而焚之也咸丘地名云焚咸丘如盡焚其地見其廣之甚也髙氏閌曰咸丘乃魯地近齊者故孟子以咸丘蒙為齊東野人火葉氏夢得曰災先言所而後言所災天火也見其而已焚先言焚而後言所焚人火也有焚之者也秋趙氏鵬飛曰咸丘魯邑也公榖以為邾咸丘夫春書地未有不繫其國者宋彭城是也故雖在楚必繫之宋豈有邾邑而不書邾咸丘耶不書邾後世安知其為邾邑也然則焚咸丘無貶乎曰貶貶淫獵也獵不至於焚山而况焚邑乎邑人民之聚也攻獸而災及於人甚矣無黃氏仲炎曰焚林而田明年無田竭澤而漁明年漁故春秋書焚咸丘惡盡物也夫求盡物於山澤聖人且猶惡之况求盡利於民乎民王氏元杰曰桓公焚林而田物無遺類豈先王仁愛物之心哉春秋書焚咸丘以著其殘忍害物之心夏榖伯綏來朝鄧侯吾離來朝榖杜注榖國在南陽築陽縣北今湖廣襄陽府榖城縣治為故築陽城古榖城在縣北十鄧釋例曰鄧國義陽鄧縣今湖廣襄陽府東北二里有鄧城孔疏世本鄧為曼姓楚文王滅之榖則不知何姓是誰滅之公羊皆何以名失地之君也其稱侯朝何貴者無後待之以初也榖梁其名何也失國也失國則其以朝言之何也嘗以諸侯與之接矣雖失國弗損吾異日也胡傳春秋之法諸侯不生名榖伯鄧侯何以名桓天下之大惡也執之者無禁殺之者無罪榖伯鄧侯越國踰境相繼而來朝即大惡之黨也故特貶而書名與失地滅同姓者比焉經於朝桓者或貶爵或書名或稱人以深絶其黨撥亂之法嚴矣集説杜氏預曰不總稱朝者各自行朝禮也大孫氏復曰春秋之法諸侯不生名生名惡之者也此年榖伯綏來朝鄧侯吾離來朝十五年鄭伯突出奔蔡莊十年荆敗蔡師於莘以蔡侯獻舞歸僖十九年宋人執滕子嬰齊二十五年衛侯燬滅邢昭十一年楚子虔誘蔡侯般殺之於申是也桓大逆之人諸侯皆得殺之榖伯綏鄧侯吾離不能致討反交臂而來朝故生而名之也劉氏敞曰左氏曰名賤之也非也侯伯之爵豈小哉且上杞侯來朝雖不敬猶不書名計杞之國又非大於鄧榖也彼何故不名此非春秋之意也又經書夏朝傳云春朝此傳所據者以夏正記事也杜云以春來夏乃行朝禮為之蔽短非實矣不陳氏傅良曰諸侯不名爵從其爵未爵稱字必微能自通者也而後名之未成君名之卒名之失國名之嘗失國矣雖復入歸亦名之舍是無名道矣而名之者貶也貶榖鄧之君朝桓也葉氏夢得曰榖伯鄧侯失地之君也諸侯以奔來者書以奔以朝來者書以朝失地則何以能朝猶不失其為君者也古者謂是為寄公或曰寓公諸侯分地處之而不臣趙氏鵬飛曰春秋諸侯以小朝大勢之常也滕薛紀把牟葛皆小國也來朝未有書名者諸侯不名惟失地名薨則赴以名榖鄧生名失地也榖鄧皆在南陽迫於楚距京師八百里京師至魯又六百里合千四百里之遙其間越蔡越許越陳越曹越宿及邾而朝於魯何益哉蓋為楚所逼失地而奔越大小七國而不見容者懼楚也至魯逺於楚而容之故朝於魯以朝禮見故書朝以失地故書名氏家氏鉉翁曰是嵗闕秋冬杜氏以為史之闕文吕東萊以為春秋以後之闕文據傳是冬曲沃伯誘晉小子侯弒之此亦事之大者春秋未必不書其不見者亦闕文歟具程氏端學曰先儒皆謂逆亂天道嵗功不成故不四時其穿鑿附會將以扶植世教而不知其破碎經旨矣使孔子果以冢宰聘桓而闕秋冬次年仍叔子復聘於此為甚當復闕秋冬而不闕果以榖鄧朝桓而闕秋冬當先闕於滕子來朝與四國會稷成宋亂取郜鼎之時而又不闕則孔子取義於是乎疏矣今幸四年七年秋冬適無事可書而闕之也知有事焉不知孔子並其事闕之邪將仍書其事而獨闕秋冬二字邪皆王氏元杰曰弒逆之賊誅止其身黨之者無罪人得以肆其姦矣春秋斥書二國之名以正黨惡附姦之罪也之陳氏宗之曰説文云魯在泰山之下榖鄧在方城外去泰山絶逺越國踰境相繼朝桓非桓大惡之黨而何故特貶之故陳氏際泰曰宰渠之聘也以夏榖鄧之朝亦夏也得闕二時也使聘與朝或在秋冬之間將不闕乎無以立教其闕之也則併致闕之故而去之後之人又何緣知其為立教焉案曲禮曰諸侯失地名故公榖以榖鄧書名為失國之君而葉氏夢得趙氏鵬飛皆從之於義為正孫氏復胡氏安國陳氏傅良謂貶其朝桓似亦有理今並存之不書秋冬史闕文也四年杜注甚明朱子亟取焉故程胡二傳及何氏休之説俱不録附録左傳盟向求成於鄭既而背之秋鄭人齊人衛人伐盟向王遷盟向之民於郟冬曲沃伯誘晉小子侯殺之郟杜注王城也今河南府洛陽縣西有郟鄏陌亦謂之郟山丁桓王十丑六年八年齊僖二十七年晉侯緡元年衛宣十五年蔡桓十一年鄭莊四十年曹桓五十三年陳厲三年杞武四十七年宋莊六年秦寧十二年楚武三十七年春正月己卯蒸公羊蒸者何冬祭也春曰祠夏曰礿秋曰嘗冬曰蒸常事不書此何以書譏何譏爾譏亟也亟則黷黷則不敬君子之祭也敬而不黷疏則怠怠則忘士不及兹四者則冬不裘夏不葛胡傳案周官大司馬蒸以中冬今魯蒸以春正月其不同何也周書有周月以紀政而其言曰夏數得天百王所同其在商周革命改正示不相沿至於敬授民時巡狩蒸享猶自夏焉然則司馬中冬教大閲獻禽以享蒸所謂自夏而魯之蒸祭在正月見春秋用周正紀魯事也而榖梁子乃曰蒸冬事也春興之志不時也是以閉蟄而蒸為是與周制異矣春秋非以不時志也為再蒸見瀆書也集説何氏休曰蒸衆也氣盛貌冬萬物畢成所薦衆多芬芳備具故曰蒸杜氏預曰此夏之仲月非為過而書者為下五月復蒸見瀆也月孔氏穎逹曰衛氏難杜云上五年閉蟄而蒸謂十比正月蒸則是過時而蒸秦氏釋云案周禮四時之祭皆用四仲之月此正月則是夏之仲冬何為不得蒸而云過時也又曰大司馬職曰中夏獻禽以享礿中冬獻禽以享蒸言四時之祭不得後仲月非謂孟月不得蒸也釋例曰周禮祭宗廟以仲月蓋言其下限也下限至於仲月則上限起於孟月仲是下限則周之正月得為蒸祭本趙氏匡曰周雖以建子為正至於祭祀則用夏時月以行四時之祭故桓八年正月蒸則夏之仲冬也凡四時之祭皆用孟月宣八年六月有事於太廟即夏之孟月也若有故及日不吉即用仲月桓八年正月蒸是也若又有故及日不吉即用季月昭十五年二月有事於武宫即夏之季月也然吉事先近月茍有其故而用季月涉於怠矣當用仲月為嘉也又曰周禮記四時祭名云春祠夏礿秋嘗冬蒸詩云礿祠蒸嘗于公先王而春秋無礿祠者蓋春秋中再書蒸一書嘗兩書禘皆為失禮及有變故乃書爾於祠礿二祭無他故所以不書也又曰正月之蒸不失時也經為五月又蒸故書此以明一嵗再蒸若不書即似春有故不蒸夏乃蒸爾為劉氏敞曰此未有言蒸者其謂之亟何以夏五月亟也春秋欲見五月再蒸故於此不得不書猶將書壬午猶繹者不得不先書有事於太廟也程子曰冬蒸非過也書之以見五月又蒸為非禮之甚也失趙氏鵬飛曰禮有時不時則失禮禮有莭煩數則節蒸冬事也四時之祭惟蒸為甚腆蓋非冬則物不可得而備今正月而蒸禮也若五月之蒸夏之三月物華而未實禽獸孕育之際安得物而備之非暴殄天物不能也聖人文起於此而義在彼故曰為五月蒸起也汪氏克寬曰四時常祀惟桓公之經書蒸書嘗蓋再蒸之瀆與未易災之餘而嘗之慢皆失禮之大者况冬蒸而以夏五月行之酉月嘗而以未月行之或太過或不及皆失時之甚者故筆之於經以示貶焉或謂桓有大惡不可以祀先君故聖人因其失禮而特書以重其惡其言失之鑿矣季氏本曰內事用柔日故蒸以己卯丁丑嘗以乙亥吉禘以乙酉大事以丁卯有事以辛巳癸酉義同天王使家父來聘胡傳下聘弒逆之人而不加貶何也既名冢宰於前其餘無責焉乃同則書重之義以此見春秋任宰相之専而責之備也集説杜氏預曰家父天子大夫家氏父字聘孫氏覺曰桓公大惡之人也而五年之間來者三春秋一切書之所以見不能討惡而王道之衰遂使篡人得志也程子曰魯桓公弒立未嘗朝覲而王屢聘之失道之甚也五葉氏夢得曰家父王之下大夫也趙氏與權曰年之中周三聘魯古者七年一聘周則過矣六年一朝自隱至桓未嘗一至天子之庭魯之辜將焉逃春秋書之傷周責魯之意隱然矣王趙氏鵬飛曰命魯主婚也魯將為紀謀納女於王使家父來聘言娶於紀也家氏鉉翁曰天王下聘逆人初而貶以正法也再而貶申著其義也至於三義盡於前不貶猶貶也陳氏深曰孔氏曰此年及十五年上距幽王之卒七十五嵗而詩節南山乃家父刺幽王古人字或纍世同之雲漢詩序仍叔美宣王桓五年仍叔之子來聘仍氏亦世字如趙氏世稱孟智氏世稱伯也汪氏克寬曰家父乃周之世臣詩紀家父刺幽王之昏亂與尹氏之不平而不憚激怒於君相蓋竭忠於王室者也桓公之經兩書家父亦家氏之子若孫爾一則聘所不當聘一則求所不當求皆徇於王命而依阿茍且以從於非義其視節南山之誦能無愧乎比事以觀不待貶絶而惡自見矣季氏本曰家氏父名蓋天子之元士作節南山詩者自謂家父作誦以究王訩而可不名稱乎附録左傳春滅翼夏五月丁丑蒸公羊何以書譏亟也榖梁黷祀也志不敬也胡傳春秋之文有一句而包數義者有再書而一貶者戎伐凡伯于楚丘以歸之類一句而包數義春正月己卯蒸夏五月丁丑蒸再書而一貶集説孫氏覺曰祖父至尊神明至幽而以非禮瀆之聖人所以深辜也程子曰正月既蒸矣而非時復蒸者必以前蒸為不備也其黷亂甚矣魯宋氏宜春曰武氏子來求賻一責天王求賻一責之不共一貶而起二事此兩書蒸二事而一貶祭趙氏與權曰夏而礿禮也蒸非其時也嵗再蒸焉之瀆也而桓公行之將以事神適以慢神將以寧神適以瀆神吳氏􅊹曰建子之月已蒸矣建辰之月又蒸焉於春季而行冬祭非其時非其禮也蒸李氏亷曰周禮紀四時祭名云春祠夏礿秋嘗冬公羊亦同毛詩云礿祠蒸嘗此取協韻爾非有異也王制曰春礿夏禘秋嘗冬蒸郊特牲曰春禘而秋嘗祭義與郊特牲同祭統與王制同吳氏草廬曰王制篇內礿皆當讀為祠禘皆當讀為礿此説是也趙氏曰禘非時祭之名也禮記諸篇皆漢儒約春秋為之見春秋有禘于莊公遂以為時祭見春秋惟兩書禘一閔二年五月一僖八年七月一春一夏遂有春禘夏禘之説又見春秋止有蒸嘗禘三祭遂為諸侯闕一祭之説皆不可信也附録左傳隨少師有寵楚鬭伯比曰可矣讎有釁不可失也夏楚子合諸侯於沈鹿黃隨不會使薳章讓黃楚子伐隨軍於漢淮之間季梁請下之弗許而後戰所以怒我而怠寇也少師謂隨侯曰必速戰不然將失楚師隨侯禦之望楚師季梁曰楚人上左君必左無與王遇且攻其右右無良焉必敗偏敗衆乃擕矣少師曰不當王非敵也弗從戰於速把隨師敗績隨侯逸鬬丹獲其戎車與其戎右少師秋隨及楚平楚子將不許鬭伯比曰天去其疾矣隨未可克也乃盟而還沈鹿杜注楚地今湖廣安陸府鍾祥縣東六十里有鹿湖池深不可測即其地也黃杜注黃國弋陽縣魏置弋陽郡於此今河南汝寧府光州境弋陽城在州東黃城在州西史記黃帝末孫陸終之後封於黃陸氏纂例黃嬴姓南淮漢志南陽郡平氏縣禹貢桐柏大復山在東淮水所出水經淮水至廣陵淮浦縣入海淮浦今安東縣也平氏故城在今河南南陽府西北速把杜注隨地傳云楚伐隨軍於漢淮之間當在今湖廣德安府應山縣境秋伐邾集説孫氏復曰不出主名微者也曰孫氏覺曰不言帥師微者伐之也髙氏閌桓自弒立恃其強惡以陵小國小國皆畏而從之故紀郕鄧榖滕把或朝或會惟邾恃舊好而不顧至是遂伐之其曰伐邾必有辭焉邾不能奉詞以討桓公弒逆之辜宜乎其反見伐也黃氏震曰東萊吕氏曰微者也其事不可得而詳者也天子在諸侯擅相侵伐君子以為無王此春秋所以作也岷隱戴氏曰隱公嘗親伐邾今雖大夫亦不行蓋卑邾矣其後僖公卑邾而不設備是以有升陘之敗愚案吕之説正論也而戴之説亦其一事之戒則趙氏鵬飛曰儀父蓋知義者也隱有遜千乘之心即位三月儀父來盟桓有篡逆之惡則定位六年儀父不至非義何恃哉桓公憤其然故無故而伐之責其不至也然邾終不即至迄十五年因牟人葛人之來不得已而與之俱而後朝焉以是知義之果可恃也桓以不義而伐人之國用兵何名哉故不書公不書師而見貶書家氏鉉翁曰不書公貶也大夫行亦當書帥師不亦貶也湛氏若水曰春秋無義戰凡非奉王命而行討者皆不義之兵也桓篡立不能修臣職而朝王反受列國之朝又肆其橫兵而伐邾以強陵弱以衆暴寡其為惡極矣故春秋書之以著其罪季氏本曰邾小國為魯所迫然叛服不常凡加兵者皆不服故也冬十月雨雪公羊何以書記異也何異爾不時也集説何氏休曰周之十月夏之八月未當雨雪此隂太盛兵象也范氏寧曰禮月令曰孟冬行秋令則霜雪不時未杜氏預曰今八月也書時失曰程子曰建酉之月霜而雪書異也葉氏夢得雨雪不志此何以志建酉之月也言齊氏履謙曰春秋凡三書雨雪雨皆言大此獨不大言大者以大為異不言大者以失時為異附録左傳冬王命虢仲立晉哀侯之弟緡於晉祭公來遂逆王后于紀書遂始此左傳禮也公羊祭公者何天子之三公也何以不稱使昏禮不稱主人遂者何生事也大夫無遂事此其言遂何成使乎我也其成使乎我奈何使我為媒可則因用是往逆矣女在其國稱女此其稱王后何王者無外其辭成矣榖梁遂繼事之辭也其曰遂逆王后故略之也或曰天子無外王命之則成矣胡傳劉敞曰祭公王之三公也曷為不稱使不與王之使祭公也師傅之官坐而論道其任重矣今其來魯乃命魯侯以昏姻之事者也若是則大夫可矣何必三公任之重使之輕故祭公緣此義得専命不報遂行如紀而王以輕使為失祭公以遂行為罪矣此説是也為之節者宜使卿往逆公監之則於禮得矣使祭公命魯主昏姻之事則曰不可卿往而公監之何以可乎命魯輕矣卿往公監之重矣官師從單靖公逆王后於齊劉夏非卿而書靖公合禮則不書故先儒以為使卿逆公監之禮也集説杜氏預曰祭公諸侯為天子三公者王使魯主昏故祭公受命而迎也天子無外故因稱王后卿不書舉重略輕又曰天子娶於諸侯使同姓諸侯為之主祭公來受命於魯故曰禮孔氏穎逹曰隱元年云祭伯今而稱公知其為天子三公從周向紀不由魯國縱令因使過魯自當假道而去不須言來也凡言遂者因上事生下事之辭既書其來又言遂逆是先來見魯君然後向紀知王使魯主昏故祭公來受魯命而往迎也凡昏姻皆賔主敵體相對行禮天子嫁女於諸侯使諸侯為主令與夫家為禮天子聘后於諸侯亦使諸侯為主令與后家為禮嫁女則送女於魯令魯嫁女與人迎后則令魯為主使魯遣使往逆故祭公受魯命也嫁王女者王姬至魯而後至夫家其王后昏后不來至魯者以王姬至魯待夫家之逆以為禮故須至魯后則王命已成於魯無事故即歸京帥於逆稱王后舉其得王之命后禮已成于歸稱季薑申父母之尊言子尊不加於父母從父母之家而將歸於王據父母之家為文故于歸申父母之尊也劉夏逆后譏卿不行皆不譏王不親行明是王不當親也文王之逆太姒身為公子迎在殷世未可據此以為天子禮也后趙氏匡曰若但書逆女則是祭公自逆故須言王爾今不言使即罪全歸祭公三孫氏復曰天子不親迎娶后則使三公逆之祭公公書者為遂事起也其言祭公來者祭公來謀逆后之期也桓王娶后于紀魯受命主之故祭公來謀逆后之期既謀之則當復命於天子命之逆則逆之不可専也祭公不復命於王専逆王后于紀故曰遂以惡之不言逆女者王后重矣非諸侯夫人可得齊也故不言逆女也祭劉氏敞曰三公坐而論道使三公以逆女非正也公逆王后于紀則何為來由乎我使我主其禮也曷為使我主其禮昏姻之事必有嘉讓之辭焉太上無敵不可以質惟諸侯同姓者主之遂者何生事也大夫無遂事遂而非禮非也此其為非禮奈何使我主之紀有成矣自是往逆也謀蘇氏轍曰榖梁曰不言使不正其以宗廟大事即于我也非也若不正其即謀于我者言遂逆足矣不言使何哉言使豈妨于即謀于我乎王將逆后于紀而使魯主之故祭公自魯如紀不稱使謀昏也遂繼事之辭也大夫出疆有以二事出者有以一事出而専繼事者其書皆曰遂得失則視其實而已祭公自魯逆王后公子遂如周及晉皆以二事出者也公子結媵而及齊宋盟専繼事者也程子曰祭公受命逆后而至魯先私行朝會之禮故書來而以逆后為遂事責其不虔王命而輕天下之母也陳氏傅良曰逆后六書非公卿也而後書是故原莊公逆惠后於陳不書召桓公逆定后於齊不書則祭公何以書后妃母儀天下而以遂専之也祭公不稱使則王者有成命也王者有成命而以遂専之故書遂始於此凡遂譏也莫甚于遂逆后罪祭公且罪魯也當張氏洽曰天子雖無親迎之禮然祭公謀於魯則復命於王然後遣於宗廟以明逆后之重今使魯為媒而因是往逆輕褻王配如此何以示正始之道哉黃氏震曰劉氏權衡曰天子娶后當使同姓諸侯主其辭命祭公逆后于紀使我主其禮也岷隱曰祭公至魯遂往逆后此天王之命非祭公自為之紀魯甥也咨謀於魯而行木訥曰齊將滅紀紀託於魯魯勢不能芘紀於是為之謀俾納女於王託王為重焉蓋自五年齊欲襲紀紀懼求魯六年會于成秋又來朝今春家父來聘則謀昏也今祭公來因不反命而遂逆王后齊侯繼此不復犯紀僖公沒襄公始滅紀納女亦延紀數年愚案劉以禮言戴以情言趙以事勢言可以參考家氏鉉翁曰昏禮不稱主人者謂天子雖尊不自為主人也左氏莊十八年虢公晉侯鄭伯使原莊公逆王后于陳陳媯歸于京師不言王使而曰虢晉鄭使之逆此不稱主人之明證也祭公何以來乎周制天子與諸侯為昏則使同姓之國為之主魯以周公之後為王主禮其來舊矣榖乃云不正其以宗廟之大事即謀於我其未然歟是時紀困於齊請昏於王室以為圖存之計魯實主之王使祭公下詢於魯亦以是故爾祭公為逆后而來無譏也祭公以遂事而往則有譏也劉原父謂三公乃師傅之官與天子坐而論道其任重矣今其來魯乃命魯以昏姻之事以為任之重使之輕愚謂周之三公即宰相也天子不行親迎之禮而使其宰往逆所以重大昏之始其未為失與當是時賵妾聘逆皆以命其宰宗廟重事而使三公於禮不為過汪氏克寬曰祭公自魯逆王后受王命謀昏於魯並迎后於紀逆后大事也安有無王命而敢専之哉但天子昏禮當使大夫謀昏於同姓之諸侯待其復命然後使上卿往迎而公監之故王遣三公謀昏則以輕使為失祭公不復命於王而即知紀逆后則以遂行為罪而交責之也案劉氏敞曰三公逆女非正也胡傳暢發其義謂當使卿迎而公監之其説是矣孫氏復以為天子不親迎要后則使三公逆之家氏鉉翁謂宗廟重事而使三公於禮不為過似亦有理故並存焉程子謂王姬下嫁則同姓諸侯為主逆王后無使諸侯為主之禮然據家氏鉉翁所引莊十八年虢晉鄭使原莊公逆后則同姓諸侯為主確有可據戊桓王十寅七年九年齊僖二十八年晉緡二年衛宣十六年蔡桓十二年鄭莊四十一年曹桓五十四年陳厲四年把靖公元年宋莊七年秦出子元年楚武三十八年春紀季薑歸于京師左傳凡諸侯之女行唯王后書公羊紀季薑歸于京師其辭成矣則其稱紀季薑何自我言紀父母之於子雖為天王后猶曰吾季薑京師者何天子之居也京者何大也師者何衆也天子之居必以衆大之辭言之榖梁為之中者歸之也胡傳往逆則稱王后既歸何以書季薑自逆者而言則當尊崇其匹內主六宫之政使妃妾不得以上僭故從天王所命而稱王后示天下之母儀也自歸者而言則當樛屈逮下使夫人嬪婦皆得進御於君而無嫉妒之心故從父母所子而稱季薑化天下以婦道也其詞之抑揚上下進退先後各有所當而不相悖皆正始之道王化之基春秋之所謹也集説杜氏預曰季薑桓王后也季字薑紀姓也書字者申父母之尊又曰為書婦人行例也適諸侯雖告魯猶不書王范氏寧曰中謂關與昏事與楊氏士勛曰劉夏逆后經不言歸則是魯不關昏事而范氏略例云逆王后有二者以書逆王后皆由過魯若魯主昏而過我則言歸若不主昏而過我則直言逆雖詳略有異俱是過魯故范以二例總之矣劉氏敞曰其言季薑何未可以稱王后也稱王后何為未可以稱王后自往者言之王者無外王命之斯后之矣自來者言之王雖有命未見宗廟則不敢處也不敢處恭也魯蘇氏轍曰劉夏逆王后於齊不書其歸此何以書為之主也陳氏傅良曰諸侯逆稱女至稱夫人尊夫人也天子逆稱后歸稱季薑尊王也家氏鉉翁曰自王國而逆則曰王后女雖在紀而后之名巳正自紀國而往則曰紀季薑后雖在途而女之出必本其所自此諸侯歸女於京師之例也后趙氏汸曰春秋存䇿書之大體魯為天子主昏故歸不可不書也卓氏爾康曰紀季薑不書以非祭公所得以也夏四月秋七月集説黃氏震曰書以備四時附録左傳巴子使韓服告於楚請與鄧為好楚子使道朔將巴客以聘於鄧鄧南鄙鄾人攻而奪之幣殺道朔及巴行人楚子使薳章讓於鄧鄧人弗受夏楚使鬬亷帥師及巴師圍鄾鄧養甥聃甥帥師救鄾三逐巴師不克鬭亷衡陳其師於巴師之中以戰而北鄧人逐之背巴師而夾攻之鄧師大敗鄾人宵潰侯秋虢仲芮伯梁伯荀賈伯伐曲沃巴杜注巴國在巴郡江州縣隋改江州為巴縣今屬四川重慶府孔疏昭十三年楚共王與巴姬埋璧則巴國姬姓鄾鄾杜注鄾在鄧縣南沔水之北後漢志鄧縣有聚今襄陽府襄陽縣東北鄾城是也縣梁杜注梁國馮翊夏陽縣今陜西西安府韓城也古少梁城在縣南二十里荀杜注國名水經注古水出臨汾西又西南徑荀城在絳州西十五里絳州今屬山西平陽府賈杜注國名今山西平陽府臨汾縣有賈鄉唐書年表云唐叔虞少子公明康王封為賈伯即其地孔疏僖十七年梁嬴孕過期則梁為嬴姓世本荀賈皆姬姓冬曹伯使其世子射姑來朝左傳冬曹大子來朝賔之以上卿禮也享曹大子初獻樂奏而嘆施父曰曹大子其有憂乎非嘆所也公羊諸侯來曰朝此世子也其言朝何春秋有譏父老子代從政者則未知其在齊與在曹與榖梁朝不言使言使非正也使世子伉諸侯之禮而來朝曹伯失正矣諸侯相見曰期以待人父之道待人之子以內為失正矣內失正曹伯失正世子可以已矣則是故命也尸子曰夫已多乎道胡傳案周官典命凡諸侯之嫡子誓於天子而攝其君則下其君之禮一等未誓則以皮帛繼子男世子固有出會朝聘之儀矣然攝其君繼子男者謂諸侯朝於天子有時而不敢後故老疾者使世子攝己事以見天子急述職也諸侯間於王事則相朝其禮本無時曹伯既有疾何急于朝桓而使世子攝哉大位姦之窺也危病邪之伺也世子君之二也君疾而儲副出啓窺伺之心危道也當享而射姑嘆踰月而終生卒其有疾明矣而使世子來終生之過也世子將欲已乎則方命矣曰孝子盡道以事其親者也不盡道而茍焉以從命為孝又焉得為孝集説杜氏預曰諸侯之嫡子未誓於天子而攝其君則以皮帛繼子男故賔之以上卿各當其國之上卿傳孔氏穎達曰諸經稱世子及衛世叔申經作世字皆為大然則古者世之與大字義通也楊氏士勛曰世子攝其君謂會同急趨王命者也今曹伯有疾雖闕朝魯未是急事而使世子攝位來朝故云非正也譏劉氏敞曰諸侯相見曰朝此世子也其言朝何參之蘇氏轍曰諸侯相朝正也有故而使世子攝事畏大國也蓋禮之變也秋程子曰曹伯有疾不能親行故使其世子來朝春之時君疾而使世子出取危亂之道也也薛氏季宣曰攝事而朝京師禮也朝於諸侯非禮張氏洽曰凡為人子立不中門坐不主奧不敢乘父之車示民有尊也今曹伯有疾世子為國之夲不使之朝夕視膳以尼窺伺之端而令棄國忘父越境伉禮以朝魯桓夫春秋於桓方以誅亂賊之事望諸侯今曹伯之使世子世子從父之命揆之於義無一可者春秋所以直書而深貶之葉氏夢得曰朝天子有時有故不能朝則攝諸侯無相朝之道射姑而攝朝是伉天子之禮於諸侯也家氏鉉翁曰終生疾已革而射姑朝於鄰國其不憂親之疾可見矣或曰以父命而出奈何曰此非存亡安危之所係父命可辭也李氏亷曰曹來朝五此年世子文十一年十五年成四年襄二十一年皆曹伯也汪氏克寬曰經書世子朝會者十有二曹射姑來朝鄫巫如晉宋成同盟戚齊光盟雞澤會戚會柤救陳四伐鄭宋佐會申是也宋成序侯伯之下大夫之上宋佐序子男之下淮夷之上庶幾不失位矣齊光漸進而序於薛伯把伯之上則其僭已極鄫巫亞於魯大夫則屈辱尤甚焉比事考之而義自見已桓王十卯八年十年齊僖二十九年晉緡三年衛宣十七年蔡桓十三年鄭莊四十二年曹桓五十五年陳厲五年杞靖二年宋莊八年秦出子二年楚武三十九年春王正月胡傳桓無王今復書王何也十者盈數也天道十年則亦周矣人事十年則亦變矣故易稱守貞者十年而必反傳論逺惡者十年而必棄桓公至是其數已盈宜見誅於天人矣十年書王紀常理也有習于榖梁子而不得其傳者見二年書王以為正與夷之卒此年書王而曹伯適薨遂附益之以為正終生之卒誤矣果正諸侯之卒不緣篡弒者陳侯鮑在五年之正月曷不書王以正其卒乎集説何氏休曰十年有王者數之終也年孫氏復曰此年書王者王無十年不書也十無王則人道滅矣三劉氏敞曰桓無王其曰王何也存公也何謂存公朝之莭也古者侯服一嵗一見甸服二嵗一見男服三嵗一見采服四嵗一見衛服五嵗一見魯采服也古者一不朝則貶其爵再不朝則削其地三不朝則六師移之桓非受命之君也三不朝矣其曰王存公也王氏元杰曰十者盈數也桓惡極而天討不加王道亦幾乎絶矣故經不書王至十年而書王者存天道王法也十八年復書王者以天道王法正桓公之終也嗚呼王之道天之理也天理未嘗絶於人心王道未嘗絶於天下天理非絶於桓桓自絶於天也桓雖無王天道王法則不可絶也知此則知十年復書王之義庚申曹伯終生卒左傳春曹桓公卒案榖梁以是年書王為正曹伯之卒非春秋之旨也胡傳甚明夏五月葬曹桓公集説湛氏若水曰著葬之得禮也禮諸侯五月而葬何以書有赴報則史書之聖人存之附録左傳虢仲譖其大夫詹父於王詹父有辭以王師伐虢夏虢公出奔虞虞杜注虞國在河東大陽縣唐改大陽曰平陸屬陜州今屬山西平陽府解州古虞城在縣東北四十里孔疏譜云虞姬姓也武王克商封虞仲之庶孫以為虞仲之後秋公會衛侯于桃丘弗遇桃丘杜注衛地濟北東阿縣東南有桃城今山東東昌府東阿縣西五十里有桃城鋪旁有一丘髙可數仭即桃丘也公羊會者何期辭也其言弗遇何公不見要也榖梁弗遇者志不相得也弗內辭也胡傳弗者遷辭惡夫信也衛初約魯會于桃丘至是中變而從齊鄭於是有郎之師其戰于郎直書曰來盟于惡曹俱奪其爵則桃丘之弗遇也蓋惡衛侯之失信矣集説杜氏預曰衛侯與公為會期中背公更與齊鄭故公獨往而不相遇也趙氏匡曰經意直譏其無信爾言劉氏敞曰弗遇者何公不及遇也曷為或言不或弗不者正辭也弗者遷辭也君子之於言無所茍而已矣鄭蘇氏轍曰衛侯與公為會於桃丘既而背之與齊來戰書曰弗遇過在衛也高氏閌曰在易屯之六三以隂居陽其身不正而輕躁妄動求應於五五應在二而弗見納聖人戒之曰君子幾不如舍往吝繫辭曰幾者動之微吉之先見者也君子安其身而後動易其心而後語定其交而後求夫桓公身負弒逆之辜而又輕躁妄動為人所棄正如屯之六三聖人為萬世戒也吕氏大圭曰齊鄭急於圖紀故不得不急於謀魯伐鄭之役衛實從王則衛與鄭有隙矣故魯桓因而會之將以為援也然蒲之胥命則齊與衛亦既修舊好矣衛始以鄭之怨而約與魯會終以齊之故背魯而弗來蓋公之所以弗遇者齊與鄭實軋之也直張氏洽曰下書三國來戰衛亦與焉則背信在衛不告魯誤桓公至桃丘耳春秋為國諱恥故言至桃丘而不相遇榖梁所謂弗內辭也李氏亷曰經書弗例四此年弗遇罪衛也文十六年齊侯弗及盟罪季孫也然皆為內諱恥也追齊至酅弗及有畏也胡氏皆以為遷辭晉人納捷災弗克納則亦遷善之義矣不汪氏克寬曰此年會桃丘弗遇成十六年會沙隨見公昭十三年同盟平丘公不與盟皆非魯之罪故聖人皆直書不諱惟文十六年季孫行父會齊侯於陽榖齊侯弗及盟魯不當以大夫會諸侯然齊侯責賂卒與仲遂盟郪丘則罪之在齊又可見矣季氏本曰衛與齊黨而齊以紀故與魯為讎桃丘之會必魯聞衛侯適齊期戰故往會之以間齊也而衛由他道過矣故曰弗遇若期而背約則當言弗至安得以弗遇言哉案季氏本解遇字與衆説小異亦似有理附存以備參考附録左傳秋秦人納芮伯萬於芮曰初虞叔有玉虞公求旃弗獻既而悔之周諺有之匹夫無罪懷璧其罪吾焉用此其以賈害也乃獻又求其寶劍叔曰是無厭也無厭將及我遂伐虞公故虞公出奔共地共池杜注地名闕案今山西平陽府平陸縣西有共池志云虞公由奔地去縣四十里許與讓畔城相近冬十有二月內午齊侯衛侯鄭伯來戰于郎左傳冬齊衛鄭來戰于郎我有辭也初北戎病齊諸侯救之鄭公子忽有功焉齊人餼諸侯使魯次之魯以周班後鄭鄭人怒請師於齊齊人以衛師助之故不稱侵伐先書齊衛王爵也公羊郎者何吾近邑也吾近邑則其言來戰于郎何近也惡乎近近乎圍也此偏戰也何以不言師敗績內不言戰言戰乃敗矣榖梁來戰者前定之戰也內不言戰言戰則敗也不言其人以吾敗也不言及者為內諱也胡傳春秋加兵於魯衆矣未有書來戰者此獨不稱侵伐而以來戰為文何也兵凶器戰危事聖人之所重也誅暴禁亂敵加於已蓋有不得已而應之者矣未有悖道縱欲得已不已而先之者也魯桓弒立天下大惡人人之所得討也鄭伯則首盟于越以定其位齊侯則繼會於稷以濟其姦曽不能修方伯之職駐師境上聲罪致討伸天下之大義也今特以私忿小怨親帥其師戰於魯境尚為知類也哉此春秋之所必誅而不以聼也故以三國為主而書來戰于郎鄭人主兵而首齊猶衛州吁主兵而先宋集説孔氏穎逹曰周禮大司馬以九伐之法正邦國賊賢害民則伐之負固不服則侵之然則侵伐者師旅討罪之名也魯以周禮為班則魯有禮矣三國伐有禮是討有辭矣春秋善魯之用周班不使三國得伐之故改侵伐而書來戰言若三國自來戰而魯人不與戰也趙氏匡曰言來者責三國不當來爾言戰者諱敗之常也兵孫氏復曰來戰于郎不言侵伐者不與齊衛鄭加於我也郎魯地地以魯則魯與戰可知矣不出主名者三國無故加兵於我不道之甚故以三國自戰為文也劉氏敞曰其言來戰何來戰者外為志乎戰也何以不言師敗績戰而不言師敗績者敗在內也敗在內則何以不言耻也之蘇氏轍曰六年北戎伐齊鄭太子忽救齊齊人餼魯以周班後鄭故以齊衛來戰于郎不稱侵伐而稱來戰無詞也鄭雖主兵而先書齊衛猶以周班正之也程子曰左氏載其事曰我有辭也我則有禮彼悖道縱欲而以興戎故特曰來戰以三國為主甚其惡也張氏洽曰春秋以主客之辭辨用兵之曲直殘民之輕重其罪魯而書公及諸侯戰者多矣若今年郎之爭直以三國來戰言之蓋魯桓之當討固有大罪極惡齊衛鄭之君既不能奉天討而與之會盟矣今乃徇私欲爭小故以無辭而伐有辭則罪在三國故特書其來戰此春秋之特筆又程氏端學曰魯衛兄弟之國齊魯纍世之姻桓公新娶於齊魯鄭嘗會盟假田以締交一有間隙則忘親背盟興兵爭戰此春秋之時所以為大亂聖人比書其事為後世鑒七李氏亷曰內兵書戰六此年戰郎十二年戰宋十年戰奚者諱魯也莊九年特書敗績者惡魯也桓十三年成二年書戰書敗績者此會外兵例非魯事也邵氏寶曰來戰于郎不與其伐也我無可伐之罪也昔也有可伐而不伐今也不可伐而伐之不書伐豈特不與其伐哉亦恐嫌於能伐爾季氏本曰齊欲吞紀與鄭衛合魯則専意援紀者也三國來戰蓋為此爾考魯以援紀之故與齊不親自齊鄭如紀之後與魯不相通已六年矣何由至齊為班耶王氏樵曰齊僖鄭莊皆喜亂之人也又濟之以衛宣是時齊方圖紀其嗛魯必以紀故與固卓氏爾康曰齊惡魯為紀謀難則主兵者齊也鄭與齊同如紀者衛又與齊胥命于蒲者故三國來戰之張氏溥曰春秋直魯而罪三國非寬魯桓譏三國昧大義急小忿也案季氏本據經駁傳謂直以謀紀之故不為無見然經無明文則事據左氏故仍主左傳而季氏本王氏樵卓氏爾康之説附焉欽定春秋傳説彚纂卷五
