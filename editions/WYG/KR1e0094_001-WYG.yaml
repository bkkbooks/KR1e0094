body:
  text: 欽定四庫全書欽定春秋傳説彚纂卷首上綱領一此篇論春秋經傳源流班氏固曰左史記言右史記事事爲春秋言爲尚書杜氏預曰周禮有史官掌邦國四方之事逹四方之志諸侯亦各有國史大事書之於䇿小事簡牘而已孟子曰楚謂之檮杌晉謂之乘而魯謂之春秋其實一也韓宣子適魯見易象與魯春秋曰周禮盡在魯矣吾乃今知周公之德與周之所以王韓子所見蓋周之舊典禮經也周德既衰官失其守上之人不能使春秋昭明赴告䇿書諸所記注多違舊章仲尼因魯史䇿書成文考其真僞而志其典禮上以遵周公之遺制下以明將來之法其敎之所存文之所害則刋而正之以示勸戒其餘則皆即用舊史史有文質辭有詳略不必改也故傳曰其善志又曰非聖人孰能修之陸氏德明曰古之王者必有史官君舉則書所以慎言行昭法式也諸侯亦有國史春秋即魯之史記也孔子應聘不遇自衛而歸西狩獲麟傷其虛應乃與魯君子左丘明觀書於太史氏因魯史記而作春秋上遵周公遺制下明將來之法襃善黜惡勒成十二公之經以授弟子弟子退而異言丘明恐弟子各安其意以失其眞故論本事而爲之傳明夫子不以空言説經也春秋所貶損人當世君臣其事實皆形於傳故隱其書而不宣所以免時難也及末世口説流行故有公羊穀梁鄒氏夾氏之傳鄒氏無師夾氏有錄無書故不顯於世漢興齊人胡母生趙人董仲舒竝治公羊春秋蘭陵褚大東平嬴公廣川段仲温呂歩舒皆仲舒弟子嬴公守學不失師法授東海孟卿及魯眭𢎞𢎞授嚴彭祖及顔安樂由是公羊有嚴顔之學𢎞弟子百餘人常曰春秋之意在二子矣彭祖授琅邪王中中授同郡公孫文及東門雲安樂授淮陽泠豐及淄川任翁豐授大司徒馬宮及琅邪左咸始貢禹事嬴公而成於眭孟以授潁川棠谿惠惠授泰山冥都又疏廣事孟卿以授琅邪筦路筦路及冥都又事顔安樂路授大司農孫寳瑕丘江公受穀梁春秋及詩於魯申公武帝時爲博士使與董仲舒論江公呐於口而丞相公孫𢎞本爲公羊學比輯其義卒用董生於是上因尊公羊家詔太子受衛太子復私問穀梁而善之其後浸微唯魯榮廣皓星公二人受焉廣盡能傳其詩春秋蔡千秋梁周慶丁姓皆從廣受千秋又事皓星公爲學最篤宣宗即位聞衛太子好穀梁乃召千秋與公羊家竝説上善穀梁説後又選郎十人從千秋受㑹千秋病死徵江公孫爲博士詔劉向受穀梁欲令助之江博士復死乃徵周慶丁姓待詔使卒授十人十餘歳皆明習乃召五經名儒太子太傅蕭望之等大議殿中平公羊穀梁同異望之等多從穀梁由是大盛慶姓皆爲博士姓授楚申童昌曼君初尹更始事蔡千秋又受左氏傳取其變理合者以爲章句傳子咸及翟方進房鳳始江博士授胡常常授梁蕭秉爲講學大夫左丘明作傳以授曾申申傳衛人吳起起傳其子期期傳楚人鐸椒椒傳趙人虞卿卿傳同郡荀卿名況況傳武威張蒼蒼傳洛陽賈誼誼傳至其孫嘉嘉傳趙人貫公貫公傳其少子長卿長卿傳京兆尹張敞及侍御史張禹禹數爲御史大夫蕭望之言左氏望之善之薦禹徵待詔未及問㑹病死禹傳尹更始更始傳其子咸及翟方進胡常常授黎陽賈䕶䕶授蒼梧陳欽漢書儒林傳云漢興北平侯張蒼及梁太傅賈誼京兆尹張敞太中大夫劉公子皆修春秋左氏傳始劉歆從尹咸及翟方進受左氏由是言左氏者本之賈䕶劉歆歆授扶風賈徽徽傳子逵逵受詔列公羊穀梁不如左氏四十事奏之名曰左氏長義章帝善之逵又作左氏訓詁司空南閤祭酒陳元作左氏同異大司農鄭衆作左氏條例章句南郡太守馬融爲三家同異之説京兆尹延篤受左氏於賈逵之孫伯升因而注之汝南彭汪記先師竒説及舊注太中大夫許淑九江太守服䖍侍中孔嘉魏司徒王朗荆州刺史王基大司農董遇徵士燉煌周生烈竝注解左氏傳梓潼李仲欽著左氏指歸陳郡潁容作春秋條例又何休作左氏膏肓公羊墨守穀梁廢疾鄭康成鍼膏肓𤼵墨守起廢疾自是左氏大興漢初立公羊博士宣帝又立穀梁平帝始立左氏後漢建武中以魏郡李封爲左氏博士羣儒蔽固者數廷爭之及封卒因不復補和帝元興十一年鄭興父子奏上左氏乃立於學官仍行於世迄今遂盛行二傳漸微左氏今用杜預注公羊用何休注穀梁用范甯注啖氏助曰古之解説悉是口傳自漢以來乃爲章句如本草皆後漢時郡國而題以神農山海經廣説殷時而云夏禹所紀自餘書籍比比甚多是知三傳之義本皆口傳後之學者乃著竹帛而以祖師之目題之予觀左氏傳自周晉齊宋楚鄭等國之事最詳晉則每一出師具列將佐宋則每因興廢備舉六卿故知史策之文每國各異左氏得此數國之史以授門人義則口傳未形竹帛後代學者乃演而通之總而合之編次年月以爲傳記又廣采當時文籍故兼與子産晏子及諸國卿佐家傳并卜書及雜占書縱横家小説諷諫等雜在其中故叙事雖多釋意殊少是非交錯混然難證公羊穀梁初亦口授後人據其大義散配經文故多乖謬失其綱統然其大指亦是子夏所傳歐陽氏修曰昔周法壞而諸侯亂平王以後不復雅而下同列國吳楚徐竝僭稱王天下之人不稟周命乆矣孔子生其末世欲推明王道以扶周乃聘諸侯極陳君臣之理諸侯無能用者退而歸魯即其舊史考諸行事加以王法正其是非凡其所書一用周禮爲春秋十二篇以示後世後世學者傳習既乆其説遂殊公羊髙穀梁赤左丘明鄒氏夾氏分爲五家鄒夾最微自漢世已廢而三家盛行當漢之時易與論語分爲三詩分爲四禮分爲二及學者散亡僅存其一而餘家皆廢獨春秋三傳竝行至今初孔子大修六經之文獨於春秋欲以禮法繩諸侯故其辭尤謹約而義隱微學者不能極其説故三家之傳於聖人之㫖各有得焉太史公曰爲人君者不可不知春秋豈非王者之法具在乎鄭氏樵曰春秋者魯史記之名也有未經夫子筆削之春秋有已經夫子筆削之春秋孔穎逹曰春秋之名無所經見惟昭二年韓起來聘見魯春秋晉語司馬侯對悼公曰羊舌肸習於春秋悼公使之傅其太子楚語申叔時論傅太子之法亦云敎之以春秋由此觀之是周之典禮不存惟魯春秋爲列國所重皆在夫子未修之前舊有春秋之目則韓起之所見與叔向叔時之所學者乃周公伯禽以來上自天子下至列國禮樂征伐等事無不備載皆周之盛時爲王之典章此杜預所謂周之舊典禮經是也今汲冢𤨏語亦有魯春秋記魯獻公十七年事諸如此類皆夫子未生之前未經筆削之春秋也孟子云王者之迹熄而詩亡詩亡然後春秋作此魯史記東遷以後事已經夫子筆削之春秋也或謂春秋之名取賞以春夏刑以秋冬或謂一襃一貶若春若秋或謂春獲麟秋成書謂之春秋皆非也惟杜預所謂年有四時故錯舉以爲所記之名此説得之汲冢𤨏語記夫子時事自爲夏殷春秋墨子曰吾見百國春秋以至晏子虞卿呂不韋陸賈著書皆曰春秋蓋當時述作之流於正史外各記其書皆取春秋以名之然觀其篇第本無年月與錯舉春秋以爲所記之名則異矣或曰春秋之名如此而聖人作經之意則何如曰聖人之意其有憂乎古者諸侯之國各自有史書成而獻於王王命内史掌之以别其同異考其虛實而知其美惡周自東遷以來威令不振諸侯無所稟畏而史官有虛美隱惡者百世之下衆史竝作予奪不同善善惡惡不足以懲勸聖人因魯史記以聞見其事筆而爲經二百四十二年之事約於一萬八千言之間使後世因列國之史斷以聖人之經則史之不實者即經以傳其實經之所不載者即史以知其詳此則聖人之意而左氏取之以爲傳也吁春秋一經造端乎魯及其至也爲周造端乎一國及其至也爲天下造端乎一時及其至也爲萬世吾於此見之朱子曰周衰王者之賞罰不行於天下諸侯彊陵弱衆暴寡是非善惡由是不明人欲肆而天理滅矣夫子因魯史而修春秋代王者之賞罰是是而非非善善而惡惡誅姦諛於既死𤼵潛德之幽光是故春秋成而亂臣賊子懼孔子作春秋當時亦湏與門人講説所以公穀左氏得一箇源流只是漸漸訛舛當初若是全無傳授如何鑿空撰得問公穀傳大概皆同曰所以林黃中説只是一人只是看他文字疑若非一手者或曰疑當時皆有所傳授其後門人弟子始筆之於書耳曰想得皆是齊魯間儒其所著之書恐有所傳授但皆雜以己意所以多差舛其有合道理者疑是聖人之舊左氏不必解是丘明如聖人所稱煞是正直底人如左傳之文自有縱橫意思史記却説左丘失明厥有國語或云左丘明左丘其姓也左傳自是左姓人作又如秦始有臘祭而左氏謂虞不臘矣是秦時文字分明呂氏大圭曰或問春秋魯史也諸侯亦有史乎曰案周禮小史掌邦國之志説者曰如春秋傳所謂周志國語所謂鄭書之屬是也外史掌四方之志説者曰昔魯之春秋晉之乘楚之檮杌是也曰夫子之修史也何以主魯曰夫子魯人也春秋魯史也以魯人而修魯史固其宜也而何疑之有且夫子嘗曰我欲觀夏道是故之杞而不足證也我欲觀商道是故之宋而不足證也吾觀周道幽厲傷之吾舍魯何適矣此夫子修春秋之意也馬氏端臨曰案春秋古經雖漢藝文志有之然夫子所修之春秋其本文世所不見而自漢以來所編古經則俱自三傳中取出經文名之曰正經耳又曰易有彖象本與卦爻爲二而王弼合之詩書有序本與經文爲二而毛萇孔安國合之春秋有三傳亦本與經文爲二而治三傳者合之先儒務欲存古於是取其已合者復析之命之曰古經然彖象之與卦爻序之與經毛孔王三公雖以之混爲一書尚未嘗以己意增損於其間茍復析之即古人之舊矣獨春秋一書三傳各以其説與經文參錯而所載之經文又各爭異蓋事同而字異者及邾儀父盟于蔑于眛之類是也事字俱異者尹氏君氏之類是也元未嘗書其事而以意增入者孔子生孔丘卒是也然則自三傳中所取出之經文既有爭異又有增益遽指以爲夫子所修之春秋可乎然擇其差可信者而言之則左氏爲優何也蓋公羊穀梁直以其所作傳文攙入正經不曾别出而左氏則經自經而傳自傳又杜元凱經傳集解序文以爲分經之年與傳之年相附則是左氏作傳之時經文本自爲一書至元凱始以左氏傳附之經文各年之後是左氏傳中之經文可以言古經矣呉氏澂曰春秋經十二篇左氏公羊穀梁各有不同昔朱子刻易詩書春秋於臨漳郡春秋一經止用左氏經文而曰公穀二經所以異者類多人名地名而非大義所繫故不能悉具竊謂三傳得失先儒固言之矣載事則左氏詳於公穀釋經則公穀精於左氏意者左氏必有案據之書而公穀多是傳聞之説况人名地名之殊或因語音字畫之舛此類一從左氏可也然有考之於義確然見左氏爲失而公穀爲得者則又豈容以偏徇哉漢儒専門守殘䕶闕不合不公誰復能貫穿異同而有所去取至唐啖助趙匡陸淳三子始能信經駁傳以聖人書法纂而爲例得其義者十七八自漢以來未聞或之先也觀趙氏所定三傳異同用意密矣惜其予奪未能悉當間嘗再爲審定以成其美其間不繫乎大義者趙氏於三家從其多今則如朱子意專以左氏爲主倘義有不然則從其是左氏雖有事跡亦不從也一斷諸義而已綱領二此篇論春秋大㫖經傳義例孟子曰春秋天子之事也是故孔子曰知我者其惟春秋乎罪我者其惟春秋乎孔子成春秋而亂臣賊子懼王者之迹熄而詩亡詩亡然後春秋作晉之乘楚之檮杌魯之春秋一也其事則齊桓晉文其文則史孔子曰其義則丘竊取之矣春秋無義戰彼善於此則有之矣征者上伐下也敵國不相征也莊氏周曰春秋經世先王之志也聖人議而不辯又曰春秋以道名分公羊氏髙曰春秋何以始乎隱祖之所逮聞也何以終於哀十四年曰備矣君子何爲爲春秋撥亂世反諸正莫近諸春秋董氏仲舒曰孔子知時之不用道之不行也是非二百四十二年之中以爲天下儀表貶諸侯討大夫以逹王事曰我欲載之空言不如見之行事之深切著明也夫春秋上明三王之道下辯人事之紀别嫌疑明是非定猶預存亡國繼絶世補敝起廢王道之大者也春秋辯是非故長於治人撥亂世反之正莫近於春秋春秋文成數萬其指數千萬物之散聚皆在春秋故春秋者禮義之大宗也司馬氏遷曰孔子因史記作春秋上至隱公下訖哀十四年十二公據魯親周故殷運之三代約其文辭而指博故吳楚之君自稱王而春秋貶之曰子踐土之㑹實召天子而春秋諱之曰天王狩于河陽推此類以繩當世貶損之義後有王者舉而開之春秋之義行則天下亂臣賊子懼焉孔子在位聽訟文辭有可與人共者弗獨有也至於爲春秋筆則筆削則削子夏之徒不能贊一辭范氏甯曰該二儀之化育贊人道之幽變舉得失以彰黜陟明成敗以著勸誡拯頽綱以繼三五鼓芳風以扇遊塵一字之襃寵踰華袞之贈片言之貶辱過市朝之撻德之所助雖賤必申義之所抑雖貴必屈故附勢匿非者無所逃其罪潛德獨運者無所隱其名信不易之宏軌百王之通典也王氏通曰春秋之於王道是輕重之權衡曲直之繩墨也舍則無所取衷矣又曰春秋其以天道終乎故止於獲麟孔氏穎逹曰年時月日四者史之所記皆應具文而春秋之經或時而不月月而不日亦有日不繫月月而無時者或史文先闕而仲尼不改或仲尼備文而後人脱誤桓十七年五月無夏昭十年十二月無冬既得其月時則可知仲尼不應故闕其時獨書其月當是寫者脱漏其日不繫於月或是史先闕文若僖二十八年冬下無月而有壬申丁丑雖欲改正無以復知其時而不月月而不日者史官之文亦或自有詳略案經傳書日者凡六百八十一事自文公以上書日者二百四十九宣公以下亦俱六公書日者四百三十二計年數略同而日數嚮倍此則乆逺遺落不與近同且他國之告有詳有略若告不以日魯史無由得其日而書之如是則當時之史亦不能使日月皆具仲尼從後修之舊典參差安能皆使齊同去其日月則或害事之先後備其日月則古史有所不載自然舊有日者因而詳之舊無日者因而略之既有詳略不可以為襃貶故春秋諸事皆不以日月為例啖氏助曰左氏比餘傳其功最髙博采諸家叙事尤備能令百代之下頗見本末因以求意經文可知穀梁意深公羊辭辯隨文解釋徃徃鉤深但以守文堅滯泥難不通比附日月曲生條例義有不合亦復彊通或至矛盾不近聖人夷曠之體又不知有不告則不書之義凡不書者皆以義説之列國至多若盟㑹征伐喪紀不告亦書則一年之中可盈數卷况他國之事不憑告命從何得書但書所告之事定其善惡以文襃貶耳左氏言襃貶者又不過十數條其餘事同文異者亦無他解舊解皆言從告及舊史之文若如此論乃是夫子寫魯史耳何名修春秋乎故謂二者之説俱不得中趙氏匡曰啖氏依公羊家舊説云春秋變周之文從夏之質予謂春秋因史制經以明王道其指大要二端而已興常典也著權制也故凡郊廟喪紀朝聘蒐狩昏取皆違禮則譏之是興常典也非常之事典禮所不及則裁之聖心以定襃貶所以窮精理也精理者非權無以及之故曰可與適道未可與立可與立未可與權是以游夏之徒不能贊一辭然則聖人當機𤼵斷以定厥中辯惑質疑爲後王法何必從夏乎問者曰然則春秋救世之宗指安在荅曰在尊王室正陵僭舉三綱提五常彰善癉惡不失纖芥而已又曰襃貶之指在乎例綴叙之意在乎體所謂體者其大槩有三而區分有十所謂三者凡即位崩薨卒𦵏朝聘㑹盟此常典所當載也故悉書之隨其邪正而加襃貶此其一也祭祀婚姻賦税軍旅蒐狩皆國之大事亦所當載也其合禮者夫子修經之時悉皆不取故公穀云常事不書是也其非者及合於變之正者乃取書之而增損其文以寄襃貶之意此其二也慶瑞災異及君被殺被執及奔放逃叛歸入納立如此竝非常之事亦史冊所當載夫子則因之而加襃貶焉此其三也此述作之大凡也所謂十者一曰悉書以志實二曰畧常以明禮三曰省辭以從簡四曰變文以示義五曰即辭以見意六曰記是以著非七曰示諱以存禮八曰詳内以異外九曰闕略因舊史十曰損益以成辭知其體推其例觀其大意然後可以議之耳或曰聖人之敎求以訓人也微其辭何也荅曰非微之也事當爾也人之善惡必有淺深不約其辭不足以差之也若廣其辭則是史氏之書耳焉足以見條例而稱春秋乎周子曰春秋正王道明大法也孔子爲後世王者而修也亂臣賊子誅死者於前所以懼生者於後也邵子曰春秋皆因事而襃貶豈容人特立私意哉人但知春秋聖人之筆削爲天下之至公不知聖人之所以爲公也如因牛傷則知魯之僭郊因初獻六羽則知舊僭八佾因新作雉門則知舊無雉門皆非聖人有意於其間故曰春秋盡性之書也春秋爲君弱臣彊而作故謂之名分之書五霸者功之首罪之魁也春秋者孔子之刑書也功過不相揜聖人先襃其功後貶其罪故罪人有功亦必錄之不可不恕也程子曰天之生民必有出類之才起而君長之治之而爭奪息導之而生飬遂敎之而倫理明然後人道立天道成地道平二帝而上聖賢世出隨時有作順乎風氣之宜不先天以開人各因時而立政暨乎三王迭興三重既備子丑寅之建正忠質文之更尚人道備矣天運周矣聖王不復作有天下者雖欲倣古之迹亦私意妄爲而已事之謬秦至以建亥爲正道之悖漢專以智力持世豈復知先王之道也夫子當周之末以聖人不復作也順天應時之治不復有也於是作春秋爲百王不易之大法所謂考諸三王而不謬建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑者也先儒之傳曰游夏不能贊一辭辭不待贊也言不能與於斯耳斯道也惟顔子嘗聞之矣行夏之時乗殷之輅服周之冕樂則韶舞此其準的也後世以史視春秋謂襃善貶惡而已至於經世之大法則不知也春秋大義數十炳如日星乃易見也惟其微辭奥義時措從宜者爲難知也或抑或縱或予或奪或進或退或微或顯而得乎義理之安文質之中寛猛之宜是非之公乃制事之權衡揆道之模範也夫觀百物然後識化工之神聚衆材然後知作室之用於一事一義而欲窺聖人之用心非上智不能也故學春秋者必優游涵泳黙識心通然後能造其微也春秋有重疊言者如征伐㑹盟之類蓋欲成書勢湏如此不可事事各求異義但一字有異或上下文異則義湏别詩書載道之文春秋聖人之用詩書如藥方春秋如用藥治病聖人之用全在此書所謂不如載之行事深切著明者也五經之有春秋猶法律之有斷例也律令惟言其法至於斷例則始見其法之用也春秋之書百王不易之法三王以後相因既備周道衰而聖人慮後世聖人不作大道遂墜故作此一書此義門人皆不得聞惟顔子得聞常語以四代禮樂是也春秋諸侯不稟命天王擅相侵伐聖人直書其事而常責夫被侵伐者蓋兵加於己則引咎自責或辯諭之以禮又不得免焉則固其封疆上告之天子下訴之方伯近赴於鄰國必有所直矣茍不勝其忿而與之戰則以與之戰者爲主責己絶亂之道也春秋之文一一意在示人如土功之事無小大莫不書之其意止欲人君重民力也胡氏安國曰古者列國各有史官掌記時事春秋魯史耳仲尼就加筆削乃史外傳心之要典也而孟氏𤼵明宗㫖目爲天子之事者周道衰微乾綱解紐亂臣賊子接跡當世人欲肆而天理滅矣仲尼天理之所在不以爲己任而誰可五典弗惇己所當叙五禮弗庸己所當秩五服弗章己所當命五刑弗用己所當討故曰我欲載之空言不如見之行事之深切著明也空言獨能載其理行事然後見其用是故假魯史以寓王法撥亂世反之正其大要則皆天子之事也故曰知我者其惟春秋乎罪我者其惟春秋乎知孔子者謂此書遏人欲於橫流存天理於既滅爲後世慮至深逺也罪孔子者謂無其位而託二百四十二年南面之權使亂臣賊子禁其欲而不敢肆則戚矣是故春秋見諸行事非空言比也公好惡則𤼵乎詩之情酌古今則貫乎書之事興常典則體乎禮之經本忠恕則導乎樂之和著權制則盡乎易之變百王之法度萬世之準繩皆在此書故君子以謂五經之有春秋猶法律之有斷例也學是經者信窮理之要矣不學是經而處大事決大疑能不惑者鮮矣春秋聖人傾否之書春秋爲誅亂臣賊子而作其法尤嚴於亂臣之黨通於春秋然後能權天下之事春秋之法治姦惡者不以存殁必施其身所以懲惡奬忠義者及其子孫逺而不泯所以勸善春秋之文有事同而辭同者後人因謂之例有事同而辭異則其例變矣是故正例非聖人莫能立變例非聖人莫能裁正例天地之常經變例古今之通誼惟窮理精義於例中見法例外通類者斯得之矣汪氏藻曰六經惟春秋爲仲尼作聖人見其所志之書也學而不明乎是非何以爲人治而不明乎刑賞何以爲國此書之所以作而爲萬世法也朱子曰漢書易本隱以之顯春秋推見至隱易與春秋天人之道也易以形而上者説出在那形而下者上春秋以形而下者説上那形而上者去春秋皆亂世之事聖人一切裁之以天理想孔子當時只要備二三百年之事故取史文寫在這裏何嘗云某事用某法某事用某例耶且如書㑹盟侵伐不過見諸侯擅興自肆耳書郊禘不過見魯僭禮耳至於三卜四卜牛傷牛死是失禮之中又失禮也如不郊猶三望是不必望而猶望也如書仲遂卒猶繹是不必繹而猶繹也如此等義却自分明春秋只是直載當時之事要見當時治亂興衰初間王政不行天下都無統屬及五伯出來扶持方有統屬禮樂征伐自諸侯出到後來五伯又衰政自大夫出到孔子時皇帝王伯之道掃地故孔子作春秋據他事實寫在那裏敎人見得當時事是如此安知用舊史與不用舊史今硬説那箇字是舊史文那箇字是孔子文如何驗得聖人所書好惡自易見如葵丘之㑹邵陵之師踐土之盟自是好本末自是别及後來五伯既衰湨梁之盟大夫亦出與諸侯之㑹這箇自是差異不好春秋是聖人據魯史以書其事使人自觀之以爲鑒戒耳其事則齊桓晉文有足稱其義則誅亂臣賊子若欲推求一字之間以爲聖人襃善貶惡專在於是竊恐不是聖人之意如書即位者是魯君行即位之禮繼故不書即位者是不行即位之禮若桓公之書即位則是桓公自正其即位之禮耳春秋有書天王者有書王者此皆難曉或以爲王不稱天貶之某謂若書天王其罪自見宰咺以爲冢宰亦未敢信其他如莒去疾莒展輿齊陽生恐只據舊史文若謂添一箇字減一箇字便是襃貶某不敢信桓公不書秋冬史闕文也或謂貶天王之失刑不成議論魯桓之弑天王不能討罪惡自著何待於去秋冬而後見乎又如貶滕稱子而滕遂至於終春秋稱子豈有此理今朝廷立法降官者猶經赦叙復豈有因滕子之朝桓遂竝其子孫而降爵乎春秋所書如某人爲某事本據魯史舊文筆削而成今人㸔春秋必要謂某字譏某人則是孔子專任私意妄爲襃貶孔子但據事直書而善惡自著今若必要如此推説湏是得魯史舊文參較筆削異同然後可見而亦豈復可得也或人論春秋以爲多有變例所以前後所書之法多有不同曰此烏可信聖人作春秋正欲襃善貶惡示萬世不易之法今乃忽用此説以誅人未㡬又用此説以賞人使天下後世皆求之而莫識其意是乃後世弄法舞文之吏之所爲也曾謂大中至正之道而如此乎程子所謂春秋大義數十炳如日星者如成宋亂宋災故之類乃是聖人直著誅貶自是分明如胡氏謂書晉侯爲以常情待晉襄書秦人爲以王事責秦穆處却恐未必如此湏是己之心果與聖人之心神交心契始可斷他所書之㫖不然則未易言也程子所謂微辭隱義時措從宜者爲難知耳四代之禮樂此是經世之大法也春秋之書亦經世之大法也然四代之禮樂是以善者爲法春秋是以不善者爲戒問孔子有取乎五伯豈非時措從宜曰是又曰觀其予五伯其中便有一箇奪厎意思林問先生論春秋一經本是正誼明道權衡萬世典刑之書如朝聘㑹盟侵伐等事皆是因人心之敬肆爲之詳略或書字或書名皆就其事而爲之義理最是斟酌豪忽不差後之學春秋多是較量齊魯短長自此以後如宋襄晉悼等事皆是論霸事業不知當時爲王道作邪爲伯者作邪若是爲伯者作則此書豈足爲義理之書曰大率本爲王道正其紀綱看已前春秋文字雖觕尚知有聖人明道正誼道理尚可看近來止説得伯業權譎厎意思更開眼不得此義不可不知蘇子由解春秋謂其從赴告此説亦是既書鄭伯突又書鄭世子忽據史文而書耳定哀之時聖人親見據實而書隱桓之世時既逺史冊亦有簡略處夫子但據史冊寫出耳呂氏祖謙曰孟軻氏有言世衰道微邪説暴行有作孔子懼作春秋説之邪也天下所同聞也行之暴也天下所同見也同聞同見而懼者獨孔子焉是何也手足風痺雖有笞箠頑然而不知痛無疾之人一豪傷其膚固已頻蹙慘怛中心逹於面目矣人皆風痺而孔子獨無疾宜舉世不懼而孔子獨懼也春秋成而亂臣賊子懼向者不懼而今者懼果安從生哉亦猶風痺之人倉佗和緩療以鍼石氣血流注復知疾痛疴癢之所在是知非自外至也饒氏魯曰春秋雖因魯史而修之然實却是作蓋賞罰天子之事時王不能正其賞罰故春秋爲之襃善貶惡以誅亂賊是以匹夫而代天子行賞罰也此事前古所無孔子始創爲之呂氏大圭曰春秋穿鑿之患其大端有二一曰以日月爲襃貶二曰以名稱爵號爲襃貶春秋以事繫日以日繫月以月繫時事成於日者書日事成於月者書月事成於時者書時其或宜月而不月宜日而不日者皆史失之也或曰春秋所書皆據魯史爾所謂門人髙弟不能贊一辭者其義安在曰有春秋之逹例有聖人之特筆有日則書日有月則書月名稱從其名稱爵號從其爵號與夫盟則書盟㑹則書㑹卒則書卒𦵏則書𦵏戰則書戰伐則書伐弑則書弑殺則書殺一因其事實而無加損焉此逹例也其或史之所無而筆之以示義史之所有而削之以示戒者此特筆也故曰其事則齊桓晉文其文則史其義則丘竊取之矣蓋用逹例而無所加損者聖人之公心有特筆以明其是非者聖人之精義洪氏興祖曰春秋本無例學者因行事之迹以爲例猶天本無度治厯者即周天之數以爲度然獨求於例則其失拘而淺獨求於義則其失迂而鑿汪氏克寛曰春秋紀事大而天地日星人倫邦國小而宮室器幣草木禽蟲凡天下萬物之理無不具焉能通是經則理無不窮矣故揚子曰説理者莫辯乎春秋呉氏澂曰子朱子云析之有以極其精而不亂然後合之可以盡其大而無餘噫讀春秋者其亦可以是求之矣春秋化工也化工隨物而賦形春秋山岳也山岳徙歩而異狀持一槩之説專一曲之見惡足與論聖人作經之㫖哉程氏端學曰傳稱屬辭比事者春秋之大法此必孔門傳授之格言而漢儒記之耳而説春秋者終莫之省甚可惜也夫屬辭比事其大者合二百四十二年之事而比觀之其小者合數十年之事而比觀之又如魯桓見殺於齊而莊公忘父之讎主王姬婚與齊人狩文姜之喪未除而如齊納幣書子同生於前至三十七年而始娶又如公如齊逆女先至而後夫人入其終卒有姜氏弑閔孫邾之亂又如書王人子突救衞而衞侯朔入於衞又書公至自伐衞又書齊人來歸衛俘又如書大無麥禾而築郿告糴於齊而新延廐凡春秋之事無不皆然劉氏永之曰春秋因乎魯史而筆之傳之而王法由諸而明亂逆由諸而章也言之重辭之􅃨必有大美惡焉此先儒之説也抑嘗考之蓋史冊之實錄而其紀載之體異焉耳其凡有五有據其事之離合而書之者有重其終而錄其始者有重其始而錄其終者有承赴告之辭而書之者有非承赴告之辭聞而知之而書之者此五者其凡也而皆所以紀實也夫首止之與葵丘也皆夏之㑹而秋之盟是離而爲二事矣故再書焉此據其事之離合而書之者也踐土之㑹美矣而盟不異書同日也平丘之㑹無美焉而盟則異書異日也皆實之紀也非美之大而詳其辭也將書其取鼎也於稷之㑹則始之以成宋亂此重其終而錄其始也既書曰宋伯姬卒也於澶淵之㑹則終之以宋災故此重其始而錄其終也㑹未有言其故者於茲二者言之特以明其所重也他如書實來則先書州公如曹書齊侯伐北燕則遂書暨齊平皆是物也子朝之亂叔鞅至自京師而言之未知其孰是焉故曰王室亂此非承赴告之辭聞而知之而書之者也劉單以王猛居于皇則來告矣敬王居翟泉而尹氏立子朝則來告矣此承赴告之辭而書之者也皆實之紀也非惡之大而詳其辭也曰言之重辭之複必有大美惡焉者先儒之過也鄧氏元錫曰莊僖之世禮樂征伐自諸侯出矣春秋治諸侯予其尊王者奪其不尊王者而後王統尊文宣而後禮樂征伐自大夫出矣春秋治大夫予其尊君者奪其不尊君者而後王統存桓莊以前列國之大夫雖管隰狐趙之勲不見於㑹盟惟特使而與魯接者則名之以大夫無繫乎天下之故也雖先郤欒胥之烈不見於侵伐惟魯大夫之特將則書之以大夫惟繫於一國之故也大夫之名見於春秋夫子之所恫也曰天下有道則政不在大夫大夫之主盟也自垂隴始也大夫之主兵也自伐沈始也陪臣抑又微矣春秋之法陪臣之名不經見以爲於王統最逺也是故陽虎入於讙陽闗以叛經不書書盗竊寳玉大弓曰是盗而已矣南蒯以費叛不書書叔弓圍費侯犯以郈叛不書書叔孫仲孫圍郈蓋治陪臣治大夫而已矣陸氏樹聲曰孟子曰春秋天子之事蓋以春秋所載禮樂征伐大率皆天子之事而説者遂以爲孔子作春秋擅二百四十二年南面之權是以匹夫而僭天子爵賞刑罰之柄矣夫豈孔子乎綱領三此篇論傳注得失及讀春秋之法杜氏預曰左丘明受經於仲尼以爲經者不刋之書也故傳或先經以始事或後經以終義或依經以辯理或錯經以合異隨義而𤼵其例之所重舊史遺文略不盡舉非聖人所修之要故也身爲國史躬覽載籍必廣記而備言之其文緩其㫖逺將令學者原始要終㝷其枝葉究其所窮優而柔之使自求之饜而飫之使自趨之若江海之浸膏澤之潤渙然冰釋怡然理順然後爲得也其𤼵凡以言例皆經國之常制周公之垂法史書之舊章仲尼從而修之以成一經之通體其微顯闡幽裁成義類者據舊例而𤼵義指行事以正襃貶諸稱書不書先書故書不言不稱書曰之類皆所以起新舊𤼵大義謂之變例然亦有史所不書即以爲義者此蓋春秋新意故傳不言凡曲而暢之也其經無義例因行事而言則傳直言其歸趨而已非例也故𤼵傳之體有三而爲例之情有五一曰微而顯文見於此而起義在彼稱族尊君命舍族尊夫人梁亡城緣陵之類是也二曰志而晦約言示制推以知例參㑹不地與謀曰及之類是也三曰婉而成章曲從義訓以示大順諸所諱辟璧假許田之類是也四曰盡而不汙直書其事具文見意丹楹刻桷天王求車齊侯獻㨗之類是也五曰懲惡而勸善求名而亡欲蓋而章書齊豹盗三叛人名之類是也推此五體以㝷經傳觸類而長之附於二百四十二年行事王道之正人倫之紀備矣荀氏崧曰孔子作春秋左丘明子夏造膝親受無不精究丘明撰所聞爲傳其書善禮多膏腴美辭張本繼末以𤼵明經意信多竒偉儒者稱公羊髙親受子夏立於漢朝辭義清俊斷決明審多可採用董仲舒之所善也穀梁赤師徒相傳暫立於漢時劉向父子猶執一家莫肯相從其書文清義約諸所𤼵明或左氏公羊所不載亦足訂正是以三傳竝行范氏甯曰春秋之傳有三而爲經之㫖一臧否不同襃貶殊致蓋九流分而微言隱異端作而大義乖左氏以鬻拳兵諫爲愛君文公納幣爲用禮穀梁以衞輒拒父爲尊祖不納子糾爲内惡公羊以祭仲廢君爲行權妾母稱夫人爲合正以兵諫爲愛君是人主可得而脅也以納幣爲用禮是居喪可得而婚也以拒父爲尊祖是爲子可得而叛也以不納子糾爲内惡是仇讎可得而容也以廢君爲行權是神器可得而闚也以妾母爲夫人是嫡庶可得而齊也若此之類傷敎害義不可彊通者也凡傳以通經爲主經以必當爲理夫至當無二而三傳殊説庸得不棄其所滯擇善而從乎既不俱當則固容俱失若至言幽絶擇善靡從庸得不竝舍以求宗據理以通經乎雖我之所是理未全當安可以得當之難而自絶於希通哉而漢興以來瓌望碩儒各信所習是非紛錯準裁靡定故有父子異同之論石渠分爭之説廢興由於好惡盛衰繼之辯訥斯蓋非通方之至理誠君子之所歎息也左氏豔而富其失也巫穀梁清而婉其失也短公羊辯而裁其失也俗若能富而不巫清而不短裁而不俗則深於其道者也故君子之於春秋沒身而已矣歐陽氏修曰孔子聖人也萬世取信一人而已若公羊穀梁左氏三子者博學而多聞矣其傳不能無失者也孔子之於經三子之於傳有所不同則學者寧捨經而從傳不信孔子而信三子甚哉其惑也又曰傳之於經勤矣其述經之事時有賴其詳焉至其失傳則不勝其戾也其述經之意亦時有得焉及其失也欲大聖人而反小之欲尊經而反卑之取其詳而得者廢其失者可也嘉其尊大之心可也取其卑小之說不可也問者曰傳有所廢則經有所不通奈何曰經不待傳而通者十七八因傳而惑者十五六日月萬物皆仰然不爲盲者明而有物蔽之者亦不得見也聖人之意皎然乎經惟明者見之不爲他說蔽者見之也邵子曰春秋三傳之外陸淳啖助可以兼治程子曰以傳考經之事迹以經别傳之真僞或問左傳可信否曰不可全信信其可信者耳又問公穀如何曰又次於左氏問左氏即是丘明否曰傳中無丘明字不可考劉氏安世曰公穀皆解正春秋春秋所無者公穀未嘗言之故漢儒推本以爲真孔子之意然二家亦是矛盾則亦非孔子之意矣若左傳則春秋所有者或不解春秋所無者或自爲傳故先儒以謂左氏或先經以起事或後經以終義或依經以辯理或錯經以合異然其說亦有時牽合要之讀左氏者當經自爲經傳自爲傳不可合而爲一也然後通矣晁氏說之曰穀梁晚出於漢因得監省左氏公羊之違畔而正之至其精深逺大者真得子夏之所傳范氏又因諸儒而博辯之申穀梁之志也其於是非亦少公矣非若征南一切申傳汲汲然不敢異同也胡氏安國曰傳春秋者三家左氏敘事見本末公羊穀梁辭辯而義精學經以傳爲案則當閲左氏玩辭以義爲主則當習公穀胡氏寧曰左氏釋經雖簡而博通諸史敘事尤詳能令百世之下頗見本末其有功於春秋爲多公穀釋經其義皆密如衞州吁以稱人爲討賊之辭也公薨不地故也不書葬賊不討以罪下也若此之類深得聖人誅亂臣討賊子之意考其源流必有端緒非曲說所能及也啖趙謂三傳所記本皆不謬義則口傳未形竹帛後代學者妄加附益轉相傳授浸失本真故事多迂誕理或舛駁其言信矣然則學者於三傳忽焉而不習則無以知經習焉而不察擇焉而不精則春秋之宏意大㫖簡易明白者汨於僻說愈晦而不顯矣朱子曰春秋之書且據左氏當時天下大亂聖人且據實而書之其是非得失付諸後世公論蓋有言外之意若必於一字一辭之間求褒貶所在竊恐不然國秀問三傳優劣曰左氏曾見國史考事頗精只是不知大義專去小處理會往往不曾講學公穀考事甚疎然義理却精二人乃是經生傳得許多說話往往不曾見國史李丈問左傳如何曰左傳一部載許多事未知是與不是但道理亦是如此今且把來參考問公穀如何曰據他說亦是有那道理但恐聖人當初無此等意如孫明復趙啖陸淳胡文定皆說得好道理皆是如此但後世因春秋去考時當如此區處若論聖人當初作春秋時其意不解有許多說話擇之說文定說得理太多盡堆在裏面曰不是如此底亦壓從這理來問春秋胡文定公之說如何曰尋常亦不滿於胡說且如解經不使道理明白却就其中多使故事大與做時文荅策相似左傳君子曰最無意思因舉芟夷藴崇之一段是關上文甚事左傳是一箇審利害之幾善避就底人所以其書有貶死節等事其間議論有極不是處如周鄭交質之類是何議論其曰宋宣公可謂知人矣立穆公其子饗之命以義夫只知有利害不知有義理此段不如公羊說君子大居正却是儒者議論或有解春秋者專以日月為褒貶書時月則以爲貶書日則以爲褒穿鑿得全無義理若胡文定公所解乃是以義理穿鑿故可觀安國春秋明天理正人心扶三綱敘九法體用該貫有剛大正直之氣問胡春秋如何曰胡春秋大義正但春秋自難理會胡春秋傳有牽彊處然議論有開合精神亦有過當處問胡文定據孟子春秋天子之事一句作骨如此則是聖人有意誅賞曰文定是如此說道理也是恁地但聖人只是書放那裏使後世因此去考見道理如何便爲是如何便爲不是若說道聖人當時之意說他當如此我便書這一字以褒之他當如彼我便書那一字以貶之則恐聖人不解恁地左氏所傳春秋事恐八九分是公穀專解經事則多出揣度前輩做春秋義言辭雖粗率却說得聖人大意出如二程未出時便有胡安定孫泰山石徂徠他們說經雖是甚有疎略處觀其推明治道直是凜凜可畏春秋本是嚴厎文字聖人此書之作遏人欲於橫流遂以二百四十二年行事寓其褒貶一字不敢胡亂下使聖人作經有今人巧曲意思聖人亦不解作得左傳是後來人做爲見陳氏有齊所以言八世之後莫之與京見三家分晉所以言公侯子孫必復其始左氏是史學公穀是經學史學者記得事却詳於道理上便差經學者於義理上有功然記事多誤三家皆非親見孔子或以左丘明恥之是姓左丘左氏乃楚左史倚相之後故載楚事極詳吕舍人春秋不甚主張胡氏要是此書難看如劉原父春秋亦好可學云杜預每到不通處不云傳誤云經誤曰可怪是何識見晁氏公武曰三傳之學穀梁所得最多諸家之解范甯之論最善郝氏經曰三傳之說雖不同要之出於聖人之門而學有所自終不外聖人之書法自王通為三傳作而春秋散之言而盧全輩遂謂三傳當束髙閣而獨抱遺經陸淳啖助趙匡等因之遂創爲之傳自是春秋之學不專於三傳矣虞氏集曰昔之傳春秋者有五家鄒夾先亡學春秋者據左氏以記事以觀聖筆之所斷而或議其浮華與經意逺者多矣是以公穀據經以立義專門之家是以尚焉唐啖趙師友之間始知求聖人之意於聖人手筆之書宋之大儒以爲可與三傳竝治者明其能專求於經也然傳亡存者惟纂例等書意其傳之所發明無出於所存之書者清江劉氏權衡三傳得之爲多而其所爲傳用意奥深非博洽於典禮舊文者不足以盡明之是以知者鮮矣章氏潢曰自漢而下說春秋者無慮數百家皆原於公羊穀梁左氏胡氏最晚出得顓立於學官而諸家之說幾盡廢矣安國之作傳也總三家紛紜之說而録其是彚諸家後出之論而采其長義例炳然袞鉞斯備然以爲不詭於聖人之教則可以爲盡得聖人之意則未也夫經之爲言常也聖人之作經也簡易明白不以微曖難明之辭眩天下也不以操切繳繞之文誤後世也要以是是而非非善善而惡惡以昭人道以達王事如斯而已矣廼胡氏一時進御之言意存納約是故不免激焉而偏索聖人之精義於一字筆削之文是故不免覈焉而深故三傳立而聖人之教分聖人之志則未失也胡氏之傳出而聖人之教尊其得者固多而失者亦不少矣以上論傳注得失程子曰春秋一句即一事是非便見於此乃窮理之要學者只觀春秋亦可以盡道矣他經非不可以窮理也但論其義耳春秋因其行事是非較著故窮理爲要春秋以何爲準無如中庸欲知中庸無如權何物爲權義也時也春秋已前既已立例到近後來書得全别一般事便書得别有意思若依前例觀之殊失也春秋大率所書事同則辭同後人因謂之例然有事同辭異者蓋各有義非可例拘也邵子曰治春秋者不辯名實不定五霸之功過則未可言治春秋先定五霸之功過而治春秋則大意立若事事求之則無緒矣張子曰春秋之書在古無有乃仲尼所自作惟孟子爲能知之非理明義精殆未可學先儒未及此而治之故其說多鑿楊氏時曰春秋其事之終歟學者先明五經然後學春秋則其用利矣又曰人言春秋難知其實昭如日孔子於五經中言其理於春秋著其行事學者若得五經之理春秋誠不難知又曰伯淳先生嘗有語云看春秋若經不通則當求之傳傳不通則當求之經某曾問之云傳不通則當求之經何也曰只如左氏春秋書君氏卒君氏乃惠公繼室聲子也而公羊春秋則書曰尹氏傳云大夫也然聲子而書曰君氏是何義當以尹氏爲正此所謂求之經李氏侗曰春秋一事各是發明一例如觀山水然徙步而形勢不同不可拘以一法又曰春秋所以難看者蓋以常人之心推測聖人未到聖人灑然處豈能無失邪朱子門人問讀春秋之法曰只是據經所書之事迹而準折以先王之道某是某非某人是底猶有未是處不是底又有彼善於此處自將道理折衷便是只是聖人言語細密要人子細斟量考索耳荅黃仁卿云所示春秋大㫖甚善此經固當以類例相通然亦先須隨事觀理反復涵泳令胸次開闊義理貫通方有意味若便一向如此排定說殺正使在彼分上斷得十分的當却於自已分上都不見得箇從容活絡受用則亦何益於事邪大抵不論看書與日用工夫皆要放開心胸令其平易廣闊方可徐徐旋看道理浸灌培養切忌合下便立己意把捉得太緊了即氣象急廹田地狹隘無處著工夫也陸氏深曰春秋比諸經尤難讀簡嚴而閎大惟其簡嚴故立論易刻惟其閎大故諸說皆通聖人筆削之㫖隱矣事案左氏之的義取公穀之精此兩言乃讀春秋之要法以上論讀春秋之法欽定春秋傳說彚纂卷首上
