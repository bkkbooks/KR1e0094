body:
  text: 欽定四庫全書欽定春秋傳說彚纂卷十九宣公集說孔氏穎逹曰魯世家云宣公名倭或作接文公之子敬嬴所生以匡王五年即位諡法善問周逹曰宣癸匡王丑五年元年晉靈十三年齊惠公元元年衞成二十七年蔡文四年鄭穆二十年曹文十年陳靈六年把桓二十九年宋文三年秦共公稻元年楚荘六年春王正月公即位公羊繼弑君不言即位此其言即位何其意也榖梁繼故而言即位與聞乎故也胡傳宣公為弑君者所立受之而不討賊是亦聞乎弑也故如其意焉而書即位以著其自立之罪而不嫌於同辭美一也有小大則襃辭異惡一也有小大則貶辭異一美一惡無嫌於同集說張氏洽曰宣公受弑賊之立而居其位其罪同於桓公而十八年之間皆書王與桓公不同者法已舉於前矣天理不可以常亡王法不可以久廢故存王以舉大法亦所以正宣公之罪也家氏鉉翁曰繼弑而書即位坐首惡也受位於賊臣以為恩而莫之討葬君不以禮廹嫡母而歸之齊首惡之罪何所逃故書即位以討之此桓弑隠之例也預王氏元杰曰宣公立不以正受之而不討賊是亦聞乎故也上何所稟内何所承而即位耶仲遂竊廢立之柄以濟其私行繼正之禮以揜其惡春秋同於魯桓之例著其簒逆之罪故書即位下邵氏寶曰即位之禮行則書之不行則否文成以六君皆行之隠以為攝而不必行荘閔僖則繼故而不忍行者也桓之行桓之志也宣之行宣之志也公子遂如齊逆女胡傳魯秉周禮喪未期年遣卿逆女何亟乎太子赤齊出也仲遂殺子赤及其母弟而立宣公懼於見討故結昏於齊為自安計越典禮以逆之如此其亟而不顧者必敬嬴仲遂請齊立接之始謀也其後滕文公定為三年喪父兄百官皆不欲曰吾宗國魯先君莫之行也喪紀寖廢夫豈一朝一夕之故自文宣莫之行矣此所謂不待貶絶而罪惡見者也集說杜氏預曰不譏喪娶者不待貶責而自明也女石氏介曰翬弑隠公遂殺子赤桓公之立逆使翬宣公之立逆女使遂斯二人者在國以為賊而桓宣以為忠也故終桓宣之世翬遂皆稱公子無異辭於王氏葆曰赤齊之甥也憂齊之有所黨故欲急昏齊也薛氏季宣曰公薨夫人出大夫逆女亂倫而娶齊人不創夫人之出而違禮婚媾皆罪也夫家氏鉉翁曰宣公繼世之初斬焉在疚而首遣大如齊逆女所遣者又同惡之大夫春秋書之所以著敬嬴襄仲弑君簒國之本謀亦以見齊元無道黨其臣而使之弑君也盖請昏割地魯所以自結於齊者皆在遂與得臣如齊之時故即位未幾而襄仲遂有逆女之行無何又以割地而出春秋書即位書逆女書遂以夫人婦姜至自齊書齊人取濟西田著魯人結齊之援以弑其君著齊人輔魯之簒俾弑其君盖明王法以治齊魯之罪二國皆有討也吳氏􅊹曰文公使公子遂納幣已非禮况宣公逆夫人而可遣僖祖之弟乎然負簒弑之罪而急於結齊昏以定其位者乃惡之大喪娶卿逆之非禮則其惡之小者爾汪氏克寛曰文公未終禫制而圖昏春秋深加貶黜不書逆者姓名不書如齊不稱夫人不稱氏以著其罪宣公未及期年而亟於喪娶春秋書使卿逆女書夫人至僅去夫人之氏此非特從同同之例盖以宣公之惡有大於喪娶者故詳録之以見其縱私欲而紊典禮實欲結大援而逭天討也三月遂以夫人婦姜至自齊公羊遂何以不稱公子一事而再見者卒名也夫人何以不稱姜氏貶曷為貶譏喪娶也喪娶者公也則曷為貶夫人内無貶於公之道也内無貶於公之道則曷為貶夫人夫人與公一體也其稱婦何有姑之辭也榖梁其不言氏喪未畢故略之也其曰婦縁姑言之之辭也遂之挈由上致之也胡傳有不待貶絶而罪惡見者不貶絶以見惡夫人與有罪焉則待貶而後見故不稱氏夫人其如何知惡無禮如野有死麕能以禮自防如草蟲愆期有待如歸妹之九四則可免矣凡稱婦者其辭雖同立義則異逆婦姜于齊病文公也以婦姜至自齊責敬嬴也敬嬴嬖妾私事㐮仲以其子屬之殺世適兄弟出主君夫人援成風故事即以子貴為國君母斬焉在衰服之中請昏納婦而其罪隠而未見也故因夫人至特稱婦姜以顯之此乃春秋推見至隠著妾母當國用事為後世鑒者也槩指為有姑之辭而不察其㫖則精義隠矣集說服氏䖍曰古者一禮不備貞女不從故詩云雖速我訟亦不女從宣公既以喪娶夫人從亦非禮故不稱氏見略賤之也臣趙氏匡曰書以者不當以也劉氏敞曰君之使固有稱族不稱族史之書之所謂實録也非尊君命夫人之謂也公子結媵陳人之婦遂及齊侯宋公盟此權事而非受命者也何以亦稱族邪豈尊以為君命哉豹婼意如其徃也氏其至也皆不氏無有夫人居閒也何以亦舎族邪豈尊以敵夫人哉穆葉氏夢得曰文與宣皆喪娶也故出姜逆不稱氏姜至亦不稱氏其為貶之道同也何以不於其逆焉貶逆者未成婦也至者已成婦也朱子曰遂以夫人姜氏至自齊恐是當時史官所書如此盖為如今魯史不存無以知何者是舊文何者是聖人筆削怎見得聖人之意張氏洽曰公子遂宣公之為亂臣賊子明矣不待貶絶也書婦著敬嬴之罪也趙氏鵬飛曰諸侯娶元妃以奉宗廟非苟結私黨以濟其惡也弑太子立宣公絶姜氏皆仲遂與敬羸之謀今謀既濟矣獨虞姜氏在齊有以謀魯也故宣公即位坐席未溫而公子遂如齊逆女三月遂以夫人婦姜至自齊盖齊惠亦負簒弑之惡故不暇責魯特患姜氏有言於惠公也今既逆齊女而歸則惠益親魯姜氏有言惠有所不信爾故得婦姜則宣公之位定敬嬴公子遂可以無虞故聖人書曰公子遂如齊逆女遂以夫人婦姜至自齊書公子遂是娶齊之謀本於遂也書婦姜誅敬嬴也婦者有姑之稱姜氏既絶而歸齊婦安得姑書婦姜所以見妾母專政而娶齊之謀遂與敬嬴同之也齊家氏鉉翁曰夫人非大夫所得以也挾齊弑君娶女為簒君之婦書以者著其罪也喪娶固當譏而罪有大於喪娶者棄母於齊娶婦於齊春秋所以誅也李氏廉曰哀姜去姜而書氏今此去氏而書姜哀姜之罪重也汪氏克寛曰有姑則以婦禮至無姑則專以夫人禮至不稱姜氏而稱婦姜著敬嬴之欲速以姑自居也夏季孫行父如齊左傳夏季文子如齊納賂以請㑹胡傳經書行父如齊而不言其故謂納賂以請㑹者傳也經有不待傳而著者比事以觀斯得矣下書公㑹齊侯于平州則知此㑹行父請之也又書齊人取濟西田則知其請盖以賂也雖微傳其事著矣諸侯立卿為公室輔猶屋之有楹也而謀國如此亦不待貶絶而惡自見者也不然以行父之勤勞恭險相三君而無私積必能以其君顯名與晏嬰等矣集說髙氏閌曰公既昏矣然後季文子如齊納賂請列於會盖春秋時國君不以其道立苟得一預諸侯之會他國不得復討其罪所以季文子不憚自行者欲假大國之權以定宣公之位也宣公之位定則一時臣子黨亂誤國之罪皆可以逃矣無朱子曰季文子三思而後行可謂慮事詳審而宜過舉矣而宣公簒立文子乃不能討反為之使齊而納賂焉豈非私意起而反惑歟呂氏本中曰君母不正孽子簒立而國之大臣恃大國以免施施肆肆無所忌憚行父名大夫也而猶若是先王之澤泯矣張氏洽曰文公世子之死在官當誅者公子遂其首行父次之觀春秋所書則知之矣家氏鉉翁曰季友受託孤之寄酖叔牙戮慶父立僖公魯之宗社頼以安行父其孫也乃為賊使齊納賂請㑹有忝厥祖多矣婚余氏光曰𫝊謂納賂請㑹也趙氏謂拜成也李世熊曰以拜婚之禮行納賂之事也晉放其大夫胥甲父于衞左傳晉人討不用命者放胥甲父于衞而立胥克先辛奔齊公羊放之者何猶曰無去是云爾然則何言爾近正也此其為近正奈何古者大夫已去三年待放君放之非也大夫待放正也古者臣有大喪則君三年不呼其門已練可以弁冕服金革之事君使之非也臣行之禮也閔子要絰而服事既而曰若此乎古之道不即人心退而致仕孔子盖善之也榖梁放猶屏也稱國以放放無罪也胡傳秦晉戰於河曲撓臾駢之謀者趙穿也若討其不用命則當以穿為首止治軍門之呼偕貶可也而獨放胥甲父則以趙盾當國穿其族子而盾庇之也桃園之罪其志固形於此矣故稱國以放見晉政之在私門而成上侵為後戒也集說杜氏預曰胥甲下軍佐胥臣之子放者受罪黜免宥之以逺孔氏穎逹曰舜典云流宥五刑孔安國云以流放之法寛五刑是放者有罪當刑而不忍刑之寛其罪而放棄之也三諫不從待放而去者彼雖無罪君不用其言任令自去亦是放棄之義放之與奔俱是去國而去情小異釋例曰奔者廹窘而去逃死四鄰不以禮出也放者受罪黜免宥之以逺也李氏堯俞曰稱國以放與稱國殺大夫同劉氏敞曰放之者何宥之以逺者也其言于衞何猶曰無去是云爾曷為或稱國以放其大夫或稱人以放其大夫稱人以放其大夫者放有罪也稱國以放其大夫者放無罪也又曰大夫待放者以道去其君者也君放大夫者寛其罪於死投之於逺者也若放驩兜于崇山之類也張氏洽曰穿以盾之側室而獨免刑之偏頗如此非所以治有罪主諸侯也甲呂氏大圭曰稱國以放君與大夫咸與焉晉放胥是也稱人以放國亂無政而衆人擅放之蔡人放公孫獵是也吳氏􅊹曰河曲之戰及今八年豈有不用命之罪八年而後討哉必胥甲以他事取惡於趙盾而逐之也汪氏克寛曰放胥甲者弑夷皋之兆也殺胥童者弑州蒲之兆也案公羊所稱大夫已去三年待放然後放之即孟子所稱去三年不反然後收其田里也不及其待而遽放之即孟子所謂去之日遂收其田里也河曲之戰距今八年晉始放胥甲父盖所謂待而後放者故公羊以為近正乃胡傳非之謂大夫當官既不請於天子而自命以為有罪又不告於司㓂而擅刑遂以為逺於正夫周初千八百國放流以下其獄繁矣若皆請於王司㓂之官可勝理乎胥甲父下軍之佐既非命大夫罪止於放又非專殺乃猶以不告於司㓂罪之徒泥於尊王之義而不知其事之不可通是固而已矣然則其書之奈何曰是責其與趙穿同罪而獨見放也春秋之法稱國以殺而不去其官為罪累上則稱國以放而不去其官亦為罪累上盖胥甲父誠有罪而放之者未盡其道則以累上之辭書以見義焉耳今刪節胡傳而復為辨之如此公㑹齊侯于平州平州杜注齊地在泰山牟縣西今萊蕪縣西有平州城屬山東濟南府左傳㑹于平州以定公位胡傳左氏曰㑹于平州以定公位魯宣簒立踰年舉國臣子既從之矣若之何位猶未定而有待於平州之㑹也春秋以來弑君簒國者已列於諸侯則不復致討故曹人以此請負芻於晉夫簒弑之賊毁滅天理無所容於天地之間身無存没時無古今其罪不得赦也以列於㑹而不復討是棄人類為禽獸仲尼所為懼春秋所以作也然欲定其位者魯宣宜稱及齊而曰㑹者討賊之法也凡討亂臣賊子必深絶其黨而後為惡者孤也集說張氏洽曰凡亂臣賊子之所以不敢縱其欲者以有霸主大國能討之也齊乃魯之鄰其力足以正魯而惠公不明於義利邪正之辨始許仲遂以亂魯之適庶終㑹平州以定賊子之位則亂賊復何畏而不逞哉㑹者外為志魯宣欲求寵以定位而書齊惠之志以治黨惡之罪與桓公鄭荘垂之㑹一也晉為盟主諸侯所取正而齊宋弑君威弗能加魯亂不治見晉之無能為也汪氏克寛曰齊惠因歜職之逆得立乎其位故魯宣納賂求㑹驩然而從盖同惡相濟耳特齊之彊大足以芘魯故宣公君臣殫意以固結之也忍陳氏際泰曰子赤之弑出姜之歸行道之人皆弗也矧伯餘乎矧齊出乎叔姬之誣舎之死而弗克問也魯為齊弱久矣夫以齊之彊不先得其意未有敢動於惡者也仲遂得臣先如齊盖計而殺之也不先得其意未有敢即於㑹者也季孫行父繼如齊盖嘗而親之也書曰公㑹齊侯于平州平其辭焉無汲汲之意斯其責齊至矣公子遂如齊左傳東門襄仲如齊拜成胡傳宣公簒立之罪仲遂主謀為首惡初請於齊遂為上客而竝書介使者罪叔孫得臣不能為有無亦從之也大夫有以死争者矣然削而不書者以叔仲惠伯死非君命失其所也遂及行父則一再見於經矣如齊拜成雖削之可也又再書於䇿者於以著其始終成就弑立之謀以戒後世人臣或内交宮禁以固其寵或外結藩鎮以為之援至於殺生廢置皆出其手而人主不悟者其慮深矣凡此皆直書於策而義自見者也集說汪氏克寛曰遂得臣同如齊見公子接而請立之逆謀之始也今既定宣公而拜成於齊逆謀之終也六月齊人取濟西田濟西杜注故曹地僖三十一年晉文以分魯左傳六月齊人取濟西之田為立公故以賂齊也公羊外取邑不書此何以書所以賂齊也曷為賂齊為弑子赤之賂也榖梁内不言取言取授之也以是為賂齊也胡傳魯人致賂以免討而書齊人取田者所以著齊罪春秋討賊尤嚴於利其為惡而助之者所以孤其黨夫齊魯鄰國盟主之餘業也子惡弑出姜歸而宣公立不能聲罪致討務寧魯亂首與之㑹是利其為惡而助之也弑君簒國人道所不容而貨賂公行免於諸侯之討則人類滅為禽獸也孟子為梁王極言利國者必至於弑奪而後饜盖得經書取田之意舉法如此然後人知保義棄利亂臣賊子孤立無徒而亂少弭矣集說何氏休曰子赤齊外孫宣公簒弑之恐為齊所誅為是賂之故諱使若齊自取之者亦因惡齊取簒者賂當坐取邑人劉氏敞曰外取邑不書此何以書非齊取之也齊取濟西田則何言乎非齊取之我以賂齊也曷為賂齊為弑子赤之賂也賂齊爾何言乎齊人取之諱也孫氏覺曰齊侯之罪隠而難見故明書取田以著其罪春秋取田邑皆貶之曰人罪其擅取也惟齊景為昭公取鄆以其取不為己得特書其爵不程子曰宣公不義得國賂齊以求助齊受之以助義故書取不義不能保其土故不云我非為彊取故不諱不能有而失者皆諱曰張氏洽曰濟西魯故地僖三十一年取之曹者又桓公簒立求援於鄭而誘以許田宣公奪嫡主齊以自立而賂以濟田以利自固前後一轍使鄭荘齊惠不貪其利則桓宣必不能以自立矣曰假曰取蔽罪鄭齊誅其貪利而成亂也大學論治國平天下深戒以利為利孟子論先利後義不奪不饜皆㧞本塞源知春秋之微意也歟呂氏大圭曰春秋書取田邑有伐而書取者如隠四年莒人伐杞取牟婁十年公敗宋師取郜取防僖二十二年公伐邾取須句二十六年公以楚師伐齊取穀三十三年公伐邾取訾婁宣四年公伐莒取向九年齊侯伐萊取根牟十年公孫歸父伐邾取繹是用兵力以取之也有直書取者如僖三十一年春取濟西田我取之曹也此年齊人取濟西田齊取之我也成二年取汶陽田以鞌之戰而齊以歸我也此則不用兵力而取之也黄氏仲炎曰許田入鄭而桓簒成郜鼎入魯而督罪釋濟西入齊而宣位定春秋備書於冊以見利賂之禍如此其極家氏鉉翁曰魯桓之弑君鄭不預也魯畏其討以是為賂故書假諱之也魯宣之弑君謀出於襄仲事實成於齊惠故直書其事以兩討之盖田者先祖受之於王魯國之封疆也宣公既簒人之國又割先祖所受之土疆以為齊賂齊惠既輔人之簒又受其賂田以為己有此所謂盗竊之取其罪有大於侵伐之取矣我李氏廉曰春秋内失地不書如襄二十六年齊取髙魚之類以其不能保先祖之土宇乃人君之大惡故諱之也獨此書齊取者已以賂齊非齊之彊取也陳氏曰必有歸之也然後書故濟西書取讙闡書取亦通夫王氏樵曰商人之弑立也惠公惡之終不曰公曰已氏羞惡之心亦明矣及商人見弑而已代之為君也謂當推此心以自彊於為善矣夫赤之死猶舎之死也接之立猶商人之立也出姜之歸猶昭姬之歸也於商人則惡之於魯之效商人者則不之惡何初心之反耶不過入於襄仲之姦貪於濟西之賂遂至忍心犯義而助其成也故胡傳以為春秋討賊尤嚴於其黨秋邾子來朝集說胡氏寧曰凡經於朝聘皆不徒書未有書而無義者也宣公為弑君者所立邾子來朝而無貶文者既於朝桓貶矣公羊曰其餘從同同而黄氏仲炎曰邾自僖文之世常與魯抗今宣簒立反朝之非畏魯乃畏齊也齊悅魯之利邾畏齊之壓而公論不復存矣趙氏鵬飛曰邾自僖文之世屢為魯所虐至是因宣公之立而求成焉故來朝然十年而公孫歸父伐邾取繹春秋之世小國之事大國盖亦難矣朝亦被兵不朝亦見伐一咈其欲則兵甲從之豈特邾乎滕把小國皆然矣楚子鄭人侵陳遂侵宋左傳宋人之弑昭公也晉荀林父以諸侯之師伐宋宋及晉平宋文公受盟于晉又㑹諸侯于扈将為魯討齊皆取賂而還鄭穆公曰晉不足與也遂受盟於楚陳共公之卒楚人不禮焉陳靈公受盟於晉秋楚子侵陳遂侵宋胡傳楚書爵而人鄭者貶之也鄭伯本以宋人弑君晉不能討受賂而還以此罪晉為不足與也遂受盟於楚今乃附楚以亟病列國何義乎書侵陳遂侵宋者以見潛師掠境肆為侵暴非能聲宋罪而討之也集說陳氏傅良曰書遂伐楚言志不在蔡也書遂侵宋言志不在陳也南北之勢於是始也後十五年而宋楚平後五十年晉趙武楚屈建同盟于宋列國之君分為晉楚之從矣自是訖春秋師再有事無言遂者言遂者非與國伐盟主則盟主伐與國也王張氏洽曰不討有罪固晉之無義而亦未至如僭之罪大也鄭舎晉從楚故人之子呂氏大圭曰盟㑹而書楚子自盂始征伐而書楚自侵陳始次厥貉嘗書楚子矣未加兵於列國也伐麇書楚子矣不過加兵於其與國也征伐而書爵者皆伯之之辭侵蔡遂伐楚侵曹伐衞書齊侯晉侯喜列國之有伯也侵陳遂侵宋書楚子傷列國之無伯而楚執伯權也李氏亷曰楚荘以文十三年即位數年之間休養以有為至此而争伯矣又曰楚自僖二十七年圍宋至是而再及宋列國又無伯也晉趙盾帥師救陳左傳晉趙盾帥師救陳宋榖梁善救陳也胡傳陳先代帝王之後而見侵逼此門庭之寇利用禦之者也晉能救陳故特襃而書救凡書救者未有不善之也如解倒懸如拯民於塗炭之中知此義則知春秋用兵之意矣傳稱師救陳宋經不書宋此非闕文乃聖人削之也前方以不能討宋上卿貶而稱人諸侯㑹而不序今若書救宋則典刑紊矣集說張氏洽曰陳無罪而蒙伐當救之宋有弑君之罪不當救故略之家氏鉉翁曰傳言救陳及宋不書救宋不與其救宋也宋負弑君大惡晉人受賂不能討而楚伐之雖楚之存心未必純於為義然弑逆之賊夫人得而討之也楚討之晉救之故春秋不與其救宋公陳侯衞侯曹伯會晉師于棐林伐鄭棐林杜注鄭地滎陽宛陵縣東南有林郷今林郷城在新鄭縣東二十五里屬河南開封府左傳會于棐林以伐鄭也楚蒍賈救鄭遇於北林囚晉解揚晉人乃還北林杜注鄭地滎陽中牟縣西南有林亭今屬河南開封府集說杜氏預曰晉師救陳宋四國君徃會之共伐鄭也不言會趙盾取於兵會非好會也孔氏穎逹曰晉本興師為救陳宋但楚師已去故四國之君徃會晉師與共伐鄭言于棐林者行會禮然後伐桓十五年公會宋公衞侯陳侯于袲伐鄭亦行會禮乃伐與此同也陸氏淳曰公羊曰此晉趙盾之師曷為不言趙盾之師君不會大夫之辭也趙子曰案春秋諸侯會大夫者非一何於此獨生義乎榖梁曰列數諸侯而會晉趙盾大趙盾之事也啖子曰晉師先已書今四國㑹之自常例爾有何義乎又曰地而後伐鄭疑辭也趙子曰凡衆國共行之理春秋舉大綱示邪正豈有為其聚謀與不謀為例又曰此其地何著其美也案春秋未有師書地為襃之例國家氏鉉翁曰不言晉會四國而言四國會晉嘉四也諸侯多從楚而四國去楚即晉春秋雖惡趙盾未嘗絶晉也吳氏澂曰晉師即趙盾救陳之師也陳先代之後而受侵偪伯主所宜救也鄭以畿内之國而附於楚伯主所宜討也惜乎晉伯不競荆蠻方彊晉師能致四國之君聲罪致討不能勝楚而反遺楚禽也會黄氏正憲曰上書趙盾帥師救陳此言四國之君晉師方起兵時楚已移師宋境及其逗留在道楚已掠宋退師故宋陳二國得偕曹衞以會盾耳陳氏際泰曰獨将救陳者急也合将伐鄭者緩也案胡傳謂列數諸侯於帥師之下而又書大夫之名氏則臣疑於君而不可以為訓其曰會晉師乃謹禮於微之意此盖本公羊君不會大夫之說而考之春秋則有所未合也謂臣不可疑於君故君不會大夫則會師既然會盟亦宜然乃文十四年盟新城以晉趙盾列數於諸侯之下而不嫌其疑於君何耶僖二十五年盟洮則有莒慶二十六年盟向則有衞寗速成十五年盟戚則有齊國佐定四年召陵侵楚則有齊國夏皆以君會大夫經文列叙而無異辭何其不謹於禮耶然則此書晉師而不書趙盾者其義安在盖師與大夫等耳好會以同會之人為主征伐則同行之師竝重義繫之大夫則必書大夫義繫之師則師可書不必大夫也杜氏預以為兵會非好會者是也榖梁謂袲之役先地後伐為疑辭此則著其美胡氏亦從之趙氏匡所駁甚明今故不録公榖及胡氏說冬晉趙穿帥師侵崇崇公作柳役書大夫侵書趙穿而後凡崇杜注秦之與國左傳晉欲求成於秦趙穿曰我侵崇秦急崇必救之吾以求成焉冬趙穿侵崇秦弗與成胡傳崇在西土秦所與也晉欲求成於秦不以大義動之而伐其與國則為諼已甚比諸伐楚以救江異矣而傳謂設此謀者趙穿也意者趙穿已有逆心欲得兵權託於伐國以用其衆乎不然何謀之迂而當國者亦不裁正而從之也穿之名姓自登史䇿弑君於桃園而上卿以志同受惡其端又見於此書侵以見所以求成者非其道矣集說孫氏復曰崇秦與國適髙氏閌曰晉欲得秦而反加兵於他人之國足以衆晉之敵耳此謬計也不劉氏敞曰公羊曰柳者天子之邑也不繫乎周者與伐天子也非也信如公羊之言柳為天子之邑趙穿伐之晉罪大矣春秋曽無文貶之乎之家氏鉉翁曰晉欲求成於秦發一介之使述先君好而秦成合矣今侵崇以求之秦愈怒而兵愈不可解矣盖穿志於作難託伐崇以專兵也程氏端學曰書此見大夫專兵侵伐亦以序晉靈見弑之漸者嚴氏啓隆曰秦自敗殽以來深結於楚秦晉相惡數年穆公作誓不復東征二國之兵稍息已而復生釁於令狐戰伐無已其讎已深今方南禦楚退而思求好於秦秦晉之交合則秦楚之好疎我無西顧之憂楚斷同讎之臂斯亦制楚一大機也胡為曲狥穿謀侵崇致怨自此一失明年即有圍焦之師至八年而晉師白狄伐秦十五年而秦人伐晉成九年而秦人白狄伐晉十三年而晉厲公合八國以伐秦悼公既伯秦數出師以撓之我讎愈深彼交愈固至於吳師入郢秦哀公為之賦無衣楚眞得力於秦矣晉人宋人伐鄭左傳晉人伐鄭以報北林之役於是晉侯侈趙宣子為政驟諫而不入故不競於楚榖梁伐鄭所以救宋也胡傳宋人弑君既列於會在春秋衰世已免諸侯之討矣論春秋王法則其罪固在法所不赦也而晉人與之合兵伐鄭是謂以燕伐燕庸愈乎其書晉人宋人非将卑師少盖貶而人之也以貶書伐者若曰聲罪致討而已有瑕則何以伐人矣集說孫氏復曰鄭未服也晉髙氏閌曰宋怨鄭與楚之侵也復請晉伐鄭亦以前救之無功也遂連兵伐之夫晉以貪賂致諸侯之叛不能退而自責乃謀動干戈於外以遂宋之復怨况宋人弑君豈可與之合兵乎即家氏鉉翁曰秋伐鄭爵之今伐鄭人之何哉曰鄭楚討之公也晉受宋賂而輔之簒復偕宋伐鄭私也故伐鄭則爵之為宋伐鄭則人之盖鄭可伐也為宋而伐鄭則不可也程氏端學曰趙盾合四國諸侯而不能服鄭之心為晉宋者盍反已而思乎伐之不服而又伐之兵不以義其能振乎吳氏澂曰棐林之會晉合四國以伐鄭而無功故至於再伐不復可致三國伐鄭者為宋也故獨與宋連兵再李氏廉曰春秋討宋之文一見於四國之伐書人見於諸侯之會不序三見於趙盾之救不書至是而四貶焉春秋之法嚴矣甲匡王寅六年二年晉靈十四年齊惠二年衞成二十八年蔡文五年鄭穆二十一年曹文十一年陳靈七年把桓三十年宋文四年秦共二年楚荘七年春王二月壬子宋華元帥師及鄭公子歸生帥師戰于大棘宋師敗績獲宋華元戰皆書大夫帥師自此始河大棘杜注陳留襄邑縣今南歸徳府睢州州西曲棘里有棘城又寧陵縣西南七里有大棘城亦與睢相近左傳二年春鄭公子歸生受命於楚伐宋宋華元樂呂御之二月壬子戰于大棘宋師敗績囚華元獲樂呂及甲車四百六十乗俘二百五十人馘百人狂狡輅鄭人鄭人入于井倒㦸而出之獲狂狡君子曰失禮違命宜其為禽也戎昭果毅以聼之之謂禮殺敵為果致果為毅易之戮也将戰華元殺羊食士其御羊斟不與及戰曰疇昔之羊子為政今日之事我為政與入鄭師故敗君子謂羊斟非人也以其私憾敗國殄民於是刑孰大焉詩所謂人之無良者其羊斟之謂乎殘民以逞宋人以兵車百乗文馬百駟以贖華元於鄭半入華元逃歸立於門外告而入見叔牂曰子之馬然也對曰非馬也其人也既合而來奔宋城華元為植廵功城者謳曰睅其目皤其腹棄甲而復于思于思棄甲復來使其驂乗謂之曰牛則有皮犀兕尚多棄甲則那役人曰從其有皮丹漆若何華元曰去之夫其口衆我寡胡傳兩軍接刃主将見獲其負明矣又書師敗績辭不贅乎此明大夫雖貴與師等也故将尊師少稱将不稱師師衆将卑稱師不稱将将尊師衆竝書於䇿者示人君不可輕役大衆又重将帥之選其義深矣或曰元帥三軍之司命而輕重若是班乎自行師而言則以元帥為司命自有國而言則以得衆為邦本鄭使髙克将兵禦狄於境欲逺克也而不恤其師楚以六卒實從得臣恐喪師也而不恤其将故經以棄師罪鄭以殺其大夫責楚明此義然後知王者之道輕重之權衡矣集說杜氏預曰得大夫生死皆曰獲皆徐氏彥曰宋鄭皆言帥師者其将皆尊其師衆故也陸氏淳曰榖梁曰盡其衆以救其将以三軍敵華元華元雖獲不病矣趙子曰案軍敗身獲而云不病此說非也但縁師先敗績身乃見獲依次第書之有何襃貶乎若欲襃貶之乃足見其不身先士卒爾何得云善也晉侯夷吾之見獲為馬䧟濘中師實不敗各依事實而言無煩曲說孫氏復曰宋師敗績獲宋華元惡鄭公子歸生與楚比周既敗宋師又獲其帥可謂甚矣劉氏敞曰戰而言及之者主之者也猶曰宋華元為志乎為此戰也云爾林髙氏閌曰元年秋鄭人與楚子侵宋宋人既為棐之役以報之是冬又與晉人伐鄭一役而兩報之遂起此役今鄭師之來宋當明大義以喻之否則慎固封守使鄭不得而犯焉華元乃遽帥師出與之戰於是三軍大敗以至見獲不能效死徒殄民辱國而已張氏洽曰宋以弑君致寇而不服罪故書宋及戰呂氏大圭曰春秋書戰三十四惟晉趙鞅鄭罕逹于鐵及此年戰于大棘皆稱帥師者其衆敵也春秋書獲者七惟齊國書及此年宋華元書敗績者身見獲而師又敗也大夫生死皆言獲鄭獲宋華元生也吳獲陳夏齧吳獲齊國書死也盖存之殺之皆在既獲之後耳趙氏鵬飛曰鄭伐宋而以宋主之春秋被伐者為主例之常也楚未嘗伐鄭鄭穆無釁而從楚晉再伐而不反固已悖矣今乃為楚伐宋可勝責乎華元兵敗身獲而無貶辭傷其力不敵而責晉之不救也書敗書獲甚楚鄭也無俞氏皋曰此鄭伐宋也而書宋及何也宋之報復已故鄭有此師宋不諭以辭命而與之戰故書及以責焉無吳氏澂曰鄭附楚侵陳宋晉為宋故再伐鄭而皆功鄭受楚命一戰宋而乃大勝楚之氣益張矣有汪氏克寛曰文定於韓之戰云書伐書及者兩俱罪經不書伐專罪晉也今考此亦不書歸生伐宋則春秋責宋之意重於責鄭矣以金氏賢曰宋鄭勤民報怨侵伐不已故皆書帥師著其勞民之罪命季氏本曰歸生帥師伐宋報復之兵也而聽於楚不義甚矣華元不能反已息争而輕與之戰至於喪師辱身豈為善謀國哉元黄氏正憲曰左傳云囚華元獲樂呂而經無樂者大将而樂偏裨也案榖梁以戰于韓不書師敗績而書獲為晉侯失民此先書師敗績而後書獲為華元得衆趙氏匡駁之而李氏廉以為亦有理今求之全經凡不書敗其師而書獲其君與将者二戰韓與襄八年鄭獲蔡公子燮也先書敗其師而後書獲其君與将者五是役與荘十年荆敗蔡師以蔡侯歸僖元年魯敗莒師獲莒拏昭二十三年吳敗頓胡沈蔡陳許之師胡子沈子滅獲陳夏齧哀十一年齊師敗績獲齊國書也蔡燮固未聞其所以失民者獻舞夏齧國書亦未聞其有得衆之實似當以師将竝重之義為長今故刪榖梁而主胡傳秦師伐晉左傳秦師伐晉以報崇也遂圍焦焦杜注晉河外邑括地志陜縣有故焦城今在河南府陜州城内胡傳案左氏以報崇也遂圍焦晉用大師於崇乃趙穿私意而無名也故書侵秦人為是興師而報晉則問其無名之罪也故書伐世豈有欲求成於彊國而侵其所與可以得成者乎穿之情見矣宣子當國算無遺䇿獨懵於此哉其從之也而盾之情亦見矣春秋書事筆削因革必有以也一侵一伐而不書圍焦所以誅晉卿上侵之意其所由來者漸矣集說呂氏大圭曰晉文之伯秦與有功晉伯之衰秦與有罪城濮之戰秦從晉以弱楚故晉伯而楚衰自文十六年秦黨楚以滅庸而秦為楚役楚方陵駕北方而秦復興師以伐晉是故楚伯而晉衰晉文之欲與楚争也必得秦而後敢戰此固伯者之慮也楚荘之雄也通秦以軋晉而秦為楚役矣次于厥貉之後楚方有陵駕諸侯之心同盟新城之後諸侯方有懼楚之志盖至於今則鄭復背晉以從楚黨楚以侵陳晉方與楚争則通秦以軋楚可也否則置秦勿問可也而盾之族子曰穿乃興侵崇之謀是啓秦之争也宋方敗於鄭而晉復勞於秦非自致之而誰耶張氏洽曰欲求成而反召兵所以深著趙穿之妄動干戈而欲竊兵權誅其意也之趙氏鵬飛曰秦晉自河曲之戰於今七年無疆埸虞盖亦厭戰爾趙穿無釁而侵崇無損於秦而犯秦怒秦於是有報怨之師書秦曰師曲在晉也夏晉人宋人衞人陳人侵鄭左傳夏晉趙盾救焦遂自陰地及諸侯之師侵鄭以報大棘之役楚鬭椒救鄭曰能欲諸侯而惡其難乎遂次於鄭以待晉師趙盾曰彼宗競於楚殆将斃矣姑益其疾乃去之陰地杜注晉河南山北自上洛以東至陸渾案上洛今西安府洛南縣陸渾今河南府嵩縣其地南阻終南北臨大河所謂河南山北也又河南府盧氏縣東北有陰地城胡傳案左氏趙盾及諸侯之師侵鄭以報大棘之役初鄭歸生受命於楚以伐宋經不書伐而以宋華元主大棘之戰者盖楚人有辭於宋矣師之老壮在曲直晉主夏盟盾既當國合諸侯之師何畏乎楚何避乎鬭椒然力非不足而去之者以理曲也故卿不氏而稱人師書侵而不言伐易於訟卦之象曰君子作事謀始始而不謀将至於興師動衆有不能定者矣晉惟取賂釋宋而不討至以列國之大不能服鄭不競於楚可不慎乎春秋行事必正其本為末流之若此也其垂戒明矣集說杜氏預曰鄭為楚伐宋獲其大夫晉趙盾興諸侯之師将為宋報耻畏楚而還失霸者之義故貶稱人名孔氏穎逹曰諸經貶諸侯之卿稱人者傳皆言其氏此傳惟稱趙盾及諸侯之師侵鄭諸侯之将不言名氏則實是㣲者非貶之也趙盾畏楚而還故貶之稱人釋例曰鄭受楚命伐宋大敗宋師獲其二卿此晉之不競也晉於是申命衆國大起其衆将以雪宋之恥取威定霸趙盾為政而畏越椒之盛不敢遂其所志託辭班師失宋之心孤諸侯之望所以致貶也髙氏閌曰自是楚與晉争晉不能競反有弑逆之禍於是楚益自肆明年遂有問鼎之事侯呂氏大圭曰諸侯之從晉也謂晉之可依也率諸以討宋乃立公子鮑而還是立賊也鄭由是謂晉為不足與而從楚以侵宋晉乃芘宋以伐鄭鄭復使歸生伐宋盖有辭於宋也晉復黨宋以侵鄭一動之非義而與國叛之敵國侮之彼得以奉辭而我罷於奔命至一再而未已也伯主之舉動詎可輕哉在陳氏際㤗曰宋襄圖伯而楚成執於壇坫之上曲楚矣故有城濮之衂宋昭被弑而晉及諸侯昧乎鐘鼓之靈曲在晉矣故有侵鄭之陋秋九月乙丑晉趙盾弑其君夷皋皋公作獆左傳晉靈公不君厚歛以彫牆從臺上彈人而觀其辟丸也宰夫胹熊蹯不熟殺之寘諸畚使婦人載以過朝趙盾士季見其手問其故而患之将諫士季曰諫而不入則莫之繼也會請先不入則子繼之三進及溜而後視之曰吾知所過矣将改之稽首而對曰人誰無過過而能改善莫大焉詩曰靡不有初鮮克有終夫如是則能補過者鮮矣君能有終則社稷之固也豈惟羣臣頼之又曰袞職有闕惟仲山甫補之能補過也君能補過袞不廢矣猶不改宣子驟諫公患之使鉏麑賊之晨往寝門闢矣盛服将朝尚早坐而假寐麑退嘆而言曰不忘恭敬民之主也賊民之主不忠棄君之命不信有一於此不如死也觸槐而死秋九月晉侯飲趙盾酒伏甲将攻之其右提彌明知之趨登曰臣侍君宴過三爵非禮也遂扶以下公嗾夫獒焉明搏而殺之盾曰棄人用犬雖猛何為鬭且出提彌明死之初宣子田於首山舎於翳桑見靈輒餓問其病曰不食三日矣食之舎其半問之曰宦三年矣未知母之存否今近焉請以遺之使盡之而為之簞食與肉寘諸槖以與之既而與為公介倒㦸以禦公徒而免之問何故對曰翳桑之餓人也問其名居不告而退遂自亡也乙丑趙穿攻靈公於桃園宣子未出山而復大史書曰趙盾弑其君以示於朝宣子曰不然對曰子為正卿亡不越境反不討賊非子而誰宣子曰嗚呼我之懷矣自詒伊慼其我之謂矣宣子使趙穿逆公子黑臀於周而立之壬申朝於武宮首山杜注在河東蒲坂縣東南案首山即首陽山今在山西平陽府蒲州東南榖梁穿弑也盾不弑而曰盾弑何也以罪盾也其以罪盾何也曰靈公朝諸大夫而暴彈之觀其辟丸也趙盾入諫不聼出亡至於郊趙穿弑公而後反趙盾史狐書賊曰趙盾弑公盾曰天乎天乎予無罪孰為盾而忍弑其君者乎史狐曰子為正卿入諫不聼出亡不逺君弑反不討賊則志同志同則書重非子而誰故書之曰晉趙盾弑其君夷皋者過在下也胡傳趙穿手弑其君董狐歸獄於盾其斷盾之獄辭曰子為正卿亡不越竟反不討賊以是書斷而盾也受其惡而不敢辭仲尼因其法而不之革其義云何曰正卿當國任事之臣也國事莫酷於君見弑不於其身而誰責乎亡而越竟謂去國而不還也然後君臣之義絶反而討賊謂復讎而不釋也然後臣子之事終不然是盾偽出而實聞乎故也假令不與聞者而縱賊不討是有今将之心而意欲穿之成乎弑矣惡莫慘於意今以此罪盾乃閑臣子之邪心而謹其漸也盾雖欲辭而不受可乎以髙貴鄉公之事觀焉抽戈者成濟倡謀者賈充而當國者司馬昭也為天吏者将原司馬昭之心而誅之乎亦将致辟成濟而足也故陳㤗曰惟斬賈充可以少謝天下耳昭問其次意在濟也泰欲進此直指昭也然則趙穿弑君而盾為首惡春秋之大義明矣微夫子推見至隱垂法後世亂臣賊子皆以詭計獲免而至愚無知如史太鄧扈樂之徒皆蒙歸獄而受戮焉君臣父子不相夷以至於禽獸也幾希故曰春秋成而亂臣賊子懼集說楊氏士勛曰趙盾與許止加弑是同而許君書葬晉靈公不書葬者許止不嘗藥之罪輕故書葬以赦止趙盾不討賊之罪重故不書晉侯葬明盾罪不可原也春秋必加弑於二人者所以見忠孝之至故也忠孝不至則加惡名欲使忠臣覩之不敢惜力孝子見之所以盡心是将來之逺防也趙氏匡曰左氏云仲尼曰惜也越竟乃免案董狐云亡不越竟言行未逺而君被弑反又不討賊状涉同謀爾非謂越竟即無罪也作傳者不逹此意遂傅㑹為此言若然者姦臣令人弑君身越竟而還即為無罪乎劉氏敞曰左氏叙孔子之言曰惜也越竟乃免非也君臣之際當以義為斷使盾遂去晉國雖未越竟不能討賊非其責也今盾還為大夫雖已越竟苟不能討賊此則罪矣然則盾之免與不免在乎討與不討而不在越與不越也杜云越竟則君臣義絶可以不討賊如杜此言與左氏之說未能自合何也哀八年公山不狃曰君子違不適讎國未臣而有伐之奔命焉死之可也安在越竟則君臣之義絶乎吾以為此非仲尼之言同杜氏諤曰盾知靈公欲殺之而心欲弑之是不止謀而實将弑也春秋不可竝書穿盾而擇首罪者以書之亦義之所宜也穿孫氏覺曰盾陰弑其君而陽逃其跡實行其計而受其名者也故孔子以弑賊誅之必待親弑然後罪之則姦臣賊子得以計免而庸愚者常當其實矣程子曰趙穿弑君人誰不知若趙盾之罪非春秋書之更無人知之也朱子曰左氏見識甚卑云孔子曰惜哉越境乃免如此則專是回避占便宜者得計聖人作春秋而亂臣賊子懼豈反為之解免耶胡氏寧曰異姓之卿君有大過則諫反覆之而不聼則去趙盾亡而不反可也反而討賊亦可也盾能討穿司馬昭能討賈充則可免弑君之罪矣故曰春秋誅意二人之不討罪意在於弑君也薛氏季宣曰君将殺盾而穿行弑君之事則主弑者盾也穿受命而加刃者也在律家人共犯止坐尊長威力使令被使為從此春秋之義也弑呂氏祖謙曰盾平日所與親厚者惟穿耳故敢行君之逆盾歸既不討其弑君之罪反使穿逆公子黑臀於周而立之則盾之情無所逃矣禦家氏鉉翁曰晉襄託孤於趙盾乃求君於秦已而秦而立靈公靈反以為憾於是君臣相疑趙氏謀弑非一日矣齊商宋鮑弑君簒國靈公幼弱盾為政為之定簒竊之位於扈之會盟知盾有他志不能事君矣吳氏澂曰趙盾專晉國之政幾二十年境内境外知有盾而不知有公靈公既長不堪其耑遂欲殺盾鉏麑受命不肯殺盾而死提彌明救盾而鬭死靈輒内叛倒㦸免盾於死則盾之私屬與公徒敵無復有臣禮矣君臣既為仇敵非盾弑公則公殺盾勢固不兩立也穿盾之族子平日所愛信之人也弑公而盾乃復穿之弑為盾弑也盾為首惡穿特承意行事者爾盾陽為不知謀以求自免弑君之罪将誰欺乎夫子書曰趙盾弑其君誅首惡也自三傳以來說者多方為盾分釋則是亂賊不可以欺聖人而乃可以欺後儒也邵氏寶曰春秋之筆莫大於斷弑君之獄斷弑君之獄尤莫大於微顯闡幽之二三䇿者是故晉夷皋之弑舎穿而歸盾鄭夷之弑舎宋而歸歸生楚䖍之弑舎觀從而歸比齊荼之弑舎朱毛而歸乞高氏攀龍曰靈公之立本非盾意及專國政國不知君靈公不堪故欲殺盾觀靈輒内叛提明格鬭無復臣禮矣堂上之甲方興桃園之攻随至及其反國非獨置賊不討反使往逆新君則盾之為弑又誰揜乎附録左傳初驪姬之亂詛無畜羣公子自是晉無公族及成公即位乃宦卿之適子而為之田以為公族又宦其餘子亦為餘子其庶子為公行晉於是有公族餘子公行趙盾請以括為公族曰君姬氏之愛子也微君姬氏則臣狄人也公許之冬趙盾為旄車之族使屏季以其故族為公族大夫冬十月乙亥天王崩乙定王卯元年三年晉成公黑臀元年齊惠三年衞成二十九年蔡文六年鄭穆二十二年曹文十二年陳靈八年把桓三十一年宋文五年秦共三年楚荘八年春王正月郊牛之口傷改卜牛牛死乃不郊公羊其言之何緩也曷為不復卜養牲養二卜帝牲不吉則扳稷牲而卜之帝牲在於滌三月於稷者唯具是視郊則曷為必祭稷王者必以其祖配王者則曷為必以其祖配自内出者無匹不行自外至者無主不止榖梁之口緩辭也傷自牛作也改卜牛牛死乃不郊事之變也乃者亡乎人之辭也胡傳乃不郊為牛之口傷改卜牛而牛又死也不然郊矣禮為天王服斬衰周人告喪於魯史䇿已書而未葬也祀帝於郊夫豈其時而或謂不以王事廢天事禮乎春秋以來喪紀浸廢有不奔王喪而逺適他國有不修弔禮而自相聘問固将以是為可舉而不廢也卒至漢文以日易月後世不能復其所由來漸矣春秋備書其義自見集說范氏甯曰牛自傷口非備災之道不至也故以緩辭言之譏宣公不恭致天變髙氏閌曰魯僣郊禮久矣隐桓荘閔不書者聖人不敢無故斥言君父之過故因變異而書也張氏洽曰此因事之變以明魯郊之非禮盖僣禮之中復有忘哀從吉之罪三年之喪乃臣子斬衰奔赴之時豈可僣天子越紼行事之禮春秋所以特書之死黄氏仲炎曰魯郊僣禮也郊牛之口傷改卜牛牛是於僣禮之中又知天意之不享也書家氏鉉翁曰此魯宣除喪始郊而天示之譴也一十有六言辭煩而不厭著其變異異乎常郊之卜不吉者矣宣公簒弑逆理亂常持是饗帝故天譴之也汪氏克寛曰春秋書郊牛災而改卜者四此年改卜之牛又死成七年鼷鼠又傷改卜之牛故皆廢郊定十五年哀元年鼷鼠傷郊牛改卜牛而不復變異皆行郊禮故知不郊者非悔非禮而不郊實以郊牛之洊有災傷不得已而不郊特書乃不郊猶言乃還乃復乃克葬乃者繼事之辭所以著不郊之由繫於郊牛之變異也經書不郊者四成十年襄十一年皆以卜不吉而廢郊則魯君之誠意不足以格天此年成七年牛災廢郊而皆猶三望則天示譴告之意而不知止也猶三望左傳春不郊而望皆非禮也望郊之屬也不郊亦無望可也胡傳三望者公羊曰祭泰山河海夫天子有天下凡宇宙之内名山大川皆其所主也故得祭天而有方望無所不通諸侯有一國則境外之山川他人所主者而可以望乎季氏旅於泰山冉求不能救而夫子責之者為秦山魯侯所主也大夫何與焉季氏不得旅泰山則河海非魯之封内其不得祭亦明矣猶者可已不當為之辭集說吳氏澂曰望祭在郊祀之後因郊而望也魯諸侯也以成王之賜許用王禮四望闕其一殺於天子然郊禮既廢則望禮可以不舉魯既不郊而猶三望故書以譏其非禮汪氏克寛曰襄七年三卜不吉而免牲十一年成十年四卜五卜不吉而不郊雖曰不郊非其本意然因是而止猶庶幾焉僖公末年免牲猶三望此年成七年不郊猶三望可已不已不當為而為其過益甚矣葬匡王胡傳四月而葬王室不君其禮略也微者往會魯侯不臣其情慢也或曰宣公親之者也而常事不書非矣崩葬始終之大變豈以是為常事而不書也集說徐氏彥曰去年十月天王崩至今年春未滿七月即文九年傳所謂不及時書也呂氏大圭曰經書王崩而葬者四葬桓王葬匡王則不書其人葬襄王則叔孫得臣也葬景王則叔鞅也或謂桓王匡王之葬皆公親往然以他文考之葬諸侯而使卿者則備而書之其他不書其人者皆為公親往可乎譏家氏鉉翁曰桓王七年而後葬緩也匡王四月而亟葬譏速也附録左傳晉侯伐鄭及郔鄭及晉平士會入盟郔杜注鄭地或云即廩延今開封府之延津縣也楚子伐陸渾之戎渾户門反公作賁渾戎後同榖無之字左傳楚子伐陸渾之戎遂至於雒觀兵於周疆定王使王孫滿勞楚子楚子問鼎之大小輕重焉對曰在徳不在鼎昔夏之方有徳也逺方圖物貢金九牧鑄鼎象物百物而為之備使民知神姦故民入川澤山林不逄不若螭魅罔兩莫能逄之用能協於上下以承天休桀有昏徳鼎遷於商載祀六百商紂暴虐鼎遷於周徳之休明雖小重也其姦回昏亂雖大輕也天祚明徳有所底止成王定鼎於郟鄏卜世三十卜年七百天所命也周徳雖衰天命未改鼎之輕重未可問也胡傳陸渾在王都之側戎夏雜處族類不分楚又至洛觀兵於周疆問鼎之大小輕重焉故特書於䇿集說杜氏預曰允姓之戎居陸渾在秦晉西北僖二十二年秦晉遷之於伊川遂從戎號陳氏傅良曰楚伐陸渾窺周室也左呂氏祖謙曰楚荘王之在春秋時皆謂之賢君如氏載其築京觀之事甚詳亦以為賢考其觀兵於周問鼎之大小輕重則傲然有簒逆無君之心雖有終身之小善亦盖覆不過渾趙氏鵬飛曰陸渾在伊洛之間逼近王城楚於陸無絲髮之憾荘王之兵非疾陸渾也盖将撼周鼎焉霸業以尊周為義舎尊周無以令諸侯而荘王首犯天下之忌其不能覇諸侯而徒為戎首無足怪者夏楚人侵鄭左傳夏楚人侵鄭鄭即晉故也胡傳案左氏晉侯伐鄭鄭及晉平而經不書者仲尼削之也鄭本以晉靈不君取賂釋賊為不足與似也而往從楚非矣今晉成公初立背僣竊偽邦而歸諸夏則是反之正也春秋大改過許遷善書楚人侵鄭者與鄭伯之能反正也故獨著楚人侵掠諸夏之罪爾鄭既見侵於楚則及晉平可知矣集說家氏鉉翁曰晉靈惟貨是狗是以失鄭成公繼世雖未有大過人而鄭遽棄異即同盖人心義理之同然非威驅勢廹所能得也不然趙盾合諸侯之師以伐鄭略無成功今息兵踰年鄭何為而自至乎春秋繼伐陸渾而書楚人侵鄭惡楚荘圖伯之急也趙氏孟何曰先是傳載晉侯伐鄭及郔鄭及晉平士會入盟矣然何以不書以鄭之反覆乎晉楚之間非得已也故書晉楚之侵伐則鄭向背可知而凡以侵伐取成者不悉書雖晉君自将亦不書荘余氏光曰春秋繼伐陸渾而書楚人侵鄭惡楚也秋赤狄侵齊赤狄始見經集說許氏翰曰楚侵其南狄侵其北此齊國棟撓之時也張氏洽曰赤狄狄之别種謂之赤狄白狄俗尚赤衣白衣也地譜洺州春秋赤狄之地其家氏鉉翁曰狄忽分為二春秋著赤狄白狄之號後晉滅赤狄因其分也先儒以赤狄為唐叔子孫似未然余氏光曰赤狄隗姓别為一種在山西潞州以北而東界黎城即古黎國也其種有潞氏甲氏留吁壤地相連者也赤狄距齊甚逺今其侵齊始見於經宋師圍曹左傳宋文公即位三年殺母弟須及昭公子武氏之謀也使戴桓之族攻武氏於司馬子伯之館盡逐武穆之族武穆之族以曹師伐宋秋宋師圍曹報武氏之亂也胡傳案左氏宋文公即位盡逐武穆之族二族以曹師伐宋然不書於經者二族以見逐而舉兵非討罪也及宋師圍曹報武氏之亂而經書之者端本清源之意也武穆二族與曹之師奚為至於宋哉不能反躬自治恃衆彊以報之兵革何時而息也宋唯有不赦之罪莫之治也故書法如此集說髙氏閌曰武氏之亂非曹人所致也宋不能内睦九族而興兵以圍人之國不亦左乎家氏鉉翁曰宋鮑大罪未討以兵伐人春秋書之即所以惡之不待貶斥而見矣冬十月丙戌鄭伯蘭卒左傳冬鄭穆公卒初鄭文公有賤妾曰燕姞夢天使與已蘭曰余為伯鯈余而祖也以是為而子以蘭有國香人服媚之如是既而文公見之與之蘭而御之辭曰妾不才幸而有子将不信敢徴蘭乎公曰諾生穆公名之曰蘭文公報鄭子之妃曰陳媯生子華子臧子臧得罪而出誘子華而殺之南里使盗殺子臧於陳宋之間又娶於江生公子士朝於楚楚人酖之及葉而死又娶於蘓生子瑕子俞彌俞彌早卒洩駕惡瑕文公亦惡之故不立也公逐羣公子公子蘭奔晉從晉文公伐鄭石癸曰吾聞姬姞耦其子孫必蕃姞吉人也后稷之元妃也今公子蘭姞甥也天或啓之必将為君其後必蕃先納之可以亢寵與孔将鉏侯宣多納之盟於大宮而立之以與晉平穆公有疾曰蘭死吾其死乎吾所以生也刈蘭而卒南里杜注鄭地襄二十六年楚子伐鄭入南里疑即此葉杜注楚地南陽葉縣今河南南陽府葉縣南三十里有古葉城葬鄭穆公穆公作繆集說趙氏鵬飛曰葬不月闕文也丙戌卒而丙戌葬無是理矣諸侯五月而葬今十月卒則葬在三月之間爾鄭之速葬者歸生之謀也歸生将不利於嗣君故速葬而成其逆焉吳氏澂曰葬速禮不備也丙定王辰二年四年晉成二年齊惠四年衞成三十年蔡文七年鄭靈公夷元年曹文十三年陳靈九年杞桓三十二年宋文六年秦共四年楚荘九年春王正月公及齊侯平莒及郯莒人不肯公伐莒取向郯國名漢置郯縣地理志故郯國也今為郯城縣屬山東兗州府故郯城在縣西南境向杜注莒邑東海承縣東南有向城逺疑也古承縣在今嶧縣西北一里去莒誠逺寰宇志莒州南七十里有向城参會道里差為近之今州屬山東青州府左傳四年春公及齊侯平莒及郯莒人不肯公伐莒取向非禮也平國以禮不以亂伐而不治亂也以亂平亂何治之有無治何以行禮榖梁及者内為志焉爾平者成也伐猶可取向甚矣胡傳心不偏黨之謂平以此心平物者物必順以此心平怨者怨必釋惟小人不能宅心之若是也雖以勢力彊之而有不獲成者矣夫以齊魯大國平郯莒小邦宜其降心聼命不待文告之及也然而莒人不肯則以宣公心有所私繫失平怨之本耳故書取以著其罪及所欲也平者成也取者盗也不肯者心弗允從莫能彊之者也以利心圖成雖彊大不能行之於弱小春秋書此戒後世之不知治其本者故行有不得者反求諸己斯可矣集說啖氏助曰公羊云其言不肯何辭取向也聖人設教豈為魯欲取向而妄加莒事乎趙氏匡曰榖梁云弗肯者可以肯也案書不肯者明莒非以他事見伐且譏公又曰伐莒義兵也案非王命又非侯伯安得稱義乎爾劉氏敞曰何言乎莒人不肯公伐莒取向譏何譏平莒及郯義也莒人不肯吾有不義焉伐莒彊也取向利也非君子之道也君子之道猶射射者正己而發發而不中不怨勝己者反求諸己而已矣小王氏葆曰及有二義及齊公之志也及郯以大及也髙氏閌曰莒郯相怨而郯乃魯婚姻之國公欲為郯平莒而挾齊以為重公之義不足服莒之心莒所以不肯也肯者心以為然而從之也曰莒人見其不肯者非特其君也不知自反而取邑於人亦已甚矣公既無以得莒後書郯伯姬來歸則郯亦不能固其好也人張氏洽曰易曰貞吉悔亡憧憧往來朋從爾思聖所以感人心而天下和平者此心之公正自足以感之也以宣公而平二小國若出於公不必假齊一言而彼已服今挾齊為重而莒尚不肯伐莒而齊不復與取向以自益春秋深以著此心之不公而終之以為利也趙氏鵬飛曰周禮有調人諧和萬民之難合方氏除邦國之怨惡則平者固君子之事也惟義故能平人之不義已為不義何以詰人之不義哉莒郯有疆埸之怨能直已而平之二國何辭而不屈惠宣負大逆之名於天下冐靦顔而平莒郯宜莒郯之不肯也然莒不肯齊不伐公獨伐之蓋主是平者魯也宣恥於不肯則不能無怒故因伐而取邑焉則其惡尤出齊惠之上信乎其為宣公也春秋諱内惡而此辭煩不殺略無隠避之文聖人於此盖誅之重矣向在莒魯之間隐二年莒人入向向遂滅地屬莒至是為魯所取焉家氏鉉翁曰魯之與莒積不相下徒挾齊人之威力而要莒以必從其不肯也宜哉宣公遽以兵加莒而取其一邑無道甚矣以濟西賂齊而責償於莒春秋首書公及而終之以取向深責之也王氏元杰曰魯挾彊齊以平郯莒假力以為義也及其不服取向而還假義以為利也春秋書及以見公之所欲書取以著貪利之罪宋李氏廉曰宣公平莒郯而伐莒取向正與桓公平鄭而伐宋戰宋相類盖二公皆不義失平怨之本也父汪氏克寛曰凡書侵伐多不言其所事惟晉陽處伐楚先言伐而後言以救江宣公伐莒先言平莒不肯而後言伐皆指言其事然救江雖非其道而其名則善平莒之名雖善以不肯而至於伐取則又甚焉屬辭比事春秋之權衡見矣秦伯稻卒集說家氏鉉翁曰秦之卒葬或名或不名或葬或不葬秦不告史闕書也夏六月乙酉鄭公子歸生弑其君夷左傳楚人獻黿於鄭靈公公子宋與子家将見子公之食指動以示子家曰他日我如此必嘗異味及入宰夫将解黿相視而笑公問之子家以告及食大夫黿召子公而弗與也子公怒染指於鼎嘗之而出公怒欲殺子公子公與子家謀先子家曰畜老猶憚殺之而况君乎反譛子家子家懼而從之夏弑靈公凡弑君稱臣臣之罪也鄭人立子良辭曰以賢則去疾不足以順則公子堅長乃立襄公襄公将去穆氏而舎子良子良不可曰穆氏宜存則固願也若将亡之則亦皆亡去疾何為乃舎之皆為大夫胡傳首謀弑逆者公子宋也懼譛而從之者歸生也而以歸生為首惡何也夫亂臣賊子欲動其惡而不從者未有能全其身而不死也故季子然問仲由冉求其從之者歟子曰弑父與君亦不從也是以死節許二子矣歸生懼譛而從公子宋特無求路不可奪之死節耳書為首惡不亦過乎曰歸生與宋竝為大夫乃貴戚之卿同執國政可以不從一也嘗統大師與宋戰獲其元帥已得兵權可以不從二也聞宋逆謀登時而覺先事誅之猶反手耳夫據殺生之柄仗大義以制人使人聼已猶犬羊之伏於虎也何畏於人懼其見殺而從之也哉計不出此顧以畜老憚殺比方君父歸生之心悖矣故春秋捨公子宋而以弑君之罪歸之為後世鑒若司馬亮沈慶之等苟知此義則能討罪人不至於失身為賊所制矣集說陸氏淳曰子公弑君之賊也其惡易知子家縱其為逆罪莫大焉書之以為首惡所以教天下之為人臣者也春秋之作聖人本以明微盖謂此也與書趙盾之弑義同陳氏傅良曰歸生為正卿而宋有無君之心非歸生孰禁之於歸生乎謀先然而弗禁則賊由歸生而已矣故歸生之弑公子宋啓之不以罪宋而罪歸生不張氏洽曰歸生位為上卿久執大權國事由已乃能鎮服姦邪遏絶萌蘖又脅於邪謀撓而從之位尊責重故春秋定為戎首以戒大臣不能持正而阿附惡人者所以示國討之法而明事君之義也生呂氏大圭曰宋欲弑而不敢發先以語歸生則歸必有以制其可否之勢勢在歸生而輕以徇人其為首惡宜矣有吳氏澂曰歸生貴戚之卿秉國重權嗣君新立必所不獲於其君者因宋之有邪謀陽為畜老憚殺之言陰實假手於宋以除其君此亂臣之首而宋特其從也程氏端學曰先書歸生帥師而終之以此見大夫專兵國之禍也鑒戒昭矣鄭氏玉曰凡人同惡相濟非同有是心則不敢同謀是事惟歸生有無君之心故宋以無君之事謀之觀鄭人討亂斲子家之棺逐其族則通國以為首惡何必孔子歸獄歸生哉其金氏賢曰鄭之兵權在歸生歸生一聞逆謀當權難易緩急而處之可告則告之可誅則誅之豈有身為大臣手握重柄反制於賊而從其逆哉春秋書歸生弑君非赦宋也盖歸重於歸生耳案左氏謂弑君稱君君無道也非也君雖不君臣安可以不臣乎又以歸生為權不足而譏其仁而不武亦非也歸生位上卿握兵柄何得以為權不足乎亂臣賊子豈可以仁稱之者乎故刪而不録赤狄侵齊集說髙氏閌曰以齊之彊而連年為狄所侵則惠公之無政可知矣秋公如齊公至自齊胡傳君行告至常事不書宣公比年如齊而皆致者危之也夫以簒弑謀於齊而取國以土地賂齊而請會以卑屈事齊而求安上不知有天王下不知有方伯惟利交是奉而可保乎髙固之事亦殆矣故比年如齊而皆致以戒後世之欲利有攸往者惟義之與比為可安耳集說髙氏閌曰公始即位公子遂季孫行父一嵗而三聘齊至是亟朝於齊謹事大國以自固也家氏鉉翁曰公比年如齊皆備書之非惟危公亦以正齊侯黨簒之罪汪氏克寛曰宣公以簒得國上不畏司馬九伐之誅下不畏鄰國大夫沐浴之請固以始謀於齊繼薦賄焉而惠公援之甚力為足恃也而不知彼能制吾死生之命安危榮辱繫於齊君大夫嚬笑之頃明年髙固使齊侯止公宣公得不甚懼矣乎盟會之書至始於桓公之盟唐朝大國而屢書至始於宣公之如齊春秋盖危桓宣之不得返而又歎其不見討也附録左傳初楚司馬子良生子越椒子文曰必殺之是子也熊虎之状而豺狼之聲弗殺必滅若敖氏矣諺曰狼子野心是乃狼也其可畜乎子良不可子文以為大慼及将死聚其族曰椒也知政乃速行矣無及於難且泣曰鬼猶求食若敖氏之鬼不其餒而及令尹子文卒鬬般為令尹子越為司馬蔿賈為工正譛子揚而殺之子越為令尹已為司馬子越又惡之乃以若敖氏之族圄伯嬴於轑陽而殺之遂處烝野将攻王王以三王之子為質焉弗受師於漳澨秋七月戊戌楚子與若敖氏戰於皋滸伯棼射王汏輈及鼓跗著於丁寧又射汏輈以貫笠轂師懼退王使廵師曰吾先君文王克息獲三矢焉伯棼竊其二盡於是矣鼓而進之遂滅若敖氏初若敖娶於䢵生鬬伯比若敖卒從其母畜於䢵滛於䢵子之女生子文焉䢵夫人使棄諸夢中虎乳之䢵子田見之懼而歸夫人以告遂使收之楚人謂乳榖謂虎於菟故命之曰鬬榖於菟以其女妻伯比實為令尹子文其孫箴尹克黄使於齊還及宋聞亂其人曰不可以入矣箴尹曰棄君之命獨誰受之君天也天可逃乎遂歸復命而自拘於司敗王思子文之治楚國也曰子文無後何以勸善使復其所改命曰生轑陽杜注楚邑漢武帝延和二年封江喜為轑侯即此烝野杜注楚邑漳澨杜注漳水邉漳水出新城沶郷縣至當陽縣東南五十里與沮水合名合溶渡當陽今屬湖廣安陸府皋滸杜注楚地路史英六貳軫皆皋地皋陶之所封也後皆屬楚䢵杜注國名通典䢵或作鄖今湖廣徳安府安陸縣有鄖城古鄖國也今夢中杜注夢澤名江夏安陸縣東南有雲夢城湖廣徳安府雲夢縣治是也冬楚子伐鄭左傳冬楚子伐鄭鄭未服也集說杜氏預曰前年楚侵鄭不獲成故曰未服至張氏洽曰楚自去年至十年侵伐鄭者凡五十一年盟鄭辰陵而鄭又徼事晉於是明年圍鄭入之遂敗晉于邲而後鄭服楚晉之不振有自來矣趙氏鵬飛曰鄭弑其君諸侯不問而楚伐為有辭雖楚兵之興志於得鄭非為討罪而來也然其兵之壓境未必不以是為辭聖人亦因其辭而權與之非予楚也責晉重矣李氏廉曰此書子者胡氏所謂歸生弑君諸侯未有致討者而楚人至焉故與之也晉成公即位之後楚兵再至鄭矣丁定王巳三年五年晉成三年齊惠五年衞成三十一年蔡文八年鄭襄公堅元年曹文十四年陳靈十年把桓三十三年宋文七年秦桓公榮元年楚荘十年春公如齊左傳五年春公如齊高固使齊侯止公請叔姬焉夏公至自齊左傳夏公至自齊書過也集說杜氏預曰公既見止連昏於鄰國之臣厭尊毁列累其先君而於廟行飲至之禮故書之以示過諱汪氏克寛曰宣公五如齊惟此年踰時始返經雖止公之跡而比事觀之其實亦不可揜矣然則宣公之朝齊皆有危殆之憂而此行尤甚也秋九月齊高固來逆子叔姬左無子字左傳秋九月齊髙固來逆女自為也故書曰逆叔姬卿自逆也榖梁諸侯之嫁子於大夫主大夫以與之來者接内也不正其接内故不與夫婦之稱也胡傳案左氏公如齊髙固使齊侯止公請叔姬焉書夏公至自齊秋齊髙固來逆子叔姬罪宣公也其曰來者以公自為之主諸侯嫁女於大夫主大夫以與之者為體敵也而公自為之主壓尊毁列卑朝廷慢宗廟矣夫以鄭國褊小楚公子圍之貴驕彊大來娶於鄭子產辭而却之使館於外欲野賜之幾不得撫有其室而宣公以魯國周公之後逼於髙固請婚其女彊委禽焉而不能止惟不知以禮為守身之榦是以得此辱也春秋詳書為後世鑒欲人之必謹於禮以定其位不然卑巽妄說不近於禮奚足逺耻辱哉集說杜氏預曰適諸侯稱女適大夫稱字所以别尊卑也髙固齊大夫不書女歸降於諸侯孔氏穎逹曰僖五年公孫兹如牟注云娶於牟也卿非君命不越竟故奉公命聘於牟因自為逆然則此髙固亦是因來聘而自逆也經書公孫兹如牟是以聘為文此髙固以逆為文不言聘者此二者皆以非君之命不得越竟請君行聘而因自逆妻本意為逆不為聘也從魯而出私娶輕而君命重故書聘不書逆自外而來則嫁女重而受聘輕故書逆不書聘内外之異文耳楊氏士勛曰莒慶已發傳今重發之者苕慶小國之大夫高固齊之尊卿而娶公之同母姊妹嫌待之禮殊故發傳明其不異也髙氏閌曰髙固之娶叔姬之嫁齊許之來魯與之婚皆非禮也土黄氏仲炎曰魯宣公以不義得國倚彊齊以自固田薦賄玉帛造庭舉千乗之國惟齊是聼今遂見偪於齊連昏於齊之大夫而不敢違焉此孟子所謂人役者也守趙氏鵬飛曰髙氏齊之望也管仲曰有天子之二國髙在則髙氏盖世秉齊政矣齊君要魯而利之齊臣要魯而娶之魯之辱大矣宣公尚以位為榮乎家氏鉉翁曰脅而求昏已為不可而又以大夫伉禮於國君所以陵暴魯國者甚矣春秋書之責魯也責齊也正髙固陵犯之罪也吳氏澂曰宣公負簒國之罪倚齊以安數朝數聘卑身事齊猶以為未甚至齊之臣彊娶其女甘心與之而不敢違自為之主如敵體然盖身為不義故忍恥辱而屈於人下如此曹子臧吳季札彊與之國義不肯受不降其志而常伸於人上者果何人哉叔孫得臣卒集說黄氏震曰其卒不書日諸家皆生義例未必其然或云闕文者恐近之也汪氏克寛曰荘叔也子僑如嗣是為宣伯案得臣卒不書日闕也胡傳據何氏休說以為得臣不能止仲遂逆謀故削云其日非也仲遂身為逆者其卒也且書其日而况得臣乎又季孫行父亦奔走齊國助成逆謀者其左右仲遂尤力而卒亦書日何獨誅於得臣今故取黃氏震說而刪胡傳冬齊高固及子叔姬來左傳冬來反馬也公羊何言乎髙固之來言叔姬之來而不言髙固之來則不可子公羊子曰其諸為其雙雙而俱至者與榖梁及者及吾子叔姬也為使來者不使得歸之意也胡傳左氏曰反馬也禮嫁女留其送馬不敢自安及廟見成婦遣使反馬則髙固親來非禮也又禮女子有行逺父母者嵗一歸寧今見逆踰時未易嵗也而叔姬亟來亦非禮也故書及書來以著齊罪也大夫適他國必有君命與公事否則禮法之所禁而可犯乎惠公許其臣越禮恣行而莫遏髙固委其君踰境自如而不忌則人欲已肆矣凡昏姻常事不書而書此者則以為非常為後世戒也集說何氏休曰禮大夫妻嵗一歸寧叔姬屬嫁而與髙固來如但言叔姬來而不言髙固來則魯負教戒故書髙固明失教戒在固言及者猶公及夫人范氏甯曰髙固受使來聘而與婦俱歸故書及以明非禮荘二十七年冬杞伯姬來僖二十八年秋杞伯姬來皆不言所及是使得歸之意孔氏穎逹曰天子諸侯嫁女留其乗車髙固反馬則大夫亦當留其車留車妻之道也反馬壻之義也婦至質明見於舅姑若舅姑既没則婦入三月乃祭因以三月為反馬之節舅姑存者亦當以三月反馬也法當遣使不合親行故經傳具見其事以示譏敞啖氏助曰大夫非公事與妻出境非禮也劉氏曰何言乎髙固之來譏何譏爾子叔姬來可也髙固來不可也子叔姬來何以可髙固來何以不可嫁女者父母在則歸寧大夫非君命不越疆齊髙固及子叔姬來專行之辭也髙氏閌曰子叔姬不冠夫氏者承上髙固及之也之黄氏仲炎曰齊髙固脅娶魯女而挾以歸寧魯國恥也家氏鉉翁曰反馬不躬至歸寧無竝行髙固列國之卿而挾婦俱來前日以臣伉君猶以為未足更挾婦以要魯宣館甥之禮宣固無所嫌魯之宗廟朝廷實重為之辱矣楚人伐鄭左傳楚子伐鄭陳及楚平晉荀林父救鄭伐陳集說髙氏閌曰去冬之伐稱楚子所以譏鄭也今稱人罪楚也張氏洽曰屢失機會大義不立營營救鄭以致楚人益陵諸侯擕貳兹晉之所以失道歟家氏鉉翁曰經書楚伐而不書晉救者歸生弑君晉當出師討賊今既更嵗因楚師之來而以兵救鄭是當討而不當救也晉人苟能為鄭討賊即所以存鄭楚師将不禦而自去何勞救乎不李氏廉曰此書人者即胡氏所謂興師動衆賊則討唯服鄭之為事故傳稱子經書人貶之也楚兵三至鄭矣戊定王午四年六年晉成四年齊惠六年衞成三十二年蔡文九年鄭襄二年曹文十五年陳靈十一年杞桓三十四年宋文八年秦桓二年楚荘十一年春晉趙盾衞孫免侵陳左傳六年春晉衞侵陳陳即楚故也公羊親弑君者趙穿也親弑君者趙穿則曷為加之趙盾不討賊也何以謂之不討賊晉史書賊曰晉趙盾弑其君夷獆趙盾曰天乎無辜吾不弑君誰謂吾弑君者乎史曰爾為仁為義人弑爾君而復國不討賊此非弑君而何趙盾之復國奈何靈公為無道使諸大夫皆内朝然後處乎臺上引彈而彈之已趨而辟丸是樂而已矣趙盾已朝而出與諸大夫立於朝有人荷畚自閨而出者趙盾曰彼何也夫畚曷為出乎閨呼之不至曰子大夫也欲視之則就而視之趙盾就而視之則赫然死人也趙盾曰是何也曰膳宰也熊蹯不熟公怒以斗摮而殺之支解将使我棄之趙盾曰嘻趨而入靈公望見趙盾愬而再拜趙盾逡廵北面再拜稽首趨而出靈公心怍焉欲殺之於是使勇士某者往殺之勇士入其大門則無人門焉者入其閨則無人閨焉者上其堂則無人焉俯而闚其户方食魚飧勇士曰嘻子誠仁人也吾入子之大門則無人焉入子之閨則無人焉上子之堂則無人焉是子之易也子為晉國重卿而食魚飧是子之儉也君将使我殺子吾不忍殺子也雖然吾亦不可復見吾君矣遂刎頸而死靈公聞之怒滋欲殺之甚衆莫可使往者於是伏甲於宮中召趙盾而食之趙盾之車右祁彌明者國之力士也仡然從乎趙盾而入放乎堂下而立趙盾已食靈公謂盾曰吾聞子之劒盖利劒也子以示我吾将觀焉趙盾起将進劒祁彌明自下呼之曰盾食飽則出何故㧞劒於君所趙盾知之躇階而走靈公有周狗謂之獒呼獒而屬之獒亦躇階而從之祁彌明逆而踆之絶其頷趙盾顧曰君之獒不若臣之獒也然而宮中甲鼓而起有起於甲中者抱趙盾而乗之趙盾顧曰吾何以得此於子曰子某時所食活我於暴桑下者也趙盾曰子名為誰曰吾君孰為介子之乗矣何問吾名趙盾驅而出衆無留之者趙穿縁民衆不說起弑靈公然後迎趙盾而入與之立於朝而立成公黑臀胡傳案傳稱陳及楚平荀林父伐陳經皆不書者以下書晉衞加兵於陳即陳及楚平可知矣以趙盾孫免書侵即林父無辭可稱亦可知矣愛人不親反其仁治人不治反其智晉嘗命上將帥師救陳又再與之連兵伐鄭今而即楚無乃於已有闕盍亦自反可也不内省徳遽以兵加之則非義矣故林父不書伐而盾免書侵以正晉人所以主盟非其道也集說孫氏復曰陳即楚故晉趙盾衞孫免侵陳陳人請成劉氏敞曰公羊曰趙盾弑君何以復見此問之迂者意欲發盾非弑君也不知例不可通也凡弑君復見者寧止盾乎以謂盾復見則非弑君宋萬復見亦非弑君乎又曰榖梁曰其不言帥師何也不正其敗前事非也将尊師少稱将此通例也為榖梁者皆用之矣何忽昏妄乎兵髙氏閌曰趙盾前會衞侯救陳今更與衞孫免加於其國故書侵以正主盟者之罪雖以陳背晉即楚亦以晉救之無功故也陳氏傅良曰趙盾之罪嘗著於春秋其再見曷為無貶自宋萬而下無討賊者則凡人而已矣者趙氏鵬飛曰晉成之立得鄭而失陳鄭所以來歸以鄭襄繼故而立晉成亦繼故而立同惡相求爾而陳所以從楚者以楚之彊而晉權在趙盾不足以庇已也晉内不修徳以來諸侯而徒恃兵以服陳果能得陳乎今盾及衞孫免侵之亦然爾黒壤之盟陳卒不與其後乍歸晉而楚又伐之陳復為楚有陳特視其彊弱以决從違之計實非心服也晉楚争陳自此始故聖人詳録之事朱氏睦㮮曰四明豐氏曰趙盾身負大逆而預國再見於經者足以見晉無臣子耳公羊謂復見則不為弑君豈不謬哉盖弑君者其後有非禮非義之事則見無則不復見矣盾之見者以與衞孫免侵陳耳案公羊叙趙盾之事與左氏略同而責盾以不討賊意亦與左相近惟以趙盾復見為盾非弑君則於義未安宜劉氏敞引弑君之復見以駁之也今故仍存公羊而刪其首二句夏四月附録左傳夏定王使子服求后於齊中秋赤狄伐晉圍懐及邢丘晉侯欲伐之行桓子曰使疾其民以盈其貫将可殪也邢丘杜注河内平皋縣今懐慶府河内縣東南七十里有平皋故城秋八月螽胡傳傳謂螽為榖災虐取於民之效也先是公伐莒取向後再如齊伐萊軍旅數起賦斂既繁戾氣應之矣夫善惡之感萌於心而災祥之應見於事宣公不知舎惡遷善以補前行之愆而用兵不息災異數見年榖不豐國用空乏卒至於改助法而税民盖自此始矣經於螽螟一物之變必書於䇿示後世天人感應之理不可誣當慎其所感也集說劉氏歆曰貪虐取民則螽月程子曰螽蝗也螽髙氏閌曰書八月者惟八有之非歴時也為農災王道所重今以月書則為災不久異於以時書者矣汪氏克寛曰春秋書螽災者十有六而宣公之世有四焉盖身為不義而貪暴於民是以致天災之亟數也冬十月附録左傳冬召桓公逆王后於齊王楚人伐鄭取成而還鄭公子曼滿與子伯廖語欲為卿伯廖告人曰無徳而貪其在周易豐之離弗過之矣間一嵗鄭人殺之欽定春秋傳說彚纂卷十九
