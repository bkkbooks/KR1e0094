body:
  text: 欽定四庫全書欽定春秋傳說彚纂卷三十四定公集說孔氏穎逹曰魯世家定公名宋襄公之子昭公之弟以敬王十一年即位諡法安民大慮曰定壬敬王十辰一年元年晉定三年齊景三十九年衛靈二十六年蔡昭十年鄭獻五年曹隱公通元年陳惠二十一年杞悼九年宋景八年秦哀二十八年楚昭七年呉闔廬六年春王公羊定何以無正月正月者正即位也定無正月者即位後也即位何以後昭公在外得入不得入未可知也曷爲未可知在季氏也定哀多微辭主人習其讀而問其傳則未知己之有罪焉爾榖梁不言正月定無正也定之無正何也昭公之終非正終也定之始非正始也昭無正終故定無正始不言即位喪在外也胡傳元年必書正月謹始也定何以無正月昭公薨于乾侯不得正其終定公制在權臣不得正其始魯於是曠年無君春秋欲謹之而不可也季氏廢大子衍及務人而立公子宋宋者昭公之弟其主社稷非先君所命而專受之於意如者也故不書正月見魯國無君定公無正爾集說孔氏穎逹曰釋例曰癸亥公之喪至自乾侯戊辰公即位喪在外踰年乃入故因五日改殯之節國史用元年即位之禮因以元年爲此年也然則正月之時未有公矣公未即位元必不改而於春夏即稱元年者未改之日必乘前君之年於時春夏當名此年爲昭公三十三年及六月既改之後方以元年紀事及史官定䇿須有一綂不可半年從前半年從後雖則年初亦綂此嵗故入年即稱元年也漢魏以來雖於秋冬改元史於春夏即以元年冠之是有因於古也陳氏岳曰春秋諸公即位之嵗有書即位者有不書即位者然皆備五始以謹其始唯定公即位苐書元年春王而不書正月孫氏復曰不書正月者定公未立不與季氏承其正朔也是時季氏專國昭公薨于乾侯及嵗之交定又未立故略不書焉所以黜彊臣而存公室也其劉氏敞曰定非正始奈何昭公薨于乾侯季氏逆䘮至於壊隤公子宋先入以主社稷蓋受之季氏也非受之先君者也月杜氏諤曰定公元年之正月政無所繫故不書正然必書王者春秋樹王法不可不書王以端本也且王者所以正天下天下不可無王故不可以不存也正者所以繫一國今國之政無所稟故不復出正月之文以見魯國無正而不與季氏之專也程氏迥曰定公未立先書元年春者追書之也未薛氏季宣曰元年書正以正其始昭公已卒定公克踐阼是昭公之末世未得爲定公之始年也政張氏洽曰昭公自去年十二月薨于乾侯魯國之聽命彊臣不書正月見一國之無主而正朔之無所承也正趙氏鵬飛曰羣公之元年不以有事無事皆書王月謹始也嵗之終天子頒來嵗之正朔於諸侯諸侯受而行之所以尊王室而大一綂也王室既微正朔之頒與否固不可知而天下諸侯實用周正無改也春秋不從其不頒而廢一綂之義故於元年必書王正月焉此春秋所以行天子之權歟然十二公之中惟定元年不書正月蓋昭公死于乾侯定公未立政在季氏魯實無君何以成正朔哉故不書正者聖人不與季氏得承正朔也家氏鉉翁曰子惡之弑宣公之立襄仲立之也春秋猶書正月今昭薨定立季氏立之而不書正月者正月者天王以頒朔於諸侯諸侯受之而頒之國中者也惡弑宣簒是雖爲簒而魯猶有君今昭公之喪未返公子宋未立魯無君也魯無君而季氏自以爲君頒朔於廟如常禮春秋黜之故書王不書正書王明王法以治季氏也不書正月正朔非季氏所得而頒也前此公雖在外而嵗首必書公在存公也存公是故頒朔今公已卒於外嗣子爲賊臣所廢魯國無君是故不書正月見魯國無正王朔在廟非賊臣所得頒也李氏廉曰隠元年事在三月莊元年亦事在三月定元年亦事在三月然隠莊皆書正月則定公之無正始可知矣蓋隠莊雖無正始而即位皆在正月則定即位在六月故也又曰定哀多微辭公羊之言是也然何氏指定定公無正新作雉門喪失國寳黄池之㑹獲麟五事以當之則非本旨矣汪氏克寛曰秦以前皆踰年即位漢惠以後即位於先君即世之年然猶踰年改元自漢帝禪即位改元於昭烈崩之次月厥後皆一年二君而兩建元矣然朱子綱目必大書先君之年分注嗣君之改元以爲君臣父子之教所闗甚大皆取法於春秋踰年改元之意此年雖定公未即位而追書元年春者以昭公已薨則是年實嗣君之年不可不書元年春亦猶晉建武元年愍帝既廢元帝始於三月即晉王位而綱目追書建武元年春正月也邵氏寳曰定無正而有春王春王三月也事在三月故以三月書趙氏恒曰元年正月即位即位者有國之始正月所以正即位也即位則有書有不書元年之正月無不書者二年以後正月則有不書矣魯於是曠年無君史雖追書即位後所改之年以繫前半年之月日而正月未即位實與他公不同故比於常年而以王三月繫執仲幾之事而不書正月也矣余氏光曰春秋二百四十二年間書春王三月屢非獨定也不書正月無事也二月無事亦不書三月晉人執仲幾書以誌晉之無王非爲魯無君也案元年不書正月杜氏預以爲公即位在六月故也先儒多從之謂不與季氏以頒朔甚合情事公羊以爲正即位穀梁以爲無正始二說皆可相通蓋因其無正而正之也邵氏寳趙氏恒余氏光皆謂正月二月無事故書三月亦是一說三月晉人執宋仲幾于京師大夫專執於是始左傳春王正月辛巳晉魏舒合諸侯之大夫於狄泉將以城成周魏子涖政衛彪傒曰將建天子而易位以令非義也大事奸義必有大咎晉不失諸侯魏子其不免乎是行也魏獻子屬役於韓簡子及原夀過而田於大陸焚焉還卒於甯范獻子去其柏椁以其未復命而田也孟懿子㑹城成周庚寅栽宋仲幾不受功曰滕薛郳吾役也薛宰曰宋爲無道絶我小國於周以我適楚故我常從宋晉文公爲踐土之盟曰凡我同盟各復舊職若從踐土若從宋亦唯命仲幾曰踐土固然薛宰曰薛之皇祖奚仲居薛以爲夏車正奚仲遷於邳仲虺居薛以爲湯左相若復舊職將承王官何故以役諸侯仲幾曰三代各異物薛焉得有舊爲宋役亦其職也士彌牟曰晉之從政者新子姑受功歸吾視諸故府仲幾曰縱子忘之山川鬼神其忘諸乎士伯怒謂韓簡子曰薛徵於人宋徵於鬼宋罪大矣且已無辭而抑我以神誣我也唘寵納侮其此之謂矣必以仲幾爲戮乃執仲幾以歸三月歸諸京師城三旬而畢乃歸諸侯之戍齊髙張後不從諸侯晉女叔寛曰周萇𢎞齊髙張皆將不免萇叔違天髙子違人天之所壊不可支也衆之所爲不可奸也大陸杜注禹貢大陸在鉅鹿縣北嫌絶逺疑此田在汲郡呉澤荒蕪之地案呉澤陂在今懐慶府修武縣北一名太白陂即三橋陂也武甯杜注今修武縣近呉澤孔氏頴逹曰甯即修城也案今修武縣治西有修武故城水經注修武故甯也韓詩外傳武王伐紂勒兵於甯更名甯曰修武榖梁此其大夫其曰人何也微之也何爲微之不正其執人於尊者之所也不與大夫之伯討也胡傳案左氏諸侯㑹城成周宋仲幾不受功曰滕薛郳吾役也爲是執之則有罪矣書晉人執仲幾于京師則貶辭也以王事討有罪何貶乎案周官司隸掌凡囚執人之事屬於司宼凡諸侯之獄訟定以邦典凡卿大夫之獄訟斷以邦法則大司宼之職也不告諸司宼而執人於天子之側故雖以王事討有罪猶貶凡此類皆簒弑之萌履霜之漸執而書其地謹之也每謹於初而禍亂熄矣集說杜氏預曰晉執人於天子之側而不以歸京師故但書其執不書所歸孫氏復曰春秋之義諸侯不得專執況大夫乎宋仲幾㑹城成周韓不信陪臣也非天子命執仲幾於天子之側甚矣故曰晉人執宋仲幾于京師以疾之仲孫氏覺曰諸國之大夫相率而城天子之都義也幾不受功不義也以義而討不義當也然而在尊者之側請命而後執可也既不請命則歸於王可也諸侯執人而自治之猶以爲不可在尊者之側既不請命又不歸於王其無王甚矣其稱人以爲雖執得其罪不與其專也黄氏仲炎曰晉人執衛侯歸之于京師是諸侯執人於天子之側也晉人執宋仲幾于京師是大夫執人於天子之側也由諸侯之無王以至於大夫之無王則其變極矣家氏鉉翁曰不告王不歸司宼用霸討於天王之側無王也是故不以城爲王事而略晉大夫之罪李氏廉曰此條以事言之則以王事討有罪以義言之則大夫專執人於王側而不歸之王吏故春秋亦不與以伯討穀梁胡氏是矣公羊以爲大夫不得專執則是以于京師爲伯討則非夏六月癸亥公之喪至自乾侯戊辰公即位左傳夏叔孫成子逆公之喪於乾侯季孫曰子家子亟言於我未嘗不中吾志也吾欲與之從政子必止之且聽命焉子家子不見叔孫易幾而哭叔孫請見子家子子家子辭曰羈未得見而從君以出君不命而薨羈不敢見叔孫使告之曰公衍公爲實使羣臣不得事君若公子宋主社稷則羣臣之願也凡從君出而可以入者將唯子是聽子家氏未有後季孫願與子從政此皆季孫之願也使不敢以告對曰若立君則有卿士大夫與守龜在羈弗敢知若從君者則貌而出者入可也宼而出者行可也若羈也則君知其出也而未知其入也羈將逃也喪及壞隤公子宋先入從公者皆自壞隤反六月癸亥公之喪至自乾侯戊辰公即位胡傳昭公之薨已越葬期猶未得返至於六月癸亥然後喪至而定之即位乃在是月之戊辰蓋遲速進退爲意如所制不得專也以周書顧命考之成王之崩在四月乙丑宰臣太保即於是日命仲桓南宫毛俾爰齊侯吕伋以二干戈虎賁百人逆王世子釗於南門之外延入翼室宅憂爲天下主不待崇朝而後定也今昭公喪至在葬期之後公子宋自壞隤先入猶未得立是知爲意如所制不得以時定非謂正棺乎兩楹之間故定之即位不可不察也夫即位大事也宗嗣先定則變故不生蓋代君享國而主其祭宜戚宜懼一失機㑹或萌窺伺之心至於生變則爲不孝矣古人所以貴於早定國家之本也今昭公之薨定公之即位春秋詳書於策非爲後法乃見諸行事爲永鑒耳集說趙氏匡曰即位皆於朔日故不書日定公待昭公喪至既殯而即位故書日程子曰定公至六月方即位見季氏之制也禮髙氏閌曰季氏既逐其君君薨又不即以國君喪迎之今又廢其嫡嗣而專立其弟宋不擇所處汙於僞誘於利昭公喪至五日而殯遂自即位此非受之先君而專受之意如者也既爲意如所立故不復討意如之罪以家氏鉉翁曰定公之立不書即位正也今書即位其簒君之子受位於賊特書即位以正之也定公而能執子臧季札之讓逃而去之夫然後於義爲盡今也受位於賊臣曾不曰先君有嫡子在我不當立偃然自以爲己之所當得是與簒何逺哉春秋書即位從桓宣之例夫豈與之亦以誅之也幸汪氏克寛曰定公爲逐君者所立受之而不討賊於禍而忘其讎訹於利而忘其辱故雖内無所承上不禀命亦如其意而書即位以著其自立之罪比於文成襄昭哀而無貶者美惡不嫌同詞先季氏本曰務人公衍季氏所忌公喪至壞隤而宋入意如抑使聽已所爲故不以時定位如昭公禮皆從薄葬太速祔太遲是也豈爲喪紀而君宋於五日之後哉王氏樵曰昭公薨至是閱七月矣已越葬期而喪始至喪至五日而定公始立蓋意如無君不以禮正先君後君之終始逆之緩立之緩皆不以時其惡著矣位余氏光曰元凱曰諸侯薨五日而殯殯則嗣子即昭公喪自外歸斂事已畢何待五日而後殯乎不過假此以持宋而樹已援立之恩耳秋七月癸已葬我君昭公左傳季孫使役如闞公氏將溝焉榮駕鵞曰生不能事死又離之以自旌也縱子忍之後必或恥之乃止季孫問於榮駕鵞曰吾欲爲君諡使子孫知之對曰生弗能事死又惡之以自信也將焉用之乃止秋七月癸巳葬昭公於墓道南孔子之爲司宼也溝而合諸墓集說吕氏本中曰葬必曰我君所以隆君父之恩盡忠愛之義至於此時詳味書法然後有以大警動於其臣下者遽髙氏閌曰昭公薨半載餘始以喪歸歸及踰月而葬見魯之臣子無恩於先君如此氏趙氏鵬飛曰八月而葬其故可知逆李廉曰昭公書葬罪魯不以季氏爲也九月大雩集說陸氏淳曰公穀言月雩正秋冬大雩皆非正也毛澤未盡人力未竭未可雩啖子曰雩者以祈雨也若待毛澤盡人力竭雖雨何救哉蓋傳以日月爲例故有此分别又曰古之神人有應上公者通乎隂陽君親帥諸大夫而請焉趙子曰案大雩即山林川澤能興雲雨而皆祈焉不必專於上公也薛氏季宣曰有三年之喪而行大雩之禮見三桓之無上也立煬宫煬羊讓反左傳昭公出故季平子禱於煬公九月立煬宫公羊煬宫者何煬公之宫也立者何不宜立也立煬宫非禮也榖梁立者不宜立者也胡傳煬公伯禽之子其曰立者不宜立也喪事即逺有進而無退宫廟即逺有毁而無立集說杜氏預曰煬公伯禽之子也其廟已毁季氏禱之而立其宫書以譏之張氏洽曰季氏妄禱而踰祀典以立久祧之宫聖人特書必有曾謂煬公不如林放之歎乎黄氏仲炎曰立煬宫猶立武宫也神家氏鉉翁曰公薨於外魯之大慼而意如以爲獲靈之祐爲煬立宫其無忌憚之心何所不爲哉立萬氏孝恭曰煬公考公之弟也魯之以弟繼兄而蓋始乎此昭公之在魯已立公爲爲大子及其居鄆又黜公爲而立公衍則國固有適嗣矣季孫舍適嗣不立而立定公定公乃昭公之弟季孫恐人之議已於是而立煬宫其意若曰煬公以弟而繼兄魯一生一及之所自始今定公以弟而繼昭公則亦煬公之以弟而繼考公者也則舍公衍公爲而立定公者非吾之私意蓋魯國之舊制爾汪氏克寛曰季孫行父立武宫已爲非禮矧煬公至昭公已二十世廟毁已久而復立意如得罪於魯之先祖擢髪不足數而猶欲謟事煬公以徼福吾知煬公之不饗其祭也附録左傳周鞏簡公棄其子弟而好用逺人冬十月隕霜殺菽榖梁未可以殺而殺舉重可殺而不殺舉輕其曰菽舉重也集說杜氏預曰周十月今八月隕霜殺菽非常之災范氏甯曰建酉之月隕霜殺菽非常之災舉殺豆則殺草可知不殺草則不殺菽亦顯僖三十三年隕霜不殺草是也孔氏穎逹曰月令九月霜始降八月未應霜殺菽菽者大豆之苗又是耐霜之榖今以八月隕霜霜能殺菽是非常之災故書之楊氏士勛曰隕霜二文不同書故范特爲一例傳嫌獨殺菽不害餘物故以輕重别之菽易長而難殺故以殺之爲重重者殺則輕者死矣輕而不死重者不殺居然可知髙氏閌曰菽草之難殺者也言殺菽則草皆死矣言不殺草則知菽亦不死也則趙氏鵬飛曰周之十月夏之八月也詩九月肅霜八月非隕霜之時而隕霜殺菽常寒之證也僖三十三年十二月隕霜不殺草宜殺而不殺也今十月隕霜殺菽不宜殺而殺也亦由人君之刑賞不中焉天變不妄發必有其應噫安得皇極之主敘九疇則常寒之證不作矣案公羊以爲記異何氏休謂獨殺菽不殺他物爲異其說非也榖梁舉重之說得之癸敬王十已二年二年晉定四年齊景四十年衛靈二十七年蔡昭十一年鄭獻六年曹隠二年陳惠二十二年把悼十年宋景九年秦哀二十九年楚昭八年呉闔廬七年春王正月附録左𫝊二年夏四月辛酉鞏氏之羣子弟賊簡公夏五月壬辰雉門及兩觀災觀工喚反集說杜氏預曰雉門公宫之南門兩觀闕也天火曰災孔氏穎逹曰明堂位云庫門天子皋門雉門天子應門是魯之雉門公宫南門之中門也釋宫云觀謂之闕郭璞曰宫門雙闕周禮大宰正月之吉縣治象之法於象魏使萬民觀治象鄭衆云象魏闕也劉熙釋名云闕在門兩旁中央闕然爲道也然則其上縣法象其狀魏魏然髙大謂之象魏使人觀之謂之觀是觀也象魏也闕也一物而三名也觀與雉門俱災則兩觀在雉門之兩旁矣天之所災不可意卜公榖言主災兩觀以門尊先門若災先從門起又將何以爲異丘明無文或是災起雉門而延及兩觀也趙氏匡曰此自雉門延及兩觀義理分明據實成文耳公榖乃曰自兩觀始違經妄說殊可怪也災孫氏復曰其言雉門及兩觀災者雉門與兩觀俱也雉門兩觀天子之制微劉氏敞曰其言及何災自雉門始也公羊曰兩觀也又曰主災者兩觀也皆非也災有先後據見而書譬猶六鶂退飛也視之則六察之則鶂審之則退飛何至顛倒先後彊出尊卑乎尋繹其意所以迷惑者以謂桓宫僖宫災不言及也彼自火竝出燒之莫知次序故直以逺者序上耳又云曷爲不言雉門災及兩觀其意以下新作雉門及兩觀爲比亦非也新作可序上不可序下災可序下不可序上何足致疑而問之乎魯杜氏諤曰魯以周公之故立雉門兩觀僣天子也之僣禮聖人譏之必因其事而託義焉此雉門兩觀其僣久矣若不災則不可得而録之今災及而書實譏其僣也李氏廉曰此條公榖惑於僖宮桓宮災不言及之說遂以爲此兩觀先災春秋不以微及大不以畀及尊故先言雉門尊之也此說非大概桓宫僖宫二廟分明故不必言及此若不言及則嫌於雉門之兩觀獨災耳文法合如此何疑禮余氏光曰雉門象魏之門兩觀在雉門外之兩旁天子五門雉門當中魯有庫雉路三門雉門有兩觀爲中門僣天子之制而非禮也春秋不直斥而因災表義使議禮制度者考焉秋楚人伐呉左傳桐叛楚呉子使舒鳩氏誘楚人曰以師臨我我伐桐爲我使之無忌秋楚囊瓦伐呉師於豫章呉人見舟於豫章而潜師於巢冬十月呉軍楚師於豫章敗之遂圍巢克之獲楚公子繁桐杜注小國廬江舒縣西南有桐鄉今江南安慶府桐城縣北有古桐城即古桐國也與廬江縣接集說許氏翰曰自襄三年書楚公子嬰齊伐呉終於人之則楚力竭矣於是有呉入郢自昭三十二年書呉伐越終於越再入呉於是呉亡呉楚相攻不可殫録故刪取其要如此以爲伐國之戒七書楚伐僅能一克於朱方他役皆敗無功書伐而不書敗者積其陵暴首兵之咎將至於禍敗失國也趙氏鵬飛曰報雞父之役而召柏舉之敗李氏廉曰經書楚伐呉七止此附録左傳邾莊公與夷射姑飲酒私出閽乞肉焉奪之杖以敲之冬十月新作雉門及兩觀公羊其言新作之何修大也修舊不書此何以書譏何譏爾不務乎公室也胡傳書新作者譏僣王制而不能革也雉門象魏之門其外爲庫門而皋門在庫門之外其内爲應門而路門在應門之内是天子之五門也僖公嘗修泮宫復閟宫非不用民力也而春秋不書新作南門則獨書者南非一門也必有不當爲者子家駒以設兩觀爲僣天子是非諸侯之制明矣夫撥亂反正者必本諸身身正者物必正春秋於僣君必書者必正之意也使定公遇災而懼革其僣禮三家陪臣雖欲僣諸侯執國命其敢乎習舊而不知以爲非何以禁季氏之脅其主矣故特書新作以譏之也集說劉氏敞曰榖梁云其以尊者親之何也雖不正也於美猶可也非也此自記事之體耳雉門先災兩觀後災不得不曰雉門及兩觀災若不言及則似雉門之兩觀災雉門乃無恙也既災之後魯人修舊理當先門門者所出入者觀者門飾也各順其序而書之也髙氏閌曰莊二十九年新延廄不言作言作者改舊制而增大之也魯僣天子之禮天示變以警之遇災而不知以爲戒乃更作而新之反加其度焉是魯之僣終無已也特書新作罪在定公也所家氏鉉翁曰定公受位於賊臣舉國以聽賊臣之爲君不能君者也天示之異災及雉門兩觀諸侯所以臨涖其臣民者一朝化爲煨燼變亦駭矣乃又從而新之有加於其舊是謂天變爲不足畏也作李氏廉曰經書新作南門胡氏曰言新有故也言創始也新作雉門及兩觀胡氏曰譏僣王制而不能革也彼以本有而改作之其髙大過常故曰創始此以既災而復爲之其制度無損故曰不能革謝氏曰延廄因舊而葺之故曰新南門雉門兩觀則去舊而爲之故曰新作其說亦是甲敬王十午三年三年晉定五年齊景四十一年衛靈二十八年蔡昭十二年鄭獻七年曹隠三年陳惠二十三年把悼十一年宋景十年秦哀三十年楚昭九年呉闔廬八年春王正月公如晉至河乃復集說孔氏頴逹曰三傳皆無其說不知何故乃復賈逵云刺緩朝見辭失所不諱罪己賈雖爲此解於𫝊無文不可從故杜不言劉炫謂公以六月即位此年便即往朝於事未爲緩也晉人何以辭之若以緩見譴當退謝罪何由此後更無謝處空言罪己經無孫謝自罪之狀復安在乎晉若以緩致辭必當更有譴責何由明年㑹次復得依常班序乃復之意不可縣知程子曰季孫意如上不請於天子下不告於方伯而立定公故晉怒而公徃朝焉晉辭公而復故明年因㑹而請盟于皋鼬家氏鉉翁曰意如死昭於行擁定以簒皆晉大夫爲之羽翼公如晉至河乃復者意如所以操縱其君使之一切聽已也余氏光曰戴氏曰晉之不仁甚矣昭公屢如晉不得入故有季氏之難定公新立至河而復不得入使定何以自立於魯乎二月辛卯邾子穿卒左傳春二月辛卯邾子在門臺臨廷閽以缾水沃廷邾子望見之怒閽曰夷射姑旋焉命執之弗得滋怒自投於牀廢於鑪炭爛遂卒先葬以車五乘殉五人莊公卞急而好潔故及是集說杜氏預曰再同盟子汪氏克寛曰莊公也在位三十三年益嗣是爲隠公夏四月秋葬邾莊公附録左傳秋九月鮮虞人敗晉師於平中獲晉觀虎恃其勇也平中杜注晉地冬仲孫何忌及邾子盟于拔拔公作枝在拔杜注地闕或曰當兗州府境左傳冬盟于郯修邾好也郯杜注即拔也集說許氏翰曰公至河乃復晉之輕魯也仲孫及邾子盟魯之輕邾也當昭公時祲祥之㑹猶未爾也罪胡氏銓曰邾莊公卒未踰年而邾君出盟邾固可何忌與之盟又甚焉君子不奪人之親亦不可奪親也何忌不顧邾子之喪而與之盟奪人之親邾子當喪而出盟奪親也汪氏克寛曰魯以大夫而盟邾君紊君臣之分也邾隠公父喪纔九月而出㑹盟薄父子之親也哀二年取漷沂田州仇何忌竝書二卿及邾子盟句繹既奪其地而二大夫脅勢以盟其君則又甚矣季氏本曰邾隠公初立以先君時嘗與何忌同城成周來爲此盟附録左傳蔡昭侯爲兩佩與兩裘以如楚獻一佩一裘於昭王昭王服之以享蔡侯蔡侯亦服其一子常欲之弗與三年止之唐成公如楚有兩肅爽馬子常欲之弗與亦三年止之唐人或相與謀請代先從者許之飲先從者酒醉之竊馬而獻之子常子常歸唐侯自拘於司敗曰君以弄馬之故隠君身棄國家羣臣請相夫人以償馬必如之唐侯曰寡人之過也二三子無辱皆賞之蔡人聞之固請而獻佩於子常子常朝見蔡侯之徒命有司曰蔡君之久也官不共也明日禮不畢將死蔡侯歸及漢執玉而沈曰余所有濟漢而南者有若大川蔡侯如晉以其子元與其大夫之子爲質焉而請伐楚乙敬王十未四年四年晉定六年齊景四十二年衛靈二十九年蔡昭十三年鄭獻八年曹隠四年陳惠二十四年把悼十二年宋景十一年秦哀三十一年楚昭十年呉闔廬九年春王二月癸巳陳侯呉卒集説杜氏預曰未同盟而赴以名癸巳正月七日書二月從赴三月公㑹劉子晉侯宋公蔡侯衛侯陳子鄭伯許男曹伯莒子邾子頓子胡子滕子薛伯杞伯小邾子齊國夏于召陵侵楚晉楚兵交止此左傳春三月劉文公合諸侯于召陵謀伐楚也晉荀寅求貨於蔡侯弗得言於范獻子曰國家方危諸侯方貳將以襲敵不亦難乎水潦方降疾瘧方起中山不服棄盟取怨無損於楚而失中山不如辭蔡侯吾自方城以來楚未可以得志祗取勤焉乃辭蔡侯晉人假羽旄於鄭鄭人與之明日或斾以㑹晉於是乎失諸侯胡傳案左氏傳書伐而經書侵楚者楚爲無道憑陵諸夏爲一裘一馬拘唐蔡二君三年而後遣蔡侯既歸請師於晉晉人請命於周大合諸侯天子之元老在焉若能暴明其罪恭行天討庶幾哉王者之師齊桓晉文之功褊矣有荀寅者求貨於蔡侯弗得遂辭蔡人晉由是失諸侯無功而還書曰侵楚陋之也集說杜氏預曰於召陵先行㑹禮入楚境故書侵也王氏沿曰楚爲不道晉率諸侯爲蔡伐楚正反以不得貨而止故經以無名譏之此孫氏復曰蔡人病楚使告於晉故晉合諸侯於此救蔡伐楚也其言㑹于召陵侵楚者諸侯不振不能救蔡伐楚也故使救蔡伐楚之功歸於彊呉冬蔡侯以呉子及楚人戰于柏舉楚師敗績是也諸程子曰楚恃其彊侵陵諸侯晉上請於天子大合侯以伐之而不能明暴其罪以行天討無功而還故書侵佩許氏翰曰梁丘據說錦幣而昭公不復囊瓦志於裘使蔡侯自絶晉士鞅以賂罷扈之盟荀寅求貨沮召陵之謀故正勝於明時而賄流於衰世此晉霸之所以衰而呉所以横行於上國也楚髙氏閌曰入春秋來蔡人首附楚至是蔡人不勝之陵虐乃告於諸侯而請伐楚晉爲盟主大合諸侯十八國之衆天子使大夫臨之可謂盛矣乃不能攘楚而呉以一國之師敗之晉是以失諸侯呉子主黃池之㑹自此始也以張氏洽曰書十八國諸侯之衆所以見其勢之足有爲也而終之以侵楚深以罪其志卑而義不勝終之以無能爲也而晉自此微矣吕氏大圭曰召陵之㑹晉可以復伯而失其機也夫蔡陳鄭許頓胡蓋服役於楚者也而皆與於㑹則病楚而歸晉也晉自平丘以來不能㑹諸侯者二十四年矣今而上致劉子下合十七國之君以爲此㑹齊桓之師不如是之盛也然齊桓之師書曰伐楚盟于召陵晉定之師書曰㑹于召陵侵楚侵淺事也晉合十七國之君以㑹于召陵徒能侵楚而已是不足與有爲也晉自是無復宗諸侯之望矣家氏鉉翁曰春秋有以書侵書伐見襃貶者兩召陵是也齊桓以八國伐楚而書伐大桓公攘楚之功也晉定以十八國之師伐楚而書侵鄙晉定之無能爲也蓋奉辭伐罪仗義必往然後稱其爲伐師雖衆義雖直而逗撓因循無以副衆人之望是雖伐而不足言伐故書侵以微之蔡侯以呉師入郢春秋貴之昭侯乃隠太子之子明於復讎之義故爲春秋所與是㑹也序之宋公之次諸侯之上及柏舉之戰書蔡侯以呉子學者知柏舉之爲襃則知召陵之爲貶也夫李氏康曰此條陳氏說亦佳然直以爲爲子朝則子當有美辭又明年王人殺子朝於楚不可謂之無功不應書侵故胡氏止從左氏程子而上以能請命爲幸下以不能討楚為譏王氏樵曰案是時晉楚之徳相似也其大夫用事而貪於賄又相似也諸侯兩貳而楚侈無厭縣視與國至以一裘一馬拘唐蔡之君三年而後遣蔡昭侯乃隠太子之子也於是赫然奮其讎恥之志指漢而誓沈玉而濟如晉請師以伐楚晉爲之請命於天子天子爲之特使其老以臨之大合十有八國之君蔡陳鄭許頓胡素屬於楚齊桓晉文之所不能一時悉致而今皆在於㑹可謂盛矣若能奉辭伐罪仗義必徃於以服楚而諸侯之散者復合豈不多於齊桓召陵之功哉而奈之何晉大夫皆隸材也求貨弗得遂辭蔡人潜掠楚境而還是以伐號召而以侵終之故春秋從其實而書之其亦不待貶絶而罪惡見矣余氏光曰楚昭昏庸四鄰不親諸侯叛之於内呉議之於外故晉定一揮而諸侯雲合然晉政已移於六卿晉定直一偶人六卿懼公勝楚而歸功冠五伯而權不及已故乞賂以離蔡假旄以賤鄭用散諸侯之師以隳其君之功而固其私至以十八國之師徒侵楚而已蓋制於六卿而不能進也夏四月庚辰蔡公孫姓帥師滅沈以沈子嘉歸殺之姓公作歸姓音生後同左傳沈人不㑹于召陵晉人使蔡伐之夏蔡滅沈胡傳沈人不㑹于召陵晉人使蔡伐之書滅沈罪公孫姓也書以歸罪沈子嘉也書殺之罪蔡侯也奉詞致討而覆其邦家爲敵所執不死於位皆不仁矣所惡於前無以先後出乎爾者反乎爾者也蔡侯視楚猶沈視蔡也昭公拘於郢三年而後反非以國小而弱乎沈雖不㑹召陵未有大罪惡也而恃彊殺之甚矣能無公孫翩之及哉宋以曹伯陽歸蔡以沈子嘉歸皆殺之也而或書或不書其不書者賤而略之也集說孫氏復曰蔡公孫姓帥師滅沈沈與楚故也以沈子嘉歸殺之公孫姓之罪不容誅也薛氏季宣曰侵楚無功而僅能加誅於沈也者項氏安世曰齊桓先侵蔡而後伐楚故小者懐大畏今此先侵楚而後滅沈故大者不服而小者不懐之家氏鉉翁曰春秋書滅沈於㑹召陵之後盟皋鼬前責蔡也亦責晉也晉大合諸侯辭曰伐楚不能損楚之毫毛乃以沈子不㑹命蔡伐之伐之猶可而蔡爲不道乘其未及設守襲而滅之慘矣哉故書滅書殺以正其罪汪氏克寛曰沈子嘉微弱近楚其不㑹晉勢使之然非其罪也特貶其不能死位耳故書殺以著蔡昭之罪五月公及諸侯盟于皋鼬鼬由又反皋鼬公作浩油城皋鼬杜注繁昌縣東南有皋亭案水經注潁水逕臨潁縣又東南逕澤城北即古城皋亭今在河南開封府臨潁縣界左傳將㑹衛子行敬子言於靈公曰㑹同難嘖有煩言莫之治也其使祝佗從公曰善乃使子魚子魚辭曰臣展四體以率舊職猶懼不給而煩刑書若又共二徼大罪也且夫祝社稷之常隸也社稷不動祝不出竟官之制也君以軍行祓社釁鼓祝奉以從於是乎出竟若嘉好之事君行師從卿行旅從臣無事焉公曰行也及皋鼬將長蔡於衛衛侯使祝佗私於萇𢎞曰聞諸道路不知信否若聞蔡將先衛信乎萇𢎞曰信蔡叔康叔之兄也先衛不亦可乎子魚曰以先王觀之則尚徳也昔武王克商成王定之選建明徳以藩屏周故周公相王室以尹天下於周爲睦分魯公以大路大旂夏后氏之璜封父之繁弱殷民六族條氏徐氏蕭氏索氏長勺氏尾勺氏使帥其宗氏輯其分族將其類醜以法則周公用即命於周是使之職事於魯以昭周公之明徳分之土田陪敦祝宗卜史備物典策官司彝器因商奄之民命以伯禽而封於少皞之虛分康叔以大路少帛綪茷旃旌大吕殷民七族陶氏施氏繁氏錡氏樊氏饑氏終葵氏封畛土略自武父以南及圃田之北竟取於有閻之土以共王職取於相土之東都以㑹王之東蒐𥅆季授土陶叔授民命以康誥而封於殷虛皆啓以商政疆以周索分唐叔以大路密須之鼓闕鞏沽洗懐姓九宗職官五正命以唐誥而封於夏虚啓以夏政疆以戎索三者皆叔也而有令徳故昭之以分物不然文武成康之伯猶多而不獲是分也唯不尚年也管蔡啓商惎間王室王於是乎殺管叔而蔡蔡叔以車七乘徒七十人其子蔡仲改行帥徳周公舉之以為己卿士見諸王而命之以蔡其命書云王曰胡無若爾考之違王命也若之何其使蔡先衛也武王之母弟八人周公為大宰康叔為司宼𣆀季為司空五叔無官豈尚年哉曹文之昭也晉武之穆也曹為伯甸非尚年也今將尚之是反先王也晉文公為踐土之盟衛成公不在夷叔其母弟也猶先蔡其載書云王若曰晉重魯申衛武蔡甲午鄭㨗齊潘宋王臣莒期藏在周府可覆視也吾子欲復文武之略而不正其徳將如之何萇𢎞説告劉子與范獻子謀之乃長衛侯於盟反自召陵鄭子大叔未至而卒晉趙簡子為之臨甚哀曰黄父之㑹夫子語我九言曰無始亂無怙富無恃寵無違同無敖禮無驕能無復怒無謀非徳無犯非義封父杜注古諸侯也漢置封丘縣今屬河南開封府縣治安西坊西北有封父亭少皞之虚杜注曲阜也在魯城内帝王世紀云少皞邑於窮桑以登帝位徙於曲阜今曲阜故城有少皞陵有閻之土杜注衛所受朝宿之邑蓋近京畿有殷虚杜注朝歌也今河南衛輝府淇縣北五里殷墟橋是其地大密須杜注國名也夏虚杜注夏今太原晉陽榖梁後而再㑹公志於後㑹也後志疑也胡傳定公之立上不請於天王下不告於方伯而受國於季孫意如故三年朝晉至河而復今㑹諸侯求為此盟書公及者内為志也召陵之㑹必序不序十有八國之諸侯則無以見侵楚之陋皋鼬之盟序與不序非義所繫則以凡舉可矣集說何氏休曰再言公者昭公數如晉不見荅卒為季氏所逐定公初即位得與諸侯盟故喜録之㑹杜氏預曰召陵㑹劉子諸侯總言之也復稱公者盟異處故劉氏敞曰諸侯何以不序不足序也其不足序奈何欲治楚而後不能也晉於是與諸侯十有八國之衆㑹于召陵以侵楚天子使大夫臨之盛矣晉荀寅求貨於蔡蔡人弗與既而辭諸侯㑹于皋鼬亦無事焉晉失諸侯呉入郢自皋鼬之盟始也盟程子曰公以不獲見於晉故因㑹而求盟焉則此公意也故書公及趙氏鵬飛曰此侵楚諸侯也前目後凡爾前目後凡未有書公及者而此書公及變文以見義也昭公庸懦權出季氏公未甞得一㑹諸侯皆大夫專之矣惟平丘之㑹公得親之而季孫意如伉公而公不得與盟終昭公之世惟公既逐居於鄆得一與齊侯盟于鄟陵季氏不知也其間黄父成周之㑹皆大夫在焉公不得與今定於是立四年季氏固存而皋鼬之盟意如不敢抗而公得與諸侯之盟聖人蓋喜公之能自振立而獲執牛耳也故於此特書公及諸侯盟于皋鼬所以幸魯侯之復得及盟也其㫖明矣家氏鉉翁曰劉子不下與於諸侯之盟得王人與㑹之體氏李氏廉曰王官與㑹不與盟之說詳首止下雖杜范氏皆以爲諸侯總言劉子亦與然考之於經未見此例公及之說胡氏主程子蓋亦從公羊注意發之汪氏克寛曰首止葵丘之盟王世子宰周公不與盟則㑹盟同地而書諸侯柯陵雞澤平丘之盟尹子單子劉子與盟則不書諸侯此言諸侯則劉文公不盟可知矣薄之盟公不與㑹盂而與於盟則書公㑹諸侯盟于薄宋之盟公不與圍宋而與於盟則書公㑹諸侯盟于宋扈之盟公後至則書公㑹諸侯晉大夫盟于扈此年公與於召陵之㑹又與於皋鼬之盟則非後至也㑹與盟公皆與焉而劉子不與則但當書曰諸侯盟于皋鼬如祝柯重丘㑹盟殊地之例而又書公及者所以著定公汲汲於後㑹求爲此盟也蜀之盟春秋不與楚主盟故書公及此書公及亦以著晉之不復能主盟也書王氏樵曰案齊桓召陵之師伐楚不戰而楚服故伐書屈完來盟于師盟于召陵以美之今召陵之師名曰伐楚實不能伐而空還楚人亦不遣一介行李問師來之故故書侵書諸侯自盟于皋鼬以陋之杞伯成卒于㑹成公作戊集說髙氏閌曰不言卒於師者以不成乎伐楚也過汪氏克寛曰世子乞嗣是爲隠公七月其弟弑隠公自立是爲僖公也季氏本曰皋鼬之諸侯即㑹召陵者故以㑹卒六月葬陳惠公許遷于容城集說王氏葆曰許四遷皆受楚令經悉以自遷爲文蓋違害就利而願遷也然不能修徳固圉而遷徙無常亦何益乎聖人詳書以爲後鑑秋七月公至自㑹集說許氏翰曰不致侵楚譏無功也不髙氏閌曰晉以伐楚召諸侯而以㑹致者成乎伐也劉卷卒卷音權集說杜氏預曰即劉蚠也劉子奉命出盟召陵死則天王爲告同盟故不具爵孔氏穎逹曰昭二十三年傳曰單子立劉蚠即此是也王朝公卿卒不赴魯魯不㑹葬文三年書王子虎卒傳曰來赴弔如同盟禮也彼爲同盟于翟泉故也此亦書卒明爲同盟故也畿内之國不得外交諸侯必非劉邑之臣來赴知是天子爲告也天子告臣略言名封而已不言劉子故書不具爵趙氏匡曰畿内諸侯不同列國故不言劉子卷卒亦譏來赴故書之卒劉氏敞曰劉卷者何劉子也内大夫不卒此何以以其嘗㑹諸侯天子爲之赴也何以不言爵畿内之君也不世爵故不與爵稱也然則其名何卒從主人又曰王者之制内諸侯禄外諸侯嗣此三代之禮所最重者也於經未有以言之觀乎劉卷卒則可信矣故生稱爵其禄也卒稱名從正也葬稱公主人之事也豈苟而言之哉髙氏閌曰召陵㑹罷而卒則知皋鼬之盟以疾不與也之陳氏傅良曰王卿士不卒有關於天下之故則卒於襄王之難有王子虎焉於敬王之難有劉子焉君子曰王室其庶幾乎而無救於周是故特卒之也家氏鉉翁曰劉子擁立二君卒安宗社二百四十年周家大臣未有其比故特書其卒葬亦李氏廉曰胡氏無傳義同尹氏子虎而陳氏之說得春秋意外之旨不可不取也有汪氏克寛曰諸儒之說謂劉子定内難復辟於周大功於王室故特書卒葬然單旗不書卒而尹氏專權亦書卒故知其從赴告爾案召陵之盟劉子與焉故其卒也來赴於魯而魯史書之耳公羊以為我主之榖梁以爲爲諸侯主皆不可從葬杞悼公楚人圍蔡左傳秋楚爲沈故圍蔡集說趙氏鵬飛曰諸侯侵楚不足以救蔡而適爲蔡招楚今蔡受圍而晉不救安事夫盟主哉故冬蔡求於呉以敗楚知晉之不足與也晉士鞅衛孔圉帥師伐鮮虞圉公作圄集說許氏翰曰謀楚而不能討盟蔡而不能救唯中山是伐書卿與師著威勝不行於彊暴而行於寡弱也定趙氏鵬飛曰晉伐楚諸侯之利而六卿之害也故公出而六卿忌其有功辭蔡卑鄭而隳其成效晉伐鮮虞晉之害而六卿之利也故荀氏士氏趙氏交伐以顯其績葬劉文公集說趙氏匡曰劉文公天子畿内諸侯列國不當與行交徃之禮今㑹其葬非禮也髙氏閌曰尹氏王子虎皆不書葬此書葬以魯特往㑹之也内李氏廉曰天子三公稱公曽爲三公而有土爲畿諸侯者亦曰公皆以其地配公字言之若祭公周公州公之類是也天子卿大夫有封爲畿内諸侯者皆曰子温子劉子單子尹子之類是也然周末畿内諸侯卒皆諡公如成肅公單平公皆然春秋因劉文公之葬特書以志其僣耳生稱劉子卒稱劉卷葬稱劉文公皆聖人謹嚴之筆也而何氏注公羊乃以其稱公之故而謂劉子本外諸侯入爲天子大夫故上繫采邑下繫本爵其說無据不可從冬十有一月庚午蔡侯以呉子及楚人戰于柏舉楚師敗績楚囊瓦出奔鄭柏舉公作伯莒榖作伯舉地呉始書子書戰柏舉杜注楚名勝志云麻城縣東北三十里有柏子山縣東南有舉水柏舉之名蓋合柏山舉水而得之其說未知何據案傳文子常濟漢自小别至於大别又三戰而陳於柏舉是在漢之東北矣其地應在麻城境也左傳伍員爲呉行人以謀楚楚之殺郤宛也伯氏之族出伯州犂之孫嚭爲呉大宰以謀楚楚自昭王即位無歳不有呉師蔡侯因之以其子乾與其大夫之子爲質於呉冬蔡侯呉子唐侯伐楚舎舟於淮汭自豫章舉楚夾漢左司馬戍謂子常曰子㳂漢而與之上下我悉方城外以毁其舟還塞大隧直轅冥阨子濟漢而伐之我自後擊之必大敗之既謀而行武城黒謂子常曰呉用木也我用革也不可久也不如速戰史皇謂子常楚人惡子而好司馬若司馬毁呉舟於淮塞城口而入是獨克呉也子必速戰不然不免乃濟漢而陳自小别至於大别三戰子常知不可欲奔史皇曰安求其事難而逃之將何所入子必死之初罪必盡說十一月庚午二師陳於柏舉闔廬之弟夫槩王晨請於闔廬曰楚瓦不仁其臣莫有死志先伐之其卒必奔而後大師繼之必克弗許夫槩王曰所謂臣義而行不待命者其此之謂也今日我死楚可入也以其屬五千先擊子常之卒子常之卒奔楚師亂呉師大敗之子常奔鄭史皇以其乘廣死大隧直轅冥阨通鑑地理通釋曰義陽三關左傳大隧即黄峴直轅冥阨乃武陽平靖也黄峴今名九里關在信陽軍南百里武陽在今大寨嶺信陽軍東南九十里平靖今名行者陂信陽軍南七十五里案魏置義陽郡義陽有三闗之塞義陽在宋爲信陽軍今信陽州是也屬河南汝寧府小别山名今在湖廣漢陽府漢川縣北一名甑山大山别山名今在湖廣漢陽府漢陽縣東北一名魯胡𫝊荆楚暴横盟主不能致其討天王不能逹其命長惡不悛復興師而圍蔡王法所當討而不赦也晉主夏盟諸侯所仰若嘉榖之望雨也有請於晉如彼其難呉國天下莫彊焉非諸侯所能以也有請於呉如此其易故召陵之㑹大合諸侯而書侵楚柏舉之戰蔡用呉師特書曰以者深罪晉人保利棄義難於救蔡也然則何以不言救乎救大矣闔廬子胥宰嚭皆懐謀楚之心蔡人徃請㑹逢其適非有救災恤鄰從簡書之實也囊瓦貪以敗國又不能死可賤甚矣故記其出奔特貶而稱人春秋之情見矣集說杜氏預曰師能左右之曰以皆陳曰戰大崩曰敗績呉爲蔡討楚從蔡計謀故書蔡侯以呉子言能左右之也囊瓦稱人貪以致敗不能死難罪賤之昭三十一年傳曰六年十二月庚辰呉入郢今以十一月者并數閏不孫氏復曰以者乞師而用之也晉合十八國之君能救蔡伐楚呉能救之伐之此呉晉之事彊弱之勢較然可見也故自是諸侯小大皆宗於呉黄氏仲炎曰其曰蔡侯以呉子者蓋謀出於蔡侯而呉爲之用也無家氏鉉翁曰自楚昭繼世舉國事付之囊瓦黷貨厭殺人不忌以至内外離叛莫有鬭心由是有入郢之禍國破君逃瓦不能死又不能與君俱行奉頭䑕竄以爲偷生之計罪不可勝誅矣春秋繼柏舉之敗書瓦出奔誅大臣之敗國而以身免也李氏廉曰此條戰書楚人敗書師奔書名與城濮戰書人敗書師殺其大夫書名同一書法蓋子玉子常之罪固同而楚之輕於任人以致敗師亡衆前後一轍矣蔡汪氏克寛曰春秋書以師者三桓十四年宋以齊衛陳伐鄭僖二十六年魯以楚師伐齊此年蔡以呉子戰楚而王氏樵曰案楚馮陵諸夏陳蔡尤被其毒蓋嘗滅夷之爲縣其於蔡也誘般而殺之用隠太子於岡山逐朝呉出侯朱東國客死至呉又以囊瓦求美裘弗與拘於南郢數年而後歸之讎恥極矣故蔡侯呉發憤請師於晉晉不足與請師於呉呉子爲之興師大敗楚兵於柏舉囊瓦奔鄭於是蔡人累世之讎憾少伸矣春秋書蔡侯以呉子所以伸蔡也呉子親行君重於師故不得不書以呉子也胡氏乃謂呉進而稱子爲善其伐楚解蔡圍成伯討之功失經意矣案柏舉之戰蔡用呉師敗楚聖人嘉之故書蔡侯以呉子胡傳本公穀謂稱子爲進呉非也王氏樵駁之甚明今故刪公榖而節存胡傳庚辰呉入郢郢公榖作楚左傳呉從楚師及清發將擊之夫槩王曰困獸猶鬭況人乎若知不免而致死必敗我若使先濟者知免後者慕之蔑有鬬心矣半濟而後可擊也從之又敗之楚人爲食呉人及之奔食而從之敗諸雍澨五戰及郢己卯楚子取其妹季芈畀我以出渉睢鍼尹固與王同舟王使執燧象以奔呉師庚辰呉入郢以班處宫子山處令尹之宫夫槩王欲攻之懼而去之夫槩王入之左司馬戍及息而還敗呉師於雍澨傷初司馬臣闔廬故恥爲禽焉謂其臣曰誰能免吾首呉句卑曰臣賤可乎司馬曰我實失子可哉三戰皆傷曰吾不可用也已句卑布裳剄而裹之藏其身而以其首免楚子渉睢濟江入於雲中王寢盜攻之以戈擊王王孫由于以背受之中肩王奔鄖鍾建負季芈以從由于徐蘇而從鄖公辛之弟懐將弑王曰平王殺吾父我殺其子不亦可乎辛曰君討臣誰敢讎之君命天也若死天命將誰讎詩曰柔亦不茹剛亦不吐不侮矜寡不畏彊禦唯仁者能之違彊陵弱非勇也乘人之約非仁也滅宗廢祀非孝也動無令名非知也必犯是余將殺女鬬辛與其弟巢以王奔隨呉人從之謂隨人曰周之子孫在漢川者楚實盡之天誘其𠂻致罰於楚而君又竄之周室何罪君若顧報周室施及寡人以奬天衷君之惠也漢陽之田君實有之楚子在公宫之北呉人在其南子期似王逃王而已爲王曰以我與之王必免隨人卜與之不吉乃辭呉曰以隨之辟小而密邇於楚楚實存之世有盟誓至於今未改苦難而棄之何以事君執事之患不唯一人若鳩楚竟敢不聼命呉人乃退鑪金初宦於子期氏實與隨人要言王使見辭曰不敢以約爲利王割子期之心以與隨人盟初伍員與申包胥友其亡也謂申包胥曰我必復楚國申包胥曰勉之子能復之我必能興之及昭王在隨申包胥如秦乞師曰呉爲封豕長蛇以荐食上國虐始於楚寡君失守社稷越在草莽使下臣告急曰夷徳無厭若鄰於君疆埸之患也逮呉之未定君其取分焉若楚之遂亡君之土也若以君靈撫之世以事君秦伯使辭焉曰寡人聞命矣子姑就館將圖而告對曰寡君越在草莽未獲所伏下臣何敢即安立依於庭牆而哭日夜不絶聲勺飲不入口七日秦哀公爲之賦無衣九頓首而坐秦師乃出清發杜注水名水經注溳水南逕石岩山北亦謂之清水晉鎮南將軍劉𢎞遣牙將皮初敗張昌於清水即清發也今湖廣徳安府安陸縣城西八十里有石門山即石岩山溳水經其下雍澨今湖廣安陸府京山縣西南有三澨水春秋之雍澨其一也睢杜注睢水出新城昌魏縣東南至枝江縣入江今湖廣安陸府當陽縣北一里有沮水相傳即楚昭王西渉處雲中杜注雲夢澤中所謂江南之夢孔疏昭三年王與鄭伯田於江南之夢謂此蓋雲夢一澤跨江南北集說杜氏預曰弗地曰入呉不稱子史略文呉孔氏穎逹曰入襄十三年傳例也上文戰稱子此言呉入楚不稱子猶成二年鄭伐許昭十二年晉伐鮮虞史略文無義例公羊榖梁以爲呉於戰稱子爲其憂中國故進而稱爵及其入郢君舎於君室大夫舎於大夫室故貶而稱吴左氏無此義故杜異而顯之榖趙氏匡曰案楚君尋反國國不絶祀故不言滅耳梁妄爲義說不足取也又云呉不稱子不正其乘人之敗而深爲利則凡諸入者悉是乘人敗何不總利之乎劉氏敞曰榖梁曰何以不言滅欲存楚也非也楚實未滅當言入而已矣豈春秋固存之哉薛氏季宣曰楚不書楚而書郢見楚之大其都猶不能守也國陳氏傅良曰入國不言邑入楚也而曰入郢非得之辭也汪氏克寛曰僖二十八年晉侯侵曹丙午入曹文十五年晉郤缺伐蔡戊申入蔡皆書國而不書地獨此年不書呉入楚而以楚之國都地名書之恐因昭三十一年呉其入郢之文而誤也左傳於是後十五年楚滅胡亦稱呉之入楚也而不曰入郢當從公榖作入楚於義頗通爲王氏樵曰案公羊以前之稱子爲襃後之不稱子貶皆非經意呉之爲呉自若也以其師而敗楚者蔡人之憤利其有而入郢者呉人之志春秋前之稱子非進而襃之書蔡侯之以則其文不得不然耳後書呉入郢亦正爲依實而施諸儒泥於一字見襃貶之說故忽而子呉忽而貶呉而於聖人伸蔡侯傷中國之微意則莫能發也丙敬王十申五年五年晉定七年齊景四十三年衛靈三十年蔡昭十四年鄭獻九年曹靖公露元年陳懐公桞元年把僖公過元年宋景十二年秦哀三十二年楚昭十一年呉闔廬十年春王三月辛亥朔日有食之三月公作正月附録左傳五年春王人殺子朝於楚夏歸粟于蔡左傳夏歸粟于蔡以周亟矜無資公羊孰歸之諸侯歸之曷爲不言諸侯歸之離至不可得而序故言我也榖梁諸侯無粟諸侯相歸粟正也孰歸之諸侯也不言歸之者專辭也義邇也集說杜氏預曰蔡爲楚所圍饑乏故魯歸之粟言孔氏穎逹曰公羊傳曰離至不可得而序故我也榖梁傳亦然賈逵取彼爲說云不書所㑹後也杜以𫝊文唯言周亟矜無資自解魯歸粟之意不言諸侯歸之諸侯或亦歸之要此經所書其意不及諸侯故顯而異之言魯歸之粟石氏介曰春秋貴義不貴惠小仁施者大仁賊也蔡爲楚所辱而不能救今見楚敗呉勝乃歸蔡粟徒畏呉而已無救災之實也小惠不足貴矣之髙氏閌曰患難相救有無相賙此諸侯之正春秋世相攻相滅此道不行矣然當是時諸侯不供職貢於天子至使天王有求於下國則知夫魯歸蔡粟非濟其難而賙其無也蓋以蔡與呉相援而敗楚入郢故魯畏而賂之聖人所以追其意而罪之也胡氏寧曰二傳皆稱諸侯歸蔡粟其略而不序何也蔡爲楚人所困則環視而不能救呉既破楚入郢解蔡圍矣然後相率而歸之粟非救災恤鄰從簡書之道也故特書魯而不序諸侯見其事之末矣汪氏克寛曰昭二十五年輸王粟不書以諸侯歸粟於王常事也襄三十年㑹澶淵謀更宋之所喪而歸其財則書曰宋災故以宋災歸財非所當急也此年諸侯歸粟于蔡而不書諸侯以不能救蔡之難徒歸粟于蔡耳故略言之與城楚丘戍陳同義或以爲諸侯歸粟合先王之制而春秋書歸以美之過矣苟以書歸皆爲美辭則歸舍且賵亦可以爲美乎案公榖以爲諸侯歸粟杜預注左氏以爲魯歸粟二說不同孔氏穎逹曰諸侯或亦歸之未嘗謂公榖之必無所據也蓋晉以伯令行於同盟而魯與諸侯皆奉命焉經書魯事而諸侯亦在其内也三傳故可竝存於越入呉左傳越入呉呉在楚也集說杜氏預曰於發聲也越孔氏穎逹曰公羊傳云於越者何越者何於者未能以其名通也越者能以其名通也其意言越與於越立文不同事有襃貶左氏無此義越言有此發聲史官或正其名或從其俗越與於越史異辭無義例呉陳氏傅良曰向曰越人今曰於越復從其舊號也楚爭而後越入中國昭五年常夀過始見於經而亟稱人後三十年而入呉不復稱人矣李氏廉曰劉氏曰於越者其自稱者也越者中國稱之者也考之經文入呉敗呉皆越人來告故書於越呉伐越則呉來告也故止書越劉說爲合越汪氏克寛曰汲冢周書王㑹篇有東於越或當時之所稱歟六月丙申季孫意如卒左傳六月季平子行東野還未至丙申卒於房陽虎將以璵璠歛仲梁懐弗與曰改歩改玉陽虎欲逐之告公山不狃不狃曰彼爲君也子何怨焉既葬桓子行東野及費子洩爲費宰逆勞於郊桓子敬之勞仲梁懐仲梁懐弗敬子洩怒謂陽虎子行之乎東野杜注季氏邑蓋東野及房皆近費之地胡傳内大夫有罪見討則不書卒公子翬是也仲遂殺惡及視罪與翬同而書卒者以事之變卒之也意如何以書卒見定公不討逐君之賊以爲大夫全始終之禮也定雖受國於季氏苟有叔孫婼之見不賞私勞致辟意如以明君臣之義則三綱可正公室彊矣今苟於利而忘其讎三綱滅公室益侵陪臣執命宜矣故意如書卒主人習其讀而問其傳則未知己之有罪焉爾集說劉氏敞曰意如逐君死何以卒之或曰定之大夫也或曰不嫌也有待貶絶而罪惡見者貶絶以見罪惡也有不待貶絶而罪惡見者不貶絶以見罪惡也又曰使定公誠能明君臣之義不賞私勞討先君之賊致季氏之誅則意如不免矣故雖逆取而順守之猶賢乎已今一不然苟於利而忘其辱幸於禍而忘其讎謂意如定之大夫也不亦宜乎於杜氏諤曰於桓公之年書公子翬所以貶桓公也宣公之年書公子遂所以譏宣公也於此年書季孫意如卒所以疾定公也家氏鉉翁曰翬之死不書遂之死去族意如卒之以常禮何哉曰志定公不能爲君兄討賊而遇意如加厚也桓宣預聞乎弑故不以討賊責之定公雖不預聞乎逐君而懐賊臣之私遇所以飾其終者厚於他人故卒意如以大夫之常不貶之貶也秋七月壬子叔孫不敢卒集說季氏本曰季平子叔孫成子卒桓子武叔皆稚弱國命爲陽虎所執矣附録左傳申包胥以秦師至秦子蒲子虎帥車五百乘以救楚子蒲曰吾未知呉道使楚人先與呉人戰而自稷㑹之大敗夫槩王於沂呉人獲薳射於柏舉其子帥奔徒以從子西敗呉師於軍祥秋七月子期子蒲滅唐九月夫槩王歸自立也以與王戰而敗奔楚爲堂谿氏呉師敗楚師於雍澨秦師又敗呉師呉師居麇子期將焚之子西曰父兄親暴骨焉不能收又焚之不可子期曰國亡矣死者若有知也可以歆舊祀豈憚焚之焚之而又戰呉師敗又戰於公壻之谿呉師大敗呉子乃歸囚闉輿罷闉輿罷請先遂逃歸葉公諸梁之弟后臧從其母於呉不待而歸葉公終不正視乙亥陽虎囚季桓子及公父文伯而逐仲梁懐冬十月丁亥殺公何藐己丑盟桓子於稷門之内庚寅大詛逐公父歜及秦遄皆奔齊不楚子入於郢初鬭辛聞呉人之爭宫也曰吾聞之讓則不和不和不可以逺征呉爭於楚必有亂有亂則必歸焉能定楚王之奔隨也將渉於成臼藍尹亹渉其帑不與王舟及寧王欲殺之子西曰子常唯思舊怨以敗君何效焉王曰善使復其所吾以志前惡王賞鬬辛王孫由于王孫圉鍾建鬭巢申包胥王孫賈宋木鬭懐子西曰請舎懐也王曰大徳滅小怨道也申包胥曰吾爲君也非爲身也君既定矣又何求且吾尤子旗其又爲諸遂逃賞王將嫁季芈季芈辭曰所以爲女子逺丈夫也鍾建負我矣以妻鍾建以爲樂尹王之在隨也子西爲王輿服以保路國於脾洩聞王所在而後從王王使由于城䴢復命子西問髙厚焉弗知子西曰不能如辭城不知髙厚小大何知對曰固辭不能子使余也人各有能有不能王遇盜於雲中余受其戈其所猶在袒而示之背曰此余所能也脾洩之事余亦弗能也稷杜注楚地當在河南南陽府桐柏縣境西沂杜注楚地軍祥杜注楚地當在湖廣隨州南堂谿楚地水經注灈水出汝南呉房縣呉房西北有堂谿城即此也呉房本房子國楚封夫槩於此故曰呉房今汝寧府遂平縣西呉房故城北有堂谿城䴢杜注地名今湖廣岳州府巴陵縣東有䴢城縣公壻之谿杜注楚地名入成臼杜注江夏竟陵有臼水出聊屈山西南漢今湖廣漢陽府漢川縣有臼水亦名臼子河西南與漢水合脾洩杜注楚地近郢都當在今荆州府境冬晉士鞅帥師圍鮮虞左傳晉士鞅圍鮮虞報觀虎之役也集說許氏翰曰晉以土地之故縱兵横加鮮虞而不能服則又圍之兵益忿義益不勝君子是以惡晉也圍趙氏鵬飛曰士鞅前日伐鮮虞今復之鞅欲立功也鮮虞何罪哉丁敬王十酉六年六年晉定八年齊景四十四年衛靈三十一年蔡昭十五年鄭獻十年曹靖二年陳懐二年把僖二年宋景十三年秦哀三十三年楚昭十二年呉闔廬十一年春王正月癸亥鄭游速帥師滅許以許男斯歸速公作遬後同左傳六年春鄭滅許因楚敗也集說髙氏閌曰許恃楚以固其國至於四遷鄭游速偏師一出滅其國而俘其君楚雖不能保許而鄭之肆暴亦甚矣與張氏洽曰許自隠十一年齊魯鄭之入大抵困於鄭爲鄰至成十五年畏鄭而遷葉昭九年遷夷十八年遷析定四年又自析遷容城以依楚不三年楚困於呉鄭遂滅之然哀元年以後許復見者楚又存之也大岳之後其亡一見害於鄭其存一恃於楚不過百年韓遂滅鄭亦有由矣趙氏鵬飛曰鄭虐於許久矣許依楚而抗鄭凡四遷而附之今呉入郢楚幾爲墟許復何恃哉此其所以卒爲鄭滅也治内以自彊者内固則四鄰懼之倚勢以爲重者勢去則四鄰疾之許不能自治其國以結好於鄰邦乃倚屢遷以疾讎於鄭楚敗勢隳讎方得志一舉而滅抑自取爾然鄭蕞爾小邦自保未固而利於滅人其爲惡固不誅而暴矣許男書名不死社稷也家氏鉉翁曰鄭人朶頤於許幾二百年矣自鄭莊懼王誅之加入而不敢有將以有待也未幾鄭有内亂許叔復其宗社今列國無盟主鄭人肆其不道滅同盟之國翦太岳之後鄭之罪大矣而李氏廉曰此鄭叛伯之始也自隠十一年鄭入許齊鄭之黨合天下遂無王自定六年鄭滅許而齊鄭之黨又合天下遂無晉許以大岳之裔不能屈節於鄭而甘心向楚其亡固宜獨至是而晉楚俱弱春秋以終則世變亦可感也夫二月公侵鄭左傳二月公侵鄭取匡爲晉討鄭之伐胥靡也徃不假道於衛及還陽虎使季孟自南門入出自東門舎於豚澤衛侯怒使彌子瑕追之公叔文子老矣輦而如公曰尤人而效之非禮也昭公之難君将以文之舒鼎成之昭兆定之鞶鑑苟可以納之擇用一焉公子與二三臣之子諸侯苟憂之將以爲之質此羣臣之所聞也今将以小忿䝉舊徳無乃不可乎大姒之子唯周公康叔爲相睦也而效小人以棄之不亦誣乎天將多陽虎之罪以斃之君姑待之若何乃止集說孫氏復曰内有彊臣之讎外結怨於鄭滅髙氏閌曰召陵之盟口血未乾而鄭保囊瓦許故晉命公興師而討之是時季孫斯初嗣卿位陪臣陽虎執國命又廹於晉令進退皆不由公也李氏廉曰自宣公十八年書公伐把之後魯無君將者八十年至是而後一侵鄭再侵齊一圍成皆書公則三桓既微之徵也然本非公室能張實以陪臣公山不狃侯犯陽虎之專故託公以出師耳當是時晉伯已失諸侯皆離惟魯未叛故侵鄭侵衛之師雖出晉令而陽虎之徒釁於勇嗇於禍以逞其欲春秋皆書侵以志其無名行師而輔伯之非其道也此與成六年二侵宋同一書法不然奉伯令而討伐周之國何不書伐哉奬汪氏克寛曰定公親帥師以討鄭之黨亂人固有王室之義然不能聲罪致討僅爲潜師以掠境故不書伐而書侵觀季孫獻俘於晉則實廹於霸令而非有奨王之實矣況是時陪臣執國命兵權亦不屬公也公至自侵鄭集說髙氏閌曰公内有彊臣不能討乃爲晉討鄭内外結怨危之道也張氏洽曰陽虎專政欲徼釁於鄰國使衛侯不聼公叔發之言魯師危矣故致之季氏本曰陽虎實主此謀魯兵掌於諸卿而陪臣以三桓專兵爲口實欲竊兵權自是恒以公將矣夏季孫斯仲孫何忌如晉左傳夏季桓子如晉獻鄭俘也陽虎彊使孟懿子徃報夫人之幣晉人兼享之孟孫立於房外謂范獻子曰陽虎若不能居魯而息肩於晉所不以爲中軍司馬者有如先君獻子曰寡君有官將使其人鞅何知焉獻子謂簡子曰魯人患陽虎矣孟孫知其釁以爲必適晉故彊爲之請以取入焉集說劉氏敞曰陽虎陪臣也而執國命欲蕩覆公室以自封已三世矣事不成故盜寳玉大弓以逃春秋本其禍之所構自二子之使夫以二子之力專國擅君而陽虎能制之進云則進止云則止猶僕隸也而莫之戒者方復爲之脅請於伯主之國此其無所忌必爲亂之效也雖然不介晉權亂亦不得發春秋彰徃察來而慎於幾微故因事以宣其指原指以見其變子惡之卒陽虎之盜皆簒君亡國之禍也苟甚之必録之録之故必自其禍之所起矣故髙氏閌曰一卿將命可兼他事豈可每事一卿乎累數之見二卿爲陽虎所制也嗚呼天子微諸侯僣諸侯微大夫陵大夫微陪臣脅理勢然爾李氏廉曰春秋書内卿竝使者唯文公十八年公子遂叔孫得臣及此年斯何忌耳胡氏於公子遂之事以為變文書介副者欲以起問者見事情也此獨無所起乎蓋遂得臣之竝使乃仲遂邪謀之所起而斯何忌之竝使亦陽虎専權之所為讀者不可不察也附録左傳四月己丑吴大子終纍敗楚舟師獲潘子臣小惟子及大夫七人楚國大惕懼亡子期又以陵師敗於繁揚令尹子西喜曰乃今可為矣於是乎遷郢於鄀而改紀其政以定楚國周儋翩率王子朝之徒因鄭人將以作亂於周鄭於是乎伐馮滑胥靡負黍狐人闕外六月晋閻沒戍周且城胥靡馮杜注周邑朿觀漢記曰魏之别封曰華侯華侯孫長卿食采於馮城即此負黍杜注周邑陽城縣西南有負黍亭今河南府登封縣有負黍聚一名黄城是也狐人杜注周邑後漢志潁隂縣有狐宗鄉古狐人亭也在今河南聞封府許州臨潁縣闕外杜注周邑即伊闕外之邑也在今河南河南府洛陽縣南闕塞山下集説杜氏預曰鄭伐周六邑在魯伐鄭取匡前於此見者為戊周起也秋晋人執宋行人樂祁犂左傳秋八月宋樂祁言於景公曰諸侯唯我事晋今使不往晋其憾矣樂祁告其宰陳寅陳寅曰必使子往他日公謂樂祁曰唯寡人說子之言子必往陳寅曰子立後而行吾室亦不亡唯君亦以我為知難而行也見溷而行趙簡子逆而飲之酒於緜上獻楊楯六十於簡子陳寅曰昔吾主范氏今子主趙氏又有納焉以楊楯賈禍弗可為也已然子死晋國子孫必得志於宋范獻子言於晋侯曰以君命越疆而使未致使而私飲酒不敬二君不可不討也乃執樂祁胡傳稱人以執非伯討也執非無名何以非伯討也使范趙方睦皆有獻焉則弗執之矣執異國行人出於列卿私意威福之柄移矣三家分晉而靖公廢爲家人豈一朝一夕之故哉集說張氏洽曰諸侯唯宋事晉懼討而遣使善逆以懐之猶懼不來而大夫瀆貨賄爭權利卒使來者見執叛者得志晉之亂政亟行霸綂所由絶也其家氏鉉翁曰皋鼬之盟諸侯皆散惟宋事晉乃執使蓋晉諸卿惟賄是從賄不及禍随之耳三李氏廉曰經書執行人六詳見襄十一年此爲晉卿内叛之始亦宋叛伯之始也以黄氏正憲曰晉卿瀆貨爭權擅執國使固當稱人貶之矣然樂祁犂未致君命而先飲酒通賄是以私交爲重國事爲輕已失使人之職分故稱行人見不稱其官宜執者也杜元凱以爲非其罪失春秋之㫖矣行嚴氏唘隆曰晉自八卿擅權樂郤韓魏趙知范中遞將中軍諸卿以次受約由來舊矣自中行偃爲政始有以偏禆而違上令者趙武以降其權益卑黄父之㑹爲政者韓起也而趙鞅主納王之言適歴之㑹爲政者魏舒也而范鞅立召季孫之議城成周之役爲政者魏舒也而韓不信主執宋仲幾召陵之侵爲政者范鞅也而荀寅主索蔡貨下陵其上上惡其下傾軋之謀已非一日今范鞅爲政而趙鞅逆樂祁而飲之酒此欲奪執政之權非爲一宋行人爭得失也范鞅知之故必執樂祁洩其怒所以伐其謀叢此怨讎猜疑愈積以故趙鞅爲政即疑范中行之相偪而必去之内外相競者八年羣天下諸侯而讎一趙而晉之亂遂不可止自是三家之勢成矣冬城中城集說陸氏淳曰榖梁曰三家張張爲日久此時陽虎用事三家始衰何言張又曰非外民也且入春秋已過二百餘年矣豈無缺壊重城乎築何譏也既非新作何得譏外民哉髙氏閌曰公之所有中城而已成九年城之矣此復城者外有齊鄭之怨故懼而城焉汪氏克寛曰是時政在三家公室無民定公豈能役衆修城以備外患哉蓋陽虎欲去三家故託於懼齊鄭而城中城將挟公以自固耳季孫斯仲孫忌帥師圍鄆集說杜氏預曰何忌不言何闕文鄆貳於齊故圍之劉氏敞曰公羊云譏二名其意以謂二名難諱也古者蓋雖君之名臣不諱矣父之名子不諱矣及至於周臣諱君名子諱父名然猶諱其死不諱其生諱其同不諱其嫌二名則不偏諱也仲尼之母名徴在言徴不言在言在不言徴自仲尼不偏諱二名況其他乎夫已不能諱二名反譏人之二名豈理也哉髙氏閌曰鄆自昭二十五年齊侯取之以居昭公三十年鄆潰遂貳於齊至是二卿圍而欲復取之蓋陽虎欲傾季氏以謀政也季仲圍而曰陽虎者虎專季氏季氏專魯也仲何爲哉羊黄氏仲炎曰仲孫忌不言何杜預曰闕文是也公子以爲譏二名妄矣春秋列國之君大夫二名者多矣何獨於此焉譏哉家氏鉉翁曰齊之取鄆固非而二子之圍亦非也爲定公者當以善辭告之齊曰我先君失守宗祧君取鄆以居之魯國實受君賜今鄆潰矣寡人欲復舊疆敢以請之執事以景公之賢必將歸之不應遽用師也明年國夏伐西鄙自是連歲交兵蓋始於此役也附録左傳陽虎又盟公及三桓於周社盟國人於亳社詛於五父之衢冬十二月天王處於姑蕕辟儋翩之亂也姑蕕杜注周地戊敬王十戌七年七年晉定九年齊景四十五年衛靈三十二年蔡昭十六年鄭獻十一年曹靖三年陳懐三年把僖三年宋景十四年秦哀三十四年楚昭十三年呉闔廬十二年春王正月附録左傳七年春二月周儋翩入於儀栗以叛齊人歸鄆陽闗陽虎居之以爲政儀栗杜注周邑邑鄆陽闗杜注皆魯夏四月附録左傳夏四月單武公劉桓公敗尹氏於窮谷秋齊侯鄭伯盟于鹹諸侯始復特盟左傳秋齊侯鄭伯盟于鹹徵㑹於衛集說許氏翰曰齊鄭之盟叛晉也霸道隳諸侯散離盟始復志此蓋自是中國無殷㑹矣陳氏傅良曰特相盟自齊桓以來未之有也於是再見諸侯無主盟矣是故石門志諸侯之合也于鹹志諸侯之散也天家氏鉉翁曰于鹹于沙齊景圖霸之始事也是時王辟儋翩之難出居姑蕕景公不能伸勤王之義乃今日求之鄭盟于鹹明日求之衛盟于沙皆彊人之從我非心悅而誠服豈能小大翕然不期而俱至乎侯陳氏深曰是時齊晉兩國相爲彊弱晉彊則同諸以附晉晉弱則合諸侯以自彊若魯衛鄭則視之以爲向背也之李氏廉曰此爲齊景公圖復伯之始而鄭實左右自是以後有盟沙盟曲濮㑹安甫盟黄㑹牽㑹洮皆齊鄭糾合之事可與隠公初年對看齊人執衛行人北宫結以侵衛集說趙氏匡曰榖梁曰以重北宫結也案例執行人皆書何獨重結哉劉氏敞曰善爲國者親近而遠信之附内而外歸之衛侯欺其羣臣以紿晉殘其百姓以奉齊齊之執結也固非伯討矣而衛之無良又甚焉從此觀之孟子曰今之諸侯五霸之罪人不亦信乎汪氏克寛曰齊侯稱人而又書侵所以重貶之也挟詐恃力夫豈圖霸之道乎書執結以侵衛與楚成執宋公以伐宋書法正同聖人之意見矣往季氏本曰盟鹹徵衛不至使行人謝齊執之稱行人非使人之罪也齊侯衛侯盟于沙公作沙澤晉沙杜注陽平元城縣東南有涉亭太和五年秦王猛圍鄴慕容垂自沙亭屯内黄是也在今元城縣東左傳衛侯欲叛晉諸大夫不可使北宫結如齊而私於齊侯曰執結以侵我齊侯從之乃盟於瑣瑣杜注即沙也晉地道記元城縣有瑣陽城集說許氏翰曰齊衛之盟叛晉也晉定之季鄭獻衛靈叛而從齊齊可以霸而景不足望也髙氏閌曰執其使侵其國以求盟焉是劫盟也何有於信哉家氏鉉翁曰以經而言執行人而加之兵脅盟也以傳而言衛畏晉私於齊侯俾執其行人以侵之而後盟盜盟也若是而得諸侯曷如其已呉氏澂曰執其行人而與其君結盟以叛晉齊衛之罪均矣李氏廉曰此齊衛合黨之始自此以後次五氏次垂葭次渠蒢至哀元年而伐晉矣夫當晉楚皆衰弱之餘呉越之禍未至於北方使齊景公果能撫霸國之餘業尊事王室輯寕列國則桓公之功獨不可復乎奈何今日之㑹明日之次無非包藏禍心以圖晉爲事乎子言衛靈公之無道也又曰齊景公有馬千駟死之日民無得而稱焉春秋屢書而不削二君之罪見矣是嚴氏唘隆曰天下有伯諸侯無敢私相盟私相盟無伯也故盟洮盟向以齊桓既没故盟曹南以宋襄圖伯故盟蒲隧以齊景圖伯故同盟于蟲以宋元無伯故今盟于鹹復盟于沙是鄭與衛皆叛晉也大雩齊國夏帥師伐我西鄙左傳齊國夏伐我陽虎御季桓子公歛處父御孟懿子將宵軍齊師齊師聞之堕伏而待之處父曰虎不圖禍而必死苫夷曰虎䧟二子於難不待有司余必殺女虎懼乃還不敗集說許氏翰曰東夏諸侯唯魯事晉故齊伐之景公乘晉之衰不思惟徳之務以懐諸侯而欲力征經營以定霸綂是知時之或可而不知已之不可者也髙氏閌曰齊叛晉與鄭盟故爲鄭伐我且報二卿之圍鄆六家氏鉉翁曰昭公流離顛沛惟齊景是依如是五年卒不能爲之出偏師向魯鄙問意如之罪今乃興無名之師而加於魯當爲而不爲與不必伐而伐失其所以爲方伯之道矣春秋繼鹹沙二盟而書國夏伐我皆貶也餘李氏廉曰齊自襄二十五年崔杼伐我之後四十年兵不至魯至是再見則以晉伯之不復振也國夏两伐晉救無功於是而及齊平矣九月大雩集說薛氏季宣曰一秋而兩大雩僣瀆之甚也二汪氏克寛曰左氏以再雩為旱甚經書雩祭十有一惟昭二十五年及此年書再雩災之甚而變之大者也昭公不克自省而有陽州之孫定公又不知儆而有寳玉之竊世卿之逆陪臣之横其致一也故比事書之以為後鑑冬十月附録左傳冬十一月戊午單子劉子逆王於慶氏晉籍秦送王已已王入於王城館於公族黨氏而後朝於莊宫欽定春秋傳說彚纂卷三十四
