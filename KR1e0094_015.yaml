body:
  text: 欽定四庫全書欽定春秋傳說彚纂卷十三丁惠王二卯十三年六年齊桓三十二年晉獻二十三年衛文六年蔡穆二十一年鄭文十九年曹昭八年陳宣三十九年把成公元年宋桓二十八年秦穆六年楚成十八年春王正月附録左傳晉侯使賈華伐屈夷吾不能守盟而行將奔狄郤芮曰後出同走罪也不如之梁梁近秦而幸焉乃之梁集說王氏錫爵曰夷吾以不能守故而盟有如可守將誰與校乎重耳曰君父之命不校此文公之所以霸也夏公㑹齊侯宋公陳侯衛侯曹伯伐鄭圍新城新城杜注鄭新密滎陽密縣今河南開封府密縣東南三十里有故密城左傳夏諸侯伐鄭以其逃首止之盟故也圍新密鄭所以不時城也穀梁伐國不言圍邑此其言圍何也病鄭也著鄭伯之罪也集說范氏寧曰齊桓行霸尊崇王室綏合諸侯翼戴世子盟之美者莫盛於此而鄭伯辟義逃歸違叛霸者是以諸侯伐而圍之伐髙氏閌曰鄭伯逃歸不盟遂與楚通是啓諸侯之也李氏亷曰伐國圍邑之書此條與圍長葛圍緡不同左氏穀梁胡氏皆以為豫桓公獨公羊以為惡桓公之強為無義則與長葛同矣蓋拘於不得意致伐之例而云爾不可從季氏本曰伐鄭之役許不預者留守其國以備楚也舉王氏樵曰伐而不服故圍新城然圍而不見桓公以德綏鄭志不在於為暴也案公羊謂邑不言圍此其言圍何彊也非也謂一邑為彊則隱五年長葛之圍趙氏匡已駁之矣若謂圍者為彊則桓公伐鄭合六國以圍一邑久而不舉其不恃力亦明矣而以彊目之可乎秋楚人圍許諸侯遂救許左傳楚子圍許以救鄭諸侯救許乃還穀梁善救許也集說杜氏預曰皆伐鄭之諸侯故不復更叙子趙氏匡曰左氏云蔡穆侯將許僖公以見楚於武城許男面縛銜璧案楚本圍許以救鄭諸侯救許鄭圍以解楚師亦退許有何懼乃隨蔡侯為滅國之禮乎若爾許已從楚齊何故不伐許乎又云昔武王克殷微子啓如是亦可疑劉氏敞曰是後許男常與諸侯㑹知其初不降楚也也陳氏傅良曰此楚子也其稱人何楚君將恆稱人張氏洽曰圍許之役蓋攻其所必救以解新城之圍也釋鄭而救許所以抑暴而救患此見桓公之急於義也故書遂以豫之然家氏鉉翁曰桓公伐楚數其無王之罪此尊王也自始謀至出師皆以鄭故鄭以齊之強不若楚楚之伐近齊之救遲不顧順逆蓋諸侯之首叛者齊伐之義不容已故皆爵而無貶楚乃圍許以救鄭齊侯以諸侯之師赴之伐鄭義也救許亦義也書遂美其救之速也李氏廉曰桓公之編書救者五救欲盡力救鄭救邢將卑師少為義未力也救欲速進聶北于匡書次為義不勇也獨此年之救不反兵而赴許得被髮纓冠之意故以書遂為善之尤蓋救兵不以生事為貶不以專事為疑也汪氏克寬曰書遂救者美其赴難之甚速也書遂伐遂侵遂入遂滅者譏其憤兵之無己而非有東征西怨之望也惟齊桓遂伐楚乃所以救鄭而非他國遂伐之比爾冬公至自伐鄭榖梁其不以救許致何也大伐鄭也胡傳齊自召陵之後兵服四夷威動諸夏今合六國之師圍新造之邑宜若振槁然圍而不舉有遺力者矣及楚人攻許即解新城之圍移師救許是又得討罪分災救急之義也故特書曰楚人圍許諸侯遂救許凡書救者未有不善之也其曰遂救許善之尤者也善之尤則何以致久也集說孫氏復曰出踰三時也胡氏銓曰不致救許而致伐鄭者伐鄭本志救許遂事也趙氏鵬飛曰公與救許而至伐鄭以伐鄭之功飲至也不可以二事至擇其大而有功者而已汪氏克寬曰楚人圍許以救鄭經不書以救與陽處父伐楚救江異者不豫楚人之救鄭也聖人筆削當以屬辭比事之法求之故上書鄭伯逃歸不盟則齊桓之伐鄭書伐書圍以見鄭之不服罪而諸侯無譏焉下書諸侯救許則楚人之圍許其罪不可掩矣戊惠王二辰十四年七年齊桓三十三年晉獻二十四年衛文七年蔡穆二十二年鄭文二十年曹昭九年陳宣四十年把成二年宋桓二十九年秦穆七年楚成十九年春齊人伐鄭左傳齊人伐鄭孔叔言於鄭伯曰諺有之曰心則不競何憚於病既不能強又不能弱所以斃也國危矣請下齊以救國公曰吾知其所由來矣姑少待我對曰朝不及夕何以待君胡傳將卑師少稱人聲罪致討曰伐鄭伯與楚合而未離也故桓公復治之集說張氏洽曰鄭未服故復伐之齊力足以制之不煩諸侯也趙氏鵬飛曰鄭不服則諸侯之心搖而首止之盟有所不固非徒首止之盟寒而楚人亦有以議我矣故急於服鄭程氏端學曰諸侯以救許而解鄭圍不得志於鄭故齊復伐之也夏小邾子來朝公作小邾婁子後同曰小邾杜注邾之别封故曰小邾宋忠邾顔别封小子肥於郳為小邾子今山東兗州府滕縣嶧縣竝有郳城樂史云郳城在氶縣文獻通考云郳城今沂州嶧即古氶地屬沂州據此二說則在嶧者為近集說何氏休曰齊桓公白天子進之因其德禮著其能以爵通杜氏預曰郳黎來始得王命而來朝之孫氏復曰小邾子邾之别封也故曰小邾子以别家氏鉉翁曰自周之東以篡得國王不能討而命之者多矣如曲沃武公姓名不登於簡牘不與其封也邾小邾皆存而不削季氏本曰齊常輔宋爭郳今進郳為小邾子而使附魯故來朝鄭殺其大夫申侯左傳夏鄭殺申侯以說於齊且用陳轅濤塗之譖也初申侯申出也有寵於楚文王文王將死與之璧使行曰唯我知女女專利而不厭豫取豫求不女疵瑕也後之人將求多於女女必不免我死女必速行無適小國將不女容焉既葬出奔鄭又有寵於厲公子文聞其死也曰古人有言曰知臣莫若君弗可改也已公羊其稱國以殺何稱國以殺者君殺大夫之辭也穀梁稱國以殺大夫殺無罪也胡傳稱國以殺者罪纍上也不知自反內忌聽讒而擅殺其大夫信失刑矣如申侯者其見殺何也専利而不厭則足以殺其身而已矣集說何氏休曰諸侯國體以大夫為股肱士民為肌膚故以國體録范氏寧曰上下皆失故曰罪纍上貪劉氏敞曰鄭伯內忌而殺申侯申侯雖不當誅其侈爭欲亦有以取之張氏洽曰傳載陳轅濤塗譖申侯之事蓋未可信而言申侯申出自楚奔鄭理或有之惟申侯不忘故國所以道鄭伯背霸從楚以啓霸主討鄭而致殺身之禍與止吳氏􅊹曰鄭伯因惠王有撫女從楚之命而逃首之盟齊興問罪之師鄭服逃盟之罪則齊師息矣今不自下齊而乃歸罪於申侯蓋信讒而頗於刑也故春秋不罪申侯而責鄭伯殺大夫之罪鄭李氏亷曰左氏載申侯初有寵於楚文王自楚奔蓋申侯不忘故國故導鄭伯以從楚鄭伯方暴其罪以告齊也不然齊方受申侯而賜以虎牢鄭乃殺之得罪於齊矣何得謂說於齊乎命張氏溥曰申侯告齊桓以資糧屝屨引鄭伯以王總以利諛人其見殺也宜矣然鄭伯始則比以趨利既則借以紓禍不罪已而専殺甚失道矣書殺大夫志非刑也秋七月公㑹齊侯宋公陳世子欵鄭世子華盟于寧母母音某又音無穀作寧母音同今寧母杜注魯地髙平方與縣東有泥母亭音如寧山東兗州府魚臺縣東二十里有穀城鎮即其地也左傳秋盟于寧母謀鄭故也管仲言於齊侯曰臣聞之招携以禮懷逺以德德禮不易無人不懷齊侯修禮於諸侯諸侯官受方物鄭伯使大子華聽命於㑹言於齊侯曰泄氏孔氏子人氏三族實違君命若君去之以為成我以鄭為內臣君亦無所不利焉齊侯將許之管仲曰君以禮與信屬諸侯而以姦終之無乃不可乎子父不奸之謂禮守命共時之謂信違此二者姦莫大焉公曰諸侯有討於鄭未捷今苟有釁從之不亦可乎對曰君若綏之以德加之以訓辭而帥諸侯以討鄭鄭將覆亡之不暇豈敢不懼若總其罪人以臨之鄭有辭矣何懼且夫合諸侯以崇德也㑹而列姦何以示後嗣夫諸侯之㑹其德刑禮義無國不記記姦之位君盟替矣作而不記非盛德也君其勿許鄭必受盟夫子華既為大子而求介於大國以弱其國亦必不免鄭有叔詹堵叔師叔三良為政未可間也齊侯辭焉子華由是得罪於鄭冬鄭伯使請盟於齊榖梁衣裳之㑹也集說孔氏穎達曰周禮大行人云侯服貢祀物甸服貢嬪物男服貢器物采服貢服物衛服貢材物要服貢貨物鄭康成云祀貢者犧牲之屬嬪物絲枲也器物尊彝之屬服物元纁絺纊也材物八材也貨物龜貝也如彼禮文諸侯所貢之物皆以服數為差尚書禹貢任土作貢皆貢土地所生不計路之逺近然則周禮雖依服數亦貢土地所生不宜逺求他方之物以貢王也王室盛明之時每國貢有常職天子既衰諸侯惰慢貢賦之事無復定凖故霸主總帥諸侯尊崇天子量其國之大小號令所出之物傳言諸侯各使官司取齊約束受其方所當貢天子之物言其一聽齊令美齊侯能以禮服諸侯又曰經書齊侯宋公陳世子欵鄭世子華盟于寧母則已列於㑹矣管仲方云㑹而列姦何以示後嗣者桓公列之於㑹直是列其身爾管仲言列姦者謂將用其姦謀故杜云列姦用子華也不受子華之請即是㑹不列姦楊氏士勛曰衣裳之㑹十有一或釋或不釋兵車之㑹四傳皆發之者衣裳之㑹多省文以相包兵車之㑹少故備舉以見義此是衣裳後嵗兵車二文相近故傳因而别之也孫氏復曰言鄭世子華者齊人伐鄭未巳鄭伯懼欲求成於齊故先使世子華受盟于寧母也張氏洽曰齊侯因管仲之言而修禮於諸侯諸侯官受方物又不受世子為內臣之請管仲之於桓公正救多矣家氏鉉翁曰案左傳管仲可謂以禮服人桓公可謂樂從諫知自克者寧母之㑹聖人爵之其在此乎王氏元杰曰鄭伯逃盟於首止齊合六國以圍新城後興伐鄭之師鄭猶未服管仲之諫修禮諸侯諸侯官受方物鄭伯乃使世子華聽命於㑹其德禮之效與首李氏廉曰此㑹以齊侯辭鄭世子之事觀之則與止相類蓋首止正天下之人倫而此正一國之人倫也以諸侯官受方物之傳觀之則與邢丘相類蓋此明王室之貢而邢丘亦改命朝聘之數也子汪氏克寬曰今三傳皆有鄭世子華則桓公但却華內臣之請而未嘗使之不與盟也王王氏錫爵曰仲諫桓以辭子華盛德事也齊可以矣惜其不學道不自誠意正心以刑其國使家有三歸國有六嬖之禍故孔子小之使卓氏爾康曰鄭伯恐桓公不解其殺申侯之故先子華求通謝過以求盟至冬鄭伯使請盟於齊必鄭君身親之盟乃成也觀下鄭伯乞盟可見案寧母之㑹五國而陳鄭皆遣世子蓋二國皆新被侵伐陳欲渝盟而未敢渝姑勉強以應鄭欲與盟而未得與猶趦趄不前故君皆不行而止遣世子也曹伯班卒班公作般案季氏本以不日為不訃而張氏溥因之蓋謂嗣子有爭故不暇訃也非也曹與魯屢同㑹盟無不訃之理若其不訃則亦不書矣書卒不書曰闕文也公子友如齊集說趙氏鵬飛曰僖三年公子友如齊聘聽伐楚之期而涖盟焉其後凡三年公不朝則季友聘終齊桓之世不怠也惟六年伐鄭自春徂冬不暇朝聘故七年公子友如齊十年公如齊十三年公子友如齊十五年公如齊十六年公子友卒十七年而齊桓即世當齊之伯僖友同心事伯主三年再朝之節未廢也雖不能一朝京師然當時諸侯皆不朝不可獨責魯也李氏廉曰公子友如齊二此年及十三年吾大夫正聘於齊始此霸汪氏克寬曰甫盟寧母而又使季友修聘所以勤國之好也十三年夏㑹醎冬季友復聘與此同冬葬曹昭公集說黃氏震曰七月卒冬而葬時也附録左傳閏月惠王崩襄王惡大叔帶之難懼不立不發喪而告難於齊已惠王二已十五年八年齊桓三十四年晉獻二十五年衛文八年蔡穆二十三年鄭文二十一年曹共公襄元年陳宣四十一年把成三年宋桓三十年秦穆八年楚成二十年春王正月公㑹王人齊侯宋公衛侯許男曹伯陳世子欵盟于洮陳世子欵下公有鄭世子華十洮杜注曹地今山東東昌府濮州西南五里有洮城左傳春盟于洮謀王室也襄王定位而後發喪公羊王人者何微者也曷為序乎諸侯之上先王命也榖梁王人之先諸侯何也貴王命也朝服雖敝必加於上辨冕雖舊必加於首周室雖衰必先諸侯兵車之㑹也胡傳王人下士也內臣之微者莫微於下士外臣之貴者莫貴於方伯公侯今以下士之微序乎方伯公侯之上外輕內重不亦偏乎春秋之法內臣以私事出朝者直書曰來以私好出聘者不稱其使以私情出訃者止録其名不以其貴故尊之也以王命行者雖下士之微序乎方伯公侯之上不以其賤故輕之也然則班列之髙下不在乎內外特繫乎王命爾聖人之情見矣尊君之義明矣集說何氏休曰銜王命㑹諸侯當北面受之故尊序於上杜氏預曰王人與諸侯盟不譏者王室有難故王孔氏穎達曰釋例以為中士稱名下士稱人此言人是天子之下士也諸侯相與為盟所以同奬王室天子之臣不與諸侯同盟二十八年踐土之盟傳稱王子虎盟諸侯於王庭杜云王子虎臨盟不同歃故不書宣七年傳曰諸侯盟于黑壤王叔桓公臨之以謀不睦杜云王叔桓公銜天子之命以監臨諸侯不同歃尊卑之别也哀十三年傳曰公㑹單平公晉定公吳夫差于黃池杜云平公周卿士也不書尊之不與㑹此三者王臣皆不與盟是其正法然也若天子初立王室不安命臣使結盟諸侯以安王室雖非正法事勢宜然既無褒美又無貶責此王人與諸侯盟不譏者王室有難王敕使來盟故也文十年及蘇子盟于女栗傳曰頃王立故也襄三年公㑹單子晉侯云云盟于雞澤杜云周靈王新即位使王官伯出與諸侯盟以安王室皆事與此同以情義可許故都無貶書二十九年翟泉之盟於是諸侯新睦王室無虞而王子虎下盟列國以瀆大典故貶稱王人是依禮不合故據法貶之春秋王臣與諸侯㑹盟凡十有餘事譏與不譏皆從此例盟杜氏諤曰案周禮邦國有疑諸侯㑹盟則為壇以之是諸侯從天子而受盟也末世列國專盟春秋譏之今不即㑹于周而盟于洮以見天子之弱就盟諸侯於下國也髙氏閌曰王室有叔帶之難世子之位猶未定蓋惠王疾惠后主叔帶故王人使齊求援而齊㑹諸侯以謀之而張氏洽曰愚案齊桓雖主㑹而先王人足以訓矣使之與諸侯之盟非所以示尊尊也吳氏􅊹曰左氏以為惠王已崩然天王之崩天下所聞豈有一年祕不發喪之理竊疑此時王雖未崩或是有疾襄王惟恐一旦大故而叔帶篡立周之大臣亦有能為襄王謀者故遣下士告難於齊桓公於是合諸侯以謀之王人本不當與盟蓋以所謀者王室之事而王人特為此事而來故亦與盟至冬王崩而襄王得安其位者齊桓之力也也汪氏克寬曰春秋書王人者三盟洮書王人常例救衛書王人子突褒之也盟翟泉書王人貶之也于洮諸侯皆書爵而翟泉諸國之大夫稱人則王子虎為貶可知矣春秋凡伯者主㑹必書公㑹而序伯者於諸侯之上首止㑹王世子而書公及齊侯則王世子在㑹而不以齊侯主㑹之辭也此書公㑹而序齊侯於王人之下亦不以齊侯主㑹之辭也後此葵丘翟泉柯陵雞澤平丘書法皆同然葵丘不盟宰周公而翟泉以後皆不以王事而盟王室之卿士則晉伯非桓比矣王氏樵曰左氏謂襄王定位而後發喪據經今年十二月丁未方書天王崩恐祕不發喪難於經年而叔帶乃襄王親弟非外國逺人亦難以祕喪為欺也祕不發喪蓋後世之事取權一時信史書之亦必從其實歷考後史可見豈春秋乃有此事因其權祕一時遂從其虛日而不改乎鄭伯乞盟榖梁以向之逃歸乞之也乞者重辭也重是盟也胡傳乞者卑遜自屈之辭欲與是盟而未知其得與否也始而逃歸今則乞盟於以見舉動人君之大節不可不慎也集說杜氏預曰新服未與㑹故不序列别言乞盟鄭孔氏穎達曰止言乞盟不知與盟與否傳稱伯乞盟請服也既言請服義無不受當是既盟之後而别與之盟諸言乞師皆乞得其師知此乞盟亦乞得其盟但盟理可見不復别言盟爾酌啖氏助曰公穀皆云乞盟者處其所而請與也蓋之也案乞者卑重之辭爾言酌與之迂僻甚矣假如乞師又如何酌之高氏閌曰楚為諸侯患鄭先受害自莊十六年書荆伐鄭至二十八年荆又伐鄭僖元年楚人伐鄭二年楚又侵鄭三年楚又伐鄭齊桓召陵之役楚始懾服則楚之不復加兵於鄭小白之力也鄭伯曷為背齊而附楚耶聖人備書其逃盟乞盟之事以罪鄭伯見義之不明自此至十七年小白卒楚人絶迹於鄭桓之伯功盛矣張氏洽曰鄭伯欲與於盟而不可得桓公以首止之逃外之也亦足以見伯權之重而可以使鄭伯之自反矣趙氏鵬飛曰甚矣君子之去就不可不謹也前日鄭文之逃盟不可去而去故聖人書逃逃之為義盜賊之事也今日之乞盟不得已而乞蓋求不以義乞之道也使鄭伯而知義則無逋逃之辱無卑乞之賤吾以是知去就之不可不謹也鄭家氏鉉翁曰前書逃所以誅鄭伯今書乞所以赦伯然亦以貶也賤鄭伯不得列於諸侯也蓋吳氏􅊹曰鄭伯前年徇惠王之邪心逃首止之盟不欲定世子也今見齊桓再㑹諸侯結盟以定世子之位襄王將嗣位為王矣故鄭伯懼後禍悔前非而乞與此盟也李氏廉曰春秋書乞六乞盟一乞師五得不得未可知也於汪氏克寬曰鄭伯乞盟不言使大夫則鄭伯親至㑹也不言如㑹則鄭伯得與於盟矣然不序列而别言乞盟以見鄭伯在㑹而卑屈以請與於盟耳夏狄伐晉左傳晉里克帥師梁由靡御虢射為右以敗狄於采桑梁由靡曰從之必大克里克曰懼之而已無速衆狄虢射曰期年狄必至示之弱矣夏狄伐晉報采桑之役也復期月采桑杜注平陽北屈縣西南有采桑津在今山西平陽府寧鄉縣西大河津濟處也集說許氏翰曰晉恃强且逺不與齊合是以狄得侮之趙氏鵬飛曰狄伐邢齊救而城之狄入衛齊徙而封之今秋伐晉齊桓視之如不見何也蓋自齊之伯晉歷三世未嘗一窺諸侯之壇坫也蓋自以為畿北之巨藩不屈於齊齊亦視之蔑如也羣趙氏與權曰晉與狄鄰故有疆埸之警啓土以居公子又為采桑之役內釁頻仍狄安得不肆乎國必自伐而後人伐之晉之謂也吳氏􅊹曰齊桓常存邢衛而不能挫狄師故秋無所忌而伐晉春秋傷齊伯之不能攘狄也秋七月禘于大廟用致夫人榖梁用致夫人用者不宜用者也致者不宜致者也言夫人必以其氏姓言夫人而不以氏姓非夫人也立妾之辭也非正也夫人之我可以不夫人之乎夫人卒葬之我可以不卒葬之乎一則以宗廟臨之而後貶焉一則以外之弗夫人而見正焉胡傳用者不宜用也致者不宜致也夫人者風氏也初成風聞季友之繇遂事之而屬僖公焉故季子立之公賜季友汶陽之田及費又生而命之氏俾世其卿而私門強矣於成風則舉大事於始祖之廟立以為夫人而嫡妾亂矣以私勞寵其臣而卑公室以私恩崇其母而輕宗廟皆越禮之罪也經書夫人而不稱姓氏其貶深矣集說范氏寧曰禘三年大祭之名太廟周公廟禮記明堂位曰季夏六月以禘禮祀周公于大廟雜記下曰蓋獻子曰七月日至可以有事于祖七月而禘獻子為之案宣九年仲孫蔑如京師於是獻子始見經襄十九年卒然則失禮非獻子所始明矣雜記之云寧所未詳劉向曰夫人成風也致之于太廟立之以為夫人夫人者正嫡之稱謂非崇妾之嘉號以妾體君則上下無别雖尊其母是卑其父故曰非正也禮有君之母非夫人者又庶子為後為其母緦是妾不為夫體明矣鄭嗣曰君以為夫人君以夫人之禮卒葬之主書者不得不以為夫人也成風以文四年薨五年葬傳終說其事臣無貶君之義故於太廟去夫人氏姓以明君之非正秦人來歸僖公成風之隧不言夫人孔氏穎達曰三年一禘禘自是常不為夫人禘祭因禘而致夫人嫌其異於常禮故史官書之若其不致夫人則此禘得常不書為用致夫人而書之爾何楊氏士勛曰左氏以夫人為哀姜元年為齊所殺為今日乃致之公羊以為齊之媵女先至脅公使立為夫人則僖公是作頌賢君縱為齊所脅豈得以媵妾為夫人乎明知二傳非也趙氏匡曰譏禘又譏致也成孫氏復曰禘天子大祭夫人成風也不言風氏者風僖公妾母嫁非廟見不得與祭僖公既君欲尊其母故因此秋禘用夫人之禮致于太廟使之與祭也妾母稱夫人僭之大者故不言風氏以貶之案莊元年夫人文姜孫于齊貶去姜氏此不言風氏其貶可知矣劉氏敞曰成風者僖公之母莊公之妾也然則何言乎禘於大廟用致夫人於是成之為夫人也成之為夫人則何以書譏何譏乎譏以妾為嫡也又曰春秋雖亂世未有妾母稱夫人者也自成風始矣此禮之所由失教之所由廢上下之所由亂嫡庶之所由爭其惡乃比於無父無君何以言之邪巳之母父之妾也今背死而使之配此所謂知母而不知父故曰無父凡立小君嫡子必天子命之者也今以其私親而建之非有天子之命也故曰無君無父無君者王法所禁也而天子不能正是王無天也故召伯來㑹葬榮叔歸含皆以王之無天為譏也也張氏洽曰穀梁傳言夫人而不以氏姓立妾之辭劉向以為成風而啖趙皆從之劉氏胡氏之說詳矣范寧謂欲尊其母實卑其父此言得春秋之㫖家氏鉉翁曰三傳為說不同愚獨有取穀梁之說文公四年書夫人風氏薨又書葬我小君成風正以僖公為非禮致其母為夫人文公又以祖母事之聖人於先君之母不得黜之為妾也得李氏廉曰趙子以為致聲姜則聲姜未聞有罪何不稱氏姓獻汪氏克寬曰哀公欲以嬖妾為夫人使宗人釁夏其禮對曰以妾為夫人古無其禮也夫自僖公致成風以妾母為夫人自後宣公致敬嬴襄公致定姒昭公致齊歸皆以妾母為夫人不復志於經矣而釁夏猶謂以妾為夫人則無其禮蓋雖立妾母而未嘗立妾也於以見魯衰之甚而舊典猶存也趙氏恆曰此特為用致成風而禘在禮夫人得與於祭君婦獻君母不獻君母既不獻成風雖不與可也而必用致之者成風在莊公時以妾不與今用致之使與於祭以成其為夫人也去其姓氏所謂存則以氏繫姓以姓繫號也祖王氏樵曰以妾體君是卑其父致于大廟是誣其故春秋謹而志之羅氏喻義曰何以謂之致也君母之貴比夫人然不廟見何名夫人惟廟中獻禮夫人與焉則因禘而致之爾致之斯夫人之矣曰未可也致夫人不言成風歸成風禭不言夫人春秋不以禮許人如是張氏溥曰春秋於成風之存也不可以不稱夫人而去其氏其殁也不可以不稱諡而去其夫人示不足也至矣冬十有二月丁未天王崩左傳冬王人來告喪集說范氏寧曰惠王也太趙氏匡曰左氏云七年閏月惠王崩襄王惡叔之亂不發喪而告難於齊八年正月㑹于洮謀王室也襄王定位而後發喪據此則正月二月位已定何得直至十二月而後告喪於諸侯則左氏不足憑也立張氏洽曰不書葬魯不㑹趙氏鵬飛曰王世子是為襄王吳氏􅊹曰蓋惠王前年之冬有疾今年歲終乃崩案左氏稱惠王於七年閏月崩八年十二月而後告喪則祕喪一年之久恐無此理故王氏樵趙氏匡皆以為疑也然春秋事據左氏今備載王趙之說而竝存左氏以備考附録左傳宋公疾大子兹父固請曰目夷長且仁君其立之公命子魚子魚辭曰能以國讓仁孰大焉臣不及也且又不順遂走而退庚襄王午元年九年齊桓三十五年晉獻二十六年衛文九年蔡穆二十四年鄭文二十二年曹共二年陳宣四十二年把成四年宋桓三十一年秦穆九年楚成二十一年春王正月丁丑宋公御說卒正月公穀作三月御魚吕反公穀作禦說音悅左傳九年春宋桓公卒未葬而襄公㑹諸侯故曰子集說啖氏助曰左氏云凡在喪王曰小童公侯曰子案王猛在喪不曰小童又伯子男在喪亦當稱子獨言公侯亦誤也不陸氏淳曰公羊曰不書葬為襄公諱案不葬者魯㑹爾為襄公諱有何義乎季氏本曰同盟又相接壤無不㑹葬之禮不書葬者襄公方有子喪而出㑹於葵丘故葬禮遂簡諸侯亦不遣人往㑹爾夏公㑹宰周公齊侯宋子衛侯鄭伯許男曹伯于葵丘葵丘杜注陳留外黃縣東有蔡丘釋例曰宋地也今在考城縣東三十里屬河南開封府左傳夏㑹于葵丘尋盟且修好禮也王使宰孔賜齊侯胙曰天子有事於文武使孔賜伯舅胙齊侯將下拜孔曰且有後命天子使孔曰以伯舅耋老加勞賜一級無下拜對曰天威不違顔咫尺小白余敢貪天子之命無下拜恐隕越於下以遺天子羞敢不下拜下拜登受公羊宰周公者何天子之為政者也穀梁天子之宰通於四海宋其稱子何也未葬之辭也禮柩在堂上孤無外事今背殯而出㑹以宋子為無哀矣胡傳其曰宰周公者以冢宰兼三公也古者三公無其人則以六卿之有道者上兼師保之任冢宰或闕亦以三公下行端揆之職禹自司空進宅百揆又曰作朕股肱耳目是以宰臣上兼師保之任也周公為師又曰位冢宰正百工是以三公下行端揆之職也所以然者三公與王坐而論道固難其人而冢宰統百官均四海亦不易處也夫以冢宰兼三公其職任重矣而不殊㑹之何也人臣則有進退之節出入均勞之義非王世子貴有常尊之可比矣集說杜氏預曰周公宰孔也宰官周采地天子三公不字孔氏穎達曰莊八年傳曰連稱管至父戍蔡丘杜云齊地傳稱齊侯不務德而勤逺略西為此㑹則此地逺處齊西不得近在臨淄故釋例以為宋地子陸氏淳曰趙氏云凡諸侯在喪而出以喪行者稱以吉行者稱爵志惡之淺深也又曰淳聞於師曰君子不奪人之喪齊為伯主而使宋子與㑹桓公失正可知也孫氏復曰桓以諸侯致宰周公于葵丘經以宰周公主㑹為文者不與桓以諸侯致天子三公也程子曰天子之宰與世子禮異故不殊㑹盟趙氏鵬飛曰是時叔帶尚有睥睨之心雖首止之定世子之位而已世子蓋未立也今世子立是為襄王襄之元年桓公首為是舉以尊之則子帶尚何敢窺其鼎之重輕也哉此葵丘之盟有功於周室不為不大矣來李氏廉曰宰周公見經者二此㑹宰孔也三十年聘宰閲也又曰桓公翼戴襄王之事始於首止中於于洮終於葵丘之汪氏克寬曰齊桓初㑹首止以尊王嗣而定天下大本繼㑹于洮以謀王室而安天下之大勢今㑹葵丘又眀王禁而示天下之大法五霸桓公為盛而桓公之㑹葵丘為盛宜春秋備書之而孟子稱之也春秋書冢宰者四咺賵寵妾糾聘大惡皆貶而名之閲聘僖公雖無貶辭然以冢宰兼三公而修聘事於諸侯則亦過矣惟宰孔出㑹諸侯奬霸主陳五禁使諸侯既知尊王室而且知畏王法則有功於周室者也故諸侯雖與之㑹而不敢與之盟後此王子虎盟諸侯大夫於王都之側貶而人之則有愧於宰孔矣然惠王之喪適當同軌畢至之際襄王方居諒陰百官總已以聽於冢宰之時桓公不率諸侯㑹於京師反致冢宰于葵丘而春秋無譏者豈桓公能弭王室之大難而功可掩過歟抑㑹葬既畢而修禮于葵丘以明王禁歟路季氏本曰史記謂襄王使宰孔賜桓公彤弓矢大則命以牧伯之事得專征伐矣春秋何以不書蓋桓之專征伐久矣豈待錫命哉故略之陳氏際泰曰桓有大功三無召陵楚無周也無首止天王無周也無葵丘諸侯無周也春秋所以豫桓也秋七月乙酉伯姬卒公羊此未適人何以卒許嫁矣婦人許嫁字而笄之死則以成人之喪治之榖梁內女也未適人不卒此何以卒也許嫁笄而字之死則以成人之喪治之集說何氏休曰字者尊而不泄所以逺别也許嫁卒者當為諸侯夫人有即貴之漸故從諸侯夫人例曰杜氏預曰婦人許嫁而笄猶丈夫之冠之范氏寧女子許嫁不為殤死則以成人之喪治謂許嫁於諸侯則尊同尊同則服大功九月吉笄以象為之刻鏤其首以為飾成人著之孔氏穎達曰此許嫁者嫁於國君也但未往彼國不成彼國之婦故不稱國也啖氏助曰內女為夫人書卒許嫁為夫人亦然其為媵及嫁大子公子大夫則不書姬孫氏覺曰春秋內女許嫁而卒惟二爾伯姬子叔是也九月戊辰諸侯盟于葵丘左傳秋齊侯盟諸侯于葵丘曰凡我同盟之人既盟之後言歸於好宰孔先歸遇晉侯曰可無㑹也齊侯不務德而勤逺略故北伐山戎南伐楚西為此㑹也東略之不知西則否矣其在亂乎君務靖亂無勤於行晉侯乃還公羊貫澤之㑹桓公有憂中國之心不召而至者江人黃人也葵丘之㑹桓公震而矜之震之者何猶曰振振然矜之者何猶曰莫若我也穀梁葵丘之盟陳牲而不殺讀書加於牲上一明天子之禁曰毋雍泉毋訖糴毋易樹子毋以妾為妻毋使婦人與國事胡傳㑹盟同地再言葵丘何也書之重辭之復其中必有大美惡焉葵丘之盟美之大者也初命曰誅不孝無易樹子無以妾為妻再命曰尊賢育材以彰有德三命曰敬老慈幼無忘賔旅四命曰士無世官官事無攝取士必得無專殺大夫五命曰無曲防無遏糴無有封而不告曰凡我同盟之人既盟之後言歸於好以是為盡禁矣諸侯咸喻乎桓公之志蓋束牲載書而不歃血也是故㑹盟同地而再言葵丘美之也觀孟子所載此盟初命之辭則知桓公翼戴襄王之事信矣集說杜氏預曰夏㑹葵丘次伯姬卒文不相比故重言諸侯宰孔先歸不與盟陸氏淳曰淳聞於師曰盟稱諸侯者前目後凡之義且明周公之不與盟也不與盟禮也天子無疑諸侯之理劉氏敞曰九年盟于葵丘公羊曰桓之盟不日此何以日危之也非也葵丘桓之盛也孟子嘗言之矣惟以日月為例遂亂於安危嗚呼慎言哉陵之師自是好本末自是别朱子曰葵丘之㑹召張氏洽曰一命之辭三綱所繫蓋修身正家之要自此以下尊賢敬臣子民柔逺人懷諸侯之意略備春秋故再書葵丘以美之然桓公於易樹子以妾為妻之禁終不免躬自犯之况諸侯方服而驕公羊氏以為震而矜之叛者九國左氏記宰孔曰濟侯不務德而勤逺略本源不正而驕吝形其視大㑹作誥謂栗栗危懼若將隕于深淵者何翅霄壤之殊哉聖人以齊桓霸功積纍至此而成是以姑掩其不足而叙其美也汪氏克寬曰桓公以五命之辭約束諸侯而不敢盟宰周公者不敢使天子之宰受諸侯之約束也晉文以後王臣出㑹皆同盟則非桓比矣然是盟乃桓伯盛衰之幾鄭康成所謂桓德極而將衰也蓋自再盟幽而諸侯協獻捷治戎存邢衛却狄盟召陵帖楚而列國安盟首止于洮而王室寧及乎葵丘而伯業盛矣奈何陽穀之㑹與僖公聲姜肆於寵樂城把之功不若城邢救徐之師緩於救許伐黃不恤謀鄫無成而伯業衰矣故論者謂葵丘以前猶自朔至望之月葵丘以後猶自望至晦之月蓋由其心有勤怠之殊是以其功有盛衰之漸也但公羊謂叛者九國亦無可考故趙氏云此㑹惟六國㑹鹹牡丘皆七國㑹淮八國竝書舊盟之國寧有九國叛乎滿王氏樵曰九國叛之說固無據但桓公之心至是甚宰孔料其將亂矣嚴氏啓隆曰葵丘之㑹實可無盟既㑹兩月而復盟者慮叔帶之謀之未息也故宰孔歸而諸侯復盟且為之申王禁以風示於帶初命曰誅不孝指叔帶也無易樹子無以妾為妻指惠王也叔帶由是終桓之世無敢妄有所冀也案左氏宰孔止晉侯語先儒多疑之者蓋晉未嘗與齊㑹盟也疑經文下與晉侯卒連書遂傅㑹為此說然事以左氏為據姑識所疑於此甲子晉侯詭諸卒甲子公作甲戌詭左作佹左傳九月晉獻公卒里克㔻鄭欲納文公故以三公子之徒作亂初獻公使荀息傅奚齊公疾召之曰以是藐諸孤辱在大夫其若之何稽首而對曰臣竭其股肱之力加之以忠貞其濟君之靈也不濟則以死繼之公曰何謂忠貞對曰公家之利知無不為忠也送往事居耦俱無猜貞也及里克將殺奚齊先告荀息曰三怨將作秦晉輔之子將何如荀息曰將死之里克曰無益也荀叔曰吾與先君言矣不可以二能欲復言而愛身乎雖無益也將焉辟之且人之欲善誰不如我我欲無二而能謂人己乎集說杜氏預曰未同盟而赴以名甲子九月十一日戊辰十五日也書在盟後從赴孔氏穎達曰從赴者赴在盟後也公張氏洽曰左氏作甲子不應甲子在戊辰後合從羊作甲戌季氏本曰晉雖同姓前此喪俱不訃吳隨北燕亦然可見非同盟而親盡則禮有節矣其後因強盛而私相通問豈非王制所禁乎若郕郜諸同姓國雖同盟而不紀其卒者以國小不敢訃以煩大國之弔案經書甲子於戊辰之後杜注孔疏皆以為赴在盟後也張氏洽從公羊作甲戌或戌誤為子亦未可定姑竝存之冬晉里克殺其君之子奚齊殺公作弒左傳冬十月里克殺奚齊於次書曰殺其君之子未葬也荀息將死之人曰不如立卓子而輔之荀息立公子卓以葬十一月里克殺公子卓於朝荀息死之君子曰詩所謂白圭之玷尚可磨也斯言之玷不可為也荀息有焉公羊此未踰年之君其言弒其君之子奚齊何弒未踰年君之號也穀梁其君之子云者國人不子也國人不子何也不正其殺世子申生而立之也胡傳穀梁子曰其君之子云者國人不子也不正其殺申生而立之也人君擅一國之名寵為其所子則當子矣國人何為不子也民至愚而神是非好惡靡不明且公也其為子而弗子者莫能使人弗之子也非所子而子之者莫能使人之亦子也集說楊氏士勛曰不子者謂不以為君則是不子也趙氏匡曰齊舍亦未踰年君也不云其君之子故穀梁國人不子之義是也也陸氏淳曰淳聞於師曰奚齊不曰君明其本非正書曰其君之子者明國人意不以為嗣獨君意立之也盧氏同曰書里克殺其君之子知晉之不君奚齊孫氏復曰奚齊庶孽獻公殺世子而立之春秋不與故曰君之子惡之也杜氏諤曰曰殺其君之子猶曰晉君之子爾雖立為君春秋不成之為君也何陳氏傅良曰遇弒雖未踰年稱君此其稱君之子獻公殺申生絀重耳夷吾而立其嬖子晉之亂獻公為之也是故奚齊不稱君而稱君之子張氏洽曰愚案奚齊謂之其君之子以晉獻公殺適立庶而奪之也齊舍未踰年而謂之君以舍之正而與之也或抑或揚得是非之公可以觀矣死家氏鉉翁曰奚齊死於喪次君臣之分未定卓子於詭諸既葬君臣之分已定是以書法不同遇季氏本曰其君之子公羊以為未踰年之君非也弒雖未踰年稱君觀商人曰弒其君可知矣案經書其君之子公羊曰未踰年君之號也非也公羊以子般為未踰年之君而曰君薨稱子某既葬稱子其例甚明蓋子般子野稱子稱名君薨故也子赤稱子不稱名既葬故也從子般之例則但稱子奚齊可矣何以稱其君之子耶故以穀梁國人不子之說為正附録左傳齊侯以諸侯之師伐晉及髙梁而還討晉亂也令不及魯故不書晉郤芮使夷吾重賂秦以求入曰人實有國我何愛焉入而能民土於何有從之齊隰朋帥師㑹秦師納晉惠公秦伯謂郤芮曰公子誰恃對曰臣聞亡人無黨有黨必有讐夷吾弱不好弄能鬬不過長亦不改不識其他公謂公孫枝曰夷吾其定乎對曰臣聞之惟則定國詩曰不識不知順帝之則文王之謂也又曰不僭不賊鮮不為則無好無惡不忌不克之謂也今其言多忌克難哉公曰忌則多怨又焉能克是吾利也宋襄公即位以公子目夷為仁使為左師以聽政於是宋治故魚氏世為左師髙梁杜注晉地在平陽縣西南今山西平陽府臨汾縣東三十七里高梁都地名梁墟是也辛襄王未二年十年齊桓三十六年晉惠公夷吾元年衛文十年蔡穆二十五年鄭文二十三年曹共三年陳宣四十三年把成五年宋襄公兹父元年秦穆十年楚成二十二年春王正月公如齊集說啖氏助曰公及內卿往他國朝聘皆書如之趙氏匡曰周之制朝聘也有數今春秋畢書見如京師之簡也所以傷王室之微著諸侯之不臣也張氏洽曰莊公十三年柯之盟魯已服齊雖莊公因昏姻一再如齊自此魯不朝齊者幾二十年蓋桓公伯業未盛不責諸侯以朝禮也今僖公始朝齊見於葵丘之後伯體漸肆諸侯不朝天子而朝伯主自是始矣吳氏􅊹曰僖公兩朝齊桓事伯主也末年一朝齊昭繼前好也宣公四朝齊惠以篡立而求援也古者諸侯相朝之禮齊等之國往來報施互相朝也天下無道惟有小國朝大國故魯所朝者齊晉楚三大國宋衛鄭與魯齊等則相聘而已程氏端學曰如者往也故上下內外通言之然外諸侯大夫來魯朝聘皆明書之魯往他國朝聘皆但言如者亦內辭而孔子因之也蓋魯不朝王而朝齊伯業愈盛而王綱愈墜矣魯然則他國可知李氏廉曰經書公如齊凡十五桓莊之編四書如皆非朝也獨此為朝齊之始僖如齊三宣如齊六昭如齊二狄滅溫溫子奔衛左傳十年春秋滅溫蘇子無信也蘇子叛王即狄又不能於狄狄人伐之王不救故滅蘇子奔衛集說杜氏預曰蘇子周司寇蘇公之後也國於溫故曰溫子杜氏諤曰弦江黃近楚楚侵而滅之諸侯不救以其尚逺也今溫實天子之近國而狄滅之諸侯不能攘而正之所以病齊桓也張氏洽曰王靈不振畿內諸侯秋得滅之此天王出居鄭之權輿也趙氏鵬飛曰狄伐邢入衛伐晉滅溫而齊桓不問豈葵丘之㑹矜心日生以溫為無足救歟視其滅而不救蓋以其無損於齊也豈伯主之公心乎齊桓於此有不克終之漸矣衛吳氏􅊹曰狄於閔之季年伐邢入衛齊桓雖存邢而不加兵於狄蓋其時方急圗楚故未暇及狄狄因此愈肆前年敢伐大國之晉今又敢滅畿內之溫豈特王靈之不振抑亦伯圖之有闕也晉里克弒其君卓及其大夫荀息卓公作卓子公羊及者何纍也弒君多矣舍此無纍者乎曰有孔父仇牧皆纍也舍孔父仇牧無纍者乎曰有有則此何以書賢也何賢乎荀息荀息可謂不食其言矣其不食其言奈何奚齊卓子者驪姬之子也荀息傅焉驪姬者國色也獻公愛之甚欲立其子於是殺世子申生申生者里克傅之獻公病將死謂荀息曰士何如則可謂之信矣荀息對曰使死者反生生者不愧乎其言則可謂信矣獻公死奚齊立里克謂荀息曰君殺正而立不正廢長而立幼如之何願與子慮之荀息曰君嘗訊臣矣臣對曰使死者反生生者不愧乎其言則可謂信矣里克知其不可與謀退弒奚齊荀息立卓子里克弒卓子荀息死之荀息可謂不食其言矣穀梁以尊及卑也荀息間也胡傳國人不君奚齊卓子而曰里克弒其君卓何也是里克君之也克者世子申生之傅也驪姬將殺世子而難里克使優施飲之酒而告之以其故里克聽其謀乃欲以中立自免稱疾不朝居三旬而難作是謂持祿容身速獻公殺適立庶之禍者故成其君臣之名以正其弒逆之罪克雖欲辭而不受其可得乎使克明於大臣之義據經廷諍以動其君執節不二固太子以攜其黨多為之故以變其志其濟則國之福也其不濟而死於其職亦無歉矣人臣所明者義於功不貴幸而成所立者節於死不貴幸而免克欲以中立祈免自謂智矣而終亦不能免等死爾不死於世子而死於弒君其亦不知命之蔽哉荀息者奚齊卓子之傅也君弒而死於難書及所以著其節書大夫不失其官也於荀息何取焉若息者可謂不食其言矣或曰息既從君於昏不食其言庸足取乎世衰道微人愛其情私相疑二以成傾危之俗至於刑牲歃血要質鬼神猶不能固其約也息不食言其可少乎集說柳氏宗元曰春秋之進荀息非聖人之情也進荀息以甚苟免之惡也劉氏敞曰里克能不聽優施之謀寧喜能不從孫林父之亂陳乞能不隨景公之惑則晉無殺世子之禍衛無逐君之惡齊無立嬖孽之變矣患皆在偷合苟容逢君之惡故春秋成其君臣之名以正其篡弒之罪也所謂不知其義被之空言不敢辭矣不然卓與剽荼豈有宜為君之義哉司馬氏光曰獻公溺於嬖寵廢長立少荀息為國正卿君所倚信不能明白禮義以格君心之非而遽以死許之是則荀息之言玷於獻公未殁之前而不可救於己殁之後也左氏之志所以貶荀息而非以為褒也朱子語類云問里克㔻鄭荀息三人當初晉獻公欲廢大子申生立奚齊荀息便謂君命立之臣安敢二略不能諫君以義此大段不是里克㔻鄭謂從君之義不從君之惑所見甚正只是後來却做不徹曰他倒了處便在那中立上天下無中立之事自家若排得他退便用排退他若奈何不得便用自死或曰看荀息亦有不是處曰全然不是豈止有不是處只是辦得一死亦是難事而張氏洽曰里克當申生未死之前不能以死正諫中立以求免坐視大子之無罪而死以成驪姬讒賊之謀及其終也逆獻公之遺命而弒二君夫奚齊卓子雖庶孽而有先君之命以立乎其位則固里克之君也君臣之分已定而犯上作亂如此故正名其弒君而荀息不失信於君得以死節書此其定罪所以為輕重之權衡非聖人莫能修之也黃氏仲炎曰申生死於讒而里克不平其事奚齊卓子死於亂而荀息不食其言二子者皆用其死力於晉國者也然里克不免乎殺君之名荀息不免乎從昏之罪殺身而無益於國何哉人臣之義在於正諫其君之非而已苟能以死力正諫其君鮮有不能回其君之聽者不幸而不聽以至於死則臣子之義盡矣漢髙帝欲立趙王如意張良極諫不聽叔孫通又諫時大臣多固爭乃止不立今里克荀息雖各盡其死力而莫能知此也方獻公使大子伐皋落氏里克嘗諫矣一不見聽遂不復言驪姬譖而不能爭也申生死而不能明也蓄憤久之而以三公子之徒作亂是里克雖有不徇其君之心而不能辨之於早也申生之死荀息不惟不能諫又且成其君之邪志以死奉奚齊及里克殺奚齊卓子而荀息死之是荀息雖有不愛其死之心而不能用之於義也故里克不免弒逆之名荀息不免從昏之罪家氏鉉翁曰公羊於孔父曰義形於色於仇牧曰不畏彊禦至荀息則曰可謂不食其言矣蓋既不能正諫於始又任託孤之寄雖欲苟免其可得乎聖人所取特在於不食言若事君大節猶有所愧反李氏亷曰外傳云申生伐皋落氏敗之於稷桑而讒言益起五年驪姬告優施曰君既許我殺大子而立奚齊矣吾難里克奈何施曰子為我具特羊之饗吾從之飲酒我優也言無郵中飲施起舞謂里克妻曰主孟啖我我教兹暇豫事君乃歌曰暇豫之吾吾不如鳥烏人皆集於菀已獨集於枯里克笑曰何謂菀何謂枯優施曰其母為夫人其子為君可不謂菀乎其母既死其子又有謗可不謂枯乎枯且有傷優施出里克辟奠不飱而寢夜半召優施曰曩而言戲乎抑有所聞乎施曰然君既許驪姬殺大子而立奚齊矣里克曰吾秉君以殺大子吾不忍通復故交吾不敢中立其免乎施曰免旦而里克告㔻鄭鄭曰惜也不如曰不信以疏之亦固大子以攜之多為之故以變其志志少疏乃可間也今子曰中立况固其謀也彼有成矣難以得間里克曰往言不可及也明日稱疾不朝三旬難乃成今案胡氏之說多本此足見里克中立本末故具録之汪氏克寬曰春秋書死節者三孔父仇牧荀息息之守信比於正色而立於朝委身以摧勍敵者固有間矣然聖人猶有取焉者視石之紛如徒人費賈舉州綽近習嬖幸之臣則猶此善於彼也湛氏若水曰公羊胡氏之言荀息誠信矣荀息當獻公之蠱惑宜引之以當道而志於仁使嫡庶之分明而上下之義定獻公不陷於殺嫡立庶之惡而後遂免奚齊卓子見殺之慘可也不知出此而從君於邪乃以不食言為信為忠是匹夫匹婦之為諒也卓王氏樵曰奚齊卓子一耳國人不子奚齊則不子子矣而書曰弒其君卓何也二子雖不正而有先君之命則固里克之君也不正既於奚齊見義則於卓子成其君臣之名以正里克之罪非聖人不能修此類是也次余氏光曰獻公未葬奚齊未立已為里克殺於喪春秋何緣稱之為君乎卓子既立里克弒之春秋何緣不稱之為君乎其書殺書弒特繫夫君與未君耳案奚齊不書君所以譏獻公也卓書弒其君所以正里克之罪也荀息以死踐言固勝於臨難茍免者然從君於昏則大非孔父仇牧之比矣左氏引詩貶而非褒也司馬氏光之言甚有理夏齊侯許男伐北戎北戎杜注山戎集說薛氏季宣曰當是時患有大於戎者狄及晉楚是也晉滅虢滅虞狄入衛逼邢前年伐晉近又滅溫召陵之後楚滅弦圍許豈可置而不圖舍強圖弱守衛果如是乎所謂不務德而勤逺略况許方患楚而驅以伐戎非用人之道也許季氏本曰楚圍許諸侯嘗救之故伐北戎專以役而諸侯稍休息焉亦可以見桓公之節制也晉殺其大夫里克左傳夏四月周公忌父王子黨㑹齊隰朋立晉侯晉侯殺里克以說將殺里克公使謂之曰微子則不及此雖然子弒二君與一大夫為子君者不亦難乎對曰不有廢也君何以興欲加之罪其無辭乎臣聞命矣伏劍而死於是㔻鄭聘於秦且謝緩賂故不及公羊里克弒二君則曷為不以討賊之辭言之惠公之大夫也然則孰立惠公里充也里克弒奚齊卓子逆惠公而入里克立惠公則惠公曷為殺之惠公曰爾既殺夫二孺子矣又將圖寡人為爾君者不亦病乎於是殺之穀梁稱國以殺罪纍上也里克弒二君與一大夫其以纍上之辭言之何也其殺之不以其罪也其殺之不以其罪奈何里克所為弒者為重耳也夷吾曰是又將殺我乎故殺之不以其罪也其為重耳弒奈何晉獻公伐虢得麗姬獻公私之有二子長曰奚齊稚曰卓子麗姬欲為亂故謂君曰吾夜者夢夫人趨而來曰吾苦畏胡不使大夫將衛士而衛冢乎公曰孰可使曰臣莫尊於世子則世子可故君謂世子曰麗姬夢夫人趨而來曰吾苦畏女其將衛士而往衛冢乎世子曰敬諾築宫宫成麗姬又曰吾夜者夢夫人趨而來曰吾苦飢世子之宫已成則何為不使祠也故獻公謂世子曰其祠世子祠巳祠致福於君君田而不在麗姬以鴆為酒藥脯以毒獻公田來麗姬曰世子巳祠故致福於君君將食麗姬跪曰食自外來者不可不試也覆酒於地而地賁以脯與犬犬死麗姬下堂而啼呼曰天乎天乎國子之國也子何遲於為君君喟然歎曰吾與女未有過切是何與我之深也使人謂世子曰爾其圖之世子之傅里克謂世子曰入自明入自明則可以生不入自明則不可以生世子曰吾君已老矣已昏矣若此而入自明明則麗姬必死麗姬死則吾君不安所以使吾君不安者吾不若自死吾寧自殺以安吾君以重耳為寄矣刎脰而死故里克所為弒者為重耳也夷吾曰是又將殺我也胡傳里克弒二君與一大夫不以討賊之辭書者惠公殺之不以其罪也殺之不以其罪奈何里克所為弒者為重耳也夷吾曰是又將殺我也若惠公既立而謂克曰先君命大夫為世子傅世子死非其罪而大夫不之恤若奚齊者既有先君之命矣而大夫又殺之以及卓大夫雖殺之獨不念先君之命乎則克必再拜而死不復有言矣惠公乃曰又將圖寡人是殺之不以其罪也故稱國以殺而不去其官集說啖氏助曰公羊云曷為不書惠公之入晉之不言出入者踊為文公諱也案此不知有不告則不書之義故穿鑿矣孫氏覺曰里克雖有弒君之罪夷吾嘗命為大夫又以己私殺之晉殺其大夫爾非討賊也書葉氏夢得曰晉里克衛寧喜皆弒其君者也然不討賊之辭而與殺大夫一施之何哉所以殺者非討賊也卓死惠公求入里克實迎立焉則惠公固幸卓之死而竊其位者也衛獻公之入立則固與聞乎弒矣是以求復於喜曰苟反政由寧氏祭則寡人此豈可責以討賊者歟及其得國惠公則曰子弒二君一大夫為子君者不亦難乎而後殺克獻公既以政許寧喜而患其專乃與公孫無地公孫臣謀攻寧氏免余殺喜而尸諸朝其討克與喜者皆畏其害己而除之者也使惠獻無愧於卓與剽歸正二臣之罪而誅焉春秋如之何不書曰晉人殺里克衛人殺寧喜乎朱子曰書晉殺其大夫不以弒君之罪討之也言張氏洽曰里克再弒其君而其誅不以討賊之辭之蓋里克在獻公父子則為賊而惠公幸奚齊卓子之死而得立初未嘗有討里克之心獨以其志在重耳而不在己懼其又將以己為奚齊卓子是以殺之蓋其事與專殺大夫者無異固不得以討賊之辭書之也王氏元杰曰荀息不去大夫著其節也里克不去其官原其情也大鄭氏玉曰既書弒君於前誅里克之為賊後書殺夫於後以明惠公之不能討其賊推見至隱曲盡其情非聖人莫能修之也汪氏克寬曰㔻鄭非弒君之賊而惠公亦殺之則知里克之殺非討賊矣討賊不以其罪不書人其君殺之則猶曰大夫里克寧喜是也非君殺之則以兩下相殺為文楚公子比蔡般是也秋七月附録左傳晉侯改葬共大子秋狐突適下國遇大子大子使登僕而告之曰夷吾無禮余得請於帝矣將以晉畀秦秦將祀余對曰臣聞之神不歆非類民不祀非族君祀無乃殄乎且民何罪失刑乏祀君其圖之君曰諾吾將復請七日新城西偏將有巫者而見我焉許之遂不見及期而往告之曰帝許我罰有罪矣敝於韓㔻鄭之如秦也言於秦伯曰呂甥郤稱冀芮實為不從若重問以召之臣出晉君君納重耳蔑不濟矣下國杜注曲沃新城水經注云下國即新城今聞喜治也詳前四年新城注韓杜注晉地括地志同州韓城縣南十八里為古韓國今屬陜西西安府地名韓原冬大雨雪雨于付反雪公作雹公羊何以書記異也集說髙氏閌曰春秋書大雨雪者三隱以曰書桓以月書此以時書黃氏仲炎曰雨雪常也惟大而為害故書獨桓八年雨雪不言大者周之十月今之八月非雨雪之時故以異書也趙氏鵬飛曰非大雪之時而大雪常寒之罰也洪範曰聽之不聰是謂不謀厥罰常寒則大雪非苟記異所以責時君不能建皇極也月湛氏若水曰周之冬酉戌亥月即夏之八九十也是時陰結而未凝故以為異附録左傳冬秦伯使泠至報問且召三子郤芮曰幣重而言甘誘我也遂殺㔻鄭祁舉及七輿大夫左行共華右行賈華叔堅騅歂纍虎特宫山祁皆里㔻之黨也㔻豹奔秦言於秦伯曰晉侯背大主而忌小怨民弗與也伐之必出公曰失衆焉能殺違禍誰能出君壬襄王申三年十有一年齊桓三十七年晉惠二年衛文十一年蔡穆二十六年鄭文二十四年曹共四年陳宣四十四年把成六年宋襄二年秦穆十一年楚成二十三年春晉殺其大夫㔻鄭父㔻浦悲反左傳春晉侯使以㔻鄭之亂來告穀梁稱國以殺罪纍上也胡傳案左氏㔻鄭言於秦伯請出晉君則鄭有罪矣曷為稱國以殺而不去其官惠公以私意殺里克故其黨皆懼鄭之有此謀由殺里克致之也春秋以大義公天下為誅賞故書法如此其稱國者兼罪用事大夫不能格君心之非至於多忌濫刑危其國也集說髙氏閌曰㔻鄭父者里克之黨也惠公以私意殺里克故其黨皆懼謀召重耳是懷二心以事君也鄭之死雖可傷亦可罪也信張氏洽曰惠公志於得國而無人君之度外則失於秦內則忌克多殺故㔻鄭雖有私謀二心而春秋以纍上之辭書之也家氏鉉翁曰始謀納文公者里克㔻鄭也里克死㔻鄭豈能獨存夷吾殺之為其私爾克猶有罪㔻鄭之殺是謂濫刑夷吾專殺之罪大矣再稱國以殺不與其殺也㔻王氏元杰曰惠公之入以汾陽負葵之田賂里克鄭惠公既已得國背賂而殺里克故㔻鄭懼而生心是則里克㔻鄭之死惠公之私也春秋是以稱國以殺不去其官蓋恕之也汪氏克寬曰鄭父名也若慶父林父行父處父之類或以為命大夫稱字非是傳但言鄭者省文如經書樂祁犂而傳言樂祁經書箕鄭父胥甲父而傳止稱箕鄭胥甲王氏樵曰郤芮背惠不與秦賂詿誤晉君懷復私怨贊其濫殺其罪亦安可辭胡氏謂稱國者兼罪用事大夫得之矣附録左傳天王使召武公內史過賜晉侯命受玉惰過歸告王曰晉侯其無後乎王賜之命而惰於受瑞先自棄也已其何繼之有禮國之幹也敬禮之輿也不敬則禮不行禮不行則上下昏何以長世夏公及夫人姜氏㑹齊侯于陽穀胡傳襄陵許翰曰先乎陽榖之㑹為大雨雪後乎陽榖之㑹為大雩僖公賢君不能禮佐齊桓警其怠忽而更與之俱肆於寵樂是以見戒於天如此以公夫人陽榖之㑹觀之齊桓伯業怠矣故楚人伐黃不能救凡此類屬詞比事直書於策而義自見者也集說杜氏預曰婦人送迎不出門見兄弟不踰閾與公俱㑹齊侯非禮孫氏復曰公及夫人姜氏㑹齊侯于陽穀參譏之也此髙氏閌曰公之娶夫人之歸皆不書者合禮故也㑹于陽榖則非禮矣公稔聞桓莊之失而不改其轍齊侯親見兩國之事亦循其迹以兩君相㑹而使婦人厠於其間何以示侍衛僕從之臣乎從薛氏季宣曰夫人齊侯之女也歸寧可也為㑹而夫於外非歸寧之禮也張氏洽曰男女無别則瀆亂生諸侯㑹霸主而婦人與焉般樂縱肆浸淫日長宜桓公自是以往黃亡不救徐救不力女寵盛行霸業遂衰而魯僖之怠棄國政亦自此始矣可不戒哉黃氏仲炎曰男女正位天地之大義也魯僖亂之而不自正齊桓與之為亂而不能正皆罪而已矣家氏鉉翁曰齊桓始霸以哀姜為戮於是齊襄衛宣汚染之習為之一掃庶乎古方伯之遺烈矣及其暮年乃與僖姜為陽榖與卞之㑹霸業其衰矣稱汪氏克寬曰書及以㑹所以别男女也桓公如齊公與姜氏此稱及則僖公猶能防制云爾魯頌稱聲姜為令妻則聲姜必無文姜之行矣姜張氏溥曰魯頌頌僖公曰魯侯燕喜令妻壽母聲魯夫人之賢者也㑹齊侯於陽榖書者為男女逺嫌也魯亂由二姜春秋惡之深痛之疾自桓十八年公㑹齊侯于濼文姜與焉其後曠不書公夫人出㑹者五十餘年矣忽㑹于陽榖雖賢有懼十七年秋卞之㑹夫人為齊侯止公出㑹以解有事而行猶兢兢書之是春秋之防間也附録左傳夏揚拒泉皋伊雒之戎同伐京師入王城焚東門王子帶召之也秦晉伐戎以救周秋晉侯平戎於王揚拒泉皋杜注皆戎邑伊闕北有泉亨今河南府洛陽縣西南有前城即泉亭也伊雒之戎杜注諸雜戎居伊水雒水之間者秋八月大雩榖梁雩得雨曰雩不得雨曰旱集說趙氏鵬飛曰雩有二月今仲夏大雩帝用盛樂時祭也周禮司巫國有大旱則師巫舞雩旱祭也也吳氏澄曰諸侯旱而雩禮大雩祀及上帝非禮也冬楚人伐黃左傳黃人不歸楚貢冬楚人伐黃集說陳氏傅良曰滅不言伐此書伐病桓公也以陽榖之㑹貫之盟徒以亡其國爾張氏洽曰桓公怠荒之心見於陽榖之㑹楚人已占之於江漢之間而遂興伐黃之師也吳氏􅊹曰楚之強暴凡近楚之國皆責之以納職貢如事天子之禮黃既從齊霸故不歸楚貢而楚伐之至於亡也汪氏克寬曰管仲雖非王佐之才其輔相桓公致霸業之盛則其功大矣據齊語則咫尺天顔俯伏下拜以敬君命者皆仲諷諫之力也蓋葵丘以後管仲既卒則懈怠苟簡而非前日之比矣然左傳記明年冬使管仲平戎於王史記管仲之卒在桓公四十一年當僖公十五年滅黃之時蓋未卒也豈史記之說有不足信抑或仲諫桓公以救黃而不從歟強陳氏際泰曰天下有大機焉不可不務慎也楚之也自敗蔡始齊桓于召陵扼而盟之是以未加兵而自服俄而公然伐黃所以明逼齊也齊師不出於是而逺及徐徐與齊邇而齊救不力則天下遍被禍矣故敗蔡一大機也伐黃一大機也惜乎桓德之衰之不逮此也癸襄王酉四年十有二年齊桓三十八年晉惠三年衛文十二年蔡穆二十七年鄭文二十五年曹共五年陳宣四十五年把成七年宋襄三年秦穆十二年楚成二十四年春王三月庚午日有食之集說杜氏預曰不書朔官失之趙氏鵬飛曰失其朔也附録左傳春諸侯城衛楚丘之郛懼狄難也夏楚人滅黃左傳黃人恃諸侯之睦於齊也不共楚職曰自郢及我九百里焉能害我夏楚滅黃榖梁貫之盟管仲曰江黃逺齊而近楚楚為利之國也若伐而不能救則無以宗諸侯矣桓公不聽遂與之盟楚伐江滅黃桓公不能救故君子閔之也胡傳春秋滅人之國其罪則一而見滅之君其例有三以歸者既無死難之節又無克復之志貪生畏死甘就執辱其罪為重許斯頓牂之類是也出奔者雖不死於社稷有興復之望焉託於諸侯猶得寓禮其罪為輕弦子溫子之類是也若夫國滅死於其位是得正而斃焉者矣於禮為合於時為不幸若江黃二國是也其書滅者責方伯連帥之不修其職使小國賢君困於強暴不得其所公羊所謂亡國之善辭上下之同力者也集說黃氏仲炎曰不書出奔者君死於其位也三趙氏鵬飛曰冬伐而夏始滅黃守以待救也時而齊救不至黃尚何以存之桓之伯業於是乎不克終矣家氏鉉翁曰自冬徂夏齊不能救坐視其亡自是諸侯日散伯業曰衰矣不程氏端學曰江黃國小而近楚齊桓既與之盟而救則君子之責有所歸矣夫齊桓未伯其求諸侯如此之勤也伯業既盛而棄江黃如敝屣者何也以德行仁者德愈盛而心愈固以力假仁者力盡志溢則怠矣故貴王賤伯春秋之大義也汪氏克寬曰江黃二國之滅皆不書以其君歸亦不書其君奔者蓋君臣同力效死以守而待救也故滅不書伐而黃則書伐江則書圍齊不救黃其罪可知晉雖救江而所以救之者非其道與不救無以異也案左傳是年冬管仲平戎於王史記管仲之卒亦在僖十五年則滅黃之時管仲尚在榖梁以為管仲死非也秋七月附録左傳王以戎難故討王子帶秋王子帶奔齊戎冬齊侯使管夷吾平戎於王使隰朋平於晉王以上卿之禮饗管仲管仲辭曰臣賤有司也有天子之二守國高在若節春秋來承王命何以禮焉陪臣敢辭王曰舅氏余嘉乃勳應乃懿德謂督不忘往踐乃職無逆朕命管仲受下卿之禮而還君子曰管氏之世祀也宜哉讓不忘其上詩曰愷悌君子神所勞矣集說王氏樵曰王子帶召戎伐京師入王城圖危王室在王室則管蔡之比也屬籍當絶在天下則王室之賊天下當共討也王聲其罪而討之齊侯不聞助王而反受王子帶之奔又不執以歸於京師謂之何哉戎伐王室天下古今之大變諸侯修方伯之職謂宜以是為勤王之首而齊桓曽莫之恤其昧於義而闕於職也甚矣方且使管仲平戎於王夫鄰好和合之謂平戎犯王室而平焉惡用方伯連率為矣冬十有二月丁丑陳侯杵臼卒杵公作處甲襄王戌五年十有三年齊桓三十九年晉惠四年衛文十三年蔡穆二十八年鄭文二十六年曹共六年陳穆公欵元年把成八年宋襄四年秦穆十三年楚成二十五年春狄侵衛胡傳齊桓公為陽榖之㑹是肆於竈樂其行荒矣楚人伐黃而救兵不起是忽於簡書其業怠矣然後狄人侵衛侵鄭近在王都之側淮夷亦來病把而不忌也集說張氏洽曰楚既滅黃而莫之恤狄侵衛之師所以肆行也趙氏鵬飛曰前年狄滅溫溫子奔衛今狄侵衛以衛納溫子也伯主豈容安視而不討乎楚滅黃畏其大而不救狄滅溫以其小而不恤大者吾畏之小者吾忽之則諸侯安用夫伯主也附録左傳十三年春齊侯使仲孫湫聘於周且言王子帶事畢不與王言歸復命曰未可王怒未怠其十年乎不十年王弗召也夏四月葬陳宣公公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯于鹹鹹杜注衛地東郡濮陽縣東南有鹹城在今直𨽻大名府開州東南六十里左傳夏㑹于鹹淮夷病把故且謀王室也秋為戎難故諸侯戍周齊仲孫湫致之淮夷杜注魯東夷榖梁兵車之㑹也集說趙氏鵬飛曰鹹之㑹謀城把也說者蓋疑其夏㑹而明年春始城之謂城緣陵非㑹鹹之諸侯不知夏㑹而冬城是乃所以為得時也然則諸侯止于鹹乎曰非也各返其國矣不然秋大雩豈公不在而雩即公子友如齊豈齊侯不在而聘邪然則先㑹於此何也凡土功龍見而戒事龍見夏之二月周之四月也今四月戒事適其時矣十月水昏正而栽十一月日至而畢明年正月夏之十一月於是而事畢諸侯至各書於冊也楚丘之役亦如是爾戎家氏鉉翁曰諸戎為子帶所召同伐王城秦晉伐子𢃄奔齊齊侯平戎於王今二年矣王室略定乃為鹹之㑹以致諸侯之戍是秋戍周齊仲孫湫致之則是㑹也所以勤王故皆爵則程氏端學曰次年春有諸侯城緣陵事此㑹謀城緣陵也案家氏鉉翁主謀王室趙氏鵬飛程氏端學俱主謀把當依左傳兼用二說秋九月大雩冬公子友如齊集說張氏洽曰陽榖寧母及鹹之㑹其後公子友皆如齊蓋伐楚服鄭城緣陵之事魯皆同之足以見友專魯政也也張氏溥曰十年春正月公如齊說者曰魯始朝齊十三年冬公子友如齊則大夫聘問之常矣三年公子友如齊涖盟自此往來者勤寧母之盟鹹之㑹皆公方㑹而季友隨聘也吾大夫正聘於齊者始於七年吾君朝齊者始於十年魯益恭而齊益驕矣附録左傳冬晉荐饑使乞糴於秦秦伯謂子桑與諸乎對曰重施而報君將何求重施而不報其民必㩦擕而討焉無衆必敗謂百里與諸乎對曰天災流行國家代有救災恤鄰道也行道有福㔻鄭之子豹在秦請伐晉秦伯曰其君是惡其民何罪秦於是乎輸粟於晉自雍及絳相繼命之曰泛舟之役雍杜注秦國都今陜西鳯翔府鳯翔縣南七里有古雍城秦德公所居大鄭宫城也集說王氏錫爵曰百里奚之言仁慈渾厚不若公孫枝之較計利害真賢臣也乙襄王亥六年十有四年齊桓四十年晉惠五年衛文十四年蔡穆二十九年鄭文二十七年曹共七年陳穆二年把成九年宋襄五年秦穆十四年楚成二十六年春諸侯城緣陵緣陵杜注把邑後漢志北海郡有營陵縣薛瓚曰春秋謂之緣陵是也其故城在樂昌縣東南七十里今屬山東青州府左傳十四年春諸侯城緣陵而遷把焉不書其人有闕也公羊城把也榖梁其曰諸侯散辭也聚而曰散何也諸侯城有散辭也桓德衰矣胡傳齊桓公城三國而書辭不同城楚丘則沒諸侯而不書城緣陵則書諸侯而不序城邢則再序三國之師何也邢以自遷為文故再列三師而書城邢者美其得救患分災之義無封國之嫌也淮夷病把諸侯㑹于鹹城緣陵而遷把焉則其事專矣故前目後凡直書諸侯而不序也衛為狄滅東徙渡河野處曹邑桓公使公子無虧戍以甲士歸其祭服乘馬凡為國之用其力尤勤其功尤大其事尤專而春秋責之尤重曰城楚丘而不書諸侯正王法也是故以功言之則楚丘為大以義言之則城邢為美春秋之法明其道不計其功正其義不謀其利者也詳著城邢之師而深沒楚丘之迹貴王賤霸羞稱桓文以正待人之體也集說杜氏預曰器用不具城池未固而去為惠不終也澶淵之㑹既而無歸大夫不書而國别稱人今此總曰諸侯君臣之辭不言城把把未遷也總范氏寧曰直曰諸侯無大小之序是各自欲城無一之者非伯者所制故曰散辭言諸侯城則非伯者之為可知也齊桓德衰所以散也陸氏淳曰公羊云曷為城把滅也孰滅之蓋徐莒脅之案明年楚伐徐諸侯救徐其謬可知劉氏敞曰諸侯何以不序不足序也其不足序奈何桓德衰矣書孫氏覺曰春秋城把城邢斥言其國緣陵楚丘但其地蓋遷國者書國未遷者書地春秋之法然也曰陳氏傅良曰但曰諸侯者不繫之伯者之辭也但大夫者不繫之君之辭也之張氏洽曰諸侯城緣陵而遷杞焉蓋避淮夷而遷於緣陵其事與楚丘同當是時齊桓拯救諸夏之志怠矣故經書詳不如城邢略不如楚丘亦輕重之權衡也呂氏大圭曰城緣陵不如城邢楚丘不如緣陵故以楚丘緣陵之例觀之當書曰城夷儀而乃曰城邢楚丘者衛之楚丘緣陵者把之緣陵也以城邢之例觀之當書曰城衛城把而乃曰城楚丘城緣陵蓋邢遷於夷儀固邢之夷儀也諸侯城邢得救災恤鄰之道也故詳書而不殺子之也衛已滅而諸侯城楚丘以封衛故不曰城衛而曰城楚丘杞未遷而諸侯城緣陵以存把故不曰城把而曰城緣陵以諸侯而封諸侯非王法也楚丘之城沒諸侯而不書諱之也若緣陵之城則以淮夷病把之故而為之城以遷之猶未至如衛之已滅而後封之也故但曰諸侯而不序則其功亦有不足録者矣城家氏鉉翁曰把未受兵而公羊以為既滅蓋前此衛城邢皆在於既亡既潰之後故亦以為已亡左氏所謂病把者得其實矣吳氏澄曰元年齊以救邢之諸侯城邢同在一年諸侯猶且再叙著齊桓之志方勤而伯業向盛也今以㑹鹹之諸侯城緣陵各在一年而不重叙著齊桓之志已怠而伯業向衰也不曰把緣陵者把未遷也注氏克寬曰存把之功器用不具城池未固不若城邢之美故不再序諸侯然把未滅特不待其自遷而城緣陵以遷之未如封衛之專故諸侯以凡舉而不削蓋城緣陵之義不若城邢而功亦劣於楚丘也案公羊專封之說惟可施於楚丘蓋衛已滅也邢以自遷為文固不得言專封把未嘗滅則並不得言封矣公羊云把滅也孰滅之蓋徐莒脅之曷為不言徐莒脅之為桓公諱也非也把列在三恪果見滅於徐莒春秋即為桓諱猶當如邢衛書伐書入何得並泯其迹乎夏六月季姬及鄫子遇于防使鄫子來朝鄫似綾反穀作繒後同鄫杜注鄫國琅琊鄫縣今山東兖州府嶧縣東有鄫城左傳鄫季姬來寧公怒止之以鄫子之不朝也夏遇于防而使來朝集說范氏寧曰魯女無故逺㑹諸侯遂得淫通此亦事之不然左傳曰繒季姬來寧公怒之以繒子不朝遇于防而使來朝此近合人情也蘇氏轍曰鄫季姬也季姬來寧公怒鄫子之不朝止而絶其昏故遇于防而使來朝非禮也不稱鄫季姬絶也然春秋未有書季姬歸于鄫者或者鄫子之未為君也歸之歟亦未有書鄫季姬來者來而遂止之則絶也絶則非寧也亦未有書鄫季姬來歸者季姬非出於鄫也故皆不書蓋諱之也公羊穀梁曰非使來朝也使來請已也夫女子也而㑹諸侯使來請己事蓋有至此者乎來陳氏傅良曰朝未有言使者則其曰季姬使鄫子朝何惡魯而賤鄫子也於是季姬來寧公以鄫子之不來朝也怒止之遂遇于防使朝焉魯為己汰鄫為已卑矣於婦人乎何譏惡魯而賤鄫子也朝卓氏爾康曰季姬之在魯歸寧也遇于防囑其來也鄫子既朝魯怒壻已解明年歸于鄫仍復歸鄫也其事甚明諸家止以歸鄫為于歸生出魯公愛女使自擇配之說夫女子於夫家母家俱稱曰歸豈必新昏耶若女子自擇壻天下斷無是理也遇張氏溥曰或曰季姬稱字者蓋已許嫁於鄫矣故之而使來請已也然請已之說范寧致疑謂左氏近情則儒者可無舍左而訟也案季姬與鄫子遇而僖公不禁使鄫子朝而鄫子聽之皆為失禮故春秋書以譏之胡傳謂僖公愛女使自擇配說夲公榖而諸儒因之則過矣僖公魯之賢君聲姜又有令妻之稱豈肯聼女自擇配乎或以為季姬不繫於鄫為未嫁之文不知鄫子不朝公怒而絶之來朝而後歸之故遇歸皆不繫於鄫也如果來朝為請昏則既朝之後必有納幣逆女之事何俱不見於經耶范氏寧疑公穀為不然而以左氏為近合人情良有以也胡氏又謂孟光伯鸞變而不失其正則蕩檢踰間安可垂訓於後乎今故専從左氏而諸家使來請已之說皆不録秋八月辛卯沙鹿崩沙鹿杜注山名平陽元城縣東有沙鹿土山今沙鹿山在大名府元城縣東四十五里其西有沙鹿城左傳秋八月辛卯沙鹿崩晉卜偃曰期年將有大咎幾亡國公羊沙鹿崩何以書記異也外異不書此何以書為天下記異也榖梁林屬於山為鹿沙山名也無崩道而崩故志之也胡傳沙鹿晉地也詩稱百川沸騰山冢崒崩言西周之將亡也書沙鹿崩於前書獲晉侯於後雖不指其事應而事應具存此春秋畏物之反常為異使人恐懼修省之意也其垂戒眀矣集說董氏仲舒曰國家將有失道之敗而天乃先出災異以譴告之不知自省又出怪異以警懼之尚不知變而傷敗乃至此見天心仁愛人君而欲止其亂也孔氏穎逹曰漢書元后傳稱后祖王翁孺自東平陵徙魏郡元城委粟里元城建公曰昔春秋沙鹿崩晉史卜之曰隂為陽雄土火相乘故有沙鹿崩崩後六百四十五年宜有聖女興元城郭東有五鹿之虛即沙鹿地計爾時去聖猶近所言當得其實故以沙鹿為山名依漢書為義也隕趙氏匡曰凡山崩不繫國者以其自有常處不比星退鷁也劉氏敞曰沙鹿者何山也曷為不繫國山不可以繫國山曷為不可以繫國名山大澤不以封諸侯守之沙鹿崩何以書記異也又曰公羊曰沙鹿河上之邑也非也此自山名之不須繫山者以可知故也如禹貢桐柏積石皆不繫山至荆山岷山則皆繫山皇孫氏覺曰王道大壞彛倫一斁而天下之人皆反極則天見其變而日食星孛地見其妖而川竭山崩所以召之在天下沙鹿梁山崩雖在於晉不可以晉言也溢朱子曰山崩川災異之大者案公羊謂沙鹿崩為天下記異胡傳於成五年梁山崩用公羊之說而此獨用左傳以為晉咎豈以梁山大故應在天下沙鹿小故應在一國耶要之災異之興天子諸侯當各引為己咎有天下者以為天下之異可也有一國者以為一國之異可也故兼用二說狄侵鄭集說張氏洽曰狄數犯畿內之諸侯而齊桓不能治自入衛伐邢滅溫而至此霸圖弱而王室卑諸侯受禍著齊桓之怠也至趙氏鵬飛曰前年狄滅溫伐晉侵衛今侵鄭甚矣是之甚而不討桓公之伯心怠矣老而溺於內寵內不能治何暇治狄乎五伯桓公為盛惜乎其不克終也冬蔡侯肸卒肸許乙反集說劉氏敞曰穀梁曰諸侯時卒惡之也非也君薨臣赴赴以日月此禮之常也臣子少慢則赴不具日月大慢則都不赴春秋不改者因文可以見也若必以惡此君則卒書時者鄭厲公衛惠公內則篡國外則叛王何為春秋不惡之哉留汪氏克寬曰穆公也父獻舞見獲於莘莊十九年卒於楚而立附録左傳冬秦饑使乞糴於晉晉人弗與慶鄭曰背施無親幸災不仁貪愛不祥怒鄰不義四德皆失何以守國虢射曰皮之不存毛將安傅慶鄭曰棄信背鄰患孰恤之無信患作失援必斃是則然矣虢射曰無損於怨而厚於寇不如勿與慶鄭曰背施幸災民所棄也近猶讎之况怨敵乎弗聽退曰君其悔是哉丙襄王子七年十有五年齊桓四十一年晉惠六年衛文十五年蔡莊公甲午元年鄭文二十八年曹共八年陳穆三年杞成十年宋襄六年秦穆十五年楚成二十七年春王正月公如齊集說張氏洽曰公十年朝齊此又朝齊純用五年一朝之制同於事天子之禮矣李氏廉曰周官行人言春朝秋覲夏宗冬遇時見衆同之禮此六者諸侯朝天子之禮也又曰侯服嵗一見甸服二嵗一見男服三歲一見采服四歲一見衛服五嵗一見要服六歲一見此六服朝覲宗遇之歲也又曰諸侯邦交歲相問也殷相聘也世相朝也此諸侯相朝聘之禮也王制曰諸侯之於天子比年一小聘三年一大聘五年一朝天子五年一巡狩與行人不同蓋周衰損益之禮也左氏文十五年曰諸侯五年再相朝以修王命古之制也昭三年子太叔曰文襄之伯其務不煩諸侯令三歲而聘互歲而朝有事而㑹不協而盟又與行人不同而與王制略相似故先儒皆以為此朝伯主之禮昭十三年叔向曰眀王之制使諸侯歲聘以志業間朝以講禮再朝而㑹以示威再㑹而盟以顯昭明於是有十二年八聘四朝再㑹一盟之說與周官及禮家所録皆不同鄭氏曰不知何代之禮又無所出不從其義左氏又曰凡諸侯即位小國朝之大國聘焉春秋書來朝及朝公者三十有五或得邦交世朝之義或用文襄五歲而朝之制然皆非三代盛時朝王之禮也王道絶矣謂汪氏克寬曰杜預謂諸侯五年再相朝禮也何休合古五年一朝之義皆非是周制諸侯之邦交但曰世相朝安得以五年為合禮乎楚人伐徐左傳徐即諸夏故也集說吳氏澄曰徐首僭王楚次僭王徐楚同惡者也因齊桓之合諸侯匡天下徐革面而為楚所伐可悲也夫恃季氏夲曰徐在江淮間亦楚所利之國也僖三年從齊而取舒舒則楚之與國其能不草心於徐乎三月公會齊侯宋公陳侯衛侯鄭伯許男曹伯盟于牡丘牡丘杜注地名闕今東昌府聊城縣東北七十里有牡丘或云即春秋會盟處左傳盟于牡丘尋葵丘之盟且救徐也榖梁兵車之會也集說張氏洽曰葵丘之盟諸侯既聽命矣此為楚人伐徐而合諸侯即驅之討楚救徐可也又從而盟之諸侯不一故也人心已一而復二非伯主救災恤患之心怠而人心始懈乎君子屢盟亂是用長此心之盛衰霸業之所從而盛衰也故特書盟于牡丘而霸主諸侯之心皆疑不足以保徐斷可知矣遂次于匡匡杜注衛地在陳留長垣縣西南後漢志長垣縣有匡城今屬直𨽻大名府榖梁遂繼事也次止也有畏也集說陳氏傅良曰救不言次言次無志於救也列湛氏若水曰著救徐之不力也以齊之强帥國之衆何畏於楚桓公之心既蠱則列國於是乎解體矣是以有尋盟焉是以有次焉其勢使之然也公孫敖帥師及諸侯之大夫救徐帥公作率後同左傳孟穆伯帥師及諸侯之師救徐諸侯次于匡以待之榖梁善救徐也胡傳楚都於郢距徐亦逺而舉兵伐徐暴橫憑陵之罪著矣徐在山東與齊密邇以封境言之不可以不速救以形勢言之非有餽糧越險之難也今書盟于牡丘見諸侯救患之不協矣書次于匡見霸主號令之不嚴矣書大夫帥師而諸侯不行見桓德益衰而志怠矣凡兵而書救未有不善之也救而書次則尤罪其當速而故緩失用師之義矣集說杜氏預曰敖慶父之子命而往救次失救道也啖氏助曰凡救當奔孫氏復曰言次言救者惡諸侯緩於救患也諸侯既約救徐而遣大夫往此緩於救患可知也葉氏夢得曰公孫敖吾大夫之三命者也以敖主兵內辭也大夫何以不序無功不足序也楚遂敗徐齊自是不復救人矣陳氏傅良曰桓公合八國之衆以救徐而僅使大夫將桓志荒矣卒不競於楚故救而言次甚譏之也有諸侯在而使大夫將始於牡丘桓公為之也有諸侯在而使大夫盟始於雞澤悼公為之也趙氏鵬飛曰師之出次仁義存焉爾伐國問罪而不次是忿兵也兵忿者暴非所以為義故伐楚之師次於召陵義也須其服而已赴危救患而次是疑兵也兵疑者怯非所以為仁今救徐之師次于匡非仁也幸其自退而已楚之伐徐以其取舒也舒楚之與國徐人掩而取之為齊也桓公招江黃取舒庸皆奪楚之援耳前年楚滅黃齊不敢救於是揚兵而伐徐齊兵合諸侯于牡丘徒次而不進是幸其自退也且正月伐徐而三月出次固已緩矣尚何次耶次于匡而楚不退於是命大夫帥師以救之是示怯於楚也宜徐有婁林之敗也陵李氏廉曰經書盟而後救者牡丘救而後盟者馬一則督率於未然一則戒懼於己然也又曰經書諸侯之大夫三救徐盟袁僑盟于宋也大夫之専始於齊桓成於晉悼極於晉平又曰許氏曰遂救許遂之善者也以其進也遂次于匡遂之不善者也以其止也汪氏克寬曰桓公倡霸四十餘年未嘗命大夫為主將今諸侯不親將而大夫帥師則救徐之役特聊且應之而不冀其成功也又曰四年公孫茲帥師及諸侯之師侵陳列序諸國則書㑹此不言會而言及既㑹而後及也非主魯之辭也與襄三年書叔孫豹及諸侯之大夫及袁僑盟之意同不獨言大夫若曰受命其君故書諸侯以統之蓋當時諸侯雖以其權畀之大夫而春秋之法必欲其權繫於諸侯也夏五月日有食之左傳不書朔與日官失之也集說趙氏鵬飛曰日朔不書俱失也秋七月齊師曹師伐厲厲杜注楚與國義陽隨縣北有厲鄉今湖廣德安府隨州北四十里有厲山厲鄉在山下左傳秋伐厲以救徐也集說張氏洽曰兵法攻所必救厲在徐楚之間功楚之必救以解徐也然繼此楚敗除于婁林則厲在所不必救明年不克救徐而還況同盟不同心而宋已伐同役之曹矣汪氏克寬曰此伐厲以救徐與伐楚救江正同然春秋不書以救者厲近徐而楚逺江則齊桓之用兵猶愈於陽處父也姜氏寶曰諸侯志怠不欲重煩而曹共之位齊所定也故獨勞之爾八月螽公作􅏑榖梁螽蟲災也甚則月不甚則時集說趙氏鵬飛曰書災也九月公至自㑹集說高氏閌曰以會致者始於此春秋致會凡二十有七公自正月如齊因而㑹盟暴師於外已踰三時而以會致見救徐之無功也自趙氏鵬飛曰無功而反飲至何辭黃氏震曰至㑹欲救徐不能楚師未退而先返也不李氏廉曰不以徐至者諸侯親行也季姬歸于鄫集說杜氏預曰來寧不書此書者以明中絶鄫蘇氏轍曰鄫子既朝乃使歸之故書曰歸于陳氏傅良曰內女嫁恆書歸不書歸必有故也季姬來寧公怒而止之故不書歸至是而後言歸也卓氏爾康曰季姬見止於魯為鄫子不朝故爾鄫子既來朝歸而以季姬請故復以季姬歸鄫明前此非遂絶鄫而離昏也己卯晦震夷伯之廟左傳震夷伯之廟罪之也榖梁震雷也夷伯魯大夫也因此以見天子至於士皆有廟天子七廟諸侯五大夫三士二故德厚者流光德薄者流卑是以貴始德之夲也始封必為祖胡傳震者雷電擊夷伯之廟也不曰夷伯之廟震而曰震夷伯之廟者天應之也天人相感之際微矣集說杜氏預曰夷伯魯大夫伯字大夫既卒書字日孔氏穎逹曰公羊穀梁傳皆以晦為冥謂晝暗冥也杜以長歷推己卯晦九月三十日春秋值朔書朔值晦書晦無義例也說文云震霹靂振物者電隂陽激曜也然則震是霹靂而言雷電擊之者霹靂有聲有光雷電之大者爾故言雷電以眀之趙氏匡曰公榖並云晦冥也據十六年戊申朔隕石于宋五成十六年甲午晦晉楚戰于鄢陵並書晦朔則知晦者晦朔之晦爾古史之體應合書日而遇晦朔必書之以為歷數之證榖梁成十六年傳云事遇晦書晦何得於此獨名晦冥乎公羊又云夷伯季氏之孚微者稱夷伯大之也天戒之故大之案褒貶當以義類豈有為天所罰翻乃書字反於理甚矣大夫既死不更稱名爾原仲亦是也劉氏敞曰左氏云展氏有隱慝如此則夷為展氏之諡非也春秋國史也君前臣名縱不可名之猶當繫字於氏寧有稱其諡遂舍其族哉經曰葬桓王不繫周者王至尊也又曰吉禘于莊公不繫魯者君至尊也惟此二者可以爵諡通其餘雖大國必繫諡於國别內外也雖貴臣必繫字於氏别尊卑也齊桓晉文皆繫國原仲高子皆繫氏臣無舉諡於君側者也曰張氏洽曰震為雷凡霆擊之怒皆震之發也正䝉凡隂氣凝聚陽在內者不得出則奮激而為雷霆不善之積蓋亦知此程子以為夷伯之廟震而言震夷伯之廟天應之也然天之怒擊每在於惡稔而人誅不加之後春秋書震者惟此事爾詩云敬天之怒無敢戲豫敬天之渝無敢馳驅昊天曰明及爾出王昊天曰旦及爾游衍君子知天之日監而畏其威如此所以事天也案春秋全經未有書大夫之諡者夷當依劉氏敞作氏冬宋人伐曹左傳討舊怨也集說許氏翰曰同盟始自相攻桓不能已矣憾張氏洽曰莊十四年曹從齊桓伐宋宋至今之今諸侯始二曹方有王事而襄公乘虛伐之尚可繼桓而圗霸乎故永嘉薛氏以為伐厲而宋人內叛此則桓德之衰襄志之私皆可見矣擅趙氏鵬飛曰自齊桓之霸至是三十年諸侯無有相侵伐者服於桓也今桓德衰矣宋人加兵於曹雖不究所以加兵之故而諸侯攜二桓不能制其侵伐矣家氏鉉翁曰宋襄於桓之方存已有圖霸之心其後執滕圍曹張夲於此春秋所譏也李氏亷曰自曹莊公以齊命㑹伐宋遂與宋人為不釋之憾夫伐宋非獨一曹而獨讎曹之深者曹在宋之宇下非他國比也十九年圍曹宣三年圍曹至曹陽之衰宋景用師尤亟衰三年有樂髠之伐六年有向巢之伐七年書人以圍八年書公以入而曹亡於宋矣鄭子産曰曹畏宋豈非壤地相接必欲吞噬而後已乎楚人敗徐于婁林敗必邁反婁婁林杜注徐地下邳僮縣東南有亭今在江南鳯陽府虹縣東北左傳楚敗徐于婁林徐恃救也集說高氏閌曰齊桓大合諸侯以救徐固有餘力而師出三時無功而返故書楚人敗徐于婁林以罪之伐張氏洽曰書以見楚兵之獨勝而救徐之威不立厲之謀無補也趙氏鵬飛曰八國之大夫救徐而徐不免於敗則大夫果用命乎八國之君畏楚而次于匡君畏之尚何以責其臣宜其逗撓不進也則夫楚敗徐者大夫之罪而大夫不進者諸侯之罪也程氏端學曰以八國之衆不能敵楚千里之孤兵春秋書諸侯之盟之次大夫之帥師於前書齊曹伐厲宋人伐曹於中書楚人敗徐於後則齊桓之無志諸侯之解體救徐之不力其情自見矣此皆以力假仁之效也汪氏克寬曰徐自莊二十六年見經僖三年取舒十七年伐英氏昭五年伐吳皆稱人昭四年㑹申楚人執之三十年奔楚皆稱子獨此年與文七年伐莒並舉號十有一月壬戌晉侯及秦伯戰于韓獲晉侯秦姑見經左傳晉侯之入也秦穆姬屬賈君焉且曰盡納羣公子晉侯蒸於賈君又不納羣公子是以穆姬怨之晉侯許賂中大夫既而皆背之賂秦伯以河外列城五東盡虢略南及華山內及解梁城既而不與晉饑秦輸之粟秦饑晉閉之糴故秦伯伐晉卜徒父筮之吉涉河侯車敗詰之對曰乃大吉也三敗必獲晉君其卦遇蠱曰千乘三去三去之餘獲其雄狐夫狐蠱必其君也蠱之貞風也其悔山也嵗云秋矣我落其實而取其材所以克也實落材亡不敗何待三敗及韓晉侯謂慶鄭曰寇深矣若之何對曰君實深之可若何公曰不孫卜右慶鄭吉弗使步揚御戎家僕徒為右乘小駟鄭入也慶鄭曰吉者大事必乘其産生其水土而知其人心安其教訓而服習其道惟所納之無不如志今乘異産以從戎事及懼而變將與人易亂氣狡憤隂血周作張脉僨興外彊中乾進退不可周旋不能君必悔之弗聽九月晉侯逆秦師使韓簡視師復曰師少於我鬬士倍我公曰何故對曰出因其資入用其寵饑食其粟三施而無報是以來也今又擊之我怠秦奮倍猶未也公曰一夫不可狃况國乎遂使請戰曰寡人不佞能合其衆而不能離也君若不還無所逃命秦伯使公孫枝對曰君之未入寡人懼之入而未定列猶吾憂也苟列定矣敢不承命韓簡退曰吾幸而得囚壬戌戰於韓原晉戎馬還濘而止公號慶鄭慶鄭曰愎諫違卜固敗是求又何逃焉遂去之梁由靡御韓簡虢射為右輅秦伯將止之鄭以救公誤之遂失秦伯秦獲晉侯以歸晉大夫反首拔舍從之秦伯使辭焉曰二三子何其戚也寡人之從君而西也亦晉之妖夢是踐豈敢以至晉大夫三拜稽首曰君履后土而戴皇天皇天后土實聞君之言羣臣敢在下風穆姬聞晉侯將至以太子罃𢎞與女簡璧登臺而履薪焉使以免服衰絰逆且告曰上天降災使我兩君匪以玉帛相見而以興戎若晋君朝以入則婢子夕以死夕以入則朝以死惟君裁之乃舍諸靈臺大夫請以入公曰獲晋侯以厚歸也既而喪歸焉用之大夫其何有焉且晋人戚憂以重我天地以要我不圖晉憂重其怒也我食吾言背天地也重怒難任背天不祥必歸晉君公子縶曰不如殺之無聚慝焉子桑曰歸之而質其大子必得大成晋未可滅而殺其君祇以成惡且史佚有言曰無始禍無怙亂無重怒重怒難任陵人不祥乃許晉平晉侯使郤乞告瑕呂飴甥且召之子全教之言曰朝國人而以君命賞且告之曰孤雖歸辱社稷矣其卜二圉也衆皆哭晋於是乎作爰田呂甥曰君亡之不恤而羣臣是憂惠之至也將若君何衆曰何為而可對曰征繕以輔孺子諸侯聞之喪君有君羣臣輯睦甲兵益多好我者勸惡我者懼庶有益乎衆說晋於是乎作州兵初晋獻公筮嫁伯姬於秦遇歸妹之睽史蘇占之曰不吉其繇曰士刲羊亦無衁也女承筐亦無貺也西鄰責言不可償也歸妹之睽猶無相也震之離亦離之震為雷為火為嬴敗姬車脫其輹火焚其旗不利行師敗於宗丘歸妹睽孤寇張之弧姪其從姑六年其逋逃歸其國而棄其家眀年其死於高梁之虛及惠公在秦曰先君若從史蘇之占吾不及此夫韓簡侍曰龜象也筮數也物生而後有象象而後有滋滋而後有數先君之敗德及可數乎史蘇是占勿從何益詩曰下民之孽匪降自天僔沓背憎職競由人乎十月晋隂飴甥會秦伯盟於王城秦伯曰晋國和對曰不和小人恥失其君而悼喪其親不憚征繕以立圉也君子愛其君而知其罪不憚征繕以待秦命以此不和泰伯曰國謂君何對曰小人戚謂之不免君子恕以為必歸小人曰我毒秦秦豈歸君君子曰我知罪矣秦必歸君二而執之服而舍之德莫厚焉刑莫威焉服者懷德二者畏刑此一役也秦可以霸納而不定廢而不立以德為怨秦不其然秦伯曰是吾心也改館晉侯饋七牢焉蛾析謂慶鄭曰盍行乎對曰陷君於敗敗而不死又使失刑非人臣也臣而不臣行將焉入十一月晉侯歸丁丑殺慶鄭而後入是嵗晋又饑秦伯又餼之粟曰吾怨其君而矜其民且吾聞唐叔之封也箕子曰其後必大晋其庸可冀乎姑樹德焉以待能者於是秦始征晋河東置官司焉虢略杜注從河南而東盡虢界也後漢志陸渾西有虢略地今河南府嵩縣境是也華山杜注在𢎞農華隂縣西南今屬陜西西安府晉解梁城杜注河東解縣今山西平陽府蒲州臨縣東南十八里有解城縣靈臺杜注在京兆鄠縣周之故臺今西安府鄠東五里有鄠宮又東二十五里有靈囿囿中有靈臺臨高梁之虛杜注晋地在平陽府楊氏縣西南今汾縣梁墟是隂杜注呂甥食采於隂今山西平陽府霍州有呂鄉有隂地村王城杜注秦地馮翊臨晉縣東有王城今在陜西西安府朝邑縣東公羊此偏戰也何以不言師敗績君獲不言師敗績也胡傳秦伯伐晉而經不書伐專罪晋也獲晋侯以歸而經不書歸免秦伯也書伐書及者兩俱有罪而以及為主書獲書歸者兩俱有罪而以歸為甚今此專罪晋侯之背施幸災貪愛怒鄰而恕秦伯也然則秦戰義乎春秋無義戰彼善於此則有之矣其不言師敗績何也君獲不言師敗績君重於師也大夫戰而見獲必書師敗績師與大夫敵也君為重師次之大夫敵春秋之法也集說趙氏匡曰凡戰而死者書滅生禽曰獲為劉氏敞曰戰而言及者主之者也猶曰晋侯志乎為此戰也云爾又曰杜云得大夫曰獲貶晋侯故下從衆臣之例而不言以歸非也獲者獲得之也大凡君死其位曰滅生得曰獲大夫生死皆曰獲此所以異君臣之辭也不限獲於臣也杜氏又云不書敗績晉師不大崩亦非也君獲不言師敗績者君重於師也又曰穀梁曰晋侯失民矣以其民未敗而君獲也非也凡為君而見獲苟不失民將焉取之顧春秋所以不書師敗績者舉君獲為重爾陳氏傅良曰於是秦獲晉侯以歸其不曰以歸何罪晋侯也獲匹夫之辭也言獲則以歸不足言也張氏洽曰秦三施而晋無報所以秦伐晉而不書又以晉主是戰也韓簡亦言師少於我鬬士倍我蓋秦直故勇晋曲故老晉惠公背惠蔑施以虛氣抗秦所以師敗身執而大辱國也秦舍晉君於外已而歸諸晉所以不言以歸也晋程氏端學曰自晋致戎又不自咎而逆戰焉經曰侯及秦伯戰則秦晋之曲直罪之輕重皆可見矣公李氏亷曰秦顓帝之後周孝王時非子受封至襄送平王東遷始盡有岐周之地又七世至穆公此為見經之始又曰是年桓公伯衰而宋楚秦晋之變遽見春秋備書之其五伯送興之會也歟王氏樵曰戎馬還濘自紀晋侯之所以見獲爾無以見師實不敗也隂飴甥曰小人恥失其君而悼喪其親失其君為君獲喪其親非師敗乎榖梁民未敗而君獲之說俱妄也卓氏爾康曰此一戰也曲自在晋韓為晋地則秦伐晋可知既已戰矣何必書伐不書秦伯伐晋省文也欽定春秋傳說彚纂卷十三
