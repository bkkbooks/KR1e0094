body:
  text: 欽定四庫全書欽定春秋傳說彚纂卷三乙桓王丑四年七年齊僖十五年晉哀二年曲沃武公稱元年衛宣三年蔡宣三十四年鄭莊二十八年曹桓四十一年陳桓二十九年把武三十五年宋殤四年秦文五十年楚武二十五年春王三月叔姬歸于紀榖梁其不言逆何也逆之道微無足道焉爾胡傳叔姬伯姬之娣非夫人也則何以書古者諸侯一娶九女必格之同時者所以定名分窒亂源也今叔姬待年於宗國不與嫡俱行則非禮之常所以書也睂山蘇轍以謂書叔姬賢之也若賢不得書必貴而後書則是以位而蔑徳也小國無大夫至於接我則書是位不可以廢事也位不可以廢事而獨可以廢賢乎如叔姬不歸宗國而歸于酅以全婦道賢可知矣賢而得書亦春秋之法也集說何氏休曰叔姬者伯姬之媵也至是乃歸者待年父母國也婦人八嵗備數十五從嫡二十承事君子媵賤書者後為嫡終有賢行紀侯為齊所滅紀季以酅入于齊叔姬歸之能處隠約全竟婦道故重録之也范氏甯曰媵之為言送也從也不與嫡俱行非禮姪娣年十五以上能共事君子可以徃娣必少於嫡知未二十而徃也所孔氏穎達曰女嫁於他國皆有姪娣與適俱行則尊在適書適不書姪娣叔姬待年之女年滿特行故書其歸魯女嫁於他國之卿皆書之夫人之娣尊與卿同其書故是常例賈云書之者刺紀貴叔姬傳無其事是妄說也曰孫氏復曰媵書者為莊十二年歸于酅起程子伯姬為紀侯夫人叔姬其娣也待年於家今始歸娣歸不書憫其無終也髙氏閌曰娣亦書歸若堯之二女降于溈汭皆曰嬪廟張氏洽曰媵不書此特書者以其終不忘紀之五雖紀侯卒而歸于酅以奉宗祀沒其身而後已聖人以其賢可以厲婦行将有其末必録其本是以變例而特書之趙氏與權曰伯姬歸紀踰五年而叔姬歸焉卒之紀侯去其國而伯姬葬于齊紀季以酅入于齊而叔姬歸于酅二姬皆不得其所終春秋之法有其終必有以見其始也滕侯卒滕國杜注在沛國公丘縣東南今山東兗州府滕縣西南十五里有古滕城即滕國也孔疏譜云滕姬姓文王子錯叔繡之後武王封之居滕公羊何以不名微國也微國則其稱侯何不嫌也春秋貴賤不嫌同號美惡不嫌同辭胡傳滕侯書卒何以不葬怠於禮弱其君而不葬者滕侯宿男之類是已古者邦交有常制不以國之强弱而有謹慢也不以情之疎密而有厚薄也春秋之時異於是晉北國也楚南邦也地非同盟而親徃俟其葬滕鄰境也宿同盟也訃告雖及而魯不之恤豈非以其壤地褊小乎怠於禮而不徃弱其君而不㑹無其事而闕其文此魯史之舊也聖人無加損焉存其卒闕其葬而義自見矣卒自外録不卒非外也葬自内録不葬非内也集說孔氏穎逹曰侯訓君也五等之主雖爵命小異而俱是國君故總稱諸侯也劉氏敞曰左氏云不書名未同盟也非也嘗同盟者卒未必皆名未嘗同盟者卒未必皆不名程子曰不名史闕文也其家氏鉉翁曰不名不葬諸說不同愚謂不名史失名也不葬魯不徃㑹史佚其諡是以失書不容鑿為之說夏城中丘此書土功之始州中丘杜注在琅琊臨沂縣東北今山東兗府沂州東北三十里有中丘城左傳書不時也公羊中丘者何内之邑也城中丘何以書以重書也穀梁城為保民為之也民衆城小則益城益城無極凡城之志皆譏也集說范氏甯曰建國立城邑有定所髙下大小存乎王制刺公不修勤徳政更造城以安民夫保民以徳不以城也作孫氏復曰城邑宫室髙下大小皆有王制不可妄是故城一邑新一廄作一門築一囿時與不時皆詳而録之時謂周之十二月夏之十月非此不時也得其時者其惡小非其時者其惡大此聖人愛民力重興作懲僭忒之深㫖也王葉氏清臣曰城郭雖立以為國非恃以守國故先嵗因農隙修之於無事之時而城多出於畏齊畏晉畏邾畏莒不然則大夫強而自城其邑或過其度未有無故而為也既不能愛恤其民以時舉其政事至而旋為之備以奪其時此經之所以書也程子曰為民立君所以養之也養民之道在愛其力民力足則生養遂生養遂則教化行而風俗美故為政以民力為重也春秋凡用民力必書其所興作不時害義固為罪也雖時且義必書見勞民為重事也後之人君知此義則知慎重於用民力矣然有用民力之大而不書者為教之意深矣僖公修泮宫復閟宫非不用民力也然而不書二者復古興廢之大事為國之先務如是而用民力乃所當務也人君知此義則知為政之先後輕重矣凡書城者完舊也書築者創始也城中丘使民不以時非人君之用心也胡氏寜曰穀梁子之意為春秋時言之也城不可無而未為國之急易所謂設險非止於築城禮所謂城池亦固國之一事爾春秋凡城必書或志其非時或志其非制或志其非所得其時制又當其所而亦書重民力也文王以民力為臺為沼或與民同其利或與民同其樂則不可以已矣呉氏澂曰君之資於民者資其力也故無事則資其力而用之於農以足食生財有事則資其力而用之於兵以敵愾禦侮非農非兵而勞民之力必以其時以其禮而不敢妄興不得已而役之亦必節其力而不盡也春秋凡力役必書重民力也二汪氏克寛曰内城二十三春城四夏城七冬城十左傳於此年并城郎祝丘及新延廄新作南門築鹿囿皆曰不時凡城於冬者皆曰書時或曰周之冬十月十一月乃夏之秋周之春正月二月乃夏之冬而左氏於城向諸防諸鄆平陽中城城防郎囿皆曰書時延廄南門亦曰不時何哉今考左傳言龍見而戒事則夏之九月而周之十一月也水昏正而栽則周之十二月正當役民之時也日至而畢則夏之十一月而周之正月也謂日至而畢則周之春不宜興土功矣經於他事書春夏秋冬而繼書次月則凡書時皆指四時之首月如成十七年書冬㑹伐鄭十一月公至十二月日食是也若城築蒐狩之事乃以時成通歴三月事畢而言之非獨指首月也詳考經文則可見矣湛氏若水曰左氏曰書不時也公羊曰以重書也愚謂二説皆是也事孰為重愛民為重愛民孰重以時為重卓氏爾康曰莒入向則魯疆埸須有以備之然夏而用民不憂其力矣灌甫曰案春秋城内邑二十三以夏城者七以春城者四其餘皆時也不時而城固書時而城亦書何也聖人惜民力慎興作懲僭慝耳其畏齊畏晉因邾因莒與大夫自彊而城各因文以見義不在書時與不時也齊侯使其弟年來聘此列國來聘之始左傳齊侯使夷仲年來聘結艾之盟也公羊其稱弟何母弟稱弟母兄稱兄榖梁諸侯之尊弟兄不得以屬通其弟云者以其來接於我舉其貴者也胡傳兄弟先公之子不稱公子貶也書盟書帥師而稱兄弟者罪其有寵愛之私書出奔書歸而稱兄弟者責其薄友恭之義考於事而春秋之情可見矣年者齊僖公母弟也僖公私於同母寵愛異於他弟施及其子猶與適等而襄公絀之遂成簒弑之禍故聖人於年來聘特變文書弟以示貶焉鄭語來盟黒背帥師皆罪其私也陳光奔楚而稱弟盗殺衞縶而稱兄秦鍼宋辰皆責其薄也仁人於兄弟絶偏繋之私篤友㳟之義人倫正而天理存其春秋以訓天下與來世之意也集說杜氏預曰凡聘皆使卿執玉帛以相存問璧孔氏穎逹曰聘禮使者執圭以致命束帛加以致享鄭康成云享獻也既聘又獻所以厚恩惠也是執玊帛以相存問也玉人職云瑑圭璋璧琮八寸以頫聘注云八寸者據上公之臣案聘禮圭以聘君璋以聘夫人既行聘之後璧以享君琮以享夫人又鄭注小行人云使卿大夫頫聘降其君瑞一等則侯伯之臣圭璋璧琮皆六寸子男之臣皆四寸又小行人云圭以馬璋以皮璧以帛琮以錦琥以繡璜以黼鄭注云二王之後享天子圭以馬享后璋以皮其餘諸侯享天子璧以帛享后琮以錦子男享大國之君琥以繡享大國夫人璜以黼是玉帛之文也楊氏士勛曰禮小聘曰問使大夫大聘使卿此既名見於經明是卿也案禮聘則執玉以致命執帛以致享故云執玊帛以相存問也啖氏助曰使使致問曰聘主人受之於廟以重禮劉氏敞曰其弟云者凡以重書也何重乎齊侯之弟古者年四十而仕五十而爵天下無生而貴者齊侯愛其弟未可爵而爵之亟交於諸侯卒之其子弑齊君而亂齊國是以君子重焉爾程子曰凡不稱公子而稱弟者或責其失兄弟之義或罪其以弟之愛而寵任之過左氏公羊傳皆曰年齊僖公之母弟先儒母弟之說蓋縁禮文有立嫡子同母弟之說其曰同母弟蓋謂嫡爾非以同母為加親也若以同母為加親是不知人理近於禽道也天下不明斯義也久矣僖公愛年其子尚禮秩如嫡卒致簒弑之禍書弟見其以弟之愛而寵任之過也書葉氏夢得曰諸侯之邦交嵗相問殷相聘周道也聘不書問略小事也聘大夫之事古者大夫五十而後爵異姓以名氏見同姓以公子見雖母弟亦以公子見年不稱公子非大夫也其弟年云者以母弟而任大夫之事以齊侯為愛其弟而易大夫非公天下之道也張氏洽曰聘者諸侯遣大夫通好與國見於儀禮之篇詳矣然古者諸侯間於天子之事則有邦交殷聘之禮自隐公即位以來未嘗朝聘於天子以魯推之則諸侯蓋可知矣而齊僖因艾之盟遽遣使於魯以結好忘君臣之大義植同列之私黨故觀年之聘則凡書聘可以例推矣書其弟又著齊侯寵愛之私聘魯致女交政鄰國以啟無知簒弑之禍也常家氏鉉翁曰入春秋為㑹為盟為遇皆非盛時之典惟聘禮近古王制之所得為也然聘不皆書惟天王使下聘不以小大皆書大國之使來不皆書有故則書列國之使來不悉書有所襃貶則書魯大夫之聘列國亦不悉書有故則書士陳氏深曰此外臣來聘之始終於昭二十一年晉鞅李氏廉曰春秋書弟十四書兄一齊年鄭語衛黒背皆罪其私陳光秦鍼宋辰衛縶皆罪其薄衛鱄佞夫皆可入陳光之列陳招先稱公子而後稱弟亦以陳侯有寵愛之私而致之也獨叔肸稱弟賢之也蓋以其善處兄弟之變者也公羊左氏同母之說程子力辨之而陸氏亦曰聖人之教雖及兄弟之子猶引而進之安有異母即見疎外乎又曰齊之聘魯五年之再來齊僖糾合之時也歸父之來晉襄未定之時也國佐之來齊頃有志於叛晉也慶封之來齊景初立而有志於爭霸也皆出於私情矣然春秋之初齊猶加禮於魯至桓既霸僖七年公子友如齊之後魯使之聘齊者二十二而齊聘僅三至焉亦可以觀世道矣汪氏克寛曰夫子作經雖不逆計其後日之事然於其寵愛之過特書弟以貶焉使後世之讀是經者考無知簒弑之所由始則亦知戒矣諸侯之弟貶則書名不貶則書字故許叔蔡叔蔡季紀季皆賢而稱字且不言弟秋公伐邾此伐邾之始左傳秋宋及鄭平七月庚申盟於宿公伐邾為宋討也胡傳奉詞致討曰伐宋人先取邾田故邾人入其郛魯與儀父則元年盟于眛矣邾人何罪可聲特託為詞說以伐之爾經之書伐非主兵者皆有言可執見伐者皆有罪可討也傳曰欲加之罪何患無詞魯為宋討非義甚矣而稱伐邾所謂欲加之罪者也而不知渝眛之盟不待貶而自見矣集說杜氏預曰公距宋而更與鄭平欲以鄭為援今鄭復與宋盟故懼而伐邾欲以求宋故曰為宋討長杜氏諤曰詩曰君子屢盟亂是用長言盟適足以亂耳公於元年為蔑之盟至此而伐之其義自見氏程子曰擅興甲兵為人而伐之非義之甚也睚張洽曰夫和大所以恤小既平宋鄭則邾宋之眦亦可和矣親此而虐彼茍欲悅宋而忘蔑之盟子曰小人比而不周此足以見書為宋討邾之㫖矣家氏鉉翁曰凡公自将伐國皆有譏乎曰當伐而伐惟義所在不皆譏觀前之盟觀後之伐而知其以背盟故譏不加貶而義自見者也是謂比事見義春秋書法大率類此汪氏克寛曰傳例曰聲罪致討曰伐此云奉詞者執言以聲其罪其義一也不稱帥師者君行師從故君将不言帥師李氏廉曰内兵之伐國僅二十而書公伐邾者六書大夫伐邾者八止書伐邾者一夫邾在魯之宇下而陵弱侵小之兵史不絶書如此甚矣魯之失政也伐季氏本曰邾人與鄭伐宋已及二年而魯始為宋之者蓋鄭既結成於魯故緩於責邾而鄭交猶未固也至是復聲邾罪正以見魯之於宋猶未絶耳冬天王使凡伯來聘此王聘之始南凡杜注凡國伯爵汲郡共縣東有凡城今凡縣故城在河南衛輝府輝縣西南二十里集說杜氏預曰凡伯周卿士復孫氏復曰桓王不能興衰振治統制四海以文武之業反使凡伯來聘此桓王之為天子可知也而程子曰周禮時聘以結諸侯之好諸侯不修臣職聘之非王體也葉氏夢得曰何以書非常也存頫省聘問五者君之事也春秋何以獨書聘吾考於禮天子之撫邦國者一嵗徧存三嵗徧頫五嵗徧省而無聘問至時聘以結諸侯之好殷頫以除邦國之慝間問以喻諸侯之志則存省不與蓋存頫省常也聘問非常也聘與問一事也大曰聘小曰問則問亦聘矣此聘所以獨見也大張氏大亨曰曲禮曰諸侯使人問於諸侯曰聘而行人稱時聘以結諸侯之好典瑞稱圭璋以頫聘則天子使人問諸侯亦謂之聘王制稱諸侯之於天子比年一小聘三年一大聘則諸侯使人問天子亦謂之聘朝趙氏鵬飛曰春秋書天王下聘者凡八責諸侯不而受天子之聘也隠在位十一年而天王聘魯者二亦何有一介之使如京師以荅天王之勤哉愚案諸家多責天王反聘諸侯為非禮然是時王室微弱諸侯强大孔子作春秋正以扶王室豈有反責天王之理天王亦豈得已而下聘哉吕氏大圭曰春秋之際諸侯之所以事天子者益懈而天子之所以聘於諸侯者何其不憚煩哉十二公之中魯之臣如京師者纔六而王臣來聘者八隠公即位已七年其臣未有一如京師者而天子遣使聘之何哉雖然春秋自宣十年定王使王季子來聘之後魯歴五公周更四王皆無來聘之文蓋文宣以前周固微弱王命猶足以為重文宣以後周室之衰尤甚於前是以春秋之書來聘者八則止於宣公書來求者三則止於文公書來錫命者三則止於成公來聘則止於宣者自宣以後雖有禮文不足以結諸侯也來求則止於文者自文以後天王雖求之諸侯亦不與也來錫命則止於成者自成以後雖有爵命不足以寵諸侯也嗚呼是可不為世道慨歎哉賦汪氏克寛曰凡伯周公之𦙍詩板與瞻卬皆其所蓋世為王臣年李氏廉曰春秋書王聘魯七始於此而終於宣十凡伯南季仍子家父皆不過大夫猶可也宰周公以三公之重王季子以介弟之尊而下聘禮益瀆矣隠僖之得聘猶可也以宰糾而聘桓以季子而聘宣寵簒弑矣戎伐凡伯于楚丘以歸此戎患之始西楚丘杜注衞地在濟隂城武縣南今兗州府曹縣東楚丘亭是也左傳初戎朝於周發幣於公卿凡伯弗賔冬王使凡伯來聘還戎伐之於楚丘以歸榖梁凡伯者何也天子之大夫也國而曰伐此一人而曰伐何也大天子之命也楚丘衛之邑也以歸猶愈乎執也胡傳國而曰伐此一人而曰伐見其以徒衆也楚丘衛地以歸易詞也于楚丘者罪衛不救王臣之患以歸者罪凡伯失節不能死於位也周之秩官敵國賔至闗尹以告侯人為𨗳司徒具徒司宼詰姦佃人積薪火師監燎其貴國之賔至則以班加一等益䖍至於王吏則皆官正涖事今凡伯承王命以為過賔於衛而戎得伐之以歸是蔑先王之官而無君父也集說董氏仲舒曰執天子之使與伐國同罪伯杜氏預曰戎鳴鐘鼓以伐天子之使不書凡敗者單使無衆非戰陣也但言以歸非執也鐘孔氏穎逹曰傳例有鐘鼓曰伐此既言伐知其鳴鼓也杜意言以歸者以彼隨己而已非囚執之辭故云但言以歸非執也杜必知以歸非執者穀梁傳云以歸猶愈乎執也又昭十三年晉人執季孫意如以歸若以歸是執何須别起執文明直言以歸者非執也陸氏淳曰榖梁曰戎者衛也為其伐天子之使故貶而戎之啖氏曰若衛實伐天子之使改之曰戎是為衛掩惡也如何勸懲乎衛孫氏復曰言伐用兵也楚丘衛地地以楚丘者責不能救難録以歸者惡凡伯不死位命家氏鉉翁曰天子之使戎得以要而執之天子不之討方伯連帥復不能為王敵愾春秋書之以見周室微弱言卓氏爾康曰伐者一擊一刺以人用戈之義一國伐鄭人伐衛之類是也一邑亦言伐伐於餘丘是也一家言伐伐單氏之宫是也一人亦言伐此楚丘是也案榖梁謂以歸猶愈於執杜氏預因以為非執其義勝公羊多矣古者君行師從卿行旅從諸家謂一人而曰伐似亦未合但相沿已乆今姑仍之附録左傳陳及鄭平十二月陳五父如鄭涖盟壬申及鄭伯盟歃如忘洩伯曰五父必不免不頼盟矣鄭良佐如陳涖盟辛巳及陳侯盟亦知陳之将亂也鄭公子忽在王所故陳侯請妻之鄭伯許之乃成昏丙桓王寅五年八年齊僖十六年晉哀三年蔡宣三十五年衛宣四年鄭莊二十九年曹桓四十二年陳桓三十年把武三十六年宋殤五年秦寧公元年楚武二十六年春宋公衞侯遇于垂垂杜注衛地濟隂句陽縣東北有垂亭今兗州府曹州北句陽店是其地也左傳齊侯将平宋衛有㑹期宋公以幣請於衛請先相見衛侯許之故遇於犬丘犬丘杜注垂也地有兩名又曰一地兩名當時並有則兩文互見榖梁不期而㑹曰遇遇者志相得也集說程子曰宋忌鄭之深故與鄭卒不成好無諸侯相見之禮故書曰遇髙氏閌曰殤公嘗從州吁之請伐鄭以圖馮矣州吁誅宣公立馮不可不終圖而未知宣公之從否故宋衛遇垂以謀鄭十年入鄭盖垂之謀也謀人之國不以禮見而陽若相遇春秋因實書之而貶寓焉陳氏傅良曰特相遇不書書宋衛将以為參盟也齊任氏伯雨曰齊侯将平宋衛於鄭衛侯既不敢違侯之命又不能釋鄭國之怨有異志焉故先遇于垂平李氏廉曰垂之遇左氏以宋衛有怨於鄭而齊欲之蓋鄭之怨衛因公孫滑宋之怨鄭因公子馮其說似有據然考之於經後此瓦屋止三國參盟而不及鄭十年入鄭伐戴之師又二國為黨以讎鄭則宋衛此謀蓋有志於從齊黨而無意於釋鄭憾也齊僖亦不過假此以求諸侯耳豈真有平怨之本心歟要季氏本曰宋衛本與魯為黨以魯既許鄭平亦将齊以絶鄭故為此遇而瓦屋之盟議在此矣然以遇禮見者恐泄所謀欲密其迹耳王氏樵曰宋衛素睦而鄭其深讎也齊侯将平宋衛於鄭既有㑹期矣宋衛乃請先相見而為垂之遇何哉蓋有所謀也况公子馮之在鄭實宋殤之所不能一日忘情者其所謀於衛者不可知必有所要於鄭者其在去馮乎鄭莊不從故宋不果平瓦屋之盟傳稱齊人卒平宋衛於鄭然鄭不㑹其故可知也三月鄭伯使宛來歸祊祊必彭反公榖作邴山祊杜注在琅琊費縣東南今東兗州府費縣治故祊城是也左傳鄭伯請釋泰山之祀而祀周公以泰山之祊易許田三月鄭伯使宛來歸祊不祀泰山也許田杜注近許之田今開封府許州西南有魯城本許田後置邑寰宇志謂在許昌城南四十里者是也公羊宛者何鄭之微者也邴者何鄭湯沐之邑也天子有事於泰山諸侯皆從泰山之下諸侯皆有湯沐之邑焉胡傳鄭伯欲以泰山之祊易許田前此來輸平者以言請之矣未入地也至是來歸祊者其地既輸矣未易許也成王以周公有大勲勞故特賜之許田為朝宿之地宣王以鄭伯母弟懿親故特賜之祊田為湯沐之邑祊近於魯許鄰於鄭各以其近者相易用是見鄭有無君之心而謂天王不復能廵狩矣用是見鄭有無親之心而敢與人以先祖所受之邑矣其言我入祊者祊非我有也入者不順之詞義不可而強入之也集說杜氏預曰宛鄭大夫不書氏未賜族又曰成王營王城有遷都之志故賜周公許田以為魯朝宿之邑後世因而立周公别廟焉鄭桓公周宣王之母弟封鄭有助祭㤗山湯沐之邑在祊鄭以天子不能復廵狩故欲以祊易許田各從本國所近之宜恐魯以周公别廟為疑故云已廢泰山之祀而欲為魯祀周公孫詞以有求也廢范氏甯曰王室微弱無復方岳之㑹諸侯驕慢亦朝覲之事故鄭以湯沐之邑易魯朝宿之田也諸侯有大功盛徳於王室者京師有朝宿之邑泰山有湯沐之邑所以供祭祀也魯周公之後鄭宣王母弟若此有賜邑其餘則否許慎曰若京師之地皆有朝宿之邑周有千八百國諸侯盡京師之地不足以容不合事理去孔氏穎逹曰内卿貶則去族外卿貶則稱人外無族之理今宛無族傳無譏文故知未賜族也傳言鄭釋泰山之祀使來歸祊知祊是鄭祀泰山之邑鄭以桓公之故受邑泰山之下天子祭泰山必従徃助祭使其湯沐焉故公羊謂之湯沐之邑既有比邑因立州廟劉炫云言祀泰山之邑者謂泰山之旁有此邑邑内有鄭宗廟之祀蓋祀桓武之神孫氏復曰祊鄭邑天子所封非魯土地故曰來歸定十年齊人來歸鄆讙龜隂田皆此義也先言歸而後言入者鄭不可歸魯不可入也鄭人歸之魯人受之其罪一也入者受之之辭國劉氏敞曰榖梁曰名宛所以貶鄭伯非也魯為大猶有未命大夫獨稱其名者况如鄭小國乎宿程子曰魯有朝宿之邑在王畿之内曰許鄭有朝之邑近於魯曰祊時王政不修天子不廵狩魯亦不朝故欲以祊易許田各取其近者故使宛來歸祊始以祊歸魯未言易也朝宿之邑先祖所受於先王豈可相易也鄭來歸而魯受之其罪均也黄氏震曰木訥曰魯初睦於宋宋伐鄭齊恐魯助宋故為鄭求魯魯不應之反為宋伐邾故鄭使宛歸魯祊魯得祊始奉社稷以從鄭岷隠曰祊近於魯許田鄰於鄭鄭伯利在得許田未敢直取之於魯故先使人歸祊為異日取許田之地魯隠不悟其計受而有之愚案若如木訥是魯要鄭而得祊也若如岷隠是鄭詐魯而歸祊也二說皆是也木訥主前此而言以魯不救鄭也岷隠主後此而言以鄭假許田也要之魯鄭皆懐利以相接者也借李氏廉曰祊許之易其謀始於輸平之時然不過以固魯之好而未敢及許也至是歸祊以祀周公為詞者蓋隠然致易許之請而隠公猶未許其易也鄭莊委分地以合黨而不吝所謂將欲取之必固與之者也隠公不察其深謀詭計而溺於一祊之入故于防中丘之㑹不能不徇之而敗宋入許陷於大惡而不悟先儒謂鄭莊小人之雄信哉邑汪氏克寛曰王制謂方伯為朝天子皆有湯沐之於天子之縣内視元士則方伯之外他諸侯無可知然定四年祝鮀言衛取有閻之土以共王職取相土之東都以㑹王之東蒐則衛亦有朝宿湯沐之邑矣以季氏本曰前年鄭雖納平於魯而交猶未固不足離宋黨故復以祊結之祊田近魯魯所欲得而鄭逺控制為難則棄以與魯以利餌魯之術也然度其時猶恐魯人不欲當未遽言易許也不然則許田何待四年之後始加璧以假乎左氏謂鄭伯請以泰山之田易許田蓋因其終而逆探鄭志耳庚寅我入祊公羊其言入何難也榖梁入者内弗受也邴者鄭伯所受命於天子而祭泰山之邑也集說杜氏預曰桓元年乃卒易祊田知此入祊未肯受而有之啖氏助曰公羊云言我者非獨我也齊亦欲之書我者言魯入耳何闗齊事乎有劉氏敞曰未有言我入者其言我入祊何祊非我也何言乎祊非我有王者制諸侯之地也有常鄭不得與諸人魯不得取諸人平者義也入祊者利也不正其以利為義夫茍以利為義者亦必以利廢義君子恥之葉氏夢得曰歸邴挈鄭伯著鄭罪也入邴挈我著魯罪也凡内邑歸言取不言入我所有也歸外邑言入不言取非我所有也入逆辭也非我所有外雖歸之其道猶為逆云爾書髙氏閌曰鄆讙龜隂本我之邑歸則有之矣此特入者以其非我之有不當入也氏陳氏傅良曰入未有言我者言我交譏之也張洽曰此固鄭之歸我使吏治其地政而主有之也既不以力得則當如齊人歸我濟西田不必書入祊可也書入者難詞義不當受而據有之也吕氏大圭曰左氏言以祊易許經文未見以祊易許之事是時鄭結魯非魯結鄭前年來輸平則約之以言今年來歸祊則啗之以利雖然其歸祊也固以覬覦許田矣特以方來結於魯故姑緩之既而桓公簒立於是要其許田始取償於魯左氏以其事比言而謂之易也汪氏克寛曰鄆讙龜隂書來歸此亦書來歸蓋鄭莊貪魯人之易許而歸祊齊景服聖人之徳化而歸鄆讙龜隂雖其義利不侔而歸出於中心之誠非勉强使之歸也故皆書曰來歸美惡不嫌同辭然此年書入以示其不順則非鄆讙龜隂之比矣案公羊以日為難榖梁以日為惡者也二說皆以日為例朱子謂解春秋者專以日月為襃貶穿鑿得全無義理故刪之附録左傳夏虢公忌父始作卿士於周以四月甲辰鄭公子忽如陳逆婦媯辛亥媯氏歸甲寅入於鄭陳鍼子送女先配而後祖鍼子曰是不為夫婦誣其祖矣非禮也何以能育夏六月己亥蔡侯考父卒集說孫氏覺曰榖梁云日卒正也孔子因舊史作春秋詳略不得加之也此云日為正則無日而非正者孔子如何書之也終陳氏深曰春秋於諸侯之卒悉以名書亦所以謹辯實使邦君之名諡可考而不至於混淆耳諸侯告終則必稱嗣以赴自其告先君之终則已紀録於列國之史矣非特同盟朝㑹聘告之有證也辛亥宿男卒榖梁宿微國也胡傳諸侯薨以名赴而自别於大上禮也古者死而不諡不以名為諱周人以諡易名於是乎有諱禮故君薨赴於他國則曰寡君不禄敢告執事春秋之時遵用此禮凡赴者皆不以名矣赴不以名而書其名者與魯通也已通而不名者舊史失之耳未通而名者有所證矣故傳此義者記於禮篇曰諸侯不生名夫生則不名死則名之别於大上示君臣尊卑之等蓋禮之中也集說孫氏覺曰此與滕侯不名同例不家氏鉉翁曰不名史失之也不葬魯微之而㑹也俞氏皋曰同盟故來赴不名闕文也元年及宋人盟而榖梁以為未能同盟誤矣汪氏克寛曰宿男元年同盟把與魯結昏而成公卒不書名滕同伐秦而成十六年滕子卒不名皆史失之季氏本曰諸侯死則稱名乃䇿書常體聖人亦因其舊而已矣豈有所増益於其間哉蓋諸侯之衆死而不名則其世無所别矣故凡不書名者皆闕文也案宿男不名諸儒皆以為史失之是也胡傳謂赴不以名而經書其名是聖人筆之恐無可據秋七月庚午宋公齊侯衞侯盟于瓦屋此參盟之始地瓦屋杜注周今開封府洧川縣南二十里瓦屋里是其地左傳齊人卒平宋衛于鄭秋㑹于温盟于瓦屋以釋東門之役穀梁諸侯之參盟於是始胡傳周官設司盟掌盟載之法凡邦國有疑則請盟於㑹同聼命於天子亦聖人待衰世之意耳徳又下衰諸侯放恣其屡盟也不待㑹同其私約也不由天子口血未乾而渝盟者有矣其末至於交質子猶有不信者焉春秋謹參盟善胥命美蕭魚之㑹以信待人而不疑也蓋有志於天下為公之世几此類亦變周制矣集說杜氏預曰齊侯尊宋使主㑹故宋公序齊上氏范氏甯曰宋序齊上王爵也陸氏淳曰左曰以釋東門之役禮也趙氏曰諸侯結盟本非正道有何合禮孫氏覺曰三國之盟係諸侯之安危故春秋書之榖梁曰參盟於是始故謹而日之案春秋襃貶之法本無義例罪同同誅惡同同罰不以終始為輕重也謂之謹始則非也之程子曰宋為主也盟與鄭絶也許氏翰曰春秋初宋公先齊序爵也其後乃以國之大小為次惟主㑹者為之矣是陳氏𫝊良曰諸侯初參盟也傳曰諸侯之參盟於始有參盟然後有主盟矣春秋之初宋魯衛陳蔡一黨也齊鄭一黨也鄭有志於叛王而合諸侯於是輸平於魯齊亦為艾之盟以平魯為瓦屋之盟以平宋衛所謂成三國也東諸侯之交盛矣張氏洽曰春秋之初皆離㑹之盟至此則三君共要質於神以示明信而明年㑹防之後伐宋取邑視今日盟誓之言不復顧忌春秋於瓦屋之盟列數三君而又書日以謹之所以傷世變之甚也家氏鉉翁曰春秋初年惟兩國為盟今而參盟宋為首責在宋也前年宋衛陳蔡合兵以伐鄭於是始有四國之伐是時東遷之始諸侯猶有未叛王者而宋連四國之兵盟三國之侯不以王命行事春秋於參盟㑹伐皆以宋為首正其無王之戮也制湛氏若水曰紀參盟也古者天下為公㑹同之禮於天子無上命而私盟無道之甚者也然而彼善於此則有之參盟之謂也故書而紀之日與不日史記有詳略聖人遂因之而不削耳王氏樵曰參盟非始於是也隠元年及宋人盟于宿已為參盟之端然宿小國而内稱及外稱人皆微者猶不足紀故榖梁𤼵義於此齊張氏溥曰春宋衛遇于垂齊平宋衛於鄭也秋宋衛盟于瓦屋齊卒平宋衛於鄭也此左氏之文也然以經考之遇垂而鄭不聞盟瓦屋而鄭不與鄭豈受平者哉侵牧之役衛鄭怨淺長葛之役宋鄭怨深公子馮在鄭宋殤公未嘗一日忘也宋亟欲去馮而合鄭鄭荘公必不從是故瓦屋之盟絶鄭非平鄭也八月葬蔡宣公集說杜氏預曰三月而葬速當陸氏淳曰葬時舉諡而不須重言名史體自然程子曰速也諸侯五月而葬不及期簡也稱張氏洽曰蔡自共侯至桓侯書於史記者其君皆侯今考父史記亦書曰宣侯而春秋以公書所以著臣子之私諡其尊之同於諸侯也湛氏若水曰書葬蔡宣公赴告鄰國之大事諸侯有㑹葬之禮焉故書之然而同盟之義不及時之禮具可見矣附録左傳八月丙戌鄭伯以齊人朝王禮也九月辛卯公及莒人盟于浮來浮公榖作包特此好莒之始亦魯君㑹外大夫之始來浮來杜注紀邑東莞縣北有邳鄉邳鄉西有公山號邳來間今莒州西二十里有浮來左傳以成紀好也公羊公曷為與㣲者盟稱人則從不疑也胡傳莒小國人㣲者而公與之盟故特言及以譏失禮且明非大夫之罪也易曰謙尊而光卑而不可踰隠公可謂謙矣何以譏之為失禮曰謙亨君子以襃多益寡稱物平施屈千乗之尊下與小國之大夫盟豈稱物平施之謂乎太卑而可踰非謙徳矣集說趙氏匡曰莒小國若不書公則嫌乎非公也屈禮以盟其卑以病公也陸氏淳曰淳聞於師曰凡公獨與外大夫盟例不書公及齊髙徯晉處父盟是也所以罪齊晉也此特書公者莒小國也非大夫敢盟公是公自欲與之盟耳所以譏公之失禮且明非大夫之罪也孫氏復曰凡公與外大夫盟内斥言公外大夫稱人惡在公也此年公及莒人盟于浮來成二年公及楚人秦人宋人陳人衛人鄭人齊人曹人邾人薛人鄫人盟于蜀是也内不言公外書大夫名氏惡在大夫也莊十有二年及齊髙徯盟于防文二年及晉處父盟是也公劉氏敞曰莒人㣲者也公曷為與乎莒之㣲者盟欲之也何用見公欲之也公與大夫盟没公以其不没公知其欲之也非公之輕南面而下與大夫盟也程子曰鄰國之交講信修睦可也安用盟為公屈已與臣盟義非安也家氏鉉翁曰凡公與强國之大夫為盟不書公及諱强國之以無道加於公也與小國之大夫為盟則不諱公及以公自欲與之為盟也魯莒有未平之怨前此紀人為之平之而魯莒之好猶未合也今隠公欲降心以消二國之患而莒之君卒不至以望國之君而盟小國之臣謙而不中禮者也梁李氏亷曰春秋書公及人盟二浮來及蜀是也穀曰可言公及人不可言公及大夫然則公及齊大夫盟蔇何得云不可杜氏例以為㣲者不嫌敵公侯故直稱公然髙徯處父大國貴卿猶以伉尊為諱今乃直書不諱乎趙子曰莒小國若不書公則嫌乎非公此説是矣故胡氏從之若蜀之盟則上書公子下書楚人其貶明甚不可與此例論也陳氏際泰曰春秋未有先與小國大夫盟者自魯隠昉也湨梁遍刺天下之大夫而浮來已見其端螟集說程子曰為災也民以食為命故有災必書一髙氏閌曰書螟者三隠二莊一螽十有一桓餘皆僖公之後螟食苗心螽無所不食其為災螟輕而螽重春秋之初災之輕者亦書之及其久也輕者不勝書書其重者耳不然豈莊公之後二百年皆無螟耶附録左傳冬齊侯使來告成三國公使衆仲對曰君釋三國之圖以鳩其民君之惠也寡君聞命矣敢不承受君之明徳冬十有二月無駭卒駭榖作侅左傳羽父請諡與族公問族於衆仲衆仲對曰天子建徳因生以賜姓胙之土而命之氏諸侯以字為諡因以為族官有世功則有官族邑亦如之公命以字為展氏胡傳無駭書名未賜族也諸侯之子為大夫則稱公子其孫也而為大夫則稱公孫公孫之子與異姓之臣未賜族而身為大夫則稱名無駭挾之類是也已賜族而使之世為大夫則稱族如仲孫叔孫季孫之類是也古者置卿必求賢徳不以世官春秋之初猶為近古故無駭與挾皆書名耳其後官人以世無不賜之族或以字或以諡或以官或以邑而先王之禮亡矣至於三家專魯六卿分晉諸侯失國出奔者相繼職此由也案禮天子寰内諸侯世其禄而不嗣然則諸侯所置大夫嗣其位而不易豈禮也哉觀春秋所書而是非之迹著矣治亂之效明矣集說孫氏復曰不氏未命也無程子曰未賜族書名而已張氏洽曰春秋駭挾之卒與季友仲遂之卒實因卿大夫之告終以謹世變所以著無駭挾之未賜族不為薄而季友仲遂之恩實過於厚過厚若隆於恩而先王之禮毫釐之過則生亂啟釁常必由之學者不可以不考也家氏鉉翁曰因生賜姓胙之土而命之氏說者謂若舜由媯汭故陳為媯姓而命氏則曰陳諸侯位卑不得賜姓故其臣因氏其王父字或使即先人之諡以為族如衛齊惡宋戴惡之類是也或取其舊官舊邑之稱以為之族舊官如晉士氏舊邑如韓趙魏之類是也又曰諸侯之子稱公子公子之子稱公孫公孫之子不得復稱公曽孫無駭軰以名行及其死則賜之族以王父字為族是也未死賜族者僅一二見公子公孫於身無賜族之理經書季友叔肸仲遂者皆是以字配名其傳云立叔孫氏臧僖伯臧哀伯叔孫戴伯之徒皆傳家據後書之耳宋督戴公之孫未死而賜族生立華氏彼弑君懼討求為此非例也其公之曽孫以外爰及異姓有新升為卿君賜之族以此卿之字即為此族者亦有雖為卿而竟不賜族者挾柔溺之後無聞者是也春秋初年周制猶存故有未賜族之大夫其後大夫世其官無不賜族而周制幾於掃地矣汪氏克寛曰穀梁謂隠不爵命大夫然傳稱司空無駭而又帥師出境則為大夫明矣特未賜族耳李氏廉曰公穀以為罪無駭入極而貶之又以為隠不成為君故不爵大夫皆無據丁桓王卯六年九年齊僖十七年晉哀四年衛宣五年蔡桓侯封人元年鄭莊三十年曹桓四十三年陳桓三十一年把武三十七年宋殤六年秦寧二年楚武二十七年春天王使南季來聘榖梁南氏姓也季字也聘問也聘諸侯非正也胡傳案周禮行人王者待諸侯有時聘以結好間問以諭志而穀梁子何以獨言聘諸侯非正也古者諸侯於天子比年一小聘三年一大聘五年一朝天子於諸侯不可以若是恝故亦有聘問之禮焉隠公即位九年於此而史䇿不書遣使如周則是未嘗聘也亦不書公如京師則是未嘗朝也一不朝則貶其爵再不朝則削其地如隠公者貶爵削地可也刑則不舉遣使聘焉其斯以為不正乎經書公如京師者一朝於王所者二卿大夫如京師者五舉魯一國則天下諸侯怠慢不臣可知矣書天王來聘者七錫命者三歸脤者一賵葬者四則問於他邦及齊晉秦楚之大國又可知矣王之不王如此征伐安得不自諸侯出乎諸侯之不臣如此政事安得不自大夫出乎其原皆自天王失威福之柄也春秋於此蓋有不得已焉爾矣集說范氏甯曰周禮天子時聘以結諸侯之好殷頫以除邦國之慝間問以諭諸侯之志歸脤以交諸侯之福賀慶以贊諸侯之喜致禬以補諸侯之災劉氏敞曰南者何氏也季者何字也何為字下大夫也天子之下大夫四命聘者何問也諸侯時朝乎天子以致敬也天子時聘乎諸侯以致愛也程子曰周禮大行人時聘以結諸侯之好王法之行時加聘問以懐撫諸侯乃常禮也春秋之時諸侯不修臣職朝覲之禮廢絶王法所當治也不能正典刑而反聘之又不見荅失道甚矣葉氏夢得曰聘或以卿或以大夫以卿聘者大聘也以大夫聘者小聘也何以知聘大小之異使歟聘禮使者載旜旜孤卿之所建也然有曰大夫來使無罪則饗蓋有大夫而為使者矣而禮諸侯之邦交五年一大聘三年一小聘先儒謂大聘用卿小聘用大夫此諸侯之禮也春秋書王聘言尊者如宰周公幼者如王季子仍叔之子固異文而有書卿以邑爵見如凡伯渠伯者有書大夫以氏字見如南季家父者以諸侯之禮推之兹非大小之辯歟大聘聘也小聘問也聘有享獻及夫人主人筵几有私面升而郊勞至問則略之是所以為大小之辯者此使所以亦不得同也道朱子曰諸侯不朝於周而周反下聘於列國是甚理張氏洽曰隠公十年之間宰咺凡伯南季三至魯庭以魯為周公之胄而欲親之也公不明尊王之義而朝聘之禮不行於王室春秋詳王使之來魯則知隠公之罪大矣趙氏鵬飛曰周制一不朝則貶其爵再不朝則削其地且以五年一朝則隠公及是九年當再朝矣再不朝而天王一賵一求二聘焉聖人著天王遣使之節所以責魯不再朝之罪也接汪氏克寛曰隠公之立既不稟命於周宰咺祭伯踵魯庭而不類見於平王武氏子來求賻又不奔喪㑹葬及桓王即位又不入覲而奄然受王臣之兩聘接滕薛之族朝終其世不遣一介行李造於京師茍曰攝而不君則若何比嵗出㑹諸侯耶春秋録王臣之聘惟隠桓之世最數隠不克終桓負大惡不善之積蓋有由矣案胡傳本程子之說以為天王失威福之柄張氏洽主罪魯似當兼用二說經意乃足三月癸酉大雨震電庚辰大雨雪雨于付反左傳九年春王三月癸酉大雨霖以震書始也庚辰大雨雪亦如之書時失也凡雨自三日以徃為霖平地尺為大雪公羊三月癸酉大雨震電何以書記異也何異爾不時也庚辰大雨雪何以書記異也何異爾俶甚也穀梁三月癸酉大雨震電震雷也電霆也庚辰大雨雪志疏數也八日之間再有大變隂陽錯行故謹而日之也雨月志正也胡傳震電者陽精之𤼵雨雪者隂氣之凝周三月夏之正月也雷未可以出電未可以見而大震電此陽失節也雷已出電已見則雪不當復降而大雨雪此隂氣縱也春秋災異必書雖不言其事應而事應具存惟明於天人相感之際響應之理則見聖人所書之意矣集說何氏休曰震雷電陽氣也有聲曰雷無聲曰電周之三月雨當氷雪雜下雷當聞於地中電未可見而大雨震電此陽氣大失其節日者一日之中也凡災異一日者日厯日者月厯月者時厯時者加自文為異俶始怒也始怒甚猶大甚也師說以為平地七尺雪者盛隂之氣也杜氏預曰三月今正月又曰夏之正月㣲陽始出未可震電既震電又不當大雨雪故皆為時失范氏寗曰劉向云雷未可以出電未可以見雷電既已出見則雪不當復降皆失節也雷電陽也雨雪隂也雷出非其時者是陽不能閉隂隂氣縱逸而將為害也也孔氏穎逹曰說文云震劈歴震物者電隂陽激矅河圖云隂陽相薄為雷隂激陽為電然則震是雷之劈歴電是雷光僖十五年震夷伯之廟是劈歴破之雷之甚者為震故何休云震雷也說文云雨水從雲下也然則雨者天上下水之名既見雨從天下自上下者因即以雨言之故下雪稱雨雪也霖劉氏敞曰傳曰大雨霖以震凡雨自三日以徃為杜氏云此傳解經書霖而經無霖字經誤也非也經有電無霖傳有霖無電傳不解經經反誤哉然丘明不宜革電為霖蓋其所據簡策錯誤不能決之於經直因循舊記而已杜氏遂専謂經誤黨於左氏至如此不已惑乎程子曰隂陽運動有常而無忒凡失其度皆人為感之也故春秋災異必書漢儒傳其説而不逹其理故所言多妄三月大雨震電不時災也大雨雪非常為大亦災也而陳氏傅良曰記異也大史公曰孔子論六經記異說不書得春秋之指矣擊俞氏皋曰朱子曰隂氣凝聚在内者不得出則奮而為雷陽氣伏隂之内不得出則爆開而為電隂陽蒸鬰而成雨陽和隂則為雪也汪氏克寛曰或謂春秋用夏正故建辰之月雨雪為異茍實建辰之月則震電不必書矣挾卒挾公榖作俠公羊俠者何吾大夫之未命者也榖梁俠者所俠也集說杜氏預曰挾魯大夫未賜族卒劉氏敞曰挾者何吾大夫也曷為或卒或不正大夫也則卒之非正大夫也則不卒之公子翬如齊逆女亦正大夫也何以不卒貶曷為貶與弑公也齊氏履謙曰案魯世卿之族其嗣不見於經者三人然益師之後傳有衆仲無駭之後傳有展禽展喜展瑕展莊叔展王父惟挾之後無人或所氏之世至挾而絶或其子孫更㣲無事可見或當是時國之紀綱猶在於君盟㑹侵伐多親制之故雖有世卿而名氏不登於史册春秋之作亦據其所見者耳卓氏爾康曰公羊氏吾大夫之未命者也是也不賜族者春秋之始尚朴也穀梁氏隠不爵大夫不成為君也非也郝氏敬曰謂挾不書族隠攝不主爵不賜也夫隠攝政十有一年矣盟㑹侵伐不絶書何以獨不主爵無駭之賜展氏非隠賜歟夏城郎左傳書不時也胡傳城者禦暴保民之所而城有制役有時大都不過三國之一邑無百雉之城制也魯嘗城費城郈其後復墮焉則越禮而非制矣凡土功龍見而戒事火見而致用水昏正而栽日至而畢時也隠公城中丘城郎而皆以夏則妨農務而非時矣城不踰制役不違時又當分財用平板榦稱畚築程土物議逺邇略基址揣厚薄仞溝洫具餱糧度有司量功命日不愆於素然後為之可也况失其時制妄興大作無愛養斯民之意者其罪之輕重見矣集說許氏翰曰七年城中丘而後伐邾今城郎而後伐宋干時動衆恃城保國亦已末矣髙氏閌曰魯自受祊之後將為鄭伐宋又恐他國之議其後者故城郎以備之趙氏鵬飛曰備宋也郎逼於宋魯將北㑹齊鄭伐宋疑宋為批亢𢷬虛之䇿故城以備之尚何暇顧天時之正否民力之豐凶耶李氏亷曰郎魯近邑隠之元年費伯已城之矣至此年復城而桓十年三國之伐來戰於此莊八年陳蔡之俟亦次於此十年齊宋以兵窺魯又宿師於此則郎豈非魯之要地乎厥後築臺于郎築郎囿想皆在此始也猶有警懼之心終也遂為遊觀之地矣秋七月榖梁無事焉何以書不遺時也集說范氏甯曰四時不具不成年也冬公㑹齊侯于防防公作邴兗防杜注魯地在琅琊華縣東南今州府費縣東北六十里有華城即華縣也左傳宋公不王鄭伯為王左卿士以王命討之伐宋宋以入郛之役怨公不告命公怒絶宋使秋鄭人以王命來告伐宋冬公㑹齊侯于防謀伐宋也榖梁㑹者外為主焉爾胡傳周官行人曰時㑹以𤼵四方之禁此謂非時而合諸侯以禁止天下之不義也列國何為有此名凡書㑹皆譏也謂非王事相㑹聚爾左傳稱宋公不王鄭伯以王命討之使來告命㑹于防謀伐宋也于中丘為師期也亦謂之非王事可乎曰以王命討宋而聼征討之禁於王都雖召陵之舉不及是矣始則私相㑹為謀於防中則私相盟為師期於鄧終則乗敗人而深為利以取二邑歸諸已奉王命討不庭者果如是乎經之書㑹書伐而不異其文以此集說髙氏閌曰齊背瓦屋之盟與公連謀為鄭伐宋也隠公得利則合鄭既歸枋與齊鄭併力齊之强大可以為助可以伐人故諸侯爭與之盟宋既與之謀鄭而魯鄭又與之謀宋也張氏洽曰魯隠自六年受輸平八年入祊志於昵鄭而讎宋故外為平宋之形鄭復以不王之罪加於宋則興兵有名而其義亦可以招齊此㑹防之謀所以為明年伐宋之地也左氏見其名而不察其實故書之如此殊不知鄭莊特假此以誑齊魯耳觀繻葛之役則宋殤之不王豈至如鄭莊之甚乎吕氏大圭曰凡書㑹皆非正也彼善於此惡有重輕則各存乎其事焉于家氏鉉翁曰左氏曰鄭人以王命來告伐宋冬㑹防謀伐宋也左氏雜記所聞而後儒多議其誣此類是也魯㗖於歸祊之利齊背瓦屋之盟連兵而伐與國内揣有愧故相與假王命非王意也春秋書公㑹齊侯于防誅始謀也其後覇主挾天子以令諸侯實昉於此間汪氏克寛曰曲禮諸侯相見於隙地曰㑹乃預謀地尅期而徃朝於天子耳春秋書㑹九十二皆非以王事而相㑹也公㑹者四十九夫人㑹者四大夫㑹者二十三外㑹者十三外㑹公者三凡書㑹皆譏也惟襄十一年㑹于蕭魚晉悼公以不戰而屈楚推至誠以待鄭禮囚禁暴偃兵息民故書㑹伐而又書㑹為一經之特筆可謂彼善於此者矣兩玉氏樵曰是時未有霸也而已為霸之漸前此惟君相㑹至此而諸侯參㑹矣前此惟敵國相攻至此而連諸侯伐宋矣自參盟而有主盟自連諸侯而摟諸侯以伐諸侯故五覇三王之罪人也而放恣之諸侯又五覇之罪人也此春秋之大指也附録左傳北戎侵鄭鄭伯禦之患戎師曰彼徒我車懼其侵軼我也公子突曰使勇而無剛者嘗宼而速去之君為三覆以待之戎輕而不整貪而無親勝不相讓敗不相救先者見獲必務進進而遇覆必速奔後者不救則無繼矣乃可以逞從之戎人之前遇覆者奔祝聃逐之衷戎師前後擊之盡殪戎師大奔十二月甲寅鄭人大敗戎師戊桓王辰七年十年齊僖十八年晉哀五年衛宣六年蔡桓二年鄭莊三十一年曹桓四十四年陳桓三十二年把武三十八年宋殤七年秦寧三年楚武二十八年春王二月公㑹齊侯鄭伯于中丘左傳十年春王正月公㑹齊侯鄭伯于中丘癸丑盟於鄧為師期鄧杜注魯地路史黄帝臣鄧伯温國當在今兗州府境集說杜氏預曰傳言正月㑹癸丑盟釋例推經傳日月癸丑是正月二十六日知經二月誤又曰尋九年㑹于防謀伐宋也公既㑹而盟盟不書非後也蓋公還告㑹而不告盟程子曰為師期也陳氏傅良曰鄭伯受命伐宋爾何為乎中丘之㑹鄭有志於叛王而合諸侯故無王命而私㑹齊魯齊魯亦無王命而私㑹於鄭而後諸侯之師始衡行於天下是家氏鉉翁曰冬甫㑹齊于防春又㑹于中丘惟利趨春秋聨書之所以貶也丘汪氏克寛曰防之㑹魯始與齊謀伐宋之舉至中之㑹復偕鄭合謀而决出師之期經備録之著伐宋之兵所由合也此乃直書而義自見夏翬帥師㑹齊人鄭人伐宋左傳夏五月羽父先㑹齊侯鄭伯伐宋胡傳翬不氏先期也始而㑹宋以伐鄭固請而行今而㑹鄭以伐宋先期而徃不待鍾巫之變知其有無君之心矣夫亂臣賊子積其强惡非一朝一夕之故及權勢已成威行中外雖欲制之其將能乎故去其公子以戒兵柄下移制之於未亂也集說孔氏穎逹曰傳稱羽父先㑹齊侯鄭伯是不待公命也貪㑹二國之君自求其名疾其專進故貶去公子案四年翬固請而行故貶去其氏此無固請之文亦貶之者翬於四年傳稱固請明此先㑹亦固請也傳於四年其文已詳故於此而略耳程子曰三國先遣將致伐齊鄭稱人非卿也六月壬戌公敗宋師于菅敗必邁反菅古頑反菅杜注宋地左傳六月戊申公㑹齊侯鄭伯於老桃壬戌公敗宋師于菅老桃杜注宋地戰國䇿髙誘注曰任城有桃聚今山東兗州府濟寧城北有桃鄉城穀梁内不言戰舉其大者也集說杜氏預曰齊鄭後期故公獨敗宋師後孔氏頴逹曰案傳公㑹齊侯鄭伯於老桃然公敗宋師則知老桃之㑹謀與宋戰彼與公謀戰而公獨敗宋師知齊鄭後期也孫氏復曰公與翬衆悉力共疾於宋又浹日而取二邑故君臣並録以疾之秋孫氏覺曰左氏之例曰未陳而薄之曰敗某師春内敗外者凡八豈魯專能未陳而薄人乎之程子曰不言戰而言敗敗者為主彼與戰而此敗也陳氏傅良曰外書伐不書敗伐而敗焉不足書也必交戰也而後言戰言敗績惟内師悉書之勝焉則書敗某師敗則但書戰必㑹他國之君大夫也而後從外辭言戰言敗績程氏端學曰不言齊鄭獨魯敗之也諸侯擅興師伐人之國而敗其師雖僥倖於一時王法所當誅也辛未取郜辛巳取防郜古報反在郜杜注濟隂城武縣有郜城今兗州府城武縣東南八十里城防杜注髙平昌邑縣西南有西防今在兗州府金鄉縣西左傳庚午鄭師入郜辛未歸於我庚辰鄭師入防辛巳歸於我胡傳内大惡其辭婉小惡直書而不隠夫諸侯分邑非其有而取之盗也曷不隠乎於取之中猶有重焉者若成公取鄟襄公取邿昭公取鄫皆覆人之邦而絶其嗣亦書曰取所謂猶有重焉者此也故取郜取防直書而不隠也其不言戰而言敗敗之者為主彼與戰而此敗之也皆陳曰戰詐戰曰敗集說陸氏淳曰左氏曰君子謂鄭莊公於是乎可謂正矣以王命討不庭不貪其土以勞王爵正之體也趙子曰諸侯專取他國之邑而以與人罪之大者而云合正何其妄乎孫氏覺曰公羊謂取邑不日此日者一月再取甚之也案取邑不在書日若無日則是同日取之此但記實爾凡取邑皆有罪何論一月再取乎假如異月再取則為無罪乎又曰内大惡不書小惡書夫人姜氏㑹齊侯于禚亦大惡不可謂不書也榖梁曰不正其乘人之敗而深為利取二邑故謹而日之案經書敗人師而取二邑自己不正何須日以謹之哉盗程子曰取二邑而有之也秋宋人衞人入鄭集說程子曰鄭勞民以務外而不知守其國故二國入之髙氏閌曰宋又連衛以報鄭鄭幸菅之敗而不備故師還及郊宋衛已乘其虛而入之矣春秋無義戰未有竒譎輕疾如宋衛之入鄭者陳氏深曰宋量力未能報齊魯故偕衛先報鄭鄭不暇禦之故入之易也程氏端學曰鄭結齊魯以伐宋宋結衛以入鄭報復不己由乎王政不綱諸侯放肆聖人所以傷世變也湛氏若水曰書宋人衛人入鄭著擅興反覆相攻之罪也夏鄭與齊魯伐宋秋宋與衛人伐鄭干戈相尋王法不禁觀其所書聖人之志可見矣宋人蔡人衞人伐戴鄭伯伐取之戴公榖作載外戴杜注戴國陳留黄縣東南有戴城今河南歸徳府考城縣東南五里考城故城是也左傳秋七月庚寅鄭師入郊猶在郊宋人衛人入鄭蔡人從之伐戴八月壬戌鄭伯圍戴癸亥克之取三師焉宋衛既入鄭而以伐戴召蔡人蔡人怒故不和而敗集說杜氏預曰三國伐戴鄭伯因其不和伐而取之書伐用師徒也書取克之易也孔氏穎逹曰案傳例克邑不用師徒曰取然則取者據克邑之易其克得師衆而易者亦曰取是以莊十一年注云威力兼備若羅網所掩覆一軍皆見禽制若非前敵之易何能覆而取之然則凡言取者皆易辭沈氏亦云今日圍明日取故知易也公羊傳云其言伐取之何易也是杜所用之義程子曰宋人衛人入鄭蔡人從之伐戴鄭伯圍戴克之取三師焉戴鄭所與也故三國伐之鄭戴合攻取三國之衆其殘民人甚矣髙氏閌曰宋既連兵入鄭又乘勝召蔡人伐戴戴鄭所與之㣲國伐之所以報鄭也鄭又伺三國之便伐而取之盡得三師之輜重焉是宋衛雖入鄭不能為鄭之弱也趙氏鵬飛曰春秋無義戰聖人於不義之中必誅其兵首宋鄭交惡久矣兵端則起於宋隠四年宋人助州吁為虐以稱兵於鄭秋又伐之故五年連邾兵伐宋宋繼取長葛於是有前日之伐取郜取防以報長葛之失則勝負相當得失相償宋可以巳矣今鄭師還未及國而宋以兵入之又連蔡衛以伐其附庸亦已酷矣鄭伯出兵乗之戴鬭其前鄭扼其後一舉而取三師焉三國之敗非不幸也或者疑鄭之孤兵不能取三國之衆更以為鄭伯乗危取戴戴鄭之附庸既屬於鄭矣何必取哉何以知戴之為鄭附庸戴今之外黄是也居鄭北鄙三國入鄭不克故移兵以戕其附庸不然三國伐戴何損於鄭哉以是知其非取戴也取三師矣家氏鉉翁曰春秋人宋而未嘗與鄭也書鄭伯目其人也十呉氏􅊹曰取猶哀九年宋皇瑗取鄭師于雍丘哀三年鄭罕逹取宋師于嵒之類謂敗其兵而悉俘其衆也説李氏廉曰程子以為鄭戴合攻盡取三國之衆此為當胡氏以為一舉而兼四國恐過鄭汪氏克寛曰公穀皆謂鄭因三國之力而取戴然方與宋鬬未可資其力以取戴宋衛方入鄭而連蔡以伐鄭之與國必不肯資鄭之力而使之取戴也賀氏仲軾曰公榖皆以為取戴譏鄭伯因人之力非也宋衛入鄭而蔡從之鄭人之忿在三國而不在戴故因其在戴而伐取之左傳曰鄭伯圍戴克之取三師焉是也胡氏謂鄭一舉而兼四國亦非也案公榖謂鄭因三國之力以取戴胡傳謂四國已鬭鄭乗其敝一舉而兼取之俱於情事似未盡合獨程子用左氏取三師之説以爲鄭戴合攻盡取三國之衆而趙氏鵬飛李氏廉汪氏克寛互相發明於經㫖爲近附錄左傳九月戊寅鄭伯入宋冬十月壬午齊人鄭人入郕郕公作盛左傳蔡人衛人郕人不㑹王命冬齊人鄭人入郕討違王命也榖梁入者内弗受也胡傳左氏傳云齊鄭入郕討違王命也若討違王命則不書入矣入者不順之詞也茍以爲難詞則齊鄭大國於討郕何難哉集説何氏休曰盛魯同姓於隱篇再見入者明當憂錄之程子曰討不㑹伐宋也宋以公子馮在鄭故二國交惡左氏傳云宋公不王鄭伯以王命討之於春秋不見其爲王討也王臣不行王師不出矯假以逞私忿耳而髙氏閌曰戴鄭所與也而三國伐之郕衛所與也齊鄭入之是效尤也薛氏季宣曰於此郕再入矣諸侯專兵而小國無以措手足家氏鉉翁曰不書伐而書入掩其不備而入之也呉氏澂曰自五年衛入郕之後郕遂服屬於衛故爲衛之與李氏廉曰鄭莊假王命之事自隱之元年以王師虢師伐衛則猶爲卿士也至三年有交質之惡周人畀虢公政矣六年鄭始朝周而不見禮八年夏號公忌父始作卿士於周而鄭又以齊朝王九年然後有宋公不王之師而傳曰鄭伯爲王左卿士豈非兩朝之後周復用之而鄭所以周旋王室不過爲矯假報復之私初非有夾輔之誠也十一年入許傳又曰君謂許不共亦假飾之詞也卒之敗宋入郕入許納馮之後志得意滿而有繻葛之戰矣故諸傳惟程氏得之左氏得其事而不究其情是爲鄭伯之所欺也汪氏克寛曰入春秋之始兵爭俶擾未有若是年之尤甚者也夏而三國伐宋秋而宋衛入鄭又偕蔡伐戴鄭莊又圍戴取三國之師且偕齊入郕戰國之殺人盈城兆於此矣此春秋之所以作也齊卓氏爾康曰齊所欲者郕也鄭所欲者許也鄭黨以入郕齊黨鄭以入許交相倚恃以侵小自肥今冬之入郕與明秋之入許同一貪兵己恒王已八年十有一年齊僖十九年晉哀六年衛宣七年蔡桓三年鄭莊三十二年曹桓四十五年陳桓三十三年把武三十九年宋殤八年秦寜四年楚武二十九年春滕侯薛侯來朝此諸侯朝魯之始亦旅見之始兗薛杜注魯國薛縣今薛城在山東州府滕縣南四十里孔疏譜云薛任姓黄帝之苗裔奚仲封爲薛侯仲虺居薛以為湯左相武王復以其胄爲薛侯小國無記世不可知亦不知爲誰所滅左傳春滕侯薛侯來朝爭長薛侯曰我先封滕侯曰我周之卜正也薛庶姓也我不可以後之公使羽父請於薛侯曰君與滕君辱在寡人周諺有之曰山有木工則度之賔有禮主則擇之周之宗盟異姓爲後寡人若朝於薛不敢與諸任齒君若辱貺寡人則願以滕君爲請薛侯許之乃長滕侯公羊其言朝何諸侯來曰朝大夫來曰聘榖梁天子無事諸侯相朝正也考禮修德所以尊天子也諸侯來朝時正也犆言同時也累數皆至也胡傳諸侯朝於諸侯禮乎孔子曰邦君為兩君之好有反坫周禮行人凡諸侯之邦交殷相聘世相朝也然謂之殷則得中而不過謂之世則終諸侯之世而一相朝其為禮亦節矣周衰典禮大壊諸侯放恣無禮義之交惟强弱之視以魯事觀焉或來朝而不報其禮或屢徃而不納以歸無合於中聘世朝之制矣且列國於天子述所職者蓋闕如也而自相朝聘可乎凡大國來聘小國來朝一切書而不削皆所以示譏滕薛二君不特言者又譏旅見也非天子不旅見諸侯偃然受之而不辭亦以見隠公之志荒矣集說孔氏穎逹曰十下言有者干寳云十盈則更始以竒從盈數故言有也經備文傳從略故傳不言有桓七年榖伯鄧侯别言來朝此兼言來朝者彼别行禮此同行禮由同時行禮當長者在先故爭之衛孫氏復曰齊晉宋衛未嘗來朝魯者齊晉盛也宋敵也滕薛邾把來朝奔走而不暇者土地狹陋兵衆寡弱不能與魯伉也聘劉氏敞曰其言朝何王者之制諸侯嵗相問殷相世相朝其兼言之何譏何譏爾旅見也非天子不旅見諸侯諸侯相旅見非禮也又曰左氏曰公使羽父請於薛侯曰周之宗盟異姓為後乃長滕侯皆非禮也晉侯使荀庚來聘衛侯使孫良夫來聘魯尚不敢同日而與之盟豈有南面之君來朝而令同日並見耶異姓為後固應為朝天子時耳魯不當旅見二君又不當引天子自况孫氏覺曰外之朝天子者不見於經内之朝天子者二而已又皆在於王所而不在於京師其如京師者一而已又因㑹伐秦而遂行由此觀之當時朝覲之禮一施於強國天子名存而已也聖人因其實而書之以罪之也未程子曰諸侯雖有相朝之禮而當時諸侯於天子嘗朝覲獨相率以朝魯得為禮乎張氏洽曰凡諸侯朝各書之若榖鄧偕至而朝禮不同日也累數之若邾牟葛及今滕薛同日行禮同日行禮惟天子可受之諸侯不當然也今隠公於天子未嘗朝覲而滕薛相率以朝又不特見而使同日旅見非禮甚矣相家氏鉉翁曰周家盛時諸侯有嵗相問殷相聘世朝之禮曰相云者亦徃復之義非若諸侯之朝天子也至於衰世大國未嘗朝王小國乃相率而朝大國大國倨受其朝而不以為僭如滕薛之朝魯是也者汪氏克寛曰滕朝者四把邾朝者各七曹小邾朝各五郯朝者二薛紀穀鄧鄫郜蕭叔之朝各一魯皆未嘗報聘又曰齊侯鄭伯如紀亦兼言之豈旅見於紀乎蓋書二君來朝則是並行朝禮書二君如紀不過同徃紀國非並行朝禮也然僖二十八年兩朝王所皆諸侯並朝襄二十八年公如楚亦諸侯同徃經皆不書他諸侯者春秋主魯書魯以見其餘耳劉氏實曰伐戴入郕小國皆懼此二國所以皆來朝也夏公㑹鄭伯于時來公穀夏字下有五月字時來公作祁黎左文作郲時來杜注郲也滎陽縣東有釐城鄭地也在今河南開封府東四十里左傳夏公㑹鄭伯于郲謀伐許也鄭伯将伐許五月甲辰授兵於大宫公孫閼與潁考叔争車潁考叔挾輈以走子都拔棘以逐之及大逵弗及子都怒集說孫氏覺曰隠之出十二皆不致隠志讓乎桓不欲當正君之禮聖人本其意而略之也呉氏􅊹曰鄭莊以小利餌魯隠既與之伐宋為鄭報怨矣又将與之同伐許為鄭益地許與鄭接壤鄭之所利齊魯無與焉者也鄭伯以計鈎致齊魯之君而借其兵力吞併小國以利益於己甚哉鄭之不仁而齊魯之不智也之劉氏實曰凡稱㑹外為主時來鄭地則知伐許鄭志也蓋許與鄭接壤鄭之所利故也秋七月壬午公及齊侯鄭伯入許許杜注潁川許昌縣今河南開封府許州故許城在州東北四十里孔疏譜云許姜姓與齊同祖堯四岳伯夷之後也周武王封其苖裔文叔於許左傳秋七月公㑹齊侯鄭伯伐許庚辰傅于許潁考叔取鄭伯之旗蝥弧以先登子都自下射之顛瑕叔盈又以蝥弧登周麾而呼曰君登矣鄭師畢登壬午遂入許許荘公奔衛齊侯以許讓公公曰君謂許不共故從君討之許既伏其罪矣雖君有命寡人弗敢與聞乃與鄭人鄭伯使許大夫百里奉許叔以居許東偏曰天禍許國鬼神實不逞於許君而假手於我寡人寡人唯是一二父兄不能共億其敢以許自為功乎寡人有弟不能和協而使餬其口於四方其况能乆有許乎吾子其奉許叔以橅柔此民也吾将使獲也佐吾子若寡人得没於地天其以禮悔禍於許無寧兹許公復奉其社稷唯我鄭國之有請謁焉如舊昏媾其能降以相從也無滋他族實偪處此以與我鄭國争此土也吾子孫其覆亡之不暇而况能禋祀許乎寡人之使吾子處此不唯許國之為亦聊以固吾圉也乃使公孫獲處許西偏曰凡而噐用財賄無寘於許我死乃亟去之吾先君新邑於此王室而既卑矣周之子孫日失其序夫許大岳之𦙍也天而既厭周徳矣吾其能與許爭乎謂鄭伯使卒出豭行出犬雞以詛射潁考叔者君子鄭莊公失政刑矣政以治民刑以正邪既無徳政又無威刑是以及邪邪而詛之将何益矣胡傳書㑹則伐許者本鄭志也書及則入許者公所欲也隠公即位十有一年天王遣使來聘者再而未嘗朝於京師罪一也平王崩不奔喪㑹葬致使武氏子來求賻罪二也禮樂征伐自天子出而擅興兵甲為宋而伐邾為鄭而伐宋罪三也山川土田各有封守上受之天王下傳之先祖而取郜及防入祊易許罪四也今又入人之國而逐其君罪五也凡此五不韙者人臣之大惡而隠公兼有之然則不善之殃豈特始於惠成於桓而隠之積亦不可得而掩矣集說杜氏預曰與謀曰及還使許叔居之故不言滅也孔氏穎逹曰傳稱㑹于郲謀伐許是公與謀也大趙氏匡曰諸侯無王命入人之國罪已大矣又使夫守之不容誅矣而左氏以為有禮是長亂階也許劉氏敞曰傳曰鄭伯使許大夫百里奉許叔以居東偏君子曰鄭荘公於是乎有禮非也許若有罪鄭已破其國即當請王而立君許若無罪鄭固不當妄破其國妄逐其君今許罪不可知而専為威福政不由王而制於已私其邊圉之固皆大罪也何謂知禮乎杜氏諤曰書公及者目公主之也書公而齊鄭稱人則後世必以公及微者故目其爵所以鈞其譏之之義譏在書入而不在稱爵也程子曰書及内為主也非内為主則先書㑹伐後書入也魯王氏葆曰前之伐宋鄭助魯以取二邑今之入許助鄭以奄鄰壤稱及志公之所欲也者陳氏傅良曰以王命討不庭顧因以為暴許無君十有五年甚矣鄭之專也許荘公奔衞不書非其罪也凡奔非其罪不書是故許男奔衛不書須句子奔魯不書呂氏祖謙曰鄭入許而不有許此一叚看得王綱初解紐諸侯亦未敢放手滅人國如後之滅霍滅耿滅魏略無顧忌之呉氏􅊹曰欲得許地者鄭之本謀遂破許國者鄭專功特以借齊魯兵力以同伐齊以國大爵尊為主兵既入許鄭荘陽不有其功而讓與齊齊侯以克許非已功而不敢受乃以讓魯魯又以克許非已功而不敢受乃以與鄭鄭即受之而不辭竟得遂其貪土地之志書入不書滅者許君既奔他國鄭雖専有其地而使許君之弟奉其宗廟不絶其祀也入者亡國之善辭何善也以為猶愈於取其土地而并絶其宗祀者爾桓李氏廉曰春秋一事而始書㑹後書及惟此年及元年垂越之㑹盟皆所以著内外之志也桓十二年㑹武父至伐宋則書及例與此同桓十六年㑹曹夏伐鄭則仍書㑹非獨魯之所欲矣此可以見書法之謹也曰王氏錫爵曰公以許與鄭蓋償前日郜防之取又鄭伯入國逐君擅使大夫守之無君甚矣且設為姦詞内防其患而外利其名所謂刺人而復捫之以手也何名為有禮張氏溥曰三國同伐許鄭不能獨有之又畏齊之偪已使獲佐許叔以居外有存國之名而許實屬鄭齊魯莫與之爭此鄭莊公所以善用兵為名諸侯也附録左傳王取鄥劉蒍邘之田於鄭而與鄭人蘇忿生之田温原絺樊隰郕欑茅向盟州陘隤懐君子是以知桓王之失鄭也恕而行之徳之則也禮之經也已弗能有而以與人人之不至不亦宜乎而鄭息有違言息侯伐鄭鄭伯與戰於竟息師大敗還君子是以知息之將亡也不度徳不量力不親親不徴辭不察有罪犯五不韙而以伐人其䘮師也不亦宜乎冬十月鄭伯以虢師伐宋壬戌大敗宋師以報其入鄭也宋不告命故不書凡諸侯有命告則書不然則否師出臧否亦如之雖及滅國滅不告敗勝不告克不書於策鄥杜注緱氏縣西南有鄔聚在今河南河南府偃師縣西南五十里劉杜注緱氏縣西北有劉亭緱氏今屬偃師縣慶偃師孟縣之間蒍杜注鄭邑當在今河南懐邘杜注鄭邑今河南懐慶府河内縣西北三十里邘臺鎮古邘城也縣温見前原杜注在沁水縣西今懐慶府濟源西北有原鄉有絺杜注在野王今懐慶府河内縣西南三十里絺城樊杜注一名陽樊野王縣西南有陽城在今濟源縣東南三十八里十隰郕杜注在懐縣西南今懐慶府武陟縣西南五里隰城是也二欑茅杜注在修武縣北修武今屬懐慶府縣北十里大陸村即其地也向杜注軹縣西有地名向上今懐慶府濟源縣西南有向城杜盟杜注盟津在今懐慶府孟縣南十八里州注州縣今故城在懐慶府河内縣東五十里一陘杜注闕輿地太行陘在懐慶府西北三十里名丹陘有隤杜注在脩武縣北京相璠曰河内脩武縣北故隤城懐杜注懐縣今武陟縣西十一里有懐縣故城寧息杜注息國汝南新息縣今河南汝府息縣西南七里有息城冬十有一月壬辰公薨左傳羽父請殺桓公将以求大宰公曰為其少故也吾将授之矣使營莵裘吾将老焉羽父懼反譖公於桓公而請弑之公之為公子也與鄭人戰於狐壤止焉鄭人因諸尹氏賂尹氏而禱於其主鍾巫遂與尹氏歸而立其主十一月公祭鍾巫齊於社圃館於寪氏壬辰羽父使賊弑公於寪氏立桓公而討寪氏有死者不書葬不成䘮也莵裘杜注魯邑在泰山梁父縣南今山東兗州府泰安州南泗水縣北有梁父城菟裘聚狐壤杜注鄭地後漢潁隂縣有狐宗鄉疑即此公羊何以不書葬隠之也何隠爾弑也弑則何以不書葬春秋君弑賊不計不書葬以為無臣子也子沈子曰君弑臣不討賊非臣也不復讎非子也葬生者之事也春秋君弑賊不討不書葬以為不繋乎臣子也公薨何以不地不忍言也榖梁公薨不地故也隠之不忍地也其不言葬何也君弑賊不討不書葬以罪下也胡傳致隠讓國立不以正惠公之罪也致桓弑君幾不早斷隠公之失也既有䜛人交亂其間憂虞之象著矣而曰使營菟裘吾将老焉是猶豫留時辨之弗早辨也古者史官以直為職而不諱國惡仲尼筆削舊史斷自聖心於魯君見弑削而不書者蓋國史一官之守春秋萬世之法其用固不同矣不書弑示臣子於君父有隠避其惡之禮不書地示臣子於君父有不没其實之忠不書葬示臣子於君父有討賊復讎之義非聖人莫能修謂此類也集說孔氏穎逹曰他君見弑則書弑魯君見弑則書薨公薨例皆地此公又不地魯史䇿書所諱也董狐書趙盾弑君仲尼謂之良史不書君弑則是史之不良夫子不改其文而因之者為人臣者或心實愛君為諱愆過或志在疾惡故章賊名雖事跡不同而俱是為國聖賢兩通其事欲見仁非一塗僖元年傳曰諱國惡禮也以仲尼之善董狐知為史必須直也以丘明之禮諱惡知為史又當諱也啖氏助曰凡公葬皆書惟隱閔不書言賊不討如不葬然也而陸氏淳曰淳聞於師曰元年有正夫子言隠當立不行即位之禮十年無正譏隠合居其位而不正以貽其禍也劉氏敞曰何以不地弑也弑則何以不言弑不忍言也何以不書葬賊未討也賊未討則何以不書葬君弑臣討賊猶親弑子復讎也讎不復則不葬不葬則服不除寢苫枕戈所以明為臣子也葬者臣子之終事也其義未終故不敢以急葬也程子曰人君終於路寢見卿大夫而終乃正終也薨於燕寢不正其終也薨不書地弑也賊不討不書葬無臣子也子朱子曰凡魯君被弑則書薨而以不地著之蓋臣隠諱之義聖人之微意也胡氏寧曰春秋魯事多諱如公薨不地出奔稱孫滅國曰取易地言假之類非没其實使後世無考證也但微婉其辭不直書耳是故内失地則不書師敗績則不書親送葬則不書朝而不見納則不書髙氏閌曰君終不於正寢而於他處則著其不正終所以危之也至於不書地則知其為弑矣君見弑而忍言焉是無臣子之心故書薨而不地所以深罪當時在朝之臣而顯誅一時預弑之賊也賊未討不書葬見為人臣子者縱賊不問又使之得立為君皆甘心北面事之是與乎弑也一時臣子皆與乎弑則葬之者誰與雖葬猶不葬也惑汪氏克寛曰或以不地為缺文而謂隠公非弑是於明堂位魯君臣未嘗相弑之言爾記禮者不通春秋不地之義遂謂魯未嘗弑君也案隠元年書正月餘皆不書正月公羊謂隠不有其正榖梁亦謂隠不自正皆非也隠在位十一年王命凡五至身既不朝又無一介之使報禮於京師是列公之不奉正朔自隠始故不書正以示義焉非居攝之謂也欽定春秋傳說彚纂卷三
