body:
  text: 欽定四庫全書欽定春秋傳說彚纂卷十六庚襄王二寅十一年二十有九年晉文五年齊昭二年衛成四年蔡莊十五年鄭文四十二年曹共二十二年陳共公朔元年把桓六年宋成六年秦穆二十九年楚成四十一年春介葛盧來介杜注在城陽黔陬縣今山東萊州府膠州西南七十里有黔陬城古介國也案黔陬有東西二城東城秦置即介亭其在髙密境者乃後漢時所遷之西城也左傳介葛盧來朝舍於昌衍之上公在㑹饋之芻米禮也昌衍杜注魯縣東南有昌平城今左山東兗州府曲阜縣東南八十里公羊何以不言朝不能乎朝也穀梁介國也葛盧微國之君未爵者也其曰來卑也集說杜氏預曰葛盧介君名不稱朝不能行朝禮何劉氏敞曰介葛盧者何附庸之君也其言來來朝也公在外則何以言來接焉爾良蘇氏轍曰介小國也不言朝公在㑹也陳氏𫝊曰介一歲再至其意將安在乎故亟書之介人侵蕭譏有以來之也公至自圍許集說張氏洽曰其致以圍許久役而不能服也乃趙氏鵬飛曰公㑹于溫朝於王所今其至也以圍許至何哉志其實也至自㑹則若無功至自京師則實不至故以圍許至也案汪氏克寬謂此年僖公不以王所致而致圍許亦猶成十三年如京師㑹伐秦不以京師致而致伐秦皆以著其本心不在於尊王其說非也汪氏於齊桓圍鄭固嘗與晉文圍許並稱矣以為齊桓圍鄭所以討其逃首止之盟晉文圍許所以討其不㑹踐土河陽之朝圍非美事而桓文之圍實為王室計故晉文遂圍許與齊桓遂救許書法無異朱子所謂春秋明王法而不廢五霸之功意蓋謂此既以為為王室計忽又以為意不在尊王一人之言前後互異此豈可以釋經也哉三傳而外辭義違背者皆刪而不駁緣汪氏此說為大全所採又世之學者承襲已久故為辨之如此夏六月㑹王人晉人宋人齊人陳人蔡人秦人盟于翟泉㑹上公榖有公字翟亭歷反公作狄河翟泉杜注洛陽城內太倉西南池水也今古城在南府洛陽縣東北二十里左傳夏公㑹王子虎晉狐偃宋公孫固齊國歸父陳轅濤塗秦小子憗盟于翟泉尋踐土之盟且謀伐鄭也卿不書罪之也在禮卿不㑹公侯㑹伯子男可也胡傳案左氏公㑹王子虎晉狐偃宋公孫固齊國歸父陳轅濤塗秦小子憖盟于翟泉則皆列國之貴大夫與王子而公與㑹也其貶而稱人諱不書公河也翟泉近在洛陽王城之內而王子虎於此下與列國盟是謂上替諸侯大夫入天子之境雖貴曰士而於此上盟王子虎是謂下陵而無君之心著矣故以為大惡諱公而不書諸國之卿貶稱人而王子亦與焉者此正其本之義也集說杜氏預曰魯侯諱盟天子大夫諸侯大夫又違禮盟公侯王子虎違禮下盟故不言公㑹又皆稱人翟劉氏敞曰是稱人皆微者與非微者也其稱人何泉在王城之內諸侯之大夫入天子之境雖貴曰士陪臣也而盟於天子之側自此始是以貶也程子曰晉文連年㑹盟皆在王畿之側而此盟復迫王城又與王人盟強逼甚矣故諱公諸侯貶稱人惡之大也陳氏傅良曰此晉初以大夫盟王子也向也踐土之役王子虎不書涖盟也今以大夫盟王子文公之志荒矣大夫之交政於是始文公為之也不斥言王子虎為尊尊諱也以其人王子虎不可不遍人諸侯之大夫以其遍人諸侯之大夫不可不沒公也氏黃氏仲炎曰以大夫敵王人則諸侯敵王矣趙鵬飛曰洮之盟齊桓盟王人而無貶辭蓋以諸侯㑹王人為敵也翟泉之盟晉盟王人皆貶書人以大夫而抗王臣是待已與天王均也故皆貶書人此春秋重輕之義蓋顯矣蔡吳氏􅊹曰盟不寒則不必尋也踐土之盟有齊宋鄭及後至之陳今齊宋陳蔡皆在而鄭獨不至鄭已怠於從晉矣蓋文公既歸衛侯而又執之筮史受曹伯之賂而後復之合十一國以圍許諸侯皆不用命而許競不服蓋其所為煩擾繆戾已失諸侯之心威重挫損漸起諸侯之慢鄭之怠於從晉當自反矣而即謀伐之是不以德義懷人而専以威力脅人與齊桓異矣故明年圍鄭卒不能得鄭也嘗謂齊桓之伯主葵丘之盟極盛而後漸衰晉文之伯惟踐土之盟一盛而即漸衰矣李氏亷曰晉文公三大盟㑹踐土王實自勞非晉之罪于溫召王事雖逆而情順故皆諱之以存其尊王之名若翟泉則群聚於王都之側上與王子虎歃血以約言既非踐土子虎涖盟之比又無于溫懷自嫌之心春秋不得不重貶之以顯其慢王之實矣翟汪氏克寬曰春秋內諱公而外以微者書惟于齊泉二盟為然于齊之盟紊中外之辨也翟泉之盟無上下之分也故皆變文以謹之也或謂左氏記事多浮夸而失實安知非微者之相為盟乎是不然于洮􅉀王人而列國之君同歃烏有七國之微者而敢偃然􅉀王人於王城之內哉桓陳氏際泰曰桓公㑹不邇三川文公則盟翟泉矣公不以大夫抗王人文公則使大夫矣案先儒皆依左傳謂列國大夫貶而稱人程子獨謂諸侯貶而稱人不知何據疑是文誤秋大雨雹左傳為灾也胡傳正䝉曰凡隂氣凝聚陽在內者不得出則奮擊而為雷霆陽在外者不得入則周旋不舍而為風和而散則為霜雪雨露不和而散則為戾氣曀霾隂常散緩受交於陽則風雨調寒暑正雹者戾氣也隂脅陽臣侵君之象當是時僖公即位日久公子遂専權政在大夫萌於此矣集說高氏閌曰劉向以為盛陽雨水溫暖而濕熱隂氣脅之不相入則轉而為雹盛隂雨雪凝滯而冰寒陽氣蕩之不相入則散而為霰故雹者隂脅陽也霰者陽薄隂也春秋不書霰猶不書月食也趙氏鵬飛曰天地之大經曰隂陽而已天下之大勢曰治亂而已天地之變霜雹雨暘日食星隕水旱癘疫皆不離乎隂陽而人君之政德刑禮樂視聽言動仁虐善否皆係乎治亂作於下則應乎上政治則隂陽和政亂則隂陽沴和沴之應顧人君所行如何爾大雨雹隂勝陽也雖天地之應不可俄而測然求其類而推之則君不君而臣逼君德不修而刑勝德剛不立而柔侵剛夫不制而婦抗夫者皆隂勝陽之類也春秋之世其類實繁不可以一二考也經書大雨雹者三皆著隂勝陽之罰爾汪氏克寬曰僖公頗能勤於政事以銷天變故及末年始有失政之漸遂為文公縱權之張本若昭公則昏懦不立怠於國政即位之初而公室四分政權盡失卒不免乾侯之辱天之示人顯矣季氏本曰不書月日闕文也案僖公之世季友子無佚不見於經傳胡𫝊以季氏世卿為大雨雹之戒誤矣冬介葛盧來左傳以未見公故復來朝禮之加燕好介葛盧聞牛鳴曰是生三犧皆用之矣其音云問之而信集說何氏休曰前公圍許不在故更來朝孫氏復曰一歲而再來非禮之甚辛襄王二卯十二年三十年晉文六年齊昭三年衛成五年蔡莊十六年鄭文四十三年曹共二十三年陳共二年杞桓七年宋成七年秦穆三十年楚成四十二年春王正月夏狄侵齊左傳晉人侵鄭以觀其可攻與否狄間晉之有鄭虞也夏狄侵齊胡傳左氏曰狄間晉之有鄭虞也遂侵齊晉文公若移圍鄭之師以伐之則方伯連帥之職修矣上書狄侵齊下書圍鄭此直書其事而義自見者也集說高氏閌曰狄之侵齊自背其盟也齊桓召陵之後書狄侵晉晉文城濮之後書狄侵齊狄之輒敢陵侮如此而二伯不攘斥之則趙氏鵬飛曰晉文一勝楚兩朝天王至翟泉之㑹已不親之矣盟王臣且怠於行何有於狄文公剛毅果敢有過於齊桓惜其老而力有所不逮也家氏鉉翁曰晉文置狄不問以狄無僭王圖大之心而楚之志不在小服吳氏􅊹曰二十八年之冬㑹溫以圍許而許竟不二十九年之夏盟翟泉謀伐鄭而鄭亦不畏至此年之夏狄敢於乘間而侵齊故晉文自城濮踐土而下伯業浸浸以衰至此亦可以自反矣秋衛殺其大夫元咺左傳晉侯使醫衍鴆衛侯寧俞貨醫使薄其鴆不死公為之請納玉於王與晉侯皆十㲄王許之秋乃釋衛侯衛侯使賂周歂冶厪曰苟能納我吾使爾為卿周冶殺元咺及子適子儀公入祀先君周冶既服將命周歂先入及門遇疾而死冶厪辭卿公羊衛侯未至其稱國以殺何道殺也穀梁稱國以殺罪纍上也以是為訟君也衛侯在外其以纍上之辭言之河也待其殺而後入也胡傳元咺訟君為惡君歸則已出君出則已歸無人臣之禮信有罪矣則稱國以殺而不去其官何也春秋之法躬自厚而薄責於人君子之道譬諸射失諸正鵠反求諸己衛侯之躬無乃有闕盍亦省德而內自訟乎夫稱國以殺者君與大夫專殺之也衛侯在外其稱國以殺何也穀梁子曰待其殺而後入也待其殺而後入是志乎殺咺瑕者也兵莫憯於志鏌鋷為下衛侯未入稱國以殺此春秋誅意之效也然則大臣何與焉從君於惡而不能止故并罪之也集說范氏寧曰案宣九年陳殺其大夫泄冶傳曰稱國以殺其大夫殺無罪也此傳曰稱國以殺罪纍上也凡稱國以殺大夫或殺無罪或罪纍上參互不同略當近半然則稱國以殺有二義泄冶忠賢而君殺之是君無道也衛侯雖有不德臣無訟君之道元咺之罪亦已重矣衛侯不思致訟之愆過而不改而又怨忌上下皆失故曰罪纍上侯吳氏􅊹曰衛侯未入國而殺元咺稱國殺者實衛使人殺之也夫元咺以臣訟君君被執而咺偃然歸國假伯主之權而易置其君如奕棋然其不臣之罪所當誅也今以國殺為文而無討罪之辭者衛侯未嘗正名其罪而隂使人殺之誅之不以其罪也季氏本曰當寧俞始盟既使居者無懼又可失信以殺咺乎故不去大夫謂宜待以不死也及公子瑕穀梁公子瑕纍也以尊及卑也胡傳公子瑕未聞有罪而殺之何也元咺立以為君故衛侯忌而殺之也經以公子冠瑕而稱及見瑕無罪事起元咺以咺之故延及於瑕而衛侯忌克専殺濫刑之惡著矣集說杜氏預曰瑕立經年未㑹諸侯故不稱君未趙氏匡曰瑕元咺所假立而自秉國權瑕亦如君也故以君殺大夫之辭言之而在元咺下殺孫氏覺曰瑕見立於元咺以咺及之者言瑕之見由於咺咺存則瑕存咺死則瑕死也瑕蘇氏轍曰王釋衛侯衛侯使周歂冶厪殺元咺及而後入稱國以殺咺瑕雖有罪而君亦有過也瑕立逾年矣其不稱君何也為君非瑕志也是以先元咺而後瑕言事之在咺也文高氏閌曰殺而書及者以某之故而纍及某也如九年士縠及箕鄭父襄二十三年慶虎及慶寅皆是也不書及者其罪同其殺之之志均也成八年趙同趙括十七年郤錡郤犫郤至是也案公子瑕立已逾年不成之為君而止稱公子劉氏敞遂疑左氏元咺立瑕之說為無有夫春秋事據左氏不得於經而遂疑傳劉固過矣胡傳則疑咺雖立瑕瑕自不取為君謂不與衛剽同者是瑕能拒咺辭其位而不立也不與陳他同者是瑕能守節不為國人之所惡也此以瑕為賢褒而稱公子也王氏沿則疑瑕與咺比謂叔武為君命奉之以受盟故稱衛子若瑕者元咺君之非君而君者也今與咺同戮故稱公子不與咺君之也此以瑕為惡貶而稱公子也斯二者皆未達於春秋之例者也惟杜氏預以為未㑹諸侯故不稱君庶幾得之而其說未偹春秋之法國無二君則雖立未逾年未㑹諸侯亦得稱君國不可無君也齊君荼是也國無二君而得列於㑹則雖其人為篡弒之賊亦得稱君國不可無君又諸侯已君之也曹伯負芻是也國有二君而皆嘗列於㑹則皆得稱君以諸侯皆君之也衛衎與剽是也國有二君而其一未列於㑹則在位雖久亦不稱居以國既有君諸侯又未嘗君之也鄭忽與儀是也公子瑕與子儀正同國既有君已又未列於㑹故子儀不紀弒而瑕不稱君也然則瑕賢耶惡耶褒之耶貶之耶曰咺實立之而纍及之瑕既無曹臧之節亦未有宋馮之謀則書曰及公子瑕而已矣衛侯鄭歸于衛公羊此殺其大夫其言歸何歸惡乎元咺也曷為歸惡乎元咺元咺之事君也君出則已入君入則已出以為不臣也胡傳衛侯出奔於楚則不名見執於晉則不名今既歸國復有其土地矣何以反名之乎衛侯始歸而殺叔武再歸而及公子瑕春秋之所惡也故再書其名為後世戒集說劉氏敞曰衛侯鄭歸于衛鄭之初歸也得言復當是之時叔武在內鄭雖無國國固其國也及其又歸也殺叔武矣執之歸于京師矣殺元咺及公子瑕矣鄭雖得國國非其國也故不言復春秋之褒善罰惡豈不至明至察哉曰葉氏夢得曰晉侯執曹伯歸于京師及其復也書曹伯歸自京師晉人執衛侯歸之于京師及其復也書曰衛侯鄭歸于衛而不曰歸自京師何哉曹伯伯討也諸侯將見子臧於王而立之子臧辭而奔於宋晉侯使曹人反子臧而歸其君天子許焉故子臧反而曹伯歸天子命之使君也衛侯非伯討也魯公為納玉於王與晉侯而後復焉雖曰命之非天子所以君諸侯之道也衛侯歸于衛而已之陳氏傅良曰向也言復歸今歸不言復何奔失國辭也執未失國之辭也凡執不言歸執而言歸危不得歸也是故執君不名歸然後名之執書衛侯歸書衛侯鄭執書曹伯歸書曹伯襄名之者亦失國之辭也衛趙氏鵬飛曰春秋書執諸侯歸京師者二晉文執成與成十五年晉厲執曹成是也曹成之歸無罪也故不名衛成之歸有惡也故名曹成之歸天王釋之故書歸自京師衛成之歸晉釋之故書歸于衛衛成何罪耶自楚歸則殺叔武自京師歸則殺公子瑕兄弟天倫也忮而殺之此其所以為惡而不免於聖人之誅也祏家氏鉉翁曰衛侯即楚見伐於晉及聞楚敗棄廟而逃於楚其罪當討幸而得歸乃逞忿以殺其弟是之謂怙終國己非其國矣魯人為之納賂以請又幸而得釋不當復而復者也是以名而歸之不與之以復此春秋一字之權而吳氏􅊹曰已殺元咺則無人拒之有周冶等納之勢易故書歸鄭李氏亷曰諸侯執不書歸僖十九年滕子成九年伯襄十六年莒子邾子十九年邾子之類是也惟晉文之執曹衛書歸陳氏曰危不得歸也又晉厲之執曹伯書歸胡氏曰言天王之釋有罪也又曰衛侯歸之于京師而書歸于衛譏不在王室也曹伯亦歸于京師而書歸自京師譏不在晋也汪氏克寬曰衛成貨醫納玉而獲免與曹共之貨筮史而得歸國實無以異故其歸皆書名然衛侯之忌刻戕殺二弟其罪又浮於曹伯故其歸不稱復也晉人秦人圍鄭左傳九月甲午晉侯秦伯圍鄭以其無禮於晉且二於楚也晉軍函陵秦軍汜南佚之狐言於鄭伯曰國危矣若使燭之武見秦君師必退公從之辭曰臣之壯也猶不如人今老矣無能為也已公曰吾不能早用子今急而求子是寡人之過也然鄭亡子亦有不利焉許之夜縋而出見秦伯曰秦晉圍鄭鄭既知亡矣若亡鄭而有益於君敢以煩執事越國以鄙逺君知其難也焉用亡鄭以倍鄰鄰之厚君之薄也若舍鄭以為東道主行李之往來共其乏困君亦無所害且君嘗為晉君賜矣許君焦瑕朝濟而夕設版焉君之所知也夫晉何厭之有既東封鄭又欲肆其西封若不闕秦將焉取之闕秦以利晉唯君圖之秦伯說與鄭人盟使把子逢孫楊孫戍之乃還子犯請擊之公曰不可微夫人之力不及此因人之力而敝之不仁失其所與不知以亂易整不武吾其還也亦去之初鄭公子蘭出奔晉從於晉侯伐鄭請無與圍鄭許之使待命於東鄭石甲父侯宣多逆以為大子以求成於晉晉人許之函陵寰宇記函陵在新鄭縣北十三里山形如函故名函陵今屬河南開封府汜南杜注此東汜也在滎陽中牟縣南今屬河南開封府故焦瑕杜注晉河外五城之二邑地理志陕縣有焦城今在陕州南二里文十三年使詹嘉處瑕以守桃林之塞蓋與桃林相近之地集說孫氏復曰翟泉之盟鄭不至故晉家氏鉉翁曰左傳謂秦晉圍鄭以其無禮於且二於楚也鄭之二楚固有之矣晉文始入猶曰舊怨未忘今幾年矣鄭預㑹盟不應猶以舊怨加兵蓋翟泉之㑹不至是以疑其二於楚耳去年㑹溫朝王今一不預盟即加之兵春秋是以貶秦伯苟知義之不可則當相率俱去不當私及鄭盟舍之徑歸故俱貶而人之豐李氏亷曰秦晉之爭始此夫秦以非子之餘踐岐之地春秋所書大抵皆與晉兵爭之迹耳自穆公釋韓之憾而從晉於城濮之功於是盟于溫于翟泉偕役於齊鄭戮力同心未始有隙由燭之武一語而秦輔晉之心變矣文公既卒而殽戰起釁厥後彭衙之戰令狐之戰河曲之戰秦之伐晉者六晋之伐秦亦六興數十年報復之師更四君而未已蓋至襄公十一年戰櫟十三年十三國之伐然後交伐之文始絶於經然則有穆公之賢而其所就僅止此豈非貪利忘義之失哉是汪氏克寬曰翟泉之盟實謀討鄭而鄭不請服故春晉人侵鄭侵之而猶不服故晉文復偕秦以圍之蓋以鄭二心於楚而數加兵非専為釋私忿而已也然諸侯不見德而惟虐是聞豈伯者服二之道哉况二國同役而不同心春秋貶而人之蓋有在矣案圍鄭之役孫氏復胡氏瑗俱據經文以為責鄭不與翟泉之盟左氏𫝊亦謂無禮於晉且二於楚二楚即謂其不與盟也鄭在王畿於翟泉為近伯主盟於近地而不至是亦無禮不必専指出亡時事也况王享晉侯鄭伯為傅又屢同盟㑹豈晉至此時猶修舊怨哉故不録胡𫝊而獨取家氏鉉翁汪氏克寬之說介人侵蕭集說徐氏彥曰來朝稱名今稱人者退之也後張氏洽曰介再來魯而次年遂侵蕭求援而舉兵也與荆人秦術之聘同略李氏亷曰介侵蕭三傳皆無事迹胡氏亦之惟張氏說是冬天王使宰周公來聘左傳冬王使周公閲來聘饗有昌歜白黑形鹽辭曰國君文足昭也武可畏也則有備物之饗以象其德薦五味羞嘉穀鹽虎形以獻其功吾何以堪之穀梁天子之宰通於四海集說杜氏預曰宰周公天子三公兼冢宰見張氏洽曰天子三公兼冢宰而使來聘魯用周室陵夷大臣失職也朝程氏端學曰禮雖有天子聘諸侯之文然魯未嘗王不過因㑹盟晉侯朝於王所而已襄王不能正王法而下聘焉已失道矣况遣冢宰乎陵遲甚矣公子遂如京師此聘周之始遂如晉此聘晉之始左傳東門襄仲將聘於周遂初聘於晉穀梁以尊遂乎卑此言不敢叛京師也胡傳大夫出疆有以二事出者有以一事出而専繼事者其書皆曰遂公子遂如周及晉與祭公自魯逆王后皆所謂以二事出者也公子結往媵而及齊宋盟則専繼事者也是非得失則存乎其事矣冢宰上兼三公其職仕為至重而來聘於魯天王之禮意莫厚焉魯侯既不朝京師而使公子逐往又以二事出夷周室於列國此大不恭之罪履霜堅冰之漸春秋之所誅而不以聽者也則何以無貶乎有不待貶絶而罪惡見者不貶絶以見罪惡集說杜氏預曰如京師執宰周公既命聘周又命自周聘晉故曰遂趙氏匡曰公羊曰大夫無遂事此亦受命於君而何得指大夫也又云公不得為政爾非也僖公之時大夫初未強豈敢専行哉此殆誣之矣襄孫氏復曰非禮也天子至尊非諸侯可得伉僖與王交聘伉孰甚焉故曰天王使宰周公來聘公子遂如京師遂如晉以惡之出蘇氏轍曰內曰如外曰使皆君命也所謂以二事者也葉氏夢得曰如曷以言遂疾不専於王也遂如京師拜周公之聘也曰因是而往聘晉焉非尊天子之道也大夫出疆固有以二事行者矣必再見名公子遂㑹晉趙盾盟于衡雍公子遂㑹雒戎盟于暴是也惟天子不可以二事故諱為之辭不再挈公子遂若大夫之専事然陳氏傅良曰自桓王以下王室無聘魯者於是再聘而宰周公實來則已尊矣公子如晉以其如京師不敢不如晉是夷周夫如京師不書於是始書之聘周非常事矣聘黃氏仲炎曰凡書大夫如京師者見諸侯不朝而也趙氏鵬飛曰自春秋至是天王遣王臣聘魯者凡六然未有以三公下聘者今襄王以晉文兩合諸侯而朝之於是以三公來聘周公之來非特聘魯也晉齊以降皆歷聘耳魯以公子遂報宰周公之聘而遂如晉則是以事鄰國之禮事周也子家氏鉉翁曰前日公及諸侯僅朝王於河陽今天之宰下臨王之寵魯至矣公當朝於京拜王命之辱乃俾遂報聘抑又二事如晉是之謂大不恭春秋豈容盡為魯諱書公子遂如京師遂如晉貶也又曰宰咺宰糾皆名今周公其無責乎曰周公下聘猶曰厚往薄來以懷諸侯魯乃以一公子報謝且二事如晉罪在魯非周之責李氏亷曰此條與公如京師遂㑹伐秦皆是王事書遂此本以二事出春秋則以如晉為遂事不敢以王事同於伯事也彼本以伐秦出春秋則以伐秦為遂事不欲先伯事而後王事也三汪氏克寬曰經書天王來聘者七惟此使冢宰兼公下聘蓋非常之禮莫大之寵自春秋以來未之有也或者以僖有兩朝王所之勤而報之歟經書卿大夫如周聘者四而惟此以二事出自入春秋未嘗朝聘於京師以魯之望國僖之賢君而對揚天子之休命者如是其簡慢况晉未聘魯而魯往聘周先聘魯而魯苟答聘是尊王之禮不如事伯之謹也雖然猶勝於隱桓之受聘而不報者也王朝冢宰四見於經咺糾以瀆三綱而書名閲之來聘禮雖過厚視賵寵妾命篡弒者則其罪薄乎云爾見趙氏汸曰周制諸侯於天子有見有貢而無聘問則大行人朝覲以下六禮貢則六服所貢之物小行人令諸侯春入貢是也諸侯於天子言聘乃東遷禮失之辭由職貢俱廢而後以聘禮上問如邦交非成周之舊也於王氏樵曰晋未聘魯魯初往聘故左傳曰遂初聘晉周先聘魯魯本欲往報故左傳曰將聘於周以將字起下遂字因來而報不専於王室而以二事遣使直書而義自見矣壬襄王二辰十三年三十有一年晉文七年齊昭四年衛成六年蔡莊十七年鄭文四十四年曹共二十四年陳共三年杞桓八年宋成八年秦穆三十一年楚成四十三年春取濟西田濟子禮反左傳春取濟西田分曹地也公羊惡乎取之取之曹也曷為不言取之曹諱取同姓之田也此未有伐曹者則其言取之曹何晉侯執曹伯班其所取侵地於諸侯也晉侯執曹伯班其所取侵地於諸侯則何諱乎取同姓之田久也胡傳公羊曰取之曹也晉侯執曹伯班其所侵地於諸侯不繫國者吾故田也復吾故田而謂之取何也春秋之法不以亂易亂集說趙氏匡曰凡力得之曰取雖取本邑亦無異辭不當取也又曰凡內取之邑不繫國者皆本是魯邑魯為外國所奪今却取之既是本邑不可繫之他國耳劉氏敞曰孰取之吾故也取邑必繫國取邑不繫國非也取附庸也取田必繫國取田不繫國吾故也非外取之也又曰左氏曰使臧文仲往非也若實臧文仲往不應不書注謂文仲但請田非聘饗㑹同故不書亦非也告糴乞師弔葬致女皆書請田非常自應書又叔孫豹鄫世子巫如晉亦書即請田之比也禮曰卿非君命不越境越境則書之何為請田獨不書哉又曰分曹地自洮以南東傅於濟若然當謂之取曹田自濟水不得云取濟西田而已孫氏覺曰左氏以為晉侯分曹地以與諸侯而魯取濟西之田然經書與汶陽田無異蓋魯濟西之田嘗見侵入於曹晉侯執曹伯而反諸侯之侵地魯於是乎取之髙氏閌曰凡取人之有其惡易見而取己之有不以道者其罪難知聖人亦正名曰取所以顯微也張氏洽曰復魯之舊地亦與非其有而取之者同蓋無王命以正疆理皆取之不以其道也况晉奪之曹以與魯本以其私憾而非有至公之義乎趙氏鵬飛曰淮濟岱皆魯之境則濟西蓋魯田也莊三十年公及齊侯遇于魯濟濟水出齊魯之間故有齊濟有魯濟今曰濟西則自濟以西之田耳內取田無不繫之國者惟成二年取汶陽田與此取濟西田不繫之國不繫之國則本魯田矣宣元年齊人取濟西田取是田也至宣十年則書齊人歸我濟西田書歸我則知濟西本魯田也審矣也吕氏大圭曰取濟西田不繫曹則濟西田魯故田取汶陽田不繫齊則汶陽田亦魯故田也汶濟皆近魯之竟也然汶陽濟西則言取鄆歡龜隂歡闤則言歸言取者非彼所欲也非彼所欲我取之曰取言歸其所欲也非我强之而彼自歸曰歸家氏鉉翁曰此春秋責備晉文之意也土地皆王之所有諸侯擅相侵奪無王也盟主治其侵奪之罪固職分之宜為更能稟命於王還以錫魯夫然後盡尊君之義春秋以是責晉文責其所可責也李氏亷曰濟西田左氏穀梁皆以為曹田公羊以為曹所侵魯之故田胡氏從公羊濟西田首末三見於經此年取之曹宣元年以賂齊宣十年齊人以歸我又曰經書田十桓元年假許田宣元年齊取濟西田十年齊歸濟西田成二年取汶陽田八年韓穿來言汶陽田襄十九年取邾田定十年齊歸鄆歡龜隂田哀二年取漷東田沂西田及此年也不繫國者吾故田也非吾田則繫國邾田是也漷東沂西田不繫國者乘上文伐邾文也汪氏克寬曰春秋書內取者十有七以兵力取他國之地則書戰伐若敗宋師取郜取防伐齊取穀伐莒取向伐邾取訾婁取繹取漷東田及沂西田是也藉大國之威不以兵力而復故地則不書侵伐而止書取濟西汶陽之田是也非故地則繫之國取邾田自漷水是也取附庸之小國而滅之則諱不言侵伐而亦止書取取根牟取鄟取邿取鄫是也取之而存其祀則伐邾取須句是也若取鄆則乘亂取邑故不詳録取闞則昭公在外而取內邑又春秋之變例也或謂濟西乃晉人侵魯之故疆是時晉霸方強豈肯歸地於魯况魯晉非接壤之國何謬之甚哉公子遂如晉左傳襄仲如晉拜曹田也集說髙氏閌曰晉未嘗來聘而公子遂去冬既聘今春又往謝取濟西之田何厚於晉而薄於周也事趙氏鵬飛曰前日公子遂以如周之故遂如晉則晉為不専而繼得侵疆焉於是復以遂如晉謝不敏也然宰周公之聘在遂未如周之前而濟田之歸在既如晉之後則周之恩為厚於晉不再如周而再如晉僖公於輕重厚薄之間抑亦左矣周鄭氏玉曰魯遣使如晉拜分田之賜而不請命於正疆理之復但知有霸不知有王但知利不知義此春秋所以於濟田書取也夏四月四卜郊公羊曷為或言三卜或言四卜三卜禮也四卜非禮也三卜何以禮四卜何以非禮求吉之道三禘嘗不卜郊何以卜卜郊非禮也卜郊何以非禮魯郊非禮也魯郊何以非禮天子祭天諸侯祭上天子有方望之事無所不通諸侯山川有不在其封內者則不祭也穀梁夏四月不時也四卜非禮也胡傳記禮者曰祭帝於郊所以定天位也禮行於郊而百神受職焉魯諸侯何以有郊成王以周公有大勳勞於天下命魯公世世祀周公以天子之禮樂是故魯君孟春乘大輅載弧韣旗十有二旒日月之章祀帝於郊配以后稷天子之禮也以人臣而用天子之禮可乎是成王過賜而魯公伯禽受之非也揚子曰天子之制諸侯庸節節莫差於僭僭莫重於祭祭莫重於地地莫重於天諸侯而祀天其僭極矣聖人於春秋欲削而不存則無以志其失為後世戒悉書之乎則歲事之常有不勝書者是故因禮之變而書於策或以卜或以時或以望或以牲或以牛於變之中又有變焉者悉書其事而謂言偃曰魯之郊禘非禮也周公其衰矣把之郊也禹也宋之郊也契也是天子之事守也言把宋夏商之後受命於周作賔王家統承先王修其禮物其得行郊祀而配以其祖非列國諸侯之比也是故天子祭天地諸侯祭社稷祝嘏莫敢易其常古易則亂名犯分人道之大經拂矣故曰郊社之禮所以事上帝也宗廟之禮所以祀乎其先也明乎郊社之禮禘嘗之義治國其如指諸掌乎夫庶人之不得祭五祀大夫之不得祭社稷諸侯之不得祭天地非欲故為等衰蓋不易之定理也知其理之不可易則安於分守無欲僭之心矣為天下國家乎何有集說董氏仲舒曰魯曷為郊周公故也不於日之至避王室也比旬而卜之遠怠慢也必更三旬禮盡於三也不敢斥尊何氏休曰郊所以祭天不言郊天者謙孔氏頴逹曰周禮太宰職云祀五帝前期十日帥執事而卜日然則將祭必十日之前豫卜之也言四卜郊者蓋二月每旬一卜至四月上旬更一卜乃成為四卜也穀啖氏助曰天子以冬至祭上帝又以夏之孟春祈於上帝於郊故謂之郊魯以周公之故特以孟春祈榖於上帝亦謂之郊郊皆用辛日故以二月卜三月上辛不吉則卜中辛又不吉則卜下辛所謂吉事先近日也卜三旬皆不吉則不郊程子曰周公之功固大矣皆臣子之分所當為魯安得獨用天子禮樂哉成王之賜伯禽之受皆非也朱子曰如四卜五卜牛傷牛死是失禮之中又失禮也飛陳氏傅良曰以其不勝譏譏其甚者爾哉趙氏鵬曰春秋卜郊者四無一從者天豈容僭然四卜五卜而遂不郊猶為知自反以畏天而僖之不從則猶三望是犯天威而必於僭也其可乎吳氏􅊹曰經書郊者九龜違者四牛災者四非時大不敬者一蓋魯郊雖僭行之已久視為常事故不悉書惟卜之不從牛之有變及時之大異於常而後書因以見其僭禮也三卜不從而不郊正也三不吉而至四卜四不吉而至五卜瀆甚矣牛災荐作亦可以見魯郊之僭鬼神弗與也四月五月固為不時猶夏時之春也九月夏之孟秋不卜日不卜牲而強用其禮焉特書用非時不敬之大也李氏廉曰郊之用卜何也古者大事皆决於卜公羊以為天子之郊常事則不卜魯郊非常是以卜之卜止於三吉則為凶則已左氏以為常禮不卜止卜牲與日案周祀五帝前期太宰帥執事而卜日則天子亦卜也但所卜者不過卜日與牲而已春秋所書亦卜日與牲也謂汪氏克寬曰左𫝊家語皆云魯以啓蟄而郊朱子夏正之孟春漢太初以前以啓蟄為正月中氣也然啖氏謂以周之二月卜三月且辨穀梁以周之十二月卜正月非是今考宣三年成七年定十五年哀元年之改卜牛皆在正月蓋成王所賜止是祈穀之郊乃夏之孟春啖氏所言卜起二月下旬而盡於三旬者禮之正也穀梁所言卜起十二月者禮之末失也故子服惠伯云魯將以十月上辛有事於上帝孟獻子曰正月日至可以有事於上帝而明堂位注疏以孟春為周之正月郊特牲疏崔氏皇氏用王肅之說又以魯冬至郊天建寅之月又郊以祈穀皆因魯郊之非時而誤也聖證論引穀梁言魯止一郊或用子月或用寅月蓋魯郊非時或僭天子日至之期而失之太早或踰啓蟄之節則失之後時也或謂卜自建子之月而始又謂郊非祈農事則與程子冬祀圜丘春祈穀之說異矣不從乃免牲公羊曷為或言免牲或言免牛免牲禮也免牛非禮也免牛何以非禮傷者曰牛穀梁免牲者為之緇衣熏裳有司元端奉送至於南郊免牛亦然乃者亡乎人之辭也胡傳古者大事决於卜故洪範稽疑獨以龜為主卜而不從則不郊矣故免牲集說杜氏預曰免猶縱也祀啖氏助曰凡牲必飬二牲一以祀上帝一以后稷凡卜三旬皆不吉則不郊牛死及牛有災害則卜稷牛而代之若卜稷牛不吉及稷牛又死亦皆不郊凡不郊皆卜免牲卜免牲吉則免之不吉則但不郊而已郊劉氏敞曰所謂不從者謂日不吉也不吉則不敢故須免牲也牲趙氏鵬飛曰牲一也或曰免牲或曰免牛何也未曰牛既卜曰牲牲具而卜郊不從則免牲免牲則不郊矣子王氏元杰曰禮以十月上甲繫牲是日至之郊用建亥之月當繫牲矣祈穀之郊用寅建丑之月當繫牲矣經於四月書牲牲已成矣但以卜郊不從而免之故不曰牛而曰免牲李氏廉曰書免牲則見其不郊矣僖三十一年襄七年止書免牲是也若不郊而不行免牲之禮則不書免牲成十年襄十一年止書不郊是也若牛死則無可免矣宣二年牛死乃不郊是也獨成七年既書免牛又書不郊何也榖梁曰免牲不曰不郊免牛亦然此經復書不郊者蓋以僖公免牲與三望同時故略去不郊之文今此春免牛而夏三望故須書不郊以見之也免牲者為之緇衣纁裳奉之南郊天位歸之於陽也已傷曰牛而尚卜免之何也嘗置之上帝矣卜而後免之不敢専也汪氏克寬曰免牲不言不郊蓋卜免牲而吉則不可郊矣免牛則猶可再卜牛故復言不郊猶三望左傳四卜郊不從乃免牲非禮也猶三望亦非禮也禮不卜常祀而卜其牲日牛卜日曰牲牲成而卜郊上怠慢也望郊之細也不郊亦無望可也公羊三望者何望祭也然則曷祭祭泰山河海曷為祭泰山河海山川有能潤於百里者天子秩而祭之觸石而出膚寸而合不崇朝而遍雨乎天下者唯泰山爾河海潤於千里猶者何通可以已也何以書譏不郊而望祭也穀梁猶者可以己之辭也胡傳望祭也有虞氏受終而望因於類巡狩而望因於柴皆天子之事也今魯不郊而望故特書曰猶猶者可以己之辭其言三望何也天子有方望無所不通諸侯非名山大川在其封內者則不祭魯得用重禮視王室則殺故望止於三比諸侯則隆故河海雖不在其封而亦祭然非諸侯之所得為也集說杜氏預曰望而祭之也猶啖氏助曰郊後必望祭若不郊則不當望書非禮也孫氏復曰公羊謂泰山河海鄭氏謂海岱淮杜預稱分野之星及境內山川據鄭杜止以諸侯祭其封內云爾况河海淮非魯封內又諸侯無祭分野星辰之事且魯既僭天子蓋於四望之中祭其大者三爾公羊得之朱子曰猶三望是不必望而猶望也猶繹是不必繹而猶繹也張氏洽曰鄭杜恐臆說蓋天子四望王雖令魯郊止行祈穀之郊令魯得望特比天子闕其一故三望與郊書之無異而書曰猶言不當望而望祭也如使魯望不出境何為言猶以譏之若壬午猶繹之書乎公羊之說必有所𫝊李氏廉曰春秋書猶三猶三望猶朝於廟猶繹也三望與繹譏其可已而不己之辭也朝廟幸其不可已而不己之辭也汪氏克寬曰周官四望蓋望四方今魯三望蓋泰山在魯西海在魯東河在魯北也案三望之說諸家不同胡𫝊獨取公羊以為泰山河海蓋以虞帝受終巡狩望秩山川則望者祭山川之名而境內山川乃諸侯所當祭者常事可不書也孫氏復張氏洽汪氏克寬皆主公羊於理為近但周禮大司樂分樂而杞之奏黃鐘歌大吕舞雲門以祀天神奏太簇歌應鐘舞咸池以祭地示奏姑洗歌南吕舞大磬以祀四望奏蕤賔歌函鐘舞大夏以祭山川既曰四望又曰山川是山川之外别有四望矣天神曰祀四望亦曰祀地示曰祭山川亦曰祭是四望附於天神山川附於地示不得以山川列於四望矣祭祀各從其類故近世郊祀之禮必以星辰風雨從祀於圜丘嶽鎮海瀆從祭於方澤也鄭注賈疏謂日月星辰在天神之列又謂司中司命風師雨師當在四望意者四望為天神之屬而日月星辰司中司命風雨皆在祀中乎姑附存之以俟考秋七月附録左傳秋晉搜於清原作五軍以禦狄趙衰為卿清原杜注河東聞喜縣北有清原今在山西平陽府稷山縣西北二十里冬把伯姬來求婦公羊其稱婦何有姑之辭也穀梁婦人既嫁不踰竟把伯姬來求婦非正也胡傳蕩伯姬來逆婦而書者以公自為之主失其班列書也杞伯姬敵矣其來求婦曷為亦書見婦人之不可預國事也王后之詔命不施於天下夫人之教令不施於境中昏姻大事也把獨無君乎而夫人主之也故特書於䇿以為婦人亂政之戒母為子求婦猶曰不可况於他乎此義行無吕武之禍矣集說陸氏淳曰經文直書之以志其非禮耳公羊云兄弟之辭有何義乎劉氏敞曰其言婦緣姑言之之辭也婦人不専行把伯姬來求婦非禮也姑無自求婦者也葉氏夢得曰逆婦非姑道求婦非母道八季氏本曰把弱為魯所陵故伯姬二十年來魯今又來求婦求庇於魯耳狄圍衛集說吳氏􅊹曰狄去年侵齊今又圍衛若無晉霸然豈以晉文居狄之久而狎之歟十有二月衛遷于帝丘于穀作於顓帝丘杜注東郡濮陽縣故帝頊之虗故曰帝丘今直𨽻大名府開州有顓頊城是也左傳卜曰三百年衛成公夢康叔曰相奪豫享公命祀相寧武子不可曰鬼神非其族類不歆其祀祀鄫何事相之不享於此久矣非衛之罪也不可以間成王周公之命祀請改祀命胡傳帝丘東郡濮陽顓頊之虗亦衛地也狄嘗迫逐黎侯黎侯寓於衛而衛不能修方伯連率之職戎嘗伐凡伯于楚丘而衛不能救王臣之患其後遂為狄人所滅東徙渡河矣齊桓公封之而衛國忘亡今又為狄所圍其遷于帝丘避狄難也而衛侯不能自強於政治晉文無安列國之功莫不見矣集說張氏洽曰狄以閔二年入衛齊桓救而封之自此狄不敢加兵於衛桓公之力也齊桓即世衛文忘齊之大德從宋襄代齊殺冡嗣而立不正於是狄人乃假義伐衛衛人忘恩而啓狄之冦蓋始於此自晉文興不復侵伐相攻矣今復迫衛致其遷都此胡𫝊所以罪晉文也黃氏仲炎曰𫝊曰諸侯有道守在四鄰夫何遷之有不知出此而惟逼是畏惟地利是擇逼者無己則遷者亦將無己是徒勦民而已非善為謀也矣趙氏鵬飛曰齊侯城楚丘以遷衛至是蓋三十年衛雖遷而狄未艾齊桓未沒蓋已侵衛僖十三年之役是也十八年及邢人伐衛二十一年侵衛狄為患於衛抑亦甚矣今又整兵而圍之衛不得已遷于帝丘而避焉然而衛有狄患齊桓城而遷之今狄日熾而衛自遷晉文坐視而不恤文德衰矣抑亦耄而謀不及是乎不家氏鉉翁曰齊桓晚年不能救黃猶曰黃逺而力逮也衛近於晉非其力之不及而休戚不相關尚何以為盟主哉附録左傳鄭泄駕惡公子瑕鄭伯亦惡之故公子瑕出奔楚癸襄王二已十四年三十有二年晉文八年齊昭五年衛成七年蔡莊十八年鄭文四十五年曹共二十五年陳共四年杞桓九年宋成九年秦穆三十二年楚成四十四年春王正月附録左傳春楚鬪章請平於晉晉陽處父報之晉楚始通集說王氏樵曰楚非衰弱不振畏我而請平也我與之平非能使之受齊盟而遵約禁也攘討之義怠故和同之說入焉晉文之志荒矣夏四月己丑鄭伯捷卒捷公作接集說杜氏預曰文公也衛人侵狄秋衛人及狄盟左傳夏狄有亂衛人侵狄狄請平焉秋衛人及狄盟胡傳其不地者盟於狄也再書衛人而稱及者所以罪衛也盟㑹衰世之事己非春秋之所貴况即其廬帳刑牲歃血以要之哉集說杜氏預曰報前年狄圍衛不地者就狄廬帳盟孔氏穎逹曰上云衛人侵狄及狄盟猶若公如晉及晉侯盟是指其所居之處故不言地一家氏鉉翁曰衛三十年間國凡再遷抑亦微弱矣旦狄有內亂從而侵之狄請平自是北鄙不聳可謂能自彊矣書衛人言侵之盟之皆制於衛也吳氏􅊹曰衛畏狄之彊遷都以避之今乘其亂始敢以兵攻其境言侵不言伐不敢聲其罪而討之也汪氏克寬曰書及則是盟乃衛人所欲冬十有二月己卯晉侯重耳卒左傳冬晉文公卒庚辰將殯於曲沃出絳柩有聲如牛卜偃使大夫拜曰君命大事將有西師過軼我擊之必大捷焉杞子自鄭使告於秦曰鄭人使我掌其北門之管若潛師以來國可得也穆公訪諸蹇叔蹇叔曰勞師以襲遠非所聞也師勞力竭逺主備之無乃不可乎師知所為鄭必知之勤而無所必有悖心且行千里其誰不知公辭焉召孟明西乞白乙使出師於東門之外蹇叔哭之曰孟子吾見師之出而不見其入也公使謂之曰爾何知中夀爾墓之木拱矣蹇叔之子與師哭而送之曰晉人禦師必於殽殽有二陵焉其南陵夏后皋之墓也其北陵文王之所辟風雨也必死是間余收爾骨焉秦師遂東胡傳案左氏載秦伯納晉文公及殺懷公於髙梁其事甚詳而春秋不書者以為不告也徐邈曰諸侯有朝聘之禮赴告之命所以敦交好通憂虞若鄰國相望而情志否隔存亡禍福不以相聞則他國之史無由得書魯政雖陵典刑猶在史册所録不失常法其文足證仲尼修之事仍本史有可損而不能益也集說啖氏助曰他國之事不憑告命何由得書但書所告之事定其善惡以文褒貶爾列國至多若盟㑹征伐喪紀不告亦書則不勝書矣文家氏鉉翁曰齊桓優游不迫有周家盛時氣象晉淺狹迫急漸有戰國秦漢之風城暵之役左𫝊所謂三罪而民服皆失刑也顛頡祁瞞舟之僑皆在議勳議能之科有罪猶宥而况罪不主死乎晉文執心不𢎞狐趙諸人濟以深刻每每如此王氏元杰曰齊孝不能繼桓之業晉襄能紹文之伯𫝊之纍世其故何耶夫國家之盛衰繫乎人才之進退桓公之於管仲權歸一已身沒而事業竟衰文公入國之始則能選用狐趙之徒以成伯業𫝊之千孫奕世而不已則是用人之道有國家之先務可不鑒乎濮李氏廉曰晉文以二十四年入國至二十八年城始主伯迄三十二年凡五年李氏曰晉有二文之業蓋文侯文公也書録文侯之命捍王於艱錫以秬鬯為東周賢侯春秋詳文公之伯蓋文侯家法也文公之興其事易於齊桓固有自來矣然文公既入國而事之不載於經者凡四年雖以納王之懿功削而不見至二十八年一簡之中乃五挈晉侯不以為繁何哉蓋自武公以支代宗并吞専立讀無衣之詩雖晉之臣民不能自安也春秋為是黜晉不書文公奔而復國內何所承上何所禀經復略之勤王固為大美然特以求諸侯之利心而為之豈真知有君臣之義哉至二十八年晉楚之事乃關中外之盛衰非繫一國之得失春秋抑楚之深故與晉之亟則晉亦不為無績於列國矣此其與桓公並稱歟大抵桓文雖並稱而文固非桓匹也桓公二十餘年蓄威飬晦始能問罪於楚文公一駕而城濮之功多於召陵桓公屢盟屢㑹遲回晚嵗始㑹宰周公文公再合而溫之事敏乎葵丘桓公㑹鄄失魯盟幽失衛首止失鄭葵丘失陳文公三㑹而大侯小伯莫有不至其得諸侯又盛乎桓公而曰文非桓匹何也文公之功多於桓公者罪亦多於桓公也事速就乎桓公者義尤壞乎桓公者也名盛乎桓公者實衰乎桓公者也春秋不以功蓋罪不以事掩義不以名誣實此其非桓匹歟桓公得江黃而不用於伐楚文公謂非致秦則不可與楚爭楚抑而秦興矣此桓公之所不肯為也桓公㑹則不邇三川盟則不加王人文公㑹畿內則伉矣盟子虎則悖矣此桓公之不敢為也桓公寧不得鄭不納子華懼其奬臣抑君不可以訓文公為元咺執君則三綱五常於是廢矣此又桓公不忍為也夫子正譎之辨獨不深切著明哉甲襄王二午十五年三十有三年晉襄公歡元年齊昭六年衛成八年蔡莊十九年鄭穆公蘭元年曹共二十六年陳共五年把桓十年宋成十年秦穆三十三年楚成四十五年春王二月秦人入滑左傳三十三年春秦師過周北門左右免胄而下超乘者三百乘王孫滿尚幼觀之言於王曰秦師輕而無禮必敗輕則寡謀無禮則脫入險而脫又不能謀能無敗乎及滑鄭商人弦髙將市於周遇之以乘韋先牛十二犒師曰寡君聞吾子將步師出於敝邑敢犒從者不腆敝邑為從者之淹居則具一日之積行則備一夕之衛且使遽告於鄭鄭穆公使視客館則束載厲兵秣馬矣使皇武子辭焉曰吾子淹久於敝邑唯是脯資餼牽竭矣為吾子之將行也鄭之有原圃猶泰之有具囿也吾子取其麋鹿以間敝邑若何把子奔齊逢孫楊孫奔宋孟明曰鄭有備矣不可冀也攻之不克圍之不繼吾其還也滅滑而還穀梁滑國也集說胡氏寧曰秦人滅滑而書入者不能有其地非末減之也而肆其悖心無故滅人之罪著矣張氏洽曰孟明視西乞術白乙丙不書罪之也十汪氏克寬曰滑國伯爵莊十六年同盟於幽僖二年鄭公子士泄堵寇帥師嘗入滑矣蓋國近於鄭故秦雖滅之而不有其地也季氏本曰秦自三十年秋從晉圍鄭已識地形自周而東將以襲鄭乘便入滑得利而還歸途非有晉規則秦之稱兵不止晉鄙而長驅以及東諸侯之國矣故殽之敗亦秦兵不敢東下之一機也黃氏正憲曰秦雖繫顓頊之後然棄禮義上首功未免西戎習氣自晉文藉其力以勝楚始通盟㑹抑楚以興秦有拒虎進狼之意當其與晉圍鄭背晉而去已有爭雄之心使秦得志於鄭乘勝長驅諸侯必有再受其毒者幸而謀泄於滑師敗於殽秦兵不敢東下然秦晉讎殺者四五世於是晉力稍衰而楚得以復橫矣齊侯使國歸父來聘左傳齊國莊子來聘自郊勞至於贈賄禮成而加之以敏臧文仲言於公曰國子為政齊猶有禮君其朝焉臣聞之服於有禮社稷之衛也集說吳氏􅊹曰二十六年有伐齊取穀之怨二十八年晉文既伯公子遂聘齊以解讎而講好越六年而歸父來報公子遂之聘也周季氏本曰古者諸侯邦交其禮甚簡入春秋時比相結使命日煩至於齊桓漸復反正晉文代興纘修霸業道途聘使無復翩翩此可見霸令行於諸侯而節簡目疏猶存古意也至國歸父來聘而大夫之交政列國者紛紛無制矣夏四月辛巳晉人及姜戎敗秦于殽敗必邁反敗秦下左穀有師字殽杜注在𢎞農澠池縣西魏太和十一年置崤縣唐改硤石廢崤縣為石濠鎮其北有殽山今崤縣故城在河南府永寧縣北五十里左傳晉原軫曰秦違蹇叔而以貪勤民天奉我也奉不可失敵不可縱縱敵患生違天不祥必伐秦師欒枝曰未報秦施而伐其師其為死君乎先軫曰秦不哀吾喪而伐吾同姓秦則無禮何施之為吾聞之一日縱敵數世之患也謀及子孫可謂死君乎遂發命遽興姜戎子墨衰絰梁𢎞御戎萊駒為右夏四月辛巳敗秦師于殽獲百里孟明視西乞術白乙丙以歸遂墨以葬文公晉於是始墨文嬴請三帥曰彼實搆吾二君寡君若得而食之不厭君何辱討焉使歸就戮於秦以逞寡君之志若何公許之先軫朝問秦囚公曰夫人請之吾舍之矣先軫怒曰武夫力而拘諸原婦人暫而免諸國墮軍實而長冦讎亡無日矣不顧而唾公使陽處父追之及諸河則在舟中矣釋左驂以公命贈孟明孟明稽首曰君之惠不以纍臣釁鼓使歸就戮於秦寡君之以為戮死且不朽若從君惠而免之三年將拜君賜秦伯素服郊次鄉師而哭曰孤違蹇叔以辱二三子孤之罪也不替孟明孤之過也大夫何罪且吾不以一眚掩大德公羊秦伯將襲鄭百里子與蹇叔子諫曰千里而襲人未有不亡者也秦伯怒曰若爾之年者冢上之木拱矣爾曷知師出百里子與蹇叔子送其子而戒之曰爾即死必於殽之嶔巖是文王之所辟風雨者也吾將尸爾焉子揖師而行百里子與蹇叔子從其子而哭之秦伯怒曰爾曷為哭吾師對曰臣非敢哭君師哭臣之子也弦髙者鄭商也遇之殽矯以鄭伯之命而犒師焉或曰往矣或曰反矣然而晉人與姜戎要之殽而擊之匹馬隻輪無反者穀梁秦伯將襲鄭百里子與蹇叔子諫曰千里而襲人未有不亡者也秦伯曰子之冢木已拱矣何知師行百里子與蹇叔子送其子而戒之曰女死必於殽之巖吟之下我將尸女於是師行百里子與蹇叔子隨其子而哭之秦伯怒曰何為哭吾師也二子曰非敢哭師也哭吾子也我老矣彼不死則我死矣晉人與姜戎要而擊之殽匹馬倚輪無反者集說陸氏淳曰淳聞於師曰晉文公未葬晉襄用師不書曰子而曰人何也曰諸侯之孝在乎保其社稷而和其民人者也晉為盟主諸侯服之久矣秦不哀其喪而襲其同姓若不能救則先父之業墜矣故聖人為之諱許其以權變禮異乎匹夫之孝也之劉氏敞曰其謂之秦何與人之臣而謀其君利人喪而襲其國弱人之孤而死其親背大臣而與小臣圖事貪得地而棄其師也王氏沿曰書敗秦于殽若晉人敗狄於箕之類也秦伯不納蹇叔之言卒敗于殽三帥被執喪其師旅害及生民斯貪而無謀者也道程子曰晉不稱君居喪未葬不可從戎也秦為無越晉踰周以襲人衆所共憤故書晉人其稱及姜戎亦然意張氏洽曰左穀作秦師公羊無師字蓋得聖人之必有所𫝊故劉氏胡氏從之也家氏鉉翁曰秦戍鄭乃因戍襲鄭鄭人覺之秦兵轉而入滑晉君臣聞其將不利於己出師邀之敗于殽三帥皆獲春秋惡秦之用詐責秦重於責晉或曰殽之敗秦與城濮郤楚同乎曰不同也城濮之戰功在天下者也殽之戰功在其國者也晉文死而秦伯襲鄭蓋乘晉之喪其志將以得諸侯其不専為鄭滑明矣使晉君臣稍不自彊秦將觀兵中原遂其欲霸之心幸而文公有子發兵扼而北之秦亦疲敝晉得以世其霸業是雖一國之功不得與城濮同日而語然亦庶幾幹父承考者矣齊桓身死名滅無子也晉文餘威行乎區夏付託得人也論者曰文公受秦穆大惠其嗣遽興師薄人於險非春秋所與其實秦晉之隙兆於合兵圍鄭之日至是晉文身死未寒秦忽襲鄭滅滑晉襄苟置而不問不為忘親事楚之齊孝則為束手就執之宋襄謂之師出無名薄人於險不可也又曰金革變禮憂在宗社墨而即戎未傷於孝晉襄禦秦身不親則師必敗楚攻其南秦撓其西晉之衰可立而侍豈小小利害之比乎案殽之戰左氏載先軫之論是曲在秦也胡𫝊因程子忘親背惠之言以墨衰即戎為惡之甚又比先軫之謀於把子則責晉蓋與秦等其於當日情理可謂頗矣秦背晉戍鄭自絶前好使晉文不念舊德而從子犯之請則秦已當擊矣觀不哀吾喪之言是晉文卒而秦不弔也秦則無禮何施之為先軫非過激也至以墨衰即戎為不可則古人有行之者矣徐淮竝興魯公凶服命師費誓一篇列於周書夫豈不義而聖人取之乎或謂魯拒門庭之寇晉徼鄰國之利不可以竝論此又不考之甚滑今河南府偃師縣殽今河南府陕州滑固近晉而殽則晉境也晉為盟主天下諸侯有相滅亡者雖在逺地猶當救之况乘晉喪踐晉境滅晉切近之同姓以視東郊不啓亦復何異晉之君臣豈得晏然而已乎彼固將繼先君之志為子孫之謀而反斥為忘親可乎自敗殽之後秦不敢越晉而圖東諸侯是敗楚者文之功而制秦者襄之力殽師之烈亞於城濮而顧重訾之必欲晉襄牽已絶之好守居廬之節坐視秦師馳騁四境之近盡諸姬而不恤然後為孝乎然則晉何以書人諱晉子也外以諱為善釋殯而戰是亦有罪焉爾諱而稱人若晉子未嘗親行者然陸氏淳所謂許其以權變禮異乎匹夫之孝也公穀二家責晉固非而罪秦亦未當蓋秦伯之罪在於用詐襲遠違諫棄師而必以為亂子女之教無男女之别則過矣今故去胡𫝊而公穀首末數語皆無取焉程子以書人為衆辭謂秦為不道衆所共憤故書晉人其稱及也亦然此與陸說又異然亦不以書人為罪晉也故並存之癸巳葬晉文公集說高氏閌曰此見襄公父死未葬而尋干弋也禮季氏本曰晉先君有文侯重耳復諡為文非也狄侵齊左傳因晉喪也集說吳氏􅊹曰三十年狄浸齊𫝊以為間晉之有鄭虞此言狄侵齊𫝊以為因晉喪狄之所以敢侵齊者間晉之虞因晉之喪則狄未嘗無畏晉之心也晉繼狄而莫之攘是為可罪焉耳季氏本曰晉霸之興未嘗圖狄狄以為不足畏也故文公未沒而侵齊今又乘晉喪而侵之無忌憚甚矣案狄因晉間輒出侵齊自是秋有箕之敗然後狄師三年不敢輕出乃秦與晉交兵三年四戰由是狄浸齊魯楚滅江六而伯政遂弛則皆秦為之撓也公伐邾取訾婁訾子斯反訾婁公作叢穀作訾樓訾婁邾地當在濟寧州界秋公子遂帥師伐邾左傳公伐邾取訾婁以報升陘之役邾人不設備秋襄仲復伐邾胡傳案左氏公伐邾取訾婁報升陘之役邾人不設備襄仲復伐之此皆不勝忿欲報怨貪得恃彊陵弱不義之兵也直書其事而罪自見矣或曰取須句訾婁有為為之也伐邾至於再三念母勤矣夫念母者必當止乎禮義平王不撫其民而逺屯戍於母家詩人刺之夫子録焉僖公以成風之有功於己也越禮以尊其身違義以報其怨殘民動衆取人之邑曽是以為可乎集說薛氏季宣曰升陘之役十嵗矣邾未始侵伐我也夏公伐邾取其邑秋公子遂又伐之無名甚矣興張氏洽曰僖公懷升陘之忿以晉文方伯而未敢報怨之師今晉文方沒秦狄內訌故君臣間有事而交伐邾以取利據事直書其罪貝矣邾趙氏鵬飛曰僖公在位三十三年敗邾者三親伐取邾邑者二又以公子遂帥師伐之邾本魯附庸自列五等為諸侯不屈於魯故必欲服邾邾終不服也家氏鉉翁曰齊桓之沒宋楚爭霸魯乘之以伐邾嵗至於再今晉文方沒秦晉交兵魯又乘之而伐邾嵗至於再每乘伯國之多事而侵陵小國春秋偹書所以貶也晉人敗狄于箕箕杜注太原陽邑縣南有箕城今在太谷縣東南三十五里左傳狄伐晉及箕八月戊子晉侯敗狄於箕郤缺獲白狄子先軫曰匹夫逞志於君而無討敢不自討乎免胄入狄師死焉狄人歸其元面如生初臼季使過冀見冀缺耨其妻饁之敬相待如賔與之歸言諸文公曰敬德之聚也能敬必有德德以治民君請用之臣聞之出門如賔承事如祭仁之則也公曰其父有罪可乎對曰舜之罪也殛鯀其舉也興禹管敬仲桓之賊也實相以濟康誥曰父不慈子不祇兄不友弟不恭不相及也詩曰采葑采菲無以下體君取節焉可也文公以為下軍大夫反自箕襄公以三命命先且居將中軍以再命命先茅之縣賞胥臣曰舉郤缺子之功也以一命命郤缺為卿復與之冀亦未有軍行冀杜注晉邑今平陽府河津縣東有冀亭水經注云臼季見郤缺耨處今名如賔鄉是也集說杜氏預曰邵缺稱人者未為卿是許氏翰曰自三十年狄始侵齊晉未暇討自嵗有狄患至敗於此而後懲艾不復犯略其吳氏􅊹曰秦晉同圍鄭秦擅及鄭盟晉文不忍伐師狄嘗侵齊又圍衛晉文俱不救蓋出亡在狄歸國由秦皆嘗受其惠也今晉襄紹伯惟恐伯威不立而伯業遂衰故汲汲焉以衰服從戎既敗秦而又敗狄也案箕之役晉侯先軫在焉杜氏預以郤缺未為卿故書晉人豈郤缺實獲白狄子故以郤缺敗狄告於諸侯耶若如陳氏傅良家氏鉉翁謂狄病齊衛晉為盟主而不能救故貶書人則非也狄圍衛衛旋侵狄及狄盟矣狄再侵齊一則曰狄間晉之有鄭虞一則曰狄因晉喪皆非無故而不救也冬十月公如齊集說髙氏閌曰公本事齊逮晉文伯而受盟焉至是晉文已卒齊侯一使卿來聘而公遂往朝之蓋魯因晉喪既伐邾矣故懼晉而改事齊也朝張氏洽曰比事觀之間晉而虐邾所以因齊聘而之以自託也不家氏鉉翁曰天王聘不往朝國歸父未乃躬報謝加貶而義自見矣李氏亷曰晉襄初立伯事未定秦之窺鄭齊之聘魯皆有志於爭伯也晉襄唯外患之是憂而置齊魯之交於度外故不踰年而伯事復盛焉亦善於繼承者矣春秋書敗秦敗狄如齊伐許於一年之間其晉伯絶續之㑹三強睥睨之秋歟十有二月公至自齊集說汪氏克寬曰天王使宰周公來聘以三公冢宰之重下臨於魯實非常之禮也僖公不能入覲京師恭拜寵光而使公子遂報聘又以二事出幾若邾滕之交爾今齊侯使國歸父來聘不過交鄰之常禮命大夫往答其勤斯云可矣顧乃躬往朝之於所厚者薄而其所薄者厚也乙巳公薨於小寢左傳冬公如齊朝且弔有狄師也反薨于小寢即安也穀梁小寢非正也胡傳左氏曰即安也周制王宫六寢路寢一小寢五君日出而視朝退適路寢聼政使人視大夫退然後適小寢釋服是路寢治事之所也而小寢燕息之地也公羊以西宫為小寢魯子以諸侯有三宫則列國之制蓋降於王其以路寢為正則一爾君終不於路寢則非正矣曽子曰吾得正而斃又何求哉古人貴於得正乃如此凡此直書而義自見矣集說楊氏士勛曰傳發此例者以隱公不地桓公非正今僖公雖卒而沒於婦人之手故發𫝊以惡之也手劉氏敞曰小寢者何燕寢也男子不絶於婦人之婦人不絶於男子之手以齊終也薨於小寢非正也其李氏廉曰僖公在位三十三年實為魯之賢君當初嵗內用公子友臧文仲外則堅事齊桓故能去慶父之姦蠧使魯國既危而復安自十七年以前除從齊㑹盟征伐外魯事之見經者甚少觀詩之所頌如務農重穀則勤於為民也春秋享祀則謹於奉先也立閟宫復灃宫克淮夷牧坰野雖一時夸大之辭有過其實然禮樂政事之修明君臣上下之協洽槩可想矣但盟柳未返遽有邾師之敗葵丘稍怠遽肆陽穀之樂則公豈真能以禮信輔齊耶厥後宋襄繼起雖其伯事有不足以得魯然與其南向以從楚孰若尊奬先代協贊姻鄰以為列國之重乃乞師荆楚導之以伐齊宋其失大矣蓋自十六年季友卒後臧文仲之竊位公子遂之専權如滅項㑹楚之失備見於經向非晉文肇造一戰勝楚則中原之禍僖公何以逭其責哉况乎季友受費而季孫氏始公孫兹帥師而叔孫氏始公孫敖帥師而孟孫氏始三桓之基皆肇於僖公之編則僖公亦魯國功之首罪之魁也歟隕霜不殺草李梅實隕公作霣公羊何以書記異也何異爾不時也穀梁未可殺而殺舉重也可殺而不殺舉輕也實之為言猶實也胡傳哀公問於仲尼曰春秋記隕霜不殺草何為記之也曰此言可殺也夫冝殺而不殺則李梅冬實天失其道草木猶干犯之而况君乎是故以天道言四時失其序則其施必悖無以統萬象矣以君道言五刑失其用則其權必喪無以服萬民矣集說何氏休曰周之十二月夏之十月也易中孚記曰隂假陽威之應也早霣霜而不殺萬物至當霣霜之時根生之物復榮不死斯陽假與隂威隂威列索故陽自霣霜而反不能殺也此祿去公室政在公子遂之應也霜孔氏頴逹曰此云隕霜不殺草定元年冬十月隕殺菽穀梁傳曰未可以殺而殺舉重可殺而不殺舉輕其意言菽重草輕也厥孫氏復曰不時也五行𫝊曰視之不明是謂不哲罰常燠時則有草木妖隂劉氏敞曰九月其卦為剝剝落萬物始大殺矣明從陽命臣受君令而後殺也隕霜不能殺草此君誅不行舒緩之應也之杜氏諤曰春秋詳記灾異不遺微細所以謹人君戒也此隕霜不殺草李梅實從而録之者因以明天地之應隂陽之大生殺動植之類皆繫人君之德必詳志之以示戒爾也孫氏覺曰隂陽四時之氣天地所以生殺萬物者雨露生之雪霜殺之天地自然之氣而四特之常也皇極之道行而和氣塞於天地之間則隂陽有常而生殺以時彜倫攸斁天遏於隂陽則當生者不生當殺者不殺弱許氏翰曰僖公寬仁過厚其失也豫而文公以暗繼之三桓之盛自僖公始卒以専魯咎徴著矣隕黃氏仲炎曰經書隕霜二一曰隕霜不殺草一曰霜殺菽蓋周之十二月夏之十月也霜當殺草而不殺草異也周之十月夏之八月也未當隕霜而殺菽亦異也又曰李梅冬實物反常矣梅吳氏澄曰霜當重而不能殺草李再花而結成實皆冬暖之咎徴也案胡傳既用孔子對哀公隕霜之言又引孔子責宰我論社之語以為在聖人則能處變而不失其常在賢者則必有小貞吉大貞凶之戒斯言非也春秋垂教萬世人人所當奉若豈必聖人乃可用賢者遂不可用耶蓋失道之對乃法天之常理戰栗之言非立社之本意權不可下移而威不可偏勝道固並行而不悖也故節去之晉人陳人鄭人伐許左傳晉陳鄭伐許討其二於楚也集說卓氏爾康曰許從楚最堅雖晉文霸業方盛而溫㑹翟泉盟皆不能致其來即以諸侯圍之猶然弗服蓋深信楚之可恃也邲嚴氏啓隆曰許自此服晉至宣十二年敗後復事楚案左止稱晉陳鄭伐許而已是君與卿未親行也稱人自是將卑師少不必别立議論是時與晉抗者秦楚狄也襄既敗秦狄故圍許以震楚家氏謂非急務亦不審於事勢矣附録左傳楚令尹子上侵陳蔡陳蔡成遂伐鄭將納公子瑕門於桔柣之門瑕覆於周氏之汪外僕髠屯禽之以獻文夫人斂而葬之鄶城之下子晉陽處父侵蔡楚子上救之與晉師夾泜而軍陽患之使謂子上曰吾聞之文不犯順武不違敵子若欲戰則吾退舍子濟而陳遲速唯命不然紓我老師費財亦無益也乃駕以待子上欲涉大孫伯曰不可晉人無信半涉而薄我悔敗何及不如紓之乃退舍陽子宣言曰楚師遁矣遂歸楚師亦歸太子商臣譛子上曰受晉賂而辟之楚之恥也罪莫大焉王殺子上祔葬僖公緩作主非禮也凡君薨卒哭而祔而作主特祀於主蒸嘗禘於廟鄶杜注故鄶國在滎陽密縣東北今縣屬河南開封府欽定春秋傳說彚纂卷十六
