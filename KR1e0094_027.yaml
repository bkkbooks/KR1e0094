body:
  text: 欽定四庫全書欽定春秋傳説彚纂卷二十五襄公集説楊氏士勛曰魯世家襄公名午成公之子定姒所生周簡王十四年即位諡法因事有功曰襄已簡王十丑四年元年晉悼公周元年齊靈十年衛獻五年蔡景二十年鄭成十三年曹成六年陳成二十七年杞桓六十五年宋平四年秦景五年楚共十九年吳壽夢十四年春王正月公即位穀梁繼正即位正也集説孔氏穎達曰九年傳曰會于沙隨之嵗寡君以生晉侯曰十二年矣知於是公年四嵗仲孫蔑會晉欒黶宋華元衛寧殖曹人莒人邾人滕人薛人圍宋彭城左傳春己亥圍宋彭城非宋地追書也於是為宋計魚石故稱宋且不登叛人也謂之宋志彭城降晉晉人以宋五大夫在彭城者歸置諸瓠丘齊人不會彭城晉人以為討二月齊太子光為質於晉瓠丘杜注晉地河東東垣縣東南有壺丘案壺丘亦曰陽壺寰宇志曰古陽壺城南臨大河今絳州垣曲縣東南陽壺城是也屬山西平陽府胡傳案左氏曰非宋地追書也然則書圍彭城者魯史舊文也曰圍宋彭城者仲尼親筆也楚已取彭城封魚石戍之三百乘矣則曷為繫之宋楚不得取之宋魚石不得受之楚雖專其地君子不登叛人所以正疆域固封守謹王度也集説杜氏預曰魯與謀於虛朾而書會者稟命霸主非匹敵故陸氏淳曰公羊曰不與楚專封也趙子曰案此是楚取彭城令魚石守之耳豈名封國乎穀梁曰繫彭城於宋者不與魚石正也趙子曰與叛臣豈疑其為正哉意不應如此所劉氏敞曰楚為不道奬亂助惡使臣叛其君春秋惡也雖得其地春秋不與也凡諸侯受封於天子固有常分強者不得獨兼弱者不得獨失有王者作強者將損之弱者將益之故宋雖失彭城猶未為非宋也彭城言宋大鼎言郜齊寶言衛取非其所有據非其所安可不戒哉不師氏協曰苟書彭城而不書宋則無以見魚石之臣楚子之奬亂與夫諸侯討叛之功矣孫氏覺曰蒯聵出奔七年於外矣衛侯元卒而輒已立為君於蒯聵之納也必曰世子蒯聵若曰是乃世子也輒安得為君乎彭城已入於楚而以之居魚石矣於其圍之必曰宋彭城若曰彭城乃宋邑魚石安得受之於楚乎地張氏洽曰案楚已取彭城封魚石今彭城非復宋尚繫之宋傳曰諸侯為宋討魚石故稱宋且不登叛人也合趙氏鵬飛曰伐叛討逆霸主之事也悼公之興首諸侯之大夫為宋圍彭城討魚石得其職矣宜列國和會而願奉其役也然魚石之在彭城實楚置之以逼宋前年伐宋取彭城也則彭城非宋之有久矣聖人書之必繫之宋者正名定分如鼎取於宋必繫之郜名分正則天下定此春秋之教也齊國夏衛石曼姑圍戚不繫之衛而此圍彭城必繫之宋何也蓋圍戚者圍蒯聵也蒯聵雖見黜於父實衛之世子非叛人也則戚固其邑矣何必繫之衛哉彭城為楚所奪以封其叛人楚不得取之宋魚石不得受之楚是其邑本宋邑也故必繫之宋焉豫奪之義於是甚明觀乎此而知聖人重名分也家氏鉉翁曰書諸侯之大夫圍宋彭城褒之也為宋圍彭城同盟之義也季氏本曰魚石倚楚為援據邑要君非人臣之禮晉侯始起即合諸侯討之可謂急於為義矣黃氏正憲曰晉悼初政勵精韓厥當國善謀重以楚黨逆臣為惡故冬會虛朾春圍彭城而魯襄甫即位仲孫蔑即稱師助義可不謂賢大夫哉北方積衰之世實賴此復振矣夏晉韓厥帥師伐鄭仲孫蔑會齊崔杼曹人邾人杞人次于鄫厥公作屈鄫公作合縣鄫杜注鄭地在陳留襄邑東南左傳夏五月晉韓厥荀偃帥諸侯之師伐鄭入其郛敗其徒兵於洧上於是東諸侯之師次于鄫以待晉師晉師自鄭以鄫之師侵楚焦夷及陳晉侯衛侯次於戚以為之援洧上杜注洧水出密縣東南至長平入潁長平在今西華縣屬河南開封府胡傳楚人釋君而臣是助事已悖矣晉於是乎降彭城以魚石等歸遂伐鄭而諸侯次于鄫此皆放於義而行者也傳書楚子辛救鄭而經不書者鄭無可救之善楚不得有能救之名經所以削之不言救也集説蘇氏轍曰諸侯之師會晉伐鄭故次于鄫以待之髙氏閌曰晉以韓厥已足以當鄭不欲重勤東諸侯之師故使次于鄫以震鄭心且備楚師之出也趙氏鵬飛曰伯主之伐鄭者屢矣必連諸候之師扼之非以鄭之強大也畏楚也使鄭外無楚援則偏師可以入其郛何以多為今晉之圖鄭亦可謂有謀矣以韓厥獨攻其前以五國之兵援其後楚兵不出則一韓厥足以奪鄭而有餘楚兵出則五國之師足以鬭楚而不懾此皆所以謹用諸侯而不忍輕鬭其民也故聖人書伐書次美其得問罪之舉説者徒見楚師侵宋乃曰次于鄫以救宋且楚至秋而後侵宋豈於此先次而豫救之不原所書之序矣况鄫鄭地也豈次於鄭而救宋耶不足據也圖戴氏溪曰韓厥身伐鄭而諸侯不與焉亦見悼公伯之初使大夫身親其勞不敢勤諸侯之師也君汪氏克寬曰鄭棄北方而從荆蠻助叛臣以逼其皆非義也晉悼公既禽五大夫於是伐鄭以討其從楚納魚石之罪然不重勤諸侯而使韓厥以偏師伐之皆合於義者也又曰自鄢陵之戰楚子救鄭楚子重救鄭楚公子申救鄭皆不書義與此同又曰齊桓伐楚次于陘不欲速戰以勝楚晉悼伐鄭而使諸侯之師次于鄫不欲速圍以虐鄭皆霸者不輕用兵而重民命之意也故文定傳曰伐而書次其次為善且羅氏喻義曰次止也料前軍能獨當鄭諸侯之師止晉悼舉止安間同符齊桓伯亦有真也秋楚公子壬夫帥師侵宋左傳秋楚子辛救鄭侵宋吕留鄭子然侵宋取犬丘呂留杜注二縣今屬彭城郡案呂縣留縣漢屬楚國後漢及晉屬彭城國泗水至呂城積石為梁故曰吕梁徐州北五十里有呂梁城水經注濟水過沛縣東北又東南過留縣北漢張良遇漢髙祖於留即此地也呂縣隋廢留縣唐廢今俱在徐州境犬丘杜注譙國酇縣東北有犬丘城迂回疑案犬丘地不近鄭故杜以為疑然是時楚方侵宋取吕留鄭蓋為楚取也今河南歸德府永城縣西北三十里有太丘集集説孫氏復曰楚師侵宋所以救鄭也其髙氏閌曰不敢敵諸侯之師而侵宋者蓋攻所必救也以其無名加兵故書曰侵城家氏鉉翁曰楚納宋之叛人晉以諸侯之師克彭執五叛以歸楚不知自反以兵加宋將以雪恥恥益甚焉侯汪氏克寬曰楚憤宋之復彭城且欲援鄭而退諸之師故復釋憾於宋九月辛酉天王崩集説杜氏預曰辛酉九月十五日邾子來朝左傳九月邾子來朝禮也集説楊氏士勛曰世本及左傳邾宣公也來季氏本曰邾子去年朝魯今襄公新立故復朝以賀之冬衛侯使公孫剽來聘晉侯使荀罃來聘左傳冬衛子叔晉知武子來聘禮也凡諸侯即位小國朝之大國聘焉以繼好結信謀事補闕禮之大者也集説杜氏預曰冬者十月初王訃未至故傳善之朝范氏寧曰王崩訃未至皆未聞喪故各得行聘之禮酉徐氏彥曰天王崩而四國得行朝聘者杜氏云辛九月十五冬者十月初也四國行朝聘之時王之訃告未至於魯衰楊氏士勛曰知王崩訃未至者禮諸侯為天子斬若其聞喪豈天子以九月崩當月即邾子來朝冬初即晉衛來聘魯是有禮之國焉得受之明知訃未至故各得行朝聘之禮也猶如襄二十九年吳子餘祭五月所弒訃未至魯故季札以六月至魯仍行聘事亦此類也若然經書九月天王崩者訃雖在十月之末告以九月崩爾廢蘇氏轍曰九月王崩十月訃未至於諸侯故雖不朝聘不為非禮然李氏廉曰三國之朝聘胡氏本泰山孫氏説貶之穀注及公羊疏皆同杜氏説蓋如胡氏説則此條當與蟲牢同譏但蟲牢明書己酉己丑相去四十日訃告之及必矣胡氏得之此則下無日未有以辨其久近且三傳皆無貶文恐杜説亦可取案三國朝聘左氏皆以為禮杜氏預釋之曰王訃未至也公穀俱不發傳而范氏寧徐氏彥楊氏士勛咸主杜氏蓋按日而稽之非臆度也胡傳必以為訃告已及恐無所據今從左氏庚靈王寅元年二年晉悼二年齊靈十一年衛獻六年蔡景二十一年鄭成十四年曹成七年陳成二十八年把桓六十六年宋平五年秦景六年楚共二十年吳壽夢十五年春王正月葬簡王集説杜氏預曰五月而葬速鄭師伐宋左傳春鄭師侵宋楚令也集説許氏翰曰書伐宋者積鄭之疚附録左傳齊侯伐萊萊人使正輿子賂夙沙衛以索馬牛皆百匹齊師乃還君子是以知齊靈公之為靈也夏五月庚寅夫人薑氏薨左傳夏齊薑薨初穆薑使擇美檟以自為櫬與頌琴季文子取以葬君子曰非禮也禮無所逆婦飬姑者也虧姑以成婦逆莫大焉詩曰其惟哲人告之話言順德之行季孫於是為不哲矣且薑氏君之妣也詩曰為酒為醴蒸畀祖妣以洽百禮降福孔偕集説孫氏復曰成公夫人卒家氏鉉翁曰齊薑襄公嫡母也與定姒並書葬而嫡妾之分見矣六月庚辰鄭伯睔卒睔古囷反左傳鄭成公疾子駟請息肩於晉公曰楚君以鄭故親集矢於其目非異人任寡人也若背之是棄力與言其誰昵我免寡人唯二三子秋七月庚辰鄭伯睔卒集説杜氏預曰未與襄同盟而赴以名庚辰七月九日書六月經誤孔氏穎達曰經云六月庚辰鄭伯睔卒傳言七月庚辰鄭伯睔卒經傳必有誤者杜以長厯校之此年六月壬寅朔其月無庚辰七月壬申朔九日得庚辰則傳與厯合知傳是而經誤也高氏閌曰不書葬者以成公附楚故諸侯不會葬也晉師宋師衛寧殖侵鄭左傳於是子罕當國子駟為政子國為司馬晉師侵鄭諸大夫欲從晉子駟曰官命未改集説杜氏預曰晉伐喪非禮宋雖非卿師重故敘衛上劉氏敞曰穀梁曰其曰衛寧殖如是而稱於前事也説者曰初衛侯速卒鄭人侵之故舉寧殖之報以明稱其前事皆非也將尊師少書將例然也何至於此獨為異乎孔子曰以直報怨以德報德若人伐己喪已亦伐人喪是以怨報怨也豈以直報怨者乎春秋豈為是書之哉師孫氏覺曰晉宋稱師將卑師衆也寧殖書名將尊少也張氏洽曰士丐侵齊聞喪而還春秋與之則兹伐喪之罪不待貶而見矣家氏鉉翁曰乘鄭喪而侵之失盟主之道矣秋七月仲孫蔑會晉荀罃宋華元衛孫林父曹人邾人于戚左傳會于戚謀鄭故也孟獻子曰請城虎牢以逼鄭知武子曰善鄫之會吾子聞崔子之言今不來矣滕薛小邾之不至皆齊故也寡君之憂不唯鄭罃將復於寡君而請於齊得請而告吾子之功也若不得請事將在齊吾子之請諸侯之福也豈惟寡君賴之集説王氏葆曰諸侯之大夫專會以謀鄭政在大夫也己丑葬我小君齊薑左傳齊侯使諸薑宗婦來送葬召萊子萊子不會故晏弱城東陽以逼之東陽杜注齊境上邑今東陽城在山東青州府臨朐縣東集説杜氏預曰齊諡也三月而葬速公陳氏嶽曰穆薑有美檟頌琴文子取之以葬羊不知婦先姑薨故疑之也叔孫豹如宋左傳穆叔聘於宋通嗣君也集説孫氏復曰叔孫豹僑如弟為趙氏鵬飛曰叔氏自公孫兹叔孫得臣再世卿至叔孫僑如其橫滋甚詭謀一敗匍匐奔齊叔孫之黨沮矣今襄公即位幼未能君盟會征伐専於仲孫蔑蔑孟氏也季文子為正卿而實耄矣故叔氏復出而任聘問之事將以漸而干政也冬仲孫蔑會晉荀罃齊崔杼宋華元衛孫林父曹人邾人滕人薛人小邾人于戚遂城虎牢左傳冬復會于戚齊崔武子及滕薛小邾之大夫皆會知武子之言故也遂城虎牢鄭人乃成集説趙氏匡曰公羊曰不書取諱也案夫子增損經文以示義覩文見義何諱之為陸氏淳曰趙氏云不書取許其城也又曰淳聞於師曰諸侯之大夫取他國之邑相與城之非正也城虎牢可以安列國息征伐故聖人許之而不繫於鄭也之劉氏敞曰榖梁曰內鄭也非也鄭不服晉諸侯伐可謂外之矣反謂內之乎牢蘇氏轍曰鄭久從楚諸侯嵗為之興師於是城虎以逼之明年而鄭受盟沈氏棐曰不言伐取且不繫之鄭皆所以與晉也虎張氏洽曰彭城非宋有也伯主為宋討則繫之宋牢鄭地也以伯主當討鄭而不繫之鄭皆春秋明王制以示豫奪之正也吕氏大圭曰楚丘不言衛緣陵不言把皆是衛把不能有之而齊桓城之爾然則城虎牢亦鄭不能有而諸侯城之趙氏鵬飛曰安一國之功小安天下之功大安一國者以一國之辭書之圍宋彭城是也安天下者以天下之辭書之遂城虎牢是也圍宋彭城為宋治叛臣爾其利不及天下故繫之宋遂城虎牢天下均蒙其安非鄭所得専也故不繫之鄭晉楚爭鄭五十年矣乍叛乍服惟強是依鄭成一叛入楚晉厲敗之於鄢陵三合諸侯征之而不反蓋鄭入楚則楚兵將橫行於宋衛之郊天下諸侯為之不寧今晉悼之興規規然求所以得鄭之䇿諸大夫謀城虎牢以逼之虎牢既非鄭有鄭何恃以抗列國哉故兵出虎牢則直指鄭郊非特鄭無所恃楚失之蓋亦恐矣故雞澤之盟鄭不伐而至八國之君同涖是盟而天下無兵車之役者凡六年則虎牢之城誠有功於天下也此聖人所以不繫之鄭歟戚鄭氏玉曰遂者繼事之辭會畢而城之也前會于孟獻子已有是謀知武子未敢専於是歸告晉侯言之於齊帥諸國而舉是役非大夫之専事也汪氏克寬曰自平王東遷鄭武公入為卿士王賜之虎牢以東後失其地鄭厲公納惠王而王復與之焉然齊桓之霸説申侯而與之虎牢則固未嘗以虎牢為北方之輕重也逮悼公之霸則近楚微國若江黃弦庸六蓼羣舒之類吞噬靡遺列國諸侯若陳若蔡若許亦已服役於楚夷於屬縣而鄭以王室懿親畿內大國又屈而從楚苟非厄虎牢之險以制其棄同即異之心則楚將越鄭而東蹂躪北方之境矣故虎牢之城不繫於鄭也而陳氏際泰曰城虎牢所以扼楚亦所以制鄭未幾為雞澤之盟蓋三駕而楚不爭鄭不叛虎牢之城亦預有力也夫案鄭方堅於從楚孟獻子請城虎牢以逼之所以扼鄭之吭而使之不得南向也攘楚服鄭實關天下之大計故不書城鄭虎牢况是時晉已取之非復鄭之所有自不得仍繫之於鄭也胡傳責鄭不能守恐於經旨未合夫春秋內晉而外楚豈欲鄭守險以拒晉乎張氏洽謂霸主討不服之國地非鄭所得私家氏鉉翁謂鄭辱天子之封守罪當削皆非篤論楚殺其大夫公子申左傳楚公子申為右司馬多受小國之賂以逼子重子辛楚人殺之故書曰楚殺其大夫公子申集説劉氏敞曰稱國以殺大夫者罪纍上也公子申之纍上奈何嬰齊也壬夫也申也三人者執楚國之政公子申賄而専嬰齊壬夫畏其逼也而殺之是君與臣同國之道也蘇氏轍曰申罪不至死而楚人殺之故稱國以殺咎髙氏閌曰晉城虎牢有以勝楚矣楚無所歸而殺其用事之臣辛靈王卯二年三年晉悼三年齊靈十二年衛獻七年蔡景二十二年鄭僖公髠頑元年曹成八年陳成二十九年杞桓六十七年宋平六年秦景七年楚共二十一年吳壽夢十六年春楚公子嬰齊帥師伐吳吳楚爭強自此始左傳三年春楚子重伐吳為簡之師克鳩兹至於衡山使鄧廖帥組甲三百被練三千以侵吳吳人要而擊之獲鄧廖其能免者組甲八十被練三百而已子重歸既飲至三日吳人伐楚取駕駕良邑也鄧廖亦楚之良也君子謂子重於是役也所獲不如所亡楚人以是咎子重子重病之遂遇心疾而卒鳩兹杜注吳邑在丹陽蕪湖縣東今蕪湖縣東四十里有鳩兹港是也屬江南太平府衡山杜注在吳興府烏程縣南案烏程乃湖州府附郭縣也去蕪湖甚逺今太平府當塗縣東北六十里有橫山似為近之集説許氏翰曰國政失御大臣相殘又外結吳怨而內與晉讎此共王之所以不振也髙氏閌曰楚始志伐吳吳與鍾離之會故也楚自鄢陵之敗其勢稍屈畏諸侯並力謀之而吳乘其間故先伐吳以張其勢之李氏廉曰經書楚君大夫伐吳七始於此公如晉左傳公如晉始朝也集説髙氏閌曰童子侯不朝王蓋不可接以成人之禮也豈可反朝同列乎夏四月壬戌公及晉侯盟于長樗樗敕居反近長樗孔氏穎達曰城之地左傳夏盟于長樗孟獻子相公稽首知武子曰天子在而君辱稽首寡君懼矣孟獻子曰以敝邑介在東表密邇仇讎寡君將君是望敢不稽首集説杜氏預曰晉侯出其國都與公盟於外不孔氏穎達曰文三年公如晉公及晉侯盟盟書地在晉都也此時晉侯出其國都與公盟于長樗蓋近城之地盟訖還入於晉故公歸書曰公至自晉也文三年盟于晉都此盟出城外者出與不出皆由晉侯意耳此或是悼公謙以待人不敢使國君就已出盟於外若似相就然故出城也晉蘇氏轍曰禮諸侯不親盟於他國成二年公如晉人使陽處父盟公三年雖改盟而猶盟於其國亦非禮也晉悼公修禮於諸侯故去其國而與公盟於長樗禮也高氏閌曰出國都以與公盟此悼公之敬也以張氏洽曰孟獻子魯之賢大夫尚不知君臣之義相其君所謂不知先立乎其大者春秋諸賢之同病也之家氏鉉翁曰不於國都而盟於外謙也魯君童稚年晉悼勤於用禮書以美之敬李氏廉曰此正與魯及向戌盟于劉同意蓋魯亦向戌特出而與之盟也襄如晉五始於此年襄汪氏克寬曰魯君朝晉而盟者四文公有三焉晉首以陽處父盟公明年又要公盟於國都靈公亦與公盟於其國惟此年晉悼公特去國都而與公盟長樗有以見襄靈之倨而悼公之謙宜悼公之能復伯也公至自晉集説杜氏預曰不以長樗至本非會晉程氏端學曰盟于長樗而至自晉者蓋公如則朝晉矣長樗之盟乃朝後之事故東萊吕氏曰本謀如晉而以如晉為重故不以長樗至附録左傳祁奚請老晉侯問嗣焉稱解狐其讎也將立之而卒又問焉對曰午也可於是羊舌職死矣晉侯曰孰可以代之對曰赤也可於是使祁午為中軍尉羊舌赤佐之君子謂祁奚於是能舉善矣稱其讎不為諂立其子不為比舉其偏不為黨啇書曰無偏無黨王道蕩蕩其祁奚之謂矣解狐得舉祁午得位伯華得官建一官而三物成能舉善也夫惟善故能舉其類詩云惟其有之是以似之祁奚有焉六月公會單子晉侯宋公衛侯鄭伯莒子邾子齊世子光己未同盟于雞澤雞澤杜注在廣平曲梁縣西南後漢志曲梁侯國有雞澤即春秋諸侯同盟處也今曲梁故城在直𨽻廣平府東北左傳晉為鄭服故且欲修吳好將合諸侯使士丐告於齊曰寡君使丐以嵗之不易不虞之不戒寡君願與一二兄弟相見以謀不協請君臨之使丐乞盟齊侯欲勿許而難為不協乃盟於耐外六月公會單頃公及諸侯已未同盟于雞澤晉侯使荀會逆吳子於淮上吳子不至耐杜注水名案耐水即時水也平地出泉曰耐穀梁同者有同也同外楚也胡傳同盟或以為有三例一則王臣預盟而書同二則諸侯同欲而書同三則惡其反覆而書同夫惡其反覆與諸侯同欲而書同信矣王臣預盟而書同義則未安盟于女栗及蘇子也而不書同盟子洮于翟泉會王人也而不書同然則此三盟者正所謂諸侯同欲而書同盟也其同欲奈何同病楚也會于柯陵之嵗夏伐鄭楚人師于首止而諸侯還冬伐鄭楚人師于汝上而諸侯還雞澤之盟陳袁僑如會楚師在繁陽而韓獻子懼平丘之行楚棄疾立復封陳蔡而列國恐是知此三盟者諸侯皆有戒心而修盟故稱同不以尹子單子劉子亦預此盟而譏之也夫王臣將命必惇信明義而後可以表正乎天下諸侯守邦必尊主奉法而後可以保其社稷今王臣下與諸侯約誓諸侯亦敢上與王臣要言斯大亂之道也則亦不待書同盟而罪自見矣集説杜氏預曰周靈王新即位使王官伯出與諸侯盟以安王室故無譏程子曰楚強諸侯皆畏之而修盟故書同同髙氏閌曰此因城虎牢之故鄭服而同盟又諸侯心病楚而王臣亦與焉故書同去朱子曰襄公之世晉悼公出來整頓一番楚始退張氏洽曰晉悼公始合諸侯尊王室而盟單子與桓公首止葵丘異矣故書公會單子諸侯已未同盟于雞澤所以譏其儕王官於諸侯俾下同於歃血其事不足乎揚故不再言雞澤而例之於新城同盟之書也案諸侯不敢盟天子之臣而雞澤之盟單子與焉故胡傳以為大亂之道也杜氏預以為無譏蓋是時悼公初政伯業方新不敢盟同列於國中矧與王臣盟乎則單子受王命而來盟或當如杜注之説也今並存之陳侯使袁僑如會僑其驕反左傳楚子辛為令尹侵欲於小國陳成公使袁僑如會求成晉侯使和組父告於諸侯公羊其言如會何後會也穀梁如會外乎會也於會受命也集説杜氏預曰陳疾楚政而來屬晉本非召會而自來故言如會范氏寧曰鄭嗣曰外乎會者明本非會內也諸侯已會乃至爾而高氏閌曰陳自辰陵即楚二十有八年晉屢爭鄭不爭陳者非不爭陳也得鄭則亦得陳也今聞鄭伯受盟故俾大夫求成於晉本非召會來又後時故書如會戊寅叔孫豹及諸侯之大夫及陳袁僑盟諸侯在而大夫自為盟始於此左傳秋叔孫豹及諸侯之大夫及陳袁僑盟陳請服也公羊曷為殊及陳袁僑為其與袁僑盟也集説杜氏預曰諸侯既盟袁僑乃至故使大夫别與之盟言諸侯之大夫則在雞澤之諸侯也殊袁僑者明諸侯大夫所以盟盟袁僑也諸孔氏穎逹曰上文雞澤之會其內未有陳侯直言侯之大夫則不得包陳袁僑故殊之也大啖氏助曰穀梁曰諸侯已盟又大夫相與私盟是夫強也諸侯盟已畢而袁僑至故大夫與之盟再無他義恭劉氏敞曰諸侯之大夫則其言叔孫豹及之奈何也其恭奈何臣無専命於君側叔孫豹及諸侯之大夫云者受命之辭也又曰穀梁曰及以及與之也非也此兩及者文當然耳何謂與之何謂不與之哉陳蘇氏轍曰陳始亦從楚令尹子辛侵欲於小國故成公使袁僑求成於晉諸侯既盟而後袁僑至故復使大夫盟之殊及袁僑主盟袁僑也穀梁曰諸侯盟又大夫相與私盟大夫張也雞澤之會諸侯始失正矣夫諸侯不専敵袁僑而使大夫盟之禮也且悼公晉之明主而以為失正則過矣焉孫氏覺曰雞澤之盟諸侯為會而陳侯使袁僑往諸侯卑之不與盟戊寅之日使大夫盟之再言及者所以别內臣與諸侯之大夫爾穀梁以為大夫執國權案經意乃是諸侯不與袁僑盟故使大夫大夫安得專權哉而趙氏鵬飛曰悼公所以霸諸侯之效在得陳得鄭已陳鄭即楚久矣厲公之威有所不能服今一興虎牢之役隻矢不遺而鄭來歸陳覿鄭之歸而亦遣袁僑如會焉一會而得二叛國其亦偉矣然鄭以君會而陳以臣至勢不可以君臣同盟故雞澤之盟以諸侯盟鄭之君戊寅之盟以大夫盟陳之臣尊卑之分不其正歟蓋鄭伯之來既與雞澤之盟矣袁僑至而無以質之則懷附之心不固苟復自及其盟則袁僑實伉而霸主之權不尊故以大夫盟之則晉無屈己之辱而僑無伉君之罪其禮甚安而分甚明此吾所以見悼公之賢也論者不達乃曰諸侯在而大夫盟大夫專也湨梁之會書大夫盟不先言諸侯盟則可謂諸侯會而大夫盟矣責大夫之専可也叔孫豹及諸侯之大夫及陳袁僑盟書諸侯之大夫則大夫奉君命而盟袁僑也何得為專王氏樵曰大夫奉君命而盟袁僑非大夫相與私盟也非大夫張也晉君方明六卿皆民譽諸侯和協何得因一盟而失政自是始乎但踐土之盟陳穆公如會文公未嘗再要以盟而陳服於晉歷三世而不叛袁僑受陳侯之指而來苟有誠服之心又何必汲汲以盟誓結之哉此則悼公不知本之過也黃氏正憲曰陳自從楚盟於辰陵至是二十有八年今鄭已同盟雞澤則不能安枕矣然念背晉已久恐晉加罪故先遣袁僑如會以嘗之悼公方欲招攜懷遠故略其已往之罪使諸國大夫與僑盟則晉不屈己僑不抗君可以安反側之心可以廣招來之義此正悼公之賢也論者謂諸侯在大夫不得專盟豈非拘攣之見乎附録左傳晉侯之弟揚干亂行於曲梁魏絳戮其僕晉侯怒謂羊舌赤曰合諸侯以為榮也揚干為戮何辱如之必殺魏絳無失也對曰絳無二志事君不辟難有罪不逃刑其將來辭何辱命焉言終魏絳至授僕人書將伏劒士魴張老止之公讀其書曰日君乏使使臣司司馬臣聞師衆以順為武軍事有死無犯為敬君合諸侯臣敢不敬君即不武執事不敬罪莫大焉臣懼其死以及揚干無所逃罪不能致訓至於用鉞臣之罪重敢有不從以怒君心請歸死於司冦公跣而出曰寡人之言親愛也吾子之討軍禮也寡人有弟弗能教訓使干大命寡人之過也子無重寡人之過敢以為請晉侯以魏絳為能以刑佐民矣反後與之禮食使佐新軍張老為中軍司馬士富為侯奄楚司馬公子何忌侵陳陳叛故也秋公至自會集説杜氏諤曰公踰時而返故致之冬晉荀罃帥師伐許左傳許靈公事楚不會於難澤冬晉知武子帥師伐許集説蘇氏轍曰許事楚故也服張氏洽曰荀罃悼公之賢大夫也見陳人之不能輔悼益修德以保陳陳固則許何患其不來今遽帥師以問罪於許規模欲速宜其并陳不能保也趙氏鵬飛曰晉既得陳鄭矣其比於楚者許也故夏盟陳鄭而冬伐許然許為鄭所虐遷於葉以避之葉逼近楚倚楚為重必不能近叛楚而遠事晉也惟晉能服楚則許可得不然徒征之無益矣壬靈王辰三年四年晉悼四年齊靈十三年衛獻八年蔡景二十三年鄭僖二年曹成九年陳成三十年杞桓六十八年宋平七年秦景八年楚共二十二年吳壽夢十七年春王三月己酉陳侯午卒左傳四年春楚師為陳叛故猶在繁陽韓獻子患之言於朝曰文王帥殷之叛國以事紂惟知時也今我易之難哉三月陳成公卒楚人將伐陳聞喪乃止陳人不聼命臧武仲聞之曰陳不服於楚必亡大國行禮焉而不服在大猶有咎而况小乎夏楚彭名侵陳繁陽杜注楚地在汝南鮦陽縣南今河南汝寧府新蔡縣北有繁陽亭胡傳午者襄公名也孔子作春秋在哀公之世襄公哀公之皇考也曷不諱平古者死而無諡不以名為諱周人以諡易名於是乎有諱禮故孟子曰諱名不諱姓姓所同也名所獨也然禮律所載則有不諱者夫子兼帝王之道參文質之中而作春秋以法萬世如公薨不地滅國書取出奔稱孫之類所以放其文也莊公名同而書同盟僖公名申而書戊申定公名宋而書宋人之類所以從其質也後世不明此義則有以諱易人之名者又有以諱易人之姓者詩書則諱臨文則諱嫌名則諱二名則偏諱愚者違禮以為孝諂者獻佞以為忠忌諱繁名實亂而春秋之法不行矣案陳邇於楚楚窺北方陳其門户也楚逞志於陳以為陵轢諸侯之計而與晉爭衡晉及諸侯當並力以謀陳而韓厥以文王事紂為比臧紇謂陳不服楚必亡二大夫之言何其陋也此陳之所以終為楚有也左氏亦以為陳無禮謬矣夏叔孫豹如晉左傳穆叔如晉報知武子之聘也晉侯享之金奏肆夏之三不拜工歌文王之三又不拜歌鹿鳴之三三拜韓獻子使行人子員問之曰子以君命辱於敝邑先君之禮藉之以樂以辱吾子吾子舍其大而重拜其細敢問何禮也對曰三夏天子所以享元侯也使臣弗敢與聞文王兩君相見之樂也臣不敢及鹿鳴君所以嘉寡君也敢不拜嘉四牡君所以勞使臣也敢不重拜皇皇者華君教使臣曰必咨於周臣聞之訪問於善為咨咨親為詢咨禮為度咨事為諏咨難為謀臣獲五善敢不重拜集説髙氏閌曰且為鄫世子故始李氏廉曰襄公之編書聘晉者九於此年秋七月戊子夫人姒氏薨姒公作弋下定姒同左傳秋定姒薨不殯於廟無襯不虞匠慶謂季文子曰子為正卿而小君之喪不成不終君也君長誰受其咎初季孫為己樹六檟於蒲圃東門之外匠慶請木季孫曰略匠慶用蒲圃之檟季孫不御君子曰志所謂多行無禮必自及也其是之謂乎集説杜氏預曰成公妾襄公母姒把姓故孔氏穎達曰二年齊薑薨葬者是成公夫人此為成公之妾也據傳匠慶之言知是襄公之母此高氏閌曰襄公以夫人之禮卒之家氏鉉翁曰成公妾也前年書夫人薑氏有兩夫人不加貶而義自見矣小王氏錫爵曰定姒非嫡夫人故文子不欲成其為君之喪葬陳成公集説汪氏克寬曰陳即晉魯會其葬故書八月辛亥葬我小君定姒公羊定弋者何襄公之母也集説許氏翰曰傳載季文子欲不以夫人之禮葬定姒而不得已於人言卒夫人之觀此葬速禮略也定王氏葆曰此葬定姒襄公之母也定十五年書葬姒者哀公之母也自襄至哀涉世未久不應皆諡曰定其必有誤昭髙氏閌曰死才二十三日爾尊吳氏􅊹曰僖宣襄四妾母羣臣皆逢君之意而其母及定哀之際君弱臣強嗣君之母先君之嫡夫人也乃敢蔑視其君而卑其母焉甚矣魯道之衰也案春秋正名定分而於嫡庶尤嚴妾母見於經者成風敬嬴定姒齊歸薨稱夫人葬稱小君與正嫡無異皆所以明其失禮也孔氏穎達謂嫡母薨則妾母尊殊失經旨冬公如晉左傳冬公如晉聽政晉侯享公公請屬鄫晉侯不許孟獻子曰以寡君之密邇於仇讎而願固事君無失官命鄫無賦於司馬為執事朝夕之命敝邑敝邑褊小闕而為罪寡君是以願借助焉晉侯許之集説王氏葆曰襄公之立至是才七嵗爾幼弱之君奔走道路所謂國君道長豈得已哉髙氏閌曰公有母喪復如晉朝陳人圍頓左傳楚人使頓間陳而侵伐之故陳人圍頓集説髙氏閌曰僖二十五年楚人圍陳納頓子于頓陳人畏楚而不敢討頓子恃楚而不事陳今陳復從晉而頓為楚間故圍之自雞澤之會而書伐許圍頓著晉與而楚詘也家氏鉉翁曰陳既遣袁僑如會故圍頓治楚之屬國也越程氏端學曰陳侯居喪不修德教民外禦強楚而喪興師圍楚之與國以致寇比事而觀罪自見也以李氏廉曰陳圍頓以甚楚人之忿與鄭獲公子燮激楚之爭二事相類其後皆連兵數載而不息非處己寡怨之道也且楚昔嘗圍陳而納頓今陳復圍頓以怒楚禍患之極安有已哉逃歸之兆在此矣附録左傳無終子嘉父使孟樂如晉因魏莊子納虎豹之皮以請和諸戎晉侯曰戎狄無親而貪不如伐之魏絳曰諸侯新服陳新來和將觀於我我德則睦否則攜二勞師於戎而楚伐陳必弗能救是棄陳也諸華必叛獲戎失華無乃不可乎夏訓有之曰有窮后羿公曰后羿何如對曰昔有夏之方衰也后羿自鉏遷於窮石因夏民以代夏政恃其射也不修民事而淫於原獸棄武羅伯因熊髠圉而用寒浞寒浞伯明氏之讒子弟也伯明后寒棄之夷羿收之信而使之以為己相浞行媚於內而施賂於外愚弄其民而虞羿於田樹之詐慝以取其國家外內咸服羿猶不悛將歸自田家衆殺而亨之以食其子其子不忍食諸死於窮門靡奔有鬲氏浞因羿室生澆及豷恃其讒慝詐偽而不德於民使澆用師滅斟灌及斟尋氏處澆於過處豷於戈靡自有鬲氏收二國之燼以滅浞而立少康少康滅澆於過后杼滅豷於戈有窮由是遂亡失人故也昔周辛甲之為大史也命百官官針王闕於虞人之針曰芒芒禹迹畫為九州經啓九道民有寢廟獸有茂草各有攸處德用不擾在帝夷羿冒於原獸忘其國恤而思其麀牡武不可重用不恢於夏家獸臣司原敢告僕夫虞針如是可不懲乎於是晉侯好田故魏絳及之公曰然則莫如和戎乎對曰和戎有五利焉戎狄荐居貴貨易土土可賈焉一也邊鄙不聳民狎其野穡人成功二也戎狄事晉四鄰振動諸侯威懷三也以德綏戎師徒不勤甲兵不頓四也鑒於后羿而用德度逺至邇安五也君其圖之公説使魏絳盟諸戎修民事田以時冬十月邾人莒人伐鄫臧紇救鄫侵邾敗於狐駘國人逆喪者皆髽魯於是乎始髽國人誦之曰臧之狐裘敗我於狐駘我君小子朱儒是使朱儒朱儒使我敗於邾無終杜注山戎國名案秦置無終縣項羽封韓廣為遼東王都無終即今順天府玉田縣也縣西有古無終城七有窮杜注國名水經注窮水出於安豐昭二十年楚與吳師遇於窮即此也今在英山縣境里鉏杜注羿本國名今直𨽻大名府滑縣東十五有鉏城寒杜注寒國北海平壽縣東有寒亭唐初有寒水縣屬濰州即故寒亭也今寒亭在山東萊州府濰縣東北五十里有鬲杜注國名平原鬲縣案鬲偃姓皋陶之後封於鬲今山東濟南府德平縣東一里有故鬲城斟灌杜注夏同姓諸侯樂安壽光縣東南有灌亭今斟灌城在山東青州府壽光縣東北四十里斟尋杜注夏同姓諸侯北海平壽縣東南有斟亭今斟城在山東青州府濰縣西南五十里過杜注國名東萊掖縣北有過鄉郡國志掖縣有過鄉即過國也今為萊州府治戈杜注在宋鄭之間狐駘邾邑杜注魯國番縣東南有目台亭今狐駘山在山東兗州府滕縣東南二十里癸靈王已四年五年晉悼五年齊靈十四年衛獻九年蔡景二十四年鄭僖三年曹成十年陳哀公溺元年把桓六十九年宋平八年秦景九年楚共二十三年吳壽夢十八年春公至自晉集説高氏閌曰著公不朝正於廟也且公幼而頻年如晉是危道也襄之出二十四致之者二十一危之也附録左傳王使王叔陳生訴戎於晉晉人執之士魴如京師言王叔之二於戎也夏鄭伯使公子發來聘左傳夏鄭子國來聘通嗣君也集説杜氏預曰發子産父以髙氏閌曰鄭自雞澤之會始來聘於諸侯得息兵修好也趙氏鵬飛曰鄭僖新立雖與雞澤之盟而聘使未交於諸侯故以發來聘然鄭成陷於楚今僖公復從禮義之風行聘問之禮亦足以榮矣之李氏廉曰魯與鄭自輸平來盟以後未嘗有聘問使終春秋僅見於此則以悼公之盛諸侯之睦也叔孫豹鄫世子巫如晉左傳穆叔覿鄫大子於晉以成屬鄫書曰叔孫豹鄫大子巫如晉言比諸魯大夫也公羊外相如不書此何以書為叔孫豹率而與之俱也穀梁外不言如而言如為我事往也集説杜氏預曰豹與巫俱受命於魯故不書及比之魯大夫陸氏淳曰淳聞於師曰鄫列國也使其世子同於我大夫魯與晉俱失正矣鄫力不足者故無譏焉石氏介曰不書及內之也鄫有國而私屬於人魯晉之私屬鄫也皆不臣之著也也劉氏敞曰鄫請於魯為之附庸故相與往見於晉鄫曷為為附庸於魯鄫不勝莒魯之患求為附庸以自定諸侯死社稷正也不能守其國以卑其宗廟鄫失正矣天子建附庸非天子命而私有之魯失正矣故曰叔孫豹鄫世子巫如晉猶吾大夫焉交譏之孫氏覺曰明年莒人滅鄫則是晉失霸主之道而魯大夫之往為無益矣王氏葆曰凡外相如不書書者必有謂也叔孫率鄫大子如晉故不書會與及然鄫雖小亦國也請於晉而屬之比諸魯大夫而覿之是推天子之禮以事霸主也故參譏之亞汪氏克寬曰諸侯之世子未誓以皮帛繼子男而於大夫之列非禮也然春秋時較強弱之勢而無君臣之分以大國之卿當小國之君故鄫國微弱而其世子次於魯大夫也叔孫豹偕鄫世子巫如晉而不言及是旅見於霸國也仲孫蔑衛孫林父受命於晉以會吳而不言及是旅見於吳也旅見於晉猶之可也旅見於吳甚矣仲孫蔑衛孫林父會吳于善道道公穀作稻勝善道杜注地闕案阮之南兗州記云盱眙本吳善道地秦置盱眙縣許慎曰張目為盱舉目為眙城居山上可以矚遠故曰盱眙今屬江南鳯陽府泗州左傳吳子使壽越如晉辭不會于雞澤之故且請聽諸侯之好晉人將為之合諸侯使魯衛先會吳且告會期故孟獻子孫文子會吳于善道集説杜氏預曰魯衛俱受命於晉故不言及吳先在善道二大夫往會之故曰會吳孔氏穎達曰不序吳於林父之下而别云會吳者為吳人先在善道蔑與林父往彼會之故云會吳也十年會吳于祖成十五年會吳于鍾離皆是吳在彼地往彼會之故殊會吳也下戚會不殊吳者來會于戚故與諸國同序列也之劉氏敞曰晉將合諸侯于戚吳子不至使魯衛先爾許氏翰曰晉楚爭衡權之在吳故晉急吳如此吳季氏本曰晉將邀吳為戚之會而魯衛近且俱同姓故晉命以通好焉秋大雩左傳秋大雩旱也集説髙氏閌曰因旱祭志僭也楚殺其大夫公子壬夫左傳楚人討陳叛故曰由令尹子辛實侵欲焉乃殺之書曰楚殺其大夫公子壬夫貪也君子謂楚共王於是不刑詩曰周道挺挺我心扃扃講事不令集人來定已則無信而殺人以逞不亦難乎夏書曰成允成功集説杜氏預曰共王敗於鄢陵後殺子反公子申壬夫八年之中殺三卿劉氏敞曰稱國以殺大夫者罪纍上也壬夫之纍上奈何前此者陳鄭去楚即晉楚人伐之不服媾之不可楚子怒曰壬夫實侵欲焉乃殺之是遷也然則壬夫之罪何壬夫之為人臣也怙勢而懷利足以殺其身已矣蘇氏轍曰壬夫固有罪矣廢而勿用可也殺之過矣故稱國以殺王氏葆曰壬夫之貪有取死之道矣經以國殺大夫為文者陳之叛楚在子辛楚子既不能明法教以律貪人又不能殺貪人以謝小國乃擁其罪人興兵致討而陳恨彌篤方歸罪子辛而殺之故稱國以殺罪纍上也家氏鉉翁曰前殺公子申曰受小國之賂今殺壬夫又以侵欲於陳而使之叛楚猶有政二大夫不為無罪但用刑過慘春秋不與也公會晉侯宋公陳侯衛侯鄭伯曹伯莒子邾子滕子薛伯齊世子光吳人鄫人于戚左傳九月丙午盟于戚會吳且命戍陳也穆叔以屬鄫為不利使鄫大夫聽命于會公羊吳何以稱人吳鄫人云則不辭胡傳吳何以稱人案左氏吳子使壽越如晉請聽諸侯之好晉人將為之合諸侯使魯衛大夫會吳于善道且告會期然則戚之事乃吳人來會不為主也來會諸侯而不為主則進而稱人諸侯往與之會而主吳則貶而稱國聖人之情見矣春秋之義明矣集説杜氏預曰不復殊吳者吳來會于戚不石氏介曰成九年為蒲之會將以會吳而吳至故十五年諸侯之大夫會之于鍾離前三年悼公盟雞澤使荀會逆吳子而又不至故此年使魯衛先會之于善道凡此皆往會之也至秋戚之會序吳於列而不復殊者因其來會也凡序吳者來會我也殊吳者往會之也不劉氏敞曰吳曷為序鄫之上抑鄫也曷為抑鄫鄫能國非諸侯之列也程子曰吳來會非為主也鄫蘇氏轍曰吳之稱人與鄫皆列不可曰吳鄫人也之復列於會魯人不利屬鄫也張氏洽曰戚之會因吳之來而命戍陳自桓文以來所以服陳者未聞以兵守之也士丐知戍陳之非長䇿是以有喪陳之嘆孔子曰遠人不服則修文德以來之既來之則安之晉為安陳之計如此何以能保陳乎李氏亷曰晉悼公謂魏絳曰八年之中九合諸侯始於此年會戚一也冬會城棣救陳二也七年會鄬三也八年邢丘四也九年戲五也十年柤六也又戍鄭虎牢七也十一年亳城北八也會蕭魚九也蓋自四年至十一年為八年公至自會冬戍陳公羊孰戍之諸侯戍之曷為不言諸侯戍之離至不可得而序故言我也集説杜氏預曰諸侯在戚會皆受命戍陳各還國遣戍不復有告命故獨書魯戍程子曰非王命而勤民遠戍罪也而善於戍陳何哉蓋陳附晉國而楚爭之則戍之者在於助陳而距楚與之可也葉氏夢得曰孰戍之我也會戚之諸侯既受命於晉而歸各為之戍陳以備楚不言諸侯散辭也高氏閌曰此諸侯同戍非獨魯戍之也書於公至之後則知諸侯各還國而遣戍與僖二年城楚丘同義汪氏克寬曰悼公之戍陳有恤諸侯之義惜其以為有陳非吾事人心不協而不卒戍遂至於失陳也楚公子貞帥師伐陳公會晉侯宋公衛侯鄭伯曹伯齊世子光救陳曹伯下公穀有莒子邾子滕子薛伯左傳楚子囊為令尹范宣子曰我喪陳矣楚人討二而立子囊必改行而疾討陳陳近於楚民朝夕急能無往乎有陳非吾事也無之而後可冬諸侯戍陳子囊伐陳十一月甲午會於城棣以救之城棣杜注鄭地陳留酸棗縣西南有棣城寰宇記有南棣城北棣城在陽武縣北十里二棣城之間有博浪河亭即子房擊始皇處也今屬河南開封府集説高氏閌曰陳方附晉諸侯既戍之復為楚所伐又相率救之救之義事也陳氏傅良曰書救陳何陳不服也陳自辰陵不與諸侯之會三十年矣悼公伯而雞澤之盟袁僑至戚之會陳侯至諸侯為之戍陳而楚有公子貞之師於是救陳又明年會于鄬陳侯送歸自是凡會同無陳矣家氏鉉翁曰戍者戍之於無事之時救者救之於被兵之日悼公既以諸侯之師戍之及楚師之來以戍為未足又動大兵往救焉書戍書救以善晉也十有二月公至自救陳穀梁善救陳也集説范氏寧曰善之故以救陳致辛未季孫行父卒左傳季文子卒大夫入斂公在位宰庀家器為葬備無衣帛之妾無食粟之馬無藏金玉無重器備君子是以知季文子之忠於公室也相三君矣而無私積可不謂忠乎集説高氏閌曰自文子卒而魯有城費作三軍事則知文子雖専而猶忠慎僭亂未啓也其子宿嗣是為武子季氏之強萌於僖公大於成公熾於襄昭極於定哀甲靈王午五年六年晉悼六年齊靈十五年衛獻十年蔡景二十五年鄭僖四年曹成十一年陳哀二年把桓七十年宋平九年秦景十年楚共二十四年吳壽夢十九年春王三月壬午把伯姑容卒左傳六年春把桓公卒始赴以名同盟故也集説趙氏鵬飛曰把自入春秋至是始以名訃於諸侯而葬配以諡其初蓋微弱不能行其禮諸侯亦從而眇之葬有所不會至此始會之故書葬把桓公汪氏克寬曰桓公自僖二十七年來朝成九年來逆叔姬之喪此年卒子丐嗣年嚴氏啓隆曰姑容立於僖之二十四年在位七十而卒事魯最恭末年復婚於晉悼把君告卒至是始書名魯亦始會葬自是以後把之卒葬始備見於春秋夏宋華弱來奔左傳宋華弱與樂轡少相狎長相優又相謗也子蕩怒以弓梏華弱於朝平公見之曰司武而梏於朝難以勝矣遂逐之夏宋華弱來奔司城子罕曰同罪異罰非刑也專戮於朝罪孰大焉亦逐子蕩子蕩射子罕之門曰幾日而不我從子罕善之如初集説髙氏閌曰不言逐而以自奔為文者朝廷尚敬而弱瀆慢如此所以罪弱也家氏鉉翁曰案左傳亦逐樂轡不書著用刑之不平也秋葬杞桓公集説俞氏皋曰杞小而去魯遠舊雖來赴而魯不往會葬今之會葬者蓋以婚姻之故也叔姬嫁於把定姒乃把女也滕子來朝左傳秋膝成公來朝始朝公也集説季氏本曰滕向無朝矣此復來朝者以魯睦於晉賴魯以為庇耳莒人滅鄫左傳莒人滅鄫鄫恃賂也集説陸氏淳曰公羊此年無傳五年傳云莒女有為鄫夫人者蓋欲立其出也穀梁日立異姓以蒞祭祀滅亡之道也趙子曰此蓋昭四年經云取鄫以為若今實滅之不合如此所以云立異姓也案莒今滅鄫以為附庸後魯取得之何妨書取鄫乎且定六年鄭滅許哀元年許復見於經則鄫之滅而再見亦何足怪若鄫人實取外孫為國嗣罪自在鄫非莒之過則經文又當如梁亡之類而言鄫亡不得書滅且以人情物理言之鄫雖小國亦有君臣社稷豈肯居然取於異姓為後乎孫氏復曰昭四年書取鄫此而言滅者蓋莒滅之以為附庸爾是張氏洽曰案吕氏以為鄫莒小國而自相滅亡蓋時禮義衰絶滅國之大惡以為常事皆目見之熟而莫之顧也愚謂晉女叔齊對平公治把田之問以為武獻以下兼國多矣誰得治之然則晉蓋吞滅之首也固無以正諸侯之相滅豈特目見之常事哉宜晉悼雖賢終無以戢諸侯之相滅也敢呂氏大圭曰此直是莒人滅鄫耳立異姓之事未深信趙氏鵬飛曰晉為盟主受魯之託乃不能庇一鄫莒人滅之亦不能問烏在其為盟主也程氏端學曰鄫懼莒而求庇於晉晉與之為戚之會矣坐視其滅而不問此伯業之所以卑也李氏廉曰四年公如晉請屬鄫晉以鄫屬魯其冬邾人莒人伐鄫臧孫紇救鄫侵邾敗於狐駘五年穆叔覿鄫太子巫於晉九月會于戚穆叔以屬鄫為不利使鄫大夫聽命於會六年莒人滅鄫晉人來討季武子如晉謝亡鄫此左傳鄫事之本末也季氏本曰穀梁曰莒人滅鄫非滅也立異姓以蒞祭祀滅亡之道也以經文考之則未有以見其必然者夫滅國與絶世其事不同其辭亦當有異聖人豈肯含糊不明使人難曉哉案莒人滅鄫經文甚明襄八年莒以疆鄫田伐魯東鄙則鄫為莒滅無疑也左氏以為鄫恃賂蓋鄫之託魯必有賂而魯不終其託故為莒滅耳公穀以昭四年取鄫遂疑鄫未嘗滅而有立異姓之説趙氏匡駁之謂鄫果以外孫為嗣則其罪在鄫經當如梁亡之類而書鄫亡不得書滅又以為鄭既滅許而許復見經考據頗詳今故不取公穀而凡以為立異姓者俱刪之冬叔孫豹如邾左傳冬穆叔如邾聘且修平集説髙氏閌曰公初即位邾子來朝四年有狐駘之戰至是往聘修平以無忘舊好也李氏廉曰春秋書魯聘邾止此一條季孫宿如晉左傳晉人以鄫故來討曰何故亡鄫季武子如晉見且聽命集説杜氏預曰宿始代父為卿見大國哀許氏翰曰魯既世卿而大夫無復三年之喪典廢於下矣國張氏洽曰晉不討莒而討魯偏矣宜乎無以正小之罪趙氏鵬飛曰宿行父之子也父喪未期而執使命知世卿以固位而已不顧夫禮聖人志之以見世爵之過襄公幼弱蓋非公意宿自為之矣三家之專其可忍哉是王氏元杰曰春秋之時嗣君繼立踰年而用吉禮豈先王之制哉行父以五年冬卒宿以踰年出使異乎三年之喪而從政矣考之仲孫蔑卒仲孫速會莒人盟于向仲孫宿卒仲孫羯帥師侵齊典禮之失一至於此春秋謹而書之以見魯國喪禮之失也十有二月齊侯滅萊左傳十一月齊侯滅萊萊恃謀也於鄭子國之來聘也四月晏弱城東陽而遂圍萊甲寅堙之環城傅於堞及把桓公卒之月乙未王湫帥師及正輿子棠人軍齊師齊師大敗之丁未入萊萊共公浮柔奔棠正輿子王湫奔莒莒人殺之四月陳無宇獻萊宗器於襄宫晏弱圍棠十一月丙辰而滅之遷萊於郳髙厚崔杼定其田稿杜注萊邑也北海即墨縣有棠鄉今縣南八十里有甘棠社即古棠鄉也屬山東萊州府公羊曷為不言萊君出奔國滅君死之正也集説髙氏閌曰齊圖萊久矣自宣七年伐萊自是而遂滅之乙靈王未六年七年晉悼七年齊靈十六年衛獻十一年蔡景二十六年鄭僖五年曹成十二年陳哀三年杞孝公丐元年宋平十年秦景十一年楚共二十五年吳壽夢二十年春郯子來朝左傳七年春郯子來朝始朝公也集説季氏本曰成七年吳伐郯郯既從吳至是吳與晉通好而遂不禁郯之親魯故復來朝以修舊好夏四月三卜郊不從乃免牲左傳夏四月三卜郊不從乃免牲孟獻子曰吾乃今而後知有卜筮夫郊祀后稷以祈農事也是故啓蟄而郊郊而後耕今既耕而卜郊宜其不從也穀梁夏四月不時也三卜禮也乃者亡乎人之辭也集説汪氏克寬曰公穀啖氏皆以三卜為合禮朱子亦云四卜五卜失禮然春秋四書卜郊唯此年三卜亦書之者蓋三卜雖得禮而卜郊止於三月今書四月而三卜不從則過時不敬以致龜違故書以譏非時而非譏其瀆卜也小邾子來朝左傳小邾穆公來朝亦始朝公也集説季氏本曰終春秋之世小邾卒葬不書無以考其世矣城費費音祕左傳南遺為費宰叔仲昭伯為隧正欲善季氏而求媚於南遺謂遺請城費吾多與而役故季氏城費胡傳費季氏邑也文子相三君無衣帛之妾無食粟之馬無藏金玉無重器備則固忠於公室而不顧其所食之私邑也及行父卒宿之不忠遂專魯國之政羣小媚之無故勞民妄興是役季氏益張其後孔子行乎季孫三月不違至於帥師墮費其越禮不度可知矣然則書城費乃履霜堅氷之戒強私家弱公室之萌據事直書而義自見矣用人不惟其賢惟其世豈不殆哉集説孫氏復曰季氏四月城所食邑其專可知也將家氏鉉翁曰季孫行父身死子繼首城賜邑以抗君而專國春秋書以著犯上作亂之漸費李氏廉曰費魯強邑僖元年賜季友汶陽之田及於是為季氏邑矣自南遺既城之後費邑強南蒯繼為費宰非特季氏世卿而陪臣亦世其邑昭十二年南蒯欲出季氏不克以費叛如齊十三年叔弓圍費弗克敗焉十四年費人叛南氏蒯奔齊齊來歸費及季桓子立公山不狃為費宰定八年不狃以費叛十二年始用子路墮三都不狃叔孫輒帥費人襲魯孔子命申句須樂頎伐之二子奔齊遂墮費此一費之始終也而季氏之盛衰可考矣汪氏克寬曰此書城費而昭十三年書圍費定十二年書墮費後十五年書城成郛而昭二十六年定十二年書公圍成比事以觀則知大夫之強恃其城郭之固由人君不謹其初之所致也公室卑而大夫専大夫弱而家臣叛夫豈無自而然哉秋季孫宿如衛左傳秋季武子如衛報子叔之聘且辭緩報非二也集説趙氏鵬飛曰公即位衛侯使公孫剽來聘晉侯使荀罃來聘既而公如晉者再大夫如晉者三而衛侯之聘則未嘗報也今七年而後季孫宿報之其緩可知矣衛雖弱於魯固不敢責報然亦疑魯之外衛矣故冬孫林父來聘且要盟也如汪氏克寬曰比書滕郯小邾來朝而志大夫如晉衛著邦交之煩而畏大慢小之情見矣國季氏本曰時仲孫蔑執政政務睦鄰故多通使鄰宿非私行也或意所欲往而因以植黨則有之矣八月螽集説杜氏預曰為災故書不髙氏閌曰莊公以前螟猶書之莊公以後螟復書螽然後書以是知災異之益多矣春秋不勝其書舉重以見輕爾附録左傳冬十月晉韓獻子告老公族穆子有廢疾將立之辭曰詩曰豈不夙夜謂行多露又曰弗躬弗親庶民弗信無忌不才讓其可乎請立起也與田蘇遊而曰好仁詩曰靖共爾位好是正直神之聽之介爾景福恤民為德正直為正正曲為直參和為仁如是則神聽之介福降之立之不亦可乎庚戌使宣子朝遂老晉侯謂韓無忌仁使掌公族大夫冬十月衛侯使孫林父來聘壬戌及孫林父盟左傳衛孫文子來聘且拜武子之言而尋孫桓子之盟公登亦登叔孫穆子相趨進曰諸侯之會寡君未嘗後衛君今吾子不後寡君寡君未知所過吾子其少安孫子無辭亦無悛容穆叔曰孫子必亡為臣而君過而不悛亡之本也詩曰退食自公委蛇委蛇謂從者也衡而委蛇必折楚公子貞帥師圍陳集説胡氏銓曰前書伐陳未足以克陳也此書圍陳則以兵合而守之書此以見楚之憑陵列國極矣屢書公子貞帥師亦見貞之專楚也陳趙氏鵬飛曰伐陳而未得志今復罄兵而圍之宜有所不堪故鄬之會陳侯逃歸子李氏廉曰圍國書大夫自公貞始十有二月公會晉侯宋公陳侯衛侯曹伯莒子邾子于鄬鄬穀或作鄬于軌反鄬杜注鄭地左傳楚子囊圍陳會于鄬以救之集説杜氏預曰謀救陳陳侯逃歸不成救故不書救也孔氏穎達曰楚既圍陳而陳侯亦列於會者當是圍之不密故陳侯得出會求救也陳侯逃歸陳遂屬楚諸侯不與楚戰各自罷歸不成為救故不書救也楚高氏閌曰晉悼將修文公之業復有志於攘楚而先圍陳陳侯遂出會諸侯以求救於晉晉悼於是遽為之合諸侯也以汪氏克寬曰自是凡會同無陳矣季氏本曰楚十月圍陳將歷一冬而悼公始會諸侯遷延鄭地是有畏楚之心而不能急救陳也豈真有意懷陳者哉鄭伯髠頑如會未見諸侯丙戌卒于鄵髠苦門反公穀作髠原鄵七報反又采南反公穀作操鄵杜注鄭地左傳鄭僖公之為大子也於成之十六年與子罕適晉不禮焉又與子豐適楚亦不禮焉及其元年朝於晉子豐欲訴諸晉而廢之子罕止之及將會于鄬子駟相又不禮焉侍者諫不聽又諫殺之及鄵子駟使賊夜弒僖公而以瘧疾赴於諸侯簡公生五年奉而立之公羊操者何鄭之邑也諸侯卒其封內不地此何以地隱之也何隱爾弒也未見諸侯其曰如會何致其意也穀梁禮諸侯不生名此其生名何也卒之名也卒之名則何為加之如會之上見以如會卒也胡傳案鄭僖公三傳皆以為弒左氏則曰以瘧疾赴也春秋變文而書曰卒於鄵見其弒而隱之也集説杜氏預曰實為子駟所弒以瘧疾赴故不書弒稱名為書卒同盟故也如會會於鄬也未見諸侯未至會所而死鄵鄭地不欲再稱鄭伯故約文書其名於會上陸氏淳曰趙子曰凡諸侯死例書名此則為上文已言鄭伯如會下不可又言鄭伯髠頑卒又不可上言鄭伯如會下但言髠頑卒所以須於如會時便書名以便其文耳其劉氏敞曰鄵者何鄭之邑也諸侯卒其封內不地曰鄭伯髠頑如會未見諸侯卒于鄵何見其以如會而卒也何見乎其以如會而卒傳曰弒也孰弒之其大夫公子騑弒之公子騑弒之奈何公子騑執鄭國之政鄭伯不禮焉公子騑怒鄭伯將會諸侯廢之公子騑欲與楚鄭伯曰不可公子騑於是使賊弒鄭伯此弒也曷為不言其弒以卒赴也以卒赴則曷為遂書之遍絶其臣子也曷為遍絶其臣子臣弒君凡在官者殺無赦子弒父凡在宫者殺無赦故君弒臣不討賊命之曰非臣親弒子不復讎命之曰非子非臣非子大惡莫甚焉鄭非無臣子也君子即其所以赴於諸侯而遂書之見鄭之無臣子也弒君多矣曷為獨於此為遍絶其臣子曰趙盾之弒其君也董狐書之以示於朝赴於諸侯仲尼曰良史也崔杼之弒其君也太史書之崔杼殺之其弟又書之又殺之其弟又書之乃舍之然後以赴於諸侯曰崔杼弒其君也弒君有四有絶其君者有絶其臣者有非所絶而絶之者有舉其臣子而絶之者此之謂也志許氏翰曰辭繁而不殺曰如會曰未見諸侯善其在於見諸侯也胡氏寧曰鄭髠頑楚麇齊陽生書卒皆存天理抑人欲之意君陳氏傅良曰此公子騑弒其君也則其書卒何以薨赴也君弒矣晏然赴於他國但如恆喪自鄭騑始甚矣無人紀也而鄭之臣子聼焉春秋之所甚懼也是故書卒所以誅鄭之臣子聽賊之所為也書汪氏克寬曰或引吳子遏伐楚門于巢卒謂髠頑名義與遏同實卒而非弒也今考遏之死三傳皆云巢人之射則鄭僖變文實弒而非卒矣案經書鄭伯卒而三傳皆曰被弒趙氏匡信經而疑傳似亦有見然左氏去聖未遠公穀皆原本於聖門當日必有所據明年鄭羣公子以僖公之死謀子駟則子駟之弒君可知矣劉氏敞謂從赴書卒以見鄭無臣子是也公羊以為諱穀梁以為君不勝其臣皆非經旨陳侯逃歸左傳陳人患楚慶虎慶寅謂楚人曰吾使公子黃往而執之楚人從之二慶使告陳侯於會曰楚人執公子黃矣君若不來羣臣不忍社稷宗廟懼有二圖陳侯逃歸穀梁以其去諸侯故逃之也胡傳穀梁子曰逃義曰逃逃者匹夫之事上二年諸侯戍陳今楚令尹來伐諸侯又救之亦既勤矣為陳侯計者下令國中大申警備立太子以固守親聽命於諸侯謀禦敵之策當是時晉君方明八卿和睦諸侯聽命必能致力於陳矣不此之顧棄儀衛而逃歸此匹夫之事耳夫義路也禮門也是不能由是路出入是門故書逃歸以罪之可謂深切著明矣集説高氏閌曰楚人以陳叛故殺公子壬夫而亟討陳晉雖為陳再合諸侯卒不能攘楚以安陳故陳侯內為二慶所逼而逃歸也然為一國之君而不能自立若匹夫之逃亦可羞矣李氏亷曰陳自此後直至襄二十七年昭元年宋虢之會始與則以晉楚之分霸故也汪氏克寬曰春秋於諸侯之逃楚者皆不書惟陳鄭之逃則書之所以辨內外而豫齊晉也季氏本曰陳侯不能以義激晉使速發兵乃效匹夫之事私逃而歸豈得為禮義之君哉案陳侯以國難逃歸説者以背晉從楚為陳罪持論甚正而其實晉之不欲有陳固已早有成算矣晉之圖霸汲汲於得宋得鄭而陳在所緩范宣子曰陳非吾事無之而後可故五年楚伐陳晉合諸侯以救之猶有恤患之意七年楚圍陳晉雖再合諸侯而不成救鄬之會陳侯逃歸邢丘之盟陳侯不至晉皆置若罔聞晉之謀陳者日以疏而楚之謀陳者日以迫則陳之從楚乃晉之棄陳也春秋書之亦以譏晉伯之不振焉耳丙靈王申七年八年晉悼八年齊靈十七年衛獻十二年蔡景二十七年鄭簡公嘉元年曹成十三年陳哀四年杞孝二年宋平十一年秦景十二年楚共二十六年吳壽夢二十一年春王正月公如晉左傳八年春公如晉朝且聽朝聘之數集説孫氏復曰公前年會諸侯于鄬不至者公自鄬朝晉也李氏廉曰左氏疏曰昭三年鄭子太叔云文襄之伯也令諸侯三歲而聘五歲而朝自襄以後晉德少衰諸侯朝聘無復定準今晉悼復修伯業更合諸侯故公朝晉而稟其多少如公朝者蓋亦非一晉侯謙不敢在國約束故出外合之又難煩諸侯使大夫聽命故為邢丘之會以命朝聘之數耳其數蓋亦同文襄也汪氏克寬曰襄公嗣位甫及八年而三朝於晉自宣公媚齊之外春秋事霸之禮未有若是其勤也晉悼立未十年而魯君四朝豈非倍於諸侯事天子五年一朝之制乎悼公改命朝聘之數其亦知過矣夏葬鄭僖公案鄭伯被弒經既從赴而書卒則自當書葬附録左傳鄭羣公子以僖公之死也謀子駟子駟先之夏四月庚辰辟殺子狐子熙子侯子丁孫擊孫惡出奔衛鄭人侵蔡獲蔡公子燮燮穀作濕後同左傳庚寅鄭子國子耳侵蔡獲蔡司馬公子燮鄭人皆喜唯子産不順曰小國無文德而有武功禍莫大焉楚人來討能勿從乎從之晉師必至晉楚伐鄭自今鄭國不四五年弗得寧矣子國怒之曰爾何知國有大命而有正卿童子言焉將為戮矣公羊此侵也其言獲何侵而言獲者適得之也穀梁人微者也侵淺事也而獲公子公子病矣集説杜氏預曰鄭侵蔡欲以求媚於晉既無晉令又無直辭主少興師動而無謀以生國患故貶之稱人晉王氏沿曰鄭欲從楚故侵蔡以致楚然後告絶於而與楚平春秋惡之故稱人以示貶高氏閌曰師未嘗敗績而遽獲其大夫有以見民不親上而委之於敵矣張氏洽曰僖公方葬楚方睥睨鄭人之不服而欲討之今乃不能遠圖先侵蔡以挑楚故書人以貶之黃氏震曰鄭侵楚之與國以挑釁此子産所以獨憂而不旋踵致楚之師文季氏本曰鄭人恃晉侵蔡而獲其公子所謂不修德而有武功者也蔡楚之與國也能無致楚之討乎子耳子國之為政於是乎失謀矣季孫宿會晉侯鄭伯齊人宋人衛人邾人于邢丘左傳五月甲辰會于邢丘以命朝聘之數使諸侯之大夫聽命季孫宿齊高厚宋向戌衛寧殖邾大夫會之鄭伯獻捷於會故親聽命大夫不書尊晉侯也穀梁見魯之失正也公在而大夫會也胡傳大夫稱人貶之也昔周公戒成王以繼自今我其立政立事夫不自為政而委於臣下是以國之利器示人而不知寶也朝聘事之大者重煩諸侯而使大夫聽命無乃以姑息愛人而不由德乎使政在大夫而諸侯失國又豈所以愛之也後此八年湨梁之會悼公初沒諸侯皆在而大夫獨盟君若贅旒夫豈一朝一夕之故哉故邢丘之事魯公在晉而季孫宿會見魯之失政也諸侯之大夫貶而稱人謹其始也集説杜氏預曰時公在晉晉悼難勞諸侯唯使大夫聽命故季孫在會而公先歸孔氏穎達曰公以正月如晉此會之下始云公至則晉侯適會公乃歸魯季孫蓋從公朝晉即從晉赴會杜氏諤曰獨書季孫宿者春秋以內魯為文書季孫宿則知四國皆大夫也陳氏傅良曰此齊高厚宋向戌衛寧殖也其稱人何不以大夫敵盟主也不以大夫敵盟主桓文之盛也自同盟于戚而大夫與諸侯序矣於是再見其再見何復豫晉以伯也傳曰大夫不書尊晉侯也張氏洽曰春秋之法必辨等列以大夫而會諸侯必人之者所以嚴君臣之分謹上下之交而革伯者苟且之政也李氏廉曰此條左氏得其事胡氏得其義論其事則不欲煩諸侯者晉侯之美意也論其義則不可委大夫者春秋之深意也左氏所謂尊晉侯者不過不以大夫敵諸侯之義耳侯卓氏爾康曰邢丘之會以命朝聘胡傳以重煩諸而使大夫聽命是謂姑息愛人非也此正悼公之以謹嚴馭衆也諸侯與國為我敵體惟大夫可以命令之君指撝臣攝伏聽則與違則執我法可行彼勢可受不失尊重之常又於政體甚便雖以魯襄在晉特不令其與會也不令魯襄與會者優之也案邢丘之會重煩諸侯而使大夫聽命胡傳謂姑息愛人不自為政而委於臣下者防微之論也悼公霸業修舉豈有權移於下之事卓氏爾康謂馭衆謹嚴正在於此其説亦通今並存之穀梁謂公在而大夫會杜注孔疏皆同蓋季孫從公朝晉遂由晉而赴邢丘耳經於會後始書公至則季孫往會之時公尚在晉也劉氏敞謂公已反而復遣季孫似未可信公至自晉莒人伐我東鄙左傳莒人伐我東鄙以疆鄫田集説高氏閌曰鄫田接於魯而疆界不明故興兵伐魯以正之鄫遂屬於莒矣張氏洽曰莒人滅鄫而魯不敢爭伯主不討所以興兵伐魯疆鄫田也王氏樵曰案莒滅鄫伐魯以疆鄫田其為姦齊盟大矣而伯討不及晉方慮楚故也據此則莒以兵滅鄫明矣孰謂以其子後鄫為滅鄫耶秋九月大雩左傳秋九月大雩旱也冬楚公子貞帥師伐鄭左傳冬楚子囊伐鄭討其侵蔡也子駟子國子耳欲從楚子孔子蟜子展欲待晉子駟曰周詩有之曰俟河之清人壽幾何兆云詢多職競作羅謀之多族民之多違事滋無成民急矣姑從楚以紓吾民晉師至吾又從之敬共幣帛以待來者小國之道也犧牲玉帛待於二境以待強者而庇民焉寇不為害民不罷病不亦可乎子展曰小所以事大信也小國無信兵亂日至亡無日矣五會之信今將背之雖楚救我將安用之親我無成鄙我是欲不可從也不如待晉晉君方明四軍無闕八卿和睦必不棄鄭楚師遼遠糧食將盡必將速歸何患焉舍之聞之杖莫如信完守以老楚杖信以待晉不亦可乎子駟曰詩云謀夫孔多是用不集發言盈庭誰敢執其咎如匪行邁謀是用不得於道請從楚騑也受其咎乃及楚平使王子伯駢告於晉曰君命敝邑修而車賦警而師徒以討亂略蔡人不從敝邑之人不敢寧處悉索敝賦以討於蔡獲司馬燮獻于邢丘今楚來討曰女何故稱兵於蔡焚我郊保馮陵我城郭敝邑之衆夫婦男女不遑啓處以相救也翦焉傾覆無所控告民死亡者非其父兄即其子弟夫人愁痛不知所庇民知窮困而受盟於楚孤也與其二三臣不能禁止不敢不告知武子使行人子員對之曰君有楚命亦不使一介行李告於寡君而即安於楚君之所欲也誰敢違君寡君將帥諸侯以見於城下唯君圖之胡傳齊宣王問於孟子交鄰國有道乎孟子曰有惟智者為能以小事大故太王事獯鬻句踐事吳以小事大畏天者也畏天者保其國鄭介大國之間困強楚之令而欲息肩於晉若能信任仁賢明其刑政經畫財賦以禮法自守而親比四鄰必能保其封境荆楚雖大何畏焉而子耳子國加兵於蔡獲公子燮無故怒楚所謂不修文德而有武功者也楚人來討不從則力不能敵從之則晉師必至故國人皆喜而子産獨不順焉以晉楚之爭鄭自兹弗得寧矣是以獲公子燮特書侵蔡以罪之而公子貞來伐鄭及楚平不復書矣平而不書以見鄭之屈服於楚而不信也犧牲玉帛待於境上以待強者而請盟其能國乎集説高氏閌曰觀左氏所載則子駟之弒僖公志在事楚矣家氏鉉翁曰鄭侵蔡以自結於晉然從楚者本謀也楚至而服惟恐其後矣從李氏廉曰此鄭又從楚之始也至十一年蕭魚始晉汪氏克寬曰自襄元年荊楚侵宋伐陳圍陳伐鄭皆書大夫之名氏書帥師而無貶辭所謂不待貶絶而罪惡見者也晉侯使士丐來聘左傳晉范宣子來聘且拜公之辱告將用師於鄭公享之宣子賦摽有梅季武子曰誰敢哉今譬於草木寡君在君君之臭味也歡以承命何時之有武子賦角弓賔將出武子賦彤弓宣子曰城濮之役我先君文公獻功於衡雍受彤弓於襄王以為子孫藏丐也先君守官之嗣也敢不承命君子以為知禮集説李氏廉曰此與士燮來聘言伐郯同罃汪氏克寬曰成公末年至襄十二年士丐荀士魴凡四聘於魯則晉之所以結與國者不亦厚乎宜悼公之得諸侯也丁靈王酉八年九年晉悼九年齊靈十八年衛獻十三年蔡景二十八年鄭簡二年曹成十四年陳哀五年把孝三年宋平十二年秦景十三年楚共二十七年吳壽夢二十二年春宋災災公作火左傳九年春宋災樂喜為司城以為政使伯氏司里火所未至徹小屋塗大屋陳畚挶具綆缶備水器量輕重蓄水潦積土塗巡丈城繕守備表火道使華臣具正徒令隧正納郊保奔火所使華閲討右官官庀其司向戌討左亦如之使樂遄庀刑器亦如之使皇鄖命校正出馬工正出車備甲兵庀武守使西鉏吾庀府守令司宫巷伯警宫二師令四鄉正敬享祝宗用馬於四墉祀盤庚於西門之外晉侯問於士弱曰吾聞之宋災於是乎知有天道何故對曰古之火正或食於心或食於咮以出內火是故咮為鶉火心為大火陶唐氏之火正閼伯居啇丘祀大火而火紀時焉相土因之故啇主大火啇人閲其禍敗之釁必始於火是以日知其有天道也公曰可必乎對曰在道國亂無象不可知也集説杜氏預曰天火曰災來告故書志劉氏敞曰九年宋災穀梁曰外災不志此其何也故宋也非也齊大災又豈故齊乎人高氏閌曰宋自昭文以來亂敗相屬三書宋災見事之不修也李氏廉曰公羊以為為王者之後記災也穀梁以為故宋也范氏以宋者孔子之先也左氏以為來告故書也左氏得之左氏載宋司城樂喜救災之政纖悉備具又載晉侯士弱之問對則其來告必矣案宋災書者宋來告也當以杜氏預為正公穀以為外災不書者非也至謂宋為王者之後孔子之先故書其災則鑿矣昭十八年衛陳鄭與宋同日而災果如公穀之言春秋獨書宋可也何以合四國備書之乎夏季孫宿如晉左傳夏季武子如晉報宣子之聘也集説高氏閌曰公朝晉而晉來聘又使報焉事大國之禮勤矣五月辛酉夫人薑氏薨左傳穆薑薨於東宮始往而筮之遇艮之八史曰是謂艮之隨隨其出也君必速出薑曰亡是於周易曰隨元亨利貞無咎元體之長也亨嘉之會也利義之和也貞事之幹也體仁足以長人嘉會足以合禮利物足以和義貞固足以幹事然故不可誣也是以雖隨無咎今我婦人而與於亂固在下位而有不仁不可謂元不靖國家不可謂亨作而害身不可謂利棄位而姣不可謂貞有四德者隨而無咎我皆無之豈隨也哉我則取惡能無咎乎必死於此弗得出矣集説杜氏預曰成公母淫僑如欲廢成公故徙居東宫附録左傳秦景公使士雃乞師於楚將以伐晉楚子許之子囊曰不可當今吾不能與晉爭晉君類能而使之舉不失選官不易方其卿讓於善其大夫不失守其士競於教其庶人力於農穡啇工皂隸不知遷業韓厥老矣知罃稟焉以為政范丐少於中行偃而上之使佐中軍韓起少於欒黶而欒黶士魴上之使佐上軍魏絳多功以趙武為賢而為之佐君明臣忠上讓下競當是時也晉不可敵事之而後可君其圖之王曰吾既許之矣雖不及晉必將出師秋楚子師於武城以為秦援秦人侵晉晉飢弗能報也秋八月癸未葬我小君穆薑公作繆薑集説杜氏預曰四月而葬速曰劉氏敞曰穆薑者何成公之母也髙氏閌别為之諡用文薑之例也有家氏鉉翁曰穆薑為行父所幽以死魯國之大無如穎考叔之悟其君者畏季氏也行父取穆薑喪具以葬齊薑其心可誅矣冬公會晉侯宋公衛侯曹伯莒子邾子滕子薛伯把伯小邾子齊世子光伐鄭十有二月己亥同盟于戲戲許宜反伐戲杜注鄭地成十七年諸侯鄭自戲童至於曲洧即此也左傳冬十月諸侯伐鄭庚午季武子齊崔杼宋皇鄖從荀罃士丐門於鄟門衛北宫括曹人邾人從荀偃韓起門於師之梁滕人薛人從欒黶士魴門於北門把人郳人從趙武魏絳斬行栗甲戌師于汜令於諸侯曰修器備盛餱糧歸老幼居疾於虎牢肆眚圍鄭鄭人恐乃行成中行獻子曰遂圍之以待楚人之救也而與之戰不然無成知武子曰許之盟而還師以敝楚人吾三分四軍與諸侯之鋭以逆來者於我未病楚不能矣猶愈於戰暴骨以逞不可以爭大勞未艾君子勞心小人勞力先王之制也諸侯皆不欲戰乃許鄭成十一月己亥同盟于戲鄭服也將盟鄭六卿公子騑公子發公子嘉公孫輒公孫蠆公孫舍之及其大夫門子皆從鄭伯晉士莊子為載書曰自今日既盟之後鄭國而不唯晉命是聽而或有異志者有如此盟公子騑趨進曰天禍鄭國使介居二大國之間大國不加德音而亂以要之使其鬼神不獲歆其禋祀其民人不獲享其土利夫婦辛苦墊隘無所底告自今日既盟之後鄭國而不惟有禮與強可以庇民者是從而敢有異志者亦如之荀偃曰改載書公孫舍之曰昭大神要言焉若可改也大國亦可叛也知武子謂獻子曰我實不德而要人以盟豈禮也哉非禮何以主盟姑盟而退修德息師而來終必獲鄭何必今日我之不德民將棄我豈惟鄭若能休和逺人將至何恃於鄭乃盟而還晉人不得志於鄭以諸侯復伐之十二月癸亥門其三門閏月戊寅濟於隂阪侵鄭次於隂口而還子孔曰晉師可擊也師老而勞且有歸志必大克之子展曰不可汜杜注鄭地東汜注隂阪杜注洧津隂口杜鄭地穀梁不異言鄭善得鄭也不致恥不能據鄭也胡傳善為國者不師善師者不陳善陳者不戰知武子明於善陳之法以佐晉悼公屢與諸侯伐鄭楚輒救之而不與之戰楚師遂屈得善勝之道矣故下書蕭魚之會以美之集説杜氏預曰伐鄭而書同盟則鄭受盟可知傳言十有二月己亥以長厯推之十二月無己亥經誤又曰此年不得有閏月戊寅戊寅是十二月二十日疑閏月當為門五日晉人三番四軍更攻鄭門晉各一攻鄭三受敵癸亥去戊寅十六日以癸亥始攻攻輒五日凡十五日鄭故不服而去明日戊寅濟於隂阪復侵鄭外邑盟呂氏大圭曰案左氏同盟于戲鄭與焉然柯陵之亦書於伐鄭之後則鄭服未可知今以經考之盟柯陵之後諸侯再伐鄭則其未得志於鄭可知盟戲之後楚子伐鄭則為鄭服可知十一年同盟亳城北此亦鄭受盟也會于蕭魚亦鄭與會也皆書於伐鄭之後比事而觀可見矣李氏廉曰此盟在五會之後三駕之前晉方失陳北方之勢未振鄭又侵蔡楚人之辭稍直故士丐告用師諸侯不欲戰則內外之心必皆有疑怠矣盟而書同雖曰同心外楚而其實著其反覆也獨幸五會之信在人心者未忘而荀罃又得善勝之道悼公既歸修德息民於是有以成三駕之績焉則此盟乃晉楚盛衰之機栝也歟勝汪氏克寬曰齊桓之時在於服楚晉文之時在於楚晉悼之時在於敝楚蓋召陵以前楚人加兵於鄭及次陘之伐屈完來盟而鄭無楚患矣城濮之前楚滅黃而霸主不能恤敗徐而諸大夫不能救執盟主而在會者不敢與之爭既又戍穀逼齊合兵圍宋威動天下及得臣敗績而楚頵懾服矣逮夫晉師敗邲之後楚復陵駕北方既縣陳入鄭又滅蕭圍宋于蜀之會奄然以大夫主盟諸侯而聽命者十有一國卒之保鄭以為已有厲公敗之於鄢陵三假王命以伐鄭而終不服悼公復伯鄭與於五會之信而猶叛焉悼公欲直搗方城漢水之境繼齊桓帖荆之績則楚寖強盛未肯服義而昔者處父之伐不足以屈其力也欲與之決勝復文公館穀之捷則暴骨以逞克不可命而先君鄢陵之勝不足以服其心也於是數伐鄭而不與楚戰使楚人疲於奔命而莫能爭鄭既有以挫其暴狠之鋒又有以摧其憑陵之志桓文以降於斯為盛故于戲亳北雖書同盟以惡鄭之反覆而會于蕭魚特筆以著其美也然悼公四駕伐鄭惟盟戲不致者因子駟之言而未得志於鄭是以不書至穀梁子所謂恥不能據鄭者是也亦猶會鄬謀陳不成救而不書至會耳悼公九合諸侯獨於于鄬于戲不致春秋豈無意哉附録左傳公送晉侯晉侯以公宴於河上問公年季武子對曰會于沙隨之歲寡君以生晉侯曰十二年矣是謂一終一星終也國君十五而生子冠而生子禮也君可以冠矣大夫盍為冠具武子對曰君冠必以祼享之禮行之以金石之樂節之以先君之祧處之今寡君在行未可具也請及兄弟之國而假備焉晉侯曰諾公還及衛冠於成公之廟假鐘磬焉禮也楚子伐鄭左傳楚子伐鄭子駟將及楚平子孔子蟜曰與大國盟口血未乾而背之可乎子駟子展曰吾盟固云惟強是從今楚師至晉不我救則楚強矣盟誓之言豈敢背之且要盟無質神弗臨也所臨唯信信者言之瑞也善之主也是故臨之明神不蠲要盟背之可也乃及楚平公子罷戎入盟同盟於中分楚莊夫人卒王未能定鄭而歸中分杜注鄭城中里名集説趙氏鵬飛曰楚子伐鄭鄭復為楚故柤之會鄭不在焉汪氏克寬曰楚書子者國君自將恃強軋弱憑陵列國之稱也不書鄭及楚平不書盟不與鄭之從楚也明年諸侯伐鄭則鄭與楚可知矣附録左傳晉侯歸謀所以息民魏絳請施舍輸積聚以貸自公以下苟有積者盡出之國無滯積亦無困人公無禁利亦無貪民祈以幣更賔以特牲器用不作車服從給行之期年國乃有節三駕而楚不能與爭欽定春秋傳説彚纂卷二十五
