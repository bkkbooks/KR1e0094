body:
  text: 欽定四庫全書欽定春秋傳說彚纂卷三十一癸景王十酉七年十有四年晉昭四年齊景二十年衛靈七年蔡平二年鄭定二年曹武二十七年陳惠二年把平八年宋元四年秦哀九年楚平王居元年吳夷末十六年春意如至自晉左傳尊晉罪己也尊晉罪己禮也榖梁大夫執則致致則名意如惡然而致見君臣之禮也胡傳案左氏季孫猶在晉子服惠伯私於中行穆子曰魯事晉何以不如夷之小國土地猶大所命能具若為夷棄之使事齊楚何瘳於晉乃歸季孫其始執之為乏邾莒之供而非有扶弱擊彊之義也其終歸之為土地猶大所命能具而非有不能救蔡為夷執親之悔也然則晉人喜怒皆以利發其勸沮皆以利行違道甚矣故平丘之㑹深加貶斥自是而後諸侯不合二十餘年至於召陵又以賄敗十有八國之諸侯而書侵楚以譏之於是晉日益衰外攜內叛不復振矣利之能敗人國家乃如此春秋之深戒也集說孫氏復曰大夫執則至至則名不稱氏前見也陳氏傅良曰大夫不致必見執也而後致亦危之也所程氏端學曰晉執意如不以其罪今又舍之亦無為不惟晉之無王命且見其執其舍皆出於私喜怒而非有公天下之心也案孫氏復以不書氏為前見於理亦通今竝存之附録左傳南蒯之將叛也盟費人司徒老祁慮癸僞廢疾使請於南蒯曰臣願受盟而疾興若以君靈不死請待問而盟許之二子因民之欲叛也請朝衆而盟遂劫南蒯曰羣臣不忘其君畏子以及今三年聽命矣子若弗圗費人不忍其君將不能畏子矣子何所不逞欲請送子請期五日遂奔齊侍飲酒於景公公曰叛夫對曰臣欲張公室也子韓晳曰家臣而欲張公室罪莫大焉司徒老祁慮癸來歸費齊侯使鮑文子致之三月曹伯滕卒夏四月附録左傳夏楚子使然丹簡上國之兵於宗丘且撫其民分貧振窮長孤幼養老疾收介特救災患宥孤寡赦罪戾詰姦慝舉淹滯禮新敘舊祿勳合親任良物官使屈罷簡東國之兵於召陵亦如之好於邊疆息民五年而後用師禮也上國杜注在國都之西西方居上流故謂之上國宗丘杜注楚地當在今荆州府歸州境秋葬曹武公八月莒子去疾卒在位十四年子郊公嗣左傳秋八月莒著丘公卒郊公不戚國人弗順欲立著丘公之弟庚輿蒲餘侯惡公子意恢而善於庚輿郊公惡公子鐸而善於意恢公子鐸因蒲餘侯而與之謀曰爾殺意恢我出君而納庚輿許之胡傳卒自外録者也莒人來赴故魯史書其卒葬自內録者也魯人不往是以闕其葬自昭公以來雖薛把微國無不㑹其葬者何獨於莒則不往乎方是時意如專政而莒嘗訴其疆鄆取郠之罪於方伯而見執矣為是怒莒故獨不㑹其葬也夫怨不棄義惡不忘親怒不廢禮在桓公時雖與衛戰而宣公卒則往葬之不以私故絶吉凶慶弔往來施報之常禮也以此見意如之專恣矣若意如者其傲狠修怨敢施於昭公與莒子及其在晉聞除館西河則恐懼逃歸如一匹夫何也小人無禮喜怒勇怯不中節皆若是耳苟不逺之其能國乎附録左傳楚令尹子旗有德於王不知度與養氏比而求無厭王患之九月甲午楚子殺鬭成然而滅養氏之族使鬭辛居鄖以無忘舊勳冬莒殺其公子意恢左傳冬十二月蒲餘侯兹夫殺莒公子意恢郊公奔齊公子鐸逆庚輿於齊齊隰黨公子鉏送之有賂田榖梁言公子而不言大夫莒無大夫也莒無大夫而曰公子意恢意恢賢也曹莒皆無大夫其所以無大夫者其義異也集說劉氏敞曰杜云意恢與亂君為黨故書名惡之非也傳所言意恢死時事無有黨於亂君者正為君自與意恢善而亂臣忌之欲先殺意恢乃逐其君耳且意恢與君兄弟也雖黨無惡詩人同姓之義猶曰不能奮飛況但善之何傷若君有小惡不務親輔而同姓之臣先懷異心欲肆其虗如是自謂不黨乎其孫氏覺曰公榖皆以為曹莒無大夫蓋曹莒小國大夫之位才當大國之士春秋諸侯之士皆不書名故曹莒大夫之名不見於經其有事繫懲勸法當書者則雖賤而名之邾庶其黑肱莒牟夷意恢是也不王氏葆曰意恢之死罪纍上也故以國殺為文而去其族陳氏傅良曰書殺意恢以非其罪也逐家氏鉉翁曰蒲餘侯與公子鐸比而為亂殺意恢郊公逆庚輿於齊而立之意恢之死為君故耳繼莒子卒而書意恢死受託孤之寄而不能其事者也故不書死難而書見殺程氏端學曰莒子卒而莒亂殺其君之親則莒之無政可知矣不曰殺其大夫而曰殺其公子者義不在於專殺大夫而在於殺君之親也附録左傳晉邢侯與雍子爭鄐田久而無成士景伯如楚叔魚攝理韓宣子命斷舊獄罪在雍子雍子納其女於叔魚叔魚蔽罪邢侯邢侯怒殺叔魚與雍子於朝宣子問其罪於叔向叔向曰三人同罪施生戮死可也雍子自知其罪而賂以買直鮒也鬻獄邢侯專殺其罪一也己惡而掠美為昏貪以敗官為墨殺人不忌為賊夏書曰昏墨賊殺皋陶之刑也請從之乃施邢侯而尸雍子與叔魚於市仲尼曰叔向古之遺直也治國制刑不隱於親三數叔魚之惡不為末減曰義也夫可謂直矣平丘之㑹數其賄也以寬衛國晉不為暴歸魯季孫稱其詐也以寬魯國晉不為虐邢侯之獄言其貪也以正刑書晉不為頗三言而除三惡加三利殺親益榮猶義也夫甲景王十戌八年十有五年晉昭五年齊景二十一年衛靈八年蔡平三年鄭定三年曹平公須元年陳惠三年把平九年宋元五年秦哀十年楚平二年吳夷末十七年春王正月吳子夷末卒公作夷昧集說家氏鉉翁曰謁餘祭夷昧迭為君季子之讓著於平日非夷昧死而後讓也夷昧當明季子之節以國授闔廬宋穆之與夷是也乃俾僚冒以位自處以致殺身召亂闔廬固首惡夷昧有責焉耳二月癸酉有事于武宮籥入叔弓卒去樂卒事左傳春將禘于武公戒百官梓慎曰禘之日其有咎乎吾見赤黑之祲非祭祥也喪氛也其在涖事乎二月癸酉禘叔弓涖事籥入而卒去樂卒事禮也胡傳左氏曰禘于武宮叔弓涖事籥入而卒去樂卒事有事於宗廟聞大夫之喪則去樂而祭可乎案曾子問君在祭不得成禮者夫子語之詳矣而無有及大臣者是知祭而去樂不可也有事於宗廟遭大夫之變則以聞可乎案禮衛有大史桞莊寢疾君曰若疾革雖當祭必告是知祭而以聞不可也禮莫重於當祭大夫有變而不以聞則內得盡其誠敬之心於宗廟外全隱恤之意於大臣是兩得之也然則有事於宗廟大臣涖事籥入而卒於其所則如之何禮雖未之有可以義起也有事於宗廟大臣涖事籥入而卒於其所去樂卒事其可也緣先祖之心見大臣之卒必聞樂不樂緣孝子之心視己設之饌必不忍輕徹故去樂而卒事其可也宗廟合禮者常事不書苟以為可則春秋何書乎此記禮之變而書之者也集說杜氏預曰略書有事為叔弓卒起也武宫魯武公廟成六年復立之孔氏穎逹曰有事謂有祭事於武公之宮廟也祭必有樂樂有文舞武舞文執羽籥武執干鉞其入廟也必先文而後武當籥始入叔弓暴卒故於是去樂不用而終卒祭事也叔弓之卒當籥入之時故舉籥入也及其去之則諸樂皆去故云去樂鐘鼓管磬悉皆去之非獨去籥舞也案啖氏助曰穀梁言大夫之卒雖當祭禮皆告於君宋廟大事大夫卒小事以理言之應待祭畢則高氏閌曰成六年立武宮非禮也此有事于武宮知自立宮之後祭之如親廟方其祭也而叔弓涖事籥入而卒此豈雉鼎之變而已哉家氏鉉翁曰祭者主於誠慤不二事者也故當祭雖大夫之喪不得以聞叔弓預於祭猝有疾而死則君為之去樂卒事可也若叔弓自殁於其家如桞莊之比則當待祭畢而後告不當以卑而廢尊春秋書之記禮之變其常耳此與襄仲之卒去籥不同不可引以為證也者汪氏克寬曰有事武宮乃春祠之祭而不書祭名以叔弓之卒去樂卒事變禮而書之非時祭之失故止曰有事而不曰祠也左氏以禘為四時之祭遂誤以為禘耳夏蔡朝吳出奔鄭朝公作昭無出字左傳楚費無極害朝吳之在蔡也欲去之乃謂之曰王唯信子故處子於蔡子亦長矣而在下位辱必求之吾助子請又謂其上之人曰王唯信吳故處諸蔡二三子莫之如也而在其上不亦難乎弗圗必及於難夏蔡人逐朝吳朝吳出奔鄭王怒曰余唯信吳故置諸蔡且微吳吾不及此女何故去之無極對曰臣豈不欲吳然而前知其為人之異也吳在蔡蔡必速飛去吳所以翦其翼也胡傳朝吳蔡之忠臣雖不能存蔡而能復蔡其從於棄疾者謂蔡滅而棄疾必能封之也棄疾以其忠於舊君而信之使居舊國可謂知所信矣則曷為出奔費無極害其寵也無極楚之讒人去朝吳出蔡侯朱喪太子建殺連尹奢屛王耳目使不聰明卒使吳師入郢辱及宗廟讒人為亂可不畏乎為國有九經而尊賢為上勸賢有四事而去讒為首志朝吳出奔而入郢之師兆矣然朝吳身居舊國處危疑之地苟有譖之者則王不能無動也能以忠信自任而杜讒諂之謀則善矣而費無極乃語之曰子亦長矣而在下位辱也欲為之請以名利纍其心而莫之覺不智亦甚矣故特書其出奔以罪吳為後戒也集說范氏寧曰朝吳蔡大夫蔡家氏鉉翁曰楚平存陳蔡若有古人之風然雖存不能國也朝吳仍居蔡費無極傾之故奔其後蔡之二君入楚不復昭侯將見留以賂而免卒復大讎義見於朱之奔東國之死柏舉之戰六月丁巳朔日有食之附録左傳六月乙丑王大子壽卒秋八月戊寅王穆后崩秋晉荀吳帥師伐鮮虞左傳晉荀吳帥師伐鮮虞圍鼓鼓人或請以城叛穆子弗許左右曰師徒不勤而可以獲城何故不為穆子曰吾聞諸叔向曰好惡不愆民知所適事無不濟或以吾城叛吾所甚惡也人以城來吾獨何好焉賞所甚惡若所好何若其弗賞是失信也何以庇民力能則進否則退量力而行吾不可以欲城而邇姦所喪滋多使鼓人殺叛人而繕守備圍鼓三月鼓人或請降使其民見曰猶有食色姑修而城軍吏曰獲城而弗取勤民而頓兵何以事君穆子曰吾以事君也獲一邑而教民怠將焉用邑邑以賈怠不如完舊賈怠無卒棄舊不祥鼓人能事其君我亦能事吾君率義不爽好惡不愆城可獲而民知義所有死命而無二心不亦可乎鼓人告食竭力盡而後取之克鼓而反不戮一人以鼓子䳒鞮歸鼓杜注巨鹿下曲陽縣有鼓聚案下曲陽故城在今直隸真定府晉州西今晉州治即鼓國漢志所謂鼓聚也以鼓城山而名胡傳晉滅潞氏甲氏及再伐鮮虞皆用大夫為主將而或稱人或稱國或稱其名氏何也以殄滅為期而無矜惻之意則稱人見利忘義而以欺詐行之則稱國以正兵加敵而不納其叛臣則稱名氏夫稱名氏非褒之也才免於貶爾而春秋用兵禦敵之略咸見矣集說呂氏大圭曰十二年伐之矣今又遣命卿帥師以伐之晉不能加於楚則從事於鮮虞而已汪氏克寬曰宣十五年荀林父滅潞稱晉師宣十六年士會滅甲氏留吁稱晉人昭十二年荀吳伐鮮虞稱晉此年及定四年五年士鞅伐圍鮮虞哀六年趙鞅伐鮮虞皆稱將稱帥師湛氏若水曰案左氏傳則荀吳不納叛不急利誠為善矣然不能推此加諸彼何耶夫征者正有罪也鮮虞無罪而征之是尚為能充其類也乎不知無罪而征人之國為非義而徒以不納叛不急利之為善是猶紾兄之臂而奪之食姑徐徐云耳冬公如晉左傳冬公如晉平丘之㑹故也集說趙氏鵬飛曰公屢如晉而晉郤之至河乃復以季氏之故也今晉方為魯執季氏而釋之公無所博晉無所庇故聽公一朝焉朝吳氏澄曰平丘之㑹公不與盟大夫被執公既往而不見納辱亦甚矣至此又往朝焉蓋畏大國不敢以辱為恥也附録左傳十二月晉荀躒如周葬穆后籍談為介既葬除喪以文伯宴樽以魯壺王曰伯氏諸侯皆有以鎮撫王室晉獨無有何也文伯揖籍談對曰諸侯之封也皆受明器於王室以鎮撫其社稷故能薦彞器於王晉居深山戎狄之與鄰而逺於王室王靈不及拜戎不暇其何以獻器王曰叔氏而忘諸乎叔父唐叔成王之母弟也其反無分乎密須之鼓與其大路文所以大搜也闕鞏之甲武所以克商也唐叔受之以處參虛匡有戎狄其後襄之二路鏚鉞秬鬯彤弓虎賁文公受之以有南陽之田撫征東夏非分而何夫有勳而不廢有績而載奉之以土田撫之以彝器旌之以車服明之以文章子孫不忘所謂福也福祚之不登叔父焉在且昔而高祖孫伯黶司晉之典籍以為大政故曰籍氏及辛有之二子董之晉於是乎有董史女司典之後也何故忘之籍談不能對賔出王曰籍父其無後乎數典而忘其祖籍談歸以告叔向叔向曰王其不終乎吾聞之所樂必卒焉今王樂憂若卒以憂不可謂終王一嵗而有三年之喪二焉於是乎以喪賔宴又求彝器樂憂甚矣且非禮也彝器之來嘉功之由非由喪也三年之喪雖貴遂服禮也王雖弗遂宴樂以早亦非禮也禮王之大經也一動而失二禮無大經矣言以考典典以志經忘經而多言舉典將焉用之密須杜注姞姓國也在安定隂密縣今隂密故城在陜西平凉府靈臺縣西五十里乙景王十亥九年十有六年晉昭六年齊景二十二年衛靈九年蔡平四年鄭定四年曹平二年陳惠四年把平十年宋元六年秦哀十一年楚平三年吳僚元年春附録左傳十六年春王正月公在晉晉人止公不書諱之也齊侯伐徐左傳齊侯伐徐二月丙申齊師至於蒲隧徐人行成徐子及郯人莒人㑹齊侯盟於蒲隧賂以甲父之鼎叔孫昭子曰諸侯之無伯害哉齊君之無道也興師而伐逺方㑹之有成而還莫之亢也無伯也夫詩曰宗周既滅靡所止戾正大夫離居莫知我肄其是之謂乎蒲隧杜注徐地下邳取慮縣東有蒲如陂今在江南鳯陽府虹縣北甲父杜注古國名高平昌邑縣東南有甲父亭昌邑城今在兗州府金鄉縣西北四十里集說許氏翰曰景公之時吳楚方爭晉既不能遠略以齊之彊務德修政以通天下之志糾合諸侯復霸可也而區區務爭徐伐莒之利志亦卑矣世趙氏鵬飛曰徐自齊桓之霸內從北方宣成襄之不見於經蓋從楚爾昭四年申之㑹徐人在焉楚人以其二於吳也即㑹執之故明年徐從楚伐吳其後世比於楚今楚大亂之後楚平新立齊侯伐徐僥幸其或從也無桓公之德而望桓公之服徐吾見其不自量爾齊侯書爵非褒也杜諤以為别大夫之專兵是也家氏鉉翁曰徐之封在齊南鄙桓公之霸楚成伐徐桓公躬率諸侯盟于牡丘次于匡以救之又出偏師伐厲以攻其所必救非但為徐計亦自為齊計今齊景睥睨晉霸而不能志其逺者乃伐徐以為左右望之計視桓公之保徐有愧多矣李氏廉曰此為晉霸既衰齊景公爭霸之始事盟而不書春秋不忍絶晉也齊景即位於襄二十五年今二十餘年矣自崔慶相殘之後委政二惠及欒髙敗乃始親政不能明政刑以彊其國委任陳氏觀晏子之言而景公之自治疏矣乃欲以無政之國爭彊圖霸宜其不遂振也晉自重丘以賂故不克有功於齊於是亦坐視而莫校矣以汪氏克寬曰楚䖍之立徐屢從楚伐莒昭十二年為二於吳而圍之蓋徐實楚之與國也此年盟蒲隧而遂與齊踰十五年吳卒滅徐則甲父之鼎固不足以保徐之社稷也楚子誘戎蠻子殺之公作戎曼蠻戎蠻杜注河南新城縣東南有城後漢志新城有鄤聚古鄤氏今名蠻中水經注汝水自梁縣東徑麻解城北故鄤鄉城也蠻麻聲近故誤耳章懷太子曰蠻中聚在梁縣東南今河南南陽府汝州西南有蠻城是其處也左傳楚子聞蠻氏之亂也與蠻子之無質也使然丹誘戎蠻子嘉殺之遂取蠻氏既而復立其子焉集說家氏鉉翁曰書誘書殺蓋罪之深皆以子稱見雖有大小彊弱之不同而於周班皆為子不得擅相侵陵況誘而殺之乎氏余氏光曰戎蠻戎之别種其稱戎猶赤狄之有潞甲氏留吁舒之有舒蓼舒庸舒鳩也戎蠻既稱子則安於王化而服從晉伯者也特以地在申葉許鄭之西而南界楚之白羽故楚人誘蠻子而殺之左氏謂以蠻子無質豈非為其從晉乎誘而後殺不昜屈也案楚聞蠻氏之亂誘蠻子而殺之其罪大矣復立其子安得為禮乎左氏之說謬也附録左傳三月晉韓起聘於鄭鄭伯享之子産戒曰苟有位於朝無有不共恪孔張後至立於客間執政禦之適客後又禦之適縣間客從而笑之事畢富子諫曰夫大國之人不可不慎也幾為之笑而不陵我我皆有禮夫猶鄙我國而無禮何以求榮孔張失位吾子之恥也子産怒曰發命之不衷出令之不信刑之頗類獄之放紛㑹朝之不敬使命之不聽取陵於大國罷民而無功罪及而弗知僑之恥也孔張君之昆孫子孔之後也執政之嗣也為嗣大夫承命以使周於諸侯國人所尊諸侯所知立於朝而祀於家有祿於國有賦於軍喪祭有職受脤歸脤其祭在廟已有著位在位數世世守其業而忘其所僑焉得恥之辟邪之人而皆及執政是先王無刑罰也子寧以他規我宣子有環其一在鄭商宣子謁諸鄭伯子産弗與曰非官府之守器也寡君不知子大叔子羽謂子産曰韓子亦無幾求晉國亦未可以二晉國韓子不可偷也若屬有讒人交鬬其間鬼神而助之以興其凶怒悔之何及吾子何愛於一環其以取憎於大國也盍求而與之子産曰吾非偷晉而有二心將終事之是以弗與忠信故也僑聞君子非無賄之難立而無令名之患僑聞為國非不能事大字小之難無禮以定其位之患夫大國之人令於小國而皆獲其求將何以給之一共一否為罪滋大大國之求無禮以斥之何饜之有吾且為鄙邑則失位矣若韓子奉命以使而求玉焉貪淫甚矣獨非罪乎出一玉以起二罪吾又失位韓子成貪將焉用之且吾以玉賈罪不亦鋭乎韓子買諸賈人既成賈矣商人曰必告君大夫韓子請諸子産曰日起請夫環執政弗義弗敢復也今買諸商人商人曰必以聞敢以為請子産對曰昔我先君桓公與商人皆出自周庸次比耦以艾殺此地斬之蓬蒿藜藋而共處之世有盟誓以相信也曰爾無我叛我無彊賈母或丐奪爾有利市寶賄我勿與知恃此質誓故能相保以至於今今吾子以好來辱而謂敝邑彊奪商人是教敝邑背盟誓也毋乃不可乎吾子得玉而失諸侯必不為也若大國令而共無藝鄭鄙邑也亦弗為也僑若獻玉不知所成敢私布之韓子辭玉曰起不敏敢求玉以徼二罪敢辭之夏四月鄭六卿餞宣子於郊宣子曰二三君子請皆賦起亦以知鄭志子齹賦野有蔓草宣子曰孺子善哉吾有望矣子産賦鄭之羔裘宣子曰起不堪也子大叔賦褰裳宣子曰起在此敢勤子至於他人乎子大叔拜宣子曰善哉子之言是不有是事其能終乎子游賦風雨子旗賦有女同車子桞賦蘀兮宣子喜曰鄭其庶乎二三君子以君命貺起賦不出鄭志皆昵燕好也二三君子數世之主也可以無懼矣宣子皆獻馬焉而賦我將子産拜使五卿皆拜曰吾子靖亂敢不拜德宣子私覲於子産以玉與馬曰子命起舍夫玉是賜我玉而免吾死也敢不藉手以拜夏公至自晉左傳公至自晉子服昭伯語季平子曰晉之公室其將遂卑矣君幼弱六卿彊而奢傲將因是以習習實為常能無卑乎平子曰爾幼惡識國胡傳昭公數朝於晉三至於河而不得入兩得見晉侯又欲討其罪而止旃其困辱亦甚矣在易之困曰困亨者因困窮而致亨也夫困於心衡於慮而後作徵於色發於聲而後喻此正憤悱自彊之時而夏少康衛文公越勾踐燕昭王四君子者由此其選也今昭公安於危辱無激昻勉勵之志即所謂自暴自棄不可與有為而人亦莫之告矣不亦悲乎諱而不書深貶之也集說家氏鉉翁曰公如晉踰歲涉三時之久乃還意如陷其君也其後公興兵討之勢不容己論者謂為啓釁非也與汪氏克寬曰十二年莒人訴取郠十三年平丘不盟執意如士文伯辭公二十一年辭將伐鮮虞惟二十三年有疾乃復又二年辭弔少姜非朝又曰公行一百七十有六惟僖公十七年十二月㑹淮明年九月書至襄公二十八年十一月如楚明年五月書至昭公去年冬如晉今夏書至皆受制於大國踰三時而始返雖不書晉人止公考其時則微傳而事著矣秋八月己亥晉侯夷卒左傳秋八月晉昭公卒集說家氏鉉翁曰晉之衰始於平成於昭頃以逮於亡李氏廉曰晉昭立於昭公之十年在位日淺僅有厥憖平丘之㑹其餘則再伐鮮虞而已李氏曰晉至平昭伯事陵遲隳廢春秋所書皆録變之大者也平公五盟六㑹服齊狄寧東夏平秦亂城淳于晉祁午數當時之功如此然內有變而不知外有患而不悟尚何有功足云哉尊為邦君而授權於大夫此湨梁之㑹平公所謂內有變而不知者也身主夏盟而授權於荆蠻此宋之盟平公所謂外有患而不悟者也湨梁之事諸侯在㑹而大夫實主載書是委權以與之也荀偃一怒而十二國興戎後五年欒盈之變作曲沃之民惟主樂氏不知公室晉幾分國而竝立矣宋之盟晉主夏盟而挈諸侯以畀楚是棄權以假之也虢之㑹再讀舊書後八年楚靈㑹于申實用齊桓召陵之典晉蓋十年無與國之事矣至於昭公之政則又微矣僅一㑹大夫一盟諸侯方楚䖍辱於乾溪北方庶幾復伯為晉君臣者改物厲志憤悱警懼以率舊烈猶恐不逮今也四方未觀德而虒祁崇侈以啓二列國未聞信而邾南盛兵以示汰平丘雖曰同盟齊敢拒令鄭敢爭承衛病芻蕘之擾魯困蠻夷之訴坐視諸侯之去而不之顧況能駕敵國哉冝乎晉之卑也九月大雩左傳九月大雩旱也附録左傳鄭大旱使屠擊祝款豎柎有事於桑山斬其木不雨子産曰有事於山藝山林也而斬其木其罪大矣奪之官邑季孫意如如晉冬十月葬晉昭公左傳冬十月季平子如晉葬昭公平子曰子服回之言猶信子服氏有子哉丙景王二子十年十有七年晉頃公去疾元年齊景二十三年衛靈十年蔡平五年鄭定五年曹平三年陳惠五年把平十一年宋元七年秦哀十二年楚平四年吳僚二年春小邾子來朝左傳十七年春小邾穆公來朝公與之燕季平子賦采叔穆公賦菁菁者莪昭子曰不有以國其能久乎集說汪氏克寬曰三年小邾穆公來朝至是十有五年再朝於昭公也郝氏敬曰魯既卑矣小國猶有朝者晉亦卑矣諸侯猶有往者此不畏其君而畏彊臣耳以力服人諸侯不可況大夫乎夏六月甲戌朔日有食之左傳夏六月甲戌朔日有食之祝史請所用幣昭子曰日有食之天子不舉伐鼓於社諸侯用幣於社伐鼓於朝禮也平子禦之曰止也唯正月朔慝未作日有食之於是乎有伐鼓用幣禮也其餘則否大史曰在此月也日過分而未至三辰有災於是乎百官降物君不舉辟移時樂奏鼓祝用幣史用辭故夏書曰辰不集于房瞽奏鼓嗇夫馳庶人走此月朔之謂也當夏四月是謂孟夏平子弗從昭子退曰夫子將有異志不君君矣集說杜氏預曰正月謂建巳正陽之月於周為六月於夏為四月孔氏穎逹曰尚書云乃季秋月朔辰弗集於房彼季秋日食亦以此禮救之傳言惟正月朔日食乃有伐鼓用幣餘月則否引夏書而與夏書違者蓋先代尚質凡有日食皆用鼓幣周禮極文周家禮法見事有差降惟正陽之月特用鼓幣餘月則否秋郯子來朝左傳秋郯子來朝公與之宴昭子問焉曰少皞氏鳥名官何故也郯子曰吾祖也我知之昔者黃帝氏以雲紀故為雲師而雲名炎帝氏以火紀故為火師而火名共工氏以水紀故為水師而水名大皞氏以龍紀故為龍師而龍名我高祖少皞摯之立也鳯鳥適至故紀於鳥為鳥師而鳥名鳳鳥氏厯正也𤣥鳥氏司分者也伯趙氏司至者也青鳥氏司啓者也丹鳥氏司閉者也祝鳩氏司徒也鴡鳩氏司馬也鳲鳩氏司空也爽鳩氏司寇也鶻鳩氏司事也五鳩鳩民者也五雉為五工正利器用正度量夷民者也九扈為九農正扈民無淫者也自顓頊以來不能紀逺乃紀於近為民師而命以民事則不能故也仲尼聞之見於郯子而學之既而告人曰吾聞之天子失官學在四夷猶信集說趙氏鵬飛曰小國之朝大國以其勢力足以庇小也魯方自庇不暇何暇庇人小邾子及郯子來朝蓋亦無益矣知家氏鉉翁曰周魯俱衰典章闕壞而小國之君乃前古官名之沿革蓋録之也黃氏正憲曰左氏載昭子問官之對仲尼見而學之然孔子刪書斷自唐虞而下至於論官惟曰揆嶽牧伯公孤卿士等職而已若雲火龍鳥之類不少概見何哉蓋上古時朴事簡故可因瑞紀事以名其官中古文明漸開世變事繁故必分職正名命以民事孔子欲立萬世宜民之道是以舍逺而取近也郯子乃譏顓頊以來不能紀逺而紀近則聖人固有以折衷之矣所謂多聞擇其善者而從之者非耶八月晉荀吳帥師滅陸渾之戎公作賁渾戎榖無之字左傳晉侯使屠蒯如周請有事於雒與三塗萇𢎞謂劉子曰客容猛非祭也其伐戎乎陸渾氏甚睦於楚必是故也君其備之乃警戎備九月丁卯晉荀吳帥師涉自棘津使祭史先用牲於雒陸渾人弗知師從之庚午遂滅陸渾數之以其二於楚也陸渾子奔楚其衆奔甘鹿周大獲宣子夢文公攜荀吳而授之陸渾故使穆子帥師獻俘於文宮棘津杜注河津名水經注河水經東燕故城北則有濟水北來注之有棘津之名亦謂之石濟津故南津也今在河南衛輝府胙城縣北山甘鹿杜注周地今河南河南府宜陽縣有鹿蹄甘水所出疑甘鹿以此得名水經注鹿蹄山在陸渾故城西北以傳文證之似亦可據集說高氏閌曰宣三年楚子伐陸渾之戎自是陸渾睦於楚至是荀吳滅之家氏鉉翁曰書名書滅謂之非貶不可僖二十二年秦晉遷陸渾之戎於伊川非戎人侵犯王略自外居內也荀吳忽襲滅其國慘矣若謂其二於楚則諸侯莫不皆二何獨於陸渾有伐乎汪氏克寬曰陸渾之戎本居秦晉之西北在荒服之外自僖之二十二年晉乃與秦遷之於伊川侵逼王畿則是晉人始謀不臧之過也今也與楚爭彊掩其不備而滅之蓋不足以贖前過矣王王氏樵曰書晉荀吳帥師滅陸渾之戎罪之也無命動大衆不顧郊甸之震驚掩其不備利而取之不待貶絶而見矣或者猶謂此役異於闢土服遠而得無貶者失之矣襲王氏錫爵曰晉非為王室除患乃因其二楚而隂之使非萇𢎞先見戎備素警則為王室之震驚也大矣冬有星孛于大辰左傳冬有星孛于大辰西及漢申須曰彗所以除舊布新也天事恆象今除於火火出必布焉諸侯其有火災乎梓愼曰往年吾見之是其徵也火出而見今兹火出而章必火入而伏其居火也久矣其與不然乎火出於夏為三月於商為四月於周為五月夏數得天若火作其四國當之在宋衛陳鄭乎宋大辰之虛也陳大皞之虗也鄭祝融之虛也皆火房也星孛及漢漢水祥也衛顓頊之虛也故為帝丘其星為大水水火之牡也其以丙子若壬午作乎水火所以合也若火入而伏必以壬午不過其見之月鄭裨竈言於子産曰宋衛陳鄭將同日火若我用瓘斝玉瓚鄭必不火子産弗與公羊孛者何彗星也其言于大辰何在大辰也大辰者何大火也大火為大辰伐為大辰北辰亦為大辰何以書記異也穀梁一有一亡曰有于大辰者濫于大辰也胡傳大辰心也心為明堂天子之象其前星太子後星庶子孛星加心象天子適庶將分爭也後五年景王崩王室亂劉子單子立王猛尹氏召伯立子朝歷數載而後定至哀十三年有星孛于東方不言宿名者不加宿也當是時吳人僭亂慿陵上國日敝於兵暴骨如莽其戾氣所感固將壅吳而降之罰也故氛祲所指在於東方假手越人吳國遂滅天之示人顯矣史之有占明矣集說杜氏預曰大辰房心尾也妖變非常故書之孔氏穎逹曰釋天云大辰房心尾也大火謂大辰李巡云大辰蒼龍宿之體最為明故曰房心尾也大火蒼龍宿心以候四時故曰辰孫炎曰龍星明者以為時候故曰大辰大火也心在中最明故時候主焉公羊傳曰孛者何彗星也彗為帚也言其狀似掃帚光芒孛孛然妖變之星非常所有故書之傳稱孛于大辰西經直書于大辰者雖在其星之西仍在大辰分度之內故直云于大辰大孫氏復曰孛彗之屬孛于大辰者在大辰也大辰火許氏翰曰星孛大辰火災應之天地之符也大辰明堂當宋之分故王室亂宋亦亂衛陳鄭災氣所溢也衛亂君奔陳敗卿獲唯鄭有令政而無後災是知禍福之可轉也敬余氏光曰季氏曰古者厯象日月星辰所重在於授人時故溫凉寒暑得其正而後作成訛易順其常時有愆忒則生育違氣有氛祲則淫邪作非細故也是以聖人修政務求合天君臣一德罔敢不誠觀允釐百工庶績咸熙之言可以見其所重在此因時自考非苟應虛文而已至於星之有名或以其形或以其位或以其事或以其人星本無名名因象立上别三垣下分列宿所以定天體紀日躔初無預於占驗也故不言事應而事應具存焉春秋時始以辰為商星參為晉星龍為宋鄭之星鶉火為周分而分野之說因之以起循至戰國游談之士附為惑世之言凡占休咎類主星名殊不知名星之次雜出無倫而事變無窮亦非星名所能盡紀其說有不可通者而率以私智推求偶有神合遂謂天常是先王敬授人時之實理反為術家之所晦矣故彗孛之流氛祲之大者其為咎徵明矣而王室嫡庶分爭在五年之後乃其偶合者耳豈專屬加心之應哉楚人及吳戰于長岸長岸杜注楚地今江南太平府當塗縣西南三十里有西梁山與東梁山夾江相對如門之闢亦曰天門山郡國志天門山一名娥眉山春秋楚獲吳乘舟餘皇處也左傳吳伐楚陽丐為令尹卜戰不吉司馬子魚曰我得上流何故不吉且楚故司馬令龜我請改卜令曰魴也以其屬死之楚師繼之尚大克之吉戰于長岸子魚先死楚師繼之大敗吳師獲其乘舟餘皇使隨人與後至者守之環而塹之及泉盈其隧炭陳以待命吳公子光請於其衆曰喪先王之乘舟豈惟光之罪衆亦有焉請籍取之以救死衆許之使長鬛者三人潛伏於舟側曰我呼餘皇則對師夜從之三呼皆迭對楚人從而殺之楚師亂吳人大敗之取餘皇以歸胡傳言戰不言敗勝負敵也楚地五千里帶甲數十萬戰勝諸侯威服天下本非吳敵也惟不能去讒賤貨使費無極以讒勝囊瓦以貨行而策士竒才為敵國用故日以侵削至雞父之師七國皆敗柏舉之戰國破君奔幾於亡滅吳日益彊而楚削矣是故為國必以得賢為本勸賢必以去讒賤貨為先不然雖廣土衆民不足恃也考其所書本末彊弱之由其為後世戒明矣集說劉氏敞曰穀梁云進楚子故曰戰非也戰則云戰敗則云敗豈擇於吳楚哉陳氏傅良曰此楚令尹陽丐也書人吳公子光也書國略之也楚之君大夫不見於春秋者十八年而吳入郢矣五年吳嘗敗楚於鵲岸不書六年敗楚於房鍾不書書伐吳而已於是始書戰則以吳楚敵言之也汪氏克寬曰楚先勝吳吳後復勝楚至季氏本曰長岸杜元凱以為楚地蓋吳兵楚境而禦之也丁景王二丑十一年十有八年晉頃二年齊景二十四年衛靈十一年蔡平六年鄭定六年曹平四年陳惠六年把平十二年宋元八年秦哀十三年楚平五年吳僚三年春附録左傳十八年春王二月乙卯周毛得殺毛伯過而代之萇𢎞曰毛得必亡是昆吾稔之日也侈故之以而毛得以濟侈於王都不亡何待集說王氏錫爵曰毛得之必亡也論其理則然惡在其為昆吾稔之日哉脫非乙卯得遂保有其位乎則將謂不道而殺人者遇良日焉而可為哉王三月曹伯須卒左傳三月曹平公卒夏五月壬午宋衛陳鄭災左傳夏五月火始昏見丙子風梓愼曰是謂融風火之始也七日其火作乎戊寅風甚壬午大甚宋衛陳鄭皆火梓愼登大庭氏之庫以望之曰宋衛陳鄭也數日皆來告火禆竈曰不用吾言鄭又將火鄭人請用之子産不可子大叔曰寶以保民也若有火國幾亡可以救亡子何愛焉子産曰天道逺人道邇非所及也何以知之竈焉知天道是亦多言矣豈不或信遂不與亦不復火鄭之未災也里析告子産曰將有大祥民震動國幾亡吾身泯焉弗良及也國遷其可乎子産曰雖可吾不足以定遷矣及火里析死矣未葬子産使輿三十人遷其柩火作子産辭晉公子公孫於東門使司寇出新客禁舊客勿出於宫使子寬子上巡羣屛攝至於大宮使公孫登徙大龜使祝史徙主祏於周廟告於先君使府人庫人各警其事商成公警司宮出舊宮人置諸火所不及司馬司寇列居火道行火所焮城下之人伍列登城明日使野司寇各保其徵郊人助祝史除於國北禳火於𤣥冥回祿祈於四鄘書焚室而寬其征與之材三日哭國不市使行人告於諸侯宋衛皆如是陳不救火許不弔災君子是以知陳許之先亡也公羊何以書記異也何異爾異其同日而俱災也外異不書此何以書為天下記異也穀梁其志以同日也胡傳禆竈所言蓋以象推非妄也而鄭不復火者子産當國方有令政此以德消變之驗矣是知吉凶禍福固冇可移之理古人所以必先人事而後言命也集說杜氏預曰來告故書也孔氏穎逹曰傳稱皆來告火知是來告故書春秋書他國之災皆是來告而書公羊傳曰異其同日而俱災為天下記異也榖梁亦云其志以同日也杜因此傳有來告之文故顯而異之而孫氏復曰宋衛陳鄭同日而災也宋衛陳鄭同日災異之甚者劉氏敞曰四國同日而俱災非人力所為也穀梁曰人有謂鄭子産曰某日有災子産曰天者神子惡知之是人也同日而為四國災此非智者之語何足為說也案四國皆來告火故春秋書其事杜注是也然同日而四國俱災其異甚矣公榖之說亦可竝存六月邾人入鄅鄅杜注琅琊開陽縣水經注開陽在祊之東南沂水徑其南故鄅國也今山東兗州府沂州北十五里有開陽故城左傳六月鄅人藉稻邾人襲鄅鄅人將閉門邾人羊羅攝其首焉遂入之盡俘以歸鄅子曰余無歸矣從帑於邾邾莊公反鄅夫人而舍其女集說趙氏鵬飛曰春秋小國真蜂蠆也晞大陽之溫則肆其毒邾子見削於魯亦甚矣今少安其巢則毒螫之心生鄅何慊於邾邾人乘其不虞而縱兵入其郛蓋以前日失鄆失鄫失漷東田故僥幸於鄅庶或掩其不備取此以償彼也是誠可疾故曰邾人入鄅書人書入賤之也汪氏克寬曰書以惡邾且為宋公伐邾起也恐季氏本曰鄅宋姻也宋為大國近在邾南事大猶獲戾而無故入鄅非召兵之道乎秋葬曹平公左傳秋葬曹平公往者見周原伯魯焉與之語不說學歸以語閔子馬閔子馬曰周其亂乎夫必多有是說而後及其大人大人患失而惑又曰可以無學無學不害不害而不學則苟而可於是乎下陵上替能無亂乎夫學殖也不學將落原氏其亡乎附録左傳七月鄭子産為火故大為社祓禳於四方振除火災禮也乃簡兵大搜將為搜除子大叔之廟在道南其寢在道北其庭小過期三日使除徒陳於道南廟北曰子産過女而命速除乃毁於而鄉子産朝過而怒之除者南毁子産及衝使從者止之曰毁於北方火之作也子産授兵登陴子大叔曰晉無乃討乎子産曰吾聞之小國忘守則危況有災乎國之不可小有備故也既晉之邊吏讓鄭曰鄭國有災晉君大夫不敢寧居卜筮走望不愛牲玉鄭之有災寡君之憂也今執事􅏌然授兵登陴將以誰罪邊人恐懼不敢不告子産對曰若吾子之言敝邑之災君之憂也敝邑失政天降之災又懼讒慝之間謀之以啓貪人薦為敝邑不利以重君之憂幸而不亡猶可說也不幸而亡君雖憂之亦無及也鄭有他竟望走在晉既事晉矣其敢有二心集說王氏錫爵曰禆竈請禳子産既拒之曰天道逺人道邇不可謂非正論而兹復大為社祓禳於四方以振除火災何歟冬許遷于白羽左傳楚左尹王子勝言於楚子曰許於鄭仇敵也而居楚地以不禮於鄭晉鄭方睦鄭若伐許而晉助之楚喪地矣君盍遷許許不專於楚鄭方有令政許曰余舊國也鄭曰余俘邑也葉在楚國方城外之蔽也土不可易國不可小許不可俘讎不可啓君其圖之楚子說冬楚子使王子勝遷許於析實白羽集說杜氏預曰自葉遷也許孔氏穎逹曰成十五年許遷于葉自是以後常以葉為都九年許遷于夷是自葉遷于夷也十三年傳曰楚之滅蔡也靈王遷許胡沈道房申於荆焉平王即位既封陳蔡而皆復之禮也注云荆荆山也滅蔡在十一年許又從夷遷於荆山平王復之復其本國許又歸於葉也故知此年遷于白羽是其自葉遷也且傳云葉在楚方城外之蔽明其欲遷之時許在葉也案傳王子勝言於楚子使之遷許則是楚人遷許非許自遷楚雖發意遷許許亦畏鄭樂遷故以自遷為文若許不樂遷楚彊遷之當云楚人遷許如宋人遷宿齊人遷陽之類不得云許遷于白羽其以自遷為文知許人自樂遷也復胡氏寧曰本所以存許非彊之也遷汪氏克寬曰封陳蔡而許亦遷葉故今自葉而許至是三遷矣戊景王二寅十二年十有九年晉頃三年齊景二十五年衛靈十二年蔡平七年鄭定七年曹悼公午元年陳惠七年把平十三年宋元九年秦哀十四年楚平六年吳僚四年春附録左傳十九年春楚工尹赤遷隂於下隂令尹子瑕城郟叔孫昭子曰楚不在諸侯矣其僅自完也以持其世而已即楚子之在蔡也郹陽封人之女奔之生大子建及位使伍奢為之師費無極為少師無寵焉欲譖諸王曰建可室矣王為之聘於秦無極與逆勸王取之正月楚夫人嬴氏至自秦隂杜注隂縣屬南鄉郡今湖廣襄陽府光化縣西漢水西岸有古隂縣城即下隂邑也郹陽杜注蔡邑當在新蔡境宋公伐邾左傳鄅夫人宋向戌之女也故向寧請師二月宋公伐邾圍蟲三月取之乃盡歸鄅俘邾人郳人徐人㑹宋公乙亥同盟於蟲蟲杜注邾邑當在濟寧州東境胡傳案左氏宋公伐邾圍蟲取之而經不書圍與取何也初鄅人藉稻邾人襲鄅盡俘之鄅子曰余無歸矣從帑於邾邾子反其夫人而舍其女夫人宋向戌之女也故向寧請師圍蟲取之盡歸鄅俘此所謂聲罪執言之兵歸鄅之俘其善意也故書伐邾而釋其取邑之罪此亦善善長惡惡短之義集說髙氏閌曰天下無霸而宋元於此一正入鄅之亂是以春秋録而進之家氏鉉翁曰凡書爵而書侵伐者多貶此繼邾人入鄅而書宋公伐邾則與宋公之討有罪也卓氏爾康曰邾以蕞爾小邦而侵魯鄙用鄫子黠驁素甚故宋元親討之以懲其暴橫不苐為向戌報女怨也夏五月戊辰許世子止弒其君買左傳夏許悼公瘧五月戊辰飲大子止之藥卒大子奔晉書曰弒其君君子曰盡心力以事君舍藥物可也穀梁止不弒而曰弒責止也止曰我與夫弒者不立乎其位以與其弟虺哭泣啜飦粥嗌不容粒未踰年而死故君子即止自責而責之也胡傳案左氏許悼公瘧戊辰飲世子止之藥卒書曰弒其君者止不嘗藥也古者醫不三世不服其藥夫子之所愼者三疾居其一季康子饋藥曰丘未逹不敢嘗敬愼其身如此也而於君父可忽乎君有疾飲藥臣先嘗之父有疾飲藥子先嘗之蓋言愼也止不擇醫而輕用其藥藥不先嘗而誤進於君是有忽君父之心而不愼矣自小人之情度之世子弒君欲速得其位而止無此心故曰我與夫弒者不立乎其位哭泣啜飦粥嗌不容粒未逾年而卒無此心故被以大惡而不受自君子聼之止不嘗藥是忽君父之尊而不愼也而止有此心忽君父之尊而不愼此篡弒之萌堅冰之漸而春秋之所謹也有此心故加以大惡而不得辭書許世子止弒君乃除惡於微之意也而或者顧以操刃而殺與不躬進藥及進藥而不嘗三者罪當殊科疑於三傳之說則誤矣必若此言夫人而能為春秋奚待於聖筆乎墨翟兼愛豈其無父楊朱為我豈其無君孟軻氏辭而闢之以為禽獸逼人人將相食後世推明其功不在禹下未有譏其過者知此說則知止不嘗藥春秋以為弒君之意矣集說劉氏敞曰榖梁云日弒正卒也非也州吁無知督萬商臣趙盾歸生夏徵舒崔抒寧喜弒君皆書日可云皆正卒乎春秋褒貶豈不明恃日月而後見之此泥而不通也蘇氏轍曰許悼公瘧飲世子止之藥而卒其以弒書之何也止雖不志乎弒其君由止以卒則亦止弒之也君由止以卒而不以弒君書之則臣將輕其君子將輕其父亂之道也故止之弒君雖異乎楚商臣蔡般也而春秋一之所以隆君父也今律過失殺人以贖論過失殺朞尊減殺人二等過失殺大父母減殺人一等而和御藥誤不如法者死父子之親許以情論至於君臣則情不勝法此蓋春秋之遺意也胡氏寧曰悼公不起是飲非其藥而致卒也止不嘗藥是有忽君父之心而不敬也樂正子下堂傷足而有憂色跬步之間猶不敢忘父母況父母之疾而可輕之乎氏陳氏傅良曰哀姜慶父弒閔公書曰公薨夫人姜孫于邾公子慶父出奔莒則罪人斯得矣許悼公飲世子止之藥而卒世子奔晉世子止誠不嘗藥爾春秋將為後人戒書曰世子止弒其君不言奔可也言張氏洽曰藥劑所以致人之死者非一端姑以瘧之今之治瘧以砒煆而餌之多愈然煅不得法而反殺人者多矣悼公之死必此類也然止以弒書何也孟子曰殺人以梃與刃有以異乎曰無以異也以刃與政有以異乎曰無以異也進藥而藥殺可不謂之弒哉其所以異於商臣蔡般者過與故不同耳心雖不同而春秋之文一施之者以臣子之於君父不可過也萬氏孝恭曰許止之事雖若可恕萬一後世臣子幸君父之疾進藥以斃之而自附於不知嘗藥之義是啓之為亂原也止李氏廉曰春秋加趙盾弒君訓人以臣道也加許弒君訓人以子道也二事相類然晉靈公不書葬而許悼公書葬者許止自責逾年而卒其心可知矣趙盾力能討賊而不討春秋不得不終誅之也若陳氏因左氏止奔晉之說而疑止真弒父則又恐未可以一家一句而盡廢諸傳之文也汪氏克寬曰悼公在位二十四年世子止之弟斯立是為元公所金氏賢曰自左氏之說而觀之則是藥不由醫止進也悼公之死藥所致也胡文定公謂忽其君父者是矣自榖梁之說而觀之止痛父之死咎巳之深豈有殺其君父之心哉特以未逹藥性製之不精用之不當以誤之耳歐陽文忠公謂止實弒君者誤矣或曰藥以誤君固有罪矣然與弒其父者殊科書弒可乎曰藥出於止而君死於藥非弒而何書以大惡非彊加之也故書曰許世子止弒其君買案許止弒君三傳不同要之皆以為非弒而公羊聽止赦止之說更為允當蓋止之非弒有屬辭比事而知之者春秋世子弒君者三楚商臣蔡般皆立乎其位而止則弗立乎其位者也此比事而可知者也許與陳蔡皆密邇於楚楚䖍能假討賊之名以滅陳蔡何棄疾獨釋許不問乎況白羽既遷楚方引許以自近也此屬辭而可知者也止之非弒亦明矣聖人所以書弒者蓋以悼公之死由於世子之藥則止雖非弒而弒君之罪止有不得而辭者故加弒焉所以教天下之為臣子者也諸儒紛紛謂止實進毒以弒其君不亦過乎左氏以為止奔晉榖梁以為止未踰年而死二說不同今無所考姑兩存之己卯地震集說汪氏克寬曰經書地震者五昭公之世再見此年及二十三年是也夫地道安靜以震動為反常之異臣道恭順以悖逆為犯上之惡是時季孫彊僭巳甚天之示變欲人君之有所警而以德銷之也昭公漫不知省遄及於難悲夫附録左傳楚子為舟師以伐濮費無極言於楚子曰晉之伯也邇於諸夏而楚辟陋故弗能與爭若大城城父而置大子焉以通北方王收南方是得天下也王說從之故大子建居於城父令尹子瑕聘於秦拜夫人也濮案百濮叛楚杜注夷也昭元年趙孟曰吳濮有釁杜注建寧郡南有濮夷此年楚子伐濮杜注南夷三注不同蓋種族不同而約言其地當在楚之西南境秋齊高發帥師伐莒左傳秋齊高發帥師伐莒莒子奔紀鄣使孫書伐之初莒有婦人莒子殺其夫已為嫠婦及老託於紀鄣紡焉以度而去之及師至則投諸外或獻諸子占子占使師夜縋而登登者六十人縋絶師鼓譟城上之人亦譟莒共公懼啓西門而出七月丙子齊師入紀紀鄣杜注莒邑也東海贛榆縣有紀城寰宇記云在縣東北七十五里今山東莒州即江南贛榆縣界也集說高氏閌曰莒不事齊故徒汪氏克寬曰齊景爭伯之心不下於僖桓而計近功汲汲焉有事於徐莒以晏子之賢為之輔佐而亦不能有所匡正則所謂以其君顯者何足稱哉冬葬許悼公公羊賊未討何以書葬不成於弒也曷為不成於弒止進藥而藥殺也止進藥而藥殺則曷為加弒焉爾譏子道之不盡也其譏子道之不盡奈何曰樂正子春之視疾也復加一飯則脫然愈復損一飯則脫然愈復加一衣則脫然愈復損一衣則脫然愈止進藥而藥殺是以君子加弒焉爾曰許世子止弒其君買是君子之聽止也葬許悼公是君子之赦止也赦止者免止之罪辭也胡傳何以書葬榖梁子曰不使止為弒父也其說曰子既生不免乎水火母之罪也羈貫成童不就師傅父之罪也就師學問無方心志不通身之罪也心志既通而名譽不聞友之罪也名譽既聞有司不舉有司之罪也有司舉之王者不用王者之過也許世子止不知嘗藥纍及許君也觀止自責可謂有過人之質矣乃至以弒君獲罪此為人臣子而不知春秋之義者也古者太子自其初生固舉以禮有司端冕見之南郊過闕則下過廟則趨為赤子而其教已有齊肅敬愼之端矣此春秋訓臣子除惡於微積善於早之意也集說家氏鉉翁曰或問蔡般之弒景許止之弒悼皆書葬同乎否乎曰其弒異其葬烏得而同姚氏舜牧曰悼公書弒著世子止有弒君之事是謹嚴春秋悼公書葬明世子止無弒君之心是忠恕春秋附録左傳是嵗也鄭駟偃卒子游娶於晉大夫生絲弱其父兄立子瑕子産憎其為人也且以為不順弗許亦弗止駟氏聳他日絲以告其舅冬晉人使以幣如鄭問駟乞之立故駟氏懼駟乞欲逃子産弗遣請龜以卜亦弗豫大夫謀對子産不待而對客曰鄭國不天寡君之二三臣札瘥夭昏今又喪我先大夫偃其子幼弱其一二父兄懼隊宗主私族於謀而立長親寡君與其二三老曰抑天實剝亂是吾何知焉諺曰無過亂門民有兵亂猶憚過之而況敢知天之所亂今大夫將問其故抑寡君實不敢知其誰實知之平丘之㑹君尋舊盟曰無或失職若寡君之二三臣其即世者晉大夫而專制其位是晉之縣鄙也何國之為辭客幣而報其使晉人舍之旗楚人城州來沈尹戌曰楚人必敗昔吳滅州來子請伐之王曰吾未撫吾民今亦如之而城州來以挑吳能無敗乎侍者曰王施舍不倦息民五年可謂撫之矣戍曰吾聞撫民者節用於內而樹德於外民樂其性而無寇讎今宮室無量民人日駭勞罷死轉忘寢與食非撫之也産鄭大水龍鬬於時門之外洧淵國人請為禜焉子弗許曰我鬬龍不我覿也龍鬬我獨何覿焉禳之則彼其室也吾無求於龍龍亦無求於我乃止也令尹子瑕言蹶由於楚子曰彼何罪諺所謂室於怒市於邑者楚之謂矣舍前之忿可也乃歸蹶由洧淵杜注洧水出滎陽密縣至長平入潁案今洧水自密縣東流經新鄭縣南門又東㑹溱水謂之雙洎河即洧淵也己景王二卯十三年二十年晉頃四年齊景二十六年衛靈十三年蔡平八年鄭定八年曹悼二年陳惠八年把平十四年宋元十年秦哀十五年楚平七年吳僚五年春王正月附録左傳二十年春王二月己丑日南至梓愼望氛曰今兹宋有亂國幾亡三年而後弭蔡有大喪叔孫昭子曰然則戴桓也汰侈無禮已甚亂所在也費無極言於楚子曰建與伍奢將以方城之外叛自以為猶宋鄭也齊晉又交輔之將以害楚其事集矣王信之問伍奢伍奢對曰君一過多矣何信於讒王執伍奢使城父司馬奮揚殺大子未至而使遣之三月大子建奔宋王召奮揚奮揚使城父人執已以至王曰言出於余口入於爾耳誰告建也對曰臣告之君王命臣曰事建如事余臣不佞不能苟二奉初以還不忍後命故遣之既而悔之亦無及已王曰而敢來何也對曰使而失命召而不來是再奸也逃無所入王曰歸從政如他日無極曰奢之子材若在吳必憂楚國盍以免其父召之彼仁必來不然將為患王使召之曰來吾免而父棠君尚謂其弟員曰爾適吳我將歸死吾知不逮我能死爾能報聞免父之命不可以莫之奔也親戚為戮不可以莫之報也奔死免父孝也度功而行仁也擇任而往知也知死不辟勇也父不可棄名不可廢爾其勉之相從為愈伍尚歸奢聞員不來曰楚君大夫其旰食乎楚人皆殺之員如吳言伐楚之利於州于公子光曰是宗為戮而欲反其讎不可從也員曰彼將有他志余姑為之求士而鄙以待之乃見鱄設諸焉而耕於鄙集說杜氏預曰是歲朔旦冬至之歲也當言正月己丑朔日南至時史失閏閏更在二月後故經因史而書正月傳更具於二月記南至日以正歷也之孔氏穎逹曰厯法十九年為一章章首之歲必周正月朔旦冬至僖五年正月辛亥朔日南至是章首之歲年也計僖五年至往年合一百三十三年是為七章今年復為章首故曰是歲朔旦冬至之歲也朔旦冬至謂正月之朔當言正月己丑朔日南至今傳乃云二月己丑日南至是錯名正月為二月也厯之正法往年十二月後宜置閏月即此年正月當是往年閏月此年二月乃是正月故朔日己丑日南至也時史失閏往年錯不置閏閏更在二月之後傳於八月之下乃云閏月戊辰殺宣姜是閏在二月後也時史以閏月為正月故經因史而書正月從其誤而書之傳以經之正月實非正月更於二月記南至之日以正厯之失也夏曹公孫㑹自鄸出奔宋鄸莫公反穀作夢曹鄸杜注曹邑在今兗州府州北集說杜氏預曰嘗有玉帛之使來告故書者孫氏復曰鄸公孫㑹之邑也言自鄸出奔宋以别從國都而去爾能劉氏敞曰春秋之時臣能專其邑無不畔其國者使其衆無不要其君者臧武仲之智可謂智矣然猶據防以求為後於魯是以孔子譏之以謂其罪與不孝非聖者均也不孝則無親非聖則無法要君則無上三者皆大亂之道也故深察公孫歸父之至柳奔齊公孫㑹之自鄸奔宋也其賢於臧武仲逺矣公羊曰為公子喜時之後諱也非也春秋之義善惡各以其事進退之何有賢其祖而遂諱其後子孫惡乎且所以諱賢者之過者謂小不足以妨大短不足以毁長而可以成人之美者也若乃大惡至叛君專地反臣子之義亂人倫之常矣而猶為之諱乎如必賢者子孫則罪皆可諱是管蔡不誅於周也由是觀之所謂為公子喜時諱其義安在哉穀梁曰自夢者專乎夢也曹無大夫其曰公孫言其以貴取之而不以叛也非也若臣不叛君常事爾何足褒哉高氏閌曰㑹子臧之子鄸子臧之采邑也汪氏克寬曰春秋書大夫自其叛邑出奔者皆先書叛故宋華亥向寧華定自南里出奔楚先書入南里以叛宋公弟辰自蕭來奔先書入蕭以叛此書自鄸出奔而先不書叛則非叛也蓋鄸乃公孫㑹繼其父之食邑而得專制之者如穀梁之說爾得罪待放君無赦命是以自其所食之邑而奔他國也王氏樵曰案公羊猶曰諱胡氏直謂其待放而後出奔得去國之禮而賢之矣又曰待放而後出奔臣子常禮免於貶足矣而何以賢之為公子喜時之後賢之也視公羊尤迂曲矣余氏光曰郝氏曰公孫㑹曹大夫出奔宋傳不詳其故公羊揣為子臧之後以邑叛為賢者之後諱夫子臧之節春秋不録何為為其子孫諱逆大夫多賢者後而皆諱則無一書矣春秋政在大夫出奔必書何諱之有附録左傳宋元公無信多私而惡華向華定華亥與向寧謀曰亡愈於死先諸華亥僞有疾以誘羣公子公子問之則執之夏六月丙申殺公子寅公子御戎公子朱公子固公孫援公孫丁拘向勝向行於其廩公如華氏請焉弗許遂劫之癸卯取大子欒與母弟辰公子地以為質公亦取華亥之子無戚向寧之子羅華定之子啓與華氏盟以為質秋盜殺衛侯之兄縶縶公穀作輒左傳衛公孟縶狎齊豹奪之司寇與鄄有役則反之無則取之公孟惡北宮喜褚師圃欲去之公子朝通於襄夫人宣姜懼而欲以作亂故齊豹北宮喜禇師圃公子朝作亂初齊豹見宗魯於公孟為驂乘焉將作亂而謂之曰公孟之不善子所知也勿與乘吾將殺之對曰吾由子事公孟子假吾名焉故不吾遠也雖其不善吾亦知之抑以利故不能去是吾過也今聞難而逃是僭子也子行事乎吾將死之以周事子而歸死於公孟其可也丙辰衛侯在平壽公孟有事於蓋獲之門外齊子氏帷於門外而伏甲焉使祝蛙置戈於車薪以當門使一乘從公孟以出使華齊御公孟宗魯驂乘及閎中齊氏用戈擊公孟宗魯以背蔽之斷肱以中公孟之肩皆殺之公聞亂乘驅自閲門入慶比御公公南楚驂乘使華寅乘二車及公宮鴻駵魋駟乘於公公載寶以出褚師子申遇公於馬路之衢遂從過齊氏使華寅肉袒執蓋以當其闕齊氏射公中南楚之背公遂出寅閉郭門踰而從公公如死鳥析朱鉏宵從竇出徒行從公齊侯使公孫青聘於衛既出聞衛亂使請所聘公曰猶在竟內則衛君也乃將事焉遂從諸死鳥請將事辭曰亡人不佞失守社稷越在草莽吾子無所辱君命賔曰寡君命下臣於朝曰阿下執事臣不敢二主人曰君若惠顧先君之好照臨敝邑鎮撫其社稷則有宗祧在乃止衛侯固請見之不獲命以其良馬見為未致使故也衛侯以為乘馬賔將掫主人辭曰亡人之憂不可以及吾子草莽之中不足以辱從者敢辭賔曰寡君之下臣君之牧圉也若不獲扞外役是不有寡君也臣懼不免於戾請以除死親執鐸終夕與於燎齊氏之宰渠子召北宮子北宮氏之宰不與聞謀殺渠子遂伐齊氏滅之丁巳晦公入與北宮喜盟於彭水之上秋七月戊午朔遂盟國人八月辛亥公子朝褚師圃子玉霄子高魴出奔晉閏月戊辰殺宣姜衛侯賜北宮喜諡曰貞子賜析朱鉏諡曰成子而以齊氏之墓豫之衛侯告寧於齊且言子石齊侯將飲酒遍賜大夫曰二三子之教也苑何忌辭曰與於青之賞必及於其罰在康誥曰父子兄弟罪不相及況在羣臣臣敢貪君賜以干先王琴張聞宗魯死將往弔之仲尼曰齊豹之盜而孟縶之賊女何弔焉君子不食姦不受亂不為利疚於回不以回待人不蓋不義不犯非禮平壽杜注衛下邑杜蓋獲杜注衛郭門死鳥注衛地公羊母兄稱兄兄何以不立有疾也何疾爾惡疾也穀梁盜賤也其曰兄母兄也目衛侯衛侯纍也然則何為不為君也曰有天疾者不得入乎宗廟輒者何也曰兩足不能相過齊謂之綦楚謂之踙衛謂之輒集說孫氏復曰衛侯之母兄而盜得殺之衛侯之無刑政也故曰盜殺衛侯之兄縶以著其惡劉氏敞曰其兄云者以重書也何重乎衛侯之兄輒言不能親親也千乘之國亦大矣而盜得以殺其兄故君子閔焉得張氏洽曰縶以有疾不得列於宗而廢是以靈公立則所以事其兄使全其身者必無所不用其至親愛之而使不得有為於其國此舜所以盡其恩於兄弟也靈公受國於有疾之兄乃聼其無禮於大夫且俾之預於政而又不能防間其母以預制其禍亂使盜賊竊發兄死身危幾亡其國故書盜殺衛侯之兄縶以深罪之也秋李氏廉曰左氏說見昭三十一年胡氏不取然春書盜者四尉止也齊豹也公孫翩也陽虎也皆大夫也故任公輔以為豹非卿故曰盜而陳氏亦曰既奪之司寇則非卿矣恐其說亦是其罪衛侯之說公穀得之諸家皆同官金氏賢曰經所謂盜果誰謂乎曰謂齊豹也豹具於衛何以盜名曰以其為盜賊之事是亦盜賊而已矣書之為盜賤之也是以蔡公孫翩亦書盜行同於豹也冬十月宋華亥向寧華定出奔陳寧公作寧左傳宋華向之亂公子城公孫忌樂舍司馬彊向宜向鄭楚建郳申出奔鄭其徒與華氏戰於鬼閻敗子城子城適晉華亥與其妻必盥而食所質公子者而後食公與夫人每日必適華氏食公子而後歸華亥患之欲歸公子向寧曰唯不信故質其子若又歸之死無日矣公請於華費遂將攻華氏對曰臣不敢愛死無乃求去憂而滋長乎臣是以懼敢不聽命公曰子死亡有命余不忍其詬冬十月公殺華向之質而攻之戊辰華向奔陳華登奔吳向寧欲殺大子華亥曰干君而出又殺其子其誰納我且歸之有庸使少司寇牼以歸曰子之齒長矣不能事人以三公子為質必免公子既入華牼將自門行公遽見之執其手曰余知而無罪也入復而所鬼閻杜注潁川長平縣西北有閻亭今河南開封府陳州西華縣東北閻倉亭城是也集說陳氏傅良曰公子城公孫忌八子奔鄭華亥向寧華定奔陳其但書三子何衆不可勝罪則罪其甚者入南里以叛乞師於楚為宋患之日久是以甚三子也呂氏大圭曰一宋國也而大夫同出奔以見君不能待其臣而臣不能事其君也亦家氏鉉翁曰書三卿同日而奔不惟誅華向其君有責焉爾奔季氏本曰陳宋讎也三大夫往欲依陳為亂而宋其危矣十有一月辛卯蔡侯廬卒廬左作盧附録左傳齊侯疥遂痁期而不瘳諸侯之賔問疾者多在梁丘據與裔欵言於公曰吾事鬼神豐於先君有加矣今君疾病為諸侯憂是祝史之罪也諸侯不知其謂我不敬君盍誅於祝固史嚚以辭賔公說告晏子晏子曰日宋之盟屈建問范㑹之德於趙武趙武曰夫子之家事治言於晉國竭情無私其祝史祭祀陳信不愧其家事無猜其祝史不祈建以語康王康王曰神人無怨宜夫子之光輔五君以為諸侯主也公曰據與欵謂寡人能事鬼神故欲誅於祝史子稱是語何故對曰若有德之君外內不廢上下無怨動無違事其祝史薦信無愧心矣是以鬼神用饗國受其福祝史與焉其所以蕃祉老壽者為信君使也其言忠信於鬼神其適遇淫君外內頗邪上下怨疾動作辟違從欲厭私高臺深池撞鐘舞女斬刈民力輸掠其聚以成其違不恤後人暴虐淫從肆行非度無所還忌不思謗讟不憚鬼神神怒民痛無悛於心其祝史薦信是言罪也其蓋失數美是矯誣也進退無辭則虛以求媚是以鬼神不饗其國以禍之祝史與焉所以夭昏孤疾者為暴君使也其言僭嫚於鬼神公曰然則若之何對曰不可為也山林之木衡鹿守之澤之萑蒲舟鮫守之藪之薪蒸虞候守之海之鹽蜃祈望守之縣鄙之人入從其政逼介之關暴征其私承嗣大夫彊易其賄布常無藝徵斂無度宮室日更淫樂不違內寵之妾肆奪於市外寵之臣僭令於鄙私欲養求不給則應民人苦病夫婦皆詛祝有益也詛亦有損聊攝以東姑尤以西其為人也多矣雖其善祝豈能勝億兆人之詛君若欲誅於祝史修德而後可公說使有司寬政毁關去禁薄斂己責辭十二月齊侯田於沛招虞人以弓不進公使執之曰昔我先君之田也旃以招大夫弓以招士皮冠以招虞人臣不見皮冠故不敢進乃舍之仲尼曰守道不如守官君子韙之齊侯至自田晏子侍於遄臺子猶馳而造焉公曰唯據與我和夫晏子對曰據亦同也焉得為和公曰和與同異乎對曰異和如羮焉水火醢醢鹽梅以烹魚肉燀之以薪宰夫和之齊之以味濟其不及以泄其過君子食之以平其心君臣亦然君所謂可而有否焉臣獻其否以成其可君所謂否而有可焉臣獻其可以去其否是以政平而不干民無爭心故詩曰亦有和羹既戒既平鬷嘏無言時靡有爭先王之濟五味和五聲也以平其心成其政也聲亦如味一氣二體三類四物五聲六律七音八風九歌以相成也清濁小大短長疾徐哀樂剛柔遲速髙下出入周疏以相濟也君子聽之以平其心心平德和故詩曰德音不瑕今據不然君所謂可據亦曰可君所謂否據亦曰否若以水濟水誰能食之若琴瑟之專一誰能聽之同之不可也如是飲酒樂公曰古而無死其樂若何晏子對曰古而無死則古之樂也君何得焉昔爽鳩氏始居此地季萴因之有逢伯陵因之蒲姑氏因之而後大公因之古若無死爽鳩氏之樂非君所願也鄭子産有疾謂子大叔曰我死子必為政唯有德者能以寬服民其次莫如猛夫火烈民望而畏之故鮮死焉水懦弱民狎而玩之則多死焉故寬難疾數月而卒大叔為政不忍猛而寬鄭國多盜取人於萑苻之澤大叔悔之曰吾早從夫子不及此興徒兵以攻萑苻之盜盡殺之盜少止仲尼曰善哉政寬則民慢慢則糾之以猛猛則民殘殘則施之以寬寬以濟猛猛以濟寬政是以和詩曰民亦勞止汔可小康惠此中國以綏四方施之以寬也毋從詭隨以謹無良式遏寇虐慘不畏明糾之以猛也柔遠能邇以定我王平之以和也又曰不競不絿不剛不柔布政優優百祿是遒和之至也及子産卒仲尼聞之出涕曰古之遺愛也聊攝杜注齊西界平原聊城縣東北有攝城今聊城屬東昌府姑尤杜注齊東界姑水尤水皆在城陽郡東南入海姑水即登州府黃縣之大姑河尤水即萊州府掖縣之小姑河萑苻杜注澤名疑即中牟澤周禮所謂圃田澤跨中牟洧川尉氏界庚景王二辰十四年二十有一年晉頃五年齊景二十七年衛靈十四年蔡悼公東國元年鄭定九年曹悼三年陳惠九年把平十五年宋元十一年秦哀十六年楚平八年吳僚六年春附録左傳二十一年春天王將鑄無射泠州鳩曰王其以心疾死乎夫樂天子之職也夫音樂之輿也而鐘音之器也天子省風以作樂器以鍾之輿以行之小者不窕大者不槬則和於物物和則嘉成故和聲入於耳而藏於心心億則樂窕則不咸槬則不容心是以感感實生疾今鐘槬矣王心弗堪其能久乎王三月葬蔡平公左傳三月葬蔡平公蔡大子朱失位位在卑大夫送葬者歸見昭子昭子問蔡故以告昭子歎曰蔡其亡乎若不亡是君也必不終詩曰不解于位民之攸塈今蔡侯始即位而適卑身將從之夏晉侯使士鞅來聘書聘止此左傳夏晉士鞅來聘叔孫為政季孫欲惡諸晉使有司以齊鮑國歸費之禮為士鞅士鞅怒曰鮑國之位下其國小而使鞅從其牢禮是卑敝邑也將復諸寡君魯人恐加四牢焉為十一牢集說杜氏預曰晉頃公即位通嗣君矣許氏翰曰禮好不結而財求無度則聘義亡蓋自是聘不復志拱趙氏鵬飛曰晉至頃公公室日衰六卿日侈頃公手爾即位於今五年始出聘諸侯蓋霸業既隳諸侯外之彼亦知無求於諸侯故聘好有所不急也六卿勢醜德齊睢盱相忌何暇外交諸侯修霸業哉嗚呼文之業衰矣也汪氏克寬曰二十三年晉執舍蓋原於士鞅之怒晉之聘魯者十冇一始於苟庚而終於士鞅始則伉而要盟終則怒而責禮霸者之臣所以修聘於望國之魯其非邦交之舊亦甚矣宋華亥向寧華定自陳入于宋南里以叛叛公作畔宋南里杜注城內里名在今商丘縣境左傳宋華費遂生華貙華多僚華登貙為少司馬多僚為御士與貙胡惡乃譖諸公曰貙將納亡人亟言之公曰司馬以吾故亡其良子死亡有命吾不可以再亡之對曰君若愛司馬則如亡死如可逃何遠之有公懼使侍人召司馬之侍人宜僚飲之酒而使告司馬司馬歎曰必多僚也吾有讒子而弗能殺吾又不死抑君冇命可若何乃與公謀逐華貙將使田孟諸而遣之公飲之酒厚酬之賜及從者司馬亦如之張丐尤之曰必有故使子皮承宜僚以劍而訊之宜僚盡以告張丐欲殺多僚子皮曰司馬老矣登之謂甚吾又重之不如亡也五月丙申子皮將見司馬而行則過多僚御司馬而朝張丐不勝其怒遂與子皮臼任鄭翩殺多僚劫司馬以叛而召亡人壬寅華向入樂大心豐愆華牼禦諸橫華氏居盧門以南里叛六月庚午宋城舊鄘及桑林之門而守之橫杜注梁國睢陽縣南有橫亭胡傳案左氏初宋元公無信多私而惡華向三大夫謀曰亡愈於死先諸乃誘羣公子殺之公如華氏請焉弗許遂劫公取太子及其母弟以為質公怒攻之華向奔陳至是入于南里以叛凡書叛有入于戚者而不言衛有入于朝歌者而不言晉有入于蕭者而不言宋此獨言宋南里何也戚與朝歌及蕭皆其所食私邑也若南里則宋國城內之里名也傳稱華氏居盧門南里以叛而宋城舊鄘及桑林門以守是華氏與宋分國而居矣故其入其出皆以南里繫之宋此深罪叛臣逼脅其君已甚之詞也集說杜氏預曰自外至故曰入披其邑故曰叛里劉氏敞曰入于宋南里者何入宋而居于南也蓋中國而守之然則於何畔或曰畔乎陳也或曰畔乎楚也公羊曰南里者何若曰因諸者然非也宋南里者入宋而居南里也又何疑焉而家氏鉉翁曰書叛誅姦之極典華向首禍於國討奔奔而復乃挾吳楚將覆宗國叛狀既著始書叛不汪氏克寬曰穀梁云南里宋之南鄙非也凡書叛言四鄙必書其邑此不言邑而繫之宋則為宋城內之里名無疑矣又曰叛直叛也謂直叛而不作亂夫外挾吳楚之援將以覆其宗國其君幾不能自保猶曰不作亂耶其書自陳陳亦有罪矣以奔亡之臣而能入國以為亂非陳助之兵力則未見其可也晉荀吳㑹齊衛曹之師以救宋而不書圍宋南里者悼公圍彭城則以五大夫歸荀吳救宋而逸賊使華向得逭不臣之誅故不以討叛豫之也秋七月壬午朔日有食之左傳秋七月壬午朔日有食之公問於梓愼曰是何物也禍福何為對曰二至二分日有食之不為災日月之行也分同道也至相過也其他月則為災陽不克也故常為水集說孔氏穎逹曰莊二十三年六月日食秋大水此二十四年五月日食梓愼曰將水昭子曰旱也其年八月大雩旱也則亦不是常為水也他汪氏克寬曰日食三十六昭公之世凡七見比之公災異最數自即位至是年四書日有食之矣梓慎不能因公之問告以遇災而懼之意乃云不為災使公怠於修政遂致失國蓋黨於季氏而姑為諂諛以悅君也王氏樵曰案詩十月之交朔日辛卯日有食之亦孔之醜周之十月夏之八月秋分之月也而甚可醜惡七年四月甲辰朔日食春分之月也而云魯衛惡之安在其不為災邪梓愼不能因公之問告以省德消變之實而為是說以滋其怠玩卒使出逐應陽微之象非忠臣也八月乙亥叔輒卒輒公作痤左傳於是叔輒哭日食昭子曰子叔將死非所哭也八月叔輒卒集說杜氏預曰叔弓之子伯張獨趙氏鵬飛曰叔輒弓之子無事業見於經而書卒志世爵也附録左傳冬十月華登以吳師救華氏齊烏枝鳴戍宋㕑人濮曰軍志有之先人有奪人之心後人有待其衰盍及其勞且未定也伐諸若入而固則華氏衆矣悔無及也從之丙寅齊師宋師敗吳師於鴻口獲其二帥公子苦雂偃州員華登帥其餘以敗宋師公欲出㕑人濮曰吾小人可藉死而不能送亡君請待之乃徇曰揚徽者公徒也衆從之公自揚門見之下而巡之曰國亡君死二三子之恥也豈專孤之罪也齊烏枝鳴曰用少莫如齊致死齊致死莫如去備彼多兵矣請皆用劍從之華氏北復即之㕑人濮以裳裏首而荷以走曰得華登矣遂敗華氏於新里翟僂新居於新里既戰說甲於公而歸華妵居於公里亦如之十一月癸未公子城以晉師至曹翰胡㑹晉荀吳齊苑何忌衛公子朝救宋丙戌與華氏戰於赭丘鄭翩願為鸛其御願為鵝子祿御公子城莊堇為右干犫御呂封人華豹張丐為右相遇城還華豹曰城也城怒而反之將注豹則關矣曰平公之靈尚輔相余豹射出其間將注則又關矣曰不狎鄙抽矢城射之殪張丐抽殳而下射之折股扶伏而擊之折軫又射之死干犫請一矢城曰余言女於君對曰不死伍乘軍之大刑也干刑而從子君焉用之子速諸乃射之殪大敗華氏圍諸南里華亥搏膺而呼見華貙曰吾為欒氏矣貙曰子無我迋不幸而後亡使華登如楚乞師華貙以車十五乘徒七十人犯師而出食於睢上哭而送之乃復入楚薳越帥師將逆華氏大宰犯諫曰諸侯唯宋事其君今又爭國釋君而臣是助無乃不可乎王曰而告我也後既許之矣鴻口杜注梁國睢陽縣東有鴻口亭今在河南歸德府商丘虞城二縣界揚門杜注睢陽正東門曰揚門城赭丘杜注宋地後漢志陳國長平縣有赭丘應在今河南開封府陳州西北境冬蔡侯朱出奔楚朱穀作東左傳蔡侯朱出奔楚費無極取貨於東國而謂蔡人曰朱不用命於楚君王將立東國若不先從王欲楚必圍蔡蔡人懼出朱而立東國朱訴於楚楚子將討蔡無極曰平侯與楚有盟故封其子有二心故廢之靈王殺隱大子其子與君同惡德君必甚又使立之不亦可乎且廢置在君蔡無他矣集說劉氏敞曰穀梁云東者東國也何為謂之東王父誘而殺焉父執而用焉奔而又奔之曰東惡之而貶之也非也即仲尼欲如此貶東國者書東國不亦足乎徒貶其半名何為即貶其半名為法者使蔡侯止名東當復貶去其上下而云蔡侯田乎戴胡氏銓曰楚䖍誘殺蔡般執用蔡有蓋蔡君不共天之讎朱乃奔而親之惡何可言哉由黃氏仲炎曰案左氏蔡朝吳奔鄭蔡侯朱奔楚皆楚臣費無極之讒也詩云讒人罔極交亂四國費無極是已有國家者可無畏哉汪氏克寬曰或疑此書朱出奔楚後書東國卒于楚朱無歸入葬之文東國無出奔之事疑只是一事東即東國而誤為未也然左傳昭二十七年記沈尹戌之言亦曰出蔡侯未而史記蔡世家亦曰隱太子之子東國攻平侯子而代立則朱東國固兩人也豈穀梁經文因後書東國而誤也歟往季氏本曰朱曾祖般為楚所戕祖有為楚所用而奔焉懼其殺已也信乎其往訴矣朱奔而楚之彊暴見焉嚴氏啓隆曰未出奔楚而不書其卒是卒於楚也不成其為君故無諡東國於是為悼公東國隱大子有之子平侯廬之弟朱叔父也公如晉至河乃復左傳公如晉及河鼓叛晉晉將伐鮮虞故辭公集說許氏翰曰公失其重久矣故晉得輕進退之也髙氏閌曰魯衰而朝於齊晉晉愈彊則其往愈數及魯之益衰也則往而辭焉春秋蓋傷魯之削也滋甚而不能以義自彊耳家氏鉉翁曰叔孫為政季氏惡諸晉士鞅怒卑已故公為所郤蓋季氏外交彊國大夫脅制其上也汪氏克寬曰晉之伐鮮虞豈妨於邦交之禮如文三年晉將伐楚以救江而公如晉成三年晉將伐牆咎如而公亦如晉未聞辭公也況是年晉實未嘗有事於鮮虞蓋託辭以拒公耳余氏光曰黃氏曰傳載晉有鮮虞之役故辭公晉豈無以待公乎季氏之彊昭公之弱晉助其臣而不有其君久矣欽定春秋𫝊說彚纂卷三十一
