body:
  text: 欽定四庫全書欽定春秋傳說彚纂卷二十七丁靈王十未八年十有九年晉平四年齊靈二十八年衛獻二十三年殤五年蔡景三十八年鄭簡十二年曹武公滕元年陳哀十五年把孝十三年宋平二十二年秦景二十三年楚康六年吳諸樊七年春王正月諸侯盟于祝柯柯公作阿南祝柯杜注祝柯縣今屬濟郡案禮記武王封黃帝之後於祝即此也漢為祝柯縣唐改禹城縣今長清縣豐齊鎮北有故祝柯城左𫝊十九年春諸侯還自沂上盟於督揚曰大毋侵小督揚杜注即祝柯也集說杜氏預曰前年圍齊之諸侯也良孫氏復曰諸侯不序前目後凡也陳氏傅曰㑹無王卿士其亦申言諸侯何間有事也㑹汪氏克寬曰㑹有王臣而盟無王臣則再舉諸侯盟皆有王臣則不再言諸侯但曰盟于某㑹盟無王臣而再舉諸侯間有異事若㑹盟殊地也故祝柯之盟書諸侯重丘之盟亦書諸侯經豫諸侯同圍齊故盟無褒貶而其辭平㑹夷儀不能討齊故盟于重丘特書同著其同心為惡也晉人執邾子左𫝊執邾悼公以其伐我故集說劉氏敞曰稱人以執者非伯討也此其為非伯討奈何邾仍伐魯晋人疾焉執其君以劫其地然則何為不言以歸舍之也曷為舍之未得其地故劫之已得其地故舍之許氏翰曰執之舍之削取其田不以王命雖當罪非正也伯髙氏閌曰既來同㑹又與同盟而乃執之非討也故稱人公至自伐齊集說劉氏敞曰此圍也其以伐致何圍而以伐致者以伐告也又曰十九年公至自伐齊公羊曰何以致伐未圍齊也非也若諸侯實未嘗圍齊者春秋何得書之乎又曰穀梁曰春秋已盟而復伐者則以伐致盟不復伐者則以㑹致祝柯之盟盟復伐齊與曰非也然則何為以伐致也曰與人同事或執其君或取其地非也執君取地邾事也以伐齊致齊事也今欲以齊明邾以邾明齊乎無義以通之且書晋人執邾子貶晋已明矣取邾田自漷水刺魯已明矣又何不足而以齊明邾乎程氏端學曰此與僖二十九年圍許致圍不同者蓋彼以㑹出而遂圍許故以圍許告此以伐齊出而歸以伐齊告圍乃伐之一事耳皆魯史之舊無他義也齊湛氏若水曰書公至自伐齊謹君之出入也同圍而云伐者圍即伐也取邾田自漷水漷好虢反又音郭經漷水杜注漷水出東海合鄉縣西南魯國至髙平湖陸縣入泗案合鄉漢縣北齊省湖陸即湖陵在今魚臺縣東北左𫝊遂次於泗上疆我田取邾田自漷水歸之於我晋侯先歸公享晋六卿於蒲圃賜之三命之服軍尉司馬司空輿尉侯奄皆受一命之服賄荀偃束錦加璧乘馬先吳夀夢之鼎荀偃疸疽生瘍於頭濟河及著雍病目出大夫先歸者皆反士丐請見弗內請後曰鄭甥可二月甲寅卒而視不可含宣子盥而撫之曰事吳敢不如事主猶視欒懷子曰其為未卒事於齊故也乎乃復撫之曰主苟終所不嗣事於齊者有如河乃瞑受含宣子出曰吾淺之為丈夫也蒲圃杜注場圃名集說杜氏預曰取邾田以漷水為界取孫氏復曰諸侯土地受之天子不可取也言惡內也劉氏敞曰其曰取邾田自漷水何非所取也漷水非所自也脅人之君而制其國介人之威而私其利晋魯之惡又甚焉交譏之又曰公羊曰漷移也非也向者執邾子乃為此爾且如公羊言魯以漷自移而取田春秋乃坐其君以盜地乎何悖也陽蘇氏轍曰成二年晋人敗齊于鞍使齊人歸我汶之田書曰取汶陽田不言齊魯地也本以晋命取田於邾故書曰取邾田自漷水言非魯地也髙氏閌曰邾之病魯信有罪矣魯以諸侯之力前既執其先君此又執其嗣君取其田蓋已甚矣書取田於至自伐齊之後明公獨取之非諸侯取之專罪公之意也又云自漷水者隨漷水以為界蓋著其取之多也張氏洽曰言取邾田則非魯之舊可知異於濟西汶陽之取而恃霸威以彊取明矣魯肆彊奪邾失漷水田而庶其畀我相繼來奔邾自是衰亂矣取鄭氏玉曰𫝊稱疆我田蓋魯人以正疆為名而妄邾田故沒其疆田之說正其取田之罪漷汪氏克寬曰後此哀二年取漷東田則又不止自水矣於此見魯之陵弱小而深為利也季孫宿如晉左𫝊季武子如晋拜師晋侯享之范宣子為政賦黍苖季武子興再拜稽首曰小國之仰大國也如百穀之仰膏雨焉若常膏之其天下輯睦豈惟敝邑賦六月集說吳氏澄曰謝討齊且取邾田也葬曹成公夏衛孫林父帥師伐齊左傳晋欒魴帥師從衛孫文子伐齊集說髙氏閌曰十四年林父逐衛侯衎奔於齊故獨伐齊林父逐君伯主所當討而與之㑹伐則晋平伯業可知矣罪張氏洽曰欒魴不書孫林父并將也夫討彊暴之而使逐君之大夫尸其事則晋何以服齊故特書林父主兵以罪之附録左傳季武子以所得於齊之兵作林鐘而銘魯功焉臧武仲謂季孫曰非禮也夫銘天子令德諸侯言時計功大夫稱伐今稱伐則下等也計功則借人也言時則妨民多矣何以為銘且夫大伐小取其所得以作彝器銘其功烈以示子孫昭眀德而懲無禮也今將借人之力以救其死若之何銘之小國幸於大國而昭所獲焉以怒之亡之道也秋七月辛卯齊侯環卒環公作瑗左傳齊侯娶於魯曰顔懿姬無子其姪鬷聲姬生光以為大子諸子仲子戎子戎子嬖仲子生牙屬諸戎子戎子請以為大子許之仲子曰不可廢常不祥間諸侯難光之立也列於諸侯矣今無故而廢之是專黜諸侯而以難犯不祥也君必悔之公曰在我而已遂東大子光使髙厚傅牙以為大子夙沙衛為少傅齊侯疾崔杼微逆光疾病而立之光殺戎子尸諸朝非禮也婦人無刑雖有刑不在朝市夏五月壬辰晦齊靈公卒莊公即位執公子牙於句瀆之丘以夙沙衛易已衛奔髙唐以叛句瀆之丘地名襄九年執公子買於句瀆之丘即此髙唐杜注在祝柯縣西北漢置髙唐縣今為髙唐州山東濟南府禹城縣北四十里有古髙唐城集說家氏鉉翁曰齊靈廢嫡齊光篡父其所從來由髙厚贊其君伐本樹蘖已為之傅崔杼隂謀更深輔光以篡殺厚而兼其室復殺光以媚於晋亂臣賊子患失為心其禍至於殺身喪邦覆其族也晉士丐帥師侵齊至穀聞齊侯卒乃還左傳晋士丐侵齊及穀聞喪而還禮也公羊還者何善辭也何善爾大其不伐喪也此受命乎君而伐齊則何大乎其不伐喪大夫以君命出進退在大夫也胡傳穀齊地也還者終事之辭古之為師不伐喪大夫以君命出境有可以安國家利社稷者則專之可也世衰道微暴行交作利人之難以成其私欲者衆矣士丐乃有惻隱之心聞齊侯卒而還不亦善乎或曰君不尸小事臣不專大名為士丐者宜墠帷而歸命乎介則非矣使士丐未出晋境如是焉可也已至齊地則進退在士丐矣猶欲墠帷而歸命乎介則非古者命將不從中覆專制境外之意而况喪不可伐非進退可疑而待請者故至穀聞齊侯卒乃還善之也集說杜氏預曰詳録所至及還者善得禮不陸氏淳曰穀梁曰丐宜墠帷而歸命於介案伐喪常禮也更待君命是詐讓小善非人臣盡忠之道也而劉氏敞曰還者何善辭也穀者齊地也其曰至穀後稱其義也非齊地則勿復乎曰止師而請之君曰可而後止不可則復之期可而後止臣之事君也凡在國無專焉子之事親也凡在家無專焉臣子之大節也又曰穀梁曰還者事未畢也士丐外專君命故非之也非也謂之未畢則以為貶矣公子遂至黃乃復公孫敖如周不至而復復者穀梁所謂事畢也然則春秋反不貶遂與敖乎案士丐不伐喪可謂知禮不免於貶遂敖專命可謂非禮反無貶乎且士丐何貶哉大夫以君命出境進退在大夫者可也喪王氏葆曰春秋之時侵伐四出或背殯帥師或冒伐人者衆矣而士丐奉命出征既至齊地聞喪而還善矣朱子曰春秋分明處只是晋士丐侵齊至穀聞卒乃還這分明是與他實張氏洽曰將在軍君命有所不受三軍之進退將司之總殺伐之柄以臨有喪君子所不忍尚何墠帷請命以自纍其作止乎非家氏鉉翁曰墠帷反命未出疆之禮及穀則境外俟命之地書其還善之耳公汪氏克寬曰公追齊師至酅弗及不當往而往也救成至遇叔孫豹殺晋次于雍榆當往而不往也士丐侵齊不當往而不往也觀此數者而行師進退之義可見矣陳氏際泰曰春秋之大夫猶有義舉焉納捷菑于邾而弗克納也侵齊之役士丐聞喪引還恩動孝子之心義服諸侯之君此易及乎則胡宋襄之伐齊喪也附録左傳四月丁未鄭公孫蠆卒赴於晋大夫范宣子言於晋侯以其善於伐秦也六月晋侯請於王王追賜之大路使以行禮也八月丙辰仲孫蔑卒集說程氏端學曰譏世卿也蓋慶父為三桓之始以奔莒不書卒其子公孫敖亦奔莒至蔑而始書卒蔑之後仲孫速仲孫羯仲孫貜仲孫何忌皆執魯政是以謹志其卒以見父卒而子繼也汪氏克寬曰此文伯之子孟獻子也子速嗣為大夫是曰莊子齊殺其大夫髙厚左傳秋八月齊崔杼殺髙厚於灑藍而兼其室書曰齊殺其大夫從君於昏也灑藍杜注齊地當在臨淄郊外集說髙氏閌曰齊髙厚嘗帥師伐我矣晋新行義於齊齊侯始立而欲親晋故歸罪於髙厚而殺之以說於晋此明年所以與澶淵之盟也莊張氏洽曰殺髙厚者崔杼也杼雖擅誅殺之柄亦公之所欲也以纍上之辭言之可謂著明矣之程氏端學曰此必齊光既立之後崔杼與光共殺故以國殺而又曰殺其大夫也髙汪氏克寬曰微崔杼之力莊公固不得立然杼殺厚慶封討夙沙衛明年復使慶佐為大夫而誅牙餘黨崔慶自是專權而射股之禍兆於此矣鄭殺其大夫公子嘉嘉公作喜左傳鄭子孔之為政也專國人患之乃討西宫之難與純門之師子孔當罪以其甲及子革子良氏之甲守甲辰子展子西帥國人伐之殺子孔而分其室書曰鄭殺其大夫專也子然子孔宋子之子也士子孔圭媯之子也圭媯之班亞宋子而相親也士子孔亦相親也僖之四年子然卒簡之元年士子孔卒司徒孔實相子革子良之室三室如一故及於難子革子良出奔楚子革為右尹鄭人使子展當國子西聼政立子産為卿胡傳案左氏初盜殺鄭三卿於西宫之朝公子嘉知而不言既又欲起楚師以去諸大夫故楚人伐鄭至於純門而返至是嘉之為政也專國人患之乃討西宫之難與純門之師子展子西率國人殺嘉而分其室不稱鄭人者嘉則有罪矣而子展子西不䏻正以王法肆諸市朝與衆同棄乃利其室而分之有私意焉故稱國以殺而不去其官此春秋原情定罪之意集說汪氏克寬曰莊公二十二年傳例曰稱國以殺大夫者國君大臣與謀其事不請於天子而擅殺之也故雖殺有罪亦書其官嘉召楚人伐其國則是背叛之臣國人之所同惡使子展子西正名誅之而不利其室則當如殺良霄之例稱人以殺而削其官矣冬葬齊靈公集說髙氏閌曰齊魯仍世昏姻之國前雖有怨今已易世故不廢喪紀示不忘好附録左傳齊慶封圍髙唐弗克冬十一月齊侯圍之見衛在城上號之乃下問守備焉以無備告揖之乃登聞師將傅食髙唐人殖綽工僂㑹夜縋納師醢衛於軍城西郛左傳城西郛懼齊也集說王氏葆曰魯備齊難城其國之郛則凡西境亦不敢保足見魯之弱而齊之彊矣汪氏克寬曰郛乃外城此云西郛實國都外城之西郭而所謂中城為魯國都之內城可知矣叔孫豹㑹晉士丐于柯左傳齊及晋平盟於大隧故穆叔㑹范宣子于柯穆叔見叔向賦載馳之四章叔向曰肸敢不承命大隧杜注地闕或曰在今髙唐州境集說杜氏諤曰襄公之時政在大夫甚矣專相為㑹故詳録之許氏翰曰宣十五年書仲孫蔑㑹齊髙固于無婁成五年書叔孫僑如㑹晋荀首于穀此書叔孫豹㑹晋士丐于柯以見政在大夫列國之事如此故屢言若髙氏閌曰魯猶懼齊故為柯之㑹以自固湛氏水曰懼齊而援晋之權臣以自固非禮也城武城武城杜注太山南武城縣通典費縣有古武城今故城在費縣西南九十里左傳穆叔歸曰齊猶未也不可以不懼乃城武城集說孫氏復曰城西郛城武城懼齊也而髙氏閌曰襄公四書城邑非本務也使民饑散雖城之孰與守之至家氏鉉翁曰國不能用賢紀綱陵遲百度廢弛寇則危矣多城何益汪氏克寬曰子游為武城宰即此武城魯於是時苟能信任仁賢修明政事使民效死而弗去則將制挺以撻鄰國之堅甲利兵而何畏於彊齊今乃君弱臣惰安於不競內則疲民於亟城之勞外則徼惠於霸國之援曽無一毫自立之志使齊莊而有報怨之圗則魯之禍未有紀極也附録左傳衛石共子卒悼子不哀孔成子曰是謂蹶其本必不有其宗戊靈王十申九年二十年晋平五年齊莊公光元年衛獻二十四年殤六年蔡景三十九年鄭簡十三年曹武二年陳哀十六年把孝十四年宋平二十三年秦景二十四年楚康七年吳諸樊八年春王正月辛亥仲孫速㑹莒人盟于向速公作遫後同左傳二十年春及莒平孟莊子㑹莒人盟于向督揚之盟故也集說杜氏預曰向莒邑莒數伐魯前年諸侯盟督揚以和解之故二國復自共盟結其好孫氏復曰仲孫速仲孫蔑子自髙氏閌曰向夲莒邑宣四年取之者也莒魯結好是十五年不交兵速代父為卿未練而從政無復三年之喪也昉汪氏克寬曰孟獻子禫縣而不樂則始不三年其於速與羯與夫子稱孟莊子之孝其他可能也可者僅可而有所未盡之辭耳夏六月庚申公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子盟于澶淵澶市然反地澶淵杜注衛在頓丘縣南水經注浮水故瀆上承大河於頓丘縣而北出東徑繁陽故城案浮水即澶淵也繁陽故城在內黃縣東北二十七里古頓丘約略在濬縣之南漢元光三年河水徙頓丘東南流既而決瓠子今瓠子故城在開州西南二十五里則澶淵之地當在內黃之南開州之西北也左傳夏盟于澶淵齊成故也集說孔氏穎達曰於經服異則書同盟此齊成而盟不言同者往年齊與晋平盟于大隧已服非於此始服故不言同也蓋髙氏閌曰齊以晋不伐其喪而感服居喪而出盟亦越禮畔道矣薛氏季宣曰齊之無道諸侯圍之而不服以士丐聞喪而還師遂㑹于澶淵修德來遠不誣也哉汪氏克寬曰齊莊以既廢而賴崔杼以有國崔杼以殺公子牙立莊公而專其國髙厚夙沙衛之餘黨豈無其人邦之杌隉固不敢搆怨於諸侯夫是以受盟之速也亦猶崔杼弒莊立景而同盟於重丘也秋公至自㑹仲孫速帥師伐邾左𫝊邾人驟至以諸侯之事弗能報也秋孟莊子伐邾以報之集說孫氏復曰背澶淵之盟亦許氏翰曰祝柯之㑹既執邾子又取其田報足矣而復伐之譏已甚矣且澶淵在彼何以盟為汲季氏夲曰莊子父喪甫踰五月而即㑹莒盟向又汲於伐邾不可為善政矣蔡殺其大夫公子燮蔡公子履出奔楚燮穀作濕左𫝊蔡公子燮欲以蔡之晋蔡人殺之公子履其母弟也故出奔楚胡𫝊公子燮求從先君以利蔡謀國之合於義者也國人乃不順焉而殺燮此何罪矣故稱國而不去其官公子履其母弟也進不能正國退不能遠害懼禍而奔書者罪之也集說蘇氏轍曰稱國以殺非其罪也而家氏鉉翁曰燮奉文侯遺言求成於晋不克死春秋稱國而不去其官録之也左傳言不與民同欲固不明經㫖而劉原父乃有取焉曰燮之智足以殺身而已殆其舛歟履不與兄同志書所以貶志王氏錫爵曰燮之欲去楚而之晋也既以追成先又懼楚役求紓其民皆謀國之合義者不幸見殺於國人而左氏遂以違衆罪之以彊合國殺之例謬矣陳侯之弟黃出奔楚黃公穀作光後同左𫝊陳慶虎慶寅畏公子黃之逼訴諸楚曰與蔡司馬同謀楚人以為討公子黃出奔楚初蔡文侯欲事晋曰先君與於踐土之盟晋不可棄且兄弟也畏楚不能行而卒楚人使蔡無常公子燮求從先君以利蔡不能而死公子黃將出奔呼於國曰慶氏無道求專陳國暴蔑其君而去其親五年不滅是無天也穀梁諸侯之尊弟兄不得以屬通其弟云者親之也親而奔之惡也集說何氏休曰為二慶所譖還在二十三年逐范氏寧曰鄭嗣曰顯書弟明其親也親而奔之所以惡陳侯弟許氏翰曰二慶執陳之權外介大國以奔其君之而哀公力不能正則國何恃而不亡髙氏閌曰黃與履何以奔楚自理也黃以寵任太過權逼其卿慶氏譖之而陳侯不能為之辨明是以一國之大不能容一弟也姓程氏端學曰異姓大夫不得於君有可去之義同無可去之道况兄弟乎為人弟而出奔天倫絶矣此李氏廉曰杜釋例曰兄而害弟者稱弟以章兄罪例可施於陳黃秦針衛鱄宋辰弟而害兄則去弟以罪弟此例可施於鄭假然於通例不甚合又左氏以為罪公子燮不與民同欲者謬矣案陳黃書弟先儒多主穀梁以為陳侯不容其弟春秋惡之程氏端學謂兄弟無可去之道則以書奔為罪黃二說相兼其義始備故竝存焉叔老如齊左𫝊齊子初聘於齊禮也集說杜氏預曰齊魯有怨朝聘禮絶今復繼好息民王氏葆曰齊屢陵魯及澶淵而始平今叔老之修聘欲固齊好也冬十月丙辰朔日有食之季孫宿如宋左𫝊冬季武子如宋報向戌之聘也褚師假逆之以受享賦常棣之七章以卒宋人重賄之歸復命公享之賦魚麗之卒章公賦南山有臺武子去所曰臣不堪也集說李氏廉曰魯之報齊邾已甚故聘齊以解讎聘宋以求援耳汪氏克寬曰魯自蕭魚以後連嵗與彊齊邾莒交兵是以不遑朝聘往來之事雖向戌來聘而亦未之報也今始平於齊遂交好鄰國以尋舊好耳附録左𫝊衛寧惠子疾召悼子曰吾得罪於君悔而無及也名藏在諸侯之䇿曰孫林父寧殖出其君君入則掩之若能掩之則吾子也若不能猶有鬼神吾有餒而已不來食矣悼子許諾惠子遂卒巳靈王二酉十年二十有一年晋平六年齊莊二年衛獻二十五年殤七年蔡景四十年鄭簡十四年曹武三年陳哀十七年把孝十五年宋平二十四年秦景二十五年楚康八年吳諸樊九年春王正月公如晉左𫝊二十一年春公如晋拜師及取邾田也集說汪氏克寬曰僖公取濟西田則使公子遂如晋拜之成公取汶陽田襄公取邾田則君親往拜其賜受霸主尺寸之惠而不忘其德如此也然魯君襲奕世之封端冕委辨以臨於七百里之侯國而水木夲原不察所自襄公之立踰二十年未聞遣一介行李至於京師其何以為秉禮之子孫也哉湛氏若水曰書公如晋著其如之非禮也朝聘㑹同禮有常期襄公特附晋之彊兵取邾之田而往拜之是相交以利而不以義矣邾庶其以漆閭丘來奔漆閭丘杜注二邑在髙平南平陽縣東北有漆鄉西北有顯閭亭今鄒縣北有漆城即漆鄉也顯閭亭即閭丘左𫝊邾庶其以漆閭丘來奔季武子以公姑姊妻之皆有賜於其從者於是魯多盜季孫謂臧武仲曰子盍詰盜武仲曰不可詰也紇又不能季孫曰我有四封而詰其盜何故不可子為司寇將盜是務去若之何不能武仲曰子召外盜而大禮焉何以止吾盜子為正卿而來外盜使紇去之將何以能庶其竊邑於邾以來子以姬氏妻之而與之邑其從者皆有賜焉若大盜禮焉以君之姑姊與其大邑其次皂牧輿馬其小者衣裳劍帶是賞盜也賞而去之其或難焉紇也聞之在上位者灑濯其心一以待人軌度其信可明徵也而後可以治人夫上之所為民之歸也上所不為而民或為之是以加刑罰焉而莫敢不懲若上之所為而民亦為之乃其所也又可禁乎夏書曰念兹在兹釋兹在兹名言兹在兹允出兹在兹惟帝念功將謂由己一也信由己一而後功可念也庶其非卿也以地來雖賤必書重地也公羊邾婁庶其者何邾婁大夫也邾婁無大夫此何以書重地也穀梁以者不以者也來奔者不言出舉其接我者也漆閭丘不言及小大敵也胡𫝊庶其邾大夫也春秋小國之大夫不書其姓氏微也其以事接我則書其姓氏謹之也莒慶以大夫即魯而圖昏接我不以禮者也邾庶其以地叛其君而來奔接我不以義者也以欲敗禮則身必危以利棄義則國必亂春秋禮義之大宗故小國之大夫接我以利欲則特書其姓氏謹之也漆一邑閭丘一邑而不言及者庶其之私邑所受於君而食之者也此叛臣何以不書叛書名書地而竊邑叛君之罪見矣書來奔而魯受叛臣納其地之罪亦見矣集說杜氏預曰以邑出為叛適魯而言來奔內外之辭孔氏穎達曰諸侯之臣入其私邑而以之出奔者皆書為叛衛孫林父宋華亥宋公之弟辰趙鞅荀寅等皆書為叛叛者背其夲國之大辭也此及莒牟夷邾黑肱亦以邑叛夲國但叛來歸魯據其至魯為奔而言來奔內外之辭言俱是叛而辭異耳且傳謂庶其等為三叛人明其來是叛也諱陸氏淳曰啖氏云凡以邑來奔叛也不言叛為內也受叛臣非也故諱以示譏也諸杜氏諤曰諸侯之地皆天子所封為天子守之也侯之臣皆王之臣故曰天子之陪臣也周衰諸侯之國地有侵軼者必志而罪之臣有奔叛者必録而貶之蘇氏轍曰春秋之法小國之大夫不書然紀裂繻來逆女則書以其接我也接我以禮而書貴之也小國之大夫來奔者亦衆矣雖接我而不書者也惟以地來奔則書惡其接我以利也然魯人非大夫而以地出奔猶不書何也以利接我雖微必書詳內也以利接外以微故不書略外也略外而詳內此聖人處己之厚也王氏葆曰叛而歸他國曰叛叛而歸魯曰來奔內外異辭也罪髙氏閌曰庶其叛其君又盜其土地來奔於魯其大矣時公在晋而季氏遂納其邑受其叛臣是之謂以利主通逃惡自見也陳氏傅良曰於是公猶在晋季孫宿納之也向者莒太子僕弒其君以其寶玉來奔納諸宣公矣季文子使司寇出諸境則不書公猶在晋而季孫宿納庶其則何以書春秋誅叛人君臣之責也是故苟不納之雖有公命不書苟納之雖無公命必謹而書之叛薛氏季宣曰天下之惡一也納人之叛而疾人之己不可以言理矣公在晋而叛臣之受魯之無政甚矣楚呂氏大圭曰人臣之奔必適讎國欒盈之奔也必秦針之奔也必晋而庶其之奔也必魯豈非以南鄙之怨歟魯之於邾也既執其君取其田又伐其國而納其叛人甚矣黃氏震曰春秋三叛臣魯受之皆非君命襄公如晋而庶其以漆閭丘來昭公如晋而牟夷以牟婁防兹來昭公在乾侯而黑肱以濫來然則實為賊淵者惟季氏與李氏廉曰經書三叛人此年邾庶其昭五年莒牟夷昭三十一年黑肱左氏所謂名其人終為不義者是也然春秋內大惡諱鄭詹之逃來春秋猶以不信諱公今直書不諱者何哉蓋此三叛之受皆我公不在國而季孫受之也季孫受而不諱正猶公在㑹未歸而師滅項不書取而書滅也觀文十八年莒僕以寶玉來奔納諸宣公而春秋不書則知在君則諱在大夫則不諱矣附録左傳濟侯使慶佐為大夫復討公子牙之黨執公子買於句瀆之丘公子鉏來奔叔孫還奔燕叔夏楚子庚卒楚子使薳子馮為令尹訪於申叔豫豫曰國多寵而王弱國不可為也遂以疾辭方暑闕地下冰而牀焉重繭衣裘鮮食而寢楚子使醫視之復曰瘠則甚矣而血氣未動乃使子南為令尹夏公至自晉秋晉欒盈出奔楚左𫝊欒桓子娶於范宣子生懷子范鞅以其亡也怨欒氏故與欒盈為公族大夫而不相能桓子卒欒祁與其老州賔通幾亡室矣懷子患之祁懼其討也訴諸宣子曰盈將為亂以范氏為死桓主而專政矣曰吾父逐鞅也不怒而以寵報之又與吾同官而專之吾父死而益富死吾父而專於國有死而已吾蔑從之矣其謀如是懼害於主吾不敢不言范鞅為之徵懷子好施士多歸之宣子畏其多士也信之懷子為下卿宣子使城著而遂逐之秋欒盈出奔楚宣子殺箕遺黃淵嘉父司空靖邴豫董叔邴師申書羊舌虎叔羆囚伯華叔向籍偃人謂叔向白子離於罪其為不知乎叔向曰與其死亡若何詩曰優哉游哉聊以卒嵗知也樂王鮒見叔向曰吾為子請叔向弗應出不拜其人皆咎叔向叔向曰必祁大夫室老聞之曰樂王鮒言於君無不行求赦吾子吾子不許祁大夫所不能也而曰必由之何也叔向曰樂王鮒從君者也何能行祁大夫外舉不棄讎內舉不失親其獨遺我乎詩曰有覺德行四國順之夫子覺者也晋侯問叔向之罪於樂王鮒對曰不棄其親其有焉於是祁奚老矣聞之乘馹而見宣子曰詩曰惠我無疆子孫保之書曰聖有謨勳明徵定保夫謀而鮮過惠訓不倦者叔向有焉社稷之固也猶將十世宥之以勸能者今一不免其身以棄社稷不亦惑乎鯀殛而禹興伊尹放大甲而相之卒無怨色管蔡為戮周公右王若之何其以虎也棄社稷子為善誰敢不勉多殺何為宣子說與之乘以言諸公而免之不見叔向而歸叔向亦不告免焉而朝初叔向之母妒叔虎之母美而不使其子皆諫其母其母曰深山大澤實生龍蛇彼美余懼其生龍蛇以禍女女敝族也國多大寵不仁人間之不亦難乎余何愛焉使往視寢生叔虎美而有勇力欒懷子嬖之故羊舌氏之族及於難欒盈過於周周西鄙掠之辭於行人曰天子陪臣盈得罪於王之守臣將逃罪罪重於郊甸無所伏竄敢布其死昔陪臣書能輸力於王室王施惠焉其子黶不能保任其父之勞大君若不棄書之力亡臣猶有所逃若棄書之力而思黶之罪臣戮餘也將歸死於尉氏不敢還矣敢布四體唯大君命焉王曰尤而效之其又甚焉使司徒禁掠欒氏者歸所取焉使候出諸轘轅著杜注晋邑十轘轅杜注轘轅關在緱氏東南輿地志其阪有二曲道將去復還故名今河南府鞏縣西南有轘轅山集說劉氏敞曰不以范丐逐之為文而以盈之自出為說使盈無可逐之釁則丐不得逐矣丐之罪易見盈之失難知此春秋所以深探其情而大正其夲也髙氏閌曰盈不能防間其母遂為范丐所逐既取奔亡復有作亂之志故特奔於楚焉以楚彊大今日可恃以逃難他日可挾以復歸也李氏廉曰欒盈以此年奔楚明年自楚適齊晋為商任沙隨之㑹以錮之二十三年齊助之入曲沃齊遂伐晋其冬晋殺欒盈欒氏亡自汪氏克寬曰士鞅之言曰欒黶汰虐已甚而盈又言黶不能保任其父之勞則欒氏之稔惡有自來矣不然夫豈無秋毫之過而遽離於罪乎季氏夲曰君子違不適讎國楚晋之讎也盈之奔楚欲因楚力以復國此無君之罪也亂黃氏震曰案欒書弒君而免於討欒黶汰而以內亡其家盈奔雖非其罪而積惡有自來矣九月庚戌朔日有食之冬十月庚辰朔日有食之集說楊氏士勛曰此年與二十四年皆頻月日食據今厯無有頻食之理但古或有之石氏介曰日食之變起於交也有雖交而不食者春秋二百四十二年而食才三十六有頻交而食者此年及二十四年三年之內連月而食者再也諸儒以為厯無此法或傳寫之誤然漢之時亦有頻食者髙帝三年及文帝前三年十月晦十一月晦是也天道至遠不可得而知後世執推步之術案交㑹之度而求之亦已難矣日許氏翰曰比年食又比月食蓋自是八年之間而七食禍變重矣髙氏閌曰厯家推步之術皆一百七十三日始一交㑹去交遠則日食漸少無頻食之理此年及二十四年頻食古今術者不能考知故日食雖天數之常聖人必以為譴異而書之以警人君之自怠也曹伯來朝左傳冬曹武公來朝始見也集說汪氏克寬曰曹武公即位三年而來朝此喪畢入見於天子之時也不朝於京師而朝於宗國曽是以為禮乎公會晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子于商任任音壬地商任杜注闕左傳㑹于商任錮欒氏也齊侯衛侯不敬叔向曰二君者必不免㑹朝禮之經也禮政之輿也政身之守也怠禮失政失政不立是以亂也知起中行喜州綽邢蒯出奔齊皆欒氏之黨也樂王鮒謂范宣子曰盍反州綽邢蒯勇士也宣子曰彼欒氏之勇也余何獲焉王鮒曰子為彼欒氏乃亦子之勇也齊莊公朝指殖綽郭最曰是寡人之雄也州綽曰君以為雄誰敢不雄然臣不敏平隂之役先二子鳴莊公為勇爵殖綽郭最欲與焉州綽曰東閭之役臣左驂迫還於門中識其枚數其可以與於此乎公曰子為晋君也對曰臣為隸新然二子者譬於禽獸臣食其肉而寢處其皮矣集說蘇氏轍曰錮欒氏非禮也古者大夫去國君使人道之出疆又先於其所往許氏翰曰欒氏之出徒以權門私相忌怨而平公受其激怒勤動諸侯以逞范鞅之積憾必欲盈無所容於世故盈發憤卒興禍亂此皆以私敗公足以為古今之至戒是時列國無事晋無所發政以亟㑹諸侯則知徒以欒氏信不誣也合王氏樵曰案欒盈實奔楚楚非晋令所行也然則諸侯而錮之何益哉蓋盈入楚必歷諸國還而求入亦必歷諸國晋知盈必求入故預約諸國使皆勿容其踪跡所向以杜其還爾附録公羊十有一月庚子孔子生穀梁庚子孔子生集說陸氏德明曰上有十月庚辰此亦十月也氏士勛曰仲尼以此年生故傳因而録之楊李氏廉曰何休以此年為己卯杜氏以為己酉已不合史記世家以為孔子生於襄公二十二年又不合未詳孰是案公羊傳襄公二十一年十一月庚子孔子生穀梁傳襄公二十一年冬十月庚子孔子生史記襄公二十二年孔子生三家不同朱子論語集注序採用孔子世家則專以史記為憑也宋氏濂作孔子生卒嵗月辨力主公穀而亦無確然不易之證但謂史記紀載多失實公穀以次相授必有據依耳夏氏洪基曰孔子生於襄二十二年至哀十六年乃為七十三嵗史記所紀正得其實公羊書月已訛豈盡可據宋濂乃從公穀作七十四嵗似乎駭聞夏氏之見卓矣通鑑前編謂襄公二十一年日再食非生聖人之年亦頗有理蓋孔子生於庚戌卒於壬戌相傳已久今折衷於朱子而參以夏氏及通鑑前編之說則史記良不誣也聖人生年自宜附見於春秋而二十二年無傳可附故仍存公穀而論之如此庚靈王二戌十一年二十有二年晋平七年齊莊三年衛獻二十六年殤八年蔡景四十一年鄭簡十五年曹武四年陳哀十八年杞孝十六年宋平二十五年秦景二十六年楚康九年吳諸樊十年春王正月公至自㑹集說吳氏澄曰著不朝正於廟也附録左傳二十二年春臧武仲如晋雨過御叔御叔在其邑將飲酒曰焉用聖人我將飲酒而已雨行何以聖為穆叔聞之曰不可使也而傲使人國之蠧也令倍其賦夏四月附録左傳夏晋人徵朝於鄭鄭人使少正公孫僑對曰在晋先君悼公九年我寡君於是即位即位八月而我先大夫子駟從寡君以朝於執事執事不禮於寡君寡君懼因是行也我二年六月朝於楚晋是以有戲之役楚人猶競而申禮於敝邑敝邑欲從執事而懼為大尤曰晋其謂我不共有禮是以不敢攜二於楚我四年三月先大夫子蟜又從寡君以觀釁於楚晋於是乎有蕭魚之役謂我敝邑邇在晋國譬諸草木吾臭味也而何敢差池楚亦不競寡君盡其土實重之以宗器以受齊盟遂帥羣臣隨於執事以㑹嵗終二於楚者子侯石盂歸而討之湨梁之明年子蟜老矣公孫夏從寡君以朝於君見於嘗酎與執燔焉間二年聞君將靖東夏四月又朝以聼事期不朝之間無嵗不聘無役不從以大國政令之無常國家罷病不虞荐至無日不惕豈敢忘職大國若安定之其朝夕在庭何辱命焉若不恤其患而以為口實其無乃不堪任命而翦為仇讎敝邑是懼其敢忘君命委諸執事執事實重圖之秋七月辛酉叔老卒集說杜氏預曰子叔齊子為髙氏閌曰此叔肸之孫聲伯之子其子弓嗣大夫是為子叔敬子附録左傳秋欒盈自楚適齊晏平仲言於齊侯曰商任之㑹受命於晋今納欒氏將安用之小所以事大信也失信不立君其圖之弗聼退告陳文子曰君人執信臣人執共忠信篤敬上下同之天之道也君自棄也弗能久矣假九月鄭公孫黑肱有疾歸邑於公召室老宗人立而使黜官薄祭祭以特羊殷以少牢足以共祀盡歸其餘邑曰吾聞之生於亂世貴而能貧民無求焉可以後亡敬共事君與二三子生在敬戒不在富也己巳伯張卒君子曰善戒詩曰慎爾侯度用戒不虞鄭子張其有焉冬公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子薛伯把伯小邾子于沙隨邾子下公穀有滕子左傳冬㑹于沙隨復錮欒氏也欒盈猶在齊晏子曰禍將作矣齊將伐晋不可以不懼胡傳案左氏㑹于商任錮欒氏也㑹于沙隨復錮欒氏也古者大夫去國君不掃其社稷不繫纍其子弟不收其田邑使人導之出疆又先之於其所往敕五典厚人倫也今晋不念欒氏世勳而逐盈又將搏執之而命諸侯無得納焉則亦過也楚逐申公巫臣子反請以重幣錮之楚子曰止彼若能利國家雖重幣晋將可乎若無益於晋晋將棄之何勞錮焉其賢於商任沙隨之謀遠矣集說家氏鉉翁曰入春秋以來大夫奔而極其所往未有若此之甚者也汪氏克寬曰屈巫將聘於齊而竊妻以逃其廢君命亦可誅矣欒盈特以父之汰侈而多怨遂為姣母所讒而見逐未有犯上可誅之實其罪視屈巫蓋薄乎云爾晋平用范丐之謀屢㑹諸侯以錮之幾致亂國楚莊雖不聼子反錮巫臣之請而嗣君卒滅其族亦致通吳之禍人君之不明而眩於權臣其患豈淺淺哉王氏樵曰案晋以欒氏之故期年之間再合諸侯見大夫之彊也齊人終保盈是令不行也令不行者以欒氏世勳出不以罪士丐之義有不直也觀春秋書二㑹見其以霸主之勢而彊諸侯以不順之令後書伐衛遂伐晋見晋國自亂而盟主至於受伐其戒深切著明矣以王氏錫爵曰晋以柄臣讒盈之故期年兩合諸侯錮之失霸主之義矣是以齊莊不服明雖為㑹而隂實保之明年遂敢於伐晋也黃氏正憲曰晋平公自度才智威力不及其父諸侯畏晋亦不及悼公之時况齊之彊大同盟未久尤其所深慮者今聞欒盈去楚適齊故復為此㑹以堅盟約以杜姦盟雖㑹十國之君意實專在於齊莊也公至自㑹楚殺其大夫公子追舒左𫝊楚觀起有寵於令尹子南未益祿而有馬數十乘楚人患之王將討焉子南之子棄疾為王御士王每見之必泣棄疾曰君三泣臣矣敢問誰之罪也王曰令尹之不能爾所知也國將討焉爾其居乎對曰父戮子居君焉用之泄命重刑臣亦不為王遂殺子南於朝轘觀起於四竟子南之臣謂棄疾請徙子尸於朝曰君臣有禮唯二三子三日棄疾請尸王許之既葬其徒曰行乎曰吾與殺吾父行將焉入曰然則臣王乎曰棄父事讎吾弗忍也遂縊而死復使薳子馮為令尹公子齮為司馬屈建為莫敖有寵於薳子者八人皆無祿而多馬他日朝與申叔豫言弗應而退從之入於人中又從之遂歸退朝見之曰子三困我於朝吾懼不敢不見吾過子姑告我何疾我也對曰吾不免是懼何敢告子曰何故對曰昔觀起有寵於子南子南得罪觀起車裂何故不懼自御而歸不能當道至謂八人者曰吾見申叔夫子所謂生死而肉骨也知我者如夫子則可不然請止辭八人者而後王安之集說蘇氏轍曰追舒罪不至死故稱國以殺國髙氏閌曰追舒寵近小人故及於難然以楚之力除一寵嬖之大夫顧豈難哉而康王始則與人之子圖其父終則殺之轘其黨於四竟由威柄失於上故刑不足以馭下也夫威柄既立則責譙足以折姦臣之鋒及其失之則刀鋸不足以當姦臣之罪其怨毒所鍾遂發於靈王之世楚之不亡者幸而已附録左𫝊十二月鄭游昄將如晋未出竟遭逆妻者奪之以館於邑丁巳其夫攻子明殺之以其妻行子展廢良而立大叔曰國卿君之二也民之主也不可以苟請舍子明之類求亡妻者使復其所使游氏勿怨曰無昭惡也集說王氏錫爵曰子展之斷獄最正辛靈王二亥十二年二十有三年晋平八年齊莊四年衛獻二十七年殤九年蔡景四十二年鄭簡十六年曹武五年陳哀十九年把孝十七年宋平二十六年秦景二十七年楚康十年吳諸樊十一年春王二月癸酉朔日有食之三月己巳把伯丐卒左𫝊春把孝公卒晋悼夫人喪之平公不徹樂非禮也禮為鄰國闕集說髙氏閌曰把自桓公以來晋悼為昏姻國國恃以興而魯禮有加焉王氏錫爵曰禮諸侯絶期平公不得為把孝喪不曰母有喪子可徹樂乎左氏不以母子言而但曰禮為鄰國闕何居母有喪不樂禮也為鄰國闕亦禮也夏邾畀我來奔公作鼻我集說杜氏預曰畀我是庶其之黨同有竊邑叛君之罪來奔故書孫氏復曰書畀我來奔惡納也惡鄉受邾叛人邑今又納邾叛人也故是年冬臧紇出奔邾亦受之劉氏敞曰公羊云以近書也此文過飾非之辭爾方家氏鉉翁曰魯受庶其二邑復納其黨天王不問伯無討春秋再書責魯也亦責晋也葬把孝公陳殺其大夫慶虎及慶寅左𫝊陳侯如楚公子黃訴二慶於楚楚人召之使慶樂往殺之慶氏以陳叛夏屈建從陳侯圍陳陳人城板隊而殺人役人相命各殺其長遂殺慶虎慶寅楚人納公子黃君子謂慶氏不義不可肆也故書曰惟命不于常穀梁稱國以殺罪纍上也及慶寅慶寅纍也胡𫝊案左氏慶虎無道求専陳國暴蔑其君畏公子黃之逼而訴諸楚曰與蔡司馬同謀楚人以為討公子黃奔楚訴之二慶以陳叛楚屈建圍陳殺二慶夫人君擅一國之利勢使權臣暴蔑其身而不能逺欲去其親而不能保譖訴之於大國而不能辨則非君人之道也故二慶之死稱國以殺公子黃之出特以弟書者譏歸陳侯也凡此皆春秋端本之意集說杜氏預曰書名皆罪其専國叛君言及史異辭無義例孔氏穎達曰被殺書名是罪之文故以専國叛君為二慶罪狀成十八年晋殺其大夫郤錡郤犫郤至哀四年蔡殺其大夫公孫姓公孫霍皆不言及文九年晋殺其大夫士縠及箕鄭父與此竝言及𫝊無其說知是史異辭無義例也劉氏敞曰其言及慶寅何以罪及之也寅慶虎之族也杜氏云言及史異辭則是春秋非復聖人之法也専用史而已豈其然哉罪而及寅也髙氏閌曰書及著罪在慶虎以虎之家氏鉉翁曰導陳侯以叛晋即楚者三慶也奔母弟黃於楚者亦二慶也楚人討而殺之納黃于陳二慶之誅黃之復楚皆専之春秋書法如此若陳人之自殺之自復之不與楚之専制也之汪氏克寬曰公子黃之奔為訴二慶而往也陳侯如楚蓋惑於權臣而將為二慶與黃和解之爾屈建之圍挾陳侯以討二慶二慶之閉城知楚人之必誅己而拒之非叛陳侯也故不書二慶之叛陳人逼於兵殺二慶以說於楚故不以討賊之辭言之譏其殺之不以其罪以著陳侯之無能為也其王氏樵曰案慶虎慶寅據國叛君其罪大矣不正誅而稱國以殺何也見陳侯之不能以罪討也故不以討賊之辭言之使陳能討賊則必如欒盈良霄之例矣使楚能為陳討賊則必如夏徵舒慶封之例矣陳侯之弟黃自楚歸于陳集說何氏休曰前為二慶所譖出奔楚楚人治其罪陳人誅二慶反光故言歸宋大夫山譖華元貶此不貶者殺二慶而光歸譖光可知氏范氏寧曰鄭嗣曰光反稱弟言歸無罪明矣蘇轍曰楚屈建從陳侯圍陳陳殺二慶而納黃二慶之罪當死而陳不能誅也因楚而後克之故稱國以殺所以病陳也二慶死則黃之歸無難矣良髙氏閌曰二慶死則黃之歸易矣讒誣不釋則忠不顯姦宄不誅則淑善不遂君子小人相為伏見故陳討二慶而公子黃返也季氏本曰自楚者因楚力也自此當國用事矣晋欒盈復入于晉入于曲沃左𫝊晋將嫁女於吳齊侯使析歸父媵之以藩載欒盈及其士納諸曲沃欒盈夜見胥午而告之對曰不可天之所廢誰能興之子必不免吾非愛死也知不集也盈曰雖然因子而死吾無悔矣我實不天子無咎焉許諾伏之而觴曲沃人樂作午言曰今也得欒孺子何如對曰得主而為之死猶不死也皆歎有泣者爵行又言皆曰得主何二之有盈出遍拜之四月欒盈帥曲沃之甲因魏獻子以晝入絳初欒盈佐魏莊子於下軍獻子私焉故因之趙氏以原屛之難怨欒氏韓趙方睦中行氏以伐秦之役怨欒氏而固與范氏和親知悼子少而聼於中行氏程鄭嬖於公唯魏氏及七輿大夫與之樂王鮒侍坐於范宣子或告曰欒氏至矣宣子懼桓子曰奉君以走固宫必無害也且欒氏多怨子為政欒氏自外子在位其利多矣既有利權又執民柄將何懼焉欒氏所得其唯魏氏乎而可彊取也夫克亂在權子無懈矣公有姻喪王鮒使宣子墨縗冒絰二婦人輦以如公奉公以如固宫范鞅逆魏舒則成列既乘將逆欒氏矣趨進曰欒氏帥賊以入鞅之父與二三子在君所矣使鞅逆吾子鞅請驂乘持帶遂超乘右撫劍左援帶命驅之出僕請鞅曰之公宣子逆諸階執其手賂之以曲沃初斐豹隸也著於丹書欒氏之力臣曰督戎國人懼之斐豹謂宣子曰苟焚丹書我殺督戎宣子喜曰而殺之所不請於君焚丹書者有如日乃出豹而閉之督戎從之踰隱而待之督戎踰入豹自後擊而殺之范氏之徒在臺後欒氏乘公門宣子謂鞅曰矢及君屋死之鞅用劍以帥卒欒氏退攝車從之遇欒樂曰樂免之死將訟女於天樂射之不中又注則乘槐本而覆或以㦸鉤之斷肘而死欒魴傷欒盈奔曲沃晋人圍之公羊曲沃者何晋之邑也胡𫝊欒氏晋室之世臣故盈雖出奔猶繫於晋復入者甚逆之辭為其既絶而復入也曲沃者所食之地當是時權寵之臣各以利誘其下使為之用至於殺身而不避莫知有君臣之分者也故聞語欒孺子者則或泣或歎以為得主而為之死猶不死也盈從之遂入絳乘公門若非天棄欒氏又有范鞅之謀晋亦殆矣原其失在於錮之甚急使無所容於天地之間是以至此極春秋備書之以見人而不仁疾之已甚亂也其為後世鑒豈不深切著明也哉集說杜氏預曰兵敗奔曲沃據曲沃衆還與君爭非欲出附他國故不言叛孫氏復曰此欒盈以曲沃之甲入晋敗而奔曲沃也經言欒盈復入于晋入于曲沃者欒盈復入于晋犯君當誅曲沃大夫不可納也入于曲沃明曲沃大夫納之當坐歸杜氏諤曰春秋之法復入重於入入重於復歸復重於歸然則復入者惡甚之辭盈王氏葆曰魚石未嘗入于宋也入于彭城而已欒則先入于晋後入于曲沃故上言復入下言入也公髙氏閌曰曲沃即沃昭公分國以封沃沃盛彊昭微弱國人將叛而歸沃故詩人作揚之水椒聊杕杜之詩以見意然則沃者晋之腴饒彊盛必叛之邑也今曲沃大夫不由君命而擅納盈以曲沃乃盈舊所食之私邑故盈帥曲沃之甲以入晋不勝而反入曲沃焉故書入于曲沃見盈有叛心又見曲沃知有盈而不知有晋君也國家氏鉉翁曰盈挾齊之援復入于晋將不利于宗非晋臣矣春秋猶書晋欒盈者一以明君臣之分而討之亦以閔欒氏為晋世臣而自絶於晋耳宋魚石義與此同欒程氏端學曰宋魚石入于彭城將引楚作亂也晋盈入于晋自作亂也皆亂賊也春秋書之不特為人臣之戒亦所以著君人者不能正身治國防微杜漸而封邑踰制假臣以權卒之亂國矣汪氏克寬曰朱子謂不仁之人不能容之則必致亂蓋不仁之人力能誅則誅之苟不能誅而徒疾之使之無所容其身事窮勢迫則必為悖逆爭鬬之事矣况欒盈非有弒父與君之大惡逐之去國則亦已矣何至動天下之諸侯一再㑹聚而禁錮之哉鋌而走險急何能擇盈之復入于晋實晋有以激之耳案經書復入于晋入于曲沃公羊曰由乎曲沃而入也非也盈雖帥曲沃之甲以入晋而兵敗之後仍入由沃故春秋據其實而書之也如公羊之言當先書入曲沃後書入晋矣秋齊侯伐衛遂伐晉齊始伐盟主左𫝊秋齊侯伐衛先驅穀榮御王孫揮召揚為右申驅成秩御莒恆申鮮虞之傅摯為右曹開御戎晏父戎為右二廣上之登御邢公盧蒲癸為右啓牢成御襄罷師狼蘧疏為右胠商子車御侯朝桓跳為右大殿商子游御夏之御寇崔如為右燭庸之越駟乘自衛將遂伐晋晏平仲曰君恃勇力以伐盟主若不濟國之福也不德而有功憂必及君崔杼諫曰不可臣聞之小國間大國之敗而毁焉必受其咎君其圖之弗聼陳文子見崔武子曰將如君何武子曰吾言於君君弗聼也以為盟主而利其難羣臣若急君於何有子姑止之文子退告其人曰崔子將死乎謂君甚而又過之不得其死過君以義猶自抑也况以惡乎齊侯遂伐晋取朝歌為二隊入孟門登大行張武軍於熒庭戍郫邵封少水以報平隂之役乃還趙勝帥東陽之師以追之獲晏氂朝歌杜注屬汲郡今淇縣即古朝歌也行孟門杜注晋隘道司馬貞曰在朝歌東北太地理志在河內郡野王縣西北今河內縣即野王縣水熒庭杜注晋邑郫邵杜注晋邑少水即澮也出開封府密縣古鄶城西北恩東陽杜注晋之山東魏郡廣平以北今臨清州縣西北六十里有東陽城集說杜氏預曰兩事故言遂遂杜氏諤曰以兵伐衛猶不可况遂伐晋乎言者甚其伐二國也陳氏傅良曰其書遂何齊始伐盟主也自袁婁以來齊世從晋於是始叛則晋霸之衰而諸侯二矣晋之衰諸侯之憂也猶汪氏克寬曰齊莊本意在伐晋而伐衛以先之亦齊桓本意在伐楚而侵蔡以先之也討從楚之與國而後討彊楚善之大者也伐從霸之與國而果於陵霸主惡之大者也春秋之書遂其中有大美惡焉案上書欒盈入曲沃而繼書齊侯伐晋則盈之為齊所納可知矣八月叔孫豹帥師救晉次于雍榆雍於用反榆公穀作渝雍榆杜注晋地汲郡朝歌縣東有雍城郡邑志黎陽縣有雍城即古雍榆也今雍榆城在濬縣西南十八里左𫝊八月叔孫豹帥師救晋次于雍榆禮也穀梁言救後次非救也集說陸氏淳曰淳聞於師曰凡言救者救急之名不當次止也孫氏復曰次止也言救言次惡不急救患也君命救晋豹畏齊廢命而止故曰叔孫豹帥師救晋次于雍榆以惡之劉氏敞曰非救攻之道也杜云待命于雍榆故書次非也救者赴急之師也受命以出又何待焉即待晋命者豈救人之急方待命而行哉公羊曰先救後次先通君命也非也大夫受命而出豈有君命而不通哉孫氏覺曰不救則懼晋之討往救則畏齊之彊卒蘇氏轍曰聶北之役先言次而後言救按兵待時能救邢故以救終之也雍榆之役先言救而後言次以救晋出兵而盤桓於雍榆不及於事故以次終之也劉氏絢曰晋有欒盈之難重以齊侯之伐魯命豹救之義也豹怠棄君命不恤同姓之憂次于雍榆卒不能救豹罪明矣其陳氏傅良曰次而救匿其救之之形也救而次宣救之之聲也書救晋何晋遂失霸也以區區之魯何救於晋書救晋則天下益多故矣盟于宋而南北之勢成㑹于申而淮夷至戰于雞父而吳之敗者六國於越入吳春秋終焉蓋於是焉始故謹而書之也是故自救盟主而後昭二十一年晋帥諸侯之師救宋三十年楚沈尹戌救徐之類皆不書宣曰次于雍榆有所畏也救晋而憚行也薛氏季程氏端學曰亦見三家之専而魯君威命之不行也齊汪氏克寬曰外𫝊記子服惠伯之言曰欒氏之亂人間晋之禍伐取朝歌我先君襄公不敢寧處使叔孫豹悉帥敝賦踦跂畢行無有處人以從軍吏次于雍榆與邯鄲勝擊齊之左掎止晏萊焉齊師退而後敢還則穆叔非無功於晋也然春秋不著其救患之功但曰次于雍榆蓋穆叔與趙勝皆畏齊師而不敢敵待其已去而躡其後耳案伯國被伐魯自當救救而書次則遲回觀望非能救者也春秋譏之左氏以為禮公羊以為先通君命皆誤矣己卯仲孫速卒左𫝊季武子無適子公彌長而愛悼子欲立之訪於申豐曰彌與紇吾皆愛之欲擇才焉而立之申豐趨退歸盡室將行他日又訪焉對曰其然將具敝車而行乃止訪於臧紇臧紇曰飲我酒吾為子立之季氏飲大夫酒臧紇為客既獻臧孫命北面重席新樽潔之召悼子降逆之大夫皆起及旅而召公鉏使與之齒季孫失色季氏以公鉏為馬正愠而不出閔子馬見之曰子無然禍福無門唯人所召為人子者患不孝不患無所敬共父命何常之有若能孝敬富倍季氏可也姦回不軌禍倍下民可也公鉏然之敬共朝夕恪居官次季孫喜使飲己酒而以具往盡舍旃故公鉏氏富又出為公左宰孟孫惡臧孫季孫愛之孟氏之御騶豐點好羯也曰從余言必為孟孫再三云羯從之孟莊子疾豐點謂公鉏苟立羯請讎臧氏公鉏謂季孫曰孺子秩固其所也若羯立則季氏信有力於臧氏矣弗應己卯孟孫卒公鉏奉羯立於户側季孫至入哭而出曰秩焉在公鉏曰羯在此矣季孫曰孺子長公鉏曰何長之有唯其才也且夫子之命也遂立羯秩奔邾臧孫入哭甚哀多涕出其御曰孟孫之惡子也而哀如是季孫若死其若之何臧孫曰季孫之愛我疾疢也孟孫之惡我藥石也美疢不如惡石夫石猶生我疢之美其毒滋多孟孫死吾亡無日矣集說孫氏復曰孟莊子也乎汪氏克寬曰魯自仲遂殺適立庶公室於是失政魯卿自季孫宿以私意廢長立幼於是家臣效尤孟氏之豐點廢秩立羯叔孫氏之豎牛殺孟丙而立舍皆託廢立以擅其權而三桓微矣作俑之禍其流弊可勝言哉冬十月乙亥臧孫紇出奔邾左𫝊孟氏閉門告於季孫曰臧氏將為亂不使我葬季孫不信臧孫聞之戒冬十月孟氏將辟藉除於臧氏臧孫使正夫助之除於東門甲從已而視之孟氏又告季孫季孫怒命攻臧氏乙亥臧紇斬鹿門之關以出奔邾初臧宣叔娶於鑄生賈及為而死繼室以其姪穆姜之姨子也生紇長於公宫姜氏愛之故立之臧賈臧為出在鑄臧武仲自邾使告臧賈且致大蔡焉曰紇不佞失守宗祧敢告不弔紇之罪不及不祀子以大蔡納請其可賈曰是家之禍也非子之過也賈聞命矣再拜受龜使為以納請遂自為也臧孫如防使來告曰紇非能害也知不足也非敢私請苟守先祀無廢二勳敢不辟邑乃立臧為臧紇致防而奔齊其人曰其盟我乎臧孫曰無辭將盟臧氏季孫召外史掌惡臣而問盟首焉對曰盟東門氏也曰毋或如東門遂不聼公命殺適立庶盟叔孫氏也曰毋或如叔孫僑如欲廢國常蕩覆公室季孫曰臧孫之罪皆不及此孟椒曰盍以其犯門斬關季孫用之乃盟臧氏曰無或如臧孫紇干國之紀犯門斬關臧孫聞之曰國有人焉誰居其孟椒乎鑄杜注鑄國濟北蛇丘縣所治今濟南府肥城縣有鑄鄉即漢蛇丘縣治也穀梁蘧伯玉曰不以道事其君者其出乎集說杜氏預曰阿順季氏為之廢長立少以取奔亡書奔罪之家氏鉉翁曰季宿之納邾盜也臧紇所與言者為何如今乃以媚道自結於季孫亦何異於盜季宿自亂己之嫡庶復亂人之嫡庶又蔽罪臧紇而逐之紇固有罪宿之恣雎不度亦甚矣疑王氏錫爵曰武仲除道東門本非為亂而甲從則於為亂納蔡請後本非要君而據邑則涉於要君想其人持論有餘而守道不足動而見尤乃所自取知士然乎哉晉人殺欒盈左𫝊晋人克欒盈於曲沃盡殺欒氏之族黨欒魴出奔宋書曰晋人殺欒盈不言大夫言自外也公羊曷為不言殺其大夫非其大夫也穀梁惡之弗有也集說杜氏預曰自外犯君而入非復晋大夫也孫氏復曰不言其大夫者欒盈出奔楚當絶稱人以殺從討賊辭殺陳氏傅良曰討亂不書殺欒盈何以書討亂常事欒盈非常事也欒盈亡大夫爾曷為謂之非常晋為盟主而再合諸侯于商任于沙隨以錮欒氏則是非常也盈之入也晋人大懼奉君以走固宫而盈以曲沃之甲乘公門矢及君屋蓋僅焉克之而已書殺欒盈猶州吁無知是非常之辭也鄭良霄曷為書之如欒盈霄奔許鄭伯為之盟大夫盟國人霄自墓門之瀆入因馬師頡介於襄庫以伐舊北門書殺良霄亦非常之辭也甚矣文公而下諸侯無政大夫彊也齊氏履謙曰春秋凡殺公子不稱公子大夫不稱大夫者皆討賊之辭公子不稱公子衛州吁齊無知是已大夫不稱大夫晋欒盈鄭良霄是已見殺於他國者陳他公子也陳夏徵舒陳孔奐齊慶封大夫也亦皆討賊辭也案盈為權臣所逐畏罪出奔幸保其身足矣乃恃齊之援以入晋又入曲沃而阻兵相攻則無君之罪大矣稱國以殺而削其大夫所以深罪盈也士丐逐盈兩年之中再合諸侯以錮之既克曲沃則盡其族而殲之晋國之大權皆丐所操而晋侯徒擁虛器也春秋據事直書而晋侯之失政士丐之擅權不待貶而自見矣齊侯襲莒左𫝊齊侯還自晋不入遂襲莒門於且于傷股而退明日將復戰期於壽舒把殖華還載甲夜入且于之隧宿於莒郊明日先遇莒子於蒲侯氏莒子重賂之使無死曰請有盟華周對曰貪貨棄命亦君所惡也昏而受命日未中而棄之何以事君莒子親鼓之從而伐之獲把梁莒人行成齊侯歸遇把梁之妻於郊使弔之辭曰殖之有罪何辱命焉若免於罪猶有先人之敝廬在下妾不得與郊弔齊侯弔諸其室且于杜注莒邑今在青州府莒州境莒壽舒杜注莒邑亦屬莒州蒲侯氏杜注近之邑集說劉氏敞曰襲之者何掩之也何以書譏何譏爾襲人而勝之雖得天下仁者不為也孫氏覺曰以彊攻弱又掩其不備焉罪之尤者也兵髙氏閌曰以十八年莒子同諸侯圍齊故也凡用皆聲言彼罪執辭以伐若乘人不備掩而取之則盜賊之為耳春秋獨此書襲者罪齊侯以諸侯之尊為盜賊之事也而家氏鉉翁曰齊人還自晋襲莒無名之師也著爵書襲賤之也李氏亷曰春秋用兵之中惟齊之叛晋也一書伐曹入其郛一書襲莒皆一經之特筆深惡之也汪氏克寬曰齊莊以千乘之君帥三軍之衆輕行襲莒卒不能勝一微國身傷臣獲此君子之所以貴乎正也附録左𫝊齊侯將為臧紇田臧孫聞之見齊侯與之言伐晋對曰多則多矣抑君似鼠夫鼠晝伏夜動不穴於寢廟畏人故也今君聞晋之亂而後作焉寧將事之非鼠何如乃弗與田仲尼曰知之難也有臧武仲之知而不容於魯國抑有由也作不順而施不恕也夏書曰念兹在兹順事恕施也壬靈王二子十三年二十有四年晋平九年齊莊五年衛獻二十八年殤十年蔡景四十三年鄭簡十七年曹武六年陳哀二十年把文公益姑元年宋平二十七年秦景二十八年楚康十一年吳諸樊十二年春叔孫豹如晉左𫝊二十四年春穆叔如晋范宣子逆之問焉曰古人有言曰死而不朽何謂也穆叔未對宣子曰昔丐之祖自虞以上為陶唐氏在夏為御龍氏在商為豕韋氏在周為唐杜氏晋主夏盟為范氏其是之謂乎穆叔曰以豹所聞此之謂世祿非不朽也魯有先大夫曰臧文仲既沒其言立其是之謂乎豹聞之大上有立德其次有立功其次有立言雖久不廢此之謂不朽若夫保姓受氏以守宗祊世不絶祀無國無之祿之大者不可謂不朽陶唐杜注堯所治地太原晋陽縣也韋豕韋杜注國名東郡白馬縣東南有韋城隋置城縣唐宋因之金廢為鎮今在大名府滑縣東南五十里於唐杜杜注殷末豕韋國於唐周成王滅唐遷之杜杜今京兆杜縣案秦置杜縣漢改杜陵今杜陵故城在陜西西安府治東南十五里范晋邑戰國時為齊地孟子自范之齊是也漢置范縣屬東郡唐改屬濮州宋以後因之今范縣東南二十五里有古范城集說杜氏預曰賀克欒氏也期湛氏若水曰諸侯邦交之禮有朝聘㑹同之非其期則謂之非禮杜氏曰賀克欒氏也夫欒氏之不臣克之乃天討也賀之豈禮乎王氏錫爵曰穆叔已言文仲立言而又以立德與功先之見文仲猶非第一義也况世祿乎甚有軒輊附録左𫝊范宣子為政諸侯之幣重鄭人病之二月鄭伯如晋子産寓書於子西以告宣子曰子為晋國四鄰諸侯不聞令德而聞重幣僑也惑之僑聞君子長國家者非無賄之患而無令名之難夫諸侯之賄聚於公室則諸侯二若吾子賴之則晋國二諸侯二則晋國壞晋國二則子之家壞何沒沒也將焉用賄夫令名德之輿也德國家之基也有基無壞無亦是務乎有德則樂樂則能久詩云樂只君子邦家之基有令德也夫上帝臨女無二爾心有令名也夫恕思以明德則令名載而行之是以逺至邇安毋寧使人謂子子實生我而謂子浚我以生乎象有齒以焚其身賄也宣子說乃輕幣是行也鄭伯朝晋為重幣故且請伐陳也鄭伯稽首宣子辭子西相曰以陳國之介恃大國而陵虐於敝邑寡君是以請罪焉敢不稽首仲孫羯帥師侵齊左𫝊孟孝伯侵齊晋故也集說孫氏復曰羯仲孫速子孟孝伯也于髙氏閌曰齊之伐晋也魯使叔孫豹救之次雍榆無功於晋故孟孝伯至此復帥師侵齊為晋報焉蓋懼晋之疑也羯代速為卿未練而帥師亦無復三年之喪夏楚子伐吳左𫝊夏楚子為舟師以伐吳不為軍政無功而還集說髙氏閌曰於是見楚弱而吳之張也襄十一年楚失鄭十四年伐吳自是舍鄭而不爭又十年而一再伐吳急吳而緩他國也秋七月甲子朔日有食之既集說家氏鉉翁曰二十一年九月十月朔此年七月八月連書日食疏家引厯術謂無連月日食之事愚謂天道有時而變常若執一定之律恐失春秋記災示警之意齊崔杼帥師伐莒左𫝊齊侯既伐晋而懼將欲見楚子楚子使薳啓彊如齊聘且請期齊社搜軍實使客觀之陳文子曰齊將有寇吾聞之兵不戢必取其族秋齊侯聞將有晋師使陳無宇從薳啓彊如楚辭且乞師崔杼帥師送之遂伐莒侵介根介根杜注莒邑城陽黔陬縣東北計基城是也漢置計斤縣如淳曰斤音基今膠州西南五里有介根城集說胡氏銓曰自古姦臣篡弒之禍未有不本於其君假之以權之重而任之久也趙盾崔杼皆假威弄權盟㑹侵伐無所不至其君信之深任之篤一旦變生肘腋而猶弗悟故聖人詳録其漸凡一侵一伐必謹而志之以明兵柄倒持積而為篡弒之禍故趙盾之將弒則先書其侵崇侵鄭之漸崔杼之將弒則先書其伐莒伐魯之漸易曰其所由來者漸矣可不鑒哉髙氏閌曰去年齊侯襲莒已與莒平今崔杼因帥師送使者如楚而遂伐莒是見利則乘齊人之無信也汪氏克寬曰齊莊之襲莒身傷臣獲未伸其志故雖與莒平而復伐之耳然已既失信將何以保人之信於己乎大水集說許氏翰曰夷儀之㑹以水不克伐齊則知水之所及廣矣非特魯之災也湛氏若水曰書大水志災也八月癸巳朔日有食之公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子于夷儀夷儀公作陳儀後同左𫝊㑹于夷儀將以伐齊水不克集說髙氏閌曰自盟于柯陵之後齊有輕晋之心㑹齊侯環卒而光新立乃受盟于澶淵及商任沙隨之㑹晋失其令齊於是復二明年乃伐衛遂伐晋又再加兵於莒晋侯為是故㑹于夷儀帥十二諸侯之師將以討齊然㑹而不伐是有畏也國勢不競衆志不一也曰水不克者特辭不能伐爾下書崔杼伐我西鄙蓋知晋之無能為也而汪氏克寬曰晋㑹諸侯欲伐齊而不能伐故書㑹不書伐以著其大合十二國之君而無所事也蓋進則憚齊之彊退又憂楚之伐鄭是以一㑹而徒返耳平隂之役鄭伯在㑹楚亦間之以伐鄭而公子午孤軍入境未足撓鄭今此鄭伯亦在㑹而楚子帥諸侯之師以攻鄭諸侯是以去齊而救鄭焉伐而不果救不及事晋伯之衰亦可知矣春秋所以不書諸侯之救鄭也冬楚子蔡侯陳侯許男伐鄭左𫝊冬楚子伐鄭以救齊門於東門次於棘澤諸侯還救鄭晋侯使張骼輔躒致楚師求御於鄭鄭人卜宛射犬吉子大叔戒之曰大國之人不可與也對曰無有衆寡其上一也大叔曰不然部婁無松柏二子在幄坐射犬於外既食而後食之使御廣車而行已皆乘乘車將及楚師而後從之乘皆踞轉而鼓琴近不告而馳之皆取胄於櫜而胄入壘皆下搏人以投收禽挾囚弗待而出皆超乘抽弓而射既免復踞轉而鼓琴曰公孫同乘兄弟也胡再不謀對曰曩者志入而已今則怯也皆笑曰公孫之亟也楚子自棘澤還使薳啓彊帥師送陳無宇吳人為楚舟師之役故召舒鳩人舒鳩人叛楚楚子師於荒浦使沈尹壽與師祁犂讓之舒鳩子敬逆二子而告無之且請受盟二子復命王欲伐之薳子曰不可彼告不叛且請受盟而又伐之伐無罪也姑歸息民以待其卒卒而不二吾又何求若猶叛我無辭有庸乃還棘澤在今開封府新鄭縣東南鳩舒鳩杜注楚屬國荒浦杜注舒地集說杜氏諤曰加楚子於三國之上雖曰主兵亦所以惡三國也李氏亷曰蕭魚之後楚兵再至鄭而無功則以悼公之餘澤也此汪氏克寬曰晋陽處父伐楚以救江則書伐書救書伐鄭不書以救齊不豫楚人之救也衰季氏夲曰楚既制吳於是率三國伐鄭瞰晋霸之而諸侯之二也然子産用事有備而楚亦無功矣公至自㑹集說髙氏閌曰諸侯救鄭不書故以㑹致陳針宜咎出奔楚針其亷反左𫝊陳人復討慶氏之黨針宜咎出奔楚集說杜氏預曰書名惡之也逐許氏翰曰宜咎之事無聞焉耳而以慶氏黨則其人亦可知矣易曰比之匪人不亦傷乎在王氏葆曰宜咎陳大夫針子八世孫其後楚為針尹宜咎叔孫豹如京師左𫝊齊人城郟穆叔如周聘且賀城王嘉其有禮也賜之大路集說許氏翰曰自宣九年仲孫蔑如京師其後五十餘年乃始有叔孫豹之聘蓋自是不聘王矣髙氏閌曰襄公即位二十有四年如晋者五出㑹諸侯者十有三未嘗朝天子也是時穀洛鬭毁王宮而齊侯叛晋求媚於天子故為王城之於是叔孫豹始如京師聘且賀焉李氏廉曰魯之聘王止此此後止書叔鞅之㑹葬而已聘汪氏克寬曰襄之聘晋者九是年春先聘晋冬乃王書以著魯之慢王也城郟魯不與城故不書能王氏樵曰案郟王城也於是穀洛鬭毁王宫晉不為王城之而齊為義舉也大饑穀梁五穀不升為大饑一穀不升謂之嗛二穀不升謂之饑三穀不升謂之饉四穀不升謂之康五穀不升謂之大侵大侵之禮君食不兼味臺榭不塗弛侯廷道不除百官布而不制鬼神禱而不祀此大侵之禮也胡𫝊古者救災之政若國凶荒或發廩以賑乏或移粟以通用或徙民以就食或為粥溢以救餓莩或興工作以聚失業之人緩刑舍禁弛力薄征索鬼神除盜賊弛射侯而不燕置廷道而不修殺禮物而不備雖有旱乾水溢民無菜色所以備之者如此其至是年秋有隂沴之災而冬大饑蓋所以賑業之者有不備矣故書之以為戒集說楊氏士勛曰五穀不升謂之大侵又謂之大饑通而言之正是一物也薛氏季宣曰民有殍為大饑國無凶荒之備一大水而民有殍無政也蝝趙氏鵬飛曰宣十年秋大水而冬饑十五年秋螽而冬饑夫為國無一年之積一經災沴則饑饉繼之何以為國今秋大水而冬大饑其無先具尤可知矣平家氏鉉翁曰饑而書大民之流亡困躓必有異乎常汪氏克寬曰襄公享國二十有四年當有八年之積是年水災所及雖廣然未嘗壞宗廟毁宫室墮城郭則倉廩之所儲固無恙也今無一年之畜而遽至大饑則見其備荒之無素矣春秋書大有年大饑各一大有年者異天道之反常大饑者著人事之不能處變也書大旱者二大水者八水旱非大不書附録左𫝊晋侯嬖程鄭使佐下軍鄭行人公孫揮如晋聘程鄭問焉曰敢問降階何由子羽不能對歸以語然明然明曰是將死矣不然將亡貴而知懼懼而思降乃得其階下人而已又何問焉且夫既登而求降階者知人也不在程鄭其有亡釁乎不然其有惑疾將死而憂也癸靈王二丑十四年二十有五年晋平十年齊莊六年衛獻二十九年殤十一年蔡景四十四年鄭簡十八年曹武七年陳哀二十一年把文二年宋平二十八年秦景二十九年楚康十二年吳諸樊十三年春齊崔杼帥師伐我北鄙左𫝊報孝伯之師也公患之使告於晋孟公綽曰崔子將有大志不在病我必速歸何患焉其來也不寇使民不嚴異於他日齊師徒歸集說許氏翰曰崔子之志鄰國知之而齊莊不寤人將戕其躬之不恤而務貪伐國之功故利令智昏外競而內傾自然之符也兵趙氏與權曰兵凶器也弗戢必自焚齊莊連嵗用伐衛伐晋伐莒伐魯三年之間曽弗之戢而又授兵於好亂之夫蛟虯作於隂虎兕出於柙宜其終不免於禍也夏五月乙亥齊崔杼弒其君光左𫝊齊棠公之妻東郭偃之姊也東郭偃臣崔武子棠公死偃御武子以弔焉見棠姜而美之使偃取之偃曰男女辨姓今君出自丁臣出自桓不可武子筮之遇困之大過史皆曰吉示陳文子文子曰夫從風風隕妻不可娶也且其繇曰困于石據于蒺藜入于其宫不見其妻凶困于石往不濟也據于蒺藜所恃傷也入于其宫不見其妻凶無所歸也崔子曰婺矛牙也何害先夫當之矣遂取之莊公通焉驟如崔氏以崔子之冠賜人侍者曰不可公曰不為崔子其無冠乎崔子因是又以其間伐晋也曰晋必將報欲弒公以說於晋而不獲間公鞭侍人賈舉而又近之乃為崔子間公夏五月莒為且于之役故莒子朝於齊甲戌饗諸北郭崔子稱疾不視事乙亥公問崔子遂從姜氏姜入於室與崔子自側户出公拊楹而歌侍人賈舉止衆從者而入閉門甲興公登臺而請弗許請盟弗許請自刃於廟弗許皆曰君之臣杼疾病不能聼命近於公宫陪臣干掫有淫者不知二命公踰牆又射之中股反隊遂弒之賈舉州綽邴師公孫敖封具鐸父襄伊僂堙皆死祝他父祭於髙唐至復命不說辨而死於崔氏申蒯侍漁者退謂其宰曰爾以帑免我將死其宰曰免是反子之義也與之皆死崔氏殺鬷蔑於平隂晏子立於崔氏之門外其人曰死乎曰獨吾君也乎哉吾死也曰行乎曰吾罪也乎哉吾亡也曰歸乎曰君死安歸君民者豈以陵民社稷是主臣君者豈為其口實社稷是養故君為社稷死則死之為社稷亡則亡之若為己死而為己亡非其私昵誰敢任之且人有君而弒之吾焉得死之而焉得亡之將庸何歸門啓而入枕尸股而哭興三踊而出人謂崔子必殺之崔子曰民之望也舍之得民盧蒲癸奔晋王何奔莒叔孫宣伯之在齊也叔孫還納其女於靈公嬖生景公丁丑崔杼立而相之慶封為左相盟國人於大宫曰所不與崔慶者晏子仰天歎曰嬰所不唯忠於君利社稷者是與有如上帝乃歃辛巳公與大夫及莒子盟大史書曰崔杼弒其君崔子殺之其弟嗣書而死者二人其弟又書乃舍之南史氏聞大史盡死執簡以往聞既書矣乃還閭丘嬰以帷縛其妻而載之與申鮮虞乘而出鮮虞推而下之曰君昏不能匡危不能救死不能死而知匿其昵其誰納之行及弇中將舍嬰曰崔慶其追我鮮虞曰一與一誰能懼我遂舍枕轡而寢食馬而食駕而行出弇中謂嬰曰速驅之崔慶之衆不可當也遂來奔崔氏側莊公於北郭丁亥葬諸士孫之里四翣不蹕下車七乘不以兵甲弇中杜注狹道穀梁莊公失言淫於崔氏胡𫝊齊莊公見弒賈舉州綽等十人皆死之而不得以死節稱何也所謂死節者以義事君責難陳善有所從違而不苟者是也雖在屬車後乘必不肯同入崔氏之宫矣若此十人者獨以勇力聞皆逄君之惡從於昏亂而莊公嬖之者死非其所比諸匹夫匹婦自經於溝瀆而莫之知者猶不逮也安得以死節許之哉集說許氏翰曰齊莊勢陵大邦衆暴小國而又躬亂巨室淫肆不君故使崔杼因民不忍以與敵市此足以為世鑒矣其髙氏閌曰崔杼不能防間其妻以淫於家又不絶妻而行大逆於君齊莊背諸侯之盟數行侵伐崔杼因民之忿遂以宣淫之故弒之陳氏傅良曰宋萬魯慶父奔而後誅之則不書殺以是為佚賊也齊討君之讎而滅崔氏則何以亦不書殺崔杼弒君偃然猶在位也而以家禍亡其宗如是而得書則臣子之不誠於君父者可以盜名矣是故鄭人斫歸生之棺而葬靈公齊人暴崔杼之尸而葬莊公春秋終不書葬則猶不葬也五黃氏仲炎曰齊崔杼自虛朾同盟専國柄者二十年矣而其君終莫之疑也是以一旦動於惡焉易曰履霜堅冰至蓋言順也臣弒其君子弒其父非一朝一夕之故其所由來者漸矣由辨之不早辨也聖人於易示其象於春秋著其事所以為後世人君之戒嚴矣家氏鉉翁曰光迫其父而奪之位於例當稱國以弒而非杼所得討也導光以篡者杼也又從而弒之是故坐以首惡之罪驕程氏端學曰齊光自為世子而出與㑹盟侵伐或蹇序於諸侯之上及其即位則背喪出盟違盟伐衛遂伐盟主襲莒伐魯莫非悖亂之舉春秋歷書崔氏之世卿崔杼之専權又書齊光之悖亂而終之以此亂臣賊子懼矣人君鑒戒昭矣案齊莊之弒晏嬰謂其為己死而非私昵者不敢任其說非也宋之殤閔其死不為社稷而孔父仇牧豈二君之私昵耶莊公被弒之禍嬰固早知之矣納欒氏則以為弗能久伐衛晋則以為憂必及預䇿其必敗以示先見之哲而一旦有事則假社稷為重而自明其不必死使天下之貪生而忘義者皆得藉口以為苟免之計畔道傷教安可訓也陳文子有馬十乘棄而違之聖人許其清晏嬰齊之公族世為國卿與亂賊竝立於朝而不聞有討逆之謀其負慚多矣胡氏安國以賈舉等從君於昏不得以死節稱引嬰言以證之非通方之論也公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子于夷儀左𫝊晋侯濟自泮㑹于夷儀伐齊以報朝歌之役齊人以莊公說使隰鉏請成慶封如師男女以班賂晋侯以宗器樂器自六正五吏三十帥三軍之大夫百官之正長師旅及處守者皆有賂晋侯許之使叔向告於諸侯公使子服惠伯對曰君舍有罪以靖小國君之惠也寡君聞命矣泮杜注闕胡𫝊晋報朝歌之役來討及㑹夷儀既聞崔杼之弒則宜下令三軍建而復斾聲於齊人問莊公之故執崔杼以戮之謀於齊衆置君以定其國示天討之義則方伯連帥之職修矣今乃知賊不討而受其賂則是與之同情也故春秋治之如下文所貶云集說杜氏預曰不書伐齊齊逆服兵不加也公孫氏復曰晋再合諸侯將伐齊齊人懼弒莊以求成晋侯許之八月己巳諸侯同盟于重丘是也莊公復背澶淵之盟加兵晋衛信不道矣然齊人弒莊公以求成逆之大者晋不能討之以定齊國之亂曷以宗諸侯宜乎大夫日熾自是卒不可制也故先書崔杼之弒以著其惡非劉氏敞曰杜氏曰不譏受賂者齊有喪師自宜退也若齊侯以壽沒師退可也今臣弒其君為惡六矣何故退乎假使晋遂討齊破其城殺其賊汙其宫未可謂之伐喪也且夫弒君而謂之喪諸侯其無討賊者矣因髙氏閌曰晋㑹諸侯以伐齊齊以莊公既弒為解納賂以求成焉故不書伐夫以義㑹諸侯而以姦終之有以知晋平之不競矣黃氏仲炎曰齊取朝歌者晋人之私憾也杼弒其君天下之大惡也今晋㑹于夷儀伐齊以報朝歌之役齊人以弒君說而遂釋之是知有一己之私憾而不知有天下之大惡也是家氏鉉翁曰崔杼既弒莊公聞諸侯之師及境持自解於國人晋受賂與之盟而定其位晋之為晋日趨於下矣附録左𫝊晋侯使魏舒宛沒逆衛侯將使衛與之夷儀崔子止其帑以求五鹿六月壬子鄭公孫舍之帥師入陳舍如字左𫝊初陳侯㑹楚子伐鄭當陳隧者井堙木刊鄭人怨之六月鄭子展子産帥車七百乘伐陳宵突陳城遂入之陳侯扶其大子偃師奔墓遇司馬桓子曰載余曰將巡城遇賈獲載其母妻下之而授公車公曰舍而母辭曰不祥與其妻扶其母以奔墓亦免子展命師無入公宫與子産親御諸門陳侯使司馬桓子賂以宗器陳侯免擁社使其衆男女别而纍以待於朝子展執縶而見再拜稽首承飲而進獻子美入數俘而出祝祓社司徒致民司馬致節司空致地乃還集說髙氏閌曰去秋夷儀之㑹楚與陳蔡許三國同伐鄭今嵗復㑹于夷儀鄭慮楚之復來也故先帥師入陳以奪其心觀左氏所載入人之國未有若子展子産之有禮者也故春秋無貶辭李氏亷曰子展子産之入陳與子國子耳之侵蔡一也而二子之心不同故舍之得稱名而子國稱人據左氏所載則此書入亦近於末減之詞矣秋八月己巳諸侯同盟于重丘重直龍反記重丘杜注齊地寰宇聊城縣東北有重丘襄二十五年諸侯㑹盟處聊城今東昌府治案濟南府德州亦有重丘城或云㑹盟處考經文公㑹諸侯于夷儀同盟于重丘夷儀今順德府地去東昌為近自夷儀涉齊境則其地當在聊城左𫝊秋七月己巳同盟于重丘齊成故也胡𫝊崔杼既弒其君矣晋侯受其賂而許之成故盟于重丘特書曰同集說杜氏預曰夷儀之諸侯也己巳七月十二日經誤孔氏穎達曰𫝊云七月經言八月杜以長歷校之七月十二日有己巳知是經誤也之陸氏淳曰重言諸侯間有事也張氏洽曰同盟書自幽以來何獨此盟罪之深案二幽之盟合諸侯以共尊周而諸侯聼命也重丘之盟合諸侯將以討齊乃受賂而釋之且列弒君之齊於盟也天下之惡孰大於是即其所同之實而觀之晋侯之罪亦一齊也故曰一美一惡無嫌於同始李氏亷曰祁午數趙武之政再合諸侯三合大夫此今年夷儀明年澶淵再合諸侯也二十七年宋三十年澶淵昭元年虢三合大夫也汪氏克寬曰此盟書同與蟲牢同盟義同乃何休所謂同心為惡惡必成者也楊士勛謂穀梁於雞澤平丘發𫝊言同外楚則重丘亦是外楚今以左𫝊考之去年㑹夷儀而將伐齊也齊使陳無宇如楚乞師於是楚子伐鄭以救齊則是年服齊亦所以外楚也歟附録左𫝊趙文子為政令薄諸侯之幣而重其禮穆叔見之謂穆叔曰自今以往兵其少弭矣齊崔慶新得政將求善於諸侯武也知楚令尹若敬行其禮道之以文辭以靖諸侯兵可以弭公至自會集說汪氏克寬曰此書至會著其黨惡附姦之罪也衛侯入于夷儀左𫝊衛獻公入于夷儀胡𫝊鄭伯突入于櫟衛侯入于夷儀其入則一或名或不名者鄭伯奪正以立而國人君之諸侯助之不知其義不可以有國也故特書其名著王法以絶之衛侯蔑其冢卿失國出奔固不為無罪矣然有世叔儀以守有母弟鱄以出或撫其內或營其外有歸道焉則其義猶未絶也故止書其爵而不名及寧喜弒剽復歸于衛然後書名此聖人俟其改過遷善不輕絶人之意曽子曰夫子之道忠恕而已此類是也集說劉氏敞曰衛侯入于陳儀公羊曰曷為不言入于衛諼君以弒也非也衎雖失位非剽臣也剽雖得國非衎君也春秋豈謂衎為諼君乎哉夷呂氏大圭曰夏五月㑹夷儀之衛侯剽也此入于儀之衛侯衎也不嫌兩君名實相亂乎曰衎雖無道非臣當逐剽亦非臣下所得立故衎入不名鄭伯突入于櫟何以名曰突不當立者衎當立者衎家氏鉉翁曰春秋之世內外二君者鄭忽與突衛與剽也忽之君國正也祭仲以突篡之衎之君國正也孫林父以剽篡之忽既復位突乃賊也是故突之入櫟以名衎入衛地剽猶居位剽乃賊也是故衎入夷儀不名及剽死衎入然後名衎以正其失國之罪李氏亷曰衛侯入夷儀此猶突入櫟公在鄆爾公羊以為諼君以弒者非也楚屈建帥師滅舒鳩左𫝊楚薳子馮卒屈建為令尹屈蕩為莫敖舒鳩人卒叛楚令尹子木伐之及離城吳人救之子木遽以右師先子彊息桓子捷子駢子盂帥左師以退吳人居其間七日子彊曰久將墊隘隘乃禽也不如速戰請以私卒誘之簡師陳以待我我克則進奔則亦視之乃可以免不然必為吳禽從之五人以其私卒先擊吳師吳師奔登山以望見楚師不繼復逐之傅諸其軍簡師㑹之吳師大敗遂圍舒鳩舒鳩潰八月楚滅舒鳩離城杜注舒鳩城在今舒城縣境集說家氏鉉翁曰楚不能制吳而殘暴小國以逞其敗衄之憾春秋惡之是故國雖小而必紀其亡以著楚人滅國之罪爵汪氏克寬曰舒鳩偃姓子國冬鄭公孫夏帥師伐陳夏公作囆左𫝊鄭子産獻捷於晋戎服將事晋人問陳之罪對曰昔虞閼父為周陶正以服事我先王我先王賴其利器用也與其神明之後也庸以元女大姬配胡公而封諸陳以備三恪則我周之自出至於今是賴桓公之亂蔡人欲立其出我先君莊公奉五父而立之蔡人殺之我又與蔡人奉戴厲公至於莊宣皆我之自立夏氏之亂成公播蕩又我之自入君所知也今陳忘周之大德蔑我大惠棄我姻親介恃楚衆以馮陵我敝邑不可億逞我是以有往年之告未獲成命則有我東門之役當陳隧者井堙木刋敝邑大懼不競而恥大姬天誘其衷啓敝邑心陳知其罪授手於我用敢獻功晋人曰何故侵小對曰先王之命唯罪所在各致其辟且昔天子之地一圻列國一同自是以衰今大國多數圻矣若無侵小何以至焉晋人曰何故戎服對曰我先君武莊為平桓卿士城濮之役文公布命曰各復舊職命我文公戎服輔王以授楚捷不敢廢王命故也士莊伯不能詰復於趙文子文子曰其辭順犯順不祥乃受之冬十月子展相鄭伯如晋拜陳之功子西復伐陳陳及鄭平仲尼曰志有之言以足志文以足言不言誰知其志言之無文行而不逺晋為伯鄭入陳非文辭不為功慎辭哉集說家氏鉉翁曰陳叛晋即楚幾年於兹晋人置而不問鄭從晋既久至是又能一嵗再出師伐陳以撓楚春秋書之無貶辭與之也伐王氏錫爵曰首敘鄭之有功於陳而陳背之見征有名末叙文公城濮之命見戎服有自附録左𫝊楚蒍掩為司馬子木使庀賦數甲兵甲午蒍掩書土田度山林鳩藪澤辨京陵表淳鹵數疆潦規偃豬町原防牧隰皋井衍沃量入修賦賦車籍馬賦車兵徒卒甲楯之數既成以授子木禮也十有二月吳子遏伐楚門于巢卒遏於葛反公穀作謁左𫝊十二月吳子諸樊伐楚以報舟師之役門于巢巢牛臣曰吳王勇而輕若啓之將親門我獲射之必殪是君也死疆其少安從之吳子門焉牛臣隱於短牆以射之卒集說孔氏穎達曰諸侯不生名此吳子名在伐楚上者為卒書名上之以省文也趙氏匡曰此與七年鄭伯髠頑如㑹卒于鄵文義正同皆以便文耳公穀之說非也孫氏覺曰吳子攻巢之門而卒故曰門于巢卒也楚蘇氏轍曰吳子伐楚而名何也名其卒也吳子伐而門于巢巢牛臣射而殺之不言滅何也死而非獲也死而非獲則卒也是陳氏傅良曰自入州來至是而書伐楚略之也於吳子親門于巢巢牛臣隱於短垣以射之則其但書門于巢卒何不以咎巢人也諸樊始通於上國爭長於楚而喪身於匹夫是自取之也氏趙氏鵬飛曰吳子遏以卒名非為伐而名也汪克寬曰文十二年楚圍巢至是時巢蓋服屬於楚事金氏賢曰古者大國過小邑必飾城而請罪此無之國相遇之禮耳吳子伐楚過巢巢楚之屬國也牛臣之射吳子為楚敵吳也巢亦吳之敵國矣其假道釋甲之禮吳固不可以施之於巢而飾城請罪之禮巢亦不得而施之於吳也門于巢者親乎巢之門也公羊子以為入巢之門誤矣吳陳氏宗之曰案十二年楚圍巢至是巢屬於楚矣伐楚至巢巢人誘之吳子果親門焉見射而卒左氏所載是也公穀乃謂入巢之門而謂之門于巢何氏又謂過巢不假塗皆無稽之妄說也附録左𫝊楚子以滅舒鳩賞子木辭曰先大夫蒍子之功也以與蒍掩晋程鄭卒子産始知然明問為政焉對曰視民如子見不仁者誅之如鷹鸇之逐鳥雀也子産喜以語子大叔且曰他日吾見蔑之面而已今吾見其心矣子大叔問政於子産子産曰政如農功日夜思之思其始而成其終朝夕而行之行無越思如農之有畔其過鮮矣聞衛獻公自夷儀使與寧喜言寧喜許之大叔文子之曰烏乎詩所謂我躬不說皇恤我後者寧子可謂不恤其後矣將可乎哉殆必不可君子之行思其終也思其復也書曰慎始而敬終終以不困詩曰夙夜匪解以事一人今寧子視君不如奕棋其何以免乎奕者舉棋不定不勝其耦而况置君而弗定乎必不免矣九世之卿族一舉而滅之可哀也哉㑹于夷儀之嵗齊人城郟其五月秦晋為成晋韓起如秦涖盟秦伯車如晋涖盟成而不結甲靈王二寅十五年二十有六年晋平十一年齊景公杵臼元年衛獻三十年殤十二年蔡景四十五年鄭簡十九年曹武八年陳哀二十二年把文三年宋平二十九年秦景三十年楚康十三年吳餘祭元年春附録左𫝊二十六年春秦伯之弟針如晋修成叔向命召行人子員行人子朱曰朱也當御三云叔向不應子朱怒曰班爵同何以黜朱於朝撫劍從之叔向曰秦晋不和久矣今日之事幸而集晋國賴之不集三軍暴骨子員道二國之言無私子常易之姦以事君者吾所能御也拂衣從之人救之平公曰晋其庶乎吾臣之所爭者大師曠曰公室懼卑臣不心競而力爭不務德而爭善私欲己侈能無卑乎集說王氏錫爵曰叔向果以子朱不可御即宜明言止之何始則不應而繼則病其姦致拂衣於其側哉此猶客氣未消故也王二月辛卯衛寧喜弒其君剽剽匹妙反左𫝊衛獻公使子鮮為復辭敬姒彊命之對曰君無信臣懼不免敬姒曰雖然以吾故也許諾初獻公使與寧喜言寧喜曰必子鮮在不然必敗故公使子鮮子鮮不獲命於敬姒以公命與寧喜言曰苟反政由寧氏祭則寡人寧喜告蘧伯玉伯玉曰瑗不得聞君之出敢聞其入遂行從近關出告右宰穀右宰穀曰不可獲罪於兩君天下誰畜之悼子曰吾受命於先人不可以二穀曰我請使焉而觀之遂見公於夷儀反曰君淹恤在外十二年矣而無憂色亦無寬言猶夫人也若不已死無日矣悼子曰子鮮在右宰穀曰子鮮在何益多而能亡於我何為悼子曰雖然弗可以己孫文子在戚孫嘉聘於齊孫襄居守二月庚寅寧喜右宰穀伐孫氏不克伯國傷寧子出舍於郊伯國死孫氏夜哭國人召寧子寧子復攻孫氏克之辛卯殺子故及大子角書曰寧喜弒其君剽言罪之在寧氏也胡𫝊喜嘗受命於其父使納獻公以免逐君之惡衛侯出入皆以爵稱於義未絶而剽以公孫非次而立又未有說焉則喜之罪應末減矣亦以弒君書何也奕者舉棋不定不勝其耦况置君乎於衎則殖也出之喜也納之於剽則殖也立之喜也弒之是奕棋之不若也不思其終亦甚矣故聖人特正其為弒君之罪示天下後世使知慎於廢立之際而不敢忽也霍光以大義廢昌邑立宣帝猶有言其罪者而朝廷加肅况私意耶范粲桓彝之徒殺身不顧君子所以深取之者知春秋之㫖矣集說劉氏敞曰穀梁曰此不正其曰何也殖也立之喜也君之正也非也文王事紂武王滅之亦為不正乎言春秋者要論其行事邪正而已矣衎也於殖其獨非君而逐之何哉許氏翰曰君臣之分一正而不可復易此聖人所以定天下之經也經張氏洽曰或問寧喜弒衛侯剽既有其父之命矣於衎之出不以名書是其位未嘗絶也曷為書喜之罪不從末減乎愚以為人臣夙夜匪懈以事一人不可以二者也殖既從林父之逐衎共立剽而臣事之十餘年矣其可以反易天常而命其子乎君臣之分如天冠地履不可一日易者也殖之命其子可謂悖矣故太叔儀責其視置君不如奕棋而知其身之不免以及其宗也喜也輕徇父命而不知諫躬犯大惡書以弒君辭而不可得矣故春秋者所以定天下之大分而示萬世臣子之法不可不審思而明辨之也焉趙氏鵬飛曰剽之立篡衛而有之國人有所不順則其弒也宜其以無道書之而獨斥寧喜者蓋以父子反覆二君之間自立自弒以亂衛國者喜也故誅喜為重則不得不名之以著其罪非為剽無罪而名寧喜也此春秋酌輕重之間而兩誅之者也家氏鉉翁曰漢去古未逺儒者猶明於春秋之義霍光立昌邑王而事之矣及其廢之也委曲安全曰無使我負殺主名於天下蓋當時明經大儒共定策者為之深思光不能及此也南宋徐羡之傅亮謝晦廢營陽王未幾殺之遂陷於弒君之罪能季氏本曰喜以政由寧氏之故助獻公私也安免弒君之罪哉衛孫林父入于戚以叛書叛始此左𫝊孫林父以戚如晋書曰入于戚以叛罪孫氏也胡𫝊案左氏孫林父以戚如晋書曰入于戚以叛者著其據土背君之罪也集說杜氏預曰衎雖未居位林父専邑背國猶為叛也趙氏匡曰凡據土背君曰叛孫氏復曰獻公之奔齊也孫林父逐之寧喜弒剽以納獻公故林父懼入于戚以叛髙氏閌曰叛甚於奔前此諸大夫有不利於己則奔而己未有若林父之叛者故書叛自林父始陳氏傅良曰宋魚石入于彭城晋欒盈入于曲沃未可以書叛必若衛孫林父而後可以書叛書叛必不能討者也凡叛賤者不書必卿佐而後書向李氏亷曰經書叛五叛人十一衛孫林父宋華亥寧華定宋弟辰仲他石彄公子地晋趙鞅荀寅士吉射也已王氏樵曰案林父逐君立君本為首惡今也衎入出又披君之邑以市於大國罪不在弒剽者之下春秋書入于戚以叛以誅之也罪王氏錫爵曰林父親逐其君君入又據邑以叛其寧専祿周旋已乎而左氏謂以是為戮也則將謂逐君之罪輕於據邑也耶義則進否則退此亦非所以責逆臣甲午衛侯衎復歸于衛左𫝊甲午衛侯入書曰復歸國納之也大夫逆於竟者執其手而與之言道逆者自車揖之逆於門者頷之而已公至使讓大叔文子曰寡人淹恤在外二三子皆使寡人朝夕聞衛國之言吾子獨不在寡人古人有言曰非所怨勿怨寡人怨矣對曰臣知罪矣臣不佞不能負羈絏以從扞牧圉臣之罪一也有出者有居者臣不能二通外內之言以事君臣之罪二也有二罪敢忘其死乃行從近關出公使止之胡𫝊衛侯出奔齊入于夷儀皆以爵稱今既復歸而得國矣乃書其名何也人之有德慧術知者常存乎疢疾衛侯淹恤在外十有二年困於心衡於慮久矣此生於憂患之時而一旦得國失信無刑猶夫人也則是困而弗革雖復得國猶非其國也此見春秋俟人改過之深而責人自棄之重欲其彊於為善之意也集說杜氏預曰復其位曰復歸甲孫氏復曰先言辛卯衛寧喜弒其君剽後言午衛侯衎復歸于衛者以見衎待弒而歸也案十四年衛侯衎出奔齊前年入于夷儀今喜弒剽四日而復歸于衛此待弒而歸可知也之張氏洽曰春秋名衎與衛侯鄭殺叔武公子瑕名同意然寧喜以納君而見殺則方之成公衎為甚矣名趙氏鵬飛曰獻公出入皆不名而於此復歸衛乃之何哉前曰衎出奔齊以孫寧逐之入于夷儀以寧喜挽之然國實衎之國不幸而出得間而入聖人不責也及居于夷儀不能以義入衛遣喜行弒逆之謀既弒而後入則國雖衎之國得之不正也聖人惡其仗不義而求反國乃謀弒以規復位故斥而名之書汪氏克寬曰書歸易辭也喜弒剽則其歸無難矣復歸其位未絶也書名著其不足以有國也抑揚豫奪春秋之精義也書王氏樵曰案春秋之義常以上下比事而見始也衛侯衎出奔齊繼書㑹于戚而衛孫林父在焉則知為彊臣所逐矣終也書寧喜弒其君剽孫林父入于戚以叛繼書衛侯衎復歸于衛則知復歸之故由寧喜矣案衎不足為君且入不以正故春秋書名以罪之杜氏預孔氏穎達謂名與不名𫝊無義者非也公羊以復歸為罪剽又以剽不書立為惡衛侯則尤誤矣衎復其位故曰復歸豈罪剽乎剽立于孫寧之手與衛人立晋不同故不書立豈惡衛侯乎附録左𫝊衛人侵戚東鄙孫氏訴於晋晋戍茅氏殖綽伐茅氏殺晋戍三百人孫蒯追之弗敢擊文子曰厲之不如遂從衛師敗之圉雍鉏獲殖綽復訴於晋鄭伯賞入陳之功三月甲寅朔享子展賜之先路三命之服先八邑賜子産次路再命之服先六邑子産辭邑曰自上以下隆殺以兩禮也臣之位在四且子展之功也臣不敢及賞禮請辭邑公固豫之乃受三邑公孫揮曰子産其將知政矣讓不失禮茅氏杜注戚東鄙東圉杜注衛地今大名府開州有圉城夏晉侯使荀吳來聘左𫝊晋人為孫氏故召諸侯將以討衛也夏中行穆子來聘召公也集說家氏鉉翁曰林父據戚以叛晋人以兵戍之黨叛臣也衛人伐戚殺晋戍三百人晋不知自反乃㑹諸侯謀有討於衛侯使荀吳來召公當晋平之世彊臣僭橫倒行逆施卒以此失諸侯附録左𫝊楚子秦人侵吳及雩婁聞吳有備而還遂侵鄭五月至於城麇鄭皇頡戍之出與楚師戰敗穿封戌囚皇頡公子圍與之爭之正於伯州犂伯州犂曰請問於囚乃立囚伯州犂曰所爭君子也其何不知上其手曰夫子為王子圍寡君之貴介弟也下其手曰此子為穿封戍方城外之縣尹也誰獲子囚曰頡遇王子弱焉戍怒抽戈逐王子圍弗及楚人以皇頡歸印堇父與皇頡戍城麇楚人囚之以獻於秦鄭人取貨於印氏以請之子大叔為令正以為請子産曰不獲受楚之功而取貨於鄭不可謂國秦不其然若曰拜君之勤鄭國微君之惠楚師其猶在敝邑之城下其可弗從遂行秦人不豫更幣從子産而後獲之雩婁杜注屬安豐郡今江南鳯陽府霍丘縣西南雩婁故城是也城麇杜注鄭邑公㑹晉人鄭良霄宋人曹人于澶淵左𫝊六月公㑹晋趙武宋向戌鄭良霄曹人于澶淵以討衛疆戚田取衛西鄙懿氏六十以與孫氏於是衛侯㑹之晋人執寧喜北宫遺使女齊以先歸衛侯如晋晋人執而囚之於士弱氏秋七月齊侯鄭伯為衛侯故如晋晋侯兼享之晋侯賦嘉樂國景子相齊侯賦蓼蕭子展相鄭伯賦緇衣叔向命晋侯拜二君曰寡君敢拜齊君之安我先君之宗祧也敢拜鄭君之不二也國子使晏平仲私於叔向曰晋君宣其明德於諸侯恤其患而補其闕正其違而治其煩所以為盟主也今為臣執君若之何叔向告趙文子文子以告晋侯晋侯言衛侯之罪使叔向告二君國子賦轡之柔矣子展賦將仲子兮晋侯乃許歸衛侯叔向曰鄭七穆罕氏其後亡者也子展儉而一懿氏杜注戚城西北五十里有懿城今戚城在開州北七里屬直隸大名府集說劉氏敞曰左氏曰趙武不書尊公也向戌不書後也鄭先宋不失所也豫謂此皆不足信於經無以見之奬家氏鉉翁曰霸者無他主張名分而已晋自悼公大夫以伉其君而下陵上替之禍幾遍於列國晋亦坐受其弊矣林父作亂逐君悼公為之定篡君之位今剽死獻入晋平受賊臣之譖而止獻公囚寧喜取衛田以益林父平固甚愚亦何利而為此由晋之諸臣各為私計羽翼諸侯之大夫使交起為亂以為彼剖分宗國之地而其君不悟良可喟也魏趙韓三分晋國悼平實有以啓之耳汪氏克寬曰晋平自重丘之後五合大夫于宋城把于虢兩澶淵是也夫既自縱其權委之臣下而且主張失宜冠履倒置此年㑹澶淵黨叛臣而討君且以魯公儕之諸大夫于宋使晋楚之從交相見遂以桓文霸統屬之荆蠻城把則不恤宗周而私母家貽諸大夫之誚澶淵謀宋災而不討蔡般弒君父之賊于虢仍讀舊書而復先楚是皆悖上下之義紊內外之分雖能假勢力以合人心而不能明分義以服人心晋伯自是衰矣秋宋公殺其世子痤痤才何反穀作座音同左𫝊初宋芮司徒生女子赤而毛棄諸堤下共姬之妾取以入名之曰棄長而美平公入夕共姬與之食公見棄也而視之尤姬納諸御嬖生佐惡而婉大子痤美而很合左師畏而惡之寺人惠牆伊戾為大子內師而無寵秋楚客聘於晋過宋大子知之請野享之公使往伊戾請從之公曰夫不惡女乎對曰小人之事君子也惡之不敢逺好之不敢近敬以待命敢有二心乎縱有共其外莫共其內臣請往也遣之至則欿用牲加書徵之而騁告公曰大子將為亂既與楚客盟矣公曰為我子又何求對曰欲速公使視之則信有焉問諸夫人與左師則皆曰固聞之公囚大子大子曰唯佐也能免我召而使請曰日中不來吾知死矣左師聞之聒而與之語過期乃縊而死佐為大子公徐聞其無罪也乃亨伊戾左師見夫人之步馬者問之對曰君夫人氏也左師曰誰為君夫人余胡弗知圉人歸以告夫人夫人使饋之錦與馬先之以玉曰君之妾棄使某獻左師改命曰君夫人而後再拜稽首受之胡𫝊殺世子母弟直書君者甚之也宋寺人伊戾為太子內師無寵譖於宋公而殺之則賊世子痤者寺人矣而獨甚宋公何哉譖言之得行也必有嬖妾配嫡以惑其心又有小人欲結內援者以為之助然後愛惡一移父子夫婦之間不能相保者衆矣尸此者其誰乎晉獻之殺申生宋公之殺痤直稱君者春秋正其本之意集說孫氏復曰稱君以殺世子甚之也平髙氏閌曰晉獻公惑驪姬之讒而殺申生宋公聽伊戾之言而殺子痤漢武帝唐明皇猶蹈之以二君猶爾晉宋不足道也自古讒人之為國患雖其君之父子不能相保況臣下乎造家氏鉉翁曰宋寺人伊戾內連宫禁外結大臣共讒而殺太子宋平尋知其子之無罪僅烹一伊戾而芮棄之寵愛向戌之權任不為之衰更立棄之子為太子此人道之大變春秋謹而識之穀梁所謂目君以著其惡者也晉人執衛寧喜公羊伯執有罪何以不得為討不以其罪執之也集說劉氏敞曰稱人以執者非伯討也寧喜弒君曷為不以伯討之辭言之寧喜如晉晉人執之曰爾曷為納君而伐孫氏云爾非伯討也齊侯鄭伯見於晉侯而請之曰所謂盟主正其違而治其煩也今為臣執君無乃不可乎晉於是歸寧喜討髙氏閌曰弒君之賊人人皆得討之晉人執之非其弒君也討其伐戚而殺晉戌也是陳氏傅良曰凡執他國之臣必命大夫而後書於執寧喜以歸衛侯如晉復執之則其但書寧喜何是之謂筆削也宋人執祭仲亦執厲公但書祭仲晉人執寧喜亦執獻公但書寧喜苟書執鄭突是不以逐君之罪罪宋也書執衛侯衎是以討賊之義豫晉也不以逐君之罪罪宋以討賊之義豫晉則放乎利而盜名者得志矣也家氏鉉翁曰寧喜可執坐林父之訴而執之則悖是時趙武為政叔向為之謀晉無一事可稱二子者崇虛譽而無其實亦何益於人之國乎程氏端學曰寧喜弒君之賊晉不之討乃因其來而執之則既失刑矣况既執而不殺又使還衛次年書衛殺其大夫寧喜則知其舍之矣故曰不以其罪執之也子郝氏敬曰寧氏父子無君之惡一也父附晉而免背晉而見執孫林父寧喜之惡亦一也喜背晉見執林父附晉以免然則晉非執弒君執不附已者附録左𫝊鄭伯歸自晉使子西如晉聘辭曰寡君來煩執事懼不免於戾使夏謝不敏君子曰善事大國善初楚伍參與蔡大師子朝友其子伍舉與聲子相也伍舉娶於王子牟王子牟為申公而亡楚人曰伍舉實送之伍舉奔鄭將遂奔晉聲子將如晉遇之於鄭郊班荆相與食而言復故聲子曰子行也吾必復子及宋向戌將平晉楚聲子通使於晉還如楚令尹子木與之語問晉故焉且曰晉大夫與楚孰賢對曰晉卿不如楚其大夫則賢皆卿材也如把梓皮革自楚往也雖楚有材晉實用之子木曰夫獨無族姻乎對曰雖有而用楚材實多歸生聞之善為國者賞不僭而刑不濫賞僭則懼及淫人刑濫則懼及善人若不幸而過寧僭無濫與其失善寧其利淫無善人則國從之詩曰人之云亡邦國殄瘁無善人之謂也故夏書曰與其殺不辜寧失不經懼失善也商頌有之曰不僭不濫不敢怠皇命于下國封建厥福此湯所以獲天福也古之治民者勸賞而畏刑恤民不倦賞以春夏刑以秋冬是以將賞為之加膳加膳則飫賜此以知其勸賞也將刑為之不舉不舉則徹樂此以知其畏刑也夙興夜寐朝夕臨政此以知其恤民也三者禮之大節也有禮無敗今楚多淫刑其大夫逃死於四方而為之謀主以害楚國不可救療所謂不能也子儀之亂析公奔晉晉人置諸戎車之殿以為謀主繞角之役晉將遁矣析公曰楚師輕窕易震蕩也若多鼓鈞聲以夜軍之楚師必遁晉人從之楚師宵潰晉遂侵蔡襲沈獲其君敗申息之師於桑隧獲申麗而還鄭於是不敢南面楚失華夏則析公之為也雍子之父兄譖雍子君與大夫不善是也雍子奔晉晉人與之鄐以為謀主彭城之役晉楚遇於靡角之谷晉將遁矣雍子發命於軍曰歸老幼反孤疾二人役歸一人簡兵搜乘秣馬蓐食師陳焚次明日將戰行歸者而逸楚囚楚師宵潰晉降彭城而歸諸宋以魚石歸楚失東夷子辛死之則雍子之為也子反與子靈爭夏姬而雍害其事子靈奔晉晉人與之邢以為謀主扞禦北狄通吳於晉教吳叛楚教之乘車射御驅侵使其子狐庸為吳行人焉吳於是伐巢取駕克棘入州來楚罷於奔命至今為患則子靈之為也若敖之亂伯賁之子賁皇奔晉晉人與之苗以為謀主鄢陵之役楚晨壓晉軍而陳晉將遁矣苗賁皇曰楚師之良在其中軍王族而已若塞井夷竈成陳以當之欒范易行以誘之中行二郤必克二穆吾乃四萃於其王族必大敗之晉人從之楚師大敗王夷師熸子反死之鄭叛吳興楚失諸侯則苗賁皇之為也子木曰是皆然矣聲子曰今又有甚於此椒舉娶於申公子牟子牟得戾而亡君大夫謂椒舉女實遣之懼而奔鄭引領南望曰庶幾赦余亦弗圖也今在晉矣晉人將與之縣以比叔向彼若謀害楚國豈不為患子木懼言諸王益其祿爵而復之聲子使椒鳴逆之鄐杜注晉邑棘駕杜注楚邑府棘杜注楚邑譙國酇縣東北有亭今在歸德永城縣南苗杜注晋邑今懷慶府濟源縣西有苗亭八月壬午許男寧卒于楚左𫝊許靈公如楚請伐鄭曰師不興孤不歸矣八月卒于楚集說孔氏穎達曰宣十七年許男錫我卒寧即錫我之子髙氏閌曰十六年晋伐許他國皆大夫獨鄭伯自行故許男欲報之路王氏貫道曰君守宗廟出入必告不幸而死於道猶為棄社稷也許男死於楚是以四嶽伯夷之血祀而委之蠻荆矣冬楚子蔡侯陳侯伐鄭左𫝊楚子曰不伐鄭何以求諸侯冬十月楚子伐鄭鄭人將禦之子産曰晋楚將平諸侯將和楚王是故昧於一來不如使逞而歸乃易成也夫小人之性釁於勇嗇於禍以足其性而求名焉者非國家之利也若何從之子展說不禦寇十二月乙酉入南里墮其城涉於樂氏門於師之梁縣門發獲九人焉涉於汜而歸而後葬許靈公南里杜注鄭邑今開封府新鄭縣南五里有地名南里樂氏杜注津名今在河南開封府新鄭縣境洧水濟渡處也集說汪氏克寬曰蕭魚而後楚三伐鄭十八年公子午不得志於鄭二十四年諸侯救之此年諸侯不救楚得以逞蓋是時晋平昏庸大夫専恣霸業怠矣楚是以知晋之不在諸侯而復為陵駕之舉也鄭雖未服於楚明年晋楚為成而北方諸侯皆朝楚矣棘澤之役四國之君皆至今此許獨不與者靈公卒於楚國弱不能以兵㑹也葬許靈公集說家氏鉉翁曰許靈公如楚請伐鄭卒於楚楚子為之伐鄭師還乃葬許靈公楚之求諸侯亦勤矣附録左𫝊衛人歸衛姬於晋乃釋衛侯君子是以知平公之失政也晋韓宣子聘於周王使請事對曰晋士起將歸時事於宰旅無他事矣王聞之曰韓氏其昌阜於晋乎辭不失舊齊人城郟之嵗其夏齊烏餘以廩丘奔晋襲衛羊角取之遂襲我髙魚有大雨自其竇入介於其庫以登其城克而取之又取邑於宋於是范宣子卒諸侯弗能治也及趙文子為政乃卒治之文子言於晋侯曰晋為盟主諸侯或相侵也則討而使歸其地今烏餘之邑皆討類也而貪之是無以為盟主也請歸之公曰諾孰可使也對曰胥梁帶能無用師晋侯使往廩丘杜注東郡廪丘故城是也今在東昌府范縣東南七十里羊角杜注廩丘縣所治羊角城是也地理志羊角城一名義城蓋取羊角哀為名在今范縣東南新安村髙魚杜注廩丘縣東北有髙魚城唐朱友恭敗朱瑄於髙梧胡三省注即髙魚也今兗州府鄆城縣西髙魚鄉是其地欽定春秋𫝊說彚纂卷二十七
