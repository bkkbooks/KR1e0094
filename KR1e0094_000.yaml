body:
  text: 欽定四庫全書聖祖仁皇帝御製春秋傳說彚纂序六經皆孔聖刪述而孟子特言孔子作春秋左氏公羊榖梁三家各述所聞以為傳門弟子各衍其師說末流益紛以一字為褒貶以變例為賞罰微言既絶大義弗彰至於災祥䜟緯之學興而更趨於怪僻程子所謂炳若日星者不因此而反晦乎逮宋胡安國進春秋解義明代立於學官用以貢舉取士於是四傳並行宗其說者率多穿鑿附㑹去經義逾逺朕於春秋獨服膺朱子之論朱子曰春秋明道正誼據實書事使人觀之以為鑒戒書名書爵亦無意義此言真有得者而惜乎朱子未有成書也朕恐世之學者牽於支離之說而莫能悟特命詞臣纂輯是書以四傳為主其有舛于經者刪之以集說為輔其有畔於傳者勿録書成凡四十卷名之曰傳說彚纂夫春秋之作以游夏之賢不能贊一詞司焉遷稱七十子之徒口授其傳而人人異端當時已無定論後之諸儒欲於千百年後懸斷聖人筆削之指不亦難乎是書之輯亦唯擇其言之當於理者雖不敢謂深於春秋而辨之詳取之慎於屬辭比事之教或有資焉是為序康熙六十年夏六月朔奉㫖開列欽定春秋傳說彚纂總裁校對分修校刋諸臣職名總裁文淵閣大學士兼禮部尚書臣王掞南書房校對吏部右侍郎臣張廷玉內閣學士兼禮部侍郎臣蔣廷錫內閣學士兼禮部侍郎臣勵廷儀內閣學士兼禮部侍郎臣魏廷珍翰林院侍讀學士臣陳邦彥左春坊左庶子兼翰林院侍讀臣王圖炳原任翰林院侍讀臣趙熊詔左春坊左贊善兼翰林院檢討臣汪應銓翰林院檢討臣張照翰林院編修臣薄海在館分修校對巡撫江西都察院右副都御史臣王企靖原任都察院左副都御史臣李紱國子監司業臣盧軒提督江西學政翰林院編修臣徐昻發提督雲南學政翰林院編修臣汪份提督陜西學政翰林院編修臣王謨提督廣東學政翰林院編修臣惠士竒翰林院檢討臣王時憲翰林院編修臣王時鴻原任翰林院檢討臣王遵扆翰林院編修臣楊繩武工科給事中臣繆沅戶科給事中臣王澍候補監察御史臣李璿工部都水司主事臣髙輝候補主事臣于本宏中書科中書臣王祖慎內閣中書臣曹儀內閣中書臣管式龍湖廣督理湖南糧儲道按察使司僉事臣王奕鴻復職知府臣章文鐄四川叙州府同知臣李中原任江西吉安府安福縣知縣臣胡承讚直𨽻永平府昌黎縣知縣臣徐榮疇進士臣吳翊進士臣袁濬舉人揀選知縣臣王時濟舉人揀選知縣臣徐修仁舉人臣陳垿副榜貢生議叙知縣臣錢元昌歲貢生考授州判臣朱稻孫生員臣井其演校刋署理光祿寺事務刑部山東司郎中臣趙之垣引用姓氏周左氏丘明公羊氏髙穀梁氏赤一名喜漢董氏仲舒劉氏向子政劉氏歆子駿賈氏逵景伯王氏充仲任服氏䖍子慎鄭氏𤣥康成徐氏邈江氏熙太和何氏休邵公晉杜氏預元凱隋范氏寧武子劉氏炫光伯唐陸氏德明孔氏穎逹仲逹一作沖逺顔氏師古籒楊氏士勛徐氏彥啖氏助叔佐趙氏匡伯循陸氏淳伯沖何氏濟川栁氏宗元子厚盧氏同玉川李氏瑾陳氏嶽宋葉氏清臣道卿胡氏瑗翼之安定孫氏復明復石氏介守道徂徠王氏沿聖源李氏堯俞歐陽氏修永叔廬陵黎氏錞劉氏敞原父司馬氏光君實涑水杜氏諤師氏協孫氏覺莘老程子頤正叔伊川蘇氏軾子瞻東坡蘇氏轍子由潁濵崔氏子方任氏伯雨德翁張氏大亨陸氏佃農師劉氏絢質夫孫氏抃夢得楊氏時中立龜山葉氏夢得少蘊石林呂氏本中居仁許氏翰嵩老陳氏祥道用之三山胡氏銓邦衡淡庵王氏葆彥光胡氏安國康侯胡氏宏仁仲五峯胡氏寧和仲苑堂髙氏閌抑崇息齊程氏迥可久沙隨劉氏本陳氏傅良君舉止齊朱子熹元晦紫陽呂氏祖謙伯恭東萊陸氏九淵子靜象山薛氏季宣士龍項氏安世平甫平庵羅氏願端良沈氏棐文伯張氏洽元德戴氏溪肖望岷隱劉氏克莊潛夫後村黃氏仲炎若晦李氏琪竹湖趙氏鵬飛企明木訥趙氏孟何黃氏震東發呂氏大圭圭叔朴鄉家氏鉉翁則堂吳氏仲迂可堂任氏公輔宋氏宜春趙氏與權元金氏履祥吉甫仁山俞氏皋心逺萬氏孝恭熊氏朋來與可吳氏澄幼清臨川草廬陳氏深子微齊氏履謙伯恆程氏端學時叔黃氏澤楚望王氏元杰鄭氏玉子美師山李氏亷明趙氏汸子常東山汪氏克寬德輔劉氏永之仲修張氏以寧志道翠屏劉氏實嘉秀敬齊黃氏翰汝申邵氏寶國賢二泉金氏賢湛氏若水元明甘泉季氏本明德彭山熊氏過叔仁趙氏恆余氏光王氏宗沐新甫王氏樵明逸方麓姜氏寶廷善鳳阿王氏錫爵元馭荆石王氏鼎爵和石朱氏睦㮮灌甫西亭黃氏正憲姚氏舜牧虞佐承庵髙氏攀龍存之景逸章氏潢本清郝氏敬仲輿錢氏時俊用章仍峯賀氏仲軾卓氏爾康去病羅氏喻義陳氏宗之玉立張氏溥天如西銘陳氏際泰大士嚴氏啓隆鄭氏嗣鄭氏賢簡王氏貫道甘氏雨以上四人未詳世次附録於此欽定春秋傳說彚纂目録經部五春秋類卷首上綱領卷首下王朝世表列國年表王朝列國世次王朝列國興廢說列國爵姓列國地圖王朝地名列國地名卷第一隱公元年之二年卷第二隱公三年之六年卷第三隱公七年之十一年卷第四桓公元年之四年卷第五桓公五年之十年卷第六桓公十一年之十八年卷第七莊公元年之七年卷第八莊公八年之十四年卷第九莊公十五年之二十三年卷第十莊公二十四年之三十二年卷第十一閔公元年之二年卷第十二僖公元年之五年卷第十三僖公六年之十五年卷第十四僖公十六年之二十四年卷第十五僖公二十五年之二十八年卷第十六僖公二十九年之三十三年卷第十七文公元年之八年卷第十八文公九年之十八年卷第十九宣公元年之六年卷第二十宣公七年之十一年卷第二十一宣公十二年之十八年卷第二十二成公元年之五年卷第二十三成公六年之十年卷第二十四成公十一年之十八年卷第二十五襄公元年之九年卷第二十六襄公十年之十八年卷第二十七襄公十九年之二十六年卷第二十八襄公二十七年之三十一年卷第二十九昭公元年之六年卷第三十昭公七年之十三年卷第三十一昭公十四年之二十一年卷第三十二昭公二十二年之二十五年卷第三十三昭公二十六年之三十二年卷第三十四定公元年之七年卷第三十五定公八年之十五年卷第三十六哀公元年之七年卷第三十七哀公八年之十四年卷第三十八哀公附録經傳臣等謹按春秋傳說彚纂三十八卷奉敕撰初胡安國作春秋傳張栻已頗有異議朱子編南軒集存而不刪蓋亦以栻說為然至元延祐中復科舉法始以安國之傳懸為功令而有明一代因之故元吳澄作俞臯春秋集傳序稱兼列胡氏以從時尚明馮夢龍作春秋大全凡例稱諸儒議論儘有勝胡傳者然業以胡傳為宗自難並收以亂耳目豈非限於科律明知其誤而從之歟欽惟聖祖仁皇帝道契天經心符聖義於尼山筆削洞鑒精微雖俯念士子久誦胡傳難以驟更仍綴於三傳之末而指授儒臣詳為考證凡其中有乖經義者一一駁正多所刋除至於先儒舊說世以不合胡傳擯棄弗習者亦一一採録表章闡明古學蓋以聖人之德居天子之位故能蕩湔門户辨别是非挽數百年積重之勢而反之於正也自時厥後能不為胡傳所錮者如徐庭垣之春秋管窺焦袁熹之春秋闕如編響然並作不可殫數衮鉞之義遂皎若三光維風維草之效誠有自來矣臣等繕校之餘為春秋幸尤為天下萬世讀春秋者幸也乾隆四十三年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
