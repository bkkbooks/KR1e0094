body:
  text: 欽定四庫全書欽定春秋傳說彚纂卷三十六哀公集說楊氏士勛曰公名蒋定公之子敬王二十六年即位十四年西狩獲麟春秋終矣二十七年薨諡法恭仁短折曰哀丁敬王二未十六年元年晉定十八年齊景五十四年衛靈四十一年蔡昭二十五年鄭聲七年曹陽八年陳閔八年把僖十二年宋景二十三年秦惠七年楚昭二十二年吳夫差二年春王正月公即位集說趙氏鵬飛曰繼正楚子陳侯隨侯許男圍蔡左傳春楚子圍蔡報柏舉也里而栽廣丈高倍夫屯晝夜九日如子西之素蔡人男女以辨使疆於江汝之間而還蔡於是乎請遷於吳集說杜氏預曰隨世服於楚吳之入楚昭王奔隨隨人免之卒復楚國楚人徳之使列於諸侯故見經定六年鄭滅許此復見者蓋楚封之楚家氏鉉翁曰入郢者吳也撻平王之墓者亦吳也不能報之於强吳而摟二三小國以釋憾於蔡謂之復讎而讎卒不能復也前年滅頓去年滅胡今又以兵加蔡其志在於蠶食小國以爲利春秋奚取哉昭李氏亷曰楚蔡之交兵止於此汪氏克寛曰楚圍蔡未足以爲善文定以宋髙宗不復金國之讎故拳拳以復讎爲說此朱子所謂以義理穿鑿者也王氏樵曰今案蔡人男女以辨則是降也使疆於江汝之間則遷其國也而獨書圍蔡何也滅不言入陳嘗縣之矣而不書曰滅入不言圍鄭入自皇門至於逵路矣而但書曰圍不使楚盡其虐而滿其辭也聖人之㣲意也胡康侯謂蔡嘗以吳師入郢昭王奔隨壞宗廟徙陳器撻平王之墓楚至是而報之而春秋書之略者見蔡宜得報而楚子復讎之事可恕也噫此亦大失春秋之㫖矣入郢者吳也壞宗廟徙陳器撻其父之墓處其宮而欲妻其母者又吳也不能報吳而釋憾於蔡楚既可笑矣乃春秋亦從而成之謂蔡宜得報而楚之復讎爲可恕不亦悖乎且誘殺蔡侯般而滅其國用隠大子於岡山以一裘之故拘昭侯於南郢數年而後歸蔡之讎楚豈下於入郢使若所爲者蔡人親爲之始可謂楚宜得報而蔡之復讎爲可恕今事出於吳而蔡無與蔡不能報而天假手於吳出乎爾者反乎爾正可以爲强而無道之戒乃以復讎恕之孰謂者秋有是法哉附錄左傳吳王夫差敗越於夫椒報檇李也遂入越越子以甲楯五千保於㑹稽使大夫種因吳大宰嚭以行成吳子將許之伍員曰不可臣聞之樹徳莫如滋去疾莫如盡昔有過澆殺斟灌以伐斟鄩滅夏后相后緡方娠逃出自竇歸於有仍生少康焉爲仍牧正惎澆能戒之澆使椒求之逃奔有虞爲之庖正以除其害虞思於是妻之以二姚而邑諸綸有田一成有衆一旅能布其徳而兆其謀以收夏衆撫其官職使女艾諜澆使季杼誘豷遂滅過戈復禹之績祀夏配天不失舊物今吳不如過而越大於少康或将豐之不亦難乎句踐能親而務施施不失人親不棄勞與我同壤而世爲仇讎於是乎克而弗取將又存之違天而長宼讎後雖悔之不可食已姬之衰也日可俟也介在蠻夷而長宼讎以是求伯必不行矣弗聽退而告人曰越十年生聚而十年教訓二十年之外吳其爲沼乎三月越及吳平吳入越不書吳不告慶越不告敗也夫椒杜注吳郡吳縣西南大湖中椒山通典包山一名夫椒山即西洞庭山也今在江南蘓州府呉縣西南注㑹稽杜注上㑹稽山也在㑹稽山隂縣南水經㑹稽之山古防山也亦謂之茅山又曰棟山周禮所謂揚州之鎮也在今紹興府㑹稽縣東南十二里虞杜注梁國有虞縣今河南歸徳府虞城縣南三里有故虞城本舊縣址古虞國也綸杜注虞邑今虞城縣東南三十五里有故綸城是也鼷䑕食郊牛改卜牛夏四月辛巳郊郊牛下榖有角字榖梁此該之變而道之也於變之中又有言焉鼷䑕食郊牛角改卜牛志不敬也郊牛日展斛角而知傷展道盡矣郊自正月至於三月郊之時也夏四月郊不時也五月郊不時也夏之始可以承春以秋之未承春之始蓋不可矣九月用郊用者不宜用者也郊三卜禮也四卜非禮也五卜彊也卜免牲者吉則免之不吉則否牛傷不言傷之者傷自牛作也故其辭緩全曰牲傷曰牛未牲曰牛其牛一也其所以爲牛者異有變而不郊故免卜牛也已牛矣其尚卜免之何也禮與其亡也寧有嘗置之上帝矣故卜而後免之不敢專也卜之不吉則如之何不免安置之繫而待六月上甲始庀牲然後左右之子之所言者牲之變也而曰我一該郊之變而道之何也我以六月上甲始庀牲十月上甲始繫牲十一月十二月牲雖有變不道也待正月然後言牲之變此乃所以該郊郊享道也貴其時大其禮其飬牲雖小不備可也子不志三月卜郊何也郊自正月至於三月郊之時也我以十二月下辛卜正月上辛如不從則以正月下辛卜二月上辛如不從則以二月下辛卜三月上辛如不從則不郊矣胡傳昔者周公郊祀后稷以配天此成王諒隂之時位冢宰攝國政行天子之事也魯何以得郊成王追念周公有大勲勞於天下而欲尊魯故賜以重祭得郊禘大雩然則可乎孔子曰魯之郊禘非禮也周公其衰矣欲尊魯而賜以人臣不得用之禮樂豈所以康周公也哉天子祭天地諸侯祭社稷大夫祭五祀庶人祭先祖此定禮也今魯得郊以爲常事春秋欲削而不書則無以見其失禮盡書之乎則有不勝書者故聖人因其失禮之中又有失焉者則書於䇿所謂由性命而發言也聖人奚容心哉因事而書以誌其失爲後世戒其垂訓之義大矣集說髙氏閌曰魯不當郊故天示變以警之而改卜牛是違天也雖改卜牛猶非郊時况公斬然在衰絰之中輒行天子之禮以見上帝可乎義李氏亷曰春秋書郊止此故榖梁於此備言之其有得有失郊汪氏克寛曰定公之薨未及小祥而僭行天子之禮釋凶服而從吉則爲不孝於親矧郊之祭也喪者不敢哭凶服不敢入國門今在喪而蕆事則爲不敬於天一舉而犯三不韙焉春秋書郊之失禮未有甚於此者也宣三年匡王未葬而不郊猶三望雖曰廢郊其罪與哀公等爾附錄左傳夏四月齊侯衛侯救邯鄲圍五鹿而吳之入楚也使召陳懐公懐公朝國人問焉曰欲與楚者右欲與呉者左陳人從田無田從黨逢滑當公而進曰臣聞國之興也以福其亡也以禍今吳未有福楚未有禍楚未可棄呉未可從而晉盟主也若以晉辭呉若何公曰國勝君亡非禍而何對曰國之有是多矣何必不復小國猶復况大國乎臣聞國之興也視民如傷是其福也其亡也以民為土芥是其禍也楚雖無徳亦不艾殺其民吳日敝於兵暴骨如莽而未見徳焉天其或者正訓楚也禍之適呉其何日之有陳侯從之及夫差克越乃修先君之怨秋八月吳侵陳修舊怨也秋齊侯衞侯伐晉左傳齊侯衞侯㑹于乾侯救范氏也師及齊師衞孔圉鮮虞人伐晉取棘蒲棘蒲晉地今趙州城中有棘蒲社集說許氏翰曰晉為霸主而諸侯至於合從以伐之春秋特書以著列國之無霸也楚得專封王道盡矣晉受衆伐霸綂亡矣王道既盡霸綂復亡春秋之變至是而窮矣髙氏閌曰五氏垂葭之役聖人書次以存晉晉至是益衰聖人不復以盟主待之矣以傳考之魯及鮮虞之師在焉春秋以齊衞首惡故沒魯而略鮮虞也蓋晉自召陵之役不能得楚而蔡昭公以吳子勝於是齊衞鄭背之已而我睦齊鄭宋人效之俱叛晉者也文公之業掃地盡矣至於黄池之㑹吳人争長雖欲為成景悼厲之世且不可得矣悲夫書陳氏傅良曰伐夷儀不書書次五氏伐河内不書次垂葭公㑹齊衞於牽帥狄師襲晉戰於絳中猶不書也諸侯之無霸春秋誠有不忍書也必於是而後書春秋蓋將終焉是故春秋之初諸侯無王者齊鄭宋魯衞為之也春秋之季諸侯無霸者亦齊鄭宋魯衞為之也家氏鉉翁曰據傳救范中行也齊景公輔范中行以抗君奨衞輒以捍父所謂日暮途窮倒行逆施者也李氏亷曰自晉文興伯以来除秦晉之争外與國伐晉者止三文元年衞人伐晉襄二十四年齊侯伐衞遂伐晉雖一時諸侯之玩伯然春秋於衞書人於齊書遂尚未絶晉也至是而直書二國伐晉晉無異於列國矣故此條陳氏許氏得之次汪氏克寛曰前此齊衞五氏之次伐夷儀垂葭之伐河内蓋皆遣偏師伐晉而二君次止為之援春秋皆不書伐非諱之也二君實未嘗親帥師以攻晉但頓兵次止以觀其可攻與否故皆書次以著其無名妄勲之罪今此竝書齊侯衞侯而以伐晉為文者著伯綂之絶而受諸侯之兵且誅齊衞之黨叛臣而陵霸國也夫范中行晉之卿也卿叛而不能制豈足為諸侯盟主乎無惑乎齊衞之同伐矣然天下之惡一也不令之臣實人人之所同惡今乃棄君助臣不亦傎乎書曰齊侯衞侯伐晉交貶之也自是晉不復能有為又十三年吳人主㑹於黄池而春秋終矣附錄左傳吳師在陳楚大夫皆懼曰闔廬惟能用其民以敗我於柏舉今聞其嗣又甚焉将若之何子西曰二三子恤不相睦無患吳矣昔闔廬食不二味居不重席室不崇壇器不彤鏤宮室不觀舟車不飾衣服財用擇不取費在國天有菑癘親廵其孤寡而共其乏困在軍熟食者分而後敢食其所嘗者卒乘與焉勤恤其民而與之勞逸是以民不罷勞死知不曠吾先大夫子常易之所以敗我也今聞夫差次有臺榭陂池焉宿有妃嬙嬪御焉一日之行所欲必成玩好必從珍異是聚觀樂是務視民如讎而用之日新夫先自敗也已安能敗我冬仲孫何忌帥師伐邾集說髙氏閌曰觀定公之末邾之事魯至矣去歳邾子来奔喪今逾年而遽伐之蓋魯人謀邾利取其田不復知有禮義也至黄氏仲炎曰邾子方朝魯又奔魯喪所以奉魯者矣無故而伐之何哉蓋亂世之人行如禽獸弱之肉彊之食也寧趙氏鵬飛曰定公之世撫邾為厚自拔之盟疆埸謐未嘗以一兵相遺也邾亦事魯為勤㑹公于比蒲朝公於魯定公之薨訃及其庭倒屣而奔喪其亦腆矣邾魯之好實出定公之志諸大夫不欲也故公未瞑目而城漆哀公即位席未即温而仲孫何忌伐邾何先君撫之厚而嗣君虐之速哉非公意也諸大夫之意也明年三大夫竝出而取其田終哀公之世虐之無所不至邾何負於魯哉以邾邇於魯利其土地也生家氏鉉翁曰定公之薨邾子奔喪戚死者以感動者冀其不爲侵暴爾曽㡬何日何忌以兵伐之自是三家更將迭出殆無虛歳皆季氏利邾之土疆期盡乃已仲與叔羽翼之也附錄左傳冬十一月晉趙鞅伐朝歌戊敬王二申十七年二年晉定十九年齊景五十五年衞靈四十二年蔡昭二十六年鄭聲八年曹陽九年陳閔九年把僖十三年宋景二十四年秦惠八年楚昭二十三年吳夫差三年春王二月季孫斯叔孫州仇仲孫何忌帥師伐邾取漷東田及沂西田癸巳叔孫州仇仲孫何忌及邾子盟于句繹漷火虢反又音郭山書盟止此鄒句繹杜注邾地應在今東兗州府縣境左傳春伐邾將伐絞邾人愛其土故賂以漷沂之田而受盟絞杜注邾邑當在兗州府滕縣境榖梁取漷東田漷東未盡也及沂西田沂西未盡也三人伐而二人盟何也各盟其所得也胡傳曷爲列書三卿哀公得國不張公室三卿竝將魯衆悉行伐國取地以盟其君而已不與焉適越之辱兆矣定公之薨邾子來奔喪事魯恭矣而不免於見伐徒自辱焉不知以禮爲國之故也邾在邦域之中不加矜恤而諸卿相繼伐之既取其田而又彊與之盟不知以義睦鄰之故也故詳書以著其罪三人伐則曷為乎二人盟盟者各盟其所得也莫彊乎季孫何獨無得季氏四分公室有其二昭公伐意如叔孫氏救意如而昭公孫陽虎囚桓子孟孫氏救桓子而陽虎奔今得邾田蓋季氏以歸二家而不取也集說石氏介曰定哀之世吳楚争彊越又寖起諸侯見伐者數四也晉衞齊又數侵伐魯既叛晉又結怨於齊所與厚者邾滕杞而已魯公之立邾未嘗廢朝薨未嘗無㑹而前年仲孫何忌帥師伐邾今又三大夫取其田要之盟又四年而公又親入以其君來此邾人所以弗堪致吳之伐我齊取我田也内之惡見矣時政皆在三子不由公出東師氏恊曰前此嘗取邾田自漷水矣今又取其漷之田猶以為未足故又取沂西之田則其貪欲無厭必至於盡取而後已可知也以區區之邾國而魯兩納其叛人之邑三取其田時無王霸彊陵弱之亂至於如此三髙氏閌曰定公之薨邾子來奔喪非能行禮也知家者欲并其地故事魯不敢不恭然卒不免故元年伐邾至是三卿同伐而取漷沂之田入春秋未有伐國取田者也七陳氏傅良曰自是内外盟皆不書不足書也是故年鄫衍盟吳不書八年莱門盟吳不書甚者十二年㑹於鄖雖三國盟亦不書將家氏鉉翁曰三卿自將不假他族為帥兵皆其兵皆其將國愈不可為矣書取漷東田及沂西田著魯人逐利而不知止也三家俱出二氏獨盟見季氏滅邾乃已此春秋所以誅也田鄭氏玉曰季氏志在滅邾二田不足充其欲故以與叔仲使二氏與邾盟季氏不盟者一則不屑與盟以示其汰二則包藏禍心欲入邾而未肯盟也汪氏克寛曰内臣竝使始於文十八年公子遂叔孫得臣之如齊而未嘗竝將也内臣竝將始於成二年季孫行父臧孫許叔孫僑如公孫嬰齊之戰鞌而未嘗竝㑹也内臣竝㑹始於襄十四年季孫宿叔老之㑹吳而未嘗竝盟也今此三卿竝將以伐國取地二卿又竝盟他國之君是魯之諸卿與列國諸侯無異大夫之彊僭極於此時矣前此昭十一年仲孫貜嘗盟邾子而非魯志也定三年何忌盟拔雖魯之志而一卿獨盟之耳今三卿以兵攻之奪取其地而二卿又脅之以盟陵弱之暴豈不太甚乎盟蔑與句繹爲春秋書盟之始終於此可以考世變矣未郝氏敬曰季孫不盟志厭也明年遂復圖邾案邾者魯之附庸最近且親不待講好修睦而自有一體之誼此而疑貳則天下之邦交其何禮義忠信之有故春秋書盟始於蔑而終於句繹也夏四月丙子衞侯元卒左傳初衞侯遊於郊子南僕公曰余無子將立女不對他日又謂之對曰郢不足以辱社稷君其改圖君夫人在堂三揖在下君命祗辱夏衞靈公卒夫人曰命公子郢爲大子君命也對曰郢異於他子且君沒於吾手若有之郢必聞之且亡人之子輒在乃立輒集說季氏本曰衞靈公無道之君也主威不立盜殺其兄家政不修妻逐其子事無名而興遠役行無信而召敵兵不亡幸矣不王氏樵曰甚矣衞靈公之惽也彼不恥召宋朝固難逐蒯聵也蒯聵之奔於今四年惟罪状未明故太子之位猶未絶而所欲立者猶未定也死而乃以遺命立郢宜郢之不肯居而後日蒯聵與輒之争有所藉口也非靈公之罪而何哉滕子來朝滕朝止此諸侯來朝亦止此集說汪氏克寛曰哀公新立故滕頃公來朝自襄六年成公朝魯三十一年㑹葬定十五年頃公再㑹葬至是復朝不朝之中七十有三年矣諸國之朝滕把曹邾居多把之朝七而止於成十八年曹之朝五而止於襄二十一年小邾之朝亦五而止於昭十七年邾之朝七而止於定十五年滕之朝五始於隠十一年而止於是年滕與魯皆侯國而自隠至哀栖栖於兩觀之間蓋㣲弱甚矣晉趙鞅帥師納衞世子蒯聵于戚左傳六月乙酉晉趙鞅納衞大子于戚宵迷陽虎曰右河而南必至焉使大子絻八人衰絰僞自衞逆者告於門哭而入遂居之胡傳世子不言納位其所固有國其所宜君謂之儲副則無所事乎納矣凡公子出奔復而得國者其順且易則曰歸有奉焉則曰自其難也則曰入不稱納矣况世子哉今趙鞅帥師以蒯聵復國而書納者見蒯聵無道爲國人之所不受也國人不受而稱世子者罪衞人之拒之也所以然者縁蒯聵出奔靈公未嘗有命廢之而立他子及公之卒大臣又未嘗謀於國人數蒯聵之罪選公子之賢者以主其國乃從輒之所欲而君之以子拒父此其所以稱世子也人莫不愛其親而志於殺莫不敬其父而忘其喪莫不慈其子欲其子之富且貴也而奪其位蒯聵之於天理逆矣何疑於廢黜然父雖不父子不可以不子輒乃據國而與之争可乎故特繫納衞世子蒯聵于戚於趙鞅帥師之下而鞅不知義靈公與衞國大臣不能早正國家之本以致禍亂其罪皆見矣集說孫氏復曰夏四月衞靈公卒衞人立輒輒者蒯聵之子也故晉趙鞅帥師納蒯聵於戚其言于戚者為輒所拒不得入於衞也案定十四年衞世子蒯聵出奔宋靈公既卒輒又已立猶稱曩日之世子蒯聵當嗣惡輒貪國叛父逆亂人理以滅天性孔子正其名而書之也劉氏敞曰公羊曰曷爲不書入於衞何休曰據弗克納言於邾婁非也彼以弗克納故得言於邾婁耳此但得入戚未得入衞故不得言衞亦其理自然何以見父得有子乎凡父得有子子不得有父其言則是也其於說經則非也陳氏傅良曰于戚内弗受也輒拒父也後十六年而蒯聵自戚入於衞衞侯輒來奔則是輒拒父也黄氏仲炎曰衞世子蒯聵得罪於父靈公以出被天下不孝之名不能為申生之死幸其父沒入其國以争君位是蒯聵之無父也輒蒯聵之子也父逐於外不能號慕毁瘠以感動王父而復之位王父死而已立曽不以父亡未復爲辭及蒯聵求入輒拒而不受甚者以兵圍之是輒之無父又甚於蒯聵也父子天性而絶滅至此其與梟獍奚别哉故春秋備書蒯聵求納衞師圍戚之事以著父子相戕之禍爲後世戒明矣李氏亷曰程子曰蒯聵得罪於父不得復立輒亦不得背父而不與其國爲輒計者委於所可立使不失君之社稷而身從父則義矣公榖王父命之説非是此說得之大抵蒯聵父子一段胡氏圍戚下一條説極正但君親無将將而必誅使聵果有殺母之事則罪在必誅天地所不容不論靈公有命無命决無得國之理亦何必曲折如此輒邵氏寶曰輒有父聵亦有父以位則聵以命則郢之拒聵吁其甚哉聵之殺母其将乎未可知也父喪不哀而惟位之利是可忍也孰不可忍也聵無父輒亦無父王氏樵曰蒯聵欲殺母得罪於父大臣與國人請於天王方伯斷以大義擇其所立則可輒與國人據國拒父則胥於亂矣故書帥師書納于戚見其見敵於衞亦以著輒與國人之罪也秋八月甲戌晉趙鞅帥師及鄭罕逹帥師戰于鐵鄭師敗績鐵公作栗又作秩左傳秋八月齊人輸范氏粟鄭子姚子般送之士吉射逆之趙鞅禦之遇於戚陽虎曰吾車少以兵車之斾與罕駟兵車先陳罕駟自後隨而從之彼見吾貎必有懼心於是乎㑹之必大敗之從之卜戰龜焦樂丁曰詩曰爰始爰謀爰契我龜謀恊以故兆詢可也簡子誓曰范氏中行氏反易天明斬艾百姓欲擅晉國而滅其君寡君恃鄭而保焉今鄭爲不道棄君助臣二三子順天明從君命經徳義除詬恥在此行也克敵者上大夫受縣下大夫受郡士田十萬庶人工商遂人臣隸圉免志父無罪君實圖之若其有罪絞縊以戮桐棺三寸不設屬辟素車樸馬無入於兆下卿之罰也甲戌將戰郵無恤御簡子衛大子爲右登鐵上望見鄭師衆大子懼自投於車下子良授太子綏而乘之曰婦人也簡子廵列曰畢萬匹夫也七戰皆獲有馬百乘死於牖下羣子勉之死不在宼繁羽御趙羅宋勇爲右羅無勇麇之吏詰之御對曰痁作而伏衞大子禱曰曾孫蒯聵敢昭告皇祖文王烈祖康叔文祖襄公鄭勝亂從晉午在難不能治亂使鞅討之蒯聵不敢自佚備持矛焉敢告無絶筋無折骨無靣傷以集大事無作三祖羞大命不敢請佩玉不敢愛鄭人擊簡子中肩斃於車中獲其蠭旗大子救之以戈鄭師北獲温大夫趙羅大子復伐之鄭師大敗獲齊粟千車趙孟喜曰可矣傅傁曰雖克鄭猶有知在憂未艾也初周人與范氏田公孫尨稅焉趙氏得而獻之吏請殺之趙孟曰爲其主也何罪止而與之田及鐵之戰以徒五百人宵攻鄭師取蠭旗於子姚之幕下獻曰請報主徳追鄭師姚般公孫林殿而射前列多死趙孟曰國無小既戰簡子曰吾伏弢嘔血鼓音不衰今日我上也大子曰吾救主於車退敵於下我右之上也郵良曰我兩靷將絶吾能止之我御之上也駕而乘材兩靷皆絶鐵上杜注鐵丘名在戚城南今直隸大名府開州北有戚城其南爲王合里即鐵丘也集說家氏鉉翁曰鞅圍范中行鄭罕達以師救之鞅爲主達來戰客也書及所以辨主客謂鞅爲兵首而書及其不然歟晉國盛時兵行天下莫之敢攖今鄭人以偏師至幸而勝之書晉鞅帥師及鄭達帥師戰言其敵也卑晉而罪鄭也能李氏亷曰春秋舎齊秦楚外無能與晉戰者蓋無與晉敵也今以蕞爾之鄭而晉趙鞅及之戰雖勝不武矣書而夷晉於列國也况趙鞅既勝而争功故羣下皆自伐其不復振也宜哉致汪氏克寛曰鄭之黨叛人固罪也然鞅不思所以亂者己實爲之苟能引咎責躬改過遷善返國權於其君修明政事復興伯業則諸侯畏之范中行將覆亡是懼焉敢怙亂今乃納蒯聵而見拒於衞遇鄭師而震慄失措既而幸勝且以雋功相與矜夸不思黷武勦民搆怨與國以力勝人奚足恃乎春秋以趙鞅主乎是戰處已息争之道逺怨之方也王氏樵曰皆言帥師其衆敵也戰而書及以主及客也鄭黨叛人趙鞅以亂禦亂故春秋以趙鞅主乎是戰也冬十月葬衞靈公集説范氏甯曰七月而葬蒯聵之亂故也十有一月蔡遷于州来蔡殺其大夫公子駟書遷止此左傳吳洩庸如蔡納聘而稍納師師畢入衆知之蔡侯告大夫殺公子駟以說哭而遷墓冬蔡遷於州来胡傳州来吳所滅也蔡雖請遷於呉而中悔呉人如蔡納聘而師畢入蔡侯告大夫殺公子駟以說哭而遷墓如此則實呉人之所遷也而經以自遷為文何也楚既降蔡使疆於江汝蔡人聽命而還師矣復背楚請遷於呉而又自悔也其謀之不臧甚矣夫遷國大事也盤庚五遷利害甚明衆猶胥怨不適有居至於丁寜反覆播告之修而後定也今蔡介於吳楚二大國之間背楚誑吳及其事急又委罪於執政其誰之咎也故經以自遷為文而殺公子駟則書大夫而稱國言君與用事大臣擅殺之也放公孫獵則書大夫而稱人言國亂無政衆人擅放之也駟與獵其以請遷於吳為非者乎而委之罪以説誰敢有復盡忠而與謀其國者哉集説許氏翰曰蔡悔請遷及吳師入而委罪於駟焉稱國以殺殺無罪也聖人殺一不辜雖得天下不為而况於國乎故蔡自殺公子駟上下危疑遂以禍敗髙氏閌曰初武王封叔度於汝南上蔡蔡叔以叛被誅成王復以封其子及平侯卒徙於新蔡至昭侯乃徙九江下蔡即州来是也姚氏舜牧曰蔡初不自量受命於楚而背楚既不自安請遷於吳而誑吳及其事急殺執政以為觧其何以令一國哉經書蔡遷于州來不與其能遷也書殺大夫公子駟不與其能殺也已敬王二酉十八年三年晉定二十年齊景五十六年衞出公輒元年蔡昭二十七年鄭聲九年曹陽十年陳閔十年把僖十四年宋景二十五年秦惠九年楚昭二十四年吳夫差四年春齊國夏衞石曼姑帥師圍戚左傳三年春齊衞圍戚求援於中山榖梁此衞事也其先國夏何也子不圍父也不繫戚於衞者子不有父也胡傳主兵者衞也何以序齊為首罪齊人與衞之為惡而黨之也公孫文仲主兵以伐鄭而序宋為首以誅殤公石曼姑主兵圍戚而序齊為首以誅國夏訓天下後世討亂臣賊子之法也故冉有謂子貢曰夫子為衞君乎子貢曰諾吾將問之入曰伯夷叔齊何人也曰古之賢人也曰怨乎曰求仁而得仁又何怨出曰夫子不為也伯夷以父命為尊而讓其弟叔齊以天倫為重而讓其兄仲尼以為求仁而得仁者也然則為輒者奈何宜辭於國曰若以父為有罪将從王父之命則有社稷之鎮公子在我焉得為君以為無罪則國乃世子之所有也天下豈有無父之國哉而使我立乎其位如此則言順而事成矣集說范氏甯曰江熙曰國夏首兵則應言衞戚今不言者辟子有父也子有父者戚繫衞則為大夫屬於衞子圍父者謂人倫之道絶故以齊首之為陳氏岳曰先國夏後曼姑是聖人惡其不義以齊兵首君劉氏敞曰春秋抑曼姑於齊以明臣之不可侵其離戚於衞以明子之不可加其父一言而君臣父子之道正矣詩云示我顯徳行此之謂也故為曼姑之義宜明言於其君曰子無討父之道臣不足為三軍將也輒之義亦宜明言於其國曰臣無乘君之禮我不可為千乘主也若是上譲下競而兵偃不用矣又何其紛紛哉故昔者子路問於仲尼曰衞君待子而為政子将奚先子曰必也正名乎所謂正名者君君臣臣父父子子者也君不君臣不臣父不父子不子此輒與曼姑之事也不其然歟許氏翰曰晉以君臣稱兵而齊為臣伐君衞以父子争國而齊助子圍父以是令於諸侯君子是以知齊之不伯而將有亂也國髙氏閌曰曼姑為子圍父逆亂人倫莫甚於此齊夏帥師助之故為惡首齊與晉為讎若蒯聵入則衞從晉矣此齊之所以助輒也衞薛氏季宣曰佐人之子攻人之父齊之罪有浮於也黄氏仲炎曰齊景公為衞輒圍蒯聵於戚蓋助逆子以圍父也無父子之義矣鄭氏玉曰蒯聵無弑母之事輒迎而立之有弑母之事輒當致國於公子之賢者以身從父可也豈有據國拒父者乎李氏亷曰衞石曼姑圍戚與宋華元圍宋彭城相對然宋事以晉首兵者善晉之討逆也衞事以齊首兵者不以子圍父也彭城書宋者正彭城歸於宋也戚不書衞者不以子制父也汪氏克寛曰公羊以圍戚為伯討然則曷為不書圍衞戚與宋彭城比乎又云輒不以父命辭王父命是不以家事辭王事豈可逆父子之倫而可謂之王法乎禮記子弑父凡在宫者殺無赦説其之者曰除子以外皆得殺其弑父之人蓋子弑父而子殺之殺之者之子又將得而殺之是聖人之法教人以父子相殘也豈理也哉唐李存孝以克用飬子叛其父而請命於朝廷先儒以為不可受蓋知春秋貶國夏之義矣案公羊以輒為可立謂不以父命辭王父命胡傳辨之以為輒未受靈公之命二說皆非也即使受靈公之命便可拒蒯聵而不容其入乎胡氏又謂輒辭位避父則衞之臣子當拒蒯聵而輔之尤為悖理輔其子而拒其父天下安有無父之國哉輒辭位而為臣子者輔輒以正其位可也輒避父而為臣子者稱兵以拒其父不可也今故刪節胡𫝊夏四月甲午地震五月辛卯桓宮僖宮災左傳夏五月辛卯司鐸火火踰公宮桓僖災救火者皆曰顧府南宫敬叔至命周人出御書俟於宫曰庀女而不在死子服景伯至命宰人出禮書以待命命不共有常刑校人乘馬巾車脂轄百官官備府庫慎守官人肅給濟濡帷幕鬰攸從之䝉葺公屋自大廟始外内以悛助所不給有不用命則有常刑無赦公父文伯至命校人駕乘車季桓子至御公立於象魏之外命救火者傷人則止財可為也命藏象魏曰舊章不可亡也富父槐至曰無備而官辦者猶拾瀋也於是乎去表之槀道還公宮孔子在陳聞火曰其桓僖乎公羊何以不言及敵也何以書記災也榖梁言及則祖有尊卑由我言之則一也胡傳桓僖親盡矣其宫何以存季氏者出於桓立於僖世專魯國之政其諸以是為悦而不毁歟何以不稱及等也稱及則祖有尊卑矣集說杜氏預曰桓僖親盡而廟不毁宜為天所災故孔子聞火知其必桓僖孫氏覺曰桓公者哀公之十世祖也僖公者哀公之七世祖也諸侯五廟而十世七世之廟存焉非禮矣髙氏閌曰諸侯五廟親盡則毁桓僖不毁三家者存之僭天子也聖人因其災而竝錄之君子於是乎知有天道也黄氏仲炎曰桓親盡而廟不毁者蓋三桓私於其祖也僖亦親盡也僖何以不毁以其存桓不得不存僖也故春秋因二宮之災以著三家之非禮焉爾僖家氏鉉翁曰季氏悖禮僭上罪不勝誅故天災桓廟以示警戒命李氏亷曰左氏載此年救火之事如南宫敬叔至周人出御書子服景伯至命宰人出禮書季桓子命藏象魏曰舊章不可亡也此亦見魯為儒書之國汪氏克寛曰家語記孔子對陳侯之言曰禮祖有功而宗有徳故不毁其廟焉今桓僖之親盡矣又功徳不足以存其廟而魯不毁是以天災加之蓋桓公簒立無功徳可言季氏存桓僖初非以其有功徳實所以隆私恩焉耳又家語記孔子在齊聞周先王廟災曰此必僖王之廟今考景王之時上距僖王已八世僖王在位日淺亦無功徳可稱其廟亦在當毁故天災及之與魯桓僖之廟災無以異也然晉之悼公朝於武宮晉頃公時獻俘於文宮則當時諸侯之祖廟親盡而不毁者無國無之故春秋特書桓僖災以示戒歟季氏本曰二宮之災公羊以為復立非也若復立當如雉門兩觀書新作矣季孫斯叔孫州仇帥師城啓陽啓公作開縣啓陽杜注琅琊開陽今山東沂州北十五里有開陽故城本鄅國後屬魯名啓陽也集說杜氏預曰魯黨范氏故懼晉比年四城異許氏翰曰所城近敵故帥師焉地震廟災變弗圖而取田城邑兵役相繼可謂不畏天命矣中失而外鍵本亡而末務此魯之季世也季氏本曰啓陽故鄅國也昭十八年邾人襲鄅鄅子從帑於邾其地在邾東鄙則近於費魯既取漷東沂西田邾人不得不以啓陽讓魯矣故城之季孫以叔孫附已故與同城而地則季孫得之宋樂髠帥師伐曹集說許氏翰曰宋始窺曹曹不量力而奸彊國不修徳而圖大功則適足以取亡而已此年樂髠伐六年向巢伐七年圍八年入而以曹伯陽歸樂髙氏閌曰曹本屬宋既而叛之薛氏季宣曰討大心之亂也曰李氏亷曰此蓋曹公孫彊為政之時也從季氏本曹奉樂大心入蕭以叛宋方有亂故且齊盟未暇致討今聞齊景耄而無畏於齊修曹之怨也附錄左傳劉氏范氏世為婚姻萇𢎞事劉文公故周與范氏趙鞅以為討六月癸卯周人殺萇𢎞秋七月丙子季孫斯卒左傳秋季孫有疾命正常曰無死南孺子之子男也則以告而立之女也則肥也可季孫卒康子即位既葬康子在朝南氏生男正常載以如朝告曰夫子有遺言命其圉臣曰南氏生男則以告於君與大夫而立之今生矣男也敢告遂奔衞康子請退公使共劉視之則或殺之矣乃討之召正常正常不反集說李氏廉曰朱子曰康子奪嫡即此蔡人放其大夫公孫獵于吳集説杜氏預曰公子駟之黨也髙氏閌曰放大夫者國也而稱人衆人逐之其放之于吳召亂之道也厥後蔡亂以公孫氏豈獵之黨歟冬十月癸卯秦伯卒叔孫州仇仲孫何忌帥師圍邾集說許氏翰曰句繹之盟踰年而渝之師圍其國雖云邾政不修有以致宼魯之棄信亦已甚矣趙氏鵬飛曰前年伐其國奪其地盟其君今又圍邾邾何慊於魯哉虐邾甚矣李氏亷曰来㑹来朝来奔喪猶不免伐取漷沂田受繹盟猶不免圍不至於以邾子益来不止也小國困於水火甚矣諸侯無伯冝哉附錄左傳冬十月晉趙鞅圍朝歌師於其南荀寅伐其郛使其徒自北門入已犯師而出癸丑奔邯鄲十一月趙鞅殺士皋夷惡范氏也庚敬王二戍十九年四年晉定二十一年齊景五十七年衞出二年蔡昭二十八年鄭聲十年曹陽十一年陳閔十一年把僖十五年宋景二十六年秦悼公元年楚昭二十五年吳夫差五年春王二月庚戌盜殺蔡侯申二月公作三月殺公榖作弑左傳四年春蔡昭侯將如吳諸大夫恐其又遷也承公孫翩逐而射之入於家人而卒以兩矢門之衆莫敢進文之鍇後至曰如牆而進多而殺二人鍇執弓而先翩射之中肘鍇遂殺之故逐公孫辰而殺公孫姓公孫旴集說孔氏穎達曰宣十七年蔡侯申卒是文侯也蔡世家云文侯申生景侯固固生靈侯般般生隠大子今昭侯申是隐大子之子杜世族譜亦然計昭侯是文侯𤣥孫乃與髙祖同名周人以諱事神二申必有誤者俱是經文未知敦是又曰公孫辰公孫姓公孫霍雖竝是弑君之黨而非弑君之首首是公孫翩翩賤故稱盜不言弑其君者賤此盜也盜賤不得有其君故以盜為文不得言弑其君石氏介曰一國之君行有軍從居有衞兵而為賊所殺蔡之無臣子甚矣劉氏敞曰榖梁曰稱盜以弑君不以上下道道也非也盜即微者爾辟稱人故云盜也所杜氏諤曰蔡侯為一國之君不能自正而為賤者殺其貶可知也文趙氏鵬飛曰宣十七年書蔡侯申卒葬蔡文公自至是纔五世不宜與五世祖同其名傳者誤也閽弑吳子書弑而此書殺閽盜均臣呉子蔡侯均君不宜彼書弑而此書殺亦字誤矣要之百千歳後更篆為隸更隸為楷不能無誤也因其誤而為之說則鑿矣然蔡侯一國之君而盜得殺之蔡亦有臣子乎春秋書之以責臣子更弑為殺非義也蔡侯申既誤則以弑為殺其誤可知矣家氏鉉翁曰弑蔡侯者公孫翩非賤者而書盗討之也弑其君以求説於楚是盗也首惡者不名亂黨衆不容悉書槩目之曰盜也謂季氏本曰殺公榖作弑是也君王氏樵曰榖梁所不以上下道道者如閽不得其君之比則可也稱盜者直言其人盜賊耳非不以上下道道而然也稱盜殺者以千乘之君為盜所殺欲以見義故不言弑亦非内其君而外弑者不以弑道道也張洽謂弑者積漸之名蔡昭不道上得罪於大國下無道於其民忠謀不用無罪見殺故翩之事成於一旦春秋以盗殺書之所以見其㡬於獨夫也此說尤穿鑿昭侯蓋亦足哀耳何詆之深乎盜賊之名一也榖梁有三盜之說亦非也公羊以賤乎賤者為罪人亦無據案杜氏預以稱盜為賤孔氏穎達暢言之石氏介謂蔡無臣子家氏鉉翁謂亂黨衆不容悉書皆是也胡傳專責蔡侯而於殺君者有恕辭不可以訓故刪之蔡公孫辰出奔吳集說陳氏傅良曰書公薨夫人姜氏孫于邾公子慶父出奔莒則夫人慶父與聞乎弑矣書盜殺蔡侯申蔡公孫辰出奔吳則辰與聞乎殺矣也季氏本曰蔡昭侯之弑辰為正卿必蹤跡可疑者故奔吳葬秦惠公宋人執小邾子集說許氏翰曰天下無霸故宋人得以執小邾子伐鄭入曹而無所忌趙氏鵬飛曰小邾子固㣲爾微國必不敢犯宋宋執之非罪也書人以執其貶可知李氏亷曰伐曹執邾之役蓋齊景圗霸無成而宋亦有志於争權也當合宋襄執滕用鄫子圍曹等看汪氏克寛曰稱人以執非伯討也不稱名無罪也以私怨擅執小國之君又不歸諸京師其罪大矣晉蔡殺其大夫公孫姓公孫霍晉人執戎蠻子赤歸于楚蠻公作曼音蠻書執止此左傳夏楚人既克夷虎乃謀北方左司馬眅申公壽餘葉公諸梁致蔡於負函致方城之外於繒關曰吳将泝江入郢将奔命焉為一昔之期襲梁及霍單浮餘圍蠻氏蠻氏潰蠻子赤奔晉隂地司馬起豐析與狄戎以臨上雒左師軍於菟和右師軍於倉野使謂隂地之命大夫士蔑曰晉楚有盟好惡同之若将不廢寡君之願也不然将通於少習以聽命士蔑請諸趙孟趙孟曰晉國未寧安能惡於楚必速與之士蔑乃致九州之戎将裂田以與蠻子而城之且將為之卜蠻子聼卜遂執之與其五大夫以畀楚師於三户司馬致邑立宗焉以誘其遺民而盡俘以歸負函杜注楚地當在今信陽州故繒闗杜注楚地梁霍杜注梁河南梁縣西南城梁南有霍陽山皆蠻子邑杜隂地杜注河南山北自上雒以東至陸渾豐注楚邑析南有豊鄉今河南南陽府淅川縣西南有豐鄉城其地與鄖陽相接縣析杜注楚邑析縣屬南鄉郡今淅川縣及内鄉之西北境皆析地也州菟和杜注莬和山在上洛東今陜西西安府商東有莬和山通襄漢之道倉野杜注在上洛縣今商州東南有倉野聚東少習杜注商縣武闗也武闗在今西安府商州少習山下故亦名曰少習王三户杜注丹水縣北有三户亭漢桓帝河間孝子博封三户亭侯即此今河南南陽府淅川縣西南有三户城公羊赤者何戎曼子之名也其言歸于楚何子北宫子曰辟伯晉而京師楚也胡傳其曰晉人云者罪之也文公執曹伯則曰畀宋人今此曷云歸于楚歸于楚者猶曰京師楚也晉主夏盟為日乆矣不競至此春秋所惡集說陳氏岳曰霸主執列國之君歸於京師正也今執而與楚宜書如曹伯畀宋人乃書與歸于京師文無異是責晉不當執不宜歸于楚而歸于楚明矣髙氏閌曰諸侯有罪方伯請命於天子問罪然後執而歸諸京師正也不請王命而執之歸于京師若晉侯執曹伯歸于京師其罪為輕若晉侯入曹執曹伯畀宋人執諸侯畀諸侯其罪己重今晉為列國盟主而執戎蠻子歸于楚以君臣言則楚為君矣以彊弱言則楚為伯矣六家氏鉉翁曰戎蠻雖邇於楚亦嘗服屬諸夏昭十年楚乘其亂誘其君而殺之楚實無道戎之叛之宜也於是自㧞歸晉晉人倘畏楚之盛彊拒而弗納可也聼其去而適他國亦可也乃詐而執之以歸于楚晉之罪大矣故書人以貶之季氏本曰蠻為楚所陵自㧞投晉晉反助楚為虐人誰頼之城西郛集説杜氏預曰備晉也六月辛丑亳社災亳歩各切公作蒲公羊蒲社者何亡國之社也社者封也其言災何亡國之社蓋揜之揜其上而柴其下蒲社災何以書記災也榖梁亳社者亳之社也亳亡國也亡國之社以為廟屏戒也其屋亡國之社不得達上也集説杜氏預曰天火也亳社殷社諸侯有之所以戒亡國楊氏士勛曰周禮建國之神位左宗廟右社稷彼謂天子諸侯之正社稷受霜露者周禮又云决隂事於亳社明不與正同處明一在西一在東故左氏曰間於兩社為公室輔是也既程子曰書曰湯既勝夏欲遷其社不可作夏社國亡則社自當遷湯存之以為後戒故但屋之則與遷之無異既為亡國之社則自王都至國都皆有之使為戒也記曰喪國之社屋之不受天陽也又曰亳社北牖使隂明也魯有亳社災屋之故有災此制計之必始於湯也通家氏鉉翁曰或曰此周之亳社災為天亡下記異亦汪氏克寛曰亡國之社災戒魯之危也七年左傳云以邾子益来獻于亳社則新作亳社之屋可知矣不書新作亳社者以其當作故不志也邵氏寶曰湯作夏社為後戒也周存亳社其猶湯之志歟凡都邑皆有之蓋舊社云爾秋八月甲寅滕子結卒集說汪氏克寛曰在位二十三年子虞毋嗣是為隐公冬十有二月葬蔡昭公集說髙氏閌曰國亂故緩葬滕頃公附錄左傳秋七月齊陳乞弦施衞甯跪救范氏庚午圍五鹿九月趙鞅圍邯鄲冬十一月邯鄲降荀寅奔鮮虞趙稷奔臨十二月弦施逆之遂墮臨國夏伐晉取邢任欒鄗逆畤隂人盂壺口㑹鮮虞納荀寅於柏人臨杜注晉邑今直隸真定府臨城縣東有臨城故城春秋晉臨邑漢之房子縣也欒杜注晉地在趙國平棘縣西北今欒城縣及趙州北境皆古欒邑地屬直隸真定府鄗杜注晉邑即高邑縣也今真定府柏鄉縣北故城鎮即故鄗城地晉髙邑也逆畤杜注晉地水經注濡水回湍曲復亦謂之曲逆水春秋齊國夏伐晉取曲逆是也酈道元以逆畤為曲逆矣今曲逆故城在直隸保定府完縣東南二十里安壺口杜注晉地潞縣東有壺口闗在今山西潞府黎城縣東北大行山口俗名吾兒峪是也徳柏人杜注晉邑趙國柏人縣也今直隸順府唐山縣西有柏人故城辛敬王三亥十年五年晉定二十二年齊景五十八年衞出三年蔡成公朔元年鄭聲十一年曹陽十二年陳閔十二年杞僖十六年宋景二十七年秦悼二年楚昭二十六年吳夫差六年春城毗毗頻夷反公作比又作芘集說杜氏預曰備晉也撫師氏恊曰魯以千乘之國不能親仁善鄰鎮民庶既無威彊之可畏又無徳禮之可懐乃區區奪民力以興土功故徃年城莒父及霄又城啓陽又城毗六年又城邾瑕一叛於晉而畏懾自偹之不暇又安能為國而無弊邪義湛氏若水曰書春城毗譏不時也不宜城也夫禮惟城而金湯不與焉魯助晉叛人以啓晉釁可謂墮禮義之大閑而乃屢城以自救焉末矣豈其時乎豈其宜乎夏齊侯伐宋集說髙氏閌曰齊之伐宋所以圖霸也曹王氏貫道曰齊方挾諸侯以伐晉而宋人伐執小邾子欲爭伯也故齊侯伐宋年汪氏克寛曰定十四年齊侯宋公㑹于洮距此六未有釁端而景公忽興師以伐宋豈以宋人伐曹執小邾子恃彊陵弱故託是討之以圖霸歟然景公内不能正其國區區脅制以爭伯權是以鄭衛魯宋雖從之而不心服也老將衰而耄及之猶不知省無何身殁子弑卒以國與陳氏公孫丑稱晏子以其君顯抑末矣晉趙鞅帥師伐衛左傳春晉圍柏人荀寅士吉射奔齊初范氏之臣王生惡張桞朔言諸昭子使為柏人昭子曰夫非而讎乎對曰私讎不及公好不廢過惡不去善義之經也臣敢違之及范氏出張桞朔謂其子爾從主勉之我將止死王生授我矣吾不可以僭之遂死於柏人夏趙鞅伐衞范氏之故也遂圍中牟集說杜氏預曰衞助范氏故也逆家氏鉉翁曰輒以子拒父齊國夏為之圍戚也蒯聵以父伐子晉趙鞅為之伐衞其順矣乎吁齊固失矣晉亦未為得也晉人倘欲修明霸業陳大義以示天下當請之天王召諸侯伐衞執輒歸諸京師命公子郢而立之然後於義為允若私於蒯聵必求其入亦非春秋所許也況實以范氏之故而納蒯聵以為名乎黨卓氏爾康曰是時齊與晉爭伯而列國諸侯堅於齊者衞鄭耳荀寅士吉射乃趙鞅之讎衞故庇之鞅度齊兵力彊盛未可與爭寅射附衞未可猝動於是計納蒯聵以為衞主是将制其心腹掣其肘腋一舉兩得耳秋九月癸酉齊侯杵臼卒杵公作處左傳齊燕姬生子不成而死諸子鬻姒之子荼嬖諸大夫恐其為大子也言於公曰君之齒長矣未有大子若之何公曰二三子間於憂虞則有疾疢亦姑謀樂何憂於無君公疾使國惠子髙昭子立荼寘羣公子於萊秋齊景公卒冬十月公子嘉公子駒公子黔奔衞公子鉏公子陽生來奔萊人歌之曰景公死乎不與埋三軍之事乎不與謀師乎師乎何黨之乎萊杜注齊東鄙邑今山東登州府黄縣東南有萊子城是也集說張氏洽曰景公在位五十八年前有晏嬰後有孔子晏嬰告之以陳氏將竊其國孔子告以君君臣臣父父子子公亦知説而從之矣而卒不能用及大臣以未有大子告之反使之姑謀樂而勿憂無君卒致死肉未寒子弑國亂曾未十年陳恒弑簡公而移其社稷豈不為無遠慮者之戒歟家氏鉉翁曰景公行事無一可稱彼謂晏子以其君顯殆不然歟冬叔還如齊還音旋集說髙氏閌曰使卿弔且㑹葬也閏月葬齊景公公羊閠不書此何以書喪以閏數也喪曷為以閏數喪數畧也榖梁不正其閏也集說徐氏彦曰鄭志趙商問曰經曰閏月不告朔猶朝于廟榖梁𫝊云閏月附月之餘日喪事不數又哀五年閏月葬齊景公公羊傳云閏月不書此何以書喪以閏數喪數畧也此二傳義反於禮㫁之何荅曰居喪之禮以月數者數閏以年數者雖有閏無與於數也然則鄭氏之意以為彼云喪事不數者謂期與三年也此云喪以閏數者謂大功以下也若榖梁之意以為大功以下及葬皆不數閏陳氏岳曰三年之喪二十五月苟以閏數則二年之内已有二十五月安得謂之三年歟苟以閏數而書則諸書崩薨卒葬皆宜書矣奚獨斯也二孫氏復曰閏月喪事不數葬齊景公非禮也春秋百四十二年書閏者惟文六年不告月此年葬齊景公爾皆譏其變常也且三年之喪練祥各有其月此非禮可知劉氏敞曰葬之為事以月㫁者也以閏數宜矣何謂不正乎蘇氏轍曰春秋不書閏月此其書閏何也喪事不數閏譏其以閏月葬也者趙氏鵬飛曰喪以年計者言期而不言閏以月計閏亦月也安得不計王氏樵曰案成六年榖梁傳云閏月者附月之餘日也天子不以告朔而喪事不數也穀梁之意以為大功以下及葬皆不數閏與公羊不同公羊謂九月五月三月之喪既以月㫁則得數閏是以葬亦數閏以天子七月諸侯五月大夫三月士踰月葬亦數月故也如榖梁之説是此葬齊景公自九月併理閏月為五月而葬失喪事不數之義春秋譏之故曰不正其閏也案數閏不數閏之説公榖二傳不同主公羊者劉氏敞趙氏鵬飛也主穀梁者陳氏岳孫氏復也徐氏彦王氏樵兩用之今竝存以俟考附錄左傳鄭駟秦富而侈嬖大夫也而常陳卿之車服於其庭鄭人惡而殺之子思曰詩曰不解于位民之攸塈不守其位而能久者鮮矣商頌曰不僭不濫不敢怠皇命以多福壬敬王三子十一年六年晉定二十三年齊安孺子荼元年衞出四年蔡成二年鄭聲十二年曹陽十三年陳閔十三年杞僖十七年宋景二十八年秦悼三年楚昭二十七年吳夫差七年春城邾瑕瑕公作葭有書城止此在邾瑕杜注任城亢父縣北邾婁城今濟寧州南十里集說許氏翰曰定哀十六年間凡八城邑魯既不得事晉諸侯方爭是以高城深池務守其國以捍禍亂然使魯能修其政如治城者則天下歸之豈特自守而已三年以來嵗書城邑以著魯無徳政勞民荐數如此後雖城邑不復志矣之高氏閌曰瑕邾邑魯未嘗取於邾而遽城之見魯迫邾也是年冬伐邾眀年遂入邾邾益㣲弱魯以不義彊城之也聖人因其城而繫之邾者不與魯之擅幷人土也汪氏克寛曰邾瑕如魯濟之類魯有負瑕故稱邾以别之魯取不書恐如把成之不見於經耳晉趙鞅帥師伐鮮虞左傳春晉伐鮮虞治范氏之亂也集說薛氏季宣曰昭十二年楚人伐徐之嵗楚䖍方熾而書晉伐鮮虞十五年楚寇少安不能輯睦中夏而荀吳伐之定四年召陵罷㑹楚有可乘之機而士鞅及衞孔圉伐鮮虞五年吳方入郢士鞅又伐鮮虞於是盡失諸侯又有趙鞅之伐則晉伯業之衰皆由陪臣封殖貪伐鮮虞故也呉伐陳左傳呉伐陳復修舊怨也楚子曰吾先君與陳有盟不可以不救乃救陳師於城父集說高氏閌曰陳楚與也呉之入楚使召陳侯陳侯不來吳人怨之元年侵陳今復伐陳修怨也陳自是與呉成夏齊國夏及高張來奔左傳齊陳乞偽事高國者每朝必驂乘焉所從必言諸大夫曰彼皆偃蹇将棄子之命皆曰高國得君必偪我盍去諸固將謀子子早圖之圖之莫如盡滅之需事之下也及朝則曰彼虎狼也見我在子之側殺我無日矣請就之位又謂諸大夫曰二子者禍矣恃得君而欲謀二三子曰國之多難貴寵之由盡去之而後君定既成謀矣盍及其未作也先諸作而後悔亦無及也大夫從之夏六月戊辰陳乞鮑牧及諸大夫以甲入於公宫昭子聞之與惠子乘如公戰於荘敗國人追之國夏奔莒遂及高張晏圉弦施來奔集說許氏翰曰陳乞將立陽生乃先逐國高國髙奔而後陳乞弑君之謀得肆矣陳氏傅良曰齊殺其大夫高厚齊崔杼弑其君光齊國夏及高張來奔齊陳乞弑其君荼聖人之垂誡深矣張氏洽曰高國為國世臣從君於昏受其顧命力不足以衞上委君而逃書奔以罪其不忠也家氏鉉翁曰景公放逐長子而樹孽子國高受託孤之寄景公葬甫歴時而亂作又不能以死奉荼曽荀息之不若名而奔之所以誅也公王氏樵曰案世子國之本也大臣國之榦也齊景廢長立少輕其國本屬諸髙國既愚且懦故陳乞逐之如振槁葉而弑君立君皆在其手莫或敢難使景公早定樹子擇任忠賢則君君臣臣父父子子雖百陳氏豈能盗其國哉春秋書齊國夏髙張來奔於前陳乞弑其君荼於後其以為輕其國本託國非人之戒者至眀切矣叔還㑹呉于柤集說許氏翰曰叔還以吳在柤故徃㑹之始結呉好也李氏亷曰春秋之末臣與呉㑹者二然後有黄池之兩伯魯不得不任其責也秋七月庚寅楚子軫卒左傳秋七月楚子在城父将救陳卜戰不吉卜退不吉王曰然則死也再敗楚師不如死棄盟逃讎亦不如死死一也其死讎乎命公子申為王不可則命公子結亦不可則命公子啓五辭而後許将戰王有疾庚寅昭王攻大冥卒於城父子閭退曰君王舍其子而讓羣臣敢忘君乎從君之命順也立君之子亦順也二順不可失也與子西子期謀潛師閉塗逆越女之子章立之而後還是嵗也有雲如衆赤鳥夾日以飛三日楚子使問諸周大史周大史曰其當王身乎若禜之可移於令尹司馬王曰除腹心之疾而寘諸股肱何益不穀不有大過天其夭諸有罪受罰又焉移之遂弗禜初昭王有疾卜曰河為祟王弗祭大夫請祭諸郊王曰三代命祀祭不越望江漢睢漳楚之望也禍福之至不是過也不榖雖不徳河非所獲罪也遂弗祭孔子曰楚昭王知大道矣其不失國也宜哉夏書曰惟彼陶唐帥彼天常有此冀方今失其行亂其紀綱乃滅而亡又曰允出兹在兹由已率常可矣大冥杜注陳地當在陳州項城縣境集說家氏鉉翁曰楚昭敗而知懼是以不亡公李氏廉曰左傳載楚昭有死讎之志及其命子啓為王與不肯移禍於令尹司馬等亦足見昭王之賢又載子西子期子閭之讓國不立亦足見三子之賢故楚不終衰又曰楚子疾卜曰河為祟王弗祭曰三代命祀祭不越望江漢睢漳楚之望也孔子曰楚昭王知大道也此足以證諸侯不當三望之事附錄左傳八月齊邴意兹來奔齊陽生入于齊齊陳乞弑其君荼荼音徒又丈加反公作舍左傳陳僖子使召公子陽生陽生駕而見南郭且于曰嘗獻馬於季孫不入於上乘故又獻此請與子乘之出萊門而告之故闞止知之先待諸外公子曰事未可知反與壬也處戒之遂行逮夜至於齊國人知之僖子使子士之母養之與饋者皆入冬十月丁卯立之將盟鮑子醉而徃其臣差車鮑點曰此誰之命也陳子曰受命於鮑子遂誣鮑子曰子之命也鮑子曰女忘君之為孺子牛而折其齒乎而背之也悼公稽首曰吾子奉義而行者也若我可不必亡一大夫若我不可不必亡一公子義則進否則退敢不唯子是從廢興無以亂則所願也鮑子曰誰非君之子乃受盟使胡姬以安孺子如賴去鬻姒殺王甲拘江説囚王豹於句竇之丘公使朱毛告於陳子曰㣲子則不及此然君異於器不可以二器二不匱君二多難敢布諸大夫僖子不對而泣曰君舉不信羣臣乎以齊國之困困又有憂少君不可以訪是以求長君庶亦能容羣臣乎不然夫孺子何罪毛復命公悔之毛曰君大訪於陳子而圖其小可也使毛遷孺子於駘不至殺諸野幕之下葬諸殳冒淳駘杜注齊邑成殳冒淳杜注地名路史殳國一名冒澤公羊景公謂陳乞曰吾欲立舍何如陳乞曰所樂乎為君者欲立之則立之不欲立則不立君如欲立之則臣請立之陽生謂陳乞曰吾聞子蓋将不欲立我也陳乞曰夫千乘之主将廢正而立不正必殺正者吾不立子者所以生子者也走矣與之玉節而走之景公死而舍立陳乞使人迎陽生于諸其家除景公之喪諸大夫皆在朝陳乞曰常之毋有魚菽之祭願諸大夫之化我也諸大夫皆曰諾於是皆之陳乞之家坐陳乞曰吾有所為甲請以示焉諸大夫皆曰諾於是使力士舉巨囊而至於中霤諸大夫見之皆色然而駭開之則闖然公子陽生也陳乞曰比君也已諸大夫不得已皆逡巡北面再拜稽首而君之爾自是徃弑舍胡傳陽生曷為不稱公子非先君之子也為人子者無以有已則以父母之心為心者景公命荼世其國已則簒荼而自立是自絶於先君豈復得為先君之子也不稱公子誅不子也陽生不子則曷為繫之齊春秋端本之書也正其本則事理陽生之不子也其誰使之然也不有廢長立少以啓亂者乎故齊景問政於孔子孔子對曰君君臣臣父父子子君不君則臣不臣父不父則子不子以陽生繫之齊著亂之所由生也然而弑荼者陽生與朱毛也曷為書陳乞陳乞使人迎陽生寘諸家召諸大夫而示之曰此君也諸大夫知乞有偹不得已逡巡北面再拜而君之爾故里克中立不免殺身之刑陳乞獻諛終被弑君之罪是皆不明春秋之義陷於大惡而不知者也集說杜氏預曰弑荼者朱毛與陽生而書陳乞所以明乞立陽生而荼見弑則禍由乞始也楚比劫立陳乞流涕子家憚老皆疑於免罪故春秋明而書之以為弑主劉氏敞曰公羊曰弑而立者不以當國之辭言之此其以當國之辭言之何為諼也非也如公羊之說陽生本正與商人相似弑而代立與商人相似陽生諼而弑之商人亦諼而弑之所以諼之雖殊所以爲諼則同今何故陽生商人乖異若此哉公羊本欲引商人以求與之合而事同文别反更大繆乃知例苟不通者雖曲説愈譌也何休以為不舉陽生弑者諼成於乞然則是公子比之類也公子比棄疾宜效死勿聼故坐弑君陽生亦宜效死勿聼者也亦當坐弑君公子比首惡陽生不蒙首惡何哉又曰穀梁曰陽生正荼不正然而荼受命陽生不受命如此陽生得罪於先君荼乃其君也弑先君所命是則弑其君矣又何云不以陽生君荼乎假令先君廢陽生為非義自可聼天子伯主治之耳今至躬弑其君春秋猶詭其罪以與陳乞何哉且令陳乞無預陽生之事春秋又将彊委一卿以弑君之罪乎要之陳乞主陽生而弑荼可知也孫氏覺曰陽生入齊而陳乞弑君則是陽生與聞乎弑也不以陽生首惡者陽生之入陳乞召之荼之弑陳乞為之加陽生弑君之罪則乞廢立之迹不明書陽生之入而陳乞弑君則乞之惡著而陽生與有罪焉程子曰稱齊陽生見景公廢長立少以啓亂也禍髙氏閌曰春秋書弑君之賊雖其人不自為必以所從發為主所以誅其意也又曰觀從召公子比而虔死陳乞召陽生而荼死乞蒙弑君之惡而從乃委罪公子比何也從陪臣也能始禍而不能定其所立比以衆立而不顧其君是比弑之也乞大臣也齊已有君而又外求陽生陽生雖入而不能自定其位乞以彊立之而不顧其君是乞弑之也從雖召比然公子有三焉比不自立可也乞召陽生固将君之矣陽生為君則孺子荼何所置哉故春秋别嫌眀㣲不以其迹而同其誅也陳氏傅良曰衞侯入于夷儀衞甯喜弑其君剽則喜為衛侯弑也齊陽生入于齊齊陳乞弑其君荼則乞為陽生弑也荼之弑得國者陽生也曷為不以罪齊無知者罪陽生於是齊政由陳氏矣彼陽生者亡公子而已乞不有無君之心則陽生為僇矣陽張氏洽曰春秋譏景公之廢長立㓜而不稱公子生何也人君立子而不以正者皆徒設此心兩棄之也故凡當然而君父處之不以其道者君子不立乎其位伯夷叔齊寧他人有之而不敢當春秋豈敢遂予之以公子而正名之哉家氏鉉翁曰陽生之入與小白書入同然小白之入齊無君也陽生之入齊有君矣荼弑在陽生既入之後然其謀實定於陽生未入之前不與小白同也晉獻公殺世子而立嬖妾之子其事與此畧相似荼則卓也陽生則夷吾也陳乞則里克也然夷吾不預殺而陽生實預於殺則陽生又不得與夷吾同也且弑荼立陽生乃乞之本謀故專罪陳乞陽生於諸子為長以序當立景公黜長立㓜以是召亂春秋不坐陽生以首惡之罪示人君立子以長不以愛其寓戒之意深矣本李氏廉曰此條公羊當國之説非是至其載陳乞末獨詳於左氏有以知春秋罪乞之大意則胡氏詳矣蓋當廢立之際大臣當據經守正守死不回然後可不然必陷於大惡里克陳乞事正同言卓氏爾康曰書齊陽生入于齊上文無所䝉下不歸不言齊陽生將不知其為何國公子也非以其當有國而繫之齊也冬仲孫何忌帥師伐邾集說髙氏閌曰魯人必欲滅邾而後已自公即位以來四用兵於邾積眀年入邾之亂趙氏鵬飛曰既城瑕矣邾何恃哉宜乎伐邾之必克也宋向巢帥師伐曹集說髙氏閌曰樂髠伐之猶未服且為入曹起也癸敬王三丑十二年七年晉定二十四年齊悼公陽生元年衞出五年蔡成三年鄭聲十三年曹陽十四年陳閔十四年把僖十八年宋景二十九年秦悼四年楚惠王章元年吳夫差八年春宋皇瑗帥師侵鄭瑗于眷反左傳七年春宋師侵鄭集說髙氏閌曰不務徳而加兵於人故書侵爭張氏洽曰老丘之役宋鄭始因隙地以起兵卒致各取其師以逞其殺人之志所以詳其交爭之實也家氏鉉翁曰宋連嵗有事於曹意鄭為援而侵之也非李氏廉曰宋之叛晉久矣豈復為晉討鄭乎左氏汪氏克寛曰老丘敗在定十五年是後九年取鄭師于雍丘十三年取宋師于嵒晉魏曼多帥師侵衞曼音萬左傳晉師侵衞衞不服也集説杜氏預曰五年晉伐衞至今未服也髙氏閌曰衞輒拒其父至今六年矣猶未納晉不以此致討而以范中行氏加兵於衞故書侵夏公㑹呉于鄫鄫榖作繒左傳夏公㑹呉于鄫呉來徴百牢子服景伯對曰先王未之有也呉人曰宋百牢我魯不可以後宋且魯牢晉大夫過十吳王百牢不亦可乎景伯曰晉范鞅貪而棄禮以大國懼敝邑故敝邑十一牢之君若以禮命於諸侯則有數矣若亦棄禮則有滛者矣周之王也制禮上物不過十二以為天之大數也今棄周禮而曰必百牢亦唯執事吳人弗聼景伯曰吳將亡矣棄天而背本不與必棄疾於我乃與之大宰嚭召季康子康子使子貢辭大宰嚭曰國君道長而大夫不出門此何禮也對曰豈以為禮畏大國也大國不以禮命於諸侯苟不以禮豈可量也寡君既共命焉其老豈敢棄其國大伯端委以治周禮仲雍嗣之㫁髮文身臝以為飾豈禮也哉有由然也反自鄫以吳為無能為也集說髙氏閌曰吳欲霸諸侯魯先徃㑹之於張氏洽曰比年書㑹吳所以著哀公之失謀始而遺患於後日也吳家氏鉉翁曰晉衰而即齊景死而事趨利棄信春秋所惡也秋公伐邾八月己酉入邾以邾子益來左傳季康子欲伐邾乃饗大夫以謀之子服景伯曰小所以事大信也大所以保小仁也背大國不信伐小國不仁民保於城城保於徳失二徳者危將焉保孟孫曰二三子以為何如惡賢而逆之對曰禹合諸侯於塗山執玉帛者萬國今其存者無數十焉唯大不字小小不事大也知必危何故不言魯徳如邾而以衆加之可乎不樂而出秋伐邾及范門猶聞鐘聲大夫諫不聼茅成子請告於吳不許曰魯擊柝聞於邾呉二千里不三月不至何及於我且國内豈不足成子以茅叛師遂入邾處其公宫衆師晝掠邾衆保於繹師宵掠以邾子益來獻於亳社囚諸負瑕負瑕故有繹邾茅夷鴻以束帛乘韋自請救於吳曰魯弱晉而遠吳馮恃其衆而背君之盟辟君之執事以陵我小國邾非敢自愛也懼君威之不立君威之不立小國之憂也若夏盟於鄫衍秋而背之成求而不違四方諸侯其何以事君且魯賦八百乘君之貳也邾賦六百乘君之私也以私奉貳唯君圖之吳子從之范門杜注邾郭門也金茅杜注髙平西南有茅鄉亭在今山東兗州府鄉縣西北四十里繹杜注邾山也在鄒縣北郭璞曰繹山純石積搆連屬如繹絲然今嶧山一名邾嶧山在鄒縣東南二十里蓋古時縣治在山南而今徙於山北也在負瑕杜注魯邑髙平南平陽縣西北有瑕丘城今山東兗州府滋陽縣西二十五里集說趙氏匡曰穀梁曰其言來者外魯之辭予謂來者至内之辭也何外之有如紀伯姬來豈是外魯乎其陳氏岳曰交陣而獲其君則曰獲入國滅國而以君歸則曰以書於諸侯則曰歸於魯則曰來而劉氏敞曰伐國而克此衆人之所禱祠而求玉帛賀者也而君子諱之諱之不敢多其功不敢享其名非惡功名也功不可訓而名不可𫝊也其事好還是以明年而呉伐我魯之存者幸而已矣且吳之彊不能以是行於楚魯之弱顧能以是行於邾乎孔子曰人之生也直罔之生也幸而免此之謂也公羊云内辭也使若他人然非也邾魯相近故初秋伐之八月又入之此自兩事理當竝書無取於内辭也入邾婁使若他人猶可諉以邾婁子益來又可云他人乎又曰曷為不言其獲内大惡諱也亦非也諸侯擅入人之國為大惡可矣戰而獲人獲者則大惡矣獲之者豈可同其科哉又此自入而以歸不得以獲解也穀梁曰其言來者外魯之辭非也春秋襃善貶惡直書入邾又言以邾子益來於君親之過而無所隠義已足矣豈以一失之故遂外其君乎且令春秋不外其君則當曰以邾子益歸乎夫歸可施於人不可施於我來可施於我不可施於人詳於此之意者可以知春秋之文矣蘇氏轍曰魯入邾以邾子益來而不言滅何也邾大夫茅夷鴻保於茅請救於吳明年吳為之伐魯魯復邾子故不言滅在外曰以歸在内曰以來内外之别也公薛氏季宣曰伐邾本三家而公自為之不得已也内迫於三家三家歸過於上也其王氏樵曰案伐邾者三家也公雖在行而無與於事獲則三家享其利討則公受其惡春秋以諱不在公是以直書而不諱也舊説諱為隠其惡若隠其惡何名為直筆乎蓋諱避之也避其名而遜其辭以示尊敬也今言他人之遇屯否罪戾死喪恥辱則正言之至於所尊所敬則婉順言之此人之情春秋之義也魯自作三軍分公室而季孫宿帥師救台遂入鄆權不在公也蒐于紅不書公兵不在公也襄公還自楚聞季氏取卞至於欲適諸侯地不在公也故納叛人叛邑凡内惡悉書而不諱矣以諱不在公也胡氏謂書以邾子來而不諱者欲見後書歸邾子之為能去其惡而與之也其義迂矣宋人圍曹冬鄭駟𢎞帥師救曹左傳宋人圍曹鄭桓子思曰宋人有曹鄭之患也不可以不救冬鄭師救曹侵宋初曹人或夢衆君子立於社宫而謀亡曹曹叔振鐸請待公孫彊許之旦而求之曹無之戒其子曰我死爾聞公孫彊為政必去之及曹伯陽即位好田弋曹鄙人公孫彊好弋獲白鴈獻之且言田弋之説説之因訪政事大説之有寵使為司城以聼政夢者之子乃行彊言霸説於曹伯曹伯從之乃背晉而奸宋宋人伐之晉人不救築五邑於其郊曰黍丘揖丘大城鍾邘黍丘杜注梁國下邑縣西南有黍丘亭案下邑卽今之夏邑也屬河南歸徳府黍丘亭在縣西南揖丘當在今曹縣界鍾當在今定陶縣界大城當在今曹州界邘當在今定陶縣界集説髙氏閌曰曹伯奸宋是以致討然宋之伐曹數矣今又圍之亦已甚矣故貶而人之苟将卑師少豈能圍之乎凡陳氏傅良曰書救曹何曹卒滅於宋也自魯救晉晉楚之救皆不書六十年矣其再見以列國無霸而諸侯自相救也不家氏鉉翁曰列國無盟主諸侯擅侵伐更相吞噬奪不饜春秋書宋圍曹罪宋也書鄭救曹與鄭也春秋與鄭之能救所以愧齊晉諸大國之不能救也李氏廉曰謝氏曰曹之病於宋久矣大國無一為之援而鄭能帥師救之善之也欽定春秋𫝊説彚纂卷三十六
