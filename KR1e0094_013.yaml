body:
  text: 欽定四庫全書欽定春秋傳說彚纂卷十一閔公集說楊氏士勛曰魯世家閔公名開莊公之子惠王十六年即位諡法在國逢難曰閔世本作啓方辟漢景帝諱故為開也庚惠王十申六年元年齊桓二十五年晉獻十六年衛懿八年蔡穆十四年鄭文十二年曹昭公班元年陳宣三十二年把惠十二年宋桓二十一年秦成三年楚成十一年春王正月公羊公何以不言即位繼弑君不言即位孰繼繼子般也孰弑子般慶父也殺公子牙今將爾季子不免慶父弑君何以不誅將而不免遏惡也既而不可及因獄有所歸也惡乎歸獄歸獄僕人鄧扈樂曷為歸獄僕人鄧扈樂莊公存之時樂曾淫於宫中子般執而鞭之莊公死慶父謂樂曰般之辱爾國人莫不知盍弑之矣使弑子般然後誅鄧扈樂而歸獄焉榖梁繼弑君不言即位正也親之非父也尊之非君也繼之如君父也者受國焉爾集說啖氏助曰凡先君遇弑則嗣子廢即位之禮榖梁云繼弑君不書即位正也此說是也凡繼弑君而行即位禮非也左氏云不書即位亂故也國有危難豈妨行禮故知妄也劉氏敞曰公羊曰誅鄧扈樂而歸獄焉季子至而不變也又曰既而不可及不探其情而誅焉親親之道也非也慶父弑般欲取其國是時季子力不能誅故遁逃他國爾設令季子力能誅之則慶父誅死矣何謂不探其情乎孫氏覺曰人君即位國家之大事也雖在危亂不過禮有不具耳不應因亂遂廢其禮也公榖之說皆是朱子語類曰公即位要必當時别有即位禮數不書即位者此禮不備故也張氏洽曰閔公以㓜為慶父所立初不知子般不終之故齊桓若能仗義請於天子誅哀姜慶父為之置君則君臣父子之倫定而大義明矣乃縱慶父歸其國以致閔公為弑逆者所立故不書即位亦所以累齊桓也案公榖謂繼弑君不言即位啖氏助釋之以為廢即位之禮是也朱子謂君不行即位之禮故不書即位其意與公榖互相發明莊元年辨之詳矣僖不書即位亦同齊人救邢左傳狄人伐邢管敬仲言於齊侯曰詩云豈不懐歸畏此簡書簡書同惡相恤之謂也請救邢以從簡書榖梁善救邢也胡傳凡書救者未有不善者也救而不速救者則書所次以罪其慢叔孫豹救晉次于雍榆是也救而不敢救者則書所至以罪其怯齊侯伐我北鄙圍成公救成至遇是也兵者春秋之所甚重衛靈公問陳孔子對曰俎豆之事則嘗聞之矣軍旅之事未之學也獨至於救兵而書法若此聖人之情見矣其稱人將卑師少也集說孫氏復曰桓未能帥諸侯以徃故猶稱人其王氏葆曰說者謂邢被伐踰年齊方徃救罪緩也案經莊三十二年冬書狄伐邢此年正月書救邢則桓之救未為緩矣救邢之初齊獨出兵既而狄又入衛其勢益張齊恐其乘勝遂滅邢也於是帥諸侯之兵共救之邢幾亡而復存者小白之功也張氏洽曰桓公從管仲之請而興救邢之師故於此書齊人救邢以與之論語功歸管仲蓋管仲𤼵其端也汪氏克寛曰周禮大司馬大合軍以行禁令以救無辜伐有罪故列國有相救之義方伯有救患之權孟子曰今有同室之人鬭者救之雖被髪纓冠而救安之可也同列諸侯之有兵是不異同室之人鬬也得不投袂而起整兵赴難耶力余氏光曰齊人救邢説者猶以書人為譏桓公未於救患此則求之過深而反失之也桓公量狄勢之强弱不自徃救遣人救之春秋據實而書又何疑焉夏六月辛酉葬我君莊公左傳夏六月葬荘公亂故是以緩榖梁莊公葬而後舉諡諡所以成徳也於卒事乎加之矣集說汪氏克寛曰魯君之葬皆不過五月之期惟桓公見戕於齊九月而後葬昭公客死於外八月而後葬莊公之薨至是十有一月而始克葬蓋以國亂子弑嗣君幼弱危不得葬也説者謂子般非弑誤矣秋八月公及齊侯盟于落姑落公榖作洛東落姑杜注齊地在今山兗州府東平州平隂縣界左傳請復季友也齊侯許之使召諸陳公次於郎以待之榖梁盟納季子也集說陳氏傅良曰閔公盟齊桓于落姑請復季友未知孰為之也慶父為之則閔公不弑以閔之見弑則非慶父之意而國人為之也避吳氏􅊹曰子般卒後慶父哀姜專國故季友出以禍此時慶父秉外權哀姜為内主蓋唯恐季友之歸閔公九嵗爾孰能奉之出㑹伯主而為國計者必魯之世臣有不當權而忠於國能如衛之石碏深謀秘計告於伯主請復季友故桓公以伯令召閔公至齊地而與之盟使若復季友之意出於齊而不出於魯故盟以要其信而使魯復之既盟之後桓公使召諸陳而閔公次於郎以待之若不敢背伯主之盟而使季友得以歸魯者季友以伯主之重則慶父不敢去之矣春秋書之所以著魯大臣之有謀也魯程氏端學曰以事勢考之此盟多季子倚齊為歸計爾故既盟而季子來歸若卓氏爾康曰趙子嘗謂落姑之盟雖曰請復季友出公意然是時閔公八嵗耳哀姜慶父專國豈欲季友之歸者故陳氏以為國人為之臨川吳氏因謂魯之世臣有如衛石碏者告於伯主請復季友深得當時事情但哀姜慶父事與州吁石厚不同季友既出奔豈有如石碏者能自安於内以經傳推之時陳方為齊所厚且與魯交好季友又嘗一再如陳其出奔陳蓋有所托然則落姑之盟亦季友援陳人以請於齊桓耳案落姑之盟榖梁止曰盟納季子而左氏以為請復季子孰請之耶是時慶父當國閔公方幼慶父既不欲請閔公又不能請故陳氏傅良謂國人為之吳氏􅊹謂國之世臣為之卓氏爾康以為陳方為齊所厚季友援陳人以請齊桓於情事亦合故竝存之季子來歸左傳季子來歸嘉之也公羊其稱季子何賢也其言來歸何喜之也榖梁其曰季子貴之也其曰來歸喜之也胡傳案左氏盟于落姑請復季友也其曰季子賢之也其曰來歸喜之也自外至者為歸是嘗出奔矣何以不書莊公薨子般弑慶父主兵勢傾公室季子力不能支避難而出奔恥也魯國方危内賊未討國人思得季子以安社稷而公為落姑之盟以請於齊則是賢也春秋欲沒其恥故不書奔欲旌其賢故特稱季子聖人之情見矣隠惡而揚善舜也樂道人之善惡稱人之惡孔子也為尊者諱為親者諱為賢者諱春秋也明此可以蓄納汙之徳樂與人為善矣其不稱公子見季友自以賢徳為國人所與不縁宗親之故也堯敦九族而急親賢退嚚訟周厚本枝而庸旦仲黜蔡鮮義皆在此而親親之殺尊賢之等著矣此義行則内無貴戚任事之私外無棄親用羈之失而國不治者未之有也此春秋待來世之意集說杜氏預曰季子公子友之字季子忠於社稷為國人所思故賢而字之范氏甯曰大夫出使歸不書執然後致不言歸國内之人不曰來今言來者明本欲遂去同他國之人也言歸者明實魯人也喜之者季子賢大夫以亂故出奔國人思之懼其遂去不反今得其還故皆喜曰季子來歸陸氏淳曰趙氏云不言至異乎見執也啖氏云不言歸自陳齊命也又曰淳聞於師曰季友之出不書何也曰慶父之難季子力不能正違而去之權也君立見召而來義也故聖人善其歸不譏其去以明變而得中進退不違道也討程子曰莊公既薨子般被弑國人方危而慶父未公子友賢而在外國人思得以安社稷故公為落姑之盟以請復之來歸書曰季子而不名異其文以嘉之也朱子語類曰春秋書季子來歸恐是因舊史之文書之只是魯亂已甚後來季友立得僖公再整頓得箇社稷起有此大功故取之與取管仲意同又曰季子來歸如髙子來盟齊仲孫來之類當魯國内亂得一季子歸國則國人皆有慰望之理故魯史喜而書之夫子直書史家之辭其實一書季子來歸而季氏得政權去公室之漸皆由此起矣名陳氏傅良曰此公子友也其稱季子何賢之斯不之不名之斯以羙稱稱之也何賢乎季子微季子則慶父之簒成而莊公之綂絶慶父之簒不成莊公之綂不絶者季子在也是故奔陳不書如邾不書全季子也惡張氏洽曰邦之杌隉有親且賢孰不賴之季友遏於初萌子般之亂力不能討而遂去之非其罪也故魯人思之齊侯從閔公之請使召諸陳季子始歸春秋從諸侯晜弟之例特字之而書來歸所以著季子足以為國之輕重而叙魯人喜其來歸之情也家氏鉉翁曰閔公初年齊魯之三大夫皆字而不名季子也仲孫也髙子也此諸侯大夫書字之著者也王氏元杰曰季子之忠魯國之安危所繫易蹇九三之象曰徃蹇來反内喜之也程子曰三以剛居正處蹇而得下之心可以求安故以來為反猶春秋言歸之辭也春秋為賢者諱不書出奔欲旌其賢來歸書字聖人之情見矣汪氏克寛曰朱子謂成風聞季友之繇乃事之自是大惡春秋不貶之而反褒之其書季子或是聖人因史舊文竊疑左氏所載占筮之辭多不可信茍謂季子非羙之之辭然二百四十二年列國大夫惟季子髙子以子稱聖人必有深意也辭陳氏際㤗曰來歸喜亦緩辭也冬齊仲孫來左傳冬齊仲孫湫來省難仲孫歸曰不去慶父魯難未已公曰若之何而去之對曰難不已將自斃君其待之公曰魯可取乎對曰不可猶秉周禮周禮所以本也臣聞之國將亡本必先顛而後枝葉從之魯不棄周禮未可動也君其務寧魯難而親之親有禮因重固間㩦貳覆昏亂覇王之器也胡傳仲孫齊大夫也其不稱使而曰來者略其君臣之常辭以見桓公使臣不以禮仲孫事君不以忠也案左氏齊侯憂魯使仲孫來省難何以言使臣不以禮也鄰有弑逆則當聲罪戒嚴修方伯之職以奉天討而更使計謀之士窺覘虚實有乘亂取國之心則使臣非以禮矣仲孫歸曰不去慶父魯難未已君其務寧魯難而親之何以言事君不以忠也陳恒弑簡公孔子沐浴而朝告於哀公請討焉豈曰齊人方强姑少待之也不勸其君急於討賊而俟其自斃則事君非以忠矣使慶父稔惡閔公再弑則桓公與仲孫始謀不臧之所致爾直書曰齊仲孫來交譏之也集說啖氏助曰公榖云是公子慶父疏之故言齊仲孫案齊之仲孫謂是魯之公子謬亦甚矣陸氏淳曰趙氏云非有成命也故不言使非有專也故但曰來劉氏敞曰仲孫者何齊大夫也此無事其曰來何齊侯使之也齊侯使之則何以不言使譏何譏爾桓公知魯之可憂而不知使仲孫之非也誠茍憂之何問焉仲孫知魯之可親而不知存慶父之非也誠茍親之何待焉交譏之又曰公羊曰公子慶父也非也孫以王父字為氏此乃慶父之身也未可以稱仲孫且經實繫之齊若之何謂魯仲孫哉此不近人情之尤者魯胡氏寧曰不稱齊侯使仲孫又書曰來譏之也問可取者齊侯之心俟其自斃者仲孫之䇿故兩譏之以其猶曰務寧魯難而親之是以書字春秋舉法有輕重若又不書字則當時假有勸齊侯因亂以取其國者則無以貶之矣子陳氏傅良曰書來譏也仲孫之來覘魯也莊公薨般弑閔公幼落姑之盟嘗請於齊僅能復季子而已而慶父夫人之志未可知也桓公不能正􅍀然使人以覘魯曰是可取乎桓公伯諸侯將因人之難以為利書來不書事所以病桓也張氏洽曰仲孫固有罪矣然其言魯秉周禮於此見周公之澤入人者深足以維持其國於政亂俗壊之日仲孫之智善於覘國而不能輔君速行方伯之義春秋所以雖貶仲孫而不名以為猶有以異於傾險乘釁者之可誅也呂氏大圭曰仲孫雖不書名直言來而罪自見矣葛李氏廉曰春秋直書來者祭伯祭公州寔仲孫介盧白狄而已獨齊仲孫來書法似與祭公來同蓋上不書使下不書事皆為交譏之也然祭公猶以遂事為譏仲孫則以不能明於奉使之義故貶之同於私行之例耳又曰仲孫之事左氏得其實劉氏得其義張氏又兼得二家之旨無餘藴矣附錄左傳晉侯作二軍公將上軍太子申生將下軍趙夙御戎畢萬為右以滅耿滅霍滅魏還為大子城曲沃賜趙夙耿賜畢萬魏以為大夫士蔿曰大子不得立矣分之都城而位以卿先為之極又焉得立不如逃之無使罪至為吳大伯不亦可乎猶有令名與其及也且諺曰心茍無瑕何恤乎無家天若祚大子其無晉乎卜偃曰畢萬之後必大萬盈數也魏大名也以是始賞天啓之矣天子曰兆民諸侯曰萬民今名之大以從盈數其必有衆初畢萬筮仕於晉遇屯之比辛廖占之曰吉屯固比入吉孰大焉其必蕃昌震為土車從馬足居之兄長之母覆之衆歸之六禮不易合而能固安而能殺公侯之卦也公侯之子孫必復其始耿杜注平陽皮氏縣東南有耿鄉今山西平陽府河津縣東南有古耿城一名耿鄉城霍杜注永安縣東北有霍大山今山西平陽府霍州西十六里有霍城古霍國也辛惠王十酉七年二年齊桓二十六年晉獻千七年衛懿九年蔡穆十五年鄭文十三年曹昭二年陳宣三十三年把惠十三年宋桓二十二年秦成四年楚成十二年春王正月齊人遷陽陽杜注國名今山東青州府沂水縣南有陽都城即陽國也集說何氏休曰不為桓公諱者功未足以覆比滅人之惡也杜氏預曰陽國名蓋齊人偪徙之啖氏助曰移其國於國中而為附庸蓋桓公之强力施於可取者如此非有興滅繼絶之心也家氏鉉翁曰齊桓遷邢義也為其有狄難輔而遷之别擇善地以為之國都覇者之所得為也遷陽事不見於傳以書法而觀亦宋人遷宿之類蓋遷小國以為附庸并兼之異名春秋所惡書以貶之曰降曰遷彊其所不欲之辭也而程氏端學曰陽國天子所封也桓公以尊王為名遷天子所封之國則其所以尊王者假之而已自汪氏克寛曰齊人遷陽以力逼而遷之也不地者是不復見也邢遷夷儀非齊遷之乃邢人自欲遷也滅譚滅遂桓公初年之事也降鄣遷陽則不絶其祭祀矣存邢存衛存把則興滅繼絶之意也伯者功過不相掩此之謂也於卓氏爾康曰唐孔氏以與宋人遷宿文同然宿界宋魯魯侯侵宋宋疑宿附魯故遷之今齊間魯亂不暇疆埸之事遷人附庸以自封殖異於宋之自遷附庸者矣附錄左傳春虢公敗犬戎於渭汭舟之僑曰無徳而禄殃也殃將至矣遂奔晉夏五月乙酉吉禘于莊公左傳夏吉禘于莊公速也公羊其言吉何言吉者未可以吉也曷為未可以吉未三年也三年矣曷為謂之未三年三年之喪實以二十五月其言于莊公何未可以稱宫廟也曷為未可以稱宫廟在三年之中矣吉禘于莊公何以書譏何譏爾譏始不三年也榖梁吉禘者不吉者也喪事未畢而舉吉祭故非之也胡傳程氏曰天子曰禘諸侯曰祫其禮皆合祭也禘者禘其所自出之帝為東向之尊其餘皆合食於前此之謂禘諸侯無所出之帝則止於大祖之廟合羣廟之主以食此之謂祫天子禘諸侯㭘大夫享庶人薦上下之殺也魯諸侯爾何以有禘成王追念周公有大勲勞於天下賜魯公以天子禮樂使用諸大廟以上祀周公魯於是乎有禘祭春秋之中所以言禘不言祫也然則可乎孔子曰魯之郊禘非禮也周公其衰矣禘言吉者喪未三年行之太早也于莊公者方祀於寢非宫廟也一舉而三失禮焉春秋之所謹也四時之祭有禘之名蓋禮文交錯之失集說何氏休曰時莊公薨至是適二十二月所以必二十五月者取期再期恩倍漸三年也禮士虞記曰期而小祥曰薦此常事又期而大祥曰薦此祥事中月而禫是月也吉祭猶未配是月者二十七月也据禘於大廟不言周公祫僖公不言僖宫時閔公以莊公在三年之中未可入大廟禘之於新宫故不稱宫廟明皆非也主社氏預曰三年喪畢致新死者之主於廟廟之逺當遷入祧因是大祭莊公喪制未闋而吉祭又不於大廟故詳書以示譏禮劉氏敞曰禘非禮也吉禘亦非禮也于莊公亦非也髙氏閌曰初魯之喪莊公也既葬而絰不入庫門士大夫既卒哭而麻不入則當時君臣雖未終喪蓋皆吉服矣豈獨禘為然哉稷葉氏夢得曰何以言吉禘喪三年不祭惟天地社則越紼而行事莊公之喪二十二月矣未應吉而吉也禘祭於太祖之廟以其祖配之也君薨祔而作主特祀於寢三年升於廟莊公之主未升於廟即於寢而以莊公配之非所配而配也朱子論語集注曰趙伯循曰禘王者之大祭也王者既立始祖之廟又推始祖所自出之帝祀之於始祖之廟而以始祖配之也成王以周公有大勲勞賜魯重祭故得禘於周公之廟以文王為所自出之帝而周公配之然非禮矣又曰禘是祭之甚大甚逺者若時祭及祫祭止於太祖禘又祭祖之所自出如祭后稷又推稷上一代祭之周人禘嚳是也又曰程先生說禘是禘其始祖之所自出竝羣廟之主皆祭之祫則止自始祖以下合羣廟之主皆祭之所謂禘之說恐不然周張氏洽曰魯禘非禮也雖先王所賜而止可用於公之廟趙氏程氏言之詳矣今喪未三年主未遷祔嗣君幼弱而以吉禮盛樂用於神主忘哀僭上反易人心何秉禮之有此蓋出於哀姜慶父樂哀謀簒而為之又非他日僭禮之所得比矣不楊氏復曰閔公喪未畢竊禘之盛禮以行吉祭又於周公之廟而禘之禮始紊僖公八年用禘禮合先祖叙昭穆用致夫人於廟而禘禮始與祫混淆而無别春秋常事不書特書閔公僖公兩禘者記失禮之始也魯之有禘行於周公之廟已非禮矣况僭用之於莊公又禘於大廟以致妾母可以謂之禮乎禘吳氏􅊹曰莊公薨喪未二十七月而遽吉祭僭用禮之盛樂非别有所追享而降莊公為配食也皆李氏廉曰春秋書禘二此年及僖八年禘於大廟失禮之中又失禮而書也吉禘之說三傳皆知喪禘之失禮而不知魯本不當禘程氏胡氏能𤼵明魯禘之非禮而不知禘本無合食惟趙子深得之而朱子取以釋論語不可不備載也其說曰禮大傳及喪服小記云禮不王不禘王者禘其祖之所自出以其祖配之則諸侯不得行禘禮明矣蓋帝王立始祖之廟百世不遷猶謂未盡其追逺尊先之意故又推尊始祖所自出之帝而追祀之於始祖之廟就以始祖為配此祭不兼羣廟之主為不敢䙝狎故也其年數或毎年或數年未可知也祭法曰周人禘嚳而郊稷祖文王而宋武王稷為始祖嚳為始祖所自出之帝故郊則以稷配天而禘則以稷配嚳無可疑也至於禘時則本以夏之孟月為之故明堂位曰季夏六月以禘禮祀周公於大廟至孟獻子乃以夏之仲月為之故雜記曰七月而禘獻子為之也此辨甚明又案趙子曰此禘于莊公蓋用禘祭禮物耳不追配文王也汪氏克寛曰公羊文二祫祭毁廟之主陳於太祖未毁廟之主皆升合食於太祖曾子問祫祭於祖則祝迎四廟之主王制注天子諸侯之喪畢合先君之主於祖廟而祭之謂之祫後因以為常今案公羊言大祫之禮曾子問乃時祫之禮禮王氏錫爵曰禘禮當行於大廟今禘于莊公此失中之失禮若夫以諸侯而用天子禮樂魯國行之已乆不足譏矣此賀氏仲軾曰禘吉禮故言吉禘禘他日不言吉而言吉者對喪言之也秋八月辛丑公薨左傳初公傅奪卜齮田公不禁秋八月辛丑共仲使卜齮賊公於武闈公羊公薨何以不地隠之也何隠爾弑也孰弑之慶父也榖梁不地故也胡傳案左氏慶父使卜齮賊公於武闈魯史舊文必以實書其曰公薨不地者仲尼親筆也觀於刪詩在諸國則變風皆取在魯則獨編史克之頌或問吾黨有直躬者其父攘羊而子證之則曰吾黨之直者異於是父為子隠子為父隠直在其中矣後世縁此制為五服相容隠之條以綴骨月之恩春秋有諱義蓋如此禮記稱魯之君臣未嘗相弑者蓋習於經文而不知聖人書薨不地之旨故云爾然則諱而不言弑也何以傳信於將來曰書薨以示臣子之情不地以存見弑之實何為無以傳信也凡君終必書其所獨至於見弑則沒而無所其情厚矣其事亦白矣非聖人能修之乎後世記言之士欲諱國惡則必失其實直書無隠又非臣子所當施於君父也而春秋之法不傳矣集說孫氏復曰不言慶父弑者内諱弑故弑君之賊皆不書焉不地者義與隠公同劉氏敞曰公薨何以不地弑也何以不書葬賊未討也賊未討而葬慢也非臣子之事也又曰杜氏曰實弑書薨又不地者皆史策諱之非也古者史不諱國惡惡有不記者其罪死以直為職者也女史典彤管之法記宫中之事事有不記者其罪亦死明史之任一也董狐書趙盾弑君以示於朝仲尼謂之良史是史不諱國惡也左氏以崔杼殺齊太史為虐是史不當諱國惡也齊晉皆大國史官皆良士見稱於聖賢以不諱國惡為是知魯之史亦不諱國惡也魯之史不諱國惡則所諱由仲尼新意非史䇿舊文也又曰二年公薨公羊云云說同元年又曰榖梁曰不書葬不以討母葬子也非也所謂君弑賊不討不書葬者言比其葬時而賊未討則不書葬也既葬而後乃討賊賊雖已討葬猶不追書也此閔公是已討賊雖遲而葬在討賊之後則葬得書此陳靈公是己不以討母葬子何足為義乎陳氏傅良曰魯之春秋固書曰公子慶父弑公於武闈聖人修之曰公薨諱之也遇弑君父之大哀也何忍言之是故書薨而不地且不葬薨十二公所同也不地不葬隠閔所獨也然則雖諱而亂臣賊子之獄具矣張氏洽曰凡人𤼵其祖父之罪惡尚不忍肆言之聖人書父母國之惡豈可同於他國而不諱乎然諱國惡者臣子之禮存事實者傳信之法聖人之經兩存禮法以垂訓萬世故不徒隠諱而已而不書地以變其常又比事屬辭以見其實將使後人因例啓疑考究始末以知莊公不能正身齊家致後嗣再弑國幾滅亡雖欲諱之而實不可揜矣鄭氏玉曰弑君之賊討則書葬慶父雖縊不以賊討猶不討也汪氏克寛曰或謂不地固見其弑終無以著亂賊之罪夫君薨必書地使後世習其讀而問其傳察隠閔所以不地之由則亂賊之罪無所逃矣况羽父再不氏於隠薨之前夫人孫慶父奔比書於閔薨之後鈇鉞之誅顯然於筆削之間矣又謂慶父已殺何以不書葬今考慶父諡共而公孫敖為卿則慶父之誅不以賊討是以不書葬如宋閔公之例耳九月夫人姜氏孫于邾孫音遜榖梁孫之為言猶孫也諱奔也胡傳夫人稱孫聞乎故也不去姓氏降文姜也莊公忘親釋怨無志於復讎春秋深加貶絶一書再書又再書屢書而不諱者以謂三綱人道所由立也忘父子之親絶君臣之義國人習而不察將以是為常事則亦不知有君之尊有父之親矣莊公行之而不疑大臣順之而不諫百姓安之而無憤疾之心也則人欲必肆天理必滅故叔牙之弑械成於前慶父之無君動於後圍人犖卜齮之刃交𤼵於黨氏武闈之間哀姜以國君母與聞乎故而不忌也當是時魯君再弑幾至亡國其應不亦憯乎春秋以復讎為重而書法如此所謂治之於未亂保之於未危不可不察也集說何氏休曰為淫二叔殺二嗣子出奔不如文姜於出奔貶之者為内臣子明其義不得以子絶母去孔氏穎達曰賈服之說皆以為文姜殺夫罪重故姜氏哀姜殺子罪輕故不去姜氏陳氏傅良曰文姜孫于齊絶不稱姜氏此其稱姜氏何文姜無妻道哀姜無母道是故文姜一見貶絶之哀姜再見而後貶絶也謀吳氏􅊹曰哀姜不奔齊而奔邾者蓋有淫行與弑身負二惡自慊於心而畏齊桓故不敢歸齊也以汪氏克寛曰莊公之娶哀姜納幣觀社逆女屢徃致其勤丹楹刻桷用幣以示其侈而哀姜不與公偕至悍然驕狠之態己見於薦舍之時矣蓋哀姜習聞文姜淫姣禍賊之行而莊公不能防閑則於莊公乎何有是以通乎共仲而無羞惡之心與弑閔公而無惻隠之心實莊公不知防微謹始有以致之也然哀姜孫邾不去姜氏者文姜孫於宗國不削姓氏不足以見其罪哀姜孫於邾雖不去姓氏而絶之之意己著矣公子慶父出奔莒左傳成季以僖公適邾共仲奔莒乃入立之以賂求共仲於莒莒人歸之及宻使公子魚請不許哭而徃共仲曰奚斯之聲也乃縊閔公哀姜之娣叔姜之子也故齊人立之共仲通於哀姜哀姜欲立之閔公之死也哀姜與知之故孫于邾齊人取而殺之于夷以其尸歸僖公請而葬之夷杜注魯地榖梁慶父不復見矣胡傳公子出奔譏失賊也集說趙氏匡曰慶父弑子般季子不誅之者季子威令未著力不能爾非不討也陸氏淳曰榖梁云其曰出絶之也案例大夫奔皆言出不可别為義孫氏復曰公子慶父夫人姜氏同惡之人也夫人孫于邾故慶父出奔莒何蘓氏轍曰叔牙之死也曰公子牙卒而慶父不卒也牙之罪不見故可以言卒也慶父之罪見於出奔矣不可復卒也姜髙氏閌曰先書公薨而繼書孫邾奔莒則知夫人氏公子慶父實弑公者殺陳氏傅良曰宋萬奔陳雖殺之不書慶父奔莒雖之亦不書所以嚴佚賊之責也張氏洽曰慶父與哀姜謀弑閔公欲自立而不遂此魯國秉禮之驗也方季友適邾之時使魯國無人安能逐姜氏慶父哉季友既立僖則當正慶父之罪致辟於甸人以致兩弑其君之討乃以賂求於莒不許其入而已又立孟氏與叔牙同無復輕重之别豈非邦憲之大失此所以不書國賊之討而閔不書葬歟出李氏廉曰宋萬出奔陳陳人受賂而後歸之慶父奔莒莒人亦受賂而後歸之不書宋萬慶父之誅以逋逃主罪陳莒也又曰慶父出奔公羊杜氏皆以為季子推親親之恩夫慶父弑二君魯國幾喪尚欲以親親待之則子般閔公之讎曷報乎君汪氏克寛曰慶父繼弑兩君勢傾魯國顧不能寘以自託而避罪出奔者蓋人人黨惡以為利則亂賊肆行而無忌憚人人知大惡之當討則亂賊無所容其身使無圉人犖卜齮之釁則子般閔公之禍未若是之亟也使季友適邾而龜蒙曲阜之衆無石碏雍廩之謀則共仲之奔亦未若是之速也然則慶父之奔蓋自知罪大惡極有所畏於魯人之討與伯國之誅而不得不奔爾然魯人求慶父於莒既至而縊當書刺慶父以正討賊之法今但書奔而不志其死則見魯人之不能以賊討矣慶父之立後不異於叔牙而公孫敖為卿無以異於公孫兹則魯人必納慶父之喪矣不書喪歸與穆伯異者豈非聖人以共仲弑逆罪非敖比而削其喪歸以絶之歟邵氏寳曰魯無弑非無弑也凡弑曰薨或曰卒魯無殺非無殺也凡殺曰刺或曰卒魯無出非無出也凡出曰孫或曰如為國諱禮也案季友内執魯政外有齊援閔公被弑既不能救又視慶父之奔而不能討胡傳以為譏失賊者是也若以難易遲速之幾為季子解則失討賊之義矣恐非經旨附錄左傳成季之將生也桓公使卜楚丘之父卜之曰男也其名曰友在公之右間於兩社為公室輔季氏亡則魯不昌又筮之遇大有之乾曰同復於父敬如君所及生有文在其乎曰友遂以命之冬齊髙子來盟公羊髙子者何齊大夫也何以不名喜之也何喜爾正我也其正我奈何莊公死子般弑閔公弑比三君死曠年無君設以齊取魯曾不興師徒以言而已矣桓公使髙子將南陽之甲立僖公而城魯或曰自鹿門至於爭門者是也或曰自爭門至於吏門者是也魯人至今以為美談曰猶望髙子也榖梁其曰來喜之也其曰髙子貴之也盟立僖公也不言使何也不以齊侯使髙子也胡傳子者男子之美稱稱子賢之也何賢乎髙子莊公薨子般卒閔公弑慶父夫人亂乎内魯於是曠年無君齊桓公使將南陽之甲至魯而謀其國其命髙子必曰魯可取則兼其國以廣地魯可存則平其亂以善鄰非有安危繼絶一定不可易之計也髙子至則平魯難定僖公魯人賴焉聖人美其明人臣之義得奉使之宜特稱髙子以著其善不曰齊侯使之者權在髙子也集說杜氏預曰蓋髙傒也齊侯使來平魯亂僖公新立因遂結盟故不稱使也范氏甯曰齊侯不討慶父使魯重罹其禍今若髙子自來非齊侯所得使也猶屈完不稱使也孔氏穎達曰盟立僖公必僖公共盟不言公及齊髙子盟者桓十四年鄭伯使其弟語來盟文十五年宋華孫來盟皆不言公及則不書公者春秋之常也晉荀庚衞孫良夫竝為來聘既行聘禮更與公盟非是直為盟來故聘後别言及耳使陸氏淳曰淳聞於師曰不言齊侯使髙子髙子奉合宜受命不受辭也義與楚屈完乘盟于師不言楚子使義同奔劉氏敞曰公羊曰不稱使我無君也非也慶父出則僖公已立也髙子稱來盟則僖公之盟也何謂我無君乎公及齊大夫盟于蔇當是時齊無君文不沒公即魯無君何故沒齊侯哉又曰齊桓公驁然有取魯之心使髙子將南陽之甲而至者非伐之也非正之也非聘弔之也髙子能深執忠臣之義勉其君於覇因事制宜立僖公而盟之魯國遂安以此見權在髙子髙子之為人臣忠也從義不從命矣善程子曰髙子來省難然後盟盟未前定也稱髙子其能恤魯李氏廉曰凡外大夫之來不言使者皆私交如祭伯祭仲武氏子毛伯宋司馬華孫莒慶齊髙固之類是也非私交而不言使則必有美辭焉楚無大夫則屈完書族齊有大夫則髙傒書子皆貴之所以别於私交也榖梁疏曰髙子不稱使所以歸美於髙子屈完不稱使所以歸功於屈完此得之又曰閔公編書三子之來皆特筆也故季子髙子之書來著國人之喜而仲孫止書來乃春秋之所譏仲孫髙子不書使皆齊侯之過而髙子能權乃春秋之所善一字之法精矣稱汪氏克寛曰仲孫髙子之來皆所以窺魯經皆不使皆不稱名而傳有予奪之異者蓋仲孫但言來則見其徒來覘魯國之虚實不能弭其亂也髙子書來盟則見其不貪魯國之土地而遂能定其難也况比事觀之則仲孫來之後而閔公弑夫人孫慶父奔紛紛靡寧髙子盟之後則僖公立哀姜誅而魯國無事矣雖然仲孫字而不名則亦未足深責特無善之可録未若髙子之安危繼絶有庸於魯爾又曰來盟不稱使者三皆非前定然髙子定難而存魯國屈完服義而從中國皆美之也華孫私交而無君命則貶之也事同而褒貶不同者宋魯無事而華孫私來結盟則罪也春秋屬辭之義必考上下文而觀之十有二月狄入衞左傳冬十二月狄人伐衛衛懿公好鶴鶴有乘軒者將戰國人受甲者皆曰使鶴鶴實有禄位余焉能戰公與石祁子玦與甯莊子矢使守曰以此贊國擇利而為之與夫人繡衣曰聼於二子渠孔御戎子伯為右黄夷前驅孔嬰齊殿及狄人戰於滎澤衛師敗績遂滅衛衛侯不去其旗是以甚敗狄人囚史華龍滑與禮孔以逐衛人二人曰我太史也實掌其祭不先國不可得也乃先之至則告守曰不可待也夜與國人出狄入衛遂從之又敗諸河初惠公之即位也少齊人使昭伯烝於宣姜不可强之生齊子戴公文公宋桓夫人許穆夫人文公為衛之多患也先適齊及敗宋桓公逆諸河宵濟衛之遺民男女七百有三十人益之以共滕之民為五千人立戴公以廬於曹許穆夫人賦載馳齊侯使公子無虧帥車三百乘甲士三千人以戍曹歸公乘馬祭服五稱牛羊豕雞狗皆三百與門材歸夫人魚軒重錦三十兩滎澤杜注當在河北與鄭州之滎澤不同在共滕杜注衛别邑曹杜注衛下邑孔疏云當河東近楚丘也胡傳衛康叔之後蓋北州大國狄何以能入乎臣昔嘗謂河南劉奕曰史氏記繁而志寡如班固書載諸王淫亂等事盡削之可也奕曰必若此言仲尼刪詩如牆有茨鶉之奔奔桑中諸篇何以錄於國風而不削乎臣不能荅後以問延平楊時時曰此載衛為狄所滅之因也故在定之方中之前因以是說考於歴代凡淫亂者未有不至於殺身敗家而亡其國者也然後知古詩垂戒之大而近世有獻議乞於經筵不以國風進讀者殊失聖經之旨矣集說范氏甯曰僖公二年城楚丘以封衞則衛為狄所滅明矣不言滅而言入者春秋為賢者諱齊桓公不能救故為之諱遷孫氏覺曰案左氏載狄人伐衛之事以為衛滅而都也然春秋但書曰入者蓋狄雖廹衛至於奔亡而未嘗居有其地其後衛復見於經非狄滅而取之故不曰滅爾楊氏時曰衛之淫恣醜惡乃禍亂之所從始肇於晉而成於朔其禮先亡而國隨之矣陳氏傅良曰滅而書入不以累桓公也凡滅國有存之者則不言滅歸徳於存之者也有乘亂而取之者亦不言滅歸罪於取之者也故衛不言滅須句不言滅即張氏洽曰衛之滅非特懿公好鶴失人心自惠公位宣姜淫恣耽樂忘政習貫為常公又重之亡形已具故狄人一至而渙然離散國隨以亡非齊桓救而封之則康叔之後無噍類矣桓公迎其遺民立文公而為之建國家社稷此所以止書入也以衛為春秋初之大國纔五十年淪於亡滅故治國必先齊家而淫亂之禍不簒則滅可不戒哉汪氏克寛曰衛書入而不言滅或以桓公不能攘狄故為之諱或以為美桓公能存之故不書滅不以累桓公蓋桓公始雖不能却狄於衛未滅之先而猶能存衛於狄既滅之後其於興滅繼絶亦庶幾焉然此乃言外之意比事考之春秋凡滅而書入者或不有其地或雖有其地而不絶其祭祀也狄入衛秦人入滑楚子入陳吳入郢皆不有其地者也公及齊鄭入許雖有其地而不絶其祀也宋滅曹而書入則惡曹陽之自取滅亡而不予之以亡國之善詞又春秋之變例也案狄入衛范氏甯陳氏傅良與孫氏覺各主一說汪氏克寛兼採而折其中情理俱合甚得經旨當為正解鄭棄其師左傳鄭人惡髙克使帥師次於河上久而弗召師潰而歸髙克奔陳鄭人為之賦清人公羊鄭棄其師者何惡其將也鄭伯惡髙克使之將逐而不納棄師之道也榖梁惡其長也兼不反其衆則是棄其師也胡傳案鄭詩清人刺文公也髙克好利而不顧其君文公惡之而不能逺使克將兵禦狄於境陳其師旅翶翔河上久而不召衆散而歸髙克奔陳公子素惡髙克進之不以禮文公退之不以道危國亡師之本故作是詩觀此則鄭棄其師可知矣或曰髙克進不以禮曷不書其出奔以貶克為人臣之戒而獨咎鄭伯何也曰人君擅一國之名寵殺生予奪惟我所制爾使克不臣之罪已著案而誅之可也情狀未明黜而逺之可也愛惜其才以禮馭之可也烏有假以兵權委諸境上坐視其失伍離散而莫之恤乎然則棄師者鄭伯乃以國稱何也二三執政股肱心膂休戚之所同也不能進謀於君協志同力黜逐小人而國事至此是謂危而不持顚而不扶則將焉用彼相矣書曰鄭棄其師君臣同責也集說陸氏淳曰淳聞於師曰夫人臣之義可則竭節而進否則奉身而退髙克進退違義見惡於君罪亦大矣不書其奔其意何也曰髙克見惡於君其罪易知也鄭伯惡其卿而不能退之以禮兼棄其人失君道矣故聖人異其文而深譏之蓋髙氏閌曰鄭伯以百姓之命授匪其人非棄而何人君之使臣也知其賢而使之則功必成不知其不賢而使之則事必敗夫不知其不賢而過使之至於敗事君子猶曰君不知之當自罪爾况已知其不賢而强使之不獨陷其身且棄其民乎陳氏傅良曰髙克奔陳不書不足書也是故以鄭伯克叚為義則大叔不書奔以天王出居于鄭為義則王子帶不書奔張氏洽曰宗廟社稷主之於君守之以人若與一國之人蓋一體也今以欲逺所惡之人而舉一國之衆付之度外存亡死生舉不闕其心當時如楚如狄方有狡焉啓疆之心一旦乘罅𢷬虚則鄭必束手就亡矣吳氏􅊹曰子曰以不教民戰是謂棄之古人視民如赤子故平日教之習戰一旦不得已而用之於軍旅欲其完師而歸一無所損也今鄭無戰鬬之事而使其臣將兵於外久而弗得歸致其衆潰散非棄其民而何哉使汪氏克寛曰左氏不言禦狄蓋鄭之君臣以禦狄克實無却狄之志也又曰齊人殲于遂自殲也鄭棄其師自棄也梁亡自亡也胡子髠沈子逞滅自滅也若曰非有能殲其衆非有能敗其師非有能亡其國滅其身者爾比事以觀而知春秋示人自責之意深矣附錄左傳晉侯使大子申生伐東山皋落氏里克諫曰大子奉冡祀社稷之粢盛以朝夕視君膳者也故曰冢子君行則守有守則從從曰撫軍守曰監國古之制也夫帥師專行謀誓軍旅君與國政之所圖也非大子之事也師在制命而已禀命則不威專命則不孝故君之嗣適不可以帥師君失其官帥師不威將焉用之且臣聞皋落氏將戰君其舍之公曰寡人有子未知其誰立焉不對而退見大子大子曰吾其廢乎對曰告之以臨民教之以軍旅不共是懼何故廢乎且子懼不孝無懼弗得立修己而不責人則免於難大子帥師公衣之偏衣佩之金玦狐突御戎先友為右梁餘子養御罕夷先丹木為右羊舌大夫為尉先友曰衣身之偏握兵之要在此行也子其勉之偏躬無慝兵要逺災親以無災又何患焉狐突歎曰時事之徴也衣身之章也佩衷之旗也故敬其事則命以始服其身則衣之純用其衷則佩之度今命以時卒閟其事也衣之尨服逺其躬也佩以金玦棄其衷也服以逺之時以閟之尨凉冬殺金寒玦離胡可恃也雖欲勉之狄可盡乎梁餘子養曰帥師者受命於廟受脤於社有常服矣不獲而尨命可知也死而不孝不如逃之罕夷曰尨奇無常金玦不復雖復何為君有心矣先丹木曰是服也狂夫阻之曰盡敵而反敵可盡乎雖盡敵猶有内䜛不如違之狐突欲行羊舌大夫曰不可違命不孝棄事不忠雖知其寒惡不可取子其死之大子將戰狐突諫曰不可昔辛伯諗周桓公云内寵竝后外寵二政嬖子配適大都耦國亂之本也周公弗從故及於難今亂本成矣立可必乎孝而安民子其圖之與其危身以速罪也之成風聞成季之繇乃事之而屬僖公焉故成季立僖之元年齊桓公遷邢于夷儀二年封衛於楚丘邢遷如歸衛國忘亡敬衛文公大布之衣大帛之冠務財訓農通商惠工教勸學授方任能元年革車三十乘季年乃三百乘欽定春秋傳說彚纂卷十一
