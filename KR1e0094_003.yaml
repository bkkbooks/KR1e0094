body:
  text: 欽定四庫全書欽定春秋傳説彚纂卷一集説杜氏預曰春秋者魯史記之名也記事者以事繫日以日繫月以月繫時以時繫年所以紀遠近别同異也故史之所記必表年以首事年有四時故錯舉以為所記之名也徐氏彥曰三統厯云春為陽中萬物以生秋為陰中萬物以成故名春秋又春秋説云始於春終於秋春為生物之始秋為成物之終故曰春秋而舊説云哀十四年春西狩獲麟作春秋九月書成以其春作秋成故云春秋也者非也莊七年經云星霣如雨傳云不修春秋曰雨星不及地尺而復君子修之曰星霣如雨則是孔子未修之時巳名春秋矣案孟子言春秋天子之事也蓋謂春秋本諸侯之史其時列邦僭亂名分混淆而史體乖舛夫子因而修之其名秩則一裁以武成班爵之舊其行事則一律以周公制禮之初故曰春秋天子之事者猶曰天子之史云爾説者不察而以為夫子行南面之權則近於夸矣又董仲舒述夫子之言曰我欲託之空言不若見諸行事之深切著明也蓋謂凡著書者言理則虛徴事則實故雖言理義以垂訓不如借二百餘年行事使是非得失皆著見於此爾説者以為春秋是夫子之行事非空言比亦似非本意隱公集説楊氏士勛曰魯世家隱公名息姑惠公之子周公八世孫以平王四十九年即位隱者諡也周書諡法曰隱拂不成曰隱魯雖侯爵據臣子言之故謂之公孔氏穎達曰諡法非一略舉一耳亦不知本以何行而為此諡他皆倣此左傳惠公元妃孟子孟子卒繼室以聲子生隱公宋武公生仲子仲子生而有文在其手曰為魯夫人故仲子歸於我生桓公而惠公薨是以隱公立而奉之宋杜注梁國睢陽縣今河南歸德府治商丘縣即漢睢陽故城在縣南孔疏宋國公爵譜云宋子姓周武王封紂子武庚以紹殷後武庚作亂周公伐而誅之更封微子啓為宋公魯括地志兗州曲阜縣外城即伯禽所築古魯城也曲阜縣今屬山東兗州府胡傳春秋不作於孝公惠公者東遷之始流風遺俗猶存鄭武公入為司徒善於其職則猶用賢也晉侯捍王於艱錫之秬鬯則猶有誥命也王曰其歸視爾師則諸侯猶來朝也義和之薨諡為文侯則列國猶有請也及平王在位日久不能自強於政治棄其九族葛藟有終遠兄弟之刺不撫其民周人有束薪蒲楚之譏至以天王之尊下賵諸侯之妾三綱淪九法斁矣春秋於此蓋有不得已焉爾託始乎隱不亦深切著明也哉集説孫氏復曰詩至黍離而降書至文侯之命而絶春秋乃作自隱公始也程子曰夫子之道既不行於天下於是因魯春秋立百王之大法孟子曰王者之迹熄而詩亡詩亡然後春秋作適當隱公之初故始於隱公案春秋託始隱公之説先儒大抵相同獨陳氏傅良以為不始於平王而始於桓王且謂繻葛之敗春秋所以始汪氏克寬曰若是則春秋當始於桓公不始於隱公矣已周平王四未十九年元年齊僖公祿父九年晉鄂侯郤二年曲沃莊伯鮮十一年衛桓公完十三年蔡宣公考父二十八年鄭莊公寤生二十二年曹桓公終生三十五年陳桓公鮑二十三年把武公二十九年宋穆公和七年秦文公四十四年楚武王熊通十九年公羊元年者何君之始年也胡傳春秋立文兼述作案舜典紀元日商訓稱元祀此經書元年所謂祖二帝眀三王述而不作者也正次王王次春乃立法創制裁自聖心無所述於人者非史策之舊文矣集説董氏仲舒曰一者萬物之所從始也元者辭之所謂大也謂一為元者視大始而欲正本也為人君者正心以正朝廷正朝廷以正百官正百官以正萬民正萬民以正四方四方正遠近莫不一於正而王道終矣君杜氏預曰因魯史作春秋故以魯紀年又曰凡人即位欲其體元以居正故不言一年一月也之何氏休曰元者氣之始春者四時之始王者受命始正月者政教之始即位者一國之始春秋以元之氣正天之端以天之端正王之政以王之政正諸侯之即位以諸侯之即位正境內之治諸侯不上奉王之政則不得即位故先言正月而後言即位政不由王出則不得為政故先言王而後言正月王者不承天以制號令則無法故先言春而後言王天不深正其元則不能成其化故先言元而後言春五者天人之大本也春歐陽氏修曰人君即位稱元年常事爾孔子未修秋其前固巳如此蓋記事先後遠近以歲月一二數之乃理之自然也其謂一為元亦未嘗有法蓋古人之語耳及後世曲學之士始謂孔子書元年為春秋大法遂以改元為重事自漢以後又名年以建元而正偽紛雜稱號遂多不勝其紀徐氏無黨注曰古謂歲之一月亦不云一而曰正月國語言六呂曰元間大呂周易列六爻曰初九大抵古人言數多不言一不獨謂年為元也託劉氏敞曰公羊疏謂諸侯不得改元春秋王魯故稱元非也元者始爾君之始年謂之元年猶歲之初月謂之正月非有天子諸侯之辨也説者以為變一為元元者氣也言天地由之始生夫人君即位何乃遠及天地未生之前乎朱子語類問元者始也胡文定乃訓元為仁訓仁為心得無太支離乎曰楊龜山亦嘗以此議之胡氏説經大抵有此病胡氏宏曰首年之義恐不可泥於一説諸侯奉天子正朔便是一統之義有事於天子之國必用天子之年其國史紀政必自用其年不可亂也聖人於元上見義若諸侯無元則亦不成為君矣如元亨利貞乾坤四德在他卦亦有之不可謂乾坤方得有元他卦不有也此可以釋惟王者改元之説矣案元字之義自董氏以為視大始而欲正本至何杜附益因有體元之説胡傳乃推衍至乾元坤元以為體元者人君之職調元者宰相之事又曰元即仁也仁人心也以益廣董氏之旨夫以始為元唐虞已然古之帝王義或有取而遂目為聖人之書法則鑿矣至其傳桓公元年曰元年即位之始年也自是纍數雖久而不易此前古人君記事之例春秋祖述為編年法及漢文帝惑方士之言改後元年始亂古制夫在位十有六載矣復稱元年可乎孝武又因事别建年號歷代因之或五六年或四三年或一歲再更使記注繁蕪莫之勝載夫歷世無窮而美名有盡豈記久明遠可行之法也必欲傳久當以春秋編年為正此則得之春王正月左傳元年春王周正月不書即位攝也公羊春者何歲之始也何言乎王正月大一統也公何以不言即位成公意也何成乎公之意公將平國而反之桓曷為反之桓桓幼而貴隱長而卑其為尊卑也微國人莫知隱長又賢諸大夫扳隱而立之隱於是焉而辭立則未知桓之將必得立也且如桓立則恐諸大夫之不能相幼君也故凡隱之立為桓立也穀梁雖無事必舉正月謹始也公何以不言即位成公志也焉成之言君之不取為公也君之不取為公何也將以讓桓也讓桓正乎曰不正春秋成人之美不成人之惡隱不正而成之何也將以惡桓也其惡桓何也隱將讓而桓弒之則桓惡矣桓弒而隱讓則隱善矣善則其不正焉何也春秋貴義而不貴惠信道而不信邪孝子揚父之美不揚父之惡先君之欲與桓非正也邪也雖然既勝其邪心以與隱矣已探先君之邪志而遂以與桓則是成父之惡也兄弟天倫也為子受之父為諸侯受之君已廢天倫而忘君父以行小惠曰小道也若隱者可謂輕千乘之國蹈道則未也集説孔氏穎逹曰言王正月者王者革前代馭天下必改正朔易服色以變人視聽夏以建寅之月為正殷以建丑之月為正周以建子之月為正三代異制正朔不同正是時王所建故以王字冠之言是今王之正月也王不在春上者月改則春移春非王所改故王不先春王必連月故王處春下春秋之例竟時無事乃書首月以記時此下二月有會盟之事則不得空書首月也正月無事而空書首月者以人君於始年初月必朝廟告朔因即人君之位以繼臣子之心故君之始年必書曰元年春王正月公即位史策之正法也隱公攝行君事雖不即位而亦改元朝廟與人更始異於常年之正月故史特書其事見此月公宜即位而自不即位莊閔僖元年皆書春王正月與此同也定公元年不書正月者正月定公未立即位在於六月歲首未得朝正故不書也然則定以六月即位即位乃可改元正月巳稱元年者未改之日必乘前君之年既改之後方以元年紀事及其史官定策須有一統不可半年從前半年從後故入年即稱元也受命之王必改正朔繼世之王奉而行之每歲頒於諸侯諸侯受王正朔故言春王正月王即當時之王也公羊傳曰王者孰謂謂文王也受今王之厯稱文王之正非其義也又曰公實不即位史本無可書莊閔僖不書即位義亦然也舊説賈服之徒以為四公皆實即位孔子修經乃有不書故杜詳辨之釋例曰遭喪繼位者每新年正月必改元正位故國史皆書即位於策以表之隱既繼室之子於第應立而尋父娶仲子之意委位以讓桓所以不行即位之禮也隱莊閔僖雖居君位皆有故而不修即位之禮或讓而不為或痛而不忍或亂而不得禮廢事異國史固無所書非行其禮而不書於文也陸氏淳曰啖氏云仲子非夫人桓公非嫡子是惠公虧禮而遺禍也此言古者諸侯一娶九女元妃卒則次妃攝行內事無再娶之文故云仲子非夫人也其孫氏復曰欲治其末者必端其本嚴其終者必正始元年書王所以端本也正月所以正始也其本既端其始既正然後以大中之法從而誅賞之程子曰春天時正月王正書春王正月示人君當上奉天時下承王正云爾王者所行必本於天以正天下而下之奉王政者乃所以事天也明此義則知王與天同大而人道立矣朱子曰劉質夫以春字為夫子所加但魯史本謂之春秋則似原有此字又曰文定春秋説夫子以夏時冠月以周正紀事謂如公即位依舊是十一月只是孔子改正作春正月某便不敢信據今周禮有正月有正歲則周實是元改作春正月夫子所謂行夏之時只是為他不順欲改從建寅如孟子説七八月之間旱這斷然是五六月十一月徒杠成十二月輿梁成這分明是九月十月無呂氏大圭曰春秋書無冰者三桓十四年春正月冰成元年春二月無冰襄二十八年春無冰則知春秋所書正月者蓋周之正月也所謂春者即周正月之春也又曰定元年冬十月隕霜殺菽若謂建亥之月不應尚有菽又曰事起正月則書王正月二月雖有事不復書王矣如文元年書王正月公即位二月癸亥日有食之之類是也事起二月則書王二月三月雖有事亦不復書王矣如莊四年王二月夫人享齊侯于祝丘三月紀伯姬卒之類是也若正月二月已有事而例但書時則三月雖有事亦不復書王矣如隱九年春王使南季來聘三月癸酉大雨震電之類是也惟孟仲未有事至三月而始有事則書王三月如隱七年春王三月叔姬歸于紀之類是也若人君之始年則正月不以有事無事而皆書王惟定公則否月吳氏澄曰案周改月數而詩之小雅所稱六月十四月二月雖是周時之詩而用夏正之月蓋夏正得天時之正行於民間者久故作詩者從舊俗稱之爾若書之周書禮之周官戴記所載左氏公穀三傳所述及孟子所言則皆周所改之月也程氏端學曰以理論之諸侯國史當有王字若周史則弗書之矣春秋紀事有月者書王無月而時者不書王李氏亷曰春王正月三傳皆無明文左氏以正月為建子得之矣而略於春字之義何氏以斗指東方為春得之矣而略於正月之文至穀梁則皆無論焉漢唐諸儒直以周孟春為建子之月至宋人始有三代改正朔不改時月之説故程子以書春為假天時以立義則是十一月本非春聖人虛立春字於正月之上以示行夏時之意胡氏因之但經有不書月而止書時處又誠有事與時差兩月之疑矣獨張氏用劉歆説則見於陳寵傳甚明白蓋武王改月時就改十一月為春也陳寵傳曰冬至之節陽氣始萌天以為正周以為春十二月陽氣上通地以為正殷以為春十三月陽氣已至天地已交人以為正夏以為春三微成著以通三統又案前漢律歷志周師初發以殷十一月戊子亥月後三日得周正月辛卯朔子月明日壬辰至戊午二十八日渡孟津明日己未冬至正月二十九日庚申二月朔丑月四日癸亥至牧野此與武成泰誓日月時皆合亦足以見周自武王滅商之日即改月而史就書為春也熊氏朋來曰小戴記孟獻子之言曰正月日至可以有事於上帝七月日至可以有事於祖此言冬至在周正之春正月夏至在周正之秋七月明堂位所言孟春即建子月所言季夏六月即建巳月禮記尚然况春秋乎若拘夏時周正之説則正月二月須書冬而三月乃可書春爾且如桓四年春正月公狩于郎周人用仲冬狩田此以春正月書之即建子之月書春也桓十四年春正月無冰若夏正春正則解凍矣定元年冬十月隕霜殺菽若建亥之月則隕霜不為異而亦無菽矣大抵周人以夏正並行豳詩周禮則然惟春秋魯史專主周正陽生於子即為春隂生於午即為秋以經傳日月參考可無疑矣趙氏汸曰春秋謂始年為元年歲首為春一月為正月加王於正皆從史文傳獨釋王正月者見國史所書乃時王正朔月為周月則時亦周時孔氏謂月改則春移是也昭十七年夏六月記大史曰日過分而未至當夏四月是謂孟夏梓慎曰火出於夏為三月於商為四月於周為五月皆以周人改時改月春夏秋冬之序則循周正分至啓閉之候則仍夏時左氏去聖人未遠於當時正朔豈容有差而猶或有為異論者何也如使周不改時則何必曰行夏之時使夫子果用夏變周則亦何以責諸侯之無王哉汪氏克寬曰時王之厯國史據以記事孔子作春秋以繩天下而筆削之始擅改周厯豈特無王又失事實何足以為聖人之經哉張氏以寧曰春蠢也言陽氣蠢動也子一陽之月丑二陽之月寅三陽之月故夏商周皆以為春亥六陰之月不可為春矣故行之不久也事王氏樵曰史以傳信時必與月合月必與所書之合若以夏時冠周月則時與月下所書之事常差兩月夫子所因者魯史魯史所用者周正朔無容有所增損也然則子月可為春乎曰子月為一歲之始猶子時為一日之始何不可乎案胡傳以伊訓證商不改月然漢書三統厯以太甲元年十二月乙丑朔為冬至是商之十二月乃夏之十一月商未嘗不改月也又以秦始建國書冬十月證秦不改時然漢書髙帝紀春正月顔氏注云凡月皆大初正厯後追改當時以十月為歲首即謂十月為正月又漢元年十月五星聚東井劉氏攽曰太白辰星去日率不過一兩次今十月而從歲星於東井無是理也然則五星以秦之十月聚東井耳秦之十月今七月日當在鶉尾故太白辰星得從歲星也據此足明記事之文皆是追改惟此一事失改遂以秦之十月為漢之十月耳是秦亦未嘗不改時月也周正改月並改時呂氏大圭熊氏朋來證以經傳所書李氏廉證以泰誓無可疑者顧時月俱時王所改不曰王春正月而加春於王者蓋行夏時之志寓焉矣正者王事之始春者天道之始王所為者系之以王天所為者冠之以春三正迭用惟夏得天欲王者上奉天時必以得天為正蓋春秋為尊王而作故以王法正天下春秋為萬世而作故以天道正王道也不書即位者左氏以為攝公穀以為讓而杜氏預釋之以為不行即位之禮故不書即位此定解也胡傳謂仲尼首絀隱公以明大法故削之義恐未安夫君行即位之禮則書即位不行則不書孔子安得而筆削之乎三月公及邾儀父盟于蔑父音甫凡人名地名放此蔑莫結反凡書邾公並作邾婁蔑公穀並作眛東此私盟之始邾邾杜注魯國鄒縣也今鄒縣屬山兗州府孔疏曹姓顓頊之後有六終武王封其苗裔為附庸泗蔑杜注姑蔑魯地魯國卞縣南有姑城今兗州府水縣東姑蔑故城是也左傳邾子克也未王命故不書爵公攝位而欲求好於邾故為蔑之盟公羊及者何與也會及暨皆與也曷為或言會或言及或言暨會猶最也及猶汲汲也暨猶暨暨也及我欲之暨不得已也儀父者何邾婁之君也何以名字也眛者何地期也穀梁及者何內為志焉爾儀字也父猶傅也男子之美稱也其不言邾子何也邾之上古微未爵命於周也眛地名也胡傳魯侯爵而其君稱公此臣子之詞春秋從周之文而不革者也邾者魯之附庸儀父其君之字也王朝大夫例稱字列國之命大夫例稱字諸侯之兄弟例稱字中國之附庸例稱字其常也聖人案是非定褒貶則有例當稱字或黜而書名例當稱人或進而書字其變也常者道之正變者道之中春秋大義公天下以講信修睦為事而刑牲歃血要質鬼神則非所貴也故盟有弗獲已者而汲汲欲焉惡隱公之私也集説孔氏穎達曰諸侯各有寰宇上事天子旁交鄰國天子不信諸侯諸侯自不相信則盟以要之凡盟禮殺牲歃血告誓神明若有背違欲令神加殃咎使知此牲也曲禮曰約信曰誓涖牲曰盟合諸侯者必割牛耳取其血歃之以盟敦以盛血槃以盛耳將歃則戎右執其器為衆陳其載辭司盟之官乃北面讀其載書以告日月山川之神既告乃尊卑以次歃戎右傳敦血以授當歃者令含其血既歃乃坎其牲加書於上而埋之此則天子會諸侯使諸侯聚盟之禮也春秋之世不由天子之命諸侯自相與盟則大國制其言小國尸其事官雖小異禮則大同此時公求好於邾邾君來至蔑地公出與之盟史書魯事以公為主言公及言自此及彼據魯為文也桓十七年盟趡言會者彼行會禮此不行會禮故也孫氏復曰凡書盟者皆惡之也附庸之君未得列於諸侯故書字以别之劉氏敞曰盟者何殺牲載書而約也會者何約信命事而不殺也古者六歲而會十二歲而盟亟會非禮也亟盟亦非禮也左傳云曰儀父貴之也非也諸侯本不得妄盟何貴之有又曰公即位而求好於邾故為蔑之盟然則繼好息民是魯善也邾不當褒矣春秋有相與及者此是也有相次及者及其大夫孔父是也有逮及者公追齊師弗及是也者孫氏覺曰凡會盟侵伐重其為首者其事善則首之善重其事惡則首者之惡亦重是故會盟則以主會為首侵伐則以主兵為首所以輕重之也然而於內之主則可言公及某於外之主則不言某及公故聖人變其文曰及曰會也及者以內而及外因此而及彼會者以此從彼彼處某而我往會之也程子曰盟誓以結信出於人情先王所不禁也後世屢盟而不信則罪也諸侯交相盟誓亂世之事也凡盟內為主稱及外為主稱會在魯地雖外為主亦稱及彼來而及之也兩國以上則稱會彼盟而往會之也邾子克字儀父附庸之君稱字同王臣也掌葉氏夢得曰諸侯有不協請於天子而後盟司盟之諸侯不得擅相盟凡盟之志皆惡也不日闕文也記史者以事繫日以日繫月史之常也有不可以盡得則有時而闕焉公胡氏寧曰凡稱公者有定名有虛位天子三公稱王者之後稱公此定名也魯侯稱公其子稱公子其孫稱公孫諸伯子男亦皆稱公此虛位也定名辨等列之實虛位達臣下之情定名禮之質虛位禮之文宋本公爵自餘僭稱公者皆貶從本爵而魯獨不降稱何也蓋春秋魯史也仲尼於魯事有君臣之義故內外異辭邦君之薨雖齊晉大國皆書卒以其不命於天王而私自立正其名也及其既葬雖邾薛小邦皆稱公以其不請於天王而私自諡著其僭也陳氏傅良曰特相盟也特相會盟不書惟內悉書之而汪氏克寬曰聘禮大射儀燕禮五等諸侯皆稱公公食大夫禮又以名篇則謂君為公周之制也黎氏以儀父為名且謂字必取於名儀父無取於克然周有王子克楚有鬭克皆以子儀為字則儀父為字可知而鄭氏玉曰元年為蔑之盟七年為伐邾之舉比事觀善惡著矣李氏亷曰邾為附庸左氏穀梁皆同但二家皆以附庸例稱名為例故或以為貴之或以為美稱不知首開私盟之端何美之有及字之義三家皆同然但知豫儀父而不知罪公故疏公羊者遂以為善其慕新王之義愈失之矣胡氏發附庸稱字之例則儀父非褒辭而與蕭叔例合以及字罪公蓋用杜預即位求好之説豈非隱公之立上不請命內不承國亦待兹盟以自安耶案附庸比於天子元士應稱字左氏謂未王命故不書爵其説為長附録左傳夏四月費伯帥師城郎不書非公命也費魯大夫費庈父之食邑讀如字與季氏費邑讀曰祕者有别魏武封費亭侯即此今魚臺縣西南有費亭今郎杜注魯邑髙平方與縣東南有郁郎亭山東兗州府魚臺縣東北有郎城夏五月鄭伯克段于鄢鄢音偃朱鄭杜注在滎陽宛陵縣西南子詩傳鄭本在西都畿內咸林之地武公得虢鄶之地乃徙其封而施舊號於新邑是為新鄭今新鄭縣屬河南開封府其東北有宛陵城即古宛陵縣也孔疏鄭國伯爵譜云姬姓周厲王子宣王母弟友之後也宣王封友於鄭鄢杜注潁川鄢陵縣今屬河南開封府左傳初鄭武公娶於申曰武薑生莊公及共叔段莊公寤生驚薑氏故名曰寤生遂惡之愛共叔段欲立之亟請於武公公弗許及莊公即位為之請制公曰制巖邑也虢叔死焉他邑惟命請京使居之謂之京城大叔祭仲曰都城過百雉國之害也先王之制大都不過參國之一中五之一小九之一今京不度非制也君將不堪公曰薑氏欲之焉辟害對曰薑氏何厭之有不如早為之所無使滋蔓蔓難圖也蔓草猶不可除況君之寵弟乎公曰多行不義必自斃子姑待之既而大叔命西鄙北鄙二於己公子呂曰國不堪二君將若之何欲與大叔臣請事之若弗與則請除之無生民心公曰無庸將自及大叔又收二以為己邑至於廩延子封曰可矣厚將得衆公曰不義不昵厚將崩太叔完聚繕甲兵具卒乘將襲鄭夫人將啓之公聞其期曰可矣命子封帥車二百乘以伐京京叛大叔段段入于鄢公伐諸鄢五月辛丑大叔出奔共書曰鄭伯克段于鄢段不弟故不言弟如二君故曰克稱鄭伯譏失教也謂之鄭志不言出奔難之也遂置薑氏於城潁而誓之曰不及黃泉無相見也既而悔之潁考叔為潁谷封人聞之有獻於公公賜之食食舍肉公問之對曰小人有母皆嘗小人之食矣未嘗君之羹請以遺之公曰爾有母遺繄我獨無潁考叔曰敢問何謂也公語之故且告之悔對曰君何患焉若闕地及泉隧而相見其誰曰不然公從之公入而賦大隧之中其樂也融融薑出而賦大隧之外其樂也泄泄遂為母子如初君子曰潁考叔純孝也愛其母施及莊公詩曰孝子不匱永錫爾類其是之謂乎申杜注申國南陽宛縣今河南南陽府南陽縣北有故申城共杜注共國汲郡共縣今河南衛輝府輝縣治縣制杜注鄭邑河南成臯縣也一名虎牢今汜水西有虎牢城虢杜注虢國滎陽縣此為東虢國虢叔所封後並於鄭有故城在今河南開封府汜水縣東十里近滎陽界京杜注鄭邑滎陽京縣今開封府滎陽縣東南二十里有京縣故城祭杜注陳留長垣縣東北有祭城括地志謂故祭城在管城東北十五里即祭仲邑路史以管城之祭為周祭伯采地或疑鄭并祭以封仲考隱元年祭公來桓八年祭公逆王后于紀莊二十三年祭叔來聘祭未嘗滅也鄭安得取以封仲乎蓋鄭國自有祭邑不在畿內封廩延杜注鄭邑陳留酸棗縣北有延津即今開府延津縣古酸棗城在縣北一説衛輝府汲縣有延津城蓋壤地相接也城潁杜注鄭地史記正義曰疑許州臨潁縣是今開封府臨潁縣西北十五里有臨潁故城潁谷水經注潁水出陽城陽乾山之潁谷今河南府登封縣即陽城也穀梁克者何能也何能也能殺也何以不言殺見段之有徒衆也段鄭伯弟也何以知其為弟也殺世子母弟目君以其目君知其為弟也段弟也而弗謂弟公子也而弗謂公子貶之也段失子弟之道矣賤段而甚鄭伯也何甚乎鄭伯甚鄭伯之處心積慮成於殺也于鄢遠也猶曰取之其母之懷中而殺之云爾甚之也然則為鄭伯者宜奈何緩追逸賊親親之道也胡傳用兵大事也必君臣合謀而後動則當稱國命公子呂為主帥則當稱將出車二百乘則當稱師三者咸無稱焉而專目鄭伯是罪之在伯也薑氏當武公存之時常欲立段矣及公既殁薑以國君嫡母主乎內段以寵弟多才居乎外國人又悅而歸之恐其終將軋已為後患也故授之大邑而不為之所縱使失道以至於亂然後以叛逆討之則國人不敢從薑氏不敢主而大叔屬籍當絶不可復居父母之邦此鄭伯之志也王政以善養人推其所為使百姓興於仁而不偷也況以惡養天倫使陷於罪因以翦之乎春秋首誅其意以正人心垂訓之義大矣集説陸氏淳曰凡君討其臣但舉國名而已不稱其君今段雖不弟乃是鄭伯養成其惡故特稱鄭伯以譏失教兵孫氏復曰克者力勝之辭鄭伯養成段惡至於用此兄不兄弟不弟也故曰鄭伯克段于鄢以交譏之此劉氏敞曰克之者何戡之也討賊者稱人以殺之殺有罪其稱鄭伯何莊公以私害公以政假人以小忍亂大謀昉乎段之亂鄭者莊公為之也左氏曰段出奔共不言出奔難之也非也若段得生奔他國則鄭伯有伐弟之惡無殺弟之惡但當云鄭伯伐段于鄢何有改伐為克哉公羊以殺謂之克大鄭伯之惡何休因云以弗克大郤缺之善知加克大鄭伯之惡非也彼弗克納者猶曰弗果納云爾非克段之比也即以弗克為善弗克葬有何善乎程子曰鄭伯失為君之道無兄弟之義故稱鄭伯而不言弟克勝也言勝見段之強使之強所以致其惡也不書奔義不繫於奔也蘇氏轍曰不稱段之奔而稱鄭伯之克何也段之亂鄭伯成之也凡諸侯之事告則書不然則否雖及滅國滅不告敗勝不告克不書於策公羊穀梁以為諸侯之事盡於春秋也而事為之説則過矣汪氏克寬曰莊公曰寡人有弟不能和協使糊其口於四方則未殺明矣又曰晉人克欒盈不書克而稱人以殺者盈有罪當殺故也茍非鄭伯之罪則當如宋辰之例書段入于鄢以叛而又書段出奔矣李氏廉曰春秋殺世子母弟直稱君者甚之也與晉侯殺世子申生宋公殺世子痤天王殺其弟佞夫同例但彼則直惡其君今段亦凶逆故上書鄭伯下去其弟以交譏之敵賀氏仲軾曰春秋之篇稱克者惟此莊段君臣非國也君討臣當言放言殺臣違君當言出言奔何以言克克者兩敵相角力勝之辭也稱兵作亂據邑叛君孰有過於宋辰者辰何以不言克宋公之力不足以制辰鄭伯之力足以制段故也秋七月天王使宰咺來歸惠公仲子之賵咺吁阮反賵撫鳯反此王室下交諸侯之始稷天王孔疏周平王也譜云周黃帝之苗裔姬姓后之後也文王受命武王克殷而有天下武王至平王凡十三王兄弟相及者一人平王是武王十一世孫也公羊宰者何官也咺者何名也惠公者何隱之考也仲子者何桓之母也何以不稱夫人桓未君也賵者何喪事有賵賵者蓋以馬以乘馬束帛車馬曰賵貨財曰賻衣被曰襚桓未君則諸侯曷為來賵之隱為桓立故以桓母之喪告於諸侯然則何言爾成公意也穀梁禮賵人之母則可賵人之妾則不可君子以其可辭受之其志不及事也賵者何也乘馬曰賵衣衾曰襚貝玉曰含錢財曰賻胡傳冢宰稱宰咺者名也王朝公卿書官大夫書字上士中士書名下士書人咺位六卿之長而名之何也仲子惠公之妾爾以天王之尊下賵諸侯之妾人道之大經拂矣天王紀法之宗也六卿紀法之守也議紀法而修諸朝廷之上則與聞其謀頒紀法而行諸邦國之間則專掌其事而承命以賵諸侯之妾故特貶而書名以見宰之非宰也或曰僖公之母成風亦莊公妾也其卒也王使榮叔歸含且賵其葬也王使召伯來會葬下賵諸侯之妾而名其宰榮召何以書字而不名也於前賵仲子則名冢宰於後葬成風王不稱天其法嚴矣集説王氏充曰左氏以仲子為未死或以二年下夫人子氏薨以子氏為仲子因以為此時仲子尚在耳天下有人未死而先歸賵者乎恐不然矣字范氏寧曰宰官咺名仲氏子宋姓也婦人以姓配明不忘本示不適同姓也桓孔氏穎達曰仲子乃惠公妾耳王使賵之者隱立為太子成桓母為夫人天王知其然故遣賵惠公因即賵之男子之有諡者人君則配王配公大夫或配子或配字皆不以字配姓婦人於法無諡故以字配姓其正法然也釋例曰婦人無外行於禮當繫夫之諡以明所屬是言婦人不合諡也繫夫諡者夫人而已衆妾不合繫夫正當以字配姓也其聲子戴媯有諡者皆越禮妄作也啖氏助曰左氏云豫凶事夫仲子而在天子寧有歸其賵乎不辨菽麥者猶不當爾劉氏敞曰左氏曰緩且子氏未薨故名非也惠公以仲子為夫人以桓公為太子事相發也今天王歸賵應曰惠公及夫人子氏之賵何故但言仲子不稱夫人乎杜云婦人無諡故以字配氏審如杜説天王則生賵人之母魯之羣臣亦生諡君夫人也周德雖衰不應生歸人賵又曰春秋於大夫莫書其官至冢宰則書之此見任之最重宰者尊稱非中士所當冒或以為士或以為氏皆非也程子曰王者奉若天道故稱天王其命曰天命其討曰天討盡此道者王道也春秋因王命以正王法稱天王以奉天命夫婦人倫之本最當先正春秋之時嫡妾僭亂聖人尤謹其名分仲子繫惠公而言故正其名不曰夫人曰惠公仲子謂惠公之仲子妾稱也以夫人禮賵人之妾亂倫之甚也然春秋之始天王之義未見故不可去天而名咺以見其不王王臣雖微不名況於宰乎微陳氏傅良曰周大夫不名爵從其爵未爵稱字必者而後名之名之者貶也何貶乎宰咺命妾母也古者諸侯不再娶再娶亦妾也於是隱將讓桓以夫人之禮喪其母而赴於京師歸賵蓋命之也其曰惠公仲子者修春秋之辭也吳氏澄曰臣之所天者君也周王為衆侯國之君侯國以王為天也羊李氏廉曰春秋有惠公仲子僖公成風左氏及公皆以為兼賵獨程氏發明惠公寵愛仲子僖公尊崇成風之説而以為惠公之仲子僖公之成風於是胡氏因之其義最精至穀梁又以仲子為惠公之母孝公之妾則大失矣為汪氏克寬曰説公羊者以宰為士或引小宰宰夫證然周官三百六十他官未嘗見經何獨於小宰而書之乎或以宰為氏引宰豫為證然宰周公宰渠伯糾豈可亦以為氏乎左傳僖九年稱宰孔使經不書宰周公而書其名則論者亦疑為士與氏矣張氏溥曰建邦六典太宰職也君不撫僕妾在禮有之咺胡不聞焉抑使之者實甚是故君臣有同惡也又曰諸侯以王為天而乘馬來贈人妾即命下士猶有辱況冢宰乎案左氏謂子氏未薨其謬不待辨矣穀梁謂仲子為惠公之母母以子氏例以成風亦合但史記年表惠公即位於平王三年至隱公元年歷四十七年而其母始薨似太久逺當以公羊説為是宰為冢宰則劉氏敞之説得之附録左傳八月紀人伐夷夷不告故不書有蜚不為災亦不書紀杜注紀國在東莞劇縣今山東青州府壽光縣東南有紀城齊乘云即劇城也孔疏世族譜紀薑姓侯爵齊滅之墨夷杜注夷國在城陽莊武縣今山東萊州府即縣西有莊武故城孔疏世本夷妘姓傳無其人不知為誰所滅九月及宋人盟于宿此參盟之始無宿杜注小國東平無鹽縣也今鹽故城在山東兗州府東平州東二十里左傳惠公之季年敗宋師于黃公立而求成焉九月及宋人盟于宿始通也黃杜注宋邑陳留外黃縣東有黃城今外黃故縣在開封府杞縣東北公羊孰及之內之微者也穀梁及者何內卑者也宋人外卑者也胡傳內稱及外稱人皆微者其地以國宿亦與焉微者盟會不志於春秋此其志者有宿國之君也凡書盟者惡之或曰周官有司盟掌盟載之法而謂凡書盟者惡之可乎曰盟以結信非先王所欲而不禁逮德下衰欲禁之而不克也春秋之時會而歃血其載果掌於司盟猶不以為善也又況私相要誓慢鬼神犯刑政以成傾危之習哉故知凡書盟者惡之也集説杜氏預曰凡盟以國地者國主亦與盟主孔氏穎逹曰會盟之地地必有主舉地者地之國亦序於其列經舉國名以為盟地者國主與在其中不復序之於列以其可知故也僖十九年會陳人蔡人楚人鄭人盟于齊傳曰陳穆公請修好於諸侯以無忘齊桓之德冬盟于齊修桓公之好也言修桓公之好齊人必與可知也是以國地者國主與盟之例也趙氏匡曰修二國之好而為盟誓非君則卿何得使微者先儒注云微者不命之卿也案例外之不命卿來魯皆書名但不言氏耳且前後盟而不言內盟者凡七推尋事迹皆是公自盟義例昭然不可或稱是公或稱是微人又曰不書公諱與大夫盟示恥也則劉氏敞曰孰及之卑者之盟不志及之者公也公曷為不言公恥與宋人盟也曷為恥與宋人盟大國之卿可以會小國之君小國之卿不可以會次國之君卑者孰謂謂下士也程子曰盟于宿魯志也公葉氏夢得曰宋人微者也及者何公也何以不書殺恥也凡公與微者盟無事而屈之則見公以示貶有為而求之則沒公以殺恥語髙氏閌曰桓宋出也隱公懼宋故與宋合朱子類問胡氏傳春秋盟誓處以為春秋皆惡之楊龜山亦嘗議之矣自今觀之豈不可因其言盟之能守與否而褒貶之乎今民泯泯棼棼罔中於信以覆詛盟之時而遽責以未施信而民信之事恐非化俗以漸之意曰不然盟詛畢竟非君子之所為故曰君子屢盟亂是用長將欲變之非去盟崇信俗不可得而善也陳氏傅良曰魯宋合也微者雖接我不書此何以書參盟之端見矣憂參盟故録其所從始也李氏廉曰地以國者宿鄧曹齊邢宋之盟若穀梁以宿為邑名又非矣禮記曰離坐離立毋往參焉故春秋以二人盟為離盟三人盟為參盟又曰魯宋之交始此而離於六年之輸平陳氏深曰不書公譏其自賤以敵微者也年卓氏爾康曰內及盟而不書君大夫者有九隱元九月宋人盟宿宋以微者來輕公故諱公莊二十二年七月齊髙傒盟防文薑方葬公喪中圖婚故諱公文二年三月晉處父盟公如晉晉人以公不朝止公令陽處父盟公恥之故諱公文十年蘇子盟女栗頃王天王也立而與諸侯盟卑甚矣夫子傷之故以與天子大夫盟諱公成三年十一月荀庚盟孫良夫盟二人至魯以國與之不必書公成十一年三月及郤犨盟襄七年十月及孫林父盟襄十五年二月及向戌盟皆此義也故皆不書公案左氏云公立而求成似謂公自盟趙氏匡劉氏敞以下皆主焉胡傳謂內外皆微者以有宿國之君故志之亦通若穀梁以宿為邑則非矣穀梁又謂卑者之盟不日夫凡盟皆日不日闕也莊九年書公及齊大夫盟不日二十二年書及髙傒盟乃日何耶附録左傳冬十月庚申改葬惠公公弗臨故不書惠公之薨也有宋師太子少葬故有闕是以改葬衛侯來會葬不見公亦不書延鄭共叔之亂公孫滑出奔衛衛人為之伐鄭取廩鄭人以王師虢師伐衛南鄙請師於邾邾子使私於公子豫豫請往公弗許遂行及邾人鄭人盟于翼不書非公命也新作南門不書亦非公命也衛杜注衛國在汲郡朝歌縣今朝歌故城在衛輝府淇縣東北孔疏衛國侯爵姬姓文王子康叔封之後也南虢杜注西虢國也𢎞農陜縣東南有虢城今河府陜州即陜縣也翼杜注邾地今在山東兗州府費縣西南冬十有二月祭伯來祭側界反國此王臣私交之始內祭杜注祭伯爵也路史周圻管城東北有古祭城今開封府東北十五里有祭伯城是也左傳祭伯來非王命也公羊祭伯者何天子之大夫也穀梁來者來朝也其弗謂朝何也寰內諸侯非有天子之命不得出會諸侯不正其外交故弗與朝也聘弓鍭矢不出竟埸束修之肉不行竟中有至尊者不二之也胡傳人臣義無私交大夫非君命不越竟經於內臣朝聘告赴皆貶而不與正其本也集説杜氏預曰祭伯諸侯為王卿士者傳曰非王命也釋其不稱使孔氏穎達曰僖二十四年傳富辰説周公封建親戚以蕃屛周而云邢茅胙祭則祭之初封畿外之國也穆王之時有祭公謀父今有祭伯蓋本封絶滅食采於王畿也莊公二十三年祭叔來聘注以為祭叔為祭公來聘魯天子內臣不得外交是祭於此時為畿內之國仍有封爵故言諸侯為王卿士也釋例曰王之公卿皆書爵祭伯凡伯是也大夫稱字南季榮叔是也元士中士稱名劉夏石尚是也下士稱人公會王人于洮是也其或稱祭公舉官而言之此其定例也此祭伯若王使來當云天王使祭伯來聘亦知天王使凡伯來聘今以自來為文明非王命而私行也王啖氏助曰公羊曰何以不稱使奔也曷為不言奔者無外故不言奔案周大夫但不言出而無不言奔之義天孫氏復曰祭伯天子卿不稱使者非天子命也非子命則奔也不言奔非奔也祭伯私來也故曰祭伯來以惡之不劉氏敞曰祭邑也伯爵也天子上大夫也又曰有可朝而不與朝祭伯來是也有不能朝而不與朝介葛盧是也又曰均寰內諸侯也蕭叔使人得言聘祭伯親之猶不言朝不程子曰祭伯畿內諸侯為王卿士來朝魯不言朝與其朝也當時諸侯不修朝覲之禮失人臣之義王所當治也祭伯為王臣不能輔王正典刑而反與之交又來朝之故不與其朝以明其罪先儒有王臣無外交之説甚非也若天下有道諸侯順軌豈有內外之限其相交好乃常禮也然委官守而遠相朝無是道也周禮所謂世相朝謂鄰國耳仍葉氏夢得曰大夫始爵以字繫氏而不名則南仲叔之類皆下大夫也字進則爵下大夫以字繫氏中大夫宜以氏繫爵則劉子單子之類皆中大夫也爵進則邑中大夫以氏繫爵上大夫宜以爵繫邑則周公召公毛伯芮伯之類皆上大夫也以是差而下之下大夫以字繫氏上士宜以氏繫名則劉夏石尚皆上士也上士以氏繫名中士宜去氏稱名則實中士也中士去氏稱名下士微矣名氏俱不足稱而稱人則王人皆下士也胡氏寧曰畿內諸侯與畿外諸侯自有等差聖人既於祭伯來朝直書曰來不與其朝以明王臣無外交之義矣外諸侯本有朝聘之禮聖人盡書其朝隨事觀之其義不一蕭叔獨書朝公者以穀非其所也杞伯姬來朝其子戒婦人不可與國事也公李氏廉曰春秋有祭伯又有祭公祭叔杜氏於祭則曰諸侯為天子三公者徐邈注穀梁又以祭叔為祭公來聘則意以祭叔為祭之大夫范氏既以叔為寰內諸侯而又以叔為名公羊疏遂以公為爵伯為字而以為一人兩無所據豈非伯者本爵公者此時入為三公而叔者祭之大夫乎案祭伯書來諸傳皆以為朝公羊獨以為奔祭伯書伯諸傳皆以為爵公羊獨以為字當以左注為是不書來朝穀梁謂不正其外交諸儒多因之程子謂諸侯不行覲禮王不能治而祭伯反與之交其持議尤正公子益師卒公羊何以不日遠也所見異辭所聞異辭所傳聞異辭集説何氏休曰卒大夫者明君當隱痛之也君敬臣則臣自重君愛臣則臣自盡公子者氏也益師者名也諸侯之子稱公子公豫之子稱公孫不趙氏匡曰外大夫卒春秋不書書內大夫吾史也書葬降於君也曰孫氏復曰益師孝公子內大夫也內大夫生死皆公子公孫與氏不以大夫目之者惡世祿也子劉氏敞曰公子曰公子公子之子曰公孫公孫之以王父字為氏公子之尊視大夫大夫三命然後氏死則卒之公子益師卒正也左氏曰公不與小斂故不書日非也公孫敖叔孫婼公孫嬰齊皆為公與小斂乎何以得書日大凡春秋所據者史也史之所記有日不日有月不月其事可以考核其日月不可必知也穀梁曰日卒正也不日卒惡也非也公孫敖仲遂季孫意如豈正者乎而皆日叔孫得臣不聞有罪而反不日皆妄也故程子曰諸侯之卿必受命於天子當時不復請命諸侯之卿皆不書官不與其為卿也稱公子以公子故使為卿也惟宋王者後得命官故獨宋卿書官卿者佐君以治國其卒國之大事故書於此見君臣之義矣或日或不日因舊史也古之史記事簡略日月或不備春秋因舊史有可損而不能益也張朱子曰內大夫卒而略外大夫是别內外之辭氏洽曰東遷以來王命不行諸侯不以天子之命為重故三命再命之制不復請於王而其強大者亦不守列國三卿之制如晉至於命六卿魯至鞍之戰亦有四卿間雖有請於王如士會以黻冕命將中軍亦非復先王之制矣此春秋所以於列國大夫自宋統承先生修其禮物得自命官者或有司馬司城之書而此外一切削之也大夫卒必書日不日史失之也史家氏鉉翁曰春秋之義內大夫卒或日或不日舊記載之有詳略而非褒貶惟公羊之説近之謂愈遠則不得其詳故有所見所聞所傳聞之異程氏端學曰古者諸侯之卿大夫受命於天子三命者氏再命者名隱桓之世猶有無駭翬挾柔溺之徒以名見者僖文以後諸侯專恣無復請命皆自賜氏此可以觀世變矣左汪氏克寬曰或日或不日文定謂恩數厚薄似據傳公子彄葬之加一等故云爾然文公而上一百一十四年書日百有七十宣公而下一百二十八年書日二百二十年數略同而日數近倍則程子謂因舊史理或然也內大夫見經者四十有七卒者三十一不書卒十有六竊疑大夫或卒或不卒亦因史舊文爾庚平王五申十年二年齊僖十年晉鄂三年衛桓十四年蔡宣二十九年鄭莊二十三年曹桓三十六年陳桓二十四年杞武三十年宋穆八年秦文四十五年楚武二十年春公會戎于潛此書會之始山戎杜注陳留濟陽縣東南有戎城今東兗州府曹縣故戎城是也當潛杜注魯地蓋近戎之地在今兗州府西南境左傳二年春公會戎于潛修惠公之好也戎請盟公辭穀梁會者外為主焉爾知者慮義者行仁者守有此三者然後可以出會會戎危公也集説何氏休曰書會者惡其虛內務恃外好也古者諸侯非朝時不得踰竟范氏寧曰凡年首月承於時時承於年文體相接春秋因書王以配之所以見上奉時承天而下統正萬國之義然春秋記事有例時者若事在時例則時而不月月繼事末則月而不書王書王必皆上承春而下屬於月文表年始事莫之先所以致恭而不黷也他皆放此惟桓有月無王以見不奉王法爾徐氏彥曰案曲禮下云諸侯相見於隙地曰會故定十四年注云古者諸侯將朝天子必先會間隙之地以此言之則會合於禮言會為惡之非朝時不得踰竟者正以春秋之會非為天子而作之孫氏復曰諸侯非有天子之事不得出會諸侯凡書會皆惡之也夏五月莒人入向向舒亮反縣此入國之始府莒國杜注城陽莒今山東青州莒州是也懷向杜注譙國龍亢縣東南有向城今江南鳯陽府遠縣西四十里有故縣村漢置向縣龍亢在其西孔疏世本莒紀姓向薑姓此傳云莒人入向以薑氏還文八年傳稱穆伯奔莒從已氏是莒己向薑見於傳也譜云莒嬴姓少昊之後世本自紀公以下為已姓不知誰賜之姓者左傳莒子娶於向向薑不安莒而歸夏莒人入向以薑氏還公羊入者何得而不居也穀梁入者內弗受也胡傳以事言之入者造其國都以義言之入者逆而不順集説孔氏穎達曰將卑師少稱人周禮萬二千五百人為軍二千五百人為師五百人為旅師者衆也雖復五軍三軍悉皆以師為名取其衆義釋例曰春秋不書軍旅一皆曰師從衆辭是其義也定四年傳曰君行師從卿行旅從君將不言帥師卿將不言帥旅以其可知故也卿行不合師從帥領一師則師將並舉言某帥師也其師少者卿自須見惟舉將名大夫爵位卑下名氏不合見經故言師不言將也若一旅之衆則例所不書大夫位卑又名不當見則謂之為人劉炫云盟會例卿則書名氏非卿則書人是將卑師少書人亦與盟會同字陸氏淳曰經中一字遍施諸例而義不同者惟人爾國而稱人衆詞也師稱人則寡詞也名爵不貴而稱人則微詞也黜其名爵而稱人則貶詞也今莒稱人當是寡詞與無駭帥師相反入孫氏復曰莒小國也入者以兵入也莒小國以兵向者隱桓之際征伐用師國無大小皆專而行之諸程子曰天下有道禮樂征伐自天子出春秋之時侯擅相侵伐興兵以侵伐人其罪著矣書莒人微者也書入入其國也侵人之境且為暴况入人之國乎陳氏傅良曰入君大夫將皆稱人君將書君自楚莊入陳始大夫將書大夫自郤缺入蔡始惟內大夫則書之家氏鉉翁曰此諸侯擅相侵伐之始也曰伐曰侵曰圍曰取曰入曰滅皆貶也所以異其名者以其用師有小大淺深竒正之不同耳凡伐人之國入其國都毁其廟祏遷其重器是之謂入春秋之所甚惡其罪下滅國一等莒子入向志在於復其去妻未必遂滅其國故春秋書入而不書滅汪氏克寬曰穀梁以向為我邑然不書伐我則非我邑也據後書公伐莒取向則向為小國而莒滅之耳無駭帥師入極駭穀作賅後同帥朔律反後放此國此大夫專兵之始極杜注附庸小今山東兗州府魚臺縣西有極亭左傳司空無駭入極費庈父勝之公羊無駭者何展無駭也穀梁入者內弗受也極國也茍焉以入人為志者人亦入之矣胡傳非王命而入人國邑逞其私意見諸侯之不臣也擅興而征討不加焉見天王之不君也據事直書義自見矣集説杜氏預曰無駭魯卿不書氏未賜族人孫氏復曰無駭公子展孫不氏未命也外莒入向內無駭帥師入極天子不能誅此周室陵遲可知也滅劉氏敞曰公羊以謂入者滅也無駭不氏者疾始也非也春秋雖為國諱然皆使其文不害實今更滅為入則是文害實也且無駭不氏亦非疾始滅也案春秋之初接近西周先王餘法猶存諸侯僭佚猶鮮故魯卿執政多再命翬挾無駭皆是也公羊見無駭不氏因謂貶也又惡貶之過例因謂入者滅也此求其義不得而強為之詞也穀梁曰入者內弗受也又曰不稱氏者滅同姓貶也案入則不得謂之滅而穀梁先既以入解之末又以滅通之此似穀梁作傳時自以入為義後竊見公羊之書以入為滅又因注焉者也程子曰古者卿皆受命於天子春秋之時諸侯自命已賜族者則書族不書族者未賜也賜族者皆命之世為卿也許氏翰曰凡大夫未爵命於天子不氏春秋之初尚謹此也無駭翬挾柔溺及宛之見隱桓莊篇是也自齊桓以後列國皆命大夫無不稱族者蓋不復請命於周也古蘇氏轍曰無駭之不氏未賜族也或曰未王命也者天子賜姓諸侯賜族楚未嘗通於周而其大夫曰屈完故氏非王命祖陳氏傅良曰入恆稱人惟內書大夫帥師呂氏謙曰內大夫之不書氏其已賜族者去之所以示義也其未賜族者書之所以紀實也無駭之不氏意者未賜族而紀其實乎何以知之以其卒而知之內大夫之生而不氐者筆削之際固各有義至於卒而不書氏者獨隱之初無駭與挾而已茍以卒而去氏為貶耶則是通春秋十二公之時自二人之外舉無可貶者也牙之謀亂遂之殺嫡意如之逐君猶皆不去其族無駭與挾初非有三人之罪何為恕彼而貶此耶是知二人之卒不書族者蓋因未賜族而紀其實也以無駭之卒而推無駭之生則不書其氏者實無氏之可書耳也張氏洽曰左氏稱司空無駭經不書官夫子削之趙氏鵬飛曰周禮一命受職再命受服三命受位此三命也大國之卿三命次國之卿再命小國之卿一命此所謂爵命也公之子稱公子公子之子稱公孫公孫之子不可稱公曾孫故以王父字為氏也公子公孫皆生則姓之受氏之常也不必命於其君惟公孫之子不可稱公曾孫故以王父字為氏私所不安焉故必請於君而君命之此命氏也未家氏鉉翁曰公羊目無駭為展無駭是時無駭實有氏及其死乃以展為氏耳齊氏履謙曰師者卒乘之通稱也若戰稱人敗稱師來稱人追稱師乞師棄師取師之類事雖不同其為卒乘之通稱則一諸程氏端學曰古者元侯之卿有軍作師以承天子侯之卿無軍教衛以聽元侯李氏廉曰無駭不書氏杜氏胡氏陳氏皆以為未賜族公羊則以為疾始滅穀梁則以為貶滅同姓以左氏隱八年賜氏之説考之則公穀為無據矣以汪氏克寬曰春秋之初大夫猶稱名而不氏僖公後大率書氏見世卿之盛也經書帥師者百有三十僖公以前書帥師者僅九皆內大夫文宣以後外大夫多書帥師定哀之間尤數數書之大夫之強又可見矣又案二傳以為滅極然滅鄟滅邿書取而極不書取則非滅也秋八月庚辰公及戎盟于唐唐杜注魯地髙平方與縣有武唐亭今在山東兗州府魚臺縣東十二里左傳戎請盟秋盟于唐復修戎好也集説杜氏預曰八月無庚辰庚辰七月九日也日月必有誤孔氏穎逹曰杜勘檢經傳上下日月制為長厯此年八月壬寅朔其月三日甲辰十五日丙辰二十七日戊辰其月無庚辰也七月壬申朔則九日有庚辰杜觀上下若月不容誤則指言日誤若日不容誤則指言月誤此則上有秋下有九月則日月俱得有誤故云日月必有誤也日家氏鉉翁曰胡氏曰書日謹之也愚謂書日不書不皆褒貶所繫九月紀履緰來逆女冬十月伯姬歸于紀緰音須履緰左作裂繻左傳九月紀裂繻來逆女卿為君逆也公羊紀履緰者何紀大夫也何以不稱使昏禮不稱主人然則曷稱稱諸父兄師友宋公使公孫壽來納幣則其稱主人何辭窮也辭窮者何無母也然則紀有母乎曰有有則何以不稱母母不通也女曷為或稱女或稱婦或稱夫人女在其國稱女在塗稱婦入國稱夫人伯姬者何內女也其言歸何婦人謂嫁曰歸穀梁禮婦人謂嫁曰歸反曰來歸從人者也婦人在家制於父既嫁制於夫夫死從長子婦人不專行必有從也伯姬歸于紀此其如專行之辭何也曰非專行也吾伯姬歸于紀故志之也其不言使何也逆之道微無足道焉爾集説孔氏穎達曰此書逆女傳曰卿為君逆也宣五年齊髙固來逆叔姬傳曰書曰叔姬卿自逆也是為君逆則稱女自逆則書字也釋例曰天子娶則稱逆王后卿為君逆則稱逆女其自為逆則稱所逆之字尊卑之别也此不言紀侯使裂繻而成八年經書宋公使公孫壽來納幣俱是昏禮而立文不同言昏禮不稱主人者主人謂壻也為有廉恥之心不欲自言娶婦故卿為君昏侍者必稟君母之命婦人之命不得通於鄰國若言卿輒自來非君所命故裂繻不言使也其無母者臣無所稟不得不稱君命故公孫夀言宋公使也公羊言無母者稱父兄師友宋公不稱父兄者諸侯臣其父兄故不得稱也昏禮記曰宗子無父母命之親皆沒已躬命之以宗子之尊尚不稱父兄況諸侯也其稱父兄師友謂大夫以下非宗子者耳則劉氏敞曰婦人謂嫁曰歸歸於諸侯則尊同尊同志又曰穀梁曰以國氏者為其來交接於我故進之也非也諸侯昏姻聘使相往來亦常耳何妄得進之且履緰國氏何異鄭詹而曰進之乎程子曰非命卿皆書名以君命來逆夫人也在魯故稱女內女嫁為諸侯夫人則書逆書歸明重事也來逆非卿則書歸而已見其禮之薄也先儒皆謂諸侯當親迎親迎者迎於其所館有親御授綏之禮豈有委宗廟社稷而逺適他國以逆婦者乎非惟諸侯即卿大夫而下莫不然也詩稱文王親迎于渭未嘗出疆也又曰周國自在渭傍況文王親迎之時乃為公子未為君也又曰送之者雖公子公孫非卿則不書諸陳氏傅良曰春秋之初大夫恆稱人必有好事於侯則書其大夫巳命字之未命名之各從其稱無譏焉爾內女為夫人凡八見於經未有來逆者書逆紀伯姬吾女遭人倫之變者也伯姬喪在殯紀侯失國齊人葬之魯問不及焉故詳之也又曰內女為夫人恆書歸不書歸者必有故也是故齊子叔姬不書歸郯伯姬不書歸杞叔姬不書歸以為嘗失位也非有故也而不書歸者非君夫人也張氏洽曰履緰紀未賜族之大夫也案劉夏祭公及凡逆女者皆不書使蓋雖天子諸侯亦不自主昏所以養廉遠恥故不稱使也女在國故稱女春秋於昏姻事與卒葬同皆詳書於策蓋送終與謹始一也男女之配萬事之先天子諸侯無出疆親迎之禮必使上卿往迎於其國至於所館然後親迎以入此哀公問所謂大昏既至冕而親迎也紀以卿逆猶可言也其或逆者微則輕配耦而無以正一國之夫婦故具書以見得失呂氏大圭曰內女未有言來逆者此何以書曰春秋之紀事有故則書以重書以變書內女未有書納幣者而宋公使公孫夀來納幣則書之以事之重而書也內女未有言來逆者而紀裂繻來逆女則書之以禮之變而書也男女夫婦人道之大也是以聖人謹焉是故內女之見於經者不一矣然皆有故而書齊子叔姬郯伯姬把叔姬不書歸而來歸則書志吾女遭人倫之變也內女為夫人者八見於經非是不書而莒慶來逆叔姬齊髙固來逆子叔姬則書志大夫之越境逆女而公為之主也至於紀伯姬叔姬宋共姬尤詳焉此可以見書法矣謙俞氏皋曰履緰大夫名也再命例書名齊氏履曰卿為若逆則稱女自為逆則稱字母為子逆則稱婦女者從父母所稱之辭字者兄弟辭婦者對姑之辭又曰經書內女適於諸侯及其大夫者凡十有二各以書法别之書歸者五而書卒者四紀伯姬紀叔姬鄫季姬宋伯姬也書歸不書卒者一杞伯姬也不書卒者文闕也不書歸與卒者郯伯姬齊子叔姬也二女者皆見出者也杞叔姬亦見出而書卒歸其喪也皆諸侯夫人也書逆不書歸者二叔姬也子叔姬也皆大夫妻也大夫自為逆者也直書卒者二伯姬也子叔姬也魯女之不嫁者也特卒之也程氏端學曰伯姬隱公姊妹也伯字姬姓葉氏曰以姓繫氏婦人之通稱逆稱女别婦也歸稱伯姬别異姓也紀子伯莒子盟于密伯左作帛城此外相盟之始有密杜注莒邑陽淳于縣東北密鄉今山東萊州府昌邑縣東南十五里有密鄉故城公羊紀子伯者何無聞焉爾胡傳凡闕文有斷以大義削之而非闕者有本據舊史因之而不能益者亦有先儒傳授承誤而不敢增者如賵葬成風王不書天吳楚之君卒不書葬之類皆斷以大義削之而非闕也甲戌己丑夏五紀子伯莒子盟于密之類或曰本據舊史因之而不能益者也或曰先儒傳授承誤而不敢增者也闕疑而慎言其餘可矣必曲為之説則鑿矣集説啖氏助曰穀梁云紀子伯莒子而與之盟此闕文耳云伯之穿鑿甚矣左氏云魯故也以子帛為履緰字故附會耳附程子曰闕文也當云紀侯某伯莒子盟于密左氏會作帛杜預以為裂繻之字春秋無大夫在諸侯上者公羊穀梁皆作伯內家氏鉉翁曰于蔑內盟之始也于密外盟之始也外盟必書志東遷諸侯無所統一自相為盟也吳氏澄曰子伯二字或是侯字之誤十有二月乙卯夫人子氏薨穀梁夫人薨不地夫人者隱之妻也卒而不書葬夫人之義從君者也胡傳夫人子氏者隱之妻也卒而不書葬夫人之義從君者也邦君之妻國人稱之曰小君卒則書薨以明齊也先卒則不書葬以明順也有夫婦然後有父子有父子然後有君臣夫婦人倫之本也入春秋之始於子氏書薨不書葬明示大倫茍知其義則夫夫婦婦而家道正矣集説范氏寧曰夫人薨例日曰薨從夫稱薨不地無出竟之事薨有常處楊氏士勛曰左氏以子氏為桓公之母公羊以為隱公之母穀梁知是隱公之妻者以隱推讓據其為君而亦稱公故其妻亦稱夫人也夫既不葬故其妻亦不葬而左氏桓未為君其母稱夫人是亂嫡庶也公羊以為隱母則隱見為君何以不書葬若以讓不書葬何為書夫人故穀梁子以為隱妻也孫氏復曰隱公夫人也夫人小君與君一體故志之也子宋姓夫劉氏敞曰左氏曰桓母也審如是桓未君其母稱人是仲子稱夫人久矣桓公為太子必矣杜氏何以云隱當嗣立追成父志以立桓耶眀杜氏誤解傳傳又誤解經也又曰公羊以謂隱之母此公羊以妾母得稱夫人故謂隱母為夫人也然妾母實不得稱夫人當此之時禮法尚少存惠公仲子是也而隱公又賢豈其違禮私貴其母哉程子曰隱公夫人也薨上墜之聲諸侯國內稱之小君同婦人從夫者也公在故不書葬於此見夫婦之義矣吕氏大圭曰夫人子氏杜氏曰桓母也公羊曰隱母也穀梁曰隱妻也宜孰從曰隱桓之母俱不得為夫人也則其為隱之妻者近是隱桓之母不得為夫人則嫡庶之義明矣隱之妻為夫人則君臣之分定矣曰春秋蓋有以妾母稱夫人者矣曰此禮之末失也作俑者其僖公乎僖公致厚於妾母而薨稱夫人則嫡庶亂矣葬稱小君於是有二夫人祔廟則亂倫易理無復辨矣自是而後習以為常以妾媵為夫人徒欲尊寵其所愛而不虞卑其身以妾母為夫人徒欲尊貴其所生而不虞賤其父卑其身則失位賤其父則忘本禮庶子為君為其母無服不敢二尊也凶汪氏克寬曰左傳以子氏為仲子謂元年歸賵豫事安有其人未死而歸賵雖五尺童子固知其不可也杜預謂隱讓桓為太子成其母喪以赴於諸侯審如此則考宫當加諡號矣公羊又以為隱之母然孟子既為夫人則聲子仲子均非正嫡聲子安可僭小君之號成風敬嬴所以稱夫人以僖宣二公越禮以尊其妾母隱公若果尊其母為夫人則當葬以小君之禮而書於經矣今考魯夫人見經者八文薑哀薑聲薑穆薑齊薑書薨書葬子氏以隱公在不書葬出薑歸齊亦不書薨孟子以同姓諱而略之妾母見經者六仲子之卒在春秋之前成風敬嬴定姒齊歸皆書薨書葬稱夫人稱小君與正嫡無異仲子不稱夫人不稱小君猶未至如中葉以後失禮之甚也惟定十五年姒氏卒以哀公未即位故不成小君之禮耳憲湛氏若水曰書夫人子氏薨謹正終也黃氏正曰春秋隱稱公則其妃必稱夫人豈成隱之為君而不成其妃為夫人乎案子氏薨三傳互異左氏以為桓母固非矣公羊以為隱母先儒謂妾母不當稱夫人春秋之初禮法尚存不得以成風敬嬴為比惟穀梁以為隱妻義為長故程子及胡傳皆從之鄭人伐衛此諸侯專征伐之始左傳鄭人伐衛討公孫滑之亂也胡傳凡兵聲罪致討曰伐潛師掠境曰侵兩兵相接曰戰繯其城邑曰圍造其國都曰入徙其朝市曰遷毁其宗廟社稷曰滅詭道而勝之曰敗悉虜而俘之曰取輕行而掩之曰襲已去而躡之曰追聚兵而守之曰戍以弱假強而能左右之曰以皆志其事實以明輕重內兵書敗曰戰書滅曰取特婉其辭為君隱也征伐天子之大權今鄭無王命雖有言可執亦王法所禁況於修怨乎集説陸氏淳曰成公以前侵伐稱人者多不必盡是君命之卿蓋遠事難詳從舊史書人耳又凡師稱罪致討曰伐出孫氏復曰孔子曰天下有道則禮樂征伐自天子非諸侯可得專也諸侯專之猶曰不可況大夫乎吾觀隱桓之際諸侯無大小皆專而行之宣成而下大夫無內外皆專而行之其無王也甚矣孔子從而録之正以王法凡侵伐圍入取滅皆誅罪也鄭人微者孫氏覺曰孟子曰春秋無義戰故侵伐圍入一切書之以見罪焉春秋書伐二百一十三程子曰聲其罪曰伐衛服故不戰衛服可免矣鄭之擅興戎王法所不容也氏朱子曰書伐國惡諸侯之擅興趙氏鵬飛曰左曰討公孫滑之亂也鄭有兄弟之隙衛因其餘孽加兵於鄭蓋亦交亂鄰國矣然聖人書鄭人伐衛若責鄭之深者何哉鄭莊克其弟而不字其子使栖栖然僑纍於衛而又加兵於衛焉不書君將不書師不書帥師斥而人之貶鄭之辭著矣諸家氏鉉翁曰此春秋書伐之始征伐天子之事而侯專之罪也然有早歲之爭伐齊霸未興以前是也有晚歲之爭伐晉霸既衰以後是也惟中歲有奉王命而討不庭者齊晉二霸之師是也春秋與之以霸討褒貶隨事而見嗣汪氏克寬曰滑共叔子鄭莊志於殺段又欲絶其而夷之去年以王師虢師伐衛南鄙又請師於邾今再伐衛窮兵黷武遷怒復怨不貶絶而罪自見矣趙氏汸曰征伐稱人者三十五稱師者十四皆文以前之事文以前征伐自諸侯出則雖卿將稱人與將卑師少者同雖卿帥重師但稱師與將卑師衆者同蓋征伐之權在諸侯大夫奉命以行得失在其君而大夫之尊卑不足辨也欽定春秋傳説彚纂卷一
