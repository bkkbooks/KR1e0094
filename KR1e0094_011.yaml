body:
  text: 欽定四庫全書欽定春秋傳説彚纂卷九壬僖王寅三年十有五年齊桓七年晉緡二十六年衛惠二十一年蔡哀十六年鄭厲二十二年曹莊二十三年陳宣十四年杞共二年宋桓三年秦武十九年楚文十一年春齊侯宋公陳侯衛侯鄭伯會于鄄左傳春復會焉齊始伯也榖梁復同會也集説杜氏預曰陳國小每盟會皆在衛下齊桓始伯楚亦始強陳介於二大國而為三恪故齊桓自此年進之以在衛上遂終於春秋發楊氏士勛曰重發傳者諸侯至此方信齊桓故更之也許氏翰曰十三年十四年會至是又會三合諸侯而不盟以示重慎是以盟則衆信莫敢渝也呂氏祖謙曰莊九年齊桓公自莒入齊十五年始伯鄉者説左傳須分三節看五伯未興以前是一節五伯迭興之際是一節五伯既衰之後是一節五伯桓公為盛則桓公之有大功於天下固可知也然看得桓公之有大功又須看得他有可憾者當王綱解紐國自為政強者凌弱衆者暴寡當時之人思大國之正已如褰裳之詩此時得桓公出來總集天下之勢整頓天下之事豈非有大功於當世然所謂猶有可憾者蓋五伯未出先王之遺風餘澤天下之人猶有可見者伯主一出則天下之人見伯者之功無復見先王之澤矣張氏洽曰傳以為齊桓始白蓋指諸侯始定而言然魯未信服而自是之後宋人猶或主兵衛鄭未免復叛蓋齊之伯業駸駸向定而諸侯之心猶未一也喪汪氏克寬曰是後惟召陵侵楚陳序衛下蓋陳在稱子故也案齊先於宋左氏謂齊始伯也劉氏敞駁之以為齊桓之伯當自十六年盟幽始不知鄄之會伯之始也幽之盟伯之成也張氏洽之説於情事為近夏夫人薑氏如齊榖梁婦人既嫁不踰竟踰竟非禮也集説孫氏復曰齊侯既死文薑不安於魯故如齊之孫氏覺曰薑氏但歸寧爾然經書之與齊襄事等者蓋婦人以夫家為歸一適其夫則終身不返父母殁雖兄弟不往所以預為之嫌而防逆亂之將萌也齊桓雖無齊襄之事蓋非禮之迹同也薑氏之惡不可勝誅矣然為齊桓者不得無罪蘇氏轍曰禮夫人父母在則歸寧殁則使大夫歸寧兄弟文薑之於齊桓兄弟也親行非禮也許氏翰曰鄄之再會魯尚未從桓公未能比近無以示逺務求合於魯是以受文薑以昭親親而齊魯之交卒合然而禮防一失夫人復啓越境之恣遂成如莒之姦欲張氏洽曰文薑不如齊八年矣至此復如齊桓公求魯好以定伯業而不之拒也文薑播惡於襄公之世桓公絶之義也以欲求魯之故而不鑒覆車之轍豈未聞行一不義雖得天下不為之法乎春秋特書以纍桓也張氏溥曰宗國魯為大王者之後宋為大齊不得宋魯伯必不成再會鄄齊宋合矣魯於齊北杏不至盟柯則平矣十四年伐宋會鄄僅使單伯公不親至十五年鄄之會魯無人焉桓知魯君臣尚未協也薑氏如齊而後同盟于幽齊魯之讎始於淫人其交之合亦以淫人春秋無暇責魯莊且以纍齊桓矣秋宋人齊人邾人伐郳郳公作兒左傳諸侯為宋伐郳胡傳伯者之先諸侯專征也非伯者而先諸侯主兵也集説杜氏預曰郳附庸屬宋而叛故齊桓為之伐郳范氏寧曰宋主兵故序齊上也班序上下以國大小為次征伐則以主兵為先春秋之常也伐劉氏敞曰宋序齊上何主兵者也又曰諸侯之相則必推主兵者上之是以宋先序之趙氏鵬飛曰郳叛宋而宋伐之連齊人者脅伯主命也郳者邾之所自出懼其叛而入於邾也故同邾人伐之國汪氏克寬曰石氏謂郳有二郳黎來乃小邾國三伐郳乃宋之附庸今考伐郳而後經不書郳惟書小邾城成周之役經書小邾人而宋仲幾曰郳吾役也昭二十年傳稱郳申杜氏云小邾穆公子必有所據則郳為小邾明矣案郳之役宋實主兵故齊序宋下伐鄭伐徐亦同胡傳謂二十七年盟幽然後成伯則三十二年梁丘之遇宋先於齊亦將疑齊未成伯耶鄭人侵宋左傳鄭人間之而侵宋胡傳侵伐之義三傳不同左氏曰有鐘鼓曰伐無鐘鼓曰侵先儒或非其説以為聲罪致討曰伐無名行師曰侵未有以易之者也然考五經皆稱侵伐在易謙之六五曰利用侵伐征不服也書之泰誓曰我武維揚侵于之疆詩之皇矣曰依其在京侵自阮疆周官大司馬以九伐之法正邦國而曰賊賢害民則伐之負固不服則侵之而以為無名行師可乎然則或曰侵或曰伐何也聲罪致討曰伐潛師掠境曰侵聲罪者鳴鐘擊鼓整衆而行兵法所謂正也潛師者銜枚臥鼓出人不意兵法所謂竒也集説鄭氏康成曰伐者兵入其境侵者加兵其境而已陳氏傅良曰據左氏説則齊侯侵蔡晉侯侵楚皆用大師而總數國若無鐘鼓何以行師則左氏之例非矣公羊曰粗者曰侵精者曰伐以謂深者為精淺者為粗前後有侵師至破其國伐師不深者頗多則公羊之例又非矣榖梁云苞人民毆牛馬曰侵斬樹木壞宮室曰伐齊桓伐楚不戰而服無壞宮室伐樹木之事又豈二百四十二年行師悉皆如此暴亂乎則知榖梁亦非也二張氏洽曰間諸侯伐郳而侵宋不誠於服齊而背鄄之會鄭之反覆於齊楚之間蓋始於此之黃氏震曰郳叛宋故齊為宋伐郳鄭以宋舊怨間故反侵宋是背齊盟也故明年宋齊衛伐鄭鄭突處櫟者二十年一旦得志遽興修怨之師猶未知世有伯主也汪氏克寬曰侵伐二字必皆當時行師之名其義之是非繫乎事之得失不以是為褒貶也然有當書伐而書侵當書侵而書伐者春秋之變例也冬十月癸僖王卯四年十有六年齊桓八年晉緡二十七年武公稱三十八年衛惠二十二年蔡哀十七年鄭厲二十三年曹莊二十四年陳宣十五年把共三年宋桓四年秦武二十年楚文十二年春王正月夏宋人齊人衛人伐鄭南北爭鄭於是始左傳諸侯伐鄭宋故也集説孔氏穎逹曰往年齊桓始霸未敢即尸其任救患討罪今為宋伐鄭仍使宋自報怨故宋主兵序於齊上也隱五年邾人鄭人伐宋附庸在伯爵之上是以主兵為先也孫氏復曰鄭背鄄之會侵宋故齊桓帥諸侯伐之齊序宋下與伐郳同之張氏洽曰伐鄭不止為宋而已蓋鄭不服則諸侯心未一也惡家氏鉉翁曰鄭突以庶篡嫡齊桓始霸當聲突舊請於王以正其罪宣示逺近以警羣聽今為宋而伐鄭非名也皆汪氏克寬曰此伐鄭與二十六年伐徐以齊序宋下宋主兵也秋荆伐鄭左傳鄭伯自櫟入緩告於楚秋楚伐鄭及櫟為不禮故也集説王氏葆曰齊方圖霸楚亦浸強北侵不已陳蔡鄭許適當其衝鄭之要害尤在所先故鄭者齊楚必爭之地也餘張氏洽曰自桓二年鄭已懼楚而會鄧至此三十年而後受兵楚之威不輕用蓋如此雖趙氏鵬飛曰楚十四年入蔡十六年伐鄭齊桓公患之力未能制也李氏廉曰鄭桓始寄帑於虢鄫得十邑而國之前華後渭左洛右濟主瞥騩而食溱洧實春秋要領之國而南北之樞紐也故楚禍及鄭始此而終春秋為霸主之輕重焉又曰經書荆伐鄭二始此年楚人伐鄭四始僖元年書楚子伐鄭五始宣四年書大夫伐鄭四始成六年楚會諸侯伐鄭二始襄二十四年附録左傳鄭伯治與於雍糾之亂者九月殺公子閼刖強鉏公父定叔出奔衛三年而復之曰不可使共叔無後於鄭使以十月入曰良月也就盈數焉君子謂強鉏不能衛其足冬十有二月會齊侯宋公陳侯衛侯鄭伯許男滑伯滕子同盟于幽公作公會許男下公榖有曹伯府滑杜注滑國河南緱氏縣今河南開封偃師縣南二十里有緱氏故城古滑國也縣幽杜注宋地當在今河南歸德府考城境左傳冬同盟于幽鄭成也公羊同盟者何同欲也榖梁同者有同也同尊周也胡傳會者公也不書公諱也其諱公何也程氏曰齊桓始霸伏義以盟而魯首叛盟故諱不稱公惡失信也其曰同盟何也程氏曰上無明王下無方伯列國交爭桓公始霸天下與之故書同盟志同欲也自古皆有死民無信不立故聖人以信易食答子貢之問君子以信易生重桓王之失春秋之諱公與是盟也豈不以信之重於生與食乎先儒或以為不書公者諱與讎盟誤矣果以桓為讎而諱與盟者曷不於柯之盟諱之也集説何氏休曰同心欲盟也同心為善善必成同心為惡惡必成故重而言同盟也杜氏預曰書會魯會之也言同盟服異也不孔氏頴達曰嘗同盟而異乃稱服異未嘗同盟則為服異故盟不稱同也僖二年齊侯宋公江人黃人盟于貫定四年公及諸侯盟于皋鼬二盟並不稱同皆為未嘗同盟非服異故不稱同也應稱同而不稱同者僖五年首止之盟鄭伯逃歸七年盟于寧母鄭伯使子華聽命於會而不稱同者鄭未服也八年盟于洮鄭伯乞盟而不稱同者鄭伯未列於會也文十五年夏晉郤缺帥師伐蔡戊申入蔡其冬諸侯盟于扈不稱同者蔡已先服也宣十二年同盟于清丘十七年同盟于斷道成九年同盟于蒲十五年同盟于戚十七年同盟于柯陵十八年同盟于虛朾此六盟皆非服異稱同盟者清丘斷道與蒲於時諸侯已有二心同心討二故稱同盟戚與虛朾同心疾惡故稱同盟柯陵之盟鄭人不服欲令諸侯同心伐鄭故稱同盟猶襄十八年諸侯同心疾齊稱同圍齊也趙氏匡曰榖梁云不言公外內竂一疑之也案莊公與齊襄往來未嘗有阻豈於桓公更有疑哉此直夫子定貶責之旨何關內外竂也也陸氏淳曰淳聞於師曰會公會也不書公為公諱桓之霸諸侯服之矣不從之則社稷危矣故不書公為公諱此與及齊髙徯晉處父盟不書公義同陳氏嶽曰凡空書會某侯是公自會也諸侯皆序非微者明矣不蘇氏轍曰盟未有不同者也此其曰同盟何也有同者服也於是鄭始聽命陳氏傅良曰盟未有言同者於是言同盟以齊桓之初主盟也夫主盟者舉天下而聽於一邦也王者不作舉天下而聽於一邦古未之有也序薛氏季宣曰許男何以先乎曹滑大也非禮班之也桓公倡霸而亂周班之序非長諸侯之道也諸吳氏􅊹曰齊自北杏以後屢合諸侯有會無盟者侯之心未一也至此而鄭服始合九國之君而為此盟此桓公糾合諸侯一匡天下之始李氏廉曰胡氏有二例有諸侯同欲而稱同者有惡其反覆而稱同者除于蒲亳城北惡其反覆外其餘皆可入同欲之例矣榖梁有二例曰同尊周也同外楚也除二幽為尊周外其餘皆可入外楚之例矣但不可以同欲為皆美故二幽馬陵于戚雞澤雖可褒而清丘斷道蟲牢亦書同新城虛朾于戲雖無貶而重丘平丘亦書同要之皆有通處當參考為是劉氏以同盟為殷同之盟同盟之禮見於覲禮為壇祀方明方伯臨之桓非受命之伯假同盟之禮率諸侯以尊天子蓋自是始伯也亦是一説汪氏克寬曰同盟之義論者不同然皆不出於公羊之説杜預言服異蓋以左氏于幽之盟一則曰鄭成一則曰陳鄭服于新城曰從于楚者服于蟲牢于戲曰鄭服也于馬陵曰且莒服故也于雞澤曰晉為鄭服故合諸侯于重丘平丘曰齊成曰齊服也推是論之則清丘斷道之討二于蒲以諸侯之二皆所以服異于戚則鄭伯聽成而鄭已服柯陵亳北伐鄭而同盟則鄭服可知虛朾則悼公初立而諸侯新服也是則因服異而言同盟也榖梁於二幽之盟皆曰同尊周于新城斷道雞澤平丘皆曰同外楚齊桓初霸直取同尊周而已晉伯十有四盟皆為外楚新城發傳著其始平丘發傳著其終斷道雞澤舉上下以包其餘也文定以諸侯同欲而書同又以惡其反覆而書同二幽新城清丘斷道皆云同欲馬陵云同病楚柯陵雞澤平丘云同懼楚皆同欲也以例推之于戚同欲討曹虛朾同欲救宋也于蒲罪其失信而尋盟亳北惡其既同而又叛皆惡其反覆而書同者也以例推之于戲亦既同而又叛也蟲牢惡其皆不臣重丘惡其受賂而不討賊何休所謂同心為惡惡必成者也榖梁云尊周外楚即所謂同心為善善必成者也惡其反覆而書同謂其既同而復異也杜預言服異謂其昔異而今同也愚故謂論者不同皆不出於公羊同欲之説也若夫劉原父引殷見曰同謂設方明如方嶽之盟故書同然襄九年楚公子罷戎與鄭人同盟于中分昭十九年邾人郳人徐人會宋公同盟于蟲豈亦能設方明而用殷同之禮乎斷齊氏履謙曰經書同盟者十有六幽幽新城清丘道蟲牢馬陵蒲戚柯陵虛朾雞澤戲亳城北重丘平丘其載辭若曰同救災患同恤禍亂同奬王室同討不服皆天下之辭所謂公言之也其不書同者若垂隴若澶淵若祝柯若湨梁若皋鼬或以復讎或以平怨或專自大夫或志在黷貨或宋楚主盟或兩國特相盟或侯伯不與盟皆一國之辭所謂私言之也亦有天下之辭公言之而不書同者首止寧母洮葵丘牡丘踐土翟泉七盟是也七盟皆桓文之盛而春秋不書同又有以見天下之一乎齊晉也故以十六盟視一時之不同者則同盟為愈以七盟視他年之同盟者則不同為盛蓋以其有不同者然後書同以别之既曰無不同矣夫又何書同之有陳氏際泰曰桓蓋經營數十年遲遲而後取之北杏之後已伐宋矣已會鄄矣至伐郳而猶序宋下也逮同盟于幽而後八國諸侯始左提右挈推戴一人於節旄之下其時近古而其氣象幾於王者至文不然一戰而勝一戰而霸吁王風之降而為伯桓伯之降而復為文君子悲世變為已亟矣案同盟例三傳及胡傳各異汪氏克寬融會諸傳謂皆本於公羊同欲之義尤能得其要領邾子克卒榖梁其曰子進之也集説何氏休曰小國未嘗卒而卒者為慕霸者有尊天子之心行進也范氏寧曰附齊而尊周室王命進其爵曰劉氏敞曰此邾儀父也其謂之邾子克何未成國邾儀父既成國曰邾子克未成國之君卒不書葬不記也氏孫氏復曰邾稱爵者始得王命列為諸侯也俞皋曰不日缺文也不書葬不往會也年李氏廉曰王命之説三傳皆無明文然據左氏此冬王使虢公命曲沃伯以一軍為晉侯則天子猶有黜陟也附録左傳王使虢公命曲沃伯以一軍為晉侯之初晉武公伐夷執夷詭諸蒍國請而免既而弗報故子國作亂謂晉人曰與我伐夷而取其地遂以晉師伐夷殺夷詭諸周公忌父出奔虢惠王立而復之夷杜注采地名甲僖王辰五年十有七年齊桓九年晉武三十九年衛惠二十三年蔡哀十八年鄭厲二十四年曹莊二十五年陳宣十六年杞共四年宋桓五年秦德公元年楚文十三年春齊人執鄭詹詹公作瞻下同左傳鄭不朝也胡傳書齊人執詹惡齊之辭也鄭既侵宋又不朝齊詹為執政蓋用事之臣也其見執宜矣而以惡齊何也以責人之心責己則盡道以愛己之心愛人則盡仁此春秋待齊之意也集説杜氏預曰詹為鄭執政大臣詣齊見執叔孔氏穎逹曰僖七年傳曰鄭有叔詹堵叔師先言詹是詹最貴也且傳稱鄭不朝也以君不朝而詹被執明詹是執政大臣為不道君使朝故執之也若詹不至齊則無由被執知是詣齊見執蓋聘齊也者趙氏匡曰公榖皆云詹鄭之微者書甚佞也言微不當書特為佞書諸見執者豈無罪乎何獨特書此佞孫氏復曰稱人以執惡桓也詹不氏未命也桓十二月與鄭伯同盟于幽而春執鄭詹安用同盟不稱行人者會未歸而見執也不言以歸者秋鄭詹自齊逃來以歸可知也人劉氏敞曰鄭詹者何鄭大夫也執者曷為或稱行或不稱行人稱行人者執之以其所為使者也不稱行人者執之不以其所為使及非行人者也又曰公羊云書甚佞也案春秋未有微者而得書於經若詹為大夫而未命又何以别乎又曰穀梁曰人者衆辭也以人執與之辭也非也宋人執鄭祭仲邾人執鄫子亦可謂與之乎又曰鄭詹鄭之卑者卑者不志此其志何也以其逃來志之也亦非也紀履繻鄭宛之類亦同氏國豈卑者則不志乎蘇氏轍曰詹不氏未賜族也許氏翰曰宋大鄭小齊桓蓋德宋而威鄭文王之興大邦畏其力小邦懷其德而桓反之是以為伯道也至於宋襄執鄫之虐則桓不為矣之張氏洽曰詹不氏與柔溺同桓執鄭詹討鄭不朝罪當書齊侯而稱人以非伯討貶也諸侯不服不能修德以來之而執其大夫則小國之從齊皆出於力不贍而非有心悅誠服之意為可見矣無李氏廉曰鄭詹説左氏是公榖皆以詹為佞人此據之言杜氏以稱人為賤之榖梁又以稱人為與齊皆非公羊又以為魯信用詹計取齊淫女丹楹刻桷卒為後敗故甚其受佞其説出緯文謬妄不取案鄭詹之執公榖據緯書以為佞人固不可用矣左氏以為不朝杜氏注謂詣齊見執夫同盟未逾月又使大臣如齊乃遽責其不朝無乃苛乎孫氏復謂盟未歸而見執以陳轅濤塗例之情事亦合故主左傳而孫氏亦附見焉夏齊人殱于遂殱子廉反公作瀸左傳夏遂因氏頜氏工婁氏須遂氏饗齊戍醉而殺之齊人殱焉公羊瀸者何瀸積也衆殺戍者也榖梁殱者盡也然則何為不言遂人盡齊人也無遂之辭也無遂則何為言遂其猶存遂也存遂奈何曰齊人滅遂使人戍之遂之因氏飲戍者酒而殺之齊人殱焉胡傳殱盡也齊滅遂使人戍之遂之餘民飲戍者酒而殺之齊人殱焉春秋書此者見齊人滅遂恃強陵弱非伐罪弔民之師遂人書滅乃亡國之善辭上下之同力也夫以亡國餘民能殱強齊之戍則申胥一身可以存楚楚雖三户可以亡秦固有是理足為強而不義之戒而弱者亦可省身而自立矣集説何氏休曰稱人者衆辭也不書戍將帥者封內之兵故不書杜氏預曰齊人戍遂遂人討而盡殺之故以自盡為文之陸氏淳曰啖子曰殱者自殱之義也不言遂人殱言齊人自取其殱也所以譏齊而不罪遂人也也鄭棄其師自棄也孫氏復曰齊人殱于遂自殱劉氏敞曰殱者何盡也此遂人盡齊人也其曰齊人殱于遂何弗與也墟人之國殺人之君私人之土制人之衆強不義之至也力多矣非有能盡齊者也齊自盡也又曰榖梁曰此謂狎敵也非也滅人之國使兵戍之齊則無道矣令齊不滅人國不戍人地安取此禍乎榖梁譏其狎敵似惡齊人滅遂未盡戍遂未密不顧遂不可滅地不可戍也遂蘇氏轍曰春秋之書敗亡其自取者三齊人殱于梁亡王師敗績于茅戎以為其所以自處者固敗亡之道而非敵之罪人許氏翰曰齊師滅談談子奔莒著其君不詘也齊滅遂齊人殱于遂著其民不歸也孟子謂伯者以力服人非心服也力不贍也荀子謂桓公詐邾襲莒并國三十五則所滅蓋不盡書書滅談滅遂上下一見之也而張氏洽曰絶滅社稷以及其君慮其民之思舊主以兵力強制之不知彼心不服吾力稍怠必有出於意料之外者蓋王者之道貴於興滅繼絶而齊之滅遂不止於殺一不辜而已故聖人於此不言遂人殱齊戍而書其自殱所以伸遂人復讎之志而著桓公不仁以至於自殱其衆也戍家氏鉉翁曰遂之遺民鼓其餘勇猶足以殄滅齊春秋特為之書義之也吳氏􅊹曰齊桓伯事方興而以強大吞小弱滅遂而慮遂之遺民不服故遣齊之民戍守其地以無罪滅遂固己失遂人之心矣而齊之戍者或又陵蔑其舊民故遂人憤怒而盡殺之汪氏克寬曰榖梁謂無遂而存遂乃春秋存亡繼絶之意亦猶紀已滅而書紀叔姬卒葬紀叔姬存紀也陳已滅而書葬陳哀公書陳災存陳也案左榖作殱蓋盡殺之也公羊作瀸何氏休以為積死非一徐氏彥謂相瀸汙而死皆言其死之多也字雖異而義實相近榖梁逃義曰逃胡傳逃者匹夫之事詹之見執若其有罪雖死可也儻曰無罪茍見免焉請從惠於會使諸侯聞之則不辱君命矣不能以理自明也而反效匹夫之行遁逃茍免越在他國不亦賤乎特書曰逃以著其幸免而不知命之罪也齊桓始伯同盟于幽而魯首叛盟受其逋逃虧信義矣書自齊逃來又以罪魯也集説杜氏預曰詹不能伏節守死以解國患而遁逃茍免書逃以賤之言與匹夫逃竄無異陸氏淳曰凡言逃者皆謂義當留而竊去也耶劉氏敞曰何以書逃責詹之辭也詹自以為有罪雖死之可矣自以為無罪耶尚何逃之有詹恐其無罪見殺逃而茍免則是不知命也陳氏傅良曰外逃不書逃來則書之書逃來譏與之接也茍不接雖莒僕來奔宣公命與之邑季文子使司寇出諸竟則不書茍接之矣介葛盧來僖公在會饋之芻米則書去張氏洽曰執列國大夫踰歷三時不令其服罪而防間弛慢國囚亡逸齊之罪也竊身逃竄同於茍免之匹夫無大夫之行失節辱國詹之罪也為逋逃主以取伐於伯主魯之罪也襄李氏廉曰逃例三此年及僖五年鄭伯逃歸不盟七年陳侯逃歸也君臣同辭皆匹夫之事也然宣十七年髙固逃歸不書襄十六年髙厚逃歸不書則春秋不以逃義罪二子也汪氏克寬曰左傳僖七年稱鄭有叔詹為政則詹雖逃奔魯蓋不久而歸鄭矣邵氏寶曰穀梁子曰逃義曰逃詹之義何在死以立節生以待理治張氏溥曰詹逃於魯而魯納之桓自是治魯而不鄭是詹實嫁禍於魯也冬多麋公羊何以書記異也胡傳麋魯所有也多則為異以其又害稼也故書此亦禹放龍蛇周公逺犀象之意也害稼則及人矣集説何氏休曰言多者以多為異也則范氏寧曰京房易傳曰廢正作淫為火不明國多麋劉氏敞曰記異也何異爾為災也則孫氏覺曰以有為災則書有有􅈮是也以無為異書無無冰是也麋者常有之物惟其多則書之多髙氏閌曰聖人於災之中各為之辨麋書多者以為災也蜚􅈮書有者以有為災不繫多少也麋則常少以多為災不繫於有也螟螽之書不以其有不以其多但為災則書之案經書多麋或以為記災或以為記異劉氏敞兼用之陸氏佃謂隂盛所感惡氣之應則當以記異為尤正乙惠王巳元年十有八年齊桓十年晉獻公詭諸元年衛惠二十四年蔡哀十九年鄭厲二十五年曹莊二十六年陳宣十七年把共五年宋桓六年秦德二年楚文十四年春王三月日有食之集説孫氏復曰不言朔不言日日朔俱失之也闕劉氏敞曰榖梁曰不言朔夜食也非也春秋疑據見而録何以知其夜食而書乎假令日始出其虧傷之處未復者是即朔日食矣如不見其虧傷云夜食可也見其虧傷是驗其食非朔日食何也又云王者朝日諸侯朝朔尋穀梁此意似云王者朝日故日之始出而有食者得見之也案禮記天子朝日于東門之外聽朔于南門之外南門之外者謂明堂位也然則天子每朔先朝日而後聽朔諸侯每月先視朔而後朝廟乎穀梁之言以述朝日則是以解夜食則非案合朔在夜則日食地中故有夜食之説然必謂朝日而知其食則未可據也蓋既見其虧傷之處則時刻可稽其為朔日無疑若或食於亥子之交則日未出而明復何從見其虧傷之處故專取劉氏敞説而榖梁不録附録左傳春虢公晉侯朝王王饗醴命之宥皆賜玉五瑴馬三匹非禮也王命諸侯名位不同禮亦異數不以禮假人媯虢公晉侯鄭伯使原莊公逆王后於陳陳歸於京師實惠后夏公追戎于濟西左傳不言其來諱之也胡傳此未有言侵伐者而書追戎是不覺其來已去而追之也為國無武偹啓戎心而不知警危道也春秋之意其必未雨而徹桑土間暇而明政刑集説杜氏預曰戎來侵魯魯人不知去乃追之稷啖氏助曰追者寇已去而躡之也又曰去杜遠追戎危公師孫氏復曰案僖二十六年齊人侵我西鄙公追齊至于酅弗及先言侵而後言追此不言侵伐者明不覺其來已去而追之也書者譏內無戎偹劉氏敞曰公羊以為大其未至而豫禦之也非也若未至而禦何得謂之追乎此不待攻而自破者又曰穀梁曰其不言戎之伐我何也以公之追之不使戎邇於我也非也戎若不來公則無追今以戎來故得追之先言戎伐後言追戎何害乎又曰于濟西者大之也亦非也既不言戎之來又不言濟西則當但云公追戎矣未知追之於何所邪蘇氏轍曰不言戎之侵何也未及侵而追之追之而去兵未嘗交也髙氏閌曰敵勝而去則不可追追者敵之敗者也敵緩而去則不必追追者敵之奔者也先王之法從緩不及逐奔不逺逐奔不逺則難誘從緩不及則難陷故敵知畏而遁斯止矣弗追也之吳氏澄曰戎即隱桓與之盟者戎入魯境魯將禦而戎遄退故魯莊以兵逺追之而汪氏克寬曰春秋書追者二追戎濟西譏其在境不能預偹也追齊師至酅譏其出境而弗敢及之也夫既不克預修戎偹遏於未來至於戎至境內又不克隨時應變命將出師以勝敵及其已退乃輕千乘之貴躡其後而逐之何足取哉張氏溥曰公追戎于濟西左氏諱之公穀並大之胡氏危之義各不同然無偹啓戎立説足以為戒云案左氏以為諱之蓋諱其無偹也意與胡傳同若公榖大之之説則非矣劉氏敞駁之甚明秋有􅈮􅈮又作蜮音或左傳為災也公羊何以書記異也榖梁一有一亡曰有􅈮射人者也胡傳􅈮魯所無也故以有書夫以含沙射人其為物至微矣魯人察之以聞於朝魯史異之以書於策何也山隂陸佃曰􅈮陰物也麋亦陰物也是時莊公上不能防間其母下不能正其身陽淑消而陰慝長矣此惡氣之應其説是也然則簫韶作而鳳凰來儀春秋成而麟出於野何足怪乎春秋書物象之應欲人主之慎所感也集説何氏休曰言有者以有為異也工杜氏預曰􅈮短狐也含沙射人本草謂之射范氏寧曰京房易傳曰忠臣進善君不識厥咎國生􅈮曰孔氏穎逹曰榖梁傳曰􅈮射人者也洪範五行傳􅈮如鱉三足生於南越淫女惑亂之氣所生也陸璣毛詩義疏云􅈮短狐也一名射景如鱉三足在江淮水中人在岸上景見水中投人景則殺之故曰射景或謂含沙射人入皮肌其瘡如疥徐氏彥曰謂魯先無􅈮今乃有之案昭二十五年經書有鸜鵒來巢今此不書來者亂氣所生不從外來故也楊氏士勛曰舊解一有南越所生是也一亡魯國無是也今以為一有一亡曰有者謂或有有時或有無時言不常也故書曰有若螟螽之類是常有之物不言有也上十七年云多麋者魯之常獸是歲偏多故書多也螟螽不言多者螟螽是細微之物不可以數言之故不言多也又每年常有不得言有也所以異於蜚􅈮與麋也閨張氏洽曰麋者迷也􅈮者惑也是時文薑為亂於門之內其遺毒餘患至哀薑卒再成篡弒之禍物類之感天之示人顯矣蜚李氏廉曰記異書有三此年有􅈮莊二十九年有昭二十五年有鸜鵒來巢書汪氏克寬曰春秋書螟螽蝝生志蟲之害稼者也多麋有􅈮有蜚有鸜鵒來巢志物之為異者也蟲之害稼苟有蓄積以賑飢民則不為災物之異常茍能修德以消天變則不為異人為不善以致天變又不知警省而改過遷善以消悔怒則禍患之來弗能救矣或謂􅈮字以古隸較之作蟘即也食苗葉者竊疑春秋書螽螟皆不言有此書有􅈮則為異而非矣張氏溥曰鄭詹逃於魯魯信其計取齊淫女春秋説文有之不見他傳何休據以説經云多麋有􅈮皆為魯惑詹也鑿矣冬十月附録左傳初楚武王克權使鬭緡尹之以叛圍而殺之遷權於那處使閻敖尹之及文王即位與巴人伐申而驚其師巴人叛楚而伐那處取之遂門於楚閻敖遊涌而逸楚子殺之其族為亂冬巴人因之以伐楚權杜注國名南郡當陽縣東南有權城水經注沔水東會權口南流徑權城北古之權國也今屬湖廣安陸府城那處杜注楚地南郡編縣東南有那口今在安陸府荆門州東南丙惠王午二年十有九年齊桓十一年晉獻二年衛惠二十五年蔡哀二十年鄭厲二十六年曹莊二十七年陳宣十八年杞共六年宋桓七年秦宣公元年楚文十五年春王正月附録左傳春楚子禦之大敗於津還鬻拳弗納遂伐黃敗黃師於踖陵還及湫有疾夏六月庚申卒鬻拳葬諸夕室亦自殺也而葬於絰皇初鬻拳強諫楚子楚子弗從臨之以兵懼而從之鬻拳曰吾懼君以兵罪莫大焉遂自刖也楚人以為大閽謂之大伯使其後掌之君子曰鬻拳可謂愛君矣諫以自納於刑刑猶不忘納君於善津杜注楚地江陵縣有津鄉今在湖廣荆州府枝江縣踖陵杜注黃地當在今河南汝寧府光州西南境襄湫杜注南郡鄀縣東南有湫城今在湖廣陽府宜城縣夕室杜注地名夏四月秋公子結媵陳人之婦于鄄遂及齊侯宋公盟公羊媵者何諸侯娶一國則二國往媵之以姪娣從姪者何兄之子也娣者何弟也諸侯一聘九女諸侯不再娶媵不書此何以書為其有遂事書胡傳媵淺事陳人微者公子往焉是以所重臨乎禮之輕者也齊侯伯主宋公王者之後盟國之大事也大夫輒與焉是以所輕當乎禮之重者也禮者不失己亦不失人失己與人寇之招也是故結書公子而曰媵陳人之婦譏其重以失己也齊宋書爵而曰遂譏其輕以失人也遂者專事之辭聘禮大夫受命不受辭出境有可以安社稷利國家則專之可也謂本有此命得以便宜從事特不受專對之辭爾若違命行私雖有利國家安社稷之功使者當以矯制請罪有司當以擅命論刑何者終不可以一時之利亂萬世之法是春秋之旨也集説何氏休曰公子結出竟遭齊宋欲深謀伐魯故專矯君命而與之盟杜氏預曰結在鄄聞齊宋有會權事之宜去其本職遂與二君為盟故偹書之本非魯公意而又失媵陳之好故冬各來伐趙氏匡曰大夫特盟公侯非禮也遂孫氏復曰媵書者為遂事起也結矯命專盟故曰以惡之案僖三十年公子遂如京師遂如晉襄二年仲孫蔑會晉荀罃齊崔杼宋華元衛孫林父曹人邾人滕人薛人小邾人于戚遂城虎牢孔子皆譏之何獨與公子結也若以書至鄄為出境乃得專之則公子遂自京師如晉仲孫蔑會晉荀罃自戚城虎牢豈非出境也哉況秋與齊侯宋公盟而冬齊人宋人陳人加兵於魯非所謂可以安社稷利國家也陳稱人者媵不當書故略言之也劉氏敞曰公羊以謂媵者諸侯娶一國則二國往媵之陳人者陳侯也非也云公子結以妾媵歸陳侯之婦則文理不成又無故貶損陳侯使從人稱非正名之義蓋媵者送女也陳人者陳大夫也不煩説矣又曰榖梁曰媵淺事也不志此其志何也辟要盟也非也魯誠欲自託於大國者豈敢以媵婦之名而遣使者以取戾於霸主哉使者銜媵婦之命而遂要大國之盟是乃要盟矣何謂辟要盟乎奉杜氏諤曰諸侯專相為盟猶曰不可況以大夫不君命而專之乎故明書以示譏謂孫氏覺曰公子結於此書之後遂不復見陸淳以有遂事之美故特書之然公子結遂盟而召寇不可謂賢也或以為貶之故不書卒然春秋之間惡有甚於公子結遂事而書卒者矣因程子曰鄄之巨室嫁女於陳人結以其庶女媵之與齊宋盟挈之以往結好大國所以安國息民乃以私事之小取怒大國故深罪之書其為媵而往盟為遂事吕氏本中曰使結既盟而齊宋不來伐猶當以擅命之罪加之况無益而有害乎季宣曰正卿送媵禮之過也遂盟非其事也薛氏張氏洽曰是時莊公昏懦文薑制國政事不修君命不重故結以私家之鄙事參會霸之大命先私後公而無所畏興戎致討而莊公不誅國之無政莫大於此書公子結媵陳人之婦于鄄如臧孫辰告糴于齊以為臧孫之私行也諸家之説獨程子為得之遂李氏廉曰魯大夫書遂始於此僖三十年公子遂如晉襄公十二年季孫宿遂入鄆大夫之專國有漸然盟聘而專猶可也兵事而專甚矣然胡氏釋遂字又有專事兩事生事之殊要之皆不宜遂也公羊以為善穀梁以為魯實使之皆非經旨汪氏克寬曰前漢馮奉世矯發兵擊破莎車議封奉世蕭望之曰矯制發兵雖有功效不可為後法陳湯矯制發兵與甘延夀襲斬郅支單于軍還論功匡衡等以延夀湯擅興師矯制幸得不誅不宜復加爵土先儒謂奉世延夀湯矯制以成功望之衡以為不可封者春秋譏遂事之法也今考朱子綱目凡此類悉以矯制書之豈非取法春秋譏公子結之遺意乎然考之傳注説榖梁者以為公子結之媵與盟皆出君命左傳注疏則謂魯使公子結往媵而盟非魯公意臨江張氏臨川吳氏又以盟出君命而媵乃結之私事據文定傳則二事皆非君命竊考經文不書如陳送媵而書媵陳人之婦則非奉君命而媵陳之微者矣微事不見於經書者譏其因事與齊宋盟爾若齊宋之盟出於公命當如公孫兹如牟因聘而娶經但書聘而不書娶此亦但書盟而不書媵矣案公榖皆以為魯女媵陳侯之婦胡傳以為微者程子則謂鄄之巨室嫁女於陳人結以其庶女媵之據孔疏謂為人媵者皆送至嫁女之國使之從嫡而行今經書于鄄則程子之説信矣孔疏傅會公榖之説謂鄄為衛地陳娶衛女結送媵向衛至鄄停女會盟果爾則當書至鄄不書于鄄矣于鄄者媵于鄄也夫人薑氏如莒榖梁婦人既嫁不踰竟踰竟非正也集説杜氏預曰非父母國而往書姦發楊氏士勛曰重發傳者嫌此適異國恐别故傳以同之張氏洽曰為國君之母非父母國而出入縱恣此行比於詩之所刺謂魯道有蕩齊子豈弟者抑又甚矣莊公既無復防間之意而執國政者無人抑又可知安得不成淫風而致篡弒之禍與家氏鉉翁曰前此薑氏如齊齊不能討遂使肆然罔忌蕩遊及莒非惟魯之辱亦齊之辱也吳氏澄曰夫人自齊襄弒後八年不出因十五年又一至齊蓋假託國事以愚其昏懦之子莊公不能制故於今如莒也父母沒不得歸寧雖兄弟之國且不可往况往他國乎附録左傳初王姚嬖於莊王生子頽子頽有寵蒍國為之師及惠王即位取蒍國之圃以為囿邊伯之宫近於王宫王取之王奪子禽祝跪與詹父田而收膳夫之秩故蒍國邉伯石速詹父子禽祝跪作亂因蘇氏頽秋五大夫奉子頺以伐王不克出奔溫蘇子奉子以奔衛衛師燕師伐周冬立子頽冬齊人宋人陳人伐我西鄙此見伐之始榖梁其曰鄙逺之也其逺之何也不以難邇我國也胡傳奉詞曰伐其稱人將卑師少也結方與二國盟則其來伐我何也齊桓始霸責魯不恭所謂失己與人以招寇也或以結能為魯設免難之策為齊宋畫講好之計身在境外而權其國家為春秋豫之故稱公子非矣集説何氏休曰鄙者邊垂之辭來孫氏覺曰公子結以遂事召寇故齊宋陳皆伐我三國有辭故曰伐也西鄙魯之西境也外師至魯皆曰鄙言其邊遠也侵伐他國但言某而已不曰某鄙魯必曰鄙者蓋寇之來者不過至於邊鄙而已不能至國都也春秋之法於內言戰而不言敗言圍而不言入言侵言伐而不言其至於國都所以親之尊之而偹責之也哀公八年十一年再言伐我而不言其鄙者春秋之終而聖人之微旨也榖梁言不使難邇我國此深於春秋者之説也程子曰齊桓始霸責魯不恭其事故來伐也宋許氏翰曰公之事齊後於諸侯又受鄭詹未討齊在鄄將以陳人伐我而結知之故權國重而與之盟示先下之以禮齊宋以公子之盟未足以結成也故卒來伐而取服焉黃氏震曰諸家多謂齊宋怒結抗君而來若止怒結之抗不受其預盟足矣伐我者必其素謀耳家氏鉉翁曰是嵗周有子頽之亂衛師燕師稱兵伐周立子頽天子播遷於外桓公不能討乃以三國伐魯是春秋所責也吳氏􅊹曰魯之臣送己女為媵而遂與伯主大國盟不恭也是以聲其罪而伐之陳亦以結媵其國人之婦而輕慢伯主故與齊宋同興問罪之師結不知禮而為私為公兩失歡好禮之不可不謹也如是李氏廉曰經書齊伐我十四始於此莒伐我三邾伐我三吳伐我一皆書鄙榖梁説是也惟哀公之編吳伐我齊國書伐我不書鄙者胡氏各有説又曰齊之伐魯雖由公子結之不共然魯自受鄭詹而背盟幽之信已得罪於齊矣但公子結又重齊之忿爾丁惠王未三年二十年齊桓十二年晉獻三年衛惠二十六年蔡穆侯肹元年鄭厲二十七年曹莊二十八年陳宣十九年杞共七年宋桓八年秦宣二年楚堵敖熊囏元年春王二月夫人薑氏如莒榖梁婦人既嫁不踰竟踰竟非正也胡傳十有五年夫人薑氏如齊至是再如莒而春秋書者禮義天下之大防也其禁亂之所由生猶坊止水之所自來也衛女嫁於諸侯父母終思歸寧而不得故泉水賦許穆夫人閔衛之亡思歸唁其兄而阻於義故載馳作聖人録於國風以訓後世使知男女之别自遠於禽獸也今夫人如齊以寧其父母而父母已終以寧其兄弟又義不得宗國猶爾而况如莒乎婦人從人者也夫死從子而莊公失子之道不能防間其母禁亂之所由生故初會于禚次享于祝丘又次如齊師又次會于防于榖又次如齊又再如莒此以舊坊為無所用而廢之者也是以至此極觀春秋所書之法則知防間之道矣集説髙氏閌曰春秋迹其淫亂不可勝書故於將薨復三見之要其由惡以終為萬世婦人之戒張氏洽曰文薑比年如莒春秋詳書蓋與詩之變風相應當是時一反關雎麟趾之化而國俗於是大亂夫一國之事繫一人之本此聖人所以詳書文薑之行歟吳氏澄曰比年書夫人往他國以姦而魯莊若罔聞知昔年猶可諉曰年未長也今年既長矣而如此其不子也甚矣汪氏克寬曰文薑以桓三年至自齊至是蓋年六十矣淫姣之行老而彌甚比嵗如莒偹書不削雖國惡不容諱也朱子網目於武瞾將殂之際屢書周以張易之為奉宸令周賜張昌宗爵鄴國公其亦春秋志薑氏如莒之遺旨歟金氏賢曰案桓公十有八年書公與薑氏遂如齊蓋婦人既嫁不越境文薑父母已殁無歸寧之理桓公失制義之道遂與之如齊以致夫人蹈鳥獸之行而公遭彭生之禍春秋書此以示為夫者不可不以義制其妻也莊公元年書夫人孫于齊蓋文薑與弒義所不容雖為君母恩難掩義故去其薑氏絶不為親春秋書此以示為婦者一失其正則無所容其身也其後書夫人薑氏會齊侯于禚享于祝丘如齊師會于防會于榖如齊再如莒則夫人淫亂之行甚矣莊公防間之道微矣春秋書此以示為人子者不可失間家之道以縱母於惡也絶張氏溥曰莒非父母國而如者意夫人為齊桓所也夫人行年六十而不知恥莊公成君二十年而不能子是可哀也附録左傳春鄭伯和王室不克執燕仲父夏鄭伯遂以王歸王處於櫟秋王及鄭伯入於塢遂入成周取其寶器而還冬王子頽享五大夫樂及遍舞鄭伯聞之見虢叔曰寡人聞之哀樂失時殃咎必至今王子頽歌舞不倦樂禍也夫司寇行戮君為之不舉而况敢樂禍乎姦王之位禍孰大焉臨禍忘憂憂必及之盍納王乎虢公曰寡人之願也集説王氏錫爵曰子頽以庶孽而姦王位殃咎固所必至者奚俟哀樂失時而知之抑微此將不納王乎夏齊大災公羊何以書記災也榖梁其志以甚也集説范氏寧曰外災不志甚謂災及人也頴杜氏預曰來告以大故書天火曰災孔氏達曰襄九年三十年宋災昭九年陳災十八年宋衛陳鄭災皆不言大知此來告以大故書大也楊氏士勛曰國曰災邑曰火其外災志者皆發傳故十一年宋大水傳曰王者之後也襄九年宋災嫌火與水異傳曰故宋也宣十六年成周宣榭災傳曰以樂器所藏目之也此書齊大災傳曰其志以甚也昭十八年宋衛陳鄭災傳曰其志以同日也其九年陳火傳曰閔陳而存之也是也啖氏助曰公羊曰大災者何大瘠也若以大災為大瘠新宫災亦是新宫瘠乎災天火也大之者其災大也劉氏敞曰其言大何大非一也宗廟廏庫盡矣此齊火災也何以書弔焉爾弔人者哀其禍而救其乏又曰公羊曰何以書及我也非也春秋豈其詳外而略內哉災孫氏覺曰春秋之時皇極之道汨沒不敘而天下異不可勝紀故春秋但取其著者書之惟宋齊陳鄭三數大國而已蓋舉近可以明遠記大可以知小也張氏洽曰齊人來告而魯往弔之故書後程氏端學曰人事不理則責見於天春秋書之使世懼天威也懼天威則謹人事矣秋七月冬齊人伐戎戎穀作我集説許氏翰曰齊桓既伯七年諸侯略定是時始伐戎張氏洽曰戎在徐州之域最近齊魯故先治之也之家氏鉉翁曰是時周有子頽之亂惠王出居於鄭櫟齊桓身為盟主坐視而不救去年伐魯今年伐戎大率皆逐利而自私於王室何有十汪氏克寬曰榖梁傳作伐我蓋誤也經書外伐我有九皆書四鄙惟哀八年吳兵至城下十一年齊師伐我戰于郊兩書伐我此言齊人則將卑師少安能深入乎當從二傳作伐戎魯卓氏爾康曰齊桓霸圖有漸整頓家門先為營窟宋談遂郳戎最為相近談遂小國則滅之以廣土宋魯大國則親之以連交戎未可遽滅則伐以劫之經營布置為根本計故是時殺子頽納天王寧周室寧讓鄭伯為之而置不一問齊桓自謀立國固如此張氏溥曰戎在魯西南魯之患也齊伐戎為魯也追戎濟西者公之威為魯伐戎者齊之德案戎近齊而為魯患齊桓伐之所以親魯也家氏鉉翁謂周有子頽之亂而坐視不救洵為正論若程氏端學責其不告王而專伐則諸侯專伐者多矣何以獨責桓乎戊惠王申四年二十有一年齊桓十三年晉獻四年衛惠二十七年蔡穆二年鄭厲二十八年曹莊二十九年陳宣二十年杞共八年宋桓九年秦宣三年楚堵敖二年春王正月夏五月辛酉鄭伯突卒左傳二十一年春胥命於弭夏同伐王城鄭伯將王自圉門入虢叔自北門入殺王子頽及五大夫鄭伯享王於闕西辟樂偹王與之武公之略自虎牢以東原伯曰鄭伯效尤其亦將有咎五月鄭厲公卒弭杜注鄭地當在今河南開封府禹州密縣境汜虎牢杜注河南成皋縣也今河南開封府鄭州水縣西有虎牢城胡傳杜預稱莊公四年鄭伯遇于垂者乃子儀也而以為厲公者案春秋突歸于鄭之後其出奔蔡入于櫟皆以名書猶繫於爵雖篡而實君雖君而實篡不沒其實也忽雖世子其出奔猶不得稱子其復歸猶不得稱伯以其實不能君也而况子儀雖乘間得立其為君微矣豈敢輕去國都與諸侯會於外乎故知遇于垂者乃厲公也其始終書爵不沒其實也亦可以為居正而不能保者之戒矣集説髙氏閌曰髙渠彌弒昭公立子亹齊人殺亹祭仲立子儀春秋皆沒而不書以突為鄭伯故也間張氏洽曰突莊公之孽子莊公既沒奪忽之位中雖為祭仲所逐旋入于櫟卒取鄭國故不復著忽亹儀之在位以其不能君也論者以為突始終能君夫篡弒竊國之人而春秋終始君之且復記其卒於位所以著小人肆志亂賊得終王法不行而世之所由亂也家氏鉉翁曰自鄭突之入于櫟春秋蓋絶之矣及周惠王以子頽之亂出居于櫟諸侯勤王者獨鄭與虢爾厲公雖有篡國之罪亦有勤王之功是以春秋於其卒與葬而復録之秋七月戊戌夫人薑氏薨榖梁婦人弗目也集説范氏寧曰鄭嗣曰弗目謂不目言其地也婦人無外事居有常所故薨不書地僖元年傳曰夫人薨不地此言弗目蓋互辭爾江熙曰文薑有弒公之逆而弗目其地弗目謂不題目文薑薨所也一曰弗目其罪君禮書之杜氏預曰薨寢祔姑赴於諸侯故具小張氏洽曰文薑之行惡矣而卒以國君之母寵榮終身一用小君之禮此魯之禍所以未艾必至於莊公之終兩君弒哀薑慶父誅而後魯亂始息也案榖梁弗目之説鄭嗣與江熙各不同而其實一也蓋夫人薨例不書地今文薑不書地亦與常例無異則不目其地即不目其罪也附録左傳王巡虢守虢公為王宫於玤王與之酒泉鄭伯之享王也王以后之鞶鑑豫之虢公請器王豫之爵鄭伯由是始惡於王冬王歸自虢玤杜注虢地在今河南河南府澠池縣界匱酒泉杜注周邑今陜西西安府同州有甘泉出谷中造酒尤美名酒泉冬十有二月葬鄭厲公集説杜氏預曰八月乃葬緩王王氏葆曰據左氏鄭伯有納惠王之功勳在室然不免諡為厲者其始以賂而篡立中以虐而出奔周室雖衰公議尚在臣子私諡不敢妄加美名古意猶可考也王氏元杰曰鄭忽雖嫡弱而無能鄭突雖庶強而有援諸侯與邪害正黨惡崇姦執祭仲以要盟納突而有國時在春秋公議猶在名之曰厲雖孝子慈孫百世不能改也張氏溥曰突既能君有功王室猶諡曰厲鄭人不能諱其篡奔之實也夫人薑氏行惡賊殺桓公薨葬偹禮又諡曰文莊公念母而過魯人不能正也是有愧於鄭人矣已惠王酉五年二十有二年齊桓十四年晉獻五年衛惠二十八年蔡穆三年鄭文公捷元年曹莊三十年陳宣二十一年杞惠公元年宋桓十年秦宣四年楚堵敖三年春王正月肆大眚眚所景反公作省胡傳肆眚者蕩滌瑕垢之稱也舜典曰眚災肆赦易於解卦曰君子以赦過宥罪呂刑曰五刑之疑有赦五罰之疑有赦周官司刺掌赦宥之法一宥曰不識再宥曰過失三宥曰遺忘一赦曰幼弱再赦曰老耄三赦曰憃愚未聞肆大眚也大眚皆肆則廢天討虧國典縱有罪虐無辜惡人幸以免矣後世有姑息為政數行恩宥惠姦宄賊良民而其弊益滋蓋流於此故諸葛孔明曰治世以大德不以小惠其為政於蜀軍旅數興而赦不妄下蜀人久而歌思猶周人之思召公也斯得春秋之旨矣肆眚而曰大眚譏失刑也集説孔氏頴逹曰肆大眚者肆緩也眚過也緩縱大過是赦有罪也大罪猶赦則小罪亦赦之猶今赦書大辟罪以下悉皆原免也子趙氏匡曰榖梁云為嫌天子不許之葬案當時天微弱魯肯畏之乎若實有畏王之心則自赦以除母罪豈為得禮且魯莊未嘗有怨齊之心葬母肯有所忌赦自赦葬自葬爾敞孫氏復曰肆大眚非正也亂法易常者也書劉氏曰肆者何赦也眚者何罪也肆大眚何以譏何譏爾肆大眚非禮也又曰公羊以謂譏始忌省也非也經云肆大眚而傳謂之忌者其文與其理不可訓解蓋不足難也榖梁曰為嫌天子之葬也非也文薑之存猶莫之討也今死矣反待天子而葬乎此皆不然者人程子曰大眚而肆之其失可知凡赦何嘗及得善諸葛亮在蜀十年不赦審此爾胡氏寧曰罪在五刑上天所討大眚皆肆春秋譏之不張氏洽曰宥過無大刑故無小此堯舜三代之法可偏廢者後世兩失之偏慘刻者不復察其情舉過失而盡刑誅之及姑息之過如莊公者反取大罪極惡而例之於眚災以從肆赦之例怙終得志良善瘖啞謂之肆大眚以譏其務小惠而失大德也吳氏澄曰眚固可赦而不言大聖人雖至仁然赦人之罪亦必有所劑量於其間不一概也書肆大眚則罪之大而不當赦者亦赦之譏其惠姦佚罰也不俞氏皋曰肆眚常也非常為大肆大眚者罪惡無赦之辭也異於常故書癸丑葬我小君文薑公羊文薑者何莊公之母也榖梁小君非君也其曰君何也以其為公配可以言小君也胡傳文薑之行甚矣而用小君之禮其無譏乎以書夫人孫于齊不稱薑氏及書哀薑薨于夷齊人以歸考之則譏小君典禮當謹之於始而後可正也文薑已歸為國君母臣子致送終之禮雖欲貶之不可得矣集説何氏休曰言小君者比與君為小俱臣子辭也文者諡也夫人以姓配諡欲使終不忘本也陸氏淳曰淳聞於師曰父子之道天性也母有罪子不可得而貶也葬生者之事也臣子之禮其可虧乎當劉氏絢曰夫人之諡皆私諡也婦人不尸善名不别諡髙氏閌曰婦人無爵何諡之有先王之制但取夫之諡冠於姓之上以明所屬詩所謂莊薑宣薑共薑經所謂宋共姬是也豈有不繫其夫而别自為諡者哉夫人薑氏弒逆淫亂之人得罪於宗廟國人之所不容今也云亡雖以子母之故不忍棄絶則葬之足矣又别為之諡曰文而不復繫於桓公自是魯國從而效尤凡夫人之死皆為之别立諡後世因循不改大失春秋之旨矣程吳氏􅊹曰夫人之尊與君同故薨葬一如君禮氏端學曰薑氏弒逆淫亂得罪宗廟國人所當誅也而得成禮而葬魯之典禮廢矣其不從夫諡與七月而葬乃其細事不暇論也以王氏樵曰案周人以諱事神名終將諱之故易之諡末世滋濫諡不應實爰及婦人婦人法無諡也生以夫國冠之韓姞秦姬是也死以夫諡冠之莊薑定姒是也末世别為作諡如景王未崩妻稱穆后非禮也陳人殺其公子御寇御音禦公榖作禦此書專殺之始左傳春陳人殺其大子御寇陳公子完與顓孫奔齊顓孫自齊來奔齊侯使敬仲為卿辭曰羇旅之臣幸若獲宥及於寬政赦其不間於教訓而免於罪戻弛於負擔君之惠也所獲多矣敢辱髙位以速官謗請以死告詩云翹翹車乘招我以弓豈不欲往畏我友朋使為工正飲桓公酒樂公曰以火繼之辭曰臣卜其晝未卜其夜不敢君子曰酒以成禮不繼以淫義也以君成禮弗納於淫仁也初懿氏卜妻敬仲其妻占之曰吉是謂鳳凰于飛和鳴鏘鏘有媯之後將育于薑五世其昌並於正卿八世之後莫之與京陳厲公蔡出也故蔡人殺五父而立之生敬仲其少也周史有以周易見陳侯者陳侯使筮之遇觀之否曰是謂觀國之光利用賔于王此其代陳有國乎不在此其在異國非此其身在其子孫光遠而自他有耀者也坤土也巽風也乾天也風為天於土上山也有山之材而照之以天光於是乎居土上故曰觀國之光利用賔于王庭實旅百奉之以玉帛天地之美具焉故曰利用賔于王猶有觀焉故曰其在後乎風行而著於土故曰其在異國乎若在異國必薑姓也薑大嶽之後也山嶽則配天物莫能兩大陳衰此其昌乎及陳之初亡也陳桓子始大於齊其後亡也成子得政榖梁言公子而不言大夫公子未命為大夫也其曰公子何也公子之重視大夫命以執公子胡傳公子之重視大夫殺而或稱君或稱國或稱人何也稱君者獨出於其君之意而大夫國人有不與焉如晉侯殺其世子申生之類是也稱國者國君大夫與聞其事而不請於天子如鄭殺其大夫申侯之類是也稱人者有二義其一國亂無政衆人擅殺而不出於其君則稱人如陳人殺其公子御寇之類是也其一弒君之賊人人所得討背叛之臣國人之所同惡則稱人如衛人殺州吁鄭人殺良霄之類是也考於傳之所載以觀經之所斷則罪之輕重見矣集説范氏寧曰大夫既命得執公子之禮一本大夫命以視公子孫氏復曰春秋之義非天子不得專殺此言陳人殺其公子御寇者譏專殺也是故二百四十二年無天王殺大夫文書諸侯殺大夫者四十七何哉古者諸侯之大夫皆命於天子諸侯不得專命也大夫有罪則請於天子諸侯不得專殺也大夫猶不得專殺况世子母弟乎春秋之世國無大小其卿大夫士皆專命之有罪無罪皆專殺之其無王也甚矣故孔子從而録之以誅其惡稱君稱國稱人雖有重輕而其專殺之罪則一也劉氏敞曰公子非大夫也何以書公之嫡子也公之嫡子則世子也其謂之公子何嫡子既誓稱世子未誓稱公子雖未誓書也殺世子母弟目君此其曰陳人殺之何病御寇也曷為病之御寇之為人子也蓋足以殺其身已矣有孫氏覺曰御寇以公子之貴而見殺於國人御寇罪矣陳之君使公子而見殺焉亦未免乎有罪也子張氏洽曰不稱世子未誓於天子也未誓則稱公重王命也御寇乃君之嫡嗣為一國之儲二而衆人得以殺之則其所以自處必有失其道者矣故劉氏譏御寇之為人子足以殺其身而春秋略殺者之罪也公呂氏大圭曰殺之或稱公子或稱大夫或稱大夫子稱公子者公子而非大夫也稱大夫者大夫而非公子也稱大夫公子者公子而為大夫也又有以官舉者以官之重而著之也觀聖人所書而褒貶寓乎其中矣疑邵氏寶曰御寇陳世子也何以殺之欲立嬖姬子也殺者宣公而歸之陳人者何陳人之志猶公之志也是以與申生異辭不季氏本曰此國人亂殺大夫之始事也姑息茍容謀討治則人將效尤而下陵上替之漸長矣夏五月集説何氏休曰以五月首時者譏莊公取讎國女不可以事先祖奉四時祭祀猶五月不宜以首時時杜氏預曰年之四時雖或無事必空書首月以紀變以明歷數莊公獨稱夏五月及經有四時不具者丘明無文皆闕繆也何范氏寧曰以五月首時寧所未詳楊氏士勛曰休云譏娶讎女杜預云繆誤范氏以二者皆無憑故云寧所未詳也者孫氏復曰春秋未有以五月首時者此言夏五月蓋五月之下有脫事爾不劉氏敞曰此其以五月首時何春秋故史也有所革髙氏閌曰非五月之下脫簡則是誤以四月為五月爾九卓氏爾康曰春秋無事以首時稱者五十惟此書五月案經書夏五月諸家所見不同觀孫氏復劉氏敞之説則杜氏以為闕繆者於義為長也或者謂周之四月乃夏之二月周官以是月會男女詩曰士如歸妻逮冰未泮言其禮之宜豫則是月者昏姻之月也莊公居喪而納幣娶讎人女則昏姻之禮廢經不書四月殆以是歟故並存何氏注以俟參考秋七月丙申及齊髙傒盟于防傒音奚公羊齊髙傒者何貴大夫也曷為就吾微者而盟公也公則曷為不言公諱與大夫盟也榖梁不言公髙傒伉也集説趙氏匡曰凡盟不目內皆指公也強陸氏淳曰趙氏云書髙傒罪之也齊恃霸主使卿與公盟故特書之以示譏齊劉氏敞曰杜氏曰髙傒齊之貴卿而與魯微者盟桓謙接諸侯以崇霸業非也卿不可會公侯故沒公爾盟程子曰髙傒上卿魯無使微者與盟之理蓋諱公始與讎為昏惡之大也而張氏洽曰敵大夫以自卑輕君體以自弱去國都汲汲於小信與及向戌盟于劉一也而此復以昏姻而結盟不顧禰廟不共戴天之讐而議娶齊女比事以觀此為惡之大者也家氏鉉翁曰魯人忘君父之大讎請昏於齊齊使髙傒要魯以盟其傲魯也甚矣春秋書之責齊也雖為魯諱亦責魯也文二年及晉處父盟彼時公身在晉晉君不與公盟使其臣及公盟故春秋深責晉人之無狀去處父族以示貶此則齊魯均責焉耳蓋諱之中有權度存焉不可以一律觀也李氏廉曰公出國都而盟惟髙傒向戌蓋公不敢坐盟之此正與晉悼出長樗盟公相似然晉悼與公敵體則出而盟公可以為謙魯公屈體而從大夫卑莫甚矣髙汪氏克寬曰防盟出公意故傒不去氏冬公如齊納幣公羊納幣不書此何以書譏何譏爾親納幣非禮也榖梁納幣大夫之事也禮有納采有問名有納徴有告期四者備而後娶禮也公親納幣非禮也故譏之胡傳微者名姓不登於史册髙傒齊之貴大夫也曷為就吾之微者盟蓋公也其不言公諱與髙傒盟也求議結昏取讐人女大惡也娶者其為吉下主乎已上主乎宗廟以為有人之心者宜於此焉變矣公親如齊納幣則不待貶也集説何氏休曰納幣即納徴納徵者曰主人受幣士受儷皮是也禮言納徴春秋言納幣者春秋質也親范氏寧曰公母喪未再期而圖昏傳無譏文但譏納幣者喪昏不待貶絶而罪惡見趙氏匡曰昏禮有六一納采二問名三納吉四納徴納徴即納幣也五請期六親迎親迎即逆女也春秋獨書其二以納幣方契成逆女為事終舉重之義也敞啖氏助曰納幣常事不書凡書者皆譏也劉氏曰譏喪取也納徵大夫之事也親納幣亦非禮也交譏之動杜氏諤曰春秋內適外曰如苟書其事蓋非常也涉非禮明書之以示貶難程子曰齊疑昏議故公自行納幣後二年方逆齊之也胡氏銓曰諸侯非朝王述職而擅越境以納幣無王甚矣不止其喪昏娶讐也吕氏本中曰莊公失禮者三娶讐女一也喪未畢二也親往納幣三也期張氏洽曰莊公生至是三十五年矣制於文薑過而不娶今喪未畢而納幣圖昏又忘父讐禮不當親行而躬致其禮其為不孝之罪不待貶絶而具見矣家氏鉉翁曰或謂魯與齊既為會盟春秋無責通昏不亦可乎夫主夏盟者齊桓也今請昏而納幣者齊襄之女也盟讐人之弟猶曰為其伯也諸侯皆在不得不與於盟娶妻豈無他族必讐女而後娶其何以奉粢盛入先君之廟乎也王氏元杰曰春秋十二公書如齊者未嘗書其事於莊公凡三書之納幣觀社逆女是也李氏廉曰書納幣三文二年公子遂譏喪娶成八年宋公孫壽昏禮不當使公孫也蓋昏常事不書凡書皆譏矣庚惠王戌六年二十有三年齊桓十五年晉獻六年衛惠二十九年蔡穆四年鄭文二年曹莊三十一年陳宣二十二年把惠二年宋桓十一年秦宣五年楚成王頵元年春公至自齊公羊危之也集説楊氏士勛曰二十七年傳云桓會不致此與下文觀社皆書公至自齊者公羊傳云危之也徐邈亦云不以禮行故致以見危范此雖無注下云公怠棄國政此行犯禮憂危甚矣則亦以二者為憂危致之也通劉氏敞曰公羊云公一陳他也非也妄説不可以王氏葆曰公行二十有三書至者五而已公親往納幣既忘桓公之世讎復廢文薑之喪禮自是而下觀社逆女皆致焉聖人之意豈不深切著明哉狩張氏洽曰書至告於廟也春秋書至蓋原於書巡而歸格于藝祖用特之意聖人以舉動之公往返之節質之幽明而無愧也今莊公忘父讎而娶其女冒母喪而往納幣以此告廟其心將何如哉此與他日書至不可同日語比事屬辭示人之意顯矣趙氏與權曰莊公踰年而後反居喪告朔之禮俱廢焉皆李氏廉曰齊桓之編莊公與之會盟遇伐救者九不書至獨三如齊書至者此三事皆為娶讎女而行也僖公與之會盟七不書至兩如齊亦不至獨伐楚伐鄭牡丘于淮書至伐楚伐鄭大其功牡丘于淮志其衰也當參公榖方通夫汪氏克寬曰説公羊者以謂公如齊淫此未必然莊公議昏於齊至再至三盟防遇榖盟扈屢為好會納幣觀社逆女屢造於齊莊公求之如是其急齊桓許之如此其緩又安肯容其縱淫於其國而不恥耶齊湛氏若水曰告廟必曰今已納幣聘娶齊某女夫侯親殺桓公者也世讎也桓公有知其心當何如耶莊公於是乎罪不可逭矣卓氏爾康曰魯自莊十三年盟柯始與齊桓盟會者十如齊者二而皆不書至至莊二十二年之納幣二十三年之觀社二十四年之逆女與遇榖盟扈前後錯列於經更皆書至蓋以納幣觀社逆女三行非禮故書至以見公過祭叔來聘榖梁其不言使何也天子之內臣也不正其外交故不與使也胡傳祭伯來朝而不言朝祭叔來聘而不言使尹氏王子虎劉卷來訃而不書其爵秩皆所以正人臣之義也人君而明此不容下比之臣人臣而明此不為交私之計黨錮之禍息矣集説范氏寧曰祭叔天子寰內諸侯何休曰南季宰渠伯糾家父宰周公來聘皆稱使獨於此奪之何也鄭君釋之曰諸稱使者是奉王命其人無自來之意今祭叔不一心於王而欲外交不得王命來故去使以見之氏啖氏助曰私行假言聘故不言王使以譏之陸淳曰不言使者原其來意非天子之命爾字劉氏敞曰祭者何邑也叔者何字也曷為氏邑而天子之下大夫也下大夫爵附庸王氏葆曰祭采地叔字天子之大夫也儻不以王命來則當以祭伯來之例書儻以王命來則當以天王使凡伯來聘之例書今但曰來聘見其假王命而私交也他吕氏大圭曰王臣來聘者八列國聘魯者三十一皆言使此獨不言使或謂祭叔以私來而自以聘禮行也然祭伯來私來也言來則不當言聘聘非自來也或謂祭叔使人來聘其不稱使不與祭叔之使亦非也此與武氏子來求賻毛伯來求金一例爾蓋武氏毛伯之來非王命故皆不言使祭叔非王命而來聘故亦不言使也趙氏與權曰祭有祭公祭伯祭叔意者叔其弟也猶蔡季許叔之類伯其爵也公其官也吳氏􅊹曰祭圻內之國王臣也不當外交諸侯而祭自入春秋伯之來公之來叔之來聘凡三交魯矣王臣私交之非禮或朝或聘其罪一也汪氏克寬曰春秋書使人來聘未有止稱其君而不著其臣者荆楚無君臣之辭然曰荆人來聘亦指荆之微者爾何嘗言荆子來聘哉或云祭叔乃祭公之臣或以為祭公之弟果其臣若弟而不言使則是隱私交之迹矣或云祭叔請王命而來聘茍請命於王則王命之矣舊史必書曰天王使祭叔來聘聖人何以知其擅命而削不稱使耶案祭叔為王朝大夫假聘禮私行故不稱使此正義也杜氏預本徐氏邈之説謂祭叔為祭公來聘蘇氏亦謂祭叔為祭公之屬劉氏敞則謂祭叔自使人來聘其臣不達於春秋故不稱使皆無確據故不録夏公如齊觀社左傳二十三年夏公如齊觀社非禮也曹劌諫曰不可夫禮所以整民也故會以訓上下之則制財用之節朝以正班爵之義帥長幼之序征伐以討其不然諸侯有王王有巡守以大習之非是君不舉矣君舉必書書而不法後嗣何觀公羊何以書譏何譏爾諸侯越竟觀社非禮也榖梁常事曰視非常曰觀觀無事之辭也以是為尸女也無事不出竟胡傳莊公將如齊觀杜曹劌諫曰齊棄太公之法而觀民於社君為是舉而往觀之非故業也天子祀上帝諸侯會之受命焉諸侯祀先公卿大夫佐之受事馬不聞諸侯之相會祀也君舉必書書而不法後嗣何觀集説何氏休曰觀杜者與親納幣同義社者土地之主祭者報德也生萬物居人民德至厚功至大故感春秋而祭之天子用三牲諸侯用羊豕其杜氏預曰凡公出朝聘奔喪會葬皆但書而不言事此春秋之常然則喪葬常事故不書觀社非常故特書劉氏敞曰觀社與觀魚一也觀社稱如觀魚不稱如內外之辨也諸侯於其竟外可以言如於其竟內不可以言如程子曰昏議尚疑故公以觀社為名再往請議後一年方逆蓋齊難之出張氏洽曰社者古人祀地之名古制惟為社事單里惟為杜田國人畢作東遷而後王制漸變祀事不存古意寖為美觀襄公二十四年齊社搜軍實使客觀之其廢祀典而夸愚俗兆於今矣車家氏鉉翁曰榖梁以是行為尸女尸之云者盛其華其服炫惑婦人而蠱其心要其從已是之謂無别故書以責之之吳氏􅊹曰社者諸侯祭其土示之常事未聞鄰國君往觀之者如齊而曰觀社此何禮哉蓋齊俗每因祭社則搜軍以夸示威衆而聚人觀之故莊公得託此為名以如齊也社程氏端學曰諸侯非王事不出境且諸侯各有其舍所事而觀他國之社已非禮矣況齊為讎國又有新昏之嫌於此見莊公之棄國政無君父壞禮法忘廉恥縱遊觀罪具見矣邵氏寶曰無故而行是之謂縱有為而往是之謂淫公於是三十有六矣意者齊人有疑於年故公夸示之者不一而足歟附録左傳晉桓莊之族逼獻公患之士蒍曰去富子則羣公子可謀也已公曰爾試其事士蒍與羣公子謀譖富子而去之公至自齊集説王氏葆曰宗廟社稷諸侯所同有也其禮有常度其祭有常日公廢魯社而觀齊社何以守土而治民哉況公之意以觀社為名而實窺齊女其誨淫召亂必矣所以危而書至也荆人來聘楚交中國始此公羊荆何以稱人始能聘也榖梁善纍而後進之其曰人何也舉道不待再集説杜氏預曰不書荆子使某來聘君臣同辭者蓋楚之始通未成其禮孔氏穎逹曰楚武王熊逹始居江漢之間猶未能自同列國故稱荆敗蔡師荆人來聘從其所居之稱而總其君臣是言楚之始通未成其禮之意此云荆人來聘是臣來也僖二十一年楚人使宜申來獻捷言使則是君也而經亦書楚人是君臣同辭國楊氏士勛曰不言楚人而云荆人者傳稱州不若楚既新進若稱國繫人嫌其大褒故直舉州稱人言聘以進之入孫氏復曰荆十年敗蔡師于莘始見於經十四年蔡十六年伐鄭皆曰荆此稱人者以其修禮來聘少進之也舍陳氏傅良曰稱人於是始蓋進之也隱桓之春秋王室若姻鄰無聘魯者矣而荆人先修聘於上國進之也者憂之也張氏洽曰楚自四五年來先加兵於蔡鄭而聘使至魯用遠交近攻之術聖人於此書其來聘而不書使必其禮有未偹者中庸曰送往迎來嘉善而矜不能三代柔遠人之道也此時以魯而受楚之聘亦當審所以待之之術矣家氏鉉翁曰書荆書楚書楚人書楚子每書輒異者著其漸盛也又李氏廉曰荆之聘魯三始書荆人繼書楚子使椒繼書楚子使薳罷蓋進之以漸也其進之之義三傳皆同然荆聘魯而旋有伐鄭之師介朝魯而繼有侵蕭之役秦人歸禭來聘而意在河曲之戰其窺覘之謀離間之衛常如此故陳氏張氏之説皆得之汪氏克寬曰公榖皆謂稱人所以進之或謂春秋著其漸盛今考楚之交中國始書荆人繼書楚屈完然後書楚子使椒楚子使薳罷蓋始而來聘則嘉其慕義而稱人既而來盟豫其服義則進而稱名氏及其浸慕中國則稱君稱臣矣吳之始見也亦祇舉號及其來會諸侯則進而稱人使季札聘則嘉其慕義而稱君稱臣雖曰進之而吳楚漸盛之勢已見於言意之表矣然楚之初聘止曰荆人而不著君臣雖曰進之而實則略之也蓋不可言荆來聘故謂之荆人特比於舉號則為進之耳陳氏際泰曰荆禍先中於蔡荆聘先通於魯公及齊侯遇于榖榖梁及者內為志焉爾遇者志相得也集説張氏洽曰為昏姻而齊難之也不可與為昏姻則當絶之而數與之約然後與之書此所以著莊公之不子而齊桓待人之不以義也簡黃氏震曰遇者禮之簡公亦自知數會之煩擾而其禮也家氏鉉翁曰魯莊之為此遇繼納幣觀社而書著其急於得耦而求之惟恐其未至也蕭叔朝公公羊其言朝公何公在外也榖梁微國之君未爵命者其不言來於外也朝於廟正也於外非正也胡傳榖齊地蕭叔附庸之君也為禮必當其物與其所而後可以言禮大夫宗婦覿而用幣則非其物也蕭叔朝公在齊之榖則非其所也嘉禮不野合而朝公於外是委之於野矣故禮非其所君子有不受必反之於正而後止此亦春秋撥亂之意也集説何氏休曰言朝公惡公不受於廟之徐氏彥曰隱七年注云不言聘公者禮聘受於大廟孝子謙不敢以己當之歸美於先君且重賔也隱十一年注云不言朝公者禮朝受之於大廟與聘同義今此言公故如此解之於廟以重禮也啖氏助曰人君相見曰朝皆受劉氏敞曰蕭叔朝公杜云叔者蕭君名非也邾蕭同是附庸邾與魯盟得褒稱字蕭來朝公猶不免名何哉凡春秋褒貶自有輕重聖人所以教後世賞罰也若盟而蒙加等之賞朝而無勞來之意則賞罰已亂於春秋何能教人髙氏閌曰公納幣而還則祭叔聘之觀社而還則荆人聘之遇榖則蕭叔朝之此其志所以自得而不復忌憚也張氏洽曰書朝公以見非其地蕭之來魯之受皆非禮也李氏廉曰蕭叔左氏榖梁皆以為名胡氏以入中國附庸稱字之例正義曰蕭本宋邑宋桓公之立蕭叔大心有功焉宋人封以為附庸又曰蕭叔之朝公與僖公之朝王所其非地一也彼言所而此不言所者王者以天下為家無適而非所也汪氏克寬曰齊莊公弔把梁之妻於郊辭曰君之臣不免於罪則將肆諸市朝而妻妾執若免於罪則有先人之敝廬在下妾不得與郊弔齊侯弔諸其室使魯莊能如梁妻之知禮而辭蕭叔之朝則為不悖於禮矣今莊公訹於私欲而受非禮之禮故聖人特書曰朝公而不曰來朝所以交貶之也秋丹桓宫楹左傳秋丹桓宫之楹公羊何以書譏何譏爾丹桓宫楹非禮也榖梁禮天子諸侯黝堊大夫倉士黈丹楹非禮也集説何氏休曰楹柱也丹之者為將娶齊女欲以夸大示之髙氏閌曰莊公不能為桓復讐而反娶其女以奉祭祀故丹楹刻桷以示孝甚矣莊公之行詐也夫宗廟之飾國有彜典而妄肆奢麗加於禰宫亂王制瀆先君不恭莫大焉聖人直書其事具文見意案榖梁謂天子諸侯黝堊諸家之説以黝為黑柱堊為白壁者徐氏邈也以黝堊為黑色者范氏寧楊氏士勛也以為天子黝諸侯堊者劉氏敞也説文訓堊為白塗爾雅牆謂之堊郭璞曰以白土飾牆也山海經白堊黑青黃堊注言雜色堊也則非白土之謂矣考周禮注云素車以白土堊藻車以蒼土堊釋名云堊者亞之也次也先泥之次以灰飾之也是堊字貫下二句猶云天子諸侯黝堊大夫倉堊士黈堊焉爾冬十有一月曹伯射姑卒十有二月甲寅公會齊侯盟于扈扈音戶陽扈杜注鄭地在滎卷縣西北後漢志卷縣有扈城亭今河南開封府原武縣西北扈亭是也胡傳程子曰遇于榖盟于扈皆為要結姻好也傳稱男子二十而冠冠而列丈夫三十而不娶則非禮矣然天子諸侯十五而冠者以娶必先冠而國不可久無儲二欲人君早有繼體也今莊公生於桓公之六年至是三十有六載矣以世嫡之正諸侯之貴尚無內主同任社稷之事何也蓋為文薑所制使必娶於母家而齊女待年未及故莊公越禮不顧如此其急齊人有疑如此其緩而遇于榖盟于扈要結之也娶夫人奉祭祀為宗廟之主而母言是聼不以大義裁之至於失時不孝甚矣春秋詳書於策為後戒也集説孫氏復曰公會齊侯盟于扈謀逆薑氏也公二年之中納幣觀社及齊侯遇于榖比犯非禮今又會盟于扈甚矣禮劉氏敞曰公羊曰危之也妄説爾王氏葆曰越要盟遠至鄭地而不恥者促昏期也氏張氏洽曰至此又盟以結其信而後許之也吳澄曰遇榖以請而齊猶難之故盟以要其信而後許也夫求昏者可求則求不可則已許昏者可許則許不可則卻魯欲求齊昏不以媒妁往覘其可不可公乃自與齊髙傒盟以求之未得齊諾而公遽親納幣是與強委禽者同也躬納幣而猶未諾則又往觀社以請觀社以請而猶未諾則又遇于榖以請遇穀之後宜若可矣又必盟于扈而後可焉何其難之之甚也二國之昏姻不以禮不以義如此哀薑之不終也宜哉汪氏克寬曰諸傳皆謂莊公受制於母俾娶讐女今考莊公以文薑葬後求昏於齊自盟防而會遇者三自納幣而如齊者三汲汲奔走不憚煩勞而且盛飾禰宫以夸示其配使莊公果以文薑遺命而娶齊女亦縱欲而不能自克爾非迫於義而不敢違也欽定春秋傳説彚纂卷九
