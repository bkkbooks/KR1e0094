body:
  text: 欽定四庫全書欽定春秋傳說彚纂卷十八癸頃王夘元年九年晉靈三年齊昭十五年衛成十七年蔡莊二十八年鄭穆十年曹共三十五年陳共十四年杞桓十九年宋昭二年秦康三年楚穆八年春毛伯來求金來求止此左傳九年春毛伯衞來求金非禮也不書王命未葬也公羊毛伯者何天子之大夫也毛伯來求金何以書譏何譏爾王者無求無求而求故譏之也穀梁求車猶可求金甚矣集說杜氏預曰求金以共葬事雖踰年而未𦵏故不稱王使范氏甯曰凱曰求俱不可在喪尤甚前陸氏淳曰公羊云何以不稱使三年然後稱王案後例踰年即成君言三年非也髙氏閌曰公孫敖既不至京師魯遂不共天子之喪故毛伯於是來求金也冢宰秉國之均豈可以用度之闕而下求於諸侯乎衰陳氏傅良曰自是魯雖不脩貢周無求矣周室益而頃王之崩𦵏不見於經趙氏鵬飛曰春秋書天王來求者三求賻求金不稱使皆天王諒隂冢宰攝政故不書使若家父求車則書使矣襃貶不在是所書者責諸侯不貢而致天子下求也禹貢貢金惟揚州荆州及春秋時揚在吳而荆在楚宜三品之金不復登於王府也王府不足而下求焉其微甚矣然則責魯歟曰非獨責魯也徧責天下之諸侯不能供王之職貢也魯以兗州之貢漆絲而已金非所以責魯也然王有闕則諸侯均所當供豈必責金於呉楚哉春秋諸侯其於周室如秦越矣其肥瘠不加喜戚也至其求而後貢猶為有饋乏之助况求之得否殆未可知乎叔孫得臣如京師蓋以求金而往也雖求而往不若未求而貢然愈於求而不往如求賻求車者矣聖人書此蓋傷周道也案公羊謂三年涼闇不稱王陸氏淳引逾年成君例駁之是已然公羊以不稱使為當喪未君胡傳亦用之豈涼闇之禮逾年得稱王猶不闗渉政事親遣其卿大夫耶僖九年葵丘之㑹襄王賜桓公胙宰孔之致命也一則曰天子使孔再則曰天子使孔何耶胡氏謂春秋不稱使者不欲冢宰託王命以號令天下今考顧命及康王之誥其以冢宰命行事者惟未受册命之時耳旣受册命則羣臣陳戒即稱天子而王亦即自稱予一人是即位以後冢宰雖攝政未有不奉王命而行者也故刪節公羊而胡氏不録夫人姜氏如齊集說范氏甯曰歸寧書趙氏鵬飛曰父母存夫人歸寧常事耳何以蓋於常之中有其故焉不可不志也文公竝妃匹嫡齊女出姜生惡及視又嬖於共嬴生倭嬴寵而倭將貴故出姜如齊謀於父母也其歸寧蓋有其故存焉是以聖人書之以著十八年歸齊之張本呉氏澂曰出姜當是齊昭公女蓋有所不安而歸寧以愬於父母云耳趙氏以為無父母蓋謂歸寧合禮者經不書故疑其非昭公女也汪氏克寛曰齊昭公乃桓公之子距文之立已十有八年則出姜為昭公之女無疑矣二月叔孫得臣如京師榖梁京大也師衆也言周必以衆與大言之也辛丑葬襄王左傳二月莊叔如周葬襄王公羊王者不書葬此何以書不及時書過時書我有往者則書穀梁天子志崩不志葬舉天下而葬一人其道不疑也志葬危不得葬也集說何氏休曰惡文公不自往僖公成風之喪襄王比加禮故録之以責内楊氏士勛曰魯卿往㑹始書若不㑹則不當書也故春秋之世有十二王志崩者有九書葬者唯五耳良由王室不赴諸侯不會故也末劉氏敞曰杜云卿共葬事禮也非也使卿共葬周之淩替也非典之正也又曰榖梁云日之甚矣其不葬之辭也非也上云得臣如京師者即㑹葬之人矣何謂不葬乎王氏葆曰此雖非禮猶為可道若夫以微者往㑹而不登於䇿不弔不葬而見略於經則又甚矣陳氏傅良曰前年公子遂如晉葬襄公今年得臣如京師葬襄王是夷周於晉也二趙氏鵬飛曰天王書葬者五而魯以大夫會葬者此年得臣之行與昭二十二年叔鞅如京師葬景王而已其三則不書大夫如京師不書如京師微者也然猶愈夫不㑹葬者矣書崩而不書葬者四魯不㑹也家氏鉉翁曰魯尚奔齊晉楚之喪且㑹其葬豈有王喪不躬㑹之禮是則重可責耳葬汪氏克寛曰春秋書葬天王者五惟襄王景王之使卿徃㑹然視襄王之於成風含賵而又㑹葬則得臣之遣不足以荅天子之寵光矣晉人殺其大夫先都左傳九年春王正月己酉使賊殺先克乙丑晉人殺先都梁益耳集說劉氏敞曰稱人以殺大夫者殺有罪也先都之罪何亂也其亂奈何先都士縠者皆晉之彊家也求専晉而不得怒而作亂蓋殺其大夫先克也三月夫人姜氏至自齊胡傳夫人與君敵體同主宗廟之事出必告行反必告至則書於䇿然適他國者或曰享或曰㑹或曰如衆矣未有致之者則其行非禮以不致見其罪也出姜如齊以寧父母於禮得行矣其致者非特以告廟書耳夫人初歸豈其不吿為文公越禮故削而不書示誅意之法矣今此書至者又以見小君之重也夫承祭祀以為宗廟主一國之母儀而可以摇動乎出姜至是蓋不安於魯故至而特書以示防㣲杜漸之意其為世慮深矣集說孔氏穎達曰蘇氏云夫人歸寧書至唯有此耳餘不書者或禮儀不備或淫縱不告廟也趙氏匡曰榖梁云卑以尊至病文公也案反而吿廟是得禮也何謂病公乎劉氏敞曰夫人曷為或致或不致或可以致或不可以致曷為或可以致或不可以致出入以禮則可以致出入不以禮則不可以致此其為有禮奈何父母在而歸寧也不蘇氏轍曰春秋夫人適他國未有至之者皆非禮告廟故也惟以此歸寧告廟故書也葉氏夢得曰内夫人出十有四皆不書至非不致諱而没之也父母在而歸寧惟出姜得其節故書其正以見其不正焉泉水載馳之詩婦人内不忘其宗國而外能止於禮義是以嫌疑之隙無自而萌而廉恥之心油然常存而不亡魯之亂始於不能正家家道不正常自歸寧始春秋書變事不書常事夫人歸寧常事也宜所不書而不一書則終無以著其正故以出姜一見法焉趙氏鵬飛曰文姜哀姜之出託曰享曰㑹其實淫奔焉則反也何辭以告廟宜其不至焉今出姜之如齊雖曰不安於魯而歸謀於父母其實歸寧而已出而歸寧反而告廟於義無愆故告至而書於䇿春秋因而書之以見出之有善惡而至有告不告也也家氏鉉翁曰姜氏始歸於魯不氏不書夫人至貶今歸寧於齊書夫人姜氏如齊書夫人姜氏至自齊始正其夫人之體旣貶之於前復正之於後皆所以垂法也夫人與國君儷體其出其至皆書辨上下之分示衆妾不與夫人等因歸寧而見義非為歸寜而得書也文公無正家之法彊臣僭妾比而為姦庶子奪嫡有萌而不悟春秋特書以正之吳氏澂曰婦人無外事禮合歸寧不得已而出亦以其得至國為喜也未至以前詎敢以為安乎彼非禮而行者固奚恤其危哉故不書至也如汪氏克寛曰文姜享齊侯者一㑹者五如齊者三齊師者一如莒者二皆淫姣之行不書至者天倫泯滅人欲肆行不可以言至也晉人殺其大夫士縠及箕鄭父左傳三月甲戌晉人殺箕鄭父士縠蒯得榖梁稱人以殺誅有罪也鄭父累也集說杜氏預曰梁益耳蒯得不書皆非卿鄭劉氏敞曰其言及箕鄭父何以罪及之也箕父士縠之厚也凡及之志皆譏也不孫氏覺曰春秋殺大夫例有殺兩大夫三大夫而相及者蓋其罪無所累而見殺之迹同不可以及言也殺兩大夫而言及者惟三例耳公子瑕見立於元咺咺死則公子瑕死瑕見殺於元咺故曰及公子瑕也晉之士縠箕鄭父陳之慶虎慶寅傳載之不詳然考之經意蓋皆累而及之者也案夷之蒐在襄公末年而陽處父先克之殺在靈公初立之際陽處父舉趙而抑射姑則射姑殺處父先克舉狐趙而抑先都等則先都等殺先克主少國疑彊臣専横未有甚於此時者也人臣持公論進賢退不肖而不肖者輙敢以刅加之國家之亂孰大於此故經於處父則稱國以殺而蒙以累上之辭於先都士縠箕鄭父則稱人以殺而列在討罪之例書法甚明而胡𫝊謂稱人以殺為國亂無政而衆人擅殺則非也經書他國殺大夫者皆稱國而惟此三人稱人其為討罪之辭無疑矣若以為國亂無政則見殺者亦當不書名如宋之大夫司馬矣胡氏又以箕鄭父書及為罪當末减此亦不然蓋及者原其事之本末非論其罪之輕重也今故不録胡傳楚人伐鄭公子遂會晉人宋人衛人許人救鄭左傳范山言於楚子曰晉君少不在諸侯北方可圖也楚子師於狼淵以伐鄭囚公子堅公子尨及樂耳鄭及楚平公子遂㑹晉趙盾宋華耦衛孔逹許大夫救鄭不及楚師卿不書緩也以懲不恪狼淵杜注潁川潁隂縣有狼陂寰宇記謂之狼溝潁隂即今河南開封府許州胡傳案左氏范山言於楚子曰晉君少不在諸侯北方可圖也楚子師於狼淵以伐鄭則是貪得無故憑陵列國之兵也故楚子親將貶而稱人晉宋衛則趙盾華孔皆國卿也何以貶而稱人救而不及楚師欲以懲不恪也晉主夏盟不在諸侯以啟戎心誰之過乎故書救而稱人以罪趙盾之不能折衝消患也集說孫氏復曰楚復彊也楚自城濮之敗不敢加兵於鄭今伐鄭者晉文既死覇國不振故也杜氏諤曰獨稱公子遂之名者俾後世知稱人皆大夫矣諸國稱人亦所以人公子遂也陳氏傅良曰大夫貶而稱人晉遂不競而楚莊伯也之張氏洽曰楚自城濮以來不得志於天下其君臣心實未嘗一日忘也趙盾為政欲攘楚而大芘列國正當力攘其始以振覇國之威乃視為常役而緩不及事師及鄭而楚已囚鄭公子而去豈奉天討拯焚溺之舉哉八李氏廉曰列國之救鄭凡四齊桓救於莊之二十年晋景救於成之六年七年及此年之救皆以楚故也楚自城濮以來十五年不敢窺諸國者以文襄之烈尚存也今狼淵之師正其嘗試之時而趙盾不能防微杜漸故使之得志於鄭得志於陳明年而有厥貉之次矣陳氏云晉遂不競而楚莊伯也春秋重貶之志楚莊伯事之權輿歟夏狄侵齊集說髙氏閌曰晋宗諸侯而兵不禦楚齊僅自保而力不支狄夫狄不侵齊五年矣今復肆其彊則桓文之緒可謂衰矣故張氏洽曰楚得氣去而狄交侵矣書以病晉也附録左傳夏楚侵陳克壺丘以其服於晉也公秋楚公子朱自東夷伐陳陳人敗之獲子茷陳懼乃及楚平壺丘陳邑當在今開封府陳州南境秋八月曹伯襄卒九月癸酉地震公羊地震者何動地也何以書記異也榖梁震動也集說何氏休曰天動地静者常也地動者象隂為陽行是時魯文公制於公子遂齊晉失道四方叛徳星孛之萌自此而作故下與北斗之變所感同也孔氏穎逹曰榖梁𫝊曰震動也公羊𫝊曰震者何動地也何休云𫝊先言動者喻若物之動地以曉人也孔晁云陽氣伏於隂下見廹於隂故不能升以至於地動震孫氏覺曰後世之為史者其記地震之異必曰地於某然春秋曰地震焉不曰於某也蓋聖人之意曰地當静而反動則天下之静者必有反其常者矣地一震動則其異應於天下不止於一方安得曰於某也春秋記地震者五未嘗曰於某蓋聖人之意欲表其異於天下也明矣王氏葆曰春秋五書地震惟於文襄昭哀見之皆陽㣲隂盛君弱臣強之所致文公怠惰政在大夫襄公外役於彊楚内脅於彊臣至反國而不敢入若昭哀則遂失國矣至任氏公輔曰前此百餘年未有書地震者而自此哀公書地震者五地道以静為體安以承天者也逆其常理而不得節焉則震而不安其所承矣於此見諸侯變而不承天子大夫變而不承諸侯之象也鳯黄氏仲炎曰震動也或謂震者戰而非動如漢天三年詔云地有動有震震者有害動者不害是震與動異也曰非也動甚為戰戰生於動爾豈可岐而二之哉若李氏亷曰周語伯陽父曰夫天地之氣不失其序過其序民之亂也陽伏而不能出隂遁而不能烝於是有地震張氏曰隂盛陽㣲之異也胡氏獨闕此條解不知通何例冬楚子使椒來聘椒榖作萩見楚君臣始竝經左傳冬楚子越椒來聘執幣傲叔仲恵伯曰是必滅若敖氏之宗傲其先君神弗福也胡傳楚僭稱王春秋之始獨以號舉中間來聘改而書人漸進之矣至是其君書爵其臣書名而稱使遂與諸侯比者義安在乎春秋立法謹嚴而宅心忠恕嚴於立法故僣號稱王則深加貶黜恕以宅心故思善悔過則進之而不拒此慎用刑重絶人之意也噫春秋之為春秋非聖人莫能修之者乎集說陸氏淳曰公羊云椒者何楚大夫也楚無大夫此何以書始有大夫也案例凡未命之卿來魯皆書名無他義又曰榖梁云楚無大夫其曰萩何也以其來我襃之也聖人設敎豈以來我則襃之孫氏復曰楚子執宋公伐宋復貶稱人者二十年至此稱爵者以其慕義使椒再來修聘進之也椒楚大夫未命故不氏常蘇氏轍曰楚自僖公以來雖交通諸侯而朝聘不盟㑹不繼故書其君臣皆曰人而已至是齊晉日衰楚人接迹於列國於是書其君臣與諸侯比然椒猶不氏蓋漸進之也張氏洽曰伐鄭而聘魯亦逺交近攻之意也是李氏廉曰晉文襄之盛秦楚未嘗得以爵通也至椒聘書子術聘書伯雖曰能聘而列國之無伯亦可見矣予汪氏克寛曰熊惲商臣負覆載不容之惡而春秋其慕義蓋録其一節之善所謂與其潔也不保其往也或謂春秋書荆楚來聘始書人次書君臣繼書大夫之名氏非漸進之也實以著其浸彊耳今考莊二十三年荆人來聘之先敗蔡虜蔡侯入蔡伐鄭來聘之後終莊公之世僅一伐鄭椒聘之先滅江滅六椒聘之後雖次厥貉而伐麇圍巢終文公之世其患未及於列國則非因來聘而浸彊矣然則經書人書君大夫亦與其能以禮義自通而進之耳薳罷之聘則魯既朝楚楚遂報聘全用諸侯之禮然書名書氏則自嬰齊會蜀而已然矣案楚君書爵楚臣書名先儒皆謂春秋予其慕義而穀梁襃之之說陸氏淳不以為然者蓋楚能以禮交諸侯則進之乃樂與人為善之意非因其來魯而襃之也故當從陸氏秦人來歸僖公成風之襚襚音遂左傳秦人來歸僖公成風之襚禮也諸侯相弔賀也雖不當事苟有禮焉書也以無忘舊好榖梁秦人弗夫人也即外之弗夫人而見正焉胡傳秦人歸襚而曰僖公成風者非兼襚也亦猶平王來賵仲子而謂之恵公仲子爾仲子恵公之妾也然則風氏亦莊公之妾曷不書曰來歸莊公成風之襚乎曰寵愛仲子以妾為妻者恵公也故書恵公仲子所以正後世為人夫者當明夫道不可亂嫡妾之分以卑其身尊崇風氏立為夫人者僖公也故書僖公成風所以正後世之為人子者當明子道不可行僭亂之禮以賤其父聖人垂戒之義明矣集說杜氏預曰衣服曰襚秦辟陋故不稱使者孫氏復曰秦人來歸禧公成風之襚正也書以見周室陵遲典禮錯亂秦人之不若也案四年十有一月壬寅夫人風氏薨五年春王正月王使榮叔歸含且賵三月辛亥葬我小君成風王使召伯來㑹葬此年秦人來歸僖公成風之襚不及事也其言正者妾母稱夫人非正也妾母稱夫人自僖公始天子不能正而秦人能之故曰秦人來歸僖公成風之襚劉氏敞曰其言僖公成風何母以子貴母以子貴則何以不稱夫人不與得稱夫人也曷為不與得稱夫人為父後者為妾母無服以尊者為一體不得遂也又曰杜云追贈僖公并及成風非也僖公成風即妾母繫子而言耳諸侯無二嫡故妾母繋子為重所謂母以子貴者也又曰公羊曰兼之非禮也非也僖公成風猶惠公仲子耳若以謂兩人者豈可叙母於子下哉禮曰婦人三從是謂婦人無専行耳如遂令母在子下不可謂知禮夫孫氏覺曰成風以妾母僭稱夫人書薨書葬皆用人之禮於是秦人歸襚聖人正其法曰僖公成風猶曰成風之所以為夫人以僖公之失禮也程子曰過時始至故曰來歸雖子母先君後夫人體當然也始蘇氏轍曰魯之喪諸侯蓋有來襚者矣而獨書秦通也秦人秦之㣲者也襚衣服也僖公成風之喪久矣而不以緩為譏者亦以其始通録之也成風之不稱夫人何也非薨非𦵏名有所不必盡也襚髙氏閌曰秦晉方不睦而鲁數與晉通故秦人歸以觀魯之情也朱子曰恵公仲子想是恵公之妾僖公成風却是僖公之母不可一例論張氏洽曰是時秦楚交病列國秦欲伐晉而歸襚於鲁猶楚欲圖北方而來聘也國鄭氏玉曰成風薨葬聖人以魯之臣子不敢違其制皆以夫人書之此因史之舊及秦人歸襚始書曰僖公成風所以正嫡妾之分眀其夫人之非也此修春秋之文也聖人筆削可見矣與荆人來聘同李氏亷曰秦稱人而不稱使書法季氏本曰秦與晉為讎知鲁善於晉恐為之合諸侯故尋㑹温舊好以結魯耳眀年伐晉非逺交近攻之計歟十二年使術來聘而尋有河曲之戰亦此意也葬曹共公甲頃王辰二年十年晉靈四年齊昭十六年衛成十八年蔡莊二十九年鄭穆十一年曹文公夀元年陳共十五年把桓二十年宋昭三年秦康四年楚穆九年春王三月辛卯臧孫辰卒集說張氏洽曰文仲魯之名大夫也知柳下恵之賢而不與立自莊公末已與聞國政而四十餘年間魯政多疵文公尤甚為汪氏克寛曰哀伯之孫文仲也其子許嗣大夫是為宣叔夏秦伐晉左傳春晉人伐秦取少梁夏秦伯伐晉取北徵少梁杜注馮翊夏陽縣今陜西西安府韓城縣南二十里有少梁城北徵路史北徴古國漢置徵縣今陜西西安府澄城縣西南二十一里有北徵古城胡傳説者謂秦伐晉蓋闕文者據左氏少梁北徵之師兩國相攻無他得失言之也然晉取少梁事不經見固未可據程氏以謂晉舍適嗣而外求君罪也旣而悔之正矣秦不顧義理是非惟以報復為事以此黜秦義固然矣或者猶有深許晉人悔過能改終不遂非之意故重貶秦伯以見乎集說孫氏復曰晉自令狐之戰不出師者三年其厭戰之心亦可見也而秦不顧人命見利而動又起此役故曰秦伐晉以黜之但孫氏覺曰以其易世相讎交攻不已故不稱其人曰秦以黜之陳氏傅良曰自滅庸以後秦為楚役自晉主諸夏之盟舍秦無加兵於晉者也㑹于夷儀之歲秦晉成而不結又明年盟于宋而南北之勢成楚子曰釋齊秦他國請相見也是戰國之萌也於次國風退秦於魏唐之後於序書繫秦於周末於作春秋由韓原之後秦師無君大夫皆夫子所以深致意於秦也案秦伐晉以號舉先儒多以為罪秦者此不易之定論也夫秦晉互相侵伐而經獨罪秦何耶晉為盟主尊周攘楚天下頼焉城濮之戰秦實輔之既而背盟以結鄭又襲鄭而滅滑是釁起自秦也殽之役則方伯之職所不容已者乃因是相讎連兵不已且結楚以為援而向之輔晉以攘楚者今且附楚以謀晉矣秦晉之釁深而晉人力疲於西陲秦楚之交合而楚人逞志於南服以致陳蔡鄭許震懾相從江蓼庸蕭滅亡相繼晉之所以不競而楚之所以終彊者秦為之也春秋所以獨罪秦也蘇氏轍家氏鉉翁王氏樵皆主闕文之說而黄氏仲炎尤暢言之謂此年秦伐晉成三年鄭伐許昭十二年晉伐鮮虞皆脫人字以夏五闕月為比似亦有理楚殺其大夫宜申左傳初范巫矞似謂成王與子玉子西曰三君皆將强死城濮之役王思之故使止子玉曰毋死不及止子西子西縊而縣絶王使適至遂止之使為商公沿漢泝江將入郢王在渚宫下見之懼而辭曰臣免於死又有讒言謂臣將逃臣歸死於司敗也王使為工尹又與子家謀弑穆王穆王聞之五月殺鬬宜申及仲歸商杜注楚邑上雒商縣隋改商州今屬陜西西安府胡傳案左氏宜申與仲歸謀弑穆王而誅則是討弑君之賊也曷為稱國以殺又書其官而不曰楚人殺宜申乎曰穆王者即楚世子商臣也而春秋之義微矣集說劉氏敞曰稱國以殺大夫者罪累上也宜申之罪奈何宜申之為人臣也出則亡其衆處則亂其命足以殺其身而已矣商家氏鉉翁曰宜申謀弑穆王而稱國以殺何哉蓋臣之罪楚人皆得討之宜申於楚成為弟安知不為先君討賊以死故春秋不以無將罪之吳氏澂曰商臣弑君父天地所不容宜申為工尹不能與同列共謀討賊乃北面事之越十年君臣之分已定而乃謀弑其義不足稱也然其謀不遂而身見戮聖人不以其當受今將之誅而以國殺大夫為文其意深矣自正月不雨至于秋七月榖梁歴時而言不雨文不閔雨也不閔雨者無志乎民也集說汪氏克寛曰正月之上不繫王者蓋毎歲之首必書王所以著一歲十二月皆承天子之正朔故此年及十三年總書不雨但紀月數而已非若歲首正月之比也聖人書法各有微意游夏不能贊一辭謂此類也或者猶以桓公之正月不書王為闕文豈未深考耶及蘇子盟于女栗女栗杜注地名闕左傳秋七月及蘇子盟于女栗頃王立故也集說杜氏預曰蘇子周卿士王新立故與魯盟親諸侯僖十年蘓子奔衛今復見蓋王復之趙氏匡曰公及之也不書公諱獨與天子大夫盟是陸氏淳曰畿内諸侯皆曰子殷制已然箕子微子也周因之王臣稱子皆畿内諸侯也蘇子劉子單子尹子是也劉氏敞曰孰及之公也公則曷為不言公不與公盟也曷為不與公盟古者内諸侯不外交外諸侯不内交有至尊在不貳之也王氏葆曰不書公諱與王臣盟也襄王喪𦵏公未嘗往頃王既立公又不朝乃及王臣為不相信之盟臣子之義安在哉家氏鉉翁曰頃王即位諸侯莫有朝京師者王命蘇子盟魯文公儻知事君之道辭不敢盟躬覲於京師而請職事焉可也今及蘇子盟不恭甚矣春秋雖為魯諱而貶魯之意深矣或疑蘇子外交夫蘇子乃流離困躓之人何有於外此實王使之盟耳秋金氏賢曰蘇子王卿士也蘇子之來王使之也春不書使而書及為王諱也春秋何諱乎王蓋頃王初立不能修明王度以朝諸侯而乃使大夫盟辱也故諱而書及及者我所欲也若魯及之耳然不書公及者為公諱也公不能恪共臣職朝於京師而乃盟其王臣罪也故諱之而天王之不王魯侯之不臣槩可見矣冬狄侵宋集說髙氏閌曰狄侵諸大國獨宋未爾自宋亂之後狄既侵之楚次厥貉又將來伐則國幾亡矣楚子蔡侯次于厥貉厥公作屈音同貉音麥城厥貉杜注地闕當在陳州項縣左傳陳侯鄭伯㑹楚子於息冬遂及蔡侯次于厥貉將以伐宋宋華御事曰楚欲弱我也先為之弱乎何必使誘我我實不能民何罪乃逆楚子勞且聽命遂道以田孟諸宋公為右盂鄭伯為左盂期思公復遂為右司馬子朱及文之無畏為左司馬命夙駕載燧宋公違命無畏抶其僕以徇或謂子舟曰國君不可戮也子舟曰當官而行何彊之有詩曰剛亦不吐柔亦不茹毋縱詭隨以謹罔極是亦非辟彊也敢愛死以亂官乎厥貉之㑹麇子逃歸孟諸杜注宋大藪也在梁國睢陽縣東北今河南歸德府商丘縣東北有孟諸澤虞城縣北有孟諸臺漢期思杜注弋陽期思縣案期思古蔣國楚滅之置縣屬汝南郡隋屬光州兵亂後廢今在固始縣西北七十里胡傳楚滅江六平陳與鄭於是乎為伐宋之舉次于厥貉凡伐而次者其次為善次而伐者其次為貶齊師次陘脩文告以威敵善之也故上書伐楚以著其美楚次厥貉藏禍心以憑夏貶之也故下書伐麇以著其罪當是時陳鄭宋皆從楚矣獨書蔡侯何哉鄭失三大夫俟救而不及陳獲公子茷而懼宋方有狄難蓋有不得已者非所欲也蔡無四境之虞則是得已不已志在從楚矣故削三國書蔡侯見其棄諸夏之惡也集說杜氏諤曰序楚子於蔡侯之上者蔡與楚比周欲同力伐宋故序於楚下以疾其受制於楚所以示譏也既譏之又書其爵者斥言蔡侯以罪其人也旣言蔡侯則不可言楚人矣孫氏覺曰厥貉之次遂稱楚子而眀年伐麇又以爵書自是楚益强矣蘇氏轍曰將伐宋而不行故書次髙氏閌曰楚子者弑父與君之賊將求諸侯恐諸侯疑貳欲前而未敢而宋陳鄭之君乃皆俛首而聽命焉聖人於此不從諸侯㑹盟之例特書曰楚子蔡侯次于厥貉次者遲疑不前之意著楚子包藏禍心欲憑陵諸夏而未敢遽前也唯蔡侯首附楚故表而出之以均其罪厥後諸侯同盟于新城非若蔡侯之堅服楚也則此獨書蔡侯其旨深矣之陳氏傅良曰外㑹未有言次者此其言次何以楚圖伯而未集也晉雖不競君大夫數㑹而不序春秋重絶晉也㑹于息宋陳鄭嘗從楚矣已而為新城之盟則楚子猶未得志於宋陳鄭也於是息㑹不書書及蔡次厥貉用見楚之未得志於諸侯也家氏鉉翁曰是役也宋鄭陳蔡皆從宋鄭陳預㑹不預次也預㑹脅從也預次同惡也推李氏亷曰春秋書伐而次者伐楚次陘是也以例之則晉悼之伐鄭次鄭亦為善之矣次而伐者次厥貉伐麇是也以例推之則齊衛之次以伐晉亦為貶之矣宋陳鄭不書之說胡氏陳氏皆得之以下文沓棐之㑹新城之盟觀之則諸侯之不忘晉可知矣故免其從楚之罪也楚自盂以來未嘗以爵書今次而書爵伐而書爵蓋時無伯者以為無異於宋襄之時也原黄氏正憲曰前年楚子使鬬椒來聘専為通道中以便北侵之計故親自浮漢江東下陳鄭蔡則皆經歴之地也厥貉雖無明據意必在蔡之西北宋之東南界楚欲窺中原必至之地也越此則歴宋都而楚亦不敢深入矣乙頃王巳三年十有一年晉靈五年齊昭十七年衛成十九年蔡莊三十年鄭穆十二年曹文二年陳共十六年把桓二十一年宋昭四年秦康五年楚穆十年春楚子伐麇麇俱倫反公作圈楚始書君將左傳十一年春楚子伐麇成大心敗麇師於防渚潘崇復伐麇至於錫穴防渚杜注麇地闞駰曰防即防陵也今為房縣屬湖廣鄖陽府錫穴杜注麇地漢錫縣屬漢中郡師古曰卽春秋錫穴也隋唐宋皆屬均州明成化中始為鄖陽府治今因之集說許氏翰曰楚侵伐書爵始此名髙氏閌曰自㑹蜀之後雖其大夫帥師亦出氏蓋聖人悼列國無盟主也麇張氏洽曰楚侵伐書子益彊盛也右家氏鉉翁曰微國也恥從孟諸之田宋鄭分左盂而不恥楚之伐麇之榮也與李氏亷曰傳言麇子逃歸而經不書以其逃楚也陳鄭之逃齊晉異矣楚季氏本曰楚不得志於天下則伐其近國而已近小國伐未有書者必不服而後書見麇能自守也於賀氏仲軾曰厥貉之役宋陳鄭以大國公侯受役楚司馬麇子何有焉然麇子逃歸是知恥之君也逃必受伐麇子知之矣知其必伐而猶然逃之者是麇之君不可以無禮加也麇之國不大於蔡然楚子伐之一敗於防渚再廹於錫穴而終不聞與楚成者是不可以威劫也小國之臣服於楚未必皆本心介於彊暴而莫之或恤不為蔡許則為江黄耳彼江黄皆以慕義而召亡者也以此言之為麇子者豈不難哉聖人亟嘉守義而不屈者故書曰楚子伐麇以彊楚之君親暴兵焉見麇為楚所注意之國而不敢輕也夏叔仲彭生會晉郤缺于承筐公穀無仲字郤去逆反筐公榖作匡此大夫特相會之始府承筐杜注宋地在陳留襄邑縣今河南歸徳睢州西三十里有故承筐城左傳夏叔仲恵伯㑹晉郤缺于承筐謀諸侯之從於楚者集說杜氏預曰惠伯叔牙孫矣杜氏諤曰自文公之後大夫擅相為㑹者多春秋詳而志之王氏葆曰此㑹謀諸侯之從楚未為非義然大夫交為㑹禮以謀國事諸侯之政大夫擅之矣家氏鉉翁曰郤缺為會諸侯之大夫莫有至者魯獨遣彭生如會不以楚彊替於從晉春秋亦襃魯也李氏亷曰内大夫特㑹外大夫五㑹郤缺承筐髙固無婁荀首于縠士匄于柯荀躒適歴是也此為大夫特相㑹之始胡氏於此無傳而特發傳於無婁之下不知其意若何得非以此為伯令而所謀亦出於公歟汪氏克寛曰晉欲謀貳國而使次卿為會魯亦不遣執政而使恵伯往其謀之不遠而不足以却遠人方張之勢也審矣然新城之盟宋陳鄭皆同則人心之天理未冺而承筐之㑹猶愈於歸父于宋之會也秋曹伯來朝左傳秋曹文公來朝即位而來見也集說趙氏鵬飛曰諸侯世相朝禮也曹文公即位而來朝常事爾春秋不書常事此其書何蓋春秋諸侯以彊弱為判不復顧禮矣聞曹文公即位而來朝未見魯文公即位而朝曹也此聖人書之所以傷曹之弱而抑魯之彊歟而趙氏與權曰曹為文昭於魯宗國習見王命之廢惴惴依大國以為重也季氏本曰曹本服宋自晉文執曹共公以畀宋人不得已而從晉及襄靈政衰遂不與諸侯之事共公既没文公自此從魯矣公子遂如宋左傳襄仲聘于宋且言司城蕩意諸而復之因賀楚師之不害也集說李氏亷曰魯聘宋者八始於北年狄侵齊集說髙氏閌曰十餘年之間狄四侵齊其彊如此所以大鹹之功也冬十月甲午叔孫得臣敗狄于鹹鹹杜注魯地左傳鄋瞞侵齊遂伐我公卜使叔孫得臣追之吉侯叔夏御莊叔緜房甥為右富父終甥駟乘冬十月甲午敗狄于鹹獲長狄僑如富父終甥摏其喉以戈殺之埋其首於子駒之門以命宣伯初宋武公之世鄋瞞伐宋司徒皇父帥師禦之耏班御皇父充石公子榖甥為右司寇牛父駟乘以敗狄於長丘獲長狄緣斯皇父之二子死焉宋公於是以門賞耏班使食其征謂之耏門晉之滅潞也獲僑如之弟焚如齊襄公之二年鄋瞞伐齊齊王子成父獲其弟榮如埋其首於周首之北門衞人獲其季弟簡如鄋瞞由是遂亡長丘杜注宋地今河南開封府封丘縣東有長丘亭周首杜注齊邑濟北穀城縣東北有周首亭水經注謂之盧子亭今在東阿縣東北近長清縣界公羊狄者何長狄也兄弟三人一者之齊一者之魯一者之晉其之齊者王子成父殺之其之魯者叔孫得臣殺之則未知其之晉者也其言敗何大之也其地何大之也何以書記異也榖梁傳曰長狄也弟兄三人佚宕列國瓦石不能害叔孫得臣最善射者也射其目身横九畝斷其首而載之眉見於軾其之齊者王子成父殺之則未知其之晉者也集說杜氏預曰鄋瞞狄國名防風之後漆姓當趙氏匡曰穀梁云以衆焉言之也若如所說云敗長狄于鹹今直云狄則舉狄軍總敗耳人劉氏敞曰穀梁云不言帥師而曰敗何也直敗一之辭也非也不言帥師者師少爾有何可疑哉又曰何為不言其獲古者不重創不禽二毛故不言獲為内諱也云魯旣射其目又斷其首是以諱之亦非也穀梁本意謂長狄一人力足敵衆故變獲言敗者起長狄之彊也旣變獲言敗敗即獲矣又安得不言獲為魯諱之說乎孫氏覺曰不曰戰者内勝之辭也不言帥師將尊而師少也于趙氏鵬飛曰狄自僖之末侵陵列國至晉人敗之箕其後侵齊侵魯侵宋而不敢犯晉之牧圉敗之之力也今八年之間三侵齊而侵魯宋者各一其可不有以制之哉叔孫得臣出其不虞而敗之于鹹自是蓋有懼心惟十三年一侵衛而已不敢窺齊魯之藩籬也則鹹之役不惟有功於魯且有功於天下不可不錄也自家氏鉉翁曰得臣敗狄春秋嘉之蓋魯之弱由無彊之志求援齊晉折節於楚積弱至此中間一二能臣亦足警彊鄰而威外侮如長勺之戰鹹之師是也案左傳先言敗狄于鹹後言獲長狄僑如蓋以長狄為狄中一人非以長狄為國號也胡傳用劉氏敞正名之說駁之似未得傳意公榖亦因左氏之意而推衍之耳其言雖怪必有所受今竝存三傳之說而駁者無取焉丙頃王午四年十有二年晉靈六年齊昭十八年衛成二十年蔡莊三十一年鄭穆十三年曹文三年陳共十七年把桓二十二年宋昭五年秦康六年楚穆十一年春王正月郕伯來奔郕公作盛左傳郕太子朱儒自安於夫鍾國人弗徇十二年春郕伯卒郕人立君太子以夫鍾與郕邽來奔夫鍾杜注郕邑郕邽杜注郕邑集說趙氏匡曰諸侯嗣位未踰年稱子豈有君父病而不視死而不喪身未卽位以邑出奔而稱郕伯且鄭忽曹羈莒展皆已卽位及其出奔猶但稱名况未嗣位乎左氏之說非也失地之君例書名若以兄弟之國不名曹伯陽衛侯衎何以書乎公羊之說亦非也劉氏敞曰左氏曰郕太子以夫鍾與郕邽來奔公以諸侯逆之故書曰郕伯來奔不書地尊諸侯也皆非也卽實郕伯來奔又何以辨哉且魯但以諸侯逆之便謂之郕伯春秋又遂没其専土叛君之罪反謂之諸侯而尊之則何以稱不登叛人哉意者先郕伯以去年卒太子即位而不能自安遂出奔此乃眞郕伯矣以其即位日淺或謂之太子而左氏則誤以為太子出奔也郕葉氏夢得曰郕伯何以不名内未有君也何以知之内無君歟衛侯鄭附楚晉文公興懼討使元咺立其弟叔武而奔楚叔武不當國而攝馬春秋不名鄭書衛侯出奔楚不嫌也踐土之盟叔武亦書子而不以爵見不君之也凡諸侯奔而不名惟此兩見以類求之吾是以知其然也汪氏克寛曰左傳謂郕太子朱儒稱郕伯晉太子州蒲稱晉侯今考許叔入許不稱許男衛武盟踐土止稱衛子安有竊地之臣子而子之以爵君在而世子擅其位亦予之以其君之尊稱者哉苟以太子而稱爵則子般子野之卒皆當書公薨而蔡世子有當書蔡侯矣春秋辨名分之書若曰因其悖禮從而志之則呉楚可以書王而不革也把伯來朝左傳把桓公來朝始朝公也且請絶叔姬而無絶昏公許之集說范氏甯曰僖二十七年稱子今稱伯蓋時王所進二月庚子子叔姬卒左傳二月叔姬卒不言把絶也書叔姬言非女也公羊此未適人何以卒許嫁矣婦人許嫁字而笄之死則以成人之喪治之榖梁許嫁以卒之也男子二十而冠冠而列丈夫三十而娶女子十五而許嫁二十而嫁集說李氏亷曰陳氏云已許嫁於把把伯來朝請絶叔姬復求其次此說通汪氏克寛曰二𫝊以書子為同母妹然十四年再書子叔姬苟皆同母不當同字矣案莊二十五年伯姬歸于把二十七年公㑹把伯姬于洮冬把伯姬來僖五年春把伯姬來朝其子九年秋伯姬卒蓋别一伯姬二十三年冬把子卒二十七年春杞子來朝則嗣君也二十八年秋把伯姬求三十有一年冬把伯姬來求婦文十二年春王正月把伯來朝二月庚子子叔姬卒與僖九年所書伯姬同亦似别一叔姬而非伯姬所求之婦自是又二十餘年至成五年春把叔姬來歸八年冬十月杞叔姬卒九年春把伯來逆叔姬之喪以歸此三書叔姬疑即伯姬所求之婦也左氏因把伯來朝與子叔姬卒相連遂以叔姬為伯姬所求之婦以不繫把為出而見絶又因成五年把叔姬來歸八年把叔姬卒九年把伯來逆叔姬之喪遂謂把伯請絶叔姬而無絶昏而成八年書卒之叔姬即把桓所請續為昏者未免牽合然春秋事據左氏且相沿已久今仍存之若啖氏助劉氏敞謂此傳大誤當在成公八年季氏本謂把伯姬之誤則皆憑虚臆揣罔有確據未可以疑經而廢傳也稱子之義諸家不同或以為先君之女或以為時君之女皆非也伯姬以莊公二十五年歸把至僖公時則先君之女也何以五年朝其子三十一年來求婦俱不稱子耶季姬及鄫子遇于防先儒譏僖公愛女之過則時君之女也何以書歸書卒俱不稱子耶揆以全經未為允恊故刪而不録夏楚人圍巢巢杜注呉楚間小國廬江六縣有居巢城今江南廬州府巢城西巢湖寰宇記云古居巢城陷處左傳楚令尹大孫伯卒成嘉為令尹羣舒叛楚夏子孔執舒子平及宗子遂圍巢羣舒杜注偃姓舒庸舒鳩之屬廬江南有舒城西南有龍舒案今江南廬州府舒城廬江二縣之境皆羣舒地也集說髙氏閌曰書稱巢伯來朝則巢之建國乆矣楚遂取之為屬邑後為吳所滅王氏葆曰王道之行小國各安其職而貢獻於天子及其衰也小國困於彊暴不得保其社稷者多矣書者惡楚之不仁而小國之無所庇頼也諸趙氏鵬飛曰巢之為國遠矣書曰巢伯來朝蓋古侯也前日楚伐麇列國不能救於是又圍巢諸侯鼠拱折縮無敢犯其鋒者於是恣毒於小國焉列國無覇主諸侯何恃哉十四年趙盾為新城之盟諸侯不得已而從之非畏晉也畏楚也季氏本曰巢與舒接壤圍巢則巢服而羣舒服矣秋滕子來朝左傳秋滕昭公來朝亦始朝公也集說汪氏克寛曰曹文把桓滕昭相繼來朝傳皆謂公即位而始朝以文公之昏庸怠惰而儒書秉禮之舊周公禽父之澤猶為諸侯之所尊敬文公乃不思述職之有闕已越再朝之期而不修往覲之禮於京師何謬之甚哉矣季氏本曰滕自宣公見執於宋而從之十六年昭公嗣立復朝魯宋亂不暇爭也秦伯使術來聘術公作遂左傳秦伯使西乞術來聘且言將伐晉襄仲辭玉曰君不忘先君之好照臨魯國鎭撫其社稷重之以大器寡君敢辭玉對曰不腆敝器不足辭也主人三辭賔荅曰寡君願徼福於周公魯公以事君不腆先君之敝器使下臣致諸執事以為瑞節要結好命所以藉寡君之命結二國之好是以敢致之襄仲曰不有君子其能國乎國無陋矣厚賄之集說陸氏淳曰公羊曰遂者何秦大夫也秦無大夫此何以書賢繆公也何賢乎繆公以為能變也案例外大夫來魯未命者皆書名無他義也已前秦未嘗使大夫來故不書爾髙氏閌曰前此來歸僖公成風之襚蓋將來聘而以此先之也也王氏葆曰公羊以為賢繆公而不知遣術乃康公陳氏傅良曰自戰韓而後秦伯稱人此稱秦伯者以其能聘也張氏洽曰秦人以賄結魯而魯亦以厚賄荅之賔主相與以貨利而坐視伯主之受兵比事以書而自見矣趙氏鵬飛曰九年秦將伐晉則來歸僖公成風之襚今將為河曲之戰則有術之聘今汪氏克寛曰術不稱氏文定謂與楚子使椒一例考歸襚稱秦人而此年來聘稱君大夫是亦漸進之矣也陳氏際泰曰楚之見也文也則敗蔡始也秦之見穆也則戰韓始也皆驟見於經又驟彊也然秦穆賢矣故春秋多恕辭其來聘也楚一聘再聘君臣始竝見秦則無俟乎其再也此春秋輕重之權衡也冬十有二月戊午晉人秦人戰于河曲河曲杜注在河東蒲坂縣南今山西平陽府蒲州城外東南隅有蒲坂故城左傳秦為令狐之役故冬秦伯伐晉取羈馬晉人禦之趙盾將中軍荀林父佐之郤缺將上軍臾駢佐之欒盾將下軍胥甲佐之范無恤御戎以從秦師於河曲臾駢曰秦不能乆請深壘固軍以待之從之秦人欲戰秦伯謂士㑹曰若何而戰對曰趙氏新出其屬曰臾駢必實為此謀將以老我師也趙有側室曰穿晉君之壻也有寵而弱不在軍事好勇而狂且惡臾駢之佐上軍也若使輕者肆焉其可秦伯以璧祈戰於河十二月戊午秦軍掩晉上軍趙穿追之不及反怒曰裹糧坐甲固敵是求敵至不擊將何俟焉軍吏曰將有待也穿曰我不知謀將獨出乃以其屬出宣子曰秦獲穿也獲一卿矣秦以勝歸我何以報乃皆出戰交綏秦行人夜戒晉師曰兩君之士皆未憖也明日請相見也臾駢曰使者目動而言肆懼我也將遁矣薄諸河必敗之胥甲趙穿當軍門呼曰死傷未收而棄之不恵也不待期而薄人於險無勇也乃止秦師夜遁復侵晉入瑕羈馬杜注晉邑今山西平陽府蒲州南三十六里有羈馬城一名渉丘公羊此偏戰也何以不言師敗績敵也胡傳秦伯親將晉上卿趙盾禦之其稱人何為令狐之役故也秦納不正遂非積忿晉不謝秦潛師禦之是以暴兵連禍至此極也凡戰皆以主人及客者處已之道寡怨之方王者之事其不書晉及何也前年秦師來伐晉不言戰者晉已服矣今又為此役則秦曲甚矣故不以晉為主惟動大衆從秦師不奉詞令以止之也故貶而稱人此輕重之權衡也集說杜氏預曰不書敗績交綏而退不大崩也可孫氏復曰二國之讎既易世矣二國之戰固以已也而秦康晉靈猶尋舊怨殘民以逞是彰父之不徳也故孔子自令狐之戰不復名其將帥劉氏敞曰公羊曰曷為以水地河千里而一曲也非也河曲者亦地名耳豈謂千里一曲乎若千里一曲悉可名之河曲是三河之間無他地名直曰河曲而已不亦妄乎程子曰凡戰皆以主人及客秦曲故不云晉及以蘇氏轍曰秦伯伐晉取羈馬晉趙盾禦之皆稱人其亟戰罪之也張氏洽曰秦晉黷兵殘民其罪甚矣故秦伯趙盾皆以人書貶也而卓氏爾康曰自殽至此凡六交兵秦晉亟戰楚伯矣案殽之役秦不哀晉喪而伐其同姓晉未報秦施而伐其師故彼此有辭比者秦屢興師何義乎使晉疲於西而楚得乘間以剪小國病天下實秦為之也故春秋於其無名興師伐晉不已而一以號舉焉今河曲之戰秦晉俱稱人而不書晉及蓋以連兵構怨秦晉皆在所貶而秦曲為甚也榖梁以不書及為略之殊失經㫖季孫行父帥師城諸及鄆鄆公作運後同員鄆杜注城陽姑幕縣南有亭員即鄆也今山東青州府沂水縣北鄆城是案此為東鄆成四年城鄆為西鄆乃在東平州左傳城諸及鄆書時也榖梁稱帥師言有難也集說孫氏復曰帥師而城畏莒故也鄆莒鲁所爭者杜氏諤曰聖人重民力凡城築之事皆志之况出師而城乎勞民甚矣及胡氏銓曰春秋城築二十九獨三言帥師爾此年襄十五年季孫宿叔孫豹城成郛哀三年季孫斯叔孫州仇城啟陽是也帥師者欲因城而遂廣其疆界書此者以見非惟勞民以城又毒衆以爭也未張氏洽曰鄆鲁之東鄆莒魯爭鄆始於此前此莒嘗與魯有爭且未嘗有事於鄆今行父帥師城二邑以起爭端魯自此與莒有讎由鄆始呂氏大圭曰魯有二鄆成四年城鄆蓋近晉之邑故杜曰以備晉也此年城鄆蓋近莒之邑故杜曰莒魯之所爭者黄氏仲炎曰城其國邑宜無待於帥師也行父帥師以城諸鄆何也歉於義也案莊二十九年城諸及防則知諸魯地也襄十二年莒人伐我東鄙圍台季孫宿帥師救台遂入鄆則知鄆莒邑也莒邑而魯城之是城非其所有之地也城非其所有而慮莒必爭於是乎將兵以往焉故曰歉於義也黃氏震曰二邑近費而介於莒他年宿伐莒取鄆叔弓疆其田費於是始大然則此行父自為封殖之計也家氏鉉翁曰城一邑已為勞民今一朝城二邑其勞民為甚書城諸及鄆貶也春秋之法城非其時貶城非其制貶興兵以城尤在所貶李氏亷曰成九年楚公子嬰齊伐莒入鄆襄十二年季孫宿救台遂入鄆至昭元年取鄆其秋叔弓疆鄆田莒人愬晉者即此至昭二十五年齊侯取鄆以居公二十九年鄆潰此一鄆之始終也其成四年城鄆乃西鄆也陽汪氏克寛曰此一大夫將兵而城二邑成郛啟皆二卿將兵而城一邑其煩民尤甚矣丁頃王未五年十有三年晉靈七年齊昭十九年衛成二十一年蔡莊三十二年鄭穆十四年曹文四年陳共十八年把桓二十三年宋昭六年秦康七年楚穆十二年春王正月附録左傳十三年春晉侯使詹嘉處瑕以守桃林之塞桃林杜注在𢎞農華隂縣東潼闗地理通釋云自潼闗至函谷歴陜華二州之地俱謂之桃林塞今陜西華陰縣以東河南靈寳縣以西皆是也夏五月壬午陳侯朔卒集說趙氏鵬飛曰不書葬不㑹耳附録左傳晉人患秦之用士㑹也夏六卿相見於諸浮趙宣子曰随會在秦賈季在狄難日至矣若之何中行桓子曰請復賈季能外事且由舊勲郤成子曰賈季亂且罪大不如隨㑹能賤而有恥柔而不犯其知足使也且無罪乃使魏夀餘偽以魏叛者以誘士會執其帑於晉使夜逸請自歸於秦秦伯許之履士會之足於朝秦伯師於河西魏人在東夀餘曰請東人之能與夫二三有司言者吾與之先使士會士會辭曰晉人虎狼也若背其言臣死妻子為戮無益於君不可悔也秦伯曰若背其言所不歸爾帑者有如河乃行繞朝贈之以策曰子無謂秦無人吾謀適不用也既濟魏人譟而還秦人歸其帑其處者為劉氏諸浮杜注晉地邾子蘧蒢卒蘧其俱反蒢丈居反榖作蘧篨左傳邾文公卜遷於繹史曰利於民而不利於君邾子曰苟利於民孤之利也天生民而樹之君以利之也民既利矣孤必與焉左右曰命可長也君何弗為邾子曰命在養民死之短長時也民苟利矣遷也吉莫如之遂遷於繹五月邾文公卒君子曰知命繹杜注邾邑魯國鄒縣北有繹山今在山東兗州府鄒縣東南山陽有邾城集說孔氏穎達曰蘧蒢邾子瑣之子也莊二十九年即位自正月不雨至于秋七月集說陳氏岳曰凡旱為災多繋於夏竟夏不雨則為災如僖三年書六月雨則旱不竟夏不為災斯書正月不雨至秋七月夏在中為災可知苟亦曰夏大旱則嫌連春秋不雨苟備書三時不雨更曰大旱則文繁矣雨胡氏寧曰春秋書僖公三年正月不雨夏四月不六月雨全與文十三年自正月不雨至于秋七月文意不同事程氏端學曰文公時两遭亢旱其所以修民奉天時之道可知矣世室屋壞世左穀作大音泰左傳秋七月大室之屋壞書不共也公羊世室者何魯公之廟也周公稱大廟魯公稱世室羣公稱宫此魯公之廟也曷為謂之世室世室猶世室也世世不毁也周公何以稱太廟於魯封魯公以為周公也周公拜乎前魯公拜乎後曰生以養周公死以為周公主然則周公之魯乎曰不之魯也封魯公以為周公主然則周公曷為不之魯欲天下之一乎周也魯祭周公何以為牲周公用白牲魯公用騂犅羣公不毛魯祭周公何以為盛周公盛魯公燾羣公廪世室屋壊何以書譏何譏爾久不修也榖梁大室屋壊者有壊道也譏不修也大室猶世室也周公曰大廟伯禽曰太室羣公曰宫禮宗廟之事君親割夫人親舂敬之至也為社稷之主而先君之廟壊極稱之志不敬也胡傳世室魯公之廟也書世室屋壊譏久不脩也何以知久乎自正月不雨則無壊道也不雨凡七月而先君之廟壊不恭甚矣凡此皆志文公怠慢不謹事宗廟以致魯國衰削之由垂戒切矣集說杜氏預曰簡慢宗廟使至傾頽故書以見臣子之不恭范氏甯曰爾雅宮謂之室室謂之宮然則其實一也蓋尊伯禽而異其名室程子曰觀春秋中文公事宗廟最為不謹遂有世屋壊之變天人之際可不畏哉朝髙氏閌曰世室者人君所常有事焉者也公毎月之有司又當以時黝堊之豈有將壊而不知者且又無淫雨之災而其屋自壊則其不知省也乆矣胡氏寧曰居處猶欲完葺况宗廟乎此與莊公三築臺不雨築郿大無麥禾不同太室既壞必湏便修而春秋不書意可知矣世室始封之祖廟新宫成公之禰宫御廪粢盛之所藏皆當務也時不亟則譏緩制不備則譏略故更造而不書者雖用民力不可已也公黄氏仲炎曰書大室屋壊者明不當壊而壊也文怠禮荒政不足以承宗廟之祀或者隂譴所形乎唐明皇將幸東都而太廟屋壊宰相宋璟蘇頲以為三年喪未終不可廵幸壊壓之變天戒也請罷東廵修徳以荅至譴此即春秋書大室屋壊之義也趙氏鵬飛曰諸侯不毁之廟一而魯不毁之廟二諸侯五廟二昭二穆與太祖之廟而五昭穆迭毁而太祖之廟不毁成王封伯禽以為周公主則伯禽魯始封之祖也然伯禽之封實本於周公故魯不得不祀周公詩曰周公皇祖則魯葢祖周公矣祖廟不毁而始封之廟亦安可毁哉魯祖周公而宗伯禽故不毁之廟有二此其制不與諸侯同其稱謂亦異曰廟曰室曰宮以别之周公曰太廟禘于太廟是也伯禽曰太室太室屋壊是也諸公曰宮桓宮僖宮災是也禮曰祀周公于太廟又曰魯公之廟文世室也此說與春秋同則知魯宗廟之制異於諸侯也文公不告月不視朔何有宗廟故太室之祀有所不知焉聖人書之所以責文公者重矣吳氏􅊹曰世室伯禽之廟也周公封於魯留相王朝而不適魯使伯禽就封周公雖不適魯然實為魯之始祖故魯之太廟祀周公百世不毁伯禽雖代受封然上有周公為之父則不得為始祖其廟為昭之第一室親盡則毁諸侯之禮惟太廟不毁二昭二穆皆四世而遞遷周天子也周之王業自文武始故后稷居太廟文武廟謂之世室與太廟皆百世不毁此天子之禮非諸侯所得僭也成王賜魯重祭俾太廟得以天子之禮祀周公魯人以伯禽為始受封之君欲不毁其廟故以其廟為世室如周之文武以尊伯禽僭也文公怠慢乆不脩廟遂至屋壊聖人書之因見魯世室之非禮也世太二字通用故左穀誤世為太穀梁謂太室猶世室以為伯禽廟字雖誤而義與公羊同杜氏以為太廟之室諸儒多從之夫廟制中央一室謂之太室書洛誥記成王祭文王武王而曰王入太室祼彼文武廟亦有太室非太廟之室也且不早修廟以致屋壊謂一廟之屋盡壊也若果太廟屋壊當書太廟今書太室豈太廟之中前堂後寢左右夾室東西二廂皆不壊而惟中間一室獨壊也於義有不通矣李氏廉曰此條胡氏從公穀皆以為鲁公稱世室明堂位亦曰魯公之廟文世室也而習左氏者以為伯禽廟當舉號諡故以為太廟之室而曰此周公之廟也然春秋嘗書大事於太廟此則不書太廟而書太室故未可以為周公廟也汪氏克寛曰王制諸侯太祖之廟鄭氏以太祖為始封之君孔氏正義謂始封如齊太公之屬伯禽封於魯以奉周公之祀則周公實魯之始祖而伯禽乃始封之君故魯人權宜變禮而不祧魯公之主以為世室春秋志世室屋壊而不書新作世室則亦未可以為非禮也後世援例而立武宫又桓僖親盡不毁而說者且妄謂武宫亦稱世室則非禮矣案吳氏澂謂世太二字通用蓋如世子作太子世叔作太叔之類冬公如晉衛侯會公于沓會下公無公字沓杜注地闕集說吳氏澂曰公往朝晉衛侯要之於路而與公會于沓欲因公以請平於晉也黄氏正憲曰承筐之會公必以堅心事晉之意命彭生托冀缺矣於是親至晉國謀合諸侯而衛成南困於楚北偪於狄無所適從故久不出預盟會聞公適晉而至沓以會之求通晉也觀衛而列國之情可見矣狄侵衛集說趙氏鵬飛曰狄自鹹之敗銳鋒頻挫今復侵衛者衛偪於狄成公出㑹狄乘虛而侵之狄之窺伺其可忽乎十有二月已丑公及晉侯盟公還自晉鄭伯會公于棐還上公穀無公字棐芳尾反公作斐宛棐杜注鄭地即棐林路史開封宛陵有棐林林鄉陵故城今屬河南開封府新鄭縣縣東二十五里林鄉城是其地也左傳冬公如晉朝且尋盟衛侯㑹公于沓請平于晉公還鄭伯㑹公于棐亦請平于晉公皆成之鄭伯與公宴于棐子家賦鴻鴈季文子曰寡君未免於此文子賦四月子家賦載馳之四章文子賦采薇之四章鄭伯拜公荅拜公羊還者何善辭也何善爾往黨衛侯㑹公于沓至得與晉侯盟反黨鄭伯會公于棐故善之也集說杜氏預曰棐鄭地鄭衛貳於楚畏晉故因公請平髙氏閌曰凡言公及諸侯㑹者皆公往與之㑹也沓之㑹公已出魯而衛侯因公之將如晉而來㑹棐之㑹鄭伯因公還未至於魯而就㑹之故皆曰㑹公初衛鄭舍晉而從楚豈得已哉彊弱之勢不敵滅亡之徵可待姑為一時之計爾而晉未之察季文子相魯侯為之請成以紓兩國之患春秋善和難故詳誌之且見公一出而二國附如此惜乎其自怠也其趙氏鵬飛曰晉襄既没楚人伐鄭聘魯次于厥貉為謀深矣於是伐麇圍巢無復顧忌寖寖然兵及衛鄭故衛因公之如晉而㑹公于沓鄭因公之還自晉而㑹公于棐蓋謀晉之覇也然衛鄭不敢直附晉而問交於魯者蓋以魯深睦於晉而知晉之彊弱從違之計卜於魯焉故明年而遂為新城之盟此衛鄭所以會公之意也故三國皆無貶辭求李氏亷曰沓棐之會乃衛鄭不忘晉伯而介魯以通觀鴻雁載馳之賦其情可見矣文汪氏克寛曰諸侯將朝於天子而預相會禮也今公朝晉而往返會衛鄭之君非禮也然自叔仲恵伯會郤缺于承筐今公又會衛侯鄭伯于沓棐而明年新城之盟服楚之國皆棄異即同則輔伯之功魯亦不為無助於晉焉公羊以為春秋善之此聖人待衰世之意也戊頃王申六年十有四年晉靈八年齊昭二十年衛成二十二年蔡莊三十三年鄭穆十五年曹文五年陳靈公平國元年把桓二十四年宋昭七年秦康八年楚莊王旅元年春王正月附録左傳十四年春頃王崩周公閱與王孫蘇爭政故不赴凡崩薨不赴則不書禍福不告亦不書懲不敬也集說家氏鉉翁曰是歲頃王崩以不赴而不臨不賻不奔春秋不書著天下諸侯之無王也公至自晉集說髙氏閌曰公自去冬初如晉則因與衛會既盟晉而還則又因與鄭㑹久於道路而不朝正書至以見之位趙氏鵬飛曰行飲至之禮三汪氏克寛曰文公即至是十有三年而朝晉者過於事天子之禮故聖人於此書之特詳是後成公之世朝晉者四襄公之世朝晉者五昭公朝晉而屢不見納事覇益恭而益自辱矣邾人伐我南鄙叔彭生帥師伐邾集說趙氏鵬飛曰僖公之世疾於邾也深矣文公復修舊怨七年公伐邾取湏句又城郚以備之然十三年蘧蒢卒則邾復來赴邾之弱不敢為憾也至是公如晉踰年而反邾蓋伺魯之隙而伐我南鄙不知公之旣至也兵未反叔彭生帥師伐之其報怨速哉雖邾之小不宜犯大國而自取禍也然魯不取須句則邾亦未敢輕犯魯也至家氏鉉翁曰魯以七年伐邾取須句邾人不能報是興南鄙之師左氏乃謂邾人討魯往弔之不敬彼小國安敢責禮於大國亦修怨耳春秋聨書所以交致其責季氏本曰此即叔仲彭生也脫仲字耳夏五月乙亥齊侯潘卒左傳子叔姬妃齊昭公生舍叔姬無寵舍無威公子商人驟施於國而多聚士盡其家貸於公有司以繼之夏五月昭公卒舍即位集說孔氏穎達曰齊世家孝公卒弟潘殺孝公子而立是為昭公昭公以僖二十八年即位髙氏閌曰孝公名昭而諡潘曰昭非禮甚矣六月公會宋公陳侯衛侯鄭伯許男曹伯晉趙盾癸酉同盟于新城新城杜注宋地在梁國穀熟縣西今河南歸徳府商丘縣西南左傳六月同盟于新城從於楚者服且謀邾也榖梁同者有同也同外楚也胡傳同盟于新城同外楚也其曰同者志諸侯同欲非彊之也而宋公陳侯鄭伯在焉則知楚次厥貉三國雖從誠有弗獲已者削而不書蓋恕之也蔡不與盟果有即楚之實矣夷考晉楚行事未有以大相遠也而春秋予奪如此者荆楚僭王若與同好陵蔑諸侯是將代宗周為共主君臣之義滅矣可不謹乎集說程子曰諸侯始會議合而後盟盟者志同故書同同懼楚也髙氏閌曰去冬衛鄭皆因公而請平於晉至是諸侯之從楚者復附晉也夫天王崩葬諸侯皆若不聞而相與同盟可乎不待貶而自見也諸陳氏傅良曰向也扈之盟不序諸侯此其復序何夏之志也晉救江無功救鄭無功與秦亟戰而楚浸彊交聘於列國得蔡次厥貉矣而晉遂不競於是公朝晉衛侯來會公還自晉鄭伯來會諸侯之懼甚矣汲汲於晉而為此盟如之何勿序也書曰同盟同衆辭也自幽以來未之有也張氏洽曰許自文公圍之不服襄公又嘗伐之今始與盟會也同項氏安世曰幽之同同授諸侯於諸侯也新城之同授諸侯於大夫也盟黄氏仲炎曰垂隴之盟士縠主諸侯之盟新城之趙盾主諸侯之盟而不以士縠趙盾先諸侯者存君臣之分也侯趙氏鵬飛曰王者不作聖人不得已而予覇今晉不君而覇在大夫尤不可訓新城之盟趙盾實主之而聖人排盾於諸侯之下亦如垂隴之盟排士縠於下者耳然列之於上則其罪顯排之於下則其辭順盾實抗而待之以順何邪蓋非得已也於時諸侯散無所主而楚莊方立哆然有求諸侯之志㣲晉之覇則諸侯一舉歸楚矣故盾雖抗而今日之盟實有補於諸國聖人以順書之蓋有為而然也方盾有求諸侯之心特患諸侯不從衛鄭有尊覇主之志特患覇主無其人故更相求而相濟焉宜其會不期而合也幽家氏鉉翁曰諸侯旣散而復合春秋書同盟與齊之同盟其事雖異所以為同則一也是以春秋與之特書曰同附録左傳秋七月乙卯夜齊商人弑舍而讓元元曰爾求之久矣我能事爾爾不可使多蓄憾將免我乎爾為之秋七月有星孛入于北斗孛音佩左傳有星孛入于北斗周内史叔服曰不出七年宋齊晉之君皆將死亂公羊孛者何彗星也其言入于北斗何北斗有中也何以書記異也榖梁孛之為言猶茀也其曰入北斗斗有環域也胡傳孛者惡氣所生闇亂不明之貌也入于北斗者斗有環域天之三辰綱紀星也宋先代之後齊晉天子方伯列國紀綱彗者所以除舊布新也禎祥妖孽隨其所感先事而著後三年宋弑昭公又二年齊弑懿公又二年晉弑靈公此三君者皆違道失徳而死於亂符叔服之言天之示人顯矣史之有占明矣集說何氏休曰孛者邪亂之氣狀如彗篲者掃故置新之象杜氏預曰旣見而移入北斗非常所有故書之者范氏甯曰據孛於大辰及東方皆不言入此言入明斗有規郭入其魁中也劉向曰北斗貴星人君之象也茀星亂臣之類言邪亂之臣將竝弑其君孔氏穎達曰釋天云彗星為欃槍郭璞曰妖星也亦謂之孛言其形孛孛似掃彗也彗星長有尾入于北斗杓中孫氏復曰孛彗之屬偏指曰彗光芒四出曰孛杓黃氏震曰唐李淳風始算孛行度謂此星在角由入斗是月自北而入晉居北齊宋居晉之東故晉齊宋當之斗數七故云不及七年大家氏鉉翁曰有星者非常之星不當有而有異之者也宋汪氏克寛曰春秋書孛者有三此年入北斗而兆齊晉之弑昭十七年孛于大辰而兆王子朝之禍哀十三年孛于東方而吳將為越所滅始而應在伯國繼而應在王室終而應在呉楚矣天變愈甚而世變愈極春秋蓋傷之也公至自會晉人納捷菑于邾弗克納捷公作接菑側其反左傳邾文公元妃齊姜生定公二妃晉姬生捷菑文公卒邾人立定公捷菑奔晉晉趙盾以諸侯之師八百乘納捷菑于邾邾人辭曰齊出貜且長宣子曰辭順而弗從不祥乃還公羊納者何入辭也其言弗克納何大其弗克納也何大乎其弗克納晉郤缺帥師革車八百乘以納接菑于邾婁力沛若有餘而納之邾婁人言曰接菑晉出也貜且齊出也子以其指則接菑也四貜且也六子以大國壓之則未知齊晉孰有之也貴則皆貴矣雖然貜且也長郤缺曰非吾力不能納也義實不爾克也引師而去之故君子大其弗克納也此晉郤缺也其稱人何貶曷為貶大夫之義不得専廢置君也榖梁是郤克也其曰人何也㣲之也何為㣲之也長轂五百乘緜地千里過宋鄭滕薛夐入千乘之國以變人之主至城下然後知何知之晚也弗克納未伐而曰弗克何也弗克其義也捷菑晉出也貜且齊出也貜且正也捷菑不正也胡傳趙盾以諸侯之師八百乘納捷菑于邾邾人辭曰齊出貜且長宣子曰非吾力不能納也義實不爾克也引師而去之故君子善之而書曰弗克納也在易同人之九四曰乘其墉弗克攻吉象曰乘其墉義弗克也其吉則困而反則也其趙盾之謂矣聖人以改過為大過而不改將文過以遂非則有怙終之刑過而能悔不貳過以逺罪則有遷善之美其曰弗克納者見私欲不行可以為難矣然則何以稱人大夫而置諸侯非也集說何氏休曰大其不以己非奪人之是之陸氏淳曰趙氏云弗克納言失之於初而得於末也愈乎遂也七陳氏岳曰文六年趙盾將中軍持國政郤克宣十年方代士會將中軍則納捷菑乃宣子明矣於劉氏敞曰郤缺聞過而改見義而徙奚為而不免貶曰春秋之所謂賢者非賢於人之謂也必致之仁聖之域王者之道然後止矣今郤缺之事不恥過作非僅得免怙終之刑耳何足以言賢夫賢者之事其君言必謀於義動必順於道是以無過舉奚有用賤凌貴用少凌長傷財害民以力為之者哉趙氏鵬飛曰公羊以為郤缺於時晉權在盾使郤缺在行則亦盾意耳左氏事實為詳李氏亷曰此條三傳之義皆同但公榖以為郤缺郤克者失之正義曰捷菑不言邾者下有于邾之文猶納子紏不言齊者上有伐齊之文也頓子北燕伯舊是國君故稱其國納衛世子蒯聵于戚者以上下無衛文故稱國也政汪氏克寛曰宣子執伯國之奉不正而奪正其罪甚矣案經書弗克納者善之也書人者貶之也大夫興兵以廢置諸侯奉不正以奪正雖見義而徙不得無罪故穀梁責其知之晚而劉氏敞以為不免於貶也公羊雖以為貶而實與文不與之說則不可訓聖人筆削垂敎將使千載之下習其文以考其實豈有實與文相悖者乎胡傳從趙氏匡以書人為諱似非經旨附録左傳周公將與王孫蘇訟於晉王叛王孫蘇而使尹氏與𥅆啟訟周公於晉趙宣子平王室而復之守楚莊王立子孔潘崇將襲羣舒使公子燮與子儀而伐舒蓼二子作亂城郢而使賊殺子孔不克而還八月二子以楚子出將如商密廬戢棃及叔麇誘之遂殺鬬克及公子爕初鬬克囚於秦秦有殽之敗而使歸求成成而不得志公子燮求令尹而不得故二子作亂九月甲申公孫敖卒于齊左傳穆伯之從已氏也魯人立文伯穆伯生二子於莒而求復文伯以為請襄仲使無朝聽命復而不出三年而盡室以復適莒文伯疾而請曰榖之子弱請立難也許之文伯卒立惠叔穆伯請重賂以求復恵叔以為請許之將來九月卒于齊告喪請葬弗許榖梁奔大夫不言卒而言卒何也為受其喪不可不卒也其地於外也集說杜氏預曰旣許復之故從大夫例書卒遂范氏甯曰卒在常所則不地嬰齊卒貍蜃仲卒于垂或踰竟或未踰竟皆書地我陸氏淳曰奔大夫不書卒非我臣也旣許其歸即臣也故書之且明君臣之義死生一也或劉氏敞曰大夫出奔曷為或卒或不卒或可以卒不可以卒曷為或可以卒或不可以卒大夫出其爵禄猶列于朝出入猶詔於國兄弟宗族猶存是大夫而已矣卒之可也爵禄無列於朝出入無詔於國兄弟宗族無存是非大夫而已矣卒之不可也髙氏閌曰敖廢命奔莒此誅廢之罪也已而奔齊主齊而請復公於是乎許之則其卒也是亦大夫而已矣所以特書其卒以見典刑之壞且為齊人歸喪起也天張氏洽曰特書卒于齊見其俯仰愧怍無所容於地之間死而無所寧其身也齊公子商人弑其君舍左傳齊人定懿公使來告難故書以九月齊公子元不順懿公之為政也終不曰公曰夫已氏公羊此未踰年之君也其言弑其君舍何已立之已殺之成死者而賤生者也榖梁舍未踰年其曰君何也成舍之為君所以重商人之弑也商人其不以國氏何也不以嫌代嫌也集說陸氏淳曰淳聞於師曰春秋之作本懲姦惡也若未踰年之君被弑而不曰君則逆亂之臣皆以未踰年而肆其凶惡也故原其情以立此義晉奚齊本不正又里克不代其位故異於此也孫氏復曰舍未踰年稱君者孔子疾亂臣賊子之甚嫌未踰年與成君異也故誅一公子商人為萬世戒孫氏覺曰人子之心則未踰年而稱子國人弑君則未踰年而稱君此春秋所以辨君臣之分而防簒弑之禍齊趙氏鵬飛曰春秋書弑未踰年者二晉之奚齊與之舍是也奚齊書殺其君之子而舍書君是乃春秋之法也奚齊庶孽獻公殺世子而立之國人不君也故以君之子書舍齊之嫡長昭公卒國固其國也雖未踰年齊人君之矣故以君書春秋於此誠輕重之權衡也汪氏克寛曰子般子赤不成之為君者夫子魯臣為國諱惡與筆削他國不同蓋成舍之為君所以别其與奚齊異而與他弑君同苟不成其為君則商人與他弑異矣案弑逆之賊或以國氏或稱公子公孫當以程子為正胡傳於州吁則曰累及於上於商人則曰誅止於身皆非篤論也故刪之程子說見隠四年宋子哀來奔左傳宋髙哀為蕭封人以為卿不義宋公而出遂來奔書曰宋子哀貴之也公羊宋子哀者何無聞焉耳榖梁其曰子哀失之也胡傳易白幾者動之㣲吉之先見者也君子見幾而作不俟終日宋子哀有焉昔㣲子去紂列於三仁之首子哀不立於危亂之邦而春秋書字謂能貴愛其身以存道也若偷生避禍而去國出奔亦何取之有集說杜氏預曰大夫奔例書名氏貴之故書字子陸氏淳曰淳聞於師曰時奔者皆以有罪而哀獨以宋公不義不貪其禄而去之出奔之美者春秋所未有故書字以襃劉氏敞曰子哀者何宋大夫也其稱字何賢也何賢乎子哀以謂知義也其知義奈何蓋兆乎宋之將亂而去也髙氏閌曰春秋之法自外至者非有罪則不名自内出者非有罪則不書若但書子哀之來則不見奔義若書名書奔則與有罪者等故特書字而季子來歸不書出奔蓋為此也張氏洽曰自宋昭公在位終始無一善可稱大臣死禍出奔者比比皆是獨子哀潔身而去不蹈隕身濡尾之悔觀蕩意諸再歸而卒不免則子哀之見幾而作豈非既明且哲之流哉故書字以與之者趙氏鵬飛曰諸侯之大夫來奔者凡十竊邑來奔三皆斥而名之或罪之大者去族以示貶宋子哀見幾而奔春秋所予也是以書字以别之黎錞疑其不書氏則以為宋公之子如子同子紏之類孫復則以子為宋姓哀其名也皆穿鑿爾春秋固有不書氏而字者如王人子突是也何獨於子哀而必其書氏哉子同以太子生之禮舉之故曰子未誓故不曰太子子紏則在喪之稱與子般子野同不可援以為說若孫復之說則尤疎矣諸侯同姓之臣則稱族公子公孫是也異姓之臣則稱氏髙氏崔氏是也從國之姓惟婦人則然姜氏姒氏之類是也豈可以子哀為姓耶惑家氏鉉翁曰杜氏以子哀為字彊求其可貴愚竊焉宋公不能君亂且作矣子哀若不在其位潔身而去猶之可也旣為卿矣臨難自免為臣不忠罪莫大焉而以為春秋貴而不名豈聖人垂法之旨哉案左氏以子哀書字為貴之諸家皆主其說獨家氏鉉翁謂臨難自免未有可貴其持議亦正故竝存之冬單伯如齊齊人執單伯胡傳齊君舍魯之甥也商人弑舍固忌魯矣魯使單伯如齊齊人意欲辱魯故執單伯集說張氏洽曰單伯自莊元年至今已八十餘年未必一人或其子若孫歟汪氏克寛曰晉欒書變黶父子同稱欒伯士渥濁士彌牟祖孫同稱士伯而家父仍叔詩序皆有之或世稱之也春秋因其本稱而稱之若髙子是也齊人執子叔姬胡傳子叔姬者齊君舍之母也弑其君執其母皆商人所為而以為齊人執之何也商人弑君之罪已顯而齊人黨賊之惡未彰商人驟施於國而多聚士是以財誘齊國之人而濟其惡也齊人懷商人之私恵忘君父之大倫弑其君而不能討執其母而莫之救則是舉國之人皆有不赦之罪也假有人焉正色而立於朝誰敢致難其君與執其母而不之顧乎故聖人書曰齊人執子叔姬所以窮逆賊之黨與而治之也其討罪之旨嚴矣故曰春秋成而亂臣賊子懼集說杜氏預曰叔姬魯女齊侯舍之母不稱夫人自魯錄之父母辭孔氏穎達曰傳稱子叔姬妃齊昭公知舍之母也自魯録之父母辭亦不知是何公之女魯是其父母家不言文公是其父孫氏復曰單伯魯大夫子叔姬昭公夫人舍母也舍既遇弑魯使軍伯視子叔姬故商人執子叔姬單伯至此猶見者蓋其子孫世耳周劉氏敞曰左氏曰王使單伯如齊非也若單伯為大夫何以明年書單伯至自齊乎公羊曰道淫也非也案齊舍未踰年魯人豈以女予之縱令世衰多居喪而娶者春秋猶書子叔姬歸于齊縠梁曰私罪也非也何不用陳袁濤塗鄭祭仲例以解齊人乎程子曰商人弑君之惡已顯而執叔姬之事聖人不獨罪商人也齊人不討賊俱北面事之又敢執其君母齊之人均有罪焉故曰齊人母趙氏鵬飛曰舍既死矣單伯如齊唁叔姬也子弑何以安於齊子卒則姜氏歸於齊舍弑則叔姬歸於魯亦勢使焉爾然齊尚何辭以執單伯及叔姬哉夫盗日穿窬而人以盗目之則莫不玃然而怒舍之死商人豈直曰吾弑舍哉必有以文之商人文之而單伯正之叔姬質之此單伯叔姬所以見執也嗚呼舍之母是亦商人之母也弑其子而執其母是商人自執其母也聖人再書齊人其貶為何如耶公穀以淫目之不達經文不探事實妄疵人矣叔程氏端學曰魯不討商人弑逆之罪而區區為子姬之求故兩被執以自取辱又見當時弑逆之賊不少知懼而執其母與諸侯之使則王法不行而天倫絶矣案左氏謂襄仲使告於王請王寵以求昭姬蓋因周有單子遂疑單伯為王臣也公羊因單伯不稱行人疑為已罪又因經文執單伯與執子叔姬相連遂疑為道淫穀梁不察亦謂單伯私罪子叔姬同罪二傳之誣罔較左氏為尤甚矣行人之職屬在司宼有専官焉若凡奉使即稱行人其被執而不稱行人遂目為己罪求之於經安有當乎祭仲以誘挾執本非已罪而經不書鄭行人樂祁犁以飲酒執本屬已罪而經書宋行人豈非以其官為行人乃書行人耶誤以不書行人為已罪求其罪而不得則誣為道淫使叔姬䝉不白之寃何可訓也今故主劉氏敞之說而三傳皆無取焉兩書齊人趙氏鵬飛以為貶商人胡氏安國以為罪齊國之人程子兼用之其義始備已匡王酉元年十有五年晉靈九年齊懿公商人元年衛成二十三年蔡莊三十四年鄭穆十六年曹文六年陳靈二年把桓二十五年宋昭八年秦康九年楚莊二年春季孫行父如晉左傳十五年春季文子如晉為單伯與子叔姬故也集說蘇氏轍曰為單伯與子叔姬故將因晉以請齊也張氏洽曰魯不能閒暇明政刑以義討齊而反因晉以求於齊行父為大夫不能請討弑君之賊晉為盟主不能奉天討於商人皆罪也三月宋司馬華孫來盟華戸化反左傳三月宋華耦來盟書曰宋司馬華孫貴之也公與之宴辭曰君之先臣督得罪於宋殤公名在諸侯之䇿臣承其祀其敢辱君請承命於亞旅魯人以為敏榖梁司馬官也其以官稱無君之辭也不言及者以國與之也集說杜氏預曰華孫奉使隣國能臨事制宜至魯而後定盟故不稱使孔氏穎達曰成三年晉侯使荀庚來聘衛侯使孫良夫來聘丙午及荀庚盟丁未及孫良夫盟彼先以君命行聘禮既而别與之盟故書聘又書盟此雖使來聘魯不令結盟故書盟未稱使也僖四年楚屈完來盟于師即其比也劉氏敞曰左氏云宋華耦來盟其官皆從非也周之禮經諸侯相聘其使介有常數矣不聞其官皆從以為典也外蘇氏轍曰不言使盟在華孫也楚孫氏覺曰春秋臣來盟而不言君使者皆善之屈完來盟召陵遂却諸侯之師齊髙子來盟遂寧魯難屈完髙子皆受君命而來春秋嘉其得専使之宜故不言君使以起其善司馬華孫者其君闇亂國事廢弛而賢臣外奔華孫懼鄰國諸侯因其間隙而侵伐之於是不由君命權宜來盟以紓其國之難春秋以其實不受命於君不可稱君使又其憂國而舉職異於髙子屈完特書曰宋司馬華孫來盟見其憂國之難乃其職事之所當為者不可以矯命罪之也春秋大夫之見於經者多矣其官舉者三人焉又皆在昭公之時也豈非禍亂之際則節義之士有以顯名於後歟左氏曰其官皆從又曰司馬華孫貴之也盟㑹而備其官何足善乎聖人之意殆不然也張氏洽曰華耦之來出於自請故不稱使結好合於事宜能其官也為趙氏鵬飛曰宋昭不君諸侯棄之惟前年同諸侯新城之盟未嘗有一介之使交於魯也今司馬華孫恵然來盟何哉蓋前日子哀來奔以不義昭公而出宋蓋疑子哀之在魯有以間宋魯之好也故司馬華孫因是而求盟使其平而修好則聘問足矣何以盟為盟必有所不信而後質之於神也春秋外大夫來盟者四鄭語衛良夫皆書使惟齊髙子與宋華孫不書使非君命也已専盟也専盟則宜有貶辭而髙子書字華孫書官何耶大夫出疆有可以安國家利社稷専之可也髙子成齊侯之善而能定魯難華孫能掩昭公之惡而銷國之虞皆有功於其國故聖人特異之髙子以字書予之也華孫以官書貴之也案春秋來盟不稱使者三髙子屈完華孫也胡傳於屈完髙子不言使則以為權在屈完權在髙子嘉其能服義與定亂於華孫不稱使則以為専行而無君何耶無君之說始於穀梁然穀梁以稱官為無君之辭未嘗以不稱使為無君之辭蓋謂其君昏庸不知遣使修好而華孫能自盡其當官之職故稱官耳豈謂華孫有無君之心故専行無忌而不待使哉胡傳又謂稱華孫者自督弑殤公諸侯受賂失賊不討使秉宋政及其後世繼掌兵權春秋之所禁者故傳載其承命亞旅之辭而經書曰宋司馬華孫來盟其曰華孫猶季孫叔孫仲孫臧孫之類春秋此義蓋欲後世以賢者之類功臣之胄然後委之以政斯言亦非也經於魯臣固未有直稱季孫叔孫仲孫臧孫而不書其名者立賢以方官人以世亦未必合於聖人之義故凡主胡氏者皆不取焉穀梁以來盟為前定杜注謂至魯而後定盟二說不同當以左氏為正夏曹伯來朝集說劉氏敞曰曹伯來朝左氏曰禮也諸侯五年再相朝以修王命古之制也非也案尚書周官六年五服一朝又六年王乃時廵則諸侯於天子五年一朝矣於天子五年一朝不得於諸侯亦五年一朝也且以春秋時事考之曹小國也魯既當朝晉亦當朝宋衛亦當朝楚鄭秦把陳齊蔡滕又皆當朝朝無已乎其禮安在其制安在周禮大行人之職曰凡諸侯之邦交歲相問也殷相聘也世相朝也此為得中焉失杜氏諤曰凡書來朝皆譏譏其不朝天子而相朝其正也趙氏鵬飛曰左氏以傳聞之說附㑹以解經此一事尤為不典子太叔曰文襄之覇也其務不煩令諸侯三歲一聘五歲一朝左氏於此見曹伯十一年來朝至是又來朝適當五歲之期遂曰諸侯五年再相朝以修王命古之制也考於禮無五歲再相朝之禮五歲再相朝文襄之時左氏見子太叔之言遂以為古之制則尤為附會而不通鄭氏玉曰春秋書此以起齊人伐曹之文且為不能以禮自守而妄悅於人以招禍亂之戒汪氏克寛曰曹伯十一年來朝纔越四年而又朝不翅如事天子之禮文公屢受小國之朝而不報亦猶屢朝於齊晉而不見荅也而季氏本曰十一年來朝纔四年又朝畏齊而托於魯也齊人歸公孫敖之喪左傳齊人或為孟氏謀曰魯爾親也飾棺置諸堂阜魯必取之從之卞人以告惠叔猶毁以為請立於朝以待命許之取而殯之齊人送之書曰齊人歸公孫敖之喪為孟氏且國故也葬視共仲聲已不視帷堂而哭襄仲欲勿哭惠伯曰喪親之終也雖不能始善終可也史佚有言曰兄弟致美救乏賀善弔災祭敬喪哀情雖不同母絶其愛親之道也子無失道何怨於人襄仲說帥兄弟以哭之他年其二子來孟獻子愛之聞於國或譖之曰將殺子獻子以告季文子二子曰夫子以愛我聞我以將殺子聞不亦遠於禮乎遠禮不如死一人門於句鼆一人門於戾丘皆死句鼆杜注魯邑戾丘杜注魯邑公羊何以不言來内辭也脅我而歸之胡傳公孫敖慶父之後行又醜矣出奔他國其卒與喪歸皆書於䇿者許輪以謂文伯恵叔二子之哀誠無已也故魯人從其請國史記其事仲尼因而不革者以敖著敎也易曰有子考无咎周公命蔡仲曰爾尚蓋前人之愆集說杜氏預曰大夫喪還不書善魯感子以赦父敦公族之恩崇仁孝之敎故特録敖喪歸以示義人孔氏穎達曰桓十八年公之喪至自齊僖元年夫氏之喪至自齊注皆云告於廟是公與夫人薨於外竟皆啟廟告至例書於䇿宣八年仲遂卒于垂成十七年公孫嬰齊卒于貍脤皆不書喪至是大夫喪還例不書此獨書齊人歸公孫敖之喪者釋例曰公孫敖縱情棄命既己絶位非大夫也而備書於經者恵叔毁請於朝感子以赦父故曰為孟氏且國故是也不言來者魯人取之齊人送之非有専使特來故不言來可劉氏敞曰公羊曰筍將而來也案敖死殆十月豈置之編輿以行此理之不然者蘇氏轍曰敖以罪出魯人以孟氏故不絶其親而許其歸禮也髙氏閌曰魯既許之復而立其子為仲孫氏矣豈有臣其子而不使之奔其父之喪者乎崇公族之恩篤君臣之義則姑聽其家以其喪歸可也汪氏克寛曰不言來歸蓋齊人但達於竟上而敖之子自取以葬故不曰來於哀姜書曰夫人氏之喪至自齊而不曰齊人歸之此夫人與大夫之别也或謂敖廢君命不當録其卒又不當受其喪今案敖實魯國之罪人喪無可歸之義而惠叔哀毁以請懇切之至遂許以歸葬聖人紀之於春秋一以閔其子之孝一以著三桓漸彊之由雖有罪而獲赦也六月辛丑朔曰有食之鼓用牲于社左傳六月辛丑朔日有食之鼔用牲于社非禮也日有食之天子不舉伐鼔于社諸侯用幣于社伐鼓于朝以昭事神訓民事君示有等威古之道也集說髙氏閌曰莊公兩以日食鼔用牲于社其非禮妄作義已著矣今文公亦復如此必以為先朝故事可舉而行之也後世人君有舉行先朝故事不顧義之可否皆因陋承誤不知春秋之義者也案是年日食與莊二十五年春秋所書同而左氏前後異辭何耶左氏以正陽之月救日則伐鼔周之六月乃夏之四月所謂正陽之月也莊二十五年經書六月而本非六月故曰非常是年實係六月則伐鼔為宜其所失者不於朝而於社不用幣而用牲耳故曰非禮單伯至自齊榖梁大夫執則致致則名此其不名何也天子之命大夫也胡傳單伯天子之命大夫也故逆王姬會伐宋使於齊皆書其字致而不名與意如婼異者無所書而不尊王命謹臣禮也集說王氏葆曰内大夫適他國不以久近其歸未嘗書至惟被執而得反則以至書大夫國體一國之休戚係焉故也齊張氏洽曰若如左氏之說以單伯為周大夫則是執王使春秋既不書其自周來魯又止書其至魯而不復言其歸京師是同之於魯之臣子無復周魯大夫之别且無以明齊人之執王使豈春秋辨上下尊王室之義哉不趙氏鵬飛曰單伯天子之卿而魯至之從左氏而悔者吾欲聞其說知吳氏澂曰魯臣自他國至者三此單伯至自齊意婼至自晉是也皆為齊晉所執幸得解脫故書其至書齊氏履謙曰大夫恒出不書至惟見執於大國則故書單伯至自齊意如婼至自晉皆所以見讎好之情成事序之體尊李氏亷曰魯大夫之遭執而書至者三單伯書者之也叔孫婼不去氏賢之也意如去族左氏所謂尊晉罪已也執而不書至者季孫行父蓋與公同歸以至公為重也晉郤缺帥師伐蔡戊申入蔡左傳新城之盟蔡人不與晉郤缺以上軍下軍伐蔡曰君弱不可以怠戊申入蔡以城下之盟而還凡勝國曰滅之獲大城焉曰入之集說楊氏士勛曰伐入兩舉者伐而不即入故兩舉之也莊二十八年伐戰兩舉者初伐其竟内戰在國都故亦兩舉之也兼趙氏匡曰入而言伐言伐之不服而後入也所以惡蔡言晉本不欲入故與諸入不同也也陸氏淳曰公羊云入不言伐此言伐何兵至即入趙子曰若如此則當書云戊申郤缺帥師伐蔡入之此既先伐而後言入則非即入可知也髙氏閌曰蔡侯既與楚子次于厥貉故不與新城之盟晉郤缺伐之斯有名矣凡伐不言入伐之不服然後入焉見蔡雖附楚楚人不之救也足以知楚之不足恃矣此雖蔡人自取之亦所以甚晉也然晉曽不修所以服楚而暴小國以爭諸侯欲使區區之蔡捍楚之強而不貳則亦難矣故言伐言入甚之也陳氏傅良曰自伐書陽處父入書郤缺侵書趙穿以後凡役書大夫以張氏洽曰君弱不可以怠修徳以來蔡上也缺乃兵伐而入其國徒示威武暴及其都民而蔡終不心服謂之能佐覇主服諸侯可乎言伐言入甚之也家氏鉉翁曰晉文踐土于溫翟泉之會蔡皆與會楚次厥貉蔡為罪首以附之郤缺伐之斯有名矣然齊桓潰蔡而後臨楚意不専在蔡也今晉不能敵楚雖入蔡而不有益見其無能為耳案蔡背晉即楚而晉伐之蔡受伐不服而晉入之故趙氏匡以為兼惡蔡也然晉為盟主不能攘楚以庇蔡而加兵於蔡既伐之復入之則未免於暴矣髙氏閌張氏洽以言伐言入為甚晉不亦宜乎李氏庶謂晉人用師有節而春秋予之則非也秋齊人侵我西鄙榖梁其曰鄙遠之也其遠之何也不以難介我國也集說髙氏閌曰齊商人簒弑又執我命大夫罪不勝誅而反加兵於我故貶而人之也趙氏鵬飛曰商人大逆無道弑舍而執其母又執單伯亦可以已矣今纔釋單伯而又伐我西鄙嗚呼春秋之公義汨喪齊之罪諸侯不討幸也而反怙逆以伐人可勝誅乎㣲春秋亂臣賊子何懼哉吳氏澂曰魯無得罪於齊齊之興師無名故曰侵季孫行父如晉左傳秋齊人侵我西鄙故季文子告于晉集說蘇氏轍曰復為齊故也齊髙氏閌曰一嵗再如晉皆為故冬十有一月諸侯盟于扈左傳冬十一月晉侯宋公衛侯蔡侯陳侯鄭伯許男曹伯盟于扈尋新城之盟且謀伐齊也齊人賂晉侯故不克而還於是有齊難是以公不會書曰諸侯盟于扈無能為故也集說杜氏預曰將伐齊晉侯受賂而止故總曰諸侯言不足序列趙氏匡曰左氏云凡諸侯會公不與則不書案諸侯會公不與而列會者非一則知左氏之說非也程子曰此盟為齊亂也魯以備齊不在會故不序又稱諸侯者衆辭見衆國無能為也陳氏傅良曰此國君也曷為不序散辭也新城之盟不可以不序徒以諸夏之志焉耳而晉侯不出於是楚伯成而頃王崩𦵏不見於春秋諸侯無統紀甚矣故終靈公之篇凡合諸侯皆散辭𫝊曰無能為也家氏鉉翁曰八國討齊之弑君者今以賂釋晉靈㓜弱趙盾導以賄也不書晉會諸侯削晉覇也覇呉氏澂曰晉侯伯主也而與諸侯同稱諸侯不以主畀晉靈也扈汪氏克寛曰此年盟扈欲討齊而不果十七年會欲討宋而不能皆以賂而棄討賊之義故皆略諸侯而不序左氏一則曰無能為一則曰無功皆謂其廢天討而縱亂賊也十有二月齊人來歸子叔姬胡傳不言齊子叔姬來歸而曰齊人來歸子叔姬者見子叔姬無罪齊人自絶而歸之爾春秋深罪齊人以商人為君而不知其惡故其執其歸與弑其君商人皆稱齊人深責之也集說杜氏諤曰春秋書女來歸者三郯伯姬杞伯姬直曰來歸此子叔姬曰齊人來歸蓋譏在齊也商人弑其子又絶其母罪不容誅矣比石氏介曰子叔姬先書被執次書來歸非郯把之夫商人弑君自立又虐其國君之母天子不能討諸侯不能伐季孫行父再如晉諸侯為是盟于扈皆無能為而退徒得單伯之至子叔姬之歸而已而興兵以侵魯者未已也於以見晉伯之不競也於以見諸侯有弑君者而莫之討也於以見齊之横而魯之弱也不劉氏敞曰其言來歸何出也郯伯姬來歸則何以稱人稱人以歸者歸無罪者也不稱人以歸者歸有罪者也又曰公羊曰其言來何閔之也非也加來何以為閔不加來何以不閔此直來歸耳無強說也又曰榖梁曰父母於子雖有罪猶欲其免也非也郯伯姬來歸者此有罪見出者也齊人來歸子叔姬者此無罪齊人強出之者也程子曰執之書故來歸不得不書齊髙氏閌曰晉合諸侯盟于扈受齊賂而不伐齊故人自歸子叔姬以解諸侯之意家氏鉉翁曰父母志歸其女情之不容已者國君志討鄰賊亦義之不容已者也况魯甥以弑殞魯女以執辱霸主不能討魯國所當問文公誠能赫然發憤請命天王大興師徒問齊人弑舍之罪縱未能以商人為戮亦足以伸大義於天下乃卑躬下氣以請叔姬置討賊之公義篤歸女之私情書齊人執子叔姬齊人歸子叔姬其執其釋在人閔姬而病魯也案左氏誤以單伯為周大夫故單伯之至則曰來致命叔姬之歸則曰王故也今竝删之齊侯侵我西鄙遂伐曹入其郛郛音孚左傳齊侯侵我西鄙謂諸侯不能也遂伐曹入其郛討其來朝也季文子曰齊侯其不免乎已則無禮而討於有禮者曰女何故行禮禮以順天天之道也已則反天而又以討人難以免矣詩曰胡不相畏不畏于天君子之不虐㓜賤畏于天也在周頌曰畏天之威于時保之不畏于天將何能保以亂取國奉禮以守猶懼不終多行無禮弗能在矣集說啖氏助曰公羊云入郛不書此何以書動我也案因其侵伐我遂入曹故得詳其事非為其動我也入劉氏敞曰公羊曰入郛不書非也入郛殆矣幾乎矣勢不輕於圍豈得不書乎許氏翰曰魯盡禮於晉而見侵弗恤曹修禮於魯而被伐莫救夫豈特齊之暴戾無道皆晉靈趙盾之失職也髙氏閌曰商人弑君自立諸侯會于扈謀伐之晉取賂而還是成商人為君也故自此遂書齊侯商人知諸國之無能為益無顧忌肆其威暴且恚魯仗晉以謀已故一嵗而再侵魯惡魯而及曹非理甚矣凡伐不言入入其郛者甚之也歸趙氏鵬飛曰單伯至自齊齊人侵我西鄙今齊人子叔姬齊人復侵我西鄙歸吾人而伐吾國必有以責賂也曰吾歸爾人而爾不吾賂是以稱兵於魯焉且侵魯猶可也曹何負於齊哉徒以曹伯嘗兩朝魯為魯與國也所謂小人以其所不愛及其所愛也商人之滔天也極矣宜其不旋踵而取禍也侵家氏鉉翁曰扈之盟逡廵引退反益商人之暴書伐著晉之無能為也李氏亷曰齊魯之争齊桓未覇之先有長勺次郎之役晉文未覇之先有至酅取榖之役至此而齊三弱魯矣雖以子叔姬無寵之故而實晉覇之不振也陳氏云兵事書遂必天下之大故此語亦有見書侵書伐書入郛皆特筆則此書遂固不可與齊桓之侵蔡遂伐楚例論而又有甚於楚之侵陳遂侵宋晉之侵鄭遂侵衛者矣外兵事書遂者五而齊獨兩見焉晉之失覇非齊為之歟庚匡王戌二年十有六年晉靈十年齊懿二年衛成二十四年蔡文公申元年鄭穆十七年曹文七年陳靈三年把桓二十六年宋昭九年秦康十年楚莊三年春季孫行父會齊侯于陽榖齊侯弗及盟左傳十六年春王正月及齊平公有疾使季文子會齊侯于陽穀請盟齊侯不肯曰請俟君間公羊其言弗及盟何不見與盟也榖梁弗及者内辭也行父失命矣齊得内辭也集說程子曰魯齊既先約盟而公稱疾不往乃使季孫行父會故齊侯不及盟王氏葆曰弗者遷詞若曰我本欲及齊盟而齊弗及我盟也上既曰會齊侯則是齊許之會非絶魯也六月公子遂及齊侯盟可知矣之張氏洽曰文公即位之元年以會覇主為憚而付公孫敖以取晉怒魯之不得志於晉者數十年今齊之亂公能修明刑政告天子方伯以討其罪則雖大國必畏之矣既不能然反使商人得以彊大而威我親戚命使執辱於齊伐此有志者因心衡慮而圖之之鄙被兵與國䝉也文公方且宴安于其國復使其臣犯分求盟以平累日之隙抑何不思之甚哉李氏亷曰酅之弗及魯畏齊而弗敢及也陽榖之弗及齊弱魯而弗見及也不汪氏克寛曰齊懿之不與行父盟非果能以大夫可抗諸侯之禮責魯而不盟也特以勢軋魯而脅文公之親至及襄仲納賂則貪於利而不復責文公之不至矣故直書曰齊侯弗及盟不以商人之侮辱為恥也然平丘之盟則書公不與盟此不曰行父弗及盟而書齊侯則季孫亦不能無責矣夏五月公四不視朔左傳夏五月公四不視朔疾也公羊公曷為四不視朔公有疾也何言乎公有疾不視朔自是公無疾不視朔也然則曷為不言公無疾不視朔有疾猶可言也無疾不可言也榖梁天子告朔于諸侯諸侯受乎禰廟禮也公四不視朔公不臣也以公為厭政以甚矣胡傳天子班朔於諸侯諸侯每月奉以告廟出視朝政文公四不視朔公羊子以為有疾也不言疾自是公無疾不視朔也此見聖人所書之意若後復視朔者必於此書公有疾與昭公如晉之事比矣文公厭政備見於經閏不告朔不視無雨不閔會同不與廟壊不修作主不時事神治民之怠也則其心放而不知求久矣集說杜氏預曰諸侯每月必聴政因朝於廟今公以疾闕不得視二月三月四月五月朔也孔氏穎逹曰此後有不告朔者亦不復書其譏已明矣不復譏也杜氏諤曰六年閏月不告月猶朝於廟夫子錄之是幸其禮不盡廢也今又書不視朔是未嘗朝廟聴政禮廢甚矣孫氏覺曰視朔之禮廢自文公始不曰始不視朔者或行而或廢也命髙氏閌曰朔者天子之所頒也諸侯上禀天子之下授萬民之時故其奉王朔告於廟則謂之告朔退而視朝以授民則謂之視朔前此未有書不視朔者若其有疾則亦常事爾此特書者見公之非有疾而然也蓋欲符季孫行父之言使齊不疑耳張氏洽曰春秋㣲顯志晦之法無往不寓以見諱國惡而不沒實之意文公以疾不視朔春秋不用昭公有疾乃復之例書公有疾四不視朔而特書公四不視朔蓋文公自是因循不講告朔之禮以致他公不復舉行所以定哀之時聖人有我愛其禮之言羊存而禮廢其必始於此歟黄氏仲炎曰視朔者朔日視朝也朔者一月之始也朔不視朝則一月廢朝可知矣書夏五月公四不視朔以見文公自正月至五月廢朝也家氏鉉翁曰齊商人既歸子叔姬於魯遂以兵加之且欲邀公為盟公懼為齊辱託疾使二臣會盟前書陽榖之會後書郪丘之盟其問書四不視朔著公不欲自出耳齊氏履謙曰謁上曰告臨下曰視閏不告月簡宗廟也四不視朔厭朝政也為李氏㢘曰文公不視朔左氏以為有疾而公穀以無疾三傳說皆通蓋此時本以疾而詐齊自是遂因循廢之爾朱子曰魯自文公始不視朔則此後不復告朔可知前閏月之不吿猶行朝廟之禮也於是朝廟亦不舉矣時汪氏克寛曰告朔乃諸侯所以奉天子之政令當諸侯既不禀命於天子而自立又不朝於天子而述職其所以承天子之命而授之民者惟有此耳水木本原之義冺滅而僅存者也文公昉廢此禮而不行實有無王之心非特怠於事神治民而已也公羊左氏以為公有疾榖梁以為無疾今考四不視朔實在齊侯不及盟之後公子遂盟郪丘之前蓋公性怠惰又懼商人之辱巳故因㣲疾而託之以不聴政遂辭齊而不會然二百四十二年豈無因疾不視朔者而皆不書莊公七月有疾八月薨亦不書八月不視朔是文公之疾非果不能視事也子貢欲去告朔之羊蓋沿襲之弊以是為不急之務或廢或行至春秋之末雖賢者以為當廢春秋特筆以罪文公譏其作俑耳六月戊辰公子遂及齊侯盟于郪丘郪音西公作犀丘穀作師丘公羊疏作菑丘東郪丘杜注齊地當在山東昌府東阿縣境左傳公使襄仲納賂於齊侯故盟于郪丘榖梁復行父之盟也集說王氏葆曰此盟魯有畏而彊欲與之盟也然行父請盟則弗及仲遂納賂則俯從商人之為君可知矣見弑於近習宜哉以髙氏閌曰春秋書公四不視朔非特譏公之怠亦見公子遂得盟之由則知此盟非齊侯之欲故明年齊侯復伐西鄙僅少紓而已家氏鉉翁曰齊魯皆千乘之國齊能伐魯魯豈不能扞齊况直而壯者在魯曲而老者在齊彼以其力我以其義吾何慊於彼而行父襄仲乞盟不得至納賂求盟魯之君臣有愧甚矣特李氏亷曰内大夫特及諸侯盟者三郪丘赤棘㧞會盟者一祲祥二大夫及盟者一句繹秋八月辛未夫人姜氏薨集說杜氏預曰僖公夫人文公母也毁泉臺左傳有蛇自泉宫出入於國如先君之數秋八月辛未聲姜薨毁泉臺公羊泉臺者何郎臺也郎臺則曷為謂之泉臺未成為郎臺既成為泉臺毁泉臺何以書譏何譏爾築之譏毁之譏先祖為之已毁之不如勿居而已矣榖梁喪不貳事貳事緩喪也以文為多失道矣自古為之今毁之不如勿處而已矣胡傳先祖為之非矣然臺之存毁非安危治亂之所繋也雖勿居可也而必毁之是暴揚其失有輕先祖之心此履霜之漸弑父與君之萌春秋之所謹也故書集說孫氏復曰毁泉臺惡勞民也築之勞毁之勞既築之又毁之可謂勞矣劉氏敞曰臧文仲祀爰居而文公毁泉臺此皆迷民以怪者也爰居之不書展禽之力矣君子慎所以導民乎孫氏覺曰毁者全除之與墮異也先君為之是而毁之是毁先君之美也為之非而毁之是暴先君之惡也公羊之說得之喪齊氏履謙曰毁泉臺穀梁氏曰喪不貳事貳事緩也昭十一年大蒐于比蒲左氏亦曰君有大喪國不廢蒐有三年之喪而無一日之慼二傳正相發明鄭氏玉曰魯因蛇妖毁泉臺以惑衆固有罪矣苟不因蛇妖而毁之亦徒勞百姓之力彰先祖之過而已何益於政治哉汪氏克寛曰或者謂先君築之非則今毁之是文公毁之為莊公滅惡孝之大者夫孟獻子以其兄所為之室尚曰毁之重勞且不敢間况以國君而勞民以毁先君之所築者乎楚人秦人巴人滅庸左傳楚大饑戎伐其西南至於阜山師於大林又伐其東南至於陽丘以侵訾枝庸人帥羣蠻以叛楚麇人率百濮聚於選將伐楚於是申息之北門不啟楚人謀徙於阪髙蒍賈曰不可我能往寇亦能往不如伐庸夫麇與百濮謂我饑不能師故伐我也若我出師必懼而歸百濮離居將各走其邑誰暇謀人乃出師旬有五日百濮乃罷自廬以往振廩同食次於句澨使廬戢棃侵庸及庸方城庸人逐之囚子揚䆫三宿而逸曰庸師衆羣蠻聚焉不如復大師且起王卒合而後進師叔曰不可姑又與之遇以驕之彼驕我怒而後可克先君蚡冐所以服陘隰也又與之遇七遇皆北唯禆鯈魚人實遂之庸人曰楚不足與戰矣遂不設備楚子乘馹會師於臨品分為二隊子越自石溪子貝自仞以伐庸秦人巴人從楚師羣蠻從楚子盟遂滅庸阜山湖廣鄖陽府房縣南五十里有阜山陽大林杜注楚邑湖廣荆門州西北有長林城丘杜注楚邑選訾枝杜注楚邑莊子云堯伐叢枝即訾枝也杜注楚地當在湖廣荆州府枝江縣南境澨阪髙杜注楚險地當在湖廣襄陽府西境城句杜注楚西界地當在襄陽府均州西方杜注庸地上庸縣東有方城亭今鄭陽府竹山縣東四十五里有方城是也陘隰杜注地名荆州府東多溪山之險故名案禆鯈魚杜注庸三邑魚魚復縣今巴東永安縣四川夔州府奉節縣即古魚復縣以縣東魚復浦得名蜀漢曰永安注臨品杜注地名當在襄陽府均州界石溪杜入庸道當在均州界州仞杜注入庸道當在均界集說髙氏閌曰楚率秦巴以滅庸則秦又聼服於楚矣夫城濮之役秦人在焉遂與列國盟會晉襄因殽之役報復不已自是失秦使其協和以攘楚且討其弑君父之罪蓋有餘力而晉反棄秦以資楚此晉國所以不振也保張氏洽曰庸乘饑饉帥蠻危楚楚一畏徙則無以其國然御變待敵亦制服之而已夷人宗社豈王法之所容乎楚子克庸而遂滅之其罪大矣是以人楚子而罪其滅也戴氏溪曰秦楚相逺其所以得伐庸者由巴蜀以通道今趙氏鵬飛曰楚成王穆王求諸侯直與列國争鋒荘王之興西連巴秦繞出周晉之後西南既合而北趨晉則列國諸侯在其掌握矣然則蒍賈之謀乃轉敗為成而饑饉兵革之來適為莊王彊楚之資也案胡𫝊謂庸有取滅之道而蒍賈善謀國故列書三國楚不稱師蓋減楚之罪辭此說非也啖氏助曰凡滅國直書滅罪來滅者其於見滅者言力屈而死故也今直書滅庸是罪楚不罪庸矣又曰凡書滅又書其君奔者則兩罪之責其不死社稷也攷莊十年齊滅譚譚子奔莒是兩罪之也而齊反稱師莊十三年齊滅遂不書其君奔是専罪齊也而齊反稱人安見稱人不稱師為减楚罪乎若謂左氏稱秦人巴人實從楚師乃列稱三國略無差等以此證經減楚罪是又不善讀𫝊而敢於疑經矣楚子在行乃與秦巴卑將同列稱人是貶楚也且庸介於楚秦巴三國之間安知非三國共分其地故列而稱之也哉聖人以興滅繼絶為心乃因楚一時之謀許其覆人宗祀而不之罪遂使利歸彊楚謗分他國必不然矣今主張氏洽說而胡傳無取焉冬十有一月宋人弑其君杵臼公作處臼左傳宋公子鮑禮於國人宋饑竭其粟而貸之年自七十以上無不饋詒也時加羞珍異無日不數於六卿之門國之材人無不事也親自桓以下無不恤也公子鮑美而艶襄夫人欲通之而不可乃助之施昭公無道國人奉公子鮑以因夫人於是華元為右師公孫友為左師華耦為司馬鱗矔為司徒蕩意諸為司城公子朝為司宼初司城蕩卒公孫壽辭司城請使意諸為之既而告人曰君無道吾官近懼及焉棄官則族無所庇子身之貳也姑紓死焉雖亡子猶不亡族既夫人將使公田孟諸而殺之公知之盡以寳行蕩意諸曰盍適諸侯公曰不能其大夫至於君祖母以及國人諸侯誰納我且既為人君而又為人臣不如死盡以其寳賜左右而使行夫人使謂司城去公對曰臣之而逃其難若後君何冬十一月甲寅宋昭公將田孟諸未至夫人王姬使帥甸攻而殺之蕩意諸死之文公即位使母弟湏為司城華耦卒而使蕩虺為司馬胡傳此襄夫人使甸殺之也而書宋人者昭公無道國人之所欲弑也君無道而弑之可乎諸侯殺其大夫雖當於罪若不歸司宼猶有専殺之嫌以為不臣矣况於北面歸戴奉之以為君也故曰人臣無將將而必誅昭公無道聖人以弑君之罪歸宋人者以明三綱人道之大倫君臣之義不可廢也然則有土之君可以肆於民上而無誅乎諸侯無道天子方伯在焉臣子國人其何居死於其職而明於去就從違之義斯可矣蕩意諸亦死職春秋削之不得班於孔父仇牧荀息何也三子閑其君而見殺春秋之所取也意諸知國人將弑其君而不能止知昭公之將見殺而不能正坐待其及而死之所謂匹夫匹婦自經於溝瀆而莫之知也奚得與死於其職者比乎聖人所以獨取髙哀之去而書字以襃之也集說陸氏淳曰左氏說被殺之由云夫人使公田孟諸而殺之公知之盡以寳行趙子曰傳例自云君無道也凡無道之人例皆彊暴為人所畏祖母有何威權而能坐殺之乎若潛謀搆禍猶或可疑今乃云公知之載寳以行盡賜左右而端然待死推之人理未之有也劉氏敞曰公羊例云大夫弑君稱名氏賤者窮諸人大夫相殺稱人賤者窮諸盗非也大夫弑君有稱名氏者有獨稱名者有稱人者所謂賤者也至於盗則皆盗賊矣非所謂賤乎賤者也大夫相殺正當明其罪王札子殺召伯毛伯是也稱人者其有罪者也其文意分明可不講而得又何紛紛乎髙氏閌曰不書𦵏賊不討也呂氏大圭曰稱人以弑則其國人咸有罪焉宋人弑其君杵臼國人利公子鮑之惠奉而欲立之因昭公田孟諸郊甸之師攻而殺之是宋國之人皆欲弑之也齊人弑其君商人亦齊人利商人之恵縱其弑舍而君之及邴歜閻職弑懿公而國人又莫之討是齊國之人皆有罪也莒人弑其君宻州以莒子虐國人攻而弑之是莒國之人皆有弑君之心也曰趙氏鵬飛曰稱人以弑失賊之辭也汪氏克寛昭公無道久失衆心故襄夫人使人因衆惡而戮之書曰宋人弑其君既足著昭公無道之實又斥宋人大惡之罪而襄夫人以君祖母縱國人之弑其君其與弑之罪不書而自見矣案陸氏淳引趙氏匡謂宋昭公知將見殺必無端然待死之理揣情度勢誠為有見然春秋事據左氏仍録之以志被弑之由而陸氏亦竝存焉再考十二公之編稱國人以弑者三宋人弑杵臼齊人弑商人莒人弑宻州是也稱國以弑者四莒弑庶其晉弑州蒲吳弑僚薛弑比是也胡氏安國多主君無道之說而杵臼商人則罪在一國之人州蒲則欒書有恕辭吳僚薛比則當國大臣之罪宻州則止辨左氏之誤庶其則竝不發𫝊事同義異各有所取况揆以全經如晉楚陳三靈皆為無道何以直書趙盾夏徴舒公子比之名則亦未能盡合也然則經意安在即曰聖人因舊史以作春秋舊史從赴告之文有所損而不能益也臣弑其君子弑其父其以實赴於友邦者㡬何夫不以實赴則其罪必有所諉矣大都㣲者當之也聖人參稽國史以及七十二邦之所聞欲正其所誅則赴告異辭欲從其所諉則真兇漏網與其移辜以蔽獄不若懸案以徵兇故書曰某國弑其君某國人弑其君雖無所指名而亂臣賊子之罪亦有不得而逃者矣辛匡王亥三年十有七年晉靈十一年齊懿三年衛成二十五年蔡文二年鄭穆十八年曹文八年陳靈四年把桓二十七年宋文公鮑元年秦康十一年楚莊四年春晉人衛人陳人鄭人伐宋左傳十七年春晉荀林父衛孔逹陳公孫寧鄭石楚伐宋討曰何故弑君猶立文公而還卿不書失其所也胡傳列國之卿其君所與共天位治天職者宋有弑君之亂欲行天討而伐宋乃其職也復不能討而成其亂是不足為國卿失其職矣故皆貶而稱人大夫帥師稱名氏賤者窮諸人其稱人賤之也陳恒弑簡公孔子請討曰以吾從大夫之後不敢不告也集説杜氏預曰自閔僖以下終於春秋陳侯常在衛侯上今大夫會在衛下傳不言陳公孫寧後至則寧位非上卿故也左范氏甯曰衛序陳上盖主會者降之陸氏淳曰氏云卿不書失其所也啖子曰案春秋不命之卿例書人非貶也若命卿失所即貶稱人不命者貶又如何書之程子曰行天討而成其亂失天職也故不卿之楚髙氏閌曰春秋之誅亂賊如魯宣公者與謀也如公子比者與事也若宋文公始無弑君之謀終無弑君之逆而以為弑君者有其情也今諸國之師不探其情而無所委罪焉貶而人之不亦宜乎主陳氏傅良曰曷為貶稱人失討賊之義也宋賊無名宜若勿討其責諸侯以討之何子弑父凡在宮者殺無赦臣弑君凡在官者殺無赦衆人弑君賊奈何勿討也賊可以勿討則昭公書𦵏矣案伐宋之役先儒多從左氏以卿不書為失所獨啖氏助以為春秋不命之卿例書人非貶也攷是時晉之當國者趙盾而荀林父僅佐中軍衛之當國者甯俞而孔達未嘗執政陳公孫寧抑置衛下其尤卑可知鄭石楚亦無聞於時似啖説未為失也盖釋賊之罪當貶於釋賊不討之日不當預貶於帥師討賊之時是故伐宋則列序四國而無譏不必逆億其釋賊之心㑹扈則略諸侯不序以示貶然後衆著其釋賊之罪否則襄二十五年齊崔杼弑其君諸侯㑹于夷儀謀伐齊而沮於賂猶是役也何以列序十二國之君必俟重丘之盟既釋齊賊然後略諸侯以示貶耶故啖氏之說亦竝存之夏四月癸亥𦵏我小君聲姜聲公作聖公羊聖姜者何文公之母也集説劉氏敞曰葬我小君聲姜傳云有齊難是以緩今案聲姜薨後乃無齊難聲姜既𦵏而有齊師耳非髙氏閌曰九月乃𦵏慢也不稱僖姜而别為之諡禮也文公三不與諸侯盟㑹四不視朔又緩𦵏其母其怠於政事可知也已齊侯伐我西鄙六月癸未公及齊侯盟于穀左傳齊侯伐我北鄙襄仲請盟六月盟于穀集說髙氏閌曰齊侯以公不親盟復來討而脅公出盟於此見郪丘之盟無益矣胡氏銓曰齊侯與遂盟于郪丘是年伐我又與公盟于榖齊之叛盟固不容誅然公之昏庸不能為國以禮而汲汲以請盟深可恥也文公立十有八年大夫盟會十八九獨此書公盟亦以見大夫之張也家氏鉉翁曰魯當討齊者也坐受逆商之侮盟其臣復伐之而求盟其君齊之無道極矣魯之不振甚矣齊商傲而日益盈魯文卑而日益索皆將死之徴商惡貫盈宜及於難汪氏克寛曰郪丘與榖之盟皆書及則二盟皆魯人汲汲欲盟非齊之急於盟也明年商人戒師期使無申池之禍則兵又至魯矣盟豈足恃哉季氏本曰郪丘之盟齊得賂與公子遂同好矣今復伐西鄙以魯專事晉也文公往盟自此事齊矣諸侯會于扈左傳晉侯蒐於黄父遂復合諸侯于扈平宋也公不與㑹齊難故也書曰諸侯無功也於是晉侯不見鄭伯以為貳於楚也鄭子家使執訊而與之書以告趙宣子曰寡君即位三年召蔡侯而與之事君九月蔡侯入於敝邑以行敝邑以侯宣多之難寡君是以不得與蔡侯偕十一月克減侯宣多而随蔡侯以朝於執事十二年六月歸生佐寡君之嫡夷以請陳侯於楚而朝諸君十四年七月寡君又朝以蔵陳事十五年五月陳侯自敝邑往朝於君往年正月燭之武往朝夷也八月寡君又往朝以陳蔡之宻邇於楚而不敢貳焉則敝邑之故也雖敝邑之事君何以不免在位之中一朝於襄而再見於君夷與孤之二三臣相及於絳雖我小國則蔑以過之矣今大國曰爾未逞吾志敝邑有亡無以加焉古人有言曰畏首畏尾身其餘幾又曰鹿死不擇音小國之事大國也徳則其人也不徳則其鹿也鋌而走險急何能擇命之罔極亦知亡矣將悉敝賦以待於鯈唯執事命之文公二年六月壬申朝於齊四年二月壬戌為齊侵蔡亦獲成於楚居大國之間而從於彊令豈其罪也大國若弗圖無所逃命晉鞏朔行成於鄭趙穿公壻池為質焉胡傳宋昭公雖為無道人臣將而必誅春秋正宋人為弑君之罪所以明人道之大倫也故大夫無沐浴之請則貶而稱人諸侯無討賊之功則略而不序不然是廢君臣之義人欲肆而天理滅矣故曰春秋成而亂臣賊子懼集説杜氏預曰傳不列諸國而言復合則如上十五年盟扈之諸侯可知也又曰昭公雖以無道見弑而文公猶宜以弑君受討故林父伐宋以失所稱人晉侯平宋以無功不序明君雖不君臣不可以不臣所以督大敎何劉氏敞曰諸侯何以不序不足序也其不足序奈欲治宋而後不能也家氏鉉翁曰兩扈之㑹諸侯不序春秋所以削晉覇而著其黨逆之罪也自齊桓之覇列國乆無簒弑之禍及齊商人宋鮑弑君覇國無討又從而安定之自是簒弑之禍接跡於天下魯赤晉靈皆斃於彊臣之手趙盾實為之也人以為盾有無君之心故黨逆賊而不問盾何以辭其責或謂宋督弑君四國為會于稷春秋書曰以成宋亂今晉人兩扈視稷無以相逺不書成齊亂成宋亂何哉夫督之弑覇事未興書成宋亂竝責在會之諸侯也今晉主夏盟商與鮑皆釋而無討更與諸侯共定簒弑之㑹罪浮於稷故春秋削晉覇而不列數諸侯事雖同而書法異罪有輕重故也也汪氏克寛曰二扈之㑹皆取賂而還見利而忘義陳氏際泰曰于扈而散言諸侯伐宋而竝人大夫諸侯之貴加於大夫而于扈之貶甚於伐宋何也其位也彌尊則其責也彌重秋公至自穀集説髙氏閌曰公不與扈之㑹而及齊盟穀苟免齊難書至自榖則不㑹扈可知矣張氏洽曰齊商人不足與㑹書至危之則趙氏鵬飛曰六月公及齊侯盟于榖及秋而後至扈之會公何暇㑹之哉公不㑹則勿書可也此何以書穀之盟不當盟而盟扈之㑹當㑹而不㑹不當盟而盟之者忍怨以自辱也當㑹而不㑹者棄義而從讎也是以聖人惡之書公及齊侯盟于榖而諸侯㑹于扈以著公之失所從也欲汪氏克寛曰明年齊復伐魯則危可知矣附録左傳秋周甘歜敗戎於邥垂乘其飲酒也冬十月鄭大子夷石楚為質於晉邥垂杜注周地河南新城縣北有垂亭服䖍曰邥亭在髙都南今為河南府洛陽縣地冬公子遂如齊左傳襄仲如齊拜榖之盟復曰臣聞齊人將食魯之麥以臣觀之將不能齊君之語偷臧文仲有言曰民主偷必死集說髙氏閌曰公巳與齊侯盟而遂復往者政在遂故也胡氏銓曰齊連年伐我而數遣使以聘之魯之君臣豈不謂重幣甘言可以已敵國之難乎嗚呼不知立國區區以國與人雖竭力以事之彼豈以我為徳乎請汪氏克寛曰自商人之簒魯連年被兵上卿納賂盟又親與盟繼又使卿往聘而怒猶未怠也卑屈之不足以紓禍也如是苟非假手於歜職則魯其殆哉壬匡王子四年十有八年晉靈十二年齊懿四年衛成二十六年蔡文三年鄭穆十九年曹文九年陳靈五年把桓二十八年宋文二年秦康十二年楚莊五年春王二月丁丑公薨于臺下左傳十八年春齊侯戒師期而有疾醫曰不及秋將死公聞之卜曰尚無及期惠伯令龜卜楚丘占之曰齊侯不及期非疾也君亦不聞令龜有咎二月丁丑公薨穀梁臺下非正也集說趙氏鵬飛曰魯之權去公室文公之罪也三家子孫雖自僖公而僖之世固未嘗敢専也至文之世孟氏則公孫敖為戚之㑹垂隴之盟叔孫氏則得臣㑹晉伐沈敗狄于鹹季氏則行父如陳如晉帥師城邑東門氏則襄仲見於經者凡九非會則盟非盟則如非如則伐其横尤甚於三家故魯之受其禍尤速然極其源若非文公怠懦不君則大夫亦未遽専也即位之初霸主之㑹鄰國之好未甞親之率以大夫往閏月不告月常月不視朔怠惰昏庸不出寢門何以為國宜諸大夫互結私援外事大國内懐國人而自封殖公室寖弱而權移於人也一身未瞑二子為戮妃妾不能相保東門氏叔氏季氏争結於齊反戈内攻戕其冢嗣幸周公之靈未冺魯之宗社未遽勦絶然乾綱之權自是下移終春秋之世不能復收而魯遂以㣲則文公之責不可逭也李氏㢘曰始文公在位十有八年乃怠政之君魯國之衰自此當其初年承僖公之餘政國家無事故即位之書始得繼體之正而叔服㑹塟毛伯錫命王室之待魯甚優未何得臣如京公孫敖會晉侯尊王事伯之禮皆失焉不一二年緩於作主輕於逆祀以至世室之壊而宗廟之禮廢矣婦姜之逆不能謹始敬嬴之嬖不能正分而夫婦嫡妾之禮紊矣故先儒曰三書不雨無勤民之心四不視朔無自彊之志處父厭盟則辱於晉郪丘賂盟則辱於齊誠哉是言也然自七年㑹扈以後十三年新城以前楚商臣方以伯事召諸侯宋鄭蔡皆靡然從之魯於是時獨能堅事晉室故衡雍之盟公子遂之救承筐之謀沓棐之㑹亦不為無益於晉靈之伯數年之間楚椒秦術之聘曹伯之兩朝魯亦若猶能為諸侯之望者奈何晉室不振齊商人之侵暴不已行父兩告而援師不出於是陽穀之盟穀之盟魯遂困於齊矣雖文公之媮有以致之亦晉之咎也若夫敬嬴襄仲之事則又襲成風之餘智者文公前有讒而不見後有賊而不知身死之後冢嗣戕賊其亦莊公之儔哉汪氏克寛曰或謂因隕而斃不能順受其正故以非命而終今雖莫考其詳然經書薨于臺下則其失正終之道亦可貶矣黄氏正憲曰前書毁泉臺此書公薨于臺下即其地耶信如左氏之說則蛇之妖乃不係於聲姜而係於文公者矣秦伯罃卒集說孫氏復曰秦康公大髙氏閌曰秦伯益之後本附庸也自秦仲始至平王時秦襄始有功於周室賜爵為伯及穆公與於城濮之戰自後與列國交聘盟會九年來歸僖公成風之襚始與魯通好至是遂書其卒而弔其喪也夏五月戊戌齊人弑其君商人左傳齊懿公之為公子也與邴歜之父争田弗勝及即位乃掘而刖之而使歜僕納閻職之妻而使職驂乘夏五月公游於申池二人浴於池歜以扑抶職職怒歜曰人奪女妻而不怒一抶女庸何傷職曰與刖其父而弗能病者何如乃謀弑懿公納諸竹中歸舍爵而行齊人立公子元申池杜注齊南城西門名申門左右有池郡國志謂之左右池即系水源也今在山東青州府臨淄縣西胡傳案左氏齊懿公即位刖邴歜之父而使歜僕納閻職之妻而使職驂乘二人者實弑懿公然則於法宜書曰盗而特變其詞以為齊人何也亂臣賊子之動於惡必有利其所為而與之者人人不利其所為而莫之與則孤危獨立無以濟其惡簒弑之謀熄矣惟利其所為而與之者衆是以能濟其惡天下胥為禽獸而莫之遏公子商人驟施於國而多聚士盡其家而貸於公有司是以財誘齊國之人也齊人貪公子一時之私施不顧君臣萬世之大倫弑其國君則靦面以為之臣而不能討執其君母則拱手以聼其所為而不能救故於懿公見弑特不書盗反以弑君之罪歸諸齊人以誅亂賊之黨彌簒弑之漸所謂㧞本塞源懲禍亂之所由也故曰春秋成而亂臣賊子懼集說孫氏覺曰齊人殺商人自以其私非討賊也春秋之義弑君大惡之人殺之必正其罪苟不討其罪又以其私則亦曰弑君也所以原情定罪而大為之防也髙氏閌曰書齊人弑以誅亂賊之黨且見齊無臣子而商人得遂為君也面張氏洽曰商人固當討之賊然齊人不以為賊北稱臣而君之者三年以為賊則不當事以為君則不可弑今三年事之一旦弑之亂作於大分已定之後故曰弑其君也况商人驟施聚士以成弑舍之謀則齊人乃同惡之黨所以歜職殺商人而特書齊人黄氏仲炎曰春秋簒弑之賊如魯桓齊懿蔡侯般楚子䖍之類雖幸免於王法之誅而卒受殺身之禍豈非以此始者必以此終歟行汪氏克寛曰歜職以僕御之賊既斃商人舍爵而略不畏忌如肆行於無人之境則齊人固惡商人而欲其斃也春秋以弑君係之齊人宜矣然商人前書弑舍今不從州吁無知之例以討賊書蓋罪齊人既以為君而又殺之也六月癸酉𦵏我君文公秋公子遂叔孫得臣如齊左傳六月𦵏文公秋襄仲莊叔如齊恵公立故且拜𦵏也文公二妃敬嬴生宣公敬嬴嬖而私事襄仲宣公長而屬諸襄仲襄仲欲立之叔仲不可仲見於齊侯而請之齊侯新立而欲親魯許之穀梁使舉上客而不稱介不正其同倫而相介故列而數之也胡傳使舉上客將稱元帥此春秋立文之常體也其有變文書介副者欲以起問者見事情也子赤夫人之子今卒於弑不著其實是為國諱惡無以𫝊信於將來而春秋之大義隐矣故上書大夫竝使下書夫人歸于齊中曰子卒則見禍亂邪謀發於奉使之日而公子遂弑立其君之罪著矣集説范氏甯曰上客聘主也禮大夫為卿介遂與得臣俱為卿是以同倫為副使故兩言之明無差降常劉氏敞曰春秋之文有常有變變用於變常用於不相襲也變之甚㣲讀者難知也則以為史耳乃春秋則欲起問者見善惡也公子遂將弑君謀之齊而後决經書子卒其實尚隐故原其禍亂之始邪謀之發著之奉使之日以見非常也君家氏鉉翁曰書如齊繼書子卒二臣挾強援以弑也赤之死接之立乃賊臣嬖妾之本謀文公惽而不悟耳凡使不書介得臣預逆謀故竝書李氏亷曰經書竝使者二此年與定六年季孫斯仲孫何忌如晉是也又竝使以出㑹一襄十四年季孫宿叔老㑹向是也汪氏克寛曰公子遂當僖公之世入杞伐邾已得兵權文公即位遂執魯國之政特盟覇國之卿専㑹諸侯之師重以文之庸闇怠於政事無君之心非一日矣故假使齊之行挾得臣同徃結援強鄰以定弑立之計春秋列書使介分惡於得臣也冬十月子卒左傳冬十月仲弑惡及視而立宣公書曰子卒諱之也仲以君命召恵伯其宰公冉務人止之曰入必死叔仲曰死君命可也公冉務人曰若君命可死非君命何聼弗聴乃入殺而埋之馬矢之中公冉務人奉其帑以奔蔡既而復叔仲氏公羊子卒者孰謂謂子赤也胡傳諸侯在喪稱子繼世不忍當也既𦵏不名終人子之事也踰年稱君縁民臣之心也既𦵏而不名不名而遇弑者子赤是也踰年而稱君稱君而遇弑者閔公是也何以知其賊乎上書大夫竝使下書子卒夫人歸則知罪之在公子遂矣孫于邾出奔莒則知罪之在夫人與慶父矣繼世之恩終事之重情文之節隐惡之禮記事之信誅亂臣討賊子之義備矣集說杜氏預曰殺視不書賤之氏范氏甯曰子赤也諸侯在喪既𦵏之稱陳傅良曰惡位未定則其稱子卒何成之為在喪之君也凡君在喪恒稱子未𦵏稱子某成之為在喪之君以弑罪罪宣公也啟張氏洽曰私事公子遂敬嬴奪嫡之心也然其敢是心者嬖故也有夫人太子而嬖寵妾則文公所以怠於政事者有自來矣叔彭生身為大臣既無以救文公之失政又不能撓仲遂之邪謀有公冉務人之忠言不能用廿心就死無一毫扶持之實沒而不書有以也哉汪氏克寛曰翬弑隐公而伐鄭伐宋不稱公子慶父弑閔公子遂弑子惡經不削其族事同而既貶從同同也又曰莊十二年傳謂恵伯死非君命故不得以死節書竊疑仲遂殺惠伯而埋之史官畏遂威權不敢書曰公子遂殺叔仲彭生夫子作春秋當哀公之時而宣公乃時君之祖考故亦仍舊史為國諱惡而不敢増也苟曰必死君命而後為死節則人臣捍君於患難之際待召而往亦已晚矣或謂恵伯不發仲遂之謀令君及禍故不書卒夫以季文子孟獻子之賢黨遂逆謀反得書卒而獨責備於恵伯聖筆之討罪抑不如是之偏也何休以恵伯先見殺與苟息異然孔父先見殺而得書則亦非矣極胡氏居仁曰内不書弑者不忍言也不忍言則惡當誅可見矣此聖人言外意也案子卒不日穀梁以為故非也子般亦故也何以曰乎穀梁謂子般之卒有所見則日亦遷就之詞不可從夫人姜氏歸于齊左傳夫人姜氏歸于齊大歸也將行哭而過市曰天乎伸為不道殺適立庶市人皆哭魯人謂之哀姜榖梁惡宣公也有不待貶絶而罪惡見者有待貶絶而惡從之者姪娣者不孤子之意也一人有子三人緩帯一曰就賢也胡傳書夫人則知其正書姜氏則知其非見絶於先君書歸于齊則知其無罪異於孫于邾者而魯國臣子殺適立庶敬嬴宣公不能事主君存適母其罪不書而竝見矣集説何氏休曰夫死子殺賊人立無所歸留故去也張氏洽曰文定於九年夫人姜氏至自齊傳曰出姜至是蓋不安於魯適庶之亂未有不始於妾上僣夫人失位而致之者是以知文公之首惡也趙氏鵬飛曰内夫人以罪出曰孫夫人孫于邾是也無罪出曰歸夫人姜氏歸于齊是也家氏鉉翁曰齊人弑舍而歸叔姬於魯魯人弑赤而歸出姜於齊弑若出母後先一轍王綱隳頽伯政廢弛莫有聲其罪而討之者聖人書此重為慨歎矣曰汪氏克寛曰以氏係姓以姓係號與妾媵不同又文公已葬而夫人出則知嗣子之沒於弑而不容於魯也文姜哀姜預聞弑君皆書曰孫出姜書號書姓書氏書歸而無貶辭則知責魯之臣子而姜氏為無罪矣此聖人屬辭之深切著明欲人有考於是而知子惡之所以弑與公子接之所以立也季孫行父如齊集説髙氏閌曰前乎子卒書如齊後乎子卒書如齊齊實聞乎故所以惡齊也宣十八年行父云使我殺適立庶者仲也夫乃遂仲族則行父實與謀弑惡而立宣公故出姜歸齊而行父遽如齊焉惡實齊之甥恐齊人聼夫人之訴而來討於是議納賂而平焉行父之罪固不待貶而魯國臣子皆不可勝誅也齊程氏迥曰遂得臣行父三人皆與謀以其前後如而知之也張氏洽曰告宣公之立也趙氏鵬飛曰惡視之殺仲遂倡之而魯之諸大夫均與其謀三家之中叔孫氏則得臣同如齊季孫氏則行父亦如齊惟孟氏則公孫敖奔而死於外二子文伯恵叔未秉政也前東門氏叔孫氏竝轍如齊以成子卒之謀今季孫行父如齊致夫人而絶之懼有所訴也嫡家氏鉉翁曰君薨太子立正也非姦臣之利也舍立庶姦臣之利非國之福也強家擅弑立以市恩於新君而專權自兹始矣史墨云魯自東門遂殺嫡立庶魯君於是乎失國政在季氏於昭公也四君矣或者以行父為社稷臣誤矣莒弑其君庶其左傳莒紀公生太子僕又生季佗愛季佗而黜僕且多行無禮於國僕因國人以弑紀公以其寳玉來奔納諸宣公公命與之邑曰今日必授季文子使司宼出諸竟曰今日必達公問其故季文子使太史克對曰先大夫臧文仲敎行父事君之禮行父奉以周旋弗敢失隊曰見有禮於其君者事之如孝子之養父母也見無禮於其君者誅之如鷹鸇之逐鳥雀也先君周公制周禮曰則以觀徳徳以處事事以度功功以食民作誓命曰毁則為賊掩賊為藏竊賄為盗盗噐為姦主藏之名賴姦之用為大㐫徳有常無赦在九刑不忘行父還觀莒僕莫可則也孝敬忠信為吉徳盗賊藏姦為凶徳夫莒僕則其孝敬則弑君父矣則其忠信則竊寳玉矣其人則盗賊也其噐則姦兆也保而利之則主藏也以訓則昏民無則焉不度於善而皆在於凶徳是以去之昔髙陽氏有才子八人蒼舒隤敳檮戭大臨尨降庭堅仲容叔逹齊聖廣淵明允篤誠天下之民謂之八愷髙辛氏有才子八人伯奮仲堪叔獻季仲伯虎仲熊叔豹季貍忠肅共懿宣慈恵和天下之民謂之八元此十六族也世濟其美不隕其名以至於堯堯不能舉舜臣堯舉八愷使主后土以揆百事莫不時序地平天成舉八元使布五敎於四方父義母慈兄友弟共子孝内平外成昔帝鴻氏有不才子掩義隐賊好行凶徳醜類惡物頑嚚不友是與比周天下之民謂之渾敦少皥氏有不才子毁信廢忠崇餙惡言靖譖庸回服讒蒐慝以誣盛徳天下之民謂之窮竒顓頊氏有不才子不可敎訓不知話言告之則頑舍之則嚚傲很明徳以亂天常天下之民謂之檮杌此三族也世濟其凶増其惡名以至於堯堯不能去縉雲氏有不才子貪於飲食冐於貨賄侵欲崇侈不可盈厭聚歛積實不知紀極不分孤寡不恤窮匱天下之民以比三㐫謂之饕餮舜臣堯賔於四門流四凶族渾敦窮竒檮杌饕餮投諸四裔以禦螭魅是以堯崩而天下如一同心戴舜以為天子以其舉十六相去四凶也故虞書數舜之功曰慎徽五典五典克從無違敎也曰納于百揆百揆時序無廢事也曰賔于四門四門穆穆無㓙人也舜有大功二十而為天子今行父雖未獲一吉人去一㓙矣於舜之功二十之一也庶幾免於戾乎公羊稱國以弑何稱國以弑者衆弑君之辭集說啖氏助曰稱國以弑自大臣也國張氏洽曰凡稱國以弑者蓋其君以無道為人所弑而大臣坐視不能討賊皆當誅不赦之罪也秋吳氏澂曰如左氏之言則是僕以太子弑父也春何以書國弑乎且僕既與國人同弑君則當自立矣又何以奔魯乎疑僕因國人下以字當作之字謂僕因國人之弑君懼并及禍而來奔也據汪氏克寛曰文定於襄三十一年莒人弑君宻州趙氏以為傳之誤大略與此相類讀者當叅考得卓氏爾康曰紀公多行無禮僕既因衆以弑便應國如何來奔國人既惡庶其何復立其所愛若僕實弑春秋何為沒而不書吳㓜清疑之遂有趙匡氏改字之說曰𫝊文僕因國人以弑紀公如改以字作之字則經文了然僕非行弑而諸疑可解矣不知以已二字古人通用其文以也其義已也已字作解義既可通字不必改矣因有二義蓋因縁之因非因附之因也僕見國人弑君恐已得禍竊寳以奔苟為利而已案左氏謂莒僕因國人以弑君吳氏澂卓氏爾康皆疑之而卓氏尤勝今竝録焉附録左傳宋武氏之族道昭公子將奉司城湏以作亂十二月宋公殺母弟湏及昭公子使戴莊桓之族攻武氏於司馬子伯之館遂出武穆之族使公孫師為司城公子朝卒使樂呂為司㓂以靖國人欽定春秋傳說彚纂卷十八
